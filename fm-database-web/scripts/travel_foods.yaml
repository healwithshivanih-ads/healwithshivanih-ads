# ─────────────────────────────────────────────────────────────────────────
# Curated travel / festival / situation foods — The Ochre Tree
# ─────────────────────────────────────────────────────────────────────────
# Hand-authored (no AI). Read at render time and GATED to each client's plan
# deterministically — nothing here is shown raw. This is the "C" tier of the
# render cascade:  pre-authored (A) → curated+gated (C) → on-demand copilot (B).
#
# GATING (done in code at render time, step 2):
#   • drop a food whose `diet` the client can't eat
#       client veg/lacto  → drop diet:nonveg
#       client vegan      → drop diet:nonveg, diet:egg, and contains:[dairy]
#       client jain       → drop diet:nonveg, diet:egg, and contains:[onion_garlic|root]
#   • drop a food that `contains` anything on the client's
#       foods_to_avoid / nutrition.reduce / known_allergies
#   • keep survivors, show each food's `why`; surface `go_easy` as-is.
#
# FOOD TAGS
#   diet:     vegan | veg | egg | nonveg   (most restrictive diet that can eat it)
#   contains: [gluten, dairy, egg, onion_garlic, root, soy, nuts, fish, meat,
#              refined_sugar, alcohol, caffeine, nightshade]   (for the avoid-gate)
#   cat:      protein | veg | grain | fat | ferment | drink | snack
#   why:      one-line, plan-language reason it fits an FM plate
#
# Matching: `aliases` are lowercased substrings matched against the client's
# typed location (e.g. "sydney australia" → australia). Keep them generous.

version: 1

