      - { food: "Grilled protein + salad / veg for mains", diet: nonveg, contains: [meat, fish], cat: protein, why: "Order grilled, not fried or curried in cream" }
      - { food: "Dal + plain rice / roti as the safe fallback", diet: vegan, contains: [gluten, onion_garlic], cat: grain, why: "Available almost anywhere, plan-safe" }
      - { food: "Carry seeds, nuts, roasted makhana, a protein bar", diet: vegan, contains: [nuts], cat: snack, why: "Never caught hungry without a clean option" }
