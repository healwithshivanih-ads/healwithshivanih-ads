    eat:
      - { food: "Khichdi (moong dal + rice, soft)", diet: vegan, contains: [], cat: grain, why: "Gentle, easy to digest, complete" }
      - { food: "Clear vegetable / dal soup", diet: vegan, contains: [], cat: protein, why: "Hydrating + a little protein" }
      - { food: "Rice congee / soft upma", diet: vegan, contains: [], cat: grain, why: "Bland and soothing for an upset stomach" }
      - { food: "Coconut water + lemon-salt water (ORS-style)", diet: vegan, contains: [], cat: drink, why: "Replace fluids + electrolytes" }
      - { food: "Curd / buttermilk (if tolerated)", diet: veg, contains: [dairy], cat: ferment, why: "Probiotic once the worst passes; skip if dairy-sensitive" }
      - { food: "Steamed banana / stewed apple", diet: vegan, contains: [], cat: snack, why: "Easy carbs + potassium" }
    go_easy:
      - "Heavy, oily, or very spicy food"
      - "Raw salads and cold foods while gut is irritated"
      - "Caffeine and alcohol (dehydrating)"
