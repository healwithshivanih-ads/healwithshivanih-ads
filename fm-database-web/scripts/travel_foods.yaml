# ═══════════════════════════════ FESTIVALS ══════════════════════════════════
festivals:

  diwali:
    label: Diwali
    aliases: [diwali, deepavali]
    note: "Celebrate fully — pick 1–2 sweets you truly love, have them after a protein-rich meal, and keep portions small. The plan resumes the next day."
    eat:
      - { food: "Dry fruits + nuts (in place of mithai)", diet: vegan, contains: [nuts], cat: snack, why: "Festive but blood-sugar-friendly" }
      - { food: "Roasted makhana / chana chaat", diet: vegan, contains: [onion_garlic], cat: snack, why: "Crunchy, protein-ish, not deep-fried" }
      - { food: "Paneer tikka / grilled starters", diet: veg, contains: [dairy], cat: protein, why: "Protein-first before sweets" }
      - { food: "Baked / air-fried snacks over deep-fried", diet: vegan, contains: [], cat: snack, why: "Same festive feel, less seed oil" }
      - { food: "Mithai made with jaggery + nuts, small piece", diet: veg, contains: [dairy, nuts, refined_sugar], cat: snack, why: "If having a sweet, choose this and keep it to one" }
    go_easy:
      - "Trays of sugar-syrup sweets (jalebi, gulab jamun)"
      - "Deep-fried namkeen and chivda all day"
      - "Sweetened drinks and thandai"

  navratri:
    label: Navratri (fasting)
    aliases: [navratri, navaratri, fasting, vrat, upvas]
    note: "Vrat foods can spike blood sugar — anchor each fasting meal with protein + good fat so energy stays steady."
    eat:
      - { food: "Kuttu / singhara roti + sabzi (less oil)", diet: vegan, contains: [], cat: grain, why: "Gluten-free fasting grains, kept light" }
      - { food: "Samak rice + curd", diet: veg, contains: [dairy], cat: grain, why: "Add curd for protein; skip if dairy-sensitive" }
      - { food: "Roasted makhana + peanuts", diet: vegan, contains: [nuts], cat: snack, why: "Protein + fat to steady energy" }
      - { food: "Lauki / pumpkin sabzi (sendha namak)", diet: vegan, contains: [], cat: veg, why: "Veg-forward fasting option" }
      - { food: "Fruit + a few nuts", diet: vegan, contains: [nuts], cat: snack, why: "Whole fruit over juice/sabudana-heavy plates" }
    go_easy:
      - "Sabudana vada, fried potato (starch + seed oil)"
      - "Fried potato chips / aloo all day"
      - "Sweetened fruit-yoghurt and mithai"

  eid:
    label: Eid
    aliases: [eid, ramadan, iftar, ramzan]
    note: "Break the fast gently — start with water + dates + protein before heavier dishes, and keep fried items to a taste."
    eat:
      - { food: "Dates (2–3) + water to open the fast", diet: vegan, contains: [refined_sugar], cat: snack, why: "Traditional + gentle on the gut" }
      - { food: "Haleem / nihari — lean portion + small bread", diet: nonveg, contains: [meat, gluten], cat: protein, why: "Protein-rich; portion the bread" }
      - { food: "Grilled seekh / tikka", diet: nonveg, contains: [meat], cat: protein, why: "Grilled over fried" }
      - { food: "Chana / sprout chaat", diet: vegan, contains: [onion_garlic], cat: protein, why: "Fibre + plant protein at iftar" }
      - { food: "Fruit chaat (no added sugar)", diet: vegan, contains: [], cat: snack, why: "Hydrating, festive" }
    go_easy:
      - "Pakora, samosa platters (deep-fried)"
      - "Sheer khurma, sewaiyan (sugar + dairy)"
      - "Sugary sherbet and soft drinks"

  christmas:
    label: Christmas / New Year
    aliases: [christmas, xmas, "new year", "new year's", holiday season]
    note: "Enjoy the meal — load the plate with protein + veg first, treat dessert as one small portion, and keep drinks modest."
    eat:
      - { food: "Roast turkey / chicken / fish + vegetables", diet: nonveg, contains: [meat, fish], cat: protein, why: "Protein + veg is the easy win" }
