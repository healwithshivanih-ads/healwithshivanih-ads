category: metabolic
summary: Small, dense LDL particles (as opposed to large, buoyant LDL) are small enough
  to readily cross a damaged endothelium, enter the arterial wall, and undergo oxidation.
  Their number and small size are more predictive of atherosclerosis than total LDL
  cholesterol concentration.
