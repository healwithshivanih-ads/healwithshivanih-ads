category: endocrine
summary: Peripheral conversion of T4 (inactive) to T3 (active) occurs primarily in
  the liver and gut microbiome. Deficiencies in selenium, zinc, and iron; chronic
  stress; inflammation; and liver/gut dysfunction impair deiodinase enzymes, reducing
  active T3 and potentially increasing reverse T3.
