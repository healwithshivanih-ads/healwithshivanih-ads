summary: Magnesium is required for normal insulin receptor sensitivity and beta-cell insulin secretion. Deficiency reduces
  receptor sensitivity, impairing glucose uptake into cells and contributing to insulin resistance, pre-diabetes, and type
  2 diabetes.
