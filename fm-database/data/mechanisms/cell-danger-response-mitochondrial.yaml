slug: cell-danger-response-mitochondrial
display_name: Cell Danger Response — Mitochondrial Sensing
aliases:
- cdr mitochondrial sensing
- mitochondrial threat sensing
category: signaling
summary: Mitochondria function not only as ATP generators but as the cell's principal
  energy-flow sensors. When energy flow drops below threshold, mitochondrial signalling
  triggers the cell danger response (Naviaux) — a coordinated downshift in manufacturing
  (protein, peptide, and hormone synthesis), reduction of mitochondrial density, and
  a more efficient (but lower-throughput) energy output that limits free-radical exhaust.
  This frees antioxidant reserves for defense responses (free-radical bursts against
  pathogens) and reduces oxidative damage during prolonged threat. The downside is
  the symptom cluster of low cellular energy — fatigue, brain fog, cold intolerance
  — which is often misread as "broken physiology" rather than intelligent adaptation.
