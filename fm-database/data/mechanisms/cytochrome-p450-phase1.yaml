slug: cytochrome-p450-phase1
display_name: Phase I Cytochrome P450 Detoxification
aliases:
- CYP450 enzymes
- phase 1 liver detox
- hepatic oxidation
category: metabolic
summary: 'Phase I involves CYP450 enzyme-mediated reactions (oxidation, reduction,
  hydrolysis, hydration, dehalogenation) that convert lipid-soluble toxins into more
  polar intermediary metabolites. These intermediates can be more reactive/toxic and
  require rapid Phase II processing. Nutrients: riboflavin (B2), niacin (B3), pyridoxine
  (B6), folate, B12, glutathione, branched-chain amino acids, flavonoids, phospholipids.'
