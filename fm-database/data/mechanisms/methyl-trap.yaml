slug: methyl-trap
display_name: Methyl Trap / Functional B12 Deficiency
aliases:
- functional B12 deficiency
- folate trap
- methylfolate trap
category: metabolic
summary: When active folate (5-MTHF) is insufficient due to MTHFR dysfunction, folate
  becomes 'trapped' in an unusable form and the B12-dependent remethylation of homocysteine
  stalls. Serum B12 may appear normal or elevated while cellular B12 utilization is
  impaired.
