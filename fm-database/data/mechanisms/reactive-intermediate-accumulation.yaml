summary: When Phase 1 activity is upregulated or Phase 2 is insufficient, reactive intermediate metabolites accumulate in
  liver cells. These highly reactive species cause oxidative stress, DNA damage, and cellular dysfunction. This imbalance
  is a core mechanism of toxin-related disease in functional medicine. Clinical priority is always to optimize Phase 2 before
  stimulating Phase 1.
