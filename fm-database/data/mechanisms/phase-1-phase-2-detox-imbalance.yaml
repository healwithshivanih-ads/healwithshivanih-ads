category: metabolic
summary: When Phase 1 (CYP oxidation) is upregulated by toxin exposure but Phase 2
  conjugation (methylation, glucuronidation, sulfation) is insufficient, reactive
  intermediate metabolites accumulate, increasing oxidative stress and toxic burden.
  GGT elevation is a key indirect marker of this imbalance.
