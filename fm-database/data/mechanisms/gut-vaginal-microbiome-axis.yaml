summary: Microbes from the GI tract can translocate to the vagina and bladder via anatomical proximity and continuity. Oral
  ingestion of Lactobacillus crispatus colonizes the vagina without direct anatomical connection, suggesting translocation.
  All body-site microbiomes communicate bidirectionally, including gut, vaginal, urinary, oral, and brain microbiomes.
