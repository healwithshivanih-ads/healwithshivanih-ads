slug: tsh-receptor-stimulating-antibodies
display_name: TSH Receptor Stimulating Antibodies (TSI/TRAb)
aliases:
- tsi
- trab
- thyroid-stimulating-immunoglobulins
- tsh-receptor-antibodies
- graves-autoantibodies
category: immune
summary: Autoantibodies that bind to and chronically activate the TSH receptor on
  thyroid follicular cells, driving unregulated thyroid hormone overproduction. Distinct
  from the TPO/TG antibodies of Hashimoto's — TSI mimics TSH signalling rather than
  destroying tissue, and is the proximate driver of Graves' disease hyperthyroidism,
  goiter, and ophthalmopathy.
