slug: exercise-induced-neurogenesis
display_name: Exercise-Induced Neurogenesis
aliases:
- exercise neurogenesis
- new neuron formation from exercise
- VEGF-mediated neurogenesis
category: neurological
summary: 'Exercise stimulates the development of new neurons (neurogenesis),

  particularly in the hippocampus, partly through vascular endothelial

  growth factor (VEGF) which supports cerebral vascular and neuronal growth.

  Sustained physical activity throughout life is associated with preserved

  brain structure and cognition; sedentary periods are associated with

  brain shrinkage that can be partly reversed by resuming exercise.

  '
