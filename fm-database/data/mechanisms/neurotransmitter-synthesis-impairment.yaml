category: neurological
summary: B6 (as P5P) converts amino acids into neurotransmitters including serotonin,
  dopamine, and GABA. B12 and folate support methylation required for neurotransmitter
  production and recycling. Omega-3 fatty acids modulate receptor sensitivity. Deficiency
  of any of these produces mood symptoms that can mimic clinical depression.
