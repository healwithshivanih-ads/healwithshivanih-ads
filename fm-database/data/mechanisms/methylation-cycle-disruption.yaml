category: metabolic
summary: The methylation cycle converts methionine to SAMe, the universal methyl donor
  for over 200 reactions including neurotransmitter metabolism, DNA methylation, glutathione
  synthesis, phosphatidylcholine production, and histamine clearance. Disruption—from
  MTHFR variants, B12/folate deficiency, oxidative stress, or excess demand—elevates
  homocysteine, depletes SAMe, impairs BH4 production, and creates downstream pathology
  across multiple organ systems.
