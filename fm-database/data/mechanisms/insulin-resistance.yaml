category: metabolic
summary: Reduced cellular sensitivity to insulin, driven by excess refined carbohydrate
  intake, sedentary behaviour, visceral adiposity, and chronic inflammation. Central
  driver of T2D, PCOS, NAFLD, and atherogenic dyslipidaemia. TG:HDL ratio and fasting
  insulin are early detection markers.
