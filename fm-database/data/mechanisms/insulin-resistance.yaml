- id: coconote-fm-body-composition-bmi
  location: Metabolic Dysfunction Section
  quote: Are there some persistent or organic pollutants or bisphenol A that may be
    triggering this insulin resistance? Or is it really just that crummy standard
    American diet that's low in nutrients and high in calories that's triggering their
    insulin resistance.
- id: coconote-fm-estrogen-dominance
  location: How Does Inflammation Relate to Estrogen / Insulin Resistance Physiology
  quote: Insulin is responsible for forming estrogen. So insulin resistance can cause
    estrogen dominance. The insulin buildup actually upregulates the aromatase activity.
    So it forms more estrogen.
- id: coconote-fm-preventing-cvd-cholesterol
  location: Mediterranean Diet Evidence
  quote: Reduced markers of inflammation with the Mediterranean diet, CRP, interleukin-6,
    interleukin-7, interleukin-18, decreased insulin resistance.
- id: coconote-fm-stopping-anti-cholesterol-meds
  location: 'Case discussion: insulin resistance and dyslipidemia'
  quote: Classically you can see, his glycemic level is high and his STL level is
    high... This patient is having insulin resistance. So, what you will do, you will
    start working on insulin resistance.
