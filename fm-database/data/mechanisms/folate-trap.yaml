slug: folate-trap
display_name: Folate Trap (Folic Acid Receptor Blockade)
aliases:
- folic acid blockade
- folate receptor blocking
category: metabolic
summary: Unmetabolized synthetic folic acid (from fortified foods and supplements)
  can competitively occupy folate receptors, blocking the uptake of natural methylfolate
  and effectively starving the methylation cycle even when serum folate appears elevated.
  This is particularly relevant in individuals with MTHFR SNPs who cannot efficiently
  convert folic acid to methylfolate.
