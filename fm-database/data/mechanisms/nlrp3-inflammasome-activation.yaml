slug: nlrp3-inflammasome-activation
display_name: NLRP3 Inflammasome Activation
aliases:
- NLRP3 pathway
- inflammasome-mediated IL-1B production
category: immune
summary: The NLRP3 inflammasome is an intracellular signaling complex that drives
  production of pro-inflammatory cytokines IL-1B and IL-18. Activated by danger signals,
  it is a central driver of chronic and acute inflammation. Multiple agents in this
  toolkit (curcumin, quercetin, EGCG, Vitamin D) suppress this pathway.
