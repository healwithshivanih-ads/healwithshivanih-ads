category: immune
summary: Lipopolysaccharides (LPS), byproducts of gram-negative bacteria, translocate
  from the intestinal lumen into the bloodstream when tight junctions are compromised.
  The immune system mounts a strong inflammatory response to circulating LPS, contributing
  to systemic inflammation, metabolic dysfunction, and autoimmune triggers.
