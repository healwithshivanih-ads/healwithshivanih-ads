summary: The bidirectional relationship between gut function and liver detoxification. Many toxins processed by the liver
  are excreted via bile into the gut and eliminated in stool. Impaired bowel motility, leaky gut, and gut dysbiosis increase
  endotoxin load, overburdening the liver. Adequate fiber (>35g/day) and hydration are essential to this pathway.
