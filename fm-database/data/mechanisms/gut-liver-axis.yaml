category: gut
summary: 'The gut and liver are functionally linked: toxins processed by the liver
  are released via bile into the intestine for stool excretion; inadequate bowel motility
  or dysbiosis can allow re-absorption (enterohepatic recirculation) of toxins, increasing
  body burden. Adequate dietary fiber (>35g/day) and daily bowel movements are critical
  for toxin elimination.'
