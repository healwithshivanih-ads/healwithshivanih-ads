slug: 5-alpha-reductase-dht-conversion
display_name: 5-Alpha-Reductase DHT Conversion
aliases:
- testosterone to DHT conversion
- 5AR pathway
category: endocrine
summary: The enzyme 5-alpha-reductase converts testosterone to dihydrotestosterone
  (DHT), which has twice the androgenic potency at the prostate. In BPH, DHT levels
  within the prostate remain elevated even as serum testosterone declines with age.
  Inhibition of 5-alpha-reductase (by zinc, Serenoa repens) reduces intraprostatic
  DHT and prostate volume.
