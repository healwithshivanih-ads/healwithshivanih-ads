evidence_tier: strong
sources:
- id: pizzorno-textbook-gi-2
  location: Benign Prostatic Hyperplasia — Hormones and Benign Prostatic Hyperplasia
  quote: For testosterone to affect the prostate, it must be converted to dihydrotestosterone
    (DHT) by enzyme 5-alpha-reductase. DHT has twice the effect on the prostate as
    testosterone.
