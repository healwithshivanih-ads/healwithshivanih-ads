slug: estrogen-methylation
display_name: Estrogen Methylation & Clearance
aliases:
- estrogen detoxification
- catechol estrogen clearance
category: endocrine
summary: Active estrogen metabolites are methylated by COMT (using SAMe) and subsequently
  excreted. When COMT is slow, estrogen accumulates, driving PMS, fibroids, menorrhagia,
  and elevated risk of estrogen-sensitive cancers. When COMT is fast, estrogen is
  over-cleared, leading to deficiency symptoms including vaginal dryness, menopause
  challenges, and cardiac risk.
