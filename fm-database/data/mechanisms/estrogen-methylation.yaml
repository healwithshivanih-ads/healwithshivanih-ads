  location: 'Chapter 5: The Methylation Cycle Part 3'
  quote: Unmethylated estrogen is active, but methylated estrogen is expelled from
    your body. So methylation protects you from excess estrogen, which can cause PMS,
    menstrual issues, and the risk of estrogen-related cancers.
