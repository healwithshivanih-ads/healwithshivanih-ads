category: gut
summary: Dysbiosis refers to an imbalance between beneficial and pathogenic microorganisms
  in the gut. Unlike acute infection (e.g., gastroenteritis), dysbiosis represents
  a chronic state of microbial imbalance — reduced beneficial bacteria and overgrowth
  of pathogens or unwanted microbes. This damages the gut lining, contributing to
  intestinal permeability and increasing susceptibility to food reactions.
