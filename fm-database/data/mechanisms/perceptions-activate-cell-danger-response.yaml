summary: In the Abhidhamma (Buddhist phenomenology), each perception passes through
  17 sequential steps. The midpoint offers a "gateway" where a new skill can replace
  a habitual reaction. When that gateway is missed and the object of perception is
  collapsed around with an afflictive emotion (fear, anger, attachment, aversion),
  the limbic system activates regardless of whether real danger exists. That activation
  cascades to mitochondria — within seconds, cellular energy production is throttled,
  free-radical burst readiness is increased, and the cell danger response is engaged.
  This mechanism explains how chronic self-narratives ("I'm not safe," "I'm not good
  enough") drive measurable physiological inflammation and downregulated mitochondrial
  output even without external threats.
