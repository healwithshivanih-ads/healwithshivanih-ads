slug: dectin-1-trained-immunity
display_name: Dectin-1-Mediated Trained Immunity
aliases:
- dectin-1 pathway
- β-glucan trained immunity
- trained innate immunity
- innate immune memory
category: immune
summary: Yeast and fungal β-(1,3)/(1,6)-glucans bind the dectin-1 C-type lectin receptor
  on monocytes, macrophages, and dendritic cells. Receptor engagement triggers Syk-CARD9
  signalling that drives epigenetic and metabolic reprogramming of innate immune cells
  (H3K4 trimethylation, glycolytic shift via mTOR-HIF-1α). The result is 'trained
  immunity' — primed monocytes that respond more robustly to unrelated subsequent
  pathogen exposures (heterologous protection). This is the canonical mechanism behind
  the URI-protective effect of yeast β-glucan supplements (250–500 mg/day) and explains
  why oat β-glucan (β-1,3/1,4) — which does not bind dectin-1 — has stronger cardiometabolic
  than immune effects.
