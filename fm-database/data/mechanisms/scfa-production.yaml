summary: Beneficial gut bacteria ferment dietary fiber in the colon to produce short-chain
  fatty acids (SCFAs) such as butyrate, propionate, and acetate. SCFAs fuel colonocytes,
  reduce gut and systemic inflammation, and support the gut-brain connection.
