category: gut
summary: 'Microbial fermentation of soluble fiber in the colon produces short-chain

  fatty acids — primarily acetate, propionate, and butyrate. Butyrate is

  the preferred fuel for colonocytes (maintaining gut barrier integrity)

  and crosses the blood-brain barrier with neuroprotective and

  anti-inflammatory effects. SCFA production is a primary mechanism by

  which fiber intake affects systemic inflammation, insulin sensitivity,

  and mood regulation.

  '
upstream_drivers:
- dietary fiber intake (especially soluble + fermentable)
- microbial diversity
- prebiotic foods (resistant starch, inulin)
downstream_effects:
- gut barrier maintenance (colonocyte fuel)
- reduced systemic inflammation
- improved insulin sensitivity (GPR43/41 signaling)
- GLP-1 release stimulation
- neurotransmitter precursor support
- improved bowel motility
