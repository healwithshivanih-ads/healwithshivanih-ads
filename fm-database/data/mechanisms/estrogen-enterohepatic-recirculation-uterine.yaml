slug: estrogen-enterohepatic-recirculation-uterine
display_name: Enterohepatic Estrogen Recirculation Driving Uterine Pathology
aliases:
- estrogen-recirculation-uterus
- impaired-estrogen-excretion-uterine
- deconjugating-flora-estrogen-load
category: metabolic
summary: Conjugated estrogens excreted via bile are deconjugated by certain colon
  bacteria (the "estrobolome") and reabsorbed into the enterohepatic circulation.
  In low-fibre, dysbiotic-flora states the reabsorbed estrogen load amplifies endometriosis,
  uterine fibroid growth, fibrocystic breast tissue, and heavy menses. High-fibre
  vegetarian diets reduce circulating active unconjugated estrogens; indole-3-carbinol
  and DIM shift hepatic estrogen metabolism toward weaker 2-hydroxylated metabolites.
