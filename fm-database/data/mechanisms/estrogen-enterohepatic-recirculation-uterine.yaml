  location: Uterine Fibroids — Diet (pp 939)
  quote: Vegetarian women who eat a high-fiber, low-fat diet have lower blood estrogen
    than omnivores with low-fiber diets. Fiber may prevent and perhaps reduce fibroids
    by reducing estrogen influence on uterine tissue.
