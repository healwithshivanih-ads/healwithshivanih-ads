slug: loss-of-self-tolerance
display_name: Loss of Immune Tolerance of Self
aliases:
- loss of tolerance of self
- breakdown of self-tolerance
- immune tolerance breakdown
category: immune
summary: Autoimmunity is fundamentally a breakdown of the immune system's tolerance
  of the body's own tissues. Normally regulatory T cells and thymic education keep
  the immune system from attacking self; when chronic inflammation and immune overstimulation
  overwhelm these controls, antibodies and T cells begin targeting self-tissue (e.g.,
  thyroid in Hashimoto's, myelin in MS). Reducing the inflammatory burden can help
  the immune system regain tolerance.
