slug: tryptophan-steal-ido1
display_name: Tryptophan Steal via IDO1 (Inflammation)
aliases:
- tryptophan diversion
- IDO1 activation
- kynurenine pathway shunt
category: immune
summary: During inflammation, infection, or chronic stress, the enzyme IDO1 diverts
  tryptophan away from serotonin synthesis toward the kynurenine pathway. This 'tryptophan
  steal' depletes serotonin precursor availability and mimics a fast-MAOA phenotype,
  worsening mood, focus, and sleep even when the MAOA gene itself is not fast.
