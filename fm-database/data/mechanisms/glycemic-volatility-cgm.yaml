sources:
- id: pizzorno-energy-cluster
  location: Hypoglycemia — 24-Hour CGM (pp 450-451)
  quote: Most people with obesity and insulin resistance have remarkably fluctuating
    glucose, or increased glycemic volatility. Rather than absolute glucose level
    determining hypoglycemic symptoms, feelings of hypoglycemia occur when glucose
    drops rapidly, even when it was above normal. Such volatility may underlie most
    weight problems.
