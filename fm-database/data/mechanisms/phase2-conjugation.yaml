slug: phase2-conjugation
display_name: Phase 2 Conjugation
aliases:
- phase 2 detox
- conjugation pathways
- biotransformation
- biotransformation conjugation
- hepatic conjugation
category: metabolic
summary: Phase 2 reactions conjugate reactive intermediates produced by Phase 1 to
  polar molecules — glutathione (glutathione-S-transferase), sulfate (sulfation),
  glucuronic acid (glucuronidation), amino acids (taurine, glycine, glutamine), acetyl-CoA
  (acetylation), or methyl groups (methylation) — rendering them water-soluble for
  biliary or renal excretion. Phase 2 is protein-dependent and nutrient-intensive.
  Deficiency in Phase 2 relative to Phase 1 causes reactive intermediate accumulation
  and oxidative DNA damage.
