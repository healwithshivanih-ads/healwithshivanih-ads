slug: phase2-conjugation
display_name: Phase II Conjugation (Liver Detox)
aliases:
- phase 2 detox
- conjugation pathways
- biotransformation
category: metabolic
summary: 'Phase II involves conjugation reactions (sulfation, glucuronidation, glutathione
  conjugation, acetylation, amino acid conjugation, methylation) that attach polar
  groups to Phase I intermediates, rendering them water-soluble for excretion via
  bile/feces, kidneys/urine, or serum. Key nutrients: glycine, taurine, glutamine,
  NAC, cysteine, methionine.'
