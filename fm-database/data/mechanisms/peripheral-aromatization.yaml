slug: peripheral-aromatization
display_name: Peripheral Aromatization (Androgen to Estrogen)
aliases:
- adipose aromatase activity
- androgen-estrogen conversion
category: endocrine
summary: Fat cells contain aromatase, which converts adrenal and testicular androgens
  to estradiol. In aging men with increased body fat, total plasma estradiol remains
  constant or increases despite declining androgens. Elevated estradiol binds intraprostatic
  estrogen receptors, promoting prostate cell proliferation and contributing to BPH.
