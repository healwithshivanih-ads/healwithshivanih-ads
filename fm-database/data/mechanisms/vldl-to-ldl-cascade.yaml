slug: vldl-to-ldl-cascade
display_name: VLDL → IDL → LDL Lipoprotein Cascade
aliases:
- lipoprotein lipase pathway
- VLDL catabolism
category: metabolic
summary: VLDL (large triglyceride-rich particles) are broken down via lipoprotein
  lipase to IDL, then to LDL. Very high triglycerides (>500) can overwhelm the lipoprotein
  lipase receptor. Omega-3 fatty acids lower triglycerides/VLDL, which may transiently
  raise LDL as the receptor becomes more efficient—a predictable physiological outcome.
upstream_drivers:
- high-triglycerides
- high-sugar-diet
- insulin-resistance
downstream_effects:
