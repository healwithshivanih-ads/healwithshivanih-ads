category: gut
summary: 'Thorough chewing breaks food into fine particles, increasing surface area for enzymatic action. Two enzymes are
  released in the mouth: lingual lipase (from sublingual glands, breaks down saturated fats) and salivary amylase/ptyalin
  (begins starch digestion). Inadequate chewing impairs downstream digestion and places extra load on the pancreas.'
