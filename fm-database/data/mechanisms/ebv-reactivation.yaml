category: immune
summary: After acute mononucleosis, EBV remains latent inside memory B-cells for life. Under stress, immunosuppression, hormonal
  flux, or other infections, the virus reactivates into its lytic cycle, releases viral proteins / antigens, and triggers
  a fresh wave of immune response. Reactivation drives chronic fatigue, brain fog, swollen lymph nodes, and is now strongly
  implicated as an autoimmune trigger (especially for Hashimoto, lupus, MS, long COVID overlap). EBV viral capsid antigen
  (VCA) IgG + early antigen (EA) IgG patterns distinguish prior infection from active reactivation.
upstream_drivers:
- prior EBV infection (95% of adults are positive)
- chronic stress / cortisol elevation
