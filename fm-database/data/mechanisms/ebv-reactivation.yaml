notes_for_coach: Order EBV antibody panel (VCA IgM, VCA IgG, EBNA, early antigen IgG) in unexplained chronic fatigue or autoimmune
  flare. Active reactivation = high EA IgG with EBNA positive. Coaching levers vitamin D > 50 ng/mL, glutathione precursors
  (NAC, whey, glycine), zinc, monolaurin / l-lysine, sleep, stress reduction, gentle pacing, gut healing. Recovery is months,
  not weeks — set expectations.
