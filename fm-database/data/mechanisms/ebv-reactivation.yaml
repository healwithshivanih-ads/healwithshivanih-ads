- hormonal flux (perimenopause, pregnancy, postpartum)
- low vitamin D status
- low glutathione / antioxidant deficiency
- systemic-inflammation
- dysbiosis-gut-microbiome-imbalance
- high refined carb diet driving inflammation
- selenium deficiency
- zinc deficiency
- immunosuppressive medications
- chemotherapy / radiation history
