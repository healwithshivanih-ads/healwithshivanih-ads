category: metabolic
summary: Excess circulating free fatty acids and ectopic lipid deposition in skeletal
  muscle and liver impair insulin signalling, reduce GLUT4 translocation, promote
  beta-cell dysfunction, and contribute to dyslipidaemia (elevated triglycerides,
  small dense LDL, low HDL).
