category: gut
summary: Increased intestinal permeability allows luminal antigens, bacterial products
  (LPS), and undigested proteins to cross the epithelium, triggering systemic immune
  activation and worsening histamine, DAO, and MTHFR function. Pathogenic bacteria,
  stress, NSAIDs, and food intolerances all contribute.
upstream_drivers:
- poor diet (sugar, gluten, processed foods)
- chronic stress
- antibiotic or medication use
- DAO variant reducing epithelial repair signalling
