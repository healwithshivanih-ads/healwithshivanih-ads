summary: Sweat glands serve as an organ of elimination for certain toxins. Infrared sauna therapy stimulates sweating, potentially
  mobilizing stored toxins. Mineral loss (especially magnesium) during sweating must be replenished. This pathway complements
  hepatic and renal excretion.
