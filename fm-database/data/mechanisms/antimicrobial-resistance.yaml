summary: Pathogenic microbes can alter their genetics to develop resistance to antibiotics
  and antimicrobials. Spore-forming bacteria can convert to dormant spore forms to
  survive antibiotic exposure and re-emerge when conditions are favorable. This underscores
  the need for complete, targeted antimicrobial protocols rather than repeated partial
  treatments.
