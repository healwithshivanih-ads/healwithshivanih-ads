- folate-vitamin-b9
- homocysteine-elevation
- methylation
evidence_tier: plausible_emerging
sources:
- id: coconote-fm-vitamin-b9-b12-mthfr
  location: Summary / MTHFR section
  quote: MTHFR enzyme plays a key role in the metabolism of folate as we have seen
    in the folate pathway where it converts the 5,10-methylene tetrahydrofolate to
    5-methyl tetrahydrofolate, which is the active form.
