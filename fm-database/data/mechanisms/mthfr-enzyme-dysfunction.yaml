slug: mthfr-enzyme-dysfunction
display_name: MTHFR Enzyme Dysfunction
aliases:
- MTHFR deficiency
- methylenetetrahydrofolate reductase impairment
- MTHFR reduced activity
- thermolabile MTHFR
- C677T enzyme instability
category: endocrine
summary: The C677T polymorphism substitutes cytosine with thymidine at position 677,
  making the MTHFR enzyme thermolabile and structurally less stable. CT heterozygotes
  retain ~65% of typical enzyme activity; TT homozygotes retain only ~30%. Reduced
  enzyme activity impairs conversion of folate to 5-MTHF.
