slug: mthfr-enzyme-dysfunction
display_name: MTHFR Enzyme Dysfunction
aliases:
- MTHFR deficiency
- methylenetetrahydrofolate reductase impairment
category: endocrine
summary: Genetic variants in the MTHFR gene reduce activity of the MTHFR enzyme, impairing
  conversion of 5,10-methyleneTHF to 5-methylTHF (active folate). This downstream
  impairs homocysteine remethylation to methionine, reduces SAM availability, and
  disrupts DNA methylation, neurotransmitter synthesis, and glutathione production.
upstream_drivers:
- mthfr-c677t-polymorphism
- mthfr-a1298c-polymorphism
downstream_effects:
- elevated-homocysteine
- impaired-methylation
- reduced-sam
- reduced-glutathione
- neurotransmitter-deficiency
related_mechanisms:
- impaired-homocysteine-remethylation
- methylation
- sam-cycle
linked_to_topics:
