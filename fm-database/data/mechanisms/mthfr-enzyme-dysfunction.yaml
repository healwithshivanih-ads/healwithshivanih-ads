- id: Notebook LM
  location: C677T Variant
  quote: The C677T MTHFR polymorphism involves substitution of cytosine with thymidine
    at position 677 of the gene. This changes the enzyme structure and makes it more
    thermolabile, meaning less stable under certain conditions.
