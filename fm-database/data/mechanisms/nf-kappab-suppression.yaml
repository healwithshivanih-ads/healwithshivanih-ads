slug: nf-kappab-suppression
display_name: NF-κB Suppression (Anti-inflammatory Pathway)
aliases:
- NF-kB downregulation
- NRF2-NF-kB teeter-totter
category: immune
summary: NF-κB is a master pro-inflammatory transcription factor activated by oxidized
  LDL and other inflammatory stimuli. NRF2 is the opposing anti-inflammatory pathway.
  Interventions like turmeric (curcumin) downregulate NF-κB and upregulate NRF2, reducing
  systemic inflammation relevant to CVD.
