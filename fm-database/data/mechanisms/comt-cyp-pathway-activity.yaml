category: metabolic
summary: Genetic variants in COMT, CYP1A1, CYP1B1, and GST can impair the methylation
  and detoxification of estrogen metabolites, leading to accumulation of carcinogenic
  4-OH estrogens. Diet and lifestyle modifications can partially compensate for these
  variants.
