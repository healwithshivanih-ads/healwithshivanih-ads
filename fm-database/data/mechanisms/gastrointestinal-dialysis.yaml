- multi-dose-charcoal-mechanism
category: metabolic
summary: A pharmacokinetic mechanism by which repeated doses of activated charcoal
  enhance elimination of toxins already in the bloodstream — not just those still
  in the GI tract. AC binds toxins as they diffuse from the systemic circulation back
  into the gut lumen (via enterohepatic, enterogastric, and enteroenteric recirculation),
  creating a 'sink' that maintains a concentration gradient favourable for net excretion
  of toxin through the stool. Indications for Multi-Dose AC (MDAC) — life-threatening
  carbamazepine, dapsone, phenobarbital, quinine, or theophylline ingestions. Typical
  regimen — 50-100 g loading dose, then 12.5 g/h or 0.25-0.5 g/kg every 1-6 hours.
