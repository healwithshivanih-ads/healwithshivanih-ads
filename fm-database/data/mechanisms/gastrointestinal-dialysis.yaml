  location: Section 1 — Systemic Clearance subsection
  quote: AC can enhance the elimination of drugs already in the bloodstream. This
    occurs through the interruption of enterohepatic, enterogastric, and enteroenteric
    recirculation. By binding toxins as they diffuse from the circulation back into
    the gut lumen — a process known as 'gastrointestinal dialysis' — AC creates a
    'sink' that maintains a concentration gradient favorable for toxin excretion.
    MDAC is specifically indicated for life-threatening ingestions of carbamazepine,
    dapsone, phenobarbital, quinine, or theophylline.
