slug: nocturnal-glycemic-variability
display_name: Nocturnal Glycemic Variability
aliases:
- nocturnal-hypoglycemia
- nighttime-blood-sugar-swings
- glucose-driven-awakenings
category: metabolic
summary: A drop in blood glucose during sleep triggers release of counter-regulatory
  hormones (epinephrine, glucagon, cortisol, growth hormone) that fragment sleep architecture
  and cause early awakening (typically 2-4 am). A common physiologic cause of sleep-maintenance
  insomnia that is often misattributed to anxiety. Resolved by stabilising daytime
  blood sugar and avoiding late-evening simple carbohydrates and alcohol.
