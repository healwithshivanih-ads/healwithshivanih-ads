slug: vitamin-d-hydroxylation
display_name: Vitamin D Hepatic and Renal Hydroxylation
aliases:
- 25-hydroxylation
- 1-alpha-hydroxylation
- calcidiol to calcitriol conversion
category: metabolic
summary: Inactive vitamin D (from sun, food, or supplements) is first converted in
  the liver to 25-hydroxyvitamin D (calcidiol), then further converted in the kidneys
  to the biologically active 1,25-dihydroxyvitamin D (calcitriol). The second step
  is regulated by parathyroid hormone, vitamin D receptor proteins, and a negative
  feedback loop from vitamin D itself.
upstream_drivers:
- sun-uv-exposure
- dietary-vitamin-d
- parathyroid-hormone
