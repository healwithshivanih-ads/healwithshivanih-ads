evidence_tier: strong
sources:
- id: coconote-fm-vitamin-d3-k2
  location: Vitamin D Metabolism
  quote: First, it goes into the liver where it is converted into 25-hydroxyvitamin
    D or calcidiol. Eventually, this calcidiol goes into the kidney where it is converted
    into calcidiol or 125-dihydroxyvitamin D.
