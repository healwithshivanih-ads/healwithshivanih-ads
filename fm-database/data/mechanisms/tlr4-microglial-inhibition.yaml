category: immune
summary: LDN antagonizes the Toll-like Receptor 4 (TLR4) pathway and attenuates activated
  microglia in the CNS. This mechanism is proposed to be independent of opioid receptor
  activity and underlies LDN's novel anti-inflammatory effects in neuroinflammatory
  and autoimmune conditions.
