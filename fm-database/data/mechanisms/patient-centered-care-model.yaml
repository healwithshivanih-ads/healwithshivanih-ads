summary: A care paradigm that places the patient's lived experience, environment,
  habits, lifestyle, and story at the center of clinical decision-making, in contrast
  to disease-centered models that treat organs or symptoms in isolation. Functional
  medicine operationalizes this through upstream cause identification and personalized
  care planning.
