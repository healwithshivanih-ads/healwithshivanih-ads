slug: demyelination
display_name: Demyelination of CNS Axons
aliases:
- myelin-destruction
- myelin-loss
- plaque-formation
- white-matter-injury
category: neurological
summary: Immune-mediated destruction of the myelin sheath surrounding CNS axons, with
  relative sparing of (but also damage to) the underlying axons. Driven by T-lymphocyte
  recognition of CNS antigens, macrophage release of cytokines and free radicals,
  and complement-mediated antibody damage. Areas of demyelination are termed plaques
  and impair nerve conduction in specific functional pathways.
