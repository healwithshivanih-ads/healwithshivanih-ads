summary: Experiences in the prenatal and perinatal period — including birth method,
  separation from mother, and maternal emotional state — are proposed to establish
  baseline autonomic nervous system patterns. These patterns govern relational behaviour,
  emotional regulation, and physical responses (e.g., breathing, muscle tension) throughout
  the lifespan.
