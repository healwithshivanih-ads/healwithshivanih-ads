slug: monoamine-oxidation
display_name: Monoamine Oxidation (MAOA/MAOB)
aliases:
- MAO-A pathway
- serotonin degradation
- dopamine catabolism via MAO
category: metabolic
summary: Monoamine oxidase A (MAOA) oxidatively deaminates serotonin, norepinephrine,
  and dopamine after synaptic reuptake, controlling their duration of action. Riboflavin
  (B2) is the essential cofactor. Slow variants accumulate monoamines; fast variants
  deplete them. Tryptophan availability (itself depleted by inflammation via IDO1)
  limits serotonin synthesis upstream of MAOA.
