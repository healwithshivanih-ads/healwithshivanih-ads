slug: genomic-hormone-signaling
display_name: Genomic Hormone Signaling
aliases:
- nuclear receptor signaling
- hormone gene expression
- receptor-mediated gene transcription
category: endocrine
summary: Hormones bind to nuclear receptors (satellite dishes) in target tissues,
  enabling them to dive into the cell nucleus and directly regulate gene expression.
  This process requires zinc (to extract the hormone from its carrier protein), vitamin
  A (to switch receptor from repressor to expressive mode), magnesium (for transcription),
  iodine (to maintain receptor architecture), and P5P/B6 (to control signaling duration
  via helix 12).
