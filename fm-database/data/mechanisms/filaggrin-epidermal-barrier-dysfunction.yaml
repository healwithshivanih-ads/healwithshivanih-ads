slug: filaggrin-epidermal-barrier-dysfunction
display_name: Filaggrin Epidermal Barrier Dysfunction
aliases:
- FLG mutation
- skin barrier dysfunction
- NMF deficiency
category: structural
summary: Loss-of-function mutations in the filaggrin (FLG) gene impair keratin filament
  aggregation, reducing natural moisturizing factor (NMF) production and stratum corneum
  hydration. This barrier defect allows hapten penetration, triggering a Th1-to-Th2
  immunophenotype shift, secondary Staphylococcus aureus colonization, and initiation
  of the atopic march.
