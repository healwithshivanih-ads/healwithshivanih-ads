sources:
- id: pizzorno-textbook-gi-2
  location: Atopic Dermatitis (Eczema) — Filaggrin and Epidermal Barrier Dysfunction
  quote: Filaggrin is a protein that facilitates aggregation of keratin filaments;
    it is known as filament aggregating protein. It binds cytokeratin into tonofilaments
    and, when proteolyzed, forms small hygroscopic molecules—amino acids—which comprise
    natural moisturizing factor (NMF). NMF is responsible for hydration of stratum
    corneum.
