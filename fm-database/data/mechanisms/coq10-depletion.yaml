category: metabolic
summary: Statins block the mevalonate pathway upstream of CoQ10 (ubiquinone) synthesis.
  CoQ10 is critical for mitochondrial electron transport and ATP production in muscle
  and neural tissue. Depletion is the leading proposed mechanism for statin-induced
  myalgia and myopathy.
