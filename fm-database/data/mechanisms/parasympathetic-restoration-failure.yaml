summary: 'Sleep is the dominant restorative window for parasympathetic

  (vagal) tone — the autonomic state that drives digestion, immune

  surveillance, tissue repair, and cardiovascular recovery. Chronic

  sympathetic dominance from stress, late-night activity, evening

  exercise, screen use, or unresolved emotional load prevents the

  full parasympathetic shift required for restorative sleep. The

  vagus nerve, the major parasympathetic efferent, modulates heart

  rate, breath, digestion, and inflammatory tone — and is the

  target of vagal nerve stimulation for treatment-resistant

  depression. Insufficient nocturnal parasympathetic activation is

  a mechanism linking poor sleep to elevated inflammation, AM heart

  attack risk, and chronic disease progression.

  '
