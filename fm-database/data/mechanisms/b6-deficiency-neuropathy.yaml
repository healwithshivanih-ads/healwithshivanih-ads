- cervical-dysplasia
evidence_tier: plausible_emerging
sources:
- id: pizzorno-textbook-gi-2
  location: Carpal Tunnel Syndrome — Vitamin B Supplementation
  quote: Incidence of CTS has increased with the increased presence of pyridoxine
    (vitamin B6) antimetabolites (hydrazine dyes, isoniazid, hydralazine, dopamine,
    penicillamine, and oral contraceptives) in the environment and the intake of excessive
    protein.
