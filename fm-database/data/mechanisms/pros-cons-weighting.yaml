slug: pros-cons-weighting
display_name: Decisional Balance / Pros-Cons Weighting
aliases:
- decisional balance
- cost-benefit analysis of change
- pro-con weighing
category: neurological
summary: A cognitive mechanism by which an individual consciously or unconsciously
  compares the perceived benefits and costs of changing versus staying the same. Behavior
  change is more likely when the perceived benefits of change outweigh the costs,
  and coaching can deliberately shift this balance by amplifying change-relevant pros
  and clarifying the costs of the status quo.
