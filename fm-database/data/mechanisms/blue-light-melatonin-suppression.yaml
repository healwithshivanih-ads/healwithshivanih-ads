slug: blue-light-melatonin-suppression
display_name: Blue Light Suppression of Melatonin
aliases:
- evening screen light melatonin disruption
- pineal blue light disruption
- circadian light pollution
category: neurological
summary: 'Light in the blue wavelength range (~460-490 nm) emitted by phones,

  tablets, computer screens, and LED lighting reaches the

  intrinsically photosensitive retinal ganglion cells and the

  suprachiasmatic nucleus, suppressing pineal melatonin production

  even at low intensity. Evening blue light exposure delays sleep

  onset, reduces sleep depth, and shifts the circadian phase later.

  Sustained high-volume daily blue light exposure (10-12+ hours

  on screens) also appears to deplete retinal carotenoids (lutein,

  lycopene), with implications for macular health that are still

  being characterized.

  '
