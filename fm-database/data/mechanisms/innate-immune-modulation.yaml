summary: The innate immune system provides the first line of defense against pathogens.
  Multiple nutraceuticals (zinc, vitamin D, beta-glucans, medicinal mushrooms, elderberry)
  modulate innate immune responses including macrophage function, NK cell activity,
  cytokine production, and interferon signaling, which are critical for viral defense
  and resolution of inflammation.
