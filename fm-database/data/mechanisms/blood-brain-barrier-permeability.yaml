category: neurological
summary: Disruption of the tight-junction integrity of the blood-brain barrier, allowing
  peripheral inflammatory cells, cytokines, and antigens to enter the CNS. In MS,
  matrix metalloproteinase-9 (MMP-9) is a key mediator — it digests basement membrane
  collagens enabling T-lymphocyte trafficking into the brain and spinal cord. Elevated
  serum MMP-9 correlates with MS disease activity.
