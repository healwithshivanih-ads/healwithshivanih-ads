category: neurological
summary: Inhaling and exhaling through the nose using abdominal muscles stimulates
  the parasympathetic nervous system ('rest and digest'), reducing stress and anxiety.
  Mouth breathing using the upper chest activates the sympathetic nervous system ('fight
  or flight'), increasing stress responses.
