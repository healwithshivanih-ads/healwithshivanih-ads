slug: gastric-mucosal-barrier-disruption
display_name: Gastric Mucosal Barrier Disruption
aliases:
- loss of mucosal integrity
- gastric barrier dysfunction
- mucosal protective factor impairment
category: gut
summary: The gastric mucosa is normally protected by mucin layer, rapid epithelial
  cell renewal, and local acid-neutralising factors. H. pylori, NSAIDs, alcohol, nutrient
  deficiency, and stress can disrupt these protective factors, allowing corrosive
  gastric acid (pH 1–3) to damage the underlying tissue and initiate ulceration.
