summary: Poorly absorbed fermentable carbohydrates (fructans, GOS, fructose, polyols)
  pass undigested into the colon and small intestine where dysbiotic bacteria ferment
  them, producing excess gas (hydrogen, methane), causing distension, bloating, altered
  motility, and pain.
