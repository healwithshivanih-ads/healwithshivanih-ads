slug: raas-activation
display_name: RAAS Activation
aliases:
- renin-angiotensin-aldosterone activation
- angiotensin II excess
- renin-angiotensin system overactivity
category: endocrine
summary: Renin, secreted by kidney juxtaglomerular cells, generates vasoconstricting
  peptide angiotensin II and is linked to aldosterone in a negative feedback loop.
  Dysregulation — whether from low, normal, or high renin states — leads to sodium
  retention, volume expansion, and elevated vascular tone, all driving blood pressure
  elevation.
