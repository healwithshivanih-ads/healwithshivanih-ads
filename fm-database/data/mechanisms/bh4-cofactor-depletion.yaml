sources:
- id: dirty-genes-lynch
  location: Chapter 10 — Pollution, Smoking, and Stress
  quote: NOS3 relies upon a compound known as BH4, which your body produces. BH4 loves
    things clean. If your body is stressed by or dirtied up with toxins—including
    nicotine and industrial chemicals—your BH4 levels will go way down.
