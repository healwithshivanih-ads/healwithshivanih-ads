slug: bh4-cofactor-depletion
display_name: BH4 (Tetrahydrobiopterin) Cofactor Depletion
aliases:
- tetrahydrobiopterin deficiency
- BH4 uncoupling
- NOS3 uncoupling
category: metabolic
summary: BH4 is an essential cofactor for NOS3; it is also required for synthesis
  of serotonin, dopamine, and other neurotransmitters. BH4 is highly sensitive to
  oxidative stress—industrial chemicals, nicotine, and excess hydrogen peroxide rapidly
  degrade it. When BH4 falls, NOS3 switches from producing nitric oxide to producing
  superoxide, driving cardiovascular and neurological harm. BH4 synthesis requires
  folate, magnesium, and zinc via MTHFR-dependent pathways.
