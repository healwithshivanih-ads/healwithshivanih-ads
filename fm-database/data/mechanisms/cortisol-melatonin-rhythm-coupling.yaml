category: endocrine
summary: 'Cortisol and melatonin run in reciprocal diurnal rhythm: cortisol

  peaks shortly after waking (the cortisol awakening response) and

  declines through the day to a nocturnal nadir; melatonin rises

  in the evening as light fades, peaks in the early hours of sleep,

  and declines toward morning. The two rhythms anchor sleep-wake,

  alertness, immune activity, and tissue repair cycles. Disruption

  of either axis (chronic stress flattening cortisol curve, blue

  light suppressing melatonin) propagates to the other and to

  downstream circadian-dependent functions.

  '
