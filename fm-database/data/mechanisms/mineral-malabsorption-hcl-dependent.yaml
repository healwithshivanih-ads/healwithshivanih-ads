slug: mineral-malabsorption-hcl-dependent
display_name: HCl-Dependent Mineral Malabsorption
aliases:
- acid-dependent mineral absorption
- iron malabsorption low acid
category: metabolic
summary: Gastric acid ionises minerals such as calcium, iron, zinc, magnesium, and
  copper, making them soluble and absorbable in the small intestine. Low HCl production
  reduces this ionisation, resulting in clinically significant mineral deficiencies
  even when dietary intake or supplementation is adequate.
upstream_drivers:
- reduced-hcl-production
downstream_effects:
- iron-deficiency
- zinc-deficiency
- calcium-deficiency
- magnesium-deficiency
