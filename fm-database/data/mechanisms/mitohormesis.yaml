slug: mitohormesis
display_name: Mitohormesis
aliases:
- mitochondrial hormesis
- adaptive mitochondrial stress
category: metabolic
summary: Mitohormesis is the phenomenon where a brief, sub-lethal stress to the mitochondrion
  triggers adaptive responses that strengthen the cell beyond baseline — analogous
  to how resistance training stresses muscle to produce hypertrophy. Mechanism — transient
  mitochondrial reactive oxygen species (ROS) or related stress signals activate redox-sensitive
  transcription factors (Nrf2, NF-kB, PGC-1alpha), upregulating endogenous antioxidant
  machinery (catalase, superoxide dismutase, glutathione peroxidase), DNA repair,
  mitochondrial biogenesis, and autophagy. Classic mitohormetic inputs include exercise,
  cold exposure, heat exposure (sauna), fasting, intermittent hypoxia, polyphenols,
  and — per growing evidence — molecular hydrogen. The paradox dissolved by mitohormesis
  is why blunting exercise-induced ROS with high-dose antioxidant supplementation
  (vitamin C, vitamin E) actually impairs adaptation and lifespan benefit — the stress
  signal is the message. Therapeutically, this reframes the goal not as "more antioxidants"
  but as protecting and stimulating the body's own adaptive capacity.
