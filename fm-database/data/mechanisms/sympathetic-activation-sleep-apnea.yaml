  location: Sleep Apnea and Cardiovascular Risk
  quote: When we have obstructive sleep apnea, we have decreased oxygen delivery, we have an increase in CO2, we have changes
    in inter-thoracic pressure, and the end result is sympathetic activation, oxidative stress, and inflammation.
