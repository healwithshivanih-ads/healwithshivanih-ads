slug: sympathetic-activation-sleep-apnea
display_name: Sympathetic Nervous System Activation via Sleep Apnea
aliases:
- adrenergic surge sleep apnea
- OSA sympathetic cascade
category: neurological
summary: During obstructive sleep apnea events, airway closure causes hypoxia triggering sympathetic arousal with norepinephrine/epinephrine
  release, increased intrathoracic pressure changes activating atrial natriuretic factor, and downstream oxidative stress
  and inflammation contributing to atrial fibrillation, cardiomyopathy, and coronary disease.
