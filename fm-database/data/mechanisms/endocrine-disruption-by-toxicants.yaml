category: endocrine
summary: Environmental chemicals including BPA, phthalates, GMOs, heavy metals, triclosan,
  and propylene glycol can disrupt hormonal balance by mimicking or blocking hormone
  receptors, leading to obesity, metabolic disturbances (e.g., diabetes), infertility,
  and developmental harm. Lipid-soluble toxins accumulate in adipose tissue and are
  mobilized during weight loss.
