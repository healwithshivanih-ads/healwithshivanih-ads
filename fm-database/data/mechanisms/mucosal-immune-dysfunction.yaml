slug: mucosal-immune-dysfunction
display_name: Mucosal Immune Dysfunction
aliases:
- secretory IgA deficiency
- low sIgA
- mucosal immunity impairment
category: immune
summary: Secretory IgA (sIgA) is the primary mucosal antibody protecting all mucous membranes, with the highest concentration
  in the intestine. Low sIgA is associated with long-standing stress and protein/omega-3 malnutrition, impairing the first
  line of defense against pathogens. Elevated sIgA indicates active pathological infection. Both states are markers of gut
  immune disruption.
