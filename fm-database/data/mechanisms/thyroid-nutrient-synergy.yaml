category: endocrine
summary: Thyroid hormone production and conversion are dependent on iodine, selenium, iron, riboflavin, vitamin A, vitamin
  D, magnesium, and antioxidant balance. Deficiency or excess of any of these can impair thyroid function, trigger autoimmunity,
  or worsen symptoms such as fatigue, hair loss, and cold intolerance.
