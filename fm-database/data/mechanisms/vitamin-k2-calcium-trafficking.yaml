category: structural
summary: Vitamin K2 activates osteocalcin and matrix Gla protein (MGP), directing
  calcium into bones and preventing arterial and soft-tissue calcification. MK-7 has
  a longer half-life than MK-4 and is preferred for systemic effects. Always balance
  high-dose vitamin D with K2 to prevent hypercalcemia and vascular calcium deposition.
