slug: calcium-intestinal-absorption
display_name: Calcium Intestinal Absorption via Vitamin D
aliases:
- vitamin D calcium uptake
- gut calcium transport
category: metabolic
summary: Active vitamin D (calcitriol) acts on intestinal epithelial cells to upregulate
  calcium transport proteins, increasing the absorption of dietary calcium from the
  gut. This is one of the primary mechanisms by which vitamin D supports bone mineralisation
  and overall calcium homeostasis.
upstream_drivers:
- vitamin-d-hydroxylation
downstream_effects:
- bone-mineralisation
- calcium-homeostasis
related_mechanisms:
- osteocalcin-activation
- vitamin-d-hydroxylation
linked_to_topics:
- vitamin-d3
- vitamin-d3-k2-synergy
evidence_tier: strong
sources:
- id: coconote-fm-vitamin-d3-k2
  location: Vitamin D Functions
  quote: Vitamin D, when it goes to your intestine, it helps in increasing the absorption
    of calcium from the intestine and also maintains a level of calcium and phosphorus,
    which helps in the mineralization of the bones, the teeth.
