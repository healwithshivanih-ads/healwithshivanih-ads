notes_for_coach: Vegetarian/vegan clients and perimenopausal/postmenopausal women
  are the two groups most likely to need deliberate choline attention (eggs, liver,
  or a choline/phosphatidylcholine supplement) rather than relying on endogenous PEMT
  synthesis alone.
sources:
- id: pemt-knockout-choline-steatosis-2003
  location: Knockout mouse model — hepatic steatosis
  quote: Mice with homozygous disruption of the PEMT gene are dependent on alternative
    pathways for phosphatidylcholine synthesis and develop severe liver steatosis
    when fed a diet deficient in choline.
- id: pemt-estrogen-induction-hepatocytes-2007
  location: Estradiol dose-response in hepatocytes
  quote: PEMT transcription was increased in a dose-dependent manner when primary
    mouse and human hepatocytes were treated with 17-beta-estradiol.
- id: dirty-genes-lynch
  location: Gene Meal Guide — Chapter 13
  quote: 'Dirty PEMT: Any recipe with eggs, beets, quinoa, or lamb; Any recipe that
    supports MTHFR.'
