slug: pemt-gene-choline-demand
display_name: PEMT Choline Synthesis & Phosphatidylcholine Demand
aliases:
- PEMT deficiency
- phosphatidylethanolamine N-methyltransferase gene variant
- endogenous choline synthesis pathway
- PEMT pathway
- phosphatidylcholine biosynthesis
- choline methylation
category: metabolic
summary: PEMT methylates phosphatidylethanolamine to phosphatidylcholine using SAMe,
  supporting cell membrane fluidity, hepatic VLDL export, and bile acid production.
  When PEMT is under-active ('dirty'), dietary choline from eggs, meat, and beets
  becomes essential to meet demand. Under-methylation and low B12/folate further impair
  PEMT activity.
