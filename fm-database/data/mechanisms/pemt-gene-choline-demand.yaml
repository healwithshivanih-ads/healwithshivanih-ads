slug: pemt-gene-choline-demand
display_name: PEMT Gene Choline Demand
aliases:
- PEMT deficiency
- phosphatidylethanolamine N-methyltransferase gene variant
- endogenous choline synthesis pathway
category: metabolic
summary: PEMT (phosphatidylethanolamine N-methyltransferase) methylates
  phosphatidylethanolamine into phosphatidylcholine — the only pathway that
  synthesises new choline endogenously, distinct from dietary choline intake.
  When PEMT activity is low, even RDA-level dietary choline intake can be
  insufficient, raising risk of hepatic steatosis and muscle/cell-membrane
  symptoms. PEMT transcription is upregulated by estradiol, so premenopausal
  women are relatively protected; that protection fades with declining
  estrogen (perimenopause/menopause) or with genetic variants reducing
  baseline PEMT activity.
upstream_drivers:
