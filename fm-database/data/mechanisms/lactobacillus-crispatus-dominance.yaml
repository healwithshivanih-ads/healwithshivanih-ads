category: immune
summary: Lactobacillus crispatus is the keystone microbe of the healthy vaginal microbiome. It maintains low vaginal pH, protects
  against pathogens, supports cervical integrity, and reduces risk of premature labor, miscarriage, UTIs, and incontinence.
  Loss—commonly due to antibiotic exposure or aging—disrupts vaginal and reproductive health. Oral ingestion of crispatus
  can translocate to the vagina and bladder via anatomical continuity.
