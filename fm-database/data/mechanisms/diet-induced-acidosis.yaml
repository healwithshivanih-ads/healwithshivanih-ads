sources:
- id: pizzorno-womens-trio
  location: Osteoporosis — Dietary protein (pp 724)
  quote: High intake of animal protein, but not plant protein, is linked to increased
    risk of forearm fracture. Red meat is acid producing, inducing release of salts
    from bone to balance acid and maintain acid-base homeostasis. Diets high in fruits
    and vegetables and plant proteins are alkaline forming.
