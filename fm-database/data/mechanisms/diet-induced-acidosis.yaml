slug: diet-induced-acidosis
display_name: Diet-Induced Metabolic Acidosis
aliases:
- acid-ash-diet-effect
- western-diet-acidosis
- sulfur-amino-acid-acid-load
- protein-induced-acidosis
category: metabolic
summary: Sulfur-containing amino acids from animal protein, plus excess salt and refined
  carbohydrates, produce a daily acid load that the body buffers in part by mobilising
  mineral salts from bone — sustained over decades this contributes to osteoporosis.
  Same mechanism also lowers urinary citrate (raising Ca-oxalate stone risk) and raises
  urinary uric acid (gout risk). High-fruit-and-vegetable, plant-protein-emphasised
  diets are alkaline-forming and protective.
