category: metabolic
summary: The methylation cycle involves transfer of methyl groups critical for DNA repair, neurotransmitter synthesis, gene
  expression, and detoxification. B12 and folate (as methylcobalamin and methyltetrahydrofolate) are rate-limiting cofactors.
  MTHFR genetic variants reduce enzymatic efficiency, requiring active-form B vitamins.
