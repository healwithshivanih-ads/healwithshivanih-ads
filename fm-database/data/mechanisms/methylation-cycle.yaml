category: metabolic
summary: A cyclic biochemical pathway in which MTHFR converts folate to methylfolate,
  which donates a methyl group to homocysteine to form methionine; methionine is then
  converted to S-adenosylmethionine (SAMe), the universal methyl donor for over 200
  enzymatic reactions spanning neurotransmitter synthesis, epigenetic regulation,
  detoxification, hormone clearance, and cell membrane maintenance.
