slug: methylation-cycle
display_name: Methylation Cycle
aliases:
- one-carbon cycle
- MTHFR pathway
- SAM cycle
category: metabolic
summary: The methylation cycle involves transfer of methyl groups critical for DNA
  repair, neurotransmitter synthesis, gene expression, and detoxification. B12 and
  folate (as methylcobalamin and methyltetrahydrofolate) are rate-limiting cofactors.
  MTHFR genetic variants reduce enzymatic efficiency, requiring active-form B vitamins.
upstream_drivers:
- dietary-folate
- vitamin-b12-intake
- mthfr-genotype
downstream_effects:
- homocysteine-levels
- dna-methylation
- neurotransmitter-synthesis
- detoxification-capacity
related_mechanisms:
- homocysteine-metabolism
linked_to_topics:
