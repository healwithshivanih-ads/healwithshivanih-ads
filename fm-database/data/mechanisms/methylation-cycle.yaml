- vitamin-b12-deficiency
evidence_tier: strong
sources:
- id: vitaone-nutrition-toolkit
  location: 'Food Sources: Vitamin B12'
  quote: Those who have high homocysteine levels or genetic variants in methylation
    genes may respond better to 'active' forms of vitamin B12 such as methylcobalamin.
