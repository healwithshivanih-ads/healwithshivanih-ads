summary: Overgrowth of pathogenic or imbalanced gut bacteria produces excess beta-glucuronidase,
  which reabsorbs excreted estrogen. Gut dysbiosis also impairs absorption of key
  nutrients (vitamins, minerals) needed for hormone synthesis and metabolism, and
  contributes to systemic inflammation driving cortisol steal.
