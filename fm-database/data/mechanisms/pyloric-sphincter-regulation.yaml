summary: The pyloric sphincter only opens to release chyme into the duodenum when
  food is broken down to the correct state. Overeating, snacking between meals, excess
  fluid intake, stress, and alcohol all delay this process — extending gastric transit
  from the normal 3.5–4 hours to 8+ hours, as documented by Dr William Beaumont's
  19th-century gastric fistula experiments.
