slug: nocturnal-hypoglycaemia
display_name: Nocturnal Hypoglycaemia / Blood-Glucose Volatility
aliases:
- nocturnal-glucose-volatility
- sleep-maintenance-hypoglycaemia
category: metabolic
summary: Increased nocturnal blood glucose volatility is a major cause of sleep-maintenance
  insomnia. A drop in blood glucose triggers release of counter-regulatory hormones
  (epinephrine, glucagon, cortisol, GH), causing awakening. Addressing hypoglycaemia
  is a key step in the natural treatment of sleep-maintenance insomnia.
