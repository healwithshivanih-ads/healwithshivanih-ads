slug: methylation-cycle-dysfunction
display_name: Methylation Cycle Dysfunction
aliases:
- impaired methylation
- MTHFR dysfunction
- one-carbon metabolism impairment
category: metabolic
summary: The methylation cycle requires folate (as 5-MTHF), B12, B6, choline, and
  riboflavin as cofactors. Dysfunction leads to elevated homocysteine, impaired neurotransmitter
  synthesis, poor DNA repair, and increased cancer/cardiovascular risk. MTHFR variants
  reduce conversion efficiency and increase need for active forms.
