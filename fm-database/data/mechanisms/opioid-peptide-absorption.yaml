slug: opioid-peptide-absorption
display_name: Opioid Peptide Absorption (Glutomorphine / Caseomorphine)
aliases:
- glutomorphine
- caseomorphine
- exorphins
- dietary opiate effect
category: gut
summary: Gluten and casein incompletely broken down in a dysbiotic gut produce opiate-like
  peptides (glutomorphine from wheat, caseomorphine from dairy). Without healthy gut
  flora, these peptides cross the gut lining, enter the bloodstream, reach brain opiate
  receptor sites, and exert opiate-like effects on brain function, potentially contributing
  to psychiatric symptoms.
