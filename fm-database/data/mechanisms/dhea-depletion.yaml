summary: Under chronic stress, adrenal DHEA output falls as the glands can no longer
  sustain output. DHEA is a precursor to testosterone and estrogen, supports immune
  resistance, prevents osteoporosis, lowers cholesterol, and increases muscle mass.
  Its depletion signals adrenal exhaustion.
