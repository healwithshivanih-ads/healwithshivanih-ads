summary: Dysbiosis reduces populations of SCFA-producing bacteria (e.g. Faecalibacterium),
  diminishing butyrate and other SCFAs. SCFAs are critical for colonocyte health,
  mucosal immunity, and anti-inflammatory signaling. Low SCFAs impair gut barrier
  integrity and immune regulation.
