notes_for_coach: Genetics aren't destiny — coach focus is the modifiable triggers (gut barrier, gluten reactivity, stress,
  sleep, vitamin D, omega-3, microbiome diversity). Family history of autoimmune disease is the strongest 'soft signal' to
  be proactive about gut + lifestyle even before any antibody shows up. Once one autoimmune diagnosis exists, risk of another
  rises three-fold — a strong reason to lean into FM root-cause work rather than wait.
