summary: Specific HLA (Human Leukocyte Antigen) class II haplotypes — most notably HLA-DR3 and HLA-DR4 — present self-peptides
  to T cells in ways that, under environmental triggers (infection, gut barrier failure, stress, gluten reactivity), provoke
  a breakdown of central + peripheral immune tolerance. The result is autoreactive T-cell expansion and Treg insufficiency,
  the convergence point for nearly every autoimmune diagnosis (Hashimoto, type 1 diabetes, lupus, rheumatoid arthritis, coeliac).
  Genetic susceptibility loads the gun; environmental + gut + lifestyle triggers pull the trigger.
upstream_drivers:
- inherited HLA haplotype (DR3 / DR4 / DQ2 / DQ8)
- family history of autoimmunity
- chronic gut barrier dysfunction
- viral / bacterial infection (especially EBV, CMV, H. pylori, Yersinia)
- gluten reactivity in genetically susceptible
- molecular mimicry from microbial / dietary antigens
- chronic psychological stress
- pregnancy / postpartum hormonal flux
- environmental toxin exposure (heavy metals, mould, plastics)
- vitamin D deficiency
- omega-3 deficiency
- low diversity gut microbiome
- systemic-inflammation
- microchimerism
downstream_effects:
- regulatory T-cell (Treg) insufficiency
- autoreactive T-cell expansion
- B-cell production of autoantibodies
- tissue-specific immune attack
- subclinical autoimmunity (positive antibodies, no symptoms)
- clinical autoimmune diagnosis
- multiple autoimmune syndromes (one diagnosis triples risk of next)
