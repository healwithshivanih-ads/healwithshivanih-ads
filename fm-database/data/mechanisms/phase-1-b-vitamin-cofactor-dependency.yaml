category: metabolic
summary: 'Phase 1 CYP450 reactions require a defined set of nutrient cofactors

  to function: riboflavin (B2), niacin (B3), pyridoxine (B6), folate,

  vitamin B12, glutathione, branched-chain amino acids, flavonoids,

  and phospholipids. Deficiency in any of these slows Phase 1 throughput,

  allowing parent toxicants to accumulate. Conversely, Phase 1 activity

  is itself energy- and nutrient-consuming — sustained toxicant load

  raises functional requirements for these cofactors above standard

  RDA assumptions.

  '
