slug: nocturnal-hypoxia
display_name: Nocturnal Hypoxia
aliases:
- nighttime oxygen desaturation
- sleep-related hypoxia
category: other
summary: 'Drops in blood oxygen saturation during sleep, most often from

  obstructive sleep apnea but also seen with central apnea, altitude,

  underlying lung disease (smoking history, occupational silica or

  petroleum exposure, COPD), and cardiac causes. Repeated overnight

  desaturation events drive sympathetic surges, elevate cardiovascular

  risk, fragment restorative sleep architecture, and contribute to

  daytime fatigue, cognitive decline, and in vulnerable adults,

  accelerated dementia progression. Often missed because clients

  attribute fatigue to other causes.

  '
