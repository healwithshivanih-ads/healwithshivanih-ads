slug: intestinal-permeability
display_name: Intestinal Permeability (Leaky Gut Mechanism)
aliases:
- leaky gut
- gut barrier dysfunction
- intestinal hyperpermeability
category: gut
summary: Disruption of the intestinal epithelial lining allows undigested peptides
  (e.g., gliadin, casein) and antigens to translocate into the bloodstream. The immune
  system mounts IgE or IgG/IgA responses to these peptides, driving food allergy and
  sensitivity. Upstream causes include stress, dysbiosis, infection, inflammation,
  low stomach acid, medications (PPIs), nutritional deficiency, and toxic food antigens.
