category: immune
summary: Chronic gut dysbiosis and intestinal barrier compromise lead to ongoing antigen translocation into systemic circulation,
  perpetuating immune activation. Over time this results in immune cell exhaustion (low WBCs, low neutrophils), elevated inflammatory
  markers (high ESR, high globulin), and loss of immune tolerance — manifesting as allergies, autoimmune skin disease (psoriasis),
  and immune-mediated reproductive pathology (endometriosis).
