summary: A shift in the balance between pro-clotting factors (spike protein, homocysteine,
  high hsCRP, inflammatory cytokines) and anticoagulant mechanisms can predispose
  to thromboembolism, particularly in younger patients. Even microinjuries during
  exercise can initiate clot formation that blocks end arteries of the heart or brain.
