slug: tryptophan-kynurenine-shunt
display_name: Tryptophan-Kynurenine Shunt
aliases:
- kynurenine-pathway
- tryptophan-shunt
- ido-pathway
- tryptophan-oxygenase-induction
category: neurological
summary: Under chronic inflammation, elevated cortisol, or interferon stimulation,
  the enzyme indoleamine 2,3-dioxygenase (IDO) and tryptophan oxygenase shunt dietary
  tryptophan away from serotonin/melatonin synthesis into the kynurenine pathway.
  The resulting depletion of CNS serotonin underlies depression in chronic inflammation,
  autoimmune disease, and HPA-axis dysregulation. Niacin (30 mg) partially inhibits
  the shunt and improves tryptophan availability for serotonin.
