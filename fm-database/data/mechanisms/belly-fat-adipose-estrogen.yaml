category: endocrine
summary: 'Adipose tissue — particularly abdominal and breast fat — contains aromatase enzymes that convert androgens to estrone.
  Estrone is the predominant estrogen in postmenopause and is also elevated in obesity. This creates a secondary estrogen
  dominance loop: obesity drives estrogen, estrogen drives further fat storage and inflammation.'
