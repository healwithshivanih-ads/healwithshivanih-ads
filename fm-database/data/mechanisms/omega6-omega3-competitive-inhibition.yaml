slug: omega6-omega3-competitive-inhibition
display_name: Omega-6 / Omega-3 Competitive Enzyme Inhibition
aliases:
- desaturase competition
- elongase competition
- fatty acid pathway competition
category: metabolic
summary: Omega-6 and omega-3 fatty acids compete for the same desaturase and elongase
  enzymes in their metabolic conversion pathways. When omega-6 intake is high relative
  to omega-3, the enzymes preferentially convert omega-6 to arachidonic acid, tipping
  the body toward a pro-inflammatory state.
