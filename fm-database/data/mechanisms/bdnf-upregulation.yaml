category: neurological
summary: 'Brain-derived neurotrophic factor (BDNF) is a key protein supporting

  neuronal survival, growth, and the formation of new connections between

  neurons (neuroplasticity). Exercise — including a single acute bout —

  upregulates BDNF expression in the brain and periphery, supporting

  cognition, mood, and protection against neurodegenerative disease.

  Magnitude of BDNF increase is greater with higher-intensity exercise, but

  all movement raises BDNF to some degree.

  '
