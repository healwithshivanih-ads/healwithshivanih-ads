slug: histamine-metabolism
display_name: Histamine Metabolism
aliases:
  - histamine breakdown
  - DAO/HNMT degradation pathway
category: metabolic
summary: |
  Histamine is degraded by two main enzymes: Diamine Oxidase (DAO) in the
  gut lumen handles dietary and luminal histamine, while
  Histamine-N-methyltransferase (HNMT) operates intracellularly. Metabolic
  efficiency determines "histamine bucket" capacity. Cofactors include
  vitamin C, B6, and copper. NSAIDs, alcohol, and some antibiotics inhibit
  DAO.
