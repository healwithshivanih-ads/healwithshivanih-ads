category: metabolic
summary: 'Histamine is degraded through two distinct enzyme systems. Diamine Oxidase

  (DAO) operates extracellularly in the gut lumen and is the primary clearance

  route for dietary histamine. Histamine-N-methyltransferase (HNMT) operates

  intracellularly, clearing histamine within tissues including the CNS.

  Enzyme efficiency depends on cofactors — vitamin C, B6, and copper for DAO;

  SAMe for HNMT. NSAIDs, certain antibiotics, and alcohol inhibit DAO.

  Insufficient enzyme capacity creates the "histamine bucket" overflow that

  drives intolerance symptoms.

  '
