category: metabolic
summary: Diamine oxidase (DAO) degrades ingested histamine in the gut epithelium;
  HNMT handles intracellular histamine methylation. Reduced DAO activity allows dietary
  histamine to accumulate systemically, triggering pseudo-allergic reactions. Leftovers,
  fermented foods, and aged proteins are high-histamine triggers. Molybdenum supports
  sulfite/sulfur clearance adjacent to this pathway.
