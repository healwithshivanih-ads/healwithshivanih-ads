category: endocrine
summary: Aromatase enzyme converts androgens (androstenedione, testosterone) into
  estrogens (estrone, estradiol). Elevated aromatase activity — particularly in adipose
  tissue — increases estrogen production and can contribute to estrogen dominance.
  Can be modulated by dietary factors such as green tea (EGCG).
