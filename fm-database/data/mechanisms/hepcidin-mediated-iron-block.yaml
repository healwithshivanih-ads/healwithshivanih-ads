slug: hepcidin-mediated-iron-block
display_name: Hepcidin-Mediated Iron Absorption Block
aliases:
- hepcidin upregulation
- inflammation-driven iron block
category: immune
summary: During systemic inflammation, hepcidin is upregulated and blocks iron export from enterocytes and macrophages, reducing
  serum iron availability and causing functional iron deficiency even when ferritin appears normal. Alternate-day dosing of
  oral iron is used to bypass peak hepcidin response.
