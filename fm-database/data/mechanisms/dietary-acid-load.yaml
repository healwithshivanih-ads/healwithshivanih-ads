category: metabolic
summary: Certain foods — including refined grains, sugar, most legumes (except lentil, lima, soy), most nuts (except Brazil
  and almond), alcohol, tobacco, caffeine, and drugs — produce net acid metabolites when metabolized, increasing the body's
  acid load. A diet with excessive acid-forming foods relative to alkaline-forming ones is proposed to create an unfavorable
  internal environment.
