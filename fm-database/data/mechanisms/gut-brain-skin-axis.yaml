category: gut
summary: Emotional and dietary stressors alter intestinal microflora, increase intestinal
  permeability, and drive systemic inflammation that manifests in skin — including
  acne, eczema, psoriasis, and rosacea. As many as 40% of acne patients have hypochlorhydria,
  allowing bacterial migration from colon toward distal small intestine and SIBO.
  Probiotics and oral microflora restoration modulate systemic inflammation, oxidative
  stress, glycemic control, tissue lipid content, and mood — all of which feed acne
  pathogenesis. Validated framework explaining the overlap among depression, anxiety,
  and acne.
