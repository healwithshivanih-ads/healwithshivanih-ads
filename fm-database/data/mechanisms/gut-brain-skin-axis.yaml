  quote: As many as 40% of those with acne have hypochlorhydria; inadequate stomach
    acid can allow migration of bacteria from colon toward distal small intestine,
    and permits alteration of normal intestinal microflora. The ability of gut microflora
    and oral probiotics to influence systemic inflammation, oxidative stress, glycemic
    control, tissue lipid content, and even mood itself may have implications in acne.
    This "gut-brain-skin unifying theory" has recently been validated.
