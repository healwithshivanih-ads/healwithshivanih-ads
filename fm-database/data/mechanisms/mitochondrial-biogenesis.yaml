slug: mitochondrial-biogenesis
display_name: Mitochondrial Biogenesis
aliases:
- mitochondrial growth
- new mitochondria formation
- PGC-1-alpha activation
category: metabolic
summary: 'The process by which cells generate new mitochondria, expanding cellular

  energy capacity. Triggered by metabolic demand signals including exercise,

  cold exposure, caloric restriction, and certain nutrients. Mediated

  largely through PGC-1-alpha signaling. Occurs in muscle, brain, liver,

  kidney, and adipose tissue. Reduced biogenesis underlies fatigue,

  cognitive decline, and metabolic inflexibility.

  '
