evidence_tier: strong
sources:
- id: pizzorno-textbook-gi
  location: Therapeutic Considerations — Intestinal Microflora
  quote: Alterations in metabolic activity of bacteria are more important than alterations
    in number of bacteria. Early research is showing some response to fecal transplants,
    supporting the concept that microflora imbalance plays an important role in the
    underlying pathophysiology.
