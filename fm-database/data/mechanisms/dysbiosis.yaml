sources:
- id: pizzorno-textbook-gi
  location: Therapeutic Considerations — Intestinal Microflora
  quote: Alterations in metabolic activity of bacteria are more important than alterations in number of bacteria. Early research
    is showing some response to fecal transplants, supporting the concept that microflora imbalance plays an important role
    in the underlying pathophysiology.
- id: pizzorno-textbook-gi-2
  location: Chronic Candidiasis — General Considerations
  quote: Prolonged antibiotic use is the key factor in most cases—suppresses normal intestinal bacteria that control yeast,
    suppresses immunity, generates antibiotic-resistant microbes, may contribute to Crohn's disease.
