category: gut
summary: An imbalance of intestinal microbial populations — increased gram-positive
  anaerobic coccoid rods and Bacteroides vulgatus in IBD, or SIBO in IBS — disrupts
  fermentation patterns, mucosal immunity, and epithelial integrity. Antibiotic exposure,
  carrageenan, and dietary refined carbohydrates are key upstream drivers.
