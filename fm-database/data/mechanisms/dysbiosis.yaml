category: gut
summary: Imbalance in gut microbial ecology — reduction of commensal lactobacilli and bifidobacteria with overgrowth of pathogens
  (Candida, pathogenic bacteria, parasites) — driven by antibiotic use, high-sugar diet, immunosuppression, and stress. Dysbiosis
  impairs gut mucosal immunity, increases intestinal permeability, and drives systemic inflammatory and allergic responses.
