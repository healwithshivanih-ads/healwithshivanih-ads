category: endocrine
summary: Methylation is a Phase 2 conjugation pathway in which methyl groups are transferred
  to reactive intermediates and endogenous compounds (e.g., estrogens, catecholamines).
  This renders them less biologically active and more excretable. Impaired methylation
  can lead to accumulation of estrogen metabolites and other bioactive compounds.
  Requires methyl donors (B12, folate, SAMe) and functional COMT/MTHFR enzymes.
