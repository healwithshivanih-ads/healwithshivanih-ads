summary: Gut mucosal integrity determines iron absorption efficiency. Conditions like
  H. pylori, celiac disease, SIBO, and low stomach acid impair iron uptake. Vitamin
  C co-ingestion enhances non-haem iron absorption by keeping iron in the ferrous
  (Fe2+) state.
