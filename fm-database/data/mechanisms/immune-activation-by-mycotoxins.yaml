slug: immune-activation-by-mycotoxins
display_name: Immune Activation by Mycotoxins
aliases:
- mold immune response
- mycotoxin immune burden
category: immune
summary: Mycotoxins (e.g., aflatoxin, aspergillus-derived toxins) trigger immune activation
  ranging from mild allergic responses (itching, watery eyes, fatigue) to severe systemic
  reactions. Aflatoxin is carcinogenic. Molds in foods and environments add to the
  endogenous toxin burden processed by the liver.
