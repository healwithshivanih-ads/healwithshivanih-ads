sources:
- id: dirty-genes-lynch
  location: Chapter 8 — The Tryptophan Steal
  quote: The calmer you are and the less your body suffers from inflammation, the
    more of your tryptophan goes toward making serotonin. The more stressed out or
    inflamed you are, the more of your tryptophan goes toward making quinolinic acid,
    a substance that's bad for your brain.
