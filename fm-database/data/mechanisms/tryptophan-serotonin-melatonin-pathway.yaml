slug: tryptophan-serotonin-melatonin-pathway
display_name: Tryptophan → Serotonin → Melatonin Pathway
aliases:
- tryptophan steal
- melatonin synthesis
category: neurological
summary: Tryptophan from carbohydrate sources crosses the blood-brain barrier and
  is converted to serotonin by MAOA. Serotonin is further converted to melatonin,
  linking mood, sleep, and circadian regulation. Under chronic stress or inflammation,
  tryptophan is shunted toward quinolinic acid (a neurotoxin) instead of serotonin,
  depleting both serotonin and melatonin.
