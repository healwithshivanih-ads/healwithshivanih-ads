slug: low-stomach-acid-antigen-load
display_name: Low Stomach Acid → Increased Antigen Load
aliases:
- hypochlorhydria
- PPI-induced food sensitivity
- acid-blocking drug effect
category: gut
summary: Adequate stomach acid is required to denature proteins into small peptides for further digestion. When stomach acid
  is low (hypochlorhydria) — including due to long-term PPI use — intact protein chains pass into the small intestine undigested.
  If intestinal permeability co-exists, these large peptides are absorbed into the bloodstream and trigger immune reactions
  (IgE or IgG/IgA), increasing food sensitivity.
