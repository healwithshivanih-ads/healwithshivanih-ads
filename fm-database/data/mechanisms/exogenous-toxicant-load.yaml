slug: exogenous-toxicant-load
display_name: Exogenous Toxicant Load (Exotoxins)
aliases:
- external toxin burden
- environmental toxicant load
- exotoxin burden
category: other
summary: 'Exotoxins are toxicants entering the body from outside sources:

  prescription and recreational drugs, agricultural chemicals (pesticides,

  herbicides, fungicides), food additives and preservatives, household

  products, environmental pollutants and contaminants, and microbial

  toxins (mycotoxins, bacterial exotoxins from food). All converge on

  the same hepatic Phase 1 / Phase 2 / Phase 3 pathways as endogenous

  toxins, contributing to total system load. The exposure mapping

  framework in FM coaching centers on identifying and reducing avoidable

  exotoxin sources.

  '
