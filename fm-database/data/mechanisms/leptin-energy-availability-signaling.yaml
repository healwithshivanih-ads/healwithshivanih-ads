slug: leptin-energy-availability-signaling
display_name: Leptin and Energy Availability Signalling (GnRH Suppression)
aliases:
- energy availability signaling
- leptin GnRH axis
- low energy availability
category: endocrine
summary: Leptin (secreted by adipocytes in proportion to fat mass) and other energy-availability
  signals (insulin, ghrelin, free T3) report whole-body energy status to the hypothalamus.
  When energy intake is chronically below expenditure — whether from undereating,
  overtraining, illness, or psychological stress — leptin falls below a critical threshold
  and the hypothalamic GnRH pulse generator slows or stops. Reduced GnRH pulsatility
  lowers pituitary LH and FSH, which in turn fails to drive ovarian estrogen production
  and ovulation. The result is hypothalamic suppression or amenorrhea — an adaptive
  shutdown of reproduction during perceived famine or threat. Recovery requires restoring
  energy availability (more food, less exercise, reduced stress) for long enough that
  leptin and metabolic signals normalise; the hypothalamus then resumes GnRH pulsing
  and ovulation can return.
