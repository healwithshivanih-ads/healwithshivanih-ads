notes_for_coach: 'The ''energy availability'' framing is more useful in coaching than
  ''body fat percentage'' — even lean athletes can recover periods at low weights
  if energy intake matches expenditure. Practical rule of thumb: many active women
  need >2500 kcal/day to restore cycles, and recovery lag is typically 3-6 months.'
