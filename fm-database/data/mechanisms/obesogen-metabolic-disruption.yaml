summary: 'Certain endocrine-disrupting chemicals — termed "obesogens" — alter

  adipocyte biology, beta-cell function, and insulin signaling, promoting

  increased fat mass, reduced lean mass, and predisposing to type 2

  diabetes. Common obesogens include BPA, phthalates, certain pesticides,

  PFAS, and air pollutants. Provides a toxicant root-cause framing for

  unexplained body-composition changes resistant to diet and exercise.

  '
