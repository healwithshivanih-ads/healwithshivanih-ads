category: metabolic
summary: Activated charcoal is produced by pyrolysis of organic materials (wood, coconut
  shell, peat, coal) followed by steam/heat activation that creates millions of microscopic
  pores and tunnels. Medicinal AC has a surface area of 950-2000 m²/g. Unlike absorption
  (substance taken into a material), adsorption is surface-based — toxin molecules
  adhere to the internal and external pore surfaces via van der Waals forces. AC most
  effectively adsorbs toxins in their nonionized, nonpolar, poorly water-soluble forms.
  AC adsorbs only in the dissolved liquid phase via direct contact. Substances NOT
  effectively bound — metals (iron, lithium, lead, mercury), electrolytes (sodium,
  potassium, magnesium), alcohols (ethanol, methanol, ethylene glycol), strong acids/alkalis,
  hydrocarbons (gasoline, kerosene, paint thinner).
