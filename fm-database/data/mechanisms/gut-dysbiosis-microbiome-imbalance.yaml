summary: Dysbiosis encompasses deficiency of beneficial bacteria (Lactobacillus, Bifidobacterium
  phyla), overgrowth of normal or pathogenic bacteria, fungal overgrowth, and parasitic
  infection. Each pattern requires a customized protocol — probiotic supplementation
  is contraindicated in overgrowth states and in SIBO.
