slug: histamine-receptor-signaling
display_name: Histamine Receptor Signaling (H1–H4)
aliases:
  - H1 H2 H3 H4 receptors
  - histamine signal transduction
category: signaling
summary: |
  Signal transduction through four receptor subtypes. H1 mediates classic
  allergy symptoms (itch, vasodilation, bronchoconstriction). H2 governs
  gastric acid secretion and cardiac effects. H3 in the CNS modulates
  neurotransmitters (dopamine, acetylcholine), influencing arousal,
  attention, appetite — and "brain fog." H4 bridges immune-neural crosstalk
  and governs chemotaxis.
