category: signaling
summary: 'Histamine signals through four receptor subtypes. H1 receptors mediate

  classic allergic vasodilation, smooth muscle contraction, and itch.

  H2 receptors govern gastric acid secretion and cardiac effects. H3 receptors

  in the CNS modulate neurotransmitter release (dopamine, acetylcholine,

  norepinephrine) — relevant to brain fog, arousal, and appetite. H4 receptors

  bridge immune-neural crosstalk, governing chemotaxis of immune cells.

  Receptor-specific blockade explains why H1/H2 antihistamines help skin and

  gut symptoms but leave neurological symptoms untouched.

  '
