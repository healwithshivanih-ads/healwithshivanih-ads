category: immune
summary: Fibrinogen is an acute-phase protein and clotting factor. When elevated (>350
  mg/dL), it signals a pro-thrombotic state. High fibrinogen can result from chronic
  inflammation and increases the risk of clot formation and cardiovascular events,
  even in otherwise healthy individuals.
