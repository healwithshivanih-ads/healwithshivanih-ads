category: gut
summary: 'The gut microbiome both produces and degrades histamine. Histamine-producing

  species include Lactobacillus reuteri, L. casei, and L. bulgaricus.

  Histamine-degrading species include Lactobacillus plantarum, Bifidobacterium

  longum, and B. infantis. In dysbiosis, the gut becomes an endogenous

  histamine factory — dietary restriction alone cannot resolve symptoms

  while microbial production continues. Probiotic selection is therefore

  critical in sensitive patients; multi-strain blends containing L. reuteri

  or L. casei may worsen symptoms.

  '
