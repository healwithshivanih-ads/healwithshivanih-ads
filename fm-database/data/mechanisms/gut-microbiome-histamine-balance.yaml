category: gut
summary: |
  The interplay between histamine-producing bacteria (L. reuteri, L. casei,
  L. bulgaricus) and histamine-degrading species (L. plantarum, B. longum,
  B. infantis). Dysbiosis can turn the gut into an endogenous histamine
  factory, making diet-only approaches ineffective when the microbiome
  continues to generate mediators.
