slug: osteocalcin-activation
display_name: Osteocalcin Activation by Vitamin K2
aliases:
- vitamin K2 bone mineralisation
- osteocalcin carboxylation
category: endocrine
summary: Vitamin K2 activates osteocalcin, a protein that binds and deposits calcium into bone and dental matrix. Without
  adequate K2, osteocalcin remains undercarboxylated and cannot effectively mineralise bone, leading to poor bone density
  despite adequate calcium intake.
upstream_drivers:
- vitamin-k2-status
- vitamin-d-hydroxylation
downstream_effects:
- bone-mineralisation
- improved-bone-density
