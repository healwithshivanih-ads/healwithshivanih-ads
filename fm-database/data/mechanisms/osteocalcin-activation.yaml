- vitamin-d3-k2-synergy
evidence_tier: strong
sources:
- id: coconote-fm-vitamin-d3-k2
  location: Vitamin K2 Functions
  quote: Vitamin K2 is responsible for activating osteocalcin. What does osteocalcin do is it accumulates the calcium inside
    the bones and the teeth thus play an important role in the mineralization of the bones and teeth.
