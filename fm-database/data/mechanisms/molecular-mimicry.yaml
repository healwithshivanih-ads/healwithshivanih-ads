  quote: Dairy proteins mimic human tissue = molecular mimicry.
- id: vitaone-thyroid-ebook
  location: 'Chapter 6: Causes of Thyroid Disorders'
  quote: Molecular mimicry is when the immune system mistakes the body's own tissues
    for foreign invaders due to structural similarity, leading to autoimmune attack.
    The immune system confuses foreign particles (like viruses, gluten) with thyroid
    tissue.
- id: coconote-fm-intestinal-permeability
  location: Cross Reactivity and Molecular Mimicry
  quote: in a simple tongue it's called molecular mimicry and that's why the immune
    system target your joint and there is a there is an inflammation in the joint.
- id: coconote-fm-intestinal-permeability-anish
  location: Pathophysiology of Autoimmunity
  quote: Your B cell is actually creating antibody for that antigen but because antigen
    that is entering in the body, maybe it's a casein protein, maybe it's a wheat
    protein, they have a similar amino acid sequence that is in your cartilage… and
    that is called cross reactivity. So your B cell is actually creating antibody
    for gluten, but by mistake, targeting your cartilage because the amino acid sequence
    is matching — so in a simple term it's called molecular mimicry.
