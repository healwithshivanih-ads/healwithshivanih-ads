category: immune
summary: Foreign antigens (e.g., gluten peptides, casein, LPS) that share amino acid
  sequence homology with host tissues cause B cells to produce antibodies that mistakenly
  target self-tissues. This mechanism underlies autoimmune destruction of joints,
  thyroid, and gut lining in genetically predisposed individuals with increased intestinal
  permeability.
