slug: sympathetic-suppression-of-gastric-acid
display_name: Sympathetic Nervous System Suppression of Gastric Acid
aliases:
- stress-induced hypochlorhydria
- SNS gastric acid inhibition
category: neurological
summary: Activation of the sympathetic nervous system — as occurs during chronic psychological
  or physiological stress — inhibits gastric acid secretion. Conversely, parasympathetic
  dominance (rest-and-digest state) promotes HCl production. Restoring parasympathetic
  tone through stress management and mindfulness practices supports gastric acid normalisation.
