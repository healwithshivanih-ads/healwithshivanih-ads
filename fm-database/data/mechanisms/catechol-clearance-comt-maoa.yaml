notes_for_coach: Clinically important because a client with slow COMT/MAOA (neurotransmitter
  build-up) put on an SSRI may get MORE anxious/irritable. If mood worsens after an
  SSRI or methyl-donor is started, that is a heads-up to route the client back to
  their prescriber — never adjust medication yourself.
