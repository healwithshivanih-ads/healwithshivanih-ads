slug: catechol-clearance-comt-maoa
display_name: Catecholamine Clearance (COMT / MAOA Slow vs Fast)
aliases:
- COMT MAOA metabolism
- neurotransmitter breakdown rate
- dopamine serotonin clearance
category: neurological
summary: COMT and MAOA variants set how fast a person breaks down catecholamines and
  other neurotransmitters. 'Slow' genotypes (e.g. MAOA TT + COMT AA) cause a build-up
  — higher dopamine/serotonin — while 'fast' genotypes burn through them, leaving
  lower levels. Because anxiety, low mood and insomnia can present from EITHER high
  or low neurotransmitters, the same symptom picture can be driven by opposite biochemistry.
  COMT is the 'Swiss-army-knife' gene, also touching oestrogen clearance and methylation.
upstream_drivers:
