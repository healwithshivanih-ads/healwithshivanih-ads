category: neurological
summary: COMT methylates catecholamines (dopamine, epinephrine, norepinephrine) and
  catechol-estrogens using SAMe. MAOA oxidatively deaminates serotonin, dopamine,
  and norepinephrine. Slow variants accumulate neurotransmitters; fast variants deplete
  them rapidly. High dietary protein elevates amino acid precursors (tyrosine, tryptophan),
  increasing load on these enzymes.
