slug: resistant-starch-fermentation
display_name: Resistant Starch Fermentation
aliases:
- RS fermentation
- colonic starch fermentation
- second-meal effect
category: gut
summary: Resistant starch escapes small-intestinal hydrolysis, reaches the colon intact,
  and is fermented by anaerobic microbiota to short-chain fatty acids (butyrate).
  This lowers post-prandial glucose and insulin excursion and improves glycaemic control
  at the subsequent meal (the 'second-meal effect').
