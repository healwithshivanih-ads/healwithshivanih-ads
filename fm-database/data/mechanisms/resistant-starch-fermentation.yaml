sources:
- id: vitaone-blood-sugar-ebook
  location: Section 1.5 — Resistant Starch
  quote: 'RS resists hydrolysis by human α-amylase, passes intact to the colon, &
    is fermented by anaerobic microbiota to short-chain fatty acids such as butyrate.
    Functionally, RS behaves like soluble fibre: it lowers the post-prandial glucose
    & insulin excursion & improves glycaemic control at the subsequent meal (the second-meal
    effect).'
