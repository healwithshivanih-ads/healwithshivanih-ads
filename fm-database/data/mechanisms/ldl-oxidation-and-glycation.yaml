category: metabolic
summary: Once small-dense LDL particles infiltrate the vessel wall, they undergo oxidation (from reactive oxygen species)
  and glycation (from high blood glucose). This chemically modifies the LDL, making it unrecognizable to normal receptors
  and triggering macrophage engulfment and foam cell formation.
