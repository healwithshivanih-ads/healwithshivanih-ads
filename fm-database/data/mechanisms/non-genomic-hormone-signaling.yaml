category: endocrine
summary: Discovered approximately 10 years ago, all hormones can also signal directly
  through cell membranes in a rapid, non-nuclear pathway. Hormones traverse the trilipid
  cell membrane exactly seven times, triggering downstream effects. This pathway requires
  healthy, fluid cell membranes (dependent on adequate omega-3:omega-6 balance and
  avoidance of trans fats and ultra-processed foods).
