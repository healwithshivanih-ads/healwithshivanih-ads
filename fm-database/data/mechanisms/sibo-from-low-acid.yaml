slug: sibo-from-low-acid
display_name: SIBO Secondary to Hypochlorhydria
aliases:
- bacterial overgrowth from low stomach acid
- gastric acid antimicrobial failure
category: gut
summary: The low pH environment of normal gastric acid (pH 1–2) creates a bacteriostatic
  barrier that prevents ingested and ascending microorganisms from colonising the
  stomach and proximal small intestine. When HCl is chronically insufficient, this
  barrier is lost, predisposing to small intestinal bacterial overgrowth (SIBO) and
  opportunistic infections.
