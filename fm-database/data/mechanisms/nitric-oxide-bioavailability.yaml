category: signaling
summary: Endothelial nitric oxide synthase (NOS3) converts arginine to nitric oxide
  (NO), which relaxes vascular smooth muscle, supports memory, and has antimicrobial
  properties. When uncoupled — due to oxidative stress, BH4 depletion, or high homocysteine
  — NOS3 produces superoxide instead of NO, driving cardiovascular damage. Exercise
  and sauna physiologically stimulate NOS3 function.
