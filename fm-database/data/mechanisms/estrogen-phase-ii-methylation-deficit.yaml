slug: estrogen-phase-ii-methylation-deficit
display_name: Impaired Phase II Estrogen Methylation (COMT/Glucuronidation)
aliases:
- poor estrogen methylation
- COMT dysfunction
- impaired glucuronidation
- phase II liver detox deficit
category: metabolic
summary: The COMT enzyme and glucuronidation pathway in the liver methylate and conjugate
  estrogen metabolites for excretion. Deficits in B6, B12, folate, magnesium, or MTHFR
  variants impair this process, increasing reactive 4-OH estrogens and circulating
  estrogen load.
