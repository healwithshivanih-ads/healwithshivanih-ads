slug: catechol-methylation
display_name: Catecholamine & Catechol Estrogen Methylation (COMT)
aliases:
- COMT pathway
- dopamine clearance
- catechol-O-methylation
- estrogen catechol methylation
category: metabolic
summary: COMT methylates and inactivates catecholamines (dopamine, norepinephrine,
  epinephrine), catechol estrogens, and dietary catechols. Slow variants prolong neurotransmitter
  and estrogen exposure; fast variants deplete them. The reaction consumes SAMe, creating
  a direct link between methylation capacity and neurotransmitter regulation.
