category: immune
summary: Approximately 80% of the body's immune system resides at the intestinal border
  as gut-associated lymphoid tissue (GALT), including macrophages, dendritic cells,
  T cells, B cells, and plasma cells. When the mucosal barrier is breached, GALT mounts
  an immune response that can become dysregulated, driving systemic inflammation and
  autoimmunity.
