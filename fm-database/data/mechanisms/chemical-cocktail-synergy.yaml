summary: 'Multiple toxicants present simultaneously at individually sub-threshold

  doses can produce amplified or synergistic biological effects greater

  than the sum of their parts. Explains why regulatory single-chemical

  safety thresholds may underestimate real-world risk, since humans are

  exposed to thousands of chemicals concurrently via food, water, air,

  personal care, and household products.

