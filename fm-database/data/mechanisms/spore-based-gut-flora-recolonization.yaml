summary: Spore-based probiotics (e.g., Bacillus species) are more resistant to stomach acid and can survive to colonize the
  gut lining over 6–9 months, unlike standard lactobacillus/bifidobacterium probiotics which have only transient effects.
  Spores can lie dormant and reactivate in favorable gut conditions, promoting lasting changes to gut flora.
