slug: monoamine-oxidase-activity
display_name: Monoamine Oxidase A (MAOA) Activity
aliases:
- MAO-A pathway
- serotonin catabolism
- dopamine degradation MAOA
category: neurological
summary: MAOA oxidatively deaminates serotonin, dopamine, and norepinephrine in the
  presynaptic neuron and in the liver, governing the available pool of these mood-regulating
  amines. Slow MAOA accumulates monoamines (irritability, insomnia, headache susceptibility
  with tyramine-rich foods); fast MAOA depletes them rapidly (depression, low motivation,
  carbohydrate-driven serotonin-seeking).
upstream_drivers:
- MAOA promoter VNTR genotype (3R/4R)
- tyramine-rich food intake
- stress-driven monoamine turnover
- sleep deprivation
