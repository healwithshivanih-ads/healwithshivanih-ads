slug: cardiac-sphincter-weakness
display_name: Cardiac Sphincter (LOS) Weakness
aliases:
- lower oesophageal sphincter weakness
- LOS dysfunction
- reflux mechanism
category: structural
summary: The cardiac sphincter (lower oesophageal sphincter) is a double-layer valve
  preventing stomach acid from entering the oesophagus. Habitual large evening meals
  combined with recumbency are proposed to weaken it over time via gravitational pressure.
  Drinking large volumes of fluid with meals and chronic stress are secondary contributors.
