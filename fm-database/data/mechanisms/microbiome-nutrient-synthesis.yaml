summary: 'Gut microorganisms drive the synthesis of key endogenous compounds: B vitamins,
  glutathione (described as the most potent antioxidant, not obtainable directly from
  food), and melatonin (described as the ''fixinrejuvenate nighttime hormone''). Disruption
  of gut flora therefore impairs these downstream nutrient and antioxidant pathways.'
