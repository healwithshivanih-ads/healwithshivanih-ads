slug: methylation-defect-homocysteine
display_name: Methylation Defect / Hyperhomocysteinemia
aliases:
- one-carbon metabolism defect
- folate cycle dysfunction
- MTHFR-related hyperhomocysteinemia
category: metabolic
summary: Impaired methylation cycle — due to nutritional deficiencies (folate, B6,
  B12) or genetic variants — results in accumulation of homocysteine. Elevated homocysteine
  causes endothelial damage, promotes thrombosis, and is an independent cardiovascular
  risk factor.
