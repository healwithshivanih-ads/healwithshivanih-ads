slug: beta-glucuronidase-reabsorption
display_name: Beta-Glucuronidase–Mediated Estrogen Reabsorption
aliases:
- estrobolome dysfunction
- gut estrogen recycling
- beta-glucuronidase activity
category: gut
summary: Beta-glucuronidase, produced by pathogenic gut bacteria in dysbiosis or SIBO,
  deconjugates excreted estrogen metabolites in the intestine, allowing them to be
  reabsorbed into circulation. This bypasses normal liver detoxification and excretion,
  leading to elevated circulating estrogen and estrogen dominance.
