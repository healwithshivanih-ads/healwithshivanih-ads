summary: Vitamin K2 directs calcium into bone and away from arteries, kidneys, and cartilage. Calcium, phosphorus, vitamin
  D, magnesium, boron, and K2 act synergistically as a bone team. Excess phosphorus from processed foods, vitamin K deficiency,
  and imbalanced supplementation disrupt this system.
