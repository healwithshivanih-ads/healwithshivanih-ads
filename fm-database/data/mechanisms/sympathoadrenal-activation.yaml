slug: sympathoadrenal-activation
display_name: Sympathoadrenal Activation (Fight-or-Flight)
aliases:
- fight-or-flight response
- adrenaline surge
- sympathetic nervous system activation
- noradrenaline release
category: neurological
summary: Stress activates the sympathetic nervous system and adrenal medulla, releasing
  adrenaline and noradrenaline. This causes immediate increases in heart rate, blood
  pressure, blood glucose, and muscle tension while simultaneously reducing digestive
  enzyme secretion and blood flow to digestive organs. Chronic activation sustains
  these effects, increasing cardiovascular and metabolic disease risk.
