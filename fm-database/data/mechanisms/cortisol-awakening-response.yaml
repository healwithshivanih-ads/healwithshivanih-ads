notes_for_coach: Best assessed via 4-point salivary cortisol or DUTCH (sample at waking
  + 30 min). Blunted CAR is a permission slip for the coach to focus on rebuilding
  rhythm, not pushing more discipline. Coaching levers protein-rich breakfast within
  60 min of waking, morning sunlight (10-30 min within first hour), gentle movement,
  vitamin C, adaptogenic support (rhodiola, ashwagandha), boundaries on evening light
  and stress. Recovery takes 8-16 weeks of consistency.
