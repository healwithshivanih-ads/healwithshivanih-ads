category: endocrine
summary: A healthy 50-75% rise in cortisol within 30 minutes of waking, driven by
  the suprachiasmatic nucleus signalling the adrenal cortex through the HPA axis.
  This pulse mobilises glucose, raises blood pressure, and 'turns on' alertness,
  cognition, and immune surveillance for the day. A blunted or absent CAR is now
  considered a more sensitive marker of HPA dysfunction than total cortisol output
  — flat CAR is consistently observed in chronic fatigue, burnout, depression,
  PTSD, fibromyalgia, and long COVID. An exaggerated CAR (> 100% rise) often signals
  acute / unresolved stress.
upstream_drivers:
- intact HPA axis signalling
- circadian alignment (well-timed sleep + light exposure)
- adequate prior-night sleep
- stable blood sugar overnight
- intact suprachiasmatic nucleus signalling
- healthy adrenal cortex reserve
- vitamin C and B5 sufficiency
- low evening cortisol burden
- absence of inflammatory load
downstream_effects:
- mobilises hepatic glucose for morning energy
- raises blood pressure to standing tolerance
- activates daytime alertness and cognition
- primes immune surveillance
- triggers protein catabolism for the day
- modulates the 24-hour circadian cortisol curve
- when blunted = morning fatigue, brain fog, slow start, low blood pressure on standing,
  poor stress resilience
- when exaggerated = morning anxiety, racing thoughts, irritability, BP spike
- when reversed (low at waking, high at night) = HPA dysregulation / stage-3 adrenal
  exhaustion
