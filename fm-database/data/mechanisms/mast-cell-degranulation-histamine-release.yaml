slug: mast-cell-degranulation-histamine-release
display_name: Mast Cell Degranulation & Histamine Release
aliases:
- IgE mast cell activation
- histamine release mechanism
category: immune
summary: 'Allergens bind to IgE antibodies which are pre-bound to mast cells. Cross-linking
  triggers mast cell degranulation, releasing histamine and other inflammatory mediators.
  This produces the acute symptoms of type 1 hypersensitivity: hives, itching, rhinorrhea,
  bronchospasm, and in severe cases anaphylaxis.'
