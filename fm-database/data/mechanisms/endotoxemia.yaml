slug: endotoxemia
display_name: Endotoxemia (LPS-Driven Systemic Inflammation)
aliases:
- lipopolysaccharide endotoxemia
- LPS translocation
- metabolic endotoxemia
category: immune
summary: When fecal microbes colonize the small intestine (SIBO), their rapid turnover
  releases lipopolysaccharide (LPS) endotoxin from cell walls into the bloodstream.
  This systemic endotoxemia drives inflammation across multiple organ systems, contributing
  to brain conditions (depression, anxiety, Parkinson's, Alzheimer's), cardiovascular
  disease, metabolic disorders, skin conditions, and reproductive diseases like endometriosis.
