  location: SIBO and endotoxemia mechanism discussion
  quote: Those microbes die. And when they die, especially those fecal microbes, they
    shed their components, especially components of their cell walls, like something
    called lipopolysaccharide endotoxin. That enters the bloodstream. That's called
    endotoxemia.
