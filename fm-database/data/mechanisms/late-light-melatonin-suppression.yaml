notes_for_coach: Single highest-leverage coaching intervention for sleep complaints.
  Hard rules digital sunset 90 minutes before bed, blue-blocker glasses if screens
  are unavoidable, dim warm lighting (red / amber bulbs) post-sunset, blackout sleep
  environment. Pair with morning bright-light exposure within 30 min of waking to
  solidify the contrast. Most clients see measurable HRV / sleep score improvement
  within 1-2 weeks.
