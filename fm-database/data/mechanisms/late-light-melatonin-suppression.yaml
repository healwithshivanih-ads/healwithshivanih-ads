- artificial light at night
- alan exposure
- pre-bed screen exposure
- bright-light melatonin disruption
category: neurological
summary: Exposure to bright artificial light — especially the blue-wavelength light
  emitted by phones, tablets, laptops, LED lights, and TVs — within the 2-3 hours
  before bed activates melanopsin retinal ganglion cells, which signal the suprachiasmatic
  nucleus that 'it's still daytime'. This delays the onset and reduces the amplitude
  of the natural melatonin rise, shifting circadian phase later, fragmenting sleep,
  and degrading sleep architecture. Even moderate ambient light can suppress melatonin
  by 50-90% in sensitive individuals. The single most reversible cause of insomnia
  / poor sleep quality in modern clients.
upstream_drivers:
- evening screen use (phone, tablet, laptop, TV)
- bright LED household lighting after sunset
- blue-light-rich indoor lighting
- shift work
- evening alcohol use (worsens secondary disruption)
- stress driving compulsive scrolling
- chronic late-night work / studying
- urban light pollution at the bedroom window
- inadequate morning sunlight (lowers contrast that solidifies rhythm)
- caffeine after midday
- skipping outdoor daylight exposure during the day
downstream_effects:
- delayed melatonin onset
- reduced peak melatonin amplitude
- delayed sleep phase / harder to fall asleep
- shorter / fragmented sleep
- reduced REM and slow-wave sleep
- next-morning grogginess / cortisol awakening response blunted
- circadian misalignment of cortisol, growth hormone, leptin
- HPA dysregulation
- weight gain / insulin resistance over time
- mood disturbance / depressive symptoms
- impaired immune function
- accelerated ageing
- increased breast / prostate cancer risk (long-term ALAN)
