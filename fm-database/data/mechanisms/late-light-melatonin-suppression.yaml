slug: late-light-melatonin-suppression
display_name: Late-Evening Light Suppression of Melatonin
aliases:
- melatonin suppression
- light-induced circadian disruption
- screen-induced melatonin loss
- blue light melatonin suppression
- evening light circadian shift
