category: immune
summary: Certain probiotic species (L. reuteri, L. gasseri, Bacillus subtilis) produce bacteriocins—natural antibiotics that
  selectively inhibit and kill fecal pathogens like E. coli, Klebsiella, and Pseudomonas in the small intestine. This is the
  proposed mechanism by which SIBO yogurt reduces fecal microbial overgrowth. Initial die-off may cause transient diarrhea
  from LPS release.
