slug: amyloid-as-innate-immune-response
display_name: Amyloid Beta as Innate-Immune Sequesterant
aliases:
- amyloid antimicrobial peptide
- amyloid as antimicrobial
category: immune
summary: Reframing of amyloid beta plaques from "the cause of Alzheimer's" to a beautiful
  innate-immune response. Amyloid is an antimicrobial peptide (first shown by Robert
  Moir and Rudy Tanzi at Harvard) with antiviral, antibacterial, and antifungal activity
  that physically sequesters pathogens. It is also stored as innate-immune memory
  in bone marrow, tissue macrophages, and endothelial cells. The therapeutic implication
  is that anti-amyloid drugs that simply clear the peptide without addressing what
  triggered it (chronic infection, mycotoxins, inflammation, insulin resistance, ACEs)
  leave the underlying network insufficiency intact — explaining why monoclonal antibody
  trials such as lecanemab show faster brain atrophy than the untreated controls.
  The functional approach instead removes the upstream insults (pathogens, toxins,
  inflammatory diet) so amyloid is no longer recruited.
