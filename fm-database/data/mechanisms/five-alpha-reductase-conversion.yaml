category: endocrine
summary: 5-alpha reductase converts testosterone to dihydrotestosterone (DHT), a more
  potent androgen. Excess activity reduces available testosterone and drives DHT-mediated
  effects including prostate growth, androgenic hair loss, and androgenic acne.
upstream_drivers:
- high testosterone substrate
- genetic predisposition
- insulin resistance
downstream_effects:
- dht-excess
