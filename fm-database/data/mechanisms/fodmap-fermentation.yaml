- fermentable-carbohydrate-intolerance
category: gut
summary: 'Short-chain fermentable carbohydrates (FODMAPs: fructans, galactans, lactose,
  fructose, polyols) are osmotically active and rapidly fermented by intestinal bacteria,
  yielding hydrogen and CO2 gases. This drives bloating, abdominal pain, and altered
  bowel habit in IBS; three of four IBS patients respond well to FODMAP restriction.'
