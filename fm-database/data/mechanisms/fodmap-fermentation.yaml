  quote: 'Dietary FODMAPs: short-chain carbohydrates that are osmotically active and
    fermentable by intestinal bacteria yielding gases—hydrogen or carbon dioxide—causing
    abdominal bloating. Three of four IBS patients respond well to restriction of
    FODMAP intake.'
