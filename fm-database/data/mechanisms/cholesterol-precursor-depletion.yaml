category: endocrine
summary: When statin therapy reduces circulating and cellular cholesterol, downstream
  biosynthesis of steroid hormones (cortisol, sex hormones) and fat-soluble vitamins
  (e.g., vitamin D) may be impaired, potentially contributing to hormonal, neurological,
  and immune side effects.
