category: metabolic
summary: Homocysteine generated during SAMe-dependent methylation reactions must be
  remethylated back to methionine by MTHFR-derived 5-MTHF and methyl-B12, or transsulfurated
  to cysteine (and eventually glutathione). Elevated homocysteine is a marker of impaired
  methylation and an independent cardiovascular risk factor.
