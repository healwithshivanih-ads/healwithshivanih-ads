slug: homocysteine-remethylation
display_name: Homocysteine Remethylation
aliases:
- methionine synthesis
- homocysteine-to-methionine conversion
category: metabolic
summary: 5-MTHF donates a methyl group to cobalamin (B12), which then remethylates homocysteine to methionine via methionine
  synthase. Both adequate active folate and functional B12 are required. MTHFR variants reduce 5-MTHF supply, slowing this
  reaction and raising homocysteine.
