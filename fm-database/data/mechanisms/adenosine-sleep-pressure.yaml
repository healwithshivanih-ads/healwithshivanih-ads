slug: adenosine-sleep-pressure
display_name: Adenosine Sleep-Pressure Build-Up
aliases:
- sleep drive
- sleep hunger
- adenosine accumulation
category: neurological
summary: Adenosine is a small molecule that accumulates in the brain the longer one
  is awake, generating "sleep pressure" or "sleep hunger" — a homeostatic drive to
  sleep that operates independently of circadian timing. Coffee and other caffeinated
  drinks block adenosine receptors, masking sleep pressure temporarily; once caffeine
  clears (half-life ~5 hours, but with tremendous individual variability), adenosine
  binding resumes and tiredness can rebound. Sleep pressure is one of two systems
  that govern sleep onset and depth; the other is the circadian clock (SCN-driven
  cortisol/melatonin rhythm). Both must align for restorative sleep — light entrainment
  in the morning resets the circadian limb, while keeping caffeine to the first half
  of the day preserves the adenosine limb.
