slug: endogenous-toxin-load
display_name: Endogenous Toxin Load (Endotoxins)
aliases:
- internal toxin burden
- metabolic endotoxin load
- LPS endotoxin burden
category: metabolic
summary: 'Endotoxins are toxic substances generated internally — including end

  products of normal metabolism (ammonia, reactive aldehydes, oxidized

  lipids, hormone metabolites) and bacterial endotoxins (lipopolysaccharide

  from gram-negative gut bacteria, especially relevant in dysbiosis and

  intestinal hyperpermeability). The liver biotransforms endogenous and

  exogenous toxins through the same Phase 1 / Phase 2 pathways — so

  endotoxin load competes with exotoxin clearance for finite enzymatic

  capacity. Frequently overlooked in detox conversations that focus

  only on environmental exposures.

  '
