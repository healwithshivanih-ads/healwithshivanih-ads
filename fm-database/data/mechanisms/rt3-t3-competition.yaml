slug: rt3-t3-competition
display_name: Reverse T3 / T3 Competition for Cellular Binding Sites
aliases:
- RT3 dominance
- reverse T3 block
- RT3/T3 receptor competition
category: endocrine
summary: Reverse T3 (RT3) and active T3 compete for the same nuclear/mitochondrial
  receptor binding sites within cells. Elevated RT3 can block T3 action even when
  circulating T3 is adequate, producing cellular hypothyroid effects without abnormal
  TSH.
