slug: zinc-hcl-production-link
display_name: Zinc-Dependent Hydrochloric Acid Production
aliases:
- zinc gastric acid synthesis
- zinc HCl link
category: gut
summary: Zinc is required for the production of hydrochloric acid in the stomach.
  Deficiency can reduce gastric acid output, impairing downstream absorption of other
  minerals such as iron, potentially causing or perpetuating secondary nutritional
  deficiencies.
upstream_drivers:
- zinc-deficiency
downstream_effects:
- iron-malabsorption
- non-responsive-anemia
- cascading-nutritional-deficiencies
