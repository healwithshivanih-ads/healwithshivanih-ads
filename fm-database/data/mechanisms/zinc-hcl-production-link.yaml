linked_to_topics:
- zinc-deficiency
evidence_tier: plausible_emerging
sources:
- id: coconote-fm-zinc-deficiency
  location: Functions of Zinc
  quote: Zinc happens to be the baseline for developing a lot of other nutritional
    deficiencies over a period of time because of a primary concern that if it is
    absent, it could produce less amount of hydrochloric acid.
