category: immune
summary: 'Shortened or fragmented sleep elevates pro-inflammatory cytokines

  (IL-6, TNF-alpha, CRP) and shifts the inflammatory tone toward a

  chronic low-grade activated state. This connects sleep loss

  mechanistically to cardiovascular disease, depression (the cytokine

  hypothesis of depression), metabolic dysfunction, and accelerated

  aging. Effects are detectable after even a single night of

  partial sleep deprivation.

  '
