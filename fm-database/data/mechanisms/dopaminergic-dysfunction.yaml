slug: dopaminergic-dysfunction
display_name: Prefrontal Dopaminergic Dysfunction
aliases:
- dopamine deficit ADHD
- D4 receptor hyposensitivity
category: neurological
summary: ADHD arises from diminished dopaminergic signaling within polysynaptic circuits
  of the prefrontal executive cortex, responsible for impulse control and sustained
  attention. Contributing mechanisms include decreased D4 receptor sensitivity, heightened
  presynaptic dopamine reuptake, and genetic polymorphisms in D2/D4 receptor genes.
  Environmental neurotoxins (lead, PCBs) and nutritional deficiencies worsen dopaminergic
  function.
