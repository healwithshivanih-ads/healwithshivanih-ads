  location: Attention Deficit Hyperactivity Disorder — Etiology
  quote: Diminished function of polysynaptic dopaminergic circuits belonging to executive
    centers within the brain's prefrontal cortex. Executive centers are inhibitory
    and are responsible for impulse control and ability to maintain sustained attention.
