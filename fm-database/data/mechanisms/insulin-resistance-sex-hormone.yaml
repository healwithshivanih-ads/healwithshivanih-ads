category: metabolic
summary: Insulin resistance and obesity impair estrogen metabolism and lower SHBG.
  Excess insulin drives ovarian androgen production (relevant in PCOS) and disrupts
  hepatic estrogen clearance. Estrogen in turn can positively influence insulin sensitivity,
  creating a bidirectional relationship.
