  location: Cofactors / Supplementation section
  quote: For the conversion of homocysteine to methionine, we need methionine synthase
    enzyme to be working. But with this enzyme, we need two important cofactors of
    B vitamin. That is one is methylcobalamin B12 and next is vitamin B9 that is methylfolate.
