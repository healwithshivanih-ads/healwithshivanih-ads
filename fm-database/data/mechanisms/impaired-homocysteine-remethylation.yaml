slug: impaired-homocysteine-remethylation
display_name: Impaired Homocysteine Remethylation
aliases:
- homocysteine accumulation
- homocysteine-methionine conversion failure
category: metabolic
summary: Homocysteine is normally remethylated to methionine by methionine synthase,
  requiring methylcobalamin (B12) and 5-methylTHF (active folate) as cofactors. Deficiency
  of either cofactor, or MTHFR dysfunction reducing 5-methylTHF availability, leads
  to homocysteine accumulation and downstream cardiovascular and neurological risk.
upstream_drivers:
- folate-deficiency
- b12-deficiency
- mthfr-enzyme-dysfunction
downstream_effects:
- elevated-homocysteine
- cardiovascular-disease-risk
- neurological-disorders
