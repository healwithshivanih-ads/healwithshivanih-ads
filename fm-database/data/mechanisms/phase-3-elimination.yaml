category: metabolic
summary: 'Phase 3 is the final step of detoxification — physical excretion of

  water-soluble conjugated metabolites via bile-to-stool, urine, sweat,

  sebum, and exhaled breath. Effective elimination requires adequate

  bowel motility (regular daily stools), hydration (kidney output), sweat

  capacity, and a healthy gut microbiome (to prevent deconjugation and

  reabsorption via beta-glucuronidase). Constipation, oliguria, or

  inability to sweat each create a bottleneck that raises net toxin

  load despite adequate Phase 1/2 activity.

  '
