sources:
- id: coconote-fm-calcium-deficiency
  location: Magnesium and Calcium Relationship
  quote: if you have deficiency of magnesium then calcium is going to move in the
    cell and that way you can see low serum calcium level. So if you correct the intracellular
    magnesium level this calcium going to come out from the cell and it will maintain
    your serum magnesium level.
