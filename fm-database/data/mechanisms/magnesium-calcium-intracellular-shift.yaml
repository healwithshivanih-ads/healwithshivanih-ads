slug: magnesium-calcium-intracellular-shift
display_name: Magnesium Deficiency → Calcium Intracellular Shift
aliases:
- calcium shift into cell
- magnesium-calcium reciprocal relationship
category: metabolic
summary: Magnesium is the primary intracellular mineral while calcium is extracellular.
  Magnesium deficiency causes calcium to shift intracellularly, reducing serum calcium.
  Correcting intracellular magnesium allows calcium to move back to the extracellular
  compartment, restoring serum levels.
upstream_drivers:
- magnesium-deficiency
downstream_effects:
- low-serum-calcium
- intracellular-calcium-excess
