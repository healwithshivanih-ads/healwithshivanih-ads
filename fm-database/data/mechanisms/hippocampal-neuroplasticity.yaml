summary: The hippocampus, the seat of memory, sense of self, and motivation, shrinks
  approximately 1% per year with aging. Sex hormones (estrogen in women, testosterone
  in men) and adequate magnesium can halt and reverse this shrinkage. Meditation and
  exercise alone (Yale MED-X studies) did not prevent hippocampal shrinkage.
