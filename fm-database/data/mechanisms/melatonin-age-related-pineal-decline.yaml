slug: melatonin-age-related-pineal-decline
display_name: Age-Related Pineal Melatonin Decline
aliases:
- pineal aging
- melatonin reduction with age
- age-related sleep fragility
category: endocrine
summary: Endogenous nightly melatonin production from the pineal gland declines progressively
  with age. A 60-year-old produces approximately one-half to one-third of the nightly
  melatonin of a 10-year-old. This decline contributes to the more fragile sleep typical
  of older adults — longer sleep latency, more nocturnal awakenings, and increased
  sensitivity to environmental disturbances. Provides physiological rationale for
  considering melatonin supplementation in older adults with sleep onset problems,
  taken 2-3 hours before bedtime (not immediately after a meal, as melatonin slows
  post-prandial glucose decline).
