summary: Under chronic stress, adrenal mitochondria preferentially divert pregnenolone
  (the mother hormone) toward cortisol synthesis at the expense of DHEA, progesterone,
  and other downstream hormones, resulting in fatigue, mood changes, and hormonal
  deficiency.
