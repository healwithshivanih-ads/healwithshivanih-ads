category: gut
summary: |
  Compromised integrity of the single-cell-thick small-intestinal lining,
  with disruption of tight-junction proteins (zonulin upregulation, occludin
  downregulation), allowing larger food particles, bacterial fragments
  (LPS), and antigens to cross into the bloodstream and trigger systemic
  immune activation. A core upstream driver in FM models of autoimmunity,
  chronic inflammation, perimenopausal symptoms, and food sensitivities.
upstream_drivers:
  - dysbiosis (loss of beneficial species)
  - chronic stress / cortisol elevation
  - declining estrogen (perimenopause)
  - NSAID and alcohol use
  - gluten exposure (in susceptible individuals)
  - low SCFA production
downstream_effects:
  - food sensitivities
  - autoimmune flare risk
  - systemic low-grade inflammation
  - estrogen-immune dysregulation
  - brain fog (LPS crossing BBB)
