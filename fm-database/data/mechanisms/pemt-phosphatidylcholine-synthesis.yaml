slug: pemt-phosphatidylcholine-synthesis
display_name: PEMT-Dependent Phosphatidylcholine Synthesis
aliases:
- phosphatidylcholine biosynthesis
- CDP-choline pathway
- cell membrane lipid synthesis
- PEMT pathway
- endogenous choline synthesis
- SAMe-phospholipid synthesis
category: metabolic
summary: PEMT sequentially methylates phosphatidylethanolamine (PE) to phosphatidylcholine
  (PC) using three SAMe molecules per reaction. This pathway is the only endogenous
  route to PC synthesis in the liver and is upregulated by oestrogen. Variants reduce
  PC production, impairing cell membrane integrity, bile flow, VLDL export, and gut
  epithelial health.
