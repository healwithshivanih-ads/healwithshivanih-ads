summary: Chronic stress and unprocessed emotions suppress mitochondrial function via
  reactive oxygen species (ROS) and excess cortisol, causing neuronal mitochondria
  to underproduce ATP. Presents as fatigue, post-exertional crashes, slow thinking,
  and light/noise sensitivity.
