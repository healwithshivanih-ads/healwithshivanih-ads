slug: synovial-inflammation
display_name: Synovial Membrane Inflammation
aliases:
- synovitis
- joint-synovitis
- pannus-formation
- synovial-hyperplasia
category: immune
summary: Chronic inflammation of the synovial membrane lining the joints, characterised
  by lymphocyte and macrophage infiltration, pannus formation (invasive synovial tissue),
  COX-2 overexpression, and elevated TNF-alpha, IL-1-beta, and IL-6. In RA, immune
  complexes from circulating anti-CCP antibodies, microbial cross-reactive antibodies
  (Proteus, Porphyromonas), and dietary antigens deposit in synovial fluid, recruiting
  immune cells that erode cartilage and subchondral bone.
