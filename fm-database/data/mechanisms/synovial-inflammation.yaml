  location: Rheumatoid Arthritis — General Considerations (pp 875-876)
  quote: Affected joints are warm, tender, and swollen with prolonged morning stiffness.
    As RA progresses, bony erosion, subluxations, dislocations, and contractures develop,
    causing joint deformities, particularly in hands and feet.
