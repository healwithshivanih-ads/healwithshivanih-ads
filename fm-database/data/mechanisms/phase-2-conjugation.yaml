category: metabolic
summary: 'Phase 2 attaches a water-soluble conjugate (glucuronic acid, sulfate,

  glutathione, methyl group, acetyl group, amino acids like glycine,

  taurine, glutamine) to the Phase-1 activated intermediate, rendering

  it inactive and excretable via bile, urine, or sweat. Key Phase 2

  pathways: glucuronidation (UGTs), sulfation, glutathione conjugation

  (GSTs), methylation, N-acetylation (NAT), amino acid conjugation.

  Under basal conditions Phase 2 enzymes operate well below maximum

  capacity and must be induced — typically by phytochemicals (notably

  sulforaphane) or toxicant exposure. Heavily protein-dependent:

  amino acids supply both the enzymes and the conjugating groups.

  '
