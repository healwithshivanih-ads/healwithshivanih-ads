slug: transferrin-tibc-compensatory-increase
display_name: Transferrin / TIBC Compensatory Increase in IDA
aliases:
- elevated TIBC
- elevated UIBC
- low transferrin saturation
category: metabolic
summary: Transferrin is the transport protein that carries iron in the bloodstream.
  In iron deficiency, the body upregulates transferrin production, increasing Total
  Iron Binding Capacity (TIBC) and Unsaturated Iron Binding Capacity (UIBC) while
  transferrin saturation falls, reflecting the body's attempt to capture more available
  iron.
