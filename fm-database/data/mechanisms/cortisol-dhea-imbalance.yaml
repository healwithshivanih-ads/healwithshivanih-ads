category: endocrine
summary: Under chronic stress, sustained demand for cortisol output eventually depletes
  DHEA, as adrenal capacity is overwhelmed. Low DHEA impairs immune defense, reduces
  muscle mass, lowers bone density, and reduces sex hormone precursor availability.
  Chronically elevated cortisol simultaneously drives insulin resistance, weight gain,
  and immune suppression.
