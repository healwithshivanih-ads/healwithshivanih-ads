category: metabolic
summary: Accumulation of heavy metals (mercury, lead, arsenic, cadmium) in body tissues
  impairs detoxification enzyme activity, neurological function, and immune response.
  Mercury from dental amalgam is a significant source; binding agents (chlorella,
  activated charcoal, glutathione, NAC) are used to support clearance.
