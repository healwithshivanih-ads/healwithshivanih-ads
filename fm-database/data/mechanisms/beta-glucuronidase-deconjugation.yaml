slug: beta-glucuronidase-deconjugation
display_name: Beta-Glucuronidase Deconjugation
aliases:
- bacterial deconjugation
- gut microbiome estrogen reabsorption
- enterohepatic recirculation of conjugates
category: gut
summary: 'Beta-glucuronidase is an enzyme produced by certain gut bacteria that

  cleaves the glucuronide group off Phase-2-conjugated metabolites

  (notably estrogens and other lipophilic toxins) destined for fecal

  excretion. This deconjugation releases the original compound back

  into the gut lumen where it can be reabsorbed via enterohepatic

  recirculation, raising systemic burden. Elevated gut beta-glucuronidase

  activity is linked to estrogen dominance patterns and reduced toxicant

  clearance. The microbial population producing beta-glucuronidase is

  often called the "estrobolome."

  '
