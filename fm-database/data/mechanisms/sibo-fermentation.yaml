slug: sibo-fermentation
display_name: SIBO & Gut Fermentation Dysregulation
aliases:
- small intestinal bacterial overgrowth
- fermentation dysbiosis
category: gut
summary: Bacterial overgrowth in the small intestine causes excessive fermentation
  of fermentable carbohydrates (FODMAPs), producing gas, distension, and altered motility.
  Fructan-containing foods (onion, garlic) and fructose are particularly implicated.
  Motility support and treatment of root cause are essential for resolution.
