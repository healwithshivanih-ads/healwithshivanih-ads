slug: ovulation-suppression-pseudo-hormone-replacement
display_name: Ovulation Suppression and Pseudo-Hormone Replacement (Hormonal Birth
  Control Mechanism)
aliases:
- pill mechanism
- combined oral contraceptive mechanism
- progestin mechanism
- hbc mechanism
- hpo axis suppression
- ovarian shutdown by oral contraceptives
category: endocrine
summary: Hormonal birth control (combined pill, mini-pill, hormonal IUD, implant,
  patch, ring, injection) works primarily by suppressing the hypothalamic-pituitary-
  ovarian (HPO) axis, abolishing ovulation, and substituting endogenous estradiol
  and progesterone with synthetic steroid drugs (ethinylestradiol plus a progestin
  such as levonorgestrel, drospirenone, etonogestrel, or medroxyprogesterone acetate).
  Briden emphasises that these drugs are NOT human hormones — they are pseudo-hormones
  with different molecular structures (e.g. levonorgestrel is structurally closer
  to testosterone than to progesterone) and different downstream receptor effects.
  Functional consequences during use — no endogenous progesterone production (which
  depends on ovulation), no real menstrual cycle (scheduled bleeds are withdrawal
  bleeds from drug dosing, not period proper), loss of progesterone's benefits for
  mood, bone, brain, thyroid, and immune function. Functional consequences after stopping
  — temporary HPO dysregulation, rebound sebum and androgen production (post-pill
  acne), unmasking of underlying PCOS or thyroid dysfunction previously concealed
  by the drug, and a re-encounter with natural cyclical hormone fluctuations (post-pill
  PMS).
upstream_drivers:
- pharmaceutical contraception use
- prescription for non-contraceptive indications (acne, cycle regulation, endometriosis,
  PCOS)
downstream_effects:
- chronic anovulation while drug is active
- progesterone-deficiency
- estrogen-decline
- depression
- low libido
- hair-loss
- weight gain
- nutrient deficiency (B6, B12, folate, zinc, magnesium, selenium)
- altered gut and vaginal microbiome
- reduced bone mineral acquisition (especially in adolescents)
- post-pill acne
- post-pill amenorrhoea
- post-pill PCOS presentation
