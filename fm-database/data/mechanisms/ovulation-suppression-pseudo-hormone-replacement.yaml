sources:
- id: briden-period-repair-manual-2018
  location: Chapter 1 — Why Hormonal Birth Control Is Not the Answer, pp 7-9
  quote: On the pill, you have no sex hormones of your own. Instead, you have steroid
    drugs given to you as a kind of hormone replacement. Hormone replacement might
    be okay if the steroid drugs were as good as your own hormones, but they are not.
    The pill does not regulate hormones. It switches them off entirely.
- id: briden-period-repair-manual-2018
  location: Chapter 2 — Pill Drugs Are Not Hormones, pp 19-22
  quote: Levonorgestrel is actually more similar to testosterone than it is to progesterone.
    Their biggest side effect is that they rob you of your own beneficial progesterone.
    They do so by suppressing ovulation, which is, of course, their purpose, but unfortunately,
    without ovulation, you cannot make progesterone.
