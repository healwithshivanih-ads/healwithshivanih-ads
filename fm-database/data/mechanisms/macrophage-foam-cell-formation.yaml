summary: Oxidized or glycated LDL is recognized as foreign by macrophages, which engulf
  it to form foam cells. These foam cells release pro-inflammatory cytokines, perpetuating
  a chronic inflammatory cycle that progressively builds the atherosclerotic plaque.
