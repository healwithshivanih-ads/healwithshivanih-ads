category: endocrine
summary: Progesterone, described as the 'happy hormone', is implicated in mood regulation.
  Deficiency—whether from genetic predisposition, maternal oral contraceptive use,
  hormonal transitions at puberty, postnatal period, or menopause—is proposed as a
  key contributor to depression in women.
