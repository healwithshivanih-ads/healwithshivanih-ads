slug: pops-block-insulin-receptors
display_name: Persistent Organic Pollutants Block Insulin Receptors
aliases:
- pop-insulin-receptor-blockade
- environmental-toxicant-insulin-resistance
- pop-induced-insulin-resistance
category: metabolic
summary: Persistent organic pollutants (PCDDs, PCDFs, hexachlorobenzene, organophosphates,
  DDE, bisphenol A) accumulate in adipose tissue and bind to or block insulin receptor
  sites, impairing insulin signalling and beta-cell insulin production. Pizzorno frames
  body POP load as potentially a stronger T2DM predictor than obesity itself. Indirect
  measurement via gamma-glutamyltransferase (GGTP) — levels above 40 IU/L confer a
  20-fold increased T2DM risk.
