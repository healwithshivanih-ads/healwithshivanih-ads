sources:
- id: pizzorno-diabetes
  location: Diabetes Mellitus — POPs (pp 260)
  quote: Body load of POPs is a strong predictor of T2DM and might be a more important
    risk factor than obesity. An elevated GGTP is a strong predictor of diabetes risk.
    Those with levels above 40 IU/L have a 20-fold increased risk. Apparent mechanisms
    — blocking of insulin receptor sites and impairment of insulin production.
