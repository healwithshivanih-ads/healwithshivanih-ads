category: metabolic
summary: HMG-CoA reductase inhibitors (statins) deplete multiple nutrients including
  CoQ10, carnitine, copper, essential fatty acids, selenium, vitamin D, vitamin E,
  and zinc — all critical for cardiovascular and mitochondrial function. This may
  partially explain statin-associated myopathy and fatigue.
