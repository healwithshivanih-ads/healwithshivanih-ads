category: gut
summary: 'Mast cells in the gut mucosa cluster around enteric nerve endings. Upon

  degranulation, tryptase and other mediators degrade and sensitize visceral

  nerve afferents, lowering the pain threshold. This is the proposed link

  between mast cell activation and IBS-like cramping, bloating, and visceral

  pain syndromes — explaining why a subset of IBS patients respond to mast

  cell stabilizers rather than to motility or psychobiotic interventions.

  '
