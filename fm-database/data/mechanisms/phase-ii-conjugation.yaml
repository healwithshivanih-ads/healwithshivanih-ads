category: metabolic
summary: Phase II detoxification involves conjugation reactions (sulfation, glucuronidation,
  glutathione conjugation, acetylation, amino acid conjugation, methylation) that
  neutralize Phase I intermediary metabolites, converting them into water-soluble,
  excretable derivatives via bile/feces, kidneys/urine, and serum. Key nutrients include
  glycine, taurine, glutamine, N-acetylcysteine, cysteine, and methionine.
