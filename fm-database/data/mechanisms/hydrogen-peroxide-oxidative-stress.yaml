category: metabolic
summary: MAOA catabolism of stress neurotransmitters generates hydrogen peroxide as
  a by-product. Normally, GPX uses glutathione to convert H2O2 to water. When glutathione
  is depleted by chronic stress, infection, or poor diet, excess H2O2 damages DNA,
  hair pigment cells, mitochondria, and brain tissue, contributing to premature graying,
  neurodegeneration, and mood disturbance.
