slug: cold-shock-response
display_name: Cold Shock Response
aliases:
- cold water shock
- cold immersion reflex
- cold gasp reflex
category: neurological
summary: Sudden cold water immersion triggers an involuntary physiological response
  including gasping, hyperventilation, tachycardia, and peripheral vasoconstriction
  mediated by the sympathetic nervous system. This acute response can be dangerous
  in novice swimmers (drowning risk) but attenuates with repeated exposure.
