slug: gluten-casein-opioid-peptides
display_name: Gluten and Casein Opioid Peptides (Exorphins)
aliases:
- exorphins
- gliadorphin
- casomorphin
- food-derived opioid peptides
category: neurological
summary: Partial proteolysis of gluten (from wheat, barley, rye) yields gluteomorphins
  (gliadorphins), and partial proteolysis of casein (from cow's milk, paneer, curd,
  butter) yields beta-casomorphins. These short peptides have opioid-like activity
  at mu-opioid receptors in the brain. In a healthy gut with intact mucosa, gluten
  and casein are degraded to free amino acids before absorption; in dysfunctional
  digestion (low dipeptidyl peptidase-IV activity, leaky gut, pancreatic insufficiency)
  the intact opioid peptides can cross the intestinal barrier, evade DPP-IV degradation,
  cross a permeable blood-brain barrier, and bind central opioid receptors. The proposed
  clinical consequences include reduced focus and language, altered pain perception,
  social withdrawal, food cravings and apparent food addiction (children gravitate
  to dairy and bread, refusing other foods), and exacerbation of autistic and ADHD
  symptoms. Clinical observation supporting the mechanism — children on strict GFCF
  elimination frequently broaden their food repertoire dramatically within weeks once
  the "addictive" foods are removed.
