slug: arachidonic-acid-cascade
display_name: Arachidonic Acid Inflammatory Cascade
aliases:
- AA cascade
- eicosanoid pathway
- omega-6 pro-inflammatory pathway
- eicosanoid inflammatory pathway
- COX-LOX cascade
category: immune
summary: Phospholipase A2, activated by injury or immune stimuli, releases arachidonic
  acid from cell membranes. AA is then metabolized via the COX pathway (producing
  pro-inflammatory prostaglandins, thromboxane A2) and the LOX pathway (producing
  leukotrienes causing bronchospasm, vasoconstriction, joint destruction). EPA and
  DHA compete with and displace AA in these pathways, reducing inflammatory mediator
  production.
