slug: gut-immune-barrier-function
display_name: Gut Immune Barrier Function
aliases:
- gut barrier
- intestinal immune defence
- mucosa-associated lymphoid tissue
category: immune
summary: Gut flora microorganisms protect the blood against harmful pathogens in the
  gut, nourish the intestinal epithelial cells, and form an integral part of the immune
  system. Loss of this barrier (leaky gut) allows undigested particles and pathogens
  into the bloodstream, triggering systemic inflammation and autoimmune-like presentations.
