category: endocrine
summary: During pregnancy, maternal stress activates the HPA axis, releasing cortisol
  and adrenaline. These hormones cross the placenta and are proposed to alter fetal
  nervous system development, increasing baseline autonomic arousal and affecting
  the infant's capacity for relaxation and stress regulation throughout life.
