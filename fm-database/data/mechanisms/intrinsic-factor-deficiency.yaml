slug: intrinsic-factor-deficiency
display_name: Intrinsic Factor Deficiency (Pernicious Anemia Mechanism)
aliases:
- pernicious anemia mechanism
- IF deficiency
category: gut
summary: Parietal cells in the stomach produce intrinsic factor (IF), which is essential
  for the absorption of B12 and folate in the ileum. Damage or reduced activity of
  parietal cells — from hypothyroidism, autoimmune gastritis, or chronic PPI use —
  reduces IF production, leading to B12 and folate deficiency and megaloblastic anemia.
upstream_drivers:
- hypothyroidism
- ppi-use
- autoimmune-gastritis
