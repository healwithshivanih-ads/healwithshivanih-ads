  location: Secondary Biomarkers / B12 Anemia section
  quote: The intrinsic factor which it produces which eventually helps us in the absorption
    of B12 and folate. So again, if there is a decrease in the activity of the parietal
    cells, it could cause hypothyroidism, decrease in HCL, and again, decrease in
    the intrinsic factor, which eventually causes decrease in the B12 and the folate
    absorption.
