slug: h-pylori-caga-vaca-virulence
display_name: H. pylori CagA + VacA Virulence Factors
aliases:
- caga-oncoprotein
- vaca-vacuolating-cytotoxin
- type-iv-secretion-h-pylori
- cag-pathogenicity-island
category: immune
summary: H. pylori virulence depends on two major secreted factors. CagA (Cytotoxin-Associated
  Antigen A) is delivered into host gastric epithelial cells via a type IV secretion
  system, disrupting cell cytoskeleton and signalling; cagA-positive strains carry
  a substantially elevated risk of peptic ulcers and gastric cancer. VacA (Vacuolating
  Cytotoxin A) creates progressive vacuolation (holes) in epithelial cells, driving
  cell death and providing an intracellular reservoir that protects the bacteria from
  immune surveillance and antibiotics.
