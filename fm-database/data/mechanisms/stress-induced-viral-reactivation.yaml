slug: stress-induced-viral-reactivation
display_name: Stress-Induced Latent Viral Reactivation
aliases:
- glucocorticoid viral reactivation
- stress reactivates latent virus
category: immune
summary: Latent herpes-family viruses (herpes simplex, Epstein-Barr, varicella zoster)
  are cued to reactivate when the immune system is suppressed. Because stress-driven
  glucocorticoids (cortisol) lower immune surveillance, physical or psychological
  stress can reactivate these viruses; each reactivation re-provokes the immune system
  and can drive autoimmune flares.
