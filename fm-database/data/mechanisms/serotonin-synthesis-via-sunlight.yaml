summary: Ultraviolet rays from sunlight travel through neurochemical pathways in the
  eye, stimulate the pineal gland, and trigger serotonin release. Serotonin is the
  primary mood-regulating neurotransmitter. Regular outdoor sunlight exposure is proposed
  as a natural antidepressant mechanism.
