summary: Persistent low-grade inflammation drives all six primary cardiometabolic
  risk patterns. It is reflected by elevated hsCRP, ESR, ferritin, and IL-6. Sources
  include gut dysbiosis, gum disease, food sensitivities, heavy metal toxicity, and
  smoking.
