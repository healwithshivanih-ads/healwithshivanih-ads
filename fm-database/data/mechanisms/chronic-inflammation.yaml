category: immune
summary: |
  Persistent low-grade activation of the innate immune system without an
  acute infectious trigger — typically driven by visceral adiposity,
  leaky gut + LPS translocation, dysbiosis, chronic stress, and dietary
  drivers (refined carbs, oxidized seed oils, alcohol). Cytokines like
  IL-6, TNF-α, and CRP rise. Underlies most modern chronic disease:
  cardiovascular, neurodegenerative, autoimmune, metabolic. Distinct
  from acute inflammation (which is protective and resolving).
upstream_drivers:
  - visceral adiposity
  - leaky gut + LPS translocation
  - dysbiosis
  - HPA dysregulation / chronic stress
  - poor sleep
  - dietary drivers (refined carbs, ultra-processed foods)
downstream_effects:
  - elevated hs-CRP, IL-6, TNF-α
  - insulin resistance amplification
  - autoimmune flare risk
  - cardiovascular plaque progression
  - neuroinflammation / brain fog
  - accelerated cellular aging (inflammaging)
