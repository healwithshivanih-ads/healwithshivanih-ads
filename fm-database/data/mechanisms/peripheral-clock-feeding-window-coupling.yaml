slug: peripheral-clock-feeding-window-coupling
display_name: Peripheral-Clock Coupling to Eating Window
aliases:
- hepatic circadian oscillator restoration
- liver clock feeding entrainment
- meal-timing peripheral clock entrainment
category: metabolic
summary: 'Beyond the master SCN clock in the brain, peripheral tissues (liver, gut,
  pancreas, adipose) carry their own circadian oscillators that are entrained primarily
  by FEEDING-FASTING cycles rather than by light. Core clock genes (BMAL1, PER2, CRY1,
  REV-ERBα) oscillate in liver tissue with amplitudes that depend on a clear feeding
  window. Ad-libitum eating across the 24-hour cycle (or chronic high-fat diet without
  a fasting window) flattens these oscillations, decoupling the peripheral clocks
  from the central SCN. Restoring a 8–10 hour eating window restores: rhythmic CREB
  phosphorylation (fasting marker), rhythmic mTOR/S6 activation (feeding marker),
  AMPK-driven fatty acid oxidation, gluconeogenic gene suppression (Pcx, G6pc) via
  CRY/CREB pathway, and reduced lipogenic gene expression (Fasn, Scd1, Elovl5). Net
  effect: liver shifts from constant lipogenesis + gluconeogenesis toward rhythmic
  fed/fasted metabolic cycling, with downstream benefits on body composition, glucose
  tolerance, and lipid panels.'
