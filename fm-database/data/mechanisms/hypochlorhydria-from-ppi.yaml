slug: hypochlorhydria-from-ppi
display_name: PPI-Induced Hypochlorhydria
aliases:
- low-stomach-acid-from-ppi
- ppi-induced-low-acid
- proton-pump-inhibitor-hypochlorhydria
category: gut
summary: >-
  Long-term use of proton pump inhibitors (PPIs) — omeprazole, pantoprazole,
  esomeprazole, lansoprazole, rabeprazole — suppresses gastric acid production.
  Beyond the intended antacid effect, this drives clinically significant
  downstream problems: malabsorption of vitamin B12 (intrinsic factor and
  parietal cell function impaired), iron (Fe3+ → Fe2+ reduction requires
  acid), magnesium, calcium, zinc; small intestinal bacterial overgrowth
  (SIBO) from loss of gastric acid barrier; increased risk of C. difficile,
  pneumonia, osteoporotic fracture, chronic kidney disease, and dementia
  on multi-year use. Discontinuation requires gradual taper — abrupt cessation
  causes rebound hyperacidity that mimics the original problem and reinforces
  long-term use.
