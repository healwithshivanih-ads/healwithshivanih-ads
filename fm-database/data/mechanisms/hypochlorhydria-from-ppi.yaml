notes_for_coach: >-
  PPI deprescribing is a CLINICIAN decision — coach role is to coordinate
  with the prescribing GP, support with structured taper (typically halve
  dose every 2-4 weeks, then alternate-day, then PRN), and address root
  GERD drivers (weight, late eating, food triggers, hiatal hernia mechanics)
  during the taper window. Replace nutrient deficits during and after PPI
  use — B12 + iron + magnesium + zinc as indicated by labs.
