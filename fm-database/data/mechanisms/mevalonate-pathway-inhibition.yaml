category: metabolic
summary: Statins inhibit HMG-CoA reductase, the rate-limiting enzyme in the mevalonate
  pathway, reducing endogenous cholesterol synthesis. This pathway also produces other
  bioactive molecules including CoQ10, dolichols, and isoprenoids, meaning broad blockade
  has downstream consequences beyond LDL lowering.
