slug: cholinergic-anti-inflammatory-vagal-reflex
display_name: Cholinergic Anti-Inflammatory Vagal Reflex
aliases:
- vagal anti-inflammatory pathway
- cap
category: signaling
summary: A major endogenous anti-inflammatory pathway mediated by efferent vagal signalling
  through acetylcholine binding to α7 nicotinic receptors on macrophages and other
  immune cells, suppressing the release of pro-inflammatory cytokines (TNF-α, IL-1β,
  IL-6). Functional ventral vagal tone is a prerequisite for this reflex. Chronically
  low vagal tone, as reflected in low respiratory-sinus-arrhythmia HRV, removes the
  brake on systemic inflammation — one of the mechanistic reasons HRV correlates so
  robustly with inflammatory and all-cause-mortality outcomes.
