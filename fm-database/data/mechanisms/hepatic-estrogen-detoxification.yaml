slug: hepatic-estrogen-detoxification
display_name: Hepatic Estrogen Detoxification & Phase I/II Metabolism
aliases:
- estrogen liver metabolism
- CYP estrogen hydroxylation
- COMT methylation of estrogens
- estrogen phase II conjugation
category: metabolic
summary: Estrogens are primarily metabolized in the liver via CYP enzymes (CYP1A1,
  CYP1B1) producing hydroxylated metabolites (2-OHE1, 4-OHE1, 16-OHE1), which are
  then methylated (COMT) or conjugated for excretion. Preferential 4-hydroxylation
  yields carcinogenic catechol estrogens. Poor detoxification leads to accumulation
  of harmful metabolites, enterohepatic recirculation, and estrogen dominance.
upstream_drivers:
