notes_for_coach: >-
  Order full thyroid panel (TSH + fT4 + fT3 + rT3 + antibodies + ferritin
  + selenium + zinc). T3:rT3 ratio < 0.2 strongly suggests conversion problem.
  Address inflammation + cortisol + nutrient cofactors before adding T3
  supplementation (which is a prescribing decision).
