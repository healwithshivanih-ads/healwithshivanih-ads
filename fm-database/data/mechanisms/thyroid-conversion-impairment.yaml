slug: thyroid-conversion-impairment
display_name: T4 → T3 Conversion Impairment
aliases:
- impaired-t4-t3-conversion
- low-t4-to-t3-conversion
- deiodinase-deficiency
- low-ft3-pattern
category: endocrine
summary: >-
  Peripheral conversion of T4 (thyroxine) to active T3 (triiodothyronine)
  depends on three deiodinase enzymes (D1, D2, D3) that require selenium,
  zinc, and adequate energy substrate. Conversion is suppressed by inflammation
  (high hsCRP, IL-6), chronic stress (elevated cortisol), starvation/low-calorie
  states, low ferritin, low selenium, low zinc, and certain medications.
  Pattern presents as normal-to-high TSH + normal/mid T4 + low fT3 + often
  elevated rT3. Common cause of persistent hypothyroid symptoms in
  levothyroxine-treated patients with "normal" TSH. Common FM-relevant
  driver in Hashimoto's, perimenopause-thyroid overlap, post-viral fatigue,
  and chronic stress states.
