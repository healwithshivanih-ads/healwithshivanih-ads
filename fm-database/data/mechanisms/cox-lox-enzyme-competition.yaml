slug: cox-lox-enzyme-competition
display_name: COX/LOX Enzyme Competition Between Omega-3 and Omega-6
aliases:
- delta-5 desaturase competition
- fatty acid enzyme competition
category: metabolic
summary: The delta-5 desaturase enzyme (and COX/LOX enzymes) process both omega-3
  and omega-6 fatty acids. When omega-6 is dominant, the enzyme preferentially produces
  pro-inflammatory arachidonic acid metabolites (prostaglandins, leukotrienes). When
  omega-3 is dominant, the enzyme produces anti-inflammatory resolvins and protectins.
  This competitive dynamic explains why simultaneously increasing omega-3 AND eliminating
  omega-6 sources is essential.
