summary: 'In Phase 2, reactive intermediates are conjugated with amino acids — primarily glycine, taurine, and glutamine —
  rendering them water-soluble for excretion. This pathway is directly protein-dependent: low dietary protein reduces the
  availability of these amino acids and impairs Phase 2 conjugation capacity.'
