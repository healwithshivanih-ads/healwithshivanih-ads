slug: impaired-gut-barrier
display_name: Impaired Gut Barrier (Leaky Gut)
aliases:
- intestinal hyperpermeability
- gut barrier dysfunction
- leaky gut
category: gut
summary: Disruption of the intestinal epithelial lining allows translocation of antigens
  and pathogens, driving systemic inflammation and immune activation. Repair requires
  structural nutrients including L-glutamine (preferred protein substrate for enterocytes),
  short-chain and omega-3 fatty acids, and micronutrients (zinc, vitamin A, vitamin
  B).
