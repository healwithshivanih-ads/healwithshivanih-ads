- id: coconote-fm-estrogen-dominance
  location: Causes of Estrogen Dominance
  quote: Bad bacteria produces an enzyme which is known as beta-glucuronidase. Beta-glucuronidase
    is responsible for the reabsorption of estrogen again into the bloodstream.
