slug: beta-glucuronidase-estrogen-reabsorption
display_name: Beta-Glucuronidase-Mediated Estrogen Reabsorption
aliases:
- beta-glucuronidase activity
- estrogen deconjugation
- gut estrogen recycling
category: gut
summary: Dysbiotic gut bacteria produce beta-glucuronidase, an enzyme that cleaves
  the glucuronide conjugate from estrogen in the gut lumen, deconjugating it and allowing
  free estrogen to be reabsorbed into portal circulation rather than excreted in stool.
  This significantly raises circulating estrogen levels and contributes to estrogen
  dominance.
upstream_drivers:
- gut-dysbiosis
- antibiotic-use
- poor-fiber-intake
downstream_effects:
- estrogen-dominance
- increased-circulating-estrogen
