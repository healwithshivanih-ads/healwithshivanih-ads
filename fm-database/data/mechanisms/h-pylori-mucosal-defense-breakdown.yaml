slug: h-pylori-mucosal-defense-breakdown
display_name: H. pylori-Driven Mucosal Defence Breakdown
aliases:
- h-pylori-ulcer
- helicobacter-pylori-pathogenesis
- urease-mediated-mucosal-damage
category: immune
summary: Helicobacter pylori colonises the gastric mucosa in 90-100% of duodenal ulcer
  and 70% of gastric ulcer patients (50% of people over 50 are positive, but only
  ~20% develop ulcers). Urease neutralises local acid to permit colonisation; CagA
  and VacA virulence factors damage epithelial cells; local inflammation increases
  gastric pH, allowing further colonisation by opportunists. Low gastric output and
  low antioxidant content predispose. Eradication (bismuth subcitrate, mastic gum,
  DGL, garlic + flavonoids) or conventional triple therapy resolves most ulcers.
