  location: Peptic Ulcers — Helicobacter pylori (pp 781)
  quote: 90% to 100% of patients with DUs, 70% with GUs, and 50% of people older than
    50 years test positive for H. pylori. Low gastric output and low antioxidant content
    in GI mucosa may predispose to H. pylori colonization, which in turn increases
    gastric pH, setting up positive feedback.
