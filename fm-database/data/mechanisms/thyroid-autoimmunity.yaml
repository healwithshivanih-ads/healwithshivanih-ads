summary: The immune system produces antibodies (Anti-TPO, Anti-Tg) against thyroid
  tissue components. T-cells (helper, cytotoxic, regulatory) mediate actual destruction.
  Triggered by leaky gut, molecular mimicry, infections, and genetic predisposition.
  Degree of destruction depends on T-cell activity, not antibody levels alone.
