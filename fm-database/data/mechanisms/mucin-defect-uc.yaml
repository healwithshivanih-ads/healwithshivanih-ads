slug: mucin-defect-uc
display_name: Mucin Defects in Ulcerative Colitis
aliases:
- sulfomucin-deficiency
- goblet-cell-depletion
- mucus-layer-dysfunction
category: gut
summary: In UC, alterations in mucin composition include a dramatic decrease in goblet-cell
  mucous content (proportional to disease severity) and a persistent sulfomucin subfraction
  deficiency not seen in CD. Mucin abnormalities persist during remission (sulfomucin)
  and are a major factor in the elevated colon cancer risk in UC patients.
