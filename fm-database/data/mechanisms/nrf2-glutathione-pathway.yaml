summary: Sulforaphane from cruciferous vegetables upregulates Nrf2, a transcription
  factor that induces glutathione synthesis and phase II detoxification enzymes. This
  pathway supports clearance of carcinogenic estrogen metabolites and reactive oxygen
  species.
