category: metabolic
summary: Methylation is a critical Phase 2 liver detox pathway that adds a methyl
  group to toxins for excretion. Elevated homocysteine is a primary indirect biomarker
  of methylation pathway impairment, alongside elevated MMA (methylmalonic acid).
  Defects may be genetic (e.g., MTHFR) or nutritional (B12, folate, B6 deficiency).
