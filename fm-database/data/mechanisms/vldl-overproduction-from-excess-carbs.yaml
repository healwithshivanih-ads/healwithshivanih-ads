slug: vldl-overproduction-from-excess-carbs
display_name: VLDL Overproduction from Excess Dietary Carbohydrates
aliases:
- hepatic VLDL synthesis
- carbohydrate-driven lipogenesis
- de novo lipogenesis
category: metabolic
summary: Excess dietary carbohydrates — especially fructose — are converted in the
  liver into VLDL particles. VLDL is subsequently remodelled into LDL. This pathway
  explains why high-carb diets raise triglycerides and small dense LDL independently
  of saturated fat intake.
