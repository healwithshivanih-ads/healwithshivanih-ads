slug: aromatase-upregulation
display_name: Aromatase Enzyme Upregulation
aliases:
- aromatase activity
- testosterone-to-estrogen conversion
- aromatization
category: endocrine
summary: Aromatase enzymes convert androgens (testosterone, androstenedione) into
  estrogens. Upregulation occurs in the presence of insulin resistance, obesity (adipose
  tissue), and systemic inflammation (elevated prostaglandins, hs-CRP). This results
  in excess estrogen production, driving estrogen dominance. Natural aromatase inhibitors
  (green tea, blueberries, grape seed extract, DIM) can modulate this pathway.
