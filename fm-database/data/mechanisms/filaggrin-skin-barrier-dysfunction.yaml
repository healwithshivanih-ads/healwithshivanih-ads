  location: Atopic Dermatitis — Filaggrin and Epidermal Barrier Dysfunction (pp 112-114)
  quote: Gene encoding filaggrin (FLG) is most consistently replicated. Filaggrin
    is a protein that facilitates aggregation of keratin filaments, and when proteolyzed,
    forms small hygroscopic molecules — amino acids — which comprise natural moisturizing
    factor. 15% of cases of AD are attributable to such mutations. If a person is
    born with one filaggrin mutation, risk of AD is 40%.
