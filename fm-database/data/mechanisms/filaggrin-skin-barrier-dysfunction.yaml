category: structural
summary: Filaggrin is the protein that aggregates keratin filaments and is proteolysed
  into Natural Moisturizing Factor (NMF) amino acids that hydrate the stratum corneum.
  Loss-of-function mutations in FLG cause defective skin barrier — water loss, dryness,
  hyperkeratosis, and chronic inflammation. 15% of atopic dermatitis cases attributable
  to filaggrin mutations; carrying one copy raises AD risk to 40%. Sustained hapten
  access through the defective barrier drives a Th1-to-Th2 immunophenotype shift,
  secondary Staphylococcus aureus colonisation, and elevated TSLP (thymic stromal
  lymphopoietin) — the inside-outside-back-to-outside paradigm justifying barrier-repair
  therapy.
