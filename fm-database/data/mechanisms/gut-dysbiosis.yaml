category: gut
summary: An imbalance in the composition of gut microbiota, with reduction of beneficial
  bacteria (Lactobacillus, Bifidobacterium) and overgrowth of pathogenic organisms.
  Driven by antibiotics, poor diet, stress, and medications. Downstream effects include
  impaired immunity, leaky gut, and altered mood via the gut-brain axis.
