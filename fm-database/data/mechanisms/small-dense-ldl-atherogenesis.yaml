category: metabolic
summary: Small, dense LDL particles are more atherogenic than large, buoyant LDL particles.
  They penetrate arterial walls more readily and are more susceptible to oxidation.
  High triglycerides and low HDL are clinical markers predictive of small dense LDL
  predominance.
