summary: Increased oxidative stress and decreased antioxidant defences in mucosal
  tissue are hallmarks of IBD and ARMD, causing protein and DNA oxidative damage.
  IBD patients show deficiencies in selenium-dependent glutathione peroxidase, Cu-Zn
  superoxide dismutase, and the cofactors zinc, copper, ascorbate, vitamin E, and
  vitamin A.
