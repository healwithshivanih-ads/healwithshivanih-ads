category: metabolic
summary: Phase I processing generates reactive oxygen intermediates (superoxide, free
  radicals) that can cause secondary tissue damage if not quenched by antioxidant
  nutrients. Antioxidant protective nutrients include carotenoids (Vit A), ascorbic
  acid (Vit C), tocopherols (Vit E), selenium, CoQ10, zinc, manganese, bioflavonoids,
  silymarin, pycnogenol.
