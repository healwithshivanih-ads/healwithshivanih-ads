- hemoglobin-synthesis
- oxygen-transport
related_mechanisms:
- phytate-mineral-binding
linked_to_topics:
- iron-deficiency
evidence_tier: strong
sources:
- id: vitaone-nutrition-toolkit
  location: 'Food Sources: Iron'
  quote: Heme iron comes from animal food sources and is well absorbed by the body,
    but accounts for only about 10% of iron in the diet. Nonheme iron is found in
    both plant and animal foods. It is absorbed less readily, but accounts for the
    majority of dietary iron.
