category: metabolic
summary: Heme iron (from animal sources) is absorbed at 20–40%, while non-heme iron (from plant sources) is absorbed at only
  3–12%. Non-heme iron absorption is further impaired by phytates and oxalates present in plant foods. This difference explains
  higher IDA risk in long-term vegans.
