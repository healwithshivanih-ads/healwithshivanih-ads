evidence_tier: strong
sources:
- id: vitaone-nutrition-toolkit
  location: 'Food Sources: Iron'
  quote: Heme iron comes from animal food sources and is well absorbed by the body,
    but accounts for only about 10% of iron in the diet. Nonheme iron is found in
    both plant and animal foods. It is absorbed less readily, but accounts for the
    majority of dietary iron.
- id: coconote-fm-iron-deficiency-anemia
  location: Food Sources / Management section
  quote: The absorption for any plant vegan supplement or plant-based, any kind of
    food source is around 3-12%. On the other side, the animal source, they are very
    high absorption rate inside the bag. So again, the absorption rate for animal
    source supplements is somewhere around, I would say 20-40%.
