slug: heme-vs-nonheme-iron-absorption
display_name: Heme vs. Nonheme Iron Absorption
aliases:
- iron bioavailability
- heme iron
- nonheme iron
category: metabolic
summary: Heme iron (from animal sources) is absorbed efficiently (~25%) regardless
  of dietary context. Nonheme iron (from plants and some animal foods) is absorbed
  less readily and is inhibited by phytates, polyphenols, and calcium, but enhanced
  by vitamin C. Heme iron accounts for ~10% of dietary iron despite being better absorbed.
upstream_drivers:
- dietary iron source
