slug: renal-ph-buffering
display_name: Renal pH Buffering
aliases:
- kidney acid-base regulation
- tubular pH balance
category: metabolic
summary: The kidneys continuously monitor blood pH through tubular reabsorption. Every
  two minutes, 1.2 litres of blood is filtered; the tubules selectively excrete or
  retain acid/base ions to maintain blood pH between 7.3 and 7.5.
upstream_drivers:
- blood-ph-shift
downstream_effects:
- blood-ph-maintenance
related_mechanisms:
