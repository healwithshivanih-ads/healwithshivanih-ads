evidence_tier: strong
sources:
- id: barbara-oneil-ph-balance
  location: Kidney Filtering Section
  quote: It is here that extra acid is dropped into the tubules to be urinated out.
    If the pH of the blood is getting to alkaline, then extra acid is pulled out of
    the tubules into the blood.
