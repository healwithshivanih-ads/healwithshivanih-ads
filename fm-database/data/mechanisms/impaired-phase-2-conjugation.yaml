category: metabolic
summary: 'Phase 2 conjugation is the process of attaching compounds such as

  sulfur, amino acids, methyl groups, or glutathione to activated

  intermediates from Phase 1 detoxification, making them more

  water-soluble for elimination through bile, urine, sweat, and stool.

  Inadequate protein intake, nutrient insufficiency, dysbiosis, or

  genetic polymorphisms may impair this process, increasing oxidative

  stress and toxin retention.

  '
