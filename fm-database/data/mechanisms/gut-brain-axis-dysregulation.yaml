category: neurological
summary: IBS is viewed as a disorder of the brain-gut axis involving both central
  and peripheral serotonergic systems. Altered tryptophan metabolism (via IDO and
  the kynurenine pathway) and elevated indoleamine 2,3-dioxygenase activity link low-level
  immune activation to mood and bowel symptoms. Stress increases colonic motility
  in both normal subjects and IBS patients.
