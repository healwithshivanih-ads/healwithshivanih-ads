slug: tight-junction-dysregulation
display_name: Tight Junction Dysregulation
aliases:
- tight junction breakdown
- intestinal barrier disruption
- gut barrier dysfunction
category: gut
summary: Tight junctions are protein complexes between intestinal epithelial cells
  that control paracellular permeability. When dysregulated (by stress, infections,
  antibiotics, dietary antigens, or zonulin signaling), they allow undigested macromolecules,
  LPS, and pathogens to translocate into the bloodstream, initiating immune activation
  and potentially autoimmunity.
