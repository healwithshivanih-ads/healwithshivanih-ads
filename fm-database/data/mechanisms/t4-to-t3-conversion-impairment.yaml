slug: t4-to-t3-conversion-impairment
display_name: T4 to T3 Conversion Impairment
aliases:
- impaired T4 conversion
- reduced T3 production
- deiodinase dysfunction
category: endocrine
summary: T4 (thyroxine) must be converted to the active T3 form peripherally (primarily
  in the liver and kidneys) by deiodinase enzymes. Stress, inflammation, toxins, low-calorie
  diets, liver/kidney dysfunction, and certain medications shift conversion toward
  inactive reverse T3 (RT3) rather than active T3, reducing cellular thyroid hormone
  availability even when thyroid production is adequate. Selenium and zinc support
  the T4→T3 pathway.
