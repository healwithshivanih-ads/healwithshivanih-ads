category: metabolic
summary: Magnesium is the predominant intracellular mineral in cardiac cells and is essential for maintaining the calcium-magnesium
  balance required for normal electrical action potentials. Magnesium deficiency allows excess intracellular calcium accumulation,
  which is reflected clinically by elevated coronary calcium scores and may contribute to arrhythmia and plaque calcification.
