category: gut
summary: Imbalance in gut microbial populations — including SIBO, Candida overgrowth,
  or dominance of histamine-producing bacterial species — increases luminal histamine
  load, triggers immune activation, and burdens the DAO enzyme. A diverse, balanced
  microbiome is protective; disruption by antibiotics, stress, poor diet, or infection
  propagates inflammation and food intolerance.
