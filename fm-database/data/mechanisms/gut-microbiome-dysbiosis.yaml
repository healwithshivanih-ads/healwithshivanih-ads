category: gut
summary: When the gut microbiome is disrupted (by antibiotics, statins, long-term
  painkillers, or other medications), gut-lining cells lose nourishment, become unable
  to metabolise opiate-like peptides from gluten and dairy, and permit glutomorphine
  and caseomorphine to enter the bloodstream, where they affect brain opiate receptors.
