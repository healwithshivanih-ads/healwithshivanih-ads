slug: lps-endotoxin-production
display_name: LPS / Endotoxin Production from Gut Dysbiosis
aliases:
- lipopolysaccharide toxicity
- gram-negative bacterial toxins
category: immune
summary: Gram-negative bacteria in the gut produce lipopolysaccharide (LPS) as a metabolic
  byproduct when fermenting substrates. In the context of dysbiosis, excess LPS enters
  systemic circulation ('endotoxemia'), acting as an internal toxin that drives inflammation,
  immune activation, and increases total toxic load beyond environmental sources alone.
