sources:
- id: pizzorno-affective-disorders
  location: Affective Disorders — Learned Helplessness (Seligman) (pp 12)
  quote: Animals and human beings can be experimentally conditioned to feel and act
    helpless. Animals conditioned to be helpless have alteration of brain monoamine
    content; teaching them how to gain environmental control normalizes brain chemistry.
    Optimistic people are immune to helplessness and depression.
