slug: learned-helplessness
display_name: Learned Helplessness (Seligman)
aliases:
- helplessness-model
- pessimistic-explanatory-style
- seligman-helplessness
category: signaling
summary: A psychological state in which repeated uncontrollable negative events condition
  animals or humans to stop attempting environmental control even when control becomes
  available. Conditioned helplessness produces measurable monoamine alterations in
  the brain that mirror those seen in human depression; teaching control normalises
  both behaviour and brain chemistry. Explanatory style (optimistic vs pessimistic
  interpretation of events) determines vulnerability — optimists are largely immune
  to helplessness-driven depression.
