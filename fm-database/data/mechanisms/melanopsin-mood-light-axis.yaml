slug: melanopsin-mood-light-axis
display_name: Melanopsin Mood-Light Axis
aliases:
- light-mood pathway
- ipRGC mood signaling
- melanopsin depression connection
category: neurological
summary: 'Melanopsin-expressing intrinsically photosensitive retinal ganglion cells
  (ipRGCs) detect bright daytime light and signal not only to the SCN for circadian
  entrainment but also to mood-regulating brain regions including the perihabenular
  nucleus. Insufficient daytime light activation of melanopsin can induce depression-like
  mood states and impair learning independently of sleep quality. A Johns Hopkins
  mouse study demonstrated this connection directly: light-deprived mice developed
  depression-like behaviour and learning deficits via reduced melanopsin signalling.
  Architectural research with office workers found those with daylight access showed
  better mood, performance, and sleep quality than those in windowless offices. This
  is the physiological basis for morning light therapy in mood disorders and seasonal
  affective disorder.'
upstream_drivers:
- insufficient daytime bright light exposure
- windowless work environments
