category: endocrine
summary: Elevated follicle-stimulating hormone (FSH), which rises as sex steroids
  decline in menopause, drives multiple aging effects including bone loss, abdominal
  weight gain, cognitive decline, and difficulty losing weight. FSH was being studied
  as a target for monoclonal antibody weight-loss therapies before GLP-1 medications
  dominated the field.
