slug: toxin-induced-treg-thymic-suppression
display_name: Toxin-Induced Thymic / Regulatory T-Cell Suppression
aliases:
- thymic atrophy from toxins
- toxin-driven loss of self-tolerance
category: immune
summary: Environmental toxins (notably heavy metals and solvents such as TCE) are
  proposed to shrink the thymus and impair the education of regulatory T cells (Tregs).
  With fewer or poorly trained Tregs, effector T cells are more likely to lose tolerance
  of self and attack the body's own tissues — one of the mechanisms Myers invokes
  to explain how toxic burden triggers autoimmunity.
