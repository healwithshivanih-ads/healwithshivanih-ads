summary: The prefrontal cortex (PFC) hosts reason, intellect, judgement, and willpower. It filters emotional impulses from
  the limbic system. Its function is degraded by dehydration, poor sleep, sugar spikes, caffeine, and alcohol. It is strengthened
  by sunlight, hydration, sleep, exercise, nose breathing, and good nutrition.
