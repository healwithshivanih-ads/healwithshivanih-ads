notes_for_coach: 'No practitioner — regardless of qualification — should give a diet
  or lifestyle recommendation off a single gene. If a client fixates on ''my MTHFR
  mutation'', reframe: it is one low-impact variant read in the context of the whole
  methylation group.'
sources:
- id: fmca-m11-genetics-epigenetics-joffe
  location: Genetics 101 + polygenic Q&A
  quote: These variants are insightful and informative but not that powerful; when
    we group them and score them they give really important information. We don't
    believe anyone should give a recommendation based on a single gene.
