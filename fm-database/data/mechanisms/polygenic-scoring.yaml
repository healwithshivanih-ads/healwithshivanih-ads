slug: polygenic-scoring
display_name: Polygenic Scoring vs Single-Gene Thinking
aliases:
- polygenic score
- total genotype score
- gene grouping
- low-penetrance variants
category: signaling
summary: Most nutrigenomic SNPs are low-penetrance ('low-impact') — informative but
  not individually powerful enough to drive a recommendation. The useful signal comes
  from grouping all the genes behind a pathway (e.g. detoxification or hormone metabolism),
  scoring them together, and reading the aggregate impact. This contrasts with the
  discredited single-gene approach (e.g. putting MTHFR on a pedestal) that over-weighted
  one variant. High-penetrance ('high-impact') medical genetics such as BRCA or sickle-cell
  HBB is a separate world handled by clinicians/genetic counsellors.
