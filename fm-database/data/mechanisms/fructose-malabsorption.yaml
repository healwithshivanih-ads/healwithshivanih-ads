category: gut
summary: When fructose intake exceeds glucose in the intestinal lumen, the GLUT5 transporter
  is overwhelmed and unabsorbed fructose passes to the colon, creating an osmotic
  load and substrate for fermentation, causing bloating, gas, and altered stool.
