category: structural
summary: Injury to the endothelial lining (innermost vascular layer) creates permeability
  ('cracks') through which small-dense LDL particles infiltrate the tunica media.
  Triggers include systemic inflammation, high homocysteine, hyperglycemia, toxins,
  hypertension, and viral infection.
