slug: mitochondria-as-immune-sensors
display_name: Mitochondria as Cellular Immune Sensors
aliases:
- extracellular atp danger signal
- eatp signalling
category: immune
summary: Naviaux's paradigm-shifting insight that mitochondria are not just energy
  factories — they are the cell's primary immune sensors. When they detect a change
  in the supply of upstream substrates (often the first sign of viral hijacking),
  they downregulate ATP synthesis AND export ATP to the extracellular space, where
  it acts as a danger-associated molecular pattern (eATP / DAMP) that recruits white
  blood cells and triggers inflammation in neighbouring cells. This extracellular
  ATP halo is the FIRST signal of inflammation in the body — preceding cytokines like
  interferon-gamma by hours. Mitochondria also physically change shape during CDR
  — from connected spaghetti-like networks (high ATP output) to fragmented "meatball"
  forms (low output, defensive). Recovery requires fission/fusion to return to networked
  form.
