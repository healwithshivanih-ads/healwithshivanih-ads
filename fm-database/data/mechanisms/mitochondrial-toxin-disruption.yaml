category: metabolic
summary: 'Mitochondria are highly susceptible to environmental toxicants

  (pesticides, heavy metals, plasticizers, air pollutants). Toxicant

  exposure impairs electron transport chain function and reduces ATP

  output, manifesting clinically as fatigue and low exercise tolerance.

  Creates a double bind: biotransformation is an ATP-dependent process,

  so toxicant-induced mitochondrial dysfunction simultaneously reduces

  detox capacity, allowing further toxicant accumulation.

  '
