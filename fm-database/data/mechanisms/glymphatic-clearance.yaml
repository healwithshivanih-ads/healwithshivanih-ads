evidence_tier: strong
sources:
- id: barbara-oneil-healing-mind
  location: Sleep Section
  quote: When we go to bed early, especially the hours before midnight, there's a cleaning system that happens. And the cleaning
    system happens under the action of the oil cells. It's called the glymphatic system.
