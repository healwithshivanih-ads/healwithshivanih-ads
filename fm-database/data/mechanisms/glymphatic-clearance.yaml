slug: glymphatic-clearance
display_name: Glymphatic System Clearance
aliases:
- glymphatic system
- amyloid plaque clearance
- brain waste removal during sleep
category: neurological
summary: During sleep, especially in the hours before midnight, glial (oil) cells activate the glymphatic system, which flushes
  amyloid plaques and metabolic waste from the brain. Chronic sleep deprivation impairs this clearance, allowing plaque accumulation
  associated with Alzheimer's and cognitive decline.
upstream_drivers:
- early-sleep
