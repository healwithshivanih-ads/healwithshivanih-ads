slug: thyroid-hormone-conversion
display_name: T4 to T3 / Reverse T3 Conversion
aliases:
- T4 to T3 conversion
- deiodinase activity
- selenium-dependent thyroid activation
- T4-T3 conversion
- reverse T3 dominance
category: endocrine
summary: T4 (thyroxine) is converted peripherally to active T3 or inactive reverse
  T3 (RT3). Selenium and zinc promote T4-to-T3 conversion. Stress, inflammation, toxins,
  low-calorie diets, infections, and liver/kidney dysfunction shift conversion toward
  RT3. RT3 and T3 compete for cellular binding sites.
