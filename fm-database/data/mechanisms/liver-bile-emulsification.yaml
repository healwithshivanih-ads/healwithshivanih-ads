category: gut
summary: The liver produces bile, stored in the gallbladder, which emulsifies unsaturated
  fats in the duodenum into tiny particles for subsequent breakdown by pancreatic
  lipase. Saturated fat digestion, by contrast, begins in the mouth via lingual lipase.
