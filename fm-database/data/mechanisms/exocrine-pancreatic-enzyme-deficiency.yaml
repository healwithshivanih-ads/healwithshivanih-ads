category: gut
summary: Insufficient production or secretion of pancreatic digestive enzymes (lipase,
  protease, amylase) by the exocrine pancreas, leading to incomplete breakdown of
  dietary fats, proteins, and carbohydrates in the duodenum and subsequent malabsorption.
