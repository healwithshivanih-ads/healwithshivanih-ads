slug: h-pylori-urease-ammonia-production
display_name: H. pylori Urease-Mediated Ammonia Production
aliases:
- urease activity
- ammonia-induced mucosal damage
category: gut
summary: H. pylori secretes urease, which hydrolyses urea in the gastric lumen to
  produce ammonia and CO2. Ammonia raises local gastric pH, disrupts the mucous layer,
  and creates a positive-feedback environment that promotes further bacterial colonisation
  and secondary organism overgrowth.
