evidence_tier: strong
sources:
- id: pizzorno-textbook-hpylori
  location: Helicobacter pylori section, p. 781
  quote: Low gastric output and low antioxidant content in gastrointestinal (GI) mucosa
    may predispose to H. pylori colonization, which in turn increases gastric pH,
    setting up positive feedback and increasing the risk for colonization of other
    organisms.
