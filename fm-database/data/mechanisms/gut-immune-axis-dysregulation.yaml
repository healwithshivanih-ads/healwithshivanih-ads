slug: gut-immune-axis-dysregulation
display_name: Gut–Immune Axis Dysregulation
aliases:
- gut immunity imbalance
- IgA suppression by fungal overgrowth
category: immune
summary: The gut mucosa is a primary site of immune regulation. IgA antibodies in
  the gut provide first-line defense against pathogens. Fungal overgrowth suppresses
  local IgA and systemic IgG antibody levels, weakening mucosal immunity and allowing
  persistent colonization. Dysbiosis also shifts innate-to-adaptive immune balance,
  promoting chronic immune activation.
