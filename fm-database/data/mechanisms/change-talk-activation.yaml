summary: In motivational interviewing, selectively evoking and reinforcing client
  statements that express desire, ability, reasons, need, commitment, activation,
  or taking steps toward change (DARN-CAT). Preferentially reflecting change talk
  over sustain talk shifts the client's internal narrative toward motivation for behavior
  change.
