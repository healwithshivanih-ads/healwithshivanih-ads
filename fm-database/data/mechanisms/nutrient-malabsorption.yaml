- micronutrient deficiency secondary to gut infection
category: gut
summary: H. pylori infection can impair gastric acid production and damage the gastric
  mucosa, reducing absorption of key micronutrients such as iron, vitamin B12, and
  zinc — all of which are required for healthy hair follicle function. This is the
  proposed pathway linking H. pylori to hair loss.
