slug: halogen-iodine-displacement
display_name: Halogen Displacement of Iodine
aliases:
- fluoride bromide chlorine iodine competition
- halide iodine displacement
category: endocrine
summary: Fluoride, bromide, and chlorine are halogens chemically similar to iodine
  and can compete with or displace iodine at the thyroid and elsewhere. Because the
  thyroid depends on iodine to make hormone, chronic exposure to these halogens in
  water and food is proposed to contribute to thyroid dysfunction.
