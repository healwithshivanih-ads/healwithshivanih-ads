notes_for_coach: This is foundational coaching content for any client with chronic fatigue / long COVID / fibromyalgia / autoimmune
  flare. Practical tools 'four-quarter day' (alternating activity / rest blocks), HRV monitoring (Oura, Whoop, Apple Watch),
  energy diary (1-10 scale rating before / after activities), 50% rule (do 50% of what feels possible — often counterintuitive),
  pre-emptive rest before known stressors, reframing rest as active recovery. The client's biggest psychological hurdle is
  letting go of productivity identity; this is real coaching work. Progress is non-linear — set expectations.
