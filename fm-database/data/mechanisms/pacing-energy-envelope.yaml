summary: A coaching framework — not a biological mechanism in the traditional sense — used in chronic fatigue, long COVID,
  fibromyalgia, autoimmune flare, and post-viral fatigue. The client's daily energy capacity is treated as a finite envelope;
  sustained activity above the envelope triggers post-exertional malaise (PEM) and prolongs recovery, while staying within
  ~50-70% of perceived capacity allows the body to rebuild over weeks to months. Pacing combines physical, cognitive, and
  emotional exertion as a single shared budget; rest is treated as active recovery rather than laziness. The opposite of 'push
  through' culture and a critical reframe for high-functioning achievers struggling with chronic fatigue.
