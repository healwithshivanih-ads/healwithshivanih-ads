slug: b12-absorption-impairment
display_name: B12 Absorption Impairment (Drug-Induced & Gut-Mediated)
aliases:
- metformin B12 depletion
- PPI B12 depletion
category: gut
summary: PPIs suppress gastric acid required for B12 liberation from food protein,
  while metformin impairs B12 absorption via the ileal calcium-dependent pathway.
  Both lead to subclinical then clinical B12 deficiency, accelerating neurological
  symptoms and hyperhomocysteinemia.
upstream_drivers:
- ppi-therapy
- metformin-therapy
- low-stomach-acid
downstream_effects:
