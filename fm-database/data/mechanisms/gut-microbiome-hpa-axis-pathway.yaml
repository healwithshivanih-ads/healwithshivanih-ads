summary: The gut microbiome communicates bidirectionally with the HPA axis. Microbial metabolites (SCFAs), postbiotics, and
  neurotransmitter precursors modulate cortisol secretion and sleep quality. Dysbiosis can amplify HPA reactivity, while beneficial
  microbiota and their postbiotic derivatives can attenuate it.
