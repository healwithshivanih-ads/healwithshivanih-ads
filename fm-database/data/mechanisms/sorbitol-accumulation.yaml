slug: sorbitol-accumulation
display_name: Intracellular Sorbitol Accumulation
aliases:
- sorbitol pathway activation
- aldose reductase pathway
- polyol pathway
category: metabolic
summary: Glucose is converted to sorbitol via aldose reductase in insulin-independent
  tissues (eye lens, nerves, kidneys, endothelium). Sorbitol cannot exit cells; osmotic
  effects cause cellular leakage of vitamin C, magnesium, potassium, inositol, and
  glutathione, increasing tissue damage susceptibility.
upstream_drivers:
- glucotoxicity
- hyperglycaemia
downstream_effects:
