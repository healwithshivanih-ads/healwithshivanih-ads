- diabetic-retinopathy
- diabetic-neuropathy
- diabetic-nephropathy
evidence_tier: strong
sources:
- id: pizzorno-cardiometabolic-diabetes
  location: Long-Term Complications
  quote: Intracellular sorbitol accumulation creates an osmotic effect that forces
    damaging leakage of amino acids, inositol, glutathione, niacin, vitamin C, magnesium
    (Mg), and potassium.
