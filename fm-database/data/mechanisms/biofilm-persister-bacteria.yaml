  location: Podcast — biofilm persister discovery segment
  quote: It's only in the last 10 years we discovered from John Hopkins University
    that these bacteria are very specific bacteria called biofilm persister bacteria.
    Just like when you go to the dentist to have them take plaque off your teeth —
    Porphyromonas gingivalis can go up into the brain and cause Alzheimer's. In a
    similar way, Lyme is a persister biofilm bacteria like tuberculosis, like leprosy.
