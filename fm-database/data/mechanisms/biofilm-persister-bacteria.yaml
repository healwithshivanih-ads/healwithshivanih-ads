category: immune
summary: A subpopulation of bacterial cells that exists in a dormant, metabolically
  inactive state inside protective biofilm matrices. Persisters survive standard antibiotic
  courses because most antibiotics require active bacterial metabolism to kill the
  organism. Documented across tuberculosis, leprosy, Helicobacter pylori, Porphyromonas
  gingivalis, and Borrelia burgdorferi. Discovered as the mechanism behind chronic
  Lyme persistence by Johns Hopkins, Stanford, University of New Haven, and Northeastern
  around 2015-2016. Therapeutic implication — short antibiotic courses fail; multi-drug
  regimens that hit cell-wall, intracellular, and cystic/persister forms simultaneously
  (TB-style or leprosy-style protocols, e.g. rifampin + dapsone + doxycycline) are
  required.
