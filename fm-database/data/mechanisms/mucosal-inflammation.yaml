slug: mucosal-inflammation
display_name: Colonic Mucosal Inflammation
aliases:
- intestinal-mucosal-inflammation
- colonic-inflammation
category: immune
summary: Prostaglandins, leukotrienes (especially LTC4, LTD4, LTE4), and monohydroxyeicosatetraenoic
  acid are greatly elevated in IBD colonic mucosa. Neutrophil-derived lipoxygenase
  products amplify inflammation and cause smooth muscle contraction. Flavonoid polyphenols
  (quercetin, curcumin) and omega-3 fatty acids downregulate these pathways.
