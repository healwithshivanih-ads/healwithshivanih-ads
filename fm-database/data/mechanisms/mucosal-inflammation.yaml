evidence_tier: strong
sources:
- id: pizzorno-textbook-gi
  location: Therapeutic Considerations — Eicosanoid Metabolism
  quote: Prostaglandins are greatly increased in colonic mucosa, serum, and stools
    of IBD patients. Increased synthesis of lipoxygenase products, leukotrienes, and
    monohydroxyeicosatetraenoic acid by neutrophils amplifies inflammation and causes
    smooth muscle contraction.
