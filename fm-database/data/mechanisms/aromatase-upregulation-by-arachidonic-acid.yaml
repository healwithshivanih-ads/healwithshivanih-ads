summary: Arachidonic acid increases aromatase enzyme activity. Aromatase converts
  androgens (e.g., testosterone) into estrogen, so excess AA from high omega-6 intake
  can contribute to estrogen dominance. Reducing omega-6 intake and increasing omega-3
  may help modulate this pathway.
