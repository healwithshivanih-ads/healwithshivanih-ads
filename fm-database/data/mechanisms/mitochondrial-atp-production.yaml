category: metabolic
summary: Mitochondria convert macronutrients and oxygen into ATP via oxidative phosphorylation.
  Key cofactors include B vitamins, magnesium, CoQ10, carnitine, and omega-3 fatty
  acids. Byproduct free radicals must be neutralized by antioxidants (ALA, vitamin
  C, NAC/glutathione, CoQ10) to prevent oxidative damage.
