slug: gag-layer-arterial-endothelium-damage
display_name: Glycosaminoglycan Layer Damage in Arterial Endothelium
aliases:
- gag-layer-disruption
- glycocalyx-erosion
- endothelial-gag-loss
category: structural
summary: The first event in atherosclerotic plaque formation is damage to the GAG
  (glycosaminoglycan) layer covering arterial endothelial cells. Drivers include insulin
  resistance, reactive oxygen and nitrogen species, impaired repair processes, heavy
  metal toxicity, hyperhomocysteinemia, and nitric oxide deficiency. Loss of GAG integrity
  creates affinity for lipoproteins to bind, monocytes and platelets to adhere, and
  smooth muscle cells to migrate into the intima — the cascade that becomes plaque.
