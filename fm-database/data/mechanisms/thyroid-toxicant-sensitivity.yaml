category: endocrine
summary: 'The thyroid is among the earliest organs to register toxicant exposure

  ("sentinel organ"). Endocrine disruptors — particularly BPA, phthalates,

  perchlorate, and certain flame retardants — impair thyroid hormone

  synthesis, transport, receptor binding, and peripheral T4-to-T3

  conversion. Individuals with existing thyroid disease (Hashimoto''s,

  hypothyroidism) appear more susceptible to toxicant-driven worsening.

  '
