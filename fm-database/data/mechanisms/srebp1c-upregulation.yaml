slug: srebp1c-upregulation
display_name: SREBP1c Upregulation of Desaturase/Elongase Enzymes
aliases:
- sterol-regulatory element binding protein 1C
- FREBP1C
- SREBP1
category: signaling
summary: SREBP1c (sterol-regulatory element binding protein 1C) is a transcription factor that upregulates desaturase and
  elongase enzyme production. Insulin activates SREBP1c, amplifying fatty acid conversion; glucagon inhibits it. Omega-3 fatty
  acids themselves inhibit SREBP1c, reducing excess pro-inflammatory fatty acid synthesis.
