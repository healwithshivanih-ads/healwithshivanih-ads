slug: cholesterol-to-pregnenolone
display_name: Cholesterol as Steroid Hormone Precursor
aliases:
- cholesterol-pregnenolone pathway
- steroid hormone foundation
category: metabolic
summary: Cholesterol is the foundational precursor for all steroid hormones. Adequate
  total cholesterol (ideally 163–200+ mg/dL) and optimal HDL (60–90 mg/dL) are prerequisites
  for pregnenolone synthesis, which then branches into progesterone, cortisol, and
  DHEA/testosterone/estrogen pathways. Statin-induced very low cholesterol can impair
  hormone synthesis.
upstream_drivers:
- dietary-fat-intake
- statin-use
- nutritional-deficiency
downstream_effects:
- pregnenolone-deficiency
- low-sex-hormones
- low-cortisol
related_mechanisms:
- cortisol-steal
- estrogen-progesterone-decline
linked_to_topics:
