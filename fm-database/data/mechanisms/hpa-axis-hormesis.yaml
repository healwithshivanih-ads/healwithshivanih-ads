category: endocrine
summary: Regular cold exposure acts as a hormetic stressor — a mild, repeated stress
  that trains the hypothalamic-pituitary-adrenal (HPA) axis. Over time, this adaptive
  conditioning may improve stress resilience, regulate cortisol responses, and upregulate
  protective proteins such as cold shock proteins and heat shock proteins.
