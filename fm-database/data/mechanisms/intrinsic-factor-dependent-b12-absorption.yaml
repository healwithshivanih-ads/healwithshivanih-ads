slug: intrinsic-factor-dependent-b12-absorption
display_name: Intrinsic Factor–Dependent B12 Absorption
aliases:
- intrinsic factor pathway
- B12 absorption mechanism
category: gut
summary: Vitamin B12 absorption requires intrinsic factor (IF), secreted by gastric
  parietal cells. B12 binds haptocorrin in the mouth for acid protection, transfers
  to IF in the duodenum after pancreatic protease action, and is absorbed at the terminal
  ileum. Disruption at any step (pernicious anemia, PPI use, pancreatic insufficiency,
  Crohn's) causes B12 deficiency.
upstream_drivers:
