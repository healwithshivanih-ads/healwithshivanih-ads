slug: heavy-metal-hypertensive-mechanism
display_name: Heavy Metal–Induced Hypertension
aliases:
- lead toxicity hypertension
- Pb-induced hypertension
category: other
summary: Heavy metals — particularly lead (Pb), mercury, cadmium, and arsenic — target
  the kidneys as end organs, impairing renal regulation of blood pressure. Blood lead
  is a strong, consistent predictor of both systolic and diastolic BP. Tibial (bone)
  lead is also associated with hypertension status.
