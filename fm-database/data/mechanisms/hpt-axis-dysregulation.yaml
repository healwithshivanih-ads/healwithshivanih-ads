category: endocrine
summary: The Hypothalamic-Pituitary-Thyroid (HPT) axis is the central regulatory loop
  for thyroid hormone production. The hypothalamus releases TRH → pituitary secretes
  TSH → thyroid produces T4/T3. Negative feedback keeps balance. Disruption by stress,
  inflammation, or pituitary damage impairs thyroid output.
