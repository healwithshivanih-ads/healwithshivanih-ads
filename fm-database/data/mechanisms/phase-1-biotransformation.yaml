slug: phase-1-biotransformation
display_name: Phase 1 Biotransformation (CYP450)
aliases:
- Phase I detoxification
- cytochrome P450 oxidation
- functionalization phase
category: metabolic
summary: 'Phase 1 is the first step of biotransformation, primarily carried out

  by the cytochrome P450 (CYP450) enzyme family — ~60 iron-containing

  enzymes that introduce or expose a functional group (typically hydroxyl)

  onto a lipophilic toxicant. Generates an "activated intermediate" that

  is often more reactive and oxidatively damaging than the parent

  compound. Phase 1 is inducible (toxicant exposure, phytochemicals,

  medications, hormones) and can be inhibited (grapefruit juice inhibits

  CYP3A4). Activity varies by genetic polymorphism, age, sex, nutrient

  status, and gut microbiome. Occurs in liver, gut, lungs, kidneys, skin,

  and blood-brain barrier.

  '
