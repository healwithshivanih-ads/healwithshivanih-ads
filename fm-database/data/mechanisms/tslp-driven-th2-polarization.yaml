slug: tslp-driven-th2-polarization
display_name: TSLP-Driven Th2 Polarization
aliases:
- thymic stromal lymphopoietin signaling
- TSLP-mediated allergic inflammation
category: immune
summary: Thymic stromal lymphopoietin (TSLP), an IL-7–like cytokine secreted by barrier-defective
  skin, profoundly triggers Th2 lymphocyte commitment and allergic inflammation. TSLP
  is elevated in AD skin biopsies, is upregulated by phthalate exposure and H. pylori,
  and sensitizes lungs to allergens — driving the 'atopic march' from eczema to asthma.
