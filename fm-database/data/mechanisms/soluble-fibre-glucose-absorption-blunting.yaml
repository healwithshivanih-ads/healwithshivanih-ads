category: metabolic
summary: Soluble fibres such as galactomannan in fenugreek form a viscous gel in the
  gut that slows gastric emptying and the rate of glucose absorption into the bloodstream,
  thereby blunting post-meal glucose spikes and reducing insulin demand.
