slug: tight-junction-dysfunction
display_name: Tight Junction Dysfunction
aliases:
- paracellular leak
- epithelial barrier breakdown
- zonulin-mediated permeability
category: gut
summary: Tight junctions between epithelial cells normally prevent paracellular transport
  of large molecules. When disrupted — by stress, infection, dysbiosis, food antigens,
  toxins, or nutrient deficiency — they allow peptides, LPS, and pathogens to translocate
  from the intestinal lumen into the bloodstream, triggering immune activation and
  systemic inflammation.
