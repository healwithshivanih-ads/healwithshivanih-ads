slug: mast-cell-degranulation
display_name: Mast Cell Degranulation
aliases:
  - mediator release
  - mast cell activation cascade
category: immune
summary: |
  The process by which mast cell granules release 200+ mediators (histamine,
  tryptase, prostaglandins, leukotrienes, cytokines) in response to triggers
  including IgE-allergens, temperature extremes, exercise, friction, venom,
  certain medications (NSAIDs, opioids, anesthetics, radiographic dyes),
  emotional stress, sleep deprivation, pain, and hormonal fluctuations.
upstream_drivers:
  - environmental-trigger-exposure
  - chronic-infections
  - mold-mycotoxin-exposure
  - gut-dysbiosis
  - hormonal-fluctuations
downstream_effects:
