slug: gluten-mediated-tight-junction-disruption
display_name: Gluten-Mediated Tight Junction Disruption
aliases:
- gliadin-induced intestinal permeability
- gluten enteropathy mechanism
category: immune
summary: Alpha-gliadin and related prolamins trigger T-cell–mediated immune responses
  in HLA-DQ2/DQ8–positive individuals, leading to villous atrophy, disaccharidase
  deficiency, and increased intestinal permeability. tTG-gliadin complexes stimulate
  further autoantibody production, perpetuating mucosal damage and allowing systemic
  antigen entry.
