  location: Celiac Disease — General Considerations — Pathogenesis
  quote: Tissue transglutaminase (tTG) is the autoantigen for AEA; enzyme-linked assay
    using recombinant tTG is highly sensitive and specific for CD. Anti-tTG antibody
    titers fall and can become undetectable during gluten-free diet; tTG-gliadin complexes
    stimulate gluten-specific T cells to induce anti-tTG antibody production.
