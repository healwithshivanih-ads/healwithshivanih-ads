slug: shbg-hormone-binding
display_name: SHBG Hormone Binding & Free Hormone Regulation
aliases:
- sex hormone binding
- free testosterone regulation
- SHBG transport
- SHBG binding capacity
category: endocrine
summary: SHBG binds testosterone and estrogen in the blood, rendering them biologically inactive. SHBG has higher affinity
  for testosterone than estrogen. Elevated SHBG reduces free testosterone; depressed SHBG increases free androgens and estrogens.
