summary: Magnesium acts as a natural calcium channel blocker, preventing calcium-driven
  vasoconstriction and promoting vascular smooth muscle relaxation. This mechanism
  underpins magnesium's role in managing hypertension, arterial spasm, asthma bronchospasm,
  Raynaud's phenomenon, and restless leg syndrome.
