category: immune
summary: Inflammation originating in the gut (from dysbiosis, leaky gut, or poor diet)
  can propagate to the brain via immune mediators, impairing brain function and contributing
  to mood disorders, anxiety, and depression. Short-chain fatty acids (SCFAs) produced
  by fiber fermentation help reduce this inflammation.
