category: endocrine
summary: In the menopausal transition, progesterone typically declines first, followed
  by estrogen. Low progesterone relative to estrogen creates a state of estrogen dominance.
  Later, absolute estrogen decline leads to bone loss, cardiovascular risk, cognitive
  changes, and urogenital atrophy.
