summary: Certain oral care ingredients (alcohol-based mouthwashes, SLS, triclosan,
  artificial sweeteners) disrupt the balance of beneficial and harmful oral bacteria,
  contributing to inflammation, oral lesions, and potential systemic health impacts
  through transmucosal absorption.
