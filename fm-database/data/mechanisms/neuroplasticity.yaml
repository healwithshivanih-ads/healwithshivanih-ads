category: neurological
summary: The brain can form new neural connections and strengthen new pathways through
  repeated thought patterns and behaviours throughout life. Old unused pathways shrink
  over approximately 21 days; new pathways consolidate in approximately 60 days. This
  mechanism underlies recovery from depression, negative thought patterns, insomnia,
  and emotional dysregulation.
