category: endocrine
summary: Excess sodium intake coupled with inadequate potassium intake causes fluid
  retention and expanded blood volume, directly raising blood pressure. From 40–60%
  of hypertensives are sodium-sensitive. Shallow breathing also induces sodium retention.
