summary: Folate, B12, choline, riboflavin, niacin, glycine, creatine, and TMG support
  methylation reactions critical for DNA synthesis, neurotransmitter production, homocysteine
  clearance, and histamine regulation. Genetic variants such as MTHFR, alcohol use,
  certain medications, pregnancy, and low dietary intake are upstream drivers.
