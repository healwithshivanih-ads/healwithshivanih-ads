category: neurological
summary: Bidirectional communication between gut microbiota and the CNS via vagus
  nerve, neurotransmitters (serotonin, GABA), hormones, and immune mediators. The
  gut produces ~90% of serotonin. Dysbiosis disrupts this signaling, contributing
  to anxiety, depression, and cognitive dysfunction.
