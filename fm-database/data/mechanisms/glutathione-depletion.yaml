summary: Glutathione is the primary intracellular antioxidant, composed of cysteine, glycine, and glutamic acid. Depletion
  is common in chronic disease and inflammation, driving oxidative stress and NF-κB activation. Oral glutathione supplements
  have poor bioavailability; precursors NAC and glycine are more effective at raising cellular glutathione. IV glutathione
  is the most clinically effective route.
