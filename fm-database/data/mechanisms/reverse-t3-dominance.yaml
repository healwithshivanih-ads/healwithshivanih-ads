category: endocrine
summary: When T4 is preferentially converted to inactive reverse T3 (rT3) instead
  of active T3, rT3 competes with T3 for receptor binding sites, blocking thyroid
  hormone action at the cellular level and producing hypothyroid-like symptoms despite
  normal serum labs.
