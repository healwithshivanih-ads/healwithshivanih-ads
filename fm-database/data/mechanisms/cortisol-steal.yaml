slug: cortisol-steal
display_name: Cortisol Steal (Pregnenolone Steal)
aliases:
- pregnenolone steal
- cortisol shunt
- progesterone conversion to cortisol
- HPA-axis hijack
category: endocrine
summary: Under chronic stress or inflammation, the body preferentially converts pregnenolone
  to cortisol via 17-hydroxypregnenolone, depleting the substrate available for DHEA,
  testosterone, estrogen, and progesterone synthesis. Results in elevated cortisol
  and suppressed sex hormone levels.
