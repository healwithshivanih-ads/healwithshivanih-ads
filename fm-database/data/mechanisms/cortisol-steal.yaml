sources:
- id: coconote-fm-estrogen-dominance
  location: Causes of Estrogen Dominance
  quote: If you are having a lot of stress, the entire progesterone is going to convert
    into 17 OH and the cortisol will consume everything to actually maintain your
    stressors or maintain the inflammations going on inside the body.
- id: coconote-fm-sex-hormones
  location: Cortisol Steal
  quote: as a part of stress response, the body tries to maintain cortisol level due
    to its central role in mounting a stress response. So, what happens, that whatever
    pregnenol is secreted from the cholesterol, the pregnenol will convert into 17-hydroxypregnenol
    and everything is going to convert into cortisol only
