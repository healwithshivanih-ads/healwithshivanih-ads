category: metabolic
summary: Homocysteine is an amino acid intermediate in the methionine cycle. Elevated homocysteine is associated with increased
  risk of cardiovascular disease, dementia, and depression. B12 and folate are essential cofactors for its re-methylation;
  MTHFR variants impair this pathway, increasing risk.
