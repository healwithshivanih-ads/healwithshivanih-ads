- vitamin-b12
evidence_tier: strong
sources:
- id: vitaone-nutrition-toolkit
  location: 'Food Sources: Folate'
  quote: Folate is essential for the metabolism of homocysteine, an amino acid that in high amounts may contribute to heart
    disease, dementia, and depression.
- id: coconote-fm-vitamin-b9-b12-mthfr
  location: Cofactors / Supplementation section
  quote: For the conversion of homocysteine to methionine, we need methionine synthase enzyme to be working. But with this
    enzyme, we need two important cofactors of B vitamin. That is one is methylcobalamin B12 and next is vitamin B9 that is
    methylfolate.
