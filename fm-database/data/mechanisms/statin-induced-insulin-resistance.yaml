category: metabolic
summary: Statin therapy has been associated with increased insulin resistance and
  progression of diabetes in patients already diagnosed with the condition, including
  greater likelihood of insulin treatment initiation and significant hyperglycaemia
  — as shown in the Mansi et al. JAMA Internal Medicine retrospective matched-cohort
  study.
