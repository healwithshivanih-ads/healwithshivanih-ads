evidence_tier: plausible_emerging
sources:
- id: vitaone-cvs-risk-assessment
  location: JAMA Internal Medicine reference (Slide 15)
  quote: This retrospective matched-cohort study found that statin use was associated
    with diabetes progression, including greater likelihood of insulin treatment initiation,
    significant hyperglycemia, acute glycemic complications, and an increased number
    of prescriptions for glucose-lowering medication classes.
