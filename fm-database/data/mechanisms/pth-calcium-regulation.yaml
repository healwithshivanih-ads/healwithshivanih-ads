category: endocrine
summary: Parathyroid hormone (PTH) raises serum calcium through osteoclast-mediated
  bone resorption, intestinal calcium absorption, renal calcium reabsorption, and
  activation of vitamin D to its active (D3) form. Low PTH results in decreased serum
  calcium.
