category: immune
summary: Once oxidized LDL is recognized as foreign, macrophages infiltrate the arterial
  wall and initiate an inflammatory process. This leads to foam cell formation, calcium
  deposition, and progressive plaque growth. Systemic markers such as hsCRP reflect
  this ongoing inflammatory state.
