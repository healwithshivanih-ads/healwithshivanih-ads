slug: autoimmune-thyroid-attack
display_name: Autoimmune Thyroid Attack (TPO/Tg Antibody Production)
aliases:
- TPO antibody production
- anti-thyroid antibody attack
- thyroid autoimmunity
- anti-TPO antibody attack
- thyroid peroxidase antibody response
- anti-thyroglobulin response
category: immune
summary: The immune system produces antibodies targeting thyroid peroxidase (TPO)
  and thyroglobulin (Tg), proteins essential for thyroid hormone synthesis. This antibody-mediated
  attack causes chronic thyroid inflammation and progressive glandular tissue destruction,
  ultimately reducing thyroid hormone output.
