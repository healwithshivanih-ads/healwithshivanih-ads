slug: pancreatic-enzyme-function
display_name: Pancreatic Enzyme Function in the Duodenum
aliases:
- pancreatic digestion
- duodenal enzyme cascade
category: gut
summary: The pancreas is the primary digestive organ in the duodenum, releasing sodium
  bicarbonate (to restore alkaline pH), pancreatic lipase (to further break down unsaturated
  fats emulsified by bile), pancreatic amylase (to finalise starch digestion begun
  by salivary amylase), and trypsin/chymotrypsin (the 'trypsin brothers', to finalise
  protein digestion begun by pepsin). Poor chewing upstream increases pancreatic burden.
