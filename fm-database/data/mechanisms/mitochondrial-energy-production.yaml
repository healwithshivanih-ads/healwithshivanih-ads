summary: Magnesium is a cofactor for >300 enzymes including those central to ATP production.
  B1 (thiamin), B2 (riboflavin), B3 (niacin), and B5 (pantothenic acid) are all required
  for the electron transport chain and Krebs cycle. CoQ10 is also essential and is
  depleted by statins.
