category: gut
summary: Age-related or medication-induced reduction in HCl production impairs protein
  digestion, mineral absorption (B12, iron, calcium, magnesium, zinc, copper), and
  immune defense against pathogens (H. pylori, parasites). Creates conditions for
  SIBO and candida overgrowth.
