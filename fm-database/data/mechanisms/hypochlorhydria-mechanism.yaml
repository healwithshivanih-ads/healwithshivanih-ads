category: gut
summary: Age-related or drug-induced decline in stomach acid (HCl) production. HCl
  is required for protein digestion, absorption of vitamin B12 and minerals (iron,
  calcium, magnesium, zinc, copper), and protection against pathogens. Low HCl permits
  small intestinal bacterial overgrowth and increases susceptibility to candida and
  parasites.
