category: metabolic
summary: Estrogens are metabolized in the liver via CYP enzymes (CYP1A1, CYP1B1) to
  hydroxylated intermediates (2-OHE1, 4-OHE1, 16-OHE1), then methylated by COMT to
  less harmful methoxy forms. The 4-OH pathway generates more carcinogenic metabolites.
  Genetic variants in COMT, CYP1A1, CYP1B1, and GST can impair clearance.
