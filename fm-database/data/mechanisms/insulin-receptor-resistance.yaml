slug: insulin-receptor-resistance
display_name: Insulin Receptor Resistance
aliases:
- cellular insulin insensitivity
- impaired insulin signaling
category: metabolic
summary: Chronic exposure to elevated insulin or metabolic stress alters insulin receptor
  sensitivity and downstream signaling, reducing the ability of cells to uptake glucose
  in response to insulin. This forces the pancreas to release more insulin to achieve
  the same glucose-lowering effect.
upstream_drivers:
- excess-dietary-glucose
- chronic-inflammation
- sedentary-lifestyle
