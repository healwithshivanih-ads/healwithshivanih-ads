slug: histamine-catabolism-dao
display_name: Intestinal Histamine Catabolism (DAO)
aliases:
- histamine degradation
- DAO enzyme pathway
- intestinal histamine clearance
- diamine oxidase pathway
- dietary histamine degradation
- gut histamine clearance
category: metabolic
summary: Diamine oxidase (DAO), expressed in intestinal epithelial cells, is the main
  enzyme degrading ingested histamine before it enters systemic circulation. DAO requires
  copper as a cofactor and is impaired by gut inflammation, SIBO, pathogenic bacteria,
  and certain drugs (metformin, NSAIDs). Reduced DAO activity allows histamine accumulation,
  triggering pseudo-allergic and inflammatory reactions.
