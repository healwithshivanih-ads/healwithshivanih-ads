summary: Insufficient methylation capacity, evidenced by elevated homocysteine (18–19
  µmol/L in the case), impairs phase 2 liver detoxification pathways including methylation
  of estrogen metabolites, DNA repair, and neurotransmitter synthesis. B12, folate,
  and specialised homocysteine-support supplements are used to restore methylation.
