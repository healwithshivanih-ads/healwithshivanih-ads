sources:
- id: pizzorno-womens-trio
  location: Osteoporosis — Pathophysiology (pp 723)
  quote: Bone remodeling is normally a balance of resorption and formation. Imbalance
    between removal and replacement causes bone loss and risk of fracture. After menopause,
    the loss accelerates to 2% per year during the first 5 to 10 years.
