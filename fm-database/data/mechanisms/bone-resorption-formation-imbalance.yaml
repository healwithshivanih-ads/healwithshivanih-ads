slug: bone-resorption-formation-imbalance
display_name: Bone Resorption-Formation Imbalance
aliases:
- bone-remodeling-imbalance
- osteoclast-osteoblast-uncoupling
- accelerated-bone-resorption
category: structural
summary: Bone is continuously remodelled by osteoclasts (resorption) and osteoblasts
  (formation). Imbalance favouring resorption drives osteoporosis. Drivers — estrogen
  decline (postmenopause accelerates loss to 2%/year for 5-10 years), vitamin D deficiency,
  vitamin K2 deficiency (impaired osteocalcin activation), elevated parathyroid hormone,
  diet-induced metabolic acidosis (animal protein + salt + sugar leach bone minerals
  to buffer), smoking (cadmium + nicotine + earlier menopause), sedentary lifestyle
  (osteoblasts require mechanical loading).
