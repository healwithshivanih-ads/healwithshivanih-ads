category: gut
summary: The stomach is the only acid environment in the GI tract. Parietal cells
  release hydrochloric acid, which activates pepsinogen to form pepsin — the enzyme
  that breaks down protein. Adequate stomach acid is essential for protein breakdown;
  insufficient acid (not excess) is proposed as the common clinical problem. Long-term
  antacid use impairs protein digestion and may allow partially digested proteins
  to reach the colon, fuelling pathogenic bacterial overgrowth.
