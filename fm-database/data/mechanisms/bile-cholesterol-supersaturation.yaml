sources:
- id: pizzorno-gi-trio
  location: Gallstones — Pathogenesis (pp 332-333)
  quote: Cholesterol and mixed stones require cholesterol supersaturation of bile
    within the GB. Bile solubility and supersaturation are based on relative molar
    concentrations of cholesterol, bile acids, phosphatidylcholine (lecithin), and
    water. Free cholesterol is water-insoluble — it must be in lecithin-bile salt
    micelle.
