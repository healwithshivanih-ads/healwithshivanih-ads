slug: bile-cholesterol-supersaturation
display_name: Biliary Cholesterol Supersaturation
aliases:
- bile-supersaturation
- cholesterol-saturation-bile
- impaired-cholesterol-solubility-bile
category: metabolic
summary: Free cholesterol is water-insoluble and must be held in lecithin-bile-salt
  micelles to remain in solution. Supersaturation occurs when cholesterol secretion
  outpaces lecithin and bile acid secretion — driven by estrogen excess, obesity,
  rapid weight loss, low dietary fat (<10g/day causing biliary stasis), and impaired
  bile flow. Supersaturated bile precipitates, forming gallstone nuclei that enlarge
  at ~2.6 mm/year. Lipotropic factors (choline, methionine), phosphatidylcholine,
  bile-flow botanicals (dandelion, artichoke, milk thistle, turmeric) shift the ratio
  back toward solubility.
