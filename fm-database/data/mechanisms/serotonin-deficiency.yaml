category: neurological
summary: Serotonin is the initiator of sleep and a key bowel motility regulator; its
  CNS synthesis depends on dietary tryptophan and cofactors vitamin B6, niacin, and
  magnesium. Kynurenine pathway diversion of tryptophan (blocked by niacin) reduces
  serotonin availability, contributing to insomnia and IBS symptoms.
