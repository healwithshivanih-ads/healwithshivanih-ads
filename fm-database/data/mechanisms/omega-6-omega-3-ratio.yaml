category: immune
summary: The Western diet typically features a high omega-6:omega-3 ratio (15–20:1),
  promoting a pro-inflammatory eicosanoid environment. Ratios of 4:1 or lower are
  associated with reduced inflammation and lower chronic disease risk. Increasing
  EPA/DHA intake is the primary leverage point.
