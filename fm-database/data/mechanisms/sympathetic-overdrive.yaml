category: neurological
summary: Persistent activation of the sympathetic 'fight-or-flight' branch of the
  autonomic nervous system, with reciprocally suppressed parasympathetic (vagal)
  tone. The body never enters its restorative 'rest-and-digest' state. Drives elevated
  resting heart rate, lowered heart-rate variability, shallow breathing, blood pressure
  reactivity, gut dysmotility, anxiety, fragmented sleep. Common in modern life;
  amplified by chronic psychological stress, trauma, screen time, lack of breath-work
  / movement, poor sleep, and inflammation. The end-organ effect of chronic HPA-axis
  dysregulation.
