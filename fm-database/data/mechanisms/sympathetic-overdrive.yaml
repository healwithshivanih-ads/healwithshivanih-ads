notes_for_coach: Coaching focus is daily nervous-system regulation, not motivation.
  Levers slow breathwork (4-7-8 breathing, box breathing, physiological sigh), vagal
  toning (gargling, humming, cold-face dunk, chanting), gentle yoga, walking in nature,
  digital sunset, magnesium glycinate, ashwagandha, theanine, restorative sleep practices.
  HRV (via Oura / Whoop / Apple Watch) is a great client-facing biofeedback signal
  — coach can show a measurable trend within 4-8 weeks.
