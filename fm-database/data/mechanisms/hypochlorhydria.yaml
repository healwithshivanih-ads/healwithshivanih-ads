slug: hypochlorhydria
display_name: Hypochlorhydria (Insufficient Gastric Acid)
aliases:
- achlorhydria
- gastric-acid-insufficiency
category: gut
summary: Decreased gastric acid secretion impairs protein digestion, mineral disassociation,
  and the antimicrobial acid barrier, predisposing to H. pylori overgrowth, SIBO,
  and multiple food allergies. H2 blockers and PPIs may perpetuate colonisation by
  raising gastric pH further.
