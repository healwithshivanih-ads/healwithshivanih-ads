category: structural
summary: Aneuploidy — eggs ending up with an incorrect number of chromosome copies
  — is the single largest cause of failed fertilisation, failed implantation, and
  first-trimester miscarriage. The mechanism is failure of the microtubule spindle
  apparatus that physically separates chromosome pairs during the first and second
  meiotic divisions. The spindle assembly occurs in the final weeks before ovulation
  and is acutely sensitive to ATP supply, oxidative stress, and chemical interference.
  Bisphenol A (BPA) directly disrupts spindle microtubule organisation; insufficient
  mitochondrial ATP prevents proper spindle assembly and chromosome pulling; reactive
  oxygen species damage spindle proteins. Because most aneuploidy errors occur in
  this brief preovulatory window, modifiable inputs in the 90-120 days before ovulation
  can meaningfully reduce aneuploidy rates, with implications for natural conception,
  IVF success, miscarriage risk, and Down syndrome incidence.
