category: immune
summary: Two H. pylori survival strategies drive antibiotic treatment failure. Biofilm
  formation — aggregated layers of bacteria protected by an extracellular polymeric
  matrix — physically blocks antibiotic penetration and shields the bacteria from
  immune cells. The coccoid (dormant) form converts the bacterium into a metabolically
  inactive spherical state that survives harsh gastric conditions and standard eradication
  regimens, then reverts to active spiral form when conditions improve. Together these
  explain the rising treatment failure rates and the rationale for adjunctive natural
  agents (mastic gum, sulforaphane, lactoferrin) that disrupt biofilm.
