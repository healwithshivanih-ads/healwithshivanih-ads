slug: ferritin-storage-depletion
display_name: Ferritin Storage Depletion as Early IDA Signal
aliases:
- iron store depletion
- low ferritin pre-anemia
category: metabolic
summary: Ferritin is the primary storage form of iron. As iron deficiency develops,
  the body mobilises ferritin reserves to maintain serum iron levels. This means ferritin
  falls before serum iron becomes abnormal, making it the most sensitive early biomarker
  of iron deficiency. Conversely, elevated ferritin can indicate systemic inflammation
  independent of iron status.
