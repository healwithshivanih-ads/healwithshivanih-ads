category: metabolic
summary: The methylation cycle converts homocysteine to methionine, which is then activated to SAM (S-adenosylmethionine),
  the universal methyl donor for DNA, RNA, protein, lipid methylation, neurotransmitter synthesis (dopamine, serotonin), and
  myelin production. Requires folate, B12, B6, and B2 as cofactors.
