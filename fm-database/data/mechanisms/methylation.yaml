category: metabolic
summary: A network of reactions transferring one-carbon methyl groups via SAMe to
  DNA, histones, neurotransmitters, phospholipids, and detoxification substrates.
  Requires activated folate (5-MTHF), methylcobalamin (B12), riboflavin (B2), and
  methionine. Impaired methylation elevates homocysteine and reduces SAMe availability
  throughout the body.
