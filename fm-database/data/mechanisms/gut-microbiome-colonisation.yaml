category: immune
summary: Gut flora is sterile in utero and first colonised during vaginal birth (via
  exposure to colonic microbiota) and through colostrum. 70% of the immune system
  is established via gut flora. The microbiome is responsible for final food breakdown,
  B vitamin and glutathione synthesis, melatonin release, and nutrient absorption.
  Antibiotics, statins, and long-term painkillers disrupt colonisation.
