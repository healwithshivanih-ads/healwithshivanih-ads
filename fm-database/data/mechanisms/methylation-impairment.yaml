category: metabolic
summary: Impaired methylation—due to MTHFR variants or deficiencies of B6, methylfolate
  (B9), or methylcobalamin (B12)—causes homocysteine to accumulate. Elevated homocysteine
  promotes LDL oxidation, endothelial injury, and thrombosis, making methylation a
  key upstream driver of cardiovascular risk.
