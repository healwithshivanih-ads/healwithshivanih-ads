slug: estrogen-recirculation-via-beta-glucuronidase
display_name: Estrogen Recirculation via Elevated Beta-Glucuronidase
aliases:
- beta-glucuronidase-driven estrogen reabsorption
- estrogen enterohepatic recirculation
- gut-driven estrogen dominance
category: endocrine
summary: Gut dysbiosis promotes overgrowth of beta-glucuronidase-producing bacteria.
  This enzyme deconjugates estrogen metabolites in the gut, preventing their excretion
  and allowing reabsorption into systemic circulation, thereby driving estrogen dominance.
  Calcium D-glucarate inhibits beta-glucuronidase to support estrogen clearance.
