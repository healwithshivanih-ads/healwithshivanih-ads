summary: Brain cells (85% water) conduct chemical messengers at 2–200 km/h in an isotonic
  mineral-rich fluid resembling seawater. Dehydration slows neurotransmitter speed
  and impairs PFC function. Magnesium from mineral-rich salts draws water inside cells,
  optimising the intracellular environment for nerve conduction.
