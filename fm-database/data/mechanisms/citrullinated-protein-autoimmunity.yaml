slug: citrullinated-protein-autoimmunity
display_name: Citrullinated Protein Autoimmunity (anti-CCP)
aliases:
- anti-ccp-antibodies
- acpa
- citrullinated-peptide-autoimmunity
- anti-citrullinated-protein-antibodies
category: immune
summary: Immune response targeting proteins that have undergone post-translational
  citrullination (arginine to citrulline by PAD enzymes). In genetically susceptible
  individuals (HLA-DRB1 shared epitope), citrullinated proteins from inflamed gum
  tissue (Porphyromonas gingivalis), lung (smoking), or gut (Proteus mirabilis) become
  neo-antigens. Anti-CCP antibodies appear up to 10-12 years before clinical RA, are
  >95% specific for RA, and predict more aggressive disease.
