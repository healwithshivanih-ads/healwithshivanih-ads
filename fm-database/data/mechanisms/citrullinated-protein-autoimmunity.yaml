sources:
- id: pizzorno-autoimmune-ra
  location: Rheumatoid Arthritis — Pathogenesis / Microbial Influences (pp 879)
  quote: Antibodies to Porphyromonas gingivalis are linked to elevated anti-CCP antibodies
    and perhaps to breaking immune tolerance to citrullinated antigens and promoting
    the autoimmune response in RA. Anti-CCP antibodies are present 10 years before
    diagnosis; specificity exceeds 95%.
