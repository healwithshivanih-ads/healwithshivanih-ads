category: immune
summary: The most consistent immune abnormality in Chronic Fatigue Syndrome (CFS)
  is decreased number and/or activity of natural killer (NK) cells — historically
  named "low NK cell syndrome." Low NK activity permits reactivation of latent viruses
  (EBV, CMV, HHV-6), elevated viral antibody titres, and altered cytokine profiles.
  Reduced lymphocyte response to stimuli likely from reduced interferon production.
  Often paired with HPA-axis dysregulation, mitochondrial dysfunction, gut dysbiosis,
  and elevated plasma neuropeptide Y.
