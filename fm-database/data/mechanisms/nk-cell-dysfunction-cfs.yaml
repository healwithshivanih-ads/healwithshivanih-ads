  location: Chronic Fatigue Syndrome — Immune system abnormalities (pp 215)
  quote: The most consistent abnormality is decreased number or activity of NK cells.
    NK cells destroy cancerous or virus-infected cells. (CFS was at one time called
    low NK cell syndrome.) Reduced lymphocyte response to stimuli is perhaps caused
    by reduced activity or production of interferon, found in most cases. Low interferon
    permits reactivation of latent viruses.
