slug: mitochondrial-coq10-depletion
display_name: Mitochondrial CoQ10 Depletion by Statins
aliases:
- statin-CoQ10 depletion
- ubiquinone deficiency
category: metabolic
summary: Statins inhibit the mevalonate pathway used for both cholesterol and CoQ10
  synthesis, reducing mitochondrial CoQ10 levels and impairing electron transport
  chain function. This is proposed to contribute to statin-associated muscle symptoms
  (myopathy, fatigue).
upstream_drivers:
- statin-therapy
downstream_effects:
