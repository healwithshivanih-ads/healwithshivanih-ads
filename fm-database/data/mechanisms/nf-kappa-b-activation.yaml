slug: nf-kappa-b-activation
display_name: NF-κB Activation
aliases:
- nuclear factor kappa B
- NF-kappaB pathway
- NF-kB signaling
category: signaling
summary: NF-κB is a master transcription factor present in all cells in an inactive
  form. Upon sensing inflammatory triggers (infection, toxins, tissue damage, food
  antigens, oxidative stress), NF-κB translocates to the nucleus, activating COX-1,
  COX-2, and LOX enzyme gene expression, and driving production of pro-inflammatory
  cytokines. Steroids are master NF-κB inhibitors; turmeric (curcumin) is a natural
  NF-κB inhibitor.
