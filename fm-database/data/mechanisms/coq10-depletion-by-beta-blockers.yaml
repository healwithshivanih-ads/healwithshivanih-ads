slug: coq10-depletion-by-beta-blockers
display_name: CoQ10 Depletion by Cardiovascular Medications
aliases:
- statin-induced CoQ10 depletion
- drug-induced CoQ10 deficiency
category: metabolic
summary: Beta blockers, statins (HMG-CoA reductase inhibitors), thiazide diuretics,
  centrally-acting antihypertensives, and metformin deplete CoQ10, a critical cofactor
  in mitochondrial energy production and antioxidant defense. This may worsen fatigue
  and impair cardiac muscle function.
