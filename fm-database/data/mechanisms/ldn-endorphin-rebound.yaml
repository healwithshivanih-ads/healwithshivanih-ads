slug: ldn-endorphin-rebound
display_name: LDN Endorphin Rebound Mechanism
aliases:
- low-dose naltrexone mechanism
- opioid receptor rebound
category: immune
summary: At low doses (1.5–4.5 mg), naltrexone transiently blocks opioid receptors
  for 4–6 hours, creating a perceived opioid deficiency. The body compensates with
  a rebound increase in endorphin and enkephalin production lasting 18–20 hours, which
  enhances immune regulation, reduces inflammation, regulates T-regulatory cells,
  and modulates GI tract function.
upstream_drivers:
