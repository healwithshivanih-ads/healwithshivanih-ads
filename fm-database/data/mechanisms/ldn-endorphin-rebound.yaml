sources:
- id: vitaone-thyroid-toolkit
  location: LDN History
  quote: Discovered that at lower doses, Naltrexone acted as a short-term antagonist
    (4-6 hours) and then had a 'rebound' effect of increasing the production of endogenous
    opioids such as endorphins and enkephalins.
