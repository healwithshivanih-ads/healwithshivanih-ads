slug: lps-mediated-immune-activation
display_name: LPS-Mediated Immune Activation
aliases:
- lipopolysaccharide trigger
- gram-negative endotoxin
category: immune
summary: Gram-negative bacteria in the gut release lipopolysaccharide (LPS) when they
  ferment fiber. LPS is a small enough particle to translocate from the gut lumen
  into the bloodstream even without overt 'leaky gut'. Once in circulation, LPS acts
  as a potent innate immune trigger, activating NF-κB and driving systemic low-grade
  inflammation. This is the primary mechanism by which gut dysbiosis causes systemic
  disease.
