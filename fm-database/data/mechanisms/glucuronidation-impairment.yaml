category: metabolic
summary: Glucuronidation is a major Phase 2 conjugation pathway in the liver that binds toxins and bilirubin to glucuronic
  acid, making them water-soluble for excretion. Genetic variants (e.g., UGT1A1 in Gilbert syndrome) or nutritional deficiencies
  can impair this pathway, reducing elimination of 40–50% of toxins processed by this route.
