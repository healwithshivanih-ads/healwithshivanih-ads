summary: 'Clock genes (CLOCK, BMAL1, PER, CRY families) encode the molecular

  oscillators that drive ~24-hour rhythms in nearly every cell. The

  central suprachiasmatic nucleus clock entrains peripheral tissue

  clocks (liver, gut, adipose, muscle) via light, feeding, and

  hormonal cues. Misalignment between central and peripheral clocks

  — driven by shift work, jet lag, irregular meal timing, late-night

  eating, or chronic blue light exposure — disrupts metabolic gene

  expression, glucose handling, lipid metabolism, and DNA repair

  cycles. Cited mechanism behind the association between shift work

  and reduced lifespan.

  '
