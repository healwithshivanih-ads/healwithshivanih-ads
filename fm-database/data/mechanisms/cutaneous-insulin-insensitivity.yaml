sources:
- id: pizzorno-acne
  location: Acne Vulgaris — Sugar, insulin, and chromium (pp 3)
  quote: Insulin efficacy in treating acne suggests cutaneous glucose intolerance
    and/or insulin insensitivity. Impaired skin glucose tolerance suggests that acne
    may be called "skin diabetes." A diet that encourages high insulin response chronically
    could promote acne by elevating IGF-1.
