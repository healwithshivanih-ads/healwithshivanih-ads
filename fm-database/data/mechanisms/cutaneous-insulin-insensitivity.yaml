slug: cutaneous-insulin-insensitivity
display_name: Cutaneous Insulin Insensitivity (Skin Diabetes)
aliases:
- skin-diabetes
- cutaneous-glucose-intolerance
- skin-insulin-resistance
- igf-1-driven-acne
category: metabolic
summary: Impaired glucose tolerance and insulin insensitivity at the skin level promote
  acne via IGF-1 amplification. Chronically elevated insulin and IGF-1 stimulate sebaceous
  androgen biosynthesis enzymes and sebum production. High-glycemic-load diets perpetuate
  the cycle; chromium and lower-carbohydrate (45% protein) diets reverse it. Mechanistically
  links acne to metabolic syndrome and PCOS.
