sources:
- id: pizzorno-skin-trio
  location: Psoriasis — Bowel Toxemia (pp 867-868)
  quote: Gut-derived toxins are implicated — endotoxins (compounds from cell walls
    of gram-negative bacteria), streptococci, Candida albicans, yeast, and IgE and
    IgA immune complexes. They increase cGMP in skin cells, promoting proliferation.
    Toxic metabolites of arginine and ornithine are polyamines (putrescine, spermidine,
    cadaverine) and are increased in psoriatics. Polyamines inhibit formation of cAMP,
    inducing excess cell proliferation.
