slug: bowel-toxemia-skin-axis
display_name: Bowel Toxemia → Skin (Gut-Skin Endotoxin Axis)
aliases:
- gut-skin-endotoxin-axis
- gut-derived-toxin-skin
- polyamine-skin-hyperproliferation
category: gut
summary: Gut-derived toxins (LPS endotoxins from gram-negative bacteria, Candida byproducts,
  IgE/IgA immune complexes) and polyamines (putrescine, spermidine, cadaverine from
  incomplete protein digestion) reach the skin via portal-then-systemic circulation,
  inhibit skin cAMP, raise cGMP, and drive keratinocyte hyperproliferation. The primary
  FM mechanism in psoriasis — controllable via HCl, pancreatic enzymes, bile flow,
  dietary fibre, sarsaparilla (binds endotoxins), Hydrastis (inhibits bacterial decarboxylase),
  probiotics, gluten elimination, alcohol elimination.
