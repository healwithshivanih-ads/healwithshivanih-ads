slug: yeast-acid-byproduct-cycle
display_name: Yeast Acid Byproduct Cycle
aliases:
- fungal acidosis cycle
- candida acidic metabolites
category: gut
summary: Yeast organisms metabolise sugars and produce acidic byproducts including
  acetic acid, uric acid, lactic acid, and ethanol. These byproducts lower cellular
  pH, creating an environment that further supports fungal growth—a self-reinforcing
  acidic cycle.
