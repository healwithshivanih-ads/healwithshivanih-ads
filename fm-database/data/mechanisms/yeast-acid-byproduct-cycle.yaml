sources:
- id: barbara-oneil-ph-balance
  location: Fruit and Yeast Section
  quote: As the yeast feeds on the sugar it gives off acetic acid, it gives off uric
    acid, it gives off lactic acid. So when someone is eating a lot of fruit and they
    have yeast in the body it can create a different environment.
