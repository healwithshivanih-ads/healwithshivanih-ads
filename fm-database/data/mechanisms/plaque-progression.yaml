- id: pizzorno-cardiometabolic-atherosclerosis
  location: Process of Atherosclerosis
  quote: Plaque grows until it either blocks artery directly or ruptures to form a
    clot that travels through general circulation until it occludes a blood vessel.
    Plaque instability poses greater risk for myocardial infarction (MI) or stroke.
    Targeting plaque stabilization appears to be more clinically important than simply
    enlarging the lumen.
