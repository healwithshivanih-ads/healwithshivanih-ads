summary: Diaphragmatic breathing and mindfulness practices stimulate the vagus nerve
  and parasympathetic nervous system, shifting the autonomic balance away from sympathetic
  'fight-or-flight' dominance toward a rest-and-digest state. This reduces heart rate,
  blood pressure, cortisol release, and perceived stress.
