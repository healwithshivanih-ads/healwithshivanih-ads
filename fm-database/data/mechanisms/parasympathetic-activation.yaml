sources:
- id: vitaone-health-coaching-toolkit
  location: Mindful Breathing
  quote: Abdominal breathing, or diaphragmatic breathing, is a powerful way to decrease
    stress by activating relaxation centers in the brain. The abdominal expansion
    causes negative pressure to pull blood into the chest, improving the venous flow
    of blood back to the heart.
- id: barbara-oneil-healing-mind
  location: Breathing Section
  quote: when you breathe in through your nose and out through your nose using your
    abdominal muscles, you stimulate your parasympathetic nervous system. And your
    parasympathetic nervous system is your peaceful, calming nervous system.
- id: vitaone-adrenal-toolkit
  location: The Relaxation Response
  quote: The Relaxation Response is a simple, effective, mind/body approach to relieving
    stress. Discovered by Dr. Benson at Harvard Medical School, it is routinely recommended
    to treat patients suffering from heart conditions, high blood pressure, chronic
    pain, insomnia, and many other physical ailments.
