summary: Good sleep raises melatonin, and higher melatonin is associated with reduced
  intestinal permeability, whereas poor sleep lowers melatonin and correlates with
  more leaky gut. Melatonin supplementation has also improved IBS symptoms — linking
  sleep quality mechanistically to gut-barrier integrity.
