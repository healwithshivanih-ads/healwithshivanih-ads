summary: EPA and DHA are precursors to resolvins (E-series from EPA, D-series from
  DHA), a class of specialized pro-resolving mediators (SPMs). Resolvins actively
  resolve inflammation by inhibiting neutrophil infiltration, promoting macrophage-mediated
  clearance, reducing pain and tissue swelling, and restoring tissue homeostasis without
  immunosuppression.
