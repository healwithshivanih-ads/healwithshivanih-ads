category: endocrine
summary: 'Bisphenol A binds estrogen receptors and disrupts hormonal signaling,

  metabolism, and cellular communication. Exposure routes include thermal

  receipt paper (transdermal absorption, enhanced by hand sanitizer),

  food and beverage packaging, plastic containers, and canned-food

  linings. Higher urinary BPA is associated with type 2 diabetes,

  obesity, cardiovascular disease, hepatic inflammation, certain

  cancers, thyroid dysfunction, and infertility (both sexes).

  BPA is relatively rapidly metabolized (days) — chronic exposure

  rather than persistence drives the body burden.

  '
