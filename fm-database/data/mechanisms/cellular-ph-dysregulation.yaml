category: metabolic
summary: Cellular pH normally sits around 6.5. When it drops significantly (toward 5.5), enzymatic reactions slow or malfunction,
  creating an environment that promotes cancer growth and fungal proliferation. Diet, stress, sleep deprivation, lack of oxygen,
  and excess acid-forming foods all contribute to lowering cellular pH.
