notes_for_coach: 'Practical translation: methyl donors supply the raw methyl groups;
  adaptogens direct WHERE they land. Both halves are needed — high-dose methyl donors
  without adaptogens can drive indiscriminate methylation. Food-first delivery (turmeric,
  green tea, rosemary, cruciferous, berries, onions/apples for quercetin) is the safe
  default.'
