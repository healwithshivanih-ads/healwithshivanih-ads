category: signaling
summary: 'A class of dietary flavonoid polyphenols and nutrient cofactors that nudge
  DNA methylation toward balance rather than blanket increase/decrease. Flavonoids
  (curcumin, EGCG, rosmarinic acid, quercetin, luteolin, sulforaphane, genistein)
  chiefly inhibit pathological hypermethylation (DNMT inhibition), while nutrient
  cofactors (vitamins A, C, D3, alpha-ketoglutarate) support the TET enzyme family
  that actively removes errant methyl groups. Net effect in the pilot trial: methyl
  groups were removed from beneficial youthful genes and added to pro-aging genes
  — a selective ''portfolio rebalancing'' rather than global demethylation.'
