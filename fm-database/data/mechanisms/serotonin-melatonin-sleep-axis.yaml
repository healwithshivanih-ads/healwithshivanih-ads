  location: Insomnia — Serotonin Precursor and Cofactor Therapy (pp 570)
  quote: Serotonin is the initiator of sleep; synthesis of central nervous system
    serotonin depends on tryptophan. Cofactors for serotonin synthesis — vitamin B6,
    niacin, and magnesium are given with tryptophan to ensure conversion to serotonin.
