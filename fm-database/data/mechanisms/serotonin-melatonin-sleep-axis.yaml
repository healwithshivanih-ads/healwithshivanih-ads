slug: serotonin-melatonin-sleep-axis
display_name: Serotonin-Melatonin Sleep Axis
aliases:
- tryptophan-serotonin-melatonin
- pineal-melatonin-pathway
- circadian-melatonin
category: neurological
summary: Sleep initiation depends on conversion of dietary tryptophan to serotonin
  (rate-limited by tryptophan hydroxylase with B6, niacin, and magnesium cofactors),
  then conversion of serotonin to melatonin in the pineal gland in response to darkness.
  Disruption at any step — low tryptophan intake, B6/Mg/niacin deficiency, blue light
  suppressing melatonin, age-related pineal decline — drives sleep-onset and sleep-maintenance
  insomnia.
