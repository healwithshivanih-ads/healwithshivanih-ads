summary: Activation of the lipoxygenase pathway (promoted by alternative complement
  activation) produces leukotrienes C4, D4, and E4 — 1000× more potent than histamine
  in promoting inflammation. Reducing dietary omega-6 and increasing omega-3 (EPA/DHA)
  shifts eicosanoid production away from pro-inflammatory products.
