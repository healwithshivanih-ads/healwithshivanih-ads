slug: neat-thermogenesis
display_name: NEAT Thermogenesis
aliases:
- non-exercise energy expenditure
- incidental activity thermogenesis
- background metabolic activity
category: metabolic
summary: 'The cumulative metabolic activity generated by non-structured daily

  movement — standing, walking, stair-climbing, fidgeting, household

  tasks. Distinct from basal metabolic rate (resting energy) and from

  exercise activity thermogenesis. Individuals vary considerably in

  baseline NEAT, with some genetically predisposed to lower spontaneous

  movement. Higher NEAT correlates with healthier body composition,

  better glucose regulation, and lower all-cause mortality independent

  of structured exercise. Modern environments systematically suppress

  NEAT through labor-saving technology.

  '
