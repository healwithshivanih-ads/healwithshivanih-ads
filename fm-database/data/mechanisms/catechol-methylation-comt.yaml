slug: catechol-methylation-comt
display_name: Catechol-O-Methyltransferase (COMT) Activity
aliases:
- COMT pathway
- catecholamine methylation
- dopamine clearance
- estrogen catechol methylation
category: endocrine
summary: COMT uses S-adenosylmethionine (SAM) to add a methyl group to catechol substrates
  including dopamine, norepinephrine, epinephrine, and catechol estrogens, rendering
  them inactive. Slow COMT variants accumulate these substrates (high energy/anxiety/estrogen
  effects); fast COMT variants clear them rapidly (low motivation/low estrogen effects).
  COMT activity is directly dependent on methylation status.
upstream_drivers:
- SAM availability (methylation status)
- COMT Val158Met genotype
- dietary catechol load
- estrogen load (HRT, OCP)
downstream_effects:
- dopamine-level-regulation
- estrogen-clearance
- norepinephrine-modulation
- mood-and-focus-phenotype
related_mechanisms:
- methylation
- estrogen-metabolism
linked_to_topics:
