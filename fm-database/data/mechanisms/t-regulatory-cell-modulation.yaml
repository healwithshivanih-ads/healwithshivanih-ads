category: immune
summary: T-regulatory (T-reg) cells are immune cells that suppress excessive immune responses and maintain self-tolerance.
  In autoimmune conditions, T-reg function is impaired. LDN appears to regulate T-reg cell activity (via IL-10 and TGF pathways),
  potentially dampening autoimmune attacks including those on the thyroid.
