category: gut
summary: Modern hybridised wheat has a significantly more complex gluten protein structure
  than ancestral varieties (Einkorn, Emmer, Spelt). This complexity makes it difficult
  for most people to digest, contributing to widespread gluten sensitivity. Sourdough
  fermentation partially breaks down this structure, reducing digestive burden.
