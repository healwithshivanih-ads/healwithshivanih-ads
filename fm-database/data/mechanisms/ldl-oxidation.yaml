slug: ldl-oxidation
display_name: LDL Oxidation
aliases:
- oxidized LDL
- ox-LDL
- lipid peroxidation
category: metabolic
summary: When LDL particles enter the subendothelial space and encounter an imbalance
  between antioxidants and oxidants, they become oxidized. Oxidized LDL is recognized
  as foreign by the immune system, triggering macrophage engulfment, foam cell formation,
  and the inflammatory cascade that drives plaque development.
