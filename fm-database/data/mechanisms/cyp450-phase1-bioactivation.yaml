category: metabolic
summary: Cytochrome P450 (CYP) enzymes in the liver (and to a lesser extent gut, lung,
  kidney) catalyze oxidation, reduction, or hydrolysis of lipophilic parent compounds
  (xenobiotics, pharmaceuticals) to produce reactive intermediate metabolites. These
  intermediates are more chemically reactive than the parent compound and must be
  rapidly processed by Phase 2 conjugation. Induction or inhibition of CYP enzymes
  by diet, drugs, or hormones modulates this step.
