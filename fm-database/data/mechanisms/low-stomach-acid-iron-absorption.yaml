slug: low-stomach-acid-iron-absorption
display_name: Low Stomach Acid Impairing Iron Absorption
aliases:
- hypochlorhydria iron malabsorption
- HCl iron conversion
- PPI-induced iron malabsorption
category: gut
summary: Hydrochloric acid produced by gastric parietal cells converts ferric iron
  (Fe³⁺) to the absorbable ferrous form (Fe²⁺) and initiates iron breakdown before
  absorption in the duodenum and jejunum. Conditions that reduce HCl — including PPI
  use, gastric bypass, hypothyroidism, and autoimmune gastritis — impair this conversion
  and reduce iron absorption.
