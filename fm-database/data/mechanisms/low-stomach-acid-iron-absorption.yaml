sources:
- id: coconote-fm-iron-deficiency-anemia
  location: Causes of Iron Deficiency / Malabsorption section
  quote: Our stomach produces hydrochloric acid. The parietal cells inside our stomach
    produces hydrochloric acid. This hydrochloric acid is primarily responsible for
    breaking the iron inside your stomach. So if someone has a low stomach acid, again,
    the absorption of the iron, breaking down the iron can be an issue.
