notes_for_coach: Recovery is months to years, not weeks. The single most damaging intervention is pushing graded exercise
  too early — it triggers PEM crashes that set recovery back. Coaching focus is pacing within the energy envelope (see pacing-energy-envelope),
  mitochondrial support (CoQ10, alpha-lipoic acid, B-complex, magnesium), HPA recovery, gentle vagal toning, anti-inflammatory
  diet, addressing co-existing infections (EBV reactivation common). Refer to long-COVID clinic if available; psychological
  support for grief / loss of function is essential.
