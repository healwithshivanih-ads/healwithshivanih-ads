category: immune
summary: Persistent fatigue, post-exertional malaise (PEM), brain fog, autonomic dysregulation, sleep disturbance, and immune
  dysregulation lasting weeks to years after a viral infection — most commonly COVID-19, EBV, influenza, dengue, or enterovirus.
  Hallmark finding is post-exertional malaise — a worsening of all symptoms 12-72 hours after even mild physical or cognitive
  exertion. Underlying mechanisms include mitochondrial dysfunction, viral persistence / reactivation, autoimmune cross-reactivity,
  microvascular / endothelial damage, microclots, and HPA-axis dysregulation. Pacing within an energy envelope is the single
  most important coaching strategy.
upstream_drivers:
- preceding viral infection (COVID-19, EBV, influenza, dengue, enterovirus)
- viral persistence / antigen reservoir in tissues
- ebv-reactivation
- HLA genetic susceptibility
- pre-existing dysautonomia / hypermobility
- pre-existing chronic stress / HPA dysregulation
- pre-existing gut barrier dysfunction
- immune dysregulation
- microvascular endothelial damage
- microclot-formation
- autoantibodies (against ACE2, GPCRs, etc.)
- vitamin D deficiency
- mast-cell-activation
- pre-existing mitochondrial fragility
