category: gut
summary: After use, estrogen is metabolized by the liver and excreted into the gut
  via bile. With adequate fiber and transit time, it is eliminated in stool. When
  transit time is slow (constipation), gut bacteria can deconjugate estrogen metabolites,
  allowing reabsorption into circulation — contributing to estrogen excess and associated
  conditions including breast cancer risk.
