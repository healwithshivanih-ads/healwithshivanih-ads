slug: histamine-mediated-gastric-acid-hypersecretion
display_name: Histamine-Mediated Gastric Acid Hypersecretion
aliases:
- histamine in ulcer formation
- histidine decarboxylase pathway
category: immune
summary: Histamine stimulates parietal cells to secrete gastric acid via H2 receptors.
  In PU, food allergy and H. pylori-driven inflammation elevate local histamine levels;
  histidine decarboxylase converts histidine to histamine. Flavonoids such as catechin
  inhibit histidine decarboxylase, reducing histamine in gastric tissue and exerting
  antiulcer effects.
