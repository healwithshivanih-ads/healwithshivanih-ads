category: metabolic
summary: Cold exposure stimulates the sympathetic nervous system to activate brown
  adipose tissue (BAT), which generates heat via uncoupled mitochondrial respiration.
  BAT activation increases energy expenditure and is linked to improved insulin sensitivity
  and reduced adiposity.
