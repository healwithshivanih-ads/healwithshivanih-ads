summary: Glutathione (GSH), a tripeptide antioxidant, conjugates with reactive intermediates via glutathione-S-transferase
  enzymes in Phase 2. This detoxifies electrophilic intermediates, reduces oxidative stress, and prepares the conjugate for
  biliary excretion. Glutathione depletion is a critical vulnerability in toxic overload states.
