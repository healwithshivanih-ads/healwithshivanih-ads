category: metabolic
summary: GST enzymes conjugate glutathione to electrophilic toxins and oxidised lipids,
  rendering them water-soluble for excretion. GPX enzymes use glutathione to neutralise
  hydrogen peroxide and lipid peroxides, preventing cell membrane damage. Both require
  adequate glutathione (itself requiring riboflavin for recycling) and selenium (GPX
  cofactor). Variants reduce detox and antioxidant capacity.
