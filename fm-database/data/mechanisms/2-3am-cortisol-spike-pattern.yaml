- adrenal-pattern insomnia
category: endocrine
summary: 'A clinically recognizable insomnia pattern: client wakes wide awake

  ("like an adrenaline shot") between roughly 2-3 a.m., often at a

  remarkably consistent time, without needing to urinate and without

  being a "grumbly" rouseable wakening. Maps to HPA axis dysregulation

  with abrupt or premature nocturnal cortisol rise. Cortisol normally

  reaches its diurnal nadir overnight; an early surge displaces the

  normal melatonin-dominant window and fragments sleep. Salivary

  cortisol + melatonin sampling at the 2 a.m. wake time can confirm

  the pattern: low melatonin with relatively high cortisol indicates

  the dysregulation.

  '
