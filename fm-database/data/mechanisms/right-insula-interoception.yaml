  quote: Our interoception, our ability to sense our own body map and plan and levels
    of inflammation, hormones, lives in the right insula. If you are left-hemisphere
    dominant and the right hemisphere is underdeveloped, you might not be able to
    feel your own body very well — you might not feel temperature, might not feel
    pain as directly.
