category: endocrine
summary: Chronic HPA activation preferentially shunts adrenal steroidogenesis toward
  cortisol, depleting DHEA and its downstream hormones. Low DHEA relative to cortisol
  is associated with fatigue, mood disorders, immune dysregulation, and accelerated
  ageing despite apparently normal cortisol on single-point testing.
