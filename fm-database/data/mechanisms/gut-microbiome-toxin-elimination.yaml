slug: gut-microbiome-toxin-elimination
display_name: Gut Microbiome Toxin Elimination
aliases:
- microbial detoxification
- intestinal detox
category: gut
summary: The gut microbiome provides a first-line defense against ingested xenobiotics. Beneficial bacteria can metabolize
  and sequester pesticides and other toxins before they are absorbed across the intestinal epithelium. An estimated 50–60%
  of ingested pesticide load may be eliminated by gut bacteria. Dysbiosis (loss of beneficial flora) impairs this defense
  and amplifies systemic toxic load.
