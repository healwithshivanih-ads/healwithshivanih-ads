slug: ovarian-follicle-depletion
display_name: Ovarian Follicle Depletion
aliases:
- follicular decline
- granulosa cell loss
- AMH decline
category: endocrine
summary: Age-related decline in ovarian follicle number and granulosa cell function
  leads to falling AMH, declining estrogen production, and rising LH/FSH as the pituitary
  attempts to compensate. This is the primary physiological driver of perimenopause
  and menopause.
