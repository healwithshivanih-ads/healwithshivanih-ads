slug: omega-3-vaginal-microbiome-modulation
display_name: Omega-3 Fatty Acids Modulating Vaginal Microbiome
aliases:
- fish oil vaginal health
- EPA DHA vaginal microbiome
category: immune
summary: Omega-3 fatty acids (EPA and DHA) at higher gram-level doses shift the vaginal
  microbiome to favor Lactobacillus crispatus and reduce the risk of premature labor
  when taken during pregnancy. Both EPA and DHA are necessary; EPA-only pharmaceutical
  preparations are considered suboptimal for this purpose.
