category: immune
summary: In food sensitivity, IgG antibodies bind to food-derived antigens in the
  bloodstream, forming immune complexes. These complexes activate complement pathways,
  leading to delayed inflammatory reactions (hours to days). The IgG antibody half-life
  of 23 days means the immune response is prolonged, requiring elimination diets of
  >4 weeks to see meaningful reduction in symptoms.
