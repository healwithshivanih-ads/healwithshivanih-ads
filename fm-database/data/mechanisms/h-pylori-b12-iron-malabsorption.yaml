  quote: H. pylori is identified as a cause of complications outside the stomach,
    specifically anemia resulting from Vitamin B12 deficiency and iron deficiency.
    Persistent colonization is linked to certain neurological disorders. B12 is essential
    for myelin sheath maintenance and for synthesis of neurotransmitters like serotonin
    and dopamine.
