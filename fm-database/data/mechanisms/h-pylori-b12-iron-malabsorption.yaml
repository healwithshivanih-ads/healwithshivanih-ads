category: gut
summary: Persistent H. pylori colonisation reduces gastric acid output and damages
  parietal cells over time. Low stomach acid impairs intrinsic factor secretion (required
  for B12 absorption) and iron solubilisation (required for iron absorption from food).
  Result — iron-deficiency anemia and B12-deficiency anemia are documented extragastric
  complications. B12 deficiency then drives downstream neurological symptoms (myelin
  sheath degradation, tingling/numbness, cognitive decline) and depressive mood (B12
  cofactor in serotonin/dopamine synthesis). Eradication therapy halts further depletion
  but reversal of advanced nerve damage depends on duration of deficiency.
