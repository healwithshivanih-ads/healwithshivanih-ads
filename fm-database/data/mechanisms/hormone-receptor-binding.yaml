slug: hormone-receptor-binding
display_name: Hormone Receptor Binding (Lock & Key / Ligand-Receptor)
aliases:
- ligand-receptor interaction
- binding pocket domain
- satellite dish signaling
- receptor occupancy
category: endocrine
summary: Hormones travel on binding proteins through the bloodstream and are extracted into nuclear receptor binding pocket
  domains. The receptor functions like a malleable pocket requiring nutritional cofactors (zinc, vitamin A, magnesium, iodine,
  P5P) to open, accept the hormone, and complete genetic signaling. Endocrine disruptors, heavy metals, and excess cortisol
  compete for these binding sites.
