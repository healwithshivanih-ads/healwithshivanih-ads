  location: Clinical Presentation of Low Stomach Acid
  quote: Because it's not able to digest the food, the undigested food tends to regurgitate
    out from the lower sphincter of your esophagus and it goes up into the esophagus
    giving a feeling of reflux, giving a feeling of burning sensation, giving a feeling
    of epigastric tightness, giving a feeling of fullness.
