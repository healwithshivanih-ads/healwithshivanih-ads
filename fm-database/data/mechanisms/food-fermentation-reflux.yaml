slug: food-fermentation-reflux
display_name: Undigested Food Fermentation Causing Reflux
aliases:
- fermentative reflux
- gas-induced reflux
- cardia incompetence from fermentation
category: gut
summary: When gastric HCl is insufficient, food remains poorly digested in the stomach.
  Microbial fermentation of this undigested material produces gas, increasing intragastric
  pressure. This pressure forces stomach contents upward through the lower oesophageal
  sphincter, producing symptoms indistinguishable from acid-hypersecretion reflux
  — including heartburn, belching, and epigastric burning.
