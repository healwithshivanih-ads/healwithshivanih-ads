slug: phase-1-phase-2-liver-detox
display_name: Hepatic Phase 1 & Phase 2 Estrogen Detoxification
aliases:
- liver estrogen conjugation
- hepatic biotransformation
- estrogen methylation
category: metabolic
summary: The liver processes estrogen through phase 1 (hydroxylation via CYP enzymes,
  producing 2-OH, 4-OH, and 16α-OH estrone metabolites) and phase 2 (conjugation for
  excretion via bile). The 2-OH pathway is protective. Impaired methylation (elevated
  homocysteine, low folate) reduces phase 2 conjugation, increasing recirculation
  of harmful metabolites.
