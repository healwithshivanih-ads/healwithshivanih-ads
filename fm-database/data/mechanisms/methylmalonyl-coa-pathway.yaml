slug: methylmalonyl-coa-pathway
display_name: Methylmalonyl-CoA Pathway
aliases:
- MMA pathway
- methylmalonic acid accumulation
category: metabolic
summary: Vitamin B12 (as adenosylcobalamin) is required for the enzyme methylmalonyl-CoA mutase (MMCM) to convert methylmalonyl-CoA
  to succinyl-CoA. Without B12, methylmalonic acid accumulates, causing axonal neuropathy manifesting as fatigue, confusion,
  and neurological dysfunction.
