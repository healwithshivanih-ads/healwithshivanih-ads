- hericenone-erinacine pathway
category: neurological
summary: Nerve growth factor (NGF) and brain-derived neurotrophic factor (BDNF) are
  the two principal neurotrophins maintaining neuronal survival, synaptic plasticity,
  and neurogenesis in the adult hippocampus and cortex. NGF in particular sustains
  cholinergic neurons whose loss is a hallmark of Alzheimer-type cognitive decline.
  Hericium erinaceus (Lion's Mane) contains two structurally distinct compound families
  that stimulate NGF synthesis — hericenones in the fruiting body and erinacines in
  the mycelium. Erinacine A is the most-studied and crosses the blood-brain barrier,
  making oral mycelium-based extracts mechanistically distinct from fruiting-body
  extracts. Downstream effects include preserved cholinergic transmission, enhanced
  hippocampal neurogenesis, and improved cognitive performance on standardised scales
  (HDS-R, MMSE). The pathway is also implicated in mood — Nagano 2010 found anxiolytic
  effects independent of NGF, suggesting parallel anti-inflammatory and serotonergic
  mechanisms.
