category: metabolic
summary: Reduced pancreatic enzyme output (assessed via low elastase on stool or blood
  microbiome testing) impairs digestion of fats, proteins, and carbohydrates, contributing
  to gut dysbiosis and malabsorption. Broad-spectrum digestive enzyme supplementation
  including lipase and protease is indicated.
