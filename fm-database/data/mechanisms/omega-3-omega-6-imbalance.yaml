category: metabolic
summary: A modern dietary pattern with an estimated 20:1 omega-6 to omega-3 ratio
  (vs. a target of approximately 3:1) creates a pro-inflammatory environment that
  promotes endothelial dysfunction and atherosclerosis. Correcting this ratio through
  therapeutic omega-3 supplementation and reduction of omega-6 sources is a key strategy
  in cardiovascular risk reduction.
