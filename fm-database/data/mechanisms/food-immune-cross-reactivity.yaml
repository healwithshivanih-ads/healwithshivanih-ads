category: immune
summary: Antibodies raised against one food protein (classically gliadin/gluten) can
  recognise structurally similar proteins in other foods and trigger the same inflammatory
  response. Commonly cited gluten cross-reactive foods include dairy (casein/whey),
  corn, rice, millet, oats, and yeast, which is a rationale for broad grain elimination
  in autoimmune protocols.
