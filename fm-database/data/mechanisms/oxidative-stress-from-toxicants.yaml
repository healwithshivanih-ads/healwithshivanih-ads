slug: oxidative-stress-from-toxicants
display_name: Toxicant-Induced Oxidative Stress
aliases:
- reactive intermediate oxidative damage
- Phase 1 oxidative stress
category: metabolic
summary: 'Phase 1 biotransformation produces highly reactive intermediates that,

  if not promptly conjugated by Phase 2, generate reactive oxygen species

  and damage cellular DNA, proteins, and lipids. Toxicants also directly

  induce oxidative stress via mitochondrial disruption and glutathione

  depletion. A primary mechanism linking chronic toxicant exposure to

  inflammation, accelerated aging, and chronic disease risk.

  '
