category: metabolic
summary: Body accumulation of POPs (PCDDs, PCDFs, DDE, bisphenol A, organophosphates)
  blocks insulin receptor sites and impairs insulin production. Elevated GGTP (>40
  IU/L) is an indirect biomarker and confers 20-fold increased diabetes risk.
