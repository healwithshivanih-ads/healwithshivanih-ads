category: metabolic
summary: Phase I detoxification uses cytochrome P450 enzymes to perform oxidation,
  reduction, hydrolysis, hydration, and dehalogenation reactions on lipid-soluble
  toxins, converting them into more polar intermediary metabolites. Key nutrients
  include riboflavin (B2), niacin (B3), pyridoxine (B6), folic acid, vitamin B12,
  glutathione, branched-chain amino acids, flavonoids, and phospholipids.
