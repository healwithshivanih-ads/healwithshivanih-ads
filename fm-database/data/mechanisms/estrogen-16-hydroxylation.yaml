sources:
- id: pizzorno-textbook-gi-2
  location: Cervical Dysplasia — Indole-3-carbinol (I3C) and diindolylmethane (DIM)
  quote: 'The body breaks down estrogen into two byproducts: 16α-hydroxyestrone, which
    promotes estrogen-dependent cancer; or 2-hydroxyestrone, which does not stimulate
    cancer cells. Women with HGSILs have altered estrogen metabolism, with higher
    16α-hydroxyestrone and lower 2-hydroxyestrogen than normal.'
