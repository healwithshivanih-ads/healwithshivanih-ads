slug: estrogen-16-hydroxylation
display_name: Estrogen 16α-Hydroxylation (Cancer-Promoting Pathway)
aliases:
- 16-hydroxyestrone pathway
- adverse estrogen metabolism
category: endocrine
summary: Estrogen can be metabolized to 16α-hydroxyestrone (promotes estrogen-dependent
  cancer) or to 2-hydroxyestrone (non-carcinogenic). Women with high-grade cervical
  dysplasia have elevated 16α-hydroxyestrone and reduced 2-hydroxyestrone. Indole-3-carbinol
  (I3C) and diindolylmethane (DIM) from cruciferous vegetables shift estrogen metabolism
  toward the protective 2-hydroxylation pathway.
upstream_drivers:
- low-cruciferous-vegetable-intake
- smoking
- oral-contraceptive-use
downstream_effects:
- cervical-dysplasia-progression
- estrogen-dependent-cancer-risk
