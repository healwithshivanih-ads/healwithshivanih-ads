category: metabolic
summary: 'Phase 2 conjugation reactions consume specific amino-acid and

  sulfur-containing substrates as their conjugating groups: glycine,

  taurine, glutamine, N-acetylcysteine (NAC), cysteine, and methionine.

  Each conjugation pathway has its own substrate — sulfation uses

  sulfate (from cysteine and methionine), glutathione conjugation

  uses glutathione (synthesized from cysteine, glycine, glutamate),

  amino acid conjugation uses glycine and taurine, methylation uses

  methionine-derived methyl groups. Low dietary protein or chronically

  high toxicant load can deplete these substrates and rate-limit

  Phase 2.

  '
