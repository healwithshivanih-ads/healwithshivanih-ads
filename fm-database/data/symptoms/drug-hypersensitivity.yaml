slug: drug-hypersensitivity
display_name: Drug Hypersensitivity / Adverse Drug Reactions
aliases:
- medication sensitivity
- drug intolerance
- over-reaction to medications
category: constitutional
severity: concerning
description: Exaggerated or unexpected reactions to standard pharmaceutical doses,
  often due to upregulated Phase 1 CYP450 activity rapidly generating high reactive
  intermediate levels, or downregulated Phase 2 failing to clear them.
when_to_refer: Always refer to prescribing clinician. Severe drug reactions are a
  medical emergency.
