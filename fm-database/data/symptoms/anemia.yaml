- pernicious anemia
- megaloblastic anemia
- low red blood cells
- low hemoglobin
category: cardiovascular
severity: concerning
description: Anemia is a condition resulting in insufficient red blood cells or hemoglobin. Iron deficiency is the most common
  cause, but B12 and folate deficiencies also cause distinct forms. Presents with fatigue, pallor, breathlessness, and reduced
  exercise tolerance.
when_to_refer: Refer for lab evaluation (CBC, ferritin, B12, folate) to establish cause. Supplementation protocol is clinician
  scope.
