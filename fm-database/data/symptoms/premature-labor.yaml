category: hormonal
severity: red_flag
description: Risk of labor before 37 weeks gestation. Loss of Lactobacillus crispatus
  allows cervical inflammation and premature cervical relaxation. Omega-3 supplementation
  (>3g EPA+DHA) during pregnancy also significantly reduces this risk. Preterm birth
  before 28 weeks carries very high NICU morbidity and mortality.
when_to_refer: Any signs of premature labor or cervical incompetence require immediate
  obstetric care.
