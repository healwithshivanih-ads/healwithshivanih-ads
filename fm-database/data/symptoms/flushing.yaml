category: skin
severity: common
description: 'Sudden redness of the skin — typically face, neck, upper chest — caused
  by

  rapid vasodilation via H1 and H2 receptors. In mast cell dynamics this is

  episodic and reproducible to triggers (high-histamine meals, heat, stress,

  alcohol). Often misdiagnosed as rosacea or anxiety-related blushing; the

  episodic, trigger-linked pattern is the distinguishing feature.

  '
when_to_refer: Refer if flushing co-occurs with hypotension, tachycardia, or throat
  tightness — possible anaphylaxis/MCAS pattern requiring immunology workup.
