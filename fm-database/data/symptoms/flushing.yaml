slug: flushing
display_name: Flushing
aliases:
  - facial flushing
  - sudden redness
  - skin flushing episodes
category: skin
severity: common
description: |
  Sudden redness of skin (face, chest, neck) indicating rapid vasodilation
  via H1/H2 receptor activation. Often misdiagnosed as rosacea or emotional
  anxiety; in mast cell dynamics it is a hallmark of episodic mediator
  release.
when_to_refer: |
  Refer if flushing is accompanied by hypotension, syncope, or throat
  tightness — possible anaphylactoid event.
