slug: non-responsive-anemia
display_name: Non-Responsive Anemia
aliases:
- iron-deficiency anemia not responding to iron
- refractory anemia
- treatment-resistant anemia
category: metabolic
severity: concerning
description: Anemia (often iron-deficiency) that does not improve with iron supplementation
  alone, potentially due to zinc deficiency reducing gastric acid production and thereby
  impairing iron absorption.
when_to_refer: Non-responsive anemia always requires medical evaluation to determine
  underlying cause.
