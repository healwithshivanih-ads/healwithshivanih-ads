description: Elevated serum triglycerides (>175 mg/dL is a risk-enhancing factor;
  >500 mg/dL is a medical emergency due to pancreatitis risk). Associated with small
  dense LDL, low HDL, insulin resistance, and metabolic syndrome.
when_to_refer: Triglycerides above 500 mg/dL require urgent clinician management to
  prevent pancreatitis.
