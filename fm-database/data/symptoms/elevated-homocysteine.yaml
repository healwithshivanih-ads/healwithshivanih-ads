description: Above-normal blood homocysteine levels indicating impaired methylation,
  B vitamin deficiency, or MTHFR dysfunction. Associated with cardiovascular disease,
  stroke, dementia, and neural tube defects.
when_to_refer: Refer to clinician for plasma homocysteine testing and cardiovascular
  risk assessment, especially if levels are chronically elevated despite B vitamin
  supplementation.
