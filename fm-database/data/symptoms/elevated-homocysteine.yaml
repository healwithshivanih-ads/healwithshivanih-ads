category: cardiovascular
severity: concerning
description: A metabolic marker of impaired methylation and B vitamin insufficiency.
  Elevated homocysteine damages vascular tissue and is associated with MTHFR mutations,
  thyroid dysfunction, cardiovascular risk, and recurrent miscarriage.
when_to_refer: Refer for cardiovascular risk assessment if significantly elevated.
  Requires clinician interpretation of homocysteine lab values.
