description: Elevated plasma homocysteine resulting from impaired remethylation, often
  a downstream marker of MTHFR dysfunction, low folate, low B12, low B6, or riboflavin
  insufficiency. Associated with cardiovascular risk and serves as a functional marker
  of methylation pathway adequacy.
when_to_refer: Refer to clinician if homocysteine is persistently elevated, especially
  with cardiovascular risk factors, neurological symptoms, or pregnancy.
