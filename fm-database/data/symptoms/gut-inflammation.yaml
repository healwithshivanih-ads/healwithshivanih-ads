category: gi
severity: concerning
description: Inflammation of the intestinal mucosa, ranging from mild (elevated calprotectin 50–200) to severe (calprotectin
  >200, IBD). May present with cramping, urgency, loose stools, and mucus or blood in stool.
when_to_refer: Fecal calprotectin >200 requires clinician evaluation to rule out IBD (Crohn's, ulcerative colitis). Blood
  in stool is a red flag.
