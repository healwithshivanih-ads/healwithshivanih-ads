slug: elevated-fasting-insulin
display_name: Elevated Fasting Insulin
aliases:
- high fasting insulin
- hyperinsulinemia
- high insulin levels
category: metabolic
severity: concerning
description: Fasting insulin above the functional range (>5 µIU/mL), indicating compensatory
  hyperinsulinemia and early insulin resistance even when fasting glucose appears
  normal.
when_to_refer: Refer if fasting insulin >15 µIU/mL or if accompanied by HbA1c ≥5.7%;
  evaluate for PCOS in females.
