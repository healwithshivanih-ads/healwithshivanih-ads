- scleral icterus
category: metabolic
severity: red_flag
description: Yellowing of the skin and eyes caused by markedly elevated bilirubin,
  typically associated with hepatitis or severe hepatic dysfunction. Distinguished
  from the mild unconjugated bilirubin elevations seen in Gilbert syndrome or Phase
  2 detox impairment.
when_to_refer: Immediate clinician referral required. Jaundice with high bilirubin
  may indicate hepatitis, biliary obstruction, or acute liver failure.
