description: Cluster of urinary symptoms common with prostate enlargement (BPH) —
  weak stream, hesitancy, dribbling, urgency, frequent night-time urination,
  incomplete emptying. Typically begins in 40s–50s, accelerates with age. Worth
  ruling out prostatitis and screening for prostate cancer in the appropriate
  context.
