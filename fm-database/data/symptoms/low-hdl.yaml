description: Low HDL (<42 mg/dL in men; optimal >55–60 mg/dL) is independently associated
  with increased cardiovascular events. HDL is anti-inflammatory, antioxidant, and
  anti-thrombotic. Every 1 mg/dL increase in HDL reduces risk 2% in men and 3% in
  women.
