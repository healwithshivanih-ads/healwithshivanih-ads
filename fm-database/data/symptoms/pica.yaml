slug: pica
display_name: Pica (Craving Non-Edible Substances)
aliases:
- ice craving
- pagophagia
- craving mud or sand
- non-food cravings
category: other
severity: concerning
description: Craving and consumption of non-edible substances such as ice, mud, or
  sand. A specific and diagnostically significant sign of iron deficiency, especially
  in children.
when_to_refer: Always refer for lab workup when pica is identified; it is a strong
  indicator of significant nutritional deficiency.
