  quote: Craving non-edible food which in medical term we call it a spika. So when
    you see some patient or maybe majorly seen as kids when they are craving for any
    kind of ice or non-edible foods like mud, sand, it's called a spica and again
    very crucial symptoms for distinguishing iron deficiency anemia.
