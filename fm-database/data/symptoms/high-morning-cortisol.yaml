category: hormonal
severity: common
description: Abnormally high cortisol levels in the morning, associated with chronic
  stress, HPA hyperactivation, and poor sleep quality. Can manifest as feeling wired,
  anxious, or fatigued despite waking.
when_to_refer: Refer if Cushing's syndrome is suspected (very high cortisol with physical
  signs such as central weight gain, stretch marks, moon face) or if adrenal insufficiency
  is possible.
