description: Persistent or recurrent feelings of sadness, diminished interest, or reduced positive affect. Targeted by gratitude
  journaling, social connection, and self-care practices.
when_to_refer: Refer if low mood persists beyond two weeks, is severe, or is accompanied by loss of function, hopelessness,
  or suicidal ideation.
