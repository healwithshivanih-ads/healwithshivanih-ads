description: Loose or watery stools, which may occur both as a symptom of SIBO/dysbiosis and as a transient die-off reaction
  when introducing high-count probiotic yogurt. Typically resolves within a few weeks with probiotic introduction.
when_to_refer: Persistent diarrhea >2 weeks, blood in stool, or severe dehydration.
