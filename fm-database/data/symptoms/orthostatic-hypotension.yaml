slug: orthostatic-hypotension
display_name: Orthostatic Hypotension
aliases:
- blood pressure drop on standing
- dizziness on standing
- postural hypotension
category: cardiovascular
severity: concerning
description: A drop in blood pressure of 20+ mmHg upon standing from a lying position,
  often causing dizziness or falls. Can indicate autonomic nervous system imbalance.
when_to_refer: Refer if falls occur, if syncope is present, or if associated with
  arrhythmia or neurological symptoms.
linked_to_topics:
- autonomic-nervous-system-dysregulation
- cardiometabolic-disease
linked_to_mechanisms:
- hpa-axis-dysregulation
sources:
- id: coconote-fm-biomarkers-cvs
  location: Autonomic Nervous System
  quote: When patients stand from lying down, they may be having a dizziness or they
    may be having a fall of blood pressure by 20 points. So that is orthostatic hypotension.
