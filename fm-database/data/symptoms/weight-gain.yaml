description: 'Unexplained or disproportionate weight gain — especially central /

  visceral — common in perimenopause and menopause. Driven by declining

  estrogen, insulin resistance, sleep disruption, cortisol shifts,

  and reduced muscle mass. Often resistant to caloric restriction alone.

  '
when_to_refer: 'Rapid (>5% body weight in <6 months) without lifestyle change; with

  edema, dyspnea, or facial fullness (rule out cardiac, renal, Cushing).

  '
