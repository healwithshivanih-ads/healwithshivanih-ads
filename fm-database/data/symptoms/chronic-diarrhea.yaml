description: Persistent loose or watery stools occurring in IBD, IBS, malabsorption,
  protozoan infection, and dysbiosis. In CD, ileal resection causes bile acid–induced
  osmotic diarrhea.
when_to_refer: Chronic diarrhea with weight loss, blood, or nocturnal symptoms requires
  clinician workup to exclude IBD, coeliac disease, or infection.
