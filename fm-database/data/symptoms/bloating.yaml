description: 'Subjective sensation of fullness or pressure in the abdomen, often

  accompanied by visible distension. Frequently postprandial; may worsen

  through the day. In perimenopause, frequently driven by hormonal

  shifts in motility, microbial diversity, and gut barrier integrity.

  '
when_to_refer: 'Persistent (>2 weeks) without clear dietary trigger; with weight loss;

  with blood in stool; with severe pain. Refer urgently if rapidly

  progressive in midlife women (rule out ovarian pathology).

  '
