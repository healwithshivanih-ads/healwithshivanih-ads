category: gi
severity: common
description: 'Heightened sensitivity to pain in internal organs, typically manifesting
  as

  severe abdominal cramping, bloating discomfort, or IBS-like pain

  disproportionate to imaging or endoscopic findings. Mast cell activation in

  the gut releases tryptase, which sensitizes enteric nerve endings and

  lowers the visceral pain threshold.

  '
when_to_refer: 'Refer to gastroenterology for red-flag features: weight loss, blood
  in stool, nocturnal pain, anemia, or pain unresponsive to dietary and stress modification.'
