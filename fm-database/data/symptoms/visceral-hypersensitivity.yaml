slug: visceral-hypersensitivity
display_name: Visceral Hypersensitivity
aliases:
  - gut hypersensitivity
  - IBS-like abdominal pain
  - lowered visceral pain threshold
category: gi
severity: common
description: |
  Increased pain sensitivity in internal organs, often manifesting as severe
  abdominal cramping or IBS-like pain. Mast cell activation in the gut
  releases tryptase, which degrades nerve endings and lowers the pain
  threshold in the enteric nervous system.
when_to_refer: |
  Refer if accompanied by red-flag GI signs: blood in stool, unexplained
  weight loss, nocturnal symptoms, or persistent vomiting.
