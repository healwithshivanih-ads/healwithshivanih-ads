description: Persistent low energy or exhaustion linked to low cortisol, low DHEA,
  chronic stress, HPA-axis dysregulation, low B12/iron, cortisol flattening, adrenal
  burnout, low adiponectin, low melatonin, loneliness, and neuroendocrine dysregulation.
when_to_refer: Refer if fatigue is severe, unexplained by lifestyle, or accompanied
  by Addison's-like symptoms, thyroid abnormalities, or unresponsive to sleep/stress
  interventions.
