category: neurological
severity: concerning
description: 'Severe, often unilateral headache with vascular and neuroinflammatory

  components. Histamine acts as a neurotransmitter and vasodilator and

  influences the vagus nerve. DAO deficiency is a primary suspect when

  migraines are reproducibly triggered by high-histamine foods (aged cheese,

  red wine, fermented foods, cured meats).

  '
when_to_refer: Refer to neurology for new-onset severe headache, focal neurological
  signs, headache with fever, or migraines unresponsive to dietary and lifestyle modification.
