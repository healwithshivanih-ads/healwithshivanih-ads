severity: concerning
description: |
  Severe headaches linked to histamine's role as a neurotransmitter and
  vasodilator affecting the vagus nerve. Histamine triggers neuroinflammation;
  DAO deficiency is a primary suspect when migraines correlate with
  high-histamine food consumption.
when_to_refer: |
  Refer for neurological evaluation if migraines are new-onset, escalating,
  or accompanied by focal neurological signs.
