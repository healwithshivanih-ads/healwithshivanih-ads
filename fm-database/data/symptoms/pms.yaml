description: Cyclical irritability, mood swings, bloating, or pain in the luteal phase.
  Lynch links this to slow COMT's reduced ability to clear catechol estrogens, with
  oestrogen-driven further COMT slowing creating a feedback loop.
when_to_refer: PMDD (severe, functionally impairing PMS) warrants clinician evaluation
  of hormones and consideration of SSRI or hormonal therapy.
