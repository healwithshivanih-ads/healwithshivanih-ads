sources:
- id: coconote-fm-body-composition-bmi
  location: Waist Circumference Section
  quote: Data has really shown that in the U.S., a waist circumference greater than
    40 inches for men and greater than 35 inches for women is concerning. And at that
    point, we definitely see an increased risk in terms of diabetes, hypertension,
    cardiovascular disease.
