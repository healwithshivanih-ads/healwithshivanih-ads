slug: increased-waist-circumference
display_name: Increased Waist Circumference
aliases:
- belly fat
- big belly
- pot belly
- central weight gain
category: metabolic
severity: concerning
description: Excess fat accumulation around the abdomen, measured at the midpoint
  between the 10th rib and iliac crest. In the US, >40 inches in men and >35 inches
  in women is clinically concerning. Stricter cut-offs apply for those of Asian descent
  (>35.5 inches men, >31.5 inches women).
when_to_refer: Refer when combined with elevated blood pressure, fasting insulin,
  triglycerides, or blood glucose for full metabolic syndrome evaluation.
