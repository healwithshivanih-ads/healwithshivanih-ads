description: Low testosterone in adult men presents as low libido, fatigue, loss of
  morning erections, mood changes (irritability, depression), loss of muscle mass,
  increased belly fat, brain fog, sleep disturbance, and reduced motivation. Often
  begins gradually in 40s–50s. Rule out medication effects, sleep apnoea, alcohol,
  and chronic stress before assigning to true endocrine deficiency.
