slug: carb-cravings
display_name: Carbohydrate & Sugar Cravings
aliases:
- carb addiction
- sweet cravings
- need for carbs at night
- bingeing on chocolate
category: metabolic
severity: common
description: An intense, recurring drive to eat simple carbohydrates or sugar, often
  experienced as a compulsion rather than hunger. In the MAOA framework, fast MAOA
  depletes serotonin rapidly; the body self-medicates with simple carbs to temporarily
  restore serotonin via the tryptophan pathway. Stress and inflammation exacerbate
  the cycle via the 'tryptophan steal'.
when_to_refer: If cravings are associated with binge-eating disorder, significant
  disordered eating, or are unresponsive to dietary intervention, refer to a clinician
  or eating-disorder specialist.
