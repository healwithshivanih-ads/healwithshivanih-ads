category: sleep
severity: common
description: 'Persistent drowsiness during waking hours, often peaking mid-

  afternoon, with reduced alertness, microsleeps, or a strong urge

  to nap. Common drivers: insufficient nighttime sleep duration,

  fragmented sleep from apnea or maintenance insomnia, blood sugar

  instability, hypothyroidism, anemia, and circadian misalignment

  (shift work, jet lag). In someone who insists they sleep adequate

  hours, this symptom should prompt screening for sleep apnea.

  '
when_to_refer: 'Refer if severe enough to risk safety (drowsy driving), or

  accompanied by signs of sleep apnea or narcolepsy.

  '
