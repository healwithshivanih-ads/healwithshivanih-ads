description: Muscle pain or weakness that can be a side effect of statin therapy.
  Ranges from mild myalgia to severe rhabdomyolysis in rare cases. The document describes
  a pathologist with muscle pain while on statins who resolved symptoms with magnesium
  supplementation.
when_to_refer: If muscle pain is severe, accompanied by dark urine, or creatine kinase
  is markedly elevated — refer to clinician immediately (possible rhabdomyolysis).
