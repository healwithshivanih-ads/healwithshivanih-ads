description: Male factor infertility — impaired sperm production, motility, or morphology
  contributing to a couple's difficulty conceiving. Functional medicine drivers include
  oxidative stress (smoking, alcohol, ultra-processed-food load, EMF, heat exposure),
  hormone dysregulation (low testosterone, elevated estradiol, high SHBG, elevated
  prolactin), nutrient deficits (zinc, selenium, vitamin D, B12, folate, CoQ10),
  varicocele, and chronic inflammation. Often missed because workups are female-first.
when_to_refer: Persistent inability to conceive after 12 months of regular unprotected
  intercourse (6 months if female partner over 35). Semen analysis + reproductive
  endocrinology workup (TT, fT, SHBG, FSH, LH, prolactin, estradiol) required before
  empirical coaching support.
