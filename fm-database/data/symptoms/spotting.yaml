category: hormonal
severity: common
description: Light bleeding or brown discharge occurring between menstrual periods.
  A classic symptom of relative estrogen dominance with low progesterone and/or anovulation.
  The endometrial lining, thickened by estrogen without opposing progesterone, continuously
  sheds in small amounts.
when_to_refer: If spotting continues for >2-3 cycles, refer for pelvic ultrasound
  to rule out fibroids or endometrial pathology.
