slug: elevated-serum-calcium
display_name: Elevated Serum Calcium
aliases:
- hypercalcemia
- high calcium on labs
category: metabolic
severity: concerning
description: Serum total calcium above the normal range (~10 mg/dL). Can be caused
  by hypothyroidism, acute inflammation/tissue damage, high-dose vitamin D supplementation,
  thiazide diuretics, or neoplasm.
when_to_refer: Refer to clinician if hypercalcemia is persistent or associated with
  neoplasm, unexplained inflammation, or medication use.
