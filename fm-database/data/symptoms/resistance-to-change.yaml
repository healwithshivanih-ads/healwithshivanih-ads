category: mood
severity: common
description: A client's expressed or behavioral reluctance to adopt recommended health
  behaviors, often stemming from ambivalence, past failure, fear, or external (rather
  than intrinsic) motivation.
when_to_refer: If resistance is rooted in significant mental health issues (e.g.,
  depression, trauma, clinical anxiety), refer to a mental health professional.
