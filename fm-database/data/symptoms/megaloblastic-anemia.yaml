slug: megaloblastic-anemia
display_name: Megaloblastic Anemia
aliases:
- megaloblastic anaemia
- large red blood cells
- macrocytic megaloblastic anemia
category: metabolic
severity: concerning
description: A type of anemia in which red blood cells are abnormally large and have
  impaired DNA synthesis, caused by folate or B12 deficiency. Presents with fatigue,
  pallor, dyspnea, and lethargy.
when_to_refer: Refer to clinician for blood count, B12/folate labs, and to rule out
  pernicious anemia or serious GI pathology.
linked_to_topics:
- folate-nutrition
- vitamin-b12
linked_to_mechanisms:
- intrinsic-factor-dependent-b12-absorption
- methylation
