description: >-
  Ejaculation occurring sooner than the man or his partner desires, causing
  distress. Multiple drivers — psychological (anxiety, performance pressure),
  hormonal (thyroid, prolactin), neurological (serotonin pathways), and pelvic
  floor. Often co-exists with erectile dysfunction.
