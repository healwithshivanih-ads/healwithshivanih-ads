slug: multiple-food-reactions
display_name: Multiple / Expanding Food Reactions
aliases:
- reacting to many foods
- new food sensitivities
- progressive food intolerances
- worsening food reactions
category: gi
severity: concerning
description: A pattern of reacting to an increasing number of foods over time, strongly
  suggestive of underlying intestinal permeability (leaky gut). Patients often report
  they had no food reactions for decades before suddenly developing multiple sensitivities.
when_to_refer: Refer to clinician to investigate intestinal permeability, dysbiosis,
  and possible autoimmune conditions if multiple food reactions are expanding rapidly.
