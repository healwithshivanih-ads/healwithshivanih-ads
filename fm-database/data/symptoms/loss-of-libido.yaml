slug: loss-of-libido
display_name: Loss of Libido
aliases:
- low sex drive
- reduced sexual desire
- decreased libido
category: hormonal
severity: common
description: 'Reduced sexual desire or interest, persisting for weeks or longer.

  Commonly reflects underlying hormonal, adrenal, thyroid, relational, or

  medication-related drivers. In the context of training, can be an early

  signal of metabolic overtraining and HPA-axis stress before more overt

  signs appear.

  '
when_to_refer: Persistent loss of libido warrants clinical workup — sex hormones,
  thyroid panel, cortisol pattern, medication review, and assessment for depression.
