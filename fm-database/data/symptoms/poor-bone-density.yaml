description: Reduced bone mineral density resulting from inadequate calcium mineralisation, often linked to deficiencies in
  vitamin D3 and/or vitamin K2 impairing osteocalcin activation and calcium absorption.
when_to_refer: Refer if DEXA scan is indicated or if client reports fractures from minimal trauma (osteoporosis).
