category: other
severity: common
description: Subjective complaint of eye dryness, grittiness, burning, fluctuating
  vision, or paradoxical reflex tearing. Distinct from dry-eye-syndrome (the clinical
  diagnosis) as a symptom that may be intermittent or situational. Common in screen-heavy
  work, contact lens users, perimenopausal women, T2DM, autoimmune conditions, and
  clients on anticholinergic medications.
when_to_refer: Persistent symptoms despite basic lifestyle measures (omega-3, screen
  hygiene, humidifier); pain or vision change; sicca pattern with dry mouth + joint
  pain → autoimmune workup.
