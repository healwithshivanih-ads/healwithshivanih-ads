slug: gastric-reflux
display_name: Gastric Reflux / GERD
aliases:
- acid reflux
- regurgitation
- GERD
- gastro-oesophageal reflux
category: gi
severity: common
description: Retrograde movement of gastric contents into the oesophagus. In hypochlorhydria,
  this is driven by intragastric pressure from fermented, undigested food rather than
  excess acid, yet it mimics classic acid reflux symptomatically.
when_to_refer: Refer if symptoms persist > 3 months despite protocol, if patient has
  dysphagia, unexplained weight loss, or if endoscopy has not been performed.
