severity: common
description: 'Adequate sleep duration on paper but waking unrefreshed, with

  persistent daytime fatigue and poor cognitive performance. A useful

  screening question: "Do you dream?" Absent dream recall often

  signals insufficient deep/REM sleep architecture — the restorative

  stages — and points toward sleep apnea, alcohol use, certain

  medications, or chronically high cortisol. Sleeping medications

  often produce a suspended state without restoring this

  architecture.

  '
when_to_refer: 'Refer for sleep study if accompanied by snoring, witnessed apneic

  episodes, morning headaches, or hypertension.

  '
