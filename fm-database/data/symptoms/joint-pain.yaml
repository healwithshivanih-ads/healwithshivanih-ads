description: The most common extra-intestinal manifestation of IBD, occurring in 25%
  of patients. May be peripheral (knees, ankles, wrists) proportional to bowel disease
  activity, or axial (ankylosing spondylitis–like) in HLA-B27 positive patients.
when_to_refer: Spinal involvement with HLA-B27, or joint symptoms preceding bowel
  diagnosis, requires rheumatology evaluation.
