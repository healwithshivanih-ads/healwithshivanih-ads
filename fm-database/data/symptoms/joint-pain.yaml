description: 'Pain, soreness, or stiffness in one or more joints. New-onset

  perimenopausal joint pain (often hands, knees, hips) is common and

  thought to relate to declining estrogen''s effect on cartilage and

  synovium plus inflammatory shifts.

  '
when_to_refer: 'Morning stiffness > 60 minutes (think autoimmune); new joint swelling;

  with fevers, rash, or weight loss; with anti-CCP suspicion (RA workup).

  '
