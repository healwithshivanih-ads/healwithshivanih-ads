severity: common
description: Persistent or recurrent itching of the skin, particularly in genital,
  anal, or skin fold areas. A classical sign of fungal infection. Anal itching may
  suggest parasitic infection (especially in children). Systemic itching may indicate
  fungal overgrowth, liver involvement, or allergic response.
when_to_refer: Refer if itching is associated with jaundice or systemic symptoms suggesting
  hepatic or haematological cause.
