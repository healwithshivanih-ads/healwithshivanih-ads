slug: imposter-syndrome-coach
display_name: Imposter Syndrome (New Coach)
aliases:
- not feeling qualified
- doubting your coaching value
- fear of not being good enough as a coach
category: mood
severity: common
description: A psychological pattern in which new or early-career coaches doubt their
  competence, credentials, or right to charge for their services, often rooted in
  lack of client success stories, early conditioning, or cultural messaging around
  money and worth.
when_to_refer: If imposter syndrome is severe and persistent, contributing to anxiety
  or inability to launch a practice, consider referral to a therapist or mentor coach.
