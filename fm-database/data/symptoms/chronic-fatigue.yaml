description: 'Persistent low energy out of proportion to activity, often with

  reduced exercise tolerance and slow recovery. In a toxicant-load

  context, frequently reflects mitochondrial disruption — toxicants

  poison the same ATP-producing organelles needed to power

  detoxification, creating a self-reinforcing low-energy loop.

  '
