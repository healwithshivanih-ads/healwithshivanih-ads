description: Common in IBD due to decreased oral intake from pain and nausea, malabsorption,
  protein-losing enteropathy, and increased metabolic demands of inflammation. Present
  in 65–75% of hospitalised IBD patients.
when_to_refer: Any unintentional weight loss requires clinician workup to exclude
  malignancy, IBD, or malabsorption.
