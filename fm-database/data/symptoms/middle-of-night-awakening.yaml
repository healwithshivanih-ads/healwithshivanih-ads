description: 'Awakening in the middle of the night — classically 2-3 a.m. —

  often with abrupt wide-awake alertness rather than rouseable

  grogginess. Without bathroom urgency. Highly characteristic of

  HPA axis dysregulation with premature cortisol rise. Distinguish

  from rouseable awakening with bathroom need (more often hydration

  or prostate-related), and from awakenings driven by snoring/apnea

  (witnessed gasping, partner report, morning headache).

  '
when_to_refer: 'Refer if associated with witnessed apneic episodes, gasping,

  hypertension, or daytime sleepiness severe enough to impair driving

  or work — clinician evaluation for sleep apnea.

  '
