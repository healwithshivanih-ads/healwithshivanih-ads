slug: protein-deficiency
display_name: Protein Deficiency
aliases:
- low protein
- hypoproteinemia
category: metabolic
severity: common
description: Insufficient dietary or absorbed protein, often manifesting as low albumin
  and elevated BUN. Can drive apparent hypocalcemia because less albumin is available
  to carry calcium in serum.
when_to_refer: Refer if serum albumin is significantly depressed; may indicate malabsorption,
  liver dysfunction, or inadequate intake.
linked_to_topics:
- calcium-deficiency
- hypochlorhydria
linked_to_mechanisms:
- albumin-calcium-binding
- reduced-gastric-acid-calcium-absorption
