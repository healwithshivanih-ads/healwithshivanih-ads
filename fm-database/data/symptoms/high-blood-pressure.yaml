  location: 'Chapter 10 — NOS3: Heart Issues'
  quote: When your blood vessels don't dilate properly, the blood flowing through
    them puts more pressure on the vessel walls. This can happen even when you're
    otherwise in pretty good health. It's called essential hypertension.
