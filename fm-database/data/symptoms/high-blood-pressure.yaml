category: cardiovascular
severity: concerning
description: Sustained elevation of blood pressure. In the NOS3 framework, impaired
  nitric oxide production reduces vasodilation, increasing pressure within vessel
  walls. Mouth-breathing, sinus congestion, stress, and inactivity can all compound
  this effect.
when_to_refer: Always refer for blood pressure measurement and medical management;
  lifestyle coaching is adjunctive only.
