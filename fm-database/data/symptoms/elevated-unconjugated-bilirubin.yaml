category: metabolic
severity: concerning
description: Mildly elevated unconjugated (indirect) bilirubin with a borderline conjugated
  fraction suggests impaired Phase 2 glucuronidation, potentially indicating Gilbert
  syndrome or acquired detox pathway dysfunction. Unlike hepatitis-pattern jaundice,
  levels are mildly elevated rather than markedly high.
when_to_refer: Refer if bilirubin is markedly elevated, accompanied by jaundice (yellow
  eyes/skin), or if hepatitis pattern is suspected.
