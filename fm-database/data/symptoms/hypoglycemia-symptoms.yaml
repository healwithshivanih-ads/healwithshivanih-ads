description: Dizziness, irritability, or sleepiness when going without food for 4–5
  hours; relieved by eating. Associated with low cortisol impairing gluconeogenesis.
when_to_refer: If symptoms are severe or occur frequently, refer for glucose tolerance
  and cortisol testing.
