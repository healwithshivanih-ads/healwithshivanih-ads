category: metabolic
severity: concerning
description: GGT (gamma-glutamyl transferase) elevation above the functional medicine optimal threshold of 70 U/L is interpreted
  as a primary marker of increased toxic load and impaired Phase 2 detoxification. May be asymptomatic or accompanied by fatigue
  and chemical sensitivity.
when_to_refer: Refer to clinician if GGT is significantly elevated, rising trend is observed, or accompanied by other liver
  enzyme abnormalities suggesting hepatocellular damage.
