  quote: The primary enzyme that is elevated in any kind of toxic load is your GTP. And the patient on the digital level is
    65. When you look at the digital level, it should be less than 70 optimal. If you find out any way that increase from
    70 means we have to work in this patient in a detoxification pathway.
