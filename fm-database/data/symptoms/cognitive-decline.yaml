description: Progressive decline in memory, executive function, and cognitive processing
  associated with hippocampal shrinkage, declining sex hormones, elevated FSH, and
  low magnesium. Hormonal support and nutritional optimization are proposed protective
  strategies.
when_to_refer: Any progressive cognitive decline warrants prompt referral to neurologist
  and hormone-trained clinician.
