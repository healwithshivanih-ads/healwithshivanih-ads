category: gi
severity: concerning
description: Burning sensation in the chest or throat caused by stomach acid rising
  into the oesophagus due to a weakened cardiac sphincter. Often worsened by large
  evening meals, lying down after eating, and drinking large amounts of fluid with
  meals.
when_to_refer: Refer if oesophageal ulceration is suspected, if symptoms are unresponsive
  to dietary/lifestyle change, or if long-term PPI use is in place.
