slug: daytime-fatigue
display_name: Daytime Fatigue
aliases:
- excessive daytime sleepiness
- daytime tiredness
- always tired
category: constitutional
severity: common
description: Persistent daytime fatigue may indicate undiagnosed obstructive sleep
  apnea, which is a significant cardiovascular risk factor. Also associated with metabolic
  dysfunction, anemia, thyroid dysfunction, and depression.
when_to_refer: If sleep apnea is suspected, refer for formal sleep study. Fatigue
  with cardiac symptoms warrants urgent evaluation.
