  - environmental sensitivity
  - reactive to chemicals
category: neurological
severity: concerning
description: |
  Chemical sensitivity refers to heightened physiological reactions to
  low levels of environmental chemicals, fragrances, solvents,
  plastics, or cleaning products. Symptoms may include headaches,
  brain fog, fatigue, dizziness, mood changes, or irritation after
  exposure to everyday products.
when_to_refer: 'Refer if symptoms are severe, progressive, neurological, respiratory, or interfere significantly with daily functioning.'
