description: Asthma is driven by leukotriene-mediated bronchospasm and elevated arachidonic
  acid content in eosinophils. An omega-6:omega-3 ratio of 5:1 has shown benefit.
  EPA and DHA supplementation has reduced cysteinyl leukotrienes and cytokines in
  children with asthma.
when_to_refer: Refer to clinician for active asthma management; EPA/DHA is adjunctive,
  not a replacement for prescribed medications.
