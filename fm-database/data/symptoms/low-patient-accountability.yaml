slug: low-patient-accountability
display_name: Low Patient Accountability & Follow-Through
aliases:
- poor care plan adherence
- not sticking to the plan
- low motivation between appointments
- drop-off between visits
category: other
severity: common
description: A pattern in which patients begin a functional medicine care plan but
  fail to maintain consistent adherence between provider appointments due to lack
  of support, unclear next steps, or motivational gaps.
when_to_refer: Persistent non-adherence despite coaching may indicate underlying depression,
  anxiety, or executive function challenges — consider referral to mental health or
  occupational therapy.
