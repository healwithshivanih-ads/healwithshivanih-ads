slug: care-plan-overwhelm
display_name: Care Plan Overwhelm
aliases:
- information overload after provider visit
- too many health recommendations at once
- overwhelmed by health plan
category: neurological
severity: common
description: A patient's experience of feeling overwhelmed after receiving a complex,
  multi-step functional medicine care plan (diet, supplements, stress management,
  lifestyle changes) in a single appointment, leading to poor implementation and adherence.
when_to_refer: If overwhelm is accompanied by significant anxiety, depression, or
  inability to function, refer to a mental health professional.
