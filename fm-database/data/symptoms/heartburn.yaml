description: A burning sensation rising from the stomach or lower chest, classically
  attributed to acid hypersecretion but frequently caused by low stomach acid with
  reflux of undigested, fermenting food.
when_to_refer: If unresponsive to dietary and lifestyle changes, or if dysphagia/weight
  loss is present, refer to gastroenterologist to rule out Barrett's oesophagus or
  other structural pathology.
