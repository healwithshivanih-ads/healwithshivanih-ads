description: Burning retrosternal sensation caused by reflux of gastric contents into
  the oesophagus. Most often caused by overeating, obesity, chocolate, fried foods,
  alcohol, and carbonated beverages — not by excess acid production.
when_to_refer: Persistent reflux unresponsive to lifestyle measures, dysphagia, or
  weight loss warrants endoscopy.
