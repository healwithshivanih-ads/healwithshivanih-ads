slug: incontinence
display_name: Urinary Incontinence
aliases:
- stress incontinence
- urge incontinence
- leaky bladder
- bladder leakage
- coughing leakage
category: urinary
severity: common
description: Involuntary loss of urine, particularly with coughing, sneezing, bearing
  down, or urgency. Associated with loss of Lactobacillus crispatus in vaginal and
  bladder microbiomes. Oral crispatus restoration has been shown in exploratory studies
  to reduce incontinence by approximately half.
when_to_refer: If severe, progressive, or associated with prolapse or neurological
  symptoms—refer to urogynecology.
