category: mens_health
severity: common
description: Reduced or absent nocturnal/morning erections in adult men. A useful
  marker because nocturnal erections reflect endogenous testosterone and vascular
  health rather than psychological state. Loss often precedes daytime erectile
  dysfunction by months to years and signals investigation of testosterone,
  cardiovascular, sleep apnoea, and metabolic markers.
