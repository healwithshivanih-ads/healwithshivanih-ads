description: Adverse reactions to previously tolerated foods, often linked to compromised
  gut barrier function (leaky gut) and disrupted microbiome, allowing undigested food
  particles to enter the bloodstream and trigger immune responses.
when_to_refer: Refer if reactions are severe (anaphylaxis), rapidly expanding, or
  associated with weight loss and GI bleeding.
