slug: unexplained-hair-loss
display_name: Unexplained Hair Loss
aliases:
- hair thinning
- diffuse hair loss
- alopecia
- hair shedding
category: skin
severity: concerning
description: Noticeable shedding or thinning of hair without a clear identified cause
  such as hormonal change, medication, or physical trauma. May occur in both adults
  and children.
when_to_refer: Refer to a clinician to investigate underlying causes including nutrient
  deficiencies (iron, B12, zinc), thyroid dysfunction, H. pylori infection, autoimmune
  conditions (e.g. alopecia areata), or hormonal imbalances.
