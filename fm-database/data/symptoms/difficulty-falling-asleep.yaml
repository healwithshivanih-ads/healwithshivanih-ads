- cannot fall asleep
category: sleep
severity: common
description: 'Inability to transition into sleep within roughly 20-30 minutes of

  intending to sleep. Often reflects evening sympathetic dominance,

  unresolved cognitive load, late caffeine in slow CYP1A2

  metabolizers, blue light exposure suppressing melatonin, late

  exercise, or late eating. Distinguished from sleep maintenance

  insomnia (waking after sleep onset) and early morning awakening.

  '
when_to_refer: 'Refer if persistent for weeks despite sleep hygiene changes, or

  associated with severe anxiety, depression, or suicidal ideation.

  '
