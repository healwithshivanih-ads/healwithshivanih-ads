slug: caffeine-sensitivity
display_name: Caffeine Sensitivity / Poor Caffeine Tolerance
aliases:
- can't sleep after coffee
- coffee keeps me awake
- caffeine intolerance
- wired after one coffee
category: neurological
severity: common
description: Inability to sleep after even small amounts of caffeine, or conversely,
  complete absence of caffeine effect. Driven by genetic variation in CYP1A2 (and
  related CYP1B1) enzyme activity determining speed of caffeine clearance through
  Phase 1.
when_to_refer: Generally not a referral trigger unless associated with severe cardiovascular
  symptoms.
