slug: myalgia
display_name: Muscle Pain (Myalgia)
aliases:
- muscle aches
- muscle soreness
- statin myalgia
- muscular pain
category: musculoskeletal
severity: concerning
description: Pain, aching, or tenderness in muscles, commonly reported as a side effect
  of statin therapy. May range from mild discomfort to significant functional impairment.
  Mechanistically linked to CoQ10 depletion and mitochondrial dysfunction in muscle
  tissue.
when_to_refer: Refer to clinician if myalgia is severe, progressive, or accompanied
  by dark urine (possible rhabdomyolysis).
