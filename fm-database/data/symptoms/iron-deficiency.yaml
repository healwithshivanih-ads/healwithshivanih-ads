slug: iron-deficiency
display_name: Iron Deficiency / Refractory Iron Deficiency
aliases:
- low iron
- iron-deficiency anemia
- irony deficiency
- iron deficiency anaemia
- iron not absorbing
category: metabolic
severity: concerning
description: Low serum iron or ferritin levels. When iron deficiency persists despite adequate supplementation, impaired gastric
  acid production should be investigated as a contributing cause, since HCl is required to ionise iron for absorption.
when_to_refer: Refer to clinician if iron deficiency is severe, persistent, or unexplained despite dietary correction and
  supplementation. Rule out bleeding, malabsorption, and hypochlorhydria.
