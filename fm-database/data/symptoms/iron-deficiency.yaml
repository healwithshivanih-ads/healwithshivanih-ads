  location: Testing for Low Stomach Acidity
  quote: Having enough HCI is needed to absorb vitamin B12 and several minerals (such as iron, calcium, magnesium, zinc, and
    copper).
- id: coconote-fm-hypochlorhydria
  location: Risk Factors / Consequences of Low Stomach Acid
  quote: Patient with severe iron deficiency, even if you're giving them iron medication for a very long time, still their
    iron doesn't get better, definitely you should check for stomach acid.
