category: cardiovascular
severity: red_flag
description: Abnormal calcium deposition in blood vessel walls or kidneys, driven
  by insufficient Matrix GLA Protein (MGP) activity due to vitamin K2 deficiency.
  Associated with increased atherosclerosis and cardiovascular disease risk.
when_to_refer: Refer if client has known coronary artery disease, calcification on
  imaging, or significant cardiovascular risk factors.
