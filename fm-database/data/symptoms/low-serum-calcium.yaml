slug: low-serum-calcium
display_name: Low Serum Calcium
aliases:
- hypocalcemia
- calcium low on labs
category: metabolic
severity: concerning
description: A serum total calcium reading below 9.2 mg/dL. Often reflects low albumin,
  low stomach acid, low magnesium, or low vitamin D rather than true dietary calcium
  deficiency.
when_to_refer: Refer to clinician for ionized calcium, albumin-corrected calcium,
  PTH, vitamin D, and magnesium testing before attributing to dietary deficiency or
  recommending supplementation.
