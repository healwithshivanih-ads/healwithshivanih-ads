description: Blood pressure above normal ranges, associated with increased risk of
  stroke, heart disease, and organ damage. Modifiable through dietary interventions
  (DASH diet, potassium, phytonutrients, L-arginine, anthocyanins), weight loss, and
  exercise.
when_to_refer: Refer when medication initiation is warranted based on risk stratification
  and organ damage markers. Diet and lifestyle should always be co-initiated.
