description: Persistently elevated blood pressure readings (≥120/80 mm Hg at prehypertension;
  ≥140/90 at Stage 1; ≥160/100 at Stage 2). Often asymptomatic; occasionally presents
  with headache, dizziness, or visual changes.
when_to_refer: Stage 2 hypertension (≥160/100) or any hypertension unresponsive to
  1–3 months of lifestyle and natural intervention; signs of hypertensive urgency
  (severe headache, visual disturbance, chest pain).
