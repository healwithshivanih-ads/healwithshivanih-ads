description: Ferritin elevated beyond what iron stores alone explain may indicate
  systemic inflammation and is associated with cardiovascular risk. Must be interpreted
  in context of serum iron and TIBC.
when_to_refer: Refer if ferritin is very high (>500 ng/mL) to rule out hemochromatosis,
  malignancy, or severe inflammatory conditions.
