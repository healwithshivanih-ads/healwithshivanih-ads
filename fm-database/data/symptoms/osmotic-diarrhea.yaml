severity: common
description: Loose, watery stools triggered when unabsorbed solutes (lactose, fructose,
  polyols) draw water into the intestinal lumen. Characteristic of lactase deficiency
  and fructose malabsorption.
when_to_refer: Refer if chronic, severe, or associated with blood/mucus, significant
  weight loss, or systemic symptoms.
