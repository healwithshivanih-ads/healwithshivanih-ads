category: metabolic
severity: concerning
description: Body fat percentage above age- and sex-appropriate norms as measured
  by BIA, DEXA, or underwater weighing. May be present even in individuals with normal
  BMI ('skinny fat' or TOFI — Thin on the Outside, Fat on the Inside).
when_to_refer: Refer if metabolic biomarkers (fasting insulin, triglycerides, CRP)
  are elevated alongside high body fat.
