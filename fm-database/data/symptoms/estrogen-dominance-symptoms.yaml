category: hormonal
severity: common
description: A cluster of symptoms — including heavy periods, fibrocystic breasts,
  mood changes, and bloating — associated with prolonged or excessive estrogen signaling,
  often due to insufficient B6, poor fiber intake, or constipation impairing estrogen
  excretion.
when_to_refer: Refer if symptoms are severe or suspected pathology (fibroids, endometriosis,
  PCOS) — clinical hormone and lab evaluation needed.
