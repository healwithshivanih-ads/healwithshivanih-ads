slug: inability-to-relax
display_name: Inability to Relax
aliases:
- can't wind down
- inner tension
- wired feeling
- unable to let go
- always on the go
- can't switch off
- perpetual overdrive
- wired all the time
- sympathetic dominance
category: neurological
severity: concerning
description: A persistent state of mental and physical activation in which the individual
  is unable to downregulate despite wanting or attempting to do so. Often accompanied
  by resistance to stillness, meditation, or breath-based practices.
when_to_refer: Refer to mental health professional if inability to relax is accompanied
  by significant anxiety, trauma history, reliance on sleep medication, or when standard
  coaching tools consistently fail to provide relief.
