description: Depressive symptoms can be associated with magnesium insufficiency, elevated
  homocysteine (B12/folate deficiency), MTHFR variants, oxidative stress, and mitochondrial
  dysfunction. Nutritional interventions may support mood alongside conventional care.
when_to_refer: Refer if client screens positive for clinical depression (PHQ-9), has
  suicidal ideation, or symptoms are severe/persistent.
