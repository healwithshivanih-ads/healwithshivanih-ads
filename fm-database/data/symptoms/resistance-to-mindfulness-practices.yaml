slug: resistance-to-mindfulness-practices
display_name: Resistance to Mindfulness Practices
aliases:
- won't meditate
- breathing exercises don't work
- can't sit still
- mindfulness avoidance
category: neurological
severity: common
description: Client actively avoids or is unable to engage with standard mindfulness
  interventions (breath work, guided meditation, body scan). May be due to anxiety
  amplification through interoception, identity mismatch, or simply never having been
  still.
when_to_refer: Consider referral if resistance is rooted in trauma or severe anxiety;
  trauma-informed care may be needed before mindfulness techniques are appropriate.
