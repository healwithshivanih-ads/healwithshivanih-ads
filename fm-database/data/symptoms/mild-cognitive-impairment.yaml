category: neurological
severity: concerning
description: 'Measurable decline in cognitive function — typically memory, attention,
  or executive function — that exceeds expected age-related change but does not yet
  meet criteria for dementia. Common scales: HDS-R (Hasegawa Dementia Scale Revised),
  MMSE (Mini Mental State Examination), MoCA. Annual conversion rate to dementia ~10–15%.
  Functional medicine framing emphasises reversible drivers — chronic inflammation,
  insulin resistance, vitamin/mineral deficiencies (B12, D), sleep apnoea, thyroid,
  vascular health, micronutrient status — before assuming neurodegenerative trajectory.'
when_to_refer: New objective cognitive decline noted on a validated scale, especially
  with functional impact; rapid progression over weeks-to-months; focal neurological
  signs; suspected reversible cause (hypothyroidism, B12 deficiency, depression-pseudodementia,
  sleep apnoea); family history of early-onset dementia. Refer to neurology / cognitive
  clinic for formal workup.
