category: neurological
severity: concerning
description: Symptoms resembling classical B12 deficiency (fatigue, neurological changes, cognitive fog) occurring even when
  serum B12 appears normal or elevated, due to poor cellular utilization rather than inadequate intake or absorption.
when_to_refer: Refer if neurological symptoms are present (numbness, tingling, memory loss) or if serum B12 is persistently
  very high without explanation — this may indicate underlying medical conditions.
