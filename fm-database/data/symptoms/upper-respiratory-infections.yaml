description: Frequent or recurrent upper respiratory tract infections (colds, sinusitis).
  Regular winter swimming has been associated with reduced incidence compared to non-swimmers,
  though evidence is inconclusive.
when_to_refer: Refer if infections are unusually frequent, severe, or prolonged —
  consider immune deficiency workup.
