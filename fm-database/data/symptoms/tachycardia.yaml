slug: tachycardia
display_name: Tachycardia
aliases:
- episodic rapid heart rate
- rapid heart rate episodes
category: cardiovascular
severity: concerning
description: 'Episodic rapid heart rate or palpitations, often accompanied by flushing
  or

  lightheadedness. Vasoactive mediators (histamine, prostaglandins) cause

  sudden vascular dilation and blood pressure drops, triggering compensatory

  heart rate elevation. Pattern is typically post-prandial or post-trigger

  rather than exertional.

  '
when_to_refer: Refer to cardiology or immunology for new-onset palpitations, syncope,
  sustained tachycardia, or any chest pain. Consider POTS workup if orthostatic.
