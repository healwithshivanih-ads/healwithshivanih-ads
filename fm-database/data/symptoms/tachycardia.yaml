slug: tachycardia
display_name: Tachycardia
aliases:
  - palpitations
  - episodic rapid heart rate
category: cardiovascular
severity: concerning
description: |
  Rapid heart rate or palpitations, often episodic and correlated with
  mediator-release events. Vasoactive mediators like histamine cause sudden
  blood pressure changes that trigger compensatory heart rate increases.
when_to_refer: |
  Refer for cardiology workup if tachycardia is sustained, accompanied by
  chest pain, syncope, or occurs at rest without identifiable trigger.
