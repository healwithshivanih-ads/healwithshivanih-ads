description: Bloating that increases progressively throughout the day, becoming most
  problematic by evening. Associated with dysbiosis, hypochlorhydria, and impaired
  gut motility.
when_to_refer: If accompanied by significant unintentional weight loss, blood in stool,
  or severe abdominal pain — refer to gastroenterologist.
