description: Eating in response to emotional rather than physical hunger cues. Mindful
  and intuitive eating practices can help identify and address emotional eating patterns
  by reconnecting clients to internal hunger/fullness signals.
when_to_refer: Refer to a mental health professional or registered dietitian if emotional
  eating is severe, associated with purging, or meets criteria for an eating disorder.
