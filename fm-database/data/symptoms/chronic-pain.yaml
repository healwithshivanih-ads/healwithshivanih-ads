description: Ongoing pain lasting more than 3 months, encompassing fibromyalgia, headaches, joint pain, and musculoskeletal
  discomfort. Functionally driven by neuroinflammation, limbic overactivation, emotional suppression, and elevated inflammatory
  cytokines (IL-6, TNF-α).
when_to_refer: Refer if pain is severe, rapidly worsening, associated with neurological deficits, or has a clear structural/oncological
  cause.
