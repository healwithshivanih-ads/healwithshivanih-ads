description: Difficulty achieving deep, restorative sleep — may include trouble falling
  asleep, frequent waking, or waking unrefreshed. Often linked to elevated nocturnal
  cortisol and GABA/melatonin dysregulation.
when_to_refer: Refer to clinician if sleep apnoea is suspected, if insomnia is severe
  or longstanding, or if prescription sleep aids are being used.
