description: Difficulty falling asleep, staying asleep, or waking feeling unrefreshed
  despite adequate time in bed. Associated with HPA axis dysregulation and amenable
  to lifestyle interventions including gratitude journaling, stress reduction, and
  breathing exercises.
when_to_refer: Refer if sleep disruption is severe, long-standing, or associated with
  sleep apnoea symptoms (snoring, gasping, witnessed apnoeas).
