description: Frequent, loose, bloody stools with lower abdominal cramps; cardinal
  presentation of ulcerative colitis. Also occurs in Crohn's colitis and must be distinguished
  from infectious colitis.
when_to_refer: Any bloody diarrhea warrants urgent clinician evaluation to exclude
  IBD, infectious colitis, or colorectal cancer.
