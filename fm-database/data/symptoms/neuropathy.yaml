description: Nerve pain, tingling, or numbness — often in the hands and feet — can
  be associated with B12 deficiency, mitochondrial dysfunction, or oxidative stress.
  CoQ10, ALA, and NAC have been studied for neuropathic symptom improvement.
when_to_refer: Refer for neurological evaluation if neuropathy is new, progressive,
  or severe. Diabetic neuropathy workup is clinician scope.
