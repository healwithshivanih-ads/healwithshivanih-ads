category: neurological
severity: concerning
description: Tingling, numbness, or burning in extremities; associated with B1, B6,
  B12 deficiency, and high-dose B6 toxicity (>100mg/day).
when_to_refer: Persistent or progressive neuropathy requires neurological workup to
  rule out diabetes, B12 deficiency with subacute combined degeneration.
