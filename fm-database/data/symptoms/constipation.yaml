description: 'Infrequent (fewer than one per day in a coaching/FM frame), hard,

  or difficult-to-pass bowel movements. Highly relevant to detoxification

  because the bile-to-stool route is a primary elimination pathway for

  Phase-2-conjugated toxicants; constipation prolongs gut transit time,

  enabling beta-glucuronidase deconjugation and toxicant reabsorption.

  '
when_to_refer: 'Refer for new-onset constipation in adults over 50, blood in stool,

  unexplained weight loss, severe abdominal pain, or constipation

  unresponsive to fiber, hydration, and lifestyle measures.

  '
