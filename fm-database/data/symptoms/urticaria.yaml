slug: urticaria
display_name: Urticaria
aliases:
  - hives
  - welts
  - wheals
category: skin
severity: common
description: |
  Hives or red, itchy welts indicating localized mast cell degranulation and
  vascular permeability. Structurally similar salicylates in foods can also
  worsen hives by acting directly on mast cells.
when_to_refer: |
  Refer if urticaria is accompanied by angioedema, throat involvement, or
  systemic symptoms suggesting anaphylaxis.
