category: skin
severity: common
description: 'Raised, red, itchy welts indicating localized mast cell degranulation
  and

  increased vascular permeability. Acute urticaria is often allergen-driven;

  chronic spontaneous urticaria (>6 weeks) frequently overlaps with MCAS

  and histamine intolerance. Salicylate-rich foods can also worsen hives by

  acting directly on mast cells.

  '
when_to_refer: Refer to dermatology or allergy for chronic urticaria (>6 weeks), angioedema,
  or urticaria with systemic symptoms (breathing changes, hypotension).
