category: hormonal
severity: common
description: Painful menstruation (dysmenorrhea) is associated with elevated prostaglandin
  production from the arachidonic acid cascade. Omega-3 fatty acids may help by competing
  with AA and reducing pro-inflammatory prostaglandins.
when_to_refer: Refer to clinician if pain is severe, or secondary dysmenorrhea (endometriosis,
  fibroids) is suspected.
