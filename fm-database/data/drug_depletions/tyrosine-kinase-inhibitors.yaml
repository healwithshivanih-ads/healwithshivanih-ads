monitoring_labs:
  - CBC monthly (myelosuppression, especially neutropenia)
  - Comprehensive metabolic panel monthly (K, Mg, Ca, phosphate)
  - LFTs monthly (hepatotoxicity is a class-wide concern)
  - 25-OH vitamin D every 3 months
  - Thyroid function (some TKIs cause hypothyroidism — sunitinib, sorafenib especially)
  - ECG for QTc (some TKIs prolong QT)
coach_notes: |
  This is the highest-stakes class in the catalogue. Default posture is
  HUMBLE + COLLABORATIVE — coach scope is nutrition, hydration,
  movement-as-tolerated, sleep hygiene, stress regulation. Never advise
  supplement initiation / discontinuation without oncology written
  clearance. Avoid "detox" language entirely. The client's most pressing
  protocol need is staying on the medication at full dose; everything
  the coach does should support that, not compete with it. Specific
  cancer affects nuance (CML clients on imatinib may live decades and
  have very different needs than HCC clients on sorafenib in advanced
  disease) — ALWAYS ASK which cancer, which line of therapy, which
  oncologist.
