slug: levothyroxine
drug_name: Levothyroxine (T4)
drug_aliases:
- eltroxin
- synthroid
- euthyrox
- thyronorm
- thyrox
- lt4
- t4
- levothyrox
drug_class: thyroid_hormone
summary: 'Synthetic T4 hormone replacement for hypothyroidism / Hashimoto''s. Highly

  sensitive to absorption interference — even small co-ingestions can

  reduce bioavailability significantly. Selenium status is critical for

  T4 → T3 conversion peripherally.

  '
depletes:
- nutrient: Selenium
  severity: moderate
  mechanism: Selenium is the cofactor for deiodinase enzymes converting T4 → active T3. Suboptimal selenium impairs response
    to LT4.
  monitoring_recommendation: Selenium serum or RBC; check at baseline + every 12 months
  typical_supplement_dose: 200 mcg/day selenomethionine OR 2 brazil nuts/day
- nutrient: Iron (ferritin)
  severity: moderate
  mechanism: Ferritin > 70 ng/mL is required for adequate T3 receptor function. Low iron impairs LT4 efficacy.
  monitoring_recommendation: Ferritin every 6 months
  typical_supplement_dose: 18-30 mg iron bisglycinate (only if ferritin < 50)
condition_implications:
- label: Hypothyroidism
  confidence: high
  rationale: Levothyroxine is the standard replacement therapy for hypothyroidism, including Hashimoto's-driven hypothyroidism.
  topic_slug: hypothyroidism
- label: Hashimoto's thyroiditis (autoimmune)
  confidence: moderate
  rationale: Most levothyroxine prescriptions in adult women have Hashimoto's as the underlying cause — coach should ask about
    TPO / TgAb antibodies.
  topic_slug: hashimotos-thyroiditis
protocol_cautions:
- kind: timing
  item: Iron supplements
  severity: warning
  reason: Iron binds levothyroxine and blocks its absorption — take iron at least 4 hours
    apart from the thyroid tablet (LT4 in the morning on an empty stomach, iron later in the day).
- kind: timing
  item: Calcium, magnesium and multivitamins
  severity: warning
  reason: Divalent minerals bind levothyroxine — separate by at least 4 hours.
- kind: timing
  item: Coffee, tea, soy and high-fibre meals
  severity: warning
  reason: Take levothyroxine on an empty stomach 30-60 min before food; caffeine, soy
    and high-fibre meals reduce absorption.
timing_separations:
- Take LT4 first thing in morning, 30-60 min BEFORE food + coffee + tea (caffeine reduces absorption).
- Separate from calcium / iron / magnesium / multivitamin by AT LEAST 4 HOURS.
- Soy + high-fibre meals reduce absorption — separate by 4 hours.
contraindicated_supplements: []
monitoring_labs:
- TSH every 6-8 weeks until stable, then every 6-12 months
- Free T3 + Free T4 (FM optimal — fT3 3.0-4.0 pg/mL, fT4 1.1-1.5 ng/dL)
- Reverse T3 if symptoms persist despite normal TSH
- TPO + Tg antibodies if Hashimoto suspected
coach_notes: 'Most under-recognised cause of poor LT4 response is timing — clients

  often take with breakfast or tea, undermining absorption. Coach the

  morning ritual carefully. If TSH still fluctuating despite good

  adherence + timing, ferritin + selenium are the next levers.

  '
