drug_class: oral_contraceptive
summary: 'Dienogest is a fourth-generation progestin. As 2 mg monotherapy (Visanne
  / Dinagest) it is a first-line medical treatment for endometriosis and adenomyosis:
  it creates a stable progestin-dominant, relatively hypo-estrogenic environment that
  decidualises then atrophies ectopic endometrial tissue. Taken CONTINUOUSLY (the
  endometriosis regimen), it usually suppresses ovulation and induces amenorrhoea or
  scanty irregular bleeding — so on continuous use there is no follicular/luteal
  rhythm and cycle-phase-timed interventions (seed cycling, phase-based herbs) have
  no cycle to key on. A SHORT or CYCLICAL course (e.g. a 10-14 day luteal/short course
  for heavy bleeding or cycle regulation) often PRESERVES normal ovulatory periods —
  in that case the cycle is intact and phase-based protocols still apply. Always check
  the client''s actual bleeding pattern rather than assuming suppression from the drug
  name. Dienogest is also combined with estradiol valerate in some contraceptive pills
  (Qlaira / Natazia). Unlike combined estrogen-containing OCPs, a progestin-only agent
  does NOT carry the strong estrogen-driven multi-nutrient depletion profile, so the
  classic OCP folate/B6/B12/zinc/magnesium picture largely does not apply here.'
depletes: []
condition_implications:
- label: A gynae condition under active management (endometriosis, ovarian cyst, or
    heavy/painful bleeding)
  confidence: moderate
  rationale: Dienogest is a progestin used for SEVERAL indications — do NOT assume
    endometriosis. Continuous 2 mg monotherapy (Visanne / Dinagest) is licensed for
    endometriosis/adenomyosis, but it is ALSO commonly prescribed as a timed course
    (e.g. ~3 months) to suppress/shrink a large or functional OVARIAN CYST, and for
    heavy menstrual bleeding, severe dysmenorrhoea or cycle regulation. Treat it as a
    pointer to an actively-managed hormonal/gynae issue and CONFIRM the actual
    indication with the client/gynae rather than inferring a diagnosis from the drug.
  topic_slug: estrogen-dominance
- label: Heavy or painful menstrual bleeding (dysmenorrhoea / menorrhagia)
  confidence: moderate
  rationale: Dienogest is also used to control heavy menstrual bleeding and severe
    dysmenorrhoea even where laparoscopic confirmation of endometriosis has not been
    done. Treat as a strong pointer to an estrogen-dominant / painful-period picture.
  topic_slug: estrogen-dominance
protocol_cautions:
- kind: monitor
  item: Check whether the client still has an ovulatory cycle BEFORE choosing phase-based
    vs daily seed cycling (or any cycle-phase-timed protocol)
  severity: warning
  reason: On CONTINUOUS dienogest (endometriosis 2 mg daily) ovulation is usually
    suppressed and periods stop — there is no follicular/luteal rhythm, so use a daily
    all-four-seed blend, not a phased schedule. On a SHORT or CYCLICAL course the client
    often still gets normal periods — then phase-based seed cycling (follicular flax +
    pumpkin, luteal sesame + sunflower) is correct. Confirm the actual bleeding pattern;
    do not assume suppression from the drug name.
- kind: prefer_food
  item: Ground flax + pumpkin + sesame + sunflower seeds — phased if she still cycles,
    otherwise all four together daily
  severity: info
  reason: The seed nutrients (zinc, selenium, magnesium, lignans, ALA omega-3) are
    worth having either way; only the SCHEDULE depends on whether her cycle is intact.
- kind: monitor
  item: Mood, libido, and breakthrough bleeding / spotting
  severity: info
  reason: Progestins can cause low mood, reduced libido and irregular spotting;
    surface these at check-ins and refer to the prescriber rather than adjusting the
    drug.
- kind: monitor
  item: Bone mineral density on prolonged use
  severity: info
  reason: The relatively hypo-estrogenic state on long-term dienogest can modestly
    affect bone density; support with weight-bearing exercise, vitamin D, K2 and
    adequate protein/calcium, and defer any DEXA decision to the clinician.
timing_separations: []
contraindicated_supplements: []
monitoring_labs:
- Vitamin D (relevant to bone health on a hypo-estrogenic progestin)
- Ferritin + CBC if heavy bleeding preceded treatment
coach_notes: 'Continuous standalone dienogest points strongly to endometriosis /
  adenomyosis — anchor likely_drivers there, not just at the presenting symptom — but
  shorter/cyclical courses are also used for heavy bleeding and dysmenorrhoea, so
  confirm the indication. KEY COACHING POINT (the reason this entry exists): the
  DOSING REGIMEN decides the seed-cycling schedule. CONTINUOUS dienogest (endometriosis,
  2 mg daily) usually stops ovulation and periods → no follicular/luteal rhythm → use a
  DAILY all-four-seed blend, not a phased one. A SHORT or CYCLICAL course (e.g. a 10-14
  day course) usually leaves normal periods intact → PHASE-BASED seed cycling is correct
  (follicular flax+pumpkin, luteal sesame+sunflower). Always check the actual bleeding
  pattern — do not assume suppression from the drug name. Because dienogest is
  progestin-only, the estrogen-driven OCP nutrient-depletion profile
  (folate/B6/B12/zinc/magnesium) is NOT strongly established — depletes is intentionally
  left empty; do not import the combined-OCP depletion list. Watch for low mood, low
  libido and breakthrough spotting (progestin side effects) and refer those to the
  prescriber. On prolonged CONTINUOUS use, support bone health (vitamin D, K2,
  weight-bearing exercise, protein).'
