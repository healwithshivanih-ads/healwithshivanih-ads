slug: dienogest
drug_name: Dienogest
drug_aliases:
- dinogest
- visanne
- dinagest
- endovis
- diena
- alldien
- dienogest-2mg
- qlaira
- natazia
drug_class: oral_contraceptive
summary: 'Dienogest is a fourth-generation progestin. As 2 mg monotherapy (Visanne
  / Dinagest) it is a first-line medical treatment for endometriosis and adenomyosis:
  it creates a stable progestin-dominant, relatively hypo-estrogenic environment that
  decidualises then atrophies ectopic endometrial tissue, and usually suppresses ovulation
  and induces amenorrhoea or scanty, irregular bleeding. It is also combined with
  estradiol valerate in some contraceptive pills (Qlaira / Natazia). Because ovulation
  and the normal follicular/luteal rhythm are pharmacologically suppressed, any
  cycle-phase-timed intervention (seed cycling, phase-based herbs) has no natural
  cycle to key on. Unlike combined estrogen-containing OCPs, a progestin-only agent
  does NOT carry the strong estrogen-driven multi-nutrient depletion profile, so the
  classic OCP folate/B6/B12/zinc/magnesium picture largely does not apply here.'
depletes: []
condition_implications:
- label: Endometriosis / adenomyosis
  confidence: high
  rationale: Dienogest 2 mg monotherapy (Visanne / Dinagest) is specifically licensed
    and prescribed for endometriosis and adenomyosis. In an Indian coaching context a
    client on standalone dienogest almost always has a diagnosis (or strong clinical
    suspicion) of endometriosis/adenomyosis, typically with dysmenorrhoea, heavy or
    prolonged bleeding, or chronic pelvic pain.
  topic_slug: endometriosis
- label: Heavy or painful menstrual bleeding (dysmenorrhoea / menorrhagia)
  confidence: moderate
  rationale: Dienogest is also used to control heavy menstrual bleeding and severe
    dysmenorrhoea even where laparoscopic confirmation of endometriosis has not been
    done. Treat as a strong pointer to an estrogen-dominant / painful-period picture.
  topic_slug: estrogen-dominance
protocol_cautions:
- kind: avoid_practice
  item: Phase-based seed cycling and any cycle-phase-timed protocol (follicular vs
    luteal seeds, phase-timed herbs)
  severity: warning
  reason: Dienogest suppresses ovulation and the follicular/luteal rhythm and usually
    induces amenorrhoea, so there is no natural cycle to time seeds or herbs to.
    Offer continuous DAILY seeds (all four, together, every day) for their nutrient
    value — zinc, selenium, lignans, omega-3 — rather than a phase-based schedule.
- kind: prefer_food
  item: Daily ground flax + pumpkin + sesame + sunflower seeds (1-2 tbsp), taken
    continuously
  severity: info
  reason: The nutrient rationale for seeds (zinc, selenium, magnesium, lignans, ALA)
    still holds on a suppressed cycle — just deliver it continuously, not phased.
- kind: monitor
  item: Mood, libido, and breakthrough bleeding / spotting
  severity: info
  reason: Progestins can cause low mood, reduced libido and irregular spotting;
    surface these at check-ins and refer to the prescriber rather than adjusting the
    drug.
- kind: monitor
  item: Bone mineral density on prolonged use
  severity: info
  reason: The relatively hypo-estrogenic state on long-term dienogest can modestly
    affect bone density; support with weight-bearing exercise, vitamin D, K2 and
    adequate protein/calcium, and defer any DEXA decision to the clinician.
timing_separations: []
contraindicated_supplements: []
monitoring_labs:
- Vitamin D (relevant to bone health on a hypo-estrogenic progestin)
- Ferritin + CBC if heavy bleeding preceded treatment
coach_notes: 'Standalone dienogest = treat the client as having endometriosis /
  adenomyosis until told otherwise; anchor likely_drivers there, not just at the
  presenting symptom. KEY COACHING POINT: do NOT put a client on dienogest on
  PHASE-BASED seed cycling or any cycle-timed protocol — there is no ovulatory cycle
  to time to. The seeds are still worth using for their micronutrients (zinc,
  selenium, magnesium, lignans, omega-3) but as a continuous daily habit (all four
  seeds together, every day). Because dienogest is progestin-only, the estrogen-driven
  OCP nutrient-depletion profile (folate/B6/B12/zinc/magnesium) is NOT strongly
  established here — depletes is intentionally left empty; do not import the combined-OCP
  depletion list. Watch for low mood, low libido and breakthrough spotting (progestin
  side effects) and refer those to the prescriber. On long-term use, support bone
  health (vitamin D, K2, weight-bearing exercise, protein).'
