slug: silicea
display_name: Silica (No. 11)
aliases:
- Silica
- Silicea Terra
- Silicic Acid
- Schüssler Salt No. 11
- Cell Salt 11
- Tissue Salt 11
- Silicon Dioxide
category: core_cell_salt
salt_number: 11
mineral_compound: Silicon dioxide (SiO₂)
standard_potency: 6X (D6)
tissue_affinity:
- connective tissue
- skin, hair and nails
- bone
key_indications:
- Traditionally the "cleanser" / connective-tissue salt — used to help the body ripen and expel (boils,
  slow-healing spots, splinters)
- Brittle hair and nails, weak connective tissue, slow wound healing
- Offensive perspiration (especially feet) and a general lack of stamina or "grit"
facial_signs:
- Shiny, glossy nose or facial skin
- Fine, waxy, pale skin with deep wrinkles
typical_use: 3–4 tablets of 6X dissolved under the tongue, 3–4× daily. Silicea is slow and deep-acting;
  traditionally given over weeks. Away from food and strong flavours.
combines_with:
- calc-fluor
- calc-phos
cautions:
- Tissue salts are a traditional biochemic system with limited modern clinical-trial evidence — a gentle
  optional adjunct, not a substitute for medical care.
- 'Traditional biochemic caution: Silicea is classically avoided where surgical implants, pins or sutures
  are present (the tradition holds it "expels foreign matter"). Flag this and defer to the client''s doctor
  if implants are present.'
- A spreading or infected skin lesion needs medical care, not cell salts.
- Standard tablets have a lactose (milk-sugar) base — note if significantly lactose-intolerant.
india_brands:
- SBL
- Dr. Reckeweg
- Schwabe India
- Bakson
linked_to_symptoms:
- skin-rash
notes_for_coach: 'The "cleanser / grit" cell salt — slow-healing skin, brittle hair and nails, weak connective
  tissue, low stamina. Slow, deep-acting (think weeks). Note the classic implants/sutures caution and
  defer to the client''s doctor there.


  Boericke & Dewey keynotes — the suppuration-ripener / connective-tissue salt: matures and discharges
  abscesses, boils, felons and fistulae; slow-healing wounds, glandular swellings tending to suppurate,
  bone caries; chilly sweaty scrofulous type with offensive foot-sweat (ailments from suppressed foot-sweat);
  want of ''grit'' — irresolute, oversensitive to noise, brain-fag; brittle nails, skin heals poorly.
  Worse cold, at night, at the new and full moon; better from heat and wrapping up.'
notes_for_client: A gentle traditional support some people use for slow-healing skin or brittle hair and
  nails. It's an optional adjunct — not a medicine, and not a replacement for medical care.
