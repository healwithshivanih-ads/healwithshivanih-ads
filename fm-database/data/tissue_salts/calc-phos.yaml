slug: calc-phos
display_name: Calcium Phosphate (No. 2)
aliases:
- Calc Phos
- Calcarea Phosphorica
- Schüssler Salt No. 2
- Cell Salt 2
- Tissue Salt 2
- Calcium Phosphate
category: core_cell_salt
salt_number: 2
mineral_compound: Calcium phosphate (Ca₃(PO₄)₂)
standard_potency: 6X (D6)
tissue_affinity:
- bone
- teeth
- growing tissue
- blood cells
- connective tissue
key_indications:
- Traditionally the "builder" / nutritive salt — used during growth, repair and convalescence after illness,
  and in run-down, depleted states
- Slow recovery, general debility and poor assimilation of nutrition
- Teething, growing pains in children, and tingling / numbness ("pins and needles")
facial_signs:
- Waxy, pale, sallow or earthy complexion
typical_use: 3–4 tablets of 6X dissolved under the tongue, 3–4× daily, away from food and strong flavours.
combines_with:
- calc-fluor
- ferrum-phos
cautions:
- Tissue salts are a traditional biochemic system with limited modern clinical-trial evidence — a gentle
  optional adjunct, not a substitute for medical care.
- Cell-salt Calc phos is a homeopathic dilution — it is NOT a calcium supplement. Bone-mineral repletion
  is a separate (mineral) decision.
- Persistent weakness, failure to thrive in a child, or unexplained debility needs proper assessment.
- Standard tablets have a lactose (milk-sugar) base — note if significantly lactose-intolerant.
india_brands:
- SBL
- Dr. Reckeweg
- Schwabe India
- Bakson
linked_to_symptoms:
- fatigue
notes_for_coach: 'The classic "tonic / builder" cell salt for convalescence, growth and depleted states
  — often paired with Ferrum phos. Keep the boundary clear: it is NOT nutritional calcium; if you want
  bone-mineral support that''s a separate supplement decision.


  Boericke & Dewey keynotes — the bone-builder / nutritive salt: defective bone growth and slow repair
  (rickets, slow fontanelle closure, non-union of fractures), anaemia of fast-growing young people, slow
  and decaying dentition, restorative in convalescence. Craves smoked/salted meats; numb cold aching in
  bones. Worse cold, wet, and change of weather.'
notes_for_client: A gentle traditional support some people use while recovering or feeling run-down. It's
  an optional adjunct — not a medicine, and not the same as a calcium supplement.
