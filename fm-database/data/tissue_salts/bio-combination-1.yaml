tissue_affinity: []
key_indications:
- Traditionally a biochemic support for tiredness and pallor associated with low iron
- Run-down, weak, washed-out states
facial_signs: []
typical_use: Commonly 4 tablets dissolved in the mouth 3–4× daily, per the manufacturer's pack. Confirm
  the dose on the specific brand's label.
combines_with:
- ferrum-phos
- calc-phos
component_salts: []
cautions:
- Tissue salts are a traditional biochemic system with limited modern clinical-trial evidence — a gentle
  optional adjunct, not a substitute for medical care.
- Diagnosed or suspected anaemia needs proper blood testing and treatment — these tablets are not a source
  of nutritional iron and do not correct iron deficiency.
- Bio-Combination numbering and composition vary slightly between manufacturers (SBL / Dr. Reckeweg /
  Schwabe / Bakson) — confirm the indication, the salts and the potencies on the specific pack.
- Standard tablets have a lactose (milk-sugar) base — note if significantly lactose-intolerant.
