cautions:
- Tissue salts are a traditional biochemic system with limited modern clinical-trial evidence — a gentle
  optional adjunct, not a substitute for medical care.
- A dental abscess needs a dentist — these tablets are not a substitute for dental treatment or antibiotics
  where needed.
- Bio-Combination numbering and composition vary slightly between manufacturers (SBL / Dr. Reckeweg /
  Schwabe / Bakson) — confirm the indication, the salts and the potencies on the specific pack.
- Standard tablets have a lactose (milk-sugar) base — note if significantly lactose-intolerant.
