notes_for_coach: India's off-the-shelf biochemic combination, sold as a single numbered tablet for irregular
  periods & menstrual pain. Biochemically centred on Mag phos (No. 7), Calc phos (No. 2). Confirm the
  indication and exact composition against the client's pack — BC numbering and salts vary slightly by
  manufacturer.
notes_for_client: A widely-available traditional combination tablet some people use for irregular periods
  & menstrual pain. It's an optional gentle adjunct alongside your plan — not a medicine, and not a replacement
  for proper medical care.
