notes_for_coach: India's off-the-shelf biochemic combination, sold as a single numbered tablet for toothache
  & gum relief. Biochemically centred on Mag phos (No. 7), Ferrum phos (No. 3). Confirm the indication
  and exact composition against the client's pack — BC numbering and salts vary slightly by manufacturer.
notes_for_client: A widely-available traditional combination tablet some people use for toothache & gum
  relief. It's an optional gentle adjunct alongside your plan — not a medicine, and not a replacement
  for proper medical care.
