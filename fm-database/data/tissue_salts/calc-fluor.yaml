linked_to_symptoms: []
notes_for_coach: 'The "elastic tissue" salt — slack/over-stretched or hard/cracked tissues; traditionally
  cited for hypermobility and varicosities. Pairs with Silicea (connective tissue) and Calc phos (the
  builder). Not a fluoride intervention.


  Boericke & Dewey keynotes — the elasticity / induration salt: stony-hard glands and lumps (incl. breast),
  loss of tissue tone (varicose veins, haemorrhoids), bone exostoses and deficient/rough tooth enamel,
  cracks and fissures of skin and lips, cracking joints and chronic lumbago better with continued motion.
  Worse in damp weather; better from heat and rubbing.'
notes_for_client: A gentle traditional support some people use for skin and tissue that feels slack or
  cracked. It's an optional adjunct — not a medicine, and not a fluoride supplement.
