steps:
- Place the soaked almonds and ¼ cup of the warm water in a wide-mouth pint-sized
  mason jar. Use a hand blender to process to a smooth paste.
- Add the remaining ½ cup warm water, maple syrup, spice mix, vanilla if using, and
  salt. Blend again until smooth.
- Drink immediately.
