steps:
- Mix atta with a pinch of salt, add water little by little and knead into a soft,
  smooth dough.
- Cover and rest the dough 15 minutes, then divide into 6 equal balls.
- Dust with flour and roll each ball into a thin round using a rolling pin.
- Cook on a hot tawa until pale bubbles appear, flip and press lightly with a cloth.
- Puff over an open flame or on the tawa until it balloons, then smear with a little
  ghee if you like.
