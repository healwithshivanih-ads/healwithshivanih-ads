steps:
- Mix buckwheat flour with salt. Add warm water a little at a time, kneading into a soft, pliable dough.
  Rest 10 minutes.
- Divide into balls. Pat or roll each into a round flatbread on a floured surface (gluten-free flours
  roll best between two sheets of parchment).
- Cook on a hot tava 1-2 minutes per side until brown spots appear and it puffs.
- Smear lightly with ghee and serve warm.
