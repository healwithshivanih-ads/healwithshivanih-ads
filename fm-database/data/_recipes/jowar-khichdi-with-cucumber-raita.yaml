steps:
- Rinse the jowar well several times, then soak it in hot water for about 2 hours
  until it swells.
- Pressure cook the soaked jowar for 7–8 whistles until the grains turn slightly translucent
  and tender; drain off any extra water.
- For the raita, whisk the fresh yogurt with the grated cucumber and a little salt,
  and keep it chilled.
- Heat the oil in a pan, add the cumin seeds, green chilli-coriander paste, crushed
  roasted peanuts and crushed paneer, and sauté for 2–3 minutes.
- Fold in the cooked jowar with salt, cumin powder and lemon juice, and warm through.
- Serve the hot jowar khichdi with the chilled cucumber raita.
