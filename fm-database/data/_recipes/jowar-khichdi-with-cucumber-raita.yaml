one_line: A cooling jowar millet khichdi tempered with peanuts and paneer, served
  with chilled cucumber raita.
headnote: Jowar (sorghum) is naturally gluten-free and high in fibre, so this khichdi
  is filling without feeling heavy. Peanuts and paneer add plant-and-dairy protein,
  while the chilled cucumber raita keeps the whole plate cooling — a good summer lunch.
