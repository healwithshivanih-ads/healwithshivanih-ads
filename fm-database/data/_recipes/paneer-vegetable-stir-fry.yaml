steps:
- Heat oil in a wok or kadai until hot; add garlic and ginger and stir for 20 seconds.
- Add the firmest vegetables first (beans, broccoli), then peppers, stir-frying on high so they stay crisp.
- Push the vegetables aside, add the paneer cubes and sear 1-2 minutes.
- Season with salt and pepper, toss everything together for a minute.
- Finish with a squeeze of lemon and serve hot with a small salad or roti.
