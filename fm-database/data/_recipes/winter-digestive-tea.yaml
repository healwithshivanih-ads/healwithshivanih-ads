steps:
- Bring the water to a boil in a small saucepan. Coarsely chop the gingerroot (no
  need to peel) and add to the water.
- Add the cumin seeds, fennel seeds, and cinnamon, reduce to low, and simmer for at
  least 10 minutes — longer for a stronger brew.
- Strain into two mugs and drink 6 oz with or after meals.
