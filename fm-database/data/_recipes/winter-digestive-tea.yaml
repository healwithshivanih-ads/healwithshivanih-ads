one_line: A warming three-seed digestive tea with ginger and cinnamon — a simple after-meal
  ritual for cold weather.
headnote: Cumin, fennel, and ginger are a classic Ayurvedic combination for clearing
  mucus and supporting agni; this tea is particularly useful from mid-winter when
  kapha begins to accumulate.
