steps:
- In a food processor or blender, process the lemon juice, water, cilantro, and mint
  until the herbs are coarsely chopped.
- Add the dried coconut, ginger, optional honey, salt, and pepper, then blend until
  the chutney is completely smooth.
- Store in a covered container in the refrigerator for up to 1 week.
