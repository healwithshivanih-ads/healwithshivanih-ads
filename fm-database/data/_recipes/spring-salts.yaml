steps:
- Combine all the ingredients in a bowl.
- If the texture is uneven, grind briefly with a mortar and pestle until the mix reaches a consistent
  texture.
- Transfer to a small glass shaker jar for storage and use as a condiment or seasoning in spring recipes.
