ingredients:
- item: finely ground pink salt
  qty: '1'
  unit: tbsp
- item: dried lemon zest
  qty: '0.25'
  unit: cup
- item: dried basil
  qty: '2'
  unit: tbsp
- item: freshly ground black pepper
  qty: '1.5'
  unit: tsp
- item: cayenne pepper
  qty: '0.25'
  unit: tsp
steps:
- Combine all the ingredients in a bowl.
- If the texture is uneven, grind briefly with a mortar and pestle until the mix reaches
  a consistent texture.
- Transfer to a small glass shaker jar for storage and use as a condiment or seasoning
  in spring recipes.
