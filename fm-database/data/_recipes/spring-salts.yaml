one_line: A bright lemon-basil seasoning salt with black pepper and cayenne — an easy
  table condiment to keep the flavour of spring food warming and pungent.
headnote: When you want brightness and heat rather than deep curry warmth, these Spring
  Salts bring lemon's astringency and basil's aromatic pungency — the seasoning counterpart
  to the Spring Spice Mix.
