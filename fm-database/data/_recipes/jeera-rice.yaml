steps:
- Rinse the basmati rice until the water runs clear, then soak for 20 minutes and
  drain.
- Heat oil in a pot and add cumin seeds and bay leaf; let the cumin crackle and turn
  fragrant.
- Add the slit green chilli, then the drained rice, and toss gently for a minute.
- Pour in the water, add salt, and bring to a boil.
- Cover, lower the heat and simmer until the rice is tender and the water is absorbed,
  about 12 minutes.
- Fluff with a fork, garnish with coriander and rest 5 minutes before serving.
