  unit: tbsp
steps:
- Heat oil in a pan and add rai; when it splutters add jeera, curry leaves and garlic.
- Saute the garlic for a few seconds till fragrant.
- Add the zucchini with haldi, chilli powder and salt, and toss well.
- Cook on medium-high heat, stirring, for 5 to 6 minutes so the zucchini is just tender
  with a little bite.
- Do not overcook or it will turn watery; finish with fresh coriander and serve hot.
