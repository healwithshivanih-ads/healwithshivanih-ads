one_line: Whisked yogurt with grated cucumber, mint and roasted cumin — cooling pitta-pacifier for hot
  weather.
method: '1. Whisk 1/2 cup fresh yogurt smooth; thin with a splash of water.

  2. Fold in 1/3 cup grated/deseeded cucumber, 1 tbsp chopped mint, 1/4 tsp roasted cumin, pinch salt.

  3. Serve fresh and cool (best at lunch, the warmest part of the day). Not for late dinner.'
