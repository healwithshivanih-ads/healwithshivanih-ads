steps:
- Soak the mung beans in water overnight (about 8 hours), then drain and rinse through
  a strainer.
- Spread the drained beans in a thin, even layer in the bottom of a colander or strainer.
  Set it over a bowl to catch drips, and drape a towel over the top.
- Leave at room temperature for 24–48 hours, rinsing and draining the beans once each
  morning and evening.
- Once the beans have grown small white tails no longer than 1/4 inch, they are ready
  to use. Refrigerate in a glass container for up to a few days if not using immediately.
