steps:
- In a large bowl, whisk together the besan, curd, water, ginger-chilli paste, turmeric,
  sugar, salt, and lemon juice into a smooth, lump-free batter of pouring consistency.
  Cover and rest for 30 minutes at room temperature to allow a gentle fermentation.
- Set up a steamer with 2 inches of water and bring it to a boil. Grease a round 20
  cm cake tin or thali generously with oil.
- Just before steaming, sprinkle the eno fruit salt over the batter. Pour 1 tbsp water
  over the eno and stir quickly in one direction for about 15 seconds until the batter
  turns frothy — do not over-mix. Pour immediately into the greased tin.
- Place the tin in the steamer, cover with a lid, and steam on medium-high heat for
  18–20 minutes. Insert a toothpick in the centre — it should come out clean. Rest
  for 5 minutes before unmoulding onto a plate and cutting into squares.
- For the tempering, heat 2 tbsp oil in a small pan. Add mustard seeds; once they
  pop, add sesame seeds, green chillies, and curry leaves. Stir for 20 seconds, then
  add 3 tbsp water and 1 tsp sugar. Let it bubble for 10 seconds and pour the temper
  evenly over the dhokla squares.
- Garnish with fresh coriander and grated coconut. Serve warm with green chutney on
  the side.
