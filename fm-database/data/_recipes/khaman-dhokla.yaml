one_line: Soft, spongy steamed chickpea flour cakes with a mustard-sesame tempering.
headnote: Khaman is made from a fermented besan batter that gets its lift from a short
  leavening rest — that brief fermentation is exactly what makes the B-vitamins in
  the batter more available to the body. Steaming keeps it light, and the tempering
  of mustard seeds, curry leaves, and green chilli gives it a warm, savory finish
  without any frying.
