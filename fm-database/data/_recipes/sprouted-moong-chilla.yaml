one_line: A savoury, protein-rich sprouted moong chilla — quick, gut-friendly, and naturally gluten-free.
headnote: A simple batter cooked thin on a tava makes a light, savoury pancake that's high in protein
  and easy to digest — a far better breakfast than refined flour.
