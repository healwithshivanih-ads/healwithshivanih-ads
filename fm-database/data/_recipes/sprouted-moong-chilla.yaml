steps:
- Whisk soaked split moong dal, ground with water into a smooth, pourable batter (like thin pancake batter).
- Stir in ginger, chilli, turmeric, chopped vegetables, and salt. Rest 10 minutes.
- Heat a non-stick or cast-iron tava on medium. Lightly grease. Pour a ladle of batter and spread into
  a thin round.
- Drizzle a few drops of ghee around the edge. Cook 2-3 minutes until the base is golden, flip, and cook
  the other side 1-2 minutes.
- Serve hot with chutney.
