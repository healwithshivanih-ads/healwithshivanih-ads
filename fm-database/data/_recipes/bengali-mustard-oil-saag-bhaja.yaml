steps:
- Heat mustard oil in a wide iron or heavy pan over medium-high heat until it just
  begins to smoke lightly, then lower the flame to medium — this removes the raw sharpness
  of the oil.
- Add dried red chillies and nigella seeds; let them sizzle for 20 seconds until fragrant.
- Add the sliced garlic and stir for about 30 seconds until it turns pale golden at
  the edges.
- Add all the greens at once with the salt. Toss well to coat every leaf in the oil
  and temper.
- Sauté on medium-high heat, turning frequently, for 5–7 minutes until the greens
  are wilted, glossy, and any excess water has cooked off. The bhaja should be dry,
  not soupy.
- Finish with a squeeze of lemon juice, toss once, and serve hot alongside rice or
  roti.
servings: 2–3
