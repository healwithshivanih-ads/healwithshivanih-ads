one_line: Seasonal winter greens dry-sautéed in pungent mustard oil with a simple
  Bengali tempering.
headnote: Mustard oil carries its own plant omega-3 in the form of alpha-linolenic
  acid, and cooking greens briefly in it at a moderate flame keeps both the oil's
  character and the leaves' nutrients largely intact. Use spinach, sarson, or any
  leafy green you can find at the winter market.
