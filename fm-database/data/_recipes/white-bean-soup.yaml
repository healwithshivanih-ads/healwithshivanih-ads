steps:
- Pressure-cook the soaked beans for 3-4 whistles (or boil with salt until tender).
  If using canned beans, rinse them well under running water.
- Chop all the vegetables into small cubes.
- Heat the olive oil and sauté the garlic, ginger and green chilli for a minute, then
  add the chopped vegetables and stock and cook covered until soft.
- Stir in the cooked beans and tomato puree and simmer for about 15 minutes.
- Season, mix in the lemon juice, and ladle into bowls topped with fresh dill and
  parsley.
