one_line: A quick blended berry-raisin dip with warming spice — a naturally sweet
  spring snack with astringent edges to keep kapha in check.
headnote: When the urge for something sweet hits in spring, this brightly flavoured
  berry dip offers astringent and slightly sour notes that actually help digestion
  rather than slugging it down.
