steps:
- Soak the golden raisins in the apple or cherry juice for about 10 minutes in a small bowl.
- Transfer the soaked raisins and their liquid to a blender or bowl suitable for an immersion blender.
  Add the berries, spice mix, and fresh lemon juice.
- Blend or puree until smooth.
- Serve alongside sliced apples or pears as a dipping sauce.
