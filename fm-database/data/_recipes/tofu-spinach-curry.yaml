steps:
- Pat the tofu cubes dry and set aside. Blanch the spinach in hot water for 2 minutes,
  drain, and blend to a smooth puree.
- Heat oil in a kadai over medium heat. Add cumin seeds, let them splutter, then add
  the onion and green chilli and sauté until soft.
- Stir in the ginger-garlic paste and cook 1 minute, then add the chopped tomato with
  turmeric and coriander powder. Cook 5-6 minutes until pulpy.
- Pour in the spinach puree, add salt, and simmer 5 minutes on low, stirring, so the
  raw taste cooks off.
- Gently add the tofu cubes and simmer 4-5 minutes, stirring lightly so they warm
  through and take on the greens.
- Sprinkle garam masala, stir, and serve hot with rice or millet roti.
