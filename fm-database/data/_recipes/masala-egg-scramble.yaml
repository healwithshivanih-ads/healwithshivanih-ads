steps:
- Heat oil; splutter cumin, then saute the onion and green chilli until soft.
- Add the tomato and turmeric and cook until pulpy.
- Stir in the spinach and let it wilt for a minute.
- Beat the eggs with salt and pepper, pour in, and stir gently over medium heat until
  just set and creamy.
- Finish with coriander and serve with a small millet or jowar roti.
