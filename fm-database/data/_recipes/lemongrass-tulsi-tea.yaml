steps:
- Bruise the lemongrass stalks by pressing them firmly with the flat of a knife, then
  cut into 2-inch pieces. Slice the ginger thinly without peeling.
- Bring the water to a boil in a small saucepan. Add the lemongrass and ginger, reduce
  heat to low, and simmer for 6–7 minutes until the water turns pale yellow and fragrant.
- Add the tulsi leaves, turn off the heat, and cover the pan. Let the leaves steep
  for 2–3 minutes — no longer, to keep the flavour bright and not bitter.
- Strain into two cups. Stir in honey or jaggery if using, and serve immediately while
  hot.
servings: 2 cups
prep_time_min: 5
cook_time_min: 10
one_line: A simple herbal tea brewed with fresh lemongrass and tulsi to warm damp
  monsoon evenings.
headnote: Lemongrass carries natural oils that ease a heavy, humid feeling in the
  chest, while tulsi leaves — best picked just before brewing — lend a clove-like
  warmth that settles the stomach. Together they make a tea that feels genuinely restorative
  on a grey rainy evening, without any heaviness. A small piece of fresh ginger adds
  gentle heat and aids digestion after a monsoon meal.
