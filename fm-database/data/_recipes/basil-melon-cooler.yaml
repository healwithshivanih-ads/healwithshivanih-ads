steps:
- Put the melon, basil leaves, ginger powder, and lime juice into a blender with ¼
  cup of water.
- Blend on high until the basil is broken into small green flecks.
- For a smoothie-like texture, add the ice cubes; for a more liquid drink, skip the
  ice and add up to another ¼ cup of water instead.
- Blend again until smooth, then pour into 4 glasses; garnish each with a basil leaf
  and a lime wedge.
- Serve at least an hour before a meal as melon does not digest well alongside other
  foods.
