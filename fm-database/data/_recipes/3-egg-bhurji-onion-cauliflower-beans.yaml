ingredients:
- item: 3 eggs
- item: 2 tbsp grated cauliflower
- item: 2 tbsp chopped french beans
- item: 1 tbsp onion
- item: 1/4 tsp turmeric
- item: 1/4 tsp cumin
- item: 1 tsp coconut oil
- item: salt
steps:
- Heat oil, crackle cumin; add onion, cauliflower, beans + turmeric, sauté 4 min till tender.
- Beat eggs with salt, pour in.
- Scramble on medium till just set — don't overcook.
