steps:
- Combine grated beet and lemon juice in a small bowl. If using mint, tear or snip
  the leaves into pieces and add to the bowl.
- In a small dry frying pan over low heat, toast sunflower seeds for about 5 minutes,
  stirring or shaking the pan so they colour evenly without burning.
- Add the toasted sunflower seeds and salt to the beet mixture and stir to combine.
- Serve a half-cup alongside a main dish or tucked into a collard leaf wrap.
