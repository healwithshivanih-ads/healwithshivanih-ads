steps:
- Preheat oven to 350°F.
- Combine the dried fruits, spice mix, and liquid in a small bowl and let the fruit soak while you prepare
  the apples.
- Core each apple, leaving the base intact. Pierce each apple with 4 whole cloves for flavour and decoration.
  Arrange the apples side by side in an 8x8-inch baking dish.
- Spoon the soaked fruit filling into the hollowed apples, allowing any excess to rest on top. Pour the
  remaining soaking liquid over the apples and into the dish.
- Bake for 25 minutes, basting once halfway through with juices from the base of the dish, until the apples
  are very tender. Allow to stand 5 minutes after removing from the oven.
- Drizzle 1 tsp of honey over each apple just before serving if desired. Eat with a steak knife and fork.
