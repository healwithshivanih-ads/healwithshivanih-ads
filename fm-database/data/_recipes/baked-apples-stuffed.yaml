one_line: Whole apples stuffed with spiced dried fruit and baked until deeply tender
  — a warming, aromatic autumn treat that is as digestive as it is comforting.
headnote: Slow-baking transforms apples into a fragrant, caramelised vessel for a
  spiced dried-fruit filling — the steady heat creates a deeply grounding and cleansing
  breakfast or light supper.
