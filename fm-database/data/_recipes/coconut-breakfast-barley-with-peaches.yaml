steps:
- Rinse the barley through a fine-mesh sieve, then combine with the water in a small
  pot.
- Cook uncovered-lidded over medium heat for about 25 minutes, until the water is
  absorbed and the grain is tender.
- While the barley cooks, warm the coconut oil in a small heavy pan over low heat,
  add the peach slices, dust with cardamom, and sauté until the edges start to colour.
- Transfer the cooked barley to a blender with the coconut milk and a splash of extra
  water; blend with an immersion blender (or with a carafe blender, lid slightly ajar)
  until smooth and creamy.
- Spoon into 2 bowls and arrange the caramelised peach slices on top; sweeten with
  coconut sugar if desired.
