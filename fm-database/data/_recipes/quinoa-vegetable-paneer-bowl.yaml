steps:
- Pan-sear the paneer cubes in a little oil until golden on the edges; set aside.
- In the same pan, saute the garlic and vegetables on high heat 3-4 minutes so they
  stay crisp.
- Add the cooked quinoa, salt and pepper, and toss through to warm.
- Return the paneer, add lemon juice and herbs, and toss gently.
- Serve warm as a balanced bowl with a side salad.
