steps:
- Dry-roast the flaxseeds in a thick pan over medium heat for 3–4 minutes, stirring
  constantly, until they begin to pop and smell nutty. Spread on a plate to cool completely.
- In the same pan, add 1 tbsp ghee and roast the whole wheat flour on low heat for
  6–8 minutes, stirring without a break, until it turns a warm golden-brown and smells
  like biscuit. Remove and cool.
- Grind the cooled flaxseeds to a coarse powder in a small grinder — a little texture
  is fine.
- Combine the ground flaxseed, roasted flour, jaggery powder, cardamom, and dry ginger
  in a bowl. Add the remaining 2 tbsp ghee and the tablespoon of water, then mix thoroughly
  with your hands until the mixture just comes together.
- Pinch off small portions and roll between your palms into compact laddus roughly
  the size of a large marble. If the mix feels too dry, add a few more drops of warm
  ghee.
- Arrange on a tray and rest for 15 minutes so they firm up before storing in an airtight
  tin.
servings: 12–14 small laddus
prep_time_min: 15
cook_time_min: 20
one_line: Small winter laddus made from roasted flaxseed, whole wheat flour, ghee,
  and jaggery.
headnote: Flaxseeds are one of the richest plant sources of omega-3, and roasting
  them lightly before grinding wakes up their nutty flavour without destroying the
  fats. Keeping jaggery moderate means you can comfortably eat two of these as a winter
  afternoon snack without feeling heavy.
