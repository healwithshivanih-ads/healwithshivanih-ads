steps:
- 'Make the ranchero sauce: sauté onion and garlic in ghee over medium heat until
  softened, then add all the spices and stir for 30 seconds.'
- Add tomatoes, celery, and carrots, stir for a minute, then pour in the broth. Simmer
  uncovered for 30 minutes, then briefly blend with an immersion blender to a chunky
  sauce. Keep warm.
- 'Make the hash: grate Brussels sprouts on the large holes of a box grater or pulse
  in a food processor. Warm 1 tbsp ghee in a large frying pan, add the shredded sprouts
  with a dash of salt, and stir-fry until browned to your liking. Lay the tortillas
  over the hash, cover the pan, and let them warm through.'
- 'For eggs: heat 1 tsp ghee in a frying pan, crack the eggs in, sprinkle with turmeric,
  and fry until the yolks are just beginning to set. For beans: warm them with 1 tsp
  ghee in a saucepan and mash smooth or chunky.'
- To plate, place 2 warm tortillas on each plate, top with eggs or beans, spoon ranchero
  sauce over, and serve Brussels sprouts hash alongside. Garnish with cilantro if
  desired.
