steps:
- Preheat oven to 350°F and line a 6-cup muffin tin with baking cups.
- In a medium bowl, whisk the eggs vigorously for 1–2 minutes, then mash in the cooked
  squash. Stir in the maple syrup and melted coconut oil.
- In a separate small bowl, combine almond meal, salt, baking soda, baking powder,
  and spice mix.
- Fold the dry ingredients into the wet ingredients — stir until just combined, do
  not overmix. Fold in the cranberries.
- Divide batter evenly among the 6 muffin cups and dust the tops with shredded coconut.
- Bake for 25 minutes or until the tops begin to brown. The muffins will be soft when
  they come out and will firm as they cool completely before removing from tins.
- 'Flax egg alternative: blend 2 tbsp ground flaxseeds with 6 tbsp water for 2 minutes;
  use in place of eggs.'
