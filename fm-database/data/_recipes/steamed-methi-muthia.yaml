steps:
- Combine methi leaves, besan, whole wheat flour, curd, ginger-green chilli paste,
  turmeric, red chilli powder, ajwain, sugar, lemon juice, salt, and 1 tbsp oil in
  a bowl. Mix to a firm, non-sticky dough, adding a few teaspoons of water only if
  needed.
- Divide the dough into 3–4 equal portions and roll each into a smooth log about 4–5
  cm in diameter.
- Place the logs in a greased steamer basket. Steam over high heat for 18–20 minutes,
  or until a toothpick inserted in the centre comes out clean. Allow to cool for 5
  minutes, then slice into 2 cm rounds.
- For the tempering, heat 1 tbsp oil in a small pan. Add mustard seeds and let them
  splutter, then add sesame seeds, curry leaves, and slit green chilli. Sauté for
  30 seconds.
- Add the sliced muthia to the pan and toss gently for 1–2 minutes so each piece is
  coated with the tempering. Serve warm with green chutney.
