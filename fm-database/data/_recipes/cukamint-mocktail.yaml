steps:
- Place the cucumber pieces and mint sprigs in a blender with 1 cup of the coconut
  water; blend on high for 1 minute until completely liquefied.
- Add the remaining cup of coconut water and the lime juice to the blender and pulse
  briefly to combine.
- Pour into 2 tall glasses or 4 tumblers over 2 ice cubes per glass; garnish with
  lime wedges.
