one_line: Soft paneer simmered with wilted fenugreek greens in a light onion-tomato
  gravy.
headnote: The slight bitterness of methi balances the richness of paneer beautifully,
  and a light tomato base keeps the dish from feeling heavy. It comes together in
  one pan and pairs equally well with roti or steamed rice.
