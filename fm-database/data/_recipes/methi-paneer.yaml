steps:
- Heat the oil in a pan and sauté the chopped onion until soft and golden.
- Add the ginger-garlic paste and cook for a minute until the raw smell goes.
- Stir in the tomato puree, turmeric, coriander powder and salt; cook until the oil
  separates.
- Add the chopped methi leaves and cook down for 3 to 4 minutes until wilted and fragrant.
- Fold in the paneer cubes and a splash of water to loosen the gravy.
- Simmer gently for 5 minutes so the paneer absorbs the flavours.
- Finish with garam masala, stir through, and serve hot with roti or rice.
