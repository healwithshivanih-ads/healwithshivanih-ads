ingredients:
- item: apples, cored and quartered
  qty: '2'
  unit: whole
- item: kale leaves or baby spinach
  qty: '4'
  unit: leaves
- item: fresh lemon juice
  qty: '1'
  unit: whole lemon
- item: fresh ginger, peeled and roughly chopped
  qty: '1'
  unit: inch piece
- item: water
  qty: '1.5'
  unit: cups
steps:
- Place all ingredients — apples, kale or spinach, lemon juice, ginger, and water
  — in a blender carafe.
- Blend until smooth and juice-like in consistency, adding more water if needed.
- Strain the mixture through a large strainer into 2 glasses, pressing the pulp with
  the back of a spoon to extract as much juice as possible.
- Serve immediately.
