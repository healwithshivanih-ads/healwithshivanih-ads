one_line: A blended-and-strained apple-kale-ginger green juice — tridoshic and deeply
  cleansing, balancing bitter, sweet, sour, and pungent tastes in one glass.
headnote: The four tastes in this juice — bitter from kale, sweet from apple, sour
  from lemon, and pungent from ginger — make it unusually complete as a kapha-clearing,
  liver-supporting spring drink.
