steps:
- Rub the sliced karela with a little salt and set aside for 15 minutes, then squeeze
  out the bitter juice and rinse lightly.
- Heat oil in a kadhai, add rai and let it splutter, then add jeera and hing.
- Add the sliced onion and saute till soft and golden.
- Add the karela with haldi, chilli, dhania powder and salt; toss to coat.
- Cover and cook on low heat, stirring often, till the karela is soft, about 15 minutes.
- Uncover, sprinkle amchur, raise the heat and cook till dry and lightly crisp; serve
  hot with roti.
