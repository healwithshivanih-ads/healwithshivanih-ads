one_line: A classic dry karela sabzi with sweet onions to balance the bitterness.
headnote: Bitter gourd is one of the most respected foods for blood sugar in Indian
  kitchens. Salting it first and cooking it down with sweet onion and amchur softens
  the bitterness into a moreish side.
