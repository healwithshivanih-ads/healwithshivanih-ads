steps:
- Combine the cooked rice and coconut milk in a medium saucepan and heat over medium-high, stirring, until
  the mixture comes to a boil.
- Stir in the chopped dates, sweetener, soaked almonds, and cardamom powder.
- Reduce the heat to low, cover, and simmer for 15 minutes, stirring occasionally, until the pudding thickens.
- Divide into 2 decorative bowls, garnish with fresh mint leaves, and serve warm or at room temperature.
