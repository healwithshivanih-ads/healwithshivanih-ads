steps:
- Combine all the ingredients except 1 tsp of the coconut oil in a food processor.
- Run the processor until the mixture clumps into a ball; if it refuses to come together,
  add the reserved teaspoon of coconut oil and continue processing.
- Press the mixture firmly and evenly into a shallow 8 × 8-inch dish or a lidded storage
  container.
- Refrigerate until firm, then slice into 6 squares.
- Keep refrigerated until ready to eat; wrap individually in wax paper for on-the-go
  snacking.
