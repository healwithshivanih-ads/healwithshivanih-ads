steps:
- Start boiling 4 cups of water with the coriander powder in a medium saucepan.
- Coarsely chop the carrots and add them to the pot. Peel and roughly dice the ginger
  and add it too. Cover and boil for 15–20 minutes until the carrots are completely
  tender.
- Add the ghee or oil, salt, and pepper. Use an immersion blender directly in the
  pot to puree until silky smooth, or transfer to a carafe blender (cool 2–3 minutes
  first; blend from low to high).
- Ladle into 4 bowls, top each with 1/4 cup of Roasted Chickpeas and a small drizzle
  of oil.
