one_line: Velvety blended carrot-ginger soup topped with crunchy roasted chickpeas
  — warming, naturally sweet, and deeply satisfying.
headnote: Ginger is one of the most important spring spices in Ayurveda, and this
  silky carrot base lets it shine while adding the dry, protein-rich crunch of oven-roasted
  chickpeas for texture and kapha balance.
