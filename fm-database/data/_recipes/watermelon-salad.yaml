steps:
- In a large bowl, whisk together the maple syrup, a little rock salt and the zest
  and juice of the lime.
- Add the chopped watermelon and toss gently to coat.
- Fold in the mint and arugula, then scatter over the pecans and chia seeds.
- Check the seasoning and serve chilled.
