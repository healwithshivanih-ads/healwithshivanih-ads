steps:
- Soak split mung beans in water for at least 3 hours or overnight. Rinse until the water runs clear.
- Bring 4 cups of water or broth to a boil in a large saucepan over high heat. Add the drained mung beans,
  spice mix, and turmeric; return to a boil uncovered.
- Reduce heat to medium and simmer partially covered for 20 minutes (allow 30 minutes if the beans were
  not soaked). Do not stir during cooking.
- Stir in the chopped spinach until it wilts into the dal, then add salt.
- Serve in bowls over brown or white basmati rice or with everyday dosa. Drizzle 1 tsp of melted ghee
  over each serving.
