one_line: A minimalist split mung and spinach dal seasoned with turmeric and Fall Spice Mix — deeply cleansing,
  easily digestible, and tridoshic.
headnote: One of Ayurveda's most cleansing combinations — split yellow mung and spinach — simplified to
  a weeknight staple with just a handful of warming spices and a finishing drizzle of ghee.
