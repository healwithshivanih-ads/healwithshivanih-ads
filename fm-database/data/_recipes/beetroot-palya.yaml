steps:
- Warm the coconut oil in a wide frying pan over medium heat; add the mustard seeds
  and optional hing, placing a lid over the pan to contain the seeds as they pop.
- After 2–3 minutes, once the popping slows, add the diced beets and shredded coconut
  and stir to coat everything with the oil and spices.
- Sprinkle in the cinnamon and salt, then pour in the water.
- Stir once, cover the pan, reduce the heat to low, and simmer for 10 minutes until
  the beets are tender.
- Serve alongside Lemon Rice or as a stand-alone side.
