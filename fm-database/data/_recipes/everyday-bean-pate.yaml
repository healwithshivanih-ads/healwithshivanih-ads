one_line: A smooth red lentil spread seasoned with miso and lemon — a protein-rich
  Ayurvedic alternative to hummus.
headnote: Puréed home-cooked legumes are far easier to digest than their canned or
  whole-bean versions, and the miso and lemon add both probiotic benefit and a bright
  finish.
