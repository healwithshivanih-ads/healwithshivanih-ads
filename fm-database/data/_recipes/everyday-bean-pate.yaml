steps:
- Place the cooked lentils in a large mixing bowl and add 0.5 cup water, spice mix,
  miso, olive oil, and lemon juice.
- For a chunky pâté, mash everything together with a fork. For a smooth spread, process
  with an immersion hand blender, adding the extra 0.5 cup water as needed to reach
  the consistency you want.
- Serve alongside a steamed salad bowl, spread inside a collard or dosa wrap, or as
  a dip for parboiled vegetable spears.
