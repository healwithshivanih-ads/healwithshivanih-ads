one_line: Button mushrooms in a gently spiced tomato-onion masala — a weeknight curry
  that quietly puts vitamin D on the table.
headnote: Mushrooms are one of the few plant sources of vitamin D2, but only when
  they've had a little sun. Before you start cooking, spread the sliced mushrooms
  gills-up on a plate or tray and leave them in direct sunlight for 20 minutes — that
  brief exposure measurably raises their D2 content. The rest of the dish is a straightforward
  Indian masala that lets them shine.
