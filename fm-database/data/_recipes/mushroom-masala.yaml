steps:
- Sun-dry the sliced mushrooms gills-up in direct sunlight for 20 minutes before cooking,
  then set aside.
- Heat oil in a kadai over medium heat. Add cumin seeds and bay leaf; let them splutter
  for 30 seconds. Add onions and cook, stirring often, until deep golden, about 10
  minutes.
- Stir in ginger and garlic and cook for 1–2 minutes until the raw smell is gone.
  Add tomatoes, salt, turmeric, coriander powder, cumin powder, and chilli powder.
  Cook until the tomatoes break down and oil begins to release at the sides, about
  7–8 minutes.
- Add the sun-dried mushrooms, stir well to coat with the masala, and cook on medium-high
  heat for 4–5 minutes until the mushrooms are tender and slightly browned.
- Pour in the water, stir, and simmer for 3–4 minutes so the gravy comes together.
  Sprinkle in garam masala, adjust salt, and cook for 1 more minute.
- Finish with fresh coriander and serve hot with roti or rice.
