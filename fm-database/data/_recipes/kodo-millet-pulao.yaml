steps:
- Drain the soaked kodo millet and set aside; keep the peas and carrot ready.
- Heat the oil in a heavy pot, add the cumin seeds, bay leaf, cinnamon and cloves,
  and let the cumin splutter.
- Add the sliced onion and saute until soft and pale gold, then stir in the grated
  ginger for half a minute.
- Add the carrot, peas, turmeric and salt, and saute for 2 minutes.
- Stir in the drained kodo millet and toss gently to coat in the spices for a minute.
- Pour in the water, bring to a boil, then cover and cook on low for 15-18 minutes
  until the millet is soft and the water is absorbed.
- Rest, covered, for 5 minutes, then fluff gently with a fork and garnish with coriander.
