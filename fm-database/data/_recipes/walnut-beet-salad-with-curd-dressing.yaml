steps:
- Wrap the beetroots individually in foil and roast in an oven at 200 °C (or in a
  covered kadai on the stovetop with a little water) for 35–40 minutes until a knife
  passes through without resistance. Cool, peel, and cut into bite-sized cubes.
- Meanwhile, toast walnut halves in a dry pan over low heat for 3–4 minutes until
  fragrant and very lightly coloured. Set aside to cool, then roughly break each half
  into two or three pieces.
- Whisk together the curd, lemon juice, oil, roasted cumin, black pepper, honey, and
  salt in a small bowl until smooth and pourable.
- Arrange the warm or room-temperature beet cubes on a serving plate, scatter the
  walnuts over the top, then spoon the curd dressing over everything.
- Finish with chopped coriander and serve immediately while the beets are still slightly
  warm against the cool dressing.
