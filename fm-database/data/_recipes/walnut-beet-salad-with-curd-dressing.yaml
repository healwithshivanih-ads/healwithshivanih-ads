one_line: Roasted beets and toasted walnuts tossed in a light spiced curd dressing.
headnote: Walnuts bring the plant omega-3 load here, and beets — especially the deep-red
  variety at their sweetest in late winter and early spring — are a good natural source
  of folate. Roasting the beets instead of boiling them keeps more of that folate
  intact and concentrates their sweetness beautifully.
