steps:
- Dry-roast the rinsed quinoa for 2 minutes until the grains separate.
- Heat oil; splutter mustard seeds and chana dal, then add curry leaves, ginger and
  green chilli.
- Add the vegetables with a little salt and saute 3-4 minutes.
- Add the quinoa and water, bring to a boil, then cover and simmer 12-14 minutes until
  the water is absorbed and the grains are fluffy.
- Rest 5 minutes off heat, then fluff and fold in lemon juice and coriander.
