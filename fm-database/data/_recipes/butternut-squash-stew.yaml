steps:
- Toss the squash with the chopped garlic, dried thyme, rosemary and 1 tbsp olive
  oil, then roast at 220°C for about 15 minutes.
- In a deep pot, soften the onion and green chilli in the remaining oil for about
  5 minutes, then add the tomatoes and cook another 5 minutes.
- Tip in the roasted squash and garlic with all their juices, add the stock, bring
  to a boil and simmer about 5 minutes. Serve hot.
