slug: methi-water
name: Methi Water
one_line: Overnight-soaked fenugreek seed water — sipped first thing for blood sugar and digestion.
meal_type:
- drink
diet:
- vegetarian
- vegan
- gluten_free
- dairy_free
region: Indian
prep_time_min: 2
servings: 1
kcal_per_serving: 10
main_ingredients:
- fenugreek (methi) seeds
- water
ingredients:
- item: 1 tsp methi (fenugreek) seeds
- item: 1 cup water (room temperature)
steps:
- The night before, add 1 tsp methi seeds to 1 cup of water. Cover and leave on the counter overnight.
- In the morning, strain and drink the water on an empty stomach, before tea or coffee.
- The softened seeds can be chewed and swallowed too, or added to your breakfast — don't cook a fresh batch from this.
tip: Soak tonight, drink tomorrow — keep a small covered glass by the kitchen sink so it becomes automatic.
source: coach-authored (Shivani) 2026-07-07
