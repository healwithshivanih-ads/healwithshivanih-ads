steps:
- Dissolve the coconut sugar in the tablespoon of hot water and let it cool briefly.
- Combine all the ingredients — water, lime juice, cardamom powder, and dissolved
  sugar — in a small pitcher or 32-ounce jar and stir well.
- Serve in 2 tall glasses over 2 ice cubes per glass.
