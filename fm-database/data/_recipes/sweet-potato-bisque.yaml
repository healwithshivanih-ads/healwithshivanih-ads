steps:
- Warm the broth, chopped ginger, and cream or coconut milk in a medium saucepan over
  medium-high heat.
- Slice the baked sweet potatoes into several pieces and add to the pot. Stir in the
  turmeric, nutmeg, salt and pepper if using, and ghee.
- Bring to a simmer and cook until the liquid is hot and the sweet potato is heated
  through.
- Remove from heat and blend smooth with an immersion blender, making sure to fully
  puree the ginger pieces.
- Ladle into 2 bowls and finish with a small drizzle of cream or coconut milk.
