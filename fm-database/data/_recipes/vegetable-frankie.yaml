steps:
- Mash the boiled potato with red chilli powder, half the frankie masala and salt,
  and shape into two logs.
- Toast the rotis with a little butter on a hot pan for a minute each side.
- Spread green chutney over each roti, place a potato log along the edge, and top
  with sliced onion.
- Sprinkle the remaining frankie masala and lemon juice, roll up tightly and serve.
