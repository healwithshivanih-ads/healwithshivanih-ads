steps:
- Heat oil in a kadhai, add rai and let it splutter, then add jeera and urad dal and
  fry till golden.
- Add curry leaves, green chilli and hing.
- Add the shredded cabbage and peas with haldi and salt, and toss well.
- Cook uncovered on medium-high heat, stirring, for 6 to 8 minutes so the cabbage
  stays a little crunchy.
- Do not cover for long or the cabbage will turn soggy; serve hot with dal-rice or
  roti.
