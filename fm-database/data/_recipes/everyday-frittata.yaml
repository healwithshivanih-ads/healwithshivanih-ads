one_line: A baked egg dish loaded with seasonal greens — lighter than a quiche and
  spiced with turmeric and black pepper for digestibility.
headnote: Eggs prepared warm and baked rather than fried in oil are easier on digestion;
  the classic turmeric-black pepper pairing helps the body process the dense egg yolk.
