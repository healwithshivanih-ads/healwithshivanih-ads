steps:
- Steam-sauté the vegetables with 1 tbsp water in a covered frying pan on medium heat for 7–10 minutes
  until tender; drain any remaining water.
- Melt the ghee in a cast-iron or heavy oven-safe skillet over medium heat.
- Whisk the eggs, almond milk or broth, salt, pepper, and turmeric together briskly for 1–2 minutes.
- Pour the egg mixture into the hot skillet and scatter the steamed vegetables evenly over the top.
- Cook on medium heat until the eggs are nearly set, about 8–10 minutes — cut a small slit in the centre
  to check.
- Cover the skillet and cook 5–7 minutes more until the eggs are completely set.
- Cut into wedges directly in the pan or turn out onto a plate for serving.
