steps:
- Pat the tofu cubes dry with a cloth to remove excess moisture. Set aside.
- Heat oil in a kadai over medium heat. Add cumin seeds, let them splutter, then add
  the onion and sauté until golden.
- Stir in the ginger-garlic paste and cook 1 minute, then add the tomato puree with
  turmeric, chilli powder, and coriander powder. Cook 6-8 minutes until the oil separates.
- Add the green peas and salt, pour in 1 cup water, and simmer 6-7 minutes until the
  peas are nearly tender.
- Gently slide in the tofu cubes and simmer another 4-5 minutes, stirring lightly
  so they hold their shape and soak up the gravy.
- Sprinkle garam masala, stir, and garnish with fresh coriander. Serve hot with rice
  or millet roti.
