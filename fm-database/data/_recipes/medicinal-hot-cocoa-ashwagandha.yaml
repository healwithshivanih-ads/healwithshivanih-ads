one_line: A warming mug of cacao and ashwagandha with sweet spices — a delicious way to take an adaptogenic
  tonic on a cold autumn evening.
headnote: Ashwagandha's malted, earthy quality dissolves beautifully into hot cacao, turning a simple
  warming drink into a bone-nourishing, immunity-strengthening tonic that belongs in every autumn evening
  routine.
