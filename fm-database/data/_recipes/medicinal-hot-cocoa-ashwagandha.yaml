steps:
- Begin warming the milk in a medium saucepan over medium heat. Add the sweetener and cacao powder, then
  whisk briskly until the mixture begins to steam.
- Remove from heat and whisk in the cinnamon or spice mix and ashwagandha by hand or with a hand blender
  for 30 seconds to create a smooth, foamy texture.
- Pour into 2 mugs. Garnish with freshly grated nutmeg or a cinnamon stick if desired.
