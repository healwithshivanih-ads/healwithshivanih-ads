steps:
- Press the tofu gently to drain excess water, then crumble it into coarse pieces
  with your fingers or a fork.
- Heat oil in a pan over medium heat. Add cumin seeds, let them splutter, then add
  the onion and sauté until soft.
- Stir in the ginger-garlic paste and cook 1 minute, then add the capsicum and sauté
  2-3 minutes until it just softens.
- Add the tomato with turmeric and chilli powder, and cook 3-4 minutes until pulpy.
- Add the crumbled tofu and salt, stir well, and cook 4-5 minutes on medium so the
  tofu dries slightly and absorbs the masala.
- Sprinkle garam masala, fold through, and garnish with fresh coriander. Serve hot
  with millet roti or as a filling.
