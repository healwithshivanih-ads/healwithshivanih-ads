steps:
- Dry-roast the oats for 2 minutes until lightly fragrant; set aside.
- Heat oil; splutter mustard seeds, then add curry leaves, onion, ginger and turmeric
  and saute until soft.
- Add the vegetables and a little salt; cook 3-4 minutes until just tender.
- Add water and bring to a boil, then stir in the roasted oats.
- Simmer 3-4 minutes to a soft, savoury porridge; finish with coriander and serve
  hot.
