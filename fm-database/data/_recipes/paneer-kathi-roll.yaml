steps:
- Toss paneer strips with curd, tandoori masala, chilli powder and salt.
- Heat oil in a pan and sauté the onion and capsicum for a minute, then add the paneer
  and cook 3 to 4 minutes until lightly charred.
- Warm the rotis, spread green chutney, and pile the paneer filling along one edge.
- Roll up tightly, halve and serve hot.
