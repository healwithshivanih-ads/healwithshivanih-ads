one_line: A fragrant ground spice blend of roasted coriander, cumin, fennel, turmeric,
  and ginger — the master seasoning for autumn Ayurvedic cooking.
headnote: Roasting and grinding these five spices fresh creates a warming, digestive
  blend that stimulates agni and supports the body's shift from summer heat to autumn
  cool — shake it into dal, soup, or roasted vegetables.
