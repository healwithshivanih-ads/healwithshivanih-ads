steps:
- Dry-roast the coriander, cumin, and fennel seeds together in a heavy-bottomed pan
  over medium-low heat until fragrant, a few minutes.
- Transfer the roasted seeds to a wide bowl and allow to cool completely.
- Grind the cooled seeds to a uniform consistency in a spice grinder or with a mortar
  and pestle.
- Pour ground seeds back into the bowl and stir in the turmeric and ginger powders
  until evenly combined.
- Store in a sealed glass jar or shaker-top spice jar — makes approximately one month's
  supply.
