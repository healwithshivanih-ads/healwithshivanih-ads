steps:
- Blend coriander, coconut, ginger, chilli, lemon juice, and salt with a little water into a smooth chutney.
- Heat a little coconut oil, pop mustard seeds and curry leaves, and pour over the chutney.
- Serve fresh alongside chilla, dosa, idli, or rice.
