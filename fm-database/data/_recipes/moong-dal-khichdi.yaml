one_line: Soft tridoshic mung-dal & rice one-pot with cumin, ginger and ghee — easy to digest, gentle
  reset.
method: '1. Rinse 1/2 cup split mung dal + 1/2 cup basmati rice until water runs clear; soak 15 min.

  2. Warm 1 tbsp ghee, temper 1 tsp cumin seeds until fragrant; add 1 tsp grated ginger, 1/2 tsp turmeric.

  3. Add drained dal+rice, stir 1 min; add 4-5 cups water + 1/2 tsp salt.

  4. Simmer covered 25-30 min to a soft porridge; finish with chopped coriander. Add more water for a
  thinner, lighter dish.'
