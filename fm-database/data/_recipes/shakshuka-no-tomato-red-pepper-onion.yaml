slug: shakshuka-no-tomato-red-pepper-onion
name: Shakshuka, No Tomato (Red Pepper & Onion)
one_line: Eggs poached in a sweet roasted-pepper and onion base, no tomato.
meal_type:
- breakfast
- lunch
diet:
- eggetarian
- gluten_free
- dairy_free
region: Indian
main_ingredients:
- 3 eggs
- 1/2 red bell pepper (capsicum)
- 1/2 onion
- 1 tbsp coriander
- 1/4 tsp cumin
- 1/4 tsp paprika/chilli
- 1 tsp coconut oil
- salt
contains_allergens:
- egg
ingredients:
- item: 3 eggs
- item: 1/2 red bell pepper (capsicum), diced
- item: 1/2 onion, sliced
- item: 1 tbsp coriander
- item: 1/4 tsp cumin
- item: 1/4 tsp paprika/chilli
- item: 1 tsp coconut oil
- item: salt
steps:
- Sauté onion + red pepper in oil till very soft and a little jammy, 6-7 min.
- Add cumin, paprika, salt; splash of water to make a loose base.
- Make 3 wells, crack in eggs, cover and cook till whites set.
- Finish with coriander.
- 'Tip: Roasted red pepper + onion give the sweet base that tomato usually would.'
