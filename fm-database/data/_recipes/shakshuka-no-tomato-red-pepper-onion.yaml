steps:
- Sauté onion + red pepper in oil till very soft and a little jammy, 6-7 min.
- Add cumin, paprika, salt; splash of water to make a loose base.
- Make 3 wells, crack in eggs, cover and cook till whites set.
- Finish with coriander.
- 'Tip: Roasted red pepper + onion give the sweet base that tomato usually would.'
