ingredients:
- item: 3 eggs
- item: 1/2 red bell pepper (capsicum), diced
- item: 1/2 onion, sliced
- item: 1 tbsp coriander
- item: 1/4 tsp cumin
- item: 1/4 tsp paprika/chilli
- item: 1 tsp coconut oil
