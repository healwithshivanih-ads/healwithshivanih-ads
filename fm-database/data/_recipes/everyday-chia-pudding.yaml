steps:
- Soak chia seeds in the almond milk for at least 5 minutes.
- Transfer the soaked seeds, almond milk, and any mix-ins to a blender.
- Blend on high speed for 2 minutes — the longer you blend, the smoother and lighter
  the pudding.
- Let the pudding stand a few minutes to thicken, then serve in bowls.
- 'Shortcut: halve the chia and shake everything in a jar (no blender) for a thicker
  tapioca-style version.'
