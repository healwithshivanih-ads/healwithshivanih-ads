one_line: A smooth cashew and nutritional yeast sauce that coats vegetables or millets
  with a savoury, cheesy warmth.
headnote: Nutritional yeast is one of the most reliable plant-based sources of fortified
  B12 — four tablespoons here give the sauce its purpose as well as its depth. Soaked
  cashews make the base creamy without dairy. Spoon this over steamed broccoli, roasted
  sweet potato, or cooked bajra to turn a simple meal into something genuinely nourishing.
