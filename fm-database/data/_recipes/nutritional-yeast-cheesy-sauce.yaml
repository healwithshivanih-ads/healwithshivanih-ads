steps:
- Drain the soaked cashews and add them to a blender along with nutritional yeast,
  warm water, garlic, lemon juice, mustard, salt, pepper, and turmeric. Blend on high
  for 60–90 seconds until completely smooth.
- Pour the blended sauce into a small saucepan and place over low-medium heat. Stir
  in the oil and warm through for 3–4 minutes, stirring constantly, until the sauce
  thickens to a pourable coating consistency. Add a splash more water if it thickens
  too much.
- Taste and adjust salt and lemon juice. The sauce should taste savoury and rounded
  — the nutritional yeast flavour should be forward but not overwhelming.
- Pour or spoon over steamed vegetables, cooked millets, or use as a dip. Dust with
  smoked paprika before serving.
