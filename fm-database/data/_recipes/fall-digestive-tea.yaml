one_line: A warming after-meal tea combining licorice, fennel, ginger, and cinnamon
  — demulcent, acid-clearing, and grounding for the dry quality of autumn.
headnote: Licorice root's moisture-retaining properties meet fennel's acid-reducing
  and ginger's warmth in a simple simmered tea that steadies the digestive system
  through the fall transition.
