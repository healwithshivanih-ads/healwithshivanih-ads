steps:
- Bring 2 cups of water to a boil in a small saucepan.
- Coarsely chop the ginger (no need to peel). Add the chopped ginger, fennel seeds,
  cinnamon, and licorice root powder or pieces to the boiling water.
- Reduce heat to low, cover, and simmer for 10–15 minutes.
- Pour through a small tea strainer into 2 mugs. Take about 6 oz with or after meals.
