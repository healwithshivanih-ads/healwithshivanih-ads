ingredients:
- item: green mangoes
  qty: '4'
  unit: whole
- item: small green chilies or cayenne pepper (optional heat)
  qty: '2'
  unit: chilies (or 1/4 tsp cayenne)
- item: fresh gingerroot
  qty: '4'
  unit: inch piece
- item: apple cider vinegar
  qty: '0.5'
  unit: cup
