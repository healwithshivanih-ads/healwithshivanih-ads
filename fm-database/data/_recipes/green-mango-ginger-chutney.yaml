  qty: '0.75'
  unit: cup
- item: cinnamon, cumin, or coriander powder (optional neutral spices)
  qty: '1'
  unit: tsp
steps:
- Peel and chop the green mangoes into 1-inch cubes. Finely mince the chilies (removing
  seeds for less heat), and peel and chop the ginger into thin 1/2-inch pieces.
- Combine all ingredients in a large saucepan and simmer over low heat, uncovered,
  until the mixture reduces to a jam-like consistency — about 1 hour. Alternatively,
  cook overnight in a slow cooker.
- Cool, then transfer to a 16-ounce mason jar and refrigerate. Use within a few weeks.
