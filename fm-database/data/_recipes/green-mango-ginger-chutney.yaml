one_line: A tangy slow-cooked green mango and ginger chutney — a versatile winter
  condiment with a sweet-sour-spicy punch.
headnote: Use firm, fully green mangoes that are still tart; this chutney keeps in
  the fridge for weeks and adds the sour, warming qualities that Ayurveda recommends
  in late winter.
