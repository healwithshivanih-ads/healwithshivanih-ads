ingredients:
- item: ½ lemon, juiced
- item: 1 cup warm (not hot) water
steps:
- Warm 1 cup of water — comfortably warm to sip, not boiling.
- Squeeze in the juice of half a lemon and stir.
- Sip slowly on an empty stomach, then wait 20–30 minutes before tea or coffee.
tip: Rinse your mouth with plain water afterwards to protect tooth enamel.
