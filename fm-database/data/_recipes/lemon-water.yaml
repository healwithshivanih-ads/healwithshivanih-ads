slug: lemon-water
name: Lemon Water
one_line: Warm lemon water to gently wake up digestion and hydrate first thing.
meal_type:
- drink
diet:
- vegetarian
- vegan
- gluten_free
- dairy_free
region: Indian
prep_time_min: 2
servings: 1
kcal_per_serving: 6
main_ingredients:
- lemon
- water
ingredients:
- item: ½ lemon, juiced
- item: 1 cup warm (not hot) water
steps:
- Warm 1 cup of water — comfortably warm to sip, not boiling.
- Squeeze in the juice of half a lemon and stir.
- Sip slowly on an empty stomach, then wait 20–30 minutes before tea or coffee.
tip: Rinse your mouth with plain water afterwards to protect tooth enamel.
source: coach-authored (Shivani) 2026-07-07
