one_line: A thin, tangy South Indian tamarind-and-pepper broth that soothes digestion
  and clears the sinuses.
headnote: Rasam is the everyday comfort soup of South Indian homes, sipped on its
  own or spooned over rice. The pepper, cumin and garlic make it gently warming and
  easy on a tired gut.
