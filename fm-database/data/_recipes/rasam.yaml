steps:
- Soak the tamarind in half a cup of warm water for 10 minutes, then squeeze out the
  pulp and discard the fibres.
- Crush the black pepper, cumin seeds and garlic coarsely in a mortar.
- In a pot, add the tamarind extract, chopped tomato, turmeric, rasam powder, the
  crushed spice mix and 3 cups of water. Season with salt.
- Simmer on medium heat for 8-10 minutes until the raw tamarind smell goes and the
  tomato softens; do not boil hard, keep it thin and brothy.
- In a small pan, heat the ghee, splutter the hing and curry leaves, then pour this
  tempering over the rasam.
- Finish with chopped coriander leaves and switch off just as it begins to froth.
