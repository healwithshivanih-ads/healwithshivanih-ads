steps:
- Melt the ghee in a medium frying pan or wide saucepan over medium heat. Toast the
  fenugreek seeds in the ghee, stirring constantly, until aromatic, about 2–3 minutes.
- Add the tomatoes and salt to the pan and stir to combine.
- Chop the dates into small rounds and add to the pan. Reduce heat to low and simmer
  uncovered, stirring occasionally, for 15–20 minutes until the dates have almost
  dissolved and the chutney is jam-like.
- Remove from heat, stir in the lemon juice, and cool before transferring to a glass
  jar. Refrigerate and use within a week.
