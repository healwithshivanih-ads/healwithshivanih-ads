one_line: A Punjab-inspired tomato and date chutney with liver-supporting fenugreek
  — the perfect tangy accompaniment for dosa or rice.
headnote: Fenugreek seed is a traditional liver tonic in Ayurveda; this chutney repurposes
  home-canned summer tomatoes into a sweet-sour winter condiment that pairs beautifully
  with grains.
