steps:
- Heat a heavy dry pan over low-medium heat. Add flaxseeds and dry-roast, stirring
  constantly, for 3–4 minutes until they begin to pop and smell nutty — do not let
  them darken.
- Push flaxseeds to one side and add sesame seeds; roast together for 1–2 minutes,
  stirring, until sesame turns light golden.
- Add fennel seeds and carom seeds; roast for another minute until fragrant. Remove
  from heat and spread on a plate to cool completely.
- Once cool, combine all seeds in a bowl with rock salt, cumin powder and jaggery
  powder if using; mix well.
- Store in an airtight glass jar. Offer as a 1-teaspoon after-meal digestive or a
  small snack pinch.
servings: about 20 teaspoon-size servings
