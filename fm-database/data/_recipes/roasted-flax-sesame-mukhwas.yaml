one_line: A small daily spoonful of toasted flax, sesame and fennel seeds — digestive
  and quietly nourishing.
headnote: Flaxseeds are the best plant source of ALA omega-3s, and sesame brings calcium
  and lignans alongside. A brief dry roast unlocks the aroma without destroying the
  fats — keep heat gentle and the pan moving. One heaped teaspoon after a meal is
  all you need.
