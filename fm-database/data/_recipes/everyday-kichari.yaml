steps:
- Bring 5 cups of water to a boil in a large saucepan over high heat; set the remaining 1 cup aside.
- Rinse the rice and dal twice until the water runs clear, then add them to the boiling water along with
  the spice mix and optional hing; let the water return to a boil, then immediately reduce to low.
- If using hard vegetables (potatoes, carrots, squash), add them now. Partially cover with the lid ajar
  and simmer for 20 minutes without stirring.
- After 20 minutes check the water level; if the dal is not submerged, pour the reserved cup of water
  on top — do not stir. Add quick-cooking vegetables (greens, green beans) on top at this point to steam.
- Simmer partially covered for another 10 minutes.
- 'For the tempering: warm the ghee in a small skillet over medium heat, add the cumin, coriander, and
  optional fennel seeds and toast until they pop, about 2–3 minutes; remove from heat.'
- Pour the tempered spice-ghee into the kichari. Add salt, stir well, and let stand covered for a few
  minutes.
- Serve in bowls — it should have a soft, soupy consistency like a loose stew. Garnish with fresh cilantro.
