steps:
- Combine oats, figs, maple syrup, and cardamom in a clean half-pint (8 oz) glass jar.
- Pour almond milk over the top last, seal the jar with a lid, and shake well.
- Allow to soak at room temperature for several hours, or refrigerate overnight and bring to room temperature
  before eating.
