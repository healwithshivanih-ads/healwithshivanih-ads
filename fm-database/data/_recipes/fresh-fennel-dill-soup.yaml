steps:
- Trim the woody stalks from the fennel bulb and thinly slice the bulb as you would an onion.
- In a medium saucepan, sauté the fennel slices in the ghee over medium heat for about 5 minutes, stirring
  occasionally.
- Slice the kale or chard into thin strips and stir into the pan.
- Add the water, salt, beans (and dried dill if using); bring to a gentle boil, then cover and simmer
  for 20 minutes.
- Remove from the heat and stir in the fresh dill before serving.
