one_line: A simple soothing soup of fennel and leafy greens with beans — cooling, calming, and easy on
  a hot evening.
headnote: Fennel's sweet, anise-like quality paired with the bitterness of dark greens makes this a calming
  summer soup that helps the body wind down after a long, hot day.
