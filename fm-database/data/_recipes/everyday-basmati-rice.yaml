one_line: Properly rinsed and soaked white basmati that cooks up fluffy and light
  — the standard side dish in Ayurvedic meal building.
headnote: Soaking removes excess starch and makes the grain gentler on digestion;
  white basmati is preferred in Ayurveda when digestive fire is low or the gut is
  sensitive.
