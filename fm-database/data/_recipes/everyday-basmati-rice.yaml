steps:
- Rinse the rice under cool running water in a fine mesh sieve, then submerge the
  sieve in a bowl of cool water and soak for 30 minutes.
- Drain and rinse once more until the water runs clear.
- Combine the rice, water, ghee, and salt in a medium saucepan and bring to a boil
  over medium-high heat.
- Cover, reduce heat to low, and cook for 17 minutes — do not lift the lid or stir
  during this time.
- Remove from heat and leave the lid on for a further 5 minutes.
- Uncover, fluff with a fork, and serve.
