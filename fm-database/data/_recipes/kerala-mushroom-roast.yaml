one_line: Mushrooms slow-roasted with coconut, curry leaves and black pepper in the
  Kerala style — deeply flavoured and unapologetically spiced.
headnote: 'This dry-style roast is built on patience: letting the mushrooms cook down
  with freshly grated coconut until nearly all moisture is gone gives an almost caramelised
  finish. Black pepper, a cornerstone of Kerala cooking, enhances the absorption of
  the fat-soluble vitamin D that mushrooms carry. Curry leaves add their own quiet
  anti-inflammatory note.'
