steps:
- Heat coconut oil in a wide heavy pan over medium heat. Add mustard seeds and let
  them splutter, then add dried red chillies and curry leaves — stand back as they
  crackle.
- Add sliced onion and cook for 6–7 minutes over medium heat, stirring occasionally,
  until deep golden.
- Stir in ginger, garlic and green chillies; sauté for 2 minutes until fragrant.
- Add mushrooms, turmeric, coriander powder, black pepper and salt. Stir well, then
  cook uncovered over medium-high heat for 8–10 minutes, stirring every couple of
  minutes, until all mushroom moisture evaporates and the pieces start to colour.
- Reduce heat to low, add the freshly grated coconut, and roast for a further 4–5
  minutes, stirring frequently, until the coconut is lightly golden and the mixture
  is dry and fragrant. Serve hot with rice or appam.
