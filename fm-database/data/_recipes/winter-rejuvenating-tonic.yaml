steps:
- Soak the dates in warm water for 20 minutes, then drain and remove the pits.
- Drain the soaked almonds and slip off their skins by pinching each one between your
  fingers.
- Combine the dates, almonds, milk, spice mix, and ashwagandha if using in a small
  saucepan and warm over medium heat until hot — do not boil.
- Remove from heat and blend with an immersion blender until smooth, or pour into
  a blender carafe and process until the dates and almonds have fully dissolved.
- Pour into a large mug and drink warm.
