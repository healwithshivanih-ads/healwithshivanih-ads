one_line: A warm blended milk tonic with dates, soaked almonds, and ashwagandha —
  Ayurveda's answer to a building winter smoothie.
headnote: This evening tonic nourishes ojas — the Ayurvedic concept of vital essence
  — and provides sustained warmth; it is especially restorative after physical exertion
  or during periods of fatigue.
