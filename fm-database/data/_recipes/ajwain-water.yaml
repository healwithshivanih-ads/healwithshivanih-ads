slug: ajwain-water
name: Ajwain Water
one_line: Carom seed water — traditional relief for bloating and sluggish digestion.
meal_type:
- drink
diet:
- vegetarian
- vegan
- gluten_free
- dairy_free
region: Indian
prep_time_min: 5
servings: 1
kcal_per_serving: 8
main_ingredients:
- ajwain (carom) seeds
- water
ingredients:
- item: ½–1 tsp ajwain (carom) seeds
- item: 1 cup water
steps:
- 'Either: soak the ajwain in 1 cup water overnight, strain and drink in the morning.'
- 'Or: simmer the ajwain in 1 cup water for 3–4 minutes, cool to warm, strain and sip.'
- Drink on an empty stomach or after a heavy meal, as your plan suggests.
tip: Ajwain is warming — if you run hot or it feels too strong, use the smaller ½ tsp amount.
