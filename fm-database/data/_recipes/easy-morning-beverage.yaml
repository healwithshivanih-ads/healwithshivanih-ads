one_line: A first-thing-in-the-morning warm lemon water that kickstarts bile flow and gently clears overnight
  mucus buildup.
headnote: This is the Ayurvedic substitute for the morning coffee ritual — takes the same amount of time
  and sets a cleaner metabolic tone for the day.
