steps:
- Bring the water to a boil in a small pot or kettle.
- Pour into a large mug and remove from heat.
- Stir in the freshly squeezed lemon juice and optional honey.
- 'Winter variation: boil 1 tsp grated gingerroot in the water for a few minutes before
  adding the lemon.'
