one_line: A colourful bowl of steam-cooked greens, carrot ribbons, and sprouted mung over rice — the quintessential
  warm Ayurvedic salad.
headnote: Eating cooked rather than raw vegetables at most meals is one of the most immediately beneficial
  changes for gut comfort; this bowl makes that habit easy and satisfying.
