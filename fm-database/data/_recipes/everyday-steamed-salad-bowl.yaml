steps:
- Strip the stems from the kale and chard and chop the leaves into roughly 2-inch
  pieces.
- Place the greens in a large frying pan with 1 tbsp of water, cover tightly, and
  steam-sauté over medium heat for 10 minutes.
- Meanwhile, use a vegetable peeler or julienne peeler to slice the carrots into ribbons.
- Add the carrot ribbons, chopped cabbage, and sprouted mung beans to the pan; steam
  5 minutes more, then remove from heat and leave the lid slightly ajar.
- Spread 1 cup of rice across the base of each wide bowl.
- Divide the steamed vegetables over the rice, pour half the dressing over each bowl,
  and finish with toasted sunflower seeds.
