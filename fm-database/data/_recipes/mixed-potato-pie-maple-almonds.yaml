steps:
- Preheat oven to 350°F (175°C).
- 'For the almonds: mix the spice blend with maple syrup, toss the almonds in this
  mixture, then coat with the combined salt and sugar. Spread on a parchment-lined
  baking sheet and roast for 10–12 minutes. Cool and coarsely chop.'
- Lightly grease a 9-inch pie dish with ghee. Combine the mashed sweet potato, 2 tbsp
  ghee, spice mix, egg, salt, and pepper in a food processor or by hand until smooth.
- Slice the white potato (skin on) into 1/8-inch rounds and layer them across the
  bottom of the greased pie dish, overlapping to cover completely.
- Spread the mashed sweet potato mixture evenly over the white potato layer.
- Bake on the top rack for 40 minutes until the top begins to brown. Remove from oven,
  scatter the chopped maple almonds over the top, and allow to cool slightly before
  slicing.
