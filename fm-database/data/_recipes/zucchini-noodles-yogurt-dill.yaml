steps:
- Set up a saucepan with 1 cup of water and a steamer basket; bring to a boil.
- Use a julienne peeler drawn lengthwise down each zucchini to create long noodle-like strips.
- Pile the zucchini noodles into the steamer basket, cover, and steam for 3–4 minutes until just tender
  but still holding their shape; drain immediately in a colander.
- In a small bowl, whisk together the dill, yogurt, lemon juice, turmeric, salt, and pepper until smooth.
- Divide the warm noodles between 2 bowls and spoon the yogurt-dill sauce over each portion.
