one_line: A South Indian dry fry of mushrooms and cracked pepper that makes the most
  of every vitamin-D-rich bite.
headnote: Spreading mushrooms out in a single layer on a tray and leaving them in
  direct sunlight for 20 minutes gills-up before cooking can meaningfully boost their
  vitamin D. The generous cracked pepper here is not just heat — it is the flavour
  backbone of a classic South Indian kali mirch fry.
