steps:
- Wipe mushrooms clean and halve or quarter them so all pieces are roughly the same
  size. If time allows, spread them gills-up on a tray in direct sunlight for 20 minutes
  before cooking.
- Heat coconut oil in a wide, heavy pan over medium-high heat. Add mustard seeds and
  let them splutter, then drop in the dried red chillies and curry leaves and fry
  for 30 seconds until fragrant.
- Add the sliced onion and cook, stirring often, for 7–8 minutes until it turns golden
  at the edges.
- Stir in the ginger and garlic and fry for 1 minute, then add turmeric, cumin powder,
  half the cracked pepper, and salt, stirring to coat the onions.
- Add the mushrooms, toss well, and spread into a single layer. Cook on high heat
  without stirring for 3–4 minutes so the mushrooms sear and release their moisture,
  then toss and cook for another 3–4 minutes until dry and slightly browned.
- Take off the heat, add the remaining cracked pepper and lemon juice, toss well,
  and finish with fresh coriander. Serve hot.
servings: 3–4 as a side
