steps:
- Whisk besan, turmeric, red chilli powder, cumin powder, ajwain, and salt together
  in a bowl. Gradually add water, whisking to a smooth, lump-free batter the consistency
  of single cream.
- Stir in the onion, green chilli, ginger, and coriander leaves. Rest the batter for
  5 minutes.
- Heat a flat non-stick tawa over medium heat. Drizzle a few drops of oil and wipe
  with a paper towel. Pour a ladleful of batter (about 1/3 cup) into the centre and
  spread in a circular motion to a thin round roughly 18 cm across.
- Drizzle 1/4 tsp oil around the edges. Cook for 2–3 minutes until the underside is
  golden and the surface looks dry with no wet spots.
- Flip carefully and cook for 1–2 minutes more until the second side has golden patches.
  Remove and repeat with remaining batter. Serve hot with green chutney or pickle.
servings: 3 (makes ~6 cheelas)
prep_time_min: 10
cook_time_min: 20
one_line: Thin, crisp chickpea-flour pancakes spiced with carom seeds for easy monsoon-morning
  digestion.
headnote: Besan is naturally warming and protein-rich, and ajwain (carom seed) is
  one of the oldest kitchen remedies for sluggish digestion on damp, cool days. Together
  they make a batter that cooks into a light, slightly crispy pancake with a distinctive
  earthy warmth. A quick breakfast that genuinely earns its place in wet-weather eating.
