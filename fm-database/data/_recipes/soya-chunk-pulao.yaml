one_line: A one-pot basmati pulao layered with soya chunks and mixed vegetables for
  a complete protein-forward meal.
headnote: Building the whole spices into hot oil first perfumes the whole pot, while
  the soya chunks and vegetables turn plain rice into a balanced meal. Rest before
  fluffing so the grains stay separate.
