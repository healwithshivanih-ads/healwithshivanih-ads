steps:
- Boil the soya chunks in salted water for 4-5 minutes, drain, and squeeze out the
  water. Set aside.
- Heat oil in a heavy pot over medium heat. Add bay leaf, cloves, cardamom, cinnamon,
  and cumin seeds; let them sizzle until fragrant.
- Add the sliced onion and sauté until golden, then stir in the ginger-garlic paste
  and cook 1 minute.
- Add the mixed vegetables and squeezed soya chunks, sauté 3-4 minutes, then sprinkle
  garam masala and salt.
- Drain the soaked rice and add it to the pot, stirring gently to coat in the masala
  without breaking the grains.
- Pour in 2 cups water, bring to a boil, then cover and cook on low 12-15 minutes
  until the rice is fluffy and water is absorbed.
- Rest covered 5 minutes, fluff with a fork, and garnish with fresh coriander before
  serving.
