slug: buckwheat-millet-roti
name: Buckwheat / Millet Roti
one_line: Soft gluten-free flatbread from buckwheat or millet flour.
meal_type:
- side
diet:
- vegetarian
- vegan
- gluten_free
- dairy_free
region: Indian
main_ingredients:
- 1/2 cup buckwheat (or kodo/foxtail millet) flour
- warm water to bind
- pinch salt
- ghee/coconut oil to cook
contains_allergens: []
ingredients:
- item: 1/2 cup buckwheat (or kodo/foxtail millet) flour
- item: warm water to bind
- item: pinch salt
- item: ghee/coconut oil to cook
steps:
- Mix flour + salt with warm water to a soft dough; rest 5 min.
- Divide, pat or roll between sheets into small rotis (these flours don't stretch like wheat).
- Cook on a hot tawa till spotted on both sides, brushing lightly with ghee or coconut oil.
- 'Tip: Pat with damp fingers if it cracks — millet doughs like a little extra moisture.'
