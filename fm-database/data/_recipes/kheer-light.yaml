one_line: A lighter almond-milk kheer with warming ginger and cardamom — the Ayurvedic
  rice pudding re-imagined for spring's need for lighter sweetness.
headnote: Traditional kheer is richly building, but this springtime version uses almond
  milk and just a whisper of honey to satisfy the desire for something sweet without
  adding the heavy and damp qualities that kapha season calls for reducing.
