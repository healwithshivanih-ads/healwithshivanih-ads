steps:
- Combine the cooked rice, almond milk, and vanilla extract in a small pot over medium
  heat and stir to warm.
- Add the raisins, ground almonds or almond flour, cardamom, grated ginger, and saffron
  if using. Stir to combine.
- Partially cover the pot, leaving the lid slightly ajar, and simmer on low heat for
  15 minutes.
- Divide between 2 bowls and stir half a teaspoon of raw honey into each serving if
  desired.
