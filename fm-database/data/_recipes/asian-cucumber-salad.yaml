steps:
- Wash and trim the cucumbers and slice them as thinly as you can (skin on) into a
  bowl.
- Lightly toast the white sesame seeds until they just start to brown.
- Whisk the vinegar, sesame oil, maple syrup, soy sauce, grated garlic and salt together,
  pour over the cucumber and toss to coat.
- Cover and chill 10-15 minutes to marinate, then finish with the toasted sesame,
  red pepper flakes and coriander. Serve cold.
