main_ingredients:
- 2 medium cucumbers
- 3-4 sprigs fresh coriander leaves
- 1 tbsp white sesame seeds
- crushed red pepper flakes, to taste
- 1 tbsp apple cider vinegar
- 2 tsp sesame oil
- 1 tsp maple syrup
- 2 tsp gluten-free low-sodium soy sauce
- 2 cloves garlic, grated
- sea salt, to taste
