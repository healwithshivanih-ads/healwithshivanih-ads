steps:
- Heat ghee in a wide, heavy pan over low-medium heat. Add the makhana in a single
  layer and roast, stirring every minute, for 10–12 minutes until they are crisp and
  lightly golden. Break one open — it should be crunchy all the way through with no
  softness.
- Remove the pan from the heat but keep the makhana in the warm pan. Immediately sprinkle
  over the nutritional yeast, black pepper, salt, red chilli powder, and turmeric.
- Toss quickly and thoroughly for about 30 seconds while the pan is still warm so
  the yeast flakes toast lightly onto the surface of the makhana.
- Spread on a plate to cool for 2 minutes — they crisp up further as they cool. Store
  any leftovers in an airtight container for up to 3 days.
servings: '2'
prep_time_min: 2
cook_time_min: 12
one_line: Ghee-roasted fox nuts tossed with nutritional yeast, black pepper, and a
  pinch of chilli for a light, savoury snack.
headnote: Fox nuts (makhana) are a naturally light, low-fat base that carries flavour
  beautifully when slow-roasted in ghee. Tossing them while still warm with nutritional
  yeast means the flakes cling and toast slightly, making every bite carry the fortified
  B12 this snack is built around. Two tablespoons of nutritional yeast per serving
  is enough to matter without making it taste unfamiliar.
