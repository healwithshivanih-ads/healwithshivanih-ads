steps:
- If using chia seeds, soak them in a small bowl of water for 5 minutes.
- Layer the apple pieces into the blender carafe first, then add the beet, lemon juice,
  leafy greens (not the parsley yet), and the soaked chia seeds if using.
- Pour in the water or coconut water and pulse for 30 seconds, then blend on high
  speed.
- Drop the parsley leaves in through the top while the blender is running; stop and
  stir if needed to work in any stubborn solids.
- Blend until completely smooth, then pour into 2 glasses or save half in a sealed
  jar.
