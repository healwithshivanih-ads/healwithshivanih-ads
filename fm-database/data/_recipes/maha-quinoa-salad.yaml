steps:
- Bring the water to a boil in a medium saucepan; add the quinoa, cover, and reduce
  to a low simmer for 10 minutes.
- Scatter the chopped vegetables on top of the cooking quinoa, replace the lid, and
  cook for 10 minutes more until both the quinoa and vegetables are tender.
- Remove from the heat, fluff everything together with a fork, and leave uncovered
  to cool completely.
- Whisk together the lemon juice, oil, salt, and spice mix in a small bowl (or shake
  in a jar).
- Once the quinoa is cool, pour the dressing over it and toss well with a fork.
- Serve garnished with fresh parsley, on its own or alongside hummus.
