steps:
- Heat oil in a pan and splutter the mustard seeds, then add curry leaves.
- Add the sliced onion and saute until soft and light golden.
- Stir in the chopped tomato, turmeric, red chilli powder and salt, and cook until
  the tomato breaks down into a thick masala.
- Add the cooked rice and toss gently so every grain is coated, without mashing the
  rice.
- Cover and cook on low for 3 to 4 minutes to let the flavours mingle.
- Garnish with coriander and serve warm with papad or curd.
