main_ingredients:
- 2 cups sprouted moong beans
- ¼ cup green capsicum
- ½ cup tomatoes
- ¼ cup red onion
- ¼ cucumber
- 1 green chilli
- ¼ cup fresh coriander
- ½ cup pomegranate seeds
- juice of 1 lime
- 1 tsp cumin powder
- 1 tsp dry mango powder
- salt and black pepper, to taste
