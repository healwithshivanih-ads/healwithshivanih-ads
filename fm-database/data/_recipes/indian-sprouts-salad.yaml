steps:
- Finely chop all the vegetables to a similar small size.
- In a large bowl, toss together the chopped vegetables, sprouted moong and half the
  pomegranate seeds.
- Season with lime juice, cumin, dry mango powder, salt, pepper and fresh coriander,
  and mix well.
- Scatter over the remaining pomegranate seeds and serve. (Steam or boil the sprouts
  first and cool them if you are unsure of their source.)
