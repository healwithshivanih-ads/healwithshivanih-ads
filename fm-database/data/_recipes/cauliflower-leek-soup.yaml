  qty: '1'
  unit: tsp
steps:
- Warm the oil in a large saucepan over medium heat. Chop the white part of the leek into thin 1-inch
  strips and the cauliflower into 1-inch pieces.
- Sauté the leek in the hot oil for about 5 minutes until soft.
- Add the cauliflower pieces, broth, and Spring Salts to the pan. Cover and simmer for 20 minutes until
  the cauliflower is completely soft.
- Remove from heat and puree with an immersion blender directly in the pot until silky smooth. Alternatively,
  transfer to a carafe blender, cool 2–3 minutes, and blend from low to high speed.
- Ladle into 2 large bowls and serve.
