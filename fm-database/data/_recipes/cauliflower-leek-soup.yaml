one_line: A creamy blended cauliflower and leek soup — lighter than the potato classic and perfectly suited
  to the damp qualities of spring.
headnote: Cauliflower's dry and slightly bitter qualities replace the heaviness of potato while still
  delivering a satisfying creamy texture in this simple, versatile spring soup.
