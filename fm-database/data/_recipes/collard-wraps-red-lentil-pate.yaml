one_line: Steamed collard leaves rolled around a creamy spiced red lentil pâté and
  basmati rice — a nourishing and portable winter lunch.
headnote: Collard leaves are sturdy enough to hold a generous filling and one of the
  few dark greens at their best in winter; the miso and tahini pâté makes these wraps
  satisfying and mineral-dense.
