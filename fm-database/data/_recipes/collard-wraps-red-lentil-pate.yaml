steps:
- Rinse and soak the lentils overnight, then drain and rinse again. Boil the water in a medium saucepan,
  add the lentils and spice mix, cover, and simmer on low for 30 minutes until the lentils are soft and
  the water is absorbed.
- Cool the lentils slightly, then blend in the tahini, lemon juice, and dissolved miso. Use an immersion
  blender for a creamy pâté or a fork for more texture. Adjust consistency with a little water if needed.
- Trim the stems from the collard leaves; for sensitive digestion, also cut out the thick central rib.
  Steam the leaves in a covered pot for 3 minutes until bright green. Remove with tongs — do not overcook.
- 'To assemble each wrap: lay a steamed leaf flat, spread 1/4 cup lentil pâté and 1/4 cup rice down the
  centre, sprinkle on shredded vegetables if using, fold up the short ends, and roll like a burrito.'
