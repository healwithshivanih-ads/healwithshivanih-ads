one_line: A light, peppery rasam with soft cooked moong dal stirred through — thin
  enough to sip, substantial enough to be a meal-starter on cold evenings.
headnote: Moong dal cooked until just soft adds a quiet protein backbone without thickening
  the rasam into a dal. Black pepper in two forms — cracked into the broth and whole
  in the tempering — gives layered heat that builds slowly.
