steps:
- Pressure-cook the moong dal with 1 cup water for 2 whistles until soft but not mushy;
  set aside. Alternatively, boil in an open pot for 15 minutes.
- Soak tamarind in 1 cup warm water for 10 minutes; squeeze and strain to extract
  the pulp.
- Combine the tamarind extract, chopped tomatoes, grated ginger, turmeric, cracked
  black pepper, and 3.5 cups water in a wide pot. Bring to a boil and simmer uncovered
  for 12 minutes.
- Stir in the cooked moong dal and salt; simmer for 5 more minutes. The rasam should
  remain watery — the dal should be visible but not turn the broth thick.
- Heat sesame oil in a tempering pan. Add mustard seeds and let them pop, then add
  whole peppercorns, cumin seeds, dry red chillies, curry leaves, and asafoetida;
  fry for 30 seconds.
- Pour the tempering over the rasam, stir, and simmer together for 1 minute. Garnish
  with coriander and serve immediately.
