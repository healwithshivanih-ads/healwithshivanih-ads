steps:
- Snap or cut off the woody bottom 1–2 inches of the asparagus and discard. Chop the
  remaining stalks into 1-inch pieces.
- In a medium saucepan, boil the asparagus in 1 cup of the water until tender, about
  7 minutes.
- Transfer the asparagus and its cooking water to a blender along with the second
  cup of water, the olive oil, white beans, and Spring Salts. Blend on medium-high
  until smooth. (Alternatively, add the extra ingredients directly to the pot and
  use an immersion blender.)
- Return the soup to the saucepan and warm over low heat until hot enough to serve.
- Remove from heat, stir in the fresh lemon juice, and ladle into 2 bowls. Serve with
  lemon wedges and black pepper.
