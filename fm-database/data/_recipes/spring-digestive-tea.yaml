steps:
- Bring 2 cups of water to a boil in a small saucepan.
- Coarsely chop the gingerroot, keeping the skin on, and add it to the boiling water along with the star
  anise, cloves, peppercorns, and cinnamon.
- Reduce heat to low and simmer for at least 10 minutes — longer for a stronger brew.
- Strain into 2 mugs and drink 6 ounces with or after meals.
