one_line: Warming anti-inflammatory soup of seasonal veg + red lentils with turmeric, ginger and a touch
  of coconut milk.
method: '1. Saute 1 tsp cumin + 1 tsp grated ginger in 1 tbsp oil; add 1/2 tsp turmeric.

  2. Add 1/3 cup red lentils + 2 cups chopped seasonal vegetables + 4 cups water; simmer 20 min.

  3. Stir in 1/4 cup coconut milk, salt to taste; blend partly for a creamy soup.'
