steps:
- Rinse moong dal thoroughly under cold water.
- Boil water in a pot; add dal and turmeric.
- Simmer for 10 minutes until dal begins to soften.
- Add chopped spinach and stir; cook for another 3–4 minutes until spinach wilts and
  dal is very soft.
- Heat ghee in a small pan; add cumin seeds and let them splutter.
- Pour the tadka into the cooked dal; stir well.
- Season with salt and black pepper. Serve warm.
