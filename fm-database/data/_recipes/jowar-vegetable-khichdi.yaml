steps:
- Heat oil in a pressure cooker over medium heat. Add cumin seeds and let them crackle,
  then sauté onion, garlic and ginger until lightly golden, about 5 minutes.
- Add tomato, turmeric, coriander powder and salt. Cook until the tomato softens and
  the masala comes together, about 3 minutes.
- Add the soaked jowar, moong dal, all the vegetables and water. Stir to combine.
- Close the cooker and pressure-cook on medium heat for 6–7 whistles until the jowar
  is fully cooked and the dal is creamy. Allow pressure to release naturally.
- Open the cooker; the khichdi should be thick and porridge-adjacent but with whole,
  distinct grains of jowar. Add a splash of water and stir over low heat if it looks
  too stiff.
- Garnish with fresh coriander and serve hot.
