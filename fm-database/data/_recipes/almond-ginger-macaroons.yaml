steps:
- Preheat the oven to 375°F (190°C) and lightly grease a baking sheet with coconut oil.
- 'Combine all dry ingredients in a small bowl: almond meal, shredded coconut, baking powder, salt, sugar,
  and cacao nibs.'
- In a separate bowl, beat the egg with a fork until fluffy, then stir in the coconut oil, vanilla, and
  grated ginger.
- Pour the dry ingredients into the wet and stir just until the mixture comes together.
- Drop rounded tablespoon-sized balls onto the baking sheet, spacing them 2–3 inches apart, and gently
  flatten the bottom of each with a fork.
- Bake for 8–10 minutes until lightly browned, then cool completely on the sheet before removing.
