steps:
- Rinse the chicken liver well, pat dry, and rub with a pinch of turmeric and salt.
- Heat ghee in a pan, add the chopped onion and slit green chilli, and saute until
  the onion turns golden.
- Stir in the ginger-garlic paste and cook for a minute until the raw smell goes.
- Add the tomato, turmeric, chilli powder and salt, and cook down to a soft masala
  with the oil separating.
- Add the chicken liver and toss on medium-high for 6-8 minutes, stirring, until browned
  and just cooked through — do not overcook or it turns tough.
- Sprinkle garam masala and coriander, toss once, and serve hot.
