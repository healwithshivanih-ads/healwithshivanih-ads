steps:
- Rinse the val well. Pressure-cook with turmeric and 2.5 cups water until soft (3-4 whistles), or simmer
  covered 25-30 minutes. Whisk smooth.
- Heat ghee in a small pan. Add cumin seeds, let them splutter, then add ginger, curry leaves, and a pinch
  of hing; sauté 20 seconds.
- Pour the tempering into the cooked dal. Add salt and a little hot water for a pourable consistency.
  Simmer 3-4 minutes.
- Finish with lemon juice and coriander. Serve warm with rice or roti.
