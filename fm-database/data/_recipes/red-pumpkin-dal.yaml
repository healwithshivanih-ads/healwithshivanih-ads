one_line: A thick, coconut-enriched red lentil and kabocha squash dal — quick to cook,
  warming, and deeply satisfying for cool autumn evenings.
headnote: Red lentils and sweet kabocha squash simmer together into a gravylike dal,
  balanced by creamy coconut milk and finished with a golden tempering of ginger and
  cumin seeds.
