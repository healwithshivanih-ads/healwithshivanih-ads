steps:
- Bring water (and coconut milk if using) to a boil in a large saucepan over high
  heat.
- Rinse red lentils until the water runs clear. Add to the boiling liquid along with
  the spice mix and sweetener. Return to a boil uncovered, then reduce heat to medium.
- Chop the squash into 1-inch cubes (peel is optional for kabocha). Add to the saucepan.
  Once it returns to a boil, reduce heat to low and simmer partially covered for 30
  minutes without stirring.
- 'For the tempering: heat coconut oil in a small frying pan over medium heat. Add
  ginger, cumin seeds, and mustard seeds and cook until fragrant, 2–3 minutes. Remove
  from heat and stir in shredded coconut, continuing to stir until it turns light
  golden.'
- Stir the tempering into the dal along with the salt. Simmer uncovered for 5 more
  minutes.
- Serve as a thick soup or ladle over basmati rice.
