steps:
- Heat the milk in a saucepan until it just reaches boiling point, then reduce to
  a simmer.
- Squeeze in a small amount of lemon juice, stir in the yogurt culture, then cover
  the pot and leave it in a warm, dark spot overnight.
- By morning the milk will have set into fresh yogurt.
- Combine the yogurt with an equal quantity of water and blend until smooth and frothy.
- Sweeten with maple syrup if desired and serve.
