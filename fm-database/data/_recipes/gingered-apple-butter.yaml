steps:
- Combine the chopped apples, apple cider or juice, and maple syrup in a medium saucepan.
- Heat over medium-low heat. Add the chopped ginger and spice mix as it warms. Simmer
  for 30 minutes, stirring occasionally, until the apples are very soft and most of
  the liquid has been absorbed.
- Remove from heat and blend to a smooth puree with a hand blender or food processor.
- Cool and store in a pint-size mason jar. Spread on muffins, stir into cooked oats,
  or use as a topping for grain porridge.
