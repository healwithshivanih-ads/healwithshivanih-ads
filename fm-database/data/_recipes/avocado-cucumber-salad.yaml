steps:
- Peel the cucumber, leaving a few strips of skin on; halve lengthwise, scrape out
  the seeds, and dice the flesh into cubes.
- Halve the avocado and twist the halves apart; refrigerate the half with the stone;
  cube the flesh of the other half and scoop it free with a large spoon.
- Combine the cucumber and avocado cubes in a small bowl.
- Sprinkle with the spice mix and salt, then squeeze the lime quarter over everything
  and toss gently.
- Serve right away alongside Only Zucchini Soup.
