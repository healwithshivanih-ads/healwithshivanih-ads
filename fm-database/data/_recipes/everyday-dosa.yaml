steps:
- Rinse the rice and mung beans twice in a fine mesh sieve until the water runs clear, then soak together
  in fresh water for at least 6 hours or overnight.
- Drain and rinse the soaked rice and beans.
- Grind the mixture with the water, salt, and optional coriander in a food processor on high for 5 minutes
  (or in batches in a blender) until you have a smooth batter similar to pancake batter — at least 3 minutes
  of blending.
- Transfer the batter to a bowl, cover with a cloth, and leave somewhere warm for 8–12 hours or overnight
  to ferment and rise.
- When ready to cook, warm a ceramic non-stick pan over medium heat and add 0.5 tsp coconut oil; flick
  a few drops of water onto the surface — it's ready when they sizzle.
- Pour in about 1/3 cup batter and tilt the pan or use the back of a spoon to spread it thin and round.
- Cook until bubbles appear and the edges lift away from the pan, then check that the underside is golden
  brown — about 5 minutes.
- Flip for extra crispness if desired and cook a few minutes more.
- Serve immediately or keep stacked in a warm oven while you make the rest.
