one_line: A light, naturally fermented rice-and-mung flatbread that pairs with soups, chutneys, or sweet
  toppings.
headnote: The overnight soak and fermentation make this dosa far easier to digest than wheat-based flatbreads,
  and the mild flavour means it works equally well with savoury dips or a drizzle of maple syrup and ghee.
