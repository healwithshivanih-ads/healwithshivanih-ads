steps:
- In a small bowl, stir chia seeds into almond milk and whisk briskly with a fork
  a few times to distribute evenly. Allow to soak for 5 minutes.
- Place pumpkin puree, vanilla, dates, maple syrup, and spice mix into a blender jug.
  Add the soaked chia mixture on top.
- Blend on high speed for 2 minutes until smooth, whipped, and creamy — the chia seeds
  and dates should be fully incorporated.
- Divide between 2 dessert cups or eat from a single large bowl. Finish with a dash
  of freshly grated nutmeg on top.
