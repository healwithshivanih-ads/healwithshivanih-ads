steps:
- Lightly mash the steamed moong sprouts with a fork.
- Mix in onion, tomato, green chilli, lemon juice, chaat masala, salt and coriander.
- Spread the sprout filling on two bread slices and top with the other two.
- Toast lightly if you like, then halve and serve.
