steps:
- Pulse all the ingredients together in a food processor several times until the mixture reaches a chunky,
  jam-like consistency — do not over-process.
- Transfer to a small lidded container and allow the flavours to meld for at least 30 minutes before serving.
- Store refrigerated in a glass container for up to 3 days.
- Serve as a 1-tablespoon condiment alongside dinner to satisfy a sweet craving without loading on dessert.
