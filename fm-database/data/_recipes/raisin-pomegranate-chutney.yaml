one_line: A chunky raisin-pomegranate chutney spiced with ginger and cardamom — a
  small sweet condiment that satisfies dessert cravings without the kapha-aggravating
  load.
headnote: Ayurveda allows dried fruits in chutneys because soaking and spicing with
  cardamom and ginger transforms them into a digestible sweet — keep the serving size
  to a tablespoon and this chutney becomes a clever spring strategy for curbing sweets.
