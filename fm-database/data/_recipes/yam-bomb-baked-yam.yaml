steps:
- Preheat oven to 350°F. Pierce each yam several times with a fork, then set on a
  baking sheet or in a baking dish.
- Bake for 30 minutes or more — depending on thickness — until a fork inserted into
  the flesh slides in easily.
- Remove from oven and cut a deep X across the top of each yam. Peel back the skin
  and press the sides gently to create a hollow well.
- Fill each well with 1 tsp each of ghee, coconut oil, maple syrup, and/or almond
  butter as desired. Sprinkle generously with Sweet Spice Mix or cinnamon.
- Eat directly from the skin with a steak knife and fork.
