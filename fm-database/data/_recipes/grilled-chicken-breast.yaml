ingredients:
- item: 1 chicken breast (150 g)
- item: 1/2 tsp ginger-garlic paste
- item: 1/4 tsp pepper
- item: 1/4 tsp turmeric
- item: 1 tsp coconut oil
- item: salt
- item: lemon
steps:
- Flatten breast slightly; marinate with ginger-garlic, pepper, turmeric, salt, lemon
  — 15 min.
- Heat a grill pan with coconut oil.
- Grill 5-6 min per side till firm and cooked.
- Rest, slice, finish with lemon.
- 'Tip: Don''t overcook — breast dries fast; pull it off as soon as it''s firm.'
