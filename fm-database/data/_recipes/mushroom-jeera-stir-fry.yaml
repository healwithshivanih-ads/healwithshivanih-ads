steps:
- Heat oil in a wide pan over medium-high heat. Add cumin seeds and let them splutter
  for 20 seconds.
- Add the slit green chilli, ginger and garlic; sauté for 1 minute until fragrant.
- Add mushrooms in a single layer. Do not stir for 2–3 minutes, letting them colour
  on one side.
- Toss the mushrooms, sprinkle in turmeric, coriander powder, salt and black pepper,
  and stir-fry for another 4–5 minutes until all moisture evaporates and edges are
  lightly golden.
- Turn off the heat, finish with lemon juice and fresh coriander, and serve immediately.
servings: 2–3
prep_time_min: 10
cook_time_min: 12
one_line: Button mushrooms tossed in a cumin-forward tempering — a fast, earthy side
  that brings vitamin D to any plate.
headnote: Leaving mushroom slices in a single layer on a hot pan (rather than stirring
  constantly) lets them brown properly and deepens their natural vitamin-D content,
  which builds up when mushrooms are briefly exposed to sunlight gills-up before cooking.
  Cumin adds warmth and aids digestion.
