steps:
- Rub the brinjal with a little oil and roast it over an open flame or in the oven
  till the skin chars and the flesh is soft.
- Cool, peel off the charred skin and mash the smoky flesh with a fork.
- Heat oil in a kadhai, crackle the jeera, then add onion, green chilli and ginger-garlic
  paste; saute till golden.
- Add tomato, haldi and chilli powder; cook till the tomato breaks down and the oil
  separates.
- Stir in the mashed brinjal with salt and cook for 5 to 7 minutes so the flavours
  come together.
- Finish with fresh coriander and serve hot with roti or bajra rotla.
