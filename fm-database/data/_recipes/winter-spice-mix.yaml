one_line: A roasted cumin-coriander-turmeric blend that forms the flavour backbone of virtually every
  winter Ayurvedic dish.
headnote: Having this spice mix ready in a jar makes weeknight cooking effortless; the combination of
  warming and carminative spices is calibrated to support digestion and counter vata's cold, dry tendencies.
