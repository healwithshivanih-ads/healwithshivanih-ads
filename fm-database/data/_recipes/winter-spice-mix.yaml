steps:
- Dry-roast the coriander and cumin seeds together in a heavy-bottomed pan over medium
  heat, stirring, until fragrant — just a few minutes.
- Cool completely, then combine with the remaining ingredients and grind to a uniform
  powder in a spice grinder or with a mortar and pestle.
- Store in a small glass jar with a shaker top.
