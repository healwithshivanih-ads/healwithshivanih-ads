headnote: Tempeh is made by fermenting whole soybeans into a firm, nutty cake — that
  fermentation makes the protein easier to absorb and brings B-vitamins along for
  the ride. Cooking it on a dry tawa gives it a slightly charred crust that takes
  the masala coating beautifully.
