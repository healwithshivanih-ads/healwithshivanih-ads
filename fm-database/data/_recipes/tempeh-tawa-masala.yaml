steps:
- Mix turmeric, ¼ tsp red chilli powder, ¼ tsp salt, and 1 tbsp oil in a bowl. Toss
  the tempeh slices in this marinade and set aside for 10 minutes.
- Heat a tawa or flat skillet over high heat. Place the marinated tempeh slices on
  the dry tawa and cook for 2–3 minutes per side until charred patches appear. Remove
  and set aside.
- Drizzle 2 tbsp oil on the same tawa over medium-high heat. Add sliced onions and
  cook, tossing frequently, for 5–6 minutes until they begin to brown at the edges.
- Add ginger-garlic paste and cook for 1 minute. Add the chopped tomatoes, remaining
  spices (coriander powder, cumin powder, remaining red chilli powder, garam masala,
  amchur, and remaining salt) and cook until the tomatoes are soft and oil starts
  to separate, about 5 minutes.
- Add the capsicum strips and toss for 2 minutes — they should stay slightly crunchy.
  Slide in the seared tempeh slices and press them gently into the masala. Cook together
  for 2 minutes, turning once.
- Squeeze lemon juice over the top, garnish with fresh coriander, and serve hot with
  roti or as a bowl with cucumber slices on the side.
