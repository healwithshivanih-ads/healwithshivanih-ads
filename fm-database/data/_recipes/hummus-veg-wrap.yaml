steps:
- Warm the rotis so they roll without cracking.
- Spread two tablespoons of hummus over each roti.
- Layer cucumber, carrot, lettuce and onion along one edge, then season with lemon,
  pepper and salt.
- Roll up tightly, cut in half and serve.
