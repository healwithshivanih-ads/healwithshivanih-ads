steps:
- Peel and cube the sweet potatoes into even bite-sized pieces.
- Toss the cubes with oil, turmeric, chilli powder, cumin powder and salt until evenly
  coated.
- Spread them in a single layer on a baking tray or heavy pan.
- Roast in a hot oven, or cook covered on the stovetop, turning occasionally, until
  tender inside.
- Continue until the edges are caramelised and crisp, about 25 minutes.
- Sprinkle with chaat masala and a squeeze of lemon juice.
- Toss once and serve warm as a side or snack.
