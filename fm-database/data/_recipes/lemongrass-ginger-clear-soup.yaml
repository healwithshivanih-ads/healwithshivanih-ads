steps:
- Bruise the lemongrass stalks firmly with the flat of a knife to release their oils.
  Combine lemongrass, ginger coins, smashed garlic, green chilli, carrot, celery,
  and spring onion in a pot with 5 cups water.
- Bring to a boil, then reduce to a steady simmer. Steep uncovered for 20 minutes
  so the aromatics fully infuse the broth.
- Strain the broth through a fine sieve, pressing the solids gently; discard the spent
  aromatics. Return the clear broth to the pot.
- Season with salt, cracked black pepper, and sesame oil. Bring back to a gentle simmer.
- If using rice noodles, add the pre-soaked noodles and simmer for 2 minutes until
  just soft. For a fully clear soup, skip the noodles.
- Turn off the heat, stir in the lime juice, and taste — adjust salt and lime as needed.
  Pour into bowls and finish with fresh coriander leaves.
servings: 3–4
prep_time_min: 10
cook_time_min: 25
one_line: A pale, aromatic clear broth steeped with lemongrass and ginger — light
  enough for heavy monsoon evenings when a full meal feels like too much.
headnote: Lemongrass and ginger infused into a vegetable broth make the kitchen smell
  like something is being deeply cared for. The soup does its best work when the broth
  is strained and kept genuinely clear — all warmth, no weight.
