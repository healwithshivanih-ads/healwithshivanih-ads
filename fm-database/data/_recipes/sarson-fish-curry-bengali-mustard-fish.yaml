one_line: Tender fish simmered in a sharp, golden mustard-poppy paste — a weekday
  staple from the Bengali kitchen.
headnote: Mustard seeds and mustard oil both carry alpha-linolenic acid, and a fatty
  fish like rohu or hilsa adds the longer-chain EPA and DHA that the body can use
  directly. Grinding the mustard fresh keeps its oils intact and the flavour clean.
