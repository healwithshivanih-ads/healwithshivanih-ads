steps:
- Soak yellow mustard seeds, black mustard seeds and poppy seeds in 3 tbsp water for
  15 minutes, then grind to a smooth paste with 2 green chillies, a pinch of salt
  and 2 tbsp water.
- Rub the fish steaks with ½ tsp turmeric and ½ tsp salt; let them sit for 10 minutes.
- Heat mustard oil in a wide pan over medium-high heat until it just begins to smoke,
  then lower to medium. Lightly fry the fish steaks for 2 minutes per side until the
  surface turns golden; remove and set aside.
- In the same pan add the mustard-poppy paste and the remaining ½ tsp turmeric; stir
  for 2 minutes until fragrant and the raw edge of the mustard has softened.
- Pour in 1½ cups water, remaining salt and the rest of the slit green chillies; bring
  to a gentle simmer.
- Slide the fish back in and cook uncovered for 8–10 minutes, spooning the gravy over
  the steaks once or twice, until the oil floats to the surface.
- Finish with torn coriander and serve hot with steamed rice.
servings: 3–4
