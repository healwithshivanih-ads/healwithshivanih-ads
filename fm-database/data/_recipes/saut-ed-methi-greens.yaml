contains_allergens: []
ingredients:
- item: 1 small bunch methi (fenugreek) leaves, cleaned
- item: 1 tsp garlic, sliced
- item: 1/4 tsp cumin
- item: 1 tsp coconut oil
- item: salt
- item: pinch chilli
steps:
- Heat oil, crackle cumin + garlic.
- Add methi leaves, toss on high 3-4 min till wilted.
- Season with salt and a pinch of chilli; cook till dry.
- 'Tip: A squeeze of lemon offsets methi''s slight bitterness.'
