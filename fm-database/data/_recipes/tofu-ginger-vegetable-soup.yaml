one_line: A warming ginger-miso tofu soup with vegetables and brown rice, rounded
  out with fresh herbs and water chestnuts.
headnote: This is a complete, nourishing bowl that balances plant protein and whole
  grains with a broth deep enough to satisfy. The long simmer lets the miso and ginger
  build flavour naturally—it suits lunch or dinner any time of year.
