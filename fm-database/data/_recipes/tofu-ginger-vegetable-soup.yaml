steps:
- Heat sesame oil in a large soup pot over medium heat.
- Sauté the chopped onions, carrots, and celery until softened, about 5–7 minutes.
- Add the minced ginger and garlic, stirring constantly for about 1 minute until fragrant.
- Stir in the miso paste until dissolved, then add the water and soy sauce.
- Bring the soup to a boil, then lower the heat and simmer gently.
- About 30 minutes before serving, add the tofu cubes, bean sprouts, shredded carrots,
  snow peas, mushrooms, water chestnuts, and cooked brown rice.
- Simmer until all vegetables are tender and the flavours meld, about 25–30 minutes.
- Taste and adjust salt as needed.
- Stir in the scallions and cilantro just before serving.
- Add red pepper flakes to taste for a gentle heat.
