steps:
- Heat oil in a kadhai and add hing, then the crushed garlic, ginger and green chilli.
- Saute for a minute till the garlic is fragrant, then add the onion and cook till
  soft.
- Add the chopped mustard greens with haldi and salt.
- Cook uncovered on medium heat, stirring, till the greens wilt right down and soften,
  about 10 minutes.
- Dry off any moisture so the saag is thick, not watery, and serve hot with roti or
  bajra rotla.
