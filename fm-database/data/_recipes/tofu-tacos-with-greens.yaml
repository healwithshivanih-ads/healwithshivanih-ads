steps:
- Combine all the spices and salt in a small bowl.
- Rinse the tofu and press it between your palms to squeeze out excess water. Mash it with a fork in a
  bowl, then stir the mashed tofu into the spice mixture until well coated.
- Warm the oil or ghee in a medium frying pan over medium-low heat. Add the spiced tofu and fry, stirring
  every few minutes with a spatula, for about 5 minutes.
- Add the chopped greens and fold them in. Continue cooking and stirring for another 5 minutes until the
  tofu begins to brown. Remove from heat and cover to keep warm.
- Pat the tortillas with damp hands to soften them. Lay them flat in a large pan over low heat and warm
  for 2–3 minutes, taking them off before the edges curl.
- Place 2 tortillas on each plate, spoon a strip of tofu across each, add desired toppings, and finish
  with a squeeze of lime. Fold and eat.
