one_line: Spiced crumbled tofu with wilted greens in warm corn tortillas — a satisfying
  spring lunch that stays light without feeling like a compromise.
headnote: Corn is naturally dry and the bitter greens offset tofu's heavier protein
  qualities, making these tacos a well-balanced kapha-season meal that won't leave
  you sluggish.
