steps:
- Heat oil in a kadhai and crackle the jeera with hing.
- Add the sliced garlic and green chilli and saute till the garlic is just golden.
- Add the chopped spinach with haldi and salt, and toss on high heat.
- Cook uncovered for 3 to 4 minutes, stirring, till the spinach wilts and any water
  dries off.
- Squeeze over the lemon juice, toss once and serve hot.
