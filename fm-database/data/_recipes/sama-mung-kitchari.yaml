one_line: A light, tridoshic kitchari of split mung dal and quick-cooking sama millet.
headnote: Sama (barnyard millet) stands in for rice here, giving a lighter grain that
  still cooks down soft and soupy. A classic agni-reset meal that suits fasting days
  and gentle resets alike.
