steps:
- Dry-roast the split mung dal in a pan for 2 minutes until fragrant, then rinse the
  dal and sama together and drain.
- Heat the ghee in a pressure cooker, add the cumin seeds and hing, and let the cumin
  splutter.
- Add the grated ginger and turmeric, stir briefly, then add the diced vegetables
  and saute for a minute.
- Add the drained sama and mung dal with the salt and water, and stir well.
- Pressure-cook for 3-4 whistles (or simmer covered for 25-30 minutes) until soft
  and porridge-like.
- Open the cooker and stir to a soft, soupy kitchari, adding hot water if it has thickened.
- Garnish with fresh coriander and serve warm.
