steps:
- Preheat the oven to 350°F and line a baking sheet with parchment paper.
- Mash the cannellini beans well with a fork in a large mixing bowl.
- Finely chop the spinach and dice the artichoke hearts, then stir them into the mashed
  beans.
- Add the flaxseed, Spring Salts, and lemon zest (plus olive oil if using steamed
  artichokes instead of marinated). Mix until the mixture is uniformly chunky.
- Shape into 6 patties, place on the parchment-lined sheet, and bake for 10 minutes
  on each side.
- Alternatively, heat 1 tsp of ghee in a non-stick pan and pan-fry each patty over
  medium heat for about 5 minutes per side until browned.
- Serve with stone-ground mustard.
