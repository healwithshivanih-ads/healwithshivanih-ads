one_line: Baked patties of mashed white beans and artichoke with spinach and flaxseed
  — lemony, light, and easy to pack for lunch.
headnote: Artichoke's bitter, liver-supportive qualities combine with the protein
  of white beans and the binding power of flaxseed to create a spring croquette that
  is satisfying without being heavy.
