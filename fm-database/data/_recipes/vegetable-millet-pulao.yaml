one_line: A savoury, fluffy vegetable upma tempered with mustard and curry leaves and studded with vegetables.
headnote: Dry-roasting the vegetable before cooking keeps the upma light and fluffy rather than sticky
  — a warm, grounding breakfast that's gentle on digestion.
