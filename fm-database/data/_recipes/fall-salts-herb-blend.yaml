one_line: A simple herb salt of sage, rosemary, thyme, and pepper — a fresh, non-Indian seasoning option
  for autumn dishes when you want warming without Indian spice flavours.
headnote: When you want the warming, grounding character of autumn cooking without Indian spice flavours,
  this garden-herb salt brings stimulating freshness to roasted vegetables, grains, and soups.
