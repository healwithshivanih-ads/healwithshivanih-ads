steps:
- Grind the dried herbs in a mortar and pestle until fine enough to pass through a shaker top.
- Mix the ground herbs with the sea salt and black pepper in a glass shaker jar.
- Use as a cooking seasoning or as a table condiment. Makes approximately one month's supply.
