steps:
- Heat 1 tsp oil in a small pan over medium heat. Add mustard seeds and let them splutter,
  then add cumin seeds, curry leaves, green chilli, and ginger. Sauté for 30 seconds.
- Add the onion and carrot, stir-fry for 2–3 minutes until the onion softens slightly.
  Remove from heat and let cool for 5 minutes.
- Stir the sautéed vegetables, coriander leaves, and salt into the fermented batter.
  Mix gently — do not over-stir.
- Heat a paniyaram pan over medium heat. Add a few drops of oil into each cavity.
  Pour a spoonful of batter into each cavity, filling about three-quarters full.
- Cover and cook for 3–4 minutes until the bottoms are golden and the tops look set.
  Flip each paniyaram with a skewer or thin spoon and cook uncovered for 2 more minutes.
- Remove and serve hot with coconut chutney or tomato chutney.
