contains_allergens: []
ingredients:
- item: 1/2 cup quinoa, rinsed well
- item: 1 cup mixed vegetables (carrot, beans, peas)
- item: 1 small onion, sliced
- item: 1 tsp ginger, grated
- item: 1 bay leaf + 2 cloves + small cinnamon
- item: 1/4 tsp cumin
- item: 1 tsp coconut or olive oil
- item: 1 cup water
- item: salt
steps:
- Rinse quinoa thoroughly until the water runs clear.
- Heat oil, add whole spices + cumin, then onion and ginger; sauté till soft.
- Add vegetables, toss 2 min.
- Add quinoa, water and salt; bring to a boil.
- Cover and simmer 12-15 min till the grain uncoils and water is absorbed.
- Rest 5 min, fluff with a fork.
