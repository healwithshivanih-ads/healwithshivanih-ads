steps:
- Soak the dried chickpeas in plenty of cold water overnight.
- Drain, rinse, and simmer the chickpeas in a large pot with 8 cups of fresh water
  for about 2 hours, until the skins begin to come off and you can easily squash a
  bean between your fingers; drain, reserving the cooking liquid.
- Transfer the chickpeas to a food processor or blender with the olive oil, lemon
  juice, tahini, and salt; blend until smooth, adding a few tablespoons of the reserved
  cooking water if needed to reach a creamy consistency.
- Add the fresh herbs and pulse just until they are evenly distributed through the
  hummus.
- Serve in a wide bowl drizzled with olive oil, or store refrigerated in sealed containers
  for up to 5 days.
