one_line: Home-cooked chickpeas blended with tahini, lemon, and a generous handful of fresh herbs — whole-food
  hummus far cleaner than any shop-bought version.
headnote: Making hummus from scratch with whole dried chickpeas gives you complete control over the ingredients
  and lets you pack in whatever cooling summer herbs are growing in your garden.
