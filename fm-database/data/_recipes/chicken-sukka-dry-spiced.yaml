diet:
- non_vegetarian
- gluten_free
- dairy_free
region: Indian
main_ingredients:
- 150 g chicken
- 2 tbsp grated fresh coconut
- 1 onion
- 1 tsp ginger-garlic paste
- 1/2 tsp turmeric
- 1/2 tsp chilli powder
- 1 tsp coriander powder
- 6 curry leaves
- 1 tsp coconut oil
- salt
contains_allergens: []
ingredients:
- item: 150 g chicken, small pieces
- item: 2 tbsp grated fresh coconut
- item: 1 onion, chopped
- item: 1 tsp ginger-garlic paste
- item: 1/2 tsp turmeric
- item: 1/2 tsp chilli powder
- item: 1 tsp coriander powder
- item: 6 curry leaves
- item: 1 tsp coconut oil
- item: salt
steps:
- Cook chicken with turmeric, salt and 1/4 cup water till dry and tender; set aside.
- Heat oil, fry curry leaves + onion till golden.
- Add ginger-garlic, chilli and coriander powder; bhuno 1 min.
- Add the cooked chicken, toss on high till coated and dry.
- Add grated coconut, toss 2 min till fragrant.
- 'Tip: Dry dishes like this pair well with a thin dal or buttermilk on the side.'
