steps:
- Heat 200 ml milk alternative in a small pan over medium heat until steaming (not
  boiling).
- Pour into a cup and stir in 1/4 tsp ashwagandha powder until fully dissolved.
- Add 1/2 tsp ghee and a pinch of honey or jaggery for sweetness.
- Stir well, add a pinch of nutmeg or crushed cardamom if desired.
- Sip warm before bed.
