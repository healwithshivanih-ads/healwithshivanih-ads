steps:
- Combine calamus root powder with eight parts water in a saucepan and bring to a boil.
- Reduce by continued boiling until only one-quarter of the original volume remains as a strong decoction.
- Measure one part of this decoction and place it in a clean pan with an equal part of prepared ghee.
- Pour in an equal part of fresh water and return to the boil.
- Cook, stirring occasionally, until all water has cooked off and only the infused ghee is left.
