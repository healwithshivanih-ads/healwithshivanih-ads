one_line: A high-fibre jowar millet pulao loaded with vegetables and a peanut crunch
  — filling and light.
headnote: Swapping rice for jowar (sorghum) roughly triples the fibre and slows digestion,
  so this pulao keeps you full for hours. A handful of vegetables and peanuts rounds
  out the protein for a satisfying, weight-loss-friendly lunch. The source reports
  about 380 kcal, 14 g protein and 15 g fibre per serving.
