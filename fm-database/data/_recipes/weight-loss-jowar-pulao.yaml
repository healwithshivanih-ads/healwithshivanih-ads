steps:
- Soak the jowar overnight, then pressure cook it with the water and salt for 10–12
  whistles until soft; drain any excess water.
- Heat the ghee or oil and let the mustard seeds crackle, then add the cumin seeds
  and peanuts and sauté for 2 minutes.
- Stir in the ginger, green chillies and curry leaves and cook for a minute until
  fragrant.
- Add the chopped carrot, beans, peas, sweet corn and tomato and cook for about 5
  minutes until just tender.
- Fold in the cooked jowar with the pepper, lemon juice, salt and coriander, mix well
  and serve hot.
