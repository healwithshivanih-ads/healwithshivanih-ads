steps:
- Rinse the moong dal and rice together and drain.
- Heat ghee in a pressure cooker; splutter the cumin, then add curry leaves, ginger
  and turmeric.
- Add all the chopped vegetables and saute 2 minutes.
- Add the dal-rice, salt and water; pressure-cook 3-4 whistles until everything is
  soft.
- Mash lightly to a soft khichdi, loosen with hot water if needed, and finish with
  coriander.
