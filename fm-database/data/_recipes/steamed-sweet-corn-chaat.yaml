steps:
- If using fresh corn, shuck the cobs and cut the kernels off. Place the kernels in
  a steamer basket set over boiling water, cover, and steam for 10–12 minutes until
  just tender. Frozen kernels need only 5–6 minutes.
- Transfer the hot steamed corn to a mixing bowl and let it sit for a minute — you
  want it warm, not piping hot, when you dress it.
- Add the lemon juice, roasted cumin powder, red chilli powder, black salt, and regular
  salt. Toss well so every kernel is coated.
- Add the chopped coriander leaves and green chilli, toss once more, taste and adjust
  lemon or salt, and serve immediately in small bowls or paper cones.
servings: '2'
prep_time_min: 10
cook_time_min: 12
one_line: Steamed corn kernels tossed with lemon juice, roasted cumin, and fresh coriander.
headnote: Corn on the cob is the quintessential monsoon street food across India.
  Steaming the kernels rather than boiling keeps them sweet and firm, and the simple
  toss of roasted cumin, lemon, and coriander is all the seasoning they need.
