steps:
- Bring the water or broth to a boil in a medium saucepan over high heat.
- Add the vegetables, spice mix, turmeric, and gingerroot; reduce heat and simmer
  covered for about 10 minutes — longer for a creamier result, shorter for a more
  textured soup.
- Transfer the vegetables and cooking liquid to a blender, add the ghee and almond
  milk (the milk cools the mixture so the blender does not overheat), and blend from
  medium to high until smooth.
- Alternatively, use an immersion hand blender directly in the saucepan.
- The soup should be warm enough to serve immediately; ladle into bowls.
