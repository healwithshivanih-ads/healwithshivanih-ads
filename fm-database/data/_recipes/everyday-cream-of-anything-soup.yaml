one_line: A fast blended green vegetable soup thickened with almond milk — grounding,
  warming, and adaptable to any season's greens.
headnote: Swapping the vegetables to match the season transforms this single method
  into a year-round soup repertoire; the ghee and almond milk give it a silky body
  without any cream.
