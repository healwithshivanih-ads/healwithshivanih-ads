steps:
- Dry-roast the bajra rava on low until it smells nutty; set aside.
- Heat oil; splutter mustard seeds and urad dal, then add curry leaves, ginger and
  green chilli.
- Add the chopped vegetables and a little salt; saute 3-4 minutes until just tender.
- Pour in hot water, bring to a boil, then lower the heat and stream in the roasted
  bajra rava, stirring to avoid lumps.
- Cover and steam 5-6 minutes until fluffy. Fold in roasted til and lemon juice before
  serving.
