steps:
- Combine all ingredients in a deep bowl.
- Use a hand blender to puree everything together until smooth, or to whatever texture
  you prefer.
- Serve in a bowl with vegetable dippers such as parboiled carrot sticks, baked sweet
  potato wedges, or lettuce leaves. Optionally top with reserved salsa and a sprig
  of parsley.
