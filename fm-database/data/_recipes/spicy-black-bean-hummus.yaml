one_line: A quick blended black bean dip spiced with cumin, lemon, and apple cider
  vinegar — light, pungent, and kapha-balancing.
headnote: Black beans blended with the sharp bite of cumin and apple cider vinegar
  make a dip that delivers the astringent and pungent tastes spring calls for, without
  the tahini heaviness of traditional hummus.
