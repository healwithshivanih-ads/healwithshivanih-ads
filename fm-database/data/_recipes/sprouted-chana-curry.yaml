steps:
- Heat the oil in a pan and crackle the cumin seeds.
- Add the chopped onion and sauté until soft and lightly browned.
- Stir in the ginger-garlic paste and cook for a minute, then add the tomato, turmeric,
  coriander powder and salt.
- Cook until the tomato breaks down and the masala thickens.
- Add the sprouted chana with a cup of water and bring to a simmer.
- Cover and cook for 12 to 15 minutes until the sprouts are tender but still hold
  shape.
- Finish with garam masala, stir, and serve hot with roti or rice.
