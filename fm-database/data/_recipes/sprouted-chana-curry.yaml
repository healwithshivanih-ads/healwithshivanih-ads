one_line: Tender sprouted chickpeas simmered in a spiced onion-tomato masala for a
  protein-packed everyday curry.
headnote: Sprouting the chana makes it easier to digest and lifts its protein availability
  while keeping the curry light. A simple onion-tomato base lets the nutty sprouts
  stay the star of the plate.
