steps:
- Knead the atta with a pinch of salt and water into a soft dough, cover and rest
  15 minutes.
- Grate the paneer and mix with green chilli, coriander, cumin powder, garam masala
  and salt.
- Divide dough into 4 balls, flatten each, place the paneer filling in the centre
  and pinch the edges to seal.
- Dust with flour and roll gently into a paratha, keeping the filling evenly spread.
- Cook on a hot tawa, flip, and drizzle ghee on both sides until golden and lightly
  crisp.
- Serve hot with curd or pickle.
