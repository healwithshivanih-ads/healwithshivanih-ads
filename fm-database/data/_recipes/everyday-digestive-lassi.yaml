one_line: A thin, churned yogurt drink diluted 4:1 with water and spiced with turmeric
  and ginger — the Ayurvedic probiotic digestif.
headnote: The churning introduces lightness to dense whole-fat yogurt, making it genuinely
  digestive rather than heavy; nothing like the thick restaurant lassi.
