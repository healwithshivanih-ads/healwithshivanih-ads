steps:
- Pour the room-temperature water into a 16-ounce glass jar.
- Add the yogurt, turmeric, and ginger.
- Blend on high with an immersion hand blender for 1 minute until the mixture foams.
- Let the liquid settle briefly, then skim off the milk-solid foam that gathers on
  top with a spoon and discard.
- Pour into two 8-ounce glasses and serve — most beneficial after the midday meal.
