one_line: Creamy cinnamon-cardamom oats simmered with dates — warming, grounding breakfast (use water/oat
  milk for nut-free).
method: '1. Simmer 1/2 cup rolled oats with 1.5 cups almond milk (or water) over low heat.

  2. Add 1/4 tsp cinnamon, pinch cardamom, pinch dry ginger, 2-3 chopped dates.

  3. Cook ~8 min, stirring, to a soft porridge. Top with a few soaked chopped almonds (omit for nut allergy).'
