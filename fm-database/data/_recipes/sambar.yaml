steps:
- Pressure-cook toor dal with turmeric until soft; whisk smooth.
- Boil the mixed vegetables until just tender. Add the tamarind extract, sambar powder, salt, and cooked
  dal; simmer 8-10 minutes.
- Heat coconut oil, pop mustard seeds, add curry leaves and a pinch of hing; pour this tempering over
  the sambar.
- Simmer 2 minutes more, finish with coriander, and serve with rice, idli, or dosa.
