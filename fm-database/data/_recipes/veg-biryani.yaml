steps:
- Rinse and soak the basmati rice for 20 minutes, then boil with the whole spices
  and salt until 70 percent cooked and drain.
- Heat ghee in a heavy pot and fry the sliced onion until golden, setting aside half
  for garnish.
- Add ginger-garlic paste and the mixed vegetables and saute for a few minutes.
- Stir in the whisked curd, biryani masala and salt, and cook until the vegetables
  are almost tender.
- Layer the par-boiled rice over the vegetables, scatter mint, coriander and the reserved
  fried onion, and drizzle a little ghee.
- Cover tightly and cook on the lowest heat (dum) for 15 minutes, then fluff gently
  and serve with raita.
