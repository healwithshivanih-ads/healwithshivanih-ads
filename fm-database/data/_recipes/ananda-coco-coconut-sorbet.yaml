ingredients:
- item: canned coconut milk
  qty: '1'
  unit: cup
- item: fresh gingerroot, peeled and roughly chopped (or ½ tsp ginger powder)
  qty: '0.5'
  unit: inch piece
- item: frozen berries (strawberries, raspberries, blueberries, etc.)
  qty: '1'
  unit: cup
- item: maple syrup or coconut sugar
