one_line: Blended coconut milk and frozen berries with ginger — a pitta-cooling frozen treat for occasional
  summer indulgence.
headnote: When the heat is at its most intense, this coconut-berry sorbet balances the icy quality of
  a frozen treat with the warming counterpoint of fresh ginger, making it gentler on digestion than commercial
  ice cream.
