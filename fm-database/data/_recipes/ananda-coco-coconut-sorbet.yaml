steps:
- In a blender, pulse the coconut milk and ginger together until the ginger is finely
  dispersed.
- Add the frozen berries, sweetener, and vanilla extract; pulse until just smooth.
- With the blender running, drop in ice cubes one at a time if a thicker, sorbet-like
  consistency is desired.
- Blend until the mixture reaches your preferred texture and serve immediately.
