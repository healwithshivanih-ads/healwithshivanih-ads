steps:
- Mix together the filling ingredients — melted coconut oil, sunflower butter, honey,
  vanilla, almond meal, cinnamon, and ashwagandha — in a small bowl until fully combined.
- Cover and place the mixture in the freezer for 45 minutes to firm up.
- 'Prepare the chocolate coating: whisk together the melted coconut oil, maple syrup,
  and cacao powder in a bowl. Nest the coating bowl inside a larger bowl of warm water
  to keep it from solidifying while you work.'
- Remove the filling from the freezer and roll into 1-inch balls. Drop each ball into
  the chocolate coating and use two spoons to roll it until fully covered.
- Lift each truffle onto a parchment-lined baking sheet. Sprinkle with shredded coconut
  before the coating sets, if desired.
- Refrigerate until firm and keep chilled until serving.
