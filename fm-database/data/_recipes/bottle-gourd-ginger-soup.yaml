steps:
- Peel the bottle gourd, remove any large seeds and cut into small cubes.
- In a pot, heat the oil, add cumin seeds and let them splutter, then add the chopped
  ginger and garlic and saute for a minute.
- Add the bottle gourd cubes, turmeric and salt, and toss for 2 minutes.
- Pour in 3 cups of water, cover and simmer for 12-15 minutes until the gourd is completely
  soft.
- Blend to a smooth soup, return to the pot and adjust the consistency with a little
  hot water if needed; season with black pepper.
- Finish with lemon juice and chopped coriander, and serve warm.
