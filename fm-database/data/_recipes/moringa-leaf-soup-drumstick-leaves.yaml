headnote: Moringa leaves are one of the richest plant sources of iron and calcium
  you can find in an Indian kitchen — using a generous two cups here means every bowl
  genuinely delivers. The moong dal base keeps the soup light enough for a monsoon
  evening when appetites are gentler.
