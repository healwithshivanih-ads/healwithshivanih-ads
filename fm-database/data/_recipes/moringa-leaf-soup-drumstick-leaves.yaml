steps:
- Pressure-cook the moong dal with 2 cups water and turmeric for 3 whistles until
  completely soft; whisk smooth and set aside.
- Heat coconut oil in a deep pot over medium heat. Add cumin seeds and let them splutter,
  then add onion and garlic and sauté until the onion turns translucent, about 4 minutes.
- Add tomato and green chilli, cook until the tomato breaks down and the oil just
  separates, about 3 minutes.
- Pour in the cooked dal along with the remaining 2 cups of water. Stir well, bring
  to a gentle simmer.
- Add the moringa leaves and black pepper. Simmer uncovered for 5 minutes — the leaves
  will wilt and soften but retain their colour.
- Taste, adjust salt, and serve hot.
