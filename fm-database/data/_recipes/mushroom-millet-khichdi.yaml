steps:
- Heat ghee in a pressure cooker or heavy pot over medium heat. Add cumin seeds and
  bay leaf; let splutter for 30 seconds.
- Add onion and cook for 4–5 minutes until golden. Stir in ginger, garlic and green
  chilli; cook 1 minute.
- Add mushrooms and sauté for 3–4 minutes until they release and reabsorb their moisture.
- Drain the millet and add it along with moong dal to the pot. Stir in turmeric, coriander
  powder, black pepper and salt.
- Pour in 4.5 cups of water, stir well, and pressure-cook for 3 whistles (or simmer
  covered in a pot for 25 minutes), until the millet and dal are fully soft. Add a
  splash of hot water if needed to reach a thick, flowing consistency.
- Finish with lemon juice and fresh coriander. Serve hot with a small drizzle of ghee
  on top if desired.
