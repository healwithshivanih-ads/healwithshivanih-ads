one_line: A nourishing one-pot khichdi with foxtail millet and mushrooms — warming
  on cold or rainy days and rich in both vitamin D and magnesium.
headnote: Foxtail millet is one of the better whole-grain sources of magnesium, and
  pairing it with mushrooms in a single pot makes this a genuinely restorative meal
  for monsoon and winter days when both nutrients tend to run low. The slow simmer
  coaxes out a thick, porridge-adjacent texture — keep a little extra hot water handy
  to loosen it to your liking.
