one_line: A bright, tomato-forward rasam that is tangy, peppery and light enough to
  sip when appetite is low.
headnote: This version leans on ripe tomatoes for body and colour, with just a touch
  of tamarind for balance. It is a household favourite when someone is recovering
  from a cold or a heavy meal.
