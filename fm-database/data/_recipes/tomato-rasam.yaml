steps:
- Soak the tamarind in a little warm water and extract a thin pulp.
- Chop the tomatoes and mash them lightly with your hand or a masher so they break
  down quickly.
- In a pot, combine the mashed tomatoes, tamarind extract, turmeric, rasam powder
  and 3 cups of water; add salt.
- Coarsely crush the pepper, cumin and garlic and stir them in, then simmer on medium
  heat for 8-10 minutes until the tomatoes dissolve into a thin, brothy soup — do
  not let it boil hard.
- In a small pan, heat the ghee, splutter the mustard seeds, hing and curry leaves,
  and pour this tempering over the rasam.
- Garnish with coriander leaves and turn off the heat just as the rasam starts to
  froth.
