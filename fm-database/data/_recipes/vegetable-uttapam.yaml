steps:
- Stir the fermented batter well and season with salt to a thick, spoonable consistency.
- Toss the chopped onion, tomato, capsicum, green chilli and coriander together in
  a bowl.
- Heat a tawa on medium and lightly grease it.
- Pour a ladle of batter and spread into a thick round, thicker than a dosa.
- Scatter a generous handful of the vegetable mix over the top and press gently so
  it sticks.
- Drizzle a few drops of oil around the edges and cover; cook until the base is golden.
- Flip and cook the vegetable side for a minute or two until set, then serve hot with
  chutney.
