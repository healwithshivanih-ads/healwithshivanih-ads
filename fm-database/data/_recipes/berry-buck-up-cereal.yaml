steps:
- Bring 2 cups of water to a boil in a medium saucepan.
- Rinse the buckwheat through a strainer, then add it to the boiling water along with
  the spice mix and vanilla. Lower heat, cover, and simmer for 15 minutes.
- Remove from heat. Stir in the chopped strawberries and coconut oil, then fluff with
  a fork. Cover and let rest for 5 minutes.
- While the buckwheat rests, toast the shredded coconut in a small dry pan over low
  heat, stirring constantly, until it begins to turn golden.
- Spoon the cereal into two bowls and top with the toasted coconut.
