steps:
- Blend mint, coriander, green chilli, lemon juice, salt and a splash of water into
  a thick green chutney.
- Spread the chutney on all four bread slices.
- Lay cucumber slices on two of them, sprinkle cumin powder, and close with the remaining
  slices.
- Press, halve and serve straight away.
