  qty: '1'
  unit: tbsp
steps:
- Heat oil in a kadhai and add rai; when it splutters add jeera and hing.
- Add the sliced onion and saute till soft and translucent.
- Add the pointed gourd, haldi, chilli, dhania powder and salt; toss well to coat.
- Cover and cook on low heat, stirring now and then, till the parwal is tender, about
  15 minutes.
- Uncover and cook off any moisture so the pieces lightly brown at the edges.
- Finish with fresh coriander and serve hot with roti or rice.
