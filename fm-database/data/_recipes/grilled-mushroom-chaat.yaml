steps:
- Toss mushroom halves with oil, a pinch of salt and red chilli powder. Rest for 5
  minutes.
- Heat a grill pan or heavy skillet over high heat until very hot. Place mushrooms
  cut-side down and grill undisturbed for 3–4 minutes until char marks appear; flip
  and grill 2 minutes more. Set aside to cool slightly.
- In a bowl, combine red onion, tomato, green chilli and fresh coriander.
- Add the grilled mushrooms to the bowl. Sprinkle chaat masala and cumin powder, drizzle
  lemon juice and tamarind chutney, and toss well.
- Taste, adjust salt and lemon, and serve immediately at room temperature.
