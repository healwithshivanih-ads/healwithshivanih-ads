one_line: Charred mushrooms tossed with chaat masala, red onion and lemon — a punchy
  vitamin-D snack that eats like street food.
headnote: Grilling mushrooms over high heat concentrates their flavour and keeps the
  texture meaty rather than soggy. Mushrooms that have been left gills-up in sunlight
  for 20 minutes before cooking carry a genuine vitamin-D boost — worth the small
  extra step on a sunny day. The lemon and raw onion cut through the earthiness beautifully.
