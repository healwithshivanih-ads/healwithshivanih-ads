steps:
- Cook rice with 1½ cups water in a covered pot over medium heat for 18–20 minutes
  until very soft. Spread on a plate and let it cool to just warm — it should not
  be hot when curd is added.
- Mash the rice lightly with the back of a spoon, then mix in the milk first to loosen
  it, followed by the curd and salt. Stir until you have a creamy, cohesive mixture.
  Adjust curd to your preferred consistency.
- Heat oil in a small tadka pan over medium heat. Add mustard seeds and let them splutter,
  then add the dried red chilli and curry leaves and fry for 20 seconds until fragrant.
- Pour the temper immediately over the curd rice. Add grated ginger and green chilli
  and fold everything together gently.
- Scatter fresh coriander on top and add pomegranate arils or grapes if using. Serve
  at room temperature — not chilled.
servings: '2'
prep_time_min: 10
cook_time_min: 20
one_line: Soft cooked rice mixed with fresh curd and finished with a mustard-curry
  leaf temper.
headnote: Fresh homemade or good-quality curd is the heart of this dish — the live
  cultures it carries support gut health and provide a meaningful dose of B12. Eating
  it slightly cool (not straight from the fridge) keeps the cultures active. A generous
  quantity of curd relative to rice is what makes this genuinely nourishing rather
  than just a leftover fix.
