one_line: A lighter homemade chocolate-nut spread made from soaked almonds and hazelnuts with cacao and
  coconut milk — use sparingly in spring, one tablespoon at a time.
headnote: Soaking and roasting the nuts before processing makes this chocolate spread much easier to digest
  than commercial versions, though its heating and slightly oily nature means enjoying it mindfully in
  the kapha season.
