steps:
- Soak the raw almonds in water for 6–8 hours, then drain.
- Preheat the oven to 350°F. Spread the soaked almonds and raw hazelnuts across a large baking pan and
  roast for 10 minutes, shaking the pan a few times.
- While the nuts are still warm, wrap them in a slightly damp kitchen towel and rub them between your
  palms to loosen and remove the skins. Some residual skin is fine.
- Process the skinned nuts in a food processor until they form a uniform powder.
- Add the cacao powder, coconut milk, coconut sugar, vanilla, and salt. Process again until the mixture
  is smooth and creamy.
- Transfer to a 16-ounce glass jar and refrigerate.
