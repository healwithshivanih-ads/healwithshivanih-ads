one_line: A gentle coconut-milk fish stew with curry leaves and a light onion-tomato
  masala, simmered till the fish is just flaky.
headnote: A soothing coastal-style stew that stays light on spice and easy on digestion.
  The fish poaches gently in coconut milk so it stays soft and never rubbery.
