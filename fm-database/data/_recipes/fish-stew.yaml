steps:
- Rub the fish chunks with a little turmeric and salt and set aside while you build
  the base.
- Heat coconut oil in a pot, add curry leaves and sliced onion, and saute until the
  onion softens.
- Stir in the ginger-garlic paste and slit green chilli and cook for a minute until
  fragrant.
- Add the tomato, remaining turmeric and salt, and cook down to a soft masala.
- Pour in the coconut milk with half a cup of water, bring to a gentle simmer, then
  slide in the fish chunks.
- Simmer uncovered on low for 8-10 minutes until the fish is just cooked; finish with
  a squeeze of lemon and serve warm.
