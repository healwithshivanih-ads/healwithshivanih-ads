one_line: A light, dry South-Indian style palak sabzi tempered with mustard, cumin
  and curry leaves.
headnote: Cooking palak gently with a simple tempering keeps it easy to digest and
  lets the vegetable's own flavour come through — no heavy gravy, no tomato.
