steps:
- Bring 4 cups of water to a boil in a large saucepan; rinse the split mung beans
  until the water runs clear.
- Add the rinsed mung beans, turmeric, coriander powder, and spice mix to the boiling
  water; reduce heat, cover with the lid slightly ajar, and simmer for 20 minutes.
- Slice the zucchini in half lengthwise, then into half moons; add them to the pot
  along with the remaining 2 cups of water and optional salt, and bring back to a
  boil.
- Partially cover and simmer for another 10 minutes without stirring.
- In a small pan, heat the coconut oil over medium heat and fry the cumin seeds and
  curry leaf for 2–3 minutes until fragrant; pour this tempering into the dal in the
  last 5 minutes of cooking.
- Remove from the heat, stir in the lime juice, and serve in bowls garnished with
  fresh cilantro.
