steps:
- Soak the rice for 3–4 hours and the poha for about 30 minutes, then drain.
- Blend the rice, poha, curd, grated bottle gourd, green chillies and coriander into
  a smooth, slightly thick batter, adding a little water only as needed.
- Stir in the salt and check the consistency — it should be thick enough to hold on
  a spoon.
- Just before steaming, fold in the Eno gently so the batter turns airy; do not overmix.
- Lightly grease thatte (plate) idli moulds with oil and pour the batter in thickly.
- Steam for 10–15 minutes until the idlis are set and spring back to the touch.
- Serve warm with chutney, podi, a little ghee and sambar.
