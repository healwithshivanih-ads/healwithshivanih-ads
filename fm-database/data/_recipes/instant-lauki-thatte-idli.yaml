one_line: Soft steamed plate-idlis made instantly from a rice-poha batter folded with
  grated bottle gourd.
headnote: Bottle gourd (lauki) keeps these idlis light and cooling, adding moisture
  and fibre without heaviness. Skipping the overnight ferment (Eno does the lift)
  makes this a quick, gut-friendly breakfast — steam it soft and serve with chutney
  and sambar.
