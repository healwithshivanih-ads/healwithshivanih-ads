steps:
- Bring the water to a boil in a large saucepan. Add the mung beans and turmeric and return to a boil.
- Add all the chopped vegetables except the onion. Reduce heat to low and simmer partially covered for
  30 minutes.
- While the dal cooks, heat the coconut oil in a frying pan over medium heat. Sauté the diced onion for
  about 5 minutes until translucent. Stir in the mustard seeds, cover loosely (they will splutter), and
  fry for 1 minute.
- Add the curry leaves and stir, then add the hing and stir until all spices are coated in oil. Turn off
  the heat and stir the grated coconut into the spiced oil mixture; let stand 1–2 minutes.
- Pour the spiced oil mixture and the sambar powder into the cooked dal. Simmer everything together for
  5 minutes, adding a splash of hot water if the sambar gets too thick — it should be slightly watery.
- Season with salt. Serve in bowls over basmati rice or with dosa, garnished with fresh cilantro.
