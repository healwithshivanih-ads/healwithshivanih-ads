one_line: A classic south Indian tomato-mung-dal soup with a fragrant mustard-coconut tempering — hot,
  light, and cleansing for damp spring weather.
headnote: Sambar's pungent, sour, and lightly spiced character makes it one of the best spring meals in
  the Ayurvedic kitchen, equally good for breakfast or a main meal.
