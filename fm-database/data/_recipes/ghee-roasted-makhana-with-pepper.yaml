ingredients:
- item: makhana (fox nuts)
  qty: '2'
  unit: cups
- item: ghee
  qty: 1½
  unit: tsp
- item: black pepper, freshly coarsely ground
  qty: ½
  unit: tsp
- item: rock salt (sendha namak)
  qty: ¼
  unit: tsp
steps:
- Heat a wide, heavy-bottomed pan or kadai over low-medium heat. Add the ghee and
  let it melt and coat the pan.
- Add the makhana in a single layer and roast on low heat, stirring every minute or
  so, for 9–11 minutes until they turn crisp and sound hollow when pressed between
  your fingers — patience here is the whole technique.
- Turn off the heat, immediately sprinkle over the coarsely ground black pepper and
  rock salt, and toss well so the seasoning coats every piece while the residual heat
  is still there.
- Spread on a plate to cool for 2–3 minutes — they crisp up further as they cool.
  Serve immediately or store in an airtight container for up to 2 days.
