one_line: Fox nuts slow-roasted in ghee with black pepper and rock salt — a light,
  warming monsoon snack.
headnote: Makhana roasted low and slow in ghee turns genuinely crisp without any heaviness.
  Black pepper adds a gentle warmth that is welcome on cool, damp monsoon evenings,
  and rock salt keeps the flavour clean and uncluttered.
