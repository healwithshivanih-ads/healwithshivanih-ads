contains_allergens: []
ingredients:
- item: fresh ginger, sliced thin (no need to peel)
  qty: '1.5'
  unit: inch piece
- item: fresh tulsi (holy basil) leaves
  qty: '15'
  unit: whole
- item: black peppercorns, lightly crushed
  qty: '8'
  unit: whole
- item: water
  qty: '2.5'
  unit: cup
- item: honey, to stir in at serving (optional)
  qty: 1–2
  unit: tsp
steps:
- Bring the water to a boil in a small saucepan. Add the ginger slices and crushed
  black peppercorns.
- Reduce heat and simmer for 5 minutes until the water takes on a pale amber colour
  and smells strongly of ginger.
- Add the tulsi leaves, stir once, and simmer for 2 more minutes — no longer, so the
  tulsi keeps its volatile oils.
- Strain into cups through a fine sieve. Let it cool for a minute until it is hot
  but drinkable.
- Stir in honey at this point if using — never while the liquid is still boiling,
  as high heat diminishes honey's qualities. Serve immediately.
servings: '2'
prep_time_min: 3
cook_time_min: 8
good_for:
- anti-inflammatory-diet
- digestion-and-nutrient-absorption
one_line: A simple warming brew of fresh ginger, tulsi, and black pepper to see you
  through the monsoon.
headnote: This is the household kadha most Indian kitchens reach for at the first
  sign of a scratchy throat — fresh ginger warms the chest, tulsi leaves carry their
  characteristic sharpness, and a crack of black pepper opens everything up. A little
  honey stirred in off the heat rounds it without overpowering the bitterness. The
  whole thing takes under ten minutes.
