one_line: Eggs baked into a spiced spinach and methi masala — a one-pan breakfast
  or lunch that packs iron, folate, and both egg-derived vitamins.
headnote: Eggs bring vitamin D and B12, while fresh spinach and methi together provide
  a real folate and iron lift — the tomato and lemon in the base help the body absorb
  that plant iron more readily. Baking keeps the yolks just-set so every nutrient
  stays in the pan.
