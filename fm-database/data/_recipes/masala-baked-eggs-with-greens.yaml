steps:
- Preheat your oven to 200 °C. Heat oil in an oven-safe wide pan or skillet over medium
  heat. Add cumin seeds and let them sizzle, then add the onion and cook for 6–7 minutes
  until soft and golden.
- Add ginger, garlic, and green chilli; fry for 1 minute. Add the tomatoes along with
  turmeric, coriander powder, cumin powder, chilli powder, and salt. Cook, stirring,
  for 5–6 minutes until the tomatoes break down and the masala looks dry.
- Add the spinach and methi in batches, stirring each addition until just wilted.
  The greens will shrink considerably — cook for 2–3 minutes total. Stir in lemon
  juice.
- Make 6 small wells in the masala with the back of a spoon and crack one egg into
  each well. Season the eggs lightly with a pinch of salt.
- Transfer the pan to the oven and bake for 8–10 minutes, until the whites are set
  but the yolks are still slightly soft. Scatter fresh coriander on top and serve
  straight from the pan with whole-wheat toast or roti.
servings: 3–4
