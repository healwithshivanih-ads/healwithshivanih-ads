steps:
- Rinse the moong dal and pressure-cook it with turmeric and 2 cups of water until
  soft, about 3 whistles.
- Meanwhile, wash the spinach well and roughly chop it along with the ginger and garlic.
- In a pot, heat the ghee, add cumin seeds and let them crackle, then add the ginger
  and garlic and saute for a minute.
- Add the chopped spinach and cook for 2-3 minutes until wilted, then add the cooked
  dal and 1 more cup of water.
- Simmer for 5 minutes, then blend to a smooth soup and return to the pot; season
  with salt and black pepper.
- Warm through, finish with a squeeze of lemon and serve hot.
