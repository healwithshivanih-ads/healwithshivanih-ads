one_line: A smooth, protein-rich green soup of spinach and moong dal that is nourishing
  and gentle on digestion.
headnote: Moong dal gives this soup a soft body and easy-to-digest protein, while
  spinach adds iron and folate. It is a comforting one-bowl meal for cool evenings
  or light dinners.
