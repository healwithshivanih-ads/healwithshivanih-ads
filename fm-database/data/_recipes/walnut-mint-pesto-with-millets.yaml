steps:
- Rinse the millet well; toast in a dry saucepan over medium heat for 2 minutes, then
  add 2 cups water and ½ tsp salt. Bring to a boil, cover and simmer on low for 15
  minutes until water is absorbed. Turn off heat and rest, covered, for 5 minutes,
  then fluff with a fork.
- While the millet cooks, lightly toast the walnuts in a dry pan over low heat for
  3–4 minutes until fragrant; cool slightly.
- Blend walnuts, mint, coriander, garlic, lemon juice, oil, remaining ¼ tsp salt,
  black pepper and green chilli (if using) into a coarse-textured pesto — pulse rather
  than over-blend to keep some body.
- Taste the pesto and adjust lemon and salt. If it is too thick, loosen with 1–2 tbsp
  water.
- Fold the pesto through the warm fluffed millet until every grain is coated; serve
  topped with halved cherry tomatoes.
