one_line: Earthy cooked millet tossed through a fresh walnut and mint pesto — simple,
  filling and green.
headnote: Walnuts stand apart from most nuts for their meaningful ALA omega-3 content;
  a quarter cup folded into a meal-sized bowl delivers a genuinely useful amount.
  Mint keeps the pesto light and digestive, and foxtail or little millet gives a slower-releasing
  grain base that pairs well with the oily nut.
