one_line: A thin, warming rasam built on fresh ginger, tulsi leaves, and cracked pepper
  — good for heavy monsoon evenings when the body needs a little heat.
headnote: Fresh tulsi leaves steeped at the end keep their volatile oils intact, giving
  this rasam its gentle antioxidant warmth. A generous hand with ginger and black
  pepper makes this genuinely heating rather than merely flavoured.
