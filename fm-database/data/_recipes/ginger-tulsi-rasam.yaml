steps:
- Soak the tamarind in 1.5 cups warm water for 10 minutes, then squeeze and strain
  to extract the pulp; discard the fibre.
- Blend the chopped tomatoes with the grated ginger and a splash of water into a rough
  purée.
- Combine the tamarind extract, tomato-ginger purée, turmeric, and 3 cups water in
  a pot. Bring to a boil, then simmer uncovered for 10 minutes until the raw tamarind
  smell mellows.
- Add the cracked black pepper and salt; simmer for another 5 minutes. The rasam should
  remain thin — do not reduce it further.
- Heat the oil in a small tempering pan. Add cumin seeds, dry red chillies, asafoetida,
  and curry leaves; let them splutter for 30 seconds, then pour the tempering into
  the rasam.
- Turn off the heat and immediately stir in the fresh tulsi leaves. Cover and rest
  for 2 minutes so the tulsi steeps without losing its oils.
- Ladle into bowls, garnish with coriander, and serve hot — drink directly from the
  bowl or spoon over plain rice.
