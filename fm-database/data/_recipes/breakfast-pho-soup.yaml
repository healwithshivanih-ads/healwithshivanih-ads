steps:
- Bring 4 cups of water to a boil in a large saucepan.
- Coarsely chop all the vegetables and add them to the boiling water along with the grated ginger and
  black pepper. Cover and simmer for 5 minutes.
- If using zucchini or rice noodles, add them in the last minute of cooking; cover again and simmer until
  noodles and vegetables are just tender.
- Remove from heat and stir in the lime juice and tamari.
- Ladle into two wide bowls and serve with fresh lime wedges.
