one_line: A pungent, ginger-forward vegetable broth inspired by Vietnamese pho — a
  warming spring breakfast that fires up digestion.
headnote: Starting the day with a savoury, spiced broth instead of something sweet
  or cold is a key Ayurvedic strategy for keeping kapha-season digestion lively and
  clear.
