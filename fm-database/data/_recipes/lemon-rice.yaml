steps:
- Cook the basmati rice in 2 cups of boiling water over low heat, covered, for 10–15 minutes until the
  water is fully absorbed; spread out to cool so the grains stay separate. Day-old leftover rice works
  well.
- Heat the coconut oil in a heavy skillet over medium heat; when hot, add the mustard seeds and cover
  the pan with a lid while they pop.
- As soon as the popping settles, add the peanuts, cashews, hing, turmeric, grated ginger, and dried chilies;
  sauté, stirring, until the nuts begin to turn golden, then remove from the heat.
- Tip the cooled rice into a large serving bowl; pour in the lemon juice, scatter over the cilantro, and
  spoon in the spiced nut mixture.
- Mix everything together gently with your hands to avoid breaking the grains; season with salt and serve
  at room temperature.
