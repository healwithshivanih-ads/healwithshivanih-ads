steps:
- Heat 1 tbsp oil in a wide pan over medium-high heat. Add the bhindi pieces in a
  single layer and cook, stirring occasionally, for 8–10 minutes until lightly browned
  and no longer sticky. Remove and set aside.
- In the same pan, heat the remaining 1 tbsp oil over medium heat. Add cumin seeds
  and a pinch of hing; once the seeds splutter, add the onion and cook for 4–5 minutes
  until golden.
- Add ginger and green chilli, stir for 30 seconds, then add turmeric, coriander powder,
  red chilli powder, and salt. Cook the spices for 1 minute.
- Whisk the besan into the curd until fully smooth (this prevents splitting). Reduce
  the heat to low and pour the curd mixture into the pan, stirring constantly.
- Stir gently on low heat for 3–4 minutes until the gravy is warm and just beginning
  to bubble — do not boil hard. Fold in the pan-roasted bhindi and simmer for 2 minutes
  so the okra absorbs the sauce.
- Garnish with fresh coriander and serve hot with phulka or steamed rice.
servings: '3'
prep_time_min: 10
cook_time_min: 25
one_line: Tender okra cooked in a lightly spiced, tangy yogurt gravy.
headnote: Curd-based gravies are a gentle, probiotic-friendly way to eat well through
  the damp monsoon months. The okra is pan-roasted first so it stays firm and never
  slimy, then folded into a warm, cumin-tempered yogurt sauce that keeps its tang
  without curdling.
