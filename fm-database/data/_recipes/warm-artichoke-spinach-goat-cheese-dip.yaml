one_line: A baked warm dip of artichoke and spinach with a light crumble of goat cheese
  — greens-forward, bitter, and gently warming for spring.
headnote: With far more greens than cheese, this baked dip delivers the liver-supporting
  bitterness of artichoke and spinach in a comforting warm format — goat cheese rather
  than cow's keeps it lighter and more digestible.
