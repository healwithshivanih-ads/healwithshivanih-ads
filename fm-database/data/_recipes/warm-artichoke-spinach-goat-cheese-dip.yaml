steps:
- Preheat oven to 350°F.
- Pulse the artichoke hearts, spinach, and Spring Salts together in a food processor
  until they form a coarse, chunky mixture. (Alternatively, chop the vegetables finely,
  then use a hand blender to reach a coarse consistency.)
- Transfer the vegetable mixture into a 16-ounce ramekin. Scatter the crumbled goat
  cheese evenly over the top.
- Bake for 25 minutes or until the top begins to brown.
- Serve hot with vegetable sticks, rye crackers, or rice crackers.
