steps:
- Roast the capsicums over a flame, turning until the skin blackens all over. Rest
  them in a bowl to cool, then peel, deseed and quarter.
- Simmer the tomatoes with the bay leaves and garlic in about 3 cups of water until
  the tomatoes turn soft.
- Discard the bay leaves and the loosened tomato skins, add the roasted capsicum and
  blend smooth in the pot.
- Return to the heat, stir in the Worcestershire sauce and salt, and simmer about
  5 minutes. Serve hot, with hot sauce if you like it fiery.
