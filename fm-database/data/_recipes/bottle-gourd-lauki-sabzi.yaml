contains_allergens: []
ingredients:
- item: 1 cup lauki, peeled & cubed
- item: 1/4 tsp cumin
- item: 1/4 tsp turmeric
- item: 1 green chilli
- item: 1 tsp coconut oil
- item: salt
- item: coriander
steps:
- Heat oil, crackle cumin + chilli.
- Add lauki, turmeric, salt; cover and cook on low 12 min till soft (it releases its own water).
- Finish with coriander.
- 'Tip: Ash gourd works the same way — light and cooling.'
