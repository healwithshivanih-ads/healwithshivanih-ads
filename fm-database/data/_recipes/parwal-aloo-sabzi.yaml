steps:
- Scrape the parwal lightly, trim the ends, and cut each into 2–3 diagonal pieces.
  Peel the potatoes and cut into similar-sized chunks. Keep both aside.
- Heat mustard oil in a heavy kadai over medium-high heat until it just begins to
  smoke, then lower the flame. Add cumin seeds and dried red chillies and let them
  splutter for 20 seconds.
- Add the sliced onion and ginger, and cook, stirring occasionally, for 6–7 minutes
  until the onion is soft and lightly golden.
- Add turmeric, coriander powder, cumin powder, red chilli powder, and salt. Stir
  for 30 seconds, then add the potato pieces. Mix well to coat and cook for 3 minutes.
- Add the parwal, stir everything together, and splash in 3 tablespoons of water.
  Cover and cook on low-medium heat for 12–14 minutes, lifting the lid to stir every
  few minutes, until both the potato and parwal are cooked through and lightly browned.
- Uncover, raise the heat briefly to drive off any remaining moisture, then finish
  with fresh coriander leaves and serve hot.
