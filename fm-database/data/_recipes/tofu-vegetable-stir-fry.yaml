steps:
- Heat ghee, add cumin seeds and ginger; sauté 30 seconds.
- Add the vegetables and turmeric; cook 3-4 minutes until tender.
- Add the firm tofu and salt; toss gently 3-4 minutes until heated through and lightly
  golden (don't overcook or it toughens).
- Garnish with coriander and serve warm.
