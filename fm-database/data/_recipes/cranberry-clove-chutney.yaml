one_line: A sharp, jewel-coloured cranberry chutney with cloves and orange — energising, blood-cleansing,
  and far less sweet than commercial versions.
headnote: Fresh cranberries' potent astringent and sour punch is softened with orange, ginger, and just
  enough sweetener to make a lively chutney that supports digestion of heavier autumn and winter meals.
