steps:
- Combine the cranberries, cloves, cinnamon, ginger, orange juice, and orange zest in a medium saucepan.
  Bring to a boil over high heat.
- Reduce heat to low and stir in the dehydrated cane juice. Simmer uncovered, stirring occasionally, until
  the cranberries begin to dissolve and the chutney coats a spoon, about 20 minutes. It will thicken further
  as it cools.
- Taste and adjust sweetener; if reducing, cook an additional 5–10 minutes to thicken.
- Serve by the tablespoon alongside steamed greens, roasted vegetables, or grain cereal. Remove the cloves
  before storing if preferred.
