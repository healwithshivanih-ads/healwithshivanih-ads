steps:
- Soak the kokum pieces in warm water for 20 minutes. Squeeze them well to extract
  all the deep-purple liquid; discard the spent kokum skins and reserve the extract.
- Steam or boil the rice using your usual method and keep it warm.
- In a bowl or jug, combine the kokum extract with both the thick and thin coconut
  milks. Stir well — the mixture will turn a beautiful dusky pink.
- Add the minced garlic, green chilli, crushed cumin and salt. Stir and taste; adjust
  salt and tartness with a tiny pinch more salt or an extra soaked kokum if needed.
- Do not heat the sol kadhi — it is served at room temperature or lightly chilled.
  Stir in the fresh coriander just before serving.
- Serve the kadhi in a small bowl alongside a plate of steamed rice, to be sipped
  and spooned through the meal.
servings: 2–3
