one_line: A cooling pink kokum-coconut kadhi served alongside plain steamed rice.
headnote: Kokum gives this Konkani staple its deep pink colour and a gentle tartness
  that calms a heavy or overheated stomach — exactly what the coastal monsoon season
  asks for. Fresh coconut milk keeps it light; drinking a small bowl before or alongside
  rice helps settle digestion after a rich meal.
