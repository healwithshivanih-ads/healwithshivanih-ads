steps:
- Clean and cut the chicken into pieces.
- Heat coconut oil, add onion and curry leaves; sauté until golden. Add ginger-garlic
  paste and cook 1 minute.
- Add turmeric and coriander powder; stir 30 seconds.
- Add the chicken and salt; sear 2-3 minutes. Pour in coconut milk and a little water.
  Cover and simmer until just cooked through (fish 8-10 min, chicken 18-20 min, prawns
  5-6 min).
- Finish with fresh coriander. Serve warm with rice or millet.
