steps:
- Place the butter in a heavy-bottomed saucepan over medium heat and allow it to melt
  completely.
- Continue heating for approximately twelve minutes, watching as froth rises to the
  surface — do not skim it off, as it holds medicinal properties.
- Reduce the heat to low; the butter will deepen to a golden-yellow colour and take
  on a faintly nutty aroma.
- Test readiness by dropping one or two drops of water into the pan — a crackling
  sound means the ghee is done.
- Remove from heat and allow to cool, then pour through a fine strainer into a clean,
  dry container.
- Ghee keeps at room temperature without refrigeration.
