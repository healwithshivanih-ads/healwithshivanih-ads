steps:
- Preheat oven to 400°F.
- Rinse and drain the chickpeas, then dry them in a clean kitchen towel by wrapping and shaking. Place
  the dried chickpeas in a large bowl.
- Add the vinegar, spices, salt, and oil. Mix everything together with your hands, rubbing the coating
  thoroughly into each chickpea.
- Spread in a single layer on a baking sheet and bake for 40 minutes, stirring every 15 minutes, until
  lightly browned. For a crunchier result, bake up to 50 minutes — watch them carefully so they do not
  burn.
- Allow to cool completely before storing in an airtight container at room temperature.
