one_line: Crispy oven-roasted chickpeas spiced with cumin and apple cider vinegar
  — a dry, pungent snack that helps balance kapha's dampness.
headnote: Roasting draws out moisture and concentrates flavour, turning humble chickpeas
  into a warming, portable spring snack that works equally well as a crunchy soup
  garnish.
