steps:
- Steam the ears of corn in a covered pot over a steaming basket for 10 minutes; let
  cool slightly, then run a knife down the cob sides to remove the kernels — you'll
  get roughly 1 cup.
- In the same large pot, simmer the summer squash in the rice milk for 10 minutes.
- Add the ghee, half the corn kernels, and the spice mix to the squash and rice milk,
  then blend smooth with an immersion blender.
- Stir in the remaining corn kernels and the optional red bell pepper; continue cooking
  on medium heat for another 10 minutes.
- Season with salt and pepper and serve in 2 bowls topped with fresh cilantro.
