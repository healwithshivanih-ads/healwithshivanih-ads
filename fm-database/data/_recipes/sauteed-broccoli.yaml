steps:
- Blanch the broccoli florets in hot salted water for 2 minutes, then drain well.
- Heat oil in a pan, crackle the jeera and add the sliced garlic and green chilli.
- Saute the garlic till just golden and fragrant.
- Add the broccoli with haldi, crushed pepper and salt, and toss on high heat for
  3 to 4 minutes.
- Keep the florets bright green with a little bite; do not overcook.
- Squeeze over the lemon juice, toss once and serve hot.
