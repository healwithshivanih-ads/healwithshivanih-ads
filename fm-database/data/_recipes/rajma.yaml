steps:
- Pressure-cook the soaked rajma with salt and 2.5 cups water for 5-6 whistles until
  very soft.
- Heat oil; splutter cumin, then saute onion until golden. Add ginger-garlic paste
  and cook 1 minute.
- Add the tomato puree and dry spices; cook down until the oil separates.
- Add the cooked rajma with its liquid; simmer 12-15 minutes, mashing a few beans
  to thicken the gravy.
- Finish with garam masala and coriander; serve with brown rice or roti.
