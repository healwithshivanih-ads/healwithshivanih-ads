slug: kanji
name: Kanji
one_line: Probiotic fermented carrot-and-beet drink with mustard.
meal_type:
- drink
diet:
- vegetarian
- vegan
- gluten_free
- dairy_free
region: Indian
main_ingredients:
- black carrot or beetroot
- mustard powder
- water
contains_allergens:
- mustard
ingredients:
- item: 2 black carrots (or 1 beetroot + 1 carrot), in batons
- item: 4 cups water
- item: 1 tbsp mustard powder (rai)
- item: 1/2 tsp red chilli powder
- item: 1 tsp salt
steps:
- Boil the water and let it cool to room temperature.
- Add carrot/beet batons, mustard powder, chilli and salt to a clean glass jar.
- Pour in the cooled water, stir, cover loosely with a muslin cloth.
- Leave in a warm spot 2-3 days, stirring once daily, until pleasantly sour.
- Refrigerate once soured; drink 1/4 cup as a gut tonic.
source: coach-authored (Shivani) 2026-06-13
