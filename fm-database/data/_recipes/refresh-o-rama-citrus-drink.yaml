one_line: A zingy first-thing-in-the-morning citrus-ginger-honey shot that clears the head and ignites
  digestion without caffeine.
headnote: Citrus juice, fresh ginger, and a dash of cayenne combine to create a refreshing but penetrating
  morning drink that clears spring congestion and gets the day started on an energised, kapha-clearing
  note.
