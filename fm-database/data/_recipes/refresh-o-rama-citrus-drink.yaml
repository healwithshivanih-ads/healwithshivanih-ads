ingredients:
- item: fresh orange or grapefruit juice
  qty: '2'
  unit: cups
- item: gingerroot, peeled
  qty: '1.5'
  unit: inches
- item: raw honey
  qty: 1-2
  unit: tsp
- item: fresh lemon juice
  qty: '1'
  unit: whole lemon
- item: cayenne pepper (optional)
  qty: '1'
  unit: dash
steps:
- Pour 1 cup of the citrus juice and the gingerroot into a blender and blend until
  the ginger is well broken down.
- With the blender running, drizzle in the honey, then pour in the remaining citrus
  juice, the lemon juice, and the cayenne pepper if using.
- Blend for 1 minute until everything is well combined.
- Transfer immediately to 2 glasses and drink before the spices and pulp settle.
