steps:
- Combine yogurt, parsley, tarragon, chives, mayonnaise, lemon juice, water, capers,
  minced garlic, and salt (1/4 tsp) in a mini food processor or blender.
- Blend until the dressing is smooth and bright green, about 1 minute.
- Divide the cooked quinoa between two bowls as the base.
- Arrange the rinsed chickpeas, shaved carrot ribbons, sliced red cabbage, and scallions
  over the quinoa.
- Top each bowl with avocado slices.
- Sprinkle the remaining salt (1/8 tsp) evenly over both bowls.
- Drizzle the green goddess dressing generously over each bowl and serve immediately.
