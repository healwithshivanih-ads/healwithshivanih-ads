one_line: A mineral-rich miso noodle broth with tofu, sea vegetables, and a sesame-dulse
  gomasio condiment for deep winter nourishment.
headnote: Sea vegetables bring iodine and trace minerals that are scarce in land-based
  winter diets; the miso is added off-heat to preserve its beneficial enzymes.
