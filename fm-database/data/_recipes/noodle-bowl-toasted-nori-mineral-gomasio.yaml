steps:
- Bring the water to a boil in a large saucepan. Add the tofu, chopped vegetables,
  and sea vegetables, reduce heat to medium, and simmer covered for about 10 minutes.
- Add the noodles during the last 2 minutes of cooking and simmer until noodles and
  vegetables are just tender. Remove from heat.
- Dissolve the miso in about 1/4 cup of hot (not boiling) water to make a thin paste,
  then stir into the soup. Do not reheat after adding miso.
- 'For toasted nori: wave nori sheets briefly over a gas or electric burner until
  they turn bright green and crispy, just a few seconds. Tear into quarters and set
  aside.'
- 'For mineral gomasio: dry-roast sesame seeds in a heavy pan over medium-low heat,
  stirring constantly, until lightly browned. Cool completely, then partially crush
  with a mortar and pestle or spice grinder. Stir in salt and dulse flakes. Store
  in a shaker jar.'
- Ladle the soup into 2 large bowls and serve with toasted nori and a sprinkle of
  mineral gomasio.
