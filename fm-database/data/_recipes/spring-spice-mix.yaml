steps:
- Dry-roast the coriander, fenugreek, and cumin seeds in a heavy-bottomed pan over
  medium heat, stirring, until fragrant — just a few minutes. Remove from heat and
  cool completely.
- Combine the cooled roasted seeds with the remaining ground spices.
- Grind the mixture in a dedicated coffee grinder or with a mortar and pestle until
  you have a uniform powder.
- Transfer to a small shaker jar with an airtight lid for storage.
