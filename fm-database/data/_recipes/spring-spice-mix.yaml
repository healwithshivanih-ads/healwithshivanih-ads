one_line: A warming curry-style spice blend of coriander, cumin, turmeric, fenugreek,
  and ginger — the masala backbone of the spring Ayurvedic kitchen.
headnote: Dry-roasting the whole seeds before grinding unlocks aromatic compounds
  that both deepen the flavour and enhance digestive fire — this blend is the key
  seasoning for keeping kapha-season dishes warming and light.
