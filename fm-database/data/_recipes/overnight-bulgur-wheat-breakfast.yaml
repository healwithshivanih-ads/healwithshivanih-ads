one_line: A no-fuss savory grain bowl that soaks overnight and warms on the stove
  in minutes — ideal for a steady winter morning.
headnote: Bulgur wheat absorbs the liquid overnight, so morning prep is just a quick
  warm-through with spices and whatever vegetables you have on hand.
