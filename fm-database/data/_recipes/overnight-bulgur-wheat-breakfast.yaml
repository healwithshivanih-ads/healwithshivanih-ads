steps:
- Rinse the bulgur wheat and place it in a medium saucepan. Pour 2 cups of boiling
  water or broth over it, cover, and leave to soak overnight.
- In the morning, add the Winter Spice Mix and a splash of water to prevent sticking,
  then set the heat to medium.
- Add raisins or grated vegetables directly to the pot (no need to stir), cover, and
  steam for 7–10 minutes.
- Season with salt and fluff the grains with a fork before dividing between 2 bowls.
