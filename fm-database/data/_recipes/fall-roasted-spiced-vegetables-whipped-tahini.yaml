steps:
- Preheat oven to 375°F. Cut all root vegetables into uniform ½-inch cubes.
- Melt the ghee or coconut oil in an oven-safe dish in the oven for 1–2 minutes. Remove carefully.
- In a large bowl, toss the cubed vegetables with the melted fat, tamari if using, and rosemary, fennel,
  or spice mix until all pieces are evenly coated.
- Spread in a single layer in a large 9x13-inch baking dish and roast for 20 minutes.
- Flip the vegetables with a spatula, then continue roasting 10–20 minutes more until soft and beginning
  to brown at the edges. Remove and toss once more on the tray.
- 'For the tahini sauce: place tahini in a bowl, add olive oil, lemon juice, and salt, and whisk briskly.
  Keep whisking through the separation point until smooth. Thin with water (2 tbsp at a time) if a pourable
  consistency is desired.'
- Serve the roasted vegetables immediately with the tahini sauce alongside for dipping.
