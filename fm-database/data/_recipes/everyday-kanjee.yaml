steps:
- Bring the water to a boil in a large saucepan over high heat with the salt, turmeric, and ginger.
- Add the rinsed rice and let the water return to a boil.
- Reduce heat to low, cover, and simmer for 1 hour until the grains begin to split open.
- Ladle about 2 cups into each bowl to serve. For a short-term fast, strain out the rice and drink only
  the cooking water throughout the day.
