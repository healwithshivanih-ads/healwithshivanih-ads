one_line: A very thin rice gruel — the classic Ayurvedic digestive reset meal, used
  when the gut needs a complete rest.
headnote: 'Kanjee is essentially medicinal simplicity: the thinner and plainer it
  is, the more powerfully it rests and rehabilitates a strained digestive system.'
