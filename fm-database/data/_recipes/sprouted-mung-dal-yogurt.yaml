steps:
- Bring the water or broth to a boil in a large saucepan. Drain the soaked mung beans
  and add them with the Winter Spice Mix. Boil for 10 minutes.
- Add the cubed vegetables, reduce heat to low, partially cover, and set a timer for
  30 minutes. Slice the Swiss chard into thin ribbons and stir in during the last
  portion of the simmering time.
- Warm the ghee in a small frying pan over medium heat and fry the cumin and mustard
  seeds until aromatic, 2–3 minutes — cover if the seeds are popping out.
- Pour the spiced ghee into the pot, add the salt and the fresh sprouted mung beans,
  partially cover, and continue cooking until the timer goes off.
- Serve as a stew, optionally over rice, with a dollop of yogurt on each bowl.
