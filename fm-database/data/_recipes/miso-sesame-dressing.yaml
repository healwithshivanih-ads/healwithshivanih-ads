steps:
- Toast the sesame seeds in a small dry pan over medium-low heat, stirring constantly,
  until lightly golden.
- Whisk or shake together the miso paste, sesame oil, rice vinegar, ginger, cumin,
  toasted seeds, and ume vinegar if using, in a small bowl or 8-ounce mason jar.
- Refrigerate and use within a week; shake or stir well before each use.
