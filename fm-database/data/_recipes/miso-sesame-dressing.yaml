one_line: A balanced four-taste miso and sesame dressing that brings depth and minerals
  to winter greens and grain bowls.
headnote: Sesame oil provides the heavy, warming quality that winter calls for; the
  miso contributes probiotic-rich sour taste — together they make dark leafy greens
  far more appealing on a cold day.
