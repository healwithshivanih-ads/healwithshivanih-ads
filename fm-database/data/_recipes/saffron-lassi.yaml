steps:
- Combine the yogurt, water, saffron threads, and maple syrup if using in a wide-mouth
  jar.
- Blend with an immersion blender for about 1 minute until smooth and frothy, or process
  in a blender carafe.
- Pour into 2 glasses and serve at room temperature.
