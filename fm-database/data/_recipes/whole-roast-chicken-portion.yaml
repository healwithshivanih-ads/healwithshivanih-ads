contains_allergens: []
ingredients:
- item: 1 leg/thigh portion
- item: 1 tsp ginger-garlic paste
- item: 1/2 tsp turmeric
- item: 1/2 tsp pepper
- item: 1 tsp coconut oil
- item: salt
- item: few curry leaves
steps:
- Slash the portion, rub with all the spices + oil + salt; rest 20 min.
- Roast in a hot oven (200C) 30-35 min, or pan-roast covered, turning, till juices
  run clear.
- Scatter curry leaves in the last 5 min for aroma.
- Rest before serving.
