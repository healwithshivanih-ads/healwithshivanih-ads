one_line: A diluted ginger-lime yogurt lassi served at room temperature — a traditional
  Ayurvedic post-meal digestive that works for spring's dampness.
headnote: Diluting yogurt heavily with water and adding the penetrating warmth of
  fresh ginger and lime transforms dairy from a kapha-aggravating food into a genuinely
  supportive digestive aid for spring.
