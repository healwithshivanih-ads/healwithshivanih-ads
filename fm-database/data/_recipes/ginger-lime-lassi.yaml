steps:
- Combine the yogurt, room-temperature water, fresh ginger, lime juice, and honey
  (if using) in a blender or deep cup suitable for an immersion blender.
- Blend on high for 1–2 minutes until frothy and well combined.
- Drink immediately as a post-meal digestive.
