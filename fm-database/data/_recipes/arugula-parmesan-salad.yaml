steps:
- Wash the arugula under cold water, spin-dry and place in a large bowl.
- Whisk the lemon juice, olive oil, salt and pepper together, drizzle over the arugula
  and toss.
- Shave the parmesan over the salad to taste.
- Finish with pomegranate kernels and sunflower seeds if using.
