steps:
- Heat oil in a wok on high and add the minced garlic, stirring for a few seconds.
- Add the carrot, beans and capsicum and stir-fry on high heat so they stay crunchy.
- Toss in the white part of the spring onion and cook for a minute.
- Add the cooled cooked rice, black pepper and salt, and toss briskly to combine.
- Stir-fry on high for 2 to 3 minutes so the rice picks up a light smoky flavour.
- Finish with the green spring onion tops and serve hot.
