steps:
- Toast the whole spices in a dry frying pan over medium heat for a few minutes, just until fragrant —
  do not let them burn.
- Spread out and cool completely.
- Grind the cooled seeds in a spice-dedicated coffee grinder or mortar and pestle to an even powder.
- Transfer to a bowl and stir in the turmeric powder.
- Pour into a shaker jar with an airtight lid for storage.
