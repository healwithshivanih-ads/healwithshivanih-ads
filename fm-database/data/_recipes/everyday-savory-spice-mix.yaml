one_line: The core Ayurvedic digestive spice blend — coriander, cumin, fennel, and turmeric — that forms
  the backbone of most savoury recipes in this cuisine.
headnote: This four-spice formula is specifically balanced to kindle digestive fire and support liver
  function without overheating, making it the go-to seasoning for everyday cooking.
