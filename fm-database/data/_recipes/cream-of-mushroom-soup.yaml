steps:
- Warm a little olive oil (or butter) in a deep pan, sauté the garlic briefly, then
  add the sliced mushrooms with a pinch of salt and let them sweat down for about
  10 minutes.
- Stir in the green onions and cook a couple of minutes, then sprinkle over the brown
  rice flour and cook for 2 minutes to lose the raw flour taste.
- Pour in the rice milk, a cup of water, the bay leaves and salt; bring to a boil
  and simmer about 5 minutes.
- Discard the bay leaves and blend smooth and thick. Season, then serve drizzled with
  olive oil and fresh dill.
