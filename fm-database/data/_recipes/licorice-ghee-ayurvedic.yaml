steps:
- Combine the licorice root powder with eight parts of water in a saucepan and bring
  to a boil.
- Continue boiling until the liquid reduces to one-quarter of its original volume,
  forming a concentrated decoction.
- Measure out one part of this decoction and combine it with an equal part of prepared
  ghee in a clean pan.
- Add an equal part of fresh water to the ghee-decoction mixture.
- Boil the mixture, stirring, until all the water has evaporated and only the licorice-infused
  ghee remains.
