steps:
- Pat the tofu cubes dry and set aside. Peel the ridge gourd, removing the tough ridges,
  and dice into bite-sized pieces.
- Heat oil in a kadai over medium heat. Add mustard seeds and let them pop, then add
  cumin seeds and the onion; sauté until soft.
- Stir in the ginger-garlic paste and cook 1 minute, then add the tomato with turmeric,
  chilli powder, and coriander powder. Cook 5-6 minutes until softened.
- Add the ridge gourd and salt, stir to coat, cover, and cook on low 8-10 minutes
  — the gourd releases its own water, so add only a splash if needed.
- Gently add the tofu cubes and simmer another 4-5 minutes until warmed through and
  the gourd is tender.
- Garnish with fresh coriander and serve hot with rice or millet roti.
