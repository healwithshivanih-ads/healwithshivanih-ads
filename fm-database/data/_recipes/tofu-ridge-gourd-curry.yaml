one_line: Light, watery ridge gourd cooked with tofu in a simple tempered masala —
  a gentle gluten-free main.
headnote: Ridge gourd is cooling and hydrating and cooks down quickly in its own moisture,
  making this an easy, light curry. Tofu turns a humble everyday sabzi into a protein-complete
  meal.
