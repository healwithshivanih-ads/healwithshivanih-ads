steps:
- Dry-roast the foxtail in a pan 2-3 minutes until nutty. Set aside.
- Heat ghee, add mustard seeds and urad dal; once they pop add curry leaves, ginger,
  and onion. Sauté until soft.
- Add diced vegetables; stir-fry 2 minutes.
- Add 2.5 cups water and salt; bring to a boil. Stir in the roasted foxtail.
- Cover and cook on low 12-15 minutes until the water is absorbed and the grain is
  fluffy. Rest 5 minutes, garnish with coriander, and serve warm.
