ingredients:
- item: cooked grain of choice (e.g. oats, rice, barley, millet)
  qty: '2'
  unit: cups
- item: almond milk or water
  qty: '1'
  unit: cup
- item: dried fruit (raisins, dates, or dried cranberries) OR seeds (sunflower, flax, or hemp)
  qty: 2–3
  unit: tbsp
- item: Everyday Sweet Spice Mix
  qty: '2'
  unit: tsp
steps:
- Combine the cooked grain, almond milk or water, dried fruit if using, and spice mix in a small saucepan.
- Cover and heat on medium-low for about 5 minutes, until steaming.
- Turn off heat and blend with an immersion hand blender to your preferred texture — smooth or slightly
  chunky. Avoid over-blending or it becomes gummy.
- Transfer to a bowl. If using seeds instead of dried fruit, scatter them on top rather than cooking them
  — flax and hemp oils are heat sensitive.
