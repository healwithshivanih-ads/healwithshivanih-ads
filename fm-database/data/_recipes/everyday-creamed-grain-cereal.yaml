ingredients:
- item: cooked grain of choice (e.g. oats, rice, barley, millet)
  qty: '2'
  unit: cups
- item: almond milk or water
  qty: '1'
  unit: cup
- item: dried fruit (raisins, dates, or dried cranberries) OR seeds (sunflower, flax,
