steps:
- Soak the bajra in plenty of water for 4-6 hours (or overnight), then drain; rinse
  the moong dal and set both aside.
- Heat the ghee in a pressure cooker, add the cumin seeds and hing, and let the cumin
  splutter.
- Stir in the grated ginger and turmeric, then add the diced vegetables and saute
  for a minute.
- Add the drained bajra, moong dal, salt and water, and stir well.
- Pressure-cook for 6-7 whistles (or simmer covered for 40-45 minutes) until the bajra
  is very soft and the khichdi is porridge-like.
- Open the cooker and mash lightly, loosening with hot water to a soft, spoonable
  consistency.
- Garnish with fresh coriander and serve warm with a little extra ghee if you like.
