  unit: ''
steps:
- Heat oil in a kadhai, add rai and let it splutter, then add urad dal and fry till
  golden.
- Add curry leaves, green chilli and hing.
- Add the chopped beans with haldi and salt, and toss well.
- Sprinkle a little water, cover and cook on low heat till the beans are tender, about
  10 minutes.
- Uncover, stir in the grated coconut and cook off any moisture for 2 minutes.
- Serve hot as a poriyal-style side with rice or roti.
