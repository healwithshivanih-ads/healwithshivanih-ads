steps:
- Bring the water to a boil in a medium saucepan, add all the spices, reduce heat
  to low, and simmer for at least 10 minutes.
- Raise the heat to medium, pour in the milk, and bring the liquid just back to a
  boil — watch carefully as milky chai foams up suddenly.
- Reduce to a gentle simmer, add the tea and coconut sugar, stir to dissolve, and
  simmer uncovered for 5–7 minutes.
- Remove from heat and pour through a fine-mesh strainer into a clean pot. Ladle into
  small chai mugs to serve.
