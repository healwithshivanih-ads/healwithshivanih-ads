steps:
- Place quartered mushrooms gills-up in direct sunlight for 20 minutes before cooking.
- Heat oil in a wide pan over medium heat. Add cumin seeds and let them splutter.
  Add onion and cook until translucent and lightly golden, about 6–7 minutes.
- Stir in ginger and garlic and cook for 1 minute. Add tomato, turmeric, coriander
  powder, chilli powder, and salt. Cook until the tomato is soft and the mixture comes
  together, about 4–5 minutes.
- Add the sun-dried mushrooms; cook on medium-high heat, stirring occasionally, for
  4 minutes until they release their moisture and begin to brown.
- Add the chopped methi leaves and stir well. Cook uncovered on medium heat for 5–6
  minutes, stirring now and then, until the methi wilts completely and the sabzi looks
  dry and cohesive.
- Sprinkle amchur, stir through, taste and adjust salt, and serve as a side with dal
  and rice or with phulka.
servings: 2–3
