one_line: Fresh fenugreek leaves and sun-dried mushrooms cooked together into a dry,
  iron-rich winter sabzi.
headnote: Fresh methi — fenugreek greens — are one of winter's most iron-dense vegetables,
  and pairing them with mushrooms that have been given 20 minutes of winter sun (gills
  facing up) adds a quiet but real vitamin D boost. The slight bitterness of methi
  rounds out the earthiness of the mushrooms beautifully.
