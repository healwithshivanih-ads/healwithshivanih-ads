steps:
- Preheat the oven to 400°F. Line a 6-cup muffin tin with baking cups.
- Soak the prunes in 1/3 cup warm water for 15 minutes, then use a hand blender to
  puree the prunes and soaking liquid with 1/4 cup of the cooked millet.
- Stir together the prune-millet puree, ground flaxseed, ginger powder, and lemon
  juice.
- Fold in the remaining 3/4 cup cooked millet and the dried cherries. Allow the mixture
  to rest for 5 minutes.
- Divide the mixture evenly among the 6 muffin cups, sprinkle the raw millet grains
  over each, and gently press the tops smooth with the back of a spoon.
- Bake for 20–25 minutes until firm and golden on top.
