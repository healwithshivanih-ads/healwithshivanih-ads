steps:
- In a pressure cooker, combine fresh mushrooms, 1/4 cup water, and salt. Cook over
  high heat, stirring occasionally, until water evaporates and mushrooms release their
  moisture (8–12 minutes).
- Reduce heat to medium, add oil, and cook mushrooms, stirring often, until they are
  deeply browned (4–6 minutes).
- Stir in garlic and cook until fragrant (about 30 seconds). Add wine and soy sauce,
  scraping up any browned bits from the bottom, and cook until wine evaporates (about
  1 minute).
- Pour in the remaining 2 quarts water and add peppercorns. Lock the lid in place
  and bring to high pressure over high heat.
- As soon as high pressure is reached, reduce heat to medium-low and maintain pressure
  for 30 minutes.
- Remove pot from heat and allow pressure to release naturally for 15 minutes. Quick
  release any remaining pressure, then carefully open the lid away from you.
- Return the soup to a simmer over low heat. Add kombu and cook until it softens and
  roughly doubles in size (about 10 minutes).
- Strain the soup through a fine-mesh strainer into a bowl, pressing on solids to
  extract maximum liquid. Reserve the cooked mushrooms; discard kombu and peppercorns
  (or leave peppercorns in if desired for their soft, berry-like texture).
- In a separate pot, bring 2 quarts of fresh water to a boil. Add soba noodles and
  cook, stirring occasionally, until just tender (about 5 minutes). Drain in a fine-mesh
  strainer and divide between bowls.
- In the now-empty pressure-cooker pot, gently reheat the strained mushroom broth
  with the reserved cooked mushrooms and enoki mushrooms over medium-low heat until
  simmering.
- Ladle the hot soup and mushrooms over the noodles in each bowl. Top with radishes
  and scallions. Drizzle with sesame oil if desired and serve.
servings: '4'
prep_time_min: 15
cook_time_min: 75
one_line: A deeply umami mushroom broth with soba noodles, fresh enoki, and crisp
  radishes, built layer by layer through patient browning and pressure cooking.
headnote: This soup rewards a pressure cooker but builds real depth through the browning
  step first. The kombu adds clean savoury notes without dairy. It works year-round
  and scales well for weeknight dinners when you want something nourishing without
  heaviness.
