kcal_per_serving: 8
main_ingredients:
- cumin (jeera) seeds
- water
ingredients:
- item: 1 tsp jeera (cumin) seeds
- item: 1 cup water
steps:
- 'Either: soak 1 tsp jeera in 1 cup water overnight, strain and drink in the morning.'
- 'Or the quick way: simmer 1 tsp jeera in 1 cup water for 3–4 minutes, cool to warm, strain and sip.'
- Drink on an empty stomach, before tea or coffee.
tip: The overnight soak is zero effort — pair it with your methi water routine if both are on your plan.
