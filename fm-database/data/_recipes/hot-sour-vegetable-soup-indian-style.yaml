one_line: A clear, tangy ginger-garlic broth packed with seasonal vegetables — spiced
  simply and ready in under thirty minutes.
headnote: The base is built on a strong ginger-garlic broth rather than stock cubes,
  so the heat comes from real aromatics. Use whatever vegetables look best at the
  monsoon market — the soup is forgiving and genuinely warming on a damp evening.
