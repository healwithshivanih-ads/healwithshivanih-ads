steps:
- Heat sesame oil in a deep pot over medium-high flame. Add ginger, garlic, and green
  chillies; sauté for 1–2 minutes until fragrant but not browned.
- Add the chopped tomatoes and cook for 3 minutes, pressing them down to release their
  juices and form a quick base.
- Pour in the water or stock and bring to a vigorous boil. Add carrots and beans;
  cook for 4 minutes.
- Add the shredded cabbage, vinegar, tamari or coconut aminos, black pepper, white
  pepper, and salt. Simmer for 3–4 minutes — the vegetables should be just tender
  and still have colour.
- If you want a very light body, mix cornflour with 2 tbsp cold water and drizzle
  it in while stirring; simmer for 1 minute until just slightly thickened. Skip this
  step for a fully clear broth.
- Taste and adjust the sourness (more vinegar) or heat (more black pepper) to your
  preference. Ladle into bowls and finish with spring onion greens and coriander.
servings: 3–4
prep_time_min: 15
