steps:
- Dry-roast the sesame seeds in a pan till golden and fragrant, then set aside.
- In the same pan heat oil, add rai and let it splutter, then add hing, garlic and
  green chilli.
- Add the chopped amaranth leaves with haldi and salt, and toss well.
- Cook uncovered on medium heat, stirring, till the leaves wilt and soften, about
  6 to 8 minutes.
- Dry off any moisture, then sprinkle the roasted sesame seeds over and toss through.
- Serve hot with roti or as a side to dal-rice.
