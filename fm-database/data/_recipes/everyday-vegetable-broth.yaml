one_line: A slow-simmered vegetable broth built from kitchen scraps or whole vegetables
  — the flavour backbone for soups, grains, and between-meal sipping.
headnote: Making your own broth from saved vegetable peels and tops is one of the
  easiest ways to reduce waste and always have a nourishing, mineral-rich liquid on
  hand.
