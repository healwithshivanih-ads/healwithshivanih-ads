ingredients:
- item: roughly chopped vegetables and/or vegetable skins (carrots, potatoes, leeks, kale, parsnips, fennel)
  qty: '5'
  unit: cups
- item: ghee
  qty: '2'
  unit: tbsp
- item: fresh herbs with stems (thyme, rosemary, oregano, sage, parsley) OR fresh gingerroot, thickly
    sliced
  qty: '1'
  unit: handful
- item: salt
