steps:
- In a large heavy-bottomed pot, sauté the vegetables in the ghee over medium heat
  for about 10 minutes, stirring occasionally, until they begin to soften.
- Add the fresh herbs or gingerroot, salt, pepper, and water; bring to a boil.
- Reduce heat to low, partially cover, and simmer for 60 minutes.
- Remove from heat and strain through a fine mesh metal sieve into a heatproof container,
  pressing firmly on the vegetables with the back of a spoon to extract all the flavour.
- Cool and refrigerate for up to 1 week, or freeze for up to 1 month.
