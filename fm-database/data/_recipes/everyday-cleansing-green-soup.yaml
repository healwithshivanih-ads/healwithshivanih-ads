steps:
- Combine the vegetable broth and turmeric in a 2-quart saucepan and bring to a boil
  over high heat. If you plan to use a carafe blender, keep 1 cup of broth at room
  temperature to add later.
- Peel and roughly chop the gingerroot and add it to the pot with the kale and chard.
- Cover and simmer over medium heat for 10 minutes, then stir in the parsley and oil.
- Remove from heat. Blend smooth with an immersion hand blender in the pan, or transfer
  to a carafe blender (add the reserved room-temperature broth to prevent overheating)
  and blend from low to high until completely smooth.
- Season with salt and pepper, ladle into bowls, and serve topped with toasted sunflower
  seeds if desired.
