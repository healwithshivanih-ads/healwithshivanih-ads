one_line: A blended warm green soup of kale, chard, and parsley that acts as a digestive
  cleanser without the problems of cold raw juice.
headnote: The bitter and astringent tastes in this soup are specifically reducing
  in Ayurveda — a small bowl works as a daily digestive tonic or a light meal when
  the system feels sluggish.
