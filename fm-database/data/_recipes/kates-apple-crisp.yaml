steps:
- Preheat oven to 375°F.
- In a large bowl, toss together the chopped apples, lemon juice, spice mix, raisins,
  and dried cranberries until well combined.
- In a separate bowl, use a fork to mix together the rolled oats, almond meal, melted
  coconut oil, maple syrup, salt, and optional coconut or walnuts until crumbly.
- Transfer the apple mixture to an 8x8-inch glass baking dish. Spread the oat topping
  evenly over the apples and press down gently with your hand.
- Cover with foil and bake 40 minutes, until the apples are bubbling and soft. Remove
  foil and bake uncovered for a further 10 minutes until the topping is crisp and
  golden.
- Spoon into bowls and serve hot, with a dollop of yogurt on the side if desired.
