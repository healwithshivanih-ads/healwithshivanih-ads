steps:
- Rinse the sama and moong dal together until the water runs clear.
- Heat ghee in a pressure cooker. Add cumin seeds, ginger, and hing; sauté 20 seconds.
- Add the diced vegetables and turmeric; stir 1 minute.
- Add the drained sama-dal, salt, and 3 cups water. Pressure-cook 3-4 whistles (or
  simmer covered 25 minutes) until soft and porridge-like.
- Rest 5 minutes, fluff gently, and serve warm with a little extra ghee.
