steps:
- Heat oil in a kadhai and crackle the jeera.
- Add onion and ginger-garlic paste; saute till the onion turns soft and golden.
- Add tomato, haldi, chilli and dhania powder with a splash of water; cook till the
  masala thickens.
- Add the potato and cauliflower with salt, toss to coat in the masala.
- Cover and cook on low heat, stirring occasionally, till both are fork-tender, about
  15 minutes.
- Uncover, turn up the heat and dry off any moisture so the edges catch a little colour.
- Finish with fresh coriander and serve hot with roti.
