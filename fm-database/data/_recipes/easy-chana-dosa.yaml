one_line: Thin, protein-rich chickpea-flour dosas with grated zucchini and fresh cilantro
  — crisp, quick, and gluten-free.
headnote: Chickpea flour's naturally dry, grounding quality helps counteract the dampness
  of humid summer air, and these simple pancakes pair beautifully with chutneys or
  soup.
