steps:
- In a mixing bowl, stir the salt into the chickpea flour, then whisk in the water
  gradually until the batter reaches the consistency of pancake batter.
- Fold in the grated zucchini.
- Heat a large nonstick ceramic skillet over medium-high heat until a few drops of
  water sizzle and evaporate on contact.
- Pour about ⅓ cup of batter into the centre of the pan, tilt to spread it in circles
  using the back of a large spoon to form a thin round about 7 inches across.
- Scatter 1 tbsp of chopped cilantro over the surface; when the top looks dry, drizzle
  ½ tsp ghee over the dosa, check that the underside is browning, then flip.
- Cook until both sides are golden brown, about 5 minutes total; repeat with the remaining
  batter to make 4–5 dosas.
