steps:
- Warm the ghee and spice mix together in a small frying pan over medium heat.
- Add the apple slices and toss to coat, then fry for 2–3 minutes, stirring occasionally.
- Splash in a tablespoon or two of water to prevent sticking, add raisins or figs
  if using, and continue frying for another 2–3 minutes until the apple pieces are
  tender.
- Transfer to a bowl and serve warm.
