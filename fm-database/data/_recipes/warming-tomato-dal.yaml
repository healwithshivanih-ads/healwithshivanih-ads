steps:
- Bring 4 cups of water to a boil in a large saucepan. Rinse the lentils until the
  water runs clear, then add them to the boiling water along with the Winter Spice
  Mix.
- If using fresh tomatoes, parboil them whole for 4–5 minutes in a separate pot, then
  remove and slip off the skins. Coarsely chop and add to the lentils. For canned
  tomatoes, add directly with their liquid.
- Bring back to a boil, then reduce heat to low and simmer uncovered. After about
  25 minutes, slice the kale into thin ribbons and stir into the pot. Continue simmering,
  partially covered, until 30 minutes total have passed.
- In a small pan, heat the ghee over medium heat and fry the cumin and mustard seeds
  until fragrant, about 2–3 minutes — cover the pan if the mustard seeds are jumping.
- Pour the spiced ghee into the dal, add the salt, and boil uncovered for a final
  5 minutes.
- Serve in wide bowls over basmati rice or with a sprouted wheat tortilla.
