one_line: A bright red-lentil and tomato dal with kale and a cumin-mustard tempering — hearty, heating,
  and easy to digest.
headnote: Red lentils cook quickly and need no soaking, making this a reliable weeknight dal; removing
  tomato skins before adding keeps the dish gentle on the gut.
