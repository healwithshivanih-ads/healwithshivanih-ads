steps:
- Peel and chop the carrots, onion, ginger and garlic.
- In a pot, heat the oil, add cumin seeds and let them crackle, then saute the onion,
  ginger and garlic until soft.
- Add the chopped carrots and salt, toss for 2 minutes, then pour in 3 cups of water.
- Cover and simmer for 15 minutes until the carrots are completely tender.
- Add most of the coriander leaves, blend the soup smooth, then return to the pot
  and season with black pepper.
- Finish with lemon juice and the remaining fresh coriander, and serve hot.
