steps:
- Drain the soaked rice and set aside; keep the cooked chickpeas ready.
- Heat the oil in a heavy pot, add the cumin seeds, bay leaf, cinnamon, cardamom and
  cloves, and let them sizzle for a few seconds.
- Add the sliced onion and saute until soft and pale gold, then stir in the ginger-garlic
  paste for half a minute.
- Add the diced vegetables, turmeric and salt, and saute for 2 minutes.
- Stir in the drained rice and chickpeas, coating them gently in the spices for a
  minute.
- Pour in the water, bring to a boil, then cover and cook on low for 12-15 minutes
  until the rice is soft and the water is absorbed.
- Turn off the heat and let it rest, covered, for 5 minutes, then fluff gently with
  a fork and garnish with coriander.
