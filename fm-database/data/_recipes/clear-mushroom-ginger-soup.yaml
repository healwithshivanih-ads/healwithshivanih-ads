steps:
- Spread mushroom slices gills-up in available light for 20 minutes before cooking.
- Warm the oil in a medium saucepan over medium heat. Add garlic, ginger, and the
  white parts of the spring onion; sauté for 1–2 minutes until fragrant but not browned.
- Add the sun-dried mushroom slices and stir for 2–3 minutes until they soften slightly
  and begin to colour at the edges.
- Pour in the vegetable broth, add soy sauce, salt, and black pepper. Bring to a gentle
  boil, then reduce heat and simmer uncovered for 10 minutes so the flavours meld.
- Stir in the lemon juice, taste and adjust salt and pepper. The broth should be clear,
  savoury, and gently spiced.
- Ladle into bowls, scatter the spring onion greens and fresh coriander on top, and
  serve immediately.
