one_line: A thin, warming broth with sliced mushrooms and fresh ginger — simple comfort
  for a cold or rainy evening.
headnote: Laying the mushrooms gills-up in whatever light is available for 20 minutes
  before they go into the pot helps preserve as much of their natural vitamin D2 as
  possible. Ginger keeps the broth warming without heat, which is exactly what a monsoon
  or winter evening calls for. This is a light soup — it works as a starter or a gentle
  dinner on its own.
