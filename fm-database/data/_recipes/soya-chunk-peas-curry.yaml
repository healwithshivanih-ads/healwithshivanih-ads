steps:
- Boil the soya chunks in salted water for 4-5 minutes until soft, drain, and squeeze
  out the water well. Set aside.
- Heat oil in a kadai over medium heat. Add cumin seeds, let them splutter, then add
  the onion and sauté until golden.
- Stir in the ginger-garlic paste and cook 1 minute, then add the chopped tomato with
  turmeric, chilli powder, and coriander powder. Cook 6-8 minutes until softened and
  the oil separates.
- Add the green peas and the squeezed soya chunks, stir to coat in the masala, and
  season with salt.
- Pour in 1 cup water, cover, and simmer 10-12 minutes until the peas are tender and
  the chunks have soaked up the gravy.
- Sprinkle garam masala, stir, and finish with fresh coriander. Serve hot with roti
  or rice.
