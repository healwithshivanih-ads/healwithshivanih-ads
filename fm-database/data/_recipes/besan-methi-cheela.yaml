steps:
- Whisk the gram flour with water into a smooth, lump-free batter of pouring consistency.
- Stir in the chopped methi, green chilli, ginger, turmeric, cumin and salt; rest
  the batter for 10 minutes.
- Heat a flat tawa on medium and lightly grease it.
- Pour a ladle of batter and spread into a thin round with the back of the ladle.
- Drizzle a few drops of oil around the edges and cook until the underside is golden
  and lifts easily.
- Flip and cook the other side for a minute until cooked through.
- Repeat with the remaining batter and serve hot with chutney.
