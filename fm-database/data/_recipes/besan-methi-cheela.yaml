one_line: A thin savoury gram-flour pancake studded with fresh fenugreek leaves for
  a protein-rich start to the day.
headnote: Besan gives this cheela a naturally high protein content while the methi
  lends a gentle bitterness that supports digestion. It cooks in minutes on a single
  tawa and needs nothing more than chutney alongside.
