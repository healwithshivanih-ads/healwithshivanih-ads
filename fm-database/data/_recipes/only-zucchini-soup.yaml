steps:
- Halve the zucchini lengthwise and slice into ½-inch half moons.
- In a medium saucepan, fry the zucchini in the ghee over medium heat, stirring occasionally,
  for 5–7 minutes until tender.
- Add the water and salt, then cook over medium heat until everything is warmed through.
- Remove from the heat and blend the soup directly in the pot with an immersion blender
  until completely smooth.
- Ladle into bowls and serve alongside Avocado and Cucumber Salad.
