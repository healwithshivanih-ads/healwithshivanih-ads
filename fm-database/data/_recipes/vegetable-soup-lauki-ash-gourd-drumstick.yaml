slug: vegetable-soup-lauki-ash-gourd-drumstick
name: Vegetable Soup (Lauki, Ash Gourd, Drumstick)
one_line: Light gut-friendly vegetable soup with drumstick.
meal_type:
- dinner
diet:
- vegetarian
- vegan
- gluten_free
- dairy_free
region: Indian
main_ingredients:
- 1 cup mixed lauki + ash gourd
- 1 drumstick
- 1 inch ginger
- 6 curry leaves
- 1/4 tsp pepper
- 1 tsp coconut oil
- salt
- coriander
contains_allergens: []
ingredients:
- item: 1 cup mixed lauki + ash gourd, cubed
- item: 1 drumstick, in batons
- item: 1 inch ginger
- item: 6 curry leaves
- item: 1/4 tsp pepper
- item: 1 tsp coconut oil
- item: salt
- item: coriander
steps:
- Heat oil, sauté ginger + curry leaves 1 min.
- Add vegetables + 2 cups water + salt, simmer 12-15 min till soft.
- Lightly mash, season with pepper, finish with coriander.
- 'Tip: Strip the drumstick flesh with a spoon at the table — it''s the tastiest bit.'
