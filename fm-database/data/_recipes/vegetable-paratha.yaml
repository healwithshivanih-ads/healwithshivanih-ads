steps:
- Knead the atta with a pinch of salt and water into a soft dough, cover and rest
  15 minutes.
- Mix the grated carrot, cabbage, mashed peas, green chilli, cumin powder, coriander
  and salt into a moist filling.
- Divide dough into 5 balls, flatten each, spoon in the vegetable filling and seal
  the edges.
- Dust with flour and roll gently into a paratha, keeping the vegetables tucked in
  evenly.
- Cook on a hot tawa, flip, and drizzle ghee on both sides until golden and cooked
  through.
- Serve hot with curd or chutney.
