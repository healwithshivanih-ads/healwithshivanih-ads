ingredients:
- item: 1 boneless chicken thigh (skin off)
- item: 1/2 tsp ginger-garlic paste
- item: 1/4 tsp turmeric
- item: 1/4 tsp pepper
- item: 1 tsp coconut oil
- item: salt
- item: lemon wedge
steps:
- Rub thigh with ginger-garlic, turmeric, pepper and salt; rest 10 min.
- Heat coconut oil in a pan on medium.
- Sear thigh 5-6 min per side till cooked through and golden.
- Rest 2 min, squeeze over lemon, slice.
- 'Tip: Serve with sautéed methi greens and a small buckwheat roti.'
