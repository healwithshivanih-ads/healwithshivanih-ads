steps:
- Ensure soaked sabudana is well-drained and not sticky-wet; spread on a cloth for
  a few minutes if needed.
- In a large bowl, combine sabudana, mashed potato, crushed peanuts, green chilli,
  ginger, cumin seeds, rock salt, lemon juice, and coriander. Mix well until the mixture
  holds together when pressed — if too wet, add a spoonful more crushed peanuts.
- Grease your palms lightly with oil and shape the mixture into short cylindrical
  dumplings (muthia) about 5–6 cm long, pressing firmly so they hold their shape.
- Set up a steamer with water brought to a rolling boil. Grease the steamer plate
  or line with banana leaf. Place muthia with a little space between each.
- Steam on medium-high heat for 15–18 minutes until the surface looks set and a skewer
  inserted in the centre comes out clean.
- Rest for 2 minutes before unmoulding. Serve warm with green chutney.
servings: 3–4 (makes about 12 muthia)
prep_time_min: 20
cook_time_min: 20
one_line: Soft steamed tapioca-peanut dumplings spiced with ginger and green chilli.
headnote: Steaming keeps these dumplings light on the stomach — the peanuts bring
  in a decent hit of protein and good fats to balance the starchy sabudana, making
  this a more sustaining snack than the fried version. Good for a damp monsoon morning
  when you want something warm and gentle.
