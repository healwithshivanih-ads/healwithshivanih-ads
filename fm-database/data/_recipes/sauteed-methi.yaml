  unit: ''
steps:
- Heat oil in a kadhai, crackle the jeera and add hing.
- Add the crushed garlic and onion and saute till soft and golden.
- Add the chopped methi with haldi, chilli powder and salt.
- Cook uncovered on medium heat, stirring, till the leaves wilt and the bitterness
  mellows, about 6 to 8 minutes.
- Dry off any moisture so the methi is soft but not watery, and serve hot with roti.
