steps:
- Spread green chutney generously on all four bread slices.
- Layer cucumber, tomato, onion, capsicum and potato on two slices.
- Sprinkle chaat masala, salt and pepper over the veggies.
- Close with the remaining slices, press gently, halve and serve. Toast in a pan or
  sandwich press if you like.
