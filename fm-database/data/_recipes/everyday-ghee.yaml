one_line: Homemade clarified butter — the Ayurvedic kitchen's most prized cooking
  fat, made from a single ingredient in under 20 minutes.
headnote: Removing the milk solids transforms butter into a shelf-stable, high-heat
  cooking oil that carries spice qualities deep into the body's tissues and is easier
  to digest than whole butter.
