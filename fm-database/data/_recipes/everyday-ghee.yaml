steps:
- Place both sticks of butter in a small saucepan and melt over medium heat.
- Reduce heat to low. After about 5 minutes the butter will develop a white froth
  on top and you will hear popping from moisture evaporating — stay present, do not
  walk away.
- Continue monitoring; as the popping becomes less frequent, watch closely. When the
  milk solids on the pan bottom begin to turn golden brown — about 10–15 minutes total
  — remove the pan from heat.
- Cool until just warm, about 15 minutes.
- Strain through a fine strainer or cheesecloth into a sterilised glass jar, skimming
  off any remaining foam.
- Store at room temperature with the lid on for up to 1 month, or refrigerate for
  longer storage. Always use a clean utensil when scooping.
