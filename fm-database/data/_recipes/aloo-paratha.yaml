steps:
- Knead the atta with a pinch of salt and water into a soft dough, cover and rest
  15 minutes.
- Mash the boiled potatoes and mix in green chilli, coriander, ajwain, red chilli
  powder and salt.
- Divide dough into 4 balls, roll each into a small round, place a scoop of filling
  in the centre and pleat the edges to seal.
- Dust with flour and gently roll the stuffed ball into a paratha, keeping the filling
  even.
- Cook on a hot tawa, flip, and drizzle ghee on both sides until golden brown spots
  appear.
- Serve hot with curd or pickle.
