one_line: A thick, herbed yogurt dip served with crisp cucumber and carrot sticks.
headnote: Hung curd is simply curd drained of whey for a few hours — the result is
  dense, protein-rich, and tangy. It makes an honest dip that keeps you full well
  past snack time. Pair it with cool cucumber and sweet carrot sticks for a refreshing
  plate on a warm afternoon.
