steps:
- Place full-fat curd in a muslin cloth, tie it up, and hang it over a bowl in the
  refrigerator for at least 4 hours or overnight until thick and whey-free — you should
  have about 1 cup of hung curd.
- Tip the hung curd into a bowl and whisk it briefly until smooth. Add the chopped
  mint, coriander, green chilli, roasted cumin powder, chaat masala, black salt, and
  lemon juice. Mix well and taste for seasoning.
- Peel the carrots and cut them into batons roughly 8 cm long. Halve the cucumber
  lengthwise, scoop out the seeds with a spoon, and cut into similar-sized sticks.
  Arrange on a plate.
- Transfer the dip to a small serving bowl, dust lightly with a pinch of roasted cumin
  powder, and place it alongside the vegetable sticks. Serve immediately or refrigerate
  the dip (covered) for up to one day.
