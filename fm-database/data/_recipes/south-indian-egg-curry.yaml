one_line: Hard-boiled eggs simmered in a thin, tangy coconut-tomato gravy spiced the
  Chettinad way.
headnote: Eggs are one of the few everyday sources of natural vitamin D and B12 together
  — keeping the yolks whole and just simmered in gravy (not overcooked) preserves
  as much of that as possible. The coconut milk base keeps the gravy light and rounds
  out the pepper and fennel.
