steps:
- Hard-boil the eggs for 10 minutes, cool, peel, and make 3–4 shallow slits in each
  with a knife so the gravy can seep in. Set aside.
- Heat coconut oil in a wide pan. Add mustard seeds; once they pop, add fennel seeds
  and curry leaves and fry for 30 seconds. Add sliced onions and cook on medium heat
  for 10 minutes until deep golden.
- Add ginger and garlic, fry 1 minute, then add tomatoes, turmeric, coriander, cumin,
  chilli powder, and half the black pepper. Cook until tomatoes are completely soft
  and the oil begins to separate, about 6–7 minutes.
- Pour in the thin coconut milk, add salt, stir well, and bring to a gentle simmer.
  Add the peeled eggs and simmer uncovered for 8 minutes so the eggs absorb the gravy.
- Stir in the thick coconut milk and remaining black pepper; cook on low for 2 minutes
  without boiling. Garnish with fresh coriander and serve with rice or appam.
