slug: fish-curry-coconut-no-tomato
name: Fish Curry (Coconut, No Tomato)
one_line: Light coconut-and-curry-leaf fish curry, no tomato.
meal_type:
- lunch
- dinner
diet:
- non_vegetarian
- gluten_free
- dairy_free
region: Indian
main_ingredients:
- 1 fillet fish (surmai/rohi)
- 1/2 cup coconut milk (or ground fresh coconut + water)
- 1 small onion
- 6-7 curry leaves
- 1 tsp ginger-garlic paste
- 1/2 tsp turmeric
- 1/2 tsp chilli powder
- 1 tsp coriander powder
- 1 tsp coconut oil
- salt to taste
contains_allergens: []
ingredients:
- item: 1 fillet fish (surmai/rohi), cut in pieces
- item: 1/2 cup coconut milk (or ground fresh coconut + water)
- item: 1 small onion, sliced
- item: 6-7 curry leaves
- item: 1 tsp ginger-garlic paste
- item: 1/2 tsp turmeric
- item: 1/2 tsp chilli powder
- item: 1 tsp coriander powder
- item: 1 tsp coconut oil
- item: salt to taste
steps:
- Marinate fish in a pinch of turmeric + salt, rest 10 min.
- Heat coconut oil; add curry leaves and onion, sauté till soft (no browning).
- Add ginger-garlic, then turmeric, chilli and coriander powder; bhuno 1 min with a splash of water.
- Pour in coconut milk + 1/4 cup water, bring to a gentle simmer.
- Slide in the fish, cover, simmer 8-10 min till just cooked — don't boil hard or coconut splits.
- Check salt, finish with a few fresh curry leaves.
- 'Tip: No tomato — the tang comes from a squeeze of lime at the table if you like.'
