steps:
- Heat the oil in a deep pot and sauté the bay leaf, garlic and green chilli until
  the garlic browns and some of it lightly chars.
- Add the onion, zucchini, stock, salt and pepper; cover and cook about 10 minutes
  until the zucchini is soft.
- Discard the bay leaf and blend the soup smooth in the pot. Serve with fresh chives
  and a swirl of olive oil.
