steps:
- Wash and finely chop the fenugreek leaves and sprinkle with a little salt to soften.
- Mix atta with the methi, turmeric, red chilli powder, ajwain, oil and salt.
- Add water gradually and knead into a soft dough, then rest 15 minutes.
- Divide into 6 balls and roll each into a medium round, dusting with flour.
- Cook on a hot tawa, flip, and drizzle ghee on both sides until golden spots form.
- Serve hot with curd or pickle.
