steps:
- Rinse the moong dal and rice together in a couple of changes of water, then drain
  and set aside.
- Heat the ghee in a pressure cooker, add the cumin seeds and hing, and let the cumin
  splutter.
- Add the grated ginger and turmeric, stir for a few seconds, then add the diced vegetables
  and saute for a minute.
- Add the drained dal and rice with the salt and water, and stir well.
- Pressure-cook for 3-4 whistles (or simmer covered for 25-30 minutes) until everything
  is very soft and porridge-like.
- Open the cooker, stir to a soft, soupy consistency, loosening with hot water if
  it has thickened too much.
- Garnish with fresh coriander and serve warm.
