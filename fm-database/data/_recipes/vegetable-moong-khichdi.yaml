one_line: A soft, soupy one-pot khichdi of moong dal and rice cooked down with seasonal
  vegetables.
headnote: This is the everyday comfort khichdi — moong dal and rice simmered soft
  with a gentle cumin-ghee tempering. The mixed vegetables add colour and fibre while
  keeping it easy on digestion.
