steps:
- Combine the chopped apples, dates, water, maple syrup, grated ginger, and spice mix in a small saucepan.
- Bring to a boil over high heat, then reduce to medium-low and simmer for 5 minutes until the fruit softens.
- Remove from heat. Use an immersion blender to briefly blend for a chunky texture, or puree about one-third
  of the mixture in a blender and stir back in.
- Divide between 2 breakfast bowls and serve warm.
