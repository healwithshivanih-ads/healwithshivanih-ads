steps:
- Dry-roast the sesame seeds on low heat until golden and fragrant, then set aside.
- Heat the oil in a pan, crackle the cumin seeds and add the green chilli and garlic.
- Add the chopped spinach and sauté for 2 to 3 minutes until just wilted.
- Let the mixture cool slightly to keep the colour bright.
- Combine the wilted spinach, roasted sesame, salt and lemon juice in a grinder.
- Grind to a smooth or slightly coarse chutney, adding a splash of water if needed.
- Transfer to a bowl and serve alongside rice, roti or dosa.
