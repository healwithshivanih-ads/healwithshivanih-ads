steps:
- Combine the ginger, cardamom, cloves, and cinnamon stick with the water in a saucepan.
- Bring to a boil and keep at a rolling boil until the liquid has reduced by half.
- Remove from heat and allow to cool slightly.
- Stir in the milk and drink warm.
