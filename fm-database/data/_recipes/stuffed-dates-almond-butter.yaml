one_line: Medjool dates stuffed with almond butter and a whole nut — a two-bite Ayurvedic
  sweet that satisfies naturally.
headnote: Dates are one of Ayurveda's premier building foods for winter; pairing them
  with a good fat slows the natural sugar release and makes them deeply satisfying
  in small quantities.
