steps:
- Cut a 1-inch lengthwise slit in each date and remove the pit.
- Spoon 1 teaspoon of almond butter into each opening, allowing it to mound slightly
  above the surface.
- Press a whole almond or cashew into the almond butter of each date.
- Arrange on a plate and dust lightly with spice mix or cinnamon before serving.
