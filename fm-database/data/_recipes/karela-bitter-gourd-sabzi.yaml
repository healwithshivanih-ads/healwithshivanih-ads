slug: karela-bitter-gourd-sabzi
name: Karela (Bitter Gourd) Sabzi
one_line: Crisp dry-fried bitter gourd with onion.
meal_type:
- lunch
- dinner
- side
diet:
- vegetarian
- vegan
- gluten_free
- dairy_free
region: Indian
main_ingredients:
- 1 karela
- 1 onion
- 1/4 tsp turmeric
- 1/4 tsp chilli
- 1/2 tsp coriander powder
- 1 tsp coconut oil
- salt
contains_allergens: []
ingredients:
- item: 1 karela, thinly sliced
- item: 1 onion, sliced
- item: 1/4 tsp turmeric
- item: 1/4 tsp chilli
- item: 1/2 tsp coriander powder
- item: 1 tsp coconut oil
- item: salt
steps:
- Rub karela slices with salt, rest 15 min, squeeze out the bitter water.
- Heat oil, fry onion till golden.
- Add karela + spices, sauté on medium 10-12 min till crisp and dry.
- 'Tip: The salt-and-squeeze step is what tames the bitterness — don''t skip it.'
