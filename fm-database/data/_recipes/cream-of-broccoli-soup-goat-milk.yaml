one_line: A velvety blended broccoli soup made creamy with goat's milk — surprisingly
  good, easy to digest, and warming for cold autumn days.
headnote: Goat's milk's lighter digestive footprint makes this simple blended broccoli
  soup both creamy and gentle on the gut — an unexpected autumn comfort that delivers
  bitter-cleansing alongside warming goodness.
