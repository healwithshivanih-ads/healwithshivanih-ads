steps:
- Boil the diced broccoli (florets and stalks cut small for faster cooking and easier
  digestion) in the vegetable broth in a medium saucepan until tender, about 10 minutes.
- Remove from heat and stir in the goat's milk, parsley if using, and salt.
- Use an immersion blender to process until smooth and creamy.
- Divide between 2 bowls and finish with freshly ground pepper.
