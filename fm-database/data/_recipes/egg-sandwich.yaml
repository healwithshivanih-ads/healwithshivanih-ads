steps:
- Mash the boiled eggs roughly with a fork.
- Mix in onion, green chilli, mustard paste, black pepper, salt and coriander.
- Spread the egg filling over two bread slices and close with the other two.
- Press gently, halve and serve; toast lightly if you prefer it warm.
