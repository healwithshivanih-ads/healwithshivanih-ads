steps:
- Preheat oven to 350°F. Grease 2 baking sheets with ghee or coconut oil, or line
  with parchment paper.
- In a medium bowl, mix all ingredients together in the order listed. If the batter
  is too loose to shape, refrigerate for 5–10 minutes.
- Roll batter into tablespoon-size balls or drop by spoon onto the prepared sheets,
  leaving a few inches between each — they will puff up during baking.
- Press each ball down lightly with a fork and sprinkle the tops with extra sesame
  seeds.
- Bake for 10–12 minutes, until the surfaces are firm enough to touch without sticking.
  Allow cookies to cool completely on the baking sheet before transferring — they
  will be soft and will firm as they cool.
- 'Flax egg alternative: blend 1 tbsp ground flaxseeds with 3 tbsp water for 2 minutes.'
