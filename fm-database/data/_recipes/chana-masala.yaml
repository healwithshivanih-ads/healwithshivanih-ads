- item: salt
  qty: to taste
  unit: ''
- item: fresh coriander
  qty: '2'
  unit: tbsp
steps:
- Pressure-cook the soaked chickpeas with a little salt and water until soft but holding
  shape (4-5 whistles). Drain, reserving the cooking water.
- Heat ghee, add cumin seeds, then onion; saute until golden. Add ginger-garlic paste
  and cook 1 minute.
- Add tomato puree, turmeric, coriander powder, and chana/garam masala. Cook down
  4-5 minutes until the oil separates.
- Add the cooked chickpeas and enough reserved water for a thick gravy. Simmer 8-10
  minutes so the chana absorbs the masala.
- Lightly mash a few chickpeas to thicken. Finish with fresh coriander and serve warm
  with roti or rice.
