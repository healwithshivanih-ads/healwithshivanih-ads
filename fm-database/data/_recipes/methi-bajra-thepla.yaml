steps:
- Combine the wheat flour, bajra flour, chopped methi, curd, turmeric, chilli, cumin,
  salt and 1 tsp oil in a bowl.
- Add water a little at a time and knead into a soft, pliable dough; rest for 15 minutes.
- Divide into small balls and roll each out thin on a lightly floured surface into
  a round thepla.
- Heat a tawa on medium and cook the thepla until light brown spots appear underneath.
- Flip, brush with a little oil, and press gently while it cooks the other side.
- Turn once more and cook until both sides are golden and cooked through.
- Stack and serve warm with curd or pickle.
