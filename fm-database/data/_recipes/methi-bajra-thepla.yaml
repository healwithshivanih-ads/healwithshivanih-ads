one_line: A soft griddle flatbread of wheat and pearl millet flecked with fenugreek,
  sturdy enough to pack for lunch.
headnote: Bajra brings an earthy warmth and extra fibre to this everyday Gujarati
  flatbread while methi keeps it aromatic and gently bittersweet. Theplas keep well
  for hours, making them ideal for tiffins and travel.
