steps:
- Dry-roast the moong dal in a pan for 2 minutes until fragrant, then rinse the dal
  and rice together.
- Heat ghee in a pressure cooker; add cumin seeds and let them splutter, then add
  ginger and turmeric.
- Add the diced vegetables and saute for a minute.
- Add the drained dal-rice, salt and water. Pressure-cook 3-4 whistles (or simmer
  covered 25-30 min) until soft and porridge-like.
- Stir to a soft, soupy consistency, adding hot water if needed. Garnish with coriander
  and serve warm.
