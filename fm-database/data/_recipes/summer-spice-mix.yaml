steps:
- Toast the coriander, cumin, and fennel seeds in a dry heavy-bottomed pan over medium
  heat, stirring often, for a few minutes until fragrant.
- Remove from the heat and allow to cool completely.
- Grind the toasted whole seeds to a uniform fine powder using a spice-dedicated coffee
  grinder or a mortar and pestle.
- In a small bowl, stir in the turmeric and cardamom powders until evenly combined.
- Store in an airtight jar or shaker container; use in any summer recipe that calls
  for Summer Spice Mix.
