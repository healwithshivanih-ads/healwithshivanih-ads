one_line: A toasted summer spice blend of coriander, cumin, fennel, turmeric, and
  cardamom for cooling and soothing pitta.
headnote: This blend is the backbone of many summer recipes — its cooling, digestive
  spices counteract stomach acid and excess heat while adding complexity to even the
  simplest dish.
