steps:
- Butterfly each chicken breast or pound it to an even thickness so it cooks through
  evenly.
- Rub with turmeric, cracked pepper, ginger-garlic paste, salt and the juice of half
  the lemon; rest for 20 minutes.
- Heat the ghee in a heavy pan on medium-high until hot.
- Lay the chicken down and sear undisturbed for 4-5 minutes until the underside is
  deep golden.
- Flip once and cook the other side for 4-5 minutes until the juices run clear and
  the centre is no longer pink.
- Rest for 3 minutes off the heat, squeeze over the remaining lemon, slice and serve.
