steps:
- Dry-roast the sesame seeds on low heat until they turn golden and fragrant, then
  set aside to cool.
- In the same pan, lightly roast the dry red chillies and cumin seeds for half a minute.
- Combine the roasted sesame, chillies, cumin, garlic, tamarind and salt in a grinder.
- Grind to a coarse powder first, then add water a little at a time.
- Blend to a thick, spreadable chutney, scraping down the sides as needed.
- Taste and adjust salt and tamarind, then transfer to a bowl and serve.
