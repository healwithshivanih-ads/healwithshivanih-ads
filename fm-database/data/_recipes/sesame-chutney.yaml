one_line: A nutty, garlicky roasted-sesame chutney with a tang of tamarind to lift
  any meal.
headnote: Toasting the sesame slowly is what gives this chutney its deep, nutty flavour
  and a good hit of calcium. It keeps for a few days and turns a plain roti or rice
  plate into something moreish.
