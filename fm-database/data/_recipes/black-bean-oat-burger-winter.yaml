steps:
- Preheat the oven to 350°F (175°C) and line a baking sheet with parchment paper.
- Mash the black beans well with a fork in a large bowl, then work in the spinach,
  roasted red pepper, oat flour, and Winter Salts until the mixture is uniform but
  still slightly chunky.
- Shape the mixture into 2 large or 3 medium patties and place on the prepared baking
  sheet.
- Bake for 10 minutes per side, or alternatively melt 1 tsp ghee in a frying pan and
  pan-fry over medium heat for 5–7 minutes per side until well browned.
- Serve over a steamed salad bowl, with rice and chutney, or in your preferred format.
