steps:
- Preheat oven to 350°F. Halve the squash, scoop out the seeds, and place the halves
  cut-side down in a baking dish with about 1 inch of water. Bake until the flesh
  yields easily to a fork, about 30 minutes. Remove and allow to cool slightly.
- Warm the coconut milk and water together in a large saucepan over medium heat. Scoop
  the squash flesh from the skins and stir it into the pot with the cinnamon, nutmeg,
  and salt.
- Bring to a boil, reduce to a simmer for 5 minutes, then remove from heat and blend
  with an immersion blender until smooth and creamy.
- 'For the ume pumpkin seeds: spread pumpkin seeds in a heavy-bottomed pan and toast
  on low-medium heat for about 5 minutes, stirring or shaking every minute. When the
  seeds begin to pop, stir and toast 1 minute more, then transfer to a wide dish to
  cool. Dash with ume plum vinegar and toss to coat.'
- Serve the soup in wide bowls, garnished with a handful of ume pumpkin seeds.
