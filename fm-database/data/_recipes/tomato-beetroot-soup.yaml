steps:
- Peel and chop the beetroot small so it cooks quickly, and roughly chop the tomatoes,
  onion, ginger and garlic.
- In a pot, heat the oil, add cumin seeds and let them splutter, then saute the onion,
  ginger and garlic until soft.
- Add the beetroot and tomatoes with salt, toss for 2 minutes, then pour in 3 cups
  of water.
- Cover and simmer for 18-20 minutes until the beetroot is fully tender.
- Blend the soup smooth, strain if you prefer a silkier texture, return to the pot
  and season with black pepper.
- Finish with lemon juice and chopped coriander, and serve warm.
