steps:
- Knead the atta with a pinch of salt and water into a soft dough, cover and rest
  15 minutes.
- Grate the cauliflower, squeeze out any moisture, and mix with ginger, green chilli,
  coriander, cumin powder and salt.
- Divide dough into 4 balls, flatten each, place the cauliflower filling in the centre
  and seal the edges well.
- Dust with flour and roll gently into a paratha, taking care not to tear the surface.
- Cook on a hot tawa, flip, and drizzle ghee on both sides until crisp and golden.
- Serve hot with curd or a dab of butter.
