steps:
- Warm the olive oil in a heavy-bottomed pot and sauté the garlic, onion, cinnamon
  stick and bay leaf until the onion turns soft and translucent.
- Add the carrot, parsnip, salt, a few thyme sprigs and the stock (or water); bring
  to a boil, then cover and simmer about 15 minutes until the vegetables are tender.
- Lift out the cinnamon, bay leaf and thyme stalks, then blend the soup smooth with
  a hand blender.
- Finish with the reserved thyme leaves, freshly ground pepper and a splash of balsamic.
  Serve hot, or chill and serve cold in summer.
