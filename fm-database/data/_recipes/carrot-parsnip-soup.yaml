main_ingredients:
- 2 cups carrot, peeled & chopped
- 2 cups parsnip, peeled & chopped
- 3 cloves garlic, crushed
- 1 cup onion, chopped
- 2 tbsp olive oil
- 4 cups low-salt vegetable stock
- 1 bay leaf
- 2 inch cinnamon stick
- 5-6 sprigs fresh thyme, divided
- salt, to taste
- ground black pepper, to taste
- 1 tbsp balsamic vinegar
