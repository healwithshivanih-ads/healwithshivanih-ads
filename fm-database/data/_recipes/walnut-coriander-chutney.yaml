one_line: A fresh green chutney blended with walnuts — cool, herby, and a genuinely
  good everyday source of plant omega-3.
headnote: Walnuts are one of the richest plant sources of ALA omega-3, and blending
  them raw into a chutney keeps the fatty acids intact. Fresh coriander adds a clean,
  cooling note and pairs the chutney naturally with a wide range of Indian meals.
  A small bowlful alongside any meal is enough to make a difference.
