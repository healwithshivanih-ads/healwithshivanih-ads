steps:
- If the walnuts taste at all bitter, soak them in cold water for 15–20 minutes, then
  drain and pat dry. This is optional but makes the chutney milder.
- Combine walnuts, coriander, green chilli, garlic, ginger, and toasted cumin in a
  blender jar. Add lemon juice, salt, and 3 tablespoons of water.
- Blend to a smooth, pourable chutney, scraping down the sides once. Add the remaining
  tablespoon of water only if needed to loosen.
- Taste and adjust salt and lemon. The chutney should be bright, slightly nutty, and
  gently spiced.
- Transfer to a small serving bowl or airtight jar. Serve immediately alongside any
  meal, or refrigerate for up to 2 days. Stir before serving if it settles.
servings: '6'
