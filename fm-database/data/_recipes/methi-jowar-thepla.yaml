one_line: A wheat-and-sorghum flatbread with fenugreek and a scatter of sesame, cooling
  and easy on the stomach.
headnote: Jowar makes this thepla lighter and cooling, a good choice when the weather
  turns hot, while methi and sesame add depth and a nutty finish. Roll them thin so
  they stay soft even once cooled for a tiffin.
