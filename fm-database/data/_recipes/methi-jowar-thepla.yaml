steps:
- Mix the wheat flour, jowar flour, chopped methi, curd, turmeric, ginger-chilli paste,
  sesame seeds, salt and 1 tsp oil in a bowl.
- Add water gradually and knead into a smooth, medium-soft dough; rest for 15 minutes.
- Pinch off small portions and roll each into a thin round thepla, dusting with flour
  as needed.
- Heat a tawa on medium and place the thepla to cook until spots form on the underside.
- Flip, smear lightly with oil, and cook while pressing gently with a spatula.
- Turn again and cook until both sides are evenly golden.
- Serve warm, folded, with a spoon of pickle or a bowl of curd.
