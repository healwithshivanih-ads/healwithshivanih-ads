contains_allergens: []
ingredients:
- item: 1/2 cup quinoa, rinsed well
- item: 1 cup water
- item: pinch salt
steps:
- Rinse quinoa thoroughly to remove bitterness.
- Bring water + salt to a boil, add quinoa, cover, simmer 12-15 min till the grain uncoils.
- Rest 5 min off heat, fluff with a fork.
