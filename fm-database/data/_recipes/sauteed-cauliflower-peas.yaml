steps:
- Heat oil in a kadhai and crackle the jeera.
- Add onion and grated ginger and saute till the onion softens.
- Add the cauliflower and peas with haldi, chilli, dhania powder and salt; toss to
  coat.
- Sprinkle a little water, cover and cook on low heat till the cauliflower is just
  tender, about 12 minutes.
- Uncover, raise the heat and dry off the moisture so the florets brown lightly.
- Finish with fresh coriander and serve hot.
