steps:
- Heat oil in a pan and crackle the jeera, then add garlic and onion; saute till soft.
- Add the sliced mushrooms and cook on high heat till they release their water and
  it dries off.
- Stir in haldi, chilli powder, crushed pepper and salt.
- Add the chopped spinach and toss on high heat till it wilts, about 3 to 4 minutes.
- Cook off any extra moisture so the sabzi is dry, and serve hot with roti.
