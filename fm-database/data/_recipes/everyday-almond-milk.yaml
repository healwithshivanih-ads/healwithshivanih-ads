steps:
- Soak the almonds in the soaking water for at least 6 hours or overnight.
- Drain and discard the soaking water; rinse the almonds.
- Blend the almonds with 1 cup of fresh water using a hand or carafe blender until smooth.
- Add the remaining 3 cups of water and blend again until smooth and foamy.
- Strain through a fine sieve or cheesecloth — strain twice for very smooth milk. Save the leftover almond
  pulp for baking or to thicken blended soups.
- Use immediately or refrigerate for up to 3–5 days.
