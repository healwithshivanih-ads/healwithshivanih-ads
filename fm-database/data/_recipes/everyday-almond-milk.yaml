one_line: Fresh homemade almond milk from soaked nuts — far more nutritious than the boxed kind and the
  foundational liquid base for Ayurvedic cereals and soups.
headnote: Soaking breaks down enzyme inhibitors in the almonds, making the resulting milk noticeably lighter
  and more digestible; the almond pulp is a bonus for baking.
