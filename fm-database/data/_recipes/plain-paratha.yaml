steps:
- Mix atta with a pinch of salt, add water gradually and knead into a soft, pliable
  dough.
- Cover and rest 15 minutes, then divide into 5 balls.
- Roll one ball into a round, smear with ghee, dust with flour, fold into a triangle
  or coil, then roll out again.
- Cook on a hot tawa until light bubbles appear, flip and drizzle ghee.
- Press gently and cook both sides until flaky and golden.
- Serve hot with any curry, dal or curd.
