steps:
- Drain and rinse the tofu. Press it gently to remove excess moisture, then cut into 1-inch cubes.
- Melt the ghee in a large frying pan over medium-low heat. Arrange the tofu cubes in a single layer and
  fry for about 7 minutes, shaking the pan occasionally to prevent sticking.
- Flip the cubes with a spatula and continue frying for another 7 minutes until the second sides are browned
  and all liquid has evaporated.
- Remove the pan from heat. While the tofu is still in the pan, sprinkle on the nutritional yeast, then
  the tamari, and toss with the spatula until every cube is well coated.
- Serve warm over steamed kale or a steamed salad bowl.
