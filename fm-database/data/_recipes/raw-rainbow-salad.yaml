main_ingredients:
- 2 cups mixed green & purple lettuce
- 1 cup arugula leaves
- 1 cup purple cabbage, shredded
- 6 cherry tomatoes, halved
- ½ cup cucumber, sliced
- ½ cup carrots, sliced
- 2 tbsp almonds, slivered
- 1 tbsp chia seeds
- 2 tbsp pomegranate seeds
- 2 tbsp olive oil
- 1 tbsp maple syrup
- salt and black pepper, to taste
