steps:
- In a large bowl, mix the lettuce and arugula leaves.
- Loosely scatter over the purple cabbage, cucumber and halved cherry tomatoes (cut
  side up looks pretty).
- Sprinkle with the slivered almonds, pomegranate seeds and chia.
- Shake the olive oil, maple syrup, lemon juice, salt and pepper together in a jar,
  drizzle over the salad and serve.
