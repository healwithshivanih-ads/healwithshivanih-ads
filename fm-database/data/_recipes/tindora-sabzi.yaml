steps:
- Heat oil in a kadhai, add rai and let it splutter, then add jeera, curry leaves
  and hing.
- Add the onion and saute till soft.
- Add the sliced tindora, haldi, chilli, dhania powder and salt; toss to coat.
- Cover and cook on low heat, stirring occasionally, till the tindora is tender, about
  15 minutes.
- Uncover, raise the heat and cook till the pieces are dry and lightly crisp at the
  edges.
- Serve hot with roti or dal-rice.
