steps:
- Heat ghee in a kadai over medium heat. Add mustard seeds and let them pop, then
  add cumin seeds, curry leaves, and ginger; sauté 30 seconds until fragrant.
- Add the diced bean and turmeric. Stir to coat in the tempering.
- Add salt, cover, and cook on low 8-12 minutes, stirring occasionally, until the
  vegetable is just tender (not mushy). Add a splash of water only if it sticks.
- Uncover, raise heat briefly to dry off any moisture. Stir in grated coconut if using.
- Garnish with fresh coriander and serve warm with roti or rice.
