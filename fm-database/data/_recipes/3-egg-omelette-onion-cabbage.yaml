ingredients:
- item: 3 eggs
- item: 2 tbsp finely diced cabbage
- item: 1 tbsp chopped onion
- item: 1 tbsp coriander
- item: 1/4 tsp pepper
- item: 1 tsp coconut oil
- item: salt
steps:
- Beat eggs with salt and pepper.
- Soften cabbage and onion in oil for 2 min.
- Pour in eggs, scatter coriander, cook on low till set, fold.
