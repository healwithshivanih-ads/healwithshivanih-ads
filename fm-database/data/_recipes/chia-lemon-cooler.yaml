one_line: Soaked chia seeds in chilled lemon water with a touch of jaggery.
headnote: Chia seeds soaked for at least 20 minutes swell into a gel that delivers
  a quiet but meaningful hit of plant omega-3. A squeeze of fresh lemon and a little
  jaggery keep this cooling drink honest and easy to sip through a hot afternoon.
