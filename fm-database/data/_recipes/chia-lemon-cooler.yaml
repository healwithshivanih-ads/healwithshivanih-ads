- item: fresh mint leaves
  qty: '8'
  unit: whole
steps:
- Stir chia seeds into 2.5 cups of cold water in a jug and leave to soak for 20–25
  minutes, stirring once halfway, until each seed is surrounded by a clear gel.
- Dissolve jaggery powder in the lemon juice by stirring briskly for a minute, then
  pour the sweetened lemon juice into the soaked chia water.
- Add rock salt and stir everything together gently so the chia gel stays intact rather
  than breaking up.
- Drop in the mint leaves, give one last stir, pour into two glasses over ice if available,
  and serve immediately.
servings: 2 glasses
