steps:
- In a bowl, mix crumbled paneer with onion, capsicum, tomato, green chilli, turmeric,
  chaat masala, salt and coriander.
- Spread the paneer filling on two bread slices and cover with the other two.
- Toast on a hot pan or sandwich press for 3 to 4 minutes until golden, or eat as
  is.
- Cut in half and serve warm.
