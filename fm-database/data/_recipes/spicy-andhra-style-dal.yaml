one_line: Fiery Andhra-style whole mung dal with mustard-cumin tempering and ginger
  — a cleansing spring dal that brings real heat.
headnote: The tangy, pungent, and lightly bitter combination of whole mung beans,
  red chili, and fresh ginger reflects the bold cookery of Andhra Pradesh and makes
  for one of the most kapha-clearing dals in the spring repertoire.
