steps:
- 'Soak the mung beans overnight in plenty of water, or use a quick-soak: cover with boiling water and
  soak for 1 hour. Drain and rinse.'
- Heat the ghee in a large pot over medium heat. Add the dried chilies, grated ginger, spice mix, and
  the mustard and cumin seeds. Stir and cook until the mustard seeds begin to pop, keeping a lid close
  by to contain any jumping seeds.
- Add the drained mung beans and stir until they are evenly coated with the ghee and spices.
- Pour in the water, partially cover the pot, and boil for about 30 minutes until the beans are completely
  soft and beginning to break apart. Add hot water as needed if the dal dries out.
- Remove from heat and stir in the lemon juice and salt.
- Serve in wide bowls over basmati rice.
