steps:
- Peel the cucumber with a peeler, leaving a few strips of green skin for colour.
- Halve lengthwise, scrape out the seeds with a spoon, then grate the flesh on the
  large holes of a box grater.
- In a bowl, stir the grated cucumber, salt, pepper, and optional ground spice into
  the yogurt until fully combined.
- Transfer to a serving dish and top with fresh mint sprigs if you like.
- Serve immediately alongside grain and vegetable dishes, or carry in a sealed container
  for a picnic.
