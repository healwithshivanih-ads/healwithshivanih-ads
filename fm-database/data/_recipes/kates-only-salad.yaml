one_line: Shaved fennel and salad greens with goat cheese, cranberries, and nuts —
  a cooling, colour-rich summer salad.
headnote: Fennel's cooling sweetness and the astringent tang of dried cranberries
  team up to reduce summer irritability, while creamy chèvre rounds out this crowd-pleasing
  raw salad.
