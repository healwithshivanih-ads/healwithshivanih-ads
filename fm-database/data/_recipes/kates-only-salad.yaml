steps:
- Trim the woody tops from the fennel bulb and cut the bulb into thin slivers with
  a sharp knife.
- In a large salad bowl, combine the fennel slivers with the chopped lettuce or greens.
- Divide the greens between 2 wide bowls; drizzle 1 tbsp oil and 1 tbsp balsamic over
  each portion.
- Crumble 2 tbsp of chèvre over each salad (if the cheese is very soft, chill it briefly
  in the freezer first).
- Finish each bowl with a scatter of chopped almonds or sunflower seeds and dried
  cranberries.
