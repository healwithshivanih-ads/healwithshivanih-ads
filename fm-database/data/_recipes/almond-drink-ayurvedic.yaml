steps:
- Place almonds in water and leave them to soak overnight.
- The next morning, slip the skins off the soaked almonds.
- Combine the peeled almonds in a blender with one cup of water, the cardamom, freshly
  ground black pepper, and honey.
- Blend on high speed for about five minutes until smooth, then drink immediately.
