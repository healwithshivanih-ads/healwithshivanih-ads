one_line: Dry-rubbed Indian fish fillets seared hard in coconut oil for a golden crust
  and a tender, flaky centre.
headnote: A quick weeknight fish done in one pan with just haldi, pepper and lemon.
  The trick is patting the fillet properly dry so it sears instead of steaming.
