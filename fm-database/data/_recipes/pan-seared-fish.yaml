steps:
- Pat the fillets thoroughly dry with a kitchen towel — dry fish is what gives a good
  sear.
- Rub turmeric, salt, cracked pepper and a squeeze of lemon over both sides and rest
  for 15 minutes.
- Heat the coconut oil or ghee in a heavy pan on medium-high until shimmering.
- Place the fillets skin-side down and press gently; sear undisturbed for 3-4 minutes
  until the edges turn opaque.
- Flip once and cook the second side for 2-3 minutes until just cooked through.
- Finish with a squeeze of lemon and serve straight from the pan.
