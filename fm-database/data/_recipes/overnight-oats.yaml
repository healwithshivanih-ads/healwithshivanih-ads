steps:
- In a jar, combine the oats, milk or yogurt, chia seeds and cinnamon and stir well.
- Cover and refrigerate overnight (at least 6 hours) so the oats and chia soften and
  swell.
- In the morning, stir, loosen with a splash of milk if thick.
- Top with the berries and walnuts, and a touch of honey or chopped soaked dates if
  needed.
- Eat cold — no cooking required.
