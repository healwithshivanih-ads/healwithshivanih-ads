one_line: A light, warming savoury porridge made with kodo millet — India's most digestive
  ancient grain — spiced with ginger and curry leaves.
headnote: Kodo millet is prized in Ayurveda for its low glycaemic load and its affinity
  for deepening agni without taxing digestion. Dry-roasting the millet before cooking
  gives it a nutty flavour and keeps it fluffy rather than sticky.
