steps:
- Rinse the kodo millet well and dry-roast it in a heavy pan over medium heat for
  2–3 minutes, stirring constantly, until it smells nutty and the grains feel dry.
  Set aside.
- Heat ghee in the same pan over medium heat. Add mustard seeds and let them pop (15–20
  seconds), then add cumin seeds, curry leaves, ginger, and chilli. Sauté for 30 seconds
  until fragrant.
- Add onion and cook 2–3 minutes until softened and lightly golden. Add diced vegetables
  and turmeric; stir-fry 2 minutes.
- Add 2.5 cups water and salt. Bring to a boil, then add the roasted millet in a steady
  stream, stirring to prevent clumping.
- Reduce heat to low, cover, and cook 12–15 minutes until the millet has absorbed
  all the water and is fluffy. Turn off heat and rest (covered) for 5 minutes.
- Fluff with a fork, squeeze lemon juice over, and garnish with fresh coriander. Serve
  warm.
