one_line: A saucy sprouted moong curry topped with fresh curd, served as a nourishing
  breakfast or light lunch.
headnote: Sprouting moong doubles its folate and makes the protein easier to digest.
  A spoonful of curd stirred in at the end brings a gentle fermented tang and rounds
  out the B12 picture when paired with dairy. Keep the gravy loose and the spice mild
  so the sprouts stay the star.
