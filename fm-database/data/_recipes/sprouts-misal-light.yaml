steps:
- Heat oil in a medium saucepan over medium heat. Add mustard seeds and let them pop,
  then add cumin seeds, curry leaves, green chilli, and the ginger-garlic. Sauté for
  1 minute until fragrant.
- Add the onion and cook for 5–6 minutes until soft and lightly golden. Stir in the
  tomatoes with turmeric, red chilli powder, coriander powder, and salt. Cook until
  the tomatoes break down and the oil begins to separate, about 5 minutes.
- Add the sprouted moong and 1 cup water. Stir well, bring to a boil, then reduce
  heat, cover, and simmer for 12–15 minutes until the sprouts are just tender but
  still hold their shape.
- Uncover, stir in garam masala and lemon juice, and simmer uncovered for 2 minutes
  to thicken the gravy slightly. Taste and adjust salt.
- Remove from heat. Ladle into bowls, drizzle a tablespoon of whisked curd over each
  serving, and finish with fresh coriander. Serve warm.
servings: '4'
