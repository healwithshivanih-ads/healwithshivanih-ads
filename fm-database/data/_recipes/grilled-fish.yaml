steps:
- Pat the fish steaks dry and make two shallow slits on each side.
- Mix turmeric, chilli powder, ginger-garlic paste, salt and the juice of half the
  lemon into a paste and rub it all over the fish. Rest for 20 minutes.
- Brush a grill pan or tawa with the oil and heat on medium-high.
- Lay the fish down and grill for 4-5 minutes until the underside is golden and lifts
  cleanly.
- Flip once and grill the other side for another 4-5 minutes until cooked through
  and flaky.
- Squeeze the remaining lemon over the top and serve hot.
