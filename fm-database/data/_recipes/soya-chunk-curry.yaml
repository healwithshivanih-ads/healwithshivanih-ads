steps:
- Boil the soya chunks in salted water for 4-5 minutes until soft, drain, and squeeze
  out the water thoroughly. Set aside.
- Heat oil in a kadai over medium heat. Add cumin seeds and let them splutter, then
  add the chopped onion and sauté until golden.
- Stir in the ginger-garlic paste and cook 1 minute until the raw smell goes.
- Add the tomato puree along with turmeric, chilli powder, and coriander powder. Cook
  6-8 minutes until the oil separates from the masala.
- Add the squeezed soya chunks and salt, stir to coat, then pour in 1 cup water. Simmer
  covered for 8-10 minutes so the chunks absorb the gravy.
- Sprinkle garam masala, stir, and garnish with fresh coriander. Serve hot with roti
  or rice.
