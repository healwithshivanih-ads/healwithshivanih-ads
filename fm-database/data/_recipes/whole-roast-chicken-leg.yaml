steps:
- Pat the chicken legs dry and make deep slits through the thickest part so the marinade
  reaches the bone.
- Mix turmeric, chilli powder, cracked pepper, ginger-garlic paste, salt, the juice
  of half the lemon and the ghee into a paste and rub it all over and into the slits.
- Let the legs marinate for at least 30 minutes.
- Heat the oven to 200C, place the legs on a lined tray, and roast for 30 minutes.
- Turn the legs, baste with the pan juices, and roast for another 15-20 minutes until
  deeply golden and the juices at the bone run clear.
- Rest for 5 minutes, squeeze over the remaining lemon and serve.
