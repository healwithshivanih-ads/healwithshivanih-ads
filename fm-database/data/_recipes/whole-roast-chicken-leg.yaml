one_line: Bone-in chicken legs marinated in haldi, ginger-garlic and pepper, then
  slow-roasted till golden and falling off the bone.
headnote: Slitting the legs to the bone lets the marinade go all the way in, and roasting
  on the bone keeps the meat moist. A hands-off dish once it goes in the oven.
