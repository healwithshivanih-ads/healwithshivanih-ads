one_line: A light, dry South-Indian style ash gourd sabzi tempered with mustard, cumin
  and curry leaves.
headnote: Cooking ash gourd gently with a simple tempering keeps it easy to digest
  and lets the vegetable's own flavour come through — no heavy gravy, no tomato.
