steps:
- Mix the whole-wheat flour, half a teaspoon of salt, and warm water into a soft,
  smooth dough. Cover and rest for 15 minutes. Divide into 4 equal balls and roll
  each into a thin round about 22 cm across.
- In a bowl, beat one egg with a pinch each of the chopped onion, green chilli, coriander,
  red chilli powder, and salt for each paratha — repeat per roll, keeping the egg
  mix per portion separate.
- Heat a tawa over medium-high heat. Place a paratha on it and cook for about 1 minute
  until small bubbles appear. Flip it, drizzle half a teaspoon of oil or ghee around
  the edges, and immediately pour one egg mixture over the uncooked surface, spreading
  it quickly to cover the paratha.
- Press gently with a spatula and cook for 1–2 minutes until the egg is set and the
  underside is golden. Flip once more for 30 seconds to finish the egg side. Remove
  from the tawa.
- Spread a tablespoon of green chutney down the centre, add a few slices of raw onion,
  a squeeze of lemon juice, and a pinch of chaat masala. Roll tightly and serve immediately,
  or wrap in foil for an on-the-go breakfast.
