one_line: A crisp whole-wheat paratha cooked with a spiced egg layer, rolled up with
  chutney and onion for a quick, protein-rich breakfast.
headnote: Eggs cooked directly onto the paratha — rather than as a separate scramble
  — give a thinner layer that cooks through quickly and keeps the yolk nutrients intact.
  The whole-wheat dough adds B vitamins and sustaining fibre to anchor the meal.
