steps:
- Preheat oven to 300°F (150°C).
- Finely grate the outside of the lemon to make zest — you need about 1 tsp.
- Grind the fennel seeds as fine as possible in a mortar and pestle or spice grinder,
  if using.
- Mix the lemon zest, ground fennel seeds, salt, and ginger powder together in a bowl.
- Spread the mixture in an even layer (no clumps) on a baking sheet and bake for about
  15 minutes to dry out the lemon zest.
- If the zest pieces are too large for a shaker top, grind again briefly.
- Cool completely, then transfer to a shaker jar.
