steps:
- Toss the chickpeas with cumin, paprika and a little olive oil and roast at 180°C
  for about 5 minutes.
- Toss the sweet potato with a little oil, add to the tray and roast about 10 minutes
  more; add the sliced onion for the last 2 minutes.
- Whisk the tahini, lemon, maple syrup, olive oil and warm water into a smooth, pourable
  dressing, loosening with a little more water if needed.
- Pile the roasted vegetables over the spinach and drizzle with the tahini dressing.
  Serve warm, with extra dressing on the side.
