steps:
- Rinse the lettuce and crisp it in a bowl of iced water.
- Toss the nuts with the maple syrup, sugar and a pinch of salt until coated, then
  roast at 180°C for about 3 minutes and set aside to cool.
- Trim and quarter the figs.
- Divide the figs, crumbled cheese, lettuce and candied nuts among four plates.
- Whisk the olive oil and vinegar together, drizzle over each plate and serve.
