steps:
- Heat ghee in a pot, add curry leaves, crushed garlic and julienned ginger, and saute
  for a minute until aromatic.
- Add the chopped onion and cook until translucent.
- Add the chicken pieces, turmeric, crushed pepper and salt, and toss for 2-3 minutes
  to coat.
- Pour in 4 cups of water, bring to a boil, then lower the heat and simmer covered
  for 30-35 minutes until the chicken is tender and the broth is golden.
- Lift out the chicken, shred the meat off the bone and return it to the pot; discard
  the bones.
- Finish with chopped coriander and a squeeze of lemon and serve piping hot.
