one_line: A sharp balsamic and mustard dressing with honey and tamari — warming, penetrating,
  and perfectly tuned to stoke spring digestion.
headnote: Balsamic vinegar and mustard both carry warming, sharp qualities that make
  this vinaigrette not just a flavour boost but a genuine digestive aid when drizzled
  over spring salads and steamed vegetables.
