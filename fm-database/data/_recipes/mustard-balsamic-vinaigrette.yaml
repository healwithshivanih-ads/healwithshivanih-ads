ingredients:
- item: sunflower or grapeseed oil
  qty: '2'
  unit: tbsp
- item: high-quality balsamic vinegar
  qty: '0.25'
  unit: cup
- item: Dijon mustard
  qty: '1'
  unit: tsp
- item: raw honey dissolved in warm water
  qty: '1'
  unit: tbsp each
- item: tamari
  qty: '1'
  unit: tsp
steps:
- Combine all ingredients in a small 8-ounce jar.
- Seal the jar and shake vigorously until the dressing is emulsified. Alternatively,
  blend a double batch for 30 seconds in a blender.
- Store in the jar in the refrigerator and shake well before each use.
- Drizzle over seasonal vegetables or a steamed salad bowl.
