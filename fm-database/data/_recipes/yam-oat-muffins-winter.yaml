one_line: Warming sweet potato and oat muffins spiced with ginger and cinnamon — a
  grounding winter breakfast.
headnote: These gluten-free muffins pair the mineral richness of sweet potato with
  the steadying energy of oats; finishing each one with a smear of ghee rounds out
  the fat content essential in cold weather.
