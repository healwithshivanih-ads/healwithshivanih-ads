steps:
- Preheat oven to 400°F (200°C). Line a 6-cup muffin tin with paper liners or grease
  with coconut oil.
- Whisk the egg in a small bowl until fluffy, then stir in the milk, mashed sweet
  potato, and maple syrup or molasses.
- Grind half a cup of oats in a dry blender or food processor until they become flour,
  about 30–60 seconds.
- In a large bowl, combine the ground oats with the rolled oats, baking soda, baking
  powder, cinnamon, ginger powder, nutmeg, and salt.
- Pour the wet ingredients into the dry ingredients and stir just until incorporated
  — do not overmix.
- Gently fold in any optional mix-ins (pecans and/or dates), then divide the batter
  evenly among the 6 muffin cups.
- Bake for 30 minutes, or until the tops are golden and a toothpick inserted in the
  centre comes out clean.
- Serve each muffin spread with 1–2 tsp of ghee, coconut oil, or nut butter.
