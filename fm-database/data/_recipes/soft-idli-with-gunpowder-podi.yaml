steps:
- Soak idli rice and urad dal with fenugreek seeds separately in water for 6–8 hours.
  Grind the urad dal first to a smooth, airy batter, then grind the rice to a slightly
  coarser batter. Mix together, add salt, and ferment in a warm place for 8–10 hours
  until the batter is well-risen and bubbly.
- 'To make the podi: dry-roast chana dal and urad dal in a pan over low heat for 3–4
  minutes until golden. Add dry red chillies, curry leaves, and sesame seeds; roast
  for another 2 minutes. Cool completely, then blitz to a coarse powder with asafoetida
  and salt. Store in an airtight jar.'
- When ready to make idlis, grease idli moulds lightly and fill each cavity about
  three-quarters full with fermented batter.
- Steam in a covered idli steamer or pressure cooker (without the weight) over high
  heat for 10–12 minutes. A toothpick inserted in the centre should come out clean.
  Let them rest for 2 minutes before unmoulding.
- Serve 3–4 warm idlis per portion with a generous pinch of podi alongside a small
  bowl of plain curd.
servings: '4'
