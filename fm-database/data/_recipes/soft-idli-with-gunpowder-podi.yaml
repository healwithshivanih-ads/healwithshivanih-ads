one_line: Fluffy steamed idlis paired with a sesame-lentil podi and a side of curd
  for a complete fermented breakfast.
headnote: The overnight fermentation of rice and urad dal develops natural probiotics
  and makes the batter light and easy to digest. The gunpowder podi brings roasted
  sesame and lentils — good everyday protein and a nutty, savoury bite. Eating both
  with a small bowl of curd closes the B12 loop naturally.
