steps:
- Rinse the sama well.
- Combine sama with water (or thin milk), a pinch of salt, and chopped dates in a pot.
- Cook covered on low 15-20 minutes, stirring occasionally, until soft and creamy. Add more liquid if
  needed.
- Stir in ghee and cardamom. Serve warm.
