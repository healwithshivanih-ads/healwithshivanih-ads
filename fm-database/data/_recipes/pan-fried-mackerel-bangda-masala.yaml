steps:
- Grind dried red chillies, garlic, coriander seeds, cumin, peppercorns, turmeric,
  vinegar and salt into a thick smooth masala paste, adding 1 tbsp water if needed.
- Score each mackerel three times diagonally on both sides down to the bone; rub the
  masala paste all over and into the scores. Marinate for 15 minutes at room temperature.
- Heat oil in a flat, heavy tawa or cast-iron pan over medium-high heat.
- Lay the fish in a single layer and fry undisturbed for 4–5 minutes until the underside
  is deeply crusted and releases easily from the pan.
- Flip carefully and fry the other side for another 4 minutes until the skin is crisp
  and the flesh is cooked through — it should flake near the backbone.
- Serve immediately with lime wedges and thinly sliced onion rings.
servings: 2–3
prep_time_min: 20
cook_time_min: 15
one_line: Whole mackerel scored and fried in a fiery red masala crust — a Konkani
  coastal classic.
headnote: Mackerel is one of the fattiest small fish available in Indian markets,
  making it one of the richest everyday sources of EPA and DHA. Scoring the flesh
  lets the masala penetrate and ensures the skin crisps evenly without long cooking
  that would otherwise degrade the delicate fats.
