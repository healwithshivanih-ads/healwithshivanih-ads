one_line: Gujarati steamed fermented rice-and-dal cakes layered with grated vegetables.
headnote: Idada is a lighter cousin of dhokla — a thick, soft slab steamed in a thali
  and then cut into squares. Folding grated bottle gourd and carrot into the fermented
  batter keeps it moist, adds a gentle sweetness, and makes each piece quietly more
  filling than it looks.
