steps:
- Grind the soaked rice and urad dal together with the curd and just enough water
  (about 1/4 cup) to form a thick, smooth batter. Cover and leave to ferment at room
  temperature for 8–10 hours or overnight.
- When ready to steam, stir the grated bottle gourd, carrot, ginger, green chilli,
  turmeric and salt into the fermented batter. The batter should be thick but pourable.
- Sprinkle in the fruit salt and fold gently — the batter will aerate and rise slightly.
  Do not over-mix.
- Grease a flat 8-inch steel thali or round pan with oil. Pour the batter in and spread
  evenly about 1.5 cm thick. Scatter sesame seeds and coriander on top.
- Steam in a covered steamer or large pot over boiling water for 18–20 minutes until
  a skewer inserted in the centre comes out clean.
- Allow to cool for 5 minutes, then cut into squares and serve with green chutney.
