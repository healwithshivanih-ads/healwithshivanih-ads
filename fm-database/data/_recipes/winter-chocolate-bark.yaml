steps:
- Line a baking sheet with parchment or wax paper.
- Whisk the melted coconut oil, maple syrup, cacao powder, and optional spice or peppermint
  oil together in a bowl until smooth. Work quickly in a cool kitchen or keep the
  bowl nested in a larger bowl of warm water to prevent premature hardening.
- Pour the chocolate mixture onto the lined baking sheet and spread with a spatula
  to a roughly 1/4-inch thick layer.
- Scatter your chosen decorations evenly across the top.
- Refrigerate until solid, about 20 minutes, then break into irregular pieces by hand.
  Store refrigerated.
