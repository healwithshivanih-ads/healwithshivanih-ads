slug: chicken-stew-kerala-style
name: Chicken Stew (Kerala-Style)
one_line: Gentle coconut-milk chicken stew with ginger and curry leaf.
meal_type:
- lunch
- dinner
diet:
- non_vegetarian
- gluten_free
- dairy_free
region: Indian
main_ingredients:
- 150 g chicken
- 1/2 cup coconut milk
- 1 small onion
- 1 inch ginger
- 8 curry leaves
- 2-3 black peppercorns
- 1 small carrot + few beans (optional)
- 1 tsp coconut oil
- salt
contains_allergens: []
ingredients:
- item: 150 g chicken
- item: 1/2 cup coconut milk
- item: 1 small onion, sliced
- item: 1 inch ginger, julienned
- item: 8 curry leaves
- item: 2-3 black peppercorns, crushed
- item: 1 small carrot + few beans (optional)
- item: 1 tsp coconut oil
- item: salt
steps:
- Heat coconut oil; soften onion, ginger and curry leaves without colour.
- Add chicken + crushed pepper, toss 3-4 min.
- Add 1/2 cup water + vegetables, cover, simmer 12-15 min.
- Add coconut milk, warm through gently (do not boil).
- Season with salt; serve with a millet roti.
- 'Tip: Gentle, warming and very gut-friendly — keep the simmer low after the coconut milk goes in.'
