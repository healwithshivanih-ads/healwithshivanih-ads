main_ingredients:
- 2 beetroots (~250 g), grated
- 1 onion, chopped
- 4 tomatoes, quartered
- 4 cloves garlic, peeled & chopped
- salt, to taste
- freshly ground pepper, to taste
- 400 ml vegetable stock
- 3 tbsp olive oil
- 8-10 croutons, optional (omit for gluten-free)
- 1 sprig spring onion, to garnish
- 2 tbsp cream (use soy cream for vegan), optional
