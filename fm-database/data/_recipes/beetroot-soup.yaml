steps:
- Roast the quartered tomatoes and garlic with 1 tbsp olive oil at 200°C for about
  20 minutes.
- Soften the onion in the remaining oil in a deep pot for 4-5 minutes.
- Peel and mash the cooled roasted tomatoes.
- Add the grated beetroot, stock and seasoning to the onion, cover and cook about
  10 minutes, stirring occasionally; stir in the mashed tomato and cook a minute more.
- Blend smooth. Serve topped with a little cream, croutons and spring onion greens.
