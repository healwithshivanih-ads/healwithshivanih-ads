one_line: Dry-roasted whole chickpeas tossed with tangy spices for a crunchy, protein-rich
  snack.
headnote: Whole dried chickpeas roasted in a dry pan concentrate their nutty flavour
  and keep their crunch for days — the fibre in the skin slows digestion nicely, and
  amchur adds a brightness that makes them hard to put down. A handful goes a long
  way on a hungry monsoon afternoon.
