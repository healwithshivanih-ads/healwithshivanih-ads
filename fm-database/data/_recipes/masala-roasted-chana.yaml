steps:
- After boiling, spread the chickpeas on a clean kitchen cloth and pat completely
  dry — any surface moisture will steam them in the pan instead of roasting them.
- Heat a heavy iron or non-stick pan on medium heat with no oil. Add the dried chickpeas
  in a single layer and dry-roast, stirring every 2–3 minutes, for 12–15 minutes until
  the skins are visibly crisped and the chickpeas sound hollow when you press one
  against the pan.
- Reduce the heat to low, drizzle in the teaspoon of oil, and toss so every chickpea
  gets a light coat.
- Add all the spices — cumin, coriander, chilli, amchur, chaat masala, black salt,
  and regular salt — and toss quickly for 1 minute so the spices bloom without burning.
- Spread on a plate to cool completely before storing or serving; they crisp up further
  as they cool. Store in an airtight jar for up to a week.
