one_line: Charred corn kernels tossed with lemon, chilli, and chaat masala — a monsoon
  street classic brought home.
headnote: Corn on the cob over open flame is the definitive monsoon smell in every
  Indian city. This bowl version strips the kernels after charring so the smoky, caramelised
  flavour is in every bite. A squeeze of lemon and a pinch of chaat masala is all
  it needs — simple food that tastes exactly like the season.
