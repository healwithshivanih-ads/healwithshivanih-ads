steps:
- Roast the corn cobs directly over a gas flame on medium-high heat, turning with
  tongs every minute, until kernels are charred in spots and cooked through — about
  8–10 minutes. Alternatively, roast under a hot grill for 12 minutes, turning halfway.
- Let the cobs cool for 5 minutes, then stand each upright on a cutting board and
  slice the kernels off with a sharp knife.
- Tip the kernels into a bowl. Add the oil, green chilli, ginger, red chilli powder,
  black salt, and regular salt. Toss well.
- Add lemon juice and chaat masala, toss again, then taste and adjust salt or lemon.
  Top with coriander leaves and serve immediately while still warm.
