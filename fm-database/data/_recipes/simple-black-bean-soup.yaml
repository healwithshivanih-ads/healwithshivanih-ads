steps:
- Combine the beans, broth or bean cooking water, chopped carrots, Swiss chard, and
  turmeric in a large saucepan. Bring to a boil, then cover and simmer on low heat
  for 15–20 minutes until the vegetables are tender.
- While the soup simmers, warm ghee in a small frying pan over medium heat. Add cumin
  seeds and sauté until fragrant, 2–3 minutes; remove from heat immediately.
- Add the seasoned ghee and coriander powder to the soup and simmer 5 minutes more.
  Remove from heat and stir in salt.
- Use an immersion blender to blend about half the soup to a creamy consistency while
  keeping the rest chunky.
- Serve garnished with avocado slices, diced tomato, yogurt, or chopped cilantro as
  desired.
