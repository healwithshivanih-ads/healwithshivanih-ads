one_line: A dry, roasted flaxseed chutney powder to sprinkle over rice, idli, or roti
  — a simple everyday source of plant omega-3.
headnote: Two tablespoons of roasted flaxseed provide a meaningful amount of ALA,
  the plant-based omega-3 fatty acid. Roasting and coarsely grinding the seeds helps
  break the hard shell so the body can actually access the oil inside. This podi keeps
  well for weeks and makes it easy to add flax to any meal without changing its character
  much.
