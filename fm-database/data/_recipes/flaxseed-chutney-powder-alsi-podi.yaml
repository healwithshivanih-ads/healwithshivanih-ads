steps:
- Dry-roast chana dal in a heavy pan over low-medium heat for 3–4 minutes until it
  turns golden. Remove and set aside. In the same pan, roast dry red chillies and
  garlic cloves for 1–2 minutes. Remove.
- Add flaxseeds to the pan and roast on low heat, stirring constantly, for 3–4 minutes.
  The seeds will begin to pop — this is normal. Remove as soon as they smell nutty
  and fragrant; do not over-roast or the oil turns bitter.
- Add sesame seeds and cumin seeds to the pan for 1 minute until lightly toasted.
  Remove and let everything cool completely on a plate.
- Once fully cool, combine all roasted ingredients with asafoetida, salt, and jaggery
  powder in a dry mixer jar. Pulse to a coarse, slightly textured powder — avoid grinding
  too fine, as flaxseed oil releases and the powder can clump.
- Store in an airtight glass jar at room temperature for up to 3 weeks, or refrigerate
  for up to 6 weeks. Use 1–2 tablespoons mixed into warm rice with a little oil or
  ghee, or alongside idli and roti.
