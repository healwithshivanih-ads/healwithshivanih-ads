slug: liver-detox-assessment
display_name: Liver Detox — Reading the Intake (Phase I / II / III)
description: 'How to read a client''s intake questionnaire for biotransformation
  (liver detox) burden and judge which route looks most affected — Phase I
  (bioactivation), Phase II (conjugation), or Phase III (elimination). A
  coach-facing ASSESSMENT companion to the liver-detoxification map: it surfaces
  patterns to explore, never a diagnosis or a confirmed stage. Confirming a phase
  needs functional labs (clinician). Honours VitaOne''s rule: no aggressive
  detoxes — support the basics.

  '
aliases:
- biotransformation-assessment
- detox-phase-assessment
- reading-the-intake-for-detox
