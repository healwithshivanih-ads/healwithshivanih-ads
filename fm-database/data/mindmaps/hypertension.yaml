slug: hypertension
display_name: Hypertension (FM Approach)
description: IFM perspective on blood pressure — assessment equipment, exam techniques,
  classification, risk factors, organ damage signs, JNC 8 algorithm, nutrition + lifestyle
  interventions, natural antihypertensives, orthostatic hypotension. Imported from
  Vitaone Education Tools.
