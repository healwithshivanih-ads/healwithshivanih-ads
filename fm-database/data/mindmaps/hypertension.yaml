- label: Exam Techniques and Methods
  children:
  - label: Bilateral Arm Pressures
    children:
    - label: 'New Patient: Both Arms AND Both Legs'
    - label: Left Arm First, Then Right Arm
    - label: Systolic Discrepancy ≤ 5 mmHg = Normal
    - label: '> 5 mmHg = Abnormal'
    - label: Cuff 2.5 cm Above Antecubital Space
    - label: Bladder Over Brachial Artery, Snug Fit
  - label: Arm Pressure Technique
    children:
    - label: Palpate Brachial Pulse, Inflate Until Pulse Lost
    - label: Bell Over Brachial Artery
    - label: Inflate 30 mmHg Above Pulse-Loss Point
    - label: Deflate at 2-3 mmHg/sec
    - label: Korotkoff Sound 1 = Systolic BP
  - label: Office Elevations
    children:
    - label: Home Monitoring or 24-Hr Ambulatory BP
    - label: Rule Out White Coat HTN
    - label: Korotkoff Sound 5 = Diastolic BP
    - label: Repeat Other Arm, Use Higher Reading
  - label: Leg Pressures
    children:
    - label: 'Popliteal: Thigh Cuff Above Popliteal Fossa'
    - label: 'Ankle: Lower Leg Cuff, Dorsalis Pedis or Post Tibial'
    - label: 'Formula: Ankle Pressure / Brachial Pressure'
