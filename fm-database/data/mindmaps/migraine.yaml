slug: migraine
display_name: Migraine & Recurrent Headaches
description: 'Functional medicine approach to migraine and recurrent headaches. Maps
  triggers and root drivers — mitochondrial dysfunction, magnesium deficiency, blood
  sugar instability, estrogen withdrawal, histamine excess, food triggers, gut–brain
  axis disruption, dehydration, and sleep/cervical contributors — back to a structured
  trigger map + targeted nutrient repletion + lifestyle scaffolding. India context:
  late dinners, dehydration in hot climate, common food triggers (aged cheese, MSG-heavy
  street food, chocolate, red wine, leftovers high in histamine), perimenopausal hormonal
  swings.

  '
