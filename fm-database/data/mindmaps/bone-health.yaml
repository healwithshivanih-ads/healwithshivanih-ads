slug: bone-health
display_name: Bone Health & Osteoporosis
description: 'Functional medicine approach to bone fragility, low bone mineral density,
  and osteoporosis. Bones are silent until they fracture — FM approach is preventive
  and uses hormone optimisation, weight-bearing exercise, and gut absorption support
  alongside the usual nutrient cofactors. India context: vegetarian diet often low
  in calcium, B12, and vitamin D; women 35+ and post-menopause especially vulnerable.

  '
