slug: autoimmune
display_name: Autoimmune Cascade
description: 'Functional medicine root-cause framework for autoimmunity (parent map).
  Identifies the triad of triggers — genetic susceptibility + intestinal permeability
  + environmental trigger — and the downstream cascade of molecular mimicry, immune
  dysregulation, and chronic inflammation. Specific conditions (Hashimoto''s, RA,
  lupus, MS, T1D, IBD) live in their own focused maps; this map is the conceptual
  spine.

  '
