slug: cardiovascular-lipid
display_name: Cardiovascular Risk (Lipid-focused)
description: 'Functional medicine approach to cardiovascular risk through a lipid-quality
  lens — beyond standard cholesterol panels. Focuses on ApoB / particle number, LDL
  particle size, oxidised LDL, hsCRP, insulin resistance, and endothelial function.
  India context: South Asians have small-dense LDL pattern, high triglycerides, low
  HDL, and elevated CV risk at younger ages and lower BMIs than Western reference
  populations — ApoB and TG/HDL ratio are far more meaningful than total cholesterol.

  '
