slug: mitochondrial-energy
display_name: Mitochondrial Function & Energy
description: 'Functional medicine approach to mitochondrial dysfunction and persistent
  fatigue that doesn''t resolve with sleep alone. Maps the upstream causes (toxic
  load, infection, nutrient depletion, chronic HPA stress) and the downstream collapse
  in ATP production, oxidative damage, and energy crashes. Niche but recurring driver
  in Hashimoto''s, perimenopause, post-viral / long COVID, and unexplained chronic
  fatigue.

  '
