slug: alopecia
display_name: Alopecia (Hair Loss)
description: 'Functional medicine approach to hair loss across phenotypes — androgenic
  alopecia (female- and male-pattern), telogen effluvium (diffuse shedding 3–4 months
  post-stressor), alopecia areata (autoimmune patchy loss), traction alopecia, and
  postpartum hair loss. Maps the dominant root drivers in Indian women: iron / ferritin
  deficiency (very common, often missed when Hb is normal), thyroid dysfunction,
  protein malnutrition on vegetarian diets, zinc and vitamin D deficiency, HPA-axis
  driven telogen shifts, and hyperandrogenism (PCOS, 5-alpha-reductase activity).
  India context: postpartum confinement diet (often iron- and protein-poor), chronic
  ferritin depletion in menstruating women, amla / bhringraj / methi / curry-leaf
  traditions, abhyanga scalp massage.

  '
