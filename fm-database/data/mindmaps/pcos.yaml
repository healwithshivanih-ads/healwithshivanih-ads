slug: pcos
display_name: PCOS (Polycystic Ovary Syndrome)
description: 'Functional medicine approach to Polycystic Ovary Syndrome — root-cause
  framework focused on insulin resistance, androgen excess, and chronic anovulation.
  Covers clinical presentation, root mechanisms, FM coaching strategy, interventions
  (food, lifestyle, supplements), goals, and labs. India context: very high prevalence,
  often missed in lean phenotypes; strong family history clustering with type 2 diabetes
  and metabolic disease.

  '
