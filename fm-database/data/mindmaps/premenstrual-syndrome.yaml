  location: Premenstrual Syndrome (pp 830-842)
  quote: PMS affects 30-40% of menstruating women. Therapeutic interventions span
    estrogen metabolism support, neurotransmitter precursors, HPA axis support,
    thyroid screening, and vegetarian-leaning diet.
