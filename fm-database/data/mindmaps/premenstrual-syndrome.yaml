  location: Affective Disorders — PMS cross-reference (pp 8-28)
  quote: PMS-C subtype features food cravings, headache, fatigue. Reactive
    hypoglycemia confirmed on GTT in luteal phase. Hypoglycemia and PMS share
    overlapping mechanisms.
