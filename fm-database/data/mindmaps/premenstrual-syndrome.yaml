slug: premenstrual-syndrome
display_name: Premenstrual Syndrome & PMDD (Functional Medicine)
description: 'Functional medicine approach to PMS and PMDD — cyclic luteal-phase
  symptoms (mood, breast tenderness, bloating, headaches, cravings) mapped to root
  drivers — estrogen excess + impaired clearance (cholestasis, gut estrobolome,
  liver phase II), low-serotonin and GABA states, B6 / magnesium / zinc / vitamin
  E cofactor depletion, hypothyroidism (commonly underlying), HPA dysregulation,
  and dietary acid load. Vitex agnus-castus is the lead botanical; B6 50-100 mg
  divided doses + Mg + Zn + E is the core nutrient stack. Dietary playbook —
  vegetarian / mostly-vegetarian, low fat, low sugar, low caffeine, low salt,
  high fibre, soy isoflavones (in equol producers).

  '
