slug: anxiety-panic
display_name: Anxiety & Panic Disorder
description: 'Functional medicine approach to generalized anxiety, panic attacks, social
  anxiety, and phobic anxiety. Maps the GABA–glutamate imbalance, HPA-axis cortisol
  dysregulation, blood-sugar hypoglycaemia driving adrenaline surges, gut–brain serotonin
  deficit, B6/magnesium/zinc deficiencies, methylation issues (MTHFR/COMT), and perimenopausal
  hormone-driven anxiety. Distinct from the broader emotional-wellbeing mindmap — focused
  specifically on anxiety + panic mechanisms and interventions. Includes India context:
  high-pressure family/career culture, late-night work, chai/caffeine load, joint-family
  stress, perimenopausal women juggling care-giving + career.

  '
