slug: ayurvedic-food-guide-by-dosha
display_name: Ayurvedic Food Guide by Dosha (Vata / Pitta / Kapha)
description: 'The Ayurvedic Institute / Lad dosha food chart as a navigable reference: for each dosha, the foods to favour
  and avoid across 15 categories (fruits, vegetables, grains, legumes, dairy, animal foods, condiments, nuts, seeds, oils,
  beverages, herbal teas, spices, sweeteners, supplements). * = moderation, ** = rarely. General guide — individualise by
  agni, season and degree of aggravation.'
