slug: long-covid
display_name: Long COVID / Post-Viral Syndrome
description: 'Functional medicine approach to Long COVID (Post-Acute Sequelae of SARS-CoV-2,
  PASC) — persistent multi-system symptoms lasting 12+ weeks after acute SARS-CoV-2
  infection that are not explained by another diagnosis. Heavy overlap with ME/CFS
  (myalgic encephalomyelitis / chronic fatigue syndrome) and POTS (postural orthostatic
  tachycardia syndrome) — post-exertional malaise (PEM) is the cardinal feature that
  separates this from ordinary fatigue and must be respected.

  India context: coach regularly sees chronic post-Delta-wave fatigue, breathlessness,
  hair loss at 3-4 months, and post-viral IBS in clients 1-3 years out from infection.
  Ayurvedic adjuncts (tulsi, giloy, ashwagandha) and gentle abhyanga commonly stacked
  with FM repletion. Heightened vigilance needed against well-meaning advice to
  "push through" or do graded exercise — this reliably worsens PEM-positive cases.

  Coaching scope: education, pacing support, nutrient repletion guidance, lifestyle
  rebuilding. Refer for MCAS / POTS / microclot workup, LDN, and any chest pain or
  neurological deficits. Evidence base is still emerging — many interventions are
  fm_specific_thin and should be framed as such.

  '
