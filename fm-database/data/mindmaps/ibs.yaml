slug: ibs
display_name: IBS (Irritable Bowel Syndrome)
description: 'Functional medicine mindmap for Irritable Bowel Syndrome — covers
  the three subtypes (IBS-C constipation-dominant, IBS-D diarrhoea-dominant, IBS-M
  mixed), root mechanisms (SIBO, dysbiosis, gut-brain axis dysregulation, visceral
  hypersensitivity, post-infectious IBS), 5R-style FM workup, interventions
  (low-FODMAP staging, targeted probiotics, peppermint oil, herbal antimicrobials,
  vagal tone work), coaching goals, and labs to track.

  India context: jeera water, ajwain, hing (asafoetida), buttermilk with mint,
  kanji, and methi seeds are integrated alongside Western FM tools. IBS is the
  most common functional gut disorder seen in Indian urban practice and is
  almost always multifactorial — never treat as a single-cause condition.

  '
