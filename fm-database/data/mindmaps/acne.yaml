slug: acne
display_name: Acne (Functional Medicine)
description: 'Functional medicine approach to acne — adolescent comedonal acne and
  adult/hormonal acne mapped to root drivers: hyperandrogenism, insulin resistance,
  dairy + IGF-1, gut dysbiosis + leaky gut, oxidative stress, zinc / vitamin A
  insufficiency, and slow phase-1/2 hepatic clearance of hormones. Distribution
  patterns (jawline = hormonal, forehead = gut, cheeks = liver/lymph) used as
  coaching hypotheses, not diagnoses. India context: kasturi haldi, neem, multani
  mitti, sweat + sunscreen layering, late-dinner + insulin connection, post-pill
  rebound androgens.

  '
aliases:
- acne-vulgaris
- adult-acne
- hormonal-acne
- cystic-acne
