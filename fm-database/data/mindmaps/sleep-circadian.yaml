slug: sleep-circadian
display_name: Sleep & Circadian Rhythm
description: 'Functional medicine approach to sleep dysfunction and circadian rhythm
  disruption. Maps the HPA-axis cortisol–melatonin inversion, blood sugar dysregulation
  at night, light-exposure mismatches, gut–brain effects, and nutrient deficiencies
  driving common sleep complaints (insomnia, 3 am wakeups, unrefreshed sleep). Includes
  India context: late dinners, screen exposure, hot summer nights, family sleep timing.

  '
