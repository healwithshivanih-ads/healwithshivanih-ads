slug: sprout-mung-beans-increase-digestive-fire
display_name: Sprout Mung Beans (and Seeds/Nuts) to Increase Digestive Fire
aliases: []
category: food_prep
summary: Sprouting dried mung beans, seeds, or nuts by soaking then rinsing daily until tails appear dramatically
  increases nutritional value, deactivates antinutrients, and raises digestive fire (agni) according to
  Ayurveda. Sprouted mung is a staple of Ayurvedic spring cooking.
benefits:
- increases enzyme activity and vitamin content (especially vitamin C and B vitamins)
- breaks down phytates, lectins, and other antinutrients
- increases digestibility and reduces gas from legumes
- said to kindle agni (digestive fire)
swap_from:
- using unsprouted dried legumes or seeds in raw preparations
how_to_use: Rinse dried mung beans well. Soak in cool water for 8–12 hours. Drain, place in a jar covered
  with cheesecloth or mesh lid. Rinse with fresh water twice daily. Within 1–2 days, tails will appear.
  Use in salads, kichari, or lightly cooked dishes. Store in refrigerator once sprouted.
cautions:
- discard if any sliminess or off odour develops
- cook lightly for kapha constitutions — raw sprouts are heavy
- people with strong pitta may find large quantities heating
