slug: fresh-grind-spices-mortar-pestle
display_name: Fresh-Grind Spices in Mortar and Pestle
aliases: []
category: food_prep
summary: Freshly grinding spices immediately before use in a stone mortar and pestle preserves volatile
  aromatic oils and bioactive compounds that deteriorate rapidly after grinding. Traditional Ayurvedic
  cookery grinds spices for each meal to maximise therapeutic potency and flavour.
benefits:
- preserves volatile essential oils (responsible for both aroma and therapeutic action)
- maximises bioavailability of active compounds such as curcumin, piperine, and cineole
- delivers stronger flavour requiring less spice overall
- stone mortar does not retain scents, unlike wood
swap_from:
- using pre-ground commercial spices
- grinding spices in a wood mortar (retains scents)
how_to_use: Use a stone (not wood) mortar and pestle. Place whole spices in the mortar — start with the
  hardest (peppercorns, cumin). Grind in a circular pressing motion, not a pounding one. Grind just before
  adding to the dish. For larger batches, use a spice grinder (reserved coffee grinder).
cautions:
- small amounts only — pre-ground spice mix loses potency within a few months
- keep mortar clean to avoid cross-contamination of flavours
