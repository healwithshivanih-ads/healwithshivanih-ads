slug: avoid-aluminium-cookware-use-stainless-cast-iron
display_name: Avoid Aluminium Cookware — Use Stainless Steel or Cast Iron
aliases: []
category: cookware
summary: Aluminium cookware is porous, soft, and reactive to acidic and salty foods, potentially leaching
  aluminium compounds into food. Stainless steel (e.g. All-Clad) and seasoned cast iron are the recommended
  Ayurvedic and functional cookware alternatives. Teflon/non-stick coatings that break down are similarly
  problematic. Green ceramic non-stick is preferable to Teflon.
benefits:
- eliminates aluminium leaching into food
- stainless steel is non-reactive and durable
- cast iron adds trace iron to food and distributes heat evenly for slow cooking
- ceramic non-stick avoids PFAS compounds from Teflon breakdown
swap_from:
- aluminium pots and pans
- Teflon (PTFE) non-stick frying pans
how_to_use: Replace aluminium saucepans with high-grade stainless steel (4-quart covers most Ayurvedic
  recipes). Season cast iron well for a natural non-stick surface. Choose ceramic-coated non-stick frying
  pans for steam sautéing. Use steel or aluminium-free baking sheets.
cautions:
- do not use metal utensils on ceramic non-stick — scratching destroys the coating
- season cast iron regularly to maintain its non-stick properties
