category: cookware
summary: |
  Replace non-stick (Teflon / PFOA / PFAS-coated) cookware with seasoned
  cast iron, stainless steel, or pure clay. Cast iron has the additional
  benefit of leaching small but meaningful amounts of dietary iron into
  acidic foods (tomatoes, sambar, rasam) — relevant for women with
  iron-deficiency or perimenopausal cycle changes.
benefits:
  - eliminates non-stick PFAS / PFOA exposure (linked to endocrine disruption)
  - measurable iron transfer when cooking acidic foods
  - durable; lasts generations with proper seasoning
swap_from:
  - non-stick / Teflon-coated pans
  - PFAS-coated bakeware
how_to_use: |
  Season periodically with a thin layer of any cooking oil. Avoid soap
  on seasoned surface — wipe clean with hot water and dry immediately
  to prevent rust. For acidic dishes (tomato curries), expect more
  iron transfer; minimize for clients with iron overload (e.g.
  hemochromatosis).
cautions:
  - Avoid in clients with hemochromatosis or other iron-overload conditions.
  - Heavy — may not suit clients with grip-strength or wrist issues.
