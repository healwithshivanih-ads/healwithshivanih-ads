slug: glass-steel-food-storage
display_name: Store Pantry Staples in Glass or Stainless Steel
aliases: []
category: storage
summary: Transfer grains, legumes, nuts, seeds, flours, and dried spices from plastic packaging into glass
  jars or stainless steel containers. Plastics leach chemical compounds into food over time; glass and
  steel are inert and allow easy visual inventory.
benefits:
- eliminates ongoing low-level exposure to plasticiser compounds
- glass is inert — does not interact with acidic or oily foods
- extends shelf life by providing a better air seal
- encourages seasonal pantry rotation — contents are visible
swap_from:
- storing dry goods in their original plastic bags or containers
how_to_use: Buy wide-mouth mason jars or stainless steel canisters. Label with contents and purchase date.
  Refill regularly to keep stock fresh. For oils, prefer dark glass bottles.
cautions:
- ensure lids are airtight, especially for whole spices and flours
- avoid aluminium containers for acidic foods (tamarind, lemon)
