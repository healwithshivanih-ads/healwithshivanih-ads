slug: soak-almonds-overnight-digestibility
display_name: Soak Almonds Overnight to Improve Digestibility
aliases: []
category: food_prep
summary: Soaking whole raw almonds in cool water for 8 hours or overnight releases digestive enzyme inhibitors,
  makes the skin easy to slip off, and produces a sweeter, creamier nut that is significantly easier to
  digest and more nutritionally available.
benefits:
- releases phytase enzyme inhibitors improving mineral absorption
- softens the nut for easier chewing and digestion
- makes almond milk creamier and more digestible
- reduces tannic acid in the skin
swap_from:
- eating raw unsoaked almonds
- using unsoaked almonds in nut milks
how_to_use: Cover whole raw almonds with cool water and soak 8 hours or overnight. Drain, rinse, slip
  skins off if desired. Use immediately or refrigerate up to 2 days. For almond milk, blend 1 cup soaked
  almonds with 3–4 cups water and strain.
cautions:
- do not soak longer than 24 hours as fermentation begins
- refrigerate if soaking in a warm kitchen
