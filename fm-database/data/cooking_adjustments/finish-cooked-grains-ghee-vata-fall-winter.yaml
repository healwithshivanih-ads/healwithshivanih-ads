slug: finish-cooked-grains-ghee-vata-fall-winter
display_name: Finish Cooked Grains with Ghee or Coconut Oil (Vata/Fall-Winter)
aliases: []
category: food_prep
summary: For those with dry body types or during fall and winter, cooking grains with an extra half-part
  water and finishing each serving with ½ tsp of ghee or coconut oil per serving before eating. This compensates
  for the dry, rough qualities of grains and adds the unctuous, grounding quality needed in cold-dry seasons.
benefits:
- adds oleation (snehana) to balance dry and rough qualities in cold seasons
- ghee improves fat-soluble nutrient absorption from the grain meal
- makes grains more grounding and satisfying for vata types
- helps prevent constipation associated with dry-type digestion
swap_from:
- serving plain cooked grains without any fat addition in cold, dry conditions
how_to_use: When cooking rice, oats, millet, or other grains in fall or winter, add an extra ½ part water
  to the recipe. After cooking, fluff the grain with a fork and stir in ½ tsp ghee or coconut oil per
  serving before serving. Especially beneficial for vata constitutions.
cautions:
- kapha types should use this minimally — extra fat and moisture aggravates kapha
- choose ghee over coconut oil in winter (ghee is more warming)
