slug: make-ghee-at-home
display_name: Make Ghee at Home from Organic Butter
aliases: []
category: oil
summary: Clarify organic unsalted butter by simmering over low heat until milk solids turn golden and
  separate. Strain through cheesecloth. Stores unrefrigerated for up to 1 month. Higher smoke point than
  butter; lactose- and casein-free; acts as a carrier for medicinal spice qualities into body tissues.
benefits:
- removes milk solids — suitable for most dairy-sensitive individuals
- highest smoke point of all traditional cooking fats (250°C+)
- acts as a rasayana — carries medicinal compounds into deep tissues
- stable at room temperature for weeks — no refrigeration needed
- supports gut lining and reduces gut inflammation
swap_from:
- commercial ghee of unknown quality
- regular butter for high-heat cooking
how_to_use: Melt 500g unsalted organic butter in a heavy pan over the lowest heat. Do not stir. Simmer
  15-20 min until white foam settles, liquid clarifies to golden, and solids on the bottom turn light
  brown. Remove from heat, cool 5 min, strain through cheesecloth into a dry glass jar. Discard solids.
cautions:
- do not refrigerate unless in a very hot climate — moisture causes rancidity
- ensure the jar and spoon used to serve are always completely dry
- high in saturated fat — use in moderation if cardiovascular risk is a concern
