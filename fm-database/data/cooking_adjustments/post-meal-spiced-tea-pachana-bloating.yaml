slug: post-meal-spiced-tea-pachana-bloating
display_name: Post-Meal Spiced Tea for Gas and Bloating (Pachana)
aliases: []
category: food_prep
summary: After a heavy meal, brewing a single-spice digestive tea — ginger for bloating or congestion,
  fennel or mint for acid stomach, cinnamon for sugar cravings — to break down ama and reduce post-meal
  discomfort. This is the Ayurvedic pachana practice.
benefits:
- Reduces post-meal gas, bloating, and heavy stomach
- Stimulates digestive enzymes and bile production
- Carminative action reduces intestinal gas
- Addresses specific symptoms with targeted spices
swap_from:
- antacids for post-meal bloating
- sitting inactively after a heavy meal
how_to_use: Boil 1 tsp of the spice (whole or freshly ground) in 1 cup of water for 10–15 minutes. Sip
  slowly while resting. Use ginger and turmeric for bloating; fennel or mint for acid stomach; ginger
  and cumin for congestion; cinnamon for sugar cravings. Alternatively, brew a strong cup of ginger tea.
  Relax for 10 minutes after eating before taking the tea.
cautions:
- Do not sleep directly after eating — rest sitting upright or take a gentle walk first
- Ginger tea in excess can be heating for pitta types with acid tendency
