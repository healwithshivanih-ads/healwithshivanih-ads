notes_for_coach: Most useful single FM lab for clients with persistent gut / autoimmune
  / hormonal / skin issues. Quantitative PCR — bacteria, yeasts, parasites, viruses,
  digestive function (elastase, steatocrit), gut barrier (zonulin, calprotectin,
  secretory IgA), beta-glucuronidase (oestrogen recirculation). Available in India
  via Diagnostic Solutions partnership channels. Pricey — reserve for clients where
  symptomatic guidance + diet trial hasn't moved the needle.
