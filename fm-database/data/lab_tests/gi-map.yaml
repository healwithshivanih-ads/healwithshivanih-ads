interpretation_low: Reduced beneficial flora — low Bifidobacterium / Lactobacillus
  / Akkermansia signals dysbiosis; low elastase signals pancreatic insufficiency;
  low secretory IgA signals immune exhaustion
interpretation_high: Pathogenic / opportunistic overgrowth (H. pylori, Klebsiella,
  Pseudomonas, candida, parasites), high beta-glucuronidase (oestrogen recirculation),
  elevated calprotectin (gut inflammation), high zonulin (leaky gut)
when_to_order: Persistent GI symptoms (bloating, constipation, diarrhoea, reflux),
  food sensitivities, autoimmune workup, IBS / SIBO suspicion, oestrogen dominance,
  skin issues with gut connection, mood / mental health with gut-brain axis suspicion
