evidence_tier: strong
notes_for_coach: Excess urinary calcium is wasted bone calcium. High dietary acid
  load (lots of meat, soft drinks, low vegetable intake) drives calcium loss; alkaline
  diet with vegetables / mineral water + adequate magnesium / potassium reduces it.
  Pair with serum calcium + PTH + vitamin D for full bone picture. Spot urine Ca:Cr
  ratio is a cheaper screening test (about 200 INR).
