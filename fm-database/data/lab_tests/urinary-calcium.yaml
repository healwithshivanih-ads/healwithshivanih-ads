slug: urinary-calcium
display_name: 24-hr Urine Calcium
full_name: 24-Hour Urinary Calcium Excretion
aliases:
- 24 hour urinary calcium
- urine calcium
- 24-hr urine ca
- spot urine calcium creatinine
- urinary ca excretion
units: mg/24hr
sample_type: urine
conventional_low: 100
conventional_high: 300
fm_optimal_low: 100
fm_optimal_high: 250
interpretation_low: Low calcium intake, severe vitamin D deficiency, pregnancy / lactation
  with high tissue need, malabsorption (low gastric acid, coeliac, IBD), thiazide
  use
interpretation_high: Bone resorption (postmenopausal, hyperthyroid, hyperparathyroid,
  long-term glucocorticoid), high calcium / vitamin D intake, kidney stone risk,
  dietary acid load
when_to_order: Bone health workup, recurrent kidney stones, suspected hyperparathyroidism,
  evaluating calcium balance in postmenopausal / steroid-using clients; collect 24-hour
  urine on usual diet
fasting_required: false
typical_cost_inr: 600
