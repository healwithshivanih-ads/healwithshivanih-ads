slug: copper-serum
display_name: Copper (Serum)
full_name: Serum Copper
aliases:
- copper level
- copper serum
- serum copper
- copper
units: µg/dL
sample_type: blood
conventional_low: 70
conventional_high: 140
fm_optimal_low: 70
fm_optimal_high: 110
interpretation_low: Low — copper deficiency (malabsorption, excess zinc
  supplementation, coeliac disease, bariatric surgery); can cause anaemia and
  neutropenia.
interpretation_high: High — oestrogen/OCP use, pregnancy, inflammation, Wilson's
  disease (rare — usually presents with low ceruloplasmin instead), excess
  supplementation.
when_to_order: Alongside zinc when the copper:zinc balance is in question
  (high-dose zinc supplementation is a common cause of copper deficiency), or
  Wilson's/liver workup.
fasting_required: false
typical_cost_inr: 700
