evidence_tier: fm_specific_thin
notes_for_coach: FM-optimal serum Zn:Cu ratio is roughly 8:1–12:1 — always read
  copper alongside zinc, not in isolation. High-dose zinc supplementation (a
  common FM protocol) is the most frequent cause of iatrogenic copper
  deficiency; check this ratio in any client on long-term zinc.
