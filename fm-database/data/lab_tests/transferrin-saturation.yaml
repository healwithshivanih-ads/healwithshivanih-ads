interpretation_high: '> 50% = iron overload, hemochromatosis screen. Confirm with
  HFE genetics if persistent.'
when_to_order: Always part of full iron studies (serum iron + TIBC + ferritin + TSAT).
  TSAT = (serum iron / TIBC) × 100.
