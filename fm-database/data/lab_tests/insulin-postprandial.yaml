conventional_low: 0
conventional_high: 60
fm_optimal_low: 0
fm_optimal_high: 30
interpretation_low: Low postprandial insulin — generally favourable; very low alongside high
  glucose can signal beta-cell insufficiency.
interpretation_high: High postprandial insulin (hyperinsulinaemia) — the pancreas over-secreting
  to clear a meal. One of the EARLIEST signs of insulin resistance, often raised well before
  fasting insulin or HbA1c move.
when_to_order: Insulin-resistance workup, prediabetes, PCOS, suspected hyperinsulinaemia.
fasting_required: false
typical_cost_inr: 600
