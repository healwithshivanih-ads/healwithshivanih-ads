evidence_tier: strong
notes_for_coach: Read alongside HOMA-IR and fasting insulin — a raised 2-hour insulin is one
  of the earliest, most sensitive markers of insulin resistance. Reference ranges are assay-dependent;
  interpret against the lab's own range too.
