  - mast-cell-activation-syndrome
  - functional-b12-excess-umfa
linked_to_mechanisms:
  - histamine-metabolism-impairment
  - mast-cell-degranulation
  - copper-deficiency
notes_for_coach: |
  DAO is a copper-dependent enzyme — copper insufficiency or zinc-copper
  imbalance reduces activity. Vitamin B6 (P5P) is also a cofactor.
  Acquired DAO deficiency from gut inflammation, alcohol, NSAID use, IBD,
  or food sensitivity is common — often reversible with gut-healing
  protocols. Coach can recommend exogenous DAO supplement (Umbrellux,
  DAOsin) 1-2 capsules before high-histamine meals while addressing
  root causes. Availability in India: increasing — Thyrocare, SRL, Apollo
  ₹3000-5000.
