slug: dao-enzyme-activity
display_name: DAO activity
full_name: Diamine Oxidase (DAO) Enzyme Activity
aliases:
  - diamine oxidase
  - DAO
  - histaminase
  - serum DAO
units: HDU/mL
sample_type: blood
conventional_low: 10
conventional_high: 200
fm_optimal_low: 80
fm_optimal_high: 200
interpretation_low: |
  DAO activity < 10 HDU/mL strongly suggests histamine intolerance from
  primary or acquired DAO deficiency. Sub-optimal range (10-80) suggests
  reduced histamine-clearing capacity — clients tolerate fewer
  histamine-rich meals before symptoms emerge.
interpretation_high: |
  Elevated DAO is rarely clinically meaningful; not a workup priority.
when_to_order: |
  Suspected histamine intolerance / MCAS: client positive on MCAS screen
  (flushing after wine / aged cheese / fermented foods / hot showers,
  symptoms shifting day-to-day, perfume sensitivity, unexplained
  flushing or hives). Paired with tryptase + 24h urine N-methylhistamine
  for the standard MCAS workup. Also useful before initiating
  histamine-liberating supplements (high-dose quercetin, curcumin,
  reishi).
fasting_required: false
