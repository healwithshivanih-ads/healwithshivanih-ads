fm_optimal_high: 0.03
interpretation_low: Low ratio — intact small-intestinal barrier; large (lactulose) molecules
  not crossing
interpretation_high: Elevated ratio (commonly > ~0.03, protocol-dependent) — increased
  paracellular permeability ("leaky gut"); lactulose is crossing a barrier it normally could not
when_to_order: Direct functional assessment of small-intestinal permeability in suspected leaky
  gut / autoimmune workup. The most research-validated permeability measure; non-invasive (timed
  urine collection after a sugar drink), making it relatively child-friendly. Availability in
  India is limited to specialist functional labs.
