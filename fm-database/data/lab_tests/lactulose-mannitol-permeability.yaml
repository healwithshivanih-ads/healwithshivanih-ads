notes_for_coach: >-
  The classic dual-sugar test and the most validated DIRECT permeability measure: the patient
  drinks lactulose (large) + mannitol (small) and urine is collected over ~5-6 h. Mannitol is
  absorbed normally (transcellular); lactulose should NOT cross an intact barrier — so a high
  lactulose:mannitol ratio means the paracellular barrier is leaking. Used in paediatric research
  and non-invasive (urine only), so it's the most defensible direct "leaky gut" test for a child
  IF available. Exact cutoff varies by collection protocol — read against the performing lab's
  method. India availability is patchy.
