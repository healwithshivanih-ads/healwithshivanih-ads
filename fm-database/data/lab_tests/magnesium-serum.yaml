  location: Lab interpretation — serum magnesium
evidence_tier: strong
notes_for_coach: Serum magnesium catches only ~1% of body's magnesium. Anything
  in the bottom half of conventional range warrants assuming deficiency,
  especially in stressed / IR / PPI clients. RBC magnesium is more sensitive
  but more expensive.
