notes_for_coach: Largely genetic — value rarely changes with diet/exercise, so test
  once and act on it. High Lp(a) means more aggressive control of every other modifiable
  CV risk factor (ApoB, BP, insulin resistance, inflammation). Niacin is the only
  food-based lever; PCSK9 inhibitors lower it pharmacologically.
