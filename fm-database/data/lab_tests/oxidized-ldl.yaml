notes_for_coach: Not the LDL number itself — it's the damaged, sticky form. Ox-LDL
  is what actually lodges in artery walls. High value reframes for client why antioxidants,
  smoking cessation, and reducing oxidative drivers (PUFA-rich seed oils, fried food,
  high-glycaemic spikes) matter more than just lowering LDL-C. Less commonly available
  in India — Metropolis / Thyrocare may need referral.
