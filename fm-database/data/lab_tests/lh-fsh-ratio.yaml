notes_for_coach: Classic PCOS pattern is LH:FSH > 2:1 on cycle day 2-3 — but only
  about 60% of PCOS cases show this. Normal ratio doesn't rule out PCOS. Must be drawn
  on day 2-3 of menses; mid-cycle LH surge will distort the ratio. Use alongside AMH,
  free testosterone, and SHBG for a fuller PCOS picture.
