interpretation_low: Low retic — inadequate marrow response (iron/B12/folate deficiency, marrow suppression)
  despite anaemia.
interpretation_high: High retic — active red-cell production (recent blood loss, haemolysis, or response
  to iron/B12 repletion).
when_to_order: Anaemia workup — distinguishes production failure from loss/destruction.
