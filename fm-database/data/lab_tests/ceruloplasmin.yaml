notes_for_coach: No well-established FM-optimal narrowing beyond the lab's own
  reference range — treat as a screening/context marker (Wilson's, acute-phase,
  oestrogen status) rather than a standalone target. Reference range varies
  meaningfully by assay; anchor on this lab's own printed range.
