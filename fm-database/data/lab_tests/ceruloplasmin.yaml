- serum ceruloplasmin
units: mg/dL
sample_type: blood
conventional_low: 20
conventional_high: 60
fm_optimal_low: null
fm_optimal_high: null
interpretation_low: Low — copper deficiency, malnutrition, Wilson's disease (rare,
  usually paired with low serum copper + high urinary copper), nephrotic syndrome,
  severe liver disease.
interpretation_high: High — acute-phase/inflammatory response, oestrogen/OCP use,
  pregnancy, infection. Interpret alongside CRP — both are acute-phase reactants
  and often rise together.
when_to_order: Wilson's disease screening, unexplained liver enzyme abnormalities,
  or alongside serum copper when copper balance is in question.
fasting_required: false
