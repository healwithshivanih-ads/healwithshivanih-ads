interpretation_low: Each marker has its own range — broadly low values can indicate
  deficient pathway substrates (B-vitamin deficiencies, low neurotransmitter synthesis)
interpretation_high: Each marker has its own range — broadly elevated values flag
  pathway block (impaired methylation, mitochondrial dysfunction, neurotransmitter
  excess, gut dysbiosis metabolites)
when_to_order: Comprehensive workup for chronic fatigue, mitochondrial dysfunction,
  neurotransmitter imbalance, suspected gut dysbiosis (yeast / clostridia metabolites),
  methylation issues, broad metabolic functioning concerns
