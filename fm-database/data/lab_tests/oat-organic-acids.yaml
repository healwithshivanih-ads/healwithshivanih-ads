notes_for_coach: 70+ markers in one panel — B-vitamin status (FIGLU, MMA, xanthurenate),
  mitochondrial function (Krebs cycle intermediates), neurotransmitter status (HVA,
  VMA, 5-HIAA), oxidative stress (8-OHdG), gut microbiome metabolites (D-arabinitol
  for yeast, HPHPA for clostridia). Available via Mosaic Diagnostics / Great Plains
  / Genova. Best ordered when stuck on a complex client — gives a metabolic snapshot
  to guide protocol.
