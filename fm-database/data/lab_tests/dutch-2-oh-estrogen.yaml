notes_for_coach: 2-OH:16-OH ratio matters more than absolute — > 2 is protective,
  < 1 raises concern. DIM, broccoli sprouts, cruciferous vegetables, B vitamins (especially
  B6, B12, folate), and methylation support shift metabolism toward 2-OH. Always
  paired with 4-OH and 16-OH to interpret pattern. Available only as part of full
  DUTCH panel.
