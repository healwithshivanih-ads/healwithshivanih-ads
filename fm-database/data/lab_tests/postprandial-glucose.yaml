slug: postprandial-glucose
display_name: PP glucose
full_name: Postprandial Glucose (2-hour)
aliases:
- pp glucose
- 2 hour glucose
- 2-hour postprandial glucose
- post-meal glucose
- ppbs
- post prandial blood sugar
units: mg/dL
sample_type: blood
conventional_low: 70
conventional_high: 140
fm_optimal_low: 70
fm_optimal_high: 110
interpretation_low: Hypoglycaemia (< 70). Reactive hypoglycaemia common in early insulin
  resistance + adrenal stress; check fasting insulin + cortisol curve.
interpretation_high: 140-199 = impaired glucose tolerance (prediabetes pattern); ≥
  200 = diabetes pattern. FM flags > 110 as glucose dysregulation even when fasting
  is normal — common pattern in early IR.
when_to_order: When fasting glucose is normal but HbA1c, fasting insulin, or symptoms
  (post-meal sleepiness / cravings) suggest glucose dysregulation. Always pair with
  fasting glucose to see the fasting → 2h excursion.
fasting_required: false
typical_cost_inr: 120
