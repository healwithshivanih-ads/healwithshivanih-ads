notes_for_coach: >-
  The best non-invasive marker of intestinal inflammation — a neutrophil-derived protein
  shed into stool. Validated in children (>4 yr use the adult ~50 µg/g cutoff; infants run
  higher). Cheap, no blood draw — ideal for kids. Key use in FM/rheumatology: the
  enthesitis-related arthritis / juvenile spondyloarthropathy subtype is strongly linked to
  silent gut inflammation + IBD, so a raised value routes the child to a paediatric
  gastroenterologist. NOT a permeability ("leaky gut") marker — it measures inflammation — but
  it's the highest-yield, most actionable gut test for an inflammatory-arthritis picture.
  Recent NSAID use can falsely raise it.
