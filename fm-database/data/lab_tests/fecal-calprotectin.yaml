units: µg/g
sample_type: stool
conventional_low: null
conventional_high: 50
fm_optimal_low: null
fm_optimal_high: 50
interpretation_low: < 50 µg/g — no significant intestinal inflammation; favours a functional
  (non-inflammatory) gut picture such as IBS
interpretation_high: 50-150 borderline (repeat / correlate clinically); > 150-250 active
  intestinal inflammation — investigate for inflammatory bowel disease (Crohn's / ulcerative
  colitis), gut infection, or NSAID injury. Distinguishes inflammatory from functional gut disease.
when_to_order: Suspected gut inflammation / IBD, chronic diarrhoea or abdominal pain, unexplained
  iron deficiency, and notably in spondyloarthropathy / enthesitis-related arthritis where
  subclinical gut inflammation is common. Non-invasive screen before considering colonoscopy.
