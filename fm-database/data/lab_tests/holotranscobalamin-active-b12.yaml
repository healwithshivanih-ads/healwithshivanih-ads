interpretation_low: |
  HoloTC < 35 pmol/L confirms functional B12 deficiency regardless of
  serum total B12. Only the 10-30% of B12 bound to transcobalamin is
  bioavailable; this fraction better reflects cellular status.
interpretation_high: |
  Elevated holoTC without supplementation may suggest impaired cellular
  uptake (similar to high serum total B12) — workup for MTHFR variants,
  liver dysfunction, myeloproliferative disorders.
when_to_order: |
  Suspected functional B12 deficiency despite "normal" serum B12 (200-900
  pg/mL range). Workup of MTHFR methylation block (paired with MMA +
  homocysteine + MTHFR genotype). Suspected pernicious anaemia or
  long-term metformin / PPI / H2-blocker use. Clients with neuropathy,
  brain fog, or low energy whose serum B12 looks "fine."
