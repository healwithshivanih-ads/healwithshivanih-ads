notes_for_coach: |
  Most India lab chains now offer holoTC (₹2500-4500). It's the SECOND
  test to order when serum B12 is high without supplementation —
  homocysteine + MMA first, holoTC if those are still ambiguous.
  Together with serum B12 + MMA, holoTC gives the 4B12 score most
  accurate for cellular B12 status.
