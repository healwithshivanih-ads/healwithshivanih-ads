units: nmol/L
sample_type: blood
# Conventional lab reference range varies by lab — typical "normal" is
# <378 nmol/L (some labs report 73-376 or 0-271). Many clients are flagged
# only when MMA > 400 nmol/L, by which point neurological symptoms can
# already be present.
conventional_high: 378
# FM-optimal: <180 nmol/L. Functional B12 deficiency starts surfacing
# above this even when serum B12 looks "normal". Above 250 nmol/L is a
# strong signal regardless of serum B12.
fm_optimal_low: 0
fm_optimal_high: 180
interpretation_low: ''
interpretation_high: |
  Elevated MMA = functional B12 deficiency. MMA accumulates when B12 is
  insufficient because methylmalonyl-CoA can't be converted to succinyl-CoA
  (requires methylcobalamin / adenosylcobalamin). Sensitive marker that
  rises BEFORE serum B12 drops — especially useful when serum B12 looks
  "normal" but clinical signs (peripheral neuropathy, brain fog, glossitis,
  fatigue, macrocytosis) suggest insufficiency. Also elevates in renal
  insufficiency (false positive in eGFR < 60).
when_to_order: |
  Suspected functional B12 deficiency despite "normal" serum B12 — especially
  with peripheral neuropathy, paraesthesia, glossitis, macrocytosis (MCV > 100),
  or unexplained fatigue / cognitive decline. Pair with homocysteine for
  comprehensive methylation workup. Coach scope: order alongside elevated
  homocysteine + active B12 (holotranscobalamin) when serum B12 is borderline
  (200-400 pg/mL). Useful in:
    - Vegetarians / vegans
    - PPI / metformin long-term users
    - Elderly clients (atrophic gastritis impairs B12 absorption)
    - Hashimoto's clients (autoimmune gastritis comorbidity)
    - Post-bariatric clients
    - MTHFR-suspected clients with normal serum B12
