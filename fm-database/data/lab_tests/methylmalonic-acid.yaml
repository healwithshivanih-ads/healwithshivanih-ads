notes_for_coach: |
  Use as a tie-breaker when serum B12 is borderline (200-400 pg/mL) or
  when symptoms suggest B12 deficiency despite normal serum B12.

  Interpretation in context:
    - MMA < 180 + serum B12 > 400: B12 status likely adequate
    - MMA 180-270 + symptoms: early functional deficit; trial methyl-B12
      or hydroxocobalamin and re-test in 3 months
    - MMA > 270: functional B12 deficiency confirmed; supplement +
      investigate cause (vegetarian diet / PPI / autoimmune gastritis /
      ileal pathology)
    - MMA > 500 with renal function normal: clinically significant
      deficiency — clinician referral if neurological symptoms

  Renal caveat: elevated creatinine / eGFR < 60 can cause false-positive
  elevation. Always interpret MMA against renal function.

  India context: serum MMA is widely available (NMR-based) at major labs
  (Quest, Thyrocare, Metropolis, SRL). Typical cost ₹1500-2500. Urinary
  MMA is cheaper but blood is the gold standard.
