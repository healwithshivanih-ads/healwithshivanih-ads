notes_for_coach: >-
  Zonulin (Fasano) regulates intestinal tight junctions and is the headline FM "leaky gut"
  biomarker — conceptually central to the autoimmunity triad. HONEST CAVEAT: commercial zonulin
  ELISAs are debated; several may cross-react with other proteins (e.g. properdin) and aren't
  fully standardised, so treat a single number as a soft signal, not proof. Ranges are
  assay-dependent. Best value when bundled in a stool panel alongside calprotectin + secretory
  IgA. The lactulose:mannitol urine test is the more research-validated direct permeability
  measure if a hard read is wanted.
