notes_for_coach: Comes as part of full DUTCH panel (~17,000 INR via Precision Analytical
  / Indian distributors). Single most useful FM lab for nuanced HPA picture — explains
  the 'normal cortisol but feels exhausted' client. 11-beta-HSD enzyme balances active
  cortisol vs inactive cortisone. Liquorice root inhibits cortisone-to-cortisol breakdown
  and can shift this ratio.
