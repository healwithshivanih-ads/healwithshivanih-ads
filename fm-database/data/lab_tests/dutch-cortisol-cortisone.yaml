interpretation_low: Cortisol being inactivated to cortisone too quickly — slow clearance
  /  lower active cortisol; can present as fatigue with normal serum cortisol
interpretation_high: Cortisol activation (inactive cortisone → active cortisol) excessive;
  often in obesity, metabolic syndrome — drives insulin resistance, visceral adiposity
when_to_order: HPA workup beyond simple cortisol curve; fatigue / weight gain with
  normal-looking serum cortisol; suspected metabolic clearance issue
