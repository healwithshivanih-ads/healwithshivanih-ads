notes_for_coach: Single morning serum cortisol misses the rhythm — saliva at waking
  + 30 min + noon + evening + bedtime gives the whole HPA picture. Available via
  ZRT, BioHealth, DUTCH (the dried-urine version captures the same plus metabolites).
  Pattern matters more than absolute values. Coaching levers (sleep hygiene, breath-work,
  ashwagandha, vitamin C) rebuild the rhythm over 8-12 weeks.
