interpretation_low: Flat / blunted curve = HPA axis exhaustion / stage 3 adrenal dysfunction;
  low evening cortisol with normal morning = healthy rhythm
interpretation_high: Elevated curve = chronic stress / hypercortisolism; high evening
  cortisol = HPA dysregulation, disrupts sleep
when_to_order: Suspected HPA dysfunction, fatigue with stress component, insomnia
  / poor sleep quality, burnout, anxiety with cortisol pattern, before / after stress-management
  intervention to track change
