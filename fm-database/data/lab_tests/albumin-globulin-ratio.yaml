interpretation_low: Low A/G (<1.5) — chronic immune activation / inflammation (raised globulins) or low
  albumin (poor protein status, liver, gut absorption).
interpretation_high: High A/G — usually low globulins; rarely significant on its own.
when_to_order: Part of the liver/total-protein panel; inflammation and protein-status context.
