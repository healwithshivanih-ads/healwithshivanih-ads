interpretation_low: Adrenal suppression (chronic steroid use), pituitary insufficiency
interpretation_high: Non-classic congenital adrenal hyperplasia (NCAH), late-onset
  21-hydroxylase deficiency — can mimic PCOS phenotype
when_to_order: PCOS workup with strong androgen signs (severe hirsutism, virilising
  features, family history of CAH) to rule out NCAH masquerading as PCOS; draw morning,
  follicular phase
