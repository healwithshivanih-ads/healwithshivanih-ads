notes_for_coach: Often missed — every PCOS workup should rule out NCAH at least once.
  Morning, day 2-7 of cycle. Value > 200 ng/dL warrants ACTH stimulation test for
  confirmation. Important because NCAH coaching is different (cortisol replacement
  if confirmed) — refer to endocrinologist.
