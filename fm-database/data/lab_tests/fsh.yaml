notes_for_coach: Single FSH > 25 isn't menopause — needs to be repeated after 4-6
  weeks since perimenopausal FSH oscillates wildly. Use AMH alongside for ovarian
  reserve picture (AMH is more stable across the cycle). Day 2-3 baseline only —
  off-cycle values not interpretable.
