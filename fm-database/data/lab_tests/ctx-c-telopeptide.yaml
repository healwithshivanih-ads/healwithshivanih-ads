evidence_tier: strong
notes_for_coach: CTX measures bone breakdown rate; pair with P1NP (formation marker)
  for full turnover picture. Useful between DEXA scans (bone density imaging only
  every 2-3 years) to track trajectory in 3-6 month windows. Diurnal variation —
  always draw fasting morning. Coaching levers vitamin D3 + K2 + magnesium, weight-bearing
  exercise, protein adequacy, reduce caffeine / cola, address oestrogen decline.
