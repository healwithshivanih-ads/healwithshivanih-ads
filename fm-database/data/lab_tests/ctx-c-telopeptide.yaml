fm_optimal_low: 100
fm_optimal_high: 350
interpretation_low: Low bone breakdown — often from bisphosphonate therapy (oversuppressed
  in some), low bone turnover state
interpretation_high: Active bone resorption — postmenopausal osteoporosis, hyperparathyroidism,
  chronic glucocorticoid use, untreated hyperthyroidism
when_to_order: Bone health workup (especially perimenopause/post), to track effectiveness
  of intervention (vitamin D, K2, weight-bearing exercise, HRT) over 3-6 months;
  morning fasting sample for stability
fasting_required: true
typical_cost_inr: 1800
