notes_for_coach: Carnitine shuttles long-chain fatty acids into the mitochondria for
  beta-oxidation. Vegetarian / vegan clients often run low (carnitine is in red meat,
  with biosynthesis from lysine + methionine being insufficient under stress). Acetyl-L-carnitine
  (1-2 g/day) is the supplement form preferred for cognition; L-carnitine tartrate
  for muscle. Check before recommending — supplementing without need is wasteful.
