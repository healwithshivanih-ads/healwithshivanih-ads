interpretation_low: ''
interpretation_high: '> 0.5 (any sex, any age) = central adiposity → cardiometabolic
  risk. > 0.6 = high risk. Better than BMI as a screen, especially in South Asians
  (normal-BMI obesity is common — visceral adiposity present at lower body weights).'
when_to_order: Measure at every intake + recheck. Tape at navel, parallel to floor,
  end of normal exhale. Costs nothing, predicts CV + diabetes + NAFLD risk independent
  of BMI.
