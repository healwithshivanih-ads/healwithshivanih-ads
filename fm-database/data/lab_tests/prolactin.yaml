interpretation_low: Pituitary insufficiency (rare); usually clinically irrelevant
interpretation_high: Hyperprolactinaemia — pituitary adenoma, hypothyroidism, stress,
  certain medications (SSRIs, antipsychotics, OCPs); disrupts cycle, suppresses LH
  surge, causes galactorrhoea
when_to_order: Irregular periods, anovulation, infertility, galactorrhoea, low libido,
  visual changes; rule out pituitary cause when LH/FSH suppressed
