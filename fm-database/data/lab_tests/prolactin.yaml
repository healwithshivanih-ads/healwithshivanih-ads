evidence_tier: strong
notes_for_coach: Always draw in the morning, 1-2 hours after waking, no breast exam
  / nipple stimulation in the prior 24 hours (any of those can falsely elevate). Mildly
  elevated prolactin (25-50) is often stress-related and reversible. Persistent >
  100 ng/mL warrants pituitary MRI. Hypothyroidism is a common reversible cause —
  always check TSH alongside.
