notes_for_coach: Vascular-specific inflammation marker (vs hsCRP which is systemic).
  Available in India only at large urban labs (Metropolis / Quest). Skip if budget-constrained
  — hsCRP + fibrinogen + ApoB is enough for most clients. Reserve for clients with
  imaging-confirmed atherosclerosis or strong family history of stroke.
