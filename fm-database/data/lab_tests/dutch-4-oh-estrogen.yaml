notes_for_coach: The 'bad' oestrogen metabolite. Gets methylated to safe 4-methoxyestrogen
  via COMT; methylation insufficiency or unmethylated 4-OH → quinone → DNA damage.
  Coaching levers methylation support (B12, methylfolate, betaine, riboflavin), N-acetylcysteine,
  resveratrol, reducing oxidative stress, removing endocrine disruptors. Always interpreted
  alongside 2-OH and methylation markers.
