units: mIU/mL
sample_type: blood
conventional_low: 1.7
conventional_high: 8.6
fm_optimal_low: 2.0
fm_optimal_high: 8.0
interpretation_low: Hypothalamic / pituitary suppression — stress, low body weight,
  excess exercise, hyperprolactinaemia
interpretation_high: Premature ovarian insufficiency, perimenopause, menopause; mid-cycle
  surge if timed with ovulation
when_to_order: Day 2-3 of cycle for cycle assessment, menopause staging, PCOS workup
  (paired with FSH)
fasting_required: false
typical_cost_inr: 400
