evidence_tier: strong
notes_for_coach: LH:FSH ratio > 2 is a classic PCOS signal. Always interpret with
  cycle day — day 2-3 baseline tells the story; mid-cycle peak (12-14) is normal physiology.
  Elevated LH + FSH in tandem (both > 25) confirms post-menopausal pattern.
