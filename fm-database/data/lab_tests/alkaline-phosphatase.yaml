slug: alkaline-phosphatase
display_name: ALP
full_name: Alkaline Phosphatase
aliases:
- alp
- alkaline phosphatase total
- serum alkaline phosphatase
- alk phos
units: U/L
sample_type: blood
conventional_low: 40
conventional_high: 130
fm_optimal_low: 60
fm_optimal_high: 110
interpretation_low: Zinc deficiency, B6 deficiency, hypothyroidism, malnutrition,
  rare genetic hypophosphatasia
interpretation_high: Bone (Paget disease, osteomalacia, healing fracture, growing
  child / adolescent), liver (cholestasis, biliary obstruction), pregnancy (placental),
  intestinal disease
when_to_order: Routine LFT panel; bone health workup; suspected zinc deficiency in
  vegetarians; cholestatic liver pattern workup
fasting_required: false
typical_cost_inr: 200
