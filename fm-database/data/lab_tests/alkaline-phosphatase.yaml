evidence_tier: strong
notes_for_coach: Multi-tissue enzyme — needs context. Low ALP (< 50) is a sneaky
  zinc deficiency marker that gets missed; coach can recommend zinc-rich foods (pumpkin
  seeds, cashews, lentils) or short-term zinc picolinate 15-30 mg/day before retesting.
  High ALP needs liver / bone / GI workup.
