slug: tibc
display_name: TIBC
full_name: Total Iron Binding Capacity
aliases:
- total iron binding capacity
- transferrin capacity
units: ug/dL
sample_type: blood
conventional_low: 250
conventional_high: 450
fm_optimal_low: 250
fm_optimal_high: 380
interpretation_low: Inflammation, malnutrition, liver disease, iron overload.
interpretation_high: Iron deficiency (compensatory rise) — body upregulates transport
  proteins to capture every available iron molecule.
when_to_order: Order with serum iron + ferritin to compute TSAT (transferrin saturation).
fasting_required: true
typical_cost_inr: 300
