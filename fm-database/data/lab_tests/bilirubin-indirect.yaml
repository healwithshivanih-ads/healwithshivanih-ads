interpretation_high: Raised indirect (unconjugated) bilirubin — haemolysis, or benign Gilbert's
  syndrome. A mild isolated rise with normal liver enzymes is usually Gilbert's and is harmless
  (the pigment is mildly antioxidant).
when_to_order: Liver assessment; jaundice workup; suspected Gilbert's or haemolysis.
