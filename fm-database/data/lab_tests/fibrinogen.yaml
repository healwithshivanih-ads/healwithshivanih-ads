notes_for_coach: Fibrinogen sits at the intersection of inflammation and clotting
  — both CV risk pathways. Rises in chronic inflammatory states (autoimmune, chronic
  infection, smoking, oestrogen excess from oral OCPs/HRT). Coaching levers omega-3,
  curcumin, vitamin E, regular movement, smoking cessation.
