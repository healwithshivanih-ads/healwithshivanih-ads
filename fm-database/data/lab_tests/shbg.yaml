interpretation_low: Insulin resistance / PCOS / NAFLD / hypothyroidism — low SHBG
  unmasks free testosterone, drives androgenic symptoms
interpretation_high: Oral oestrogen (OCP / HRT), liver dysfunction, hyperthyroidism,
  anorexia
when_to_order: Always alongside total + free testosterone, and oestradiol; PCOS workup,
  hirsutism, low libido, perimenopause assessment
fasting_required: false
