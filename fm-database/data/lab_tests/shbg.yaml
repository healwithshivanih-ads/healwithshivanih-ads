notes_for_coach: SHBG is the single best window into liver-driven hormone bioavailability
  and an early signal of insulin resistance — often suppressed before fasting glucose
  budges. Coaching levers protein adequacy, lower refined carb intake, fibre, magnesium,
  and reducing alcohol all raise SHBG.
