interpretation_low: Negative — celiac unlikely IF total IgA is normal AND the patient was eating
  gluten at the time of testing. A negative result in an IgA-deficient patient is unreliable
  (false negative) — use IgG-based testing instead.
interpretation_high: Positive / raised — suggests celiac disease; titres > 10x the upper limit
  of normal are highly predictive. Confirm per paediatric/GI pathway (± endomysial antibody,
  ± duodenal biopsy). Always interpreted against total serum IgA. Result cutoffs are kit-specific.
when_to_order: First-line celiac screen in anyone with autoimmune disease, unexplained iron /
  vitamin D deficiency, poor growth, GI symptoms, or arthritis / arthralgia. ALWAYS order with
  total serum IgA. The patient MUST remain on a gluten-containing diet — do not start gluten-free
  before testing or the antibodies normalise and the test misses disease.
