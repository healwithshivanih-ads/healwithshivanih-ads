notes_for_coach: >-
  The gold-standard first-line celiac test — IgA anti-tTG sensitivity ~99%. TWO
  non-negotiables: (1) pair with TOTAL serum IgA — selective IgA deficiency is common and gives
  false negatives, in which case order IgG-based tTG / DGP instead; (2) the child must still be
  EATING GLUTEN at the time of the test. Celiac clusters with other autoimmune disease and is a
  classic hidden cause of low ferritin + low vitamin D + arthralgia via malabsorption — so it
  earns a top spot in any autoimmune / inflammatory-arthritis gut workup. Diagnosis + biopsy are
  clinician scope; gluten-free education is coaching scope.
