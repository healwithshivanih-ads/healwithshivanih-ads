evidence_tier: strong
notes_for_coach: Healthy bone is a constant balance of breakdown (CTX) and formation
  (P1NP). High CTX with low P1NP = losing ground; high CTX with high P1NP = active
  remodelling, can be restored. Coaching levers protein intake (~1.2 g/kg in over-50s),
  weight-bearing + resistance exercise, vitamin D3, K2-MK7, calcium, boron. Pair
  with DEXA every 2 years.
