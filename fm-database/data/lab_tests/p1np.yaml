interpretation_low: Low bone formation — chronic glucocorticoid use, anorexia, low
  protein intake, advanced osteoporosis with exhausted osteoblasts
interpretation_high: Healthy bone formation; can rise with anabolic therapy (teriparatide,
  weight-bearing exercise + adequate nutrition)
when_to_order: Bone health workup with CTX (turnover ratio), tracking response to
  bone-building intervention, evaluating osteoblast capacity in postmenopause / chronic
  steroid users
