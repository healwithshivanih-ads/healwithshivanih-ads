evidence_tier: strong
notes_for_coach: AMH > 4 in a woman with irregular cycles is almost diagnostic of
  PCOS. AMH < 1 in a woman under 38 is concerning for diminished ovarian reserve.
  Stable across the cycle (unlike FSH/LH/E2) so it can be drawn any day. Drops naturally
  with age — interpret against age-specific norms.
