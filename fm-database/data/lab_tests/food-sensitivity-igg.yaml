interpretation_low: Tolerance to tested foods at the time of measurement (within IgG
  exposure assumptions)
interpretation_high: IgG exposure / immune memory to tested foods — does NOT prove
  symptomatic food sensitivity but flags candidates for an elimination-reintroduction
  trial; high values often correlate with leaky gut and frequent food consumption
when_to_order: Persistent gut / skin / mood / fatigue symptoms with suspected food
  triggers, after stool / coeliac / IgE workup is normal, as elimination-diet design
  aid (NOT as standalone diagnosis)
fasting_required: false
typical_cost_inr: 6000
