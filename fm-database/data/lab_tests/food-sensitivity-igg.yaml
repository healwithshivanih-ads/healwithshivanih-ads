evidence_tier: confirm_with_clinician
notes_for_coach: Controversial — IgG can reflect normal exposure rather than pathological
  reactivity. FM uses it as a screening tool to design 4-6 week elimination-reintroduction;
  symptoms during reintroduction confirm or rule out, NOT the IgG number itself.
  Always pair with leaky-gut workup (zonulin, stool calprotectin) since high IgG
  to many foods often signals barrier failure rather than food problem. Avoid in
  active eating disorder.
