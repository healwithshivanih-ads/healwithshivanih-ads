notes_for_coach: 'Old-school inflammation marker — slower to rise + fall than hsCRP
  (CRP responds within hours; ESR over days). Usually pair both: hsCRP for acute
  signal, ESR for trajectory. Cheap, available everywhere in India. Mildly elevated
  ESR with normal hsCRP often = chronic low-grade inflammation worth coaching diet,
  sleep, stress.'
