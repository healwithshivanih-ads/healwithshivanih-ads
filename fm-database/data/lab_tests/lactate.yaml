notes_for_coach: Resting lactate > 2 mmol/L in a non-exercising client suggests cells
  defaulting to glycolysis — classic mitochondrial dysfunction marker. Pair with
  pyruvate, B-vitamin status, OAT for full picture. Coaching levers thiamine / B-complex,
  CoQ10, alpha-lipoic acid, gentle aerobic conditioning, gradually rebuilding mitochondrial
  capacity.
