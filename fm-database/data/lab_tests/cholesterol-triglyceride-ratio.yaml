notes_for_coach: No independently validated FM-optimal cut-off exists for this
  ratio — unlike TG/HDL or Cholesterol/HDL, it is not a recognised cardiovascular
  or insulin-resistance risk marker in the literature. Some Indian labs print it
  as a routine extra; treat as informational only and defer to the TG/HDL ratio
  + Cholesterol/HDL ratio for actual risk stratification.
