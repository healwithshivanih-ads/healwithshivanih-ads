id: dording-2008-maca-ssri-sexual-dysfunction
title: A double-blind, randomized, pilot dose-finding study of maca root (L. meyenii)
  for the management of SSRI-induced sexual dysfunction
source_type: peer_reviewed_paper
quality: high
authors:
- Dording CM
- Fisher L
- Papakostas G
- Farabaugh A
- Sonawalla S
- Fava M
- Mischoulon D
publisher: CNS Neuroscience and Therapeutics
year: 2008
url: https://pubmed.ncbi.nlm.nih.gov/18801111/
doi: 10.1111/j.1755-5949.2008.00052.x
notes: Double-blind randomized pilot dose-finding trial at Massachusetts General Hospital
  comparing maca 1.5 g/day vs 3.0 g/day in 20 remitted depressed outpatients (17 women)
  with SSRI-induced sexual dysfunction. The 3.0 g/day arm showed significant improvement
  in ASEX and MGH-SFQ scores; the 1.5 g/day arm did not. Libido improved in ITT and
  completer groups. Maca was well tolerated with no SSRI interaction signal. Pilot
  size (n=20, only 10 completers) limits generalisability but RCT design is solid.
