notes: 'Sklar argues "two or more losses is not random" and walks through five underinvestigated
  categories driving recurrent pregnancy loss: standard miscarriage workup gaps, autoimmune
  and inflammatory causes (elevated natural killer cells, antiphospholipid syndrome,
  lupus), genetic and blood-clotting factors (MTHFR homozygous variants, Factor V
  Leiden, Protein S deficiency), reproductive-tract microbiome and hidden infections
  (ureaplasma, mycoplasma, uterine microbiome dysbiosis), and the case for a multi-factor
  comprehensive workup rather than single-test approach.'
