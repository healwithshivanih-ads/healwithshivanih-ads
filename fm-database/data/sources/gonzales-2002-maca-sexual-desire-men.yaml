id: gonzales-2002-maca-sexual-desire-men
title: Effect of Lepidium meyenii (Maca) on sexual desire and its absent relationship
  with serum testosterone levels in adult healthy men
source_type: peer_reviewed_paper
quality: moderate
authors:
- Gonzales GF
- Cordova A
- Vega K
- Chung A
- Villena A
- Gonez C
- Castillo S
publisher: Andrologia
year: 2002
url: https://pubmed.ncbi.nlm.nih.gov/12472620/
doi: 10.1046/j.1439-0272.2002.00519.x
notes: 12-week double-blind, placebo-controlled, randomized parallel trial in healthy
  men aged 21-56 receiving gelatinized maca 1500 mg/day, 3000 mg/day, or placebo.
  Subjective sexual desire improved from week 8 onwards, independent of changes in
  Hamilton depression/anxiety scores and serum testosterone or estradiol. Small sample
  limits effect-size precision but design is rigorous.
