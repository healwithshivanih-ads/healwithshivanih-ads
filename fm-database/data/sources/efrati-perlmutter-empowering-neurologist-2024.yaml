notes: Interview between Dr David Perlmutter and Dr Shai Efrati focused on HBOT for
  stroke, vascular dementia, and post-concussion. Covers the four-element framework
  for tissue repair (oxygen, trigger, stem cells, vascular access), the necrotic-vs-hibernating
  tissue distinction that determines who can benefit, the Aviv Clinic affiliation
  with the Sagol Center (Orlando + Manhattan + Tel Aviv + Dubai), the IP/regulatory
  gap that prevents FDA approval for stroke (no commercial sponsor will pay regulatory
  costs for a non-patentable molecule), and the importance of biology-based autism
  categorisation rather than treating autism as a symptom cluster. Source quality
  moderate for the podcast format.
