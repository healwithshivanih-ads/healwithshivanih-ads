notes: 'Pharmacological review. Key bioactives — cordycepin (3''-deoxyadenosine, marker
  for natural C. sinensis), adenosine (higher in cultured), polysaccharides 3–8% (EPSF,
  APS, CPS-1, CPS-2, cordyglucans), ergosterol/H1-A sterols, cordycepic acid (D-mannitol).
  Immune: cordycepin upregulates dendritic-cell maturation, macrophage M2→M1 conversion
  via NF-κB. Renal: CPS-1 antioxidant + glucose-lowering + renal-failure protective;
  CPS-2 inhibits mesangial cell proliferation via PDGF/ERK + TGF-β1/Smad; H1-A used
  clinically in IgA nephropathy (Berger''s). Important quality note — cordycepin only
  in natural C. sinensis (very low content); cultured material lacks it.'
