id: pemt-knockout-choline-steatosis-2003
title: Phosphatidylethanolamine N-methyltransferase (PEMT) Knockout Mice Have Hepatic
  Steatosis and Abnormal Hepatic Choline Metabolite Concentrations Despite Ingesting
  a Recommended Dietary Intake of Choline
source_type: peer_reviewed_paper
quality: high
year: 2003
publisher: PubMed
url: https://pubmed.ncbi.nlm.nih.gov/12466019/
notes: Animal (mouse knockout) mechanistic study establishing that PEMT provides
  the only endogenous route to new phosphatidylcholine synthesis (via methylation
  of phosphatidylethanolamine) — when PEMT is absent, even RDA-level dietary
  choline intake is insufficient to prevent hepatic steatosis.
