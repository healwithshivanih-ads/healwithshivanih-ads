id: lad-ayurveda-science-of-self-healing-1984
title: "Ayurveda: The Science of Self-Healing — A Practical Guide"
source_type: book
quality: moderate
authors:
  - Vasant D. Lad
publisher: Lotus Press (Santa Fe, New Mexico)
year: 1984
notes: >-
  Dr Vasant Lad's first book and the foundational Western primer on Ayurveda.
  Covers Samkhya philosophy, the five elements, tridosha, the seven dhatus, the
  three malas, pulse/tongue/face/nail/eye diagnosis, panchakarma, diet, the six
  tastes (rasa-virya-vipaka), daily routine, longevity practices (yoga,
  pranayama, mantra, meditation, abhyanga massage) and a Chapter XIII "Kitchen
  Pharmacy" cataloguing ~26 common herbs/spices with their tastes, actions and
  household uses. Appendix A is a table of food antidotes (counter-spices for
  gas/mucus/heaviness), Appendix B is a first-aid list of simple remedies by
  complaint, and Appendix C gives base recipes (ghee, lassi, almond drink, yogi
  tea, medicated oils/ghees). Used here as a secondary/corroborating source for
  net-new HomeRemedy entries (kitchen-herb actions, first-aid preparations,
  base recipes). Evidence tier kept conservative. Coach-scope note: the metals,
  gems, colour-therapy and panchakarma (vaman/virechan/basti/rakta moksha)
  sections were deliberately excluded as out-of-scope for lifestyle coaching.
