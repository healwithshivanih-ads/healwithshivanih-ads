notes: Lisa Hendrickson-Jack is a certified fertility awareness educator and co-author
  of Real Food for Fertility (with Lily Nichols). The episode is a deep dive into
  advanced-maternal-age conception, fertility-awareness method for cycle tracking,
  the AMH-quality misuse problem, sperm quality, ancestral nutrition for preconception,
  and the importance of bringing male partners into the protocol. Practical and integrative;
  complements Fett's more biomedical framing. Quality moderate (expert-clinician consensus
  + citations to peer-reviewed work).
