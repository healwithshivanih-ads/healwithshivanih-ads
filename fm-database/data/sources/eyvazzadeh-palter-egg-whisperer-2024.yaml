notes: Dr. Aimee Eyvazzadeh is a San Francisco-based reproductive endocrinologist
  and prominent fertility educator (Egg Whisperer). Dr. Steven Palter is medical and
  scientific director at Gold Coast IVF, New York. This episode covers DOR, DHEA controversy,
  mitochondrial replacement therapy, PCOS metabolic targeting, ovarian PRP, PGT-A
  in low-egg-yield patients, and IVF stimulation triggering. Useful for advanced-maternal-age
  egg freezing patients who want to understand the limits and trade-offs of fertility
  technologies. Quality moderate (expert consensus / clinical opinion, not controlled
  trials).
