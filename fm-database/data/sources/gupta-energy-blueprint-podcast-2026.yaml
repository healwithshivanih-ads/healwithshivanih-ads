notes: Shivani Gupta PhD is an Ayurvedic practitioner and turmeric researcher who
  completed her doctoral work on curcumin at MD Anderson Cancer Center, where the
  lab she worked in characterised the curcumin-piperine absorption pathway. Founder
  of Fusionary Formulas and creator of the Emmy-nominated TV show Vibrant Health with
  Dr Shivani Gupta. Author of The Inflammation Code (Feb 2026), which distils 20 years
  of Ayurveda practice into pillars for cooling chronic inflammation ("inflammaging").
  Episode covers Ayurveda's framing of inflammation as accumulated amma, the three
  doshas (vata/pitta/kapha, reframed as "elemental design"), the circadian clock as
  a 24-hour dosha cycle, agni (digestive fire) as the centre of health, daily-seasonal-annual
  detox rituals (tongue scraping, oil pulling, abhyanga, panchakarma), and the curcumin
  + piperine evidence base. Expert-consensus tier — claims paraphrased from a researcher
  with both PhD-level training and a clinical Ayurveda lineage; quotes anchored to
  the podcast transcript.
