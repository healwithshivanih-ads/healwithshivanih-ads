notes: Wendy Trubow MD is a gynecologist by training, certified functional medicine
  practitioner, and co-author of Dirty Girl — Ditch the Toxins, Look Great, and Feel
  Freaking Amazing. Her work centres on environmental-toxin load (heavy metals, mycotoxins,
  phthalates, PFAS / forever chemicals, flame retardants) and detoxification capacity.
  The episode was prompted by her own lead-exposure case study after visiting Paris
  during the Notre Dame fire (which released approximately 500 tons of lead into the
  air). Covers the body's "storage depot" logic (toxins sequestered in fat, bone,
  brain), why rapid weight loss can dump persistent organic pollutants back into circulation
  and drive weight regain, and a five-category framework for reducing toxic load (thoughts,
  what goes in you, what goes on you, what's around you, supporting excretion).
