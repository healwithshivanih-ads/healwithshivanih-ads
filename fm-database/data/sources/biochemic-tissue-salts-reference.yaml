notes: 'The canonical reference text for the Schüssler biochemic tissue-salt system —

  the 12 core cell salts, their traditional indications, and facial-diagnosis

  (Antlitzanalyse) signs. A foundational but historical (19th-century) and

  empirical source; the biochemic system has limited modern clinical-trial

  evidence. Every tissue salt sourced here is tiered fm_specific_thin and framed

  as a gentle optional adjunct, never a prescription. India''s Bio-Combination

  (BC 1–28) formulas derive from the same tradition and are carried by SBL /

  Dr. Reckeweg / Schwabe / Bakson — exact compositions vary by manufacturer and

  should be confirmed against the specific pack.


  Full text ingested from the National Library of Medicine scan of this edition (OCR''d, 432 pp.; NLM
  record 63711110R). The 12 core cell-salt entries'' notes_for_coach carry the characteristic ''Guiding
  Symptoms'' keynotes distilled from it.'
