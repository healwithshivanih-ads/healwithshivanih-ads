notes: Margie Bissinger PT MS is a physical therapist, integrative health coach, certified
  happiness trainer, author, and host of the Happy Bones, Happy Life podcast. She
  brings 25+ years of clinical experience to bone health through a multidimensional
  lens — root-cause inflammation, nutrient sufficiency, mechanical loading, happiness
  set point, and dynamic balance between osteoblasts and osteoclasts. Episode covers
  the epidemiology of osteoporosis (one in two women and one in four men over 50 in
  the US will fracture from osteoporosis), the limits of bone-density measurement
  (which captures density but not quality), root causes (gut dysbiosis, gluten sensitivity,
  PPI use, corticosteroids, hormone decline, undernutrition), the central role of
  vitamin K2 (MK-4 and MK-7) in directing calcium to bone rather than soft tissue,
  why protein needs are higher than the RDA for bone, and the impact-plus-resistance-training
  prescription with the rounding-flexion caution for osteoporotic patients.
