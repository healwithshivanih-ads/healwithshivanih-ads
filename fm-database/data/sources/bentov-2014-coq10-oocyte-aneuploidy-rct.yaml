id: bentov-2014-coq10-oocyte-aneuploidy-rct
title: Coenzyme Q10 Supplementation and Oocyte Aneuploidy in Women Undergoing IVF-ICSI
  Treatment
source_type: peer_reviewed_paper
quality: high
authors:
- Yaakov Bentov
- Tom Hannam
- Andrea Jurisicova
- Navid Esfandiari
- Robert F Casper
year: 2014
publisher: Clinical Medicine Insights — Reproductive Health
doi: 10.4137/CMRH.S14681
url: https://www.ncbi.nlm.nih.gov/pmc/articles/PMC4071761/
notes: 'Small double-blind placebo-controlled RCT of 600 mg/day CoQ10 vs placebo in
  women aged 35-43 undergoing IVF-ICSI, with post-meiotic oocyte aneuploidy measured
  by polar body biopsy + CGH as the primary endpoint. The trial was terminated early
  due to safety concerns about polar body biopsy impact on embryo quality. Final analysis:
  24 women completed cycles (10 CoQ10, 14 placebo). Aneuploidy rate trended toward
  improvement (46.5% CoQ10 vs 62.8% placebo) and clinical pregnancy rate trended higher
  in the CoQ10 arm (33% vs 26.7%), but the study was underpowered. This is the most-cited
  trial-level evidence for CoQ10 in egg quality despite its inconclusive primary endpoint
  — important context for clients researching the evidence base.'
