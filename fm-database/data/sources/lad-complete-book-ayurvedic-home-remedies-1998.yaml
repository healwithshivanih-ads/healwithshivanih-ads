title: The Complete Book of Ayurvedic Home Remedies
source_type: book
quality: moderate
authors:
  - Vasant D. Lad
publisher: Three Rivers Press (Harmony Books / Random House)
year: 1998
notes: >-
  Dr Vasant Lad, B.A.M.S., M.A.Sc., is the founder of The Ayurvedic Institute
  (Albuquerque, NM) and a former professor of clinical medicine at the Tilak
  Ayurveda Mahavidyalaya and Medical Director of the Seth Tarachand Ramnath
  Ayurvedic Hospital (Pune). This is the standard Western lay reference for
  Ayurvedic self-care. Part I covers the doshas, five elements, the twenty
  qualities and prakruti/vikruti; Part II covers daily/seasonal routine,
  pranayama, meditation and the six tastes; Part III is an A-Z encyclopedia of
  illnesses with simple kitchen-herb remedies, healing pastes, teas, oils,
  dietary guidance, yoga asanas and pranayama for each condition. Remedies are
  organised by vata/pitta/kapha pattern and emphasise treating the root cause
  (removing ama, kindling agni, balancing the aggravated dosha) rather than
  suppressing symptoms. Used here as the primary source for net-new HomeRemedy
  catalogue entries. Evidence tier kept conservative (plausible_emerging /
  fm_specific_thin) — these are traditional preparations with mechanistic
  plausibility but thin RCT support. Coach-scope note: the book also describes
  bhasmas (metal/mineral ash), guggulu formulations and panchakarma procedures
  (vaman, virechan, basti, rakta moksha) plus gem/metal/colour therapy — these
  were deliberately NOT ingested as they fall outside lifestyle-coaching scope
  and require a qualified Ayurvedic physician.
