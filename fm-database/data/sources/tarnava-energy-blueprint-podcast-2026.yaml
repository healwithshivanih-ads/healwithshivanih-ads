notes: Alex Tarnava is the inventor of high-concentration molecular hydrogen (H2)
  tablets and a co-author on 170+ clinical trials and 2000+ publications on H2. The
  interview covers H2 as a mitohormetic adaptive stressor and master regulator of
  redox homeostasis (rather than a direct antioxidant), evolutionary fiber-fermentation
  deficit (modern 14 g/day vs paleolithic 100+ g/day) driving endogenous H2 deficiency,
  clinical evidence across metabolic syndrome, NAFLD, weight loss, brain metabolism
  in elderly, exercise performance, and the cancer-adjuvant signal in animal models.
  Critical practical detail — tablets dropped in 500 mL room-temperature water and
  chugged immediately; cold water slows dissolution and increases bubble loss. Evidence
  rationale moderate — interview cites RCTs but is itself expert advocacy.
