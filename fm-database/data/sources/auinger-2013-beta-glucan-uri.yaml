id: auinger-2013-beta-glucan-uri
title: Yeast (1,3)-(1,6)-beta-glucan helps to maintain the body's defence against
  pathogens — a double-blind, randomized, placebo-controlled, multicentric study in
  healthy subjects
authors:
- Auinger A
- Riede L
- Bothe G
- Busch R
- Gruenwald J
year: 2013
publisher: European Journal of Nutrition
source_type: peer_reviewed_paper
quality: high
url: https://pubmed.ncbi.nlm.nih.gov/23340963/
doi: 10.1007/s00394-013-0492-z
notes: DB-RCT in 162 healthy adults supplemented with 900 mg/day yeast-derived insoluble
  (1,3)-(1,6)-β-glucan vs placebo for 16 weeks during cold season. Reduced incidence
  and severity of common cold episodes. One of the cleaner trials behind the 250–500
  mg/day FM dose recommendation.
