id: nagano-2010-hericium-mood-menopause
title: Reduction of depression and anxiety by 4 weeks Hericium erinaceus intake
authors:
- Nagano M
- Shimizu K
- Kondo R
- Hayashi C
- Sato D
- Kitagawa K
- Ohnuki K
year: 2010
publisher: Biomedical Research (Tokyo)
source_type: peer_reviewed_paper
quality: moderate
url: https://pubmed.ncbi.nlm.nih.gov/20834180/
doi: 10.2220/biomedres.31.231
notes: DB-RCT, n=30 menopausal women (Japan). 4 weeks of Hericium-containing cookies.
  Significant reductions on CES-D depression scale + Indefinite Complaints Index vs
  placebo, particularly on 'insentive' and 'palpitatio' subscales. Authors propose
  a mechanism distinct from NGF-enhancement. Small sample, short duration, but useful
  for perimenopausal mood claims.
