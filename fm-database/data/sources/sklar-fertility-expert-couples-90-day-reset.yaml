notes: Couples-level framing — 50% of infertility is male-factor or contributory.
  Spermatogenesis takes ~60-75 days with full epididymal transit pushing the actionable
  window to 90-120 days, so both partners need to start changes together. Covers testicular
  thermoregulation (saunas, hot tubs, laptop heat, synthetic underwear, prolonged
  sitting), the exogenous testosterone trap (suppresses FSH/LH and endogenous spermatogenesis),
  shared nutrition and toxin-reduction protocols, and partnership communication framing.
