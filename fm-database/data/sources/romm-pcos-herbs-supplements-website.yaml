notes: "Evidence-aware clinical synthesis by Aviva Romm MD — integrative physician,
  herbalist, and guest editor of HerbalGram Issue 121. Covers 10 botanical/nutritional
  interventions for PCOS with dosing and mechanism summaries. Not peer-reviewed but
  authored by a leading authority on botanical medicine for women's health. Underlying
  RCTs cited include Rizk et al. (Fertility and Sterility 2005) for NAC + clomiphene,
  and Grant 2010 for spearmint. Use as practitioner-level synthesis; treat individual
  study citations as plausible_emerging until independently confirmed."
