id: brooks-2008-maca-postmenopausal-psychological-sexual
title: Beneficial effects of Lepidium meyenii (Maca) on psychological symptoms and
  measures of sexual dysfunction in postmenopausal women are not related to estrogen
  or androgen content
source_type: peer_reviewed_paper
quality: moderate
authors:
- Brooks NA
- Wilcox G
- Walker KZ
- Ashton JF
- Cox MB
- Stojanovska L
publisher: Menopause
year: 2008
url: https://pubmed.ncbi.nlm.nih.gov/18784609/
doi: 10.1097/gme.0b013e3181732953
notes: Randomized double-blind placebo-controlled crossover trial in 14 postmenopausal
  women receiving 3.5 g/day powdered maca for 6 weeks alternated with placebo. Greene
  Climacteric Scale showed significant reductions in anxiety, depression, and sexual
  dysfunction subscales after maca. Serum estradiol, FSH, LH and SHBG were unchanged.
  Yeast-based receptor assays showed no estrogenic or androgenic activity, supporting
  an HPA-axis rather than phytoestrogenic mechanism. Small sample (n=14) is the main
  limit; crossover design strengthens internal validity.
