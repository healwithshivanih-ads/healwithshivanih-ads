notes: Dr James Chestnut is a Canadian chiropractor, author of Live Right for Your
  Species Type and several earlier wellness works, and founder of Eat Well Move Well
  Think Well. The interview is Part 2 of a multi-part series — anchors a deeply paradigmatic
  argument that human chronic illness is not genetic defect or "drug deficiency" but
  the epigenetic expression of a mismatch between modern lifestyle inputs and the
  human genome's evolved requirements. Covers (1) the genome-as-recipe-book vs epigenome-as-master-chef
  distinction (every cell genetically identical, divergent expression driven by epigenetic
  regulation), (2) genuine genetic disease vs the "susceptibility gene" fallacy (true
  genetic disease ~2 percent of all illness; susceptibility-gene framing is logically
  incoherent — needs the environmental trigger to express), (3) sufficiency-deficiency-toxicity
  model as the universal biological law of illness across species, (4) the "live right
  for your species type" framework — supply essential nutrients, avoid evolutionarily
  novel toxins, match movement and social architecture to the genome, (5) the fire-department
  vs maintenance-contractor metaphor for sick-care vs health-care. Evidence rationale
  moderate — paradigmatic / philosophical synthesis grounded in basic biology rather
  than novel data.
