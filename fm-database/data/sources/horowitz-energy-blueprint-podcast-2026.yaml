notes: 74-minute interview with Dr Richard Horowitz, board-certified internist, Medical
  Director of the Hudson Valley Healing Arts Center. 41 years experience treating
  13,000+ chronically ill patients with Lyme and tick-borne disease. Originator of
  the MSIDS (Multiple Systemic Infectious Disease Syndrome) 16-point framework. Books
  — Why Can't I Get Better?, How Can I Get Better?, Ending Chronic Illness (Simon
  & Schuster Oct 2026). 10 published articles 2016-present on Dapsone Combination
  Therapy. 11th article (J Alzheimer's Dis Reports 2026) reports first Alzheimer's
  biomarker reversal in live patient via DDS-CT (p-tau 217 down 63% in 9 weeks vs
  ~23% in 6 years with anti-amyloid mAbs). Coach reference for chronic Lyme, MSIDS
  framework, persister-biofilm bacterial paradigm. Evidence weighting is moderate
  — clinician-expert synthesis with published peer-reviewed support but no randomised
  multi-centre placebo trial yet.
