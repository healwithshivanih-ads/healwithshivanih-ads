notes: 'Dale Bredesen MD is a neurologist (training at Caltech, MIT, Duke, UCSF) who
  founded the Bredesen Laboratory in 1989 to study the molecular basis of neurodegeneration.
  His group has published 200+ papers on Alzheimer''s mechanisms and developed the
  ReCODE (Reversal of Cognitive Decline) protocol — a precision-medicine functional
  approach treating Alzheimer''s as a network insufficiency driven by chronic mild
  inflammation ("cytokine drizzle") and energetic failure. Bestselling author of The
  End of Alzheimer''s. Episode covers the four-stage progression (asymptomatic → SCI
  → MCI → dementia), the cognoscopy screen, the seven-pillar core protocol, and precision
  sub-protocols for pathogens (P. gingivalis, HSV-1, HHV-6A), hypercoagulability,
  mycotoxins, and bioidentical hormones. Expert consensus tier: paraphrased clinical
  claims from a recognised neurology researcher; quote-anchored to the podcast and
  cross-cited with published ReCODE trial data where applicable.'
