notes: Eric Balcavage DC is a functional medicine clinician and co-author of The Thyroid
  Debacle who argues that the vast majority of "hypothyroidism" presentations are
  not gland failure but adaptive cellular downregulation in response to chronic stress.
  His framework — "cellular hypothyroidism" — positions the mitochondria as the master
  regulator that flips the cell between manufacturing mode (high T3, high ATP output)
  and cell-defense mode (low T3, low mitochondrial density, fewer free radicals to
  conserve antioxidants for the defense response). Episode covers why pushing T4/T3/T2
  replacement fails when the cell is intentionally downregulated, why CoQ10 tests
  often appear normal in hypothyroid patients (substrate not being used), and the
  "fitness factors" framework (emotional, physical, metabolic, dietary, sleep, respiratory,
  habitual) used in clinical practice to identify and reduce stressors before adding
  any supplement. Owns the Rejuvagen Center practice in Pennsylvania.
