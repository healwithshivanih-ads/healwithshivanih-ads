notes: Chris Masterjohn PhD is a nutritional-biochemistry specialist focused on vitamins,
  minerals, and inborn errors of metabolism. Episode covers his framework for mitochondrial
  nutrition — the leptin-insulin-cortisol whole-body energy regulator that gates whether
  the brain "permits" mitochondrial output; the 1,400+ inborn errors of metabolism
  (most very rare individually, common collectively as carrier-state 30-50% enzyme
  impairments that respond to mega-dose single nutrients); Zone 2 cardio as the unobvious
  mitochondrial low- hanging fruit; the case for personalised fasting-feeding windows;
  and his strong position that subjective "low blood sugar" between meals is usually
  low ATP rather than low glucose, especially in people with partial mitochondrial
  enzyme impairments who produce toxic metabolic intermediates from their food.
