notes: Pre-IVF and post-failed-IVF workup framework — Sklar's five test categories
  most fertility clinics omit when an embryo transfer fails despite a euploid embryo
  and adequate lining. Categories are reproductive immunology (NK cells, TH1/TH2 balance,
  antiphospholipid antibodies), ERA / EMMA / ALICE endometrial receptivity and microbiome
  panels, comprehensive thyroid plus autoimmunity, methylation and thrombophilia (MTHFR,
  Factor V Leiden, prothrombin, Protein C/S, PAI-1), and comprehensive gut testing
  (stool analysis, OAT, food sensitivities).
