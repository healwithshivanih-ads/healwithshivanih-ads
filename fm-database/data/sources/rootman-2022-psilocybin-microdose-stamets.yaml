notes: 'Naturalistic observational study, n=953 psilocybin microdosers + 180 controls,
  30-day follow-up.

  Lion''s mane (Hericium erinaceus) examined as part of the ''Stamets Stack'' (psilocybin
  + HE + niacin).

  Mood/mental-health improvements were observed in microdosers but the lion''s mane
  + B3 combination

  did NOT add to those improvements vs psilocybin alone — except a psychomotor improvement

  specifically in older adults.


