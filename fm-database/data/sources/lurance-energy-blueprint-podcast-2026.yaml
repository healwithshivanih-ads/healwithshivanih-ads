notes: Dr John LaRance runs the Advanced Rejuvenation Center in Sarasota, Florida,
  and is the author of Melatonin Miracle Molecule. Founder of Mitozen, which sells
  high-dose melatonin and methylene blue products. The interview covers melatonin's
  role far beyond sleep — extra-pineal melatonin produced by every mitochondrion in
  every cell (400x more in gut than pineal), absence of negative feedback on endogenous
  production with exogenous dosing, absence of toxicity ceiling across studied doses,
  mitohormesis-window-widening effect, and the clinical use of high doses (100-1000+
  mg) for cancer, neurodegenerative disease, IBD, and stress states. Plus methylene
  blue physiology — complex I/II/III upregulation by ~110 percent and complex IV by
  ~70 percent, with red light at 660 nm completing the cytochrome C support. Critical
  safety — methylene blue is a MAOI; the SSRI contraindication is genuine at very
  high IV doses but the absolute prohibition has been walked back by Mayo Clinic and
  Canadian health authorities for standard oral dosing. Evidence rationale moderate
  — expert clinical synthesis citing Russell Reiter and Francisco Gonzalez-Lima research.
