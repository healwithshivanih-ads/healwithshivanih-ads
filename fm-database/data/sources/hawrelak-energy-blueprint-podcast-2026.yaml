notes: 'Jason Hawrelak ND PhD is a global authority on the gut microbiome with 20+
  years of stool-testing clinical practice and head of research at ProbioticAdvisor.com
  (the curated strain-specific probiotics evidence database). Episode walks through
  his three-axis assessment framework — (1) transit time via corn-seed test (Bristol-4
  daily clients can still take 26 days; the "perfect poo" doesn''t guarantee fast
  transit); (2) microbiome composition with focus on Proteobacteria (lipopolysaccharide-rich
  gram-negative bacteria, range 0.4-50% across his clients, driving metabolic endotoxaemia,
  insulin resistance, blood-brain barrier damage, and mitochondrial poisoning) vs
  butyrate producers (range 2-65%, anti-inflammatory healing of gut + BBB); (3) gut
  integrity. Plus the strain-specificity reality (Doberman vs Chihuahua are the same
  species but not interchangeable), the colonisation myth (modern probiotics are temporary
  visitors lasting 5-14 days), Lactobacillus reuteri DSM-17938 (Biogaia) at 100-200
  million CFU outperforming 60-billion-CFU multistrain blends for specific applications,
  and butyrate as Dr Datis Kharrazian''s #1 brain-health compound.'
