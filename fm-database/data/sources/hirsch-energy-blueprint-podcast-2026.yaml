notes: Evan Hirsch MD is a family-medicine physician (University of Washington) and
  self-trained functional-medicine fatigue specialist who recovered from 5 years of
  his own chronic fatigue and reports helping ~1,000 clients through his Fix Your
  Fatigue programme. Episode walks through his "16 nails in the foot" framework —
  chronic fatigue is rarely caused by ONE thing; it is the cumulative load of multiple
  stressors that simultaneously must be addressed. Hirsch's four "usual suspects"
  categories — (1) heavy metals (lead, mercury, arsenic, cadmium); (2) chemicals (84,000+
  environmental compounds, only 10% tested); (3) molds / mycotoxins (~50% of US buildings
  have water damage); (4) chronic infections (Epstein-Barr, Lyme + co-infections Bartonella
  + Babesia, mycoplasma, Yersinia). Plus the structural-foundation rule — replace
  nutrient deficiencies and support adrenals/thyroid BEFORE going after any of the
  usual suspects, because die-off response without resilience makes clients worse.
