notes: >-
  Dr Claudia Welch (Doctor of Oriental Medicine, Ayurvedic practitioner, student
  of Dr Vasant Lad and Dr Robert Svoboda) integrates Ayurveda, Chinese medicine
  and Western endocrinology into a women's hormonal-health framework. Core thesis:
  the body trades resources between "stress hormones" (cortisol/adrenaline) and
  "sex hormones" (estrogen/progesterone) — chronic stress + an erratic modern
  lifestyle drives sex-hormone imbalance, so the durable fix is the "three pillars"
  of diet, lifestyle and stress management rather than hormones alone. Covers
  the yin/yang (sex vs stress) hormone model, menstruation & menstrual disorders,
  fertility, breast health, perimenopause/menopause, heart & bone health, and
  diet/lifestyle/stress protocols (routine, abhyanga, alternate-nostril breathing,
  food quality). Used here to extract coach-usable Claims (hormone physiology +
  the three-pillars lifestyle content) linked to existing hormone topics/mechanisms.
  Evidence-tier note: blends conventional physiology (stronger) with Ayurveda/TCM
  framing and some pro-BHRT / contrarian positions (kept at plausible_emerging /
  fm_specific_thin, or confirm_with_clinician with caveats). NBHWC-scope note:
  prescribing-adjacent material (HRT/bioidentical hormone dosing) is captured as
  education-only with refer-to-physician flags — the coach does not prescribe.
