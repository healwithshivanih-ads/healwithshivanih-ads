notes: Open-access review article from the Sagol Center for Hyperbaric Medicine and
  Research (Shamir Medical Center) and Tel Aviv University. Provides the formal mechanistic
  framework underlying modern HBOT — oxygen physiology, cellular oxygen sensing, HIF-1-alpha
  stabilisation and degradation, VEGF-driven angiogenesis, SIRT1 and mitochondrial
  biogenesis, stem cell proliferation, and the cellular cascade triggered by intermittent
  hyperoxia. Foundational reference for the paradox concept. Source quality high —
  peer-reviewed, open access, cited 500+ times since 2020. CC BY 4.0 licence.
