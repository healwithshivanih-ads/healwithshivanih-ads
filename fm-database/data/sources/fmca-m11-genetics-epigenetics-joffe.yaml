notes: '73-minute FMCA webinar + conversation. Dr Yael Joffe (PhD nutrigenomics, RD,
  25 years in genetics; Chief Science Officer of 3X4 Genetics) with Monique Class.
  Teaches the coach-facing use of genetic + epigenetic testing: genetics gives insight
  (''the why''), epigenetics determines action (''the what to do''). Core frame is
  polygenic (group + score genes) not single-gene, low-penetrance variants, and staying
  in coaching scope (execute diet/lifestyle, reinforce provider recs, never interpret
  genes diagnostically). Illustrated with the ''Mary'' (age 53) case study — detox,
  hormone-balance, histamine, mood/behaviour and clotting gene panels. Slides + transcript
  downloaded to the mirror. Evidence weighting: high for the coaching-scope + epigenetic-lifestyle
  framework; individual gene claims are plausible_emerging (nutrigenomics is an emerging,
  low-penetrance field).'
