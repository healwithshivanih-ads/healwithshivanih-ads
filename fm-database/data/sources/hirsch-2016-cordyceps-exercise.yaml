id: hirsch-2016-cordyceps-exercise
title: Cordyceps militaris Improves Tolerance to High-Intensity Exercise After Acute
  and Chronic Supplementation
authors:
- Hirsch KR
- Smith-Ryan AE
- Roelofs EJ
- Trexler ET
- Mock MG
year: 2016
publisher: Journal of Dietary Supplements
source_type: peer_reviewed_paper
quality: moderate
url: https://pubmed.ncbi.nlm.nih.gov/27408987/
doi: 10.1080/19390211.2016.1203386
notes: DB-RCT crossover, n=28 healthy adults. 4 g/day Cordyceps-containing mushroom
  blend (MR) vs maltodextrin (PL). After 1 week — no significant changes. After 3
  weeks — VO₂max improved +4.8 ml/kg/min in MR (p=0.042) vs +0.9 PL; time-to-exhaustion
  improved at 1 week (+28.1 s) and 3 weeks (+69.8 s). Supports the chronic-supplementation
  > acute pattern for endurance benefit. Blend (not pure cordyceps) limits interpretation.
