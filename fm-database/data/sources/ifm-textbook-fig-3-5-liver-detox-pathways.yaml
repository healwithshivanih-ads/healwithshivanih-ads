notes: 'Canonical IFM teaching diagram showing the full liver detoxification

  pathway: lipid-soluble toxin entry, Phase 1 (CYP450) reactions and

  nutrient cofactors, reactive intermediates and superoxide/free radical

  generation, antioxidant protective nutrients, Phase 2 conjugation

  reactions and conjugating substrates, water-soluble excretory

  derivatives, and bile / urine elimination routes. Also names

  endotoxins (metabolic byproducts, bacterial) vs exotoxins (drugs,

  agricultural chemicals, food additives, household, pollutants,

  microbial). Reproduced across IFM and FMCA teaching materials.

  Foundational citation for any Phase 1 / Phase 2 cofactor claim.

