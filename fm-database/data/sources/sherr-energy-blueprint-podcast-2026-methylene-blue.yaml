notes: Dr Scott Sherr is a board-certified internal medicine physician, certified
  in Health Optimization Medicine, specialist in hyperbaric oxygen therapy, and COO
  of Troscriptions. The interview covers (1) methylene blue dose-response curve, mitochondrial
  complex IV bypass mechanism, and clinical use cases including airplane hypoxia,
  chronic fatigue, and neurodegenerative disease, with reference to Francisco Gonzalez-Lima's
  University of Texas Austin research; and (2) GABA-glutamate balance, sympathetic
  dominance, leaky gut to leaky brain to GABA deficiency cascade, dietary and lifestyle
  drivers, and GABA-mimetic supplementation (muscimol from Amanita muscaria, cava,
  magnolia bark honokiol, cordycepin). Evidence rationale moderate — clinical synthesis
  with citations to peer-reviewed mechanism work but interview itself.
