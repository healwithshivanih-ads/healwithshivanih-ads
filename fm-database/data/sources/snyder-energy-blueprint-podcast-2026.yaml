notes: Mariza Snyder DC is a women's hormonal health expert with 17+ years of practice.
  Author of The Perimenopause Revolution. Episode recorded on the day the FDA announced
  the removal of the black-box warning on HRT (after 20 years). Snyder walks through
  the perimenopause vs menopause definitions, the four-to-ten-year erratic-hormone
  window in perimenopause, the late-reproductive stage (mid-30s) when anovulatory
  cycles begin, the Women's Health Initiative misreading (absolute risk of 4-vs-5
  cases of breast cancer per 1,000 women framed as 25% relative risk), the case for
  HRT in the early-perimenopausal window, vaginal estrogen for genitourinary symptoms
  (preventing UTIs that drive women into assisted living), and her four pillars (data
  + cellular energy + circadian rhythm + community).
