notes: Christopher Pickard DC is a UK-based functional-medicine chiropractor and founder
  of BeatBloodPressure.com. He focuses on root-cause approaches to essential hypertension,
  drawing on Dr Mark Houston's framework (inflammation, oxidative stress, immune-vascular
  disorders as the three proximate drivers) and Dr Bob Rakowski's "Magnificent Seven"
  lifestyle pillars (think, communicate, eat, drink, move, sleep, detox). Episode
  covers nasal-breathing-only exercise prescriptions, the humming-and-inhale nitric-oxide
  protocol, the oral-microbiome / mouthwash / nitric-oxide systemic blood pressure
  pathway, citrulline from watermelon, arginine from walnuts, hibiscus tea, aged garlic
  extract, and how blood pressure medications can mask root causes (illustrated by
  a case study of a patient whose back pain resolved after stopping a BP drug causing
  acid-base dysregulation).
