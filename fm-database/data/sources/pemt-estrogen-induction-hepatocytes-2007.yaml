id: pemt-estrogen-induction-hepatocytes-2007
title: Phosphatidylethanolamine N-methyltransferase (PEMT) Gene Expression Is
  Induced by Estrogen in Human and Mouse Primary Hepatocytes
source_type: peer_reviewed_paper
quality: high
year: 2007
publisher: PubMed
url: https://pubmed.ncbi.nlm.nih.gov/17456783/
notes: Mechanistic study showing 17-beta-estradiol dose-dependently upregulates
  PEMT transcription in primary hepatocytes — the biological basis for why
  premenopausal women are relatively protected from choline-deficiency-driven
  fatty liver, and why that protection is lost as estrogen declines
  (perimenopause/menopause).
