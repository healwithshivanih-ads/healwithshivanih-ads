notes: Long-form 116-minute Sherr interview on Jesse Chappus's channel. Sherr is a
  board-certified internal medicine + hyperbaric medicine physician, co-founder of
  Troscriptions (USP-grade methylene blue) and Health Optimization Medicine and Practice
  framework (HOMe/HOPe). Episode angle is population epidemiology of mitochondrial
  dysfunction, the clinical decision-tree for methylene blue dosing, redox-cycling
  biochemistry, vitamin C interaction, dosing schedule pharmacokinetics, special populations
  (pediatric, pregnancy, kidney, BP), and the "not a fix-it pill" lifestyle integration
  framing. Complements two existing Sherr methylene blue podcast sources (Energy Blueprint
  + Mind Pump) by adding the population-prevalence + decision-tree depth they lacked.
