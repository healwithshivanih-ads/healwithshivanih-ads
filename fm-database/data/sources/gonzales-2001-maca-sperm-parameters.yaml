id: gonzales-2001-maca-sperm-parameters
title: Lepidium meyenii (Maca) improved semen parameters in adult men
source_type: peer_reviewed_paper
quality: moderate
authors:
- Gonzales GF
- Cordova A
- Gonzales C
- Chung A
- Vega K
- Villena A
publisher: Asian Journal of Andrology
year: 2001
url: https://pubmed.ncbi.nlm.nih.gov/11753476/
notes: Open-label 4-month study in nine normal men aged 24-44 receiving 1500 or 3000
  mg/day of maca tablets. Seminal volume, total sperm count per ejaculum, motile sperm
  count, and sperm motility all increased. Serum LH, FSH, prolactin, testosterone
  and estradiol unchanged. Small sample and absence of placebo are key limits — findings
  are hypothesis-generating not pivotal.
