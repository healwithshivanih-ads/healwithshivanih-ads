id: mori-2009-hericium-mci
title: 'Improving effects of the mushroom Yamabushitake (Hericium erinaceus) on mild
  cognitive impairment: a double-blind placebo-controlled clinical trial'
authors:
- Mori K
- Inatomi S
- Ouchi K
- Azumi Y
- Tuchida T
year: 2009
publisher: Phytotherapy Research
source_type: peer_reviewed_paper
quality: high
url: https://pubmed.ncbi.nlm.nih.gov/18844328/
doi: 10.1002/ptr.2634
notes: 'DB-RCT, n=30 Japanese adults aged 50–80 with MCI. 3 g/day Hericium dry powder
  (4× 250 mg tablets × 3/day, 96% dry powder) for 16 weeks. Significant improvement
  on HDS-R cognitive scale at weeks 8, 12, 16 vs placebo; benefit faded by week 4
  post-discontinuation (suggests sustained intake required). No adverse effects. Conflict:
  lead author affiliated with Hokuto Corporation Mushroom Laboratory.'
