notes: Lara Briden is a Sydney-based naturopathic doctor with 20+ years experience
  in women's hormone clinic practice (PCOS, PMS, endometriosis, perimenopause). The
  Period Repair Manual synthesises hundreds of peer-reviewed studies into actionable
  naturopathic protocols and is widely regarded as the standard FM/ND reference for
  treating menstrual cycle disorders. Key contributions include reframing the period
  as a vital sign (citing the 2015 ACOG/AAP statement), distinguishing pill bleeds
  from real ovulatory periods, the four-subtype model of PCOS (insulin-resistant,
  post-pill, adrenal, inflammatory), and specific phytotherapeutic protocols (Vitex,
  peony+licorice, magnesium glycinate). Note — the ingest used the publicly available
  60-page sample covering Chapters 1-2 only; later chapters (PCOS subtypes, PMS, dysmenorrhoea/endometriosis,
  perimenopause, advanced troubleshooting) cited in the book's table of contents are
  not in the sample and were not extracted.
