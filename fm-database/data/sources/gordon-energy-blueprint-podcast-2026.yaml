notes: Eric Gordon MD has 40+ years in clinical practice specialising in complex chronic
  illness — Lyme, mould, Bartonella, Babesia, mast cell activation, ME/CFS, long COVID.
  Long-time collaborator with Dr Robert Naviaux (UCSD), the pioneer of the Cell Danger
  Response (CDR) framework. Episode is a deep dive on Naviaux's CDR paradigm — mitochondria
  as immune sensors (not just ATP factories), the three stages of CDR (CDR1 inflammatory
  signalling, CDR2 proliferative growth, CDR3 restoration of cell-to-cell communication),
  how chronic illness represents "stuck CDR" in a mosaic of cells throughout the body,
  the salugenesis (healing) framework, and the clinical implication that giving mitochondrial
  support (NAD, CoQ10) BEFORE removing the inflammatory insult often makes chronic-illness
  clients worse.
