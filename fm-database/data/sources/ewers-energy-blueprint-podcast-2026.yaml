notes: Keesha Ewers PhD is a board-certified functional medicine practitioner, doctor
  of psychology, trauma-informed psychotherapist, MAPS-certified MDMA-assisted psychotherapy
  therapist, conscious dying doula, and founder of the Academy for Integrative Medicine
  Health Coach Certification Program. After conducting the HURT (Healing Unresolved
  Trauma) study in 2013, she developed the HURT model — an autoimmunity-as-undigested-anger
  framework drawing on Ayurveda, with a focus on willingness to self-confront as the
  pivot between post-traumatic stress disorder (looping maladaptive cycles) and post-traumatic
  growth (integration and skill-building). Episode covers her own rheumatoid arthritis
  reversal in her 30s, the mitochondrial-perception connection (perceptions activate
  the cell danger response, not just hormones), the difference between resolved and
  unresolved trauma, and a pebbles-journal exercise for tracking life-affirming vs
  life-destructive thought patterns.
