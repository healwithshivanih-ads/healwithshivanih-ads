notes: 'Izabella Wentz PharmD is a licensed pharmacist and thyroid specialist who
  developed Hashimoto''s herself in 2009. Author of three Hashimoto''s books (the
  Hashimoto''s Protocol was a #1 New York Times bestseller) and most recently The
  Adrenal Transformation Protocol — a 4-week program piloted with over 3,000 Hashimoto''s
  clients, 80% of whom reported feeling significantly better. Episode walks through
  her reframing of "adrenal fatigue" as HPA-axis dysregulation (not true Addisonian
  insufficiency), the flat-line cortisol curve commonly seen in long-standing thyroid
  clients, the 15-safety-signal framework, blood sugar / circadian / micronutrient
  priorities, and her position that lifestyle work (not testing or hormones) is the
  first move for almost every chronically-stressed midlife woman.'
