id: gstm1-gstt1-healthy-volunteers-worldwide-review-2022
title: GSTM1 and GSTT1 Polymorphisms in Healthy Volunteers — A Worldwide Systematic
  Review
source_type: peer_reviewed_paper
quality: high
year: 2022
publisher: PubMed
url: https://pubmed.ncbi.nlm.nih.gov/35103568/
notes: Systematic review of GSTM1/GSTT1 "null genotype" (complete gene deletion)
  population frequencies worldwide. East Asian populations show the highest
  null-genotype frequencies; Sub-Saharan African populations the lowest for GSTM1.
  Useful baseline for not overstating rarity/significance of a null result to an
  Indian client.
