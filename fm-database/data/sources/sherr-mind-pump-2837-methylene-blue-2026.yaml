notes: 78-minute podcast interview with Dr Scott Sherr (board-certified internal medicine
  + hyperbaric oxygen physician, founder of Troscriptions). Mind Pump is a fitness/training
  audience, so the conversation emphasises performance, recovery, travel and training
  applications of methylene blue rather than general mitochondrial theory. Sherr discusses
  dose titration in 4 mg increments via troche, the parasympathetic-edge framing for
  athletes, pre-flight dosing against cabin hypoxia, Leadville ultramarathon time-cut
  anecdote, supplement sourcing fraud on Amazon (USP-grade vs heavy-metal-contaminated
  knockoffs), GABA receptor pharmacology and the cortisol-junkie / sympathetic-spiral
  pattern in chronic over-trainers.
