notes: Part two of Mel Hopper Koppelman's conversation series with Ari Whitten, focused
  on childhood brain development as a determinant of adult chronic illness. Draws
  on the clinical work of Dr Robert Melillo (functional disconnection syndrome) and
  studies the left-versus-right brain hemisphere lateralisation in depth — left hemisphere
  upregulates the immune system; right hemisphere calms it down. Episode covers retained
  primitive reflexes as an objective marker of brain-stem immaturity (never normal
  in adults), the rooting reflex test, functional disconnection syndrome (where the
  two hemispheres mature at different rates and fail to integrate), how hemispheric
  imbalance maps onto adult patterns (left-dominant — autoimmunity, sensory blunting,
  ADHD/autism cluster; right-dominant — chronic infections, MCAS-style hypersensitivity,
  major depression, low white blood cell counts), and targeted rehabilitation via
  primitive-reflex integration and unilateral sensory stimulation.
