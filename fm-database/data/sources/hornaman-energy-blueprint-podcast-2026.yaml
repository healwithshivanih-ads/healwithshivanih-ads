notes: Amie Hornaman ("The Thyroid Fixer") is founder of the Institute for Thyroid
  and Hormone Optimization. Came to functional thyroid work after her own Hashimoto's
  was missed by 10+ conventional doctors. Episode covers the three-legged-stool autoimmune
  model (Fasano), gluten molecular mimicry as a primary Hashimoto's driver, the full
  thyroid panel (TSH/freeT3/freeT4/reverseT3/T2/TPO/TGab) vs the TSH-only conventional
  approach, the case for including T3 (and sometimes T2 from natural-desiccated-thyroid)
  in replacement, testosterone as autoimmune- protective in both sexes, and the "any
  TPO antibody is the start of Hashimoto's" lab-interpretation philosophy. Expert
  opinion tier — clinical patterns shared from her own practice and her debate-point
  disagreements with Eric Balcavage are flagged accordingly.
