notes: Dr Scott Sherr is a board-certified internal medicine physician specialising
  in hyperbaric oxygen therapy and health optimisation medicine, consulting to HBOT
  clinics worldwide. The interview covers the physics and physiology of HBOT (Henry's
  Law dissolving extra O2 into plasma at pressure, ~4-fold increased tissue diffusion
  depth, vasoconstriction with paradoxical higher tissue O2 delivery), pressure thresholds
  (1.3 ATA soft chambers vs 2.0+ ATA hard chambers — different clinical use cases),
  FDA-approved insurance-covered indications (diabetic foot ulcers, radiation injury,
  chronic osteomyelitis, sudden hearing loss, carbon monoxide poisoning, traumatic
  crush injuries) versus investigational uses (TBI, stroke, MS, autoimmune flares,
  CRPS, longevity/reverse-aging programmes per Shai Efrati's Tel Aviv work), and cumulative
  epigenetic protocols (Mon-Fri x 20-60 sessions for chronic illness, 60-90 min per
  session). Critical safety — soft chambers OK for cognitive support but inadequate
  for infection clearance; chronic Lyme and ME/CFS clients herx hard at deep pressures
  and need slow titration; ketogenic diet stacks well with HBOT for some cancers but
  oncologic use is adjuvant only. Evidence rationale moderate.
