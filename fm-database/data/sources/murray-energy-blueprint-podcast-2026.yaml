notes: Michael Murray ND is one of the founding fathers of modern naturopathic medicine,
  co-author of the Encyclopedia of Natural Medicine and author of 40+ books. Episode
  covers — the dimmer-switch model of mitochondrial energy; iron deficiency as the
  most common nutrient cause of fatigue (with serum ferritin <50 ng/mL as Murray's
  coach action threshold; >80% of female endurance athletes deficient); Tylenol /
  acetaminophen as one of the worst regular mitochondrial poisons (50 million Americans
  use weekly, dramatically depletes glutathione); the body produces approximately
  its own weight in ATP per day; flavonoids' indirect mechanism via Nrf2 activation
  (8,000+ flavonoids identified, the glucuronidase release at sites of inflammation
  enables targeted delivery); and the hormetic-stress paradigm replacing the simple
  "antioxidants good, oxidants bad" model. Anti-inflammatories like NSAIDs paradoxically
  increase chronic pain by suppressing resolvin formation.
