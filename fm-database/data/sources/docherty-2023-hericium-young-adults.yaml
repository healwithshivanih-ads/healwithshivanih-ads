id: docherty-2023-hericium-young-adults
title: The Acute and Chronic Effects of Lion's Mane Mushroom Supplementation on Cognitive
  Function, Stress and Mood in Young Adults — A Double-Blind, Parallel Groups, Pilot
  Study
authors:
- Docherty S
- Doughty FL
- Smith EF
year: 2023
publisher: Nutrients
source_type: peer_reviewed_paper
quality: moderate
url: https://pubmed.ncbi.nlm.nih.gov/38004235/
doi: 10.3390/nu15224842
notes: Pilot DB-RCT, n=41 healthy adults aged 18–45. 1.8 g/day Hericium for 28 days.
  Acute (60-min post single dose) — faster Stroop performance (p=0.005). Chronic (28-day)
  — trend toward reduced subjective stress (p=0.051). Small sample, pilot — authors
  urge caution. Confirms acute attentional effect in healthy non-elderly cohort.
