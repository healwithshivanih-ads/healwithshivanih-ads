notes_for_coach: "Peer-reviewed quarterly journal special issue on women's botanical medicine. Guest-edited by Aviva Romm MD and Tieraona Low Dog MD — two of the most clinically credible botanical medicine voices in North American integrative medicine. Contains: Black Cohosh herb profile (30+ RCTs, 11,073-patient safety dataset, CNS mechanism confirmed); RCTs on chamomile + damask rose aromatherapy in labour; systematic review of soy/hops/kava/red clover for menopausal depression/anxiety; two RCTs on cinnamon 1500mg for PCOS insulin resistance; Q&A editorial with Romm + Low Dog on clinical practice; full article on botanicals during/after breast cancer treatment (turmeric, American ginseng, ginger, turkey tail PSK). ABC is the authoritative North American body for botanical medicine quality standards."
