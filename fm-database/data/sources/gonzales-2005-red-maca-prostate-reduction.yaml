id: gonzales-2005-red-maca-prostate-reduction
title: Red maca (Lepidium meyenii) reduced prostate size in rats
source_type: peer_reviewed_paper
quality: low
authors:
- Gonzales GF
- Miranda S
- Nieto J
- Fernandez G
- Yucra S
- Rubio J
- Yi P
- Gasco M
publisher: Reproductive Biology and Endocrinology
year: 2005
url: https://pubmed.ncbi.nlm.nih.gov/15661081/
doi: 10.1186/1477-7827-3-5
notes: Animal study in male rats comparing aqueous extracts of yellow, black, and
  red maca ecotypes against placebo and testosterone-enanthate co-treatment. Only
  red maca reduced ventral prostate weight and epithelial height, and only red maca
  prevented testosterone-enanthate-induced prostate growth. Serum testosterone and
  estradiol were unchanged. Animal-only data — quality marked low for human translation;
  informs hypothesis-level use of red maca for BPH.
