notes: Julie Matthews is a Certified Nutrition Consultant with an MS in Medical Nutrition
  from Arizona State University; she has 20 years' clinical experience in personalised
  nutrition for autism spectrum disorder and ADHD and co-authored two published research
  studies (2024) on therapeutic diets for autism. Author of The Personalised Autism
  Nutrition Plan (released 2026). Interview covers 13 therapeutic diet types tested
  in 800-family survey study, symptom-cluster diet matching (silicates, oxalates,
  FODMAPs, amines/histamine, glutamate), the gluten-casein opioid hypothesis in autism,
  sulfation pathway deficits, mitochondrial nutrient strategies for kids, and gradual
  introduction frameworks to manage adherence in picky-eating children. Evidence rationale
  moderate — peer-reviewed survey study cited but interview itself is expert synthesis.
