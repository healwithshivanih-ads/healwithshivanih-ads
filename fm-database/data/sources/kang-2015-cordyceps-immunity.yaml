id: kang-2015-cordyceps-immunity
title: Cordyceps militaris Enhances Cell-Mediated Immunity in Healthy Korean Men
authors:
- Kang HJ
- Baik HW
- Kim SJ
- and others
year: 2015
publisher: Journal of Medicinal Food
source_type: peer_reviewed_paper
quality: high
url: https://pubmed.ncbi.nlm.nih.gov/26284906/
doi: 10.1089/jmf.2014.3350
notes: 'DB-RCT, n=79 healthy Korean men. 1.5 g/day ethanol-treated C. militaris caps
  for 4 weeks vs placebo. Significant increases vs baseline + vs placebo for: NK cell
  activity (p=0.0010), lymphocyte proliferation index (p<0.0001), IL-2 (p=0.0096),
  IFN-γ (p=0.0126). No significant adverse reactions. Strong cell-mediated immunity
  claim.'
