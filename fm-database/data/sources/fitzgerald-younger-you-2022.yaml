notes: 'Functional medicine ND, lead author of the 2021 ''Methylation Diet and Lifestyle''
  8-week pilot RCT (Aging journal) that lowered Horvath DNA-methylation biological
  age by an average 3.23 years vs untreated controls in healthy adult men. The book
  operationalises that protocol: methyl donors + DNA methylation adaptogens + lifestyle
  (sleep, exercise, relaxation, toxin reduction). Evidence quality moderate — much
  underlying mechanism data is animal/cell; the human trial is a small pilot. Strong,
  practical food-first translation for FM healthy-aging coaching. India context: maps
  cleanly onto traditional turmeric, green tea, leafy greens, beets, seeds, pulses.'
