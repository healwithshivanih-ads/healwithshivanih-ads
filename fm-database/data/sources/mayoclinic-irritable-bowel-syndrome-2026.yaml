notes: Mayoclinic.org is Mayo Clinic's free patient-education portal, written for
  laypeople by the Mayo Clinic Staff with internal physician review. The page takes
  a conservative conventional-medicine angle. Used here for the Rome diagnostic criteria,
  red-flag thresholds (onset after 50, rectal bleeding, weight loss), first-line lifestyle
  interventions (fibre, fluids, exercise), and the conventional drug ladder. Complements
  the FM-leaning catalogue (Murray, Briden) by anchoring the mainstream standard of
  care.
