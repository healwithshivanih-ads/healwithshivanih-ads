notes: Alex Leaf MS is a nutrition-science researcher and co-developer with Ari Whitten
  of the Fat Loss Blueprint programme. Episode reframes insulin resistance from a
  biochemistry problem ("blood glucose is high — give metformin / berberine / cut
  carbs") to a STRUCTURAL problem — small / weak / under-used muscle tissue and overfilled
  / lipid-overloaded fat cells. Walks through how 88-94% of US adults are in poor
  metabolic health, the three observable macro-structures coach can read on sight
  (muscle mass, body fat distribution, visceral adiposity proxies), why keto "fixes"
  T2D diagnostic criteria without fixing the underlying cell dysfunction, the fat-cell-overflow
  → lipotoxicity → visceral / ectopic fat cascade, the "metabolically healthy obese"
  category's 50-80% 5-year metabolic-risk increase, and exercise / strength training
  as the structural treatment upstream of any biochemical or pharmaceutical intervention.
