notes: Mel Hopper Koppelman MS is the founder of Synthesis Health and a clinician
  specialising in complex chronic illness (autoimmunity, fibromyalgia, chronic fatigue)
  via an integrative model drawing on functional medicine, classical Chinese medicine
  (Neijing studies with Dr Ed Neal), and neurodevelopmental approaches. Episode covers
  Stephen Porges's polyvagal theory, the vagal paradox (why HRV can rise paradoxically
  with stress), respiratory sinus arrhythmia as the "good" component of HRV, why athletic-overtraining
  data showed HRV climbing as Scandinavian skiers burned out, the orthostatic tolerance
  test as a way to disambiguate ventral vs dorsal vagal dominance, and a step-by-step
  clinical sequence (immune → digestive → neuroendocrine → tissue repair → tonification)
  borrowed from a Sichuan-China lineage. Expert-consensus tier — paraphrased from
  a clinician with both functional medicine and CCM training.
