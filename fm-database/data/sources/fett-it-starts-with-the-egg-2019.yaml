id: fett-it-starts-with-the-egg-2019
title: It Starts with the Egg — How the Science of Egg Quality Can Help You Get Pregnant
  Naturally, Prevent Miscarriage, and Improve Your Odds in IVF
source_type: book
quality: high
authors:
- Rebecca Fett
year: 2019
publisher: Franklin Fox Publishing
url: https://itstartswiththeegg.com
notes: Third edition (updated 2019) of Fett's best-selling preconception and IVF preparation
  reference. Fett is a biotech lawyer with a molecular biology background; the book
  synthesises 250+ peer-reviewed papers into named protocols with specific doses (CoQ10/ubiquinol,
  melatonin, DHEA, myo-inositol, prenatal multivitamin, antioxidants). Widely cited
  by IVF clinics globally for Basic / Intermediate / Advanced fertility plans tiered
  by age and ovarian reserve. Particularly strong on the mitochondrial-energy theory
  of egg quality (Bentov/Casper Toronto group), BPA + phthalate endocrine-disruption
  evidence, and the Nurses Health Study / Mediterranean diet patterns. Gold-standard
  practical reference for advanced-maternal-age egg-quality coaching and IVF prep.
