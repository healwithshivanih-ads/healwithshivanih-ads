notes: Companion recipe book to 'Younger You'. Therapeutic-food rationale for bone
  and vegetable broths plus 'healing tonics', built around the same Younger You epi-nutrients
  (beets/betaine, green tea/EGCG, turmeric/curcumin, rosemary/rosmarinic acid, cruciferous/sulforaphane,
  liver, mushrooms, seeds). Includes the authors' original bone-broth heavy-metal/lead
  pilot study. Quality moderate — narrative + small in-house testing, food-first.
  Excellent for client-facing gut-healing, joint, sleep and longevity recipe prescriptions;
  maps to Indian rasam/kashayam and haldi-doodh traditions.
