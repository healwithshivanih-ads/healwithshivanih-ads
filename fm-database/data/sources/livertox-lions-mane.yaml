id: livertox-lions-mane
title: 'Lion''s Mane — LiverTox: Clinical and Research Information on Drug-Induced
  Liver Injury'
authors:
- National Institute of Diabetes and Digestive and Kidney Diseases (NIDDK)
year: 2024
publisher: NIH Bookshelf — LiverTox
source_type: clinical_guideline
quality: high
url: https://www.ncbi.nlm.nih.gov/books/NBK599740/
notes: 'NIH LiverTox monograph. Clinical trial doses 1.05 g to 2 g/day, durations
  4–48 weeks. Hepatotoxicity Likelihood Score E — unlikely cause of clinically apparent
  liver injury. Mild GI effects (<10%): abdominal discomfort, nausea, diarrhoea. One
  acute hypersensitivity case documented. Safety profile good but long-term human
  data + drug interactions not well characterised.'
