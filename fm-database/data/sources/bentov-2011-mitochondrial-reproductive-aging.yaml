id: bentov-2011-mitochondrial-reproductive-aging
title: The Contribution of Mitochondrial Function to Reproductive Aging
source_type: peer_reviewed_paper
quality: high
authors:
- Yaakov Bentov
- Tetyana Yavorska
- Navid Esfandiari
- Andrea Jurisicova
- Robert F Casper
year: 2011
publisher: Journal of Assisted Reproduction and Genetics (J Assist Reprod Genet)
doi: 10.1007/s10815-011-9588-7
url: https://www.ncbi.nlm.nih.gov/pmc/articles/PMC3169682/
notes: Foundational review from Casper's Toronto group (Toronto Centre for Advanced
  Reproductive Technology, Mount Sinai Hospital) presenting the mitochondrial theory
  of female reproductive aging. Synthesises evidence that age-related decline in oocyte
  quality is driven by accumulated mitochondrial DNA mutations, reduced mitochondrial
  number, structural mitochondrial damage, and decreased ATP synthesis capacity, with
  downstream consequences for meiotic spindle assembly, aneuploidy rates, and early
  embryo development. The paper provides the mechanistic backbone for CoQ10 and ubiquinol
  fertility supplementation protocols cited heavily in Fett's It Starts with the Egg.
  Ingested from PubMed abstract; some claims supplemented from Fett's verbatim citations
  to this paper.
