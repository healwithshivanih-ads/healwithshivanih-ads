notes: Long-form interview with Dr Jason Sonners, chiropractor and PhD candidate at
  University of Miami in molecular biology focused on regenerative medicine with HBOT,
  and author of "Oxygen Under Pressure". Sonners runs HBOT clinics on the US East
  Coast, co-founded the functional medicine hyperbaric clinician certification course
  with the International Board of Undersea Medicine, and has been mentored by Dick
  Rotowski. Topics — soft chamber (1.3 ATA) vs hard chamber (2.0+ ATA) clinical distinctions,
  mitochondrial biogenesis and ROS hormesis as the active mechanism, sequencing HBOT
  with fasting / exercise / autophagy, antioxidant co-therapies (molecular hydrogen,
  vitamin C, NAD), three-times-per-year protocol approach for healthy users, cancer
  metabolic synergy with Seyfried/D'Agostino metabolic therapy. Source quality moderate
  (podcast format; Sonners is a clinician and educator, not the primary researcher).
