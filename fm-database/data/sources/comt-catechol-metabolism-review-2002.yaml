id: comt-catechol-metabolism-review-2002
title: 'Catechol-O-Methyltransferase (COMT)-mediated methylation metabolism of endogenous
  bioactive catechols and modulation by endobiotics and xenobiotics: importance in
  pathophysiology and pathogenesis'
source_type: peer_reviewed_paper
quality: high
year: 2002
publisher: PubMed
url: https://pubmed.ncbi.nlm.nih.gov/12083324/
notes: Foundational mechanistic review of COMT's role in methylating catecholamines
  (dopamine, norepinephrine, epinephrine) and catechol estrogens. Establishes the
  enzyme-substrate breadth that makes COMT relevant to both mood/neurotransmitter
  and oestrogen-clearance pictures.
