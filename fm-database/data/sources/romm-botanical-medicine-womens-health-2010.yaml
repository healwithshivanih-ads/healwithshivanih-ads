notes: >
  Comprehensive clinical reference for botanical medicine in women's reproductive
  health. Covers menstrual disorders, PCOS, fertility, thyroid, menopause, pregnancy,
  lactation, and oncology. ISBN 978-0-443-07277-2. 705 pages. Romm is a CPM (Certified
  Professional Midwife), AHG (American Herbalist Guild), and MD. One of the most
  clinically thorough botanical references available for FM practitioners. Evidence
  includes clinical trials, traditional use, and mechanism data; evidence tier should
  be evaluated per-claim.
