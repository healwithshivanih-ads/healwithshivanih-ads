year: 2026
notes: 'Internal coaching reference for protein targets and protein-powder
  selection. Consolidates well-established nutrition consensus — a target of
  1.2-1.6 g protein per kg body weight for muscle and bone preservation in
  peri/menopausal women, older adults and clients in a weight-loss calorie
  deficit (vs the 0.8 g/kg RDA floor); food-first sourcing before any powder;
  and contraindication to raising protein intake in kidney disease or
  hyperuricemia / gout. Powder track selection (whey isolate / plant blend /
  fermented yeast) follows dairy status plus histamine and gut-protocol
  suppression flags. Enrich with peer-reviewed citations via the catalogue
  queue.'
