notes: 'Dr. Michael Ruscio, DC — functional-medicine practitioner and clinical researcher
  who performs and publishes his own clinical research on digestive health. The book
  is unusually evidence-disciplined for the FM genre: Ruscio explicitly privileges
  human RCTs, systematic reviews and meta-analyses over mechanistic, animal, cell-culture
  and single-study observational data, and repeatedly warns against "thinking small"
  (reducing gut health to one bacterium). Central theses: (1) the gut is a plausible
  root driver of far-reaching non-digestive symptoms (mood, energy, thyroid, skin,
  hormones, weight) — "start with the gut"; (2) reducing intestinal inflammation and
  bacterial overgrowth matters MORE than feeding gut bacteria — feeding fibre and
  prebiotics can worsen an already-overgrown small intestine; (3) carb and prebiotic
  tolerance is individualised (ancestry, insulin sensitivity, existing overgrowth),
  so you cannot safely copy another population''s high-carb microbiota-diet; (4) the
  "Great-in-8" self-guided action plan — an ordered, escalate-only-if-needed program
  (Reset, Support, Remove, Rebalance, Reintroduce, Feed, Wean, Maintenance) that layers
  diet/lifestyle first, then probiotic triple therapy, digestive support (HCl/enzymes),
  herbal antimicrobials or elemental diet, prokinetics, then food/prebiotic reintroduction
  and tapering. Widely regarded as a standard FM patient-facing reference for SIBO,
  IBS, dysbiosis and gut-driven systemic symptoms. ISBN 9780999766804. Ingested in
  full (all 33 chapters, 5 parts) via chat-ingest — zero Anthropic API calls.'
