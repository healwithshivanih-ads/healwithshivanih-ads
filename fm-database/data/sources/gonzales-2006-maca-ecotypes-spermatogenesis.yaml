id: gonzales-2006-maca-ecotypes-spermatogenesis
title: Effect of short-term and long-term treatments with three ecotypes of Lepidium
  meyenii (MACA) on spermatogenesis in rats
source_type: peer_reviewed_paper
quality: low
authors:
- Gonzales C
- Rubio J
- Gasco M
- Nieto J
- Yucra S
- Gonzales GF
publisher: Journal of Ethnopharmacology
year: 2006
url: https://pubmed.ncbi.nlm.nih.gov/16174556/
doi: 10.1016/j.jep.2005.08.035
notes: Animal study comparing yellow, red, and black maca ecotypes over 7-day and
  42-day treatments in adult rats. Black maca was the only ecotype that increased
  daily sperm production and epididymal sperm motility at both time points. Red maca
  did not affect sperm parameters but reduced prostate weight. Yellow maca had no
  measurable effect. Provides the strongest pre-clinical case for colour-specific
  use — black maca for sperm, red maca for prostate. Animal data; not yet replicated
  in adequately-powered human trials.
