id: nos3-cvd-huge-review-2006
title: 'Endothelial Nitric Oxide Synthase Gene Polymorphisms and Cardiovascular
  Disease: A HuGE Review'
source_type: peer_reviewed_paper
quality: high
year: 2006
publisher: American Journal of Epidemiology (Oxford Academic)
url: https://academic.oup.com/aje/article/164/10/921/162396
notes: 'HuGE (Human Genome Epidemiology) review — a gold-standard review format
  for gene-disease association evidence. Covers the three most-studied NOS3 SNPs:
  Glu298Asp (rs1799983), -786T>C (rs2070744), and the intron 4 VNTR. Per-allele
  odds ratios for coronary heart disease were modest: ~1.17 (Glu298Asp), ~1.17
  (-786T>C), ~1.12 (intron 4) — meaningfully elevated risk, not deterministic.'
