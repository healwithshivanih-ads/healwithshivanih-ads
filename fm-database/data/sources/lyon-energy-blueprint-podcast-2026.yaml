notes: Dr Gabrielle Lyon is a Washington University fellowship-trained physician in
  nutritional sciences and geriatrics and founder of the Institute for Muscle-Centric
  Medicine. New York Times bestselling author of Forever Strong; second book Forever
  Strong Playbook released January 2026. Co-authored protein recommendations in the
  new 2026 US Dietary Guidelines with mentor Dr Donald Layman. This interview covers
  skeletal muscle as the endocrine organ of longevity, intramuscular adipose tissue
  (IMAT) as a missed metabolic marker, the new 1.2-1.6 g/kg protein guideline, anabolic
  resistance with aging, GLP-1 sarcopenia risk, and the mTor cancer myth. Evidence
  rationale moderate — expert clinical synthesis citing RCTs and meta-analyses but
  not itself a primary trial.
