notes: Alan Christianson NMD is a board-certified naturopathic endocrinologist, founding
  president of the Endocrine Association of Naturopathic Physicians and the American
  College of Thyroidology. Author of The Hormone Healing Cookbook. Episode covers
  the five hormone-driven midlife symptoms (weight, energy, cognition, hot flashes,
  one more) and the targeted food matrices that move them — dietary nitrate from beets/leafy
  greens (vs nitrates from processed meat), walnut oligopeptides for waste clearance,
  almond food matrix beyond the macros, oats / beta-glucan for Krebs-cycle support
  (40% QoL improvement in chronic-fatigue trial), rosemary as fast-acting nootropic
  via smell + taste, and trout as the iodine-low seafood option. Plus his strong position
  that EXCESS iodine drives autoimmune thyroid disease in a population subset — supplementing
  above 200 mcg/day is pro-Hashimoto's not protective. Hormone metabolism (how the
  body circulates / converts / clears hormones) is more diet-modifiable than crude
  hormone levels.
