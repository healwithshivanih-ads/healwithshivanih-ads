notes: Heather Sandison ND is a naturopathic physician specialising in neurocognitive
  medicine. Founder of Solcere Health Clinic (San Diego) and Marama, the first residential
  memory-care facility built around the goal of returning cognitively-declined residents
  to independent living. Primary author of "Observed Improvement in Cognition During
  a Personalized Lifestyle Intervention in People with Cognitive Decline" (Journal
  of Alzheimer's Disease, 2023) — a 23-participant 6-month feasibility trial. Author
  of Reversing Alzheimer's (2024). Episode walks through the three human trials supporting
  lifestyle reversal of cognitive decline (Bredesen 2022, Sandison 2023, Ornish 2024
  RCT), the four-stage Alzheimer's framework, the amyloid hypothesis story, and her
  concrete daily-practice playbook (organic ketogenic diet, dual-task exercise, sleep
  with mouth tape, Kirtan Kriya meditation).
