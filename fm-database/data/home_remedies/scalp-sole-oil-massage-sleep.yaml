slug: scalp-sole-oil-massage-sleep
display_name: Warm Sesame or Brahmi Oil Scalp and Sole Massage for Insomnia
aliases:
  - tel-malish-sleep-remedy
  - brahmi-oil-padabhyanga-shiroabhyanga
  - warm-oil-scalp-feet-sleep
category: other
route: external
summary: >-
  Lad describes scalp and foot-sole massage with warm sesame, brahmi, or
  jatamamsi oil as one of the simplest and most effective ways to induce sleep.
  This is a form of targeted abhyanga that calms vata in the nervous system,
  grounds the mind, and promotes parasympathetic tone. Warming the oil before
  application enhances its penetrating, calming effect. This is the archetypal
  Ayurvedic bedtime vata-pacifying ritual.
indications:
  - insomnia
  - vata-type sleep disturbances
  - restlessness and anxiety at bedtime
  - racing mind at night
  - dry or depleted nervous system (vata excess)
contraindications:
  - skin allergy to sesame, coconut or the chosen herb oil
  - open wounds, skin infections or dermatitis on the scalp or feet
  - avoid if excess kapha causing heaviness (sesame oil is heavy)
preparation: >-
  Slightly warm sesame oil, brahmi oil, or jatamamsi oil (a few seconds over
  low heat or set the bottle in warm water). Apply to the scalp and massage
  gently with the fingertips for a few minutes. Then apply warm oil to the
  soles of the feet and massage. Keep the massage gentle and rhythmic to
  promote relaxation.
typical_dose: A few minutes of gentle massage at bedtime
duration: Nightly practice; safe for ongoing use as part of bedtime routine
timing_notes: Immediately before going to bed
