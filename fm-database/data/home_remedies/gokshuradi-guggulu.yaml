slug: gokshuradi-guggulu
display_name: Gokshuradi Guggulu (Urinary & Gout)
aliases:
- gokshura-guggulu
- gokshuradi-guggul
category: ayurvedic_churan
summary: A guggulu formulation built around gokshura (Tribulus terrestris) that Lad references
  for urinary-tract support, kidney stones, and gout/high uric acid. Gokshura is a diuretic,
  soothing urinary herb; with guggulu it supports clearing of stones, crystals and uric acid
  while easing urinary discomfort.
indications:
- kidney stones / urinary gravel (supportive)
- urinary tract discomfort / weak stream
- gout / high uric acid
- prostate-related urinary symptoms
contraindications:
- 'THYROID INTERACTION: guggul (guggulsterones) can alter thyroid hormone levels/metabolism
  — important if on levothyroxine or with thyroid disease; coordinate with the prescriber
  and monitor'
- 'blood thinning: may increase bleeding risk — caution with anticoagulant/antiplatelet drugs
  and before surgery'
- pregnancy and breastfeeding — avoid (uterine stimulant)
- can cause GI upset, loose stools, hyperacidity, headache, or skin rash; stop if rash/itching
  occurs
- classical tablet formulation from an Ayurvedic pharmacy — best used under a knowledgeable
  practitioner, not indefinitely
- acute severe flank pain, blood in urine, or fever — urgent medical care (stone obstruction/infection)
