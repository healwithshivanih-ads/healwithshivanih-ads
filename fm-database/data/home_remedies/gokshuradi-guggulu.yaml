preparation: Gokshuradi guggulu tablets from an Ayurvedic pharmacy, typically 1 tablet 2-3
  times a day with warm water (per label/practitioner). Drink plenty of water alongside.
typical_dose: ~1 tablet, 2-3 times a day
duration: In courses under guidance
