slug: cumin-fennel-ajwain-seed-mix
display_name: Roasted Cumin-Fennel-Ajwain Seed Mix for Gas
aliases:
  - jeera-saunf-ajwain-roasted-seeds
  - tridoshic-seed-digestive
category: spice_blend
summary: >-
  Lad's classic tridoshic digestive seed mix — equal parts dry-roasted cumin,
  fennel, and ajwain (Indian celery seed/carom) chewed after meals. This blend
  effectively calms flatulence and aids digestion for all three dosha types,
  making it suitable when the allergy or digestive type is unknown. The warming
  ajwain calms vata-type gas while cooling fennel soothes the GI tract.
indications:
  - gas and flatulence after meals
  - abdominal bloating and distension
  - post-meal heaviness and discomfort
  - food intolerances and mild digestive reactions
  - sluggish digestion (low agni)
contraindications:
  - excess heat or pitta conditions — reduce ajwain and increase fennel if burning
  - peptic ulcer (ajwain is pungent — use only fennel and cumin in that case)
preparation: >-
  Dry-roast cumin, fennel, and ajwain seeds separately on a heavy cast-iron pan,
  stirring constantly to prevent burning. The fennel takes a few minutes; the
  others about a minute or two until fragrant and slightly brown. Combine equal
  parts of all three seeds, add about 1/2 teaspoon rock salt (not sea salt), mix
  well, and store in a glass jar. After each meal, take 1/2 to 1 teaspoon of the
  mixture, chew well, and swallow with about 1/3 cup warm water.
typical_dose: 1/2 to 1 teaspoon after meals
duration: Ongoing after meals, especially during periods of digestive sensitivity
timing_notes: Immediately after meals
