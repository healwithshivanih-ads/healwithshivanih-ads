category: spice_blend
summary: >-
  Lad recommends roasting equal parts of fennel, cumin, and coriander seeds
  individually in a dry cast-iron pan, then mixing them together and chewing
  about 1/2 teaspoon of the blend to relieve stomachache and indigestion. The
  three seeds together are tridoshic — balancing for all constitutions — and
  their volatile oils (anethole in fennel, cuminaldehyde in cumin, linalool in
  coriander) work synergistically to stimulate digestive enzymes, relax the
  gut wall, expel gas, and soothe stomach cramps. This is a versatile
  after-meal digestive remedy.
indications:
  - stomachache and abdominal cramping
  - bloating and excess gas
  - indigestion and incomplete digestion after meals
  - nausea
  - IBS-type lower abdominal discomfort
contraindications:
  - no significant contraindications for healthy adults at typical doses
  - large amounts of coriander may lower blood sugar — diabetics on medication should monitor
  - if stomachache is severe or accompanied by fever or vomiting, seek medical attention
preparation: >-
  Take equal amounts of fennel (saunf), cumin (jeera), and coriander
  (dhaniya) seeds. Roast each type of seed separately in a dry heavy
  cast-iron pan over medium heat, stirring constantly to prevent burning.
  Roast until fragrant (about 2 to 3 minutes each). Mix all three together
  once cooled. Chew about 1/2 teaspoon of the combined blend slowly and
  thoroughly. Alternatively, make a tea by steeping 1/2 teaspoon of this
  blend in 1 cup of hot water for 5 minutes and drinking 2 to 3 times a day.
typical_dose: 1/2 teaspoon chewed after meals, or as a tea 2-3 times daily
duration: Use as needed for digestive complaints; safe for ongoing use after meals
timing_notes: After meals, or at the onset of stomach discomfort
