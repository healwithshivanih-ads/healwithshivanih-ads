slug: honey-castor-oil-hiccups
display_name: Honey & Castor Oil (Hiccups)
aliases:
- hiccup-honey-castor
category: other
summary: 'A Lad first-aid for persistent hiccups: two parts honey with one part castor oil,
  taken slowly. The sweet-oily combination is thought to settle the diaphragmatic spasm of hiccups
  (a vata disturbance). Pairs with slow breathing (pranayama).'
indications:
- persistent hiccups
- diaphragmatic spasm
contraindications:
- hiccups lasting >48 hours need medical review
- castor oil is a laxative — use only the small amount specified
- diabetes (honey)
balances_dosha:
- vata
aggravates_dosha: []
preparation: Mix 2 parts honey with 1 part castor oil (e.g. 1 tsp honey + 1/2 tsp castor oil)
  and take slowly. Follow with a few rounds of slow, deep breathing.
typical_dose: The small mixture, once; repeat once if needed
duration: One-off as needed
timing_notes: When hiccups won't stop
