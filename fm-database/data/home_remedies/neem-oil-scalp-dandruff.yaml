slug: neem-oil-scalp-dandruff
display_name: Neem Oil Scalp Massage for Dandruff
aliases:
  - neem-til-tel-dandruff
  - neem-sesame-scalp-massage
  - neem-oil-rusi
category: other
summary: >-
  Lad's primary recommendation for dandruff — daily scalp massage for a few
  minutes with neem oil in a sesame oil base. Neem (Azadirachta indica) has
  potent antifungal, antibacterial, and anti-inflammatory properties that address
  both the fungal (Malassezia) and vata-dryness causes of dandruff. Sesame
  oil is deeply nourishing, warming, and improves scalp circulation; its
  oleating action counteracts the scalp dryness that underlies most dandruff.
  Lad notes that where fungal infection underlies the flaking, neem oil's
  disinfectant properties address this directly.
indications:
  - dandruff (dry, flaky scalp)
  - seborrhoeic dermatitis of the scalp
  - fungal-related dandruff
  - dry scalp from vata excess or vitamin B6 deficiency
  - itchy, flaky scalp
contraindications:
  - neem oil has a strong smell — some people find it unpleasant; can mix with
    a carrier such as coconut or sesame oil to dilute
  - do a patch test first if you have sensitive skin or history of contact
    dermatitis
  - avoid contact with eyes
  - during pregnancy, avoid therapeutic doses of neem internally; topical
    scalp use in small quantities is generally considered safe but check with
    your doctor
balances_dosha: []
aggravates_dosha: []
preparation: >-
  Mix neem oil in a sesame oil base (approximately 1 part neem to 3-4 parts
  sesame oil — neem oil is very potent). Warm the blend slightly until
  comfortably warm to the touch. Part the hair in sections and massage the oil
  into the scalp using the fingertips for 3-5 minutes daily. Leave on for at
  least 30 minutes or overnight before washing out with a mild shampoo.
typical_dose: Daily scalp massage for a few minutes with the oil blend
duration: Daily for 2-4 weeks; improvement typically seen within 2 weeks
timing_notes: Apply before bathing or at night before sleep; leave-on time
  of at least 30 minutes improves efficacy
