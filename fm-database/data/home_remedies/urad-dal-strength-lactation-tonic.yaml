preparation: >-
  Wash 2 cups urad dal twice; cook in 5 cups water ~30 min until tender. Temper
  1 tsp black mustard seeds + 1 tsp cumin seeds + a few curry leaves in 1 tbsp
  oil until the seeds pop; turn heat low and add cilantro, chopped garlic (or a
  pinch of cayenne) and a pinch of hing, cook until garlic is lightly browned,
  then 1/4 tsp turmeric and 1/2 tsp salt. Stir the cooked dal in, bring to a
  boil and serve with rice and chapati.
typical_dose: 1 bowl — vata may eat frequently; pitta and kapha once or twice a week
duration: Regular for vata building; occasional for other types
timing_notes: Best at lunch when agni is strongest, given its heaviness
