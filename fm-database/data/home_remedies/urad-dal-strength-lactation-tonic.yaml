summary: >-
  A spiced urad dal (black gram) soup Lad gives as a heavy, unctuous, building
  food specifically for vata depletion. Urad dal is sweet, heavy and unctuous;
  it nourishes muscle, bone and reproductive tissue, supports lactation and
  energises the whole body — excellent and calming for vata, who can eat it
  frequently. Because it is heavy and warming it aggravates pitta and kapha, so
  those types take it only occasionally and never in obesity or active pitta
  conditions.
indications:
  - vata depletion / weakness / debility
  - convalescence, low body weight or muscle wasting
  - lactation support (galactagogue food)
  - reproductive-tissue depletion / building (vajikarana)
contraindications:
  - kapha disorders, especially obesity (heavy, building)
  - pitta disorders / active inflammation (warming, heavy)
  - never combine with fish, yogurt or eggplant (incompatible — generates toxins)
