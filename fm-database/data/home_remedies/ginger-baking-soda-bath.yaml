slug: ginger-baking-soda-bath
display_name: Ginger & Baking Soda Relaxing Bath
aliases:
  - ginger-soda-bath
  - calming-soak-bath
category: other
summary: >-
  A warm soaking bath with ginger and baking soda that Lad recommends to pacify
  vata — easing anxiety, muscle tension and the soreness/stiffness of an
  over-stressed body. The warmth plus ginger's circulation-boosting heat relaxes
  muscles and the nervous system; baking soda softens the water and skin. A
  pleasant evening wind-down ritual.
indications:
  - anxiety and nervous tension
  - muscle soreness and stiffness
  - backache and general aches
  - winding down before sleep
contraindications:
  - open wounds or broken skin
  - very high or low blood pressure (hot baths — caution)
  - pregnancy (avoid very hot/long soaks)
balances_dosha:
  - vata
aggravates_dosha: []
preparation: >-
  Add about 1/3 cup ground ginger and 1/3 cup baking soda to a tub of warm
  water. Soak for 10-15 minutes. Can be repeated 2-3 times a week (a
  mahanarayan-oil self-massage beforehand makes it more soothing for stiff
  joints/back).
typical_dose: One 10-15 minute soak
duration: As needed; 2-3 times per week during stressful or achy periods
timing_notes: Best in the evening to relax before bed
