slug: tea-tree-gum-treatment
display_name: Tea Tree Oil Gum Treatment for Receding Gums and Tooth Sensitivity
aliases:
  - tea-tree-dental-brush
  - gum-infection-tea-tree
category: other
route: external
summary: >-
  Lad recommends applying tea tree oil directly to a wet toothbrush and to a
  cotton swab for treating receding gums, bacterial infection at the tooth root,
  and sensitivity to temperature — signs of pitta aggravation and bacterial
  infiltration in the oral cavity. Tea tree oil's proven antimicrobial and anti-
  inflammatory properties help arrest further infection, reduce gum inflammation,
  and relieve temperature sensitivity. This remedy is distinct from clove-oil
  toothache treatment and specifically addresses the infectious and periodontal
  component.
indications:
  - receding gums
  - sensitivity of teeth to hot and cold temperatures
  - bacterial infection in the roots of the teeth
  - gum disease and periodontal inflammation
  - general maintenance of gum health
contraindications:
  - do NOT swallow tea tree oil — it is toxic if ingested; spit out thoroughly after use
  - allergy to tea tree oil
  - children under 12 (risk of accidental ingestion)
  - any rapidly worsening dental abscess requires urgent dental care
  - do not use as a substitute for professional dental treatment of deep-pocket infection
preparation: >-
  Wet a clean toothbrush and place 2-3 drops of 100% pure tea tree oil directly
  onto the bristles. Brush the teeth and gum line gently but thoroughly for
  2 minutes, paying attention to the gum margin. Spit out completely — do NOT
  rinse with water immediately; allow the oil to remain on the gums for a few
  minutes. Then, using a fresh cotton swab, apply a little more tea tree oil
  directly to any exposed or receding gum area. For deep pockets, apply a few
  drops to dental floss before flossing to reach areas the brush cannot. Spit
  and rinse afterwards. Commercial tea tree oil dental floss is also available.
typical_dose: Once daily (ideally at night after the last meal)
duration: Use daily for 2-4 weeks; can be continued as a long-term gum health practice
timing_notes: Best done at night as the last oral hygiene step; avoid eating or drinking
  for 30 minutes after
