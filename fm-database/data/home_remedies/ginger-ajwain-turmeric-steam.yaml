slug: ginger-ajwain-turmeric-steam
display_name: Ginger-Ajwain-Turmeric Steam Inhalation for Nasal Congestion
aliases:
  - adrak-ajwain-haldi-steam
  - nasal-crust-steam
  - kapha-nasal-steam
category: other
route: external
summary: >-
  A warming steam inhalation using equal parts dried ginger, ajwain (carom
  seeds), and turmeric simmered in water. This combination specifically targets
  kapha-driven nasal congestion, crust formation, and blocked sinuses. Ajwain
  contains thymol which is strongly antimicrobial and decongestant; ginger
  liquefies and mobilises kapha; turmeric adds anti-inflammatory action. This
  is distinct from the existing tulsi steam (which is more anti-viral/general)
  — this formula is specifically formulated for thick nasal crust and chronic
  dry nasal passages.
indications:
  - nasal crust and dried nasal secretions
  - blocked sinuses with thick, dry or sticky mucus
  - chronic nasal congestion (kapha type)
  - recurrent respiratory congestion
contraindications:
  - active nosebleed (do not steam — increases blood flow to nasal membranes)
  - very hot pitta constitution with burning in nasal passages (may aggravate)
  - severe facial burns or sensitive facial skin
  - asthma — proceed with caution (steam can trigger bronchospasm in some); keep bowl at arm's length
preparation: >-
  Measure out equal parts (approximately 1 teaspoon each) of dry ginger powder
  (sonth), ajwain seeds (carom seeds), and turmeric powder (haldi). Add all
  three to 1 pint (500 ml) of water in a wide bowl or saucepan and bring to
  a rolling boil. Remove from heat. Place the bowl on a stable surface, lean
  over it at a comfortable distance (not too close), drape a towel over your
  head and the bowl to create a steam tent, and inhale the steam through both
  nostrils slowly and deeply for 5-10 minutes.
typical_dose: One 5-10 minute steam inhalation session
duration: Once or twice daily during active congestion; continue for 3-5 days
timing_notes: Best in the morning and before bed; avoid immediately after meals; allow to cool slightly before placing face over bowl
