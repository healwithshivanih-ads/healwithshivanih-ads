slug: roasted-coriander-fennel-digestive
display_name: Dry-Roasted Coriander and Fennel Post-Overeating Relief
aliases:
  - bhuna-dhania-saunf-churan
  - roasted-seed-indigestion-mix
  - overeating-digestive-blend
category: spice_blend
summary: >-
  Lad's remedy for post-overeating indigestion: equal parts coriander seeds and
  fennel seeds dry-roasted on a heavy iron pan, cooled, and eaten directly.
  Roasting activates the volatile oils in both seeds while reducing their
  sharpness. Fennel is carminative, cooling, and relieves gas and bloating;
  coriander settles pitta-type gastric heat and irritation. Together they
  quickly address the heaviness, gas, and discomfort that follow a large meal.
  The iron pan adds a small amount of bioavailable iron as a bonus.
indications:
  - post-meal indigestion from overeating
  - abdominal heaviness and fullness after meals
  - gas and bloating from excess food intake
  - sluggish digestion after large meals
contraindications:
  - active gastric ulcer (roasted seeds are still mildly stimulating)
  - severe GERD in the acute phase
  - fennel allergy (uncommon but possible)
preparation: >-
  Measure 1 teaspoon coriander seeds (dhania) and 1 teaspoon fennel seeds
  (saunf). Place on a heavy iron pan over medium heat (no oil). Stir constantly
  to avoid burning — roast until the seeds turn one shade darker and release a
  fragrant aroma (approximately 2-3 minutes). Remove from heat immediately.
  Add a small pinch of rock salt. Allow to cool completely. Eat the cooled
  roasted seeds directly, chewing well.
typical_dose: 1 teaspoon of each seed (2 teaspoons total blend)
duration: As needed after heavy meals; not a daily supplement
timing_notes: Take immediately after an unusually large or heavy meal; chew slowly
