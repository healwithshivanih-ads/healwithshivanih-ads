slug: sat-isabgol-yogurt-pitta-diarrhea
display_name: Psyllium Husk in Yogurt for Pitta Diarrhea
aliases:
  - isabgol-dahi-pitta-diarrhea
  - psyllium-yogurt-diarrhea
  - sat-isabgol-loose-stools
category: kitchen_remedy
summary: >-
  Lad recommends sat isabgol (psyllium husks) stirred into fresh yogurt as a
  counterintuitive but effective remedy for pitta-driven diarrhea. In pitta
  diarrhea, excess pitta accumulates in the colon and irritates the gut wall,
  creating loose stools. Psyllium's soluble fibre absorbs the excess pitta and
  binds the stool; fresh yogurt is cooling and pitta-pacifying and provides
  beneficial bacteria. The yogurt must be freshly made, not sour or old, to avoid
  further aggravating pitta.
indications:
  - diarrhea with burning sensation or urgency (pitta type)
  - loose stools with heat or inflammation
  - frequent watery stools
contraindications:
  - dairy intolerance or allergy (yogurt-based)
  - use only fresh, not sour/aged yogurt — old yogurt aggravates pitta further
  - not for vata-type diarrhea (dry, spasmodic) — use the apple-ghee remedy instead
  - if diarrhea persists beyond 3 days, consult a doctor
  - if accompanied by blood in stool or fever, seek medical attention
preparation: >-
  At bedtime, stir 1 teaspoon of sat isabgol (psyllium husks) into half a cup of
  plain, freshly made yogurt. Mix well and eat immediately — do not let it sit and
  gel for too long before eating. Ensure the yogurt is fresh and not sour.
typical_dose: 1 teaspoon psyllium husks in half cup fresh yogurt, once at bedtime
duration: 2–3 nights or until stools normalise
timing_notes: Take at bedtime; the remedy works overnight to absorb pitta and bind the stool
