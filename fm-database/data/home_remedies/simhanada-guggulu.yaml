slug: simhanada-guggulu
display_name: Simhanada Guggulu (Rheumatoid / Ama Arthritis)
aliases:
- sinhanada-guggulu
- simhnad-guggulu
category: ayurvedic_churan
summary: A strong, ama-clearing guggulu formulation (with triphala + castor) Lad recommends
  for rheumatoid arthritis and chronic ama-laden joint disease with constipation. It works
  on the gut-joint (ama) axis — clearing toxins from the colon that lodge in the joints —
  while easing inflammatory joint pain.
indications:
- rheumatoid arthritis (ama type)
- chronic inflammatory arthritis with constipation
- stiff, painful, toxin-laden joints
contraindications:
- 'THYROID INTERACTION: guggul (guggulsterones) can alter thyroid hormone levels/metabolism
  — important if on levothyroxine or with thyroid disease; coordinate with the prescriber
  and monitor'
- 'blood thinning: may increase bleeding risk — caution with anticoagulant/antiplatelet drugs
  and before surgery'
- pregnancy and breastfeeding — avoid (uterine stimulant)
- can cause GI upset, loose stools, hyperacidity, headache, or skin rash; stop if rash/itching
  occurs
- classical tablet formulation from an Ayurvedic pharmacy — best used under a knowledgeable
  practitioner, not indefinitely
- has a laxative action (castor) — reduce dose if loose stools
balances_dosha:
- vata
- kapha
aggravates_dosha:
- pitta
avoid_in:
- pregnancy
- lactation
rasa:
- sour
- pungent
- bitter
virya: heating
vipaka: pungent
ayurvedic_actions:
- scraping
- anti-inflammatory
- mild-laxative
preparation: Simhanada guggulu tablets from an Ayurvedic pharmacy, typically 1 tablet (~350
  mg) 2-3 times a day with warm water (per label/practitioner).
typical_dose: ~1 tablet (350 mg), 2-3 times a day
duration: In courses under guidance
timing_notes: After meals with warm water
