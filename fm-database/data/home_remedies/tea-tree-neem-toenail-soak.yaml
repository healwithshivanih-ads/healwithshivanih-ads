slug: tea-tree-neem-toenail-soak
display_name: Tea Tree and Neem Oil Toenail Soak for Ingrown or Infected Toenail
aliases:
  - neem-tea-tree-nail-treatment
  - toenail-infection-oil-soak
category: other
summary: >-
  Lad recommends soaking the foot in warm water to soften tough toenails, then
  applying a half-and-half blend of tea tree oil and neem oil directly under
  the nail to treat infection and prevent recurrence. Tea tree oil is a
  well-documented topical antimicrobial and antifungal; neem (nimb) oil
  provides additional antibacterial, anti-inflammatory, and wound-healing
  action. Together they address the bacterial or fungal root of toenail
  infection before the nail is trimmed straight.
indications:
  - ingrown toenail with infection or inflammation
  - bacterial infection of the nail bed or surrounding skin
  - fungal toenail infection (onychomycosis, early stage)
  - swollen, tender skin around the toenail
  - recurrent toenail infections in vata and kapha constitutions
contraindications:
  - do not use undiluted tea tree oil on broken or bleeding skin — dilute in neem
    or sesame oil first (50-50 ratio is already diluted)
  - severe, deep infection with red streaking up the foot requires urgent medical care
  - allergy to tea tree oil or neem
  - diabetic foot ulcers or peripheral neuropathy — see a doctor before any home treatment
preparation: >-
  Fill a basin with comfortably warm (not hot) water and soak the affected foot
  for 10-15 minutes until the nails soften. Dry thoroughly. Mix equal parts
  tea tree oil and neem oil (e.g. 5 drops each in a small dish). Using a clean
  cotton swab, apply the oil blend generously under and around the nail, working
  it gently into the nail-skin junction. Allow to absorb — do not rinse off.
  After treatment, trim the nail straight across (not curved at the corners).
  Repeat twice daily. Prevent recurrence by trimming nails straight and wearing
  well-fitting shoes.
typical_dose: Apply oil blend to nail and surrounding skin twice daily after soaking
duration: 2-4 weeks until infection resolves; may take longer for fungal infection
timing_notes: After showering or soaking the foot; morning and before bed work well
