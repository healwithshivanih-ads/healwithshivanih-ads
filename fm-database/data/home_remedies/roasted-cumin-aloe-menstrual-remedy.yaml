slug: roasted-cumin-aloe-menstrual-remedy
display_name: Roasted Cumin Seed with Aloe Vera for Menstrual Pain
aliases:
- roasted-jeera-aloe-period-pain
- bhuna-jeera-dysmenorrhea
category: kitchen_remedy
summary: Lad's universal menstrual-pain remedy that works across all body types — roasted
  cumin seeds chewed slowly, followed immediately by a tablespoon of aloe vera juice. Roasting
  transforms cumin's volatile oils, making them more pungent and bioavailable for uterine
  cramping; aloe vera provides the cooling, anti-inflammatory and spasmolytic base. The combination
  rapidly reduces pelvic spasm and discomfort and can be made with ingredients found in any
  Indian kitchen.
indications:
- menstrual cramps and pain
- lower abdominal spasm during periods
- all types of dysmenorrhea
- bloating and gas during periods
contraindications:
- active acid reflux or gastritis — roasted cumin can be pungent on an empty stomach
- pregnancy (aloe vera juice taken internally; avoid)
- diarrhoea or loose stools (aloe can loosen bowels further)
preparation: Roast 1 teaspoon cumin seeds in a dry, ungreased pan on medium heat until they
  become pungent and turn a shade darker (this takes just a few minutes — watch carefully
  to avoid burning). Remove from heat and let cool. Chew the roasted cumin slowly, then immediately
  follow with 1 tablespoon fresh aloe vera juice.
typical_dose: 1 teaspoon roasted cumin + 1 tablespoon aloe vera juice, as needed for pain
duration: Use on days of menstrual discomfort; can take 1-2 times daily during symptomatic
  days
timing_notes: Best taken mid-morning or afternoon; avoid on a completely empty stomach if
  prone to acid reflux
