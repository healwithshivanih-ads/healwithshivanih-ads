slug: dashamoola-bhringaraj-hair-milk-tonic
display_name: Dashamoola-Bhringaraj-Jatamamsi Hair Milk Tonic
aliases:
  - ayurvedic-hair-milk-tonic
  - dashamoola-hair-tonic
  - bhringaraj-milk-hair-tonic
category: kashayam
summary: >-
  A traditional Ayurvedic milk decoction for deep nourishment of the hair
  root. Lad's formula combines dashamoola (a ten-root compound), bhringaraj
  (Eclipta prostrata, renowned in Ayurveda for hair health), and jatamamsi
  in goat's milk to tonify vata at the scalp level, reduce pitta-driven
  inflammation in the hair follicles, and supply the asthi dhatu (bone/nail
  tissue that hair arises from) with nourishing minerals.
indications:
  - significant hair thinning or hair loss (all dosha types)
  - dry, brittle hair with a flaky scalp
  - hair loss in peri/postmenopausal women
  - stress- or hormone-related alopecia
  - hair loss associated with mineral deficiency
contraindications:
  - dairy intolerance or milk allergy (can substitute with oat or almond milk,
    though goat's milk is traditional)
  - active scalp infection (treat the infection first)
  - consult a practitioner if taking thyroid medications (dashamoola has
    complex herb interactions)
balances_dosha:
  - vata
  - pitta
aggravates_dosha:
  - kapha
rasa:
  - sweet
  - bitter
  - astringent
virya: cooling
vipaka: pungent
ayurvedic_actions:
  - dipana
  - carminative
  - antispasmodic
preparation: >-
  Combine dashamoola 5 parts, bhringaraj powder 4 parts, and jatamamsi
  powder 3 parts. Measure 1/2 teaspoon of the combined mixture and add it to
  1 cup of goat's milk (or cow's milk as an alternative). Bring gently to a
  boil, then simmer for 5 minutes. Strain and drink warm, ideally before
  bedtime.
typical_dose: 1/2 teaspoon in 1 cup warm goat's milk, once a day at bedtime
duration: Continue for 3 months; can be used as long as needed
timing_notes: Best taken at bedtime — the nourishing, vata-reducing qualities
  work during overnight rest and tissue repair
