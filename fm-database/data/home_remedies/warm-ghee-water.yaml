category: infused_water
route: internal
summary: 'A gentle, grounding way to start the day — it lubricates digestion and eases
  dryness and acidity. Keep it to ½ teaspoon; if it ever brings on reflux, pause it
  and let me know.'
indications:
- anxiety
- chronic-stress
- dyspepsia
- hypochlorhydria
- acidity
- constipation
- insomnia
contraindications:
- vegan or dairy-free diet (contains ghee)
- active weight-loss goal (calorie-dense)
- fatty liver or high cholesterol / dyslipidemia
