preparation: Stir ½ teaspoon of cow's ghee into a cup of warm (not hot) water until
  it melts.
typical_dose: ½ tsp cow's ghee + 1 cup warm (not hot) water
duration: Daily; ongoing while it feels good. Pause if it brings on reflux.
timing_notes: First thing on waking, on an empty stomach — before your morning tea.
  Sip it slowly while it's warm.
