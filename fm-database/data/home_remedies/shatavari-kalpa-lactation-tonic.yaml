category: kashayam
summary: Shatavari kalpa is the classical Ayurvedic galactagogue — a preparation for increasing
  breast milk supply. Shatavari (Asparagus racemosus) is lightly roasted in ghee with natural
  brown sugar to make a sweet, nourishing preparation that is then stirred into warm milk.
  Shatavari is a premier Ayurvedic rasayana for women's reproductive health, supporting lactation,
  oestrogen balance, and nourishment of the rasa dhatu (plasma/lymph).
indications:
- insufficient breast milk supply (scanty lactation)
- postpartum recovery and nourishment
- general reproductive tonic for women
- low ojas or depleted vitality after childbirth
contraindications:
- oestrogen-sensitive conditions (oestrogen-receptor positive breast cancer, endometriosis,
  uterine fibroids) — consult your oncologist or gynaecologist before using shatavari
- known asparagus family allergy
- active mastitis or breast abscess — treat the infection first
- gestational diabetes (jaggery/sugar content)
