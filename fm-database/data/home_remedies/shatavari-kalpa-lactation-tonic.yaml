preparation: 'SHATAVARI KALPA: In a small pan, roast 1 teaspoon of shatavari powder in 1 teaspoon
  of ghee over low heat for 1-2 minutes until fragrant. Add 1 teaspoon of natural brown sugar
  (or jaggery) and stir to combine. Stir this roasted mixture into 1 cup of warm milk and
  drink immediately. Alternatively: mix 1 teaspoon shatavari powder with 1 teaspoon natural
  sugar and take with 1 teaspoon ghee and 1 cup of hot milk.'
typical_dose: 1 teaspoon in 1 cup warm milk, 2-3 times a day
duration: Continue throughout the breastfeeding period; can also be used prenatally in the
  third trimester with practitioner guidance
timing_notes: Best taken with meals; the mid-morning and early evening doses help sustain
  milk supply throughout the day
