slug: rose-milk-morning-sickness
display_name: Rose Petal Milk for Morning Sickness
aliases:
  - gulab-dudh-morning-sickness
  - rose-water-milk-pregnancy-nausea
category: kitchen_remedy
summary: >-
  Lad recommends warm rose petal milk to eliminate nausea and control morning
  sickness throughout pregnancy. Rose is profoundly pitta-pacifying and
  cooling, and its fragrant compounds calm the heightened olfactory sensitivity
  that intensifies nausea in pregnancy. The milk base provides calcium,
  protein, and a grounding, anti-acid quality. A teaspoon of ghee added at
  bedtime as a preventive measure pacifies pitta overnight and helps control
  morning-sickness episodes the following day.
indications:
  - nausea and vomiting in early pregnancy (morning sickness)
  - heightened smell sensitivity triggering nausea
  - pitta-driven acid excess in pregnancy
  - prevention of morning sickness at bedtime
contraindications:
  - dairy intolerance or allergy — substitute with coconut milk
  - severe hyperemesis (persistent vomiting despite remedies) — see a doctor
  - rose allergy or hypersensitivity (rare)
  - commercial rose water containing synthetic fragrance or preservatives — use food-grade or fresh petals only
preparation: >-
  When feeling nauseated: add 1 drop of food-grade rose essence or rose water
  to 1 cup of milk. Boil the milk, then drink warm. Alternatively, add 5 fresh
  clean rose petals to 1 cup milk and bring to a gentle boil; steep 3-5
  minutes, strain and drink. As a bedtime preventive: prepare as above and add
  1 teaspoon of ghee before drinking.
typical_dose: 1 cup when nauseated; 1 cup at bedtime as preventive
duration: Throughout the first trimester or as long as morning sickness persists
timing_notes: Drink warm when nausea arises; bedtime dose is the key preventive dose
