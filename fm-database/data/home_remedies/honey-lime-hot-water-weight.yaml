slug: honey-lime-hot-water-weight
display_name: Honey-Lime Hot Water Hunger Reducer
aliases:
  - shahad-nimbu-pani
  - honey-lemon-water-weight
  - kapha-hunger-drink
category: infused_water
summary: >-
  Lad's Ayurvedic weight-management drink: a cup of hot water with 1 teaspoon
  honey and 10 drops of fresh lime juice, to be taken whenever a hunger pang
  strikes. Honey is scraping (lekhana) in Ayurveda and is uniquely indicated
  for kapha conditions including excess weight; it helps dissolve fat deposits
  and ama. Lime adds digestive fire and alkalising action. The combination is
  distinctly different from plain warm lemon water — the honey-lekhana effect
  targets kapha accumulation and emotional appetite.
indications:
  - obesity and excess weight (kapha predominant)
  - frequent hunger pangs and emotional eating
  - midlife weight gain
  - metabolic sluggishness with kapha accumulation
contraindications:
  - diabetes or pre-diabetes (honey raises blood sugar — use with care or omit honey)
  - not suitable as a meal replacement for active hypoglycaemia
  - hot honey should NOT be used — always let tea cool to warm/drinking temperature before adding honey (heat destroys beneficial properties and Ayurveda considers cooked honey mildly toxic)
  - active gastritis or acid reflux (lime may irritate)
preparation: >-
  Boil water and allow it to cool to hot-but-drinkable (approximately 55-60°C
  — not scalding). Add 1 teaspoon raw honey and 10 drops (roughly 1/4 teaspoon)
  fresh lime juice. Stir well and drink slowly.
typical_dose: 1 cup whenever a hunger pang arises; can also be taken first thing in the morning
duration: Use daily during active weight management; ongoing as maintenance
timing_notes: Between meals when hunger strikes; can also replace a snack; morning use is especially effective
