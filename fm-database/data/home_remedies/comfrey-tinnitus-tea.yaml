slug: comfrey-tinnitus-tea
display_name: Comfrey-Cinnamon-Chamomile Tea (Tinnitus)
aliases:
- tinnitus-comfrey-tea
category: herbal_tea
summary: 'A Lad remedy for tinnitus (ringing in the ears) framed as a vata disturbance of the
  nervous system: a tea of comfrey, cinnamon and chamomile. NOTE: comfrey contains pyrrolizidine
  alkaloids and most modern safety bodies advise AGAINST internal comfrey use — included here
  for completeness from the source, but see the contraindications; many practitioners would
  substitute a comfrey-free nervine tea (e.g. chamomile + jatamamsi).'
indications:
- tinnitus / ringing in the ears (vata type)
- nervous-system restlessness with ear noise
contraindications:
- 'IMPORTANT: comfrey contains hepatotoxic pyrrolizidine alkaloids — internal use is NOT recommended
  by most safety authorities (risk of veno-occlusive liver disease). Avoid internal comfrey
  entirely in pregnancy/breastfeeding, liver disease, with other hepatotoxic agents, and for
  anything beyond very short-term use. Prefer a comfrey-free version (chamomile + jatamamsi
  + cinnamon).'
- persistent, one-sided, or pulsatile tinnitus, or tinnitus with hearing loss/vertigo — see
  a doctor (rule out treatable causes)
balances_dosha:
- vata
aggravates_dosha:
- pitta
rasa:
- sweet
- pungent
- bitter
virya: heating
vipaka: sweet
ayurvedic_actions:
- dipana
- carminative
- nervine
preparation: 'Lad''s original: equal parts comfrey, cinnamon and chamomile, ~1/2 tsp steeped
  in 1 cup hot water 10 min. SAFER ALTERNATIVE recommended here: omit comfrey — use equal parts
  chamomile and jatamamsi with a little cinnamon instead.'
typical_dose: 1 cup
duration: Short-term only; reassess (and avoid prolonged comfrey use)
timing_notes: Evening
