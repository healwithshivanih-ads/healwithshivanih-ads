slug: yogaraj-guggulu
display_name: Yogaraj Guggulu (Vata Joints & Back)
aliases:
- yoga-raja-guggulu
- yograj-guggulu
category: ayurvedic_churan
summary: A classical guggulu formulation Lad recommends for vata-type arthritis, backache, sciatica
  and osteoarthritis — dry, cracking, painful joints that worsen with movement and cold. Combines
  purified guggulu with warming, vata-pacifying herbs to clear ama from the joints and ease
  stiffness.
indications:
- vata-type arthritis (dry, cracking, painful joints)
- backache and sciatica
- osteoarthritis
- joint stiffness worse in cold
contraindications:
- 'THYROID INTERACTION: guggul (guggulsterones) can alter thyroid hormone levels/metabolism
  — important if on levothyroxine or with thyroid disease; coordinate with the prescriber and
  monitor'
- 'blood thinning: may increase bleeding risk — caution with anticoagulant/antiplatelet drugs
  and before surgery'
- pregnancy and breastfeeding — avoid (uterine stimulant)
- can cause GI upset, loose stools, hyperacidity, headache, or skin rash; stop if rash/itching
  occurs
- classical tablet formulation from an Ayurvedic pharmacy — best used under a knowledgeable
  practitioner, not indefinitely
