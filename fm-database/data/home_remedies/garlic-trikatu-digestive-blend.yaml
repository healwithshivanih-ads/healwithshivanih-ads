slug: garlic-trikatu-digestive-blend
display_name: Garlic and Trikatu Pre-Meal Blend for Indigestion
aliases:
  - lehsun-trikatu-digestive
  - garlic-trikatu-agni-kindler
  - garlic-black-pepper-ginger-pre-meal
category: spice_blend
summary: >-
  Lad recommends a pre-meal stimulant of garlic powder, trikatu (the classic
  ginger-black pepper-long pepper trio), and rock salt to powerfully kindle agni
  before eating. Garlic is heating and helps stimulate gastric secretions; trikatu
  is the cornerstone Ayurvedic digestive stimulant that increases bile flow,
  digestive enzymes and metabolic fire. This warming spice blend is ideal for
  chronic low agni, particularly vata-kapha digestive sluggishness.
indications:
  - chronic indigestion and low digestive fire
  - sluggish metabolism
  - poor appetite
  - gas and bloating from incomplete digestion
  - post-meal heaviness
contraindications:
  - active gastritis, acid reflux or peptic ulcer (too heating — aggravates pitta)
  - hot, inflamed GI conditions
  - high pitta constitution (use cautiously)
  - sodium-restricted diets (omit the rock salt)
preparation: >-
  Mix together quarter teaspoon garlic powder, half teaspoon trikatu (equal parts
  dried ginger, black pepper, and Indian long pepper), and a pinch of rock salt.
  Alternatively, chop 1 clove of fresh garlic with a quarter teaspoon cumin
  powder, a pinch of rock salt, a pinch of trikatu, and 1 teaspoon lime juice.
  Take this mixture just before lunch and dinner.
typical_dose: Quarter teaspoon of the dry blend, or 1 clove fresh garlic with spices, before meals
duration: Use during periods of poor digestion; ongoing for those with chronic low agni
timing_notes: 10-15 minutes before lunch and dinner
