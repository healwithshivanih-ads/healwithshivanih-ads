slug: ghee-milk-bedtime-constipation
display_name: Warm Ghee-Milk at Bedtime for Constipation
aliases:
  - ghrita-dugdha-constipation
  - warm-milk-ghee-laxative
  - bedtime-milk-ghee
category: kitchen_remedy
summary: >-
  One of Lad's gentlest and most effective remedies for constipation — stirring
  1 to 2 teaspoons of pure ghee into a cup of hot milk and drinking it at
  bedtime. Ghee lubricates and oleates the intestinal wall (snehana), softening
  dry stools and gently stimulating peristalsis overnight. Warm milk itself is
  mildly laxative and deeply calming. Lad notes this is especially suited for
  vata and pitta constitutions; kapha types should use it sparingly as it may
  be too building for regular use.
indications:
  - mild to moderate constipation
  - dry, hard stools (vata-type constipation)
  - constipation in pitta types
  - constipation with associated dryness, flatulence, and discomfort
contraindications:
  - dairy allergy or lactose intolerance — use a dairy-free alternative but
    note this changes the traditional preparation
  - kapha-dominant constitution or those prone to congestion and weight gain
    should use only occasionally, not daily
  - do not use drastic purgatives alongside this remedy
  - avoid if constipation is accompanied by fever, severe abdominal pain, or
    rectal bleeding — see a doctor
balances_dosha:
  - vata
  - pitta
aggravates_dosha:
  - kapha
preparation: >-
  Warm 1 cup of whole milk until hot but not boiling. Stir in 1 to 2 teaspoons
  of pure ghee (clarified butter) until melted. Drink warm at bedtime.
typical_dose: 1 cup with 1-2 teaspoons ghee at bedtime
duration: Use nightly until constipation resolves; can be used up to 2 weeks
  continuously, then reassess
timing_notes: At bedtime, after the last meal of the day
