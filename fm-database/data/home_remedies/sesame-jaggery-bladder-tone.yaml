slug: sesame-jaggery-bladder-tone
display_name: Sesame Seeds with Jaggery for Bladder Tone
aliases:
  - til-jaggery-bladder
  - sesame-jaggery-incontinence
  - white-sesame-bladder-tonic
category: kitchen_remedy
summary: >-
  A simple Ayurvedic dietary remedy to strengthen the bladder sphincter and
  reduce stress urinary incontinence (bladder atonia). Lad recommends a
  handful of white sesame seeds chewed with jaggery to restore tone to the
  bladder — sesame provides calcium and magnesium for smooth muscle function,
  while jaggery (unrefined brown sugar) acts as a carrier (anupan) that
  helps deliver these minerals to the tissue. Particularly relevant for women
  who leak urine on sneezing or coughing.
indications:
  - stress urinary incontinence (leaking urine on coughing, sneezing, laughing)
  - bladder atonia or weak bladder sphincter
  - frequent urination without infection
  - perimenopausal or postmenopausal urinary changes
contraindications:
  - diabetes or high blood sugar — jaggery is a concentrated sugar; reduce
    or omit jaggery and use just sesame seeds
  - sesame allergy
  - known kidney stones (sesame is high in oxalates)
balances_dosha:
  - vata
aggravates_dosha:
  - kapha
preparation: >-
  Take one handful of white sesame seeds and 1 teaspoon of jaggery
  (or natural unrefined brown sugar). Chew the sesame seeds well with the
  jaggery until thoroughly mixed in the mouth, then follow with half a cup
  of water to wash it down.
typical_dose: One handful of sesame with 1 teaspoon jaggery, 1-2 times a day
duration: Continue until the condition improves; may take 4-8 weeks of regular
  use
timing_notes: Can be taken at any time of day; convenient as a mid-morning or
  afternoon snack
