slug: jatamamsi-brahmi-antistress-hair-tea
display_name: Jatamamsi-Brahmi Anti-Stress Hair Tea
aliases:
  - jatamansi-brahmi-hair-tea
  - brahmi-jatamamsi-hair-loss-tea
category: herbal_tea
summary: >-
  A calming two-herb tea specifically formulated by Lad to address stress-
  related hair loss. Equal parts jatamamsi (Indian spikenard, Nardostachys
  jatamansi) and brahmi (Bacopa monnieri) steeped in hot water reduce excess
  pitta, calm the nervous system, and address the stress-cortisol mechanism
  driving hair thinning. This is distinct from the general jatamansi-brahmi
  sleep tea — the target here is stress-induced alopecia.
indications:
  - stress-related hair loss or thinning
  - hair fall associated with anxiety, overwork, or burnout
  - pitta-type hair thinning (premature, diffuse)
  - hair loss in perimenopausal women with high stress loads
contraindications:
  - sedative medications (brahmi and jatamamsi may enhance sedative effects)
  - pregnancy or breastfeeding (consult practitioner)
  - hypotension (both herbs may lower blood pressure)
  - avoid driving or operating machinery within 2 hours if feeling drowsy
balances_dosha:
  - vata
  - pitta
aggravates_dosha: []
preparation: >-
  Mix equal amounts of jatamamsi powder and brahmi (bacopa) powder. Use 1
  teaspoon of the combined mixture per 1 cup of hot (not boiling) water. Steep
  for 10 minutes, then strain and drink. Can also be made by simmering
  briefly for 2-3 minutes if using dried herbs rather than powder.
typical_dose: 1 cup, 2-3 times a day
duration: Continue for 2-3 months as part of a broader hair health protocol
timing_notes: Can be taken morning, afternoon, and/or before bed; particularly
  helpful before bedtime to calm stress and support overnight recovery
