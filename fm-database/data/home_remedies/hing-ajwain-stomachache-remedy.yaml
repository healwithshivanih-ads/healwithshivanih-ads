category: spice_blend
summary: >-
  Lad's most immediate Ayurvedic kitchen remedy for a common stomachache — a
  pinch of hing (asafoetida) combined with cumin powder and rock salt, chewed
  and washed down with warm water. Separately, ajwain (carom/Indian celery
  seed) mixed with a pinch of baking soda offers a second fast-acting option.
  Both remedies kindle digestive fire (agni), dispel gas, and relieve cramping.
  Hing is the most powerful anti-flatulent and anti-colic herb in the Indian
  kitchen; ajwain contains thymol, a carminative essential oil that relaxes
  the gut wall and relieves spasm.
indications:
  - stomachache and abdominal cramps
  - gas, bloating, and colic
  - indigestion and low agni
  - stomachache associated with diarrhea (rubbing ginger juice around navel)
  - nausea with vata-type stomachache
contraindications:
  - avoid in active gastritis, peptic ulcer, or acid reflux (pungent herbs may aggravate)
  - high-pitta individuals should use sparingly — hing and ajwain are both heating
  - seek medical attention if stomachache is severe, sharp, or accompanied by fever, vomiting, or blood
  - do not self-treat if appendicitis, enteritis, or colic from gallstones is suspected
preparation: >-
  Option A (hing-jeera-salt): Mix together 1/3 teaspoon cumin (jeera) powder,
  a pinch of hing (asafoetida), and a pinch of rock salt. Chew this mixture
  well, then wash it down with a cup of warm water.
  Option B (ajwain-baking soda): Mix 1/2 teaspoon ajwain (carom seeds) with
  1/4 teaspoon baking soda. Chew the mixture thoroughly, then drink it down
  with a little warm water. This is especially useful for gas and bloating.
typical_dose: One serving as needed; repeat once after 30 minutes if relief is incomplete
duration: Use for acute stomachache; if pain persists beyond a few hours seek medical advice
timing_notes: Take between meals, at the onset of stomach discomfort
