summary: Lad's primary herbal formula for menopause, combining equal parts shatavari and vidari
  (or wild yam). Both herbs supply natural food precursors of oestrogen and progesterone,
  which Ayurveda positions as a gentler alternative to synthetic HRT. Shatavari is the foremost
  female rejuvenating herb, and vidari nourishes reproductive tissue and supports hormonal
  transition. Lad recommends this throughout the entire menopausal stage, taken with aloe
  vera juice or warm water after meals.
indications:
- hot flashes and heat surges at menopause
- mood swings, irritability and anxiety at menopause
- water retention and bloating at menopause
- insomnia linked to hormonal decline
- vaginal dryness and tissue thinning
- perimenopausal hormonal fluctuation
- prevention of bone loss associated with menopause
contraindications:
- oestrogen-sensitive conditions (fibroid, oestrogen-receptor-positive breast or uterine cancer)
  — discuss with doctor before use
- unexplained uterine bleeding — see a doctor first
- severe liver disease (shatavari is metabolised hepatically)
- kapha excess or obesity — monitor; the formula can increase kapha if overused
preparation: Mix 1/2 teaspoon shatavari powder with 1/2 teaspoon vidari (or wild yam) powder.
  Take this mixture twice a day after lunch and after dinner, with a few sips of warm water
  or 1/2 cup of aloe vera juice.
typical_dose: 1/2 teaspoon shatavari + 1/2 teaspoon vidari, twice daily after meals
duration: Throughout the menopausal stage; reassess every 3 months
timing_notes: After lunch and after dinner; taking with aloe vera juice enhances the cooling
  effect
