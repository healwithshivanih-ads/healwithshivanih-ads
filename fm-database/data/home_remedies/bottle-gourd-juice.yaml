slug: bottle-gourd-juice
display_name: Bottle Gourd (Lauki) Juice
aliases:
- lauki-juice
category: vegetable_juice
summary: 'Fresh bottle-gourd juice — a light, cooling, alkalising drink traditionally used for heat, blood
  pressure and weight support. SAFETY: only ever use sweet, non-bitter lauki.'
indications:
- cooling
- blood-pressure-support
- weight-support
contraindications:
- NEVER drink if the lauki tastes bitter (toxic cucurbitacins — discard immediately)
- take small amounts; do not replace meals
balances_dosha:
- pitta
aggravates_dosha:
- vata
preparation: Peel and taste a small piece of raw lauki first — if bitter, discard. If sweet, juice with
  a little water, mint and lemon. Drink fresh, never stored.
typical_dose: 1 small glass (~150 ml), fresh, a few mornings a week.
duration: Ongoing; always taste-test for bitterness first.
timing_notes: Fresh in the morning on an empty stomach.
