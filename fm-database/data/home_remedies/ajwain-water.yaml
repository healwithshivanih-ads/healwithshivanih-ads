slug: ajwain-water
display_name: Ajwain (Carom) Water
aliases:
- ajwain-pani
category: infused_water
summary: Carom seeds boiled in water — a strong carminative water for gas, acidity-with-gas and post-meal
  bloating; also a traditional post-partum digestive.
indications:
- gas
- bloating
- indigestion
contraindications:
- pregnancy (large amounts)
- active peptic ulcer
balances_dosha:
- vata
- kapha
aggravates_dosha:
- pitta
preparation: Boil 1 tsp ajwain in 2 cups water for 5 min; strain.
typical_dose: 1/2-1 cup warm when bloated, or after a heavy meal.
duration: As needed; safe daily in moderation.
timing_notes: After meals or when gassy.
