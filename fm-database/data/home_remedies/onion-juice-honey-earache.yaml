slug: onion-juice-honey-earache
display_name: Onion Juice & Honey Ear Drops (Earache)
aliases:
- onion-honey-ear
category: other
summary: 'Lad''s first-aid for earache: a few drops of a mixture of onion juice and honey (or
  3 drops of garlic oil) into the ear. Onion and garlic are antimicrobial and the warmth soothes
  the ache. A holding measure for a simple earache until it settles or can be seen.'
indications:
- simple earache (mild, no discharge)
- ear discomfort with a cold
contraindications:
- DO NOT use if there is ear discharge, a possible perforated eardrum, severe pain, fever, or
  hearing loss — see a doctor
- not for grommets/ear tubes
- children's earache should be reviewed by a doctor
balances_dosha:
- vata
- kapha
aggravates_dosha:
- pitta
preparation: Mix 1 tsp onion juice with 1/2 tsp honey; warm slightly to body temperature; put
  5-10 drops in the affected ear and plug loosely with cotton. (Garlic oil — 3 drops — is the
  alternative.)
typical_dose: A few drops, 1-2 times a day
duration: 1-3 days; see a doctor if not settling
timing_notes: When the ache flares; lie with the ear up afterwards
