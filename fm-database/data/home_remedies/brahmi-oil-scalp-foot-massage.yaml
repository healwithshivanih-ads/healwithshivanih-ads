slug: brahmi-oil-scalp-foot-massage
display_name: Brahmi Oil Scalp & Foot Massage (Memory/Focus)
aliases:
- brahmi-oil-head-massage
category: other
summary: A calming brahmi-infused oil massaged into the scalp and soles at night to support
  memory, focus and a settled mind — Lad's recommendation in the Memory chapter. Brahmi (bacopa)
  is a classic medhya (brain-nourishing) herb; the oil massage itself calms vata and supports
  sleep, which consolidates memory.
indications:
- poor memory / concentration
- mental fatigue / brain fog
- studying or cognitive load
- restless mind at night
contraindications:
- keep oil off the pillow (stains) — wear an old cap / put a towel down
- scalp infection or broken skin
balances_dosha:
- vata
- pitta
aggravates_dosha:
- kapha
preparation: Warm a little brahmi oil; massage gently into the scalp and the soles of the feet
  for a few minutes at night before bed (leave on overnight or wash off after ~30-60 min).
typical_dose: A few minutes' massage
duration: Nightly or several times a week
timing_notes: At night before bed
linked_to_topics:
- cognitive-decline
- perimenopause
linked_to_mechanisms:
- hpa-axis-dysregulation
- neuroinflammation
