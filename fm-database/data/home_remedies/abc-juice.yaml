slug: abc-juice
display_name: ABC Juice (Apple-Beetroot-Carrot)
aliases:
- apple-beetroot-carrot-juice
category: vegetable_juice
summary: Fresh apple, beetroot and carrot juiced together — a nutrient-dense glass rich in plant iron,
  folate and antioxidants, traditionally used for skin, blood and general vitality.
indications:
- low-iron
- skin-health
- general-nutrition
- fatigue
contraindications:
- diabetes / blood-sugar concerns (natural sugars — dilute and keep small, or eat whole instead)
- kidney-stone history (beet oxalates)
preparation: Juice 1 small apple, 1 small beetroot, 1-2 carrots; add a squeeze of lemon (helps iron +
  flavour). Drink fresh.
typical_dose: 1 small glass (~150-200 ml), a few times a week.
duration: Ongoing; rotate with whole fruit/veg.
timing_notes: Morning or mid-morning, fresh. Pair with vitamin C (lemon) for iron.
