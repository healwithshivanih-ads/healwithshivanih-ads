slug: triphala-gum-rinse
display_name: Triphala Tea Gum Rinse for Bleeding Gums and Gingivitis
aliases:
  - triphala-mouthwash
  - triphala-gargle-gums
category: kashayam
summary: >-
  A triphala tea used as a mouth rinse and gargle to address bleeding gums and
  gingivitis. Triphala's strong astringent properties act as a haemostatic
  (stops bleeding) and help tighten inflamed gum tissue, while its antibacterial
  action reduces gum infection. Lad considers this one of the most effective
  Ayurvedic remedies for both gingivitis and bleeding gums.
indications:
  - bleeding gums
  - gingivitis
  - swollen inflamed gums
  - pitta-type gum inflammation
  - general oral hygiene support
contraindications:
  - do not swallow the rinse (triphala tea is safe in small amounts, but the
    rinse is intended for topical oral use only)
  - active dental abscess — requires a dentist
  - pregnancy — triphala internally is generally avoided; topical rinse is lower
    risk but check with practitioner
preparation: >-
  Boil 1/2 teaspoon triphala powder in 1 cup water for 2 minutes. Strain
  thoroughly through a double-folded cheesecloth or a coffee filter so that no
  particles of triphala remain in the liquid. Allow to cool until comfortably
  warm. Use this tea as a mouth rinse, swishing and gargling for 1-2 minutes.
typical_dose: One cup of triphala tea as a rinse, 1-2 times daily
duration: Continue daily for 2-4 weeks or until gums improve
timing_notes: After meals or before bed; spit out after rinsing
balances_dosha:
  - pitta
  - kapha
