category: vegetable_juice
summary: An Ayurvedic internal remedy for pitta-type hair thinning and premature loss. Fresh
  aloe vera juice (or gel) taken daily with a pinch of cumin (jeera) helps cool excess pitta
  in the blood, which Lad identifies as the primary driver of baldness and hair fall in pitta
  constitutions. Regular daily use over three months is recommended for noticeable results.
indications:
- premature hair thinning or hair fall (pitta type)
- oily scalp with hair loss
- excess pitta signs — heat, irritability, inflammation
- hair loss associated with stress and hormonal fluctuations
contraindications:
- diarrhea or loose stools (aloe vera has a mild laxative effect)
- pregnancy (aloe vera juice internally is generally avoided)
- known aloe allergy
- hypoglycaemia (aloe vera may lower blood sugar; monitor in diabetics)
