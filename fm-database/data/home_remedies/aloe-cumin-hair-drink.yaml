preparation: Take 1/3 cup of fresh aloe vera juice (or 1 tablespoon of fresh aloe vera gel)
  and stir in a pinch of cumin (jeera) powder. Drink as is, once or twice a day. Alternatively,
  blend fresh aloe vera gel with water to make a juice, then add the cumin pinch.
typical_dose: 1/3 cup aloe vera juice with a pinch of cumin, 2-3 times a day
duration: Continue for 3 months for best results
timing_notes: Take between meals or first thing in the morning on an empty stomach
