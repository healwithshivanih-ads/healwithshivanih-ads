slug: shatavari-vidari-libido-tonic
display_name: Shatavari-Vidari Reproductive Tonic Milk
aliases:
  - shatavari-vidari-milk
  - female-libido-milk-tonic
  - artava-dhatu-tonic
category: kitchen_remedy
summary: >-
  Lad's primary herbal remedy for low libido and sexual debility in women,
  combining shatavari (the foremost female rejuvenating herb) with vidari (wild
  yam root, a natural food precursor of oestrogen and progesterone). Taken in
  warm milk at bedtime, this tonic nourishes artava dhatu (female reproductive
  tissue), supports hormonal balance, and helps restore desire and vitality in
  perimenopausal and stressed women. The milk medium enhances absorption and
  adds a grounding, sleep-supportive quality.
indications:
  - low libido in women
  - sexual debility or fatigue
  - reproductive tissue weakness (artava dhatu kshaya)
  - perimenopausal low energy and loss of vitality
  - hormonal depletion from chronic stress
contraindications:
  - oestrogen-sensitive conditions (fibroids, oestrogen-receptor-positive cancers) — check with doctor
  - active uterine bleeding or abnormal menstrual bleeding — consult a doctor first
  - pregnancy — avoid without practitioner guidance
  - breast cancer history — discuss with oncologist
preparation: >-
  Mix 1 teaspoon shatavari powder with 1/2 teaspoon vidari powder into 1 cup of
  warm (not boiling) milk. Stir well or, ideally, simmer the herbs in the milk
  for 2-3 minutes before drinking. Add a small amount of honey or jaggery if
  desired, but add honey only after the milk has cooled slightly (not to boiling
  milk).
typical_dose: 1 cup at bedtime
duration: 1-3 months; reassess monthly
timing_notes: Take at bedtime for best absorption and grounding effect
