- nervous-system-calming
- channel-softening
- immune-strengthening
preparation: Warm ¼–½ cup organic sesame oil in a jar placed in hot water. Lay an old bath towel on the
  floor of a warm room. Apply warm oil to the whole body — long strokes along bones, circular strokes
  on joints, wide clockwise circles on chest and abdomen. Massage face and head last. Use little fingers
  to oil ears and nose. Massage for ~15 minutes. Lie on towel and rest 5–30 minutes (minimum 5 after 15-minute
  massage). Finish with a hot shower but do not use soap on oiled skin.
typical_dose: ¼–½ cup sesame oil per session
duration: Daily during a 3–7 day seasonal cleanse; weekly year-round for maintenance
timing_notes: Morning energises; evening massage aids sleep — either is suitable during a cleanse
