slug: snehana-deep-seasonal-oil-self-massage
display_name: Snehana (Deep Seasonal Oil Self-Massage)
aliases: []
category: other
route: external
summary: Extended full-body warm sesame oil massage practiced daily during Ayurvedic seasonal cleanses
  (purvakarma). Unlike the quick daily abhyanga, snehana involves a full 15–30 minute soaking massage,
  lying on a towel, allowing at least 20 minutes for oil absorption before a hot shower. Quiets the nerves,
  softens impurities in channels, and supports the elimination of accumulated dosha. Weekly practice year-round
  enhances immunity and nervous system strength.
indications:
- seasonal cleanse preparation (spring and fall)
- nervous system calming
- pain management support
- immune system strengthening
- deep detoxification support
- purvakarma preparation
contraindications:
- do not use drying oils (coconut only in summer heat)
- ensure towel is hung to dry — not machine-dried after oiling (fire hazard)
- patch test before full application
balances_dosha:
- vata
- pitta
aggravates_dosha: []
rasa: []
virya: null
vipaka: null
prabhava: ''
