slug: dry-brushing-garshana-lymphatic-stimulation
display_name: Dry Brushing (Garshana) for Lymphatic Stimulation
aliases: []
category: other
route: external
summary: Dry skin brushing using a natural-bristle brush on dry skin before showering. Starting at the
  ankles and moving toward the heart, make small brisk circles over the entire body (especially armpits,
  chest, inner thighs, groin). Especially indicated in late winter and spring, or where there is weight
  gain or water retention. Stimulates the lymphatic system and exfoliates skin.
indications:
- kapha accumulation
- water retention or puffiness
- weight gain
- sluggish lymphatic flow
- spring and late-winter seasonal cleanse
- dull skin or lack of circulation
contraindications:
- do not use on irritated, broken, or sunburned skin
- avoid over very thin or sensitive skin
balances_dosha:
- kapha
aggravates_dosha:
- vata
rasa: []
virya: null
vipaka: null
prabhava: ''
ayurvedic_actions:
- lekhana-scraping
- stimulating
- lymphatic-activating
preparation: Use a natural (not synthetic) stiff-bristle dry brush. On dry skin before showering, begin
  at the ankles. In small brisk circles, work upward toward the heart. Spend extra attention on armpits,
  chest, inner thighs, and groin. Firm pressure but do not abrade — a rosy color is the goal. Takes 3–5
  minutes.
typical_dose: 3–5 minutes before shower
duration: Daily to weekly depending on kapha accumulation; most important in spring and late winter
timing_notes: Before abhyanga and shower; morning is best
