slug: eucalyptus-ginger-sinus-steam
display_name: Eucalyptus or Ginger Steam Inhalation for Sinuses
aliases:
- medicated-steam-sinuses
- sinus-steam-inhalation
- adrak-bhap-nasika
category: other
route: external
summary: Lad's go-to remedy for clogged, congested sinuses — medicated steam that penetrates
  and drains the sinus cavities quickly. A cupful of hot water with eucalyptus oil (or fresh
  ginger boiled in water) creates warm, aromatic steam that liquefies mucus, reduces sinus
  pressure, and soothes the nasal membrane. Sinusitis is an excess-kapha condition; the heating,
  drying quality of ginger and eucalyptus directly counters kapha congestion.
indications:
- sinus congestion and blockage
- sinus headache
- nasal stuffiness from cold, allergy, or seasonal change
- excess kapha in the respiratory tract
- post-nasal drip
contraindications:
- active asthma (steam may irritate airways — use with caution)
- very young children (risk of scald — keep out of reach)
- broken or burned skin around the face
- do not lean too close to boiling water; let it cool for 1-2 minutes first
preparation: 'Option A (eucalyptus): Heat a cup of water until hot but not vigorously boiling.
  Add 3 to 5 drops of eucalyptus essential oil. Turn off the flame. Sit comfortably, cover
  your head with a large towel, lean over the pot, and inhale the steam slowly and deeply
  for 5 to 10 minutes. Option B (ginger): Take 1 inch of fresh ginger, chop into small pieces,
  and boil in about 1 cup of water for 5 minutes. Remove from heat. Cover your head with a
  towel and inhale the ginger steam for 5 to 10 minutes. Powdered ginger (1/4 teaspoon) can
  be used if fresh is unavailable.'
typical_dose: One steam inhalation session per episode of congestion
duration: Use as needed during congestion; repeat 1 to 2 times daily until sinuses clear
timing_notes: Can be done any time of day; morning and evening are most effective
