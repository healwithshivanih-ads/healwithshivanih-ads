preparation: >-
  Dry-roast 1/2 cup fennel seeds in a heavy pan until slightly brown and
  fragrant; sprinkle over 1 tbsp salt dissolved in a little water and toast until
  dry. Separately roast 1/4 cup toasted coriander seeds, 1 tbsp cumin seeds,
  1 tbsp ajwain seeds and 1/4 cup sesame seeds, each until fragrant. Mix all
  together and store in a glass jar.
typical_dose: ~1 teaspoon chewed slowly after lunch and supper
duration: Ongoing as a daily after-meal habit
timing_notes: Take immediately after lunch and the evening meal
