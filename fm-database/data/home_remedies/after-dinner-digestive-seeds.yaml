summary: >-
  A roasted seed blend — fennel, toasted coriander, sesame, cumin and ajwain
  with a little salt — eaten by the spoonful after lunch and supper for good
  digestion and sweet breath. The classic Indian post-meal mukhwas, presented by
  Lad as a digestive (dipana / carminative): fennel and coriander are cooling and
  soothing while cumin, ajwain and sesame are warming and carminative, together
  relieving gas and freshening the mouth. Distinct from the cumin-coriander-fennel
  TEA already in the catalogue — these are dry-roasted seeds chewed after meals.
indications:
  - bloating and gas after meals
  - sluggish post-meal digestion
  - bad breath after eating
  - heavy or rich meals
contraindications:
  - high pitta / acidity / heartburn — favour more fennel and coriander, less ajwain and sesame (heating)
  - pregnancy — use the ajwain-containing blend sparingly
