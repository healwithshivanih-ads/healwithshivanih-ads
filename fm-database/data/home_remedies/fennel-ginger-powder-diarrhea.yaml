slug: fennel-ginger-powder-diarrhea
display_name: Fennel and Ginger Powder Chew for Acute Diarrhea
aliases:
  - saunf-adrak-churan-diarrhea
  - fennel-ginger-anti-diarrhea
category: spice_blend
summary: >-
  A simple two-spice remedy Lad recommends for acute diarrhea — equal parts
  fennel (saunf) powder and ginger powder chewed together. Fennel soothes and
  calms intestinal spasm, reduces gas, and has mild antimicrobial properties;
  ginger powder (dry ginger, saunth) kindles agni, reduces vata and kapha, and
  has well-documented anti-inflammatory effects on the gut wall. Together they
  help stop loose stools quickly.
indications:
  - acute diarrhea
  - loose stools with gas and cramping
  - diarrhea from indigestion or weak agni
  - travel diarrhea or food intolerances
contraindications:
  - active gastritis or gastric ulcer (ginger is pungent and heating)
  - high-pitta conditions — use cautiously; ginger aggravates pitta
  - if diarrhea continues beyond 3 days without improvement, see a doctor
  - bloody or mucousy diarrhea — seek medical attention
preparation: >-
  Combine half a teaspoon of fennel powder with half a teaspoon of dry ginger
  powder (saunth). Mix well. Place on the tongue and chew slowly, washing down
  with warm water. Alternatively, dissolve in a small cup of warm water and drink.
typical_dose: Half teaspoon fennel + half teaspoon ginger powder, 2–3 times daily
duration: 2–3 days or until stools firm up
timing_notes: Between meals or at onset of symptoms; take with warm water
