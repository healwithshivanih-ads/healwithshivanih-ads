slug: triphala-guggulu
display_name: Triphala Guggulu (Weight & Fat Metabolism)
aliases:
- triphala-guggul
category: ayurvedic_churan
summary: Triphala combined with purified guggulu — a classical formula Lad references for sluggish
  fat metabolism, weight management and clearing ama. Triphala supports digestion/elimination
  while guggulu scrapes fat and lipids; together they target the heavy, congested, kapha metabolic
  pattern.
indications:
- sluggish metabolism / weight gain (kapha)
- high cholesterol with weight
- ama / metabolic congestion
- midlife weight gain
contraindications:
- 'THYROID INTERACTION: guggul (guggulsterones) can alter thyroid hormone levels/metabolism
  — important if on levothyroxine or with thyroid disease; coordinate with the prescriber and
  monitor'
- 'blood thinning: may increase bleeding risk — caution with anticoagulant/antiplatelet drugs
  and before surgery'
- pregnancy and breastfeeding — avoid (uterine stimulant)
- can cause GI upset, loose stools, hyperacidity, headache, or skin rash; stop if rash/itching
  occurs
- classical tablet formulation from an Ayurvedic pharmacy — best used under a knowledgeable
  practitioner, not indefinitely
balances_dosha:
- kapha
aggravates_dosha:
- vata
preparation: Triphala guggulu tablets from an Ayurvedic pharmacy, typically 1 tablet 2-3 times
  a day with warm water (per label/practitioner).
typical_dose: ~1 tablet, 2-3 times a day
duration: In courses under guidance
timing_notes: After meals (or at night) with warm water
linked_to_topics:
- midlife-weight-gain
- dyslipidemia
linked_to_mechanisms:
- chronic-inflammation
- ldl-oxidation
