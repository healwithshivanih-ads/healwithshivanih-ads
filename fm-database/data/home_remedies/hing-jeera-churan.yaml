slug: hing-jeera-churan
display_name: Hing-Jeera Digestive Churan
aliases:
- hingvastak-lite
category: ayurvedic_churan
summary: Cumin (jeera), a pinch of asafoetida (hing) and rock salt — a quick anti-flatulent churan for
  gas, cramping and a bloated, distended belly.
indications:
- gas
- abdominal-cramping
- bloating
contraindications:
- pregnancy (hing in large amounts)
- wheat-containing (non-GF) hing for gluten-free clients — use compounded GF hing
preparation: Lightly roast 2 tbsp cumin, grind; mix with 1/4 tsp hing (gluten-free) and 1/2 tsp rock salt.
typical_dose: 1/4-1/2 tsp with warm water when bloated, or after a heavy meal.
duration: As needed; safe daily.
timing_notes: With or just after meals, or at the first sign of gas.
