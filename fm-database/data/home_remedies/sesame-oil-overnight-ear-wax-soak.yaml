slug: sesame-oil-overnight-ear-wax-soak
display_name: Sesame Oil Overnight Ear Soak for Earwax Prevention
aliases:
  - til-tel-kaan-cleanse
  - sesame-oil-ear-canal-soak
  - monthly-ear-oil-soak
category: other
route: external
summary: >-
  Lad's monthly preventive practice for excess earwax — sleeping on one side with
  warm sesame oil filling the ear canal overnight. Sesame oil lubricates and
  softens accumulated wax, causing it to rise toward the surface of the ear canal
  so it can be gently cleaned in the morning. This simple, non-invasive Ayurvedic
  approach addresses the vata-driven tendency to produce excess or hardened
  earwax, and is best used as monthly maintenance rather than treatment for acute
  blockage.
indications:
  - tendency toward excess or hardened earwax buildup
  - prevention of recurrent earwax blockage
  - mild hearing muffling due to wax
  - dry or tight feeling in the ear canal
contraindications:
  - do NOT use if there is a perforated eardrum
  - do NOT use with active ear infection or discharge — see a doctor
  - use an old towel on the pillow to protect bedding from oil
  - consult a doctor if there is significant hearing loss
preparation: >-
  Once a month, at bedtime, sleep on your left side. Gently warm a small amount of
  cold-pressed sesame oil to body temperature (test on wrist — warm but not hot).
  Using a clean dropper, fill the right ear canal with warm sesame oil. Rest with
  the right ear upward for the night on a towel-covered pillow. The oil will
  penetrate and soften the wax, causing it to migrate toward the surface. In the
  morning, gently wipe the outer ear with a dry cotton swab. The next night, sleep
  on the right side and treat the left ear in the same way.
typical_dose: One ear per night, monthly
duration: Monthly maintenance practice; ongoing as needed
timing_notes: At bedtime only; done once a month for prevention
