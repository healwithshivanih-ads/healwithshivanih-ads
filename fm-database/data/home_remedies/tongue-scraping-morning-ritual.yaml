slug: tongue-scraping-morning-ritual
display_name: Tongue Scraping (Morning Ama Removal)
aliases: []
category: other
route: external
summary: Using a copper or stainless-steel tongue scraper first thing in the morning before eating or
  drinking to remove the whitish coating (ama) that accumulates on the tongue overnight. Considered the
  single most impactful dinacharya practice for digestive and oral health.
indications:
- morning bad breath
- coated tongue indicating ama accumulation
- sluggish digestion or low appetite in the morning
- general daily oral hygiene and detoxification practice
contraindications:
- very sensitive gag reflex — start gently at the back middle of the tongue and work gradually
- use light pressure only — scraping should feel like a gentle sweep, not a scratch
balances_dosha:
- vata
- pitta
- kapha
aggravates_dosha: []
rasa: []
virya: null
vipaka: null
prabhava: ''
ayurvedic_actions:
- ama-removing
- oral-detox
- agni-stimulating
preparation: Hold the two ends of a U-shaped copper or stainless steel scraper. Open mouth, extend tongue,
  and place the scraper as far back as comfortable. Pull forward with light pressure, sweeping ama off
  the tongue surface. Rinse the scraper and repeat 5-7 times.
typical_dose: 5-7 strokes each morning
duration: Daily lifelong practice
timing_notes: First thing in the morning, before drinking or eating anything. Follow with oil pulling
  or brushing teeth.
