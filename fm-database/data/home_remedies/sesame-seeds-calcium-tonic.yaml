slug: sesame-seeds-calcium-tonic
display_name: White Sesame Seeds Morning Calcium Ritual
aliases:
  - til-calcium-ritual
  - white-sesame-bone-tonic
  - safed-til-calcium
category: kitchen_remedy
summary: >-
  Vasant Lad recommends slowly chewing a handful of white (unhulled) sesame
  seeds every morning as a food-source calcium strategy delivering approximately
  1,200 mg of bioavailable calcium per day — without the clogging risk he
  associates with dairy-derived calcium. Sesame seeds are warming, nourishing,
  and particularly indicated for menopausal women to help prevent osteoporosis
  by providing calcium alongside magnesium and zinc in natural food-matrix form.
  The slow chewing releases oils and nutrients and supports digestive assimilation.
indications:
  - osteoporosis prevention
  - perimenopausal and menopausal bone-density support
  - calcium insufficiency from dairy-free or vegan diet
  - vata-type bone weakness (dry, brittle)
contraindications:
  - sesame allergy
  - active kidney stones with hypercalciuria (use caution, check with doctor)
  - very high-oxalate states — chew well to aid digestion
preparation: >-
  Measure out a small handful (approximately 1 tablespoon) of raw white
  (unhulled) sesame seeds. Chew them slowly and thoroughly first thing in the
  morning before eating anything else. The seeds must be chewed well, not
  swallowed whole, for calcium absorption. Can be lightly dry-roasted on a pan
  to improve digestibility and flavour.
typical_dose: One small handful (~1 tablespoon) of white sesame seeds each morning
duration: Daily, ongoing — particularly important peri- and post-menopausally
timing_notes: First thing in the morning on an empty stomach; chew very thoroughly
