slug: castor-oil-gallstone-compress
display_name: Warm Castor Oil Compress for Gallstone Pain
aliases:
- castor-oil-pack-gallbladder
- arandi-tel-compress
category: other
route: external
summary: A warm castor oil compress applied over the gallbladder area provides slow, sustained,
  soothing heat that relieves gallstone pain. Castor oil's penetrating warmth relaxes the
  bile duct and reduces cramping when the gallbladder is trying to expel a stone. Lad recommends
  this as a first measure whenever gallstone pain arises, before considering any flushing
  procedure.
indications:
- gallstone pain and cramping
- gallbladder congestion and discomfort
- sluggish bile flow
- right upper abdominal heaviness
contraindications:
- large gallstones (> 3-4 mm) — consult a physician before using
- acute cholecystitis with fever — see a doctor immediately
- do not use electric heating pads (fire hazard with oil)
- pregnancy — use only on recommendation of a practitioner
preparation: Warm about 3 tablespoons of castor oil (do not overheat). Pour the warm oil onto
  a soft cloth or handkerchief, spreading it evenly. Fold the cloth and place it on the right
  side of the abdomen, above the navel and below the ribs, directly over the gallbladder.
  A hot water bottle may be placed on top to keep the compress warm. Leave in place for 20-30
  minutes. Electric heating pads are not recommended.
typical_dose: Apply once daily or as needed during pain episodes
duration: Until pain subsides; can be used preventively a few times per week
timing_notes: Best applied while resting; can be left on for 30 minutes
