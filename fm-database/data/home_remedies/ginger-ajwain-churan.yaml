slug: ginger-ajwain-churan
display_name: Ginger-Ajwain Appetite Churan
aliases: []
category: ayurvedic_churan
summary: Dried ginger (saunth), ajwain and a pinch of black salt — warming churan that kindles
  appetite and relieves heaviness and nausea before meals.
indications:
- low-appetite
- nausea
- sluggish-digestion
contraindications:
- acid reflux / gastritis flare (warming, can aggravate)
- pregnancy (limit ajwain)
balances_dosha:
- vata
- kapha
aggravates_dosha:
- pitta
avoid_in:
- pregnancy
rasa:
- salty
- pungent
- bitter
virya: heating
vipaka: sweet
ayurvedic_actions:
- dipana
- carminative
preparation: Mix 2 tbsp dried ginger powder, 1 tbsp roasted ground ajwain, 1/2 tsp black salt.
typical_dose: 1/4 tsp with warm water ~15 min before meals.
duration: As needed.
timing_notes: Before meals to stimulate appetite.
linked_to_topics:
- digestion-and-nutrient-absorption
- agni-digestive-fire
linked_to_mechanisms:
- altered-gi-motility
