slug: copper-vessel-water
display_name: Copper-Vessel Water (Tamra Jal)
aliases:
- tamra-jal
- copper-water
category: infused_water
summary: Water stored overnight in a clean copper vessel and drunk in the morning — the traditional
  Indian 'tamra jal'. Lad notes copper water for vata/kapha balance, digestion and as a mild
  support in anaemia. Copper is antimicrobial and a trace mineral; the practice imparts a small
  amount to the water. Use sensibly — copper is needed only in tiny amounts.
indications:
- morning digestive/metabolic kick-start (kapha)
- traditional support for low energy / mild anaemia
- general wellbeing ritual
contraindications:
- copper is toxic in excess — do NOT drink copper water all day; once-daily, overnight-stored
  only, and take breaks (e.g. not continuously for months)
- Wilson's disease or any copper-overload condition — avoid entirely
- use a genuine, clean, food-grade copper vessel (not coated/lacquered); discard if the water
  tastes metallic
- do not store acidic liquids (lime/lemon) in copper
balances_dosha:
- kapha
aggravates_dosha:
- pitta
rasa:
- sweet
virya: heating
vipaka: sweet
ayurvedic_actions:
- rasayana
- nervine
preparation: Fill a clean pure-copper vessel with drinking water at night; cover; leave 6-8
  hours (overnight) at room temperature. Drink it in the morning. Wash/'season' the vessel regularly
  with lemon + salt scrub (then rinse well).
typical_dose: ~1 glass in the morning
duration: Daily with periodic breaks; not continuous long-term
timing_notes: On waking, empty stomach
