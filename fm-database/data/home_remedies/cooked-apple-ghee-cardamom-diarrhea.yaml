slug: cooked-apple-ghee-cardamom-diarrhea
display_name: Cooked Apple with Ghee and Cardamom for Diarrhea
aliases:
  - seb-ghee-elaichi-diarrhea
  - stewed-apple-diarrhea-remedy
category: kitchen_remedy
summary: >-
  One of Lad's most practical and delicious food-cures for diarrhea — cooking
  apples until mushy then combining with ghee, cardamom, and nutmeg creates a
  gentle, astringent, gut-soothing remedy. Cooked apple provides pectin which
  absorbs toxins and binds the stool; ghee lubricates and heals the gut lining;
  cardamom and nutmeg reduce pitta inflammation in the GI tract and help calm
  intestinal spasms. Works for most adults and children.
indications:
  - acute diarrhea
  - loose or watery stools
  - diarrhea from food indigestion or wrong food combination
  - pitta-aggravated digestive upset
contraindications:
  - apple allergy
  - if diarrhea continues beyond 3 days, consult a doctor
  - signs of dehydration (sunken eyes, dry lips, reduced urination) — seek medical attention
  - severe or bloody diarrhea — see a doctor immediately
preparation: >-
  Cook one or two peeled, cored apples over low heat until they become soft and
  mushy (can steam or gently stew). Add 1 teaspoon of ghee, a pinch of cardamom
  powder, and a pinch of nutmeg. Stir together and eat slowly while warm.
  Alternatively, mash 1–2 ripe bananas (no cooking needed) and mix with 1
  teaspoon of warm ghee and a pinch each of cardamom and nutmeg.
typical_dose: 1–2 cooked apples (or 1–2 bananas) as a meal or snack, 2–3 times daily while symptomatic
duration: 2–3 days or until stools normalise
timing_notes: Can be eaten as a meal replacement; eat slowly and mindfully
