category: other
route: external
summary: A two-pronged topical protocol from Lad for treating boils — painful, pus-filled
  skin inflammations. Freshly brewed triphala tea is used to wash the affected skin area,
  delivering astringent, antimicrobial, and anti- inflammatory action to cool excess pitta
  and clean the local tissue. A neem powder paste applied simultaneously draws out heat, neutralises
  the bacteria, and helps the boil resolve. Together these two kitchen-accessible preparations
  cover both cleansing and antimicrobial action.
indications:
- boils on the skin (furuncles)
- slow-healing skin pustules
- recurrent skin boils (alongside dietary and digestive support)
- inflamed sebaceous gland infection
contraindications:
- do not attempt to forcibly burst a boil; let it drain naturally
- deep or large boil (carbuncle) or boil with red streaking (cellulitis) — see a doctor
- fever along with a boil — see a doctor
- triphala not recommended internally during pregnancy
