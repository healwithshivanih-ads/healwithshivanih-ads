preparation: 'TRIPHALA WASH: Boil 1 teaspoon of triphala powder in 1 cup of water for 5 minutes.
  Allow to cool to room temperature. Use this tea to wash the boil and surrounding skin gently,
  2-3 times a day. Let it dry on the skin — do not rinse off. NEEM PASTE: Mix a small amount
  of neem powder with just enough warm water to form a thick paste. Apply directly to the
  boil. Leave for 20-30 minutes then rinse. Can be applied 2 times per day after the triphala
  wash.'
typical_dose: Triphala wash 2-3 times a day; neem paste applied 1-2 times a day
duration: Continue until the boil resolves, typically 5-10 days
timing_notes: Wash hands thoroughly before and after; keep the area dry between applications
