slug: banana-ghee-migraine-prevention
display_name: Banana with Ghee and Cardamom — Pitta Migraine Prevention
aliases:
  - kela-ghee-migraine
  - banana-date-sugar-migraine-breakfast
category: kitchen_remedy
summary: >-
  Lad's preventive breakfast remedy for individuals who experience midday
  migraines, targeting the pitta excess that Ayurveda identifies as the
  primary driver of most migraines. Banana is cooling, sweet and grounding;
  ghee pacifies pitta and lubricates the nervous system; date sugar and
  cardamom balance blood sugar and calm the cardiovascular heat that triggers
  vascular headaches. Taken first thing in the morning, this simple food
  remedy can interrupt the morning pitta build-up before it peaks as a midday
  headache.
indications:
  - pitta-type migraine headaches (especially midday onset)
  - recurrent migraine prevention
  - headaches triggered by heat, sun, spicy food or skipped meals
  - hormonal migraines (perimenopausal / menstrual)
contraindications:
  - diabetes or high blood sugar — monitor banana and date sugar content
  - kapha excess or sluggish digestion — banana + ghee is heavy; adjust portion
  - latex-fruit syndrome (banana allergy)
  - if migraine is caused by cervical or structural issues rather than pitta — this may not help
preparation: >-
  First thing in the morning, take 1 ripe banana, peel it and chop into
  pieces. Add 1 teaspoon warm ghee, 1 teaspoon date sugar (or raw cane sugar),
  and a pinch of cardamom on top. Eat slowly.
typical_dose: 1 banana with the additions, once every morning
duration: Daily as a preventive measure during migraine-prone periods
timing_notes: Eat as the very first food in the morning before other breakfast items
