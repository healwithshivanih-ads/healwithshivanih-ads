slug: garlic-turmeric-milk-cough
display_name: Garlic-Turmeric Milk for Stubborn Cough
aliases:
  - lahsun-haldi-doodh-khansi
  - garlic-golden-milk-cough
  - lahsun-ka-doodh
category: kitchen_remedy
summary: >-
  Lad's remedy for a stubborn or persistent cough of any type — boiling a
  clove of garlic in a cup of milk, then adding a quarter teaspoon of turmeric
  to create a golden, garlic-infused milk. Garlic is a potent natural
  antimicrobial and expectorant; turmeric has anti-inflammatory and
  antimicrobial properties that support healing of the bronchial mucosa;
  warm milk is deeply nourishing and soothing. Lad describes this as effective
  for most types of cough, earning it the reputation of a garlic soup in
  golden milk form.
indications:
  - stubborn or persistent cough not responding to simpler remedies
  - bronchial cough with irritation
  - cough from tonsil congestion or pharyngitis
  - dry cough with throat irritation at night
  - cough accompanying a cold or flu
contraindications:
  - dairy allergy or lactose intolerance
  - do not combine with aspirin on the same day (garlic is a blood thinner) —
    take at least 2 hours apart
  - patients on anticoagulant medication (warfarin, heparin, etc.) should
    check with their doctor before using garlic regularly
  - active peptic ulcer or severe acid reflux (garlic is pungent and stimulating)
balances_dosha:
  - kapha
  - vata
aggravates_dosha:
  - pitta
preparation: >-
  Peel and roughly chop 1 clove of fresh garlic. Place in a small saucepan
  with 1 cup of milk. Bring to a gentle boil, then simmer for 2-3 minutes
  until the garlic softens. Remove from heat and add one quarter teaspoon
  of turmeric powder. Stir well. Drink warm, including the softened garlic.
typical_dose: 1 cup, taken warm, 1 to 2 times daily (especially at night)
duration: Until the cough resolves; typically 3-7 days; seek medical review
  if cough persists beyond 1 week
timing_notes: Especially effective at night before sleep; can also be taken in the
  morning
