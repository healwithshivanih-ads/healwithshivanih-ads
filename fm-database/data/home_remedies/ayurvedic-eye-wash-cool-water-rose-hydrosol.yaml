preparation: Run cool tap water. Splash over open eyes with cupped hands 4–5 times. Blink 7 times and
  roll eyes in circles. If irritated, drop or spray rose hydrosol (not rose essential oil water) into
  eyes.
typical_dose: 1–2 drops or a mist of rose hydrosol per eye
duration: Daily as part of morning dinacharya
timing_notes: First thing in the morning after tongue scraping
