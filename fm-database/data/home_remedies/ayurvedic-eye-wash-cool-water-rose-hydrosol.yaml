slug: ayurvedic-eye-wash-cool-water-rose-hydrosol
display_name: Ayurvedic Eye Wash (Cool Water + Rose Hydrosol)
aliases: []
category: other
route: external
summary: 'Morning eye-care ritual: splash cool running water over open eyes four or five times, blink
  seven times, roll eyes in circles. Those with burning, itching, or redness may add rose hydrosol drops
  or spray. Use only true hydrosol — not rose water made with essential oil, which is unsafe for eyes.'
indications:
- eye redness or irritation
- burning or itching eyes
- morning eye hygiene
- dry eye support
- dinacharya daily practice
contraindications:
- do not use essential-oil-based rose water in eyes — hydrosol only
- active eye infection — consult practitioner
