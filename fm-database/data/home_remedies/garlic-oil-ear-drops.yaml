slug: garlic-oil-ear-drops
display_name: Garlic Oil Ear Drops (Ear Infection / Ringing)
aliases:
- garlic-oil-tinnitus
category: other
route: external
summary: Garlic oil ear drops used for a brewing ear infection and for ringing in the ears (tinnitus)
  of the simple, congestion-related type. Garlic's antimicrobial action and the warm oil help
  an early ear infection; Lad also lists it among ear-ringing measures. A short-term holding
  remedy.
indications:
- early ear infection (mild, no discharge)
- ringing in the ears (congestion-related)
- blocked, achy ear with a cold
contraindications:
- DO NOT use with ear discharge, perforated eardrum, severe pain, fever, or significant hearing
  loss — see a doctor
- persistent/one-sided/pulsatile tinnitus needs medical review
- lukewarm only
balances_dosha:
- vata
- kapha
aggravates_dosha:
- pitta
rasa:
- pungent
virya: heating
vipaka: pungent
ayurvedic_actions:
- dipana
- expectorant
preparation: Warm 1 tbsp sesame oil with 2-3 crushed garlic cloves; cool to lukewarm and strain.
  Instil 2-3 drops into the ear; plug loosely with cotton.
typical_dose: 2-3 drops, once or twice a day
duration: A few days; review if not improving
timing_notes: When the ear feels blocked/achy
