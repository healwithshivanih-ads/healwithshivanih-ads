slug: sesame-oil-gum-swish
display_name: Sesame Oil Gum Swish (Oil Pulling for Gums)
aliases:
- til-oil-gandusha
- sesame-oil-pulling-gums
category: other
route: external
summary: A daily sesame-oil swish (a simple form of oil pulling / gandusha) to strengthen gums,
  reduce plaque bacteria and ease gum bleeding/sensitivity. Holding and swishing sesame oil
  draws out oral microbes and conditions the gum tissue. Lad recommends it as part of Ayurvedic
  teeth-and-gum care.
indications:
- weak or bleeding gums
- plaque and oral hygiene support
- gum sensitivity / mild gingivitis
- dry mouth
contraindications:
- do NOT swallow the oil (spit it out — it holds the drawn-out microbes); spit into a bin, not
  the sink (clogs pipes)
- persistent bleeding/loose teeth/pus — see a dentist
- not a replacement for brushing and flossing
balances_dosha:
- vata
aggravates_dosha:
- kapha
rasa:
- sweet
- pungent
- bitter
virya: heating
vipaka: pungent
ayurvedic_actions:
- dipana
- carminative
- antispasmodic
preparation: Take ~1 tbsp sesame oil into the mouth on an empty stomach; gently swish and pull
  between the teeth for 5-15 minutes; spit out (into a bin); rinse with warm water; then brush.
typical_dose: 1 swish session daily
duration: Ongoing as part of oral care
timing_notes: First thing in the morning, before eating/brushing
