slug: flaxseed-water-constipation
display_name: Bedtime Flaxseed Water (for Constipation)
aliases:
  - alsi-water
  - linseed-water
  - flax-bowel-water
category: other
summary: >-
  A gentle, non-habit-forming remedy for constipation — flax seeds simmered in
  water and drunk at bedtime. Lad lists it among his first-line constipation
  remedies. Flax is a soluble-fibre laxative and mild lubricant that helps the
  bowels move easily by morning; it also soothes and is mildly anti-inflammatory
  to the gut lining. A good vata-friendly alternative to stimulant laxatives.
indications:
  - constipation
  - sluggish / irregular bowels
  - hard, dry stools (vata pattern)
contraindications:
  - bowel obstruction or severe abdominal pain (do not use)
  - take with plenty of water; flax swells (avoid if swallowing/stricture issues)
  - introduce gradually if not used to fibre (can cause gas initially)
balances_dosha:
  - vata
aggravates_dosha:
  - kapha
preparation: >-
  Boil 1 tablespoon of flax seeds in 1 glass of water for a few minutes; drink
  the whole glass (seeds and all, or strained) at bedtime. Alternatively, soak
  1 tbsp ground flax in warm water and drink. Always follow with extra water
  through the day.
typical_dose: 1 glass at night
duration: Nightly until regular; safe for ongoing use with adequate fluids
timing_notes: At bedtime, so the bowels move easily the next morning
linked_to_topics:
  - constipation
linked_to_mechanisms:
  - dysbiosis
