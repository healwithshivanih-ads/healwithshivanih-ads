category: other
route: external
summary: >-
  Lad recommends rubbing brahmi oil on the soles of the feet and scalp at
  bedtime as an Ayurvedic stress-relief and grounding practice. The soles of
  the feet contain marma (vital energy) points that connect directly to the
  nervous system; applying warm brahmi oil to these points — and to the scalp
  — calms vata, grounds scattered mental energy, and promotes deep, restful
  sleep. Brahmi (Centella asiatica / Bacopa monnieri) oil is a classic
  Ayurvedic nervine that crosses the blood-brain barrier and supports
  cortisol regulation. This is particularly appropriate for the perimenopausal
  client with stress-driven insomnia and anxiety.
indications:
  - stress, anxiety, and nervous tension
  - stress-related insomnia and difficulty falling asleep
  - vata imbalance with restlessness and mental churning
  - adrenal fatigue and burnout
  - perimenopause-related anxiety and disturbed sleep
  - mental exhaustion and cognitive fatigue
contraindications:
  - avoid applying oil to broken or irritated skin
  - do not apply warm oil immediately before activities requiring alertness (it is relaxing)
  - brahmi oil stains fabric — use old pillowcases or socks at night
  - individuals allergic to Centella or Bacopa should patch test first
preparation: >-
  Warm a small amount of brahmi oil (commercially available in most Ayurvedic
  shops) in a bowl placed in hot water or briefly in your palms. Apply a
  generous amount to the soles of both feet and massage in gentle circular
  motions for 2 to 3 minutes. Then apply a small amount (about a teaspoon) to
  the scalp and massage gently, working from the crown outward. Put on socks
  to keep the oil on the feet during sleep. Leave on overnight and wash off
  in the morning shower.
typical_dose: One application nightly at bedtime
duration: Nightly during periods of high stress; can be used ongoing as a preventive practice
timing_notes: Apply 20 to 30 minutes before sleep for best effect; do not apply just before driving
