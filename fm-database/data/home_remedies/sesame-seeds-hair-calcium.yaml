preparation: Chew ~1 tbsp of (ideally soaked or lightly roasted) white or black sesame seeds
  daily, or sprinkle over food. Black sesame is the traditional choice for hair.
typical_dose: ~1 tablespoon daily
duration: Ongoing as a dietary habit
timing_notes: Any time with food
