slug: sesame-seeds-hair-calcium
display_name: Sesame Seeds for Hair (Calcium/Mineral Support)
aliases:
- til-for-hair
category: kitchen_remedy
summary: Lad recommends a spoon of sesame seeds daily as a food-first mineral source (calcium,
  magnesium, iron, zinc) to nourish the hair and scalp — minerals that support the hair follicle
  and root strength. A simple dietary adjunct for thinning, brittle hair, complementing scalp-oil
  care.
indications:
- hair thinning / weak hair
- brittle hair and nails
- mineral support for hair growth
contraindications:
- sesame allergy
- energy-dense — keep to ~1 tbsp if watching weight
