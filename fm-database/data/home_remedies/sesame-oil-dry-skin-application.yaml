slug: sesame-oil-dry-skin-application
display_name: Sesame Oil Topical Application for Dry Skin
aliases:
  - til-oil-dry-skin
  - abhyanga-dry-skin-treatment
  - sesame-oil-skin-moisturiser
category: other
route: external
summary: >-
  For vata-type dry skin, Lad's first-line external remedy is warm sesame oil
  applied directly to the skin. Sesame oil is warming, deeply penetrating, and
  rich in fatty acids that nourish and protect vata-depleted skin. It forms a
  natural moisture barrier while also delivering nutrients through the skin. For
  pitta types, Lad recommends cooling sunflower or coconut oil; for kapha types,
  corn oil. This is the simplest and often sufficient approach for mild to
  moderate dryness.
indications:
  - dry, rough, or flaky skin (especially in vata constitution or during dry season)
  - skin dryness in perimenopausal women (declining estrogen affects skin moisture)
  - dry skin from excess sun, wind, or soap exposure
  - whole-body skin nourishment
contraindications:
  - sesame allergy — use sunflower or coconut oil instead
  - broken or infected skin — avoid applying oil over open wounds
  - excessively oily or kapha-dominant skin — use corn oil or skip entirely
preparation: >-
  Warm a small amount of cold-pressed sesame oil (vata types), sunflower or
  coconut oil (pitta types), or corn oil (kapha types) by placing the bottle in
  warm water for a few minutes. Apply generously to dry skin areas, massaging
  gently with circular strokes. Can be applied head to toe as a self-massage
  (abhyanga) before bathing, or applied to targeted dry areas after bathing while
  skin is still slightly damp. Leave on for 10–20 minutes before rinsing, or
  leave overnight on hands and feet.
typical_dose: Apply once or twice daily to affected areas; full-body application weekly
duration: Daily during dry season; ongoing as needed
timing_notes: Best applied before morning bath (leave 15–20 minutes then shower), or at bedtime for hands and feet
