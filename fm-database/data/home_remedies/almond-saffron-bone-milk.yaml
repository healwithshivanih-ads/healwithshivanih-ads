category: kitchen_remedy
summary: 'Lad''s bone-building tonic for osteoporosis: ten almonds soaked overnight, peeled
  in the morning, and blended with warm milk, ginger, cardamom, and a pinch of saffron. Almonds
  are calcium- and magnesium-rich and their overnight soak releases phytase to improve mineral
  bioavailability. Saffron adds mild oestrogenic activity; cardamom and ginger improve digestive
  assimilation of calcium. The drink can be made with cow''s, goat''s, or soy milk.'
indications:
- osteoporosis and bone-density support
- perimenopausal and menopausal calcium needs
- general debility and nutritional deficiency
- vata-type weakness and dry, brittle bones
contraindications:
- almond or tree-nut allergy
- saffron in pregnancy (large amounts are emmenagogic — a small pinch in milk is generally
  fine but use caution)
- very high-calorie restriction diets (calorie-dense)
preparation: Soak 10 raw almonds in water overnight. In the morning, peel off the brown skins.
  Place peeled almonds in a blender and add 1 cup warm milk (cow's, goat's, or soy milk —
  all acceptable). Add a pinch each of ground ginger, cardamom, and saffron threads. Blend
  until smooth. Pour into a glass and drink immediately.
typical_dose: 1 cup twice daily — before breakfast and before bedtime
duration: Daily, ongoing as a bone-support strategy; especially important peri- and post-menopausally
timing_notes: Before breakfast and before bedtime for best calcium absorption
