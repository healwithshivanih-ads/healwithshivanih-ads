slug: hing-cotton-earache-compress
display_name: Asafoetida Cotton Earache Compress
aliases:
  - hing-kaan-dard
  - asafetida-ear-pain-remedy
  - heeng-ear-compress
category: other
summary: >-
  Lad recommends a remarkably simple kitchen-spice remedy for earache — placing a
  small pinch of asafoetida (hing/heeng) wrapped in a small ball of cotton into
  the outer ear. The volatile aromatic compounds in asafoetida diffuse gently into
  the ear canal, providing quick relief from ear pain. Hing is antispasmodic,
  antimicrobial, and has a long history of use in Indian folk medicine for ear and
  digestive complaints.
indications:
  - earache from dry or tight ear canal
  - mild ear discomfort from cold or dryness
  - vata-type ear pain
contraindications:
  - do NOT use if there is ear discharge, active infection, or perforated eardrum
  - do NOT push the cotton deeper than the outer ear canal entrance
  - hing allergy (uncommon but possible)
  - if pain is severe or accompanied by fever, see a doctor
preparation: >-
  Take a small piece of clean cotton. Place a small pinch of asafoetida powder
  (hing) in the centre of the cotton. Roll the cotton gently into a small
  capsule or ball shape. Place this cotton ball loosely into the outer ear
  passage — it should rest at the entrance, not be pushed inside. The aromatic
  fumes of the asafoetida will diffuse into the ear canal and relieve pain.
  Replace with a fresh ball every few hours as needed.
typical_dose: One small cotton ball in the affected ear, as needed for pain relief
duration: Use until discomfort resolves; typically 1–3 days
timing_notes: Can be worn during the day; replace every 2–3 hours
