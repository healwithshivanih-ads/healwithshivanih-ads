category: kitchen_remedy
summary: Lad's safest recommendation for constipation during pregnancy — taking one teaspoon
  of sat isabgol (psyllium husks) in a glass of warm milk. Psyllium is a gentle, bulking fibre
  laxative that draws water into the bowel and softens stools without stimulating uterine
  contractions, making it suitable in pregnancy. A cup of warm milk with a teaspoon of ghee
  is offered as an alternative. Both triphala and castor oil are explicitly contraindicated
  in pregnancy by Lad.
indications:
- constipation during pregnancy
- mild constipation suitable for pregnancy (first, second, or third trimester)
- straining at stool during pregnancy
contraindications:
- triphala is contraindicated during pregnancy (may make the baby hyperactive and can irritate
  the child — per Lad)
- castor oil and other drastic purgatives are contraindicated in pregnancy
- do not take psyllium without adequate water or milk — must be taken with sufficient liquid
  or it can worsen constipation or cause choking
- if abdominal cramping, bleeding, or pain accompanies constipation in pregnancy, see an obstetrician
  immediately
- allergy to psyllium (rare but possible) — discontinue if new symptoms appear
