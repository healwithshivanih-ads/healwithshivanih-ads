preparation: Stir 1 teaspoon of sat isabgol (psyllium husks) into a glass of warm milk. Drink
  immediately before the mixture thickens. Alternatively, stir 1 teaspoon of pure ghee into
  a cup of hot milk and drink at bedtime.
typical_dose: 1 teaspoon psyllium in 1 glass warm milk, once daily
duration: Use as needed throughout pregnancy whenever constipation arises; can be used regularly
  if constipation is ongoing
timing_notes: At bedtime or early morning before breakfast; always take with a full glass
  of liquid
