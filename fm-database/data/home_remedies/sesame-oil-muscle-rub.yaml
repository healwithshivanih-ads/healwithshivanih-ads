slug: sesame-oil-muscle-rub
display_name: Warm Sesame Oil Muscle Rub
aliases:
  - til-tel-maalish
  - mahanarayan-oil-massage
category: other
summary: >-
  Warm sesame or mahanarayan oil rubbed directly onto a cramped or spasming
  muscle is the primary Ayurvedic first-response for vata-driven muscle cramps.
  Sesame oil is deeply penetrating, warming, and nourishing to vata, and
  relieves the tightness, coldness, and dryness that characterise muscular
  spasm. Mahanarayan oil (medicated sesame oil with ashwagandha and other herbs)
  is preferred when available as it additionally calms the nervous system.
indications:
  - muscle cramps and spasms
  - leg cramps at night
  - muscle tightness from cold or overexertion
  - vata-type muscular pain (cold, pulling, shifting)
contraindications:
  - open wounds or inflamed skin over the area
  - pitta-type hot, burning, inflamed muscle pain (may aggravate)
  - allergy to sesame oil
preparation: >-
  Warm a small amount of sesame oil or mahanarayan oil (available at Ayurvedic
  pharmacies) to body temperature. Apply generously to the cramped muscle and
  massage firmly in the direction of the muscle fibres. Follow immediately with a
  hot water bottle or warm compress held over the area for 10-15 minutes to
  drive the oil in deeper.
typical_dose: Apply as needed to affected area; use a generous tablespoon of oil per limb
duration: Use at onset of cramp and repeat as needed; can be used nightly for chronic night cramps
timing_notes: Best applied at bedtime for prevention of nocturnal cramps; apply immediately at cramp onset
