category: other
summary: >-
  Lad's first-line Ayurvedic topical remedy for sunburn combines the cooling,
  pitta-pacifying gel of aloe vera with the soothing, anti-inflammatory action
  of coconut oil. Sunburn is an acute pitta condition — excessive heat and UV
  radiation inflaming the skin cells. Aloe vera's polysaccharides reduce
  inflammation, promote skin cell repair, and provide immediate cooling
  relief. Coconut oil (light, sweet, cooling) forms a protective barrier and
  supports skin regeneration. Together they are ideal for the fair-skinned,
  heat-sensitive pitta constitution most prone to burning.
indications:
  - sunburn (mild to moderate)
  - sun-damaged, reddened, hot, or inflamed skin
  - peeling skin after sun exposure
  - pitta-type skin sensitivity with heat and redness
  - post-sun skin dryness and tightness
contraindications:
  - seek medical attention for severe sunburn with blistering, dizziness, or fever (heat stroke risk)
  - do not apply to open blisters without medical guidance
  - some individuals may have contact allergy to aloe — patch test first
  - avoid coconut oil if skin is actively oozing (use aloe gel alone initially)
preparation: >-
  Option A (aloe gel): Apply pure aloe vera gel (from a fresh aloe leaf or
  a preservative-free commercial gel) generously to the sunburned area. Let
  it absorb. Reapply every few hours as needed.
  Option B (coconut oil): Apply a thin layer of pure, cold-pressed coconut
  oil to the cooled (not hot) sunburned skin. It is most soothing after the
  initial heat has dissipated, typically 30 to 60 minutes after sun exposure.
  Option C (combined): Apply aloe gel first, let it absorb for 10 minutes,
  then gently apply a light layer of coconut oil over it for additional
  protection and moisture.
typical_dose: Apply to affected area as needed; 3 to 5 times daily during acute phase
duration: Apply until redness, heat, and peeling resolve, typically 3 to 7 days
timing_notes: Apply immediately after sun exposure for best effect; reapply after bathing
