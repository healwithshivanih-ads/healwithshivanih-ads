slug: garlic-sesame-oil-ear-drops
display_name: Warm Garlic-Sesame Oil Ear Drops
aliases:
  - lehsun-til-tel-kaan-drops
  - garlic-oil-earache
  - garlic-ear-oil
category: other
summary: >-
  Lad recommends warm garlic-infused sesame oil as a gentle, effective Ayurvedic
  remedy for earache caused by dry, vata-aggravated ear passages, and also for
  softening stubborn earwax. Garlic has well-documented antimicrobial and
  anti-inflammatory properties; sesame oil lubricates and soothes the dry ear
  canal. The warmth of the oil is itself soothing and penetrating. Lad also
  recommends this blend as a pre-irrigation softener for compacted earwax.
indications:
  - earache from dry, tight ear canal (vata type — no infection)
  - mild ear discomfort from cold or dry air
  - compacted or stubborn earwax (use before irrigation)
  - prevention of excess earwax buildup
contraindications:
  - do NOT use if there is a perforated eardrum — drops can enter middle ear
  - do NOT use if there is active ear infection with discharge — see a doctor first
  - rule out otitis externa or otitis interna before using oil drops
  - test for pulling pain on the ear lobe — if this causes sharp pain, indicates otitis externa; consult doctor
  - garlic allergy
  - do not use oil that is too hot — warm only, not hot
preparation: >-
  Take about 1 tablespoon of cold-pressed sesame oil. Add half a clove of freshly
  chopped or minced garlic. Heat gently over low flame until the garlic pieces
  just turn brown. Press the oil out from the garlic pieces and strain the clear
  oil into a small container. Allow to cool to body temperature (warm, not hot —
  test on wrist). Using a clean dropper, put 3–5 drops of the warm oil into the
  affected ear. Tilt head to keep oil in place for a few minutes, then tilt the
  other way to drain. Plain warm sesame oil also works if no garlic available.
typical_dose: 3–5 drops in the affected ear, 2–3 times daily
duration: 2–5 days for earache; 1–2 days before ear irrigation for wax
timing_notes: Use when oil is warm (not hot); lie with affected ear upward for 5 minutes after drops
