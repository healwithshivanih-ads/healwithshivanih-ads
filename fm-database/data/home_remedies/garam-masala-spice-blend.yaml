slug: garam-masala-spice-blend
display_name: Garam Masala (Warming Spice Blend)
aliases:
  - garam-masala-powder
  - warming-indian-spice-mix
category: spice_blend
summary: >-
  The classical North Indian warming-spice mix — typically cardamom, cinnamon,
  cloves, black pepper, cumin, coriander, and bay leaf, ground fresh. Used
  daily in cooking to support digestion, warmth, and post-meal comfort.
  Anti-inflammatory and gently thermogenic.
indications:
  - sluggish digestion
  - cold-weather warming
  - post-meal heaviness
  - low appetite
  - early-stage cold or congestion
contraindications:
  - active GERD with burning (heavy pepper-clove load)
  - active peptic ulcer
  - children under 2 (pepper sensitivity)
preparation: >-
  Best made fresh: dry-roast 2 tbsp coriander seeds, 2 tbsp cumin seeds,
  1 tbsp black peppercorns, 8 cloves, 4 green cardamom pods, 1 black
  cardamom, 1-inch cinnamon, 2 bay leaves. Cool, grind to powder. Store
  airtight away from heat.
typical_dose: 1/4 to 1/2 teaspoon per meal, added near end of cooking
duration: daily as a kitchen staple
timing_notes: stir in during the last 1-2 minutes of cooking to preserve aroma
