slug: cilantro-juice-sting-remedy
display_name: Cilantro Juice for Insect Bites and Stings
aliases:
  - coriander-leaf-juice-sting
  - dhania-sting-remedy
  - fresh-coriander-bite-remedy
category: vegetable_juice
summary: >-
  Fresh cilantro (coriander leaf / dhania) juice is a traditional Ayurvedic
  first-response remedy for insect bites and stings. Cilantro has documented
  antihistamine and anti-inflammatory activity; the juice both taken
  internally (to calm systemic allergic response) and applied topically (the
  pulp applied to the bite) helps reduce redness, swelling, and the
  inflammatory itch reaction.
indications:
  - insect bites — mosquito, ant, bee, wasp
  - mild allergic sting reactions with local swelling and redness
  - itching and burning at a bite or sting site
  - post-sting inflammatory skin flare
contraindications:
  - anaphylaxis or severe systemic allergic reaction — seek emergency care
    immediately; this is a supportive, not emergency, remedy
  - known coriander/cilantro allergy (rare but possible)
  - bleeding tendencies (large amounts of cilantro juice may have mild
    anticoagulant properties)
balances_dosha:
  - pitta
aggravates_dosha: []
preparation: >-
  Place a large handful of fresh cilantro (coriander leaves) in a blender
  with 1/3 cup of clean water. Blend well, then strain through a fine sieve
  or cheesecloth to obtain the juice. Retain the strained pulp separately.
  Drink 2 teaspoons of the juice internally. Apply the remaining pulp
  directly to the site of the bite or sting and leave it on for 15-20 minutes
  before rinsing.
typical_dose: 2 teaspoons of fresh cilantro juice, 3 times a day; pulp applied
  topically as needed
duration: Continue until symptoms resolve, typically 1-3 days
timing_notes: Prepare fresh each time; does not keep well. Best used within
  a few hours of making
