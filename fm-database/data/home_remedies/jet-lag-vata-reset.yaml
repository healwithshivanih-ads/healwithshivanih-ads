- jet-lag-ginger-milk
category: kitchen_remedy
summary: 'Lad treats jet lag as excess vata from fast travel and dehydration. A three-part ritual:
  swallow 2 ginger capsules with water an hour before flying; drink water (no caffeine) every
  1-2 hours in the air; on arrival rub warm sesame oil on the scalp and soles and drink 1 cup
  hot milk with a pinch each of nutmeg and ginger to ground vata and reset sleep. If you land
  before nightfall, a chamomile-mint-jatamamsi tea helps.'
indications:
- jet lag
- travel fatigue and disorientation
- disrupted sleep after long-haul flights
- vata aggravation from travel
contraindications:
- nutmeg only a pinch (large doses are toxic)
- dairy allergy (use warm almond/oat milk)
- skip ginger capsules if on blood thinners or with gastritis
