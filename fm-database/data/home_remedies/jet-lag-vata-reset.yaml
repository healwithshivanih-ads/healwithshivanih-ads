preparation: '1h pre-flight: 2 size-00 ginger capsules with water. In-flight: 2-3 cups water
  every 1-2h, no coffee/caffeine. On arrival: warm sesame-oil massage to scalp + soles, then
  1 cup hot milk with a pinch each of nutmeg and ginger. Optional arrival tea: equal parts chamomile,
  mint, jatamamsi (1/3 tsp each) steeped 10 min.'
typical_dose: As above, around the flight
duration: Day of travel and the first night at destination
timing_notes: Pre-flight, in-flight, and at bedtime on arrival
