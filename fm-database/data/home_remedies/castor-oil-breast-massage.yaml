preparation: >-
  Warm 1 teaspoon of castor oil gently (place the bottle in warm water for
  a minute). Starting from the sternum (breastbone), use your palm and fingers
  to massage the breast tissue outward toward the armpit in gentle circular
  and sweeping motions. Cover the area underneath and around the nipple, but
  avoid applying oil to the areola and nipple (especially if breastfeeding).
  Massage gently for 5-10 minutes each breast, morning and bedtime.
typical_dose: 1 teaspoon warm castor oil per breast, massage twice a day
duration: Continue until soreness resolves; for preventive use around the
  menstrual cycle, use for the 7-10 days before menstruation
timing_notes: Morning before bathing and bedtime are the two recommended
  windows; wash off before nursing
