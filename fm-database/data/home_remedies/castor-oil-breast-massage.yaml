slug: castor-oil-breast-massage
display_name: Warm Castor Oil Breast Massage for Soreness
aliases:
  - castor-oil-sore-breast-massage
  - eranda-breast-massage
  - castor-oil-mastitis-prevention
category: other
route: external
summary: >-
  Lad recommends a gentle daily breast massage with warm castor oil to relieve
  hormonal breast soreness, lymphatic congestion, and to prevent stagnation
  of milk and mastitis in breastfeeding mothers. The massage technique is
  directed inward-to-outward (sternum toward armpit) to support lymphatic
  drainage. Castor oil has notable anti-inflammatory and lymphagogue
  properties, and the mechanical action of massage moves congested lymph,
  reducing swelling, tenderness, and the cyclical breast pain common in PMS
  and perimenopause.
indications:
  - cyclic breast tenderness and soreness (PMS, perimenopausal)
  - lymphatic congestion causing swollen, heavy breasts
  - prevention of milk stagnation and mastitis in breastfeeding mothers
  - fibrocystic breast discomfort
contraindications:
  - diagnosed breast cancer — consult your oncologist before any topical
    oil massage on the breast
  - open wounds, broken skin, or active infection on the breast
  - breastfeeding — avoid applying castor oil to the areola and nipple
    entirely; wash oil off thoroughly before nursing as it can cause diarrhea
    in the baby if ingested
  - castor oil allergy
