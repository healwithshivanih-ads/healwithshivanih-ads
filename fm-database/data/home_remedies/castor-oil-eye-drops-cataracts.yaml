slug: castor-oil-eye-drops-cataracts
display_name: Castor Oil Eye Drops for Cataract Prevention
aliases:
  - castor-oil-eye-lubricant
  - eranda-eye-drops
  - castor-oil-cornea-lubricant
category: other
summary: >-
  Lad recommends placing a single drop of pure, preservative-free castor oil
  into each eye at bedtime as a traditional Ayurvedic approach to preventing
  cataracts and lubricating the cornea and conjunctiva. From an Ayurvedic
  perspective, cataracts are a kapha disorder (molecules of kapha accumulate
  in the lens); the oil helps remove these accumulations and protect lens
  clarity. This is distinct from the triphala eyewash (which is the primary
  cataract treatment) — the castor oil drops are a maintenance/prevention
  protocol.
indications:
  - early signs of cataract formation (used alongside triphala eyewash)
  - dry eyes, irritated cornea
  - prevention of cataract progression in those at risk (diabetics, elderly)
  - general eye lubrication and conjunctival health
contraindications:
  - use ONLY pure castor oil with NO preservatives (check the label carefully)
  - contact lens wearers — remove lenses before applying; do not reinsert
    until the next morning
  - any active eye infection, corneal ulcer, or acute eye inflammation —
    see an eye specialist before using
  - blurry vision, eye pain, sudden vision changes — see an eye specialist
    immediately; this is a supportive, not therapeutic, measure for serious
    conditions
balances_dosha: []
aggravates_dosha: []
preparation: >-
  Obtain pure castor oil specifically labelled for ophthalmic or cosmetic
  use, confirmed free of preservatives and additives. At bedtime, tilt the
  head back slightly and place 1 drop of castor oil into each eye using a
  clean dropper. Blink gently to distribute the oil. Expect some temporary
  blurring of vision while the oil disperses — this is normal and clears by
  morning.
typical_dose: 1 drop in each eye at bedtime
duration: Regular nightly use for prevention; can be continued indefinitely
  if well tolerated
timing_notes: Bedtime only — the temporary blurring makes daytime use
  impractical; vision will be normal on waking
