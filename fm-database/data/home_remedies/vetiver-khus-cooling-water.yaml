slug: vetiver-khus-cooling-water
display_name: Vetiver (Khus) Cooling Water
aliases:
  - khus-water
  - khas-cooling-infusion
  - vetiveria-zizanioides-water
category: infused_water
summary: >-
  A traditional Indian summer drink — clean water infused overnight with
  vetiver (khus) roots, used through generations to cool the body during
  hot weather, ease hot flushes, and calm a heated, irritable mind. A
  pitta-pacifying ritual that needs nothing more than roots, water, and
  patience.
indications:
  - hot flushes during perimenopause
  - summer heat and overheating
  - pitta imbalance
  - heat-induced irritability
  - mild urinary burning in summer
contraindications:
  - genuine cold sensitivity (vata-dominant clients in winter)
  - urinary frequency without infection
preparation: >-
  Rinse a small bundle of clean khus (vetiver) roots. Place in a clean
  glass or copper jug and fill with 1 litre cool drinking water. Cover
  and leave overnight (8-10 hours). Strain in the morning. The roots can
  be reused for 2-3 nights before replacing.
typical_dose: 1-2 glasses through the day
duration: through hot weather; daily during heat-wave or hot-flush flares
timing_notes: mid-morning and mid-afternoon; not chilled
