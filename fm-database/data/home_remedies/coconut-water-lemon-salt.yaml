slug: coconut-water-lemon-salt
display_name: Coconut Water with Lemon and Rock Salt
aliases:
  - nariyal-pani-nimbu-namak
  - coconut-electrolyte-drink
  - tender-coconut-rehydration
category: infused_water
summary: >-
  Fresh tender coconut water with a squeeze of lemon and a small pinch of
  rock salt — a generations-old Indian household rehydration drink for
  summer heat, post-illness fluid loss, and recovery after a bout of food
  poisoning or loose stools. A whole-food oral rehydration solution.
indications:
  - rehydration after vomiting or diarrhoea
  - summer heat and dehydration
  - post-exercise electrolyte replenishment
  - motion sickness recovery
  - mild adrenal fatigue with salt cravings
contraindications:
  - chronic kidney disease with potassium restriction
  - hyperkalaemia
  - severe hyponatraemia (medical rehydration needed)
  - infants under 6 months (use ORS instead)
balances_dosha:
  - pitta
aggravates_dosha: []
preparation: >-
  Open one fresh tender coconut. Add a squeeze of fresh lemon juice
  (1/2 lemon per 250 ml) and a small pinch of pink or rock salt. Stir
  and drink within a few hours.
typical_dose: 250-500 ml as needed
duration: during heat exposure, illness recovery, or post-exercise
timing_notes: mid-day during heat; sips through the day during recovery
linked_to_topics:
  - hydration-and-brain-function
  - adrenal-fatigue
linked_to_mechanisms:
  - cortisol-elevation
