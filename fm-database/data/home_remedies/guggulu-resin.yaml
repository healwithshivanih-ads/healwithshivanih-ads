preparation: Use purified (shuddha) guggulu tablets from a reputable Ayurvedic pharmacy, per
  label/practitioner (commonly ~250-500 mg, 2-3 times a day) with warm water after meals.
typical_dose: Per product / practitioner (often 250-500 mg, 2-3x daily)
duration: Use in courses (weeks-months) under guidance; not indefinitely
timing_notes: After meals with warm water
