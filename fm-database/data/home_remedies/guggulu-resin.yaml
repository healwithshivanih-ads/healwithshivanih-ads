slug: guggulu-resin
display_name: Guggulu (Guggul Resin) — Lipids & Inflammation
aliases:
- guggul
- commiphora-mukul
- shuddha-guggulu
category: ayurvedic_churan
summary: Guggulu is the purified resin of Commiphora mukul, one of Ayurveda's principal kapha-reducing,
  lipid-lowering and anti-inflammatory substances. Guggulsterones are credited with supporting
  healthy cholesterol/triglycerides, scraping ama (metabolic waste), and easing inflammatory/arthritic
  conditions — which is why it forms the base of many classical 'guggulu' formulas. Taken
  as a purified (shuddha) resin tablet.
indications:
- high cholesterol / triglycerides (dyslipidemia)
- metabolic sluggishness / kapha excess
- chronic inflammation and arthritic conditions
- ama-type metabolic congestion
contraindications:
- 'THYROID INTERACTION: guggul (guggulsterones) can alter thyroid hormone levels/metabolism
  — important if on levothyroxine or with thyroid disease; coordinate with the prescriber
  and monitor'
- 'blood thinning: may increase bleeding risk — caution with anticoagulant/antiplatelet drugs
  and before surgery'
- pregnancy and breastfeeding — avoid (uterine stimulant)
- can cause GI upset, loose stools, hyperacidity, headache, or skin rash; stop if rash/itching
  occurs
- classical tablet formulation from an Ayurvedic pharmacy — best used under a knowledgeable
  practitioner, not indefinitely
