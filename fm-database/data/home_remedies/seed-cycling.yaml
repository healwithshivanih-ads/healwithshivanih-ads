slug: seed-cycling
display_name: Seed Cycling (Hormone-Balancing Seed Rotation)
aliases:
- seed-rotation
- flax-pumpkin-sesame-sunflower-cycling
category: kitchen_remedy
route: internal
summary: |
  A functional-medicine dietary practice that rotates four ground seeds
  across the menstrual cycle to gently support hormonal balance. In the
  FOLLICULAR phase (roughly day 1-14, menstruation to ovulation): 1 tbsp
  ground flaxseed + 1 tbsp ground pumpkin seed daily — flax lignans gently
  modulate estrogen, pumpkin's zinc supports the run-up to ovulation. In
  the LUTEAL phase (day 15-28, ovulation to next period): 1 tbsp ground
  sesame + 1 tbsp ground sunflower seed daily — sesame lignans and
  sunflower's selenium/vitamin E support progesterone and estrogen
  clearance. The evidence is FM clinical tradition plus nutritional
  plausibility (lignans, zinc, selenium, magnesium, ALA omega-3), not RCTs.
  IMPORTANT — two safety gates: (1) it needs an ovulatory cycle to key the
  phases to, so it does NOT apply when the cycle is pharmacologically
  suppressed (dienogest/progestin, GnRH agonists, continuous OCP) — for
  those clients, offer all four seeds together DAILY for the nutrients, not
  the phased schedule; (2) the flax/pumpkin (estrogen-supporting) half is
  cautioned in clear estrogen-dominance (normal-to-high estrogen with low
  progesterone) — assess the hormonal picture first.
indications:
- premenstrual-syndrome
- estrogen-dominance
- luteal-phase-defect
- dysmenorrhea
- irregular-periods
- pcos
contraindications:
- Cycle pharmacologically suppressed (dienogest / progestin-only / GnRH agonist /
  continuous OCP) — no ovulatory cycle to phase to; use continuous daily seeds instead
- Relative estrogen dominance (normal-to-high estrogen, low progesterone) — the
  flax/pumpkin follicular half may worsen symptoms; assess hormones first
- Flax or sesame seed allergy
- Not a contraceptive and not a substitute for prescribed hormonal or gynaecological
  treatment
