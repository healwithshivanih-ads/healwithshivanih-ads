preparation: |
  Grind seeds fresh (a small spice/coffee grinder) or buy pre-ground and
  refrigerate — whole flax passes through undigested and ground seeds
  oxidise, so grind in small batches. FOLLICULAR (day 1-14): 1 tbsp ground
  flaxseed + 1 tbsp ground pumpkin seed. LUTEAL (day 15-28): 1 tbsp ground
  sesame + 1 tbsp ground sunflower seed. Stir into warm (not hot) porridge-
  free options like curd/yoghurt, a smoothie, dal, sabzi, or a glass of
  water. If cycles are irregular, use the new moon → full moon window as a
  proxy for follicular and full moon → new moon for luteal.
  SUPPRESSED-CYCLE VERSION: all four seeds, 1 tbsp each, together, every
  day — for the zinc/selenium/lignan/omega-3 nutrients, no phase timing.
typical_dose: |
  2 tbsp ground seeds daily (1 tbsp of each seed for the current phase).
duration: |
  Give it at least 3 full cycles (~3 months) to judge benefit; safe to
  continue long-term as a food habit.
timing_notes: |
  Any time of day, with food. Space >=2h from thyroid medication and iron
  supplements (the fibre and minerals can blunt absorption).
