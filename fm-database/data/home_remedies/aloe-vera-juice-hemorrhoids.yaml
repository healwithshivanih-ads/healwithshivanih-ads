slug: aloe-vera-juice-hemorrhoids
display_name: Aloe Vera Juice (Hemorrhoids)
aliases:
- aloe-juice-piles
category: kitchen_remedy
summary: 'Lad''s first-aid for hemorrhoids (piles): half a cup of pure aloe vera juice three
  times a day until they settle. Aloe is cooling, anti-inflammatory and a gentle bowel softener,
  easing the straining and pitta-heat behind hemorrhoids. Best combined with fibre, hydration
  and not straining at stool.'
indications:
- hemorrhoids / piles (internal or external)
- anal discomfort with constipation
contraindications:
- 'RED FLAG: rectal bleeding must be evaluated by a doctor to rule out other causes (do not
  assume it''s only piles)'
- pregnancy (aloe latex is a uterine stimulant/strong laxative — use only inner-leaf juice,
  ideally avoid)
- loose stools (aloe can loosen further)
balances_dosha:
- pitta
aggravates_dosha: []
preparation: Drink 1/2 cup of pure inner-leaf aloe vera juice three times a day. Support with
  adequate fibre and water, and avoid straining at stool.
typical_dose: 1/2 cup, 3 times a day
duration: Until hemorrhoids settle; reassess if persistent
timing_notes: Between meals
linked_to_topics:
- hemorrhoids
- constipation
linked_to_mechanisms:
- chronic-inflammation
