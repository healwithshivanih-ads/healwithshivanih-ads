  - coriander-eye-wash
  - dhania-seed-eye-rinse
category: other
route: external
summary: >-
  Lad's coriander seed eyewash for conjunctivitis (pink eye) — a cooled
  infusion of coriander seeds strained thoroughly and used to wash the closed
  eyes. Coriander is cooling and anti-inflammatory, particularly suited to
  pitta-type eye conditions characterised by redness, burning, and
  photosensitivity. The seeds' mild antimicrobial and astringent properties
  help reduce discharge and soothe inflamed conjunctiva. Lad also recommends
  drinking the strained liquid for internal support.
indications:
  - conjunctivitis (pink eye) with redness and burning
  - photosensitivity of the eyes
  - eye discharge and irritation
  - pitta-type eye inflammation
contraindications:
  - if conjunctivitis does not clear within 3 to 4 days, see a doctor immediately
    (Lad's explicit instruction)
  - do not use water that is too hot or too cold on the eyes — must be at room
    temperature or slightly cool
  - strain the preparation very thoroughly before use; any remaining seed particles
    in the eyes will cause serious irritation
  - do not use in suspected bacterial conjunctivitis with heavy yellow-green
    discharge — requires medical treatment
  - do not prepare in advance; use fresh each time and discard any leftover
  - contact lens wearers must remove lenses before application
balances_dosha:
  - pitta
aggravates_dosha: []
rasa:
  - sweet
  - bitter
  - astringent
virya: cooling
vipaka: sweet
ayurvedic_actions:
  - diuretic
  - cooling-digestive
preparation: >-
  Steep 1 teaspoon of coriander seeds in 1 cup of freshly boiled water for at
  least 15 minutes. Strain the liquid very thoroughly through fine cloth or a
  paper coffee filter to ensure no seed particles remain. Allow to cool to room
  temperature (not warm, not cold). Use the clear liquid to gently wash the
  closed eyelids. Drinking the strained liquid is also recommended for additional
  anti-inflammatory benefit.
typical_dose: Wash closed eyelids 2 to 3 times daily with the cooled strained infusion
duration: Use until conjunctivitis clears; if not improved within 3-4 days see
  a doctor
timing_notes: Prepare fresh each time; apply to closed eyelids; let air dry
