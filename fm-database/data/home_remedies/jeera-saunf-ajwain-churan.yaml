slug: jeera-saunf-ajwain-churan
display_name: Jeera-Saunf-Ajwain Digestive Churan
aliases:
- jeera-saunf-ajwain
- digestive-churan
category: ayurvedic_churan
summary: Equal-parts roasted cumin (jeera), fennel (saunf) and carom (ajwain) seeds, coarsely ground into
  a digestive powder. Carminative blend that eases post-meal heaviness, bloating and gas and supports
  digestive fire (agni).
indications:
- bloating
- gas
- sluggish-digestion
- post-meal-fatigue
contraindications:
- pregnancy (limit ajwain)
- active acid reflux flare (warming spices can aggravate for some)
preparation: Dry-roast equal parts jeera, saunf and ajwain until fragrant; cool and grind coarse. Add
  a pinch of black salt and a tiny pinch of hing if desired. Store airtight.
typical_dose: 1/2 tsp with a little warm water after lunch and dinner.
duration: Daily; safe for ongoing use.
timing_notes: After meals (post-lunch and post-dinner).
