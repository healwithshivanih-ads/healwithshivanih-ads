slug: ashwagandha-milk
display_name: Ashwagandha Bedtime Milk
aliases:
  - ashwagandha-warm-milk
  - withania-milk
  - ashwagandha-doodh
category: kitchen_remedy
summary: >-
  A classic Ayurvedic bedtime drink — warm milk infused with ashwagandha
  powder, a small pinch of nutmeg, and optionally cardamom. Used through
  generations to calm a busy mind, ease the wired-but-tired pattern, and
  improve sleep onset and depth.
indications:
  - insomnia with mental overactivity
  - wired-but-tired pattern
  - anxiety
  - adrenal fatigue
  - perimenopausal sleep disruption
contraindications:
  - autoimmune thyroid disease (case-by-case — may flare in some)
  - pregnancy (especially first trimester)
  - active hyperthyroidism
  - sedatives or sleep medications without supervision
  - nightshade or solanaceae sensitivity
balances_dosha:
  - vata
aggravates_dosha:
  - kapha
preparation: >-
  Warm 1 cup whole or A2 milk (or unsweetened almond milk) gently — do not
  boil. Whisk in 1/4 to 1/2 teaspoon ashwagandha root powder, a tiny pinch
  of grated nutmeg, and optionally a pinch of cardamom. Drink while warm.
typical_dose: 1 cup
duration: 4-8 weeks nightly, then reassess
timing_notes: 30-60 minutes before bed
linked_to_topics:
  - insomnia
  - adrenal-fatigue
linked_to_mechanisms:
  - cortisol-elevation
  - 2-3am-cortisol-spike-pattern
evidence_tier: plausible_emerging
version: 1
