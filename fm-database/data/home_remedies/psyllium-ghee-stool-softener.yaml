category: kitchen_remedy
summary: >-
  Two complementary Ayurvedic methods for keeping stools soft to prevent rectal
  irritation and bleeding: psyllium husks (sat isabgol) stirred into warm water
  at night as a bulk-forming laxative, or 1 cup of warm milk with 1 teaspoon
  plain ghee at bedtime as a mild lubricating laxative. Both address the
  hard, dry stools that are the primary mechanical cause of rectal bleeding and
  fissures. Ghee in milk is particularly gentle and safe; isabgol provides
  fibre bulk. These are the preventive foundation of Lad's rectal-bleeding protocol.
indications:
  - hard dry stools causing rectal irritation or bleeding
  - rectal bleeding from constipation or haemorrhoids
  - anal fissures from straining
  - constipation prevention
  - vata-type dry bowel
contraindications:
  - intestinal obstruction or severe impaction (seek emergency care)
  - psyllium allergy (rare — can cause anaphylaxis in sensitive individuals)
  - diabetes — warm milk with ghee adds calories; adjust diet accordingly
  - if rectal bleeding does not resolve in 7-10 days, see a doctor — bleeding may indicate serious pathology
  - ghee option is NOT suitable for those with strict dairy avoidance
preparation: >-
  Option A (Isabgol/Psyllium): Stir 1 teaspoon psyllium husks (sat isabgol,
  available at any Indian grocery) into 1 cup warm water. Mix immediately and
  drink quickly before it thickens (it gels rapidly). Follow with an additional
  glass of plain water.
  Option B (Ghee-milk): Warm 1 cup whole milk until steaming. Add 1 teaspoon
  plain ghee (clarified butter). Stir and drink slowly while warm.
typical_dose: One serving of either option nightly
duration: Until stools are consistently soft; continue during any period of constipation
timing_notes: Take at bedtime; the psyllium option must be followed immediately by drinking plain water
