category: herbal_tea
summary: >-
  Lad's internal healing formula for rashes, hives, and other pitta-driven skin
  conditions: a milk infusion of coriander, cumin, and raw sugar taken once or
  twice a day until the skin heals. Coriander and cumin are strongly
  pitta-pacifying and have cooling, anti-inflammatory properties in Ayurveda;
  raw sugar (not refined) adds a grounding, ojas-building sweetness that
  supports skin repair. This works from the inside out — addressing the excess
  heat, inflammation, and toxin load underlying pitta skin flares.
indications:
  - skin rashes and hives
  - pitta-type burning, red, inflamed skin conditions
  - post-allergic reaction skin recovery
  - nausea with skin rash (high pitta conditions)
contraindications:
  - diabetes or pre-diabetes (contains sugar — modify with a smaller amount of raw sugar or substitute with stevia)
  - milk allergy or dairy intolerance (use non-dairy milk)
  - kapha dominance with congestion (dairy + sugar may aggravate)
preparation: >-
  Mix together: 2 parts ground coriander seeds (dhania powder), 1 part ground
  cumin (jeera powder), and 2 parts raw cane sugar (not white refined sugar —
  use jaggery powder or raw sugar). Steep 1/2 teaspoon of this blended mixture
  in 1 cup of hot milk (dairy or non-dairy) for 5 minutes. Strain and drink
  while warm.
typical_dose: 1/2 teaspoon of the spice-sugar mix steeped in 1 cup hot milk
duration: Once or twice a day until the skin condition has healed
timing_notes: Take after meals; do not take on an empty stomach if prone to bloating
