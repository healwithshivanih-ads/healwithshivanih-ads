slug: clove-rock-candy-cough
display_name: Clove & Rock Candy (Dry Cough)
aliases:
- laung-mishri-cough
category: other
summary: 'A Lad first-aid for a dry, tickly cough: slowly suck a whole clove with a piece of
  rock candy (mishri). Clove (eugenol) is mildly anaesthetic and antimicrobial and calms the
  cough reflex; the rock candy soothes the throat and offsets clove''s heat so it doesn''t burn
  the tongue.'
indications:
- dry, tickly cough
- throat irritation / scratchy throat
contraindications:
- choking risk — do not give whole cloves to young children
- diabetes / blood-sugar concerns (rock candy is sugar)
- productive cough that persists >2-3 weeks or with fever/blood — see a doctor
balances_dosha:
- kapha
- vata
aggravates_dosha:
- pitta
rasa:
- pungent
virya: heating
vipaka: pungent
ayurvedic_actions:
- carminative
- analgesic
preparation: Place a whole clove with a small piece of rock candy (mishri) in the mouth and
  suck slowly, letting the juices coat the throat.
typical_dose: As needed when the cough flares
duration: A few days
timing_notes: Whenever the throat tickles
