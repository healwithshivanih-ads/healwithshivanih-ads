slug: ginger-paste-kapha-headache
display_name: Ginger Paste for Kapha-Sinus Headaches
aliases:
  - adrak-paste-forehead
  - ginger-powder-sinus-headache
category: other
summary: >-
  A warming paste of ginger powder and water applied to the forehead, bridge of
  the nose, and cheekbones for kapha-type headaches — the dull, heavy, frontal
  headaches associated with sinus congestion, colds, and damp-cold weather.
  Ginger is pungent and heating; applied topically it cuts through kapha, opens
  sinus passages, and relieves the feeling of heaviness and pressure. Lad
  contrasts this with the cooling nutmeg paste used for vata headaches: kapha
  headaches need warmth and movement, not relaxation.
indications:
  - kapha-type headache (dull, heavy, frontal, sinus-area)
  - headache associated with sinus congestion or a cold
  - headache worsened by damp or cold weather
  - forehead heaviness and pressure
  - post-nasal drip with headache
contraindications:
  - pitta-type headaches or inflammatory skin conditions — ginger is heating
    and will cause burning; do NOT use if skin is irritated or sensitive
  - do not apply near eyes or directly into nostrils
  - skin sensitivity test on inner wrist before first use is recommended
  - vata headaches (use nutmeg paste instead)
preparation: >-
  Mix 1 teaspoon of ginger powder with just enough water to form a smooth paste.
  Apply the paste to the forehead, across the bridge of the nose, and over the
  cheekbones (the sinus area). Leave on for 10 to 15 minutes, then wash off
  with warm water. The paste may cause a mild sensation of warmth or tingling —
  this is expected. Remove immediately if burning or skin irritation occurs.
typical_dose: 1 teaspoon ginger powder as a topical forehead and sinus paste
duration: Single application as needed; may repeat once or twice per day
timing_notes: Apply and rest quietly; avoid cold air while the paste is on
