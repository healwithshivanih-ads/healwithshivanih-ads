slug: kaishore-guggulu
display_name: Kaishore Guggulu (Pitta Joints & Gout)
aliases:
- kishore-guggulu
category: ayurvedic_churan
summary: A cooling, blood-cleansing guggulu formulation Lad recommends for pitta-type arthritis
  — hot, red, swollen, inflamed joints — and for gout and high uric acid. It pairs purified
  guggulu with bitter, anti-inflammatory herbs (incl. guduchi/triphala) to reduce heat and
  inflammation in the joints.
indications:
- pitta-type arthritis (hot, red, swollen joints)
- gout / high uric acid
- inflammatory joint flares
- inflammatory skin with joint involvement
contraindications:
- 'THYROID INTERACTION: guggul (guggulsterones) can alter thyroid hormone levels/metabolism
  — important if on levothyroxine or with thyroid disease; coordinate with the prescriber
  and monitor'
- 'blood thinning: may increase bleeding risk — caution with anticoagulant/antiplatelet drugs
  and before surgery'
- pregnancy and breastfeeding — avoid (uterine stimulant)
- can cause GI upset, loose stools, hyperacidity, headache, or skin rash; stop if rash/itching
  occurs
- classical tablet formulation from an Ayurvedic pharmacy — best used under a knowledgeable
  practitioner, not indefinitely
balances_dosha:
- pitta
- kapha
aggravates_dosha: []
avoid_in:
- pregnancy
- lactation
rasa:
- sweet
- bitter
- astringent
virya: cooling
vipaka: pungent
ayurvedic_actions:
