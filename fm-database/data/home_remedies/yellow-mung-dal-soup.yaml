preparation: >-
  Wash 1 cup yellow (split) mung dal twice. Boil in 6 cups water ~45 min,
  stirring, until very soft; beat smooth with a whisk. Separately temper 1 tsp
  black mustard seeds + 1 tsp cumin seeds + a pinch of hing in a little oil or
  ghee until the seeds pop; add chopped garlic, a few curry leaves, cilantro,
  1/2 tsp turmeric and (optionally) 1/2 tsp mild masala; stir into the soup.
  Salt to taste and boil 2 minutes. Serve warm with a squeeze of lime.
typical_dose: 1 bowl as a light meal, once or twice a day
duration: Daily during recovery; otherwise as a regular light meal
timing_notes: Best warm; ideal as a light lunch or early dinner
