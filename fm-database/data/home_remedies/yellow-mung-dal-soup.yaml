summary: >-
  A thin, spiced split-yellow-mung-dal soup that Lad gives as a light, deeply
  digestible, tridoshic food — the classic convalescent meal. Yellow mung is
  sweet and cooling and very easy to digest; the tempering spices (mustard,
  cumin, hing, curry leaf, turmeric) kindle agni and offset the dryness of the
  dal so it doesn't aggravate vata. Lighter than kitchari (no rice), it suits
  recovery from fever or illness, weak digestion, and anyone needing easy
  protein. Distinct from the rice-plus-dal kitchari already in the catalogue.
indications:
  - recovery from fever or acute illness
  - weak / convalescent digestion needing easy protein
  - diarrhea (with the binding spices)
  - eye problems and skin conditions (traditional use)
  - a light tridoshic meal suitable for all constitutions
contraindications:
  - the plain unspiced version is drying / light and can aggravate vata — keep the warming tempering and a little ghee
  - do not pair with incompatible foods in the same meal (see Ayurvedic food-combining guidance)
