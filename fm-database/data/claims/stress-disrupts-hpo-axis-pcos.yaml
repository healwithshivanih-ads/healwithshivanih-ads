slug: stress-disrupts-hpo-axis-pcos
statement: Chronic psychological stress disrupts the hypothalamic-pituitary-ovarian
  (HPO) axis by elevating cortisol, altering LH:FSH ratio, and increasing androgens,
  contributing to PCOS and infertility.
evidence_tier: plausible_emerging
rationale: Biologically plausible mechanism supported by FM literature; no primary
  RCT cited in this document.
coaching_translation: Stress management is a frontline strategy for cycle regularity
  and PCOS — not just a nice-to-have.
caveats:
- Source is educational synthesis. Specific study citations absent.
- Lab interpretation and prescribing out of coaching scope.
