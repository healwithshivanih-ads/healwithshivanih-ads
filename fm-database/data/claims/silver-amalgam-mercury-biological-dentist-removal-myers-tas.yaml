slug: silver-amalgam-mercury-biological-dentist-removal-myers-tas
statement: Silver dental amalgams contain mercury that can leach into the body, and
  if removed they should be taken out by a biological dentist using protective protocols
  to avoid mercury-vapour exposure.
evidence_tier: fm_specific_thin
rationale: Improper amalgam removal can release mercury vapour; a trained biological
  dentist uses isolation and ventilation to reduce exposure.
coaching_translation: If you consider removing old silver fillings, use a biological
  dentist who removes them safely — never rush it.
