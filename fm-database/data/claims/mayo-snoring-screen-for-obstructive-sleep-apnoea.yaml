slug: mayo-snoring-screen-for-obstructive-sleep-apnoea
statement: Snoring accompanied by witnessed apnoeas (breathing pauses), gasping or
  choking awakenings, morning headaches, excessive daytime sleepiness, refractory
  hypertension, or atrial fibrillation warrants a sleep study to rule out obstructive
  sleep apnoea before treating snoring as benign.
evidence_tier: strong
