slug: ldl-p-outperforms-ldl-c-for-risk
statement: LDL particle number (LDL-P) is a stronger predictor of cardiovascular risk
  than calculated LDL-C, as demonstrated by MESA data — two patients with the same
  LDL-C can have LDL-P values of <1,000 vs >1,500 with vastly different risk.
evidence_tier: strong
rationale: MESA (Multi-Ethnic Study of Atherosclerosis) data referenced directly.
  The discordance between LDL-C and LDL-P is well-documented in peer-reviewed cardiology
  literature.
coaching_translation: Knowing 'how many' LDL particles you have is more important
  than just knowing the cholesterol level. Two people with the same LDL number can
  have very different heart risk.
caveats:
- MESA study referenced by name but not directly quoted with author/year/journal in
  this lecture.
