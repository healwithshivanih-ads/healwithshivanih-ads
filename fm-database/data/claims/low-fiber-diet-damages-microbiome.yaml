slug: low-fiber-diet-damages-microbiome
statement: A consistently low or zero-fiber diet starves key gut bacteria and negatively
  impacts the microbiome, including bacteria that support insulin sensitivity.
evidence_tier: plausible_emerging
rationale: Mechanistically supported by microbiome research on substrate availability;
  speaker references a physician colleague observing loss of insulin sensitivity in
  long-term carnivore patients. No primary study cited.
coaching_translation: Skipping fiber long-term doesn't just affect digestion — it
  slowly depletes the gut bacteria your clients need for blood sugar balance and overall
  health.
caveats:
- Single-expert source; specific clinical observation anecdotal. Corroborate with
  microbiome literature.
