slug: mayo-gerd-ppi-conventional-ladder
statement: Proton pump inhibitors (omeprazole, esomeprazole, lansoprazole, pantoprazole,
  rabeprazole) are conventionally the most effective acid suppressors for moderate-to-severe
  GERD; H2-receptor blockers (famotidine, cimetidine) and antacids are positioned
  for milder or breakthrough symptoms.
