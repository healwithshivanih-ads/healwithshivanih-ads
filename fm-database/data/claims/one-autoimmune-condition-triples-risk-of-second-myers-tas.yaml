slug: one-autoimmune-condition-triples-risk-of-second-myers-tas
statement: Having one autoimmune condition raises the risk of developing a second
  by roughly threefold, which is a key reason to sustain anti-inflammatory living
  rather than just resolve initial symptoms.
evidence_tier: plausible_emerging
rationale: Shared upstream drivers (leaky gut, inflammation, triggers) predispose
  to additional autoimmune diagnoses.
coaching_translation: Once you have one autoimmune condition you're more likely to
  develop another — which is why we keep inflammation down for the long run.
