slug: b2b-labs-are-a-guide-not-the-end
statement: Labs are pattern-recognition tools and a jumping-off point for lifestyle
  change, not the end goal. They can be a motivating way for clients to track small
  wins over time, but data alone doesn't change anyone — the conversation, support
  and insight are what move the values. The coach matches tracking to the client (data-lover
  vs. subjective, e.g. a simple 1–5 energy scale).
evidence_tier: plausible_emerging
rationale: Reframes labs as one motivating input, keeping the client — not the number
  — at the centre.
coaching_translation: Use the lab as a progress tracker when it motivates; for clients
  who dislike numbers, use a simple subjective scale so there's still a baseline to
  revisit.
out_of_scope_notes: The clinical significance of a marker or its target range is defined
  by the provider.
