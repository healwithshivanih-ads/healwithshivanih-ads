slug: hawthorn-mild-bp-lowering-2-4-weeks
statement: Crataegus (hawthorn) berry and flowering-top extracts lower blood pressure
  and improve heart function; the BP-lowering effect is mild and requires at least
  2–4 weeks to become apparent.
evidence_tier: plausible_emerging
rationale: Consistent with multiple small trials; hawthorn's cardiovascular effects
  are among the best-studied of botanical medicines, though effect sizes are modest.
coaching_translation: Hawthorn is a gentle heart tonic that gradually lowers blood
  pressure — give it at least a month before judging results.
