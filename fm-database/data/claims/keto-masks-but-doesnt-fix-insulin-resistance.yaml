slug: keto-masks-but-doesnt-fix-insulin-resistance
statement: A ketogenic / very-low-carb diet rapidly normalises fasting glucose and
  HbA1c in most clients with T2D — this is real and beneficial as a damage-prevention
  measure. But it does NOT fix the underlying structural cell dysfunction; it masks
  the diagnostic criteria. Diagnostic criteria depend on carbohydrate exposure (same
  as coeliac disease requires gluten exposure to demonstrate). Test of true reversal
  — eat a normal-sized carbohydrate meal after the protocol; if blood glucose still
  spikes hard, the underlying cell dysfunction is still present. Coach implication
  — celebrate the keto-driven glucose drop AND keep working on muscle building, fat-cell
  offloading, and weight management. Do not declare "diabetes reversed" prematurely.
evidence_tier: plausible_emerging
