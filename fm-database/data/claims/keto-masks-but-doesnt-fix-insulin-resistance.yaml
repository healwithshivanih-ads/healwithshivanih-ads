sources:
- id: leaf-energy-blueprint-podcast-2026
  location: Podcast — keto masking segment
  quote: If you're on a low carb diet, eat some carbohydrates. Because if you can't
    eat carbohydrates in your diet without something going wrong, you're not metabolically
    healthy. You can be on that ketogenic diet and think everything's okay, but you're
    just masking the problem. It's like I have a bum knee and as long as I'm on crutches
    and I take the weight off this leg, I don't feel any problem with my knee.
rationale: Stops coach from declaring "we reversed it" when client has only become
  a low-carber. Re-challenge data is key.
