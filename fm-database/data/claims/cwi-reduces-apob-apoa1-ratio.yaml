slug: cwi-reduces-apob-apoa1-ratio
statement: Cold-adapted swimmers demonstrate a significant reduction in the apolipoprotein
  B/apolipoprotein A1 (ApoB/ApoA1) ratio, a marker of cardiovascular risk.
evidence_tier: plausible_emerging
rationale: Observed in cold-adapted swimmer populations in the review. ApoB/ApoA1
  is a validated cardiovascular risk marker; however, confounding by overall active
  lifestyle is significant.
coaching_translation: Long-term cold water swimming may be associated with healthier
  cholesterol particle profiles, which matters for heart health.
out_of_scope_notes: ApoB/ApoA1 interpretation and cardiovascular risk stratification
  is clinician scope.
caveats:
- Observed in adapted swimmers — unclear if effect is from CWI alone or active lifestyle
- Confounding factors not fully controlled
- Small study populations
