slug: gluten-hidden-in-supplements-personal-care
statement: Many personal care products and nutritional supplements contain gluten;
  individuals following a gluten-free diet should verify these products are certified
  gluten-free.
evidence_tier: strong
rationale: This is clinically established and recognized by the Celiac Disease Foundation.
  Topical and ingestible gluten can affect celiac patients.
coaching_translation: Check your supplements, protein powders, and even skincare products
  for gluten-containing ingredients. The risk is real, especially for celiac disease.
