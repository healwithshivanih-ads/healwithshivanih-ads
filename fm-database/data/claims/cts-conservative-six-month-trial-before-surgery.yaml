  location: Chapter 32 — Carpal Tunnel Syndrome, pg 622-625
  quote: Surgery for CTS should definitely not be considered before more conservative
    treatment has been tried for six months. The most recommended initial treatment
    is four weeks in a neutral wrist splint worn full-time. To prevent permanent nerve
    damage, however, surgery should not be delayed beyond three years after first
    onset of symptoms.
