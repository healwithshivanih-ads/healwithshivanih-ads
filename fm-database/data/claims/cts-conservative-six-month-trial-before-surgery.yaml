slug: cts-conservative-six-month-trial-before-surgery
statement: 'CTS surgery should not be considered before at least six months of conservative
  care: full-time neutral-position wrist splint worn for four weeks (most effective
  within three months of onset), contrast hydrotherapy (hand past wrist — 3 min hot
  then 30 sec cold, 3-5 cycles), acupuncture (as effective as oral prednisolone in
  a randomised trial with better muscle-function outcomes), B6 plus riboflavin, fish
  oils 3,000 mg EPA+DHA. To avoid permanent nerve damage, however, surgery should
  not be delayed beyond three years after first onset of symptoms.'
evidence_tier: plausible_emerging
