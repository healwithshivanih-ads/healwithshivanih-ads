slug: corn-quinoa-transit-time-test
statement: Hawrelak's at-home transit-time assessment — eat 2 tablespoons of whole
  sweetcorn kernels, red/black quinoa, or green peas, swallow without chewing thoroughly,
  note the time, then watch stools until the marker re-emerges. Clinical observation
  — clients with daily Bristol-4 stools ("perfect poo") have taken anywhere from 10
  to 26 days to clear the marker. The longer the transit time, the more LPS and bacterial
  metabolites are reabsorbed through the colonic mucosa into systemic circulation.
  Healthy transit is typically 18-30 hours; chronic illness often shows 3-10+ days
  even with daily bowel movements. Coach intake — cheaper than any stool test and
  surfaces the most-actionable single intervention.
