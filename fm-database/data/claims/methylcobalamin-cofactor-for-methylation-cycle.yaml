slug: methylcobalamin-cofactor-for-methylation-cycle
statement: Methylcobalamin (methylated B12) works together with methylfolate as an
  essential co-substrate for the methylation cycle; deficiency in either prevents
  the cycle from completing.
evidence_tier: strong
rationale: 'Well-established biochemistry: methylcobalamin serves as the cofactor
  for methionine synthase, the enzyme that transfers the methyl group from methylfolate
  to homocysteine. B12 deficiency is a recognised cause of functional folate deficiency
  (''folate trap'').'
coaching_translation: B12 and folate are partners — you need both to run the methylation
  cycle effectively. Vegans and vegetarians are at particular risk of B12 deficiency
  and should consider methylcobalamin supplementation.
caveats:
- Serum B12 is an imperfect marker — methylmalonic acid (MMA) or holotranscobalamin
  are better functional measures
- Dose selection requires clinician input
