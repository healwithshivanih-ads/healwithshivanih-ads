slug: murray-htn-garlic-extract
statement: Standardized dried garlic powder providing 7.8 to 11.7 mg alliin per day
  (600 to 900 mg of a 1.3 percent alliin extract, equivalent to 1.8 to 2.7 g fresh
  garlic) lowers systolic BP by ~11 mmHg and diastolic by ~5 mmHg over one to three
  months in hypertensives (meta-analysis, n=415). Whole-food garlic and onions in
  cooking add to the effect.
evidence_tier: plausible_emerging
