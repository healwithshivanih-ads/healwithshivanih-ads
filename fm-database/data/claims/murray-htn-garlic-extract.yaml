sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 63 — High Blood Pressure, pg 1055-1056
  quote: In a meta-analysis of published clinical trials of garlic preparations that
    included a total of 415 subjects, subjects who were given a dried garlic powder
    standardized to contain 1.3 percent alliin at a dosage of 600 to 900 mg per day
    (corresponding to 7.8 or 11.7 mg alliin, the equivalent of approximately 1.8 to
    2.7 g fresh garlic per day) saw a typical drop of 11 mm Hg in systolic blood pressure
    and 5 mm Hg in diastolic blood pressure over a period of one to three months.
version: 1
