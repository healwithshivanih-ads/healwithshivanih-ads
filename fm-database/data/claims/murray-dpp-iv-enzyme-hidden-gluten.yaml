slug: murray-dpp-iv-enzyme-hidden-gluten
statement: Dipeptidyl peptidase IV (DPP-IV) — an enzyme that targets both gliadin
  and casein and resists breakdown by other digestive enzymes — is found at lower
  levels in celiac intestinal mucosa, inversely correlated with mucosal damage severity.
  Supplemental DPP-IV-containing enzyme preparations (1-2 capsules with each meal
  containing potential gluten) safeguard against hidden gluten exposure when eating
  out or when adherence to strict GF diet is impossible to verify. Pancreatic enzymes
  additionally enhance clinical response in the first 30 days post-diagnosis.
evidence_tier: plausible_emerging
rationale: Mechanism — DPP-IV is the rate-limiting enzyme for proline-rich peptide
  digestion (gliadin contains 15% proline residues). Supplementation does NOT replace
  strict GF diet but reduces accidental exposure impact.
coaching_translation: DPP-IV-containing digestive enzymes don't replace the gluten-free
  diet but help when accidental exposure happens (eating out, cross-contamination).
  1-2 capsules with any meal where hidden gluten is possible. Pancreatic enzymes (lipase
  + amylase + protease) additionally help in the first month after diagnosis. Look
  for combination products with both.
caveats:
- NOT a substitute for strict GF diet — supplementary protection only
- Severe celiac with active inflammation should not rely on enzymes
- Quality varies — choose products that disclose DPP-IV activity (units)
- GliadinX is one branded product with published efficacy data
