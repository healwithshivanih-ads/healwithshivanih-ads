  quote: Enzyme preparations containing dipeptidyl peptidase IV (DPP-IV) from fungal
    sources. This enzyme targets both gliadin and casein (milk protein) and is resistant
    to breakdown by other digestive enzymes. DPP-IV is thought to be one of the key
    enzymes responsible for the digestion of these proteins and is known to be found
    in lower amounts in the intestinal mucosa of individuals with celiac disease.
