slug: tmg-homocysteine-lowering-methylation
statement: TMG (betaine/trimethylglycine), combined with B6, B12, and folate, lowers
  elevated homocysteine and supports methylation cycle function.
evidence_tier: plausible_emerging
rationale: Document lists TMG alongside B vitamins for homocysteine lowering. The
  BHMT pathway using betaine as a methyl donor is biochemically established. No specific
  RCT cited in the source.
coaching_translation: TMG (betaine) acts as a methyl donor to help reduce homocysteine
  levels and keep your methylation cycle running smoothly.
caveats:
- Verify dose with clinician
- Source is FM synthesis
- Consider alongside full B complex
