slug: carrageenan-should-be-avoided-in-ibd
statement: Carrageenan (used as a food stabiliser in dairy products, ice cream, and
  processed foods) has been used to induce IBD in animal models; people with B. vulgatus
  overgrowth may be at particular risk and should avoid it.
evidence_tier: fm_specific_thin
rationale: Animal data are robust but human studies have not proven causation; the
  mechanism (B. vulgatus-mediated metabolic activation of carrageenan) is plausible.
  Avoiding carrageenan is a low-risk intervention with biological rationale.
coaching_translation: Check ingredient labels and avoid carrageenan in dairy products,
  ice cream, chocolate milk, and cottage cheese if you have IBD or gut inflammation.
caveats:
- No direct causal proof in humans; germ-free animals do not display carrageenan-induced
  damage, suggesting bacterial co-factor is required
