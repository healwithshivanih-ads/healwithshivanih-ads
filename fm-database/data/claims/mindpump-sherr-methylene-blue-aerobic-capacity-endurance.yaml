slug: mindpump-sherr-methylene-blue-aerobic-capacity-endurance
statement: Methylene blue at endurance-relevant doses extends aerobic capacity by
  acting as an alternative electron acceptor when oxygen delivery to mitochondria
  becomes rate-limiting, pushing back the lactic threshold so athletes can hold a
  target heart rate for longer before crossing into anaerobic territory. Sherr cites
  a Leadville 100 ultramarathon runner who cut three hours off his finishing time
  dosing 32 mg every four hours during the race, plus dog studies showing delayed
  lactic threshold under methylene blue. The mechanism is not stimulant-like — it
  is a redox effect on the electron transport chain — so the endurance benefit shows
  up most clearly in athletes who can hold a steady-state aerobic effort.
rationale: New endurance-performance angle not covered in the Energy Blueprint Sherr
  claims; includes a specific dose pattern (32 mg every 4 h) and a named race anecdote.
