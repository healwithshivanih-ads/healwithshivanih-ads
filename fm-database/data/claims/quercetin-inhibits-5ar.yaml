slug: quercetin-inhibits-5ar
statement: Quercetin inhibits 5-α reductase and may help reduce DHT-related symptoms.
evidence_tier: fm_specific_thin
rationale: Listed in the FMCN toolkit as a phytonutrient inhibitor of 5-α reductase.
  In vitro evidence is available but clinical human RCT data is limited.
coaching_translation: Quercetin — found in apples, onions, and capers — is a plant
  compound that may help block the enzyme responsible for DHT overproduction.
caveats:
- Primarily in vitro evidence for 5-AR inhibition
- Supplement dosing requires clinician guidance
