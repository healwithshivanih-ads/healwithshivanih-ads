slug: low-stomach-acid-impairs-b12-iron-absorption
statement: Low stomach acid (hypochlorhydria) impairs absorption of iron and vitamin
  B12, contributing to deficiency-driven fatigue even in people eating a healthy diet.
evidence_tier: plausible_emerging
rationale: Stomach acid is required for releasing B12 from food protein and for converting
  iron to its absorbable ferrous form. This is biologically well-established, though
  the prevalence of hypochlorhydria as a primary driver of deficiency is not fully
  characterised in RCTs.
coaching_translation: Your client may be eating well but still deficient — because
  if stomach acid is low, nutrients can't be absorbed properly. This is often behind
  persistent fatigue that doesn't respond to dietary changes alone.
caveats:
- Hypochlorhydria diagnosis requires clinical confirmation.
- Baking soda test is an informal screening tool only, not a diagnostic standard.
