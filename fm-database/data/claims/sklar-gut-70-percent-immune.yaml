slug: sklar-gut-70-percent-immune
statement: Roughly 70% of the body's immune cells reside in gut-associated lymphoid
  tissue. Dysbiosis, leaky gut and untreated GI infections (parasites, SIBO, Candida)
  therefore drive systemic immune activation and inflammation that directly compromises
  implantation and early pregnancy. Comprehensive stool analysis plus an organic acids
  test belong in any pre-IVF workup.
