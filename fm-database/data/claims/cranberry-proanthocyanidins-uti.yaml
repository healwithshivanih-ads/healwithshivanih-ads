slug: cranberry-proanthocyanidins-uti
statement: Cranberry (Vaccinium macrocarpon) proanthocyanidins prevent bacterial adherence
  to bladder cells — reducing UTI recurrence in 60% of the bacterial strains tested.
  Effective doses are 300 ml unsweetened cranberry juice/day or a standardized extract
  (CranMax tablets). In a 153-woman trial (avg age 78.5) and a 150-woman 12-month
  trial both juice and extract roughly halved symptomatic recurrence vs placebo. Use
  unsweetened juice (sugar suppresses immunity) or a 36 mg PAC-standardized extract.
evidence_tier: strong
