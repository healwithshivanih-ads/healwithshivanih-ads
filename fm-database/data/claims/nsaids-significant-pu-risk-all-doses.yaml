slug: nsaids-significant-pu-risk-all-doses
statement: NSAIDs carry a significant risk of peptic ulcer at all doses; even low-dose
  aspirin (75 mg/day) is associated with increased GI bleeding risk, with 40% less
  bleeding than 300 mg/day but risk remains present.
evidence_tier: strong
rationale: Well-established pharmacological mechanism (COX-1 inhibition reducing prostaglandin-mediated
  mucosal protection) with extensive RCT and epidemiological evidence; dose-dependent
  GI bleeding data is mainstream clinical knowledge.
coaching_translation: Even a baby aspirin every day carries a real risk of stomach
  bleeding — it's not harmless. Let your doctor know if you're taking aspirin regularly.
