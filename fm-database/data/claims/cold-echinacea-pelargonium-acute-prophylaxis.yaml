  quote: Fewer people in the echinacea group felt that their initial symptoms actually
    developed into 'real' colds (40% of those taking echinacea vs 60% taking the placebo).
    After 10 days, 78.8% of those in the EPs 7630 group vs 31.4% in the placebo group
    were clinically cured.
