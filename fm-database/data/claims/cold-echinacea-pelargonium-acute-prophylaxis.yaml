slug: cold-echinacea-pelargonium-acute-prophylaxis
statement: Fresh-juice Echinacea purpurea preparations (2-4 mL TID) reduce the rate
  at which initial symptoms become full colds (40% with echinacea vs 60% placebo)
  and speed resolution (4 days vs 8 days). Pelargonium sidoides (Umcka, EPs 7630)
  30 drops TID achieved clinical cure in 78.8% by day 10 vs 31.4% placebo, shortening
  duration by more than a day. Both work best when started at the very first hint
  of symptoms; freshly pressed juice preparations outperform dried-herb capsules.
evidence_tier: strong
