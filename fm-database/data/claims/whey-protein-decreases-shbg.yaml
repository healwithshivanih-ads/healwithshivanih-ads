slug: whey-protein-decreases-shbg
statement: Whey protein supplementation is associated with decreased SHBG levels.
evidence_tier: fm_specific_thin
rationale: Listed in the FMCN toolkit. Protein intake generally influences SHBG (low
  protein diets increase SHBG); whey's specific effect is plausible but sparsely documented.
coaching_translation: Adequate protein, including whey protein, may help keep SHBG
  at a healthy level by signaling sufficient nutritional status to the liver.
caveats:
- Thin peer-reviewed evidence specific to whey protein and SHBG
- Source is expert-consensus toolkit
