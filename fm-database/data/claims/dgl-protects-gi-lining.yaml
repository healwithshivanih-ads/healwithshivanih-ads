slug: dgl-protects-gi-lining
statement: DGL (deglycyrrhizinated licorice) protects the GI lining and is recommended
  during PPI tapering.
evidence_tier: plausible_emerging
rationale: DGL has demulcent and cytoprotective properties; some clinical evidence
  supports its use for peptic ulcer and gastric discomfort, though large RCT data
  is limited.
caveats:
- Evidence base is moderate; most studies are older or small.
