slug: mayo-shingles-dermatomal-pattern-and-prodrome
statement: Shingles classically presents as burning, tingling or itching pain in a
  single dermatomal strip on one side of the body, followed within days by a vesicular
  rash that crusts over in 7 to 10 days; pain often precedes the rash by 1 to 5 days.
