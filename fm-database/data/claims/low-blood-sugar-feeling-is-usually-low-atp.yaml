slug: low-blood-sugar-feeling-is-usually-low-atp
statement: Masterjohn's strong position based on his own extended self-testing and
  clinical work — the subjective feeling that many clients call "low blood sugar between
  meals" is almost never actually hypoglycaemia on measurement. It is a LOW ATP state.
  Glucose only matters for symptoms because cells use glucose to make ATP. A ketoadapted
  client with glucose of 50 mg/dL and beta-hydroxybutyrate 5-10 mmol/L feels fine;
  an unadapted client at the same glucose with no ketones is closer to seizing. Persistent
  post-meal fatigue is more consistent with partial mitochondrial enzyme impairment
  producing toxic intermediates than with hypoglycaemia or "hormone imbalance." Coach
  action — for clients who insist on "low blood sugar," suggest a CGM trial; the data
  almost always disrupts the assumption.
