sources:
- id: masterjohn-energy-blueprint-podcast-2026
  location: Podcast — low blood sugar segment
  quote: I think it's a low energy state — low ATP. The only reason that your blood
    sugar ever dictates how you feel is because you used glucose to make ATP. So when
    you feel like crap because your glucose is low it's not because your glucose is
    low. It's because your glucose is low and you don't have enough ketones to make
    up for it. I had a very distinct idea of what feeling hypoglycemic felt like —
    under no circumstances was I ever hypoglycemic under those conditions.
rationale: Reframes the chronically-snacking client — instead of more carbs, ask whether
  they have ketone flexibility or mitochondrial enzyme impairment.
