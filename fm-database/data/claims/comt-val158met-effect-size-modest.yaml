slug: comt-val158met-effect-size-modest
statement: The COMT Val158Met (rs4680) Met variant is thermolabile and clears
  catecholamines roughly 2-3-fold slower than the Val variant, with well-documented
  associations to anxiety, mood, and attentional traits — but this is one variant
  among many contributing genes, not a standalone predictor.
evidence_tier: plausible_emerging
rationale: Counterbalances consumer-genetics overclaiming — Val158Met is real and
  well-studied, but should be read as one contributing factor, in line with the
  broader polygenic-scoring principle.
coaching_translation: A "slow COMT" result explains a tendency, not a diagnosis —
  it's one thread among several that shape how someone handles stress.
