slug: mayo-yeast-infection-recurrent-infection-workup
statement: Four or more documented yeast infections in 12 months is recurrent vulvovaginal
  candidiasis and warrants screening for uncontrolled diabetes, immunosuppression,
  recent antibiotic exposure, oestrogen-dominant contraception, or non-albicans Candida
  species that need extended or alternative antifungal therapy.
