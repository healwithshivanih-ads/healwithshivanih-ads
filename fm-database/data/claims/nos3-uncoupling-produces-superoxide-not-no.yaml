slug: nos3-uncoupling-produces-superoxide-not-no
statement: When NOS3 lacks sufficient arginine and/or BH4—due to chronic inflammation,
  infections, chemical exposure, or high homocysteine—it becomes 'uncoupled' and produces
  superoxide (a dangerous free radical) instead of nitric oxide, worsening cardiovascular
  and neurological outcomes.
evidence_tier: strong
rationale: NOS3 uncoupling via BH4 depletion or L-arginine insufficiency resulting
  in superoxide production instead of NO is well documented in peer-reviewed cardiovascular
  biology literature.
coaching_translation: Cleaning up the underlying triggers (inflammation, oxidative
  stress, infections, chemical exposure, poor methylation) is essential before adding
  arginine—without fixing BH4 status, extra arginine simply produces more superoxide.
caveats:
- Arginine supplementation without addressing BH4 may be harmful in some contexts—refer
  to clinician
