  location: Chapter 10 — The Arginine Steal
  quote: An uncoupled NOS3 is one that's operating with insufficient arginine and
    BH4. Instead of making nitric oxide, which your blood vessels can use, an uncoupled
    NOS3 makes superoxide, which we've seen is highly dangerous.
