slug: quercetin-reduces-mast-cell-leukotriene-ibd
statement: Quercetin, the most pharmacologically active plant flavonoid, potently
  inhibits mast cell and basophil degranulation, inhibits phospholipase A2 and lipoxygenase,
  and reduces leukotriene formation — providing strong anti-inflammatory effects in
  IBD.
evidence_tier: plausible_emerging
rationale: Well-characterised in vitro and animal data; quercetin's multiple points
  of action on the arachidonic acid cascade and mast cell signalling make it a plausible
  IBD adjunct, though large human RCTs are lacking.
coaching_translation: Quercetin-rich foods (onions, capers, apples) and quercetin
  supplements act as natural anti-inflammatory agents by calming mast cell activity
  and reducing inflammatory leukotrienes.
caveats:
- Oral bioavailability of quercetin is limited; phytosome or quercetin chalcone forms
  may improve absorption
- Source is a textbook; primary RCTs in IBD are sparse
