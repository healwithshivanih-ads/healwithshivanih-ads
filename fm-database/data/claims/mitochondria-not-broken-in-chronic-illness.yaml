- id: gordon-energy-blueprint-podcast-2026
  location: Podcast — closing summary
  quote: Your mitochondria are your friends. What they need is just like you need
    a safe place to live. They are usually not broken. I think that's the biggest
    lesson of Bob to me is that you do not usually have a mitochondrial disease. Most
    of the people with chronic illnesses didn't have mitochondrial disease — their
    mitochondria were stuck in this cycle.
rationale: Foundational reframe — coach moves from "boost the mitochondria" framing
  into "identify the danger signal" framing.
