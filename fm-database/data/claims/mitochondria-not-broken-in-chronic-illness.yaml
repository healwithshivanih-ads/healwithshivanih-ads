slug: mitochondria-not-broken-in-chronic-illness
statement: In Naviaux's clinical experience studying mitochondrial diseases, almost
  all clients labelled with "chronic illness" do NOT have a true mitochondrial gene
  defect — their mitochondria are functioning normally but are STUCK in the cell danger
  response in defence of perceived ongoing threat. This is the central paradigm shift
  — chronic illness is not mitochondrial disease, it is mitochondrial defence behaviour
  locked on. Implication for coach — the question to ask of a chronic-fatigue or post-viral
  client is not "how do we fix the mitochondria?" but "what danger signal is still
  on, and how do we send enough safety signals to allow CDR to resolve?"
evidence_tier: plausible_emerging
