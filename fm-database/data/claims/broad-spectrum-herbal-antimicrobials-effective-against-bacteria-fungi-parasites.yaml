slug: broad-spectrum-herbal-antimicrobials-effective-against-bacteria-fungi-parasites
statement: Broad-spectrum herbal antimicrobials — including berberine, caprylic acid,
  garlic oil, oil of oregano, and olive leaf extract — are effective against bacteria,
  fungi, and parasites in gut dysbiosis.
evidence_tier: plausible_emerging
rationale: Each of these agents has published in-vitro and some in-vivo evidence for
  antimicrobial, antifungal, and/or antiparasitic activity. Their use as a combination
  protocol in dysbiosis is a functional medicine convention with biologically plausible
  mechanisms, though large RCT evidence is limited.
coaching_translation: These herbal supplements are part of the 'removal' phase of
  a gut protocol, targeting harmful organisms. They work best in combination and as
  part of a complete protocol.
caveats:
- Source is expert lecture, moderate quality.
- Combination herbal antimicrobial protocols are FM convention; peer-reviewed RCT
  evidence for combination use is limited.
- Specific dosing should be clinician-guided.
