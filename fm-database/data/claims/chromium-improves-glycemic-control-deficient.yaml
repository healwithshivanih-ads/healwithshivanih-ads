slug: chromium-improves-glycemic-control-deficient
statement: Chromium supplementation (200–400 mcg/day) decreases fasting glucose, improves
  glucose tolerance, lowers insulin, and increases HDL — but only in individuals who
  are chromium deficient.
evidence_tier: plausible_emerging
rationale: Multiple RCTs (Anderson 1997 et al.) support glycaemic effects in chromium-deficient
  populations; effects absent in replete individuals. Pizzorno recommends Cr polynicotinate
  or picolinate forms.
coaching_translation: Chromium is most useful when the diet is high in refined carbs
  and exercise is low — both situations deplete chromium.
caveats:
- Efficacy conditional on deficiency status.
- Cr picolinate + biotin combination may provide additional benefit.
