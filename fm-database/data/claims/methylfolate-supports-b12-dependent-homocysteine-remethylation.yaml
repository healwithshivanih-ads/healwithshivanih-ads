slug: methylfolate-supports-b12-dependent-homocysteine-remethylation
statement: 5-MTHF (methylfolate) is required alongside vitamin B12 for the remethylation of homocysteine to methionine; insufficient
  active folate creates a functional bottleneck even when B12 levels appear normal.
evidence_tier: strong
rationale: 'This describes a well-established biochemical mechanism: methionine synthase requires both methylcobalamin and
  5-MTHF as substrates. The bottleneck concept is foundational biochemistry.'
coaching_translation: Folate and B12 are a team — you need both in their active forms for the methylation cycle to run properly.
  A shortage of active folate can stall the whole process, even if B12 looks fine on paper.
caveats:
- Source is an LLM synthesis, but this claim reflects well-established biochemistry with strong independent support.
