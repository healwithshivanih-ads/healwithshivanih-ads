slug: anemia-b12-absorption-requires-hcl-intrinsic-factor
statement: Vitamin B12 deficiency is most often a problem of absorption, not intake.
  B12 must be liberated from food by hydrochloric acid and bound to intrinsic factor
  (secreted by gastric parietal cells alongside HCl) before ileal absorption. Low
  stomach acid, PPI use, atrophic gastritis, and pernicious anemia all impair this
  cascade. Neurological symptoms (numbness, depression, confusion) can appear BEFORE
  anemia is detectable.
evidence_tier: strong
