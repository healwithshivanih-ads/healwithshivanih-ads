slug: abrupt-ppi-discontinuation-causes-rebound-reflux
statement: Stopping PPIs abruptly is not recommended because it causes rebound acid
  hypersecretion; gradual tapering minimizes this reversible short-term effect.
evidence_tier: strong
rationale: Rebound acid hypersecretion upon abrupt PPI cessation is well-documented
  in clinical literature.
coaching_translation: Stopping a PPI 'cold turkey' can actually make heartburn worse
  temporarily — a slow, supervised taper is the safer approach.
out_of_scope_notes: PPI tapering protocol design is a clinician responsibility.
