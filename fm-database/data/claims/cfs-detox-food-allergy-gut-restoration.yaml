slug: cfs-detox-food-allergy-gut-restoration
statement: The strong overlap between CFS, fibromyalgia, and multiple chemical sensitivity
  (70% of FM patients meet CFS criteria; 30% of MCS do; 80% of FM/MCS meet the 6-month
  50%-activity-reduction criterion) suggests all three respond to the same therapeutic
  triad — liver detoxification support, food allergy identification + elimination,
  and gut restoration. Chronic fatigue was recognized as a key feature of food allergies
  as far back as 1930.
