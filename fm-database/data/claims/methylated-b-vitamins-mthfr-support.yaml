slug: methylated-b-vitamins-mthfr-support
statement: MTHFR-positive individuals should use activated/methylated B vitamin forms
  (5-MTHF, methylcobalamin, P5P, riboflavin-5'-phosphate) to bypass enzymatic impairment
  and support methylation.
evidence_tier: plausible_emerging
rationale: Document explicitly recommends active/methylated B vitamin forms for MTHFR
  support. The rationale is biochemically sound — MTHFR SNPs reduce conversion of
  standard forms. No RCT cited in source.
coaching_translation: If you have an MTHFR gene variation, choose vitamins in their
  'activated' forms — your body can use them directly without needing to convert them.
out_of_scope_notes: MTHFR genetic testing and interpretation, and therapeutic dosing,
  are clinician scope.
caveats:
- Standard folic acid supplementation may be counterproductive in MTHFR positive individuals
- Source is FM synthesis
- Dosing requires clinician guidance
