slug: b2b-n-of-one-cocreate-from-client-goals
statement: 'Every client is an N of one: giving up alcohol lowers triglycerides for
  one person, while exercise or cutting late-night sugar moves the dial for another.
  So the coach co-creates the starting point from what matters to the client — their
  big goal, their values, what they''re willing and able to do — rather than from
  what the lab ''says''.'
evidence_tier: plausible_emerging
rationale: Anchoring on the client's own motivation makes the chosen change far more
  likely to stick.
coaching_translation: Ask 'what matters most to you, what's motivating, where do you
  want to start?' and build the first small change around their answer, not around
  the worst number.
out_of_scope_notes: The clinician, not the coach, decides clinical priorities and
  thresholds for action.
