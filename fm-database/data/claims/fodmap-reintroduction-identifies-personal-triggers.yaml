slug: fodmap-reintroduction-identifies-personal-triggers
statement: Systematic FODMAP reintroduction — one group at a time with at least 3
  symptom-free days between challenges — identifies individual FODMAP tolerances and
  expands long-term dietary variety.
evidence_tier: strong
rationale: The reintroduction protocol described (one FODMAP group at a time, standardized
  portions, symptom tracking) matches the validated Monash University three-phase
  FODMAP protocol.
coaching_translation: After the elimination phase, reintroduce FODMAPs one group at
  a time (fructose, lactose, fructans, GOS, polyols) to find your personal triggers
  and build back a varied, nutritious diet.
caveats:
- Only increase portions or add a new FODMAP after at least 3 symptom-free days
- Track both gut and systemic symptoms during reintroduction
