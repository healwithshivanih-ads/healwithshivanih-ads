slug: evening-primrose-oil-cyclic-breast-pain
statement: Evening primrose oil 3,000 mg/day for 3 to 6 months relieves cyclic AND
  non-cyclic breast pain in randomised trials — roughly half of cyclic-pain women
  and 27% of non-cyclic women improve. Borage and blackcurrant seed oil work via the
  same GLA mechanism. Higher RBC EPA/DHA is associated with lower FBD risk too, so
  fish oil 1 g EPA+DHA/day is a worthwhile parallel.
evidence_tier: plausible_emerging
