sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 51 — Fibrocystic Breast Disease, pg 930
  quote: When 291 women with cyclic and noncyclic breast pain were given 3,000 mg
    evening primrose oil for six months, almost half of the 92 women with cyclic breast
    pain experienced improvement.
