slug: dao-genetic-score-histamine-intolerance-pilot
statement: A pilot study developed a genetic "DAO Score" summing risk alleles
  across AOC1 gene positions. 17% of patients with histamine-intolerance symptoms
  carried a high genetic score (4-5) versus only 3% of healthy controls — the
  first genetic (not just enzyme-activity) evidence tying DAO gene variants to
  clinical histamine intolerance.
evidence_tier: plausible_emerging
rationale: Directly relevant when a client's histamine picture has already been
  clinically established (symptoms + reactive foods) but the coach wants to
  understand there IS a genetic layer, distinct from acquired/gut-driven DAO
  suppression.
coaching_translation: Some people are genuinely more genetically prone to
  histamine build-up, on top of anything going on in the gut — this doesn't
  change the coaching approach (low-histamine diet, gut support) but explains
  why it can feel disproportionate to what's on the plate.
out_of_scope_notes: Genetic scoring/testing interpretation stays clinical; coach
  role is dietary/lifestyle support regardless of genetic result.
caveats:
- Pilot-scale study (small sample) — treat as suggestive, not confirmatory. Needs
  replication in larger cohorts.
