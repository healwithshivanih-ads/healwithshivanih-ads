slug: menstrual-cycle-as-hormonal-health-indicator
statement: 'A woman''s menstrual cycle is a reliable indicator of overall hormonal health: when cycle
  length, flow quality, and emotional symptoms are irregular or distressing, they reflect underlying hormonal
  imbalance that diet and lifestyle changes can often correct.'
evidence_tier: strong
rationale: Consistent with established reproductive endocrinology — cycle characteristics (length, flow,
  associated symptoms) are regulated by the HPG axis and reflect estrogen/progesterone balance; lifestyle
  and diet are recognised modulators.
coaching_translation: Your period is like a monthly health report card. Painful, heavy, or very irregular
  cycles are your body signalling that something in your hormones, diet, or stress load needs attention
  — and that's where lifestyle work can make a real difference.
