sources:
- id: sandison-energy-blueprint-podcast-2026
  location: Podcast — MCI segment
  quote: When we say mild cognitive impairment there's nothing mild about this. It's
    not mild. It's highly impactful. People are losing their jobs. They're not able
    to take care of their financial health. They're not able to plan a trip. Your
    life is impacted. With these medications they're approved for that mild cognitive
    impairment stage — this isn't a last ditch effort when somebody has severe Alzheimer's.
rationale: Helps coach push back on the "let's wait and see" reflex from worried family
  members in early MCI cases.
