slug: mild-cognitive-impairment-is-not-mild
statement: The term "mild" cognitive impairment is clinically misleading — by the
  time MoCA testing drops into the formal MCI range, clients are typically losing
  jobs, struggling with financial decisions, and unable to plan complex activities
  like trips. Sandison reframes MCI as an URGENT window, not a watchful-waiting state.
  Monoclonal antibody drugs are approved at this stage, and lifestyle reversibility
  is highest at this stage too — clients should not wait for further progression before
  acting.
evidence_tier: plausible_emerging
