slug: leaky-gut-associated-with-hashimotos
statement: Leaky gut (intestinal hyperpermeability) is frequently associated with
  Hashimoto's and other autoimmune conditions; healing the gut is a core functional
  medicine strategy.
evidence_tier: plausible_emerging
rationale: Intestinal permeability and autoimmune disease association is supported
  by growing research (Fasano et al.). The 5R protocol is a widely used FM clinical
  framework. Direct RCT evidence linking gut repair to Hashimoto's antibody reduction
  is still emerging.
coaching_translation: A healthy gut lining helps prevent immune system over-activation.
  The 5R gut healing protocol (Remove irritants, Replace digestive support, Reinoculate
  with probiotics, Repair the lining, Rebalance lifestyle) is a core strategy for
  Hashimoto's.
