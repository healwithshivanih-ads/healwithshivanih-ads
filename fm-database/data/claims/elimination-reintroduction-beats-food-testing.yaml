slug: elimination-reintroduction-beats-food-testing
statement: The most useful approach to food intolerance is structured elimination
  to symptom improvement followed by gradual reintroduction — not food-allergy testing,
  which is costly and misses FODMAP, blood-sugar and leaky-gut reactions.
evidence_tier: plausible_emerging
rationale: Ruscio's clinical stance backed by the limits of IgG/allergy testing.
coaching_translation: The best 'food test' is removing suspects until you feel better,
  then adding them back one at a time.
