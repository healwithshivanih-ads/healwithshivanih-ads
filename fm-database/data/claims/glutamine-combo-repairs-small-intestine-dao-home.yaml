slug: glutamine-combo-repairs-small-intestine-dao-home
statement: Because DAO is produced in the small-intestinal lining, repairing that
  lining — L-glutamine, more effective combined with aloe vera, zinc carnosine and
  marshmallow root — can improve histamine clearance; L-glutamine can increase irritability
  in some, buffered by magnesium, B6 and niacin.
evidence_tier: plausible_emerging
rationale: Gut-lining repair improving DAO capacity is mechanistically coherent; the
  specific combination and the irritability workaround are clinical-experience level.
coaching_translation: Healing the gut lining is part of settling food/histamine reactions
  — glutamine works better with soothing agents like aloe, zinc carnosine and marshmallow
  root.
out_of_scope_notes: ''
caveats:
- Source is a consumer trade book (Ben Lynch, Dirty Genes), not primary literature.
