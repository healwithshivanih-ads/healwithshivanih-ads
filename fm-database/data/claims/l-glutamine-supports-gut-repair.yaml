slug: l-glutamine-supports-gut-repair
statement: L-glutamine, zinc carnosine, and probiotics support gut repair by healing
  the intestinal mucosa in leaky gut.
evidence_tier: plausible_emerging
rationale: L-glutamine as enterocyte fuel and gut mucosal support has clinical backing.
  Zinc carnosine's mucosal-protective properties are reasonably supported. Combination
  with probiotics for gut repair is a common FM approach with plausible but not robust
  RCT evidence.
coaching_translation: The gut-healing trio — L-glutamine, zinc carnosine, and probiotics
  — is widely used to repair the gut lining and reduce leaky gut symptoms.
caveats:
- Source is educational synthesis.
- Verify dosing with clinician, especially zinc carnosine in context of overall zinc
  status.
