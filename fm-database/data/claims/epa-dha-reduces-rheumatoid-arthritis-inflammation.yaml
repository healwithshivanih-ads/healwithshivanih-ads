slug: epa-dha-reduces-rheumatoid-arthritis-inflammation
statement: EPA and DHA supplementation produces higher rates of remission and measurable
  inhibition of TNF-alpha and IL-1-beta in rheumatoid arthritis.
evidence_tier: plausible_emerging
rationale: Cited in the lecture as study evidence for rheumatoid arthritis. Consistent
  with published meta-analyses on omega-3 in RA showing reduced disease activity and
  inflammatory markers. Source is an FM lecture (expert consensus, moderate quality).
coaching_translation: Omega-3 fats have anti-inflammatory effects that may help ease
  joint pain and inflammation in conditions like rheumatoid arthritis.
out_of_scope_notes: RA is an autoimmune condition requiring medical management; omega-3
  is adjunctive, not a standalone treatment.
caveats:
- Source is an FM lecture synthesis, not a specific primary paper citation.
- RA management must remain under clinician supervision.
