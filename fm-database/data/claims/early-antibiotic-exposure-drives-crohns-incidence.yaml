slug: early-antibiotic-exposure-drives-crohns-incidence
statement: Early and heavy antibiotic exposure has paralleled the post-1950s rise
  of Crohn's disease in developed countries — antibiotics may drive normal intestinal
  flora to produce immunostimulatory toxins or to become invasive after sublethal
  doses, perpetuating chronic inflammation.
evidence_tier: plausible_emerging
rationale: Pizzorno cites the post-1950s CD incidence spike alongside global antibiotic
  uptake. Mechanism — antibiotic-mediated dysbiosis shifts flora toward more virulent,
  toxin-producing strains; loss of butyrate-producing bacteria reduces colonic mucosal
  defence.
coaching_translation: Crohn's was rare before antibiotics. Heavy or repeated antibiotic
  exposure — especially in childhood — appears to be one of the strongest modifiable
  drivers. Probiotics and food-as-medicine become non-negotiable for IBD.
caveats:
- Causation hard to prove from epidemiology alone.
- NSAIDs and isotretinoin also implicated.
- Probiotic restoration (especially Bifidobacteria, Lactobacillus) is core IBD treatment.
