slug: visceral-fat-secretes-inflammatory-adipokines-impairing-insulin-signalling
statement: Visceral fat secretes pro-inflammatory adipokines that impair insulin signalling,
  with central adiposity (waist >35in men / >31in women) as a key clinical marker.
evidence_tier: strong
rationale: Well-established in adipose biology literature; visceral fat is metabolically
  active, secreting TNF-α, IL-6, and resistin which interfere with insulin receptor
  phosphorylation.
coaching_translation: Fat stored around your waist is not just sitting there — it
  actively sends out inflammatory signals that make your body less responsive to insulin.
