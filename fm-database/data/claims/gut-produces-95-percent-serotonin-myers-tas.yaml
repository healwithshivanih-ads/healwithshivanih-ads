slug: gut-produces-95-percent-serotonin-myers-tas
statement: Roughly 95% of the body's serotonin is produced in the gut, so gut dysbiosis
  and yeast overgrowth can impair neurotransmitter production and worsen mood, anxiety,
  and brain fog.
evidence_tier: plausible_emerging
rationale: Enterochromaffin cells and gut microbes influence serotonin synthesis;
  Myers uses the gut-brain link to connect gut infections to depression, anxiety,
  and cognitive symptoms.
coaching_translation: Most of your serotonin is made in the gut, so gut trouble can
  show up as low mood or foggy thinking.
