slug: cortisol-suppresses-t4-to-t3-conversion
statement: Cortisol and chronic stress suppress T4→T3 conversion by inhibiting deiodinase
  enzymes and increasing Reverse T3.
evidence_tier: strong
rationale: Cortisol inhibits Type 1 and Type 2 deiodinase enzymes (which convert T4
  to active T3), suppresses TSH secretion, and increases reverse T3 (inactive). This
  stress physiology → 'euthyroid sick syndrome' pattern is documented textbook endocrinology.
coaching_translation: Chronic stress changes how your body converts thyroid hormone
  — which is why stress work isn't optional for thyroid health.
caveats:
- Euthyroid sick syndrome is a clinical finding; coaches should not diagnose it, but
  can educate on the mechanism.
