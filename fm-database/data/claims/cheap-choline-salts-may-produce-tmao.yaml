slug: cheap-choline-salts-may-produce-tmao
statement: Cheap choline salts such as bitartrate are more likely to produce TMAO in the gut.
evidence_tier: fm_specific_thin
rationale: TMAO production from choline via gut microbiota is an emerging area; the preference for alpha-GPC or phosphatidylcholine
  over bitartrate is biologically plausible but not yet consensus.
coaching_translation: If recommending choline supplements, note that alpha-GPC or phosphatidylcholine forms may be preferable
  to cheap choline bitartrate.
caveats:
- Source is a practitioner cheatsheet without primary citations.
- TMAO research is evolving and context-dependent.
