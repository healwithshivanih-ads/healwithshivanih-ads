slug: chronic-stress-suppresses-immunity-depletes-sex-hormones
statement: Continuous cortisol release from chronic stress suppresses immunity, slows
  healing, and depletes progesterone and DHEA.
evidence_tier: plausible_emerging
rationale: Well-established HPA axis physiology; cortisol's immunosuppressive effects
  and inhibition of sex hormone synthesis (especially progesterone via pregnenolone
  steal) are mechanistically sound and supported by clinical observation, though the
  synthesis-level framing here lacks direct RCT citations.
coaching_translation: When you're chronically stressed, your body sacrifices your
  immune defenses and hormonal balance to keep funding the stress response. Supporting
  cortisol regulation through sleep, breathwork, and adaptogens can help restore this
  balance.
caveats:
- Source is an educational synthesis document without primary citations; treat as
  plausible FM framework.
- Specific hormonal effects require clinician-level lab interpretation.
