slug: probiotics-reduce-anxiety-depression
statement: Fermented foods and probiotic supplements can reduce symptoms of anxiety
  and depression by enhancing gut health, with Lactobacillus and Bifidobacterium strains
  being particularly effective at modulating mood and stress.
evidence_tier: plausible_emerging
rationale: Growing body of RCTs and systematic reviews support psychobiotic effects
  of certain probiotic strains (notably L. rhamnosus, L. helveticus, B. longum) on
  anxiety and depression biomarkers. Not yet clinical consensus.
coaching_translation: Adding fermented foods like kefir, yogurt, and kimchi to your
  diet may help support mood stability through the gut-brain connection.
caveats:
- Effect sizes are modest. Not a replacement for mental health treatment.
- Strain specificity matters — not all probiotics have equivalent mental health effects.
