slug: iron-required-for-thyroid-hormone-production
statement: Iron is required for proper thyroid hormone production and is especially
  important for menstruating women.
evidence_tier: strong
rationale: Iron is a cofactor for thyroid peroxidase (TPO), the enzyme that incorporates
  iodine into thyroglobulin during thyroid hormone synthesis. Iron deficiency anemia
  impairs thyroid function — this is well-established.
coaching_translation: Iron helps your thyroid make hormones. Menstruating women are
  at higher risk of low iron, which can worsen thyroid function.
caveats:
- Check ferritin and CBC before supplementing iron. Iron can interfere with levothyroxine
  — take 4 hours apart.
- This dose is specifically for menstruating women per the document.
