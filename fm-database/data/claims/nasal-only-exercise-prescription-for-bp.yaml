slug: nasal-only-exercise-prescription-for-bp
statement: A simple high-yield exercise prescription for hypertensive clients — exercise
  only at the intensity at which you can sustain nasal-only breathing. If you have
  to mouth-breathe, slow down. The lowered pace plus increased nitric oxide from nasal
  airflow produces observable drops in pulse rate within a session and contributes
  to longer-term BP reduction. For severe hypertension, avoid heavy resistance work
  (deadlifts and similar) until BP is controlled to reduce burst-pressure risk.
evidence_tier: plausible_emerging
