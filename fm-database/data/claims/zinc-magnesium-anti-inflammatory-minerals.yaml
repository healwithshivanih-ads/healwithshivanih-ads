slug: zinc-magnesium-anti-inflammatory-minerals
statement: Zinc and magnesium are primary anti-inflammatory minerals that should be
  included in the diet and as supplements for patients with chronic inflammation.
evidence_tier: plausible_emerging
rationale: Zinc's role in immune regulation and anti-inflammatory signaling is supported
  by multiple studies. Magnesium deficiency is associated with elevated inflammatory
  markers (CRP, IL-6). Both are frequently deficient in Western diets.
coaching_translation: Most people don't get enough zinc and magnesium. These minerals
  are key building blocks for a calm, well-regulated immune system.
caveats:
- Source is expert FM lecture (moderate quality). Specific therapeutic dosing should
  involve clinician input, especially in patients with kidney disease.
