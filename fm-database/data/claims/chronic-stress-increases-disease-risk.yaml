slug: chronic-stress-increases-disease-risk
statement: People who report higher levels of chronic stress are more likely to develop
  heart disease, depression, diabetes, dementia, and cancer.
evidence_tier: strong
rationale: Supported by multiple peer-reviewed studies cited in the document (Yaribeygi
  et al. 2017 EXCLI J; Wirtz & von Känel 2017 Curr Cardiol Rep; Vyas et al. 2016 Neural
  Plast; Mravec et al. 2018 Cell Mol Neurobiol) and consistent with established epidemiological
  evidence.
coaching_translation: Unchecked chronic stress isn't just 'feeling stressed' — over
  time it raises your risk for serious conditions like heart disease, diabetes, and
  even dementia. Managing your daily stress load is a powerful health investment.
