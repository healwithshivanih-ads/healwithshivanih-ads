slug: ayurveda-beverages-warm-not-iced
statement: Across all constitutions the chart advises against iced, cold, carbonated and caffeinated drinks;
  warm or room-temperature drinks are preferred (especially for vata), pitta avoids sour juices and alcohol,
  and kapha avoids cold dairy drinks and iced drinks.
