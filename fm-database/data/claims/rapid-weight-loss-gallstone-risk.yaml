slug: rapid-weight-loss-gallstone-risk
statement: Rapid weight loss and very-low-calorie diets paradoxically TRIGGER gallstones
  in 11 to 13% of obese patients during or shortly after the diet. Cholesterol output
  stays high while bile acid output drops, supersaturating bile. At least 10 g dietary
  fat per day is needed to ensure normal gallbladder emptying. Coach guidance — avoid
  <800 kcal/day diets, ensure some fat in every meal, monitor known-stone clients
  during planned weight loss.
evidence_tier: strong
