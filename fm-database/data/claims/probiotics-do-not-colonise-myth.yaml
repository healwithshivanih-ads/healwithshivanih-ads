slug: probiotics-do-not-colonise-myth
statement: Current-generation Lactobacillus, Bifidobacterium, Saccharomyces, Bacillus
  and E. coli probiotic strains do NOT permanently colonise the human gut — they are
  temporary visitors lasting approximately 5-14 days after the last dose. The "5R"
  functional-medicine pillar of "reinoculate" is misleading if it implies you can
  replenish a wiped-out resident species with a supplement. Resident microbiome composition
  is largely fingerprint-like, family-line-inherited, and acquired in early life.
  Coach script — "we use probiotics as a treatment course for a specific effect, not
  as a permanent install. Your resident ecosystem is yours and is protected by what
  you eat and how you live, not by a daily capsule."
evidence_tier: plausible_emerging
linked_to_topics:
- microbiome
- gut-microbiome
sources:
- id: hawrelak-energy-blueprint-podcast-2026
  location: Podcast — colonisation myth segment
  quote: Generally we don't get colonisation from current generation probiotics. They
    don't permanently colonise — they're all temporary visitors. A good probiotic
    strain will last a week or 10 days versus ones that pass straight through. People
    think they can just take antibiotics and then pop a pill and everything will be
    replenished from that and forever onwards — it's rubbish.
rationale: Stops coach (and client) from spending on indefinite daily probiotics when
  the goal is short-term effect.
