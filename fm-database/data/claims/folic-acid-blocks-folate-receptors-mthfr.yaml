slug: folic-acid-blocks-folate-receptors-mthfr
statement: Synthetic folic acid, found in fortified foods and most standard multivitamins,
  may competitively block folate receptors and interfere with natural methylfolate
  uptake, particularly in individuals with MTHFR variants.
evidence_tier: plausible_emerging
rationale: 'Mechanistically credible: unmetabolised folic acid (UMFA) has been documented
  in individuals consuming fortified foods. Some evidence suggests UMFA may occupy
  folate receptors with lower functional activity than methylfolate. Full clinical
  impact in MTHFR carriers remains an active research question. Source is a consumer
  book.'
coaching_translation: For MTHFR-variant individuals, switching from folic-acid-fortified
  foods and supplements to natural food-form folate (leafy greens) or methylfolate
  is a reasonable dietary strategy.
caveats:
- Evidence for clinically significant receptor blockade by UMFA is emerging, not consensus
- Important to discuss folate form with clinician, particularly during pregnancy
