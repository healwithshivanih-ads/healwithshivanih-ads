slug: fresh-cheeses-neutral-ph
statement: Fresh cheeses (such as Indian paneer/fresh cheese) sit at approximately
  pH 7, making them effectively neutral rather than acid-forming.
evidence_tier: plausible_emerging
rationale: Fresh, unaged cheeses (e.g., paneer, ricotta, cottage cheese) generally
  have pH values close to neutral compared with aged cheeses which are more acidic.
  This is consistent with known food chemistry, though PRAL classification of dairy
  varies.
coaching_translation: If you enjoy Indian-style fresh cheese in your cooking, it sits
  closer to neutral on the pH scale compared with most other dairy or aged cheeses.
caveats:
- Source is an expert lecture.
- PRAL values for dairy depend on protein and mineral content, not just pH — fresh
  cheeses still carry a moderate protein-derived acid load metabolically.
