slug: painful-periods-not-normal-screen-for-endometriosis
statement: Severe menstrual pain requiring repeated NSAIDs, pain with sex, ovulation,
  or bowel movements are common but not normal and are leading symptoms of endometriosis.
  Endometriosis is frequently first diagnosed during a fertility workup after months
  of unexplained infertility. Preconception coaching should surface and act on these
  red flags rather than normalise them.
evidence_tier: strong
