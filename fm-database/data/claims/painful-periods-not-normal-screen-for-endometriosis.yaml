  location: minute 41 — endometriosis red flags
  quote: There are some women who have extremely painful periods, who have also pain
    outside of their period window, who have pain with sex or pain with ovulation
    or pain with bowel movements, and those can be huge flags for endometriosis.
rationale: Critical screening signal often missed in fertility coaching that focuses
  only on eggs and supplements.
