slug: murray-milk-thistle-silymarin-psoriasis
statement: Milk thistle (Silybum marianum) standardised extract — 140–210 mg silymarin
  three times daily (or silymarin phytosome 120 mg two to three times daily between
  meals) — supports psoriasis treatment by improving hepatic detoxification of the
  bowel-derived endotoxins that drive psoriatic skin inflammation, inhibiting NF-κB-driven
  inflammation directly, and reducing excessive cellular proliferation. Particularly
  relevant given Murray's gut-liver-skin axis model where impaired liver function
  is a key link in the psoriatic chain.
evidence_tier: plausible_emerging
rationale: Multiple clinical and preclinical studies; long traditional use. Mechanism
  — silymarin upregulates glutathione production, scavenges free radicals, stabilises
  hepatocyte membranes, antagonises leukotriene synthesis. Phytosome formulation (siliphos)
  achieves 7-10× plasma silymarin levels of plain extract. Particularly important
  in psoriasis patients with concurrent alcohol use, NAFLD, or polypharmacy load on
  liver.
coaching_translation: Milk thistle (silymarin) at 140-210 mg three times daily is
  a foundational supplement when liver detoxification capacity is a limiting factor
  in psoriasis. Phytosome form (120 mg two to three times daily) is more bioavailable.
  Particularly important for psoriasis patients who drink alcohol, have NAFLD, or
  take multiple medications. Pairs with bile acid for complete gut-liver detox support.
  Effect builds over 3-6 months.
caveats:
- Generally well-tolerated; rare mild laxative effect
- Phytosome (siliphos) form much better absorbed than plain extract
- May interact with some drugs metabolised by CYP3A4 (mild)
- Pregnancy safety not well established at supplement doses
- May reduce blood sugar slightly — monitor in diabetes
- Allergic cross-reaction with daisy/ragweed family
