  location: Chapter 102 — Varicose Veins, pg 1562-1564
  quote: Individuals with varicose veins have a decreased ability to break down fibrin.
    Capsicum, garlic, onion, and ginger all promote fibrin breakdown. Bromelain acts
    in a manner similar to plasminogen activator to cause fibrin breakdown. Nattokinase
    is a protein-digesting enzyme that has potent fibrinolytic and thrombolytic activity.
