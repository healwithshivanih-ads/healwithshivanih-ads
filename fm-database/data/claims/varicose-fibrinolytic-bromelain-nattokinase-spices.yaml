slug: varicose-fibrinolytic-bromelain-nattokinase-spices
statement: People with varicose veins have decreased fibrinolytic activity, which
  drives the hard lumpy skin around the veins (lipodermatosclerosis) and raises risk
  of thrombophlebitis, MI, pulmonary embolism, and stroke. Bromelain and nattokinase
  mimic plasminogen activator and break down fibrin. Dietary cayenne, garlic, onion,
  and ginger all promote fibrin breakdown — liberal use is indicated. Add fibre (psyllium,
  pectin, guar gum) to avoid straining at stool, which raises abdominal pressure and
  worsens venous backflow.
