slug: metformin-depletes-b12-folate-coq10
statement: Metformin depletes CoQ10, folic acid, and vitamin B12.
evidence_tier: strong
rationale: Metformin-induced vitamin B12 depletion is well-established and recognized
  in clinical guidelines. Folate depletion is supported by multiple studies. CoQ10
  depletion is plausible but less robustly documented.
coaching_translation: Clients on metformin should have B12 levels monitored and may
  benefit from supplementation — encourage them to raise this with their doctor.
out_of_scope_notes: Lab monitoring and supplement dosing in metformin users are clinician
  scope.
caveats:
- B12 depletion by metformin is strong evidence; CoQ10 and folate are plausible_emerging.
- B12 depletion is most strongly evidenced; CoQ10 depletion evidence is weaker for
  metformin specifically.
