slug: metformin-depletes-b12-folate-coq10
statement: Metformin use is associated with depletion of CoQ10, folic acid, and vitamin
  B12.
evidence_tier: strong
rationale: Metformin-induced B12 depletion is well-established in the literature.
  CoQ10 and folate depletion have plausible mechanisms and emerging evidence.
coaching_translation: Clients on metformin should have their B12 and folate levels
  monitored by their clinician.
out_of_scope_notes: Lab monitoring and supplementation decisions require clinician
  guidance.
caveats:
- B12 depletion by metformin is strong evidence; CoQ10 and folate are plausible_emerging.
