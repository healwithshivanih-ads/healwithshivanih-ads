slug: high-cortisol-inhibits-t4-to-t3-conversion
statement: Elevated cortisol from chronic stress inhibits 5'-deiodinase, blocking
  T4-to-T3 conversion and shunting T4 toward inactive reverse T3.
evidence_tier: plausible_emerging
rationale: Glucocorticoids are known to suppress type-1 deiodinase activity; this
  is a well-described mechanism in stress physiology and is documented in the source.
  Treated as plausible_emerging because the document is a synthesis without specific
  trial citation.
coaching_translation: Chronic stress actively blocks your thyroid from working properly
  — managing stress is a direct thyroid support strategy, not just a wellness nicety.
caveats:
- Source is synthesis; mechanism is well-described but primary citation not provided
