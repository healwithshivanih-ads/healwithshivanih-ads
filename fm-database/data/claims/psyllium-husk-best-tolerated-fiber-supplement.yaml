slug: psyllium-husk-best-tolerated-fiber-supplement
statement: Among fiber supplements (psyllium husk, PHGG, inulin), psyllium husk is
  generally the best-tolerated option, especially for sensitive guts, due to its simplicity
  and low fermentation rate.
evidence_tier: fm_specific_thin
rationale: Speaker recommends psyllium husk as the simplest and best-tolerated option
  versus PHGG and inulin, based on clinical experience. Bio-individual variability
  acknowledged. No RCT head-to-head comparison cited.
coaching_translation: When clients ask about fiber supplements, psyllium husk (ideally
  organic) is usually the safest starting point. Some people tolerate PHGG or inulin
  well too — it's bio-individual.
caveats:
- Recommendation based on speaker's clinical experience, not a comparative RCT. Always
  start with a low dose and increase gradually. Advise clients to take with plenty
  of water.
