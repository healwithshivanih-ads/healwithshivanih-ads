slug: spring-foods-favour-reduce-kapha-diet
statement: Spring foods to favour include pungent spices (ginger, black pepper, turmeric), dry grains
  (barley, rye, millet, buckwheat), astringent fruits (apples, pears, berries), lean proteins (lentils,
  beans), and bitter vegetables (arugula, broccoli, dandelion, asparagus); foods to reduce include dairy,
  sweet heavy fruits, wheat, and roasted nuts.
evidence_tier: fm_specific_thin
rationale: These choices counterbalance kapha's heavy, cold, oily qualities with opposing light, dry,
  and heating properties, supporting the body's transition out of winter accumulation.
coaching_translation: Spring is the ideal time to introduce a lighter, more plant-forward diet. Swap heavy
  winter staples for bitter greens, light grains like millet or barley, and plenty of warming spices.
out_of_scope_notes: ''
caveats:
- Dosha-balancing framework is traditional; individual tolerance varies.
