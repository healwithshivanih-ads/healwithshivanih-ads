slug: acid-reflux-is-sphincter-weakness-not-excess-acid
statement: Acid reflux (heartburn) is caused by a weakened cardiac sphincter, not
  by excess stomach acid. The underlying driver is habitual large evening meals combined
  with recumbency, which mechanically weakens the valve over time.
evidence_tier: plausible_emerging
rationale: Lower oesophageal sphincter (LOS) dysfunction is well-recognised as a primary
  mechanism of GERD. The claim that excess acid is rarely the true cause is a credible
  and increasingly supported perspective in functional medicine, though mainstream
  gastroenterology still uses acid suppression as first-line therapy.
coaching_translation: If you experience heartburn, consider shifting your largest
  meal to midday, keeping your evening meal light, and avoiding lying down for at
  least 2–3 hours after eating.
out_of_scope_notes: PPI medication review, oesophageal ulceration assessment, and
  Barrett's oesophagus screening are clinician scope.
caveats:
- This claim challenges mainstream first-line treatment (PPIs). Clients on medication
  should not discontinue without clinician guidance.
- Source is a practitioner talk (expert_consensus, moderate quality).
