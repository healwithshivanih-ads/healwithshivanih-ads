  location: minute 39 — luteal phase as progesterone indicator
  quote: The luteal phase is simply that period of time between ovulation and your
    next period. It should be ideally 12 to 14 days. The progesterone issues become
    pretty apparent when you start tracking.
rationale: Practical menstrual-cycle red-flag for the preconception coach.
