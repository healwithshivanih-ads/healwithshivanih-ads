slug: luteal-phase-length-reflects-progesterone-adequacy
statement: Healthy luteal phase length is 12-14 days between ovulation and next menses.
  Repeated luteal phases under 10 days suggest inadequate progesterone production,
  which reduces implantation chances and increases early miscarriage risk. Cycle tracking
  surfaces this pattern long before standard fertility workups would.
