slug: ashwagandha-improves-tsh-t3-t4-in-hypothyroidism
statement: Eight weeks of ashwagandha (600 mg/day root extract) significantly improved
  serum TSH, T3, and T4 levels compared to placebo in subjects with elevated TSH.
evidence_tier: plausible_emerging
rationale: A 2018 prospective, randomized, double-blind, placebo-controlled study
  of 50 subjects is referenced. T3 increased 18.6% at 4 weeks and 41.5% at 8 weeks;
  T4 increased 9.3% at 4 weeks and 19.6% at 8 weeks. Single trial; needs independent
  replication.
coaching_translation: Ashwagandha has been studied in a clinical trial and may help
  normalize thyroid hormone levels in people with subclinical hypothyroidism.
caveats:
- Single trial cited; source does not provide full journal citation.
- Dosing should be confirmed with clinician, especially in Hashimoto's (autoimmune
  caution with adaptogens).
- Source is educational toolkit — treat as plausible_emerging.
