slug: epigenetics-lifestyle-modifies-gene-expression
statement: Diet, sleep, stress, and environmental toxin exposure can modify gene expression
  through epigenetic mechanisms, meaning genetic susceptibility to disease is not
  a fixed destiny.
evidence_tier: strong
rationale: Epigenetic modification of gene expression by environmental inputs is a
  well-established biological mechanism supported by substantial peer-reviewed evidence
  including the classic agouti mouse studies referenced in this book.
coaching_translation: Your genes are not your destiny. Every food choice, sleep habit,
  and stress management practice is literally changing how your genes behave right
  now.
caveats:
- Source is a consumer trade book, not a primary literature review. Specific SNP-to-disease
  claims should be interpreted cautiously.
