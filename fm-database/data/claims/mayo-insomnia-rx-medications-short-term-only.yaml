slug: mayo-insomnia-rx-medications-short-term-only
statement: Prescription sleep aids — Z-drugs (zolpidem, eszopiclone, zaleplon), benzodiazepines,
  doxepin, ramelteon, suvorexant — are recommended for short-term use only, typically
  less than four weeks, because of tolerance, dependence, daytime sedation, and complex
  sleep behaviours (sleep-driving, sleep-eating).
