slug: chlamydia-male-infertility
statement: Chronic chlamydia infection of the male genitourinary tract (urethra, prostate,
  seminal vesicles, epididymis) is the most common and serious infection causing male
  infertility — 28 to 71% of infertile men show evidence of chlamydial infection,
  often asymptomatic. Chlamydia produces antisperm antibodies and reproductive tract
  scarring paralleling tubal damage in women. Both partners must be tested and treated.
  Antibiotics (tetracyclines, erythromycin) are required but eradication can be incomplete
  since chlamydia is intracellular.
