slug: sulforaphane-supports-phase-2-activity
statement: |
  Sulforaphane-containing cruciferous vegetables may support Phase 2
  detoxification enzyme activity and antioxidant defense pathways.
evidence_tier: plausible_emerging
rationale: |
  The transcript identifies sulforaphane as a phytochemical capable
  of inducing Phase 2 detoxification pathways while antioxidants help
  neutralize reactive intermediates generated during detoxification.
coaching_translation: |
  Regular intake of cruciferous vegetables such as broccoli,
  broccoli sprouts, cabbage, cauliflower, and kale may support the
  body's natural detoxification systems.
caveats:
  - Food tolerance varies in people with digestive conditions.
  - Excessive supplementation may not be appropriate for all individuals.
