slug: mulberry-superior-to-glyburide-fasting-glucose
statement: Mulberry extract (3 g/day) lowers fasting glucose by 27% in T2DM — performing
  better than glyburide (5 mg/day) — via alpha-glucosidase inhibition and antioxidant
  activity.
evidence_tier: plausible_emerging
rationale: Small RCT (Andallu & Varadacharyulu 2003); comparison to glyburide is from
  a single study. Mechanism is well-characterised (alpha-glucosidase inhibition).
coaching_translation: Mulberry leaf extract is a natural alpha-glucosidase inhibitor
  that blunts after-meal sugar spikes — and may outperform a common diabetes drug
  in some measures.
caveats:
- Single small trial for glyburide comparison; larger RCTs needed.
- Blood glucose monitoring required when used with insulin or sulfonylureas.
