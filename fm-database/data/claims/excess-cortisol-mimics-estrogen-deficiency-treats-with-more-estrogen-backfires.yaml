slug: excess-cortisol-mimics-estrogen-deficiency-treats-with-more-estrogen-backfires
statement: Excess cortisol can cause hot flashes and hormonal-deficiency symptoms even when estrogen levels
  are normal, because chronic cortisol elevation creates hormonal resistance — treating these symptoms
  with estrogen may then produce estrogen-dominant symptoms (weight gain, water retention, mood swings).
evidence_tier: plausible_emerging
rationale: Cortisol-driven hormonal resistance is a plausible FM framework; the clinical observation that
  stress symptoms mimic oestrogen deficiency (and that adding oestrogen worsens the picture) is coherent
  with receptor-sensitivity literature.
coaching_translation: Hot flushes and other 'menopause' symptoms can be caused by high stress hormones
  — not just low oestrogen. If that's the root cause, adding oestrogen on top of high cortisol can make
  things worse (weight gain, bloating, mood swings) rather than better.
out_of_scope_notes: 'NBHWC scope: whether to adjust hormone therapy is a physician decision. Coach supports
  stress-management lifestyle work that addresses the upstream cause.'
caveats:
- Hormone resistance as a distinct mechanism driving hot flashes in stressed premenopausal/perimenopausal
  women is clinically described but lacks large prospective studies; this is primarily a teaching model.
