  quote: A woman with excess cortisol but normal amounts of estrogen may get hot flashes or other symptoms
    typically associated with estrogen deficiency. If this woman were to treat these symptoms with estrogen
    replacement therapy, she would possibly then develop estrogen-dominant symptoms such as weight gain,
    water retention, and mood swings.
