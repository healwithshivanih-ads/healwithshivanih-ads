slug: vitamin-c-reduces-sorbitol-accumulation
statement: Vitamin C (100–2000 mg/day) reduces intracellular sorbitol accumulation
  in red blood cells of diabetics, independent of glycaemic control, by inhibiting
  aldose reductase.
evidence_tier: plausible_emerging
rationale: Small RCTs (Cunningham 1994) support aldose reductase inhibition by ascorbate;
  Pizzorno also notes inhibition of protein glycosylation.
coaching_translation: Vitamin C does more than fight infections in diabetics — it
  directly blocks the sorbitol pathway that damages nerves, eyes, and kidneys.
