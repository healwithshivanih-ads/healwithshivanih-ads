slug: mayo-chronic-sinusitis-antibiotics-only-when-bacterial
statement: Antibiotics are reserved for confirmed acute bacterial flares (severe symptoms,
  facial pain or fever 10+ days, or worsening after initial improvement) — most chronic
  sinusitis is inflammatory rather than infectious, and routine antibiotics are not
  indicated.
