slug: oxidized-ldl-activates-inflammasome-nf-kappab
statement: Oxidized LDL activates the NLRP3 inflammasome and NF-κB, initiating a cascade of pro-inflammatory cytokines that
  drives cardiovascular disease as an inflammatory process.
evidence_tier: strong
rationale: The NF-κB and inflammasome pathways in atherosclerosis are well-established in peer-reviewed literature. The clinician
  presents this as foundational mechanistic understanding.
coaching_translation: When LDL cholesterol gets damaged by oxidative stress, it triggers inflammation in the arteries — like
  a fire alarm that won't turn off. This is why reducing inflammation and oxidative stress matters just as much as lowering
  cholesterol.
