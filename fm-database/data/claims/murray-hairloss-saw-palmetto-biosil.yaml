sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 56 — Hair Loss in Women, pg 997-1000
  quote: The potent androgen dihydrotestosterone (DHT) is formed from testosterone
    by the action of the enzyme 5-alpha-reductase. The activity of this enzyme is
    increased in both male- and female-pattern hair loss. Saw palmetto extract can
    inhibit the formation and transport of DHT. The dosage for saw palmetto extract
    standardized to contain 85 to 95 percent fatty acids and sterols is 320 mg per
    day. In one double-blind study, 48 women with fine hair were given 10 mg silicon
    as ch-OSA per day for nine months. Oral intake of Ch-OSA had a positive effect
    on tensile strength, including elasticity and break load, and resulted in thicker
    hair.
