slug: murray-hairloss-saw-palmetto-biosil
statement: For female-pattern hair loss with DHT involvement, saw palmetto extract
  (standardized to 85 to 95 percent fatty acids and sterols) at 320 mg per day inhibits
  5-alpha-reductase via the same mechanism as finasteride. For thinning hair of any
  cause, choline-stabilized orthosilicic acid (ch-OSA, sold as BioSil) at 10 mg silicon
  per day for nine months improved hair tensile strength, elasticity, and thickness
  in a controlled trial of 48 women. Both can layer on top of nutrient repletion and
  gluten elimination.
