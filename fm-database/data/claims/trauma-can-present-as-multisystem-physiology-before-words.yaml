slug: trauma-can-present-as-multisystem-physiology-before-words
statement: Unresolved trauma can express as a multisystem physiological pattern — chronic hypervigilance,
  gut symptoms, muscle tension, disrupted sleep, hormonal and immune changes — sometimes before
  a client consciously connects it to their history.
evidence_tier: plausible_emerging
rationale: Threat physiology durably shapes autonomic tone, HPA-axis function and immune regulation,
  so trauma can surface as a cluster of symptoms across body systems that resists conventional
  single-system explanation. Recognising the pattern (without probing for trauma details) helps
  direct care and appropriate referral.
coaching_translation: The body can carry stress from past experiences as a mix of symptoms —
  feeling on-edge, gut trouble, tension, poor sleep — even before someone links it to what happened.
  Notice the pattern with compassion; trauma work belongs with a trained professional.
caveats:
- Source is Instagram educational content.
- Do not probe for trauma details; collaborate with trained mental-health professionals.
