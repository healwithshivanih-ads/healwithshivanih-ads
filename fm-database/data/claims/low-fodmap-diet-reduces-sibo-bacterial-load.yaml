slug: low-fodmap-diet-reduces-sibo-bacterial-load
statement: A low-FODMAP diet reduces the fermentable carbohydrate substrate available
  to overgrown bacteria in the small intestine, thereby decreasing gas production,
  bloating, and dysbiosis in SIBO.
evidence_tier: plausible_emerging
rationale: Low-FODMAP diet has strong evidence for IBS symptom reduction and is mechanistically
  sound for reducing bacterial fermentation substrate in SIBO. Direct SIBO eradication
  evidence is emerging.
coaching_translation: Eating low-FODMAP foods 'starves' the overgrown bacteria by
  removing the fermentable sugars they thrive on, which helps reduce bloating, gas,
  and pain.
caveats:
- Long-term low-FODMAP can reduce beneficial bacteria; reintroduction phase is important.
- Should be used as a therapeutic tool with planned reintroduction, not a permanent
  diet.
