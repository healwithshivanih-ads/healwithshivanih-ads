slug: valerian-improves-sleep-quality-without-morning-grogginess
statement: Valeriana officinalis root reduces sleep latency comparable to small doses
  of benzodiazepines or barbiturates, but unlike those drugs typically reduces (rather
  than increases) morning sleepiness.
evidence_tier: plausible_emerging
rationale: Pizzorno cites the most clinical research among the sedative botanicals.
  Mechanism plausibly via valerenic acid modulation of GABA-A receptors. Effect builds
  over 2-4 weeks of consistent use.
coaching_translation: Valerian is one of the most-studied sleep herbs. Unlike sleeping
  pills, it doesn't leave you groggy in the morning. Best taken consistently for 2-4
  weeks for full effect — not just one bad night.
caveats:
- Standardised to 0.8% valerenic acid; 150-300 mg dried extract or 4-6 mL tincture
  before bed.
- Strong smell — capsules preferred for many.
- Avoid with sedatives, alcohol, in pregnancy.
