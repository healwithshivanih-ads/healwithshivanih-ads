slug: hippocampus-revolumizes-with-sex-hormone-therapy
statement: Administering estrogen to aging women and testosterone to aging men can
  re-volumize a shrinking hippocampus within weeks to four months, improving posture,
  speech speed, memory, and cognitive function.
evidence_tier: plausible_emerging
rationale: Studies from McGill University and others using neuroimaging to show hippocampal
  volume changes with sex hormone replacement are referenced. This is consistent with
  published functional MRI research on sex steroids and brain structure, though not
  yet mainstream clinical practice.
coaching_translation: Your brain's memory center actually shrinks about 1% per year
  as hormones decline. Research shows that estrogen (in women) or testosterone (in
  men) can reverse that shrinkage within a few months — improving memory, mood, and
  how you carry yourself.
caveats:
- The specific McGill study referenced is not fully cited by name.
- Source is expert lecture; primary literature verification recommended.
- Hippocampal volumetry studies are generally small and require replication.
