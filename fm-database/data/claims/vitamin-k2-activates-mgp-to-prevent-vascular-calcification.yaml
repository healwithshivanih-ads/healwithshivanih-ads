slug: vitamin-k2-activates-mgp-to-prevent-vascular-calcification
statement: Vitamin K2 activates Matrix GLA Protein (MGP), which prevents calcium from
  depositing in blood vessels and kidneys, thereby reducing atherosclerosis and cardiovascular
  disease risk.
evidence_tier: plausible_emerging
rationale: MGP is the most potent known inhibitor of vascular calcification and requires
  vitamin K2 for carboxylation/activation. Observational studies and some RCTs support
  this mechanism, but robust long-term RCT evidence on cardiovascular outcomes is
  still emerging.
coaching_translation: Vitamin K2 also activates a protein that stops calcium from
  hardening your arteries. This is why K2 is considered important for heart health,
  not just bone health.
caveats:
- RCT evidence specifically on cardiovascular outcomes (not just surrogate markers
  like coronary calcification scores) is still emerging.
