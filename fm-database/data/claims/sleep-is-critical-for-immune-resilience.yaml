slug: sleep-is-critical-for-immune-resilience
statement: Adequate sleep is a primary driver of immune resilience; poor or insufficient
  sleep increases susceptibility to infections and viral illness.
evidence_tier: plausible_emerging
rationale: Sleep and immune function have strong mechanistic support in the literature
  (cytokine regulation, NK cell activity), though this session cites no specific study.
  Single-expert source rules apply; defaulting to plausible_emerging.
coaching_translation: Sleep isn't passive recovery — it's when your immune system
  does critical repair and memory-building work. Prioritizing sleep is one of the
  highest-leverage things you can do for immunity.
caveats:
- No specific study cited; strong broader evidence base makes this plausible_emerging
  rather than speculative.
- Single-expert source.
