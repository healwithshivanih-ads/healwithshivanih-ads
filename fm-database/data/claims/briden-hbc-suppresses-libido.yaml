slug: briden-hbc-suppresses-libido
statement: Hormonal birth control suppresses endogenous testosterone production by
  the ovaries and adrenal axis and can cause reduced libido, reduced sexual arousal,
  fewer orgasms, vaginal dryness, and an increased risk of vaginismus. Recovery of
  libido after stopping can take months to years.
evidence_tier: strong
rationale: Well documented in reproductive endocrinology — CHCs reduce free testosterone
  by suppressing ovarian production and by raising sex hormone binding globulin (SHBG).
  Briden cites survey data showing higher rates of reduced sexual function in HBC
  users and small clinical studies showing slow recovery of free testosterone after
  stopping.
coaching_translation: Hormonal birth control turns off the testosterone that drives
  your sex drive. It can also make sex itself less comfortable. After stopping, libido
  can take months to come back fully because the SHBG protein that ties up testosterone
  is slow to normalise.
caveats:
- Not every woman experiences a libido drop; individual response varies.
- Many other things affect libido (relationship, sleep, stress, thyroid) so it is
  not always the pill.
