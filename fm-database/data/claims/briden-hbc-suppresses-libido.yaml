  location: Chapter 2 — Loss of Libido or Sex Drive, pg 32
  quote: Hormonal birth control can be bad for your sex life because it switches off
    the testosterone you need for libido. It can also cause vaginal dryness and put
    you at risk of a condition called vaginismus, which makes sex painful. Unfortunately,
    it can take months, or even years, for libido to return to normal once the pill
    is stopped.
