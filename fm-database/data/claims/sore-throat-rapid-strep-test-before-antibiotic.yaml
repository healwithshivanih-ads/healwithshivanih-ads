slug: sore-throat-rapid-strep-test-before-antibiotic
statement: Over 90% of sore throats are viral and self-limiting. Even when GABHS strep
  is confirmed, antibiotic prescription does not significantly reduce post-streptococcal
  complications (rheumatic fever, glomerulonephritis) compared with no antibiotic.
  Reserve antibiotics for severe infections, those unresponsive to one week of immune-supportive
  therapy, and patients with prior rheumatic fever or glomerulonephritis history.
  Insist on rapid strep antigen testing before antibiotics are prescribed (only 53%
  of sore-throat antibiotic prescriptions are preceded by testing).
evidence_tier: strong
