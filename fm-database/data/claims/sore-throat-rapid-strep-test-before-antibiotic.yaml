sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 95 — Strep Throat, pg 1518-1520
  quote: Strep throat is usually a self-limiting disease and most research has shown
    that clinical recovery is similar in cases in which antibiotics are prescribed
    and those in which they are not. Antibiotic administration does not significantly
    reduce the incidence of these complications.
