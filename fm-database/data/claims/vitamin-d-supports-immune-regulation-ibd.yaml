slug: vitamin-d-supports-immune-regulation-ibd
statement: Vitamin D deficiency is common in IBD and increases risk of metabolic bone
  disease; vitamin D supports T-regulatory cell function and dampens pro-inflammatory
  cytokines in animal models of IBD.
evidence_tier: plausible_emerging
rationale: Vitamin D insufficiency in IBD is well documented; immunomodulatory effects
  on Treg cells and cytokine suppression are mechanistically plausible but human IBD
  trial data are limited.
coaching_translation: Vitamin D optimisation is important in IBD both for bone protection
  and immune regulation — test and supplement as needed.
caveats:
- Optimal dosing for IBD immune modulation is unclear; supraphysiologic dosing should
  be clinician-supervised
