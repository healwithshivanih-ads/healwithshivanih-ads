slug: nafld-insulin-resistance-weight-loss
statement: 'NAFLD affects more than 20% of Americans (highest prevalence among US
  liver diseases). Insulin resistance is the primary risk factor; simple steatosis
  occurs in 70% at 10% above ideal body weight and nearly 100% in obesity. Weight
  loss is the most effective treatment — addresses both the mechanical fat-load and
  the underlying IR. Strict elimination of high-glycemic-index foods (one study: 80%
  of NAFLD patients drank enough sugary drinks/juices to add 12 tsp sugar daily) is
  the most critical dietary step.'
evidence_tier: strong
