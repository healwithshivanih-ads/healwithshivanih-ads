slug: dehydration-causes-negative-thought-patterns
statement: Dehydration can cause the brain to develop negative thought patterns, as
  the brain (85% water) requires adequate hydration for optimal neurotransmitter function
  and prefrontal cortex performance.
evidence_tier: plausible_emerging
rationale: Dehydration impairing cognitive function and mood is supported by research
  (e.g., mild dehydration affecting mood and cognition). The specific mechanism of
  'negative thought patterns from dehydration' is a functional extension of known
  dehydration-cognition effects.
coaching_translation: If you're feeling anxious, irritable, or stuck in negative thinking,
  try drinking a glass of water — your brain may simply be thirsty.
caveats:
- Source is expert lecture
- Direct RCT evidence for dehydration → negative thought patterns specifically is
  not cited
