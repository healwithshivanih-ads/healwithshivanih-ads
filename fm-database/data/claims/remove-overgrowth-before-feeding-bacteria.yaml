slug: remove-overgrowth-before-feeding-bacteria
statement: Remove overgrowth and infection (with antimicrobials or an elemental diet)
  before feeding beneficial bacteria with prebiotics and fibre — feeding an imbalanced
  microbiome mainly supports the imbalanced growth.
evidence_tier: plausible_emerging
rationale: A core sequencing principle of the book's action plan.
coaching_translation: Clear the overgrowth first, then feed the good bacteria — feeding
  too early just fuels the imbalance.
