slug: selenium-cofactor-glutathione-peroxidase
statement: Selenium is the essential cofactor for glutathione peroxidase enzymes (GPX);
  without adequate selenium, glutathione cannot neutralise hydrogen peroxide, leaving
  cells vulnerable to oxidative damage.
evidence_tier: strong
rationale: Selenium incorporation into selenocysteine at the GPX active site is a
  well-established biochemical fact; the role of selenoenzymes in peroxide clearance
  has strong mechanistic and epidemiological support. This is one of the better-grounded
  claims in Lynch's framework.
coaching_translation: Ensure clients eating selenium-poor diets (e.g., Midwest US
  soils, vegans) understand selenium is critical for antioxidant function. Brazil
  nuts (2/day) provide dietary selenium.
caveats:
- Toxicity threshold is relatively low (~400 mcg/day); testing before supplementing
  is advisable.
- Serum selenium does not always reflect tissue status — RBC selenium or functional
  GPX assay is more informative.
