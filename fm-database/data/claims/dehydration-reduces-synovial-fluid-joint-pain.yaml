slug: dehydration-reduces-synovial-fluid-joint-pain
statement: Chronic dehydration reduces synovial fluid volume in joints, worsening
  joint pain and stiffness, particularly in arthritis.
evidence_tier: plausible_emerging
rationale: Synovial fluid is approximately 80–90% water. Adequate hydration is required
  for joint lubrication. This is biologically well-established, though the therapeutic
  magnitude of hydration on joint pain in clinical populations is understudied.
coaching_translation: Ask your joint pain clients how much water they drink. Simply
  improving hydration can meaningfully reduce joint discomfort — especially in older
  or arthritic clients.
caveats:
- Source is expert FM lecture.
- Clinical trial evidence for hydration as a standalone joint pain intervention is
  limited.
