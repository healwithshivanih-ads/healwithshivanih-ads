slug: gut-microbiome-produces-serotonin-and-gaba
statement: The gut microbiome is responsible for biosynthesis of key neurotransmitters
  including serotonin, GABA, catecholamines, and neuropeptides, establishing a biochemical
  basis for the gut-brain axis.
evidence_tier: strong
rationale: Approximately 90-95% of serotonin is produced in the gut. Gut microbial
  contribution to neurotransmitter synthesis is well-established in the literature.
coaching_translation: Your gut bacteria directly produce mood chemicals like serotonin
  and GABA — this is why gut health and mental health are so closely connected.
caveats:
- Source is expert consensus lecture; the mechanism itself has strong basic science
  support but clinical translation is still emerging.
