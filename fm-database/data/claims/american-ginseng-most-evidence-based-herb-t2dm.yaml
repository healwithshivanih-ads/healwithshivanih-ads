slug: american-ginseng-most-evidence-based-herb-t2dm
statement: American ginseng (Panax quinquefolius, 3 g before each meal) is described
  as the most evidence-based herbal therapy for T2DM, reducing postprandial glucose.
evidence_tier: plausible_emerging
rationale: Multiple RCTs by Vuksan et al. show consistent postprandial glucose reduction
  with standardised root powder. Pizzorno designates it 'most evidence-based herbal
  therapy for T2DM'.
coaching_translation: Taking American ginseng before meals is one of the best-studied
  herbal strategies for blunting after-meal blood sugar rises.
caveats:
- Effects vary by preparation; whole powdered root at standardised 3 g dose per meal
  is the studied form.
