slug: mayo-migraine-medication-overuse-headache
statement: Taking OTC pain relievers or triptans on more than 10 to 15 days per month
  can lead to medication overuse headache, where the rescue drug itself becomes the
  trigger; this is one of the strongest reasons to use preventive therapy.
