slug: ayurveda-food-medicine-poison-digestibility-framework
statement: 'Ayurveda defines food, medicine, and poison according to digestibility: food is anything digested
  well and absorbed usefully; medicine enhances digestive capacity; poison is anything that impairs it
  — including otherwise ''healthy'' foods a person cannot digest.'
evidence_tier: fm_specific_thin
rationale: This is the foundational Ayurvedic food philosophy — individual digestive tolerance (bioindividuality)
  over universal nutritional rules. It maps directly to FM's bioindividual approach and personalised nutrition.
  Coach-actionable as a framing tool.
coaching_translation: The quality of what you eat matters less than your ability to digest it. Even the
  healthiest food becomes a problem if your body can't process it. Symptoms like bloating, gas, fatigue
  after eating, and irregular stools are all signs that something you're eating isn't working for your
  digestion.
out_of_scope_notes: ''
caveats:
- The food/medicine/poison trichotomy is philosophical-Ayurvedic framing. Individual digestive tolerance
  is genuinely relevant but is not the only determinant of whether a food is beneficial.
