slug: mayo-insomnia-when-to-investigate-secondary-causes
statement: Insomnia accompanied by loud snoring with witnessed apnoeas, restless or
  kicking legs, GERD, nocturia, depression, chronic pain, or thyroid symptoms warrants
  evaluation for the underlying condition before drug therapy is considered.
