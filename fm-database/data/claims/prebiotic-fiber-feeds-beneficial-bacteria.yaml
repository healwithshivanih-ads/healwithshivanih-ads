slug: prebiotic-fiber-feeds-beneficial-bacteria
statement: Prebiotics — dietary fibers found in garlic, leeks, onions, chicory, oats,
  barley, flax, wheat, and FOS supplements — selectively stimulate the growth of beneficial
  gut microorganisms.
evidence_tier: strong
rationale: Prebiotic fermentation by gut microbiota is well-established mechanistically
  and in human trials. Inulin and FOS are among the most studied.
coaching_translation: Feeding your good gut bacteria with prebiotic foods (garlic,
  onions, oats, bananas) is like fertilizing a garden — it helps beneficial microbes
  thrive.
