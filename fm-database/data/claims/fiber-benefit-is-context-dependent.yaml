slug: fiber-benefit-is-context-dependent
statement: 'Fibre''s benefits are context-dependent, not automatic: roughly equal
  high-quality evidence shows it does and does not protect against digestive-tract
  cancers, and any whole-food diet that avoids processed food lowers colon-cancer
  risk regardless of fibre or carb level.'
evidence_tier: plausible_emerging
rationale: Presents both directions of the fibre-cancer evidence; the honest 'it depends'
  conclusion is the point.
coaching_translation: More fibre isn't universally better — a whole-food diet protects
  the colon whether it's higher or lower in fibre.
