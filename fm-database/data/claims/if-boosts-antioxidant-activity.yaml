slug: if-boosts-antioxidant-activity
statement: Intermittent fasting increases antioxidant activity and decreases free
  radical burden.
evidence_tier: plausible_emerging
rationale: Listed in the document summary table and consistent with known upregulation
  of Nrf2 antioxidant pathways during caloric restriction. Supported mechanistically
  and by animal studies; human RCT evidence is emerging.
coaching_translation: Fasting can help your body's natural clean-up systems work better,
  reducing the oxidative damage linked to ageing and disease.
caveats:
- Primarily animal model data for antioxidant mechanism; human trials ongoing.
