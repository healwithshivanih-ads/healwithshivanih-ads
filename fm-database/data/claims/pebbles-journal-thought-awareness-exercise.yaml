  location: Podcast — Pebbles journal exercise
  quote: Just for 24 hours, however many of those you are awake, start to track your
    own thoughts. Move that to a week. Gather a little bag of dark pebbles and a little
    bag of light pebbles. The next day, you'll say — I don't want to put a dark pebble
    in there, so I can make sure I change that thought.
