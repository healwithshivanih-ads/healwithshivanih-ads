slug: pebbles-journal-thought-awareness-exercise
statement: A simple entry exercise for clients beginning trauma work — for 24 hours
  (then extending to a week), track every thought, then at the end of each day place
  a light pebble for every life-affirming thought and a dark pebble for every life-destructive
  thought. The first day reveals the unconscious pattern. By day two, awareness alone
  begins shifting the ratio. This builds the foundational skill that perceptions are
  not passive — they can be observed and the channel can be changed.
evidence_tier: plausible_emerging
