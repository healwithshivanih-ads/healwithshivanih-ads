slug: hepatitis-vitamin-d-deficiency
statement: Vitamin D is directly antiviral against hepatitis C and supports immune-mediated
  viral clearance. Low vitamin D levels correlate with more serious cases, progression
  to chronic hepatitis, and cirrhosis — more than 90% of patients with chronic hepatitis
  C have low vitamin D levels. Several studies show improved outcomes when vitamin
  D is added to conventional antiviral therapy. Protocol dose — 2,000-4,000 IU/day
  with blood-level-guided adjustment.
evidence_tier: plausible_emerging
