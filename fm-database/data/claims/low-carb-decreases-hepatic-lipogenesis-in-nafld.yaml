slug: low-carb-decreases-hepatic-lipogenesis-in-nafld
statement: A low-carb diet decreases hepatic lipogenesis and liver inflammation in
  NAFLD.
evidence_tier: plausible_emerging
rationale: 'Mechanistically sound: reduced carbohydrate intake lowers insulin-driven
  de novo lipogenesis. Supported by a growing body of clinical trial data though not
  yet at full consensus.'
coaching_translation: Cutting carbs reduces the signal that tells your liver to make
  fat, which can help reverse fatty liver disease.
caveats:
- Source is expert consensus. Combine with omega-3s and NAC (clinician scope) for
  comprehensive liver support.
