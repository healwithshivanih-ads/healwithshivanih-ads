slug: insulin-resistance-impairs-estrogen-metabolism
statement: Insulin resistance and obesity impair estrogen metabolism and may increase
  estrogen-related cancer risk; addressing these with lifestyle habits can support
  healthier estrogen clearance.
evidence_tier: plausible_emerging
rationale: Document references Chan et al. (Cancer Causes Control, 2019) on physical
  activity, adiposity, and breast cancer. The bidirectional relationship between insulin/obesity
  and estrogen metabolism is biologically supported.
coaching_translation: Keeping blood sugar balanced and maintaining a healthy weight
  are powerful levers for better estrogen processing and reduced cancer risk.
caveats:
- Source is expert synthesis. Causality direction is complex; estrogen also influences
  insulin sensitivity.
