slug: riboflavin-stabilises-mthfr-enzyme-c677t
statement: Riboflavin (B2) helps stabilise the MTHFR enzyme and is especially relevant
  for C677T homozygotes; low-dose riboflavin has evidence for lowering blood pressure
  in 677TT individuals.
evidence_tier: plausible_emerging
rationale: The MTHFR enzyme is FAD-dependent; riboflavin (as FAD) is its cofactor.
  Studies by McNulty and colleagues have shown that riboflavin supplementation lowers
  blood pressure specifically in C677T homozygotes. This is one of the better-evidenced,
  more specific MTHFR-riboflavin links in the literature.
coaching_translation: 'If you have the C677T MTHFR variant (homozygous — two copies),
  riboflavin (vitamin B2) isn''t just a nice-to-have: it helps keep the MTHFR enzyme
  working as well as it can, and there''s research showing it may help lower blood
  pressure in people with this specific variant.'
caveats:
- Evidence is primarily from McNulty et al. studies in hypertensive populations; generalisability
  to all C677T homozygotes is uncertain.
- Source document is clinical observation — verify specific dosing with a clinician.
