slug: stinging-nettle-decreases-shbg
statement: Stinging nettle (Urtica dioica) is associated with decreased SHBG levels.
evidence_tier: fm_specific_thin
rationale: Listed in the FMCN toolkit as a supplement that decreases SHBG. Plausible
  mechanism via binding to SHBG directly, but clinical evidence is limited.
coaching_translation: Stinging nettle root is sometimes used by functional medicine
  practitioners to help free up bound testosterone by lowering SHBG — always use under
  clinician guidance.
caveats:
- Thin peer-reviewed evidence for SHBG-specific effect
- Source is an expert-consensus toolkit
- Dosing should be determined by a clinician
out_of_scope_notes: Supplement dosing is out of coaching scope; refer to clinician.
