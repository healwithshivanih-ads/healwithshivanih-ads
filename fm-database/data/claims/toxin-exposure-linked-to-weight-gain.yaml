slug: toxin-exposure-linked-to-weight-gain
statement: Toxin exposure (independent of diet) may contribute to weight gain through
  metabolic and endocrine disruption, as evidenced by animal studies showing greater
  weight gain when toxins are injected regardless of diet.
evidence_tier: plausible_emerging
rationale: Obesogen research (animal models with endocrine disruptors like BPA, phthalates)
  supports this claim at a mechanistic level; human RCT evidence is limited. The document
  cites 'recent studies' without specific references.
coaching_translation: Toxins in our environment can interfere with metabolism and
  hormones in ways that make it harder to maintain a healthy weight — reducing exposure
  is part of the picture.
caveats:
- Evidence cited is animal data; human clinical evidence is correlational. No specific
  study named.
