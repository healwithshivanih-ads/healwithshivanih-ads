slug: histamine-increases-with-food-aging
statement: Histamine content in foods increases with age, ripening, and storage, particularly
  in high-protein foods; eating freshly prepared food and refrigerating leftovers
  immediately reduces histamine load.
evidence_tier: strong
rationale: 'Well-established food science principle: bacterial decarboxylation of
  histidine produces histamine over time. Documented in peer-reviewed food safety
  literature.'
coaching_translation: If you're histamine-sensitive, cook fresh and eat promptly.
  Even yesterday's leftovers (especially meat or fish) can accumulate enough histamine
  to trigger symptoms.
