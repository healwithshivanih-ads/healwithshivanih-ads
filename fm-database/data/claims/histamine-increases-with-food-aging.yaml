sources:
- id: vitaone-health-coaching-toolkit
  location: Histamine Food Triggers
  quote: Foods that may normally be low in histamine will have increasing amounts
    of histamine as they age, or ripen especially those with higher protein content
    (e.g., leftover beef). To decrease histamine load, eat foods that have been freshly
    prepared and refrigerate or freeze leftovers immediately.
