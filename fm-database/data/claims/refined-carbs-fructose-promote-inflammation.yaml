slug: refined-carbs-fructose-promote-inflammation
statement: Refined carbohydrates and sugary beverages high in fructose promote inflammation
  and should be avoided on an anti-inflammatory diet.
evidence_tier: strong
rationale: 'Well-supported by metabolic research: refined carbohydrates spike blood
  sugar driving insulin resistance and inflammatory signaling; fructose drives hepatic
  lipogenesis and inflammatory cytokine production.'
coaching_translation: White bread, pastries, soda, and sweetened drinks spike blood
  sugar and fuel the inflammatory pathways your body is trying to calm.
