- id: wentz-energy-blueprint-podcast-2026
  location: Podcast — Addisonian vs adaptive segment
  quote: True Addison's disease is the actual inability of the adrenal glands to produce
    enough cortisol. What you're saying is that these people have adrenal glands that
    are still perfectly capable of producing enough cortisol, but there is an adaptive
    thing that is occurring in response to chronic stress. HPA dysfunction is probably
    the more accurate term.
rationale: Keeps coach inside scope — protects against accidentally implying organ
  failure (which is a medical diagnosis) when describing flat curves to clients.
