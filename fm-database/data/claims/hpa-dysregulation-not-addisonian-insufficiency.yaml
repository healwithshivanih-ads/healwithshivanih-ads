slug: hpa-dysregulation-not-addisonian-insufficiency
statement: Wentz emphasises that what clients call "adrenal fatigue" is best understood
  as HPA-axis dysregulation — an adaptive downshift of cortisol output by an intact
  adrenal gland in response to chronic stress — NOT true Addisonian insufficiency.
  True Addison's disease shows high ACTH with low cortisol on lab and is medical emergency-grade.
  HPA dysregulation shows variable ACTH with a flattened diurnal cortisol curve on
  functional testing and responds to lifestyle work, not hydrocortisone replacement.
  Coach should never describe a client as having "adrenal fatigue" in a way that implies
  organ failure.
evidence_tier: plausible_emerging
