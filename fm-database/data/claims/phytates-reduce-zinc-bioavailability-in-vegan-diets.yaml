slug: phytates-reduce-zinc-bioavailability-in-vegan-diets
statement: Phytates present in plant foods bind to zinc in the gut, reducing its bioavailability and increasing the risk of
  zinc deficiency in individuals following vegan or predominantly plant-based diets.
evidence_tier: strong
rationale: Phytate-mineral chelation is well-established in nutritional science and widely recognised as a contributor to
  zinc deficiency risk in plant-based populations.
coaching_translation: If you eat a plant-based diet, the phytates (natural compounds) in grains and legumes can block zinc
  absorption, so you may need more zinc from food or supplements.
caveats:
- Soaking, sprouting, and fermenting plant foods can reduce phytate content and improve zinc bioavailability.
