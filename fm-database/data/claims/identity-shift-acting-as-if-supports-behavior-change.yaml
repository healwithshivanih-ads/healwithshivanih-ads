slug: identity-shift-acting-as-if-supports-behavior-change
statement: Encouraging clients to identify with their future, healthier self — 'acting
  as if' they are already that person — can reduce internal conflict and make desired
  behaviors feel more natural.
evidence_tier: plausible_emerging
rationale: Identity-based habit formation is supported by emerging behavioral science
  (e.g., James Clear's work, ACT research on self-as-context), though direct RCT evidence
  in health coaching is limited.
coaching_translation: 'Ask: ''What would that future version of you do in this situation?''
  Help clients practice inhabiting their future identity rather than fighting their
  current one.'
caveats:
- Described anecdotally in group discussion; no specific study cited.
- Source is an expert consensus coaching call.
