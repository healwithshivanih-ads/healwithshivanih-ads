slug: wild-yam-cream-stimulates-progesterone-pathway
statement: Topical application of wild yam cream (containing diosgenin) stimulates
  the biochemical pathway the body uses to produce progesterone, potentially relieving
  hormonally-driven depression in women.
evidence_tier: fm_specific_thin
rationale: Diosgenin is a steroidal saponin precursor used industrially to synthesise
  progesterone, but human studies on topical wild yam cream converting to progesterone
  in vivo show inconsistent results. This is a common FM recommendation with limited
  peer-reviewed support.
coaching_translation: Some women find that a plant-based wild yam cream supports their
  hormone balance and mood, particularly around their cycle or menopause. It's worth
  discussing with your healthcare provider.
out_of_scope_notes: Hormone therapy decisions, including recommendation of wild yam
  cream for diagnosed hormonal conditions, require clinician oversight.
caveats:
- Human conversion of diosgenin to progesterone via topical application is not robustly
  demonstrated in clinical trials
- Source is expert lecture
- Should not replace clinician-monitored hormone assessment
