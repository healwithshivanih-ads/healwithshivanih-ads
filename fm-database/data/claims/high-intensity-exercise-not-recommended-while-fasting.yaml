slug: high-intensity-exercise-not-recommended-while-fasting
statement: High-intensity exercise is not recommended while fasting; light-intensity
  activities such as walking or yoga are preferred.
evidence_tier: plausible_emerging
rationale: Practical safety guideline consistent with known risk of hypoglycemia and
  electrolyte depletion during combined fasting and vigorous exercise. Stated as a
  general recommendation in the toolkit.
coaching_translation: On fasting days, stick to gentle movement like walking or yoga
  rather than intense workouts.
