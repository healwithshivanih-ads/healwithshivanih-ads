slug: high-intensity-exercise-not-recommended-while-fasting
statement: High-intensity exercise is not recommended while fasting; light-intensity
  activity such as walking or yoga is preferred.
evidence_tier: plausible_emerging
rationale: Clinically conservative guidance consistent with the risk of hypoglycaemia,
  electrolyte depletion, and HPA axis stress during combined caloric restriction and
  high-intensity effort.
coaching_translation: On fasting days, stick to gentle movement — a walk, yoga, or
  stretching — rather than intense workouts.
linked_to_topics:
- intermittent-fasting
out_of_scope_notes: ''
caveats:
- Individual tolerance varies; athletes or advanced practitioners may differ.
- Consult clinician before combining IF with any structured training programme.
