  location: Podcast — Mental inflammation chapter framing
  quote: If I stress everyone out too much on health practices and we're creating
    so much force and stress around health, then the stress alone will cause the inflammation
    that we're trying to win at. No matter what we do, if I still am under chronic
    stress, I will still cause all the same problems.
