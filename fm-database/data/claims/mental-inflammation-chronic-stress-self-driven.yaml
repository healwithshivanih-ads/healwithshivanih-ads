slug: mental-inflammation-chronic-stress-self-driven
statement: '"Mental inflammation" describes the phenomenon where chronic self-imposed
  stress about health practices (forcing exercise, forcing protein intake, perfectionist
  intermittent fasting) generates enough sustained sympathetic activation to drive
  the very systemic inflammation those practices were meant to reduce. Coach implication:
  building "sacred pauses," recovery, and spiritual practices into the protocol matters
  as much as the protocol items themselves.'
evidence_tier: plausible_emerging
