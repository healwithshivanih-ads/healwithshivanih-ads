sources:
- id: gupta-energy-blueprint-podcast-2026
  location: Podcast — Seasonal detox in Ayurveda
  quote: Detoxing four times a year is a great way to take a week off, tune into self,
    clear the decks, clear the cobwebs out of our bodies, clear inflammation out of
    the system kindly and gently so that when you get to that annual detox, you don't
    have to be so intense about it.
