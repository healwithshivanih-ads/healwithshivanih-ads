slug: seasonal-detox-at-season-transitions
statement: Ayurveda prescribes seasonal detoxes (four times per year, ideally at the
  boundaries between seasons) as a middle ground between daily self-care rituals and
  the more intense annual panchakarma. Pre-summer detox prepares a pitta person to
  handle heat; post-summer detox releases accumulated heat. A week of simplified diet,
  hydration, rest, and detox-supportive rituals clears the slate and reduces the intensity
  required for any annual deeper cleanse.
evidence_tier: plausible_emerging
