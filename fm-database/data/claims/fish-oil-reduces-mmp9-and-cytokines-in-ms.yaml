slug: fish-oil-reduces-mmp9-and-cytokines-in-ms
statement: High-dose fish oil (8 g/day providing ~2.9 g EPA + 1.9 g DHA) reduces serum
  MMP-9 and pro-inflammatory cytokines (TNF-alpha, IFN-gamma, IL-1, IL-2) that drive
  T-cell trafficking across the blood-brain barrier in MS.
evidence_tier: plausible_emerging
rationale: Pizzorno cites multiple human studies showing fish oil reduces MMP-9 secretion
  from immune cells and lowers pro-inflammatory cytokine mRNA and protein. Mechanism
  is well-established; clinical disability endpoints are still mixed.
coaching_translation: Fish oil at therapeutic doses doesn't just calm general inflammation
  — it specifically lowers the enzyme (MMP-9) that immune cells use to crack open
  the blood-brain barrier and attack myelin.
caveats:
- Therapeutic dose for MS is 3000 mg EPA+DHA daily, much higher than general supplementation.
- Pair with vitamin E (mixed tocopherols) to prevent oxidation.
- Effect on disability progression is modest; use alongside conventional DMTs.
