slug: arachidonic-acid-drives-estrogen-dominance-via-aromatase
statement: Excess arachidonic acid from high omega-6 intake increases aromatase enzyme
  activity, promoting the conversion of androgens to estrogen and potentially contributing
  to estrogen dominance.
evidence_tier: plausible_emerging
rationale: Described as a mechanistic pathway in the lecture. The link between inflammatory
  PGE2 (derived from AA via COX-2) and aromatase upregulation is supported by research,
  particularly in breast tissue. Source is FM lecture of moderate quality.
coaching_translation: Too much omega-6 in your diet can raise your estrogen levels
  by revving up the enzyme that converts testosterone into estrogen. Reducing omega-6
  and increasing omega-3 may help balance hormones.
caveats:
- Mechanism is plausible and supported in some tissue contexts (e.g., breast adipose),
  but broader clinical evidence is limited.
- Source is FM lecture synthesis.
