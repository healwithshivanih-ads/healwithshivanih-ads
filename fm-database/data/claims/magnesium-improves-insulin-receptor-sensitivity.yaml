slug: magnesium-improves-insulin-receptor-sensitivity
statement: Magnesium deficiency reduces insulin receptor sensitivity and impairs beta-cell
  insulin secretion, contributing to insulin resistance and progression toward diabetes.
evidence_tier: strong
rationale: Multiple epidemiological studies and meta-analyses have shown inverse associations
  between dietary magnesium intake and type 2 diabetes risk; mechanistic studies support
  magnesium's role in insulin receptor signalling.
coaching_translation: Low magnesium makes it harder for insulin to do its job, contributing
  to blood sugar imbalances — so correcting magnesium is an important part of metabolic
  health.
