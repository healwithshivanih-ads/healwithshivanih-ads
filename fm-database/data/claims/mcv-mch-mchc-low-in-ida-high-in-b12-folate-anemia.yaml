slug: mcv-mch-mchc-low-in-ida-high-in-b12-folate-anemia
statement: MCV, MCH, and MCHC are low in iron deficiency anemia (microcytic, hypochromic)
  and elevated in B12/folate deficiency anemia (macrocytic), enabling differential
  diagnosis.
evidence_tier: strong
rationale: Iron deficiency produces small, pale RBCs (microcytic, hypochromic), reducing
  MCV, MCH, and MCHC. B12/folate deficiency impairs DNA synthesis, producing large
  RBCs (macrocytic), increasing these values. This differential is foundational in
  haematology.
coaching_translation: The size and colour concentration of red blood cells on a blood
  test can tell a practitioner whether the anemia is from iron deficiency or a B12/folate
  gap — they go in opposite directions.
out_of_scope_notes: Diagnosis and classification of anemia from MCV/MCH/MCHC requires
  a clinician.
caveats:
- Source is an expert lecture; consistent with standard haematology references.
