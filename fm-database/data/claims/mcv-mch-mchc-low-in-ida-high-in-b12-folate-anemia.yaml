  location: Secondary Biomarkers / MCV-MCH-MCHC section
  quote: If you see this blood report, very classical MCV, MCH, MCHC, all on the lower
    side. This is very classical of diagnosing as an iron deficiency anemia. What
    happens if the MCV, MCH, MCHC are on a higher side? So usually we call it as megaloblastic
    anemia or B12 or folate anemias.
