slug: over-exercise-amenorrhoea-bone-cardiovascular-risk
statement: Prolonged over-exercise combined with insufficient caloric intake not only suppresses menstruation
  but may also increase cardiovascular disease risk and cause dangerously low bone density; appropriate
  exercise and adequate nutrition support bone density, while the reverse depletes it.
evidence_tier: strong
rationale: Bone loss from energy deficiency and oestrogen suppression in athletes (the Female Athlete
  Triad / RED-S) is well established in sports medicine.
coaching_translation: When women train hard without fuelling adequately, the consequences go beyond missing
  periods — bones become fragile and heart health suffers. Supporting your body with enough nourishment
  is non-negotiable, especially when your cycle is already affected.
