  quote: The same angiogenesis that we have in the brain we can demonstrate in the
    myocardium, just finished analysis in one of our research studies. The same process
    in the penis — for people who do not have erection or good enough erection because
    of blood flow, not testosterone or neurological damage, we can demonstrate this
    angiogenesis.
rationale: Important for client questions about HBOT for cardiac and male sexual health.
