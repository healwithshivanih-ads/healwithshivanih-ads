slug: hbot-angiogenesis-multi-organ-brain-heart-penis
statement: The same angiogenesis triggered by HBOT in brain tissue (demonstrated by
  perfusion MRI and DTI) has been independently demonstrated in cardiac muscle (cardiac
  MRI in Sagol cohort) and penile tissue (custom MRI protocol — erectile improvement
  when the limitation is vascular rather than hormonal or neurological). The mechanism
  is body-wide because the hyperoxic-hypoxic paradox triggers VEGF and HIF-1-alpha
  systemically, not only at a target organ.
evidence_tier: plausible_emerging
