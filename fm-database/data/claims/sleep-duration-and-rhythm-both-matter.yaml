slug: sleep-duration-and-rhythm-both-matter
statement: Consistently sleeping under seven or over nine hours is associated with
  more disease and death, and circadian rhythm consistency may matter as much as duration
  — shift workers with adequate sleep length still show raised disease risk.
evidence_tier: strong
rationale: Cites multiple sleep-duration meta-analyses plus shift-work data.
coaching_translation: Aim for 7–9 hours on a consistent schedule — when you sleep
  matters as much as how long.
