slug: abhyanga-self-massage-daily-detox
statement: Abhyanga — daily Ayurvedic self-massage with a high volume of warm food-grade
  oil (sesame for vata, coconut for pitta, mustard or warming oils for kapha) — is
  taught as a foundational evening or pre-shower ritual to mobilise the lymphatic
  system, hydrate fascia and joints, calm the nervous system, and remove fat-soluble
  accumulated amma. Distinct from invasive panchakarma massage; can be done privately
  at home.
