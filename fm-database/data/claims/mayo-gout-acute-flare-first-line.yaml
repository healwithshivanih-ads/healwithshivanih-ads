slug: mayo-gout-acute-flare-first-line
statement: Conventional acute-flare options are NSAIDs (naproxen, indomethacin, celecoxib),
  oral or intra-articular corticosteroids, or colchicine (best within 24 hours of
  onset); choice depends on comorbidities — NSAIDs avoided in CKD or GI disease, steroids
  preferred when both excluded.
