slug: glutamine-repairs-gut-lining
statement: The amino acid glutamine is a key nutrient for repairing the gut lining,
  which is often in short supply in a compromised gut.
evidence_tier: plausible_emerging
rationale: Glutamine is the primary fuel for enterocytes and has supportive evidence
  for gut barrier repair in critical illness and some GI conditions. Evidence in general
  functional gut dysfunction is thinner.
coaching_translation: Glutamine is a building block your gut lining uses to repair
  itself, especially when it's been under stress.
caveats:
- Most strong evidence is from critical care or clinical GI disease settings. Evidence
  in general gut dysfunction is emerging.
