slug: sklar-ureaplasma-mycoplasma-uterine-microbiome-rpl
statement: Hidden reproductive-tract infections — particularly Ureaplasma urealyticum
  and Mycoplasma species — and uterine microbiome dysbiosis can drive chronic low-grade
  endometritis that interferes with implantation and early pregnancy, yet these are
  routinely missed in conventional workups because they require specific PCR or molecular-microbiome
  testing (EMMA / ALICE) rather than standard cultures.
