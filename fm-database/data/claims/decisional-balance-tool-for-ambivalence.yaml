slug: decisional-balance-tool-for-ambivalence
statement: Using a decisional balance tool — exploring what is good about staying
  the same, what is bad about not changing, and what would be gained by changing —
  can help clients honestly examine their ambivalence.
evidence_tier: strong
rationale: Decisional balance is a core motivational interviewing and transtheoretical
  model technique with substantial peer-reviewed support for facilitating behavior
  change across health domains.
coaching_translation: 'Walk clients through four quadrants: pros of status quo, cons
  of status quo, pros of changing, cons of changing. This surfaces hidden resistance
  and clarifies motivation.'
caveats:
- Some coaches in the discussion noted concern that explicitly naming pros of not
  changing could amplify 'sustain talk' and recommended pairing decisional balance
  with vision work.
