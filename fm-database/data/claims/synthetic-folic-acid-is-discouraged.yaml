slug: synthetic-folic-acid-is-discouraged
statement: Synthetic folic acid should be avoided in favour of natural folates or methylfolate supplements.
evidence_tier: fm_specific_thin
rationale: The preference for methylfolate over synthetic folic acid is common in FM practice, particularly for MTHFR variants,
  but evidence comparing outcomes between forms is limited.
coaching_translation: When discussing folate supplementation, note that methylfolate is generally preferred over synthetic
  folic acid in functional medicine contexts.
caveats:
- Source is a practitioner cheatsheet without primary citations.
- The evidence base for avoiding folic acid universally is not yet consensus.
- Source is practitioner cheatsheet.
- This preference is FM-specific and not universal clinical consensus.
