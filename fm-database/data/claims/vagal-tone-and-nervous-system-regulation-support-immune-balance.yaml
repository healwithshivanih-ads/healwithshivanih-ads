slug: vagal-tone-and-nervous-system-regulation-support-immune-balance
statement: Supporting vagal tone through practices such as breathwork, humming, gargling,
  meditation, and grounding activates the parasympathetic nervous system and supports
  immune regulation.
evidence_tier: fm_specific_thin
rationale: Vagus nerve stimulation and immune modulation (the 'inflammatory reflex')
  has mechanistic and some clinical support, but specific practices like humming/gargling
  are extrapolated from vagal stimulation principles with thin direct evidence. Common
  in FM/integrative practice.
coaching_translation: Simple daily habits that activate your 'rest and digest' system
  — deep breathing, humming, even gargling — can help dial down immune overactivation
  by supporting your vagus nerve.
caveats:
- Specific practices (humming, gargling) are extrapolations from broader vagal stimulation
  research; direct RCT evidence is thin.
- Single-expert source.
- FM-specific interpretation.
