slug: antibiotic-use-can-disrupt-microbiome-for-years
statement: A single round of antibiotics can disrupt gut microbiome composition for
  18 months to potentially up to 8 years, with downstream effects on GABA and serotonin
  production and mood.
evidence_tier: plausible_emerging
rationale: Antibiotic-induced microbiome disruption is well-documented; the long-duration
  estimates (18–24 months from Thurlow's book; up to 8 years cited from a social media
  reference by Dr. Karan Rajan) reflect emerging research but the 8-year figure is
  from a single cited paper via social media, not a directly verified source.
coaching_translation: Even one course of antibiotics can set back your gut health
  significantly — rebuilding through fermented foods, fibre, and targeted probiotics
  is important afterwards.
caveats:
- The 8-year figure is sourced from a social media post (Dr. Karan Rajan) referencing
  a paper — not a directly cited peer-reviewed source.
- Individual recovery varies widely by baseline microbiome health, diet, and lifestyle.
- Single-expert source rule applies.
