slug: apigenin-supports-sleep-onset
statement: Apigenin (50 mg at bedtime) supports sleep onset via GABA-A receptor modulation;
  commonly stacked with magnesium threonate + L-theanine. Strong caveat — apigenin
  is a fairly potent aromatase (estrogen) inhibitor and is generally not appropriate
  for women, especially those of reproductive age or with estrogen-sensitive concerns.
evidence_tier: plausible_emerging
rationale: GABA-A modulation by apigenin has in-vitro and animal data (well-established
  mechanism). Human RCT data on sleep specifically is limited — most use of apigenin
  in trials has been for cancer adjunct or anti-inflammatory purposes. The aromatase-inhibition
  concern is real (cited in oncology literature). Huberman frames this as personal-use
  anecdote with a clear scope warning.
coaching_translation: Some people use a small dose of apigenin (50 mg) at bedtime
  to feel sleepier. It is the active compound in chamomile, just more concentrated.
  BUT — it lowers estrogen, which is rarely what we want for women clients. For most
  women, stick with magnesium glycinate or threonate + maybe theanine instead.
caveats:
- Aromatase inhibition — avoid in women of reproductive age, on HRT, with estrogen-sensitive
  cancer history.
- Pregnancy + breastfeeding excluded — no safety data.
- Quality varies widely across brands; verify third-party tested.
- Confirm with clinician if client on any hormone therapy.
