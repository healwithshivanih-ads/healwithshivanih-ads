slug: hdl-per-mg-risk-reduction-2-3-percent
statement: For every 1 mg/dL increase in HDL cholesterol, cardiovascular risk decreases
  by 2% in men and 3% in women.
evidence_tier: strong
rationale: Well-established epidemiological finding from Framingham Heart Study and
  multiple large prospective cohorts. Widely cited in cardiovascular risk literature.
coaching_translation: Raising HDL — through exercise, quitting smoking, reducing refined
  carbs, and omega-3s — has measurable cardiovascular benefit. Even small increases
  matter.
caveats:
- HDL functionality (quality) matters as much as quantity — dysfunctional HDL does
  not confer the same benefit.
