slug: lutein-15mg-reduces-cataract-surgery-risk
statement: Lutein, a yellow-orange carotene concentrated in the human lens, is inversely
  associated with cataract surgery risk (20–50% risk reduction in observational studies).
  In a small double-blind trial, supplementation with 15 mg lutein three times weekly
  for up to two years improved visual acuity and glare sensitivity in patients with
  age-related cataracts, while placebo showed decline.
evidence_tier: plausible_emerging
