- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 33 — Cataracts, pg 628-629
  quote: Intake of lutein was inversely associated with cataract surgery (20 to 50%
    risk reduction). In a double-blind intervention trial, 17 patients with age-related
    cataracts received either lutein (15 mg), vitamin E, or placebo three times a
    week for up to two years. Visual performance actually improved in the lutein group.
rationale: FM-relevant nutrient for any client with early lens opacity, family history
  of cataracts, or heavy near-UV exposure. Pair with broad-spectrum antioxidants —
  single-nutrient strategies generally underperform combination support in ARES-style
  trials.
