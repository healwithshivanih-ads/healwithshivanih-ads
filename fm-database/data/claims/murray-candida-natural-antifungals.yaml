sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 30 — Chronic Candidiasis, pg 610-613
  quote: 'The four approaches we feel most comfortable in recommending as natural
    agents against C. albicans are: Berberine-containing plants, Garlic, Enteric-coated
    volatile oil preparations like oregano, Propolis. The recommended dosage of berberine
    is 25 to 50 mg three times per day. The treatment of chronic candidiasis requires
    a daily dose of at least 10 mg allicin or a total allicin potential of 4,000 mg.
    An effective dosage for an enteric-coated volatile oil preparation is 0.2 to 0.4
    ml twice per day between meals. The typical dosage of propolis is 100 to 500 mg
    three times per day. The Herxheimer reaction can be minimized by following the
    dietary recommendations for a minimum of two weeks before taking an antiyeast
    agent and starting in low doses and gradually increasing over the course of one
    month.'
