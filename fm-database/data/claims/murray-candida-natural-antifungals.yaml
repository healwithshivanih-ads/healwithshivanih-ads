slug: murray-candida-natural-antifungals
statement: 'Four natural antifungals with the strongest profile for chronic candidiasis
  are: berberine-containing botanicals (goldenseal, barberry, Oregon grape) at 25
  to 50 mg berberine three times per day; garlic providing at least 10 mg allicin
  (or 4,000 mg total allicin potential, ~1 fresh clove) daily; enteric-coated oregano
  volatile oil at 0.2 to 0.4 ml twice per day between meals (>100x more potent than
  caprylic acid in vitro); and propolis at 100 to 500 mg three times per day. Start
  low and titrate over a month to minimize Herxheimer die-off; precede by two weeks
  of anti-candida diet and liver support.'
