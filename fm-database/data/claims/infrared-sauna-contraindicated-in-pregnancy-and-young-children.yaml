  location: How to Make an Infrared Sauna Lamp — Protocol
  quote: If you are pregnant, you should avoid near infrared lamps as the infrared
    energy can harm the developing baby. Children under five should also avoid near
    infrared lamps and saunas, as their bodies do not yet sweat well, and they can
    quickly become dehydrated and ill from heat exposure.
