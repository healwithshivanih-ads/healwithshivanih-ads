slug: dose-enzymes-and-bile-by-response
statement: Digestive enzymes and supplemental bile should be dosed by symptom response
  rather than lab testing, at the minimum dose for the minimum time — excess bile
  can itself cause diarrhoea, so more is not better.
evidence_tier: plausible_emerging
rationale: Enzyme evidence is stronger than for HCl but mostly from documented deficiency
  populations.
coaching_translation: Judge digestive enzymes by whether symptoms improve — use the
  least you need, for the shortest time.
