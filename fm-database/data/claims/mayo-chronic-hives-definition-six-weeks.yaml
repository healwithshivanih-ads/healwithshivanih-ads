slug: mayo-chronic-hives-definition-six-weeks
statement: Hives lasting longer than six weeks define chronic urticaria; unlike acute
  hives, an identifiable trigger is found in only a minority of cases, and conventional
  workup focuses on screening for autoimmune thyroid disease and ruling out physical
  triggers (pressure, cold, heat, exercise, sunlight).
