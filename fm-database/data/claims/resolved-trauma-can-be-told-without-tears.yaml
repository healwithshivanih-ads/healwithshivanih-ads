  location: Podcast — Resolved vs unresolved trauma
  quote: Resolved trauma is digested trauma. You tell that story without tears, without
    an angst that comes up. You tell your story for one purpose — to track what you
    made up about it, where it lies in your body, and what the adaptive behaviour
    response was that you created.
