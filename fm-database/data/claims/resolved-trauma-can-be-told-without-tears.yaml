slug: resolved-trauma-can-be-told-without-tears
statement: A resolved trauma is one that can be told as a story without tears, without
  somatic contraction, and without lingering anger or fear — characterised by integration
  ("yes, that happened, and here is what I learned and how I grew"). Unresolved trauma
  remains "undigested" and produces sustained physiological cost, autoimmune contributions,
  and persistent emotional reactivity. The story is told for the purpose of tracking
  the meaning that was made, where it lives in the body, and the adaptive behaviours
  that originated from it — not to wallow in it.
evidence_tier: plausible_emerging
