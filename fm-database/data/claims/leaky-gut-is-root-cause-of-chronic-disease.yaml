slug: leaky-gut-is-root-cause-of-chronic-disease
statement: Increased intestinal permeability (leaky gut) is a root cause mechanism
  underlying the majority of chronic systemic diseases.
evidence_tier: plausible_emerging
rationale: Supported by Fasano's mechanistic work and >20,000 published articles linking
  intestinal permeability to chronic conditions. Consensus is strong for celiac and
  some autoimmune diseases; broader claims for 'majority of chronic disease' are plausible
  but overreaching for current peer-reviewed consensus.
coaching_translation: Many chronic health problems may have their roots in a compromised
  gut lining. Supporting gut barrier health is a foundational strategy in functional
  medicine.
caveats:
- The claim that leaky gut is the root cause of 'majority' of chronic diseases is
  an expert opinion and not uniformly established across all disease categories.
- Source is expert lecture (moderate quality); individual disease-leaky gut associations
  vary in evidence strength.
