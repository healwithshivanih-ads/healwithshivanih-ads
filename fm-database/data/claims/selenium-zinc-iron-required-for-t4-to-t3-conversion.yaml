slug: selenium-zinc-iron-required-for-t4-to-t3-conversion
statement: Selenium, zinc, and iron are required cofactors for T4→T3 conversion and
  thyroid hormone synthesis.
evidence_tier: strong
rationale: Deiodinase enzymes are selenoproteins (selenium-dependent). Zinc and iron
  are cofactors in thyroid hormone synthesis and receptor function. Deficiency of
  any impairs conversion. Iron deficiency in particular is commonly missed as a thyroid
  issue.
coaching_translation: Focus nutrition on selenium-rich foods (Brazil nuts — 2–3/day),
  zinc-rich foods (pumpkin seeds, lentils), and iron-rich foods, especially for women
  with hair loss and fatigue.
caveats:
- Supplementation beyond dietary sources should be guided by a clinician, particularly
  for iron.
