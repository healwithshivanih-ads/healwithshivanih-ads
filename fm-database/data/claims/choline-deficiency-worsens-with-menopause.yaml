slug: choline-deficiency-worsens-with-menopause
statement: Postmenopausal women face substantially higher choline requirements than
  premenopausal women because the oestrogen-driven upregulation of PEMT that previously
  compensated for low dietary choline is lost; this increases risk of fatty liver,
  muscle damage, and cognitive decline if diet is not adjusted.
evidence_tier: plausible_emerging
rationale: This claim follows directly from the oestrogen/PEMT mechanism and is supported
  by published research on sex-stratified choline requirements. Specific dosing (900
  mg in pregnancy) cited by Lynch should be confirmed with a clinician.
out_of_scope_notes: Specific choline dosing recommendations during pregnancy and breastfeeding
  require clinician oversight.
caveats:
- Source is a consumer trade book
- Confirm dosing with clinician, especially in pregnancy
