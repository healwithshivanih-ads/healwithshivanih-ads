  location: Chapter 11 — Who Is Most at Risk for Choline Deficiency?
  quote: Postmenopausal women. High levels of estrogen trigger a clean PEMT to make
    phosphatidylcholine—but after menopause, estrogen levels drop. Even if you were
    born with a clean PEMT, menopause could make it dirty—unless you get enough choline
    in your diet.
