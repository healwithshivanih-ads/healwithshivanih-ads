slug: candida-comprehensive-approach-superior
statement: A comprehensive approach addressing all predisposing factors is more effective
  than simply killing yeast with antifungal agents; if symptoms persist after Candida
  eradication is confirmed, other conditions (SIBO, pancreatic insufficiency) should
  be considered.
evidence_tier: fm_specific_thin
rationale: This is a foundational naturopathic clinical principle supported by clinical
  experience; limited RCT evidence exists for the comprehensive protocol vs monotherapy.
coaching_translation: Treating candida overgrowth requires a full-system approach
  — diet, gut healing, immune support, and liver detox — not just antifungal supplements
  alone.
caveats:
- FM-specific principle with thin peer-reviewed RCT support
