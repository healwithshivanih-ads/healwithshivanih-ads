slug: probiotics-restore-gut-flora-after-antibiotics
statement: Probiotics in supplement or food form are often needed to help reestablish
  balanced gut flora after antibiotic use, which kills both beneficial and harmful
  bacteria.
evidence_tier: strong
rationale: Multiple RCTs support probiotic use for prevention of antibiotic-associated
  diarrhea and microbiome restoration. Strong consensus exists.
coaching_translation: If you've taken antibiotics, replenishing your gut bacteria
  with fermented foods (yogurt, kefir, kimchi) or a probiotic supplement is a well-supported
  strategy.
