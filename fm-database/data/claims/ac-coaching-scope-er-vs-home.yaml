slug: ac-coaching-scope-er-vs-home
statement: For activated charcoal in any acute poisoning scenario, coach role is strictly
  REFER — Poison Control Center (US 1-800-222-1222 / India equivalent) or ER 911/102,
  immediately. Home use of AC is only reasonable when (a) specifically directed by
  Poison Control for a documented benign ingestion, or (b) for minor digestive gas
  at standard OTC dosing. Strongly discourage AC for hangover prevention (no evidence),
  routine "detox cleanses" (nutrient and medication depletion), and celiac accidental
  exposure (worsens malabsorption).
evidence_tier: strong
rationale: Reflects AACT scope-of-practice and FM coaching scope. Coach role is education
  + appropriate referral, not acute toxicology management.
coaching_translation: For any real poisoning suspicion, call Poison Control or 911.
  Never administer charcoal at home unless they tell you to. The only safe home uses
  are occasional gas/bloating capsules and the dental-amalgam-removal protocol. Discourage
  hangover use, detox cleanses, and celiac use entirely.
caveats:
- Save Poison Control numbers in client phones during intake.
- For Indian clients, equivalent is the National Poisons Information Centre at AIIMS
  — 011-26593677/26589391.
- Coach should explicitly debunk the hangover, gluten, and "daily detox" misconceptions
  when AC comes up.
