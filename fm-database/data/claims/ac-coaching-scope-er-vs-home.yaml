  quote: Patients must be referred to emergency services immediately for any toxic
    ingestion, suicidal attempt, or if the patient exhibits seizures or loss of consciousness.
    Home use is reasonable only for minor digestive issues using standard OTC dosing,
    or for acute poisoning only if instructed by a Poison Control Center.
