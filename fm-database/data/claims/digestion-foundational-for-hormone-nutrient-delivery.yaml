slug: digestion-foundational-for-hormone-nutrient-delivery
statement: Adequate digestion — including sufficient stomach acid, pancreatic enzymes,
  and bowel transit — is the foundational prerequisite for delivering nutritional
  cofactors to hormone receptors; hormone therapy or supplementation cannot succeed
  without it.
evidence_tier: plausible_emerging
rationale: The principle that nutrient absorption depends on digestive sufficiency
  is well-established. The specific link to hormone receptor cofactor delivery is
  a logical extension consistent with the nutritional mechanisms described, though
  not tested in a dedicated RCT.
coaching_translation: You are what you digest, not just what you eat. Even the best
  diet or supplement plan won't help your hormones if your gut isn't absorbing nutrients
  properly. Supporting digestion is the first step.
