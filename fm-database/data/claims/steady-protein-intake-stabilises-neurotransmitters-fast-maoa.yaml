slug: steady-protein-intake-stabilises-neurotransmitters-fast-maoa
statement: Distributing moderate protein intake across all meals—rather than skipping
  breakfast or relying on simple carbohydrates—helps stabilise serotonin, dopamine,
  and norepinephrine levels in people with fast MAOA, reducing mood swings, carb cravings,
  and sleep disruption.
evidence_tier: plausible_emerging
rationale: Protein distribution effects on appetite, glycaemia, and neurotransmitter
  precursor availability have reasonable mechanistic and epidemiological support;
  the specific MAOA-SNP context is Lynch's clinical application.
coaching_translation: Encourage clients to start the day with a protein-containing
  breakfast (eggs, fish, poultry) and include protein with each subsequent meal, rather
  than relying on simple carbs alone. This is a central lifestyle prescription for
  MAOA support.
caveats:
- Source is a consumer trade book
- RCT evidence specifically in MAOA-variant populations is lacking
