slug: progesterone-slows-gut-motility-and-its-decline-alters-transit
statement: Progesterone slows gut motility; when progesterone declines in perimenopause,
  transit time changes and women may experience new-onset constipation or altered
  bowel patterns.
evidence_tier: plausible_emerging
rationale: Single-expert source. Progesterone's effect on smooth muscle is well-documented
  pharmacologically; its role in gut transit in natural menopause transition is plausible
  but not robustly RCT-confirmed.
coaching_translation: Progesterone naturally slows how quickly food moves through
  your digestive system. When it drops in perimenopause, your gut 'speed' can shift,
  sometimes causing new constipation.
caveats:
- Single-expert source; mechanism is pharmacologically plausible but evidence in natural
  perimenopause transition is emerging.
