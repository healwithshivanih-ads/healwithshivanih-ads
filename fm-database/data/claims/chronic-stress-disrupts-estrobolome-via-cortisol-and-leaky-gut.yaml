slug: chronic-stress-disrupts-estrobolome-via-cortisol-and-leaky-gut
statement: Chronic psychological stress elevates cortisol, which can increase intestinal
  permeability ('leaky gut') and negatively impact the health of the estrobolome.
evidence_tier: plausible_emerging
rationale: Stress-induced gut permeability changes via cortisol and HPA-axis dysregulation
  are mechanistically supported. The direct link to estrobolome disruption specifically
  is a logical extension but not independently RCT-validated. Single-expert source.
coaching_translation: When you're chronically stressed, your gut lining can become
  more permeable and the estrogen-processing bacteria can be disrupted — it's not
  just a mental health issue, it's a gut issue too.
caveats:
- Single-expert source.
- Causal chain from stress to estrobolome disruption is inferred, not directly measured.
