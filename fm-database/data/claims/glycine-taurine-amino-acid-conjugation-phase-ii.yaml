slug: glycine-taurine-amino-acid-conjugation-phase-ii
statement: Glycine, taurine, glutamine, N-acetylcysteine, cysteine, and methionine
  are key amino acid nutrients required for Phase II amino acid conjugation and methylation
  detoxification reactions.
evidence_tier: strong
rationale: The role of these amino acids as direct substrates and cofactors in Phase
  II conjugation pathways (sulfation, methylation, amino acid conjugation, glutathione
  synthesis) is well-established in biochemical and pharmacological literature.
coaching_translation: Specific amino acids from dietary protein are the raw materials
  your liver uses in the second stage of detox (Phase II) to neutralize and package
  toxins for removal.
