  location: minute 1:30 — sleep duration and timing for egg quality
  quote: The ideal length of time to sleep is eight hours. Our bodies are pre conditioned
    to go to sleep when the sun goes down. Ideally you're getting in bed 9:30 10 o'clock
    and starting to wind down.
rationale: Translates Fett's melatonin-antioxidant claim into a no-cost lifestyle
