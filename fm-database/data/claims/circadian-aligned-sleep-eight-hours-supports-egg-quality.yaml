slug: circadian-aligned-sleep-eight-hours-supports-egg-quality
statement: Sleep matters not just in duration (target 8 hours, minimum 7) but in timing
  — falling asleep between 9:30 pm and 11 pm aligns with natural circadian melatonin
  release, which exerts an antioxidant effect on developing oocytes. Late bedtimes,
  night-shift work, and irregular sleep disrupt the hormonal cascade that supports
  ovulation and egg maturation. This is a lifestyle lever distinct from melatonin
  supplementation.
evidence_tier: plausible_emerging
