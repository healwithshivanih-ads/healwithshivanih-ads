slug: each-gut-diet-is-a-two-week-experiment
statement: Each gut-healing diet is a two-to-three-week experiment — if it works you
  usually notice within about two weeks; if a roughly 80%-adherent protocol doesn't
  help, the problem is not the diet and you should move to non-dietary steps rather
  than getting stricter.
evidence_tier: plausible_emerging
rationale: Ruscio's responders-vs-non-responders framing.
coaching_translation: Give a diet change about two weeks; if it's clearly not helping,
  the answer usually isn't 'be even stricter'.
