slug: phthalates-disrupt-ovarian-follicle-growth
statement: Phthalates (DEHP, MEHP and related, found in soft plastics, vinyl, fragrances,
  nail polish, conventional cleaning products) suppress estrogen production by ovarian
  follicle cells, reduce follicle growth, and drive oxidative stress in developing
  eggs. Biologically active phthalates are detectable in 95% of pregnant women. Higher
  exposure is associated with endometriosis (~2x rate) and increased miscarriage risk.
evidence_tier: plausible_emerging
