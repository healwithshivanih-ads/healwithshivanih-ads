  quote: Even at low doses, phthalate exposure suppressed the production of estrogen
    by the follicle cells, which would be expected to suppress follicle growth. Phthalates
    may weaken eggs natural antioxidant defense systems.
rationale: Anchor claim for phthalate avoidance in preconception coaching.
