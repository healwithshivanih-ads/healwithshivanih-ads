slug: fish-consumption-twice-weekly-heart-health
statement: The American Heart Association recommends eating fish at least two times
  per week as part of a healthy diet, given its association with lower risk of heart
  attacks, strokes, and death from heart disease.
evidence_tier: strong
rationale: AHA guideline recommendation backed by extensive epidemiological and RCT
  data on omega-3 fatty acids and cardiovascular outcomes.
coaching_translation: Eating fatty fish like salmon, sardines, or mackerel twice a
  week is one of the best evidence-based dietary habits for heart health.
caveats:
- Choose low-mercury species (salmon, sardines, herring, trout) to balance benefits
  and risks.
