slug: st-johns-wort-effective-for-mild-moderate-depression
statement: Standardised St. John's Wort extract (300 mg three times daily of 0.3%
  hypericin or 3-5% hyperforin) is as effective as SSRIs for mild-to-moderate depression
  with fewer side effects — but has major CYP3A4-induction drug interactions and is
  contraindicated with SSRIs, MAOIs, oral contraceptives, warfarin, antiretrovirals,
  and immunosuppressants.
evidence_tier: strong
rationale: Multiple meta-analyses (Cochrane, Linde) of dozens of RCTs support SJW
  vs SSRI equivalence in mild-moderate depression. Drug interaction profile via CYP3A4
  induction and P-glycoprotein modulation is well-characterised.
coaching_translation: St. John's Wort works as well as antidepressants for mild and
  moderate depression — but only if you're not on any medications it interacts with.
  Make a complete list of every drug and supplement before starting it.
caveats:
- NEVER combine with SSRIs, SNRIs, MAOIs (serotonin syndrome).
- Reduces oral contraceptive effectiveness; warn about pregnancy risk.
- Affects metabolism of warfarin, cyclosporine, tacrolimus, ARVs, chemo — coordinate
  with prescriber.
- Most useful in patients >50 according to Pizzorno's framework.
