slug: dhea-is-precursor-to-sex-hormones
statement: DHEA serves as a precursor to testosterone and estrogen and supports immune
  resistance, bone density, cholesterol, and body composition.
evidence_tier: plausible_emerging
rationale: DHEA as a steroid precursor is established biochemistry. Its downstream
  benefits (immune, bone, lipids, muscle) are plausible and supported by observational
  studies, though RCT evidence for supplementation is mixed.
coaching_translation: DHEA is a foundational hormone that the body uses to make testosterone
  and estrogen, protect bones and muscles, and fight infection.
caveats:
- DHEA supplementation is out of coaching scope; clinician oversight required.
- Source is expert consensus toolkit.
