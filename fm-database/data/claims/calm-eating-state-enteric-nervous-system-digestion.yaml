slug: calm-eating-state-enteric-nervous-system-digestion
statement: 'Eating in a calm, undistracted state is as important as what is eaten: the enteric nervous
  system comprises roughly a third of the entire nervous system, and stress-state eating suppresses digestive
  organ function, impairing nutrient absorption regardless of diet quality.'
evidence_tier: strong
rationale: The enteric nervous system (ENS) containing ~100–500 million neurons is well-established; parasympathetic
  activation for 'rest and digest' vs. sympathetic suppression of digestive function is conventional physiology.
  Welch applies it to the practical context of eating environment.
coaching_translation: Eating while stressed, distracted, driving, or in an argument means your digestive
  system is physiologically shut down. Even a perfect diet delivers fewer nutrients if the nervous system
  is in fight-or-flight mode while eating. A calm eating environment is a clinical intervention, not just
  a nicety.
out_of_scope_notes: ''
caveats:
- The exact fraction 'one third' for ENS proportion is a simplification; the mechanistic point (parasympathetic
  suppression of digestion) is well-established.
