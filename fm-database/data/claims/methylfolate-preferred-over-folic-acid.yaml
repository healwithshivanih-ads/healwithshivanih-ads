slug: methylfolate-preferred-over-folic-acid
statement: Synthetic folic acid in processed foods and supplements may impair gene
  function (particularly MTHFR-dependent methylation), while methylfolate and folinic
  acid are the biologically active forms that support methylation without this risk.
evidence_tier: plausible_emerging
rationale: MTHFR variants reduce conversion of synthetic folic acid to 5-methyltetrahydrofolate.
  Unmetabolized folic acid (UMFA) may competitively inhibit folate receptors and is
  associated with masking of B12 deficiency. Active folate forms bypass MTHFR and
  are directly usable. Source is a consumer trade book; specific RCT citations not
  provided.
coaching_translation: Check your multivitamin label for 'methylfolate' or '5-MTHF'
  instead of 'folic acid'. Avoid fortified processed foods (bread, cereal, pasta)
  that contain synthetic folic acid.
caveats:
- Source is consumer trade book, not primary literature
- MTHFR SNP effect sizes are modest at population level
- Methylfolate dosing requires clinician guidance
