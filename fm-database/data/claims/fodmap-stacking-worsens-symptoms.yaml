slug: fodmap-stacking-worsens-symptoms
statement: Combining multiple moderate-FODMAP foods in one meal ('stacking') can push
  total FODMAP load above the symptom threshold even when individual foods appear
  safe.
evidence_tier: strong
rationale: Monash-based clinical guidance consistently identifies 'stacking' as a
  leading cause of persistent symptoms on Low FODMAP; total colonic FODMAP load drives
  fermentation.
coaching_translation: Even if each food seems fine on its own, eating too many moderate-FODMAP
  items in one sitting can still upset your gut. Spread them out or choose just one
  per meal.
