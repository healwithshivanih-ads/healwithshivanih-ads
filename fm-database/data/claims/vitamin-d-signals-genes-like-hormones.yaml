slug: vitamin-d-signals-genes-like-hormones
statement: Vitamin D is the only non-hormone molecule known to signal gene expression,
  and consistent daily supplementation is more effective than episodic high-dose supplementation.
evidence_tier: strong
rationale: Vitamin D receptor (VDR) as a nuclear receptor with direct gene-regulatory
  function is well established. The superiority of regular versus episodic supplementation
  for maintaining 25(OH)D levels is supported by clinical literature.
coaching_translation: Vitamin D is special — it works like a hormone and can switch
  genes on and off. Taking a smaller amount every day is more effective than taking
  a large dose occasionally.
