slug: symptom-cluster-of-hpa-dysregulation
statement: Cardinal symptom cluster of HPA-axis dysregulation as Wentz describes it
  — trouble waking despite full night sleep, chronic daytime fatigue, "wired and tired"
  feeling at night, racing mind at bedtime, post-lunch 3pm slump, brain fog, memory
  glitches, low-grade anxiety throughout the day, libido drop, and a sense of being
  overwhelmed by previously-easy tasks (a phone call from a friend feels like a burden,
  basic household tasks feel unmanageable). When this cluster appears together in
  a perimenopausal or Hashimoto's client, HPA work precedes thyroid optimisation.
