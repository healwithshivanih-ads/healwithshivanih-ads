slug: murray-cortisol-belly-fat-muscle-loss
statement: 'Chronic stress and elevated cortisol drive a metabolically destructive
  pattern: ABDOMINAL fat cell growth + MUSCLE mass loss simultaneously. This ''sarcopenic
  obesity'' phenotype produces insulin resistance, accelerated ageing, and elevated
  mortality. The mechanism: cortisol promotes lipoprotein lipase activity in visceral
  adipocytes (storing fat in belly) while simultaneously promoting muscle protein
  breakdown for gluconeogenesis. Coaching implication: cortisol normalisation through
  stress management + sleep + adaptogens is BODY-COMPOSITION work, not just psychological
  work. Belly fat that won''t budge despite diet + exercise often signals chronic
  cortisol elevation.'
evidence_tier: strong
rationale: Established endocrinology. Mechanism — cortisol receptors (GR) abundant
  in visceral fat; cortisol amplifies adipocyte differentiation + lipid uptake; concurrent
  muscle catabolism for gluconeogenesis.
coaching_translation: 'Chronic stress causes belly fat AND muscle loss at the same
  time — the worst possible body composition outcome. The mechanism: cortisol stores
  fat specifically in the belly while breaking down muscle for fuel. If a client has
  stubborn belly fat despite diet + exercise, address CORTISOL (sleep, stress management,
  adaptogens). Same person may NEED additional protein + resistance training to rebuild
  what cortisol stole.'
caveats:
- Sleep quality affects cortisol more than most realise
- Resistance training is anti-cortisol (mechanically opposing the muscle loss)
- Cortisol awakening response (CAR) testing reveals patterns
- Adaptogens + magnesium + phosphatidylserine support cortisol normalisation
