slug: sklar-unexplained-infertility-is-undertested
statement: Sklar argues that "unexplained infertility" is not a diagnosis but an admission
  that standard tests are designed to catch extreme abnormalities and miss the subtle
  functional imbalances — gut dysbiosis driving estrogen recirculation, subclinical
  thyroid patterns, silent inflammation, HPA dysregulation, undertracked menstrual
  signals — that sit just below the threshold and routinely impair conception.
