slug: movement-as-essential-nutrient-not-optional
statement: Physical movement should be classified as an essential nutrient on par
  with vitamins, minerals, and essential fatty acids. The genome assumes daily varied
  movement against gravity through full ranges of motion and treats its absence as
  a deficiency state. Removal of daily exercise from even highly conditioned individuals
  (Olympic athletes in controlled studies) within weeks produces measurable insulin
  resistance, bone density loss, depressed mood, and inflammatory upregulation — the
  absence of movement is not neutral, it is actively pathogenic. The human genome
  requires both endurance-pattern movement (walking, light cardiovascular activity
  throughout the day) and resistance-pattern movement (lifting against gravity, daily
  full-range joint mobilisation). Sedentary behaviour, especially the modern pattern
  of 8-12 hours of seated screen work, is best understood as nutritional deficiency
  of an essential input, not simply "not exercising enough".
evidence_tier: strong
