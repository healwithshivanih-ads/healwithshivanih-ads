slug: estrogen-decline-increases-inflammation-and-leaky-gut-risk
statement: Declining estrogen is associated with increased inflammation, increased
  intestinal permeability (leaky gut), and a 4–5× higher risk of developing autoimmune
  conditions in perimenopause and menopause.
evidence_tier: plausible_emerging
rationale: Single-expert synthesis. Estrogen's anti-inflammatory and gut-barrier roles
  are biologically plausible; the 4–5× autoimmune risk figure is cited without a specific
  study reference.
coaching_translation: As estrogen falls, the gut barrier becomes more permeable, inflammation
  rises, and the immune system can become dysregulated — making perimenopause a key
  window for gut-health support.
caveats:
- Single-expert source; 4–5× autoimmune risk statistic not cited to a specific study.
- Source type is expert_consensus/moderate quality — verify specific statistics with
  clinician or primary literature.
