  quote: Blood sugar balance is going to be really important. So making sure that
    you're eating throughout the day, you're eating enough food, you're eating foods
    that aren't inflammatory to you. Inflammation from foods or from even not getting
    enough food can be a signal to your body that you're not safe.
rationale: Pushes back on intermittent-fasting fad among stressed midlife women —
