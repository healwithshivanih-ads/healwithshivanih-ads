slug: elevated-alt-ast-ratio-suggests-insulin-resistance
statement: An ALT:AST ratio greater than 1, with ALT elevated and AST relatively lower,
  suggests insulin resistance and hepatic metabolic dysfunction.
evidence_tier: plausible_emerging
rationale: The document states that ALT higher than AST (ratio >1) points toward insulin
  resistance, and that GGT elevation in the upper-normal range (~47) also correlates
  with metabolic dysfunction. This is consistent with functional medicine liver biomarker
  interpretation.
coaching_translation: Liver enzymes can be an early warning sign of insulin resistance—before
  blood sugar even looks abnormal. A slightly elevated ALT compared to AST is one
  such clue that the liver may be under metabolic stress.
caveats:
- ALT:AST ratio interpretation is a functional medicine lens; conventional medicine
  uses different cut-offs for liver disease diagnosis.
- Source is expert lecture (moderate quality).
