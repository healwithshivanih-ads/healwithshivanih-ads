slug: dim-drives-phase1-and-phase2-caution
statement: DIM up-regulates BOTH phase-I and phase-II detoxification, so it can be
  the wrong choice when a client already has a fast phase-I / slow phase-II pattern
  (it accelerates the activation step that is already too fast). Sulforaphane, which
  favours NRF2-driven phase-II, is often preferable in that pattern.
evidence_tier: plausible_emerging
rationale: If a client's genetic report shows fast phase-I/slow phase-II, note that
  DIM may not suit; the choice is the clinician's.
coaching_translation: If a client's genetic report shows fast phase-I/slow phase-II,
  note that DIM may not suit; the choice is the clinician's.
out_of_scope_notes: Recommending for/against a specific supplement is a clinician
  decision — surface the consideration, don't prescribe.
