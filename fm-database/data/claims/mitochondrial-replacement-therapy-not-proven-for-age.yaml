slug: mitochondrial-replacement-therapy-not-proven-for-age
statement: Mitochondrial replacement therapy (three-parent IVF, where young-donor
  mitochondria are transferred to older eggs) is approved in the UK only for women
  with mitochondrial disease, not for age-related infertility. It is banned by the
  US FDA. Early trials largely did not show benefit for age-related egg quality. Clinicians
  treat it as experimental — last resort when all other hope has been lost.
evidence_tier: plausible_emerging
