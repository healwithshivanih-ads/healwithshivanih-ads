slug: sklar-rpl-comprehensive-workup-categories
statement: Sklar's comprehensive recurrent-miscarriage panel covers five categories
  beyond the conventional workup — blood clotting factors (Factor V Leiden, prothrombin
  G20210A, Protein C and S), autoimmune markers (antiphospholipid antibodies, ANA,
  lupus screen), genetic mutations (MTHFR C677T and A1298C, homocysteine), inflammatory
  markers (hsCRP, advanced cytokine panel, thyroid antibodies), and reproductive-tract
  microbiome with hidden infections (ureaplasma, mycoplasma, uterine microbiome).
