slug: orthostatic-tolerance-test-disambiguates-hrv
statement: An orthostatic tolerance test — measuring heart-rate and blood-pressure
  response on going from supine or seated to standing — disambiguates ventral vagal
  dominance from dorsal vagal shutdown before interpreting an HRV reading. Normal
  — heart rate rises modestly and blood pressure climbs. POTS — heart rate spikes
  (vagal brake releases too abruptly). Dorsal vagal dominance — heart rate fails to
  rise or drops, and blood pressure does not climb (cerebral perfusion at risk). For
  clients in the third pattern, a high HRV number does not indicate health.
evidence_tier: plausible_emerging
