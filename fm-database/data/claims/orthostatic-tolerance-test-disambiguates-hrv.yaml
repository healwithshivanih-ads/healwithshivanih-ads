sources:
- id: koppelman-polyvagal-energy-blueprint-podcast-2026
  location: Podcast — Orthostatic tolerance and HRV interpretation
  quote: If you stand up and your heart rate doesn't go up, maybe even it goes down,
    and your blood pressure doesn't go up — that is a sign that the dorsal vagal survival
    shutdown part of the vagus nerve is too active. If someone is in that camp, then
    I would question the interpretation of a higher HRV meaning that they are healthier.
