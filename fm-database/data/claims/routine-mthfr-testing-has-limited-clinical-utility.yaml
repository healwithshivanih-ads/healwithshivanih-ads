slug: routine-mthfr-testing-has-limited-clinical-utility
statement: Routine MTHFR genetic testing is considered to have limited clinical utility
  for cardiovascular disease risk, thrombophilia evaluation, recurrent pregnancy loss
  workups, and general health screening by major clinical guidelines.
evidence_tier: strong
rationale: The document reflects consensus guideline positions on MTHFR testing, noting
  that common variants are widespread and often do not change medical management by
  themselves. This is consistent with published guidance from organisations such as
  ACMG and AHA.
coaching_translation: Getting an MTHFR gene test doesn't necessarily tell your doctor
  what to do differently. Functional markers like homocysteine are often more clinically
  useful.
out_of_scope_notes: Whether to order MTHFR genetic testing is a clinical decision.
  Coaches should not recommend or interpret genetic tests.
caveats:
- Source is an LLM synthesis; specific guidelines are not named. Evidence tier set
  to strong as this reflects documented guideline consensus, though specific guideline
  citations should be verified.
- Some research suggests MTHFR status may be relevant in selected contexts such as
  treatment-resistant depression, elevated homocysteine, or 677TT-specific hypertension
  — the controversy is around routine utility, not biological relevance.
