slug: zinc-copper-selenium-cofactors-t4-t3-conversion
statement: Zinc, copper, and selenium are required cofactors for the iodothyronine
  deiodinase enzymes that convert T4 to T3 in peripheral cells; deficiency in any
  of them lowers cellular T3 activity even when serum T4 and TSH are normal.
evidence_tier: strong
rationale: Deiodinase enzymes are selenoproteins requiring selenocysteine; zinc is
  also a cofactor for thyroid hormone receptor binding. Pizzorno cites that Zn supplementation
  restores normal thyroid function in Zn-deficient patients with normal serum T4.
coaching_translation: Even when your blood thyroid numbers look fine, low zinc, copper,
  or selenium can stop your cells from turning T4 (the storage form) into T3 (the
  active form) — leaving you feeling hypothyroid despite "normal" labs.
caveats:
- Zinc and copper compete for absorption; supplement them in 10:1 ratio (Zn:Cu) to
  avoid copper deficiency.
- Selenium above 400 mcg/day chronically risks selenosis.
