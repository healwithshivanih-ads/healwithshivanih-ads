slug: b6-b2-support-folate-cycle-and-homocysteine
statement: Vitamins B6 and B2 (riboflavin) are essential cofactors in the folate cycle
  and homocysteine metabolism, with B6 supporting the transsulfuration pathway to
  glutathione and B2 supporting MTHFR enzyme function.
evidence_tier: plausible_emerging
rationale: B6 as a cofactor for cystathionine beta-synthase (transsulfuration) and
  B2 as a cofactor for MTHFR are established in biochemistry. The document clearly
  states these roles.
coaching_translation: A complete B-complex approach — including B2 and B6 alongside
  methylfolate and B12 — provides more comprehensive support for methylation and homocysteine
  management than B12/folate alone.
caveats:
- High-dose B6 (>200mg/day long-term) carries neuropathy risk — doses above standard
  RDA should involve clinician oversight.
- Source is expert lecture, not primary clinical trial evidence.
