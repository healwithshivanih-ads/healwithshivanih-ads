slug: chronic-stress-pattern-linked-to-high-cortisol-and-low-dhea
statement: Chronic stress from fear or overwhelm is described as producing persistent
  HPA activation with increased cortisol and decreased DHEA.
evidence_tier: fm_specific_thin
rationale: The cortisol:DHEA ratio shift under chronic stress is a functional medicine
  framing with plausible mechanistic basis; thin primary evidence at coaching level.
  Source is expert consensus without primary citations.
coaching_translation: Clients with burnout, overwhelm, and low resilience may benefit
  from adrenal-support nutrition (B5, vitamin C, magnesium) and stress-reduction practices.
caveats:
