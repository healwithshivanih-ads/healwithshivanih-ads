slug: kiwi-fruit-clinically-proven-constipation
statement: One kiwi fruit per day is clinically proven to improve stool frequency
  in constipation and is low FODMAP approved at one piece.
evidence_tier: strong
rationale: The document states 'This is clinically proven for constipation and Low
  FODMAP approved in 1 piece.' This aligns with published RCTs showing kiwi fruit
  improves bowel frequency, attributable to actinidin enzyme and soluble fiber.
coaching_translation: One kiwi a day is an easy, evidence-backed way to improve bowel
  regularity — and it's safe on the low FODMAP diet.
caveats:
- Source document does not cite specific trials — evidence classification based on
  known literature (e.g., Eady et al., 2019)
- Limit to 1 kiwi to stay within low FODMAP serving
