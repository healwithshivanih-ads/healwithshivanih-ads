slug: 95pc-hypothyroidism-is-hashimotos
statement: Approximately 95% of hypothyroidism is autoimmune Hashimoto's, with only
  the remaining 5-10% caused by over-exercise/under-eating, certain medications, or
  radiation/chemotherapy. This makes a TPO + TGab antibody screen mandatory for any
  client with hypothyroid symptoms — running only TSH and free T4 (the conventional
  default) misses the underlying autoimmunity that needs lifestyle intervention.
