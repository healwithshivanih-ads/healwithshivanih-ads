slug: scope-coach-executes-food-plans-does-not-prescribe
statement: With food plans, the coach does not prescribe. Either the client expresses
  interest (e.g. fasting, ketogenic) or the clinician prescribes specifics (e.g. cardiometabolic
  plan at 1400 kcal); the coach then executes using ready-made plans whose serving
  sizes and macronutrient distribution were already designed by nutrition professionals.
evidence_tier: plausible_emerging
rationale: 'Clarifies the nutrition-counselling boundary: the coach''s job is deeper
  questioning, education, and supporting the client''s felt experience of the plan
  — not designing the diet.'
coaching_translation: Respond to the client's desire or the clinician's prescription
  with curious questions — 'What inspired this? Where do you want to start? How do
  you feel when you do it?' — and hand over the pre-built plan and companion guides
  rather than creating one.
out_of_scope_notes: Designing an individualised therapeutic diet or macronutrient
  prescription is registered-dietitian / clinician work; the coach executes and supports,
  not prescribes.
caveats:
- The coach still needs to teach the client how to read and navigate the provided
  food-plan sheets.
