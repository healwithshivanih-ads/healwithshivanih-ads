slug: sibo-correlates-with-ra-severity
statement: Approximately 51% of RA patients have small intestinal bacterial overgrowth
  (SIBO); the degree of SIBO correlates with severity of RA symptoms and disease activity.
evidence_tier: plausible_emerging
rationale: Pizzorno cites multiple studies linking dysbiosis (less bifidobacteria,
  less Bacteroides-Porphyromonas-Prevotella), SIBO prevalence, and disease activity
  in RA. Mechanistic link via endotoxin translocation, immune complex formation, and
  synovial deposition is well-supported.
coaching_translation: Half of RA patients have small intestinal bacterial overgrowth
  — and the more they have, the worse their joints. Gut-healing is part of the RA
  protocol, not optional.
caveats:
- Hydrogen-methane breath test confirms SIBO.
- Address with elimination diet, probiotics, antimicrobials (under clinician), then
  5R.
- Periodontal disease is also part of total pathogen burden — treat oral health too.
