slug: lpa-independent-genetic-cvd-risk-factor
statement: Lp(a) is a small, dense, highly inflammatory lipoprotein whose level is
  strongly influenced by genetics and is an independent risk factor for heart disease.
evidence_tier: strong
rationale: Lp(a) is recognized as an independent, largely genetically determined CVD
  risk factor by major cardiology guidelines. Its inflammatory and pro-thrombotic
  properties are well-established.
coaching_translation: Lp(a) is largely genetic and cannot be changed through lifestyle
  alone — clients with high levels need close medical monitoring.
out_of_scope_notes: Lp(a) lab interpretation and pharmacological management are clinician
  scope.
