slug: vitex-reduces-pms-symptoms-via-progesterone-support
statement: Vitex agnus-castus (chaste tree, 175-225 mg/day of 4:1 extract) is a first-line
  botanical for PMS — works upstream via pituitary dopaminergic D2-receptor modulation
  to lower prolactin and increase luteinizing hormone, supporting luteal-phase progesterone.
  Effect builds over 2-3 cycles.
evidence_tier: strong
rationale: Multiple Phase II/III RCTs of standardised Vitex extract (Femaprin, Agnolyt)
  demonstrate 40-50% symptom reduction in PMS. Pizzorno frames Vitex as the primary
  supplement for PMS via the hormone-balance axis. Take in the morning to avoid sleep
  interference (dopaminergic effects can be activating).
coaching_translation: Vitex (chaste tree) at 175-225 mg of standardised extract daily,
  taken in the morning, builds up over 2-3 cycles and is the most evidence-supported
  single herb for PMS. Helps mood, breast tenderness, and bloating.
caveats:
- Allow 2-3 full cycles before assessing response.
- Take in the morning — can be activating.
- Avoid in pregnancy; caution with dopaminergic medications and oral contraceptives.
- Combine with B6 and Mg for synergistic effect.
