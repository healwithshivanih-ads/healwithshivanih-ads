sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 29 — Bronchitis and Pneumonia, pg 586-587
  quote: Detailed analyses of 39 trials suggest that oral NAC reduces the risk of
    exacerbation (severe worsening) and improves symptoms in patients with chronic
    bronchitis, compared with a placebo.
