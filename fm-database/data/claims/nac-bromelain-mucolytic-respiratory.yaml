slug: nac-bromelain-mucolytic-respiratory
statement: NAC (N-acetylcysteine) 200 mg three times daily thins respiratory mucus
  by splitting mucoprotein disulfide bonds AND raises glutathione (the lung's main
  antioxidant). Reduces bronchitis exacerbation risk and improves symptoms in 39-trial
  meta-analysis. Bromelain 500 to 750 mg three times daily between meals adds anti-inflammatory
  and antibiotic- absorption-enhancing effects. Coach uses both as natural mucolytic
  adjuncts in any productive cough.
evidence_tier: strong
linked_to_topics:
- bronchitis-and-pneumonia
