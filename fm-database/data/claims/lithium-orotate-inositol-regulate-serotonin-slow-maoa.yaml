slug: lithium-orotate-inositol-regulate-serotonin-slow-maoa
statement: For a slow MAOA, low-dose lithium orotate (~5 mg) is suggested to calm
  excess serotonin activity; inositol acts in the opposite direction, so the one that
  helps is chosen by response.
evidence_tier: fm_specific_thin
rationale: Low-dose orotate and inositol for mood are used in functional practice
  with limited trial evidence; opposing effects framing is the author's.
coaching_translation: When serotonin runs high and irritable, a tiny dose of lithium
  orotate may calm it — but this is a practitioner call.
out_of_scope_notes: Lithium (even orotate) dosing is confirm_with_clinician.
caveats:
- Source is a consumer trade book (Ben Lynch, Dirty Genes), not primary literature.
