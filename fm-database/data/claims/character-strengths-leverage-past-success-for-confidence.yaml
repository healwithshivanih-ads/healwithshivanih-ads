slug: character-strengths-leverage-past-success-for-confidence
statement: Drawing on a client's character strengths and past successes — asking 'tell
  me about a time you made a hard choice' — can rebuild confidence in clients who
  have previously failed and are hesitant to try again.
evidence_tier: plausible_emerging
rationale: Character strengths work (VIA framework, positive psychology) has emerging
  evidence for supporting behavior change and resilience. The specific application
  to ambivalence recovery from past failure is clinically plausible but not deeply
  RCT-tested in FM coaching contexts.
coaching_translation: When a client has tried and failed before, ground them in what
  they already know about themselves. 'What did you learn about yourself during that
  time that you might apply now?'
caveats:
- Discussed as a coaching strategy in group; no specific study cited.
- Source is an expert consensus coaching call, not primary literature.
