slug: topical-niacinamide-superior-to-clindamycin-for-inflammatory-acne
statement: Topical 4% nicotinamide gel inhibits lysosomal enzymes, vasoactive amines,
  and P. acnes lipase activity — superior to 1% clindamycin gel for moderate inflammatory
  acne, with no bacterial resistance development.
evidence_tier: strong
rationale: Shalita 1995 trial showing nicotinamide gel vs clindamycin equivalence/superiority
  for inflammatory lesions. Mechanism — anti-inflammatory via cytokine modulation;
  does not generate resistance unlike topical antibiotics.
coaching_translation: For inflammatory acne, topical niacinamide 4% works as well
  or better than the standard antibiotic gel (clindamycin) — and doesn't breed resistant
  bacteria. Great option to reach for first.
caveats:
- Niacinamide not the same as niacin — niacinamide is non-flushing.
- Build over 8-12 weeks.
- Pair with retinoid or azelaic acid for keratolytic effect.
