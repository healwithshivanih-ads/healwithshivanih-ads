slug: low-salicylate-feingold-diet-hyperactivity
statement: The Feingold diet (low-salicylate, free of artificial colours, flavours,
  and preservatives) produced clinically meaningful improvement in hyperactivity for
  45 percent of autistic children in the Matthews 2024 survey — a response rate substantially
  higher than most interventions in the comparison set. Mechanism likely involves
  both removal of additives (which are recognised triggers in ADHD per multiple studies)
  and reduced demand on sulfation pathways, which are typically deficient in autism
  due to pathogenic microbe load depleting sulfate. Salicylate-rich foods include
  berries, grapes, tomatoes, mint, honey, and many spices, alongside aspirin and additives.
evidence_tier: plausible_emerging
