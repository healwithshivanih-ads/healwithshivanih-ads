slug: gut-is-plausible-root-of-systemic-symptoms
statement: The gut is a plausible root cause of far-reaching non-digestive symptoms
  — mood, energy, thyroid, skin, sleep and weight — so 'start with the gut' before
  chasing hormone, adrenal or toxicity labels.
evidence_tier: plausible_emerging
rationale: Central thesis of the book, supported by multiple mechanistic and clinical
  lines rather than one trial.
coaching_translation: So many problems that look like a hormone or thyroid issue actually
  start in the gut — it's the smartest place to begin.
