slug: statins-deplete-coq10-magnesium-thiamine
statement: Statin medications deplete CoQ10, and loop diuretics deplete magnesium
  and thiamine (B1) — nutrient depletion from medications should be systematically
  addressed.
evidence_tier: plausible_emerging
rationale: Statin-induced CoQ10 depletion is biologically plausible (statins inhibit
  mevalonate pathway which produces CoQ10) and clinically studied, though evidence
  for clinical benefit of supplementation is mixed. Loop diuretic-induced magnesium/thiamine
  loss is well-established.
coaching_translation: Certain medications can drain important nutrients from your
  body. If you're on a statin, CoQ10 is worth discussing with your doctor. If you're
  on a water pill, magnesium and B1 may also need monitoring.
out_of_scope_notes: Nutrient repletion dosing in the context of pharmaceutical use
  should involve clinician oversight.
caveats:
- RCT evidence for clinical benefit of CoQ10 supplementation in statin users is inconsistent.
- Source is expert consensus lecture — not a systematic review.
