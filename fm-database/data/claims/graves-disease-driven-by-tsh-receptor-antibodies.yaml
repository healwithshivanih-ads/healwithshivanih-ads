slug: graves-disease-driven-by-tsh-receptor-antibodies
statement: Graves' disease hyperthyroidism is driven by stimulating autoantibodies
  (TSI/TRAb) that bind the TSH receptor and chronically activate thyroid hormone synthesis,
  independent of pituitary feedback.
evidence_tier: strong
rationale: Pizzorno & Murray describe TSI binding to the TSH receptor as the proximate
  mechanism of Graves'; this is consistent with well-established immunology and endocrinology
  literature.
coaching_translation: In Graves' disease, your immune system makes antibodies that
  act like a stuck "on" switch for your thyroid — they keep telling it to make hormone
  even when your pituitary is shouting "stop."
caveats:
- A subset of Graves' patients also have TPO/TG antibodies (overlap with Hashimoto's
  pattern).
- Postpartum thyroiditis can transiently mimic Graves' before resolving.
