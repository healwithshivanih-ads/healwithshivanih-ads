slug: omega-3-anti-inflammatory-dietary
statement: Omega-3 fatty acids from fatty fish, seeds, and nuts are particularly important
  anti-inflammatory dietary components.
evidence_tier: strong
rationale: Well-established evidence base for omega-3 fatty acids (EPA/DHA) reducing
  inflammatory markers. The document identifies these as a key anti-inflammatory dietary
  component.
coaching_translation: Eating foods rich in omega-3 fats — like salmon, walnuts, and
  flaxseeds — is one of the most evidence-backed dietary strategies for reducing inflammation.
