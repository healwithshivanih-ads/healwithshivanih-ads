slug: amh-predicts-egg-number-not-quality
statement: AMH (anti-Mullerian hormone) is a marker of ovarian reserve — predicting
  how many follicles will respond to IVF stimulation — but it is NOT a marker of egg
  quality. A 47-year-old with AMH 0.6 may still have euploid eggs; a younger woman
  with high AMH may still produce poor-quality embryos. Coaches and clinicians who
  tell women with low AMH that they will never get pregnant are using AMH inappropriately.
evidence_tier: strong
