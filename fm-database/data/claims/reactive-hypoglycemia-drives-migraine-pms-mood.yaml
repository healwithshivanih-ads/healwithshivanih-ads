slug: reactive-hypoglycemia-drives-migraine-pms-mood
statement: Reactive hypoglycemia is a common precipitating factor in migraine headaches,
  premenstrual syndrome (especially PMS-C subtype), depression, anxiety, and even
  aggressive/criminal behaviour — eliminating refined sugar from migraine patients
  with confirmed hypoglycemia greatly improves attacks; sugar-restricted diets reduced
  antisocial behaviour in male juvenile inmates.
evidence_tier: plausible_emerging
rationale: Pizzorno consolidates the multi-domain hypoglycemia-symptom literature
  — Schauss / Bolton inmate dietary intervention trial, migraine + hypoglycemia overlap
  studies, PMS-C flat GTT findings. Mechanism via counter-regulatory hormone-driven
  adrenergic and cortisol surges destabilising brain function.
coaching_translation: Blood sugar instability is one of the most under-appreciated
  drivers of migraine, PMS, anxiety, depression, and even aggressive behaviour. Eliminate
  refined sugar and stabilise glucose first — many "psychiatric" presentations resolve.
caveats:
- Look for symptoms 3-5 hours after meals as the timing signature.
- CGM is the most accurate diagnostic tool now.
- Address sleep, stress, exercise alongside diet.
- Effect emerges over 4-8 weeks of stable glucose.
