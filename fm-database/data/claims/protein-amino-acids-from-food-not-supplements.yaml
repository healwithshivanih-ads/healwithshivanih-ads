slug: protein-amino-acids-from-food-not-supplements
statement: When a client believes they "need amino acid supplements," the higher-yield
  clinical question is whether they are eating sufficient protein (and digesting it
  adequately — stomach acid, pancreatic enzymes, intact gut). Animal protein delivers
  the most complete amino-acid profile; plant sources can suffice with thoughtful
  combining. Optimising digestion of food-source protein is almost always more productive
  than adding free-form amino-acid powders.
evidence_tier: strong
