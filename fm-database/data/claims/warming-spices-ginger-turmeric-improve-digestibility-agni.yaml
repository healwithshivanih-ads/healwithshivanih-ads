slug: warming-spices-ginger-turmeric-improve-digestibility-agni
statement: Warming digestive spices — ginger, turmeric, black pepper, cumin, coriander, cardamom — can
  render heavier, harder-to-digest foods more digestible by adding energetically 'lightening' and 'warming'
  properties that support digestive fire (agni).
evidence_tier: fm_specific_thin
rationale: Welch presents the Ayurvedic spice-as-digestive-aid model. Ginger and black pepper have well-documented
  effects on gastric motility, gastric acid secretion, and enzymatic activity. Turmeric has anti-inflammatory
  properties. The Ayurvedic framing as 'warming-lightening' maps coherently to these mechanisms.
coaching_translation: Adding ginger, turmeric, black pepper, or cumin to heavy meals isn't just cultural
  flavouring — it actively helps your digestive system break down and absorb the food. This is why traditional
  Indian cooking combines rich, heavy foods (legumes, ghee, root vegetables) with warming spices.
out_of_scope_notes: ''
caveats:
- Specific doses for therapeutic digestive effect are not quantified here; Ayurvedic energetic framing
  (yin/yang, lightening/warming) is not equivalent to mechanistic evidence, though spices like ginger
  have separate mechanistic support.
