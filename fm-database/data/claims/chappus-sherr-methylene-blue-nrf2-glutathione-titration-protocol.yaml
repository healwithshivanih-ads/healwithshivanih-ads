slug: chappus-sherr-methylene-blue-nrf2-glutathione-titration-protocol
statement: At higher antimicrobial doses (~1 mg/kg or above) methylene blue increases
  endogenous hydrogen peroxide, which upregulates the NRF2 pathway to boost glutathione
  production — IF the client has the capacity to make glutathione. Clients who feel
  awful on high-dose methylene blue typically lack adequate antioxidant reserve. Practical
  protocol — start at 4 mg, hold 3-5 days, increase by 4 mg increments; when escalating
  into the higher antimicrobial range pair with antioxidant support (glutathione/NAC
  dosed SEPARATELY from methylene blue), toxin binders, daily bowel movements, and
  sauna for Herxheimer mitigation.
