    in reproductive hormones, it can take up to twelve years to develop a mature menstrual
    cycle with healthy regular ovulation and an optimal level of progesterone. Twelve
    years to mature your menstrual cycle. So what happens if you take hormonal birth
    control as a teen and hit the pause button on that maturation process? You will
    probably need some time to get things going again.
