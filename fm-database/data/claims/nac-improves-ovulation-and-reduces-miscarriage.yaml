slug: nac-improves-ovulation-and-reduces-miscarriage
statement: 'N-acetyl cysteine 600 mg-1.2 g daily acts as an antioxidant and glutathione
  precursor. In PCOS, it improves ovulation rates and pregnancy rates when combined
  with clomiphene, and has reduced miscarriage rates by 60% in PCOS and approximately
  halved miscarriage in women with unexplained recurrent pregnancy loss. Caution:
  rare but serious allergic reactions, especially in asthmatics.'
