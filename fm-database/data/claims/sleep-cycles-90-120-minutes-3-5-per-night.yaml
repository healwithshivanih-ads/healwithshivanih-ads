slug: sleep-cycles-90-120-minutes-3-5-per-night
statement: A typical night contains 3 to 5 sleep cycles of 90 to 120 minutes each,
  alternating NREM (N1, N2, N3) with REM. The first REM episode lasts only a few minutes;
  REM duration progressively increases over the night, with the brain prioritising
  learning and memory during REM.
evidence_tier: strong
rationale: Established sleep physiology. Panda summarises in The Circadian Code consistent
  with mainstream polysomnography literature.
coaching_translation: Sleep happens in 90 to 120-minute cycles, three to five per
  night. The dreaming (REM) stretches get longer as the night goes on — that's why
  cutting sleep short at the end of the night especially robs you of memory and learning
  consolidation.
caveats:
- Cycle length varies modestly between individuals.
- Substance use, anxiety, and aging all alter cycle composition.
