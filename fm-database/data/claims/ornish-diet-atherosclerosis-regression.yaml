slug: ornish-diet-atherosclerosis-regression
statement: The Lifestyle Heart Trial (Ornish) demonstrated that a low-fat vegetarian
  diet combined with stress reduction and regular exercise for 1 year produced significant
  overall regression of coronary atherosclerosis.
evidence_tier: strong
rationale: Named landmark RCT; one of the first to demonstrate reversal of coronary
  artery disease without drugs, published in peer-reviewed literature.
coaching_translation: A whole-foods plant-based diet with stress management and regular
  movement has been scientifically proven to actually reverse artery blockages — not
  just slow them down.
