slug: oats-beta-glucan-for-chronic-fatigue
statement: A clinical trial in clients with chronic fatigue and impaired quality-of-life
  scores demonstrated approximately 40% improvement in QoL scores over a few months
  from a daily intake of just a couple of ounces (≈60g) of dietary oats. The mechanism
  appears to involve beta-glucan support of Krebs-cycle metabolism, independent of
  oats' standard calorie or macronutrient contribution. Coach prescription — savoury
  or sweet steel-cut oats as a daily staple for fatigue, brain fog, or low energy
  clients. The dose is small (a side dish, not a meal) and accessible across cuisines.
evidence_tier: plausible_emerging
