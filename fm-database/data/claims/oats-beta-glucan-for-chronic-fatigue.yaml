  quote: One trial took some that had impaired quality of life scores due to chronic
    fatigue, and the intervention was just a couple ounces of dietary oats per day.
    They saw about a 40% improvement in quality of life scores over the course of
    a few months. Oats are really fun food — very very underutilized.
rationale: Inexpensive accessible food prescription for low-energy clients; works
  in Indian breakfast culture too (savoury oats poha-style).
