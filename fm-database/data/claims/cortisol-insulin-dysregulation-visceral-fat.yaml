slug: cortisol-insulin-dysregulation-visceral-fat
statement: Elevated cortisol impairs optimal insulin function through a process that leads to central
  (waist-centred) weight gain — distinct from direct weight loss from cortisol's catabolic tissue-breakdown
  effects.
evidence_tier: strong
rationale: 'Well-established: cortisol promotes hepatic gluconeogenesis, raises blood glucose, and stimulates
  insulin secretion; chronic hyperinsulinaemia from cortisol-driven glucose elevation promotes visceral
  fat deposition, particularly in Cushingoid distribution.'
coaching_translation: Stress doesn't directly make you fat — cortisol by itself actually breaks down tissue.
  But it disrupts insulin, and that insulin dysregulation leads to the stubborn weight around the waist
  that is so hard to shift.
