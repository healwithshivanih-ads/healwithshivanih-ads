slug: vitamin-d-deficiency-reduces-ivf-success
statement: Vitamin D deficiency (common, particularly in winter, in PCOS, and at higher
  latitudes) is associated with substantially lower IVF success rates — Caucasian
  women with high vitamin D had 4x higher pregnancy odds vs deficient women in one
  study. Mechanism includes uterine receptivity, AMH regulation, and possibly ovarian
  estrogen support. Most women need 2000+ IU/day vitamin D3 in an oil-based capsule
  taken with a fatty meal.
evidence_tier: plausible_emerging
