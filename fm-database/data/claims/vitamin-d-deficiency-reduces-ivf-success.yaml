  quote: The odds of pregnancy were four times higher for women with high vitamin
    D levels compared to those with a vitamin D deficiency. Many doctors will recommend
    at least 2,000 international units of vitamin D per day.
rationale: Tier plausible_emerging because evidence inconsistent by ethnicity, but
  worth checking at baseline.
