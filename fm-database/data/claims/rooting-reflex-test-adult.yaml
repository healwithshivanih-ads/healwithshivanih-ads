slug: rooting-reflex-test-adult
statement: A simple in-clinic test for retained rooting reflex — gently brush along
  the cheek toward the corner of the mouth. In a newborn, the mouth opens and turns
  toward the stimulus (latching for breastfeeding). In a child older than approximately
  one year, or in any adult, a reflexive mouth grimace or opening response is never
  normal. Its presence indicates brain-stem immaturity or higher-cortex underdevelopment
  and predicts that other neurological recovery interventions will be limited until
  the reflex is integrated.
evidence_tier: plausible_emerging
