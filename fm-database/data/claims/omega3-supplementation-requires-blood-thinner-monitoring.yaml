slug: omega3-supplementation-requires-blood-thinner-monitoring
statement: Patients on anticoagulant therapy (blood thinners) should have PTT or INR
  monitored when supplementing with omega-3 fatty acids.
evidence_tier: confirm_with_clinician
rationale: Safety consideration explicitly stated in the lecture. While current research
  suggests omega-3 supplementation does not significantly increase bleeding risk,
  prudent monitoring is recommended in anticoagulated patients.
coaching_translation: If your client is on blood thinners, always flag omega-3 supplementation
  for their doctor to review before starting.
out_of_scope_notes: Monitoring PTT/INR is fully outside coaching scope. Do not advise
  anticoagulated clients to start omega-3 supplementation without clinician clearance.
caveats:
- 'Coaching scope: flag and refer; do not manage anticoagulation.'
