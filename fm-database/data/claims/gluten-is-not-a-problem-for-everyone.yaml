slug: gluten-is-not-a-problem-for-everyone
statement: Gluten is not a universal poison — it should be avoided according to a
  person's individual level of reaction; whole grains also show documented benefits
  including heart-disease protection, better bowel function and lower cholesterol
  and body fat.
evidence_tier: plausible_emerging
rationale: Balances the NCGS evidence with whole-grain benefit data; the honest 'it
  depends' framing is the load-bearing insight.
coaching_translation: Gluten isn't automatically bad for everyone — tailor it to how
  you actually react, not to fear.
