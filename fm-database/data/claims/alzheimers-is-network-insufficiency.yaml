slug: alzheimers-is-network-insufficiency
statement: Alzheimer's disease is best framed as a chronic network insufficiency of
  approximately one quadrillion cortical synapses driven by two dominant forces —
  too little energetics and too much chronic mild inflammation ("cytokine drizzle")
  — rather than as a primary amyloid disease, which is why metabolic syndrome multiplies
  Alzheimer's risk three- to five-fold and regular exercise is robustly protective.
