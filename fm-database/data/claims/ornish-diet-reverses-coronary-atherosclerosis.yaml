slug: ornish-diet-reverses-coronary-atherosclerosis
statement: The Ornish Lifestyle Heart Trial demonstrated significant overall regression
  of coronary atherosclerosis after one year of a low-fat plant-based diet combined
  with stress reduction and exercise.
evidence_tier: strong
rationale: Ornish Lifestyle Heart Trial (1990, JAMA) is a landmark RCT demonstrating
  angiographic regression of coronary atherosclerosis.
coaching_translation: A strict plant-based, low-fat diet combined with daily stress
  reduction and exercise can actually reverse blocked arteries — not just slow them
  down.
