slug: briden-perimenopause-estrogen-rollercoaster
statement: In the early phases of perimenopause (usually from the late 30s through
  mid-40s), estrogen does not simply decline — it fluctuates wildly, often surging
  to higher-than-baseline levels and then crashing to very low values, repeatedly.
  Symptoms of high estrogen swings include breast pain, heavy periods, fluid retention,
  irritable mood, and histamine/mast cell reactions. Symptoms of dropping estrogen
  (estrogen withdrawal) include depression, weight gain, hot flashes, and night sweats.
  Same woman, same month — both can occur.
evidence_tier: plausible_emerging
rationale: The 'estrogen rollercoaster' framing draws on Prof Jerilynn Prior's perimenopause
  physiology and is supported by longitudinal estrogen measurement studies showing
  increased variability with preserved or elevated mean levels in early perimenopause.
coaching_translation: When a client in her early 40s is being told her symptoms are
  'too early for menopause', the answer is usually that they are early perimenopause
  — and the hormone pattern is estrogen swinging high and crashing low, with progesterone
  dropping first.
