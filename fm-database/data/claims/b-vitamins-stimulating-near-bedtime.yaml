slug: b-vitamins-stimulating-near-bedtime
statement: Taking B-vitamin-containing multivitamins within 5 hours of bedtime can
  be stimulating and disrupt deep sleep quality.
evidence_tier: fm_specific_thin
rationale: B vitamins (particularly B6, B12) are involved in neurotransmitter synthesis
  and energy metabolism; evening dosing may sustain alertness. Clinically observed
  but lacking robust RCT evidence. Widely cited in functional medicine practice.
coaching_translation: Take your multivitamin with breakfast or lunch only — never
  in the afternoon or evening.
caveats:
- Consumer book claim; no specific RCT cited
- Individual sensitivity varies
