slug: gut-nervous-system-meal-mindfulness
statement: Taking 5 deep breaths before eating and chewing food slowly improves digestion
  by activating the parasympathetic nervous system and reducing the pace of food intake.
evidence_tier: plausible_emerging
rationale: Pre-meal relaxation and slow eating reduce gastric acid secretion timing
  issues and improve chewing efficiency. Some evidence supports mindful eating for
  IBS symptom reduction.
coaching_translation: Before each meal, pause and take 5 slow deep breaths. Then eat
  slowly without screens. This flips your body from 'fight-or-flight' to 'rest-and-digest'
  mode — your gut works much better this way.
