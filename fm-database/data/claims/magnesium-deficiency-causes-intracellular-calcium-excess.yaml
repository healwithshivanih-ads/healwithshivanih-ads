slug: magnesium-deficiency-causes-intracellular-calcium-excess
statement: Magnesium deficiency allows excess calcium to accumulate inside cardiac cells, which is reflected by elevated coronary
  calcium scores and may contribute to cardiac dysfunction.
evidence_tier: plausible_emerging
rationale: 'The document presents a mechanistically coherent argument: magnesium is the predominant intracellular cation in
  cardiac tissue; deficiency disrupts the calcium-magnesium balance; this is reflected by coronary calcium deposits. This
  is consistent with known magnesium physiology, though the specific link to coronary calcium score interpretation is an inference
  not supported by a cited trial.'
coaching_translation: A high coronary calcium score may partly reflect that your heart cells are low in magnesium and high
  in calcium. Magnesium helps keep calcium where it belongs — outside your heart cells.
caveats:
- Source is expert consensus lecture. The mechanistic explanation is plausible but the clinical inference from coronary calcium
  score to magnesium deficiency requires clinician evaluation and is not established in guidelines.
