slug: luteal-phase-needs-more-calories-and-slow-carbs
statement: In the luteal phase, women benefit from eating more (an estimated ~280
  kcal/day more), with slower-burning carbohydrates and more frequent meals, to stabilize
  blood sugar and support endometrial development.
evidence_tier: fm_specific_thin
rationale: Metabolic rate rises in the luteal phase to build the endometrium; under-fueling
  drives cravings, binge patterns, and carbohydrate-driven hot flashes/night sweats
  in midlife.
coaching_translation: Eat a little more, with slow carbs and regular meals, in the
  second half of the cycle to steady blood sugar and cut cravings.
