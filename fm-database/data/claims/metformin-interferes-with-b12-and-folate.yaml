slug: metformin-interferes-with-b12-and-folate
statement: Metformin depletes or interferes with vitamin B12 and folate.
evidence_tier: confirm_with_clinician
rationale: Metformin reducing B12 absorption via ileal calcium-dependent transport
  inhibition is well-documented in RCTs and guidelines.
out_of_scope_notes: B12 and folate monitoring in metformin users requires clinician
  management.
caveats:
- Source is a practitioner cheatsheet; this specific interaction is also supported
  in primary literature.
- Always encourage metformin users to discuss B12 monitoring with their prescribing
  clinician.
