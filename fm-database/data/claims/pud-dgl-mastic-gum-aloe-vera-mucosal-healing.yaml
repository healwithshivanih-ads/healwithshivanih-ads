slug: pud-dgl-mastic-gum-aloe-vera-mucosal-healing
statement: For peptic ulcer healing, the evidence-based natural options are DGL (deglycyrrhizinated
  licorice) 380 to 760 mg 20 minutes before meals three times daily, mastic gum 350
  to 1000 mg three times daily, or aloe vera juice 2 to 4 cups per day. Zinc carnosine
  at 75 mg once or twice daily and glutamine 1000 mg three times daily provide additional
  mucosal support. DGL avoids the blood-pressure effect of regular licorice.
evidence_tier: plausible_emerging
