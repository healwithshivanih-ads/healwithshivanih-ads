  location: Food sensitivity vs allergy differentiation
  quote: Food intolerances can sometimes be related to lacking an enzyme, like think
    about people that have a lactase deficient, or lactose deficiency, they lack the
    enzyme lactase or a food sensitivity, which is a delayed immune response or it
    can be an inflammatory response. It's an important differentiator because although
    food sensitivities are annoying, they are generally not life-threatening.
