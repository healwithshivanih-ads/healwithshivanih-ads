slug: briden-pcos-post-pill-transient-3-6-months
statement: Post-pill PCOS is a transient androgen-excess state that follows withdrawal
  from drospirenone- or cyproterone-containing pills (Yasmin, Yaz, Diane, Brenda).
  Symptoms typically begin 3-6 months after stopping the pill and may resolve over
  12-24 months as the ovary and pituitary recalibrate. Post-pill PCOS is distinguished
  from other subtypes by absence of insulin resistance and clear temporal relationship
  to pill cessation.
evidence_tier: plausible_emerging
rationale: Post-pill androgen rebound is described clinically in functional medicine
  and naturopathic literature; conventional endocrinology recognises post-pill amenorrhea
  but is less consistent on transient hyperandrogenism. Anti-androgen progestins like
  cyproterone suppress endogenous androgens during pill use, with rebound on cessation.
coaching_translation: If acne or facial hair appeared 3-6 months after stopping a
  low-androgen pill, do not assume permanent PCOS. Cyclic progesterone and supportive
  care may be all that is needed while the system recalibrates.
