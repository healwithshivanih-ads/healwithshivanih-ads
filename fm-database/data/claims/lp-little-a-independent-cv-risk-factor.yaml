slug: lp-little-a-independent-cv-risk-factor
statement: Lp(a) [lipoprotein little a] is an independent risk factor for cardiovascular disease, is pro-thrombotic, and is
  genetically determined with multiple variants — making it difficult to treat with conventional approaches.
evidence_tier: strong
rationale: Lp(a) as an independent CVD risk factor is well-established in peer-reviewed literature and ACC/AHA guidelines.
  It is mentioned multiple times as a priority marker in high-risk families.
coaching_translation: Lp(a) is a type of cholesterol particle that is largely determined by your genes and raises heart risk
  independently of other cholesterol numbers. It's important to measure in family history of early heart disease.
out_of_scope_notes: Lp(a) testing, interpretation, and treatment (PCSK9 inhibitors, niacin, antisense oligonucleotides) are
  clinician scope.
caveats:
- Lp(a)-lowering options mentioned (niacin, red yeast rice, PCSK9 inhibitors, antisense oligos) require clinician management.
