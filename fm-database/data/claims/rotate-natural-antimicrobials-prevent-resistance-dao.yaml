slug: rotate-natural-antimicrobials-prevent-resistance-dao
statement: When clearing gut pathogens that burden DAO/histamine, rotating natural
  antimicrobials (olive leaf, mastic gum, oregano oil, wormwood, neem, black walnut,
  garlic) instead of a fixed daily blend helps prevent resistance; starting low after
  dinner limits die-off symptoms.
evidence_tier: plausible_emerging
rationale: Rotation to limit resistance is a common functional-medicine practice;
  evidence is largely mechanistic/clinical-experience rather than trial-based. Antimicrobial
  use for suspected gut pathogens is a clinician-directed intervention.
coaching_translation: If a practitioner is helping you clear a gut bug, using antimicrobials
  in rotation and starting low in the evening tends to be gentler.
out_of_scope_notes: Identifying/treating gut infections is diagnostic — coach educates,
  practitioner directs.
caveats:
- Source is a consumer trade book (Ben Lynch, Dirty Genes), not primary literature.
