slug: greater-microbiome-diversity-means-more-insulin-sensitivity
statement: Greater microbial diversity is associated with greater metabolic resilience,
  including the ability to use both stored fat and carbohydrates for fuel, and improved
  insulin sensitivity.
evidence_tier: plausible_emerging
rationale: Consistent with published associations between alpha-diversity and metabolic
  markers, but mechanistic consensus and interventional data in perimenopausal women
  are still emerging.
coaching_translation: A diverse gut microbiome acts like a more flexible metabolic
  engine — women with higher diversity tend to handle blood sugar fluctuations and
  fuel switching better.
caveats:
- Association does not establish causation.
- Single-expert source; no specific study cited.
