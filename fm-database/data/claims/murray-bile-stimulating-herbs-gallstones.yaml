  location: Chapter 53 — Gallstones, Treatment Summary pg 970–971
  quote: 'Dandelion (Taraxacum officinale): Dried root: 4 g three times per day. Milk
    thistle (Silybum marianum): sufficient dosage to yield 70 to 210 mg silymarin,
    three times per day. Artichoke (Cynara scolymus) extract (15% cynarin): 500 mg
    three times per day. Curcumin: 200 to 400 mg three times per day. Peppermint oil:
    1 to 2 enteric-coated capsules (0.2 ml per capsule) three times per day between
    meals.'
