slug: murray-bile-stimulating-herbs-gallstones
statement: 'Bile-stimulating (cholagogue) and liver-detoxifying herbs are central
  to FM gallstone protocols: dandelion root 4 g 3× daily, artichoke extract (15% cynarin)
  500 mg 3× daily, milk thistle silymarin 70-210 mg 3× daily, peppermint oil enteric-coated
  0.2 ml capsules 1-2 caps 3× daily between meals, and curcumin 200-400 mg 3× daily.
  Peppermint oil specifically may dissolve smaller cholesterol stones over months
  of use. These herbs increase bile flow, thin bile composition, and support liver-mediated
  cholesterol conversion to bile acids.'
evidence_tier: plausible_emerging
rationale: Multiple smaller trials + extensive European phytotherapy use. Mechanism
  — choleretic (increased bile production) vs cholagogue (increased bile flow) effects.
  Artichoke extract shows specific cholesterol-lowering + bile-thinning evidence (Holtmann
  2003).
coaching_translation: FM gallstone toolkit — dandelion root 4 g 3×/day OR artichoke
  extract 500 mg 3×/day OR milk thistle 70-210 mg silymarin 3×/day OR curcumin 200-400
  mg 3×/day. For smaller cholesterol stones, peppermint oil ENTERIC capsules between
  meals may dissolve them slowly over months. NEVER use these during acute biliary
  colic — refer to surgery. Best as prevention or for asymptomatic stones found incidentally.
caveats:
- NEVER during acute attack — surgery referral
- Asymptomatic stones may not need treatment (many never cause problems)
- Pigment stones do not respond to these (form from haemolysis/cirrhosis)
- Peppermint oil ENTERIC-coated only
- Symptoms suggesting common bile duct obstruction (jaundice, fever) = surgical emergency
