slug: weigh-rcts-not-single-bacteria
statement: 'Don''t reduce gut health to a single bacterium or a single study: weigh
  human randomised trials, systematic reviews and meta-analyses above animal, cell-culture
  and one-off observational findings.'
evidence_tier: strong
rationale: The book's signature evidence-discipline stance, illustrated with F. prausnitzii
  and Prevotella copri counter-examples.
coaching_translation: Be skeptical of 'this one bug fixes everything' claims — look
  for real human-trial evidence, not headlines.
