slug: murray-prunes-bone-formation-postmenopausal
statement: Dried plums (prunes) — approximately 12 prunes daily for 3 months in postmenopausal
  women — significantly raised blood levels of enzymes and growth factors indicating
  active bone formation, with no adverse GI effects. The bone-protective effect is
  attributed to high concentrations of phenolic compounds that act as antioxidants
  and curb bone resorption, plus prunes' good supply of boron (a 3.5 oz serving =
  2–3 mg boron). Practical, food-first bone intervention with multiple cobeneficial
  effects (constipation prevention, GI motility, polyphenol antioxidants).
evidence_tier: plausible_emerging
rationale: Hooshmand 2011 cited + subsequent dried-plum bone literature (Hooshmand
  2016, Halloran 2010). Mechanism — polyphenols inhibit osteoclast differentiation;
  boron content (~2 mg per serving) supports calcium retention + estradiol activation;
  vitamin K1 + potassium also contribute. Effect-size meaningful + food-first intervention
  is uniquely sustainable. Particularly important for postmenopausal women in the
  first 3-5 years of accelerated bone loss.
coaching_translation: 'Twelve prunes (dried plums) daily is a research-validated bone-building
  food. Postmenopausal women who ate this amount for 3 months showed measurable improvements
  in bone formation markers. The benefits combine — antioxidant polyphenols slow bone
  loss, boron content (2-3 mg per 3.5 oz serving) supports vitamin D + estrogen, vitamin
  K1 supports osteocalcin, AND they prevent constipation. Easy daily habit: 12 prunes
  with breakfast or as a snack. India coaching alternative: dried apricots and figs
  also have boron + polyphenols + potassium.'
caveats:
- 12 prunes daily is meaningful sugar load — relevant in T2DM (monitor)
- High fibre — introduce gradually to avoid GI upset
- Some clients find prunes unpalatable — dried apricots, figs, or jujubes are alternatives
  with similar nutritional profiles
- Particularly useful in early postmenopause (rapid bone loss window)
- Pair with calcium + vitamin D + K2 + boron for full effect
