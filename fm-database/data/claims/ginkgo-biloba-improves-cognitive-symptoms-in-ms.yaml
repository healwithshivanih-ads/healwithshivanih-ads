slug: ginkgo-biloba-improves-cognitive-symptoms-in-ms
statement: Ginkgo biloba extract (24% flavone glycosides, 6% terpenoids) 120-160 mg
  three times daily improves Stroop test performance and subjective cognitive complaints
  in MS patients with cognitive impairment.
evidence_tier: plausible_emerging
rationale: Pizzorno cites trial-level evidence in MS specifically; cognitive impairment
  affects 40-50% of MS patients and there are no effective conventional therapies.
  Effect size is modest but well-tolerated.
coaching_translation: Cognitive fog is one of the hardest MS symptoms to treat. Ginkgo
  (standardised extract) at 120 mg three times daily has a modest but real benefit
  on attention and executive function.
caveats:
- Use standardised extract (24/6) — quality varies hugely.
- Mild bleeding risk; pause before surgery and discuss with neurologist if on anticoagulants.
- Effect is on cognitive symptoms, not on overall MS progression.
