slug: sklar-environmental-toxin-testing
statement: Comprehensive environmental-toxin urine testing (heavy metals, BPA, phthalates,
  parabens, glyphosate, mycotoxins, organophosphate pesticide metabolites) measures
  actual body burden rather than relying on exposure inference. Sklar quotes a case
  showing 20 distinct toxins in one client who self-described as "doing everything
  right" — the value of the test is that it makes invisible exposures visible and
  lets the detox protocol prioritise the worst offenders first.
