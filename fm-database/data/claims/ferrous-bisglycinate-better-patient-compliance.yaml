slug: ferrous-bisglycinate-better-patient-compliance
statement: Better GI tolerability of ferrous bisglycinate leads to improved patient compliance compared to ferrous sulfate
  and ferrous fumarate.
evidence_tier: plausible_emerging
rationale: GI side effects are a leading cause of iron supplement discontinuation. By reducing these, ferrous bisglycinate
  supports better adherence to supplementation protocols.
coaching_translation: People are more likely to keep taking their iron if it doesn't upset their stomach — which is why the
  form of iron supplement can make a real difference to outcomes.
caveats:
- Source is an expert lecture (moderate quality).
- Adherence data largely based on clinical observation and limited comparative studies; verify with a clinician.
