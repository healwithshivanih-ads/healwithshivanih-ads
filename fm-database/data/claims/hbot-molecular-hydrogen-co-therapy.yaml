slug: hbot-molecular-hydrogen-co-therapy
statement: Co-administration of molecular hydrogen (H2) 45-60 minutes before an HBOT
  session helps buffer the oxidative stress that intense hyperoxia generates, while
  preserving the beneficial cell signalling. Unlike high-dose vitamin C or glutathione
  (which act as direct antioxidants and may dampen the hormetic signalling itself),
  H2 stimulates the Nrf2 pathway and lets the body's own antioxidant capacity (SOD,
  catalase, glutathione) up-regulate only as needed. Particularly useful for oxidative-stress-sensitive
  clients (chronic Lyme, ME/CFS).
evidence_tier: plausible_emerging
