  quote: The American College of Obstetricians and Gynecologists, together with the
    American Academy of Pediatrics, quietly issued a groundbreaking statement called
    Menstruation in Girls and Adolescents — Using the Menstrual Cycle as a Vital Sign.
    By including an evaluation of the menstrual cycle as an additional vital sign,
    clinicians reinforce its importance in assessing overall health status for patients
    and caretakers.
