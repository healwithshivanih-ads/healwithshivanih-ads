slug: briden-period-is-a-vital-sign-acog-2015
statement: The American College of Obstetricians and Gynecologists (ACOG) and the
  American Academy of Pediatrics jointly recommend that clinicians treat the menstrual
  cycle as a vital sign in girls and adolescents, asking about menstrual patterns
  at every visit because abnormal patterns may flag underlying health concerns long
  before they manifest as overt disease.
evidence_tier: strong
rationale: Cites the joint ACOG/AAP committee opinion published December 2015, "Menstruation
  in Girls and Adolescents — Using the Menstrual Cycle as a Vital Sign." This is a
  published professional society statement from the largest American gynaecological
  body and is the policy basis for naturopathic and integrative practice routinely
  asking every female client about cycle parameters.
coaching_translation: Your period is one of the best free health-check signals you
  have — when it arrives, how long it lasts, and how it feels each month tells us
  a lot about what is going on with your thyroid, gut, stress, and nutrition. Even
  leading Western gynaecologists now agree your cycle is a vital sign, like blood
  pressure.
caveats:
- The ACOG statement focuses on adolescents but the principle generalises to all reproductive-age
  women.
- Cycle as vital sign is only meaningful in women not on hormonal birth control —
  pill bleeds are not informative in this way.
