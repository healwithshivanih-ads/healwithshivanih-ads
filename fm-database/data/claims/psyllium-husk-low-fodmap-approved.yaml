slug: psyllium-husk-low-fodmap-approved
statement: Psyllium husk (isabgol) is Low FODMAP approved and supports constipation
  relief through soluble fiber gel formation that smooths stool movement.
evidence_tier: strong
rationale: Monash University FODMAP app approves psyllium husk; multiple RCTs in IBS-C
  confirm psyllium improves stool consistency and frequency via mucilage gel formation.
coaching_translation: 1 tsp of psyllium husk in warm water daily is a safe, evidence-backed
  way to ease constipation on a Low FODMAP plan.
caveats:
- Take with adequate water; not recommended without sufficient fluid intake.
