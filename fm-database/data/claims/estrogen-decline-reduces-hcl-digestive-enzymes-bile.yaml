slug: estrogen-decline-reduces-hcl-digestive-enzymes-bile
statement: Declining estrogen in perimenopause is associated with reductions in hydrochloric
  acid, digestive enzymes, and bile quality, impairing the breakdown of proteins,
  carbohydrates, fats, and contributing to food sensitivities.
evidence_tier: plausible_emerging
rationale: 'Speaker describes three distinct digestive deficits tied to estrogen decline:
  HCl (protein digestion), enzymes (carb/fat), and bile (fat emulsification). The
  estrogen–bile connection is reasonably supported in the literature; HCl and enzyme
  effects are biologically plausible but have thinner direct evidence. Single-expert
  source.'
coaching_translation: As estrogen falls, the body produces less stomach acid, fewer
  digestive enzymes, and lower-quality bile — making it harder to break down proteins,
  fats, and carbohydrates properly, which can trigger sensitivity-like symptoms.
caveats:
- Single-expert source; individual mechanisms vary in strength of evidence.
- HCl decline specifically tied to estrogen has less robust direct evidence than bile
  quality connection.
- Verify with clinician if digestive enzyme or HCl support is being considered.
