  location: Why midlife changes food tolerance
  quote: We also see declines in things like hydrochloric acid. This is what helps
    us break down protein in our stomach to amino acids. We also get reductions in
    digestive enzymes, which can impact the way we break down carbohydrates and fats.
    And our bile quality is intricately interwoven with estrogen, which means that
    as our estrogen is declining, you may notice you become less able to break down
    and emulsify fats.
