slug: community-and-context-shape-epigenetic-response
statement: Because epigenetics is never expressed in isolation, the context of eating
  — connection, joy, community — meaningfully shapes the body's response to food and
  even alcohol (illustrated by Roseto and Blue Zone longevity where people eat 'imperfectly'
  but communally). A broccoli-sprout salad eaten alongside a drink literally supports
  clearing the alcohol.
evidence_tier: fm_specific_thin
rationale: 'Move clients off ''perfect diet'' guilt toward the energetics of eating:
  connection and context are part of the intervention, not a compromise.'
coaching_translation: 'Move clients off ''perfect diet'' guilt toward the energetics
