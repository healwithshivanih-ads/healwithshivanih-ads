slug: low-siga-indicates-stress-or-malnutrition
statement: Low secretory IgA (sIgA) in stool is associated with long-standing mental or physical stress and protein or omega-3
  deficiency, reflecting impaired mucosal immune defense.
evidence_tier: plausible_emerging
rationale: The association between stress and reduced sIgA is supported by psychoneuroimmunology research. The role of protein
  and omega-3 as substrates for antibody production is biologically logical. However, specific cut-off values and clinical
  protocols are not established in this document.
coaching_translation: If a client's stool test shows low sIgA, it can signal chronic stress or nutritional deficiencies that
  are undermining the gut's immune defense system.
out_of_scope_notes: Secretory IgA testing and interpretation is clinician-scope.
caveats:
- Source is expert consensus; specific threshold values not cited from RCTs.
- The omega-3 / protein → sIgA link is mechanistically plausible but not confirmed by high-quality RCTs cited in this document.
