sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 44 — Depression, pg 776-778
  quote: An insufficiency of the long-chain omega-3 fatty acids eicosapentaenoic acid
    (EPA) and docosahexaenoic acid (DHA) has been linked to depression. Patients were
    given placebo or EPA added to their ongoing antidepressant therapy. The effect
    of EPA was significant from week two of treatment, similar to the placebo was
    minimal. Item analysis showed that EPA also reduced symptoms. Decreased consumption
    of omega-3 fatty acids correlates with depression prevalence.
