slug: murray-depression-omega3-epa
statement: EPA-predominant omega-3 fatty acid supplementation (typically 1 g EPA per
  day, added to standard antidepressant therapy) significantly improves depression
  scores from week 2 onward in placebo-controlled trials. Cross-population data show
  inverse correlation between dietary omega-3 intake and depression prevalence. Low
  EPA / DHA status, excess saturated fat, and high sugar all impair tryptophan-to-serotonin
  conversion.
evidence_tier: strong
