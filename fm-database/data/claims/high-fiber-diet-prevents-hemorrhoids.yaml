slug: high-fiber-diet-prevents-hemorrhoids
statement: A high-fiber diet rich in vegetables, fruits, legumes, and grains promotes
  rapid stool transit and keeps stools soft and bulky, significantly reducing straining
  during defecation and the hemorrhoidal congestion it produces. A meta-analysis of
  seven trials confirmed that fiber relieves overall symptoms and bleeding in symptomatic
  hemorrhoids.
evidence_tier: strong
