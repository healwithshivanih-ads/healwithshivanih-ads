slug: hbot-aviv-clinic-locations-protocol-team
statement: The Aviv Clinic network applies the Sagol Center protocol outside Israel
  — currently Orlando (The Villages, Florida), Manhattan, Dubai, and Tel Aviv. The
  clinical standard goes beyond the chamber — multidisciplinary team including physician
  trained in HBOT physiology, neuropsychologist for cognitive evaluation, physiotherapist
  for motor assessment, and high-resolution perfusion MRI / DTI / SPECT capability
  for pre-treatment imaging and prediction. Coaches referring clients internationally
  should look for this team composition, not just chamber availability.
