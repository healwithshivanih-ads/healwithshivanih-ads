  location: Podcast — Aviv Clinic discussion
  quote: Aviv Clinic takes all the know-how and knowledge we generate in Israel and
    uses it in Florida — near Orlando at the location called The Villages. We have
    a multi-disciplined team — physician, physiotherapist, neuropsychologist who knows
    how to deal with cognitive evaluation, and the capacity to do brain imaging like
    Tel Aviv.
rationale: Practical referral information for FM coaches with clients seeking clinical-grade
  HBOT.
