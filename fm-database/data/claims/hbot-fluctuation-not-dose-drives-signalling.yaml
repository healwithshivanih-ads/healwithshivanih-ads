slug: hbot-fluctuation-not-dose-drives-signalling
statement: Sonners' clinical observation aligned with Efrati's published mechanism
  — the signalling switch that drives stem cell mobilisation, SIRT1 upregulation,
  and mitochondrial biogenesis is the FLUCTUATION of oxygen and pressure, not the
  absolute dose. Maximising dose alone (holding at the highest tolerable pressure
  for as long as possible) misses most of the therapeutic benefit. Modern protocols
  intentionally introduce wave-cycles of both pressure and oxygen percentage during
  a single session to maximise cellular signalling switches per unit time.
evidence_tier: plausible_emerging
