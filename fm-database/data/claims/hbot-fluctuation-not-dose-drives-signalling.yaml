sources:
- id: sonners-mercola-podcast-2024
  location: Podcast — fluctuation discussion
  quote: If all we cared about was the physical dose, we would stay at 100 percent
    oxygen as long as we could at the highest pressure we could tolerate. I do not
    think that is where the majority of benefit exists. Every time you change pressure
    or percentage of oxygen, you are stimulating HIF-1-alpha, changing reactive oxygen
    species load, signalling sirtuins, creating hormetic effect.
rationale: Mechanistic explanation for the air-brake / fluctuation protocol.
