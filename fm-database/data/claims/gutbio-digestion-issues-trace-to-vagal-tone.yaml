slug: gutbio-digestion-issues-trace-to-vagal-tone
statement: Digestion and absorption depend on enzymes, stomach acid, bile and pancreatic
  secretions that are all regulated by vagus-nerve (parasympathetic) activity. When
  someone is stuck in a fight-or-flight sympathetic state, motility and secretion
  shut down, so many digestive complaints trace back to poor vagal tone rather than
  a missing enzyme. Restoring parasympathetic tone is often the highest-leverage first
  move.
evidence_tier: plausible_emerging
rationale: This reframes "my digestion is bad" from something to supplement toward
  something a coach can genuinely influence through nervous-system work — the lever
  coaches own.
coaching_translation: Teach and reinforce vagal-tone practices — slow diaphragmatic
  breathing before meals, eating unhurried and undistracted, meditation or prayer,
  gargling or humming, and time walking in nature (which the presenter found moved
  his own heart-rate variability the most). Frame these as digestion support, not
  just stress relief.
out_of_scope_notes: Deciding whether pancreatic insufficiency, hypochlorhydria or
  another pathology is present, and prescribing enzymes or acid support, is the clinician's
  role.
caveats:
- Vagal-tone work supports, but does not replace, clinical evaluation of persistent
  or severe symptoms.
