slug: ppi-medications-deplete-magnesium
statement: Proton pump inhibitors (PPIs) and certain other medications (including
  macrolides and propranolol class drugs) cause magnesium depletion.
evidence_tier: strong
rationale: FDA issued a safety communication in 2011 regarding PPI-induced hypomagnesemia,
  supported by multiple clinical case series and pharmacovigilance data.
caveats:
- Medication review is out of coaching scope — refer to prescribing clinician.
out_of_scope_notes: Medication management is outside coaching scope. Coaches should
  flag PPI use and refer clients to their clinician.
coaching_translation: Some common medications — like antacids called PPIs — can lower
  your magnesium levels, which is worth discussing with your doctor.
