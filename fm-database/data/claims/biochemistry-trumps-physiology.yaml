  location: Podcast — biochemistry trumps physiology segment
  quote: My particular bias is to not give the primacy to hormones under any circumstances
    ever because all hormones ever do is communicating what's going on in one tissue
    with another tissue. Biochemistry always trumps physiology. Even insulin in a
    pancreatic beta cell is not even a response to glucose. It is a response to the
    ATP made from glucose.
rationale: Keeps coach from chasing "balance the hormones" loops without addressing
  the cellular fuel and nutrient infrastructure underneath.
