slug: biochemistry-trumps-physiology
statement: Masterjohn's bias — "all hormones ever do is communicate what's going on
  in one tissue with another tissue." Hormones are messengers, never causes. When
  a client presents with what looks like a hormonal disorder (hyperinsulinaemia, hyperthyroidism,
  hypercortisolism), the upstream story is almost always at the biochemical / cellular
  level — a nutrient deficiency, a toxic overload, a genetic enzyme impairment, or
  a tumour. Insulin secretion by the pancreatic beta cell, for instance, is a response
  to the ATP it generated from glucose — not to glucose itself. Implication for coach
  — chase the biochemistry / mitochondrial / nutrient story beneath the apparent hormonal
  signal, especially in stubborn cases.
evidence_tier: plausible_emerging
