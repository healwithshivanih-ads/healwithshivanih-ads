slug: group-coaching-increases-access-and-builds-community
statement: Small group coaching (4–5 participants) creates peer community and social
  accountability that supports behavior change, while making coaching financially
  accessible to clients who cannot afford one-on-one programs.
evidence_tier: fm_specific_thin
rationale: Speaker describes personal practice experience with small group coaching
  and observed community-building effects. Consistent with behavioral science literature
  on social support and accountability in behavior change, though no specific studies
  are cited.
coaching_translation: Group coaching lets you serve more clients at lower price points
  while the peer community often enhances motivation and accountability beyond what
  one-on-one coaching alone provides.
caveats:
- Based on practitioner experience, not controlled study.
- Optimal group size and format will vary by population and niche.
