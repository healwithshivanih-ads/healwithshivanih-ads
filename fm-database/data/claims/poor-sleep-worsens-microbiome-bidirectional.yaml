slug: poor-sleep-worsens-microbiome-bidirectional
statement: 'Sleep disruption and microbiome dysbiosis form a vicious cycle: poor sleep
  alters microbiome composition, and a dysbiotic microbiome further disrupts sleep.'
evidence_tier: plausible_emerging
rationale: Bidirectional relationship is mechanistically plausible and supported by
  emerging human observational and animal data; however, interventional RCT evidence
  is still limited.
coaching_translation: Bad sleep and a disrupted gut microbiome feed each other — improving
  one tends to help the other.
caveats:
- Mechanism is plausible; causal intervention studies in humans are limited.
- Single-expert source.
