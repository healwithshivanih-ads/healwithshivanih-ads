slug: nhs-otitis-externa-ear-infection-outer-vs-middle-vs-inner
statement: Outer-ear infection (otitis externa) is driven by ear-canal irritation,
  water exposure, eczema or earplug use; middle-ear infection (otitis media) usually
  follows a viral cold; inner-ear infection affects the labyrinth and balance system.
