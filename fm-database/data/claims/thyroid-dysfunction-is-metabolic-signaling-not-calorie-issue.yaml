slug: thyroid-dysfunction-is-metabolic-signaling-not-calorie-issue
statement: Thyroid dysfunction is a metabolic signalling and inflammation issue, not
  primarily a calorie imbalance — nutrition plans should address inflammation, gut
  health, and insulin balance.
evidence_tier: plausible_emerging
rationale: The document states 'Thyroid dysfunction isn't a calorie issue — it's a
  metabolic signaling and inflammation issue.' This framing aligns with FM's root-cause
  approach to metabolism.
coaching_translation: Cutting calories harder won't fix a sluggish thyroid. Reducing
  inflammation and healing the gut gives the body what it needs to regulate metabolism.
caveats:
