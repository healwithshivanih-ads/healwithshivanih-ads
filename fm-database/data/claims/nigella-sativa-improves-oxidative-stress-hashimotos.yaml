slug: nigella-sativa-improves-oxidative-stress-hashimotos
statement: Treatment with Nigella sativa for 8 weeks significantly improved serum
  total antioxidant capacity and markers of oxidative stress, and may improve endothelial
  function, serum lipids, and anthropometrics in autoimmune thyroid disease.
evidence_tier: plausible_emerging
rationale: Human study cited (described as prospective, randomized, double-blind,
  placebo-controlled). Results include reduced LDL-C, triglycerides, BMI, and VCAM;
  increased HDL. Single study; needs replication.
coaching_translation: Beyond the thyroid, Nigella sativa may help reduce inflammation
  and improve cholesterol and body composition in people with autoimmune thyroid disease.
caveats:
- Single study referenced; source does not provide full citation (author/journal).
- Source type is educational toolkit — treat as plausible_emerging.
