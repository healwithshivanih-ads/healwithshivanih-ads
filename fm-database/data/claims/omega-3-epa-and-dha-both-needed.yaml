slug: omega-3-epa-and-dha-both-needed
statement: Both EPA and DHA are required to achieve the full cognitive and vaginal microbiome benefits of omega-3 supplementation;
  EPA-only pharmaceutical preparations are insufficient.
evidence_tier: plausible_emerging
rationale: Dr. Davis criticizes EPA-only pharmaceutical omega-3 drugs (e.g., icosapentaenoic acid prescriptions) as failing
  to provide DHA-dependent cognitive protection and the full vaginal microbiome benefit. DHA's role in cognitive health and
  EPA's cardiovascular benefit are both established; the combined requirement for vaginal/reproductive benefits is stated
  by Dr. Davis but not supported by specific citations.
coaching_translation: When choosing a fish oil, make sure it contains both EPA and DHA. EPA-only products miss important benefits
  for your brain and vaginal health.
caveats:
- Source is expert_consensus interview.
- No specific studies cited for the vaginal microbiome EPA+DHA synergy claim.
