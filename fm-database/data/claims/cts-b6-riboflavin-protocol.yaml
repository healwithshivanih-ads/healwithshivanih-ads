sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 32 — Carpal Tunnel Syndrome, pg 623-625
  quote: Several clinical studies demonstrated the efficacy of vitamin B6 supplementation
    for CTS; the initial dose was 50 mg initially, increased to 200 to 300 mg. Even
    greater effect was seen when B6 and B2 (riboflavin) were given together. We recommend
    dosages no greater than 100 mg per day.
