slug: cts-b6-riboflavin-protocol
statement: Carpal tunnel syndrome has been associated with vitamin B6 functional insufficiency
  since 1950, and is more common in groups with greater B6 need (pregnancy, oral contraceptives,
  menopause, hemodialysis). Several clinical studies support B6 supplementation (start
  50 mg, titrate to 100 mg daily; do not exceed 100 mg) with even greater effect when
  combined with riboflavin (B2). If B6 fails within weeks, switch to P5P (pyridoxal-5-phosphate)
  10 mg per day.
evidence_tier: plausible_emerging
