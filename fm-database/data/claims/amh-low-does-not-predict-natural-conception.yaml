slug: amh-low-does-not-predict-natural-conception
statement: Women with very low or undetectable AMH have been documented conceiving
  naturally; AMH is a population-level proxy for IVF stimulation response, not a deterministic
  predictor of natural fertility. Telling a woman with low AMH that she cannot get
  pregnant is not supported by the research. The clinically appropriate framing is
  that low AMH narrows the IVF window and slightly tightens the natural conception
  timeline, but does not close it.
evidence_tier: strong
