sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 72 — Irritable Bowel Syndrome, pg 1196-1197
  quote: 'While probiotics appear to be a key component in a comprehensive approach
    to treating IBS, they should be used in combination with diet therapy. In general,
    we prefer probiotic formulations that include multiple species rather than a single
    one, as these are more similar to what is found in nature. Probiotic supplement
    (multistrain, including species of lactobacillus and bifidobacteria): 5 billion
    to 20 billion live organisms per day.'
