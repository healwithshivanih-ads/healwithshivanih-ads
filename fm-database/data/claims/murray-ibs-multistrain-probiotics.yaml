slug: murray-ibs-multistrain-probiotics
statement: Multistrain probiotic supplementation (5 to 20 billion CFU per day) containing
  Lactobacillus rhamnosus GG, L. plantarum, Bifidobacterium infantis, and B. breve
  produces measurable improvement in IBS total symptom scores (pain, distension, flatulence,
  bowel rumbling) versus placebo across multiple controlled trials. Multistrain blends
  are preferred over single-strain products because they more closely mimic native
  microbiota.
evidence_tier: plausible_emerging
