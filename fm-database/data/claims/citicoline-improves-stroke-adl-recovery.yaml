slug: citicoline-improves-stroke-adl-recovery
statement: Citicoline (CDP-choline), a highly bioavailable choline donor, improved
  stroke recovery in a 2002 pooled analysis of four US double-blind trials (500, 1000,
  or 2000 mg/day oral, started within 24 hours of ischemic stroke and continued for
  six weeks). At three months, citicoline improved the probability of regaining independence
  in activities of daily living by 29% and functional capacity by 42% vs placebo.
  Significant neurological recovery was not increased, but the ADL benefit translates
  to meaningful real-life improvement.
evidence_tier: plausible_emerging
