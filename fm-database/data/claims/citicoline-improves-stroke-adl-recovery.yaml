  quote: A 2002 analysis looked at four double-blind studies with oral citicoline
    for acute ischemic stroke... citicoline improved by 29% the probability that the
    patient would recover the ability to participate in activities of daily living
    and by 42% the probability of recovering functional capacity.
rationale: Must be started early (within 24h ideally). For Indian clients, citicoline
  is available OTC and affordable. Coordinate with the treating neurologist — does
  not replace tPA or rehab.
