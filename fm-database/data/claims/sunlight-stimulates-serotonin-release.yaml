slug: sunlight-stimulates-serotonin-release
statement: UV rays from sunlight enter through the eyes, travel neurochemical pathways
  to the pineal gland, and trigger serotonin (mood hormone) release.
evidence_tier: plausible_emerging
rationale: Light-induced serotonin synthesis is well-supported in SAD research and
  photoneuroendocrinology. The specific pathway described (UV→eye→pineal→serotonin)
  is a simplification; the retino-hypothalamic pathway and serotonin synthesis in
  the raphe nuclei are the established mechanisms. Core claim (sunlight improves mood
  via serotonin) is plausible and widely supported.
coaching_translation: Getting outside in natural light every day is one of the simplest
  things you can do to support your mood. You don't need to look at the sun — just
  being outdoors counts.
caveats:
- Precise pathway described is simplified
- Source is expert lecture
- Serotonin is primarily synthesised in the gut and raphe nuclei, not exclusively
  via the pineal gland
