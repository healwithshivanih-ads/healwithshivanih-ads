slug: hybridised-wheat-caused-widespread-gluten-intolerance
statement: The intensive crossbreeding of wheat in the 1950s created a complex gluten
  structure that most digestive systems cannot fully break down, directly contributing
  to the modern epidemic of gluten intolerance.
evidence_tier: plausible_emerging
rationale: There is scholarly debate and some published evidence linking changes in
  wheat genetics and processing to rising rates of gluten-related disorders. The hypothesis
  that hybridisation altered gluten structure is credible and debated in the literature,
  though not universally accepted as the primary cause of increasing gluten intolerance.
coaching_translation: The wheat we eat today is very different from what our ancestors
  ate — its complex structure is much harder to digest, which is why so many people
  feel better off modern wheat.
caveats:
- The causal attribution of hybridisation as the primary cause of gluten intolerance
  is debated. Other factors (gut microbiome, food processing, glyphosate use) are
  also implicated in the literature.
- Source is a lecture transcript, not a systematic review.
