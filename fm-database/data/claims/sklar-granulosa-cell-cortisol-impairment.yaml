slug: sklar-granulosa-cell-cortisol-impairment
statement: Cortisol directly impairs granulosa cell function inside the developing
  follicle — reducing their oestradiol output, increasing local inflammatory signalling
  and lowering antioxidant enzyme expression that would normally protect the oocyte
  from oxidative stress. The result is a maturing egg developing in a hostile micro-environment.
