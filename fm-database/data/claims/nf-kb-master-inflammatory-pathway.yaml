slug: nf-kb-master-inflammatory-pathway
statement: NF-κB is the master upstream regulator of chronic inflammation, driving
  gene expression of COX-1, COX-2, LOX enzymes, and pro-inflammatory cytokines in
  response to any inflammatory trigger.
evidence_tier: strong
rationale: NF-κB as a central transcription factor in inflammation is well-established
  in the peer-reviewed literature with thousands of studies confirming its role in
  chronic disease pathogenesis.
coaching_translation: Think of NF-κB as the 'master inflammation switch.' When it
  gets turned on by triggers like poor food, stress, or infections, it starts a chain
  reaction that produces inflammation throughout the body.
