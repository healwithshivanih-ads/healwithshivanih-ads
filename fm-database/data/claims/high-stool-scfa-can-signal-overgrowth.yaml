slug: high-stool-scfa-can-signal-overgrowth
statement: Elevated stool short-chain fatty acids or butyrate can indicate bacterial
  overgrowth (as in obesity and celiac disease) rather than a healthy gut, and can
  normalise after treatment such as a gluten-free diet.
evidence_tier: plausible_emerging
rationale: Cites celiac/obesity microbiota data; reframes a marker usually read as
  'good'.
coaching_translation: High butyrate on a stool test isn't always good news — sometimes
  it's a sign of overgrowth.
