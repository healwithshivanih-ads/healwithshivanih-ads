  location: Garlic (Allium sativum) and Onion (Allium cepa)
  quote: Commercial preparations providing daily dose of at least 10 mg of alliin
    or a total allicin potential of 4000 mg can lower total serum cholesterol by about
    10% to 12% and LDL-C by 15%; HDL-C usually increases by 10% and TGs drop by 15%.
