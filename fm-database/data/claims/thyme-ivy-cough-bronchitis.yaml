slug: thyme-ivy-cough-bronchitis
statement: Thyme (Thymus vulgaris) plus ivy leaf (Hedera helix) combination syrup,
  5.4 ml three times daily for 11 days, outperformed placebo in 361-patient acute
  bronchitis RCT — 68.7% vs 47.6% cough-fit reduction by day 7 to 9, 50% reduction
  reached 2 days earlier. Ivy alone is used in 80% of German herbal expectorant prescriptions.
  Saponins (alpha-hederin, hederacoside C) provide mucolytic and bronchodilatory effects.
evidence_tier: strong
