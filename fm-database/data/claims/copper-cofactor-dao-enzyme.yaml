slug: copper-cofactor-dao-enzyme
statement: Copper is the primary enzymatic cofactor for diamine oxidase (DAO); copper
  deficiency — often from chronic zinc supplementation — impairs DAO activity and
  worsens histamine intolerance.
evidence_tier: plausible_emerging
rationale: DAO is a copper-dependent amine oxidase; this cofactor requirement is biochemically
  established. Zinc competitively inhibits copper absorption, so chronic zinc supplementation
  can induce relative copper deficiency. The clinical implication for histamine intolerance
  is mechanistically plausible, though direct RCTs in this population are lacking.
coaching_translation: If a client has been taking zinc supplements for a long time,
  copper depletion may be contributing to histamine symptoms. Consider copper-rich
  foods and check whether the multivitamin includes copper.
caveats:
- Source is a consumer trade book.
- Excess copper is itself inflammatory and can worsen oxidative stress — do not over-supplement.
- Lab assessment of copper status (serum copper, ceruloplasmin) recommended before
  supplementing.
