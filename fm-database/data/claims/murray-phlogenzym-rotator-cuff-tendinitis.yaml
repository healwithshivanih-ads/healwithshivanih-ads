slug: murray-phlogenzym-rotator-cuff-tendinitis
statement: In a 12-week naturopathic care trial at the Canadian College of Naturopathic
  Medicine for postal workers with ≥6-week rotator cuff tendinitis, integrated treatment
  (dietary counselling + acupuncture + Phlogenzym — bromelain 90 mg + trypsin 48 mg
  + rutin 100 mg per tablet, two tablets three times daily) reduced total shoulder
  pain and disability scores by 54.5% versus 18% for matched physical exercise alone.
evidence_tier: plausible_emerging
rationale: Brantingham 2009 single RCT (n=85) — meaningful effect size on validated
  disability outcome. Multi-modal intervention limits attribution to Phlogenzym alone,
  but illustrates the integrated FM approach. Bromelain proteolytic action remains
  the headline mechanism; trypsin adds parallel anti-inflammatory effect; rutin contributes
  flavonoid collagen protection.
coaching_translation: For long-standing tendinitis (not just acute), Phlogenzym (bromelain
  + trypsin + rutin) combined with dietary support + acupuncture cut pain and disability
  scores by more than half in 12 weeks — three times the benefit of exercise alone.
  Bromelain + rutin alone (cheaper) covers most of the mechanism.
caveats:
- Multi-modal trial design — Phlogenzym was not isolated as the active component
- Take on empty stomach (as for bromelain alone)
- Phlogenzym product is European; bromelain + rutin combinations are widely available
  alternatives
- Long-standing tendinopathy often needs 8-12 weeks before improvement noted
