slug: gut-dysbiosis-may-antagonize-thiamin-response
statement: If thiamin supplementation symptoms persist, gut dysbiosis should be assessed
  as a potential antagonist.
evidence_tier: fm_specific_thin
rationale: Gut dysbiosis impairing nutrient utilization is biologically plausible
  but the direct evidence linking dysbiosis to thiamin antagonism is thin in peer-reviewed
  literature.
coaching_translation: If a client is taking thiamin but not noticing improvement,
  gut health and absorption may be a factor worth exploring with their clinician.
caveats:
- Source is a practitioner cheatsheet without primary citations.
- Persistent symptoms despite supplementation require clinical evaluation.
- Source is practitioner cheatsheet without citation.
- Gut assessment requires clinician involvement.
