slug: myo-inositol-restores-ovulation-in-pcos
statement: Myo-inositol 4 g daily (split 2 g morning + 2 g evening) restored regular
  ovulation in around 70% of women with PCOS in randomised double-blind trials, compared
  to ~20% on placebo. It improves insulin signalling, lowers ovarian testosterone,
  and improves egg and embryo quality during IVF in PCOS. Also reduces gestational
  diabetes risk in PCOS pregnancies.
evidence_tier: strong
