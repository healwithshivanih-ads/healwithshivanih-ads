sources:
- id: fett-it-starts-with-the-egg-2019
  location: Chapter 8 — Restoring Ovulation with Myo-Inositol, pg 115-119
  quote: 'In women receiving myo-inositol, nearly 70 percent ovulated compared to
    just 21 percent ovulating after taking the placebo. Women with PCOS taking a myo-inositol
    supplement during their pregnancy had a much lower risk of gestational diabetes:
    just 17 percent compared to 54 percent.'
rationale: Frontline supplement for PCOS-driven anovulatory infertility.
