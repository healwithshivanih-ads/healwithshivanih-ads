slug: red-yeast-rice-equivalent-40mg-zocor-less-side-effects
statement: Red yeast rice at 2,400mg/day is reported to be equivalent in LDL-lowering
  efficacy to 40mg simvastatin (Zocor) with fewer side effects, requiring four capsules
  per day for therapeutic effect.
evidence_tier: plausible_emerging
rationale: Red yeast rice contains monacolin K (identical to lovastatin). Comparative
  studies exist but are generally small and limited. The equivalence claim requires
  clinician oversight given statin-like mechanism and regulatory complexity.
coaching_translation: Red yeast rice acts similarly to a statin medication. It requires
  clinician supervision — the same cautions (CoQ10 depletion, liver monitoring) apply.
out_of_scope_notes: Red yeast rice has a statin-like mechanism and should be supervised
  by a clinician, especially regarding CoQ10 depletion, liver function monitoring,
  and drug interactions.
caveats:
- FDA has restricted some red yeast rice products containing significant monacolin
  K.
- CoQ10 depletion risk same as statins.
- Source is expert lecture — specific equivalence trial not cited.
