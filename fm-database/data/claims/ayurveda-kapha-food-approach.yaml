slug: ayurveda-kapha-food-approach
statement: For a kapha constitution or kapha aggravation, favour light, dry, warm, well-spiced foods with
  pungent, bitter and astringent tastes (astringent fruits, most vegetables, light grains like barley,
  millet and buckwheat, legumes, abundant spices, honey) and reduce heavy, oily, cold, dense, sweet/sour/salty
  foods (dairy, nuts, sweeteners, wheat, cold drinks).
evidence_tier: fm_specific_thin
rationale: From the Ayurvedic Institute / Lad Food Guidelines for Basic Constitutional Types — traditional
  dosha-food matching (like increases like; opposite qualities balance).
