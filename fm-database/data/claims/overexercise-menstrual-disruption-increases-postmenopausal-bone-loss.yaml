slug: overexercise-menstrual-disruption-increases-postmenopausal-bone-loss
statement: Excessive exercise during reproductive years disrupts menstrual regularity and hormonal balance,
  which increases the risk of bone loss and fractures after menopause — demonstrating that both too little
  and too much physical activity harm bone health.
evidence_tier: strong
rationale: Hypothalamic amenorrhoea from overtraining is well-established; the female athlete triad (energy
  deficiency, menstrual disturbance, low bone density) is documented in the literature. Welch frames it
  within yin-yang balance.
coaching_translation: 'More isn''t always better with exercise: over-exercising during your fertile years
  can disrupt your menstrual cycle and hormones, which comes back to harm bone density after menopause.
  Moderate, appropriate exercise protects bone; extreme exercise can deplete it.'
out_of_scope_notes: ''
caveats:
- '''Too much'' varies widely by individual; the female athlete triad is the clinical endpoint, not casual
  moderate over-exercise.'
