slug: choline-rich-foods-support-pemt
statement: Dietary choline from eggs, beets, quinoa, and lamb is particularly important
  for individuals with reduced PEMT activity, as the enzyme that synthesizes phosphatidylcholine
  endogenously is less active.
evidence_tier: plausible_emerging
rationale: PEMT rs7946 is associated with reduced phosphatidylcholine synthesis; affected
  individuals depend more heavily on dietary choline. Eggs are the richest dietary
  source; beets contain betaine which feeds the methylation cycle supporting PEMT.
  Biologically coherent and partially supported by nutrigenomics research.
coaching_translation: Eat eggs regularly (2–3 per day is fine). Include beets, quinoa,
  and lamb in weekly rotation if you suspect low choline status.
caveats:
- Consumer book framing; individual PEMT genotype not confirmed in coaching context
- Clinician input for hepatic fat or choline deficiency workup recommended
