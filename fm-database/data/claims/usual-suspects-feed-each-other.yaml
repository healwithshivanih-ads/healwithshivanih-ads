  location: Podcast — imperfect storm segment
  quote: They also feed off of each other. Infections will feed off of heavy metals
    and chemicals. Often times we have to get rid of heavy metals and chemicals first
    in order to go after the infections. Or mold is hijacking the immune system so
    the immune system can't deal at all with Lyme. It's this hodgepodge — they're
    all hijacking the immune system.
rationale: Coach reframe — explains why client's previous "just treat the Lyme" attempt
  didn't fully resolve symptoms; sets expectation for multi-pronged approach.
