slug: usual-suspects-feed-each-other
statement: The four "usual suspect" categories (metals, chemicals, mould, infections)
  do NOT act independently — they feed off each other. Heavy metals create environments
  that protect infectious organisms; mould toxins hijack immune resources that would
  otherwise clear Lyme; environmental chemicals disrupt detoxification pathways needed
  for both metal and mycotoxin clearance. Hirsch calls this the "imperfect storm"
  — addressing any single suspect in isolation often produces only partial improvement
  because the others amplify each other. Coach implication — assume cumulative exposure
  history at intake; ask about all four categories not just the one most-suspected
  from presenting symptoms.
evidence_tier: plausible_emerging
