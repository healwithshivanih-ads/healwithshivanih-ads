slug: probiotics-can-treat-sibo
statement: Probiotics can treat SIBO as a stand-alone therapy — one multi-strain trial
  produced about 82% symptomatic improvement, outperforming the antibiotic metronidazole
  — and both lactic-acid and soil-based/spore types have shown benefit.
evidence_tier: plausible_emerging
rationale: Cites SIBO probiotic trials incl. a probiotic-vs-metronidazole comparison.
coaching_translation: Counter-intuitively, probiotics can actually help clear small-intestine
  overgrowth, not feed it.
