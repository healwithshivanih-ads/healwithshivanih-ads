slug: elimination-diet-primary-therapy-chronic-ibd
statement: An elimination (oligoantigenic) diet is the primary therapy for chronic
  IBD; the most common offending foods are wheat and dairy, and IgG/IgE testing or
  a rotary diversified diet can identify individual allergens.
evidence_tier: plausible_emerging
rationale: Food allergy is widely overlooked by conventional medicine in IBD; this
  FM approach has mechanistic support from leaky-gut-mediated antigen translocation,
  though large RCTs are lacking.
coaching_translation: Removing wheat, corn, dairy, carrageenan, sugar, and refined
  carbohydrates — and implementing an elimination diet — is the cornerstone dietary
  strategy for chronic IBD.
caveats:
- Source is a textbook synthesis; individual allergen identification via IgG testing
  has variable clinical validity
- Elemental diet is an alternative for acute flares but requires clinician supervision
  due to palatability and hospitalisation requirements
