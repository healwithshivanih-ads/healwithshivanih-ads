slug: femhorm-alcohol-worsens-estrogen-metabolism
statement: Consistent alcohol intake (not the occasional drink) disrupts both phases
  of liver detox and raises aromatase activity, so the body makes more oestrogen and
  shifts it toward the less-favourable 4- and 16-hydroxy metabolites. The liver also
  preferentially detoxifies alcohol over oestrogen. In perimenopausal and menopausal
  women this can worsen sleep, hot flushes, mood swings and breast tenderness. A coach
  can invite a curious, non-judgemental experiment — an 'alcohol holiday' — to see
  whether symptoms improve.
evidence_tier: plausible_emerging
rationale: Alcohol is a common, modifiable driver of hormonal symptoms. Framing reduction
  as a self-experiment (rather than a rule) tends to get better client buy-in.
coaching_translation: 'If a client has poor sleep, mood swings or breast tenderness
  and drinks regularly, explore — gently, if they''re open — whether alcohol might
  be contributing. Offer an experiment: a couple of weeks or a ''dry January''-style
  break to notice how they feel, alongside liver-supporting basics (lemon/lime water,
  leafy greens, hydration, movement, sweating).'
out_of_scope_notes: Managing alcohol dependence or advising a true alcoholic to stop
  abruptly requires appropriate clinical/behavioural-health support, not a coach alone.
caveats:
- Frame as curiosity and a client-chosen experiment, not moralising or a prescription.
- Two-to-three glasses of wine a night meaningfully affects oestrogen metabolism on
  multiple pathways.
