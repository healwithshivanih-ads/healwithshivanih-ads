slug: avoid-aggressive-carb-restriction-in-hypothyroid-adrenal-fatigue-pregnancy
statement: Aggressive carbohydrate restriction should be avoided in patients with
  hypothyroidism, adrenal fatigue, or pregnancy.
evidence_tier: confirm_with_clinician
rationale: Very low carbohydrate intake can suppress T3 conversion and worsen HPA
  axis dysregulation. Pregnancy requires adequate glucose for foetal development.
  This is a clinician-scope safety consideration.
coaching_translation: If you have a thyroid condition, signs of adrenal burnout, or
  are pregnant, a very strict low-carb diet may not be appropriate — always check
  with your doctor first.
out_of_scope_notes: Determining suitability of carb restriction in these populations
  is outside coaching scope. Refer to clinician.
caveats:
- Clinician oversight required for these populations.
