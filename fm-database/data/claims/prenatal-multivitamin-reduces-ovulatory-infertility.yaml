slug: prenatal-multivitamin-reduces-ovulatory-infertility
statement: Daily multivitamin use is associated with roughly one-third lower risk
  of ovulatory infertility in the Nurses Health Study. Folate (synthetic folic acid
  400-800 mcg/day) in particular improves ovulation, raises follicular folate levels,
  lowers homocysteine, and in women over 35 reduces the risk of Down syndrome offspring.
  Start at least 3 months before trying to conceive.
evidence_tier: strong
linked_to_topics:
- preconception-protocol
- egg-quality
sources:
- id: fett-it-starts-with-the-egg-2019
  location: Chapter 5 — Prenatal Multivitamins, pg 79-84
  quote: Taking a multivitamin every day was associated with an even lower risk of
    ovulatory infertility. Women with a twofold higher level of folic acid were three
    times more likely to become pregnant.
rationale: Backs the universal preconception prenatal-vitamin recommendation.
