  location: Chapter 41 — Constipation, pg 717–719
  quote: When a stimulant laxative is required, we prefer senna. Senna relieves constipation
    by increasing the strength of contraction of the intestinal muscles. Like other
    stimulant laxatives, it should be limited to occasional use, as long-term use
    of senna can lead to dependence. Do not use senna for more than seven days unless
    directed by your doctor.
