slug: prayer-meditation-reduces-amygdala-activity
statement: Prayer and meditation increase prefrontal cortex activity (focus, self-regulation)
  and decrease amygdala activity (fear, anxiety).
evidence_tier: plausible_emerging
rationale: Neuroimaging studies on meditation and mindfulness consistently show prefrontal
  activation and amygdala volume/activity reduction. The extension to prayer is supported
  by some neuroscience studies but with smaller evidence bases.
coaching_translation: Regular prayer or meditation literally reshapes brain activity—strengthening
  the thinking, regulating part of your brain while quieting the fear and alarm center.
caveats:
- Prayer research is smaller in volume than meditation research.
- Should be tailored to patient's belief system.
- Source is educational synthesis.
