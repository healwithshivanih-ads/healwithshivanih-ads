slug: antioxidants-during-chemotherapy-require-coordination
statement: High-dose antioxidants such as vitamin C, vitamin E, and NAC should be timed carefully and avoided during chemotherapy
  unless coordinated with the oncology team.
evidence_tier: confirm_with_clinician
rationale: Antioxidant supplementation potentially interfering with reactive-oxygen-species-based chemotherapy mechanisms
  is a recognized clinical concern.
out_of_scope_notes: Oncology-context supplement management is entirely outside coaching scope.
caveats:
- Source is a practitioner cheatsheet without citation to specific oncology guidelines.
- Evidence is mixed; oncology team decision is paramount.
- Never recommend antioxidant supplementation to clients undergoing chemotherapy without explicit oncologist approval.
