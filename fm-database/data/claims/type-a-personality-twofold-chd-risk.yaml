slug: type-a-personality-twofold-chd-risk
statement: Type A behavior (time urgency, competitiveness, impatience, aggressiveness)
  is associated with a twofold increase in CHD risk, mediated by increased cortisol
  secretion, endothelial dysfunction, hypertension, and elevated CRP.
evidence_tier: strong
rationale: Documented in large prospective studies (Framingham, Western Collaborative
  Group Study); mechanisms include HPA-axis activation and inflammatory pathways.
coaching_translation: How you manage stress and anger matters as much for heart health
  as what you eat — chronic anger and hostility directly raise inflammation and clotting
  risk.
