slug: fall-lifestyle-routine-warm-oil-rest-vata
statement: Autumn lifestyle practices include using warm oils (almond, sunflower, or sesame) for morning
  self-massage, establishing regular mealtimes and not fasting, consuming only warm food and drinks, covering
  ears in wind and cold, staying hydrated with warm water, and prioritising rest and reducing erratic
  activity.
evidence_tier: fm_specific_thin
rationale: Vata is aggravated by irregular routine, cold, wind, and dryness. Oil massage, consistent meal
  timing, warmth, and rest are the primary lifestyle antidotes, directly countering the erratic and drying
  qualities of the season.
coaching_translation: Autumn is when routine becomes medicine. Encourage clients with vata tendencies
  (anxiety, insomnia, constipation, dry skin) to prioritise regular mealtimes, warm oily foods, and an
  early bedtime — even 30 minutes of consistency makes a difference.
out_of_scope_notes: ''
caveats:
- Traditional Ayurvedic approach; routine-based stress reduction has broader modern evidence through circadian
  and HPA-axis research.
