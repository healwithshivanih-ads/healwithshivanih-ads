slug: c-section-birth-linked-to-goal-incompletion-pattern
statement: Individuals born by C-section — particularly elective rather than medically
  indicated — are more likely to exhibit a life pattern of abandoning goals just before
  completion, mirroring the experience of being removed from the birth canal before
  completing the natural birth process.
evidence_tier: fm_specific_thin
rationale: This is a central claim of Family Constellation / Hellinger therapy. There
  is no peer-reviewed RCT or cohort study evidence supporting a causal link between
  C-section delivery and goal completion behaviour. The biological mechanism proposed
  (lack of birth canal passage = incomplete goal drive) is speculative.
coaching_translation: If you were born by C-section and notice a pattern of giving
  up just before finishing something important, this might be worth exploring with
  a somatic therapist.
out_of_scope_notes: Coaches should not present this as established fact. Frame as
  an exploratory lens, not a diagnosis.
caveats:
- No peer-reviewed evidence cited.
- Causal mechanism is speculative.
- Source is expert consensus seminar, low quality.
- Individual variation is enormous — not all C-section births produce this pattern.
