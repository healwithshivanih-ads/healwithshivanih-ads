sources:
- id: hadanny-efrati-2020-hyperoxic-hypoxic-paradox
  location: Section 4.5 Stem Cells
  quote: HBOT promotes neuronal stem cell proliferation, stimulates vasculogenic stem
    cell growth and differentiation, stimulates colonic stem cells and induces mucosal
    healing, improves the osteogenic properties of mesenchymal stem cells, and increases
    myoblast growth rate and enhances muscle regeneration. The main advantage of stimulating
    stem cells by intermittent hyperoxia instead of hypoxia, is that stem cell proliferation
    and differentiation, similar to any other regenerative process, is energy-dependent
    and cannot be accomplished in a hypoxic environment.
rationale: Comprehensive lineage-level evidence base for HBOT stem cell effects.
