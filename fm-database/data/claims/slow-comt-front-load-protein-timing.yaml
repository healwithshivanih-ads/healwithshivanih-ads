slug: slow-comt-front-load-protein-timing
statement: For slow COMT, front-loading protein (largest portion at breakfast, moderate
  at lunch, least at dinner) limits evening tyrosine that fuels catecholamines, supporting
  daytime focus and easier evening wind-down.
evidence_tier: fm_specific_thin
rationale: Tyrosine as a catecholamine precursor is established; the meal-timing application
  is a practical heuristic, not trial-tested.
coaching_translation: If you're wired at night, eating most of your protein earlier
  in the day can help you settle in the evening.
out_of_scope_notes: ''
caveats:
- Source is a consumer trade book (Ben Lynch, Dirty Genes), not primary literature.
