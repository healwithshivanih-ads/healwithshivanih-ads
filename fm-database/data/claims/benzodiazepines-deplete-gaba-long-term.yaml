slug: benzodiazepines-deplete-gaba-long-term
statement: Benzodiazepines, Z-drugs (zolpidem, eszopiclone), barbiturates, and alcohol
  all bind tightly to the GABA-A receptor at allosteric sites and increase GABA binding
  affinity. Chronic use produces receptor downregulation, tolerance, dependence, and
  rebound GABA deficiency on cessation — driving the well-known withdrawal syndromes.
  By contrast, plant-derived GABA-mimetics (cava, magnolia bark honokiol, CBD, CBG,
  low-dose muscimol from Amanita muscaria) modulate the GABA system more gently and
  carry lower (though not zero) tolerance risk. THC works in the OPPOSITE direction
  at the GABA receptor and can paradoxically increase glutamate dominance, which is
  why some users experience anxiety on cannabis.
