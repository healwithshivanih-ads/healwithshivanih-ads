slug: dash-diet-lowers-systolic-11-5mmhg-in-hypertensives
statement: The DASH diet with reduced sodium lowered systolic BP by 7.1 mm Hg in non-hypertensives
  and by 11.5 mm Hg in hypertensives.
evidence_tier: strong
rationale: Based on the landmark NHLBI DASH trial, one of the most cited dietary intervention
  RCTs in cardiovascular medicine.
coaching_translation: Following the DASH eating plan — rich in fruits, vegetables,
  and low-fat dairy while low in sodium — can lower systolic blood pressure by over
  11 points if you have hypertension.
