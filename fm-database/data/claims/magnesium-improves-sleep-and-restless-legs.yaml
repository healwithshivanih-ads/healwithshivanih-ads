slug: magnesium-improves-sleep-and-restless-legs
statement: Magnesium supplementation improves sleep quality and reduces restless leg
  syndrome symptoms in deficient individuals.
evidence_tier: plausible_emerging
rationale: Magnesium plays roles in GABA receptor activity and melatonin production;
  small RCTs and observational studies support improvement in sleep and RLS with magnesium
  supplementation, particularly in deficient populations.
coaching_translation: If your client can't sleep or has restless legs at night, magnesium
  is often the simplest and most effective first intervention to try.
caveats:
- Source is expert FM lecture.
- Dose and form matter — glycinate for sleep/muscle, citrate for bowel motility.
- Confirm with clinician if client has renal impairment.
