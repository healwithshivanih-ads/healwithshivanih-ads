slug: mayo-ear-infection-first-line-antibiotic-when-needed
statement: When antibiotics are indicated, conventional first-line is high-dose amoxicillin
  for 5 to 10 days; amoxicillin-clavulanate when recent amoxicillin exposure, conjunctivitis
  with otitis, or treatment failure at 48 to 72 hours.
