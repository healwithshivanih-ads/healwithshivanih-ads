slug: four-stages-of-cognitive-decline
statement: Cognitive decline progresses through four observable stages — asymptomatic
  (active pathology, no symptoms); SCI (subjective cognitive impairment, averaging
  10 years and where the client knows something is off but testing is still normal);
  MCI (mild cognitive impairment, where formal testing drops); and dementia (functional
  loss of activities of daily living). In Bredesen's reported cohort virtually 100%
  of SCI clients improved and 84% of MCI clients improved on the ReCODE protocol,
  making the SCI decade the highest-leverage window for prevention.
evidence_tier: plausible_emerging
