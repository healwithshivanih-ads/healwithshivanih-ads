sources:
- id: bredesen-energy-blueprint-podcast-2026
  location: Podcast — four stages segment
  quote: There are four stages you go through. One is asymptomatic. The second stage
    is SCI, subjective cognitive impairment, that lasts on average 10 years. The SCI
    people virtually 100% of these people get better when they go on the protocol
    that we developed. In our trial 84% of those MCI people still improved even though
    they were relatively late.
rationale: Names a long, actionable window (SCI averages 10 years) so coach can frame
  prevention as early-stage opportunity, not late-stage damage control.
