sources:
- id: efrati-insidetracker-podcast-2024-cognition
  location: Podcast — Alzheimer's section
  quote: Once somebody already had Alzheimer or dementia, the brain is significantly
    lost — looking at the brain we see only fluids. We do not have the infrastructure,
    so we cannot help. With the unique advanced imaging we have we can differentiate
    between totally dead tissue and metabolic dysfunction tissue — we treat the intermediate
    zone.
rationale: Critical for setting realistic expectations when families ask about HBOT
  for advanced cognitive decline.
