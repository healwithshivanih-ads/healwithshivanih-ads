slug: hbot-dementia-cannot-help-once-tissue-replaced-by-fluid
statement: Once full-blown dementia is established and brain imaging shows necrotic
  tissue replaced by cerebrospinal fluid, HBOT cannot rebuild the lost tissue because
  no infrastructure remains for stem cells to migrate along or for new blood vessels
  to grow into. Efrati's group treats only patients who show hibernating, metabolically
  dysfunctional but not fully dead tissue on perfusion MRI / SPECT — predictability
  of outcome is approximately 80 percent. The implication for prevention — engage
  HBOT (and other regenerative interventions) BEFORE full cognitive decline manifests.
evidence_tier: plausible_emerging
