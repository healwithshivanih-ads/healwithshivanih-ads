slug: over-exercise-increases-rt3
statement: Over-exercise worsens adrenal stress and increases reverse T3, making intense
  exercise counterproductive for thyroid-compromised individuals.
evidence_tier: plausible_emerging
rationale: The document explicitly states 'Over-exercise worsens adrenal stress and
  increases Reverse T3.' This is consistent with the known effect of excessive exercise
  on cortisol and deiodinase pathways.
coaching_translation: If your thyroid is struggling, pushing hard at the gym can make
  it worse by spiking cortisol and lowering active thyroid hormone. Gentle movement
  is often more effective.
