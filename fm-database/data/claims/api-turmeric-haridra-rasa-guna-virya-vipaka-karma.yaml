slug: api-turmeric-haridra-rasa-guna-virya-vipaka-karma
statement: 'The Ayurvedic Pharmacopoeia of India (API) classifies turmeric (Haridra, Curcuma longa L.)
  with: Rasa — Katu (pungent), Tikta (bitter); Guna — Ruksha (dry), Laghu (light); Virya — Ushna (hot);
  Vipaka — Katu (pungent post-digestive). Principal Karma: Kushtaghna (skin-purifying), Pramehaghna (anti-diabetic),
  Krimighna (anti-parasitic/antimicrobial), Shothaghna (anti-inflammatory/anti-oedematous). Official Matra:
  powder 1-3 g.'
evidence_tier: plausible_emerging
rationale: API Part I Vol 2 provides the official Ayurvedic pharmacopoeial standard for Haridra. The Karma
  list reflects traditional therapeutic indications recognised by the Government of India's Ayurveda pharmacopoeia.
coaching_translation: 'In Ayurveda''s official classification, turmeric is pungent and bitter, heating,
  and drying — indicated for skin conditions, blood sugar dysregulation, microbial imbalance, and inflammation.
  Official dose: 1-3 g of powder.'
out_of_scope_notes: ''
caveats:
- API energetics are traditional Ayurvedic standards; curcumin bioavailability is poor from plain powder
  — black pepper (piperine) or lipid-based formulations significantly increase absorption for pharmacological
  effects.
