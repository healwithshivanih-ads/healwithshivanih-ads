slug: stress-eicosanoid-inflammation-alzheimers-risk
statement: Chronic stress drives systemic inflammation via eicosanoid imbalance (prostaglandins and related
  signalling molecules), which may be a causal pathway linking chronic stress to increased risk of Alzheimer's
  disease.
evidence_tier: plausible_emerging
rationale: Welch describes the stress → sympathetic overdrive → eicosanoid dysregulation → tissue inflammation
  chain. Neuroinflammation as a driver of Alzheimer's pathology is increasingly supported in the literature;
  eicosanoid dysregulation as a stress-linked inflammatory mechanism is mechanistically plausible.
coaching_translation: Chronic stress creates a cascade of inflammation in the body — including the brain.
  Over time, this low-grade brain inflammation may increase the risk of dementia. Stress management is
  therefore genuinely protective for long-term brain health.
out_of_scope_notes: ''
caveats:
- The precise eicosanoid → Alzheimer's causal chain is still being worked out. Neuroinflammation as a
  contributor is increasingly accepted but is not a sole or proven cause.
