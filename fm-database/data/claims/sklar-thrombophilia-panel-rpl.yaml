slug: sklar-thrombophilia-panel-rpl
statement: 'A recurrent-pregnancy-loss thrombophilia panel covers Factor V Leiden,
  Prothrombin G20210A, Protein C and Protein S deficiency, PAI-1 polymorphism and
  antiphospholipid antibodies. Indication: two or more losses, or chemical pregnancies
  after good-quality embryo transfer. Many of the findings are actionable — low-dose
  aspirin, enoxaparin in select cases, methylated folate replacing folic acid — but
  require the test results in hand. Coaching scope is education and referral.'
