sources:
- id: fett-it-starts-with-the-egg-2019
  location: Chapter 1 — Understanding Egg Quality, pg 27-28
  quote: Most of the chromosomal abnormalities in eggs do not accumulate gradually
    over 30 or 40 years as an egg ages, but instead happen in the couple of months
    before an egg is ovulated. Aging does not directly cause chromosomal abnormalities;
    rather, it creates conditions that predispose eggs to mature incorrectly shortly
    before ovulation.
rationale: This is the central claim that makes preconception coaching meaningful.
  Without it, the whole protocol stack lacks biological rationale.
