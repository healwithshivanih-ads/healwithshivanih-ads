slug: preovulatory-window-is-when-aneuploidy-occurs
statement: Most chromosomal abnormalities in eggs do not accumulate gradually over
  decades of storage but instead happen in the final 3-4 months before ovulation,
  when the oocyte completes meiosis. This makes egg quality modifiable through targeted
  preconception inputs during that window.
evidence_tier: strong
