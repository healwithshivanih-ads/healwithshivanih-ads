slug: murray-ssri-taper-natural-bridge
statement: 'When discontinuing SSRI antidepressants, gradual tapering is essential
  — abrupt discontinuation causes dizziness, loss of coordination, fatigue, tingling,
  burning sensations, blurred vision, insomnia, vivid dreams, GI symptoms, irritability,
  anxiety, and crying spells. Murray''s bridging protocol: in MILD depression, add
  5-HTP 50 mg/day OR St John''s Wort 900 mg/day, then halve the SSRI for 2-4 weeks
  before stopping. In SEVERE depression, ADD St John''s Wort to the current SSRI dose,
  evaluate at 1 month, then taper SSRI if mood-elevation sufficient. Theoretical serotonin
  syndrome risk requires close physician monitoring — to date, no documented cases
  with SJW or 5-HTP + SSRI combination.'
evidence_tier: plausible_emerging
rationale: Clinical experience + pharmacological rationale. Mechanism — overlapping
  serotonergic support during taper window. Coach scope explicitly NOT to initiate;
  supports an already-decided clinician taper plan.
coaching_translation: 'Coming off SSRIs needs to be done slowly and with medical supervision.
  The natural medicine bridge: add 5-HTP 50 mg or St John''s Wort 900 mg, then halve
  the SSRI for 2-4 weeks before stopping (mild depression). For severe depression,
  add St John''s Wort to existing SSRI, evaluate at 1 month, then taper. The theoretical
  serotonin syndrome risk means a physician must monitor. NEVER advise abrupt SSRI
  discontinuation.'
caveats:
- NEVER advise abrupt SSRI discontinuation
- Physician monitoring during combination phase
- Serotonin syndrome theoretical but real risk — early warning signs (confusion, fever,
  sweating, tremor)
- Coach role is supportive education + nutrient repletion; tapering plan is clinical
- Combination with MAOIs ABSOLUTELY contraindicated
