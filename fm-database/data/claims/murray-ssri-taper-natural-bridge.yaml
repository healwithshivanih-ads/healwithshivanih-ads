sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 44 — Depression, Treatment Summary pg 792–793
  quote: If you wish to discontinue any antidepressant drug, we recommend that you
    work with your physician on this goal. In general, discontinuing a SSRI has to
    be done gradually. In mild cases of depression, we recommend using either 5-HTP
    (50 mg per day) or Saint-John's-wort extract (900 mg per day) while you work with
    your doctor to reduce the drug to half the daily dosage for two to four weeks.
