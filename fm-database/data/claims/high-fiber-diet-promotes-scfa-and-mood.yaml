slug: high-fiber-diet-promotes-scfa-and-mood
statement: A high-fiber diet promotes diverse gut bacteria that produce short-chain fatty acids (SCFAs), which reduce gut
  and brain inflammation and are associated with improved mood and lower risk of depression.
evidence_tier: plausible_emerging
rationale: SCFA production from dietary fiber is well-established; the link to mood improvement and lower depression risk
  is supported by epidemiological and some interventional data but consensus-level RCTs are still limited.
coaching_translation: Eating plenty of fruits, vegetables, legumes, and whole grains feeds your gut bacteria, which in turn
  produce compounds that protect your brain and improve your mood.
