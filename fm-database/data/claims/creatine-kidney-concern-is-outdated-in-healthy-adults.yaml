slug: creatine-kidney-concern-is-outdated-in-healthy-adults
statement: The belief that creatine monohydrate damages the kidneys in healthy adults
  is an outdated myth; the small rise in serum creatinine it causes reflects creatine
  metabolism, not kidney injury.
evidence_tier: plausible_emerging
rationale: Creatine is metabolised to creatinine, so supplementation modestly raises serum
  creatinine and can superficially mimic reduced kidney function on a lab report — but
  long-term studies in healthy adults at standard doses show no harm to kidney function.
  Caution still applies in pre-existing kidney disease, where supplementation should be
  clinician-supervised.
coaching_translation: Creatine has a reputation for harming the kidneys, but for healthy
  people at normal doses that's a myth — it can nudge one kidney lab number up without
  any actual kidney damage. Anyone with existing kidney problems should check with their
  doctor first.
caveats:
- Source is Instagram educational content.
- Does not apply to people with existing kidney disease — those cases need medical supervision.
