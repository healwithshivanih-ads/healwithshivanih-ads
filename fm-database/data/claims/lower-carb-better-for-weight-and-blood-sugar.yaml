slug: lower-carb-better-for-weight-and-blood-sugar
statement: Lower-carb diets outperform higher-carb, lower-fat diets for weight loss
  and blood sugar (systematic review plus the Gardner A-to-Z RCT), with most people
  feeling best at roughly 100–150 g of carbohydrate a day or less and insulin-resistant
  people responding most.
evidence_tier: strong
rationale: Cites a systematic review/meta-analysis and the Gardner JAMA A-to-Z RCT.
coaching_translation: Most people feel best keeping carbs moderate-to-low — cut dense
  starches first and lean on vegetables and berries.
