slug: every-1pct-ldl-drop-reduces-mi-risk-2pct
statement: For every 1% drop in LDL-C, risk of heart attack drops by 2%; for every
  1% increase in HDL-C, risk drops by 3–4%.
evidence_tier: strong
rationale: Derived from large-scale statin and epidemiological trials; standard reference
  in cardiovascular guidelines.
coaching_translation: Lowering LDL and raising HDL — even modest improvements — meaningfully
