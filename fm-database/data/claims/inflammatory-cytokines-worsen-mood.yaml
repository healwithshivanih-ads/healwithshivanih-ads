slug: inflammatory-cytokines-worsen-mood
statement: Pro-inflammatory cytokines such as IL-6 and TNF-alpha can directly worsen
  mood regulation and exacerbate anxiety and depression.
evidence_tier: plausible_emerging
rationale: The cytokine-mood hypothesis has meaningful supporting literature (e.g.,
  sickness behaviour research), but speaker does not cite specific papers. Plausible_emerging
  is appropriate given expert-consensus source type.
coaching_translation: Inflammation in the body — including from the gut — can chemically
  worsen anxiety and depression, not just situational stress.
caveats:
- No specific studies cited by speaker.
- Causal direction and magnitude in healthy populations without frank inflammatory
  disease is still under study.
