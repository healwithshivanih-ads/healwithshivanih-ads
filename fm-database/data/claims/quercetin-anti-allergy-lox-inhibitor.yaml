slug: quercetin-anti-allergy-lox-inhibitor
statement: Quercetin at 100–500 mg/day acts as a natural LOX enzyme inhibitor and
  anti-allergy agent, particularly useful in patients with elevated IgE antibodies,
  allergic symptoms (sneezing, itching), or allergy-driven inflammation.
evidence_tier: plausible_emerging
rationale: Quercetin's mast cell-stabilizing and LOX-inhibiting properties are supported
  by in vitro and some animal studies. Human RCT data are limited but emerging. It
  is widely used in FM practice for allergic conditions.
coaching_translation: If your client has allergy-type symptoms alongside inflammation
  — sneezing, itchy eyes, skin reactions — quercetin is a natural plant compound that
  can help calm that specific pathway.
caveats:
- Source is expert FM lecture (moderate quality). Doses cited (100–200mg) are on the
  lower end; most clinical studies use 500–1000mg/day.
