slug: hypothyroidism-elevates-ldl-lpa
statement: Patients with overt or subclinical hypothyroidism have elevated LDL-C and
  Lp(a), increasing CAD risk; all patients with elevated blood lipids should be screened
  for hypothyroidism.
evidence_tier: strong
rationale: Thyroid hormone regulates LDL receptor expression and hepatic lipid metabolism;
  well-established clinical association.
coaching_translation: If your cholesterol is high — especially Lp(a) — your thyroid
  should be checked. Low thyroid function is a treatable cause of high cholesterol.
