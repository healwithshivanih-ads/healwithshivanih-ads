slug: sleep-before-10pm-supports-adrenal-recovery
statement: Getting adequate sleep and going to bed by 10:00 PM supports adrenal hormone
  restoration.
evidence_tier: fm_specific_thin
rationale: The specific 10 PM bedtime recommendation is FM/integrative medicine conventional
  wisdom, correlating with cortisol's natural nadir and growth hormone secretion patterns,
  but lacks specific RCT support for this exact recommendation.
coaching_translation: Your adrenals do much of their repair during the first half
  of the night. Getting to bed before 10 PM helps protect this recovery window.
caveats:
- The 10 PM cutoff is FM convention, not RCT-backed. Source is an expert consensus
  toolkit.
