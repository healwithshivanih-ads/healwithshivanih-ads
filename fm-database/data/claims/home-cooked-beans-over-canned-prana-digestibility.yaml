slug: home-cooked-beans-over-canned-prana-digestibility
statement: Canned foods of any kind have less vitality (prana) than freshly cooked equivalents and sit
  more heavily in the body; home-cooked beans, though time-intensive, are markedly easier to digest and
  more energetically alive than canned.
evidence_tier: fm_specific_thin
rationale: Ayurveda holds that food carries prana (vital life force) that dissipates with processing,
  storage, and canning. Nutritionally, high-heat canning destroys heat-sensitive B vitamins, and the BPA
  in tin-can linings (even BPA-free alternatives) is a concern. Freshly cooked legumes also allow the
  cook to discard the soaking and cooking water, removing gas-forming oligosaccharides.
coaching_translation: Encourage clients to cook their own beans — not because canned is terrible, but
  because home-cooked beans are meaningfully easier on digestion, richer in nutrition, and free of can-lining
  concerns. Batch-cook once or twice a week and use across multiple meals.
out_of_scope_notes: ''
caveats:
- For clients with very limited time, occasional use of canned beans (rinsed well) is far better than
  avoiding legumes entirely.
- BPA concerns are real but not unique to beans — affects all canned foods.
