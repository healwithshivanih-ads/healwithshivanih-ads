slug: adrenal-fatigue-testing-is-unreliable
statement: '''Adrenal fatigue'' is driven by the stressor rather than a primary adrenal
  failure, and a 58-study systematic review found adrenal-fatigue testing inaccurate
  — so the practical move is to treat the root stress, which is frequently the gut,
  rather than chase adrenal tests.'
evidence_tier: confirm_with_clinician
rationale: Cites Cadegiani & Kater 2016 systematic review; touches on testing/diagnosis,
  which is clinician territory.
coaching_translation: Skip the pricey 'adrenal fatigue' tests — the fix is addressing
  the underlying stress (often the gut), which a coach can support.
