slug: sklar-tpo-antibodies-implantation
statement: Elevated TPO (thyroid peroxidase) or thyroglobulin antibodies indicate
  active autoimmune attack on the thyroid and are independently associated with higher
  rates of implantation failure and first-trimester loss, regardless of whether TSH,
  free T3 and free T4 are still in the reference range. Antibody testing belongs on
  every preconception thyroid panel.
