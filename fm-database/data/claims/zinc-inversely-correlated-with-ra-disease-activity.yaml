slug: zinc-inversely-correlated-with-ra-disease-activity
statement: Plasma zinc levels are inversely correlated with ESR, CRP, IL-1-beta, and
  TNF-alpha in RA patients; zinc deficiency is common (worsened by corticosteroid
  use which depletes zinc).
evidence_tier: plausible_emerging
rationale: Pizzorno cites multiple observational studies. Mechanism via Cu-Zn SOD
  cofactor role and delta-6-desaturase (rate-limiting in omega-3 conversion). Zinc
  supplementation alone has modest effect; works best as part of multi-nutrient protocol.
coaching_translation: Zinc is depleted in most RA patients, especially those on corticosteroids.
  Plasma zinc tracks inversely with inflammation markers — so repleting it is part
  of the protocol.
caveats:
- Zinc picolinate, monomethionine, or citrate are preferred forms.
- Maintain 10:1 Zn:Cu ratio to avoid copper deficiency.
- Single-nutrient zinc has only slight therapeutic effect; combine with selenium,
  B6, B5, antioxidants.
