slug: lyme-western-blot-five-band-bingo
statement: CDC two-tier Lyme testing (ELISA followed by Western blot) misses approximately
  half of chronic Lyme cases because Lyme, Bartonella, mold toxicity, and long COVID
  T-cell exhaustion all suppress antibody production. Even when conventional interpretation
  reports a Western blot as negative, the presence of ANY ONE of five specific bands
  indicates Borrelia exposure — 23 (Outer Surface Protein C), 31 (OspA), 34 (OspB),
  39, and 83/93. Band 31 alone can false-positive with Epstein-Barr or autoimmunity,
  but in combination with chronic-fatiguing musculoskeletal illness and migratory
  pain it is diagnostic. iGenex Laboratories (California) immunoblot tests 9 Borrelia
  strains and is preferred over the standard two-tier protocol in symptomatic patients.
