  quote: Half of my patients will never test positive by an ELISA or a Western blot.
    There are five numbers on a Western blot or an immunoblot that if any one of these
    numbers is positive, you have been exposed to Lyme disease — 23, 31, 34, 39, and
    83/93. iGenex Laboratories in California does an immunoblot that checks for nine
    strains of Lyme disease.
