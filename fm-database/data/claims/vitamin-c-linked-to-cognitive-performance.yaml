slug: vitamin-c-linked-to-cognitive-performance
statement: There is an association between the body's vitamin C level and cognitive
  performance; vitamin C may be depleted in people with cognitive impairment such
  as Alzheimer's disease.
evidence_tier: plausible_emerging
rationale: Supported by Travica et al. 2019 cross-sectional study (Front Aging Neurosci)
  and systematic review (Nutrients, 2017) cited in document.
coaching_translation: Getting enough vitamin C from fruits and vegetables isn't just
  about immune health — it may also protect your brain and mood.
caveats:
- Most evidence is observational/cross-sectional — causality not established.
- Source is an educational toolkit synthesizing study data.
