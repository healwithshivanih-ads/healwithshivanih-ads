slug: adaptogens-rebalance-hpa-axis
statement: Adaptogenic herbs (ashwagandha, rhodiola) help rebalance HPA axis function,
  support cortisol rhythm restoration, and reduce adrenal burnout symptoms.
evidence_tier: plausible_emerging
rationale: Ashwagandha and rhodiola have RCTs supporting cortisol reduction and stress
  resilience; however this document is a synthesis and does not cite those specific
  trials.
coaching_translation: Adaptogenic herbs like ashwagandha and rhodiola help your stress
  system find balance — not by suppressing stress, but by improving your body's adaptability.
caveats:
- Source is educational synthesis. Specific dosing should be verified with clinician.
- Quality and form of adaptogen matters — standardized extracts preferred.
