slug: leaky-gut-leaky-brain-gaba-test
statement: Oral GABA does not normally cross an intact blood-brain barrier (it is
  too large and polar). If a client feels a clear calming or sedating effect from
  oral GABA supplementation, this is presumptive clinical evidence of blood-brain
  barrier permeability, which commonly co-occurs with intestinal permeability (leaky
  gut). Sherr uses this as a low-cost diagnostic — positive subjective response to
  GABA supports prioritising gut healing (heal the gut, restore the BBB, and the underlying
  GABA deficiency typically resolves with the parasympathetic restoration that follows).
evidence_tier: fm_specific_thin
