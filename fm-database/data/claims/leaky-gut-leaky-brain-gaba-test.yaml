- id: sherr-energy-blueprint-podcast-2026-methylene-blue
  location: Podcast — leaky gut leaky brain segment
  quote: If you take GABA and you feel more relaxed it's almost diagnostic that that
    barrier is not doing what it's supposed to do. And that correlates of course to
    having a leaky gut as well.
rationale: Useful pragmatic clinical heuristic when a client mentions they tried oral
  GABA and felt calmer — flags gut-barrier work as priority.
