slug: egg-has-15000-mitochondria
statement: A single mature oocyte contains over fifteen thousand mitochondria — more
  than ten times any other cell type in the body — reflecting the enormous ATP demand
  of meiotic chromosome processing, fertilisation, and the first days of embryo development
  before implantation.
