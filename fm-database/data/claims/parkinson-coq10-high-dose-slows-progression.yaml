- id: murray-pizzorno-2012-encyclopedia
  location: Parkinson chapter, p 1367-1368
  quote: In one trial of CoQ10 supplementation, progression of Parkinson's disease
    was reduced by 44%. The subjects who received the largest dose of CoQ10 displayed
    significant improvement in mental function, motor function, and ability to carry
    out activities of daily living. Average plasma levels of CoQ10 were approximately
    1.8, 2.1, and 4.5 mcg/ml, respectively, for the 300, 600, and 1200 mg dosages.
