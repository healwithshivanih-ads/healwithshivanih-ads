slug: parkinson-coq10-high-dose-slows-progression
statement: In a 16-month trial of CoQ10 in early Parkinson's disease, 1200 mg per
  day produced significant improvement in mental function, motor function, and ability
  to carry out daily living activities — with a 44% reduction in disease progression
  versus placebo. Lower doses (300 and 600 mg) showed lesser benefit. Achieving adequate
  plasma CoQ10 levels (4.5 mcg/ml) appears important. Later trials had inconsistent
  results, but CoQ10 remains safe and reasonable as adjunctive support.
evidence_tier: plausible_emerging
