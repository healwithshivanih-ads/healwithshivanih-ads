  location: Chapter 7 — Melatonin and Other Antioxidants, pg 105-107
  quote: CCRM, arguably the top IVF clinic in the U.S., recommends that women preparing
    for IVF take 200 IU of vitamin E. In women over age 35, greater intake of vitamin
    E through supplements was linked to a shorter time to pregnancy.
rationale: Useful for clients who want a low-cost antioxidant baseline beyond the
  prenatal.
