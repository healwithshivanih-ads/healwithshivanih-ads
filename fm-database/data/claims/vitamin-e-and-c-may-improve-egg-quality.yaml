slug: vitamin-e-and-c-may-improve-egg-quality
statement: Vitamin E 200 IU and vitamin C 500 mg daily are reasonable additions to
  a fertility protocol, particularly for women with unexplained infertility over 35.
  CCRM (a leading IVF clinic) recommends 200 IU vitamin E and 500 mg vitamin C; doses
  above 400 IU vitamin E may not be ideal for overall health.
evidence_tier: plausible_emerging
