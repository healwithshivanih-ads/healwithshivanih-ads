slug: low-stomach-acid-increases-food-sensitivity
statement: Low stomach acid (hypochlorhydria), including from long-term PPI use, increases
  food sensitivity by impairing protein digestion and raising intestinal antigen load.
evidence_tier: plausible_emerging
rationale: 'The mechanism is biologically plausible: gastric acid denatures proteins;
  impaired denaturation means larger peptides enter the small intestine, increasing
  antigen load. Association between PPI use and food sensitization has some supportive
  literature, though direct causality in clinical RCTs is limited.'
coaching_translation: Clients on long-term antacids or PPIs may be unknowingly increasing
  their food sensitivity risk. Support gut health and encourage them to discuss with
  their doctor whether they still need acid-blocking medication.
out_of_scope_notes: Coaches should NOT advise clients to stop PPI or acid-blocking
  medications — this is a clinician decision.
caveats:
- Source is expert lecture, moderate quality.
- Verify PPI–food sensitization research with peer-reviewed sources before citing
  to clients.
- PPI discontinuation guidance is strictly clinician scope.
