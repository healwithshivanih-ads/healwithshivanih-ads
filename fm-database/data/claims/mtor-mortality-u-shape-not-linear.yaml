  location: Podcast — mTOR and cancer myth segment
  quote: mTOR is not an initiator of cancer. It's a protein complex. The mechanism
    is the same, the input is different but the mechanism is the same. So that protein
    causes cancer because of mTOR is the same way of saying exercise causes cancer
    because of mTOR in muscle.
rationale: Disarms a common client objection ("won't more protein give me cancer?");
  coach can reframe with confidence.
