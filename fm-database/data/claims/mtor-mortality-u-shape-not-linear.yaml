slug: mtor-mortality-u-shape-not-linear
statement: The popular claim that dietary protein causes cancer via mTOR activation
  is unsupported. mTOR is a central signaling kinase activated by amino acids, resistance
  training, growth hormone, and insulin; it is required for muscle protein synthesis
  and tissue repair, not a cancer initiator. The relationship between mTOR signaling
  and all-cause mortality follows a U-shaped curve — both very high and very low mTOR
  activity associate with elevated mortality. By the same reductive logic that "protein
  causes cancer via mTOR", resistance training would also cause cancer, which is contradicted
  by every longevity dataset.
evidence_tier: plausible_emerging
