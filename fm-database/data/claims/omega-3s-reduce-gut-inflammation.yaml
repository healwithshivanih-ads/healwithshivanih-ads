slug: omega-3s-reduce-gut-inflammation
statement: Omega-3 fatty acids have potent anti-inflammatory properties; inflammation
  in the gut can negatively impact brain function, and omega-3s help reduce this.
evidence_tier: strong
rationale: Anti-inflammatory mechanism of EPA/DHA is well-established. Reduction of
  systemic and gut inflammation by omega-3s is supported by numerous RCTs.
coaching_translation: Eating fatty fish (salmon, sardines) or taking fish oil helps
  cool gut inflammation, which in turn benefits brain health.
