slug: ginkgo-biloba-stroke-recovery
statement: Ginkgo biloba extract standardized to 24% ginkgo flavon glycosides and
  6% terpenoids has been studied for cerebrovascular insufficiency and enhances stroke
  recovery.
evidence_tier: plausible_emerging
rationale: Multiple studies on cerebrovascular effects of GBE cited in textbook; mechanism
  involves improved cerebral blood flow and neuroprotection.
coaching_translation: Standardized Ginkgo biloba extract may support brain circulation
  and recovery after stroke — look for products standardized to the researched ratios.
