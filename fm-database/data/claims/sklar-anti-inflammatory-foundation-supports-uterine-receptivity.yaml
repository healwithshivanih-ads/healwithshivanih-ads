slug: sklar-anti-inflammatory-foundation-supports-uterine-receptivity
statement: An anti-inflammatory dietary pattern — omega-3-rich fish (wild salmon,
  sardines), colourful vegetables, turmeric and ginger, with reduction of refined
  sugar, processed foods, and (where reactive) gluten and dairy — reduces systemic
  inflammatory load on the endometrium and is a foundation intervention that supports
  implantation regardless of which specific root cause is also being addressed.
