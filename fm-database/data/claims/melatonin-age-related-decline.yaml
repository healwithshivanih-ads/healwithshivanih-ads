slug: melatonin-age-related-decline
statement: Endogenous melatonin synthesis (both pineal and mitochondrial) declines
  roughly linearly from peak in adolescence and falls sharply after age 40. The decline
  parallels the age-related rise in cardiovascular disease, neurodegenerative disease,
  cancer, and stress-related conditions. This temporal correlation is part of the
  rationale for considering supplemental melatonin in midlife and beyond — not solely
  as a sleep aid but as a mitochondrial protectant during a period of natural decline.
  Russell Reiter's research further shows that endogenous mitochondrial melatonin
  is upregulated by sunlight exposure and red/near-infrared light, providing a non-supplemental
  lever to restore some production.
