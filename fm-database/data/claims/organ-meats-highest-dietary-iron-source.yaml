slug: organ-meats-highest-dietary-iron-source
statement: Organ meats (e.g., liver, kidney) represent the highest bioavailable dietary
  sources of heme iron and are recommended as a primary food-first strategy for managing
  iron deficiency.
evidence_tier: strong
rationale: Organ meats are dense in heme iron with the highest absorption rates (20–40%).
  This is consistent with established nutritional science for iron repletion through
  diet.
coaching_translation: If a client eats meat, liver and other organ meats are by far
  the most effective whole-food iron sources — much more efficient than plant sources.
caveats:
- Source is an expert lecture; consistent with established nutritional science.
- Dietary change alone may be insufficient for established deficiency — refer to clinician
  for assessment.
