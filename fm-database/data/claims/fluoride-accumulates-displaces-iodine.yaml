slug: fluoride-accumulates-displaces-iodine
statement: Fluoride may accumulate in tissues and displace iodine, an essential nutrient;
  excessive fluoride intake (especially in children who swallow toothpaste) can lead
  to fluorosis.
evidence_tier: plausible_emerging
rationale: Fluorosis from excessive fluoride intake is established (dental and skeletal).
  The iodine displacement claim is biologically plausible (competitive halogen behavior)
  but clinical evidence in the context of typical dental fluoride exposure is limited
  and contested.
coaching_translation: Using fluoride products mindfully — especially for young children
  — is reasonable given concerns about accumulation. Supervise children's toothpaste
  use.
caveats:
- Fluoride safety in dental use is controversial; mainstream dental organizations
  support its use for cavity prevention. Iodine displacement at typical dental exposure
  levels is not definitively proven.
