slug: green-tea-egcg-reduces-prostate-cancer-progression
statement: 'Green tea polyphenols (especially epigallocatechin gallate, EGCG) inhibit
  both hormone-sensitive and hormone-insensitive prostate cancer cells in vitro and
  reach prostate tissue when consumed. In a one-year proof-of-principle trial of 60
  men with pre-cancerous lesions, 600 mg per day green tea polyphenol extract led
  to only 1 cancer in 30 treated men vs 9 in 30 placebo. PSA dropped consistently
  in the green tea group. Effective dose: 300–400 mg per day green tea extract standardized
  to ≥80% polyphenols, or 3–5 cups brewed daily.'
evidence_tier: plausible_emerging
