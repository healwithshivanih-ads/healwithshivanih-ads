  location: Chapter 86 — Prostate Cancer (Prevention), pg 1434-1436
  quote: The 60 men in the study were given either a placebo or 600 mg green tea polyphenol
    extract per day. After one year, only one tumor was diagnosed among the 30 extract-treated
    men, whereas nine cancers were found among the 30 placebo-treated men. Total PSA
    levels were consistently lower in the green tea group.
rationale: Strongest clinical evidence for any single botanical in prostate cancer
  prevention. Watch caffeine sensitivity at higher doses — use decaffeinated extract
  if needed.
