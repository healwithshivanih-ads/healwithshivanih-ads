slug: ancestral-nutrition-for-fertility-emphasises-organ-meats
statement: 'Ancestral-pattern preconception nutrition emphasises nutrient-dense whole
  foods: organ meats (liver, heart for CoQ10 and B-vitamin density), fish and seafood
  (omega-3), pasture-raised eggs, vitamin-D-rich foods, full-fat dairy where tolerated.
  Modern multivitamins approximate but do not replicate the food matrix in which these
  nutrients evolved to be absorbed. For Indian clients this pattern can be adapted
  using ghee, paneer, curd, eggs (if not strict-veg), small fish, and full-fat milk-based
  preparations.'
