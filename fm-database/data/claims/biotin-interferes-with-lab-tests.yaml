slug: biotin-interferes-with-lab-tests
statement: Biotin supplementation can cause false results in many laboratory assays;
  it should be stopped 3–4 days before lab work.
evidence_tier: strong
rationale: FDA and multiple laboratory bodies have issued warnings about biotin interference
  in immunoassays (troponin, thyroid, hormones). This is consensus-accepted.
coaching_translation: Always remind clients taking biotin to stop it 3–4 days before
  any blood test.
caveats:
- Particularly important for thyroid panels, cardiac markers, and hormone tests.
