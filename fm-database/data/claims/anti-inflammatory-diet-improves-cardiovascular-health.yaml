slug: anti-inflammatory-diet-improves-cardiovascular-health
statement: An anti-inflammatory diet improves cardiovascular health by lowering blood
  pressure, reducing cholesterol levels, and improving blood vessel function.
evidence_tier: strong
rationale: The cardiovascular benefits of anti-inflammatory dietary patterns (especially
  Mediterranean-style) are supported by robust RCT and epidemiological evidence including
  the PREDIMED trial.
coaching_translation: Choosing anti-inflammatory foods like olive oil, nuts, fatty
  fish, and vegetables can support a healthier heart, better blood pressure, and improved
  cholesterol levels.
caveats:
- Source is a coaching toolkit. Clients with diagnosed cardiovascular disease should
  work with their clinician alongside dietary changes.
