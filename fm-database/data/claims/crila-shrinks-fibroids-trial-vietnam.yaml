slug: crila-shrinks-fibroids-trial-vietnam
statement: Crila (Crinum latifolium standardised extract) decreased size or stopped
  growth of uterine fibroid tumours in 79.5% of women in a Vietnamese clinical study;
  in the remaining 20.5%, growth slowed substantially. Crila may also reduce heavy
  menstrual flow associated with fibroids.
evidence_tier: fm_specific_thin
rationale: Pizzorno cites the Vietnamese clinical research from Prof. Nguyen Thi Ngoc
  Tram. Studies are mostly from Vietnam without Western RCT replication; mechanism
  not fully characterised but appears to involve modulation of cell proliferation.
coaching_translation: A traditional Vietnamese herb (Crila) showed in clinical studies
  that it can shrink or stop the growth of fibroids in about 80% of women. Side effects
  are mild and fade with use. Worth trying before surgery in pre-menopausal cases.
caveats:
- Most clinical data from Vietnam; Western replication limited.
- Side effects — mild nausea, headache, vaginal dryness, hot flashes; decrease over
  time.
- Use 3-6 months minimum to assess response.
- Not for use in pregnancy or lactation.
