slug: magnesium-deficiency-common-in-diabetics
statement: Magnesium deficiency is common in diabetics and lowest in those with severe
  retinopathy; magnesium 400–500 mg/day improves insulin response, glucose tolerance,
  and RBC membrane fluidity.
evidence_tier: plausible_emerging
rationale: Multiple studies document hypomagnesaemia in T2DM; RCTs show glycaemic
  improvements with supplementation (e.g., de Valk 1998). Pizzorno recommends aspartate
  or citrate forms.
coaching_translation: Magnesium is a foundational mineral for blood sugar control
  and should be prioritised in any diabetic, especially those with eye complications.
