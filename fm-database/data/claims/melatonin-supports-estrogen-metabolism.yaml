slug: melatonin-supports-estrogen-metabolism
statement: Melatonin may support healthy estrogen metabolism.
evidence_tier: fm_specific_thin
rationale: Listed in the FMCN toolkit with qualifying language ('some evidence').
  Mechanistic rationale includes antioxidant properties and potential modulation of
  CYP enzyme activity, but RCT evidence is limited.
coaching_translation: Melatonin, best known for sleep, may also have a role in supporting
  hormone balance — another reason good sleep hygiene matters for hormonal health.
caveats:
- Evidence is preliminary; listed as 'some evidence' in source
- Melatonin dosing is out of coaching scope
- Source is expert-consensus FM toolkit
out_of_scope_notes: Melatonin supplementation dosing requires clinician guidance.
