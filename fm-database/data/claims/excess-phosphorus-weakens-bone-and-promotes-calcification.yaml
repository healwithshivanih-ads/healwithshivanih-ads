slug: excess-phosphorus-weakens-bone-and-promotes-calcification
statement: Excess phosphorus from processed foods weakens bone and promotes arterial calcification.
evidence_tier: plausible_emerging
rationale: Elevated dietary phosphorus disrupting FGF-23 and PTH-mediated calcium/phosphorus balance with adverse bone and
  vascular effects is supported by observational and mechanistic research.
coaching_translation: Encourage clients to reduce processed foods high in phosphate additives for bone and cardiovascular
  health.
caveats:
- Source is a practitioner cheatsheet without primary citations.
- Most relevant in CKD; evidence in healthy populations is less robust.
- Source is practitioner cheatsheet.
