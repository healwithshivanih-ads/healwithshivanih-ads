out_of_scope_notes: Sleeping pill tapering is clinician scope. Coach role — share
  the evidence, support sleep-hygiene + natural alternatives, refer back to prescriber
  for tapering plan.
sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 71 — Insomnia, pg 1187–1188
  quote: There are now 18 population-based studies that show a clear link between
    the use of sleeping pills and increased mortality risk. The death rate for those
    who did not use sleeping pills was 1.2%. It was 6.1% for people with sleeping
    pill prescriptions. They also had a 35% higher risk of cancer. Kripke and colleagues
    estimate that sleeping pills are linked to 320,000 to 507,000 U.S. deaths each
    year.
