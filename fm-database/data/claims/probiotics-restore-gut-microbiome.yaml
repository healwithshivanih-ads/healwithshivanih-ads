slug: probiotics-restore-gut-microbiome
statement: Probiotics are used in the Re-inoculate phase of gut healing to restore beneficial bacteria after dysbiosis or
  antibiotic-related disruption of the gut microbiome.
evidence_tier: plausible_emerging
rationale: Probiotics have a substantial evidence base for specific conditions (e.g., antibiotic-associated diarrhea, IBS,
  pouchitis), and their use in gut microbiome restoration post-dysbiosis is broadly supported, though strain- and condition-specific
  responses vary.
coaching_translation: After gut disruption — from antibiotics, stress, or infection — probiotics help repopulate beneficial
  bacteria that are essential for a healthy gut barrier.
caveats:
- Strain selection and dosing are not specified in this document.
- Clients on immunosuppressants or with SIBO should consult clinician before probiotic use.
