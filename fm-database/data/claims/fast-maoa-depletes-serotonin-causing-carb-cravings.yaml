slug: fast-maoa-depletes-serotonin-causing-carb-cravings
statement: A fast MAOA variant degrades serotonin, dopamine, and norepinephrine more
  rapidly than normal, producing low serotonin states that drive carbohydrate and
  sugar cravings as a compensatory self-medication via the tryptophan pathway.
evidence_tier: plausible_emerging
rationale: The MAOA enzyme's role in monoamine catabolism is well established; the
  specific SNP-to-phenotype link (fast MAOA → serotonin depletion → carb craving)
  is mechanistically plausible but relies on single-SNP determinism that is not well
  supported by RCT evidence. Source is a consumer trade book.
coaching_translation: If a client craves carbs or sweets intensely, especially in
  the evening, and feels depressed beforehand but briefly better after eating, this
  pattern may reflect rapid serotonin turnover. Supporting regular protein intake
  throughout the day and choosing complex carbs may help stabilise mood and reduce
  cravings.
caveats:
- Source is a consumer trade book, not primary literature
- Single-SNP causation is oversimplified; environment and lifestyle interact
- Genetic testing interpretation and medication decisions require clinician input
