slug: smoking-70pct-greater-cvd-mortality
statement: Smokers have a 70% greater risk of death from CVD than nonsmokers, and
  quitting smoking reduces relative CVD mortality by 36% in patients with CAD.
evidence_tier: strong
rationale: Established epidemiological data; smoking cessation as CVD intervention
  is among the most evidence-based interventions.
coaching_translation: Quitting smoking is the single most impactful step a smoker
  can take to reduce heart disease risk.
