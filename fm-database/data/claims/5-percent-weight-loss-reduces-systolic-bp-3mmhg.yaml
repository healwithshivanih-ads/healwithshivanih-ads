slug: 5-percent-weight-loss-reduces-systolic-bp-3mmhg
statement: Every 5% loss of excess body weight is associated with an average reduction
  of approximately 3 mmHg in systolic blood pressure.
evidence_tier: strong
rationale: The relationship between weight loss and blood pressure reduction is well-established
  in clinical trials and guidelines.
coaching_translation: Even small amounts of weight loss make a meaningful difference
  to blood pressure. Just 2–3 pounds lost for someone 50 pounds overweight can move
  the needle.
