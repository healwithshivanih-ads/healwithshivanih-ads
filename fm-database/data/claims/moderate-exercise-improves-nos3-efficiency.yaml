slug: moderate-exercise-improves-nos3-efficiency
statement: Moderate aerobic exercise enhances NOS3 gene expression and enzyme efficiency
  through shear-stress-mediated signalling in endothelial cells, improving nitric
  oxide production and vascular function.
evidence_tier: strong
rationale: Exercise-induced upregulation of eNOS (NOS3) via fluid shear stress on
  endothelium is well established in peer-reviewed cardiovascular literature with
  strong mechanistic and RCT evidence.
coaching_translation: Regular moderate-intensity movement (e.g., 20+ minutes daily
  walking, cycling, swimming) is one of the most powerful tools for NOS3 support and
  blood pressure management—independent of weight loss.
