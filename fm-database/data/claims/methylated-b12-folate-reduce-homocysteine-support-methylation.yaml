slug: methylated-b12-folate-reduce-homocysteine-support-methylation
statement: Methylated B12 (methylcobalamin) and folate (5-MTHF) reduce elevated homocysteine
  and support methylation pathways including estrogen detoxification.
evidence_tier: strong
rationale: The role of B12 and folate in the methionine cycle and homocysteine metabolism
  is well-established with strong biochemical and epidemiological evidence. Elevated
  homocysteine is a recognised marker of methylation insufficiency, and supplementation
  with methylated forms has demonstrated reduction in homocysteine in RCTs.
coaching_translation: B12 and folate — especially in their 'active' methylated forms
  — are essential for lowering homocysteine (an inflammation marker) and helping your
  body process and clear estrogen and toxins.
caveats:
- High-dose B12 supplementation in CKD patients should be supervised by a clinician.
- Methylated forms preferred in suspected MTHFR variants.
