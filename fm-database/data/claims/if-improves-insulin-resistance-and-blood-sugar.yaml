slug: if-improves-insulin-resistance-and-blood-sugar
statement: Intermittent fasting may improve insulin resistance and blood sugar metabolism
  based on shorter-duration human and animal studies.
evidence_tier: plausible_emerging
rationale: Multiple referenced studies (Patterson 2015, Mattson 2017, de Cabo 2019
  in NEJM) support benefit of IF on insulin sensitivity and glucose; longer-term RCTs
  are still needed.
coaching_translation: Structured eating windows or fasting days may help your body
  use insulin more effectively and stabilize blood sugar over time.
caveats:
- Evidence is primarily from shorter-duration studies
- Longer-term sustained benefit not yet established
- Insulin-dependent diabetics should only pursue under clinician supervision
