slug: chasteberry-prolactin-fertility
statement: Chasteberry (Vitex agnus-castus) inhibits prolactin secretion and is the
  best-documented herb for menstrual cycle regulation and fertility. A double-blind
  study showed it improves hormone levels, reestablishes menstruation in amenorrheic
  women, and helps achieve pregnancy in women with cycle-driven fertility problems
  — most useful when mild hyperprolactinemia disrupts the cycle.
