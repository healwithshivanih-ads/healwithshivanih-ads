slug: dna-methylation-switches-genes-on-and-off
statement: 'DNA methylation is the epigenetic switch most relevant to coaching: adding
  a methyl group silences a gene (switched off), removing it allows the gene to unwind,
  transcribe and make its protein (switched on). It changes gene activity without
  altering the DNA sequence.'
evidence_tier: strong
rationale: 'Explain simply: methylation is a dimmer switch on genes that lifestyle
  can influence.'
coaching_translation: 'Explain simply: methylation is a dimmer switch on genes that
  lifestyle can influence.'
