slug: mthfr-dao-snp-combination-histamine-asthma-risk
statement: Co-occurring MTHFR and DAO variants synergistically increase histamine
  intolerance and the risk of chronic or exercise-induced asthma by simultaneously
  impairing dietary histamine clearance and the methylation-dependent alternative
  histamine processing route.
evidence_tier: fm_specific_thin
rationale: DAO degrades dietary histamine; COMT and HNMT provide secondary methylation-dependent
  histamine processing routes. MTHFR variants reduce methylation capacity, potentially
  impairing these alternative routes. The combined burden logic is mechanistically
  coherent within Lynch's framework but lacks direct haplotype-outcome RCT evidence.
coaching_translation: Clients who score high on both MTHFR and DAO checklists should
  adopt strict low-histamine eating, focus on aerobic exercise that builds lung capacity
  (not high-intensity triggers), and prioritise gut healing.
caveats:
- Source is a consumer trade book — fm_specific_thin evidence tier.
- Exercise-induced asthma warrants physician evaluation regardless of genetic speculation.
- Histamine-asthma link is established; the specific gene-combination causation is
  extrapolated.
