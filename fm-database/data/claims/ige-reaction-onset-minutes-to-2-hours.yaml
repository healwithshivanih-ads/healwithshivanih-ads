slug: ige-reaction-onset-minutes-to-2-hours
statement: IgE-mediated food allergy produces symptoms within minutes to 2 hours of
  allergen exposure.
evidence_tier: strong
rationale: Well-established immunological consensus. IgE–allergen complex activates
  mast cells within minutes, releasing histamine and producing immediate hypersensitivity
  symptoms.
coaching_translation: If a client reacts to a food within 1–2 hours, this may be a
  true IgE allergy — they likely already know their trigger. Encourage them to discuss
  with their allergist and avoid the allergen.
caveats:
- Source is an expert lecture (expert_consensus, moderate quality), not a primary
  RCT citation.
