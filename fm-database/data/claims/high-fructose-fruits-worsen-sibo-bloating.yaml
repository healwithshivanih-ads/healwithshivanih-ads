slug: high-fructose-fruits-worsen-sibo-bloating
statement: High-fructose fruits (apples, pears, mango, watermelon) worsen fructose
  malabsorption in SIBO, exacerbating bloating and acid reflux.
evidence_tier: plausible_emerging
rationale: Fructose malabsorption is well-established; exacerbation in SIBO context
  (where transit time and bacterial load amplify fermentation) is biologically plausible
  and consistent with clinical FODMAP practice.
coaching_translation: During your elimination phase, swap apples, mangoes, and watermelon
  for blueberries, strawberries, or kiwi — they give you the same sweetness and antioxidants
  without the bloating trigger.
caveats:
- Individual tolerance thresholds vary. Reintroduce systematically during the reintroduction
  phase.
