slug: melatonin-mitigates-gastric-lining-breakdown-du
statement: Melatonin mitigates gastric lining breakdown and ulcer formation through
  antioxidant properties, and may be most applicable for duodenal ulcers involving
  acid hypersecretion.
evidence_tier: plausible_emerging
rationale: Mechanistically supported (antioxidant, cytoprotective effects in gastric
  mucosa); research focus cited as hypersecretion models, making DU the most relevant
  indication.
coaching_translation: Melatonin isn't just for sleep — it may also help protect the
  stomach lining and reduce acid damage, especially in duodenal ulcers.
caveats:
- Most research is in hypersecretion/animal models; human clinical RCT evidence is
  limited.
