slug: homocysteine-is-primary-marker-of-methylation-defect
statement: Elevated homocysteine is a primary indirect marker of methylation pathway
  impairment (Phase 2 detoxification), alongside MMA (methylmalonic acid).
evidence_tier: plausible_emerging
rationale: Homocysteine elevation as a marker of methylation insufficiency (B12/folate/B6
  deficiency or MTHFR variants) is well-supported in the literature. Its use specifically
  as a Phase 2 liver detox surrogate marker is a functional medicine framing that
  extends beyond mainstream hepatology but is biologically coherent.
coaching_translation: High homocysteine on a blood panel can be a sign the methylation
  system — which helps the liver process and clear toxins — needs support, often through
  B vitamins.
out_of_scope_notes: Homocysteine interpretation, B-vitamin dosing, and MTHFR genetic
  testing must involve a clinician.
caveats:
- Source is expert lecture consensus.
- Mainstream medicine uses homocysteine primarily as a cardiovascular risk marker,
  not a liver detox marker.
