slug: chromosomal-screening-doubles-implantation-rate
statement: Preimplantation genetic screening for chromosomal abnormalities (CCS/PGT-A)
  in IVF embryos dramatically improves implantation rates — at one leading clinic,
  the implantation rate for transferred embryos in 41-42 year olds jumped from 13%
  to 38% when only chromosomally normal embryos were selected. Even in young good-prognosis
  patients, pregnancy rates rose from 41% to 69% with screening.
evidence_tier: strong
