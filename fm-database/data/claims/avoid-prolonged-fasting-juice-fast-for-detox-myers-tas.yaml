slug: avoid-prolonged-fasting-juice-fast-for-detox-myers-tas
statement: Myers advises against prolonged fasting and juice fasts for detoxification
  because the body needs energy and nutrients to complete phase 2, and fasting can
  leave detox stalled in phase 1.
evidence_tier: fm_specific_thin
rationale: Without protein and cofactors, phase 2 conjugation slows, so aggressive
  fasting 'detoxes' can increase circulating reactive intermediates.
coaching_translation: Crash juice-cleanses can backfire — real detox needs nourishment,
  not starvation.
