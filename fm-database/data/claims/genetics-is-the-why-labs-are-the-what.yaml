slug: genetics-is-the-why-labs-are-the-what
statement: Functional labs and biomarkers (e.g. a DUTCH hormone panel, a lipid fractionation)
  show WHAT is happening; genetics explains WHY it is happening — for example why
  oestrogen is being metabolised down a particular phase-I/phase-II pathway. The two
  are complementary, not competing.
evidence_tier: plausible_emerging
rationale: Use genetics to add the 'why' behind a lab result and to personalise the
  lifestyle plan.
coaching_translation: Use genetics to add the 'why' behind a lab result and to personalise
  the lifestyle plan.
out_of_scope_notes: Interpreting the lab or the gene diagnostically is the clinician's
  role.
