slug: brain-is-70-percent-fat-fat-free-diet-harmful
statement: The brain is approximately 70% fat (cell membranes are 50% fat, myelin
  sheath adds another 20%), making a fat-free diet dangerous for brain function and
  making fat an essential macronutrient for mental health.
evidence_tier: strong
rationale: Brain lipid composition is well-established in neuroscience. Fat-free diets
  impairing brain health, particularly myelin integrity and membrane fluidity, is
  supported by nutritional neuroscience.
coaching_translation: Your brain is mostly fat — so cutting fat from your diet can
  actually harm your mental performance and mood. Healthy fats (avocado, nuts, olive
  oil, oily fish) are brain food.
caveats:
- The specific percentage figures are approximations
- Source is expert lecture
