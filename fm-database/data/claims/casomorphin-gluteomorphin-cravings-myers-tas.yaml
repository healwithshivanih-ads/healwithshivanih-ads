slug: casomorphin-gluteomorphin-cravings-myers-tas
statement: Dairy-derived casomorphins and gluten-derived gluteomorphins can bind opioid
  receptors, producing feel-good effects and withdrawal-like cravings that make these
  foods hard to give up.
evidence_tier: plausible_emerging
rationale: Partially digested casein and gluten peptides can act as exorphins at opioid
  receptors in susceptible individuals, which Myers uses to explain intense dairy
  and gluten cravings.
coaching_translation: Dairy and gluten can act a little like mild opioids for some
  people, which is why cutting them can feel like withdrawal at first.
