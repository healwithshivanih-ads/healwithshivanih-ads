slug: winter-vata-warming-nourishing-cooked-diet
statement: In winter, vata dosha (air and ether) continues to dominate, producing cold, dry, rough, and
  erratic qualities; the seasonal remedy is to favour warming, moist, grounding, and protein-rich cooked
  foods with sweet, sour, and salty tastes, and to reduce raw foods, dry grains, cold foods, and out-of-season
  produce.
evidence_tier: fm_specific_thin
rationale: Cold weather drives digestive fire into the body's core, making winter the season of strongest
  agni and greatest capacity to digest rich, heavy, oily foods. Nourishing fats, root vegetables, and
  cooked grains sustain deep tissue energy through the cold months.
coaching_translation: Winter is the one season when heavier, fattier, protein-rich foods are appropriate.
  Encourage clients to make warming soups, stews, and grain porridges with ghee and warming spices. This
  is not the season for raw cleanses or low-fat diets.
out_of_scope_notes: ''
caveats:
- Traditional Ayurvedic seasonal principle. The shift toward cooked, warming foods in cold weather has
  broad cross-cultural and common-sense dietary support.
