slug: zonulin-regulates-tight-junctions
statement: Zonulin is a protein secreted by intestinal mucosa that regulates tight junction permeability; elevated serum zonulin
  correlates with increased intestinal permeability.
evidence_tier: plausible_emerging
rationale: Zonulin was identified by Fasano and its role in tight junction regulation is well-mechanistically established.
  Serum zonulin as a reliable clinical biomarker has been questioned in recent literature due to assay specificity issues,
  hence plausible_emerging rather than strong.
coaching_translation: Zonulin is a molecule that controls how 'open' your gut barrier is. High levels may signal that your
  gut is more permeable than it should be.
out_of_scope_notes: Zonulin testing and interpretation should be guided by a clinician.
caveats:
- Serum zonulin assay specificity has been questioned in some peer-reviewed publications — clinical utility as a standalone
  biomarker is debated.
- Test ordering and interpretation is outside coaching scope.
