slug: sklar-vitamin-d-pregnancy-50-80
statement: Optimal preconception and pregnancy 25-hydroxyvitamin D levels target 50-80
  ng/mL — meaningfully above the 30 ng/mL cutoff most labs flag as sufficient. Adequate
  vitamin D supports implantation, modulates immune tolerance of the embryo, supports
  thyroid function and reduces miscarriage risk. Most women are deficient by lab cutoffs
  and even more are sub-optimal by fertility targets — supplementation typically needed
  in Indian and high-latitude contexts.
