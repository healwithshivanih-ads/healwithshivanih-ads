slug: magnesium-deficiency-promotes-endothelial-dysfunction
statement: Low magnesium levels contribute to atherosclerosis and CVD by generating
  a proinflammatory, prothrombotic, proatherogenic environment and promoting endothelial
  dysfunction.
evidence_tier: plausible_emerging
rationale: Magnesium's role in vascular function is mechanistically well-supported;
  epidemiological associations are consistent, though RCT evidence for oral supplementation
  in CVD outcomes is limited.
coaching_translation: Low magnesium — common in Western diets — quietly raises heart
  risk by inflaming and stiffening blood vessels.
