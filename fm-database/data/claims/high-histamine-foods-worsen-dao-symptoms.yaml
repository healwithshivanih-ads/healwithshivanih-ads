slug: high-histamine-foods-worsen-dao-symptoms
statement: Fermented foods, aged cheeses, cured meats, alcohol (especially red wine),
  bone broth, and leftover foods are high in histamine and can trigger or worsen symptoms
  in individuals with impaired DAO activity.
evidence_tier: plausible_emerging
rationale: The histamine content of these food categories is well-documented analytically.
  The clinical link to symptoms in DAO-deficient individuals is biologically plausible
  and widely applied in clinical practice, though controlled trial evidence is limited.
  Source is a consumer book.
coaching_translation: 'If your body struggles to clear histamine, these foods are
  the main dietary culprits: red wine, aged cheese, fermented foods (sauerkraut, kimchi,
  kefir), cured meats, bone broth, and yesterday''s leftovers. Fresh food is your
  friend.'
caveats:
- Individual thresholds vary widely
- Histamine content of foods varies by preparation and storage method
- A low-histamine diet is a therapeutic elimination diet — full guidance from a registered
  dietitian is ideal
