slug: cbd-anti-inflammatory-fibromyalgia-sleep-anxiety
statement: CBD oil demonstrates anti-inflammatory, analgesic, anxiolytic, and neuroprotective
  properties; it is referenced as supportive for fibromyalgia, chronic pain, sleep
  disturbance, anxiety, and autoimmune inflammation, and is best used after foundational
  nutrition is established.
evidence_tier: plausible_emerging
rationale: CBD's anti-inflammatory mechanisms (CB2 receptor modulation, endocannabinoid
  system) are supported by preclinical and emerging clinical evidence. However, large-scale
  human RCTs for most conditions listed are limited. FDA-approved for specific epilepsy
  indications only.
coaching_translation: CBD oil can be a helpful addition for clients with pain, sleep
  issues, or anxiety as part of a broader anti-inflammatory plan — but build the dietary
  foundation first. It works best when the basics are in place.
caveats:
- Regulatory status varies significantly by country (e.g., India). Verify legality
  and availability before recommending.
- CBD should not replace foundational interventions (diet, omega-3, vitamin C, gut
  health).
- Source is expert FM lecture (moderate quality).
out_of_scope_notes: Dosing of CBD for specific medical conditions (autoimmune, cancer
  pain) requires clinician oversight.
