slug: dietary-fiber-and-scfas-support-immune-balance
statement: Dietary fiber fermented in the large intestine produces short-chain fatty
  acids (especially butyrate) that support intestinal colonocyte health and immune
  balance.
evidence_tier: plausible_emerging
rationale: Butyrate's role in colonocyte energy supply and gut barrier integrity is
  well-documented. Its immunomodulatory effects are also studied (regulatory T cell
  induction). Source is single expert without specific citations, so plausible_emerging
  is appropriate per rules.
coaching_translation: Eating fiber-rich foods feeds the bacteria that produce butyrate
  — a compound that literally fuels your gut lining and helps calm immune overactivation.
caveats:
- Source does not cite specific RCTs; evidence for immune modulation via butyrate
  is promising but not yet fully consensus-level.
- Single-expert source.
