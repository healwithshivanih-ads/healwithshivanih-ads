  location: Session 8 — immune balance supports segment
  quote: We know fiber and short-chain fatty acids are really important... when we
    consume fiber, it goes to the digestive system, goes to the large intestine where
    it's fermented, and the colonocytes then create these short-chain fatty acids.
    Butyrate is probably the best known one.
