slug: abdominal-expansion-improves-venous-return
statement: Diaphragmatic breathing creates negative thoracic pressure that pulls blood
  into the chest, improving venous return to the heart.
evidence_tier: strong
rationale: 'Established cardiovascular physiology: diaphragmatic descent during deep
  inhalation increases negative intrathoracic pressure, augmenting venous return (Starling
  mechanism).'
coaching_translation: Deep belly breathing acts like a gentle pump, helping your blood
  circulate more efficiently back to your heart.
