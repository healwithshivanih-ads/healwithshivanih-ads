slug: hibiscus-aged-garlic-bp-natural-agents
statement: Hibiscus tea and aged (black) garlic extract are two evidence-supported
  "green-medicine" agents that lower blood pressure through partially overlapping
  mechanisms — vasodilation via NO support, mild diuretic action (hibiscus), and ACE-inhibitor-like
  activity (garlic). Useful as short-to-medium-term tools while addressing root causes;
  not recommended as lifelong substitutes for resolving the underlying drivers (inflammation,
  oxidative stress, dysbiosis, sleep apnoea, structural issues).
evidence_tier: strong
