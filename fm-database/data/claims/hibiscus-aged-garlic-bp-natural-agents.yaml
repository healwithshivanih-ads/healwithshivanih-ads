  location: Podcast — Natural agents for BP
  quote: You have specific things like hibiscus which can be really good for lowering
    blood pressure. Aged garlic — black garlic. Very useful. It's the green medicine.
    You don't want people to have to be on green medicine the rest of their life because
    even though it's probably better, it's not the same as actually fixing the cause.
