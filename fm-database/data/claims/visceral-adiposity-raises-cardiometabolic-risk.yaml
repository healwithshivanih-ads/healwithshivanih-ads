slug: visceral-adiposity-raises-cardiometabolic-risk
statement: Visceral adiposity (excess abdominal fat) is associated with significantly
  increased risk of heart disease, stroke, cancer, type 2 diabetes, hypertension,
  and metabolic syndrome.
evidence_tier: strong
rationale: Well-established in peer-reviewed literature; waist circumference and waist-to-hip
  ratio are validated clinical surrogates for visceral fat and independently predict
  cardiometabolic outcomes.
coaching_translation: Where your client carries their weight matters as much as how
  much they weigh. Fat around the belly is more metabolically dangerous than fat on
  the hips or thighs.
caveats:
- Risk thresholds differ by ethnicity — Asian-descent populations face elevated risk
  at lower waist circumference values.
