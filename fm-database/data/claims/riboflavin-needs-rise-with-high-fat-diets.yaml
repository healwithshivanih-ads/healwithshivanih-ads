slug: riboflavin-needs-rise-with-high-fat-diets
statement: Riboflavin needs rise with high-fat diets, intense exercise, tanning, weight
  loss, and certain genetic variants.
evidence_tier: fm_specific_thin
rationale: Increased B2 demand with exercise and metabolic activity is plausible;
  the claim about tanning and weight loss is FM-specific extrapolation without strong
  RCT evidence.
coaching_translation: Clients following high-fat diets or exercising intensely may
  benefit from ensuring adequate riboflavin from food or supplementation.
