- id: thurlow-microbiome-session-2
  location: Q&A — food sensitivity testing
  quote: If you look at the research on food sensitivity testing, it's not all that
    compelling. However, I would say anecdotally with patients, I found it to be very
    valuable. So I think this really speaks to if you've done a traditional elimination
    diet and you're not feeling like you're getting improvement in symptoms, I think
    doing IgG testing can be helpful.
