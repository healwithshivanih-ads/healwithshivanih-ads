slug: food-sensitivity-testing-limited-evidence-clinical-utility
statement: IgG food sensitivity testing and MRT testing have limited supporting research
  but may provide clinical value for patients who have not improved with a standard
  elimination diet.
evidence_tier: fm_specific_thin
rationale: 'The speaker explicitly acknowledges the research is ''not all that compelling''
  while citing anecdotal clinical utility. This matches the mainstream scientific
  position: IgG testing is not endorsed by major allergy bodies as diagnostic, but
  is used in FM practice. Appropriately flagged as adjunct, not first-line.'
coaching_translation: Blood tests for food sensitivities (like IgG panels or MRT)
  don't have strong scientific backing, but some practitioners find them useful when
  elimination diets alone haven't provided enough answers. They're best used as a
  supplement to, not a replacement for, an elimination diet.
out_of_scope_notes: Ordering, interpreting, and acting on IgG or MRT food sensitivity
  panels requires clinician involvement.
caveats:
- 'Speaker''s own assessment: ''the research on food sensitivity testing is not all
  that compelling.'''
- IgG antibodies may reflect exposure, not pathological sensitivity — clinical interpretation
  is complex.
- Single-expert source; testing recommendations should be clinician-directed.
