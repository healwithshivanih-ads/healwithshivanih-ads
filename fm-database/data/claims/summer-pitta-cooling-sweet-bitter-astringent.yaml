slug: summer-pitta-cooling-sweet-bitter-astringent
statement: In summer, pitta dosha (fire and water elements) intensifies, creating hot, sharp, and oily
  qualities; the seasonal remedy is to favour cooling, sweet, bitter, and astringent tastes and reduce
  spicy, sour, oily, and acidic foods.
evidence_tier: fm_specific_thin
rationale: Summer heat accumulates pitta in the body. Cooling foods — cucumbers, melons, coconut, fennel,
  coriander, ghee — counterbalance internal heat, while spicy, fermented, and fried foods add to it and
  risk acid indigestion, skin inflammation, and irritability.
coaching_translation: In summer, your digestion is strong but heat-sensitive. Favour cooling foods like
  cucumber, coconut, leafy greens, and fennel. Back off on spicy curries, coffee, vinegar, and alcohol
  to prevent acid reflux and skin flares.
out_of_scope_notes: ''
caveats:
- Traditional Ayurvedic seasonal principle. The general dietary pattern (more cooling, hydrating vegetables
  and fewer hot/spicy foods) aligns with common-sense summer nutrition.
