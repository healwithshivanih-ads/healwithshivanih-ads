slug: darker-skin-tone-reduces-vitamin-d-synthesis
statement: People with darker skin tones produce less vitamin D from sun exposure
  because higher melanin content absorbs UV rays, reducing the conversion of 7-dehydrocholesterol
  to vitamin D3 in the skin.
evidence_tier: strong
rationale: Melanin competes with 7-dehydrocholesterol for UV-B photons, reducing vitamin
  D3 photosynthesis. This is well-documented in dermatology and nutritional epidemiology
  literature.
coaching_translation: If you have a darker skin tone, your skin naturally makes less
  vitamin D from sunlight. This means you may need more sun exposure or supplementation
  to maintain adequate levels.
