slug: low-carb-diet-improves-atherogenic-dyslipidemia
statement: A low-carbohydrate diet that addresses insulin resistance can improve atherogenic
  dyslipidemia (elevated VLDL, low HDL, small dense LDL) within approximately two
  months.
evidence_tier: plausible_emerging
rationale: The document recommends low-carbohydrate dietary intervention as the primary
  approach for patients with insulin resistance-driven dyslipidemia, with a claim
  that the cholesterol profile can change within two months. This is consistent with
  published evidence on low-carbohydrate diets and lipid profiles, though the document
  does not cite specific studies.
coaching_translation: For many people, high blood sugar and insulin resistance are
  the real drivers of a bad cholesterol profile. Cutting carbohydrates and increasing
  healthy fats can shift your cholesterol in a better direction — often within just
  a couple of months.
caveats:
- Source is expert consensus lecture. The 'two months' timeframe is clinical experience-based,
  not from a cited RCT.
- Dietary changes should be supervised, especially in diabetic patients on medication.
