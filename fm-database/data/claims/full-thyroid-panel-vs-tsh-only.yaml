  quote: I have seen hypothyroidism with TSHs of a one. You have to keep going and
    look at all the different hormones. I want to know how much active thyroid hormone
    is in your body, free, unbound. I also want to know your reverse T3 level. An
    antibody is an antibody — any antibodies are the beginnings of Hashimoto's.
