slug: full-thyroid-panel-vs-tsh-only
statement: TSH alone is insufficient for screening or monitoring thyroid health because
  Hornaman regularly sees clients with overt hypothyroid symptoms and a TSH of 1 (within
  "optimal" by even functional standards). The minimum thyroid panel Hornaman recommends
  includes TSH, free T4, free T3, reverse T3, TPO antibodies, and TGab antibodies.
  Optimal targets are roughly — TSH below 2 mIU/L, free T3 in the upper quartile of
  range (often ≥3.5 pg/mL on the common 2.0-4.4 assay), reverse T3 below 12 ng/dL,
  ANY detectable TPO/TGab antibody treated as start of autoimmunity. Coach uses this
  set when asking the GP for lab orders.
