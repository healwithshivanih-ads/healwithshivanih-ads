  quote: Organic ketogenic diet — adding coconut oil for the MCTs, getting the beta-hydroxybutyrate
    and the ketones available for your brain. Your brain prefers ketones to sugar
    for fuel. In an ideal world probably be switching back and forth between plant-based
    and a ketogenic diet so you get that metabolic flexibility.
rationale: Gives coach the dietary anchor for cognitively-concerned clients; flexibility
  framing prevents religious-diet rigidity.
