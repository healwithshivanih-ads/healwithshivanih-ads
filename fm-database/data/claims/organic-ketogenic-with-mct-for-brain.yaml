slug: organic-ketogenic-with-mct-for-brain
statement: Sandison recommends an organic ketogenic diet as the dietary anchor for
  clients with cognitive decline, with added coconut-oil-derived MCTs to generate
  beta-hydroxybutyrate. Premise — the cognitively-declining brain is glucose-fuel-impaired
  (Type 3 diabetes pattern) and ketones provide an alternative substrate the failing
  mitochondria can still use. Ornish's parallel-evidence-base RCT achieved similar
  cognitive improvement with a vegan diet instead, suggesting the common factor is
  significant elimination of ultra-processed foods rather than fat-vs-plant dogma.
  Metabolic flexibility (cycling between dietary patterns) may be the ideal long-term
  state.
evidence_tier: plausible_emerging
