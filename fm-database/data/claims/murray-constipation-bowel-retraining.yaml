slug: murray-constipation-bowel-retraining
statement: 'Long-term stimulant laxative use (senna, cascara) causes dependence; weaning
  requires a 4 to 6 week bowel retraining protocol. Components: eliminate known causes;
  sit on toilet at the same time daily (preferably after breakfast or exercise); never
  suppress the urge; high-fibre diet plus 6 to 8 glasses water; week 1 take lowest
  effective senna dose nightly; halve dose each week; revert if constipation returns.
  Avoid stimulant laxatives entirely if there is abdominal pain, nausea, IBD, pregnancy,
  or lactation. Long-term senna causes pseudomelanosis coli (reversible 4 to 15 months
  after stopping). Senna depletes potassium — caution with digoxin, thiazide diuretics,
  corticosteroids.'
