sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 41 — Constipation, pg 716-718
  quote: 'Rules for Bowel Retraining: Find and eliminate known causes of constipation.
    Never repress an urge to defecate. Eat a high-fiber diet. Drink six to eight glasses
    of fluid per day. Sit on the toilet at the same time every day, preferably immediately
    after breakfast or exercise. Exercise at least 20 minutes three times per week.
    Week one: Every night before bed take a stimulant laxative containing either cascara
    or senna. Take the lowest amount necessary to reliably ensure a bowel movement
    every morning. Weekly: Each week decrease dosage of the laxative by half. The
    recommended procedure will take four to six weeks. A benign blackish-brown pigmentation
    of the lining of the colon (pseudomelanosis coli) may occur with prolonged use
    of senna. Senna may potentiate the action of digoxin and other heart medications,
    owing to potassium depletion.'
