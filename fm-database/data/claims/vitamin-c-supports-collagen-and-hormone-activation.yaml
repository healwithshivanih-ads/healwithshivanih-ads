slug: vitamin-c-supports-collagen-and-hormone-activation
statement: Vitamin C supports collagen synthesis, adrenal and thyroid hormone activation,
  neurotransmitters, and antioxidant defense.
evidence_tier: plausible_emerging
rationale: Vitamin C's role as a cofactor for prolyl hydroxylase (collagen) and dopamine
  beta-hydroxylase (neurotransmitters) is well-established; adrenal support via cortisol
  synthesis is credible.
coaching_translation: Encourage citrus, berries, capsicum, and raw vegetables as vitamin
  C sources for skin, immunity, and adrenal resilience.
caveats:
- Source is a practitioner cheatsheet without primary citations.
- Source is practitioner cheatsheet.
- High-dose vitamin C during chemotherapy requires clinician coordination.
