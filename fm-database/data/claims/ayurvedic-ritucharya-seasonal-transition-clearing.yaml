slug: ayurvedic-ritucharya-seasonal-transition-clearing
statement: 'Each season calls for active clearing of the preceding season''s accumulated qualities before
  the new season''s tendencies take hold: spring clears winter kapha accumulation, fall clears summer
  pitta heat, and winter builds deep tissue nourishment to sustain energy through the cold.'
evidence_tier: fm_specific_thin
rationale: Ayurveda frames disease as accumulated seasonal dosas that were not cleared in the appropriate
  window (ritucharya, seasonal regimen). Proactive dietary and lifestyle shifts at each seasonal transition
  prevent the carryover of accumulated imbalance into the next season.
coaching_translation: Think of seasonal transitions as built-in resets. Clients who eat lighter in early
  spring, cool down in early fall, and add warmth and nourishment as winter arrives tend to have better
  year-round digestion, fewer seasonal infections, and more stable energy.
out_of_scope_notes: ''
caveats:
- Ayurvedic ritucharya (seasonal regimen) concept; not studied in clinical trials. Aligns with general
  principles of seasonally appropriate eating and circadian-aware nutrition.
