slug: gut-dysbiosis-increases-beta-glucuronidase-and-estrogen-reabsorption
statement: Gut dysbiosis elevates beta-glucuronidase activity, which deconjugates
  excreted estrogen in the gut, causing it to be reabsorbed into the bloodstream and
  raising circulating estrogen levels.
evidence_tier: plausible_emerging
rationale: The estrobolome and beta-glucuronidase role in estrogen recirculation is
  a growing area of evidence with mechanistic plausibility and early supporting research.
  80–90% of estrogen excretion via the gut is a cited statistic in FM and endocrinology
  literature.
coaching_translation: If your gut bacteria are out of balance, an enzyme called beta-glucuronidase
  can 'unlock' estrogen that your liver already packaged for excretion — sending it
  back into your bloodstream. This is why gut health is central to hormone balance.
caveats:
- RCT-level evidence for clinical interventions targeting estrobolome is still emerging.
- Source is FM lecture; beta-glucuronidase testing via GI-MAP is clinician-ordered.
