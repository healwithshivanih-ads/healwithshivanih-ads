slug: post-meal-walking-enhances-mmc
statement: Post-meal walking and Vajrasana (kneeling pose) for 10 minutes improves
  diaphragm movement, enhances the migrating motor complex (MMC), and reduces bloating
  and gas.
evidence_tier: plausible_emerging
rationale: Physical activity post-meal is associated with improved gastric emptying
  and MMC activity in small studies; Vajrasana has traditional Ayurvedic evidence
  and emerging physiological plausibility.
coaching_translation: A 10-minute gentle walk or kneeling sit after meals can significantly
  reduce post-meal bloating by keeping things moving through your gut.
