slug: api-neem-nimba-leaf-energetics-rasa-guna-karma-dose
statement: 'The Ayurvedic Pharmacopoeia of India (Part I, Volume II) classifies Nimba leaf (Azadirachta
  indica) with the following energetics: Rasa (taste) — Tikta (bitter); Guna (quality) — Ruksha (dry);
  Virya (potency) — Shita (cooling); Vipaka (post-digestive taste) — Katu (pungent); Karma (actions) —
  Grahi (absorbent/binding), Vatala (may increase vata), Pittanashaka (reduces pitta). Official therapeutic
  indications (Rogadhikara): Jvara (fever), Krimiroga (worm infestations), Kushtha (skin diseases), Netraroga
  (eye diseases), Prameha (diabetes/urinary disorders), Vrana (wounds/ulcers), Amashotha (intestinal inflammation),
  Visharogas (toxic conditions). Official dose (Matra): 1–3 g of the drug in powder form; 10–20 ml for
  decoction.'
evidence_tier: plausible_emerging
rationale: Official pharmacopoeial entry from the Government of India's Ayurvedic Pharmacopoeia of India,
  Part I, Volume II.
coaching_translation: Neem (Nimba) is classified in Ayurveda as cooling and bitter, with primary actions
  on reducing pitta and clearing toxins, infections, and skin conditions. The API places its official
  dose at 1–3 g powder or 10–20 ml decoction for conditions ranging from diabetes and skin disease to
  wound healing and fever.
out_of_scope_notes: ''
caveats:
- Vatala quality means neem can aggravate vata constitution or vata-dominant conditions at excess doses.
- API dose of 1–3 g powder is quite conservative — consistent with WHO's safety concerns at higher doses.
