slug: re-contracting-clarifies-coaching-vs-directive-expectations
statement: When clients want to be told what to do, returning to the initial coaching
  agreement and re-clarifying the coach's role — as guide rather than expert director
  — helps establish appropriate expectations and supports sustainable change.
evidence_tier: fm_specific_thin
rationale: Re-contracting is a standard coaching technique for managing role confusion.
  Plausible and widely practiced but not independently RCT-tested as an isolated intervention.
coaching_translation: 'Say something like: ''I hear that it would be easier if I just
  gave you a list. And if I did, it wouldn''t help you make sustainable change — because
  part of this is you discovering what works for you. Let''s explore what feels possible.'''
caveats:
- Discussed as practical coaching strategy; no specific study cited.
- Source is an expert consensus coaching call.
