slug: horowitz-glutathione-nac-ala-curcumin-covid-prevention
statement: Horowitz's published COVID protocol — N-acetylcysteine (glutathione precursor)
  + alpha-lipoic acid (regenerates glutathione) + liposomal glutathione + curcumin
  — blocks the NFκB inflammatory switch and supports endogenous antioxidant defence.
  Of his patients on this protocol during the pandemic, none died of ARDS or COVID
  complications. Mechanism — SARS-CoV-2 must deplete cellular glutathione to replicate,
  and lung tissue holds approximately 144,000- fold more glutathione than other tissue,
  so glutathione-depleted patients are the ones who progress to ARDS. Same antioxidant
  + anti-NFκB strategy is protective against other inflammatory viral illnesses (Marburg,
  Ebola — under active research) and is foundational to the MSIDS toxin/infection-management
  layer.
