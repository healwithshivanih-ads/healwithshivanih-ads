slug: mayo-ear-infection-watchful-waiting-vs-antibiotic
statement: Mayo and AAP guidelines support watchful waiting with pain control for
  48 to 72 hours in healthy children over 6 months with mild symptoms; immediate antibiotics
  are indicated for severe symptoms, fever above 39 degrees C, both ears affected,
  or in children under 6 months.
