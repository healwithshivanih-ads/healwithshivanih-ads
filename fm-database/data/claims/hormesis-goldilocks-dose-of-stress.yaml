slug: hormesis-goldilocks-dose-of-stress
statement: A small dose of oxidative/inflammatory stress (light exercise, yoga, cold
  exposure, sauna, sulforaphane) acts as a weak trigger that switches on cellular-defence
  genes and builds resilience — the hormetic 'Goldilocks' response. Large doses (metabolic
  overtraining, hours of high-heart-rate training) flip the same signal into damaging
  inflammation and oxidative stress, especially harmful in complex chronic illness.
evidence_tier: plausible_emerging
rationale: 'Personalise the dose: enough movement/cold/heat to trigger defence, not
  so much it drives inflammation. Watch for the overtrained, fatigued CrossFit client.'
coaching_translation: 'Personalise the dose: enough movement/cold/heat to trigger
