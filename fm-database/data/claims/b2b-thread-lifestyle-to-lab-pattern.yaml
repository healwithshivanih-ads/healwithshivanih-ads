slug: b2b-thread-lifestyle-to-lab-pattern
statement: A coach's teachable skill is 'threading the needle' — explaining in plain,
  everyday language how nutrition, movement, sleep, stress and connection influence
  a given lab pattern, using metaphors and visual tools. This is education on the
  pattern, framed as 'if this, then that', not a diagnosis.
evidence_tier: plausible_emerging
rationale: Turns an abstract number into a lived, changeable story the client can
  act on.
coaching_translation: Build your own plain-language metaphors linking each lifestyle
  lever to the marker; show the client 'if you shift X, this pattern tends to move
  like Y'.
out_of_scope_notes: Promising a specific numeric result, or claiming the change treats
  a diagnosed condition, is out of scope.
caveats:
- Effect size varies by person — frame as tendencies, not guarantees.
