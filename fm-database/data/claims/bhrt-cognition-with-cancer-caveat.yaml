slug: bhrt-cognition-with-cancer-caveat
statement: Optimal levels of the neurosteroids estradiol, progesterone, testosterone,
  pregnenolone, and DHEA support cognition because Alzheimer's behaves as a network
  insufficiency that benefits from physiological hormonal signalling. Bredesen flags
  clear caveats — clients with a history of hormone-sensitive cancer (notably breast
  cancer) need careful selection of agent, dose, and duration in partnership with
  their oncologist; bioidentical hormone replacement is a clinician-only decision,
  never a coaching prescription.
evidence_tier: confirm_with_clinician
