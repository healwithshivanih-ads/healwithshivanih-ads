  location: Podcast — bioidentical hormones segment
  quote: Bioidentical hormone replacement — if your hormones are low you're going
    to do better with your cognition because again this is a network insufficiency.
    By having the appropriate levels of estradiol, progesterone, testosterone, pregnenolone,
    DHEA, all those neurosteroids. For people who have breast cancer for example we
    have to be very careful about which ones and for how long.
rationale: Coach scope guardrail — flags BHRT as clinician-led, not coach-led; useful
  when client asks "should I be on HRT for brain protection?"
