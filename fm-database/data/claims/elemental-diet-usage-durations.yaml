slug: elemental-diet-usage-durations
statement: 'Elemental-diet use follows three patterns: 2–4 days to quell a flare,
  1–3 weeks exclusively (under medical supervision) as formal treatment, or intermittent
  hybrid use for maintenance; one study normalised the SIBO breath test in about 80%
  after two weeks.'
evidence_tier: plausible_emerging
rationale: Cites the Vivonex SIBO study and clinical usage patterns.
coaching_translation: You can use an elemental diet briefly to settle a flare or,
  with supervision, for a couple of weeks as treatment.
