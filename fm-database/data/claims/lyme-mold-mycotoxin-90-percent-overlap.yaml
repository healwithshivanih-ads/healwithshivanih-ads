slug: lyme-mold-mycotoxin-90-percent-overlap
statement: Approximately 90% of Horowitz's chronic Lyme patients also test positive
  for mycotoxin exposure on urine testing (Realtime Laboratories, Texas). Up to five
  different mycotoxins — aflatoxin, gliotoxin, ochratoxin, trichothecenes, zearalenone
  — can co-exist in a single patient. Mycotoxins drive the same inflammatory cascade
  as chronic Lyme (NFκB, NLRP3 inflammasome, oxidative stress, immune suppression)
  and produce overlapping symptoms — fatigue, cognitive impairment, joint pain, brain
  fog, autoimmunity. When chronic Lyme treatment plateaus, mould/mycotoxin and heavy-metal
  evaluation is the next diagnostic step, because mycotoxins suppress the immune system
  and prevent clearance of biofilm persister bacteria.
