slug: smoking-worsens-pu-outcomes-decreases-therapy-response
statement: Smoking is linked to increased frequency of peptic ulcers, decreased response
  to PU therapy, and increased mortality; bile salt reflux into the stomach is the
  most likely mechanism.
evidence_tier: strong
rationale: Epidemiological association between smoking and PU outcomes is well established
  in the medical literature; the bile-salt reflux mechanism is the leading proposed
  explanation.
coaching_translation: Smoking directly worsens ulcers and makes treatment less effective.
  Quitting smoking is one of the most important steps you can take.
