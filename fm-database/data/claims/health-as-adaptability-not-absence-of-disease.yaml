slug: health-as-adaptability-not-absence-of-disease
statement: Health is best defined as a state of physiologic function and adaptability
  within one's environment — a spectrum rather than a binary, characterised by the
  capacity to mount appropriate responses (fever, immune activation, recovery) when
  challenged and return to baseline without external assistance. A static absence-of-disease
  definition misses the dynamic dimension that distinguishes resilient from fragile
  systems.
evidence_tier: plausible_emerging
