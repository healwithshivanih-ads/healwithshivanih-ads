slug: xenoestrogens-accumulate-breast-tissue-increase-cancer-risk
statement: Xenoestrogens — estrogen-like industrial chemical pollutants — accumulate in breast tissue,
  can bind estrogen receptors, enhance production of genotoxic estrogen metabolites, and stimulate abnormal
  cell growth, contributing to breast cancer risk.
evidence_tier: plausible_emerging
rationale: Endocrine disruptor research is substantial; the proposed mechanisms (receptor binding, promoting
  16-OH estrogen pathway, angiogenesis) align with peer-reviewed endocrinology even if full causality
  for human breast cancer is not proven.
coaching_translation: Chemicals in pesticides, plastics, and industrial products mimic estrogen and accumulate
  in breast fat. They can turn on the same growth signals as estrogen — which is why choosing organic
  food and reducing plastic exposure are worthwhile breast-health actions.
out_of_scope_notes: ''
caveats:
- Precise quantification of the breast cancer risk attributable to xenoestrogen exposure in the general
  population is still being studied; dose–response relationships are not fully established for most compounds.
