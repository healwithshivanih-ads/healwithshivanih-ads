slug: ala-from-flaxseed-associated-with-reduced-chd-risk
statement: Women with the highest ALA intake had a 45% lower risk of fatal coronary heart disease compared to those with the
  lowest intake.
evidence_tier: plausible_emerging
rationale: Cited as a cohort study finding in the lecture. ALA is the plant-based omega-3 found in flaxseeds. ALA has also
  been shown to decrease TNF and IL-1B production and has mild anti-inflammatory benefits. Source is FM lecture of moderate
  quality.
coaching_translation: Eating flaxseeds and other plant-based omega-3 foods can meaningfully reduce your heart disease risk,
  even if you don't eat fish.
caveats:
- Cohort/observational study — cannot prove causation.
- ALA-to-EPA/DHA conversion is low (5–10% and 2–5% respectively); direct EPA/DHA intake is more efficacious for clinical endpoints.
- Source is an FM lecture, not the primary cohort paper.
