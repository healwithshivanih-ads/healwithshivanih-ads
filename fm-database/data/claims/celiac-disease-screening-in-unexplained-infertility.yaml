slug: celiac-disease-screening-in-unexplained-infertility
statement: Celiac disease is roughly three times more common in women with unexplained
  infertility than in the general population and is often clinically silent (no GI
  symptoms). Untreated celiac increases miscarriage rates approximately ninefold compared
  to celiac patients on strict gluten-free diets. Columbia/Mayo Clinic researchers
  recommend screening any patient presenting with unexplained infertility, regardless
  of GI symptoms.
evidence_tier: strong
