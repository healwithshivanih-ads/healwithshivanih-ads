slug: low-magnesium-drives-low-serum-calcium
statement: Magnesium deficiency causes calcium to shift intracellularly, reducing
  serum calcium; correcting intracellular magnesium can restore serum calcium levels
  without direct calcium supplementation.
evidence_tier: plausible_emerging
rationale: 'Mechanistically plausible: magnesium regulates calcium channels and pumps
  (e.g., PMCA, NCX). Low magnesium impairs PTH secretion and action, contributing
  to hypocalcemia. Supported by clinical observations but RCT evidence specifically
  for this mechanism is limited.'
coaching_translation: Low magnesium can make your calcium look low on a test. Rather
  than jumping to calcium supplements, addressing magnesium intake first may naturally
  bring calcium back into balance.
caveats:
- Source is expert consensus, moderate quality.
- Full RCT support for the intracellular shift mechanism specifically is limited.
