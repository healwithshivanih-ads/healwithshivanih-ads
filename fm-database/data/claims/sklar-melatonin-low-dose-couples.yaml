slug: sklar-melatonin-low-dose-couples
statement: Low-dose melatonin supplementation has emerging evidence supporting both
  partners — protecting developing oocytes from oxidative stress in women, and sperm
  DNA from free-radical damage in men, via its potent antioxidant and mitochondrial-protective
  properties. Use should be time-limited around the preconception window and discontinued
  once pregnancy is confirmed unless a clinician advises otherwise.
