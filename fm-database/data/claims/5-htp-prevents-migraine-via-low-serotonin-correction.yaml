slug: 5-htp-prevents-migraine-via-low-serotonin-correction
statement: Migraine is a low-tissue-serotonin state with low pain threshold; 5-hydroxytryptophan
  (5-HTP) 400-600 mg/day taken consistently for 60+ days reduces migraine frequency
  and severity by raising CNS serotonin and desensitising 5-HT1C receptors. Effect
  builds over time and exceeds the 30-day mark before peaking.
evidence_tier: plausible_emerging
rationale: Pizzorno cites multiple small trials of 5-HTP for migraine prophylaxis.
  Mechanism — 5-HTP bypasses the rate-limiting tryptophan-hydroxylase step, raising
  CNS serotonin; 5-HT1C downregulation reduces migraine triggering while 5-HT1D activation
  prevents attacks.
coaching_translation: Migraine is partly a low-serotonin problem. 5-HTP (300-600 mg
  a day, in divided doses, for at least 2 months) raises serotonin enough to lift
  the pain threshold and reduce attacks.
caveats:
- Not for use with SSRIs, MAOIs, triptans (serotonin syndrome risk).
- Build over 60 days for full effect.
- Take with carbohydrate (not protein) for brain uptake.
