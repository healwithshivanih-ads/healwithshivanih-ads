slug: estrogen-metabolism-requires-liver-and-gut-phases
statement: 'Estrogen detoxification occurs in three sequential phases: phase one and
  two in the liver (converting estrogens to water-soluble conjugates), and phase three
  in the gut (microbial processing via the estrobolome for excretion or recirculation).'
evidence_tier: plausible_emerging
rationale: Hepatic phase 1/2 metabolism of estrogens is well-established. The designation
  of gut microbial processing as a distinct 'phase three' is a functional medicine
  framing with mechanistic plausibility but not uniformly adopted in peer-reviewed
  literature. Source is single-expert transcript.
coaching_translation: Your liver starts breaking down estrogen, but the gut has to
  finish the job. Without a healthy gut microbiome, that final step doesn't happen
  properly.
caveats:
- '''Phase three'' framing is functional medicine terminology; verify framing with
  clinician.'
- Single-expert source.
