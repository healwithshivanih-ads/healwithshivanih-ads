slug: sleep-supports-brain-detoxification
statement: 'Adequate sleep supports detoxification, particularly of the brain,

  and is a foundational lifestyle pillar for any detox-focused

  coaching plan.

  '
evidence_tier: plausible_emerging
rationale: 'The glymphatic system clears metabolic waste from the central

  nervous system predominantly during sleep, with measurable increases

  in interstitial-fluid flow during slow-wave sleep. Sleep deprivation

  is associated with accumulation of neurotoxic metabolites and

  inflammatory markers. Sleep also regulates cortisol, which modulates

  Phase 1/2 enzyme expression.

  '
coaching_translation: 'Sleep is the brain''s nightly cleanup crew. Skimping on it
  isn''t just

  a fatigue issue — it actively reduces your body''s ability to clear

  toxins, especially from the brain. Seven to nine hours, consistent

  bedtime, dark room: this belongs in every detox plan, not as a

  bonus but as a foundation.

  '
