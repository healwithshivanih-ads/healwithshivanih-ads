slug: diet-induced-acidosis-strongest-predictor-of-ca-oxalate-stones
statement: Diet-induced metabolic acidosis (from excess sulfur-containing amino acids
  in animal protein and high salt intake) is one of the strongest dietary predictors
  of Ca-oxalate and uric-acid stone formation — it increases urinary calcium (via
  bone resorption), reduces urinary citrate, and raises urinary uric acid.
evidence_tier: strong
rationale: Pizzorno cites recent literature placing acidosis as the strongest single
  dietary predictor. Mechanism — sulfur-amino-acid catabolism produces acid load →
  renal bone-resorbing buffering → urinary Ca; citrate conserved to buffer → urinary
  citrate drops.
coaching_translation: Heavy animal protein + heavy salt makes your urine acidic, which
  makes your bones leak calcium into your urine AND lowers the citrate that normally
  stops stones from forming. An alkaline-leaning diet (lots of plants) is one of the
  strongest preventives.
caveats:
- Doesn't mean strict vegan — moderate animal protein is fine.
- Sulfur-rich amino acids in cysteine/methionine drive most of the acid load.
- Salt intake matters independently — high salt raises urinary calcium.
