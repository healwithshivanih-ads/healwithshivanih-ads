  quote: Diet-induced acidosis has been shown in recent research to be the strongest
    predictor of Ca oxalate and uric acid stones. Excessive consumption of acid-forming
    foods, such as those containing amino acids rich in sulfur, causes increased breakdown
    of bone resulting in increased excretion of Ca in the urine.
