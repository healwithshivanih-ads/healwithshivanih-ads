sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 26 — Autism Spectrum Disorder, pg 555-556
  quote: Several clinical studies have also shown that melatonin produces significant
    benefit in improving sleep quality in ASD at dosages ranging from 0.75 mg to 6
    mg prior to bedtime. Meta-analyses of existing data have concluded that melatonin
    administration in ASD is associated with improved sleep, better daytime behavior,
    and minimal side effects.
