slug: asd-melatonin-improves-sleep
statement: Melatonin 0.75-6 mg taken before bedtime shortens sleep latency and lengthens
  sleep duration in children with ASD, with downstream improvements in daytime behaviour.
  Meta-analyses report minimal side effects (occasional mild morning sleepiness);
  in an open trial 86% of parents reported complete elimination or significant improvement
  of sleep disturbance.
evidence_tier: strong
