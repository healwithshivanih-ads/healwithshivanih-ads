slug: pregnenolone-steal-cortisol-reduces-progesterone
statement: Chronic stress causes excess cortisol to divert pregnenolone away from
  progesterone synthesis, lowering luteal progesterone and driving PMS, anxiety, and
  poor sleep.
evidence_tier: plausible_emerging
rationale: The shared steroidogenic precursor pregnenolone can be directed toward
  cortisol under stress; however, 'pregnenolone steal' as a direct cause of progesterone
  deficiency has mechanistic plausibility but limited human clinical evidence. Commonly
  cited in FM practice.
coaching_translation: When you're chronically stressed, your body 'steals' raw material
  away from making progesterone to make stress hormones instead — a key reason why
  stress tanks your mood and cycle quality.
caveats:
- Pregnenolone steal is a widely cited FM concept with limited direct human RCT evidence
- Source is expert synthesis
