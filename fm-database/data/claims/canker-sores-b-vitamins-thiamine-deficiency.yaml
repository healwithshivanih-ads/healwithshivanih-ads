slug: canker-sores-b-vitamins-thiamine-deficiency
statement: Thiamine deficiency is the most significant nutrient deficiency in RAU
  — one study found low transketolase (thiamine-dependent enzyme) in 49 of 70 RAU
  patients vs 2 of 50 controls. Targeted supplementation includes thiamine 50-100
  mg, B6 25-50 mg, folic acid 400-800 mcg, B12 (methylcobalamin) 1,000 mcg, vitamin
  C 500-1,000 mg twice daily, and zinc 20-30 mg per day. B12 1,000 mcg/day alone has
  shown benefit regardless of deficiency status. DGL mouthwash (200 mg in 200 ml warm
  water 4×/day) speeds healing.
