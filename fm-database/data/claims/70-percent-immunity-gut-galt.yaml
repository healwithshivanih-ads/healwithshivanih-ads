slug: 70-percent-immunity-gut-galt
statement: Approximately 70% of immune cells reside in the gut-associated lymphoid
  tissue (GALT), making gut health a primary lever for immune function.
evidence_tier: plausible_emerging
rationale: The GALT contains the largest collection of immune cells in the body. The
  ~70% figure is widely cited in immunology education; exact percentages vary by measurement
  methodology but the principle is well-accepted.
coaching_translation: Most of your immune system lives in your gut. Healing the gut
  is healing the immune system — this is why food, probiotics, and gut repair come
  first.
caveats:
- The exact '70%' figure is a commonly cited estimate; the underlying principle is
  well-supported.
- Source is educational synthesis.
