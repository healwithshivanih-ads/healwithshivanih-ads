slug: chappus-sherr-methylene-blue-bbb-permeability-gaba-leakybrain-marker
statement: Methylene blue is both lipophilic and hydrophilic, making it freely permeable
  across the blood-brain barrier and most cellular membranes. Contrast — GABA taken
  orally normally does NOT cross an intact BBB. Practical clinical diagnostic — if
  a client reports clear cognitive or calming effect from oral GABA supplementation,
  they likely have BBB leakiness (often paralleled by gut barrier dysfunction). The
  same client should expect methylene blue to reach its mitochondrial targets reliably
  without permeability concerns.
