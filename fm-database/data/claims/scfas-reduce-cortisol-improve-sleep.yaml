slug: scfas-reduce-cortisol-improve-sleep
statement: Higher gut production of short-chain fatty acids (acetate, propionate,
  butyrate) is associated with lower stress-induced cortisol responses and better
  sleep quality via the HPA axis–gut microbiome pathway.
evidence_tier: plausible_emerging
rationale: Specific SCFA metabolites named with mechanistic pathway (HPA axis–gut
  microbiome). Association-level evidence cited; mechanistic plausibility is strong.
coaching_translation: Eating more fibre-rich foods to support SCFA production in your
  gut may help buffer your body's stress response and improve your sleep.
caveats:
- Source is expert synthesis; direction of causality between SCFAs and cortisol not
  fully established.
- Dietary fibre is the primary lever for SCFA production — coach-appropriate intervention.
