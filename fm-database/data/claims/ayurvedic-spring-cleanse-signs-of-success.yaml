slug: ayurvedic-spring-cleanse-signs-of-success
statement: The Ayurvedic spring cleanse — 3–7 days of kitchari monodiet, daily dry brushing, and oil massage
  — leverages the body's natural spring inclination to release accumulated winter mucus and fat, with
  signs of success including a clear tongue coating, fresh breath, regular bowel movements without gas,
  and clear eyes.
evidence_tier: fm_specific_thin
rationale: Spring corresponds to an increase in kapha (heavy, moist, sticky qualities) as winter stores
  melt. The body's natural detoxification inclination is supported by light foods (kitchari), lymphatic
  stimulation (dry brushing), and channel-clearing (oil massage). The listed signs mirror the clinical
  signs of improved agni, reduced ama (toxin load), and normalised bowel function.
coaching_translation: A simple 3–7 day spring cleanse eating only kitchari, with daily dry brushing and
  oil massage, can help clear winter sluggishness, improve digestion, and reduce congestion — look for
  a clear tongue, better energy, and fresh breath as signs it is working.
out_of_scope_notes: ''
caveats:
- Not indicated for those who are underweight, pregnant, or very depleted.
- Blood sugar-sensitive individuals may need 4 small meals instead of 3.
- Stop after 3 days if feeling very light-headed or cold.
