slug: weight-loss-reduces-ldl-particle-number
statement: Weight loss directly and significantly reduces LDL particle number (LDL-P),
  independent of other interventions.
evidence_tier: plausible_emerging
rationale: Clinical observation strongly supported by the clinician; biologically
  plausible through reduction in VLDL production and improved lipoprotein lipase activity
  with weight loss. Supported by published lipid metabolic studies.
coaching_translation: Losing weight — even moderate amounts — can significantly reduce
  the number of harmful LDL particles in your blood. This is one of the most powerful
  things you can do for your heart, before any medication.
caveats:
- Source is expert clinical observation in a lecture — specific trial citations not
  provided.
- Effect magnitude depends on degree of weight loss and baseline metabolic status.
