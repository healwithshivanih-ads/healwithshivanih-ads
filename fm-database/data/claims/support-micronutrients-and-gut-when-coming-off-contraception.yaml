slug: support-micronutrients-and-gut-when-coming-off-contraception
statement: When coming off synthetic contraception, first support micronutrient levels
  (B vitamins, vitamin D3, omega-3s) and the gut microbiome (probiotics, anti-inflammatory
  polyphenols), then layer in cycle-syncing once the cycle re-establishes (which can
  take months).
evidence_tier: fm_specific_thin
rationale: Aims to lower inflammation and replete deficiencies so the ovary receives
  'safe to ovulate' signals before phase-based work begins.
coaching_translation: After stopping the pill, focus on replenishing nutrients and
  gut health for a few months before starting cycle-phase work.
out_of_scope_notes: Specific supplement protocols and any underlying gynecological
  conditions need clinician input.
