slug: warfarin-requires-consistent-vitamin-k-intake
statement: Patients on warfarin should maintain consistent vitamin K intake.
evidence_tier: confirm_with_clinician
rationale: Warfarin anticoagulation is directly affected by vitamin K intake; consistency
  is important for INR stability. This is standard clinical guidance.
out_of_scope_notes: Warfarin management and vitamin K intake consistency is clinician
  scope.
caveats:
- This is a clinician-managed interaction.
- Always refer warfarin patients to their prescribing clinician for supplement and
  dietary guidance.
