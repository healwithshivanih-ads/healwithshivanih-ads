slug: mindpump-sherr-methylene-blue-red-light-680nm-synergy
statement: 'Methylene blue and red-light photobiomodulation around 680 nm donate energy
  to the same final step of the electron transport chain — cytochrome c oxidase at
  complex IV — through different routes (chemical electron donation versus photonic
  activation). Stacking them is synergistic for mitochondrial energy output. Sherr''s
  practical timing: take methylene blue, then 45 minutes to an hour later get direct
  sunlight or use a red-light panel for the photobiomodulation half. The combination
  can also be used at higher methylene-blue doses as part of an antiviral protocol,
  with sunlight exposure activating circulating compound throughout reachable tissue.'
rationale: Episode reconfirms the red-light synergy but adds the practical 45–60 min
  timing offset and the antiviral-stacking detail; valuable for clients who already
  own a red-light panel.
