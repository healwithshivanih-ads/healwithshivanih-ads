slug: nafld-reverses-faster-with-carb-restriction-than-calorie-restriction
statement: Carbohydrate restriction reduces hepatic fat more effectively than isocaloric
  calorie restriction in non-alcoholic fatty liver disease (NAFLD).
evidence_tier: plausible_emerging
rationale: Several RCTs have compared low-carb vs. low-fat/calorie-restricted diets
  in NAFLD and generally found greater reductions in intrahepatic triglycerides with
  carbohydrate restriction, consistent with the role of de novo lipogenesis driven
  by dietary fructose and carbohydrates.
coaching_translation: For a fatty liver, cutting carbohydrates — especially sugars
  — may be more effective than simply eating less overall.
caveats:
- Evidence from short-term trials; long-term superiority not established.
- Source is Instagram educational content.
