slug: riboflavin-regenerates-glutathione
statement: Riboflavin (vitamin B2) is required for the glutathione reductase reaction
  that converts oxidised glutathione back to its active reduced form; insufficient
  riboflavin therefore impairs the body's ability to sustain glutathione-mediated
  detoxification.
evidence_tier: strong
rationale: Glutathione reductase is an FAD-dependent enzyme—the riboflavin-to-glutathione
  recycling link is well established in biochemistry and peer-reviewed literature.
coaching_translation: Eating riboflavin-rich foods (liver, eggs, salmon, almonds,
  mushrooms, spinach) regularly helps your body keep glutathione recycled and functional—a
  critical support for detox capacity.
