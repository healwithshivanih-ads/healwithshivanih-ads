slug: msids-six-rivers-ten-effects-architecture
statement: The MSIDS 16-point framework decomposes any chronic illness into 6 upstream
  "rivers of inflammation" plus 10 downstream effects. RIVERS — (1) infections (Borrelia,
  Bartonella, Babesia, EBV, HHV-6, HHV-7, CMV, herpes 1/2, Candida, Mycoplasma, Chlamydia
  pneumoniae), (2) environmental toxins (mold/mycotoxins, heavy metals, microplastics,
  endocrine disruptors), (3) gut microbiome dysbiosis, (4) leaky gut + mast cell activation,
  (5) vitamin/mineral deficiencies, (6) sleep disorders. DOWNSTREAM — mitochondrial
  dysfunction, hormonal dysregulation (adrenal, thyroid, sex hormones), POTS/dysautonomia,
  neuropsychiatric, liver dysfunction, deconditioning, immune dysregulation (autoimmunity
  as bystander), pain pathway sensitisation, MCAS/allergic, and metabolic. All 16
  factors are independently associated with chronic Lyme, Alzheimer's, long COVID,
  chronic fatigue syndrome, and fibromyalgia per Horowitz's published meta-reviews.
  Practical implication — never treat a chronic illness as a single-mechanism single-drug
  problem.
