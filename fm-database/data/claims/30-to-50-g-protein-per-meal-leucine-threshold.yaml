slug: 30-to-50-g-protein-per-meal-leucine-threshold
statement: Each meal should deliver 30 to 50 grams of high-quality protein to robustly
  trigger muscle protein synthesis, with the first and last meal of the day being
  most important for muscle health. The threshold rises with age (anabolic resistance)
  and falls with elite athletic conditioning. Distribution matters as much as daily
  total — protein synthesis is meal-pulsatile, not cumulative.
evidence_tier: plausible_emerging
