slug: cts-b6-b2-combined-benefit
statement: Vitamin B6 supplementation (50–300 mg/day) for carpal tunnel syndrome shows
  greater benefit when combined with riboflavin (B2), as B2-dependent enzymes are
  required to convert pyridoxine to the active form pyridoxal-5-phosphate; failure
  of B6 therapy may indicate riboflavin deficiency or genetic conversion defect requiring
  direct P5P supplementation.
evidence_tier: plausible_emerging
rationale: Multiple studies on B6 and CTS cited; the B2 cofactor relationship is biochemically
  established though clinical RCT data are inconsistent.
coaching_translation: B6 supplements work better for carpal tunnel when you also take
  B2 (riboflavin) — and if B6 alone doesn't help after 6 weeks, ask about switching
  to the active form called P5P.
caveats:
- Studies have been inconsistent; therapeutic failure of B6 warrants trial of P5P
