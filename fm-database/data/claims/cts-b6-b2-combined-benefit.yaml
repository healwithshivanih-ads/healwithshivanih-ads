  location: Carpal Tunnel Syndrome — Vitamin B Supplementation
  quote: Greater effect is seen when B6 and B2 are given together, perhaps as a result
    of B2-dependent enzymes, which convert pyridoxine to the active form pyridoxal
    5'-phosphate (P5P). Studies have been inconsistent. Therapeutic failure of B6
    therapy could be a result of lack of riboflavin or a genetic defect that disallows
    sufficient quantities of B6 to be converted to active P5P form.
