slug: b12-deficiency-causes-neurological-damage
statement: Vitamin B12 deficiency causes accumulation of methylmalonic acid due to
  MMCM enzyme failure, leading to axonal neuropathy presenting as fatigue, confusion,
  and cognitive symptoms.
evidence_tier: strong
rationale: The methylmalonyl-CoA mutase pathway requiring B12 is well-established.
  Methylmalonic acid accumulation as a marker of functional B12 deficiency and its
  neurological consequences are documented in peer-reviewed literature.
coaching_translation: Neurological symptoms like persistent brain fog, tingling, or
  confusion in clients with low B12 (especially vegans, elderly, or those on PPIs/metformin)
  warrant prompt referral.
out_of_scope_notes: Diagnosing neuropathy or ordering methylmalonic acid labs is outside
  coaching scope — refer to clinician.
caveats:
- Neurological damage from B12 deficiency can be irreversible if untreated; early
  referral is critical.
