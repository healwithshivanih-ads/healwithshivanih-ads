slug: prebiotics-feed-probiotics-and-support-microbiome
statement: Prebiotics (non-digestible dietary fibers) selectively stimulate growth
  of beneficial colon microorganisms, acting as food for probiotic bacteria and supporting
  a balanced microbiome.
evidence_tier: strong
rationale: The prebiotic concept and its mechanism (selective fermentation in the
  colon) is well-established in the scientific literature.
coaching_translation: Prebiotics are the fertilizer for your gut garden — they feed
  the good bacteria you're trying to grow. Foods like garlic, onions, bananas, oats,
  and whole grains are excellent prebiotic sources.
