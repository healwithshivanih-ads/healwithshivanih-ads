slug: constitution-matched-daily-exercise-supports-hormonal-balance
statement: Regular, appropriate exercise — including a constitution-matched 20-minute daily practice (yoga,
  tai chi, or vigorous forms depending on body type) plus outdoor walking — is a core pillar of hormonal
  and nervous-system balance.
evidence_tier: plausible_emerging
rationale: Exercise reduces HPA-axis reactivity, improves insulin sensitivity, supports melatonin/cortisol
  rhythm amplitude, and is one of the best-evidenced lifestyle interventions for hormonal health across
  menopause transition.
coaching_translation: 'Match your exercise intensity to your current energy: if you''re depleted or underweight,
  gentle yoga or tai chi preserves yin; if you''re carrying extra weight, more vigorous practice helps
  clear excess. Either way, daily movement is non-negotiable for hormonal balance.'
out_of_scope_notes: ''
caveats:
- Over-exercise in depleted individuals can raise cortisol further — intensity matching to constitution
  is important.
