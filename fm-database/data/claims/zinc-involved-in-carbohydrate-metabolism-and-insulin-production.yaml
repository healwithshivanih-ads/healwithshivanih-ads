slug: zinc-involved-in-carbohydrate-metabolism-and-insulin-production
statement: Zinc plays a role in carbohydrate metabolism including glucose uptake,
  glycolysis, and insulin production.
evidence_tier: strong
rationale: Zinc's involvement in insulin synthesis, storage, and secretion, as well
  as its enzymatic roles in glycolysis, are well-supported in metabolic and endocrine
  literature.
coaching_translation: Zinc is important for blood sugar balance — it helps your body
  process carbohydrates and supports insulin production.
