slug: beta-blockers-indicated-secondary-prevention-arrhythmias
statement: Beta blocker therapy is indicated for secondary prevention of cardiac events
  and arrhythmias such as atrial fibrillation.
evidence_tier: strong
rationale: Extensive RCT evidence supports beta blocker use for post-MI secondary
  prevention and rate control in atrial fibrillation.
coaching_translation: Not all clients on beta blockers are candidates for de-prescribing
  — those with a history of heart attack or irregular heart rhythms may genuinely
  need them.
out_of_scope_notes: Determination of indication for continued beta blocker use is
  clinician scope.
