slug: mayo-chronic-hives-first-line-second-gen-h1
statement: Conventional first-line therapy is a non-sedating second-generation H1
  antihistamine (cetirizine, loratadine, fexofenadine, desloratadine, levocetirizine,
  bilastine) daily, with the dose titrated up to four times the standard label dose
  by the prescriber if standard dosing is inadequate.
