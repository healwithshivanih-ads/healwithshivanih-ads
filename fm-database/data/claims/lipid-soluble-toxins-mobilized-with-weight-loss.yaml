slug: lipid-soluble-toxins-mobilized-with-weight-loss
statement: Lipid-soluble toxins are stored in adipose (fat) tissue and are mobilized/released
  during weight loss, increasing toxic load and detoxification demand.
evidence_tier: plausible_emerging
rationale: 'This mechanism is recognized in toxicology and FM literature: lipophilic
  environmental chemicals (organochlorines, PCBs, etc.) accumulate in adipose tissue
  and are released during caloric deficit. Human studies support this concept though
  clinical implications are still being studied.'
coaching_translation: When you lose body fat, stored toxins are released back into
  circulation. This is why supporting your detox pathways with good nutrition is especially
  important during any weight loss effort.
