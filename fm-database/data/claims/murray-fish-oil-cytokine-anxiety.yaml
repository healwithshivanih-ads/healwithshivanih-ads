slug: murray-fish-oil-cytokine-anxiety
statement: Fish oil at 2.5 g/day combined EPA + DHA (2,085 mg EPA + 348 mg DHA) for
  12 weeks produced a 20% reduction in anxiety symptoms and a parallel 14% reduction
  in inflammatory cytokine production in stressed medical students — implicating a
  neuroinflammatory pathway in chronic anxiety. The omega-6:omega-3 ratio in modern
  Western and most urban Indian diets is heavily inflammatory-skewed.
evidence_tier: plausible_emerging
rationale: Kiecolt-Glaser 2011 DB-RCT in medical students cited. Mechanism — EPA modulates
  serotonin + dopamine + reduces inflammatory cytokines (IL-6, TNF-α) that cross blood-brain
  barrier and contribute to anxiety/depression. Effect size meaningful + safety profile
  excellent + the cytokine biomarker validation strengthens the causal story.
coaching_translation: Fish oil at 2.5 g/day EPA+DHA cut anxiety symptoms by 20% in
  stressed medical students — and the cytokine measurements showed the effect runs
  through reduced inflammation, not just generic 'fatty acid status.' Worth including
  in any chronic anxiety protocol. Most multivitamins have 200-300 mg of EPA+DHA —
  that won't reach this dose. Quality matters — third-party tested for oxidation.
caveats:
- 2.5 g/day combined EPA+DHA is therapeutic; most multivitamins have ~10× less
- Quality + oxidation — third-party tested only
- Mild antiplatelet — caution + anticoagulants
- Stacks with vitamin E for stability
- Vegetarian alternative — algal DHA (lower EPA)
