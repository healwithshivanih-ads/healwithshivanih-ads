slug: sklar-exogenous-testosterone-suppresses-spermatogenesis
statement: 'Exogenous testosterone (testosterone replacement therapy, anabolic steroids,
  some topical "boosters") suppresses pituitary FSH and LH release through negative
  feedback, which in turn shuts down intra-testicular testosterone production and
  the spermatogenic cycle. Result: declining sperm count and, in some men, complete
  azoospermia. Any male partner on TRT who wants to conceive needs to stop the exogenous
  source and work with an andrologist on HCG / clomiphene-based recovery — supplementation
  alone will not rescue sperm output.'
