slug: fasting-insulin-rises-before-fasting-glucose-in-ir
statement: Fasting insulin rises before fasting glucose becomes abnormal, making it
  the first biochemical warning sign of insulin resistance.
evidence_tier: strong
rationale: Well-established in the insulin resistance literature; compensatory hyperinsulinaemia
  precedes impaired fasting glucose by years.
coaching_translation: Your blood sugar can still look 'normal' on a standard test
  while your insulin is already working overtime — which is why testing insulin matters.
out_of_scope_notes: Lab ordering and interpretation is clinician scope.
