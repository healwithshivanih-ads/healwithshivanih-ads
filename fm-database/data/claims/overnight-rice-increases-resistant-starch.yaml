slug: overnight-rice-increases-resistant-starch
statement: Cooling cooked starchy foods (e.g., rice, potatoes) to ≤5°C and reheating
  increases resistant starch content from <1g to ~2–3g per 100g, lowering post-prandial
  glucose and insulin excursion.
evidence_tier: plausible_emerging
rationale: Retrogradation of amylose/amylopectin on cooling is chemically established.
  Functional RS studies show reduced glycaemic response; second-meal effect has RCT
  support, though specific RS dose effects need more study.
coaching_translation: Cooking rice or potatoes and refrigerating them overnight before
  eating (even if reheated) increases resistant starch, which is gentler on blood
  sugar.
linked_to_topics:
- blood-sugar-dysfunction
linked_to_supplements: []
caveats:
- Source is FM synthesis; specific RCTs not cited. Individual RS content varies by
  starch type and processing.
out_of_scope_notes: ''
