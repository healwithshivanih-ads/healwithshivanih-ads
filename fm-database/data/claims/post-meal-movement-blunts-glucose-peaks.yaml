slug: post-meal-movement-blunts-glucose-peaks
statement: Anti-gravity activity (15-min walk, stair climbing, calf raises) within
  20 minutes of meals blunts post-prandial glucose peaks.
evidence_tier: plausible_emerging
rationale: 'Credible mechanism: muscle contraction activates GLUT-4 translocation
  independently of insulin (AMPK-mediated). Postprandial walk studies show modest
  glucose attenuation.'
coaching_translation: A short walk or some light movement right after meals is one
  of the easiest ways to stop blood sugar from spiking too high.
