slug: pre-tox-bowels-before-detox
statement: Gordon and his partner Dr Nafysa Arpia coined the term "pre-tox" to describe
  the necessary preparation phase before any detoxification programme in a chronically-ill
  client. Drainage pathways must work BEFORE mobilising toxins — bowels moving daily,
  urination adequate, ability to sweat. Clients who try popular detox protocols without
  functional drainage get worse because mobilised toxins recirculate. Coach checklist
  before any detox conversation — daily bowel movement, hydration with electrolytes,
  sauna tolerance, lymphatic movement, sleep quality. If these are not in place, "pre-tox"
  them for 4-8 weeks before any cleanse.
