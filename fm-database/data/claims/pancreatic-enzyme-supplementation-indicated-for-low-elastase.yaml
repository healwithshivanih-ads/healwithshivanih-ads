slug: pancreatic-enzyme-supplementation-indicated-for-low-elastase
statement: Low fecal elastase on gut microbiome testing indicates impaired pancreatic
  function, and broad-spectrum digestive enzyme supplementation (including lipase
  and protease) is indicated.
evidence_tier: plausible_emerging
rationale: Fecal elastase is a validated marker of exocrine pancreatic function. Low
  elastase correlates with pancreatic insufficiency and impaired macronutrient digestion.
  Digestive enzyme supplementation is a logical and commonly practiced intervention.
coaching_translation: If your client's gut test shows low digestive enzyme markers,
  they may need digestive enzyme support with meals to help break down food properly.
caveats:
- Source is expert lecture, moderate quality.
- Lab interpretation (elastase) is clinician scope.
- Specific enzyme product selection and dosing should be clinician-guided.
