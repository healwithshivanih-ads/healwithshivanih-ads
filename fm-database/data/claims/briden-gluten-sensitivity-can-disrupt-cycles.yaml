  location: Chapter 1 — Meagan case study, pp 5-7
  quote: Meagan had a group of symptoms which suggested to me a possible sensitivity
    to wheat — psoriasis, iron deficiency, and irregular periods. I asked her to avoid
    gluten for six months. After six months, she got her first period and went on
    to have regular periods. The right treatment for Meagan's general health was also
    the right treatment for her periods. It is always like this — fix your health,
    and you will fix your period.
