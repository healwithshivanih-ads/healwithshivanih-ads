slug: selenium-reduces-thyroid-antibodies
statement: Selenium supplementation (100–200 mcg/day) reduces thyroid antibody levels
  and improves T4-to-T3 conversion in autoimmune thyroid disease.
evidence_tier: plausible_emerging
rationale: Selenium is the cofactor for deiodinase selenoproteins that convert T4
  to T3. The document states 100-200 mcg/day 'reduces antibodies, improves conversion'
  but does not cite a specific RCT. Multiple trials (e.g., Toulis et al.) support
  antibody reduction in Hashimoto's; however, this document is a synthesis without
  primary citation.
coaching_translation: Eating 1-2 Brazil nuts daily or supplementing with selenium
  supports both thyroid hormone activation and a calmer immune response in Hashimoto's.
caveats:
- Source is educational synthesis without primary RCT citation
- Dose of 100-200 mcg requires clinician oversight — selenium has a narrow therapeutic
  window
