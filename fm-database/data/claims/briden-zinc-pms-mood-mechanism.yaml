slug: briden-zinc-pms-mood-mechanism
statement: Zinc improves premenstrual mood symptoms (including perimenopausal mood
  symptoms) by calming glutamate receptors (tipping the balance toward GABA), supporting
  the hippocampus (which regulates the HPA stress axis), reducing inflammation, and
  dampening histamine activity. A 2025 systematic review and meta-analysis of RCTs
  found significant PMS improvement with zinc supplementation.
evidence_tier: strong
rationale: The 2025 meta-analysis cited by Briden supports the PMS benefit. The glutamate-GABA,
  HPA, and histamine mechanisms are independently documented in zinc neurobiology
  literature.
coaching_translation: Zinc has a wider mood-modulating action than is usually appreciated
  — it is not only an androgen blocker. For premenstrual irritability, anxiety, or
  perimenopausal mood, zinc 30 mg daily is a reasonable lifestyle-tier addition.
