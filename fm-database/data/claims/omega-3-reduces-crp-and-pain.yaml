slug: omega-3-reduces-crp-and-pain
statement: Supplementing with high-dose omega-3 fatty acids (EPA/DHA) reduces elevated CRP and associated musculoskeletal
  pain, particularly in individuals with low baseline omega-3 status.
evidence_tier: plausible_emerging
rationale: Multiple RCTs support omega-3 supplementation reducing CRP and joint pain in inflammatory conditions. The specific
  personal case presented is anecdotal but consistent with the broader literature.
coaching_translation: If your client is doing everything right and still has lingering pain or inflammation markers, checking
  omega-3 status and supplementing 2–4g/day of EPA+DHA may be the missing piece.
caveats:
- Clinical case in lecture is anecdotal (n=1).
- Dose of 4g/day should be confirmed with a clinician, especially for those on blood thinners.
- Source is expert lecture, not a primary RCT.
