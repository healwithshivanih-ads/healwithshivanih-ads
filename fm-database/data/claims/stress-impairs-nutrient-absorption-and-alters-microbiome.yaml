slug: stress-impairs-nutrient-absorption-and-alters-microbiome
statement: Chronic stress impairs nutrient absorption and can alter the gut microbiome,
  reducing the body's ability to synthesize vitamins.
evidence_tier: plausible_emerging
rationale: Sympathetic dominance reduces digestive enzyme output, slows intestinal
  motility, and alters gut microbial composition, consistent with known neuroenteric
  physiology. This is biologically plausible and supported by emerging literature,
  though the specific vitamin synthesis claim is a simplification.
coaching_translation: Even the best diet can fall short if your body is in chronic
  stress mode — stress changes how well you absorb nutrients and affects the beneficial
  bacteria that help make certain vitamins.
caveats:
- Source is expert consensus / practitioner discussion, not a cited RCT.
- The claim that stress prevents vitamin synthesis is a simplification of a more complex
  gut-microbiome relationship.
- Verify specific mechanisms with clinician for client education.
