slug: ivy-leaf-lobelia-expectorants-copd
statement: Botanical expectorants help thin and mobilise mucus in COPD. Ivy leaf (Hedera
  helix) 4:1 dry powdered extract 100 mg/day (adult equivalent of 420 mg dried herb)
  is well-tolerated and child-safe at adjusted doses. Lobelia inflata (0.2 to 0.6
  g dried herb three times daily, or 15 to 30 drops tincture) also works as an expectorant.
  Pair with hydration, salt-pipe inhalation, and bottle-blowing exercises that strengthen
  exhalation.
