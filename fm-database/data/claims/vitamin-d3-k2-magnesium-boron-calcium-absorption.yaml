slug: vitamin-d3-k2-magnesium-boron-calcium-absorption
statement: Effective calcium metabolism requires a combination of vitamin D3, K2,
  magnesium, and boron; taking calcium alone risks arterial calcification.
evidence_tier: plausible_emerging
rationale: Vitamin K2 (MK-7) directs calcium to bone rather than soft tissue. Magnesium
  is required for D3 activation. Boron supports bone mineral density. The synergistic
  requirement is biologically well-supported, though large RCTs on the full combination
  are limited.
coaching_translation: Tell your clients not to just buy calcium off the shelf. Without
  K2, D3, magnesium, and boron, calcium may end up in arteries instead of bones. Always
  recommend the full combination.
out_of_scope_notes: Specific doses of D3 and K2 require clinician guidance based on
  lab results.
caveats:
- Source is expert FM lecture.
- Vitamin D dosing must be guided by serum 25-OH D levels.
- Confirm with clinician before advising doses above 2000 IU D3.
