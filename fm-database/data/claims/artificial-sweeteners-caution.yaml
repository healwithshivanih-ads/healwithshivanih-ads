slug: artificial-sweeteners-caution
statement: Artificial sweeteners may harm the microbiota and glucose control — 'responders'
  show raised blood glucose — and observational data link them to weight gain and
  metabolic syndrome, so they are best used only occasionally.
evidence_tier: plausible_emerging
rationale: Cites microbiota/glucose studies and observational metabolic associations.
coaching_translation: Diet sweeteners aren't a free pass — use them sparingly; small
  amounts of natural sweeteners are usually a better bet.
