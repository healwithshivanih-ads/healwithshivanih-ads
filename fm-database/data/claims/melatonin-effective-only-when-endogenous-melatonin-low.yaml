- id: pizzorno-sleep-hpa
  location: Insomnia — Melatonin (pp 571)
  quote: Sleep effects of melatonin are apparent only if melatonin levels are low.
    Melatonin is not like a sleeping pill or 5-HTP; it produces a sedative effect
    only when melatonin levels are low. It is most effective for insomnia in elderly,
    in whom low melatonin is common; dose is 3 mg at bedtime.
