slug: melatonin-effective-only-when-endogenous-melatonin-low
statement: Supplemental melatonin (3 mg at bedtime) produces a sedative effect only
  when endogenous pineal melatonin is low — most useful in the elderly, in jet lag,
  and in shift work; ineffective when baseline melatonin is normal.
evidence_tier: strong
rationale: Pizzorno summarises the clinical pattern — melatonin acts as a chronobiotic,
  not a sedative per se. RCTs show effect concentrated in low-melatonin populations
  (elderly, blind, transmeridian travellers). Mechanism via MT1/MT2 receptor binding
  when receptors are not already saturated.
coaching_translation: Melatonin isn't a sleeping pill for everyone. It only works
  when your own melatonin is low — typically in elderly people, with jet lag, or shift
  work. For someone with normal melatonin, it does very little.
caveats:
- 3 mg at bedtime; lower (0.3-1 mg) often equally effective.
- Long-term high-dose use can disrupt natural circadian rhythm.
- Combine with light hygiene (morning light + evening dimming) for chronobiotic effect.
