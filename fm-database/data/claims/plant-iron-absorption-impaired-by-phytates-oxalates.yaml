slug: plant-iron-absorption-impaired-by-phytates-oxalates
statement: Plant-based (non-heme) iron absorption is impaired by phytates and oxalates
  present in plant foods, further reducing its already-lower baseline absorption rate
  of 3–12%.
evidence_tier: strong
rationale: Phytates (from grains, legumes) and oxalates (from leafy greens) bind non-heme
  iron in the gut, forming insoluble complexes that reduce absorption. This is well-established
  in nutritional science.
coaching_translation: Even if a plant-based client eats lots of iron-rich plant foods,
  absorption inhibitors in those same foods can significantly cut how much iron actually
  gets into their body.
caveats:
- Source is an expert lecture; consistent with established nutritional science.
