slug: destressing-practices-lower-cortisol-modulate-inflammation-myers-tas
statement: De-stressing practices — meditation, breathwork, music, EFT/tapping, EMDR,
  movement, time in nature, and connection — measurably lower cortisol and can shift
  inflammatory gene expression; the key skill is releasing stress once the stressor
  passes ('think like a zebra').
evidence_tier: plausible_emerging
rationale: Studies show ~30 minutes of music lowers cortisol and meditation alters
  inflammatory gene expression; the harm comes from carrying stress long after the
  event.
coaching_translation: Simple daily practices — breathing, music, a walk, tapping —
  genuinely lower stress hormones. The trick is to let stress go once the moment has
  passed.
