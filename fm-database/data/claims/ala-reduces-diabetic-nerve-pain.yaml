slug: ala-reduces-diabetic-nerve-pain
statement: Alpha lipoic acid reduces symptoms of diabetic nerve pain.
evidence_tier: plausible_emerging
rationale: Supported by Porasuphatana et al. 2012 (Asia Pac J Clin Nutr) RCT cited
  in document; IV ALA has stronger evidence but oral forms also studied. Multiple
  trials support neuropathy symptom reduction.
coaching_translation: Alpha lipoic acid is an antioxidant that research shows can
  help ease nerve pain in people with diabetes.
caveats:
- Strongest evidence is for IV ALA; oral evidence is more modest. Symptom management
  of diabetic neuropathy requires clinician oversight.
out_of_scope_notes: Diabetic neuropathy treatment is outside coaching scope — refer
  to clinician.
