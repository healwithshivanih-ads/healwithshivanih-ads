slug: gfcf-diet-rct-non-verbal-iq-gain
statement: In a published randomised controlled trial referenced by Matthews, a gluten-free
  casein-free (GFCF) diet plus multivitamin and essential fatty acids in children
  with autism produced a sevenfold improvement in non-verbal IQ scores and a 4.5-fold
  gain in developmental age compared with the comparison group, along with broad improvement
  in digestive, cognitive, and language symptoms. The 2024 survey paper (n=800 families
  across 13 therapeutic diets) found GFCF to be the most consistently beneficial diet
  with high adherence.
