slug: free-radicals-damage-pancreatic-cells-reducing-enzyme-output
statement: Excess free radicals cause inflammatory damage to pancreatic cells, reducing
  their capacity to produce digestive enzymes.
evidence_tier: plausible_emerging
rationale: Oxidative stress is a recognised driver of pancreatic tissue damage, particularly
  in chronic pancreatitis. The mechanistic link between ROS, pancreatic cell injury,
  and reduced enzyme secretion is biologically plausible and supported by animal and
  observational studies.
coaching_translation: High levels of inflammation and oxidative stress in the body
  can damage pancreatic cells. Supporting antioxidant intake (e.g., vitamin E, curcumin)
  may help protect these cells.
