slug: vitamin-d-increases-shbg
statement: Vitamin D supplementation is associated with increased SHBG levels.
evidence_tier: plausible_emerging
rationale: Listed in the document's SHBG-increasing medications/supplements table.
  Observational and some interventional evidence supports this association; mechanism
  involves hepatic SHBG synthesis.
coaching_translation: Vitamin D may help raise SHBG, which can be beneficial if your
  levels are low and you're experiencing androgen excess symptoms.
caveats:
- Magnitude of effect is modest and context-dependent. Lab monitoring of SHBG and
  vitamin D 25-OH levels recommended.
