slug: vitamin-d-increases-shbg
statement: Vitamin D supplementation is associated with increased SHBG levels.
evidence_tier: plausible_emerging
rationale: Multiple studies suggest an association between vitamin D status and SHBG, possibly via hepatic SHBG gene expression.
  Listed as an SHBG-raising supplement in the FMCN toolkit.
coaching_translation: Optimizing vitamin D may support healthy hormone balance by influencing SHBG levels.
caveats:
- Magnitude of effect is modest and context-dependent. Lab monitoring of SHBG and vitamin D 25-OH levels recommended.
- Association vs. causation not fully established
- Dosing must be guided by clinician and serum 25-OH-D testing
