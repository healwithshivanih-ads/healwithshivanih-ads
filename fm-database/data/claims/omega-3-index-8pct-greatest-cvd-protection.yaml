slug: omega-3-index-8pct-greatest-cvd-protection
statement: An omega-3 index of ≥8% (EPA+DHA as % of red blood cell fatty acids) is
  linked to greatest cardiovascular protection; an index of 4% is linked to the least.
  Combined 1000 mg EPA+DHA daily achieves the 8% target.
evidence_tier: strong
rationale: Harris et al. omega-3 index research; well-replicated in cardiovascular
  literature.
coaching_translation: Your omega-3 blood level — not just how much fish you eat —
  is a key heart-protection marker. Aim for ≥8%.
caveats:
- Omega-3 index testing not yet universally available
