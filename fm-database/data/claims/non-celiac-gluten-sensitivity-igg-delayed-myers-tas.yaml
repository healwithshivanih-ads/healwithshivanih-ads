slug: non-celiac-gluten-sensitivity-igg-delayed-myers-tas
statement: Non-celiac gluten sensitivity is IgG-mediated with delayed reactions (up
  to ~72 hours), affecting a far larger share of people than celiac disease or wheat
  allergy, and is frequently missed by standard testing.
evidence_tier: plausible_emerging
rationale: IgE tests catch allergy and biopsy catches celiac, but the more common
  IgG-mediated sensitivity is delayed and under-detected; symptoms can appear days
  after exposure.
coaching_translation: Gluten can bother you even if celiac tests are negative, and
  the reaction may take a day or two to show up.
linked_to_topics:
