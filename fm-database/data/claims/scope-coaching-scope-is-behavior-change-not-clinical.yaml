slug: scope-coaching-scope-is-behavior-change-not-clinical
statement: Per NBHWC standards, health coaching supports wellness plans through active
  listening, reflections, powerful questioning and building self-efficacy — it is
  the domain of behaviour change and mindset, not of assessing, interpreting, diagnosing,
  treating, prescribing, or interpreting labs. Coaches provide the 'how-to' for a
  provider's 'what', not heavy advice-giving.
evidence_tier: plausible_emerging
rationale: Knowing the exact boundary lets the coach say yes to what builds change
  and no to clinical acts that carry licensure and liability risk, without weakening
  the relationship.
coaching_translation: 'Frame yourself as the implementation partner: ''I support the
  how — the steps of behaviour change, confidence, and a step-by-step accountability
  plan — for what your provider recommended.'''
out_of_scope_notes: Diagnosing, treating, prescribing, interpreting individual lab
  findings, recommending supplements, and therapeutic/psychological counselling belong
  to the licensed clinician.
