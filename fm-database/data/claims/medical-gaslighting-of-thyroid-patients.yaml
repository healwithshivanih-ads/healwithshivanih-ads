slug: medical-gaslighting-of-thyroid-patients
statement: Hornaman names "medical gaslighting" as a recurring experience for hypothyroid
  and Hashimoto's clients — symptoms dismissed as ageing, hormonal, or psychological
  because TSH alone is within range. Many of her clients saw 10-15 doctors before
  diagnosis. Coach role — validate the client's symptoms as real data ("your body
  giving you symptoms is a gift") and resource them to ask for the full panel rather
  than accept the "you're normal" verdict.
evidence_tier: plausible_emerging
linked_to_topics:
- hypothyroidism
- autoimmune-thyroiditis
sources:
- id: hornaman-energy-blueprint-podcast-2026
  location: Podcast — opening segment on gaslighting
  quote: I've had some patients go through 10, 15 doctors before they find that answer.
    I call it medical gaslighting. If you do feel like 'Gosh, is this me? Maybe these
    symptoms are all in my head' — no, they're not. Your body giving you symptoms
    is a beautiful gift because that tells us we need to look deeper.
rationale: Strong client-facing framing — gives the coach permission to push back
  kindly when a client arrives saying "my doctor said my thyroid is fine."
