slug: omega-3-fats-reduce-inflammation-support-estrogen
statement: Omega-3 fats from fish, fish oil, and flax reduce inflammation, which may
  indirectly support healthy estrogen metabolism.
evidence_tier: plausible_emerging
rationale: Document cites Larsson et al. (Am J Clin Nutr, 2004) on long-chain n-3
  fatty acids and cancer prevention mechanisms. Anti-inflammatory effect of omega-3s
  is strongly established; indirect estrogen pathway support is plausible but not
  proven.
coaching_translation: Including wild-caught salmon, sardines, or fish oil in your
  diet may help keep inflammation low, which supports better hormone balance.
caveats:
- Mechanism linking omega-3 anti-inflammation to estrogen metabolism is indirect.
  Farm-raised fish should be avoided due to PCB content per the document.
