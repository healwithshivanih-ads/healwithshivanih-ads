slug: avoid-bpa-strategies-kitchen
statement: 'Practical BPA reduction: replace polycarbonate plastic food storage with
  glass, stainless steel, or ceramics; avoid heating food in plastic; hand-wash plastic
  in cold water (no dishwasher); avoid BPA-lined canned foods (especially acidic foods
  like tomatoes); use French press instead of plastic-component coffee machines; minimise
  handling of thermal-paper receipts and wash hands afterward. Effect on body BPA
  levels is rapid — within days of consistent avoidance.'
