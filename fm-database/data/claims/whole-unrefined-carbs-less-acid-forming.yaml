slug: whole-unrefined-carbs-less-acid-forming
statement: Whole, unrefined carbohydrates (e.g., a small portion of rice paired with
  generous dal and vegetable salad) are less problematic than refined carbohydrates
  when eaten in appropriate proportions.
evidence_tier: plausible_emerging
rationale: There is strong dietetic consensus that whole grains and legume-rich meals
  have superior nutritional profiles. Within the acid-alkaline framework, balancing
  a modest acid-forming grain with alkaline-forming vegetables and legumes is consistent
  with the 70/30 ratio principle.
coaching_translation: It's not about cutting rice or carbs completely — it's about
  the ratio. A cup of rice alongside two cups of lentils and a big vegetable salad
  is a well-balanced, mostly alkaline meal.
caveats:
- Source is an expert lecture.
- The example given (rice, dal, salad) is culturally specific and may need adaptation.
