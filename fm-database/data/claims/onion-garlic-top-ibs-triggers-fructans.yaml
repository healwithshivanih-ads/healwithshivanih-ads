slug: onion-garlic-top-ibs-triggers-fructans
statement: Onion and garlic are among the top IBS trigger foods due to their high
  fructan content; garlic-infused oil retains flavour without FODMAP load.
evidence_tier: strong
rationale: Fructans in allium vegetables are well-established high-FODMAP components
  validated by Monash University FODMAP testing. Garlic-infused oil as a substitute
  is a validated clinical strategy as fructans are water-soluble (not oil-soluble).
coaching_translation: Garlic and onion are hidden in many sauces and spice mixes.
  Swap to garlic-infused olive oil or use the green tops of spring onions to get the
  flavour without the bloating trigger.
caveats:
- Individual tolerance varies; systematic reintroduction testing is recommended.
