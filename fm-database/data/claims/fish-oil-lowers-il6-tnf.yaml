slug: fish-oil-lowers-il6-tnf
statement: Fish oil supplementation lowers IL-6 and TNF-alpha levels.
evidence_tier: strong
rationale: Multiple RCTs demonstrate EPA/DHA reduce circulating IL-6 and TNF-alpha,
  key pro-inflammatory cytokines.
coaching_translation: Omega-3 fish oil is one of the best-studied natural ways to
  lower inflammatory markers. Recommend 2–3g EPA/DHA daily with meals.
caveats:
- Effect size varies by dose and baseline Omega-3 Index.
- Source is educational synthesis.
