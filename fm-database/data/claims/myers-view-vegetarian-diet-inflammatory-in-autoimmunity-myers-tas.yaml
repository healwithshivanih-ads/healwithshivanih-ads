slug: myers-view-vegetarian-diet-inflammatory-in-autoimmunity-myers-tas
statement: Myers argues that grain-, legume-, and dairy-heavy vegetarian or vegan
  diets are often inflammatory and protein-poor for people with autoimmune disease,
  and she recommends grass-fed/pasture-raised animal protein.
evidence_tier: confirm_with_clinician
rationale: The book's position is that once inflammatory plant staples are removed,
  a vegetarian diet leaves little nutrient-dense, adequate-protein food; a modified
  fish-inclusive version is offered as a compromise.
coaching_translation: This is the author's clinical opinion, not a rule. Many people
  thrive on well-planned vegetarian diets; the goal is enough quality protein and
  low inflammation, whatever the pattern.
linked_to_topics:
- elimination-diet
caveats:
- Strongly reflects a single author's stance and does not fit clients who are vegetarian
  by conviction or culture.
- Vegetarian and vegan diets can be made anti-inflammatory and protein-adequate with
  legumes handled well, dairy/whey where tolerated, and supplementation.
- Never push meat on a vegetarian client; adapt the anti-inflammatory principles to
  their chosen pattern.
