slug: celiac-gluten-free-clinical-response
statement: 'Clinical improvement on a gluten-free diet is seen within days to weeks
  in most celiac patients: 30% respond within 3 days, 50% within 1 month, and another
  10% within 2 months; 10% require 24–36 months.'
evidence_tier: strong
rationale: Well-documented clinical response timeline from the primary naturopathic
  medicine textbook; failure to respond suggests non-adherence, hidden gluten, or
  complicating conditions.
coaching_translation: Most people with celiac disease feel noticeably better within
  days to a few weeks of removing all gluten — even small hidden sources can delay
  recovery.
caveats:
- Failure to respond requires clinician re-evaluation for hidden gliadin sources,
  zinc deficiency, or associated conditions
