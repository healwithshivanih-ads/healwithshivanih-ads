slug: gut-holds-80-percent-immune-system-myers-tas
statement: Approximately 80% of the immune system resides in the gut, so gut health
  is inseparable from immune health.
evidence_tier: plausible_emerging
rationale: The gut-associated lymphoid tissue (GALT) is the largest immune compartment
  in the body; Myers uses this to argue that healing the gut is the first pillar of
  reversing autoimmunity.
coaching_translation: A large share of your immune system lives in your gut, which
  is why we start by supporting digestion and the gut lining.
