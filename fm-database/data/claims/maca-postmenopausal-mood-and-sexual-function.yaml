slug: maca-postmenopausal-mood-and-sexual-function
statement: In a randomized double-blind placebo-controlled crossover trial of 14 postmenopausal
  women, powdered maca at 3.5 g/day for 6 weeks significantly reduced Greene Climacteric
  Scale subscales for anxiety, depression, and sexual dysfunction. Serum estradiol,
  FSH, LH, and SHBG were unchanged, and yeast-receptor assays showed no estrogenic
  or androgenic activity.
evidence_tier: strong
