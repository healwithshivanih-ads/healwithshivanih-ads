- id: brooks-2008-maca-postmenopausal-psychological-sexual
  location: Results and Conclusion
  quote: Maca reduced psychological symptoms and sexual dysfunction independent of
    estrogenic and androgenic activity.
rationale: Crossover RCT design strengthens evidence despite n=14. Confirms HPA-axis
  (not phytoestrogenic) mechanism.
