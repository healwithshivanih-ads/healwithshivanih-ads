  location: Chapter 20 — Alzheimer's, Quick Review pg 461, Treatment Summary pg 462
  quote: From the perspective of natural medicine, the primary goals of intervention
    are prevention and using natural measures to improve mental function in the early
    stages of the disease. In the advanced stages of AD, natural measures will usually
    provide little benefit. We recommend a trial for a minimum of 90 days in attempting
    to improve AD with natural measures.
