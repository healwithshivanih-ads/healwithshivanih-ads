slug: murray-alzheimer-prevention-vs-treatment
statement: 'Alzheimer''s disease (AD) responds to natural interventions PRIMARILY
  in prevention + early stages — Murray''s clear clinical message: ''In advanced AD,
  natural measures will usually provide little benefit.'' Once neurodegeneration progresses
  past mild cognitive impairment, the window for meaningful improvement narrows dramatically.
  This makes EARLY recognition + intervention critical. 90-day trial of intervention
  typically determines whether benefit will accrue; if no improvement, additional
  therapy unlikely to help. Key modifiable risk factors: insulin resistance (''type
  3 diabetes''), aluminium exposure, head trauma history, free-radical damage, B-vitamin
  deficiency, sleep disruption.'
evidence_tier: strong
rationale: Established AD research. Mechanism — neurodegeneration once established
  is largely irreversible; preventing onset + slowing early-stage progression is achievable.
  Multiple lines of evidence on modifiable risk factors.
coaching_translation: 'Alzheimer''s prevention is realistic; reversal once advanced
  is not. Window for benefit closes as disease progresses. Critical risk factors to
  address EARLY: insulin resistance (Alzheimer''s is sometimes called ''type 3 diabetes''),
  aluminium exposure (antiperspirants, antacids, cookware), head trauma, B-vitamin
  deficiency, sleep disruption. 90-day intervention trial determines if natural measures
  will help; advanced disease usually doesn''t respond.'
caveats:
- 90-day trial is the window for judging benefit
- Advanced AD generally non-responsive to natural measures
- Mild cognitive impairment is the high-yield intervention window
- Insulin resistance + Alzheimer's link increasingly recognised
- Aluminium exposure reduction is foundational + free
