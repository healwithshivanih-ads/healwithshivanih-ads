slug: probiotics-may-reduce-hba1c-in-t2d
statement: Probiotics may have beneficial effects on reducing blood sugar, insulin,
  and HbA1c, especially in those with type 2 or gestational diabetes.
evidence_tier: plausible_emerging
rationale: Wang et al. 2017 (J Pediatr Endocrinol Metab) meta-analysis of RCTs cited
  directly in document supports this claim, though effect size and strain specificity
  are variable.
coaching_translation: Adding fermented foods like yogurt, kefir, kimchi, or a probiotic
  supplement may help improve blood sugar markers, especially if you have diabetes.
caveats:
- Effect is strain-specific. Evidence strongest for T2D and gestational diabetes.
  Emerging, not consensus.
