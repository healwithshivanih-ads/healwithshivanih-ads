slug: lp-a-10x-greater-risk-than-elevated-ldl
statement: Elevated Lp(a) is associated with 10× greater risk for heart disease than
  elevated LDL-C alone, because Lp(a)'s adhesive apolipoprotein(a) moiety causes it
  to adhere to artery walls.
evidence_tier: strong
rationale: Extensively documented in cardiovascular literature; Lp(a) is recognized
  as an independent causal risk factor.
coaching_translation: High Lp(a) is a hidden heart risk that standard cholesterol
  tests often miss — it needs to be measured separately.
caveats:
- Lp(a) levels are largely genetically determined and less responsive to diet than
  LDL-C
linked_to_topics:
- atherosclerosis
- dyslipidemia
linked_to_supplements:
- niacin
- vitamin-c
