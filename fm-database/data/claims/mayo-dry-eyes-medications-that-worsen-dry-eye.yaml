slug: mayo-dry-eyes-medications-that-worsen-dry-eye
statement: Common medications that worsen dry eye include antihistamines, decongestants,
  hormone replacement therapy (oestrogen alone), antidepressants, anti-anxiety meds,
  isotretinoin, and beta blockers; coach should screen the med list before any other
  intervention.
