slug: magnesium-depletion-from-water-filtration
statement: Water filtration removes magnesium from drinking water, creating a widespread
  magnesium deficiency that requires supplementation.
evidence_tier: plausible_emerging
rationale: Dr. Davis identifies water filtration as removing magnesium, which humans
  historically obtained from natural water sources. This is a widely recognized phenomenon
  in functional medicine and supported by data showing that filtered and treated water
  has lower mineral content than natural spring water.
coaching_translation: Because we filter our tap water, we lose the magnesium that
  used to be naturally present. Supplementing magnesium helps replace what water treatment
  removes.
caveats:
- Source is expert_consensus interview.
- Specific magnitude of magnesium depletion from water varies by filtration type and
  source water.
- Dietary magnesium from food is also relevant.
