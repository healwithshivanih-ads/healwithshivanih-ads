slug: autoimmune-conditions-primarily-igg-not-ige
statement: In autoimmune conditions, IgG reactions to food — not IgE — are the predominant
  immune mechanism; the most common triggers are casein, wheat, dairy, egg white,
  and rice.
evidence_tier: plausible_emerging
rationale: The association between IgG food reactions and autoimmune conditions is
  a widely applied FM clinical framework. Some research supports immune complex involvement
  in autoimmunity, but the specific food-autoimmune disease links vary in evidence
  strength by condition.
coaching_translation: Clients with autoimmune conditions often do better removing
  casein, gluten/wheat, egg white, and rice — even if IgE allergy tests come back
  negative.
caveats:
- Source is expert lecture, moderate quality.
- Evidence strength varies significantly by autoimmune condition and food type.
- This should be implemented as part of a supervised elimination diet, not self-directed
  removal without clinical oversight.
