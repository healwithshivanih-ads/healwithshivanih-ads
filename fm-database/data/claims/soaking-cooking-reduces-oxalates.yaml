slug: soaking-cooking-reduces-oxalates
statement: Soaking followed by cooking high-oxalate plant foods can help decrease
  their oxalate content and reduce risk of oxalate-related symptoms.
evidence_tier: plausible_emerging
rationale: Published nutrition science supports that boiling vegetables in water and
  discarding cooking water reduces oxalate content by leaching water-soluble oxalates.
  The magnitude varies by food.
coaching_translation: If you need to limit oxalates, try soaking vegetables like spinach
  in water first, then boiling and discarding the water before eating.
