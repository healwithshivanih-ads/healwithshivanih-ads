slug: vitamin-k-controls-calcium-trafficking
statement: Vitamin K directs calcium into bone and keeps it out of arteries, kidneys, and cartilage.
evidence_tier: plausible_emerging
rationale: Vitamin K2 activation of matrix Gla protein and osteocalcin for calcium trafficking is credibly supported by mechanistic
  and observational research.
coaching_translation: Encourage K2-containing foods (fermented foods, aged cheese, natto) alongside calcium and vitamin D
  for bone and cardiovascular health.
caveats:
- Source is a practitioner cheatsheet without primary citations.
- K2 MK-7 cardiovascular evidence is emerging but not yet consensus.
- Source is practitioner cheatsheet.
- Vitamin K supplementation with warfarin requires clinician oversight.
