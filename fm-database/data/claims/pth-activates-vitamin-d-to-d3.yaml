slug: pth-activates-vitamin-d-to-d3
statement: Parathyroid hormone activates vitamin D to its active form (vitamin D3 / 1,25-dihydroxyvitamin D), linking PTH
  status to calcium absorption capacity.
evidence_tier: strong
rationale: 'Standard physiology: PTH stimulates renal 1-alpha-hydroxylase to convert 25-OH vitamin D to 1,25(OH)2D3 (calcitriol).
  This is well-established biochemistry.'
coaching_translation: Your body's calcium-regulating hormone (PTH) also switches on vitamin D, so problems with PTH can reduce
  vitamin D activity and lower calcium absorption at the same time.
