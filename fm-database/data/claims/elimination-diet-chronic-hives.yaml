slug: elimination-diet-chronic-hives
statement: An elimination diet is the cornerstone of chronic hives work-up — removing
  milk, eggs, chicken, nuts, citrus, shellfish, vasoactive-amine-rich foods (cured
  meat, cheese, chocolate, alcohol), and ALL food additives. One trial of 64 hives
  patients found 73% had significant symptom reduction after two weeks on an additive-free
  diet alone.
evidence_tier: strong
