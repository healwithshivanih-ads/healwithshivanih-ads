- id: hawrelak-energy-blueprint-podcast-2026
  location: Podcast — strain specificity segment
  quote: A good analogy here is breeds of dog — all dogs are canids, they all have
    certain traits in common, but there are differences. There was a study in 2010
    — 90 strains of Lactobacillus fermentum exposed to stomach acid and bile — only
    4% could tolerate those things. Lactobacillus reuteri DSM-17938 — SIBO developed
    in 56% of placebo group versus 6% in probiotic group. A Lancet study with 60 billion
    CFU four strains for antibiotic-associated diarrhoea — did not work.
rationale: Lets coach refuse "any probiotic will do" approach and choose strains by
  published evidence per indication.
