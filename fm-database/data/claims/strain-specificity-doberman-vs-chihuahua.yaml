slug: strain-specificity-doberman-vs-chihuahua
statement: Probiotic strain specificity is NOT marketing — different strains within
  the same species behave as differently as a Doberman and a Chihuahua. A 1970s study
  found only 4% of 90 strains of Lactobacillus fermentum survived stomach acid + bile
  passage. Lactobacillus reuteri DSM-17938 (Biogaia) at 100-200 million CFU prevents
  SIBO in 94% of clients starting PPIs (vs 44% on placebo); a 60-billion-CFU four-strain
  blend in a 1,000+ patient Lancet trial showed NO benefit for antibiotic-associated
  diarrhoea. Coach implication — ask "which strain" and "what dose" before recommending
  any probiotic; pick by published evidence for the specific condition (ProbioticAdvisor.com
  is the curated database Hawrelak runs).
evidence_tier: plausible_emerging
