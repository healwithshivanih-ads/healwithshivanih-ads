slug: mayo-migraine-preventive-medication-classes
statement: Preventive medication options for frequent or disabling migraine include
  beta blockers (propranolol, metoprolol), tricyclic antidepressants (amitriptyline),
  antiseizure drugs (topiramate, valproate), Botox injections every 12 weeks, and
  CGRP monoclonal antibodies (erenumab, fremanezumab, galcanezumab, eptinezumab).
