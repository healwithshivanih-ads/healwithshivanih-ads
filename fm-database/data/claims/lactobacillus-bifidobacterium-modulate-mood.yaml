slug: lactobacillus-bifidobacterium-modulate-mood
statement: Specific probiotic strains, particularly Lactobacillus and Bifidobacterium
  species, are effective at modulating mood and stress levels via the gut-brain axis.
evidence_tier: plausible_emerging
rationale: Psychobiotic trials using L. rhamnosus, L. helveticus R0052 + B. longum
  R0175 (and similar combinations) show mood and stress biomarker improvements in
  RCTs. Evidence is promising but strain-specific and not yet mainstream clinical
  consensus.
caveats:
- Strain specificity is critical — general probiotic supplements may not replicate
  trial results.
- Effect sizes are modest.
