slug: melatonin-improves-ivf-egg-quality
statement: Melatonin 3 mg at bedtime, started from the beginning of an IVF stimulation
  cycle, has been shown in multiple trials (Tamura et al, Italian studies) to roughly
  double the proportion of mature eggs giving rise to good-quality embryos and nearly
  double clinical pregnancy rates in women with previous failed IVF and low fertilisation
  rates. Mechanism is via potent antioxidant and free-radical-scavenging activity
  in follicular fluid.
evidence_tier: strong
