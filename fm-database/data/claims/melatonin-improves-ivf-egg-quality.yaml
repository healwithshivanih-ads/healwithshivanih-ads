  location: Chapter 7 — Melatonin and Other Antioxidants, pg 102-104
  quote: After treatment with melatonin, there was a dramatic improvement, with an
    average of 65 percent of their eggs giving rise to good-quality embryos, compared
    to just 27 percent in the previous cycle.
rationale: Strongest evidence for any single antioxidant supplement in IVF prep.
