slug: elevated-unconjugated-bilirubin-signals-phase-2-glucuronidation-defect
statement: Mildly elevated unconjugated (indirect) bilirubin with a borderline conjugated
  fraction signals impaired Phase 2 glucuronidation, which may be due to a genetic
  variant such as Gilbert syndrome.
evidence_tier: plausible_emerging
rationale: The physiological basis (UGT1A1 enzyme conjugating bilirubin with glucuronic
  acid) is well established. Using fractionated bilirubin as an indirect clinical
  surrogate for Phase 2 capacity is biologically plausible and applied in functional
  medicine, though its routine use as a detox pathway screen lacks large-scale RCT
  validation.
coaching_translation: A slightly high 'indirect' bilirubin on a blood panel can be
  a clue that one of the liver's detox processing steps isn't running at full capacity.
  Worth flagging to a clinician.
out_of_scope_notes: Fractionated bilirubin interpretation and genetic variant diagnosis
  (Gilbert syndrome) must be performed by a clinician.
caveats:
- Source is expert lecture; not primary peer-reviewed literature.
- Gilbert syndrome is benign but has implications for drug metabolism and detox capacity.
