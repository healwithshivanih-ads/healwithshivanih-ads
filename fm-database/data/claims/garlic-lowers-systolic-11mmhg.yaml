slug: garlic-lowers-systolic-11mmhg
statement: Dried garlic powder standardised to 1.3% alliin at 600–900 mg/day can lower
  systolic BP by 11 mm Hg and diastolic BP by 5 mm Hg over 1–3 months.
evidence_tier: plausible_emerging
rationale: Based on meta-analysis conclusions cited in the text; multiple trials support
  garlic's modest antihypertensive effect.
coaching_translation: Daily garlic — whether fresh or as a standardised supplement
  — provides a meaningful blood pressure reduction over a few months.
