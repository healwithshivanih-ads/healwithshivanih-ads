slug: vitamin-d3-bmi-over-30-deficiency-dosing
statement: Adults with a BMI over 30 require approximately double the standard vitamin D dose — 6,000–10,000 IU/day for deficiency
  correction and 3,000–6,000 IU/day for maintenance — due to sequestration of vitamin D in adipose tissue.
evidence_tier: confirm_with_clinician
rationale: Vitamin D is fat-soluble and is sequestered in adipose tissue at higher BMI, reducing bioavailability. The document
  specifically recommends double dosing for BMI >30. Clinical oversight is essential at these doses.
coaching_translation: People with more body fat may need a higher vitamin D dose because the vitamin gets stored in fat tissue
  and is less available to the body. Your doctor can assess your levels and adjust your dose accordingly.
out_of_scope_notes: Dosing adjustment based on BMI requires clinician supervision and blood level monitoring.
caveats:
- Source is expert lecture/consensus. Doses cited are above many standard guidelines and require clinician oversight.
- Vitamin D toxicity risk increases at sustained doses above 10,000 IU/day without monitoring.
