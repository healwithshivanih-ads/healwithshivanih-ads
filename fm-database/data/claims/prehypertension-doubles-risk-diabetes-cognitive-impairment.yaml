slug: prehypertension-doubles-risk-diabetes-cognitive-impairment
statement: Prehypertension (120–139/80–89 mm Hg) is linked not only to greater risk
  of developing hypertension and cardiovascular disease, but also to diabetes and
  cognitive impairment.
evidence_tier: strong
rationale: Stated as an established epidemiological association from a major clinical
  handbook grounded in population data.
coaching_translation: Even borderline-high blood pressure is a meaningful signal to
  act — it raises the risk of several serious chronic conditions beyond cardiovascular
  disease.
