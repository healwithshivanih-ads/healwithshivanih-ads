  location: Chapter 50 — Eczema, pg 925–926
  quote: Several studies have shown glycyrrhetinic acid to exert an effect similar
    to that of topical hydrocortisone in the treatment of eczema, contact and allergic
    dermatitis, and psoriasis. In another study, 93% of the patients with eczema who
    applied glycyrrhetinic acid demonstrated improvement compared with 83% using cortisone.
