slug: low-testosterone-independently-associated-with-diabetes
statement: Low testosterone is independently associated with insulin resistance, diabetes,
  and metabolic dysfunction in men.
evidence_tier: plausible_emerging
rationale: The document references a 2004 study showing men with high HbA1c have low
  testosterone, supporting a bidirectional relationship between testosterone and metabolic
  health. This association is recognized in endocrinology literature.
coaching_translation: Low testosterone and poor blood sugar control often go hand
  in hand in men. Supporting both through lifestyle can create a positive cycle—better
  metabolism supports hormone balance, and vice versa.
caveats:
- Bidirectionality of the testosterone-insulin resistance relationship means lifestyle
  interventions may benefit both simultaneously.
- Source is expert lecture (moderate quality).
