slug: iodine-essential-for-thyroid-hormone-synthesis
statement: Iodine is an essential raw material for thyroid hormone (T4 and T3) production.
evidence_tier: strong
rationale: Iodine is a structurally required component of T4 (4 iodine atoms) and
  T3 (3 iodine atoms). Iodine deficiency as a cause of hypothyroidism and goiter is
  one of the most well-established facts in endocrinology.
coaching_translation: Your thyroid literally needs iodine as a building block to make
  thyroid hormone. Include iodine-rich foods like seaweed, eggs, and dairy in your
  diet.
