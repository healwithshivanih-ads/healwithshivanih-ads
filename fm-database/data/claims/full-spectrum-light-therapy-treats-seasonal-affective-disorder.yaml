slug: full-spectrum-light-therapy-treats-seasonal-affective-disorder
statement: Full-spectrum bright light therapy (typically 10,000 lux, 20-30 min morning
  exposure) is a first-line treatment for seasonal affective disorder (SAD), normalising
  melatonin/serotonin balance and circadian phase.
evidence_tier: strong
rationale: Decades of RCT and meta-analytic evidence support bright light for SAD;
  Pizzorno's review reflects this. Mechanism via retinal-suprachiasmatic-pineal pathway,
  advancing melatonin phase and boosting serotonergic tone.
coaching_translation: For winter depression (SAD), 20-30 minutes of bright light first
  thing in the morning works as well as antidepressants for most people. Pair with
  vitamin D and outdoor time when sun is available.
caveats:
- 10,000 lux, ideally first thing in the morning, eyes open but not staring directly.
- Combine with vitamin D and 5-HTP for additive effect (Pizzorno's framework).
- Caution in bipolar — light therapy can precipitate hypomania.
