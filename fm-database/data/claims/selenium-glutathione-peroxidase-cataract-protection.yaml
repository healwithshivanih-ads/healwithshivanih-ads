slug: selenium-glutathione-peroxidase-cataract-protection
statement: Selenium is required by lens glutathione peroxidase, the enzyme that breaks
  down hydrogen peroxide (found at up to 25× normal levels in cataract aqueous humor).
  Serum and aqueous humor selenium are significantly lower in cataract patients; lens
  content is only ~15% of normal. Supplementation at 100–200 mcg per day with vitamin
  E (mixed tocopherols 100–200 IU) is the synergistic pairing — vitamin E alone does
  not slow cataract progression.
evidence_tier: plausible_emerging
