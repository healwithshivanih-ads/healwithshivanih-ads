sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 33 — Cataracts, pg 630-631
  quote: Selenium levels in the serum and aqueous humor were found to be significantly
    lower in patients with cataracts than in normal controls... Because selenium-dependent
    glutathione peroxidase is responsible for the breakdown of hydrogen peroxide,
    it is quite obvious why low selenium levels appear to be a major factor in the
    development of cataracts. In order for vitamin E to function in protecting the
    lens against free radical damage, it requires selenium, and vice versa.
rationale: Never recommend vitamin E for cataract without companion selenium — the
  pair is functionally inseparable in the lens. Watch for selenium-rich food sources
  (Brazil nuts) in any FM eye plan.
