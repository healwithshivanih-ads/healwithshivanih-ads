slug: fall-foods-favour-reduce-vata-diet
statement: Autumn foods to favour include root vegetables, cooked cold-weather greens, warming spices
  (cinnamon, ginger, cumin, fennel), warm spiced milks, nuts and seeds, rich oils (coconut, sesame, ghee),
  moist grains (oats, brown rice, wheat cooked with extra water), and sweet or heavy fruits; foods to
  reduce include dry foods (chips, crackers), caffeine, carbonated drinks, large beans, and raw foods.
evidence_tier: fm_specific_thin
rationale: Vata's dry, rough, mobile qualities are countered by moist, oily, warm, and grounding foods.
  Raw foods and dry grains aggravate vata's already drying tendency; cooked, unctuous preparations calm
  and stabilise the nervous system and bowels.
coaching_translation: As autumn arrives, move away from raw salads and dry snacks toward warm soups, root
  vegetables, oats with ghee, and cooked fruits. This is especially important for clients with anxiety,
  bloating, or constipation tendencies.
out_of_scope_notes: ''
caveats:
- Individual constitution and digestive capacity should guide application. Raw-food avoidance is traditional;
  some clients tolerate raw salads well year-round.
