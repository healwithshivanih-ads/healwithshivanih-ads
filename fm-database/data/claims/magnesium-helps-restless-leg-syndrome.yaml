slug: magnesium-helps-restless-leg-syndrome
statement: Magnesium supplementation can help relieve restless leg syndrome by reducing
  excessive calcium-driven contractility in calf muscles.
evidence_tier: plausible_emerging
rationale: Small clinical studies and case series support magnesium supplementation
  for RLS; the mechanistic explanation (calcium-mediated hypercontractility) is plausible,
  though large RCTs are lacking.
caveats:
- Evidence base for magnesium and RLS is from small studies; rule out iron deficiency
  and neurological causes before attributing solely to magnesium.
coaching_translation: If you experience the urge to move your legs at night, low magnesium
  could be a contributing factor worth addressing.
