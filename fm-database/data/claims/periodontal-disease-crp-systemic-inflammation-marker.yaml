slug: periodontal-disease-crp-systemic-inflammation-marker
statement: Periodontal disease elevates C-reactive protein and is an independent risk
  factor for cardiovascular disease. The collagen matrix of the periodontium turns
  over constantly and is vulnerable when cofactors are missing — protein, zinc, copper,
  vitamins C, B6, and A. Smoking compounds the damage via free radicals and by depleting
  vitamin C. Faulty dental work (overhanging fillings, amalgam mercury release) is
  a common local driver.
evidence_tier: strong
