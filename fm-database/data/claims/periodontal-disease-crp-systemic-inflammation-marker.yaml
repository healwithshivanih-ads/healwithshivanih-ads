sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Periodontal Disease chapter, p 1386-1390
  quote: Periodontal disease is associated with an elevation in C-reactive protein
    — an important marker for systemic inflammation and an independent risk factor
    for heart disease. Tobacco smoking is associated with increased susceptibility
    to severe periodontal disease and tooth loss. Smoking greatly reduces vitamin
    C levels.
