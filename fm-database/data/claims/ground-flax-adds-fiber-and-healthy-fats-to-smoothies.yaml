slug: ground-flax-adds-fiber-and-healthy-fats-to-smoothies
statement: Adding 1–2 tablespoons of ground flax seeds to smoothies contributes fibre,
  omega-3 fatty acids, and lignans supportive of cardiometabolic health.
evidence_tier: plausible_emerging
rationale: Flaxseed is well-supported for LDL reduction, blood pressure lowering,
  and anti-inflammatory effects (ALA, lignans). Ground form improves bioavailability.
  Daily dose of 1–2 tbsp is within the range studied.
coaching_translation: Tossing ground flax in your daily smoothie is an easy way to
  boost heart-healthy fibre and plant-based omega-3s.
caveats:
- Individual response to flaxseed varies; high doses may affect hormone metabolism
  due to lignans (consult clinician for hormone-sensitive conditions).
