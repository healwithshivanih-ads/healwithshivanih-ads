slug: trf-easier-to-maintain-than-adf
statement: Time Restricted Feeding (TRF) may be easier to maintain long-term compared
  to Alternate Day Fasting (ADF).
evidence_tier: plausible_emerging
rationale: Stated in document with reference to supporting studies. Adherence data
  support TRF's simplicity and compatibility with social eating patterns.
coaching_translation: If your client is new to fasting, a daily eating window (TRF)
  may be easier to stick to than fasting every other day.
caveats:
- Individual adherence varies significantly
- Source is a practitioner toolkit, not primary study
- Comparative adherence research is limited; individual preferences vary significantly.
