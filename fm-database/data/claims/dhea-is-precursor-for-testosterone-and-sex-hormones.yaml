slug: dhea-is-precursor-for-testosterone-and-sex-hormones
statement: DHEA-S (dehydroepiandrosterone sulfate) is a key precursor for testosterone
  and estrogens; low DHEA-S indicates upstream precursor deficiency and should be
  corrected before attempting to replace downstream hormones like testosterone or
  estrogen.
evidence_tier: strong
rationale: DHEA's role as a precursor in the steroidogenesis pathway is well-established
  biochemistry. The clinical principle of correcting upstream deficiencies before
  downstream replacement is standard functional medicine practice.
coaching_translation: Think of DHEA like a raw ingredient in a recipe — if it's low,
  no amount of adding the final product will fix the root problem. Lab testing DHEA-S
  is an important first step.
out_of_scope_notes: DHEA supplementation dosing and indication require clinician oversight.
caveats:
- Source is expert consensus lecture; verify specific clinical protocols with primary
  literature.
