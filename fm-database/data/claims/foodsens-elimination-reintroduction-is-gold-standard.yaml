slug: foodsens-elimination-reintroduction-is-gold-standard
statement: The elimination-and-reintroduction food plan remains the gold standard
  for identifying food sensitivities — this has not changed. Common allergens (dairy,
  gluten, eggs, soy, sugar, coffee and others) are removed for roughly three to six
  weeks, then reintroduced one at a time. The lived reintroduction response, not a
  lab report, reveals what a person actually reacts to.
evidence_tier: strong
rationale: It is inexpensive, accessible and actionable, and it lets the body act
  as its own biofeedback device — which builds far more buy-in and self-efficacy than
  any test result.
coaching_translation: Coach the client through a structured elimination, then a slow
  one-food-at-a-time reintroduction, tracking symptoms each step. Frame it as an experiment
  they run on their own body, not a verdict.
out_of_scope_notes: The clinician decides scope of elimination and any medical supervision;
  the coach supports adherence, menu planning and symptom tracking.
caveats:
- Sensitivities are not identified by allergy skin-prick or IgE testing — elimination-reintroduction
  is specifically for delayed sensitivities.
