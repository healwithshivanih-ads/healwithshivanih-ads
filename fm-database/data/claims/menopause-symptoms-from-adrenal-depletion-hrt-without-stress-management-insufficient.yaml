slug: menopause-symptoms-from-adrenal-depletion-hrt-without-stress-management-insufficient
statement: When chronic stress has chronically elevated cortisol, adrenal glands may be too depleted by
  menopause to produce sufficient postmenopausal sex hormones, causing difficult menopausal symptoms;
  adding hormone replacement without addressing stress is like 'pouring water into a bucket with a hole'.
evidence_tier: plausible_emerging
rationale: Consistent with the cortisol-steal (pregnenolone diversion) model and HPA-adrenal axis fatigue
  framework central to FM; clinically plausible though the exact mechanism of adrenal exhaustion is debated.
coaching_translation: If you've run on high stress for 20+ years, your adrenal glands may be too fatigued
  to pick up hormone production after menopause. Simply adding hormones without fixing the stress that
  depleted them in the first place is a temporary patch — not a solution.
out_of_scope_notes: ''
caveats:
- '''Adrenal exhaustion'' is a clinical model widely used in integrative medicine but not firmly established
  in conventional physiology literature; cortisol-steal is a teaching model debated as an oversimplification.'
