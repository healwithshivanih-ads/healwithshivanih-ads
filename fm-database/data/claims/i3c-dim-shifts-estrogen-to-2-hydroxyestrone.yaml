sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 28 — Breast Cancer (Prevention), pg 573-574
  quote: The body can break down estrogen into either 16-alpha-hydroxyestrone, a compound
    that promotes the growth of breast tumors; or 2-hydroxyestrone, which does not
    stimulate breast cancer cells. Adding 500 g per day of broccoli to the diet or
    taking IC3 (400 mg per day) or DIM (a daily dose of 2 mg/kg) improves the ratio
    of good to bad estrogen breakdown products.
rationale: Food-first wherever possible — daily 1-cup cooked cruciferous serving plus
  broccoli sprouts is the safe baseline. Reserve supplemental I3C/DIM for high-risk
  clients (BRCA carriers, prior fibrocystic changes, perimenopause with estrogen dominance
  pattern).
