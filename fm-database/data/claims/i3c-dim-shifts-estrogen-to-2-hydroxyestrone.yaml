slug: i3c-dim-shifts-estrogen-to-2-hydroxyestrone
statement: Indole-3-carbinol (I3C) and its stomach metabolite diindolylmethane (DIM),
  formed when cruciferous vegetables are crushed or chewed, accelerate the breakdown
  of estrogen via the cytochrome P450 pathway and shift the ratio away from the proliferative
  16-alpha-hydroxyestrone toward the safer 2-hydroxyestrone. Adding 500 g per day
  of broccoli, or taking I3C 400 mg per day or DIM 2 mg/kg per day, improves urinary
  estrogen-metabolite ratios. Broccoli sprouts are the most concentrated source (1
  lb sprouts ≈ 40 lb mature broccoli).
