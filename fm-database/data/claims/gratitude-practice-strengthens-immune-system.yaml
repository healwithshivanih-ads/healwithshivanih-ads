slug: gratitude-practice-strengthens-immune-system
statement: Regular gratitude practice is associated with stronger immune system function.
evidence_tier: plausible_emerging
rationale: 'Plausible via HPA axis: chronic stress suppresses immune function through
  cortisol; gratitude practices that reduce stress and activate parasympathetic tone
  may reduce cortisol-mediated immune suppression. Direct RCT evidence is thin.'
coaching_translation: Regularly appreciating what's good in your life may help keep
  your immune system stronger by reducing the wear-and-tear that chronic stress causes.
caveats:
- Source does not cite primary immunology studies. Mechanism is inferential; direct
  immune outcome RCTs for gratitude journaling are limited.
- Source is an educational toolkit (fm_specific context).
