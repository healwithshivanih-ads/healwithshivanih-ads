slug: dtchorm-high-fsh-normal-in-menopause
statement: FSH is the brain hormone that signals the ovaries to ovulate; as eggs and
  follicles decline, FSH rises while estradiol falls. A high FSH in a menopausal woman
  is expected and normal, not a sign of disease. FSH is highly unreliable during the
  one-to-two years of perimenopause, so a single elevated value does not confirm menopause
  and does not mean the transition is complete.
evidence_tier: strong
rationale: Clients frequently panic over a DTC FSH flagged "abnormal" — sometimes
  it simply reflects normal menopause, or was drawn too early in perimenopause to
  mean anything.
coaching_translation: If a menopausal client is alarmed by a high FSH, reassure her
  that FSH is supposed to be high after menopause. If she is perimenopausal, explain
  FSH is unreliable in that window. Then route her to her clinician — you calm the
  fear, you do not interpret the number.
out_of_scope_notes: Confirming menopausal status and interpreting FSH belong to the
  clinician.
caveats:
- A single perimenopausal FSH can be misleading in both directions — cycles can return
  even after months without a period.
