slug: whole-food-diet-deescalation-first-thyroid
statement: In cellular hypothyroidism, the highest-yield first intervention is shifting
  from a standard processed diet to any whole-food diet — agnostic of which "food
  religion" (paleo, Mediterranean, plant-forward, etc.). Typical clinical observation
  — bloating improves, energy stabilises, and other symptoms begin shifting within
  about three weeks, often before any supplement is introduced.
evidence_tier: strong
