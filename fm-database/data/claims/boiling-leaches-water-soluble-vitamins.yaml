slug: boiling-leaches-water-soluble-vitamins
statement: Boiling causes significant loss of water-soluble vitamins and minerals
  into the cooking liquid; these nutrients are largely lost if the liquid is discarded.
evidence_tier: strong
rationale: Established nutritional chemistry; water-soluble vitamins (B vitamins,
  C) readily leach into boiling water. Consistent with major nutrition education resources.
coaching_translation: Boiling vegetables can cause you to pour most of their vitamins
  down the drain. Opt for steaming or blanching when possible, or use the cooking
  water in soups.
