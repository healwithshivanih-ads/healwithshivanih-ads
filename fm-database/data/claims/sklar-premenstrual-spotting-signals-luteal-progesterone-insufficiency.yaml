slug: sklar-premenstrual-spotting-signals-luteal-progesterone-insufficiency
statement: Brown premenstrual spotting two to three days before the period — together
  with a short luteal phase (under 10 days from ovulation to bleed) — is a common
  cycle signature of inadequate progesterone support that a single day-21 progesterone
  blood draw will often miss; the timing and pattern matter more than one snapshot
  value.
