slug: lp-a-independent-genetic-cvd-risk-factor
statement: Lp(a) is a small, dense, highly inflammatory lipoprotein whose levels are
  strongly influenced by genetics and which is an independent risk factor for heart
  disease.
evidence_tier: strong
rationale: Lp(a) as an independent, largely genetically determined CVD risk factor
  is supported by Mendelian randomisation studies and established in ESC/ACC guidelines
  as a screening consideration.
coaching_translation: Lp(a) is a special type of cholesterol particle that is mostly
  determined by your genes. High levels raise your heart disease risk regardless of
  your lifestyle, which is why it's important to know your number.
out_of_scope_notes: Lp(a) testing and management strategies (e.g., emerging drugs
  like inclisiran or PCSK9 inhibitors) are clinician scope.
caveats:
- Lp(a) values not reported for this specific patient; presented as a general CVD
  risk marker in the document.
