slug: whole-foods-supply-micronutrients-supporting-insulin-sensitivity
statement: Whole carbohydrate foods supply micronutrients (magnesium, chromium, B-vitamins)
  and polyphenols that support insulin sensitivity.
evidence_tier: plausible_emerging
rationale: 'Credible mechanistic basis: magnesium and chromium are cofactors for insulin
  receptor signalling; polyphenols inhibit alpha-glucosidase. Observational and some
  RCT support exists but not fully consensus-level.'
coaching_translation: Choosing whole grains, legumes, and vegetables over refined
  carbs provides nutrients your body needs to respond to insulin properly.
