slug: histamine-increases-with-food-age
statement: Histamine content in foods increases with age, ripening, storage, and fermentation;
  freshly prepared foods have lower histamine loads.
evidence_tier: strong
rationale: Maintz & Novak 2007 AJCN (cited) and Comas-Basté 2020 Biomolecules (cited)
  confirm time- and temperature-dependent histamine accumulation in protein-rich foods.
coaching_translation: To keep histamine low, eat freshly cooked meals, avoid leftovers,
  and refrigerate or freeze food immediately rather than leaving it at room temperature.
