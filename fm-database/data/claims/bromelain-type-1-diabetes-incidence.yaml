slug: bromelain-type-1-diabetes-incidence
statement: Bromelain has been examined in relation to type 1 diabetes incidence in
  a single very small study; no conclusion can be drawn.
evidence_tier: confirm_with_clinician
rationale: Examine.com lists one 20-participant study touching on type 1 diabetes
  incidence; an overall evidence grade is not established. A sample this small cannot
  support any claim of benefit, and type 1 diabetes is a clinical autoimmune disease.
coaching_translation: Not actionable. Bromelain has no established role in type 1
  diabetes and this must never be presented to a client as a benefit.
caveats:
- Single 20-participant study; no evidence grade; far too small for any conclusion.
linked_to_topics:
