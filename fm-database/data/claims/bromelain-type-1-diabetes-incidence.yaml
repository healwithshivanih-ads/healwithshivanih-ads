linked_to_mechanisms: []
linked_to_supplements:
- bromelain
out_of_scope_notes: Type 1 diabetes is a clinical autoimmune condition outside health-coaching
  scope. Bromelain is not a recognised intervention for it. All diabetes management
  and monitoring must stay with the client's physician.
