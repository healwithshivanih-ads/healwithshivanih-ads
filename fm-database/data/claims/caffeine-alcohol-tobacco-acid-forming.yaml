slug: caffeine-alcohol-tobacco-acid-forming
statement: Caffeine, alcohol, and tobacco all create an acid-forming environment in
  the body.
evidence_tier: plausible_emerging
rationale: There is plausible mechanistic support for caffeine and alcohol contributing
  to net acid load (PRAL research). Tobacco's contribution to an acidic internal environment
  has some biological basis via oxidative stress. However, this is an expert-level
  generalisation rather than direct RCT evidence for each substance.
coaching_translation: Coffee, alcohol, and tobacco all push your body chemistry in
  the acid direction, adding to the burden your body has to neutralise.
caveats:
- Source is an expert lecture.
- Tobacco and alcohol are not foods; their acid-forming categorisation here is used
  pedagogically.
- Mechanistic plausibility is reasonable but direct clinical evidence in the acid-alkaline
  framework is limited.
