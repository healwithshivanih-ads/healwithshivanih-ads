slug: selenium-required-for-gpx-h2o2-clearance
statement: Selenium is an essential trace mineral cofactor for glutathione peroxidase
  (GPX); without adequate selenium, GPX cannot convert hydrogen peroxide to water,
  allowing H2O2 to accumulate and cause oxidative damage.
evidence_tier: strong
rationale: All mammalian GPX isoforms are selenoproteins—the selenium requirement
  is unambiguously established in biochemistry and nutritional science.
coaching_translation: 'Encourage selenium-containing foods daily: 1–2 Brazil nuts,
  tuna, halibut, sardines, beef, eggs. Many people are selenium-deficient, which undermines
  their ability to neutralise oxidative stress.'
