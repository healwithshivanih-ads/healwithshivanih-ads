slug: b-vitamins-support-phase-i-detox-enzymes
statement: B vitamins (riboflavin/B2, niacin/B3, pyridoxine/B6, folic acid, B12) are
  essential nutrients for Phase I cytochrome P450 detoxification enzyme function.
evidence_tier: strong
rationale: B vitamins serve as cofactors for cytochrome P450 and related enzymatic
  reactions in Phase I hepatic biotransformation. This is well-established in biochemistry
  and nutritional science literature.
coaching_translation: B vitamins are fuel for your liver's detox engines. Making sure
  you get enough through food and supplementation keeps Phase I detox running smoothly.
