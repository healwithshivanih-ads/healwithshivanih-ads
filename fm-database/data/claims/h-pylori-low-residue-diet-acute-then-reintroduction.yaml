slug: h-pylori-low-residue-diet-acute-then-reintroduction
statement: H. pylori acute-phase nutrition is a low-residue easily-digestible pattern
  — white rice / white bread / lean white meats / peeled-cooked fruits (apples, pears,
  bananas, papaya) / fermented foods (yogurt, kefir) — strictly avoiding gastric stimulants
  (caffeine, alcohol, carbonated drinks, spicy foods, citrus, fatty fried foods).
  Recovery phase gradually reintroduces whole grains, legumes, raw salads, and nuts
  as inflammation resolves.
evidence_tier: plausible_emerging
rationale: Clinical pattern matching low-residue principles used for any inflamed-gut
  condition (active IBD, post-surgery, gastritis). Mechanism — reduces mechanical
  irritation and acid stimulation while inflammation persists. Notebook source emphasises
  evidence-based clinical recommendations.
coaching_translation: During active H. pylori treatment, eat soft / cooked / low-fibre
  foods that don't poke the inflamed stomach. White rice over brown, peeled cooked
  fruit over raw salad, white fish over fatty meat, yogurt over coffee. Once you feel
  better, reintroduce whole grains, beans, raw vegetables, and nuts gradually.
caveats:
- Acute phase = 2-4 weeks during active treatment.
- Yogurt/kefir specifically helps with antibiotic-associated diarrhea.
- Hydration — 2-2.5 L water, between meals, not with meals.
- Smaller, more frequent meals reduce gastric distension.
