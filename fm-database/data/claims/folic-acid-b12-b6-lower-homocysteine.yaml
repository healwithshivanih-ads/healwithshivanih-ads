slug: folic-acid-b12-b6-lower-homocysteine
statement: Folic acid (400 mcg/day) combined with vitamins B12 and B6 is required
  to effectively lower elevated homocysteine; folic acid alone will only lower homocysteine
  in the presence of adequate B12 and B6.
evidence_tier: strong
rationale: Mechanistically established (one-carbon metabolism); multiple RCTs confirm
  homocysteine lowering with B-vitamin combination therapy.
coaching_translation: To lower homocysteine, you need all three B vitamins — folate
  alone isn't enough. Always pair it with B12 and B6.
