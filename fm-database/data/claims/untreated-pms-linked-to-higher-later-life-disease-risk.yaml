slug: untreated-pms-linked-to-higher-later-life-disease-risk
statement: Untreated PMS during the reproductive years is associated with higher post-menopausal
  rates of heart disease, diabetes, cancer, and dementia.
evidence_tier: plausible_emerging
rationale: The speaker links PMS-related progesterone deficiency, ovulation irregularity,
  inflammation, and micronutrient deficiency to later-life inflammatory disease, citing
  a 2015 'BioCycle' study.
coaching_translation: Taking PMS seriously now (root-cause support, not just masking)
  may protect long-term health — a strong motivator for cycle-care habits.
caveats:
- Speaker's attribution to the BioCycle study should be verified against primary literature;
  the causal 'doubling' framing is not established consensus.
out_of_scope_notes: Disease-risk prognostication is clinician territory; coaches use
  this only as motivation for lifestyle change.
