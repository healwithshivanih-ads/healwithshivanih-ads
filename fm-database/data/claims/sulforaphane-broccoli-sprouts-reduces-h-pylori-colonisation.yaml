slug: sulforaphane-broccoli-sprouts-reduces-h-pylori-colonisation
statement: Broccoli sprouts (70 g/day containing 420 µmol sulforaphane precursor)
  taken for 8 weeks significantly decreased urease activity and H. pylori stool antigen
  levels, as well as serum pepsinogens I and II.
evidence_tier: plausible_emerging
rationale: Specific clinical trial data cited (Fahey et al. and related work); sulforaphane's
  antibacterial mechanism against H. pylori is well characterised at the molecular
  level, with emerging clinical trial support.
coaching_translation: Eating a portion of broccoli sprouts daily for two months may
  help reduce H. pylori activity in your stomach and lower inflammation markers.
caveats:
- Larger replication trials are needed; broccoli sprout potency varies considerably
  by preparation.
