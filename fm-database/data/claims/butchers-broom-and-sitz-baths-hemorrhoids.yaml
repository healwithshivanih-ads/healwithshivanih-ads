slug: butchers-broom-and-sitz-baths-hemorrhoids
statement: Butcher's broom (Ruscus aculeatus) extract standardized to 9 to 11% ruscogenin,
  dosed 100 mg three times per day, enhances venous integrity in the rectal cushions;
  one multicenter trial in 124 patients showed 69% good-to-excellent response within
  seven days. Warm sitz baths at 100 to 105 degF provide noninvasive symptomatic relief
  for uncomplicated hemorrhoids.
evidence_tier: plausible_emerging
linked_to_topics:
- hemorrhoids
sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 60 — Hemorrhoids, pg 1027-1029
  quote: In one multicenter study of 124 patients with hemorrhoids, 69% of the patients
    and 75% of the treating physicians rated a formula containing butcher's broom
    extract as having good or excellent efficacy.
