slug: rosacea-trigger-avoidance
statement: First-line rosacea coaching — eliminate flush triggers — hot beverages,
  alcohol, spicy foods, refined sugars, trans fats (margarine, shortening, fried foods),
  milk and milk products, plus avoid extreme heat/cold, excessive sun, and hot baths/showers.
  CAUTION — high-dose B-complex (especially riboflavin, B6, B12) can AGGRAVATE rosacea
  in a subset of patients (documented case reports) — start low and watch for paradoxical
  flare.
evidence_tier: plausible_emerging
