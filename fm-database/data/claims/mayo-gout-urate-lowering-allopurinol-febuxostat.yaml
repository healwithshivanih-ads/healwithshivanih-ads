slug: mayo-gout-urate-lowering-allopurinol-febuxostat
statement: Long-term prevention requires lowering serum uric acid below 6 mg/dL —
  typically with allopurinol or febuxostat (xanthine oxidase inhibitors) — started
  low-dose and titrated up; preventive colchicine or low-dose NSAID is layered in
  for the first 3 to 6 months to prevent flares during titration.
