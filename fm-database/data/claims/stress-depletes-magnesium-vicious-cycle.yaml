  location: Vicious cycle of magnesium deficiency
  quote: Magnesium deficiency is making us more vulnerable to stress because magnesium is responsible for the production of
    certain receptors which give a calming effect like the GABA receptors. Stress again has a diuretic effect on the body
    which further decreases the magnesium inside the body.
