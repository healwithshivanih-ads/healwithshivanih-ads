slug: stress-depletes-magnesium-vicious-cycle
statement: Chronic stress depletes magnesium via diuresis, and magnesium deficiency in turn increases stress vulnerability
  by impairing GABA receptor function — creating a self-reinforcing vicious cycle.
evidence_tier: plausible_emerging
rationale: Both stress-induced urinary magnesium loss and magnesium's role in GABAergic signalling are mechanistically supported;
  the bidirectional vicious cycle model is coherent but largely described in expert consensus and mechanistic literature rather
  than prospective RCTs.
caveats:
- Source is expert consensus lecture; the specific cycle model should be presented as a plausible working framework, not definitive
  proof.
coaching_translation: Stress drains magnesium, and low magnesium makes you more reactive to stress — it's a cycle that can
  be broken by addressing both.
