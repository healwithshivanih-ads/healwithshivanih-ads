slug: 5-mthf-active-folate-mthfr-support
statement: 5-MTHF is the active form of folate that bypasses the MTHFR enzyme, making
  it the preferred supplemental form for individuals with MTHFR mutations.
evidence_tier: plausible_emerging
rationale: Document recommends 5-MTHF as first-line foundational support for MTHFR-positive
  patients. The rationale is mechanistically sound — 5-MTHF does not require MTHFR
  conversion. No RCT cited.
coaching_translation: 5-MTHF is the form of folate your body can use immediately,
  bypassing the faulty MTHFR enzyme.
out_of_scope_notes: Folate dosing in pregnancy, methylation disorders, and psychiatric
  conditions is clinician scope.
caveats:
- Do not recommend standard folic acid as a substitute
- Dosing requires clinician verification
- Source is FM synthesis
