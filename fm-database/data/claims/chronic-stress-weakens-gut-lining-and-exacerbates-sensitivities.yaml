slug: chronic-stress-weakens-gut-lining-and-exacerbates-sensitivities
statement: Chronic stress elevates cortisol, which weakens the gut lining, lowers
  immune response, and impairs digestive motility — compounding food sensitivity risk.
evidence_tier: plausible_emerging
rationale: The HPA-axis/gut-barrier relationship is a well-supported area of psychoneuroimmunology.
  Speaker correctly identifies cortisol as catabolic and gut-barrier-disrupting. Consensus
  is growing but RCT evidence specifically linking chronic cortisol to food sensitivity
  onset is limited.
coaching_translation: Chronic stress is not just a mental health issue — it directly
  harms the gut lining and weakens digestion, making food sensitivities more likely.
  Stress reduction is a genuine gut health tool.
caveats:
- Single-expert source.
- Direct causal link between cortisol and food sensitivity development requires more
  RCT support.
