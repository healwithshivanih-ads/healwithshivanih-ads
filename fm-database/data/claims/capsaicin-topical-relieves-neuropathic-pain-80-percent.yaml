slug: capsaicin-topical-relieves-neuropathic-pain-80-percent
statement: Topical 0.075% capsaicin cream applied twice daily relieves neuropathic
  pain in 80% of diabetic patients by depleting substance P from small pain nerve
  fibres.
evidence_tier: strong
rationale: Multiple RCTs support topical capsaicin for diabetic neuropathic pain;
  substance P depletion mechanism is well established.
coaching_translation: Capsaicin cream is an effective, low-cost, over-the-counter
  option for burning foot pain in neuropathy — must be applied consistently.
caveats:
- Avoid contact with eyes and mucous membranes; use gloves or plastic wrap.
- Burning sensation on first applications is expected; effect requires regular use.
