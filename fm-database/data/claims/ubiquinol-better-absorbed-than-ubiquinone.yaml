slug: ubiquinol-better-absorbed-than-ubiquinone
statement: Ubiquinol (the reduced active form of CoQ10) is significantly better absorbed
  than the standard ubiquinone form, so 200-300 mg of ubiquinol delivers roughly equivalent
  tissue levels to 600 mg of ubiquinone. Labels should specifically say ubiquinol,
  active antioxidant form, or reduced form; plain CoQ10 is ubiquinone.
evidence_tier: strong
