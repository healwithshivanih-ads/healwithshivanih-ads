  location: Chapter 6 — The Power of Coenzyme Q10, pg 93-95
  quote: More than 95 percent of the CoQ10 in circulation is in this reduced ubiquinol
    form, and that is the form you want to buy because it is more easily absorbed.
rationale: Practical sourcing claim — clients often buy ubiquinone thinking they are
  getting CoQ10.
