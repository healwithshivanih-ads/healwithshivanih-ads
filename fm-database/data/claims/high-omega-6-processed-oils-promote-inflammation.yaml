slug: high-omega-6-processed-oils-promote-inflammation
statement: Heavily processed seed oils high in omega-6 fatty acids (canola, corn,
  soybean, sunflower, safflower, cottonseed, grapeseed) contribute to chronic inflammation
  despite high smoke points.
evidence_tier: plausible_emerging
rationale: The role of excess omega-6 (linoleic acid) in promoting inflammation via
  arachidonic acid pathways is mechanistically plausible; population-level RCT evidence
  on processed oil consumption and CVD outcomes is mixed.
coaching_translation: Just because an oil can withstand high heat doesn't make it
  healthy — many common cooking oils are pro-inflammatory and best avoided or minimized.
caveats:
- Evidence on processed seed oils and CVD risk is not fully settled in RCT literature.
- Some omega-6 fatty acids (e.g., LA) may be cardioprotective in certain contexts.
