slug: menstrual-blood-immune-protective-function
statement: Menstrual blood is rich in immune cells and has antibacterial and antiviral properties; according
  to researcher Margie Profet's theory, monthly menstruation may have evolved to protect the reproductive
  tract from sperm-borne pathogens and other infectious agents.
evidence_tier: plausible_emerging
rationale: Profet's 1993 hypothesis (MacArthur Fellowship recognised) is a plausible evolutionary model,
  though contested; the immune-cell content of menstrual blood is well documented. Useful education framing
  for coaches.
coaching_translation: Your period does more than shed the uterine lining — it may actively cleanse the
  reproductive tract each month. This is one reason some researchers caution against suppressing periods,
  especially if you are sexually active.
out_of_scope_notes: ''
caveats:
- Profet's pathogen-protection hypothesis is speculative and debated; not widely accepted as the primary
  evolutionary driver of menstruation.
