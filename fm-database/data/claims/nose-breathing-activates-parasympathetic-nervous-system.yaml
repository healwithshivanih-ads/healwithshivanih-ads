slug: nose-breathing-activates-parasympathetic-nervous-system
statement: Nasal breathing using the diaphragm activates the parasympathetic nervous
  system (calming), while mouth breathing using the upper chest activates the sympathetic
  nervous system (stress/fight-or-flight).
evidence_tier: strong
rationale: Diaphragmatic breathing and its parasympathetic effects are well-supported
  in respiratory physiology and stress research. Nasal vs mouth breathing effects
  on autonomic tone are documented.
coaching_translation: You can shift your body from stress mode to calm mode simply
  by breathing in and out through your nose using your belly, not your chest. Five
  slow breaths can make a measurable difference.
caveats:
- Source is expert lecture
- Extremes of breathing effects are well-supported but the 'simply tape your mouth
  shut' recommendation warrants clinician review for clients with respiratory conditions
