slug: slow-maoa-avoid-serotonin-precursor-loading
statement: Slow-MAOA types should avoid loading tryptophan, 5-HTP, melatonin and tyrosine,
  which add to the monoamine load a slow MAOA already clears poorly and can worsen
  irritability and insomnia.
evidence_tier: plausible_emerging
rationale: Consistent with slow-MAOA physiology (reduced monoamine breakdown); avoidance
  guidance is sensible and low-risk to teach.
coaching_translation: If mood swings and poor sleep are the pattern, piling on serotonin/dopamine
  precursor supplements usually backfires.
out_of_scope_notes: ''
caveats:
- Source is a consumer trade book (Ben Lynch, Dirty Genes), not primary literature.
