slug: diet-lifestyle-can-offset-mthfr-snp-expression
statement: Diet, lifestyle, and environmental factors can substantially modify the
  functional expression of MTHFR variants — individuals with the same SNP may be entirely
  asymptomatic when dietary and lifestyle support is adequate.
evidence_tier: plausible_emerging
rationale: The Italian population example used by Lynch (high C677T prevalence yet
  low birth defect rates) reflects a real epidemiological observation and is consistent
  with the gene-environment interaction principle that underlies epigenetics. The
  broader claim that 'clean genes protocol' fully overrides genetic risk is extrapolated
  beyond current evidence. Source is a consumer book.
coaching_translation: Having an MTHFR variant is not a life sentence. How you eat,
  sleep, and manage stress has a huge influence on whether that variant actually causes
  problems. Genetics loads the gun; lifestyle pulls the trigger.
caveats:
- Gene-environment interaction evidence is strongest for folate/NTD associations in
  pregnancy; extrapolation to all MTHFR-associated conditions is speculative
- Source is a consumer book
