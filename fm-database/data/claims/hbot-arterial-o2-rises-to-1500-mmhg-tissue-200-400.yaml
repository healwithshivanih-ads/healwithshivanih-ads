sources:
- id: hadanny-efrati-2020-hyperoxic-hypoxic-paradox
  location: Section 4 Hyperoxic Hypoxic Paradox — HBOT physiology
  quote: During HBOT, the arterial O2 tension typically exceeds 1500 mmHg, and levels
    of 200-400 mmHg occur in tissues. In a normal individual at a normal environment
    (20.8 percent oxygen at 1 ATA) the hemoglobin is almost entirely saturated (94-99
    percent). Accordingly, when in a hyperbaric environment, the effect is only in
    the dissolved oxygen — the fraction responsible for the diffusion gradient from
    the capillaries to the mitochondria.
rationale: Anchors the dissolved-oxygen-plasma physics that underlies all of HBOT.
