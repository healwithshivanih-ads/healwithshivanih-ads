slug: hbot-arterial-o2-rises-to-1500-mmhg-tissue-200-400
statement: In clinical HBOT delivering 100 percent oxygen at pressures exceeding 1
  ATA, arterial PO2 typically exceeds 1,500 mmHg while tissue PO2 levels reach 200-400
  mmHg. Because haemoglobin is already 94-99 percent saturated at normal atmospheric
  conditions, the additional therapeutic effect in a hyperbaric environment derives
  entirely from DISSOLVED plasma oxygen — the diffusion-gradient component that drives
  oxygen from capillaries into mitochondria.
evidence_tier: strong
