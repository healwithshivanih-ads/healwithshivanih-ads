slug: briden-zinc-pcos-mechanism-5-alpha-reductase
statement: Zinc reduces androgen excess in PCOS by downregulating the enzyme 5-alpha-reductase,
  which converts testosterone to the more potent dihydrotestosterone (DHT). This action
  directly reduces androgen symptoms — acne, hirsutism (facial hair), and androgenic
  hair loss. Zinc also nourishes ovarian follicles, supports ovulation, and (via collagen
  and tissue support) relieves vaginal dryness in menopause.
evidence_tier: plausible_emerging
rationale: Zinc as a 5-alpha-reductase inhibitor is documented in dermatology literature
  (rationale for zinc in acne). Clinical trials in PCOS hirsutism (8-week trial cited
  by Briden) show benefit. Zinc-androgen pathway is consistent with the Anti-Androgen
  Hirsutism post.
coaching_translation: Zinc 30 mg per day with food can be a useful addition for clients
  with PCOS who have acne or facial hair — the mechanism is direct (it blocks the
  testosterone-to-DHT conversion in the skin and hair follicle). Don't take on empty
  stomach.
