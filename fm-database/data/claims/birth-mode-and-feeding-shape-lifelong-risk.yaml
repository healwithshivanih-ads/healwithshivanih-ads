slug: birth-mode-and-feeding-shape-lifelong-risk
statement: 'Birth mode and infant feeding shape lifelong risk: C-section birth raises
  the risk of type-1 diabetes, celiac, asthma and obesity, while breastfeeding lowers
  infection, celiac, asthma, type-2 diabetes and obesity risk and improves cognition.'
