slug: fibroid-phytoestrogen-fiber-i3c-dim-protective
statement: Switching from the standard American diet (40% fat, 12g fiber/day) to a
  healthier diet (25% fat, 40g fiber) reduced blood estrogen levels by 36% within
  8 to 10 weeks. Phytoestrogens (soy, ground flaxseed) bind estrogen receptors and
  reduce endogenous estrogen effect on fibroid tissue. Brassica-family compounds (I3C,
  DIM, sulforaphane) shift estrogen breakdown toward non-carcinogenic metabolites.
  Recommended intake — 45 to 90 mg soy isoflavones per day and 1 to 2 tbsp ground
  flaxseed per day. Women with fibroids have a 4-fold increased risk of endometrial
  cancer, making this protective dietary pattern especially valuable.
