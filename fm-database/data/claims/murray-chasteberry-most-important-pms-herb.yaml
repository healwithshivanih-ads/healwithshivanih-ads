slug: murray-chasteberry-most-important-pms-herb
statement: Chasteberry (Vitex agnus-castus) is Murray's 'single most important herb'
  in PMS treatment. Standardised extract 20 mg/day for casticin (or 175–225 mg/day
  standardised to 0.5% agnuside) produced 52% PMS symptom reduction vs 24% placebo
  over three cycles (n=170 DB-RCT) — and in a comparative trial against fluoxetine,
  chasteberry was MORE effective for physical symptoms while fluoxetine was more effective
  for psychological ones. One-third of 1,500+ women treated achieved complete symptom
  resolution; another 57% reported significant improvement. Mechanism — chasteberry
  acts on hypothalamus and pituitary to reduce prolactin secretion and normalise the
  estrogen-to-progesterone ratio.
evidence_tier: strong
rationale: 'Multiple DB-RCTs (Schellenberg 2001, Atmaca 2003, Halaska 1998, Loch 2000)
  + two large gynaecological practice surveys totalling 1,500+ women. Mechanism —
  dopaminergic activity at pituitary D2 receptors lowers prolactin (often subclinically
  elevated in PMS); also modulates CRH-ACTH axis. Effect develops over 3 cycles. Coach
  context: when a client says ''my PMS is mostly physical — bloating, breast pain,
  headaches'' chasteberry is the headline pick over SSRIs.'
coaching_translation: 'Chasteberry (vitex) is the single most evidence-backed herb
  for PMS — 175-225 mg/day standardised to 0.5% agnuside, taken in the morning. Effect
  builds over 3 cycles. It works AS WELL as Prozac for physical PMS symptoms (bloating,
  breast pain, headaches) and is preferred when physical symptoms dominate. Mechanism:
  reduces prolactin and balances estrogen-progesterone via the pituitary. Don''t mix
  with hormonal contraceptives — competes with the same dopaminergic receptors.'
caveats:
- Effect takes 3 cycles to fully develop — set expectation
- Take in the morning (works on AM pituitary peak)
- Avoid with oral contraceptives + HRT (dopaminergic conflict)
- Avoid in pregnancy
- Caution + dopamine antagonists / antipsychotics
- Hormone-sensitive cancers — clinician decision
- Hyperprolactinemia from medication (antipsychotics) — clinician scope
