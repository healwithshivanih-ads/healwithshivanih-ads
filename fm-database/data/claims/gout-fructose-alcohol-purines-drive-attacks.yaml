slug: gout-fructose-alcohol-purines-drive-attacks
statement: Gout attacks are triggered by specific dietary patterns — alcohol (especially
  beer and hard liquor), high-purine foods (organ meats, anchovies, sardines, poultry),
  refined carbohydrates, high fructose intake, and overconsumption of calories. Obesity
  is probably the single most important risk factor. Thiazide and loop diuretics also
  raise gout risk and flare rates.
evidence_tier: strong
linked_to_topics:
- gout
sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Gout chapter, p 986
  quote: Several dietary factors are known to lead to the development of gout or trigger
    an attack — alcohol, especially beer and hard liquor; high-purine foods; fats;
    refined carbohydrates, particularly high amounts of fructose; and overconsumption
    of calories. Obesity is probably the most important factor. Thiazide and loop
    diuretics also are associated with a higher risk of incident gout.
