slug: shallow-breathing-causes-tension-and-fatigue
statement: Shallow (thoracic) breathing may contribute to physical tension and fatigue.
evidence_tier: plausible_emerging
rationale: 'Biologically plausible: chest-dominant breathing maintains mild sympathetic
  activation and suboptimal gas exchange, contributing to muscular tension and perceived
  fatigue. Emerging literature supports diaphragmatic breathing as superior for stress
  reduction.'
coaching_translation: When we breathe shallowly—just from the chest—our body stays
  in a mild stress state, which can leave us feeling tense and drained.
caveats:
- No specific study cited; source is an educational toolkit.
- Causal direction not definitively established; tension may cause shallow breathing
  as much as vice versa.
