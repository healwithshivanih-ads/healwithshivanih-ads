slug: shallow-breathing-causes-tension-and-fatigue
statement: Shallow breathing (not using the diaphragm) may lead to increased tension
  and fatigue.
evidence_tier: plausible_emerging
rationale: Consistent with respiratory physiology — thoracic-dominant breathing reduces
  tidal volume and may sustain sympathetic arousal. Broadly accepted in functional
  medicine and mind-body literature.
coaching_translation: If you're breathing shallowly into your chest most of the day,
  it can keep your body in a low-level stress state, leaving you tense and tired.
caveats:
- No specific study cited; source is an educational toolkit.
