- id: sandison-energy-blueprint-podcast-2026
  location: Podcast — sleep tips
  quote: If there is any sign of cognitive decline get a sleep study. Do not wait
    to find out you have sleep apnea in 5 years because each night of sleep deprivation
    and hypoxia is damaging to your brain. It's like a traumatic brain injury each
    night. Make sure that you get that treated. And mouth tape is one of my favorite
    things — treats mild sleep apnea, helps with anxiety, helps with cognition, helps
    with sinuses.
rationale: Concrete referral trigger — when client mentions snoring, daytime sleepiness,
  or any cognitive concern, refer for sleep study; coach does not diagnose but can
  pre-empt the GP visit.
