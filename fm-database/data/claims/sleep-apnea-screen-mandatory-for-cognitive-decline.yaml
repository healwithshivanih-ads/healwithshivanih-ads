statement: Any client showing early signs of cognitive decline should be referred
  for a formal sleep study to rule out obstructive sleep apnoea. Sandison frames each
  night of untreated apnoea-driven hypoxia as "a traumatic brain injury each night,"
  because measurable amyloid accumulation occurs after even a single night of sleep
  deprivation. Mouth tape is an adjunct for mild sleep-disordered breathing — also
  reportedly helpful for anxiety, sinus congestion, and overall cognition.
slug: sleep-apnea-screen-mandatory-for-cognitive-decline
