  quote: In the case of rosemary as a nootropic, there have been several papers showing
    that at the quickest amount of ingestion, whether it's smelling it or tasting
    it, there can be clear improvements in cognitive function.
rationale: Lightweight intervention coach can suggest right away for brain-fog clients
  — no supplement needed.
