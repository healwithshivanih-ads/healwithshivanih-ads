slug: rosemary-fast-acting-nootropic
statement: Rosemary acts as a fast-acting nootropic — cognitive improvement is measurable
  within minutes of smelling or tasting it, well before any sustained digestion-and-absorption
  pathway could account for the effect. The mechanism likely involves olfactory and
  trigeminal pathways direct to brain rather than systemic pharmacokinetics. Coach
  prescription — fresh rosemary in cooking daily, or a rosemary essential-oil diffuser
  at the desk for clients with brain fog. Also basil and trout in the broader cognitive-food
  category.
evidence_tier: plausible_emerging
