slug: vldl-synthesised-from-excess-dietary-carbohydrates
statement: VLDL is synthesised in the liver from excess dietary carbohydrates, and
  is subsequently remodelled into LDL.
evidence_tier: strong
rationale: 'Well-established hepatic lipid metabolism: excess glucose/fructose drives
  de novo lipogenesis with VLDL secretion; VLDL is then converted to LDL via lipolysis.
  Consistent with mainstream biochemistry and nutrition science.'
coaching_translation: Too many carbs — especially sugar and refined carbs — directly
  raise your blood fat (triglycerides) because the liver converts them into fat particles.
