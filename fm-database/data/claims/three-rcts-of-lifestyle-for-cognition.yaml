  quote: They took 25 participants through a nine-month intervention. 84% of them
    improved their cognition. Published in the Journal of Alzheimer's Disease July
    2022, Kat Toups is the lead author. A year later August 2023 I published my trial
    — 23 participants, six-month intervention, 74% of our participants improved. Ornish
    trial, June 7th 2024, 49 participants, 20 weeks, randomized control trial — first
    RCT — comprehensive lifestyle changes may significantly improve cognition.
