slug: three-rcts-of-lifestyle-for-cognition
statement: Three peer-reviewed lifestyle-intervention trials now form the evidence
  base for reversing early-stage cognitive decline — Toups/Bredesen 2022 (25 participants,
  9-month intervention, 84% improved cognition, J Alzheimers Dis), Sandison 2023 (23
  participants, 6-month intervention, 74% improved, MoCA 12-23 at baseline), and Ornish
  2024 (49 participants, 20-week RANDOMIZED CONTROL TRIAL — the first RCT — comprehensive
  lifestyle alone showed significant cognitive improvement vs control). MoCA scores
  improved by approximately 3 points on average versus a typical untreated decline
  of 2-3 points per year — roughly a 6-point swing vs no treatment.
evidence_tier: plausible_emerging
