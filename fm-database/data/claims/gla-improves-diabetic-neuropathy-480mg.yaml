slug: gla-improves-diabetic-neuropathy-480mg
statement: Gamma-linolenic acid (GLA) at 480 mg/day for 1 year improved 16 neurological
  parameters in diabetic neuropathy, including conduction velocities, sensation, tendon
  reflexes, and muscle strength.
evidence_tier: plausible_emerging
rationale: Controlled trial (Keen et al. 1993) with standardised neurological endpoints;
  GLA bypasses impaired delta-6-desaturase conversion in diabetics.
coaching_translation: GLA from borage or evening primrose oil is a targeted neuropathy
  supplement — it feeds the fatty acid pathway that diabetes blocks.
