slug: scope-hold-boundary-with-referring-provider
statement: 'When a referring provider expects the coach to interpret labs, recommend
  supplements, or otherwise act outside scope, respond by appreciating their work,
  naming the coaching scope of practice, and re-describing what the coach can competently
  offer: turning the provider''s plan into sustainable behaviour change with tracking
  and accountability.'
evidence_tier: plausible_emerging
rationale: A warm, scope-clarifying reply protects the coach, educates the referrer,
  and reframes the coach as an asset to the provider's practice rather than a subordinate
  who does clinical tasks.
coaching_translation: 'Thank the provider, name your scope (''I refrain from diagnosing,
  prescribing, or interpreting labs''), then pitch value: ''I co-create the accountability
  plan so your clients actually implement what you prescribe — how would that assist
  your practice?'''
out_of_scope_notes: The provider retains all diagnosis, prescribing, and lab-interpretation
  duties; the coach must not adopt them even when asked by a clinician.
