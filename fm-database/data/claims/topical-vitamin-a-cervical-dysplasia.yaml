slug: topical-vitamin-a-cervical-dysplasia
statement: Topical retinoic acid (vitamin A) delivered via cervical cap with collagen
  sponge — four consecutive 2-hour applications plus repeats at 3 and 6 months — raised
  complete regression rates for MODERATE cervical dysplasia from 27% (placebo) to
  43% (active). Did NOT help severe dysplasia. Clinician-delivered protocol; coach
  can educate clients about this option to discuss with their gynecologist alongside
  conventional follow-up.
evidence_tier: plausible_emerging
