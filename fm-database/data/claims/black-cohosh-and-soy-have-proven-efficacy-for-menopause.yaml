slug: black-cohosh-and-soy-have-proven-efficacy-for-menopause
statement: Black cohosh (Cimicifuga racemosa), red clover, soy isoflavones, bioflavonoids,
  and kava have demonstrated scientific efficacy for menopausal vasomotor symptoms
  — many women obtain symptom relief without HRT.
evidence_tier: plausible_emerging
rationale: Pizzorno groups these botanicals with documented vasomotor efficacy. Multiple
  RCTs of standardised black cohosh extract (Remifemin) show modest hot-flash reduction;
  meta-analyses for soy are positive but heterogeneous.
coaching_translation: Many women can get good hot-flash relief from herbs and soy
  alone — without ever needing HRT. Black cohosh, red clover, soy, and kava are the
  best-evidenced.
caveats:
- Use only standardised extracts of black cohosh (e.g., Remifemin); rare hepatotoxicity
  reports.
- Kava is contraindicated with liver disease and on multiple medications; use under
  clinician.
- Effects modest — combine with diet, exercise, stress management.
