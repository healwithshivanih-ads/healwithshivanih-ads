slug: dim-i3c-support-estrogen-metabolism
statement: DIM (diindolylmethane) and Indole-3-carbinol (I3C), compounds extracted from cruciferous vegetables, support healthy
  estrogen metabolism and have chemopreventive properties in breast cancer based on experimental and human studies.
evidence_tier: plausible_emerging
rationale: Thomson et al. (Nutr Rev. 2016) is directly cited regarding DIM's chemopreventive properties. I3C is the precursor
  to DIM and both shift estrogen metabolism toward the 2-OH pathway.
coaching_translation: DIM and I3C are natural compounds from broccoli-family vegetables that help your body break down estrogen
  into safer forms. They're often recommended as supplements when dietary intake alone may not be enough.
out_of_scope_notes: Specific supplement dosing of DIM and I3C requires clinician prescription.
caveats:
- Evidence is from experimental and limited human studies, not RCT consensus. Dose must be clinician-determined.
- Dosing is out of coaching scope; requires clinician guidance
- DIM may interact with hormone medications; consult clinician
