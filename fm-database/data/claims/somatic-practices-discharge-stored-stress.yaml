slug: somatic-practices-discharge-stored-stress
statement: Somatic practices including movement, shaking, and stretching discharge
  stored stress from the body, complementing cognitive approaches to emotional healing.
evidence_tier: fm_specific_thin
rationale: Somatic experiencing and body-based trauma processing (Levine, van der
  Kolk) have clinical evidence in trauma populations. The specific mechanisms of 'discharging
  stored stress' via movement are biologically plausible but the evidence base is
  primarily qualitative and clinical observation, not large RCTs.
coaching_translation: Sometimes the body needs to physically release what the mind
  can't fully process through talking alone. Shaking, stretching, dance, or yoga can
  help complete the stress cycle your nervous system has been holding.
caveats:
- For trauma survivors, somatic work should be guided by a trauma-informed professional.
- Source is educational synthesis.
