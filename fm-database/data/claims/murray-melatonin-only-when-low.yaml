  location: Chapter 71 — Insomnia, pg 1183–1184
  quote: The sleep-promoting effects of melatonin are apparent only if melatonin levels
    are low. When melatonin is taken just before going to bed by normal subjects or
    by patients with insomnia who have normal melatonin levels, it produces no sedative
    effect. A dosage of 8 mg per day for only four days resulted in significant alterations
    in hormone secretions.
