slug: hbot-mitochondrial-function-proliferation
statement: In mid-age athletes following the Sagol HBOT protocol, mitochondrial proliferation
  and improved mitochondrial function were demonstrated — reflecting that the hyperoxic-hypoxic
  paradox triggers mitochondrial biogenesis (through SIRT1 and PGC-1-alpha signalling)
  without the energetic stress that prolonged hypoxia would impose. This is a key
  mechanism behind reported improvements in physical performance metrics.
evidence_tier: plausible_emerging
