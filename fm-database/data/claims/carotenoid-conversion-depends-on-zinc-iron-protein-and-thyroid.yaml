slug: carotenoid-conversion-depends-on-zinc-iron-protein-and-thyroid
statement: Conversion from carotenoids to active vitamin A is inefficient and depends
  on zinc, iron, protein, and thyroid health.
evidence_tier: plausible_emerging
rationale: Low conversion efficiency of beta-carotene to retinol and its dependence
  on thyroid function and micronutrient status is supported by mechanistic research.
coaching_translation: Clients relying on plant-based carotenoids for vitamin A may
  need adequate zinc, iron, protein, and thyroid health for efficient conversion.
caveats:
- Source is a practitioner cheatsheet without primary citations.
- Genetic variants in BCMO1 also affect conversion efficiency.
- Source is practitioner cheatsheet.
- Thyroid assessment required for clinician.
