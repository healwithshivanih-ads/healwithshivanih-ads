slug: sore-throat-probiotic-during-antibiotic
statement: If antibiotics are used for strep throat (or any infection), co-administer
  Lactobacillus acidophilus + Bifidobacterium bifidum 15-20 billion CFU per day DURING
  antibiotic therapy, spaced as far from antibiotic doses as possible. Research supports
  L. acidophilus during (not just after) antibiotic administration to prevent superinfection,
  antibiotic-induced diarrhoea, candida overgrowth, and UTIs. After the antibiotic
  course, drop to 2-5 billion CFU/day for maintenance.
evidence_tier: strong
