  location: Chapter 95 — Strep Throat, pg 1520
  quote: Reductions of friendly bacteria and/or superinfection with antibiotic-resistant
    flora may be prevented by administering L. acidophilus products during antibiotic
    therapy. A dosage of at least 15 billion to 20 billion organisms is required during
    antibiotic usage.
