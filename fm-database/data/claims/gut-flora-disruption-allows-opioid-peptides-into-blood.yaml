slug: gut-flora-disruption-allows-opioid-peptides-into-blood
statement: When gut flora is disrupted, gut-lining cells cannot neutralise opioid
  peptides (glutomorphine from gluten, caseomorphine from dairy), allowing them to
  enter the bloodstream and exert opiate-like effects on the brain.
evidence_tier: plausible_emerging
rationale: Exorphin research supports the existence of these peptides; gut barrier
  involvement is biologically plausible. However, clinical evidence linking this mechanism
  to psychiatric conditions is early-stage. Source is an expert lecture (moderate
  quality).
coaching_translation: For some people, gluten and dairy may break down into compounds
  that affect brain chemistry, especially if gut health is compromised. A supervised
  elimination trial may be worth discussing with your practitioner.
caveats:
- Source is expert lecture, not primary RCT
- Individual variation in peptide metabolism is significant
- MMR vaccine claims in the document are highly contested and not represented in this
  claim
