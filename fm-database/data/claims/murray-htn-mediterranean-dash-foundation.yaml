slug: murray-htn-mediterranean-dash-foundation
statement: 'Lifestyle + dietary changes alone control mild-to-borderline hypertension
  in most cases. Murray''s foundation protocol: ideal body weight, substantially decreased
  salt intake (< 2.3 g sodium/day), Mediterranean or DASH diet pattern, increased
  dietary celery + garlic + onions, reduced animal fats, increased monounsaturated
  oils, avoid alcohol/caffeine/smoking, regular exercise + stress-reduction techniques.
  Vegetarians consistently show lower BP and lower cardiovascular disease incidence.
  Three months of strict lifestyle work normalises BP in ~60% of mild-moderate cases
  — often eliminating need for medication.'
evidence_tier: strong
rationale: DASH-Sodium trial + decades of cohort data. Mechanism — sodium-volume effect,
  potassium-mediated vasodilation, monounsaturated fat membrane effects, vagal tone
  enhancement via exercise + stress reduction.
coaching_translation: 'For borderline-to-mild hypertension, the foundation is lifestyle:
  lose weight if overweight, cut sodium dramatically, eat Mediterranean/DASH style
  (high potassium fruits + vegetables + whole grains + legumes), include celery +
  garlic + onions daily, cut alcohol + caffeine + smoking, exercise + manage stress.
  60% normalise BP in 3 months on this alone — often without medication.'
caveats:
- 3-month strict trial before escalating
- Never advise stopping BP medication unilaterally
- White-coat hypertension may not need any intervention
- Sodium reduction less effective in non-salt-sensitive patients (~50% of population)
