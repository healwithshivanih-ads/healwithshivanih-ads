slug: flaxseed-oil-provides-ala-not-epa-dha
statement: Flaxseed oil provides ALA (alpha-linolenic acid), which requires conversion to EPA and DHA; genetic variation in
  delta-5 desaturase means some individuals cannot efficiently convert ALA and require direct EPA/DHA supplementation.
evidence_tier: strong
rationale: ALA-to-EPA/DHA conversion is well-documented to be limited in humans (~5–15% to EPA, <1% to DHA). SNPs in FADS1/FADS2
  genes affect conversion efficiency. This is established nutritional genomics.
coaching_translation: Flaxseed is great for boosting overall omega-3 intake, but not everyone can convert it into the active
  anti-inflammatory forms (EPA and DHA). If your client's inflammation isn't responding, they may need direct EPA/DHA from
  fish oil or algae.
