  location: Chapter 72 — Irritable Bowel Syndrome, Treatment Summary pg 1199–1200
  quote: 'Because IBS represents a health condition caused by many interrelated factors,
    the best approach is to address each of the following major factors: Increasing
    dietary fiber, Eliminating foods to which there is an allergy or intolerance,
    Eliminating refined sugars, Reducing dietary FODMAPs, Taking probiotics, Taking
    enteric-coated peppermint oil, Controlling psychological components, especially
    stress.'
