slug: gut-flora-disrupted-by-antibiotics-statins-painkillers
statement: Antibiotics, statin drugs, and long-term painkiller use significantly disrupt gut flora, compromising nutrient
  breakdown, absorption, immune protection, and driving systemic inflammation and leaky gut.
evidence_tier: plausible_emerging
rationale: The impact of antibiotics on gut microbiota is well-established. Evidence for statins and NSAIDs/analgesics on
  microbiome is emerging and plausible. The downstream effects described (leaky gut, inflammation, nutrient malabsorption)
  are consistent with the microbiome disruption literature.
coaching_translation: Be aware that antibiotics, statins, and long-term painkillers can significantly deplete your beneficial
  gut bacteria. If you've taken these, actively support gut restoration through probiotics, fermented foods, and diverse fibre.
out_of_scope_notes: Advising clients to stop statins or painkillers is outside coaching scope. Any medication changes must
  be managed by a clinician.
caveats:
- Advising medication cessation (especially statins) is clinician scope only.
- The specific claim about statins causing memory loss and Alzheimer's is contested; coach should not relay this claim.
- Source is a practitioner talk.
