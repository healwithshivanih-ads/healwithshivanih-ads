slug: hbot-mitochondrial-biogenesis-via-ampk-sirt1
statement: Mitochondrial biogenesis triggered by the hyperoxic-hypoxic paradox is
  regulated through two converging axes — the AMPK-PGC-1-alpha pathway (energy-stress
  sensing) and the SIRT1-PGC-1-alpha pathway (NAD+ dependent deacetylation). Both
  pathways overlap with HIF signalling. Crucially, intermittent hyperoxia drives mitochondrial
  biogenesis without the energetic stress and oxygen-consumption-induced worsening
  that prolonged hypoxia would cause — a key reason HBOT preserves mitochondrial function
  while delivering the hypoxia-like signal.
evidence_tier: strong
