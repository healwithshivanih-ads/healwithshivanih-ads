sources:
- id: hadanny-efrati-2020-hyperoxic-hypoxic-paradox
  location: Section 3.4 + 4.4 Mitochondrial Biogenesis
  quote: The AMP-activated kinase (AMPK)-PGC-1a axis and Sirtuin 1 (SIRT1)-PGC-1a
    are two major pathways that regulate mitochondrial biogenesis. AMPK can be activated
    by physiological stimuli such as exercise, starvation, and transient hypoxia.
    Once AMPK activation occurs under hypoxic conditions, additional mitochondrial
    biogenesis and oxygen consumption would further decrease oxygen availability and
    worsen the stress. Therefore, HIF signaling under prolonged hypoxia generally
    acts to decrease mitochondrial biogenesis and mass.
rationale: Explains why intermittent hyperoxia outperforms chronic hypoxia for biogenesis.
