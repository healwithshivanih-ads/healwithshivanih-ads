  quote: There's an organisation called ILADS, the International Lyme Associated Diseases
    Society — I was one of the founding members. ILADS.org and many of the Lyme organisations
    — Bay Area Lyme, Global Lyme Alliance — there are a lot of good Lyme organisations
    out there. If you are concerned that you may have Lyme disease, you should go
    on the websites and find a Lyme-literate practitioner.
