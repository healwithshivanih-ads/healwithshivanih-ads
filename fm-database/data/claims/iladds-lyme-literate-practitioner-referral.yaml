slug: iladds-lyme-literate-practitioner-referral
statement: For suspected chronic Lyme disease, referral to a Lyme-literate practitioner
  is essential because conventional ID specialists frequently dismiss the diagnosis.
  Primary referral organisations — ILADS (International Lyme and Associated Diseases
  Society, ilads.org) maintains a practitioner directory and physician training programme.
  Global Lyme Alliance (gla.org) and Bay Area Lyme Foundation provide patient resources.
  Horowitz's own consultations are now limited to physician-to-physician guidance
  via his clinic and Medical Detective Substack. Practitioners on these directories
  work within the MSIDS- style multi-driver paradigm rather than the 30-day-doxycycline-only
  protocol.
evidence_tier: plausible_emerging
