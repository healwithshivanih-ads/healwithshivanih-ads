slug: vaginal-estrogen-prevents-recurrent-uti
statement: Recurrent urinary tract infections are among the top reasons older women
  end up in assisted living, and osteoporotic fractures occur in approximately 1 in
  5 to 1 in 2 women — both are accelerated by post-menopausal estrogen loss. Vaginal
  estrogen (now no longer carrying an FDA black-box warning) has a particularly favourable
  systemic safety profile and is a clear win for genitourinary symptoms of menopause
  (vaginal dryness, painful intercourse, recurrent UTIs). Coach script — when an older
  client mentions recurrent UTIs or painful intimacy, surface this as worth raising
  with her GP.
evidence_tier: confirm_with_clinician
