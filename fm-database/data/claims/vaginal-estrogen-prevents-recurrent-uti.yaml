  location: Podcast — vaginal estrogen segment
  quote: All vaginas need estrogen at some point. UTIs are one of the biggest reasons
    why women end up in assisted living. Those recurrent infections are very dangerous.
    Osteoporotic fractures happen in one in five or one in two women. 50% of women
    will have an osteoporotic fracture, which is another reason why we end up in assisted
    living.
rationale: Drives a high-leverage conversation for older clients who have stopped
  mentioning UTIs because they think it's just "ageing."
