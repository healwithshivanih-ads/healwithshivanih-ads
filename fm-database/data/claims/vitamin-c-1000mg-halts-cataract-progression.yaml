sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 33 — Cataracts, pg 629-630
  quote: It appears that the dosage of vitamin C necessary to increase the vitamin
    C content of the lens is 1,000 mg... 450 patients with incipient cataracts were
    started on a nutritional program that included 1,000 mg per day of vitamin C,
    which led to a significant reduction in cataract development.
rationale: Use 500 mg twice per day (split dosing) for lens-relevant tissue saturation.
  Trials using only 500 mg per day failed to show benefit — dose threshold matters
  here.
