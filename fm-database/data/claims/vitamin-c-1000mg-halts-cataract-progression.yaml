slug: vitamin-c-1000mg-halts-cataract-progression
statement: Vitamin C is concentrated in the lens of the eye at roughly 20× blood levels.
  Supplementation at ≥1,000 mg per day raises lens vitamin C content; lower doses
  (e.g., 500 mg) appear insufficient. Observational and small clinical studies suggest
  1 g per day can halt cataract progression and reduce the need for surgical extraction
  across multi-year follow-up.
evidence_tier: plausible_emerging
linked_to_topics:
- cataracts
