slug: sore-throat-goldenseal-echinacea-vitamin-c
statement: Goldenseal (Hydrastis canadensis) berberine inhibits adherence of group
  A streptococci to pharyngeal epithelial cells and exerts direct antibiotic activity.
  Echinacea inhibits streptococcal hyaluronidase, inactivates GABHS, and reduces the
  pro-inflammatory response. Vitamin C 500-1,000 mg every two waking hours during
  acute illness is critical — rheumatic fever is virtually nonexistent in tropical
  populations where vitamin C intake is high, and 18% of high-risk children have subnormal
  serum vitamin C levels. Add zinc 30 mg/day.
