  quote: The berberine alkaloid of goldenseal exerts antibiotic activity against streptococci
    and, perhaps more important, has been shown to inhibit the attachment of group
    A streptococci to pharyngeal epithelial cells. Echinacea also exerts action against
    streptococci infection. Vitamin C is very important in the prevention of rheumatic
    fever.
