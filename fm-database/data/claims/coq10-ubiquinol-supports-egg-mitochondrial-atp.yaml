sources:
- id: fett-it-starts-with-the-egg-2019
  location: Chapter 6 — The Power of Coenzyme Q10, pg 87-96
  quote: Supplementing with mitochondrial nutrients such as CoQ10 may lead to improvement
    in egg and embryo quality and pregnancy outcome. CoQ10 may be needed for as long
    as four to six months in advance of an IVF cycle to make a significant difference
    in the chance of success.
rationale: Single highest-impact supplement claim for advanced-maternal-age egg freezing
  prep. Tier strong because of Bentov mouse data, follicular-fluid CoQ10 correlation,
  and broad safety record.
