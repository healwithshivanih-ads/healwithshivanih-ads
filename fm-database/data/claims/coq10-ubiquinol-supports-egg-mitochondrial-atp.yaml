slug: coq10-ubiquinol-supports-egg-mitochondrial-atp
statement: CoQ10, particularly the more bioavailable ubiquinol form, is a critical
  component of the mitochondrial electron transport chain and supports ATP production
  in developing oocytes. Animal and clinical studies suggest supplementation in the
  3-6 months preceding conception or IVF can improve egg numbers, embryo quality,
  and pregnancy rates, especially in women 35+ or with diminished ovarian reserve.
evidence_tier: strong
