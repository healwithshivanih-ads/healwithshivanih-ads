slug: omega-3-ratio-4-to-1-reduces-inflammation
statement: An omega-6 to omega-3 dietary ratio of 4:1 or lower may reduce inflammation
  and lower the risk of chronic disease.
evidence_tier: plausible_emerging
rationale: Supported by Simopoulos' widely cited work on EFA ratios; the document
  acknowledges 'some research suggests' — indicating emerging rather than consensus
  evidence.
coaching_translation: Modern diets tend to have way too much omega-6 (from vegetable
  oils) relative to omega-3. Increasing fatty fish, walnuts, chia, and flaxseeds while
  reducing processed seed oils can help rebalance this.
caveats:
- Optimal ratio is debated; the dietary AI for omega-3 remains low (1.1–1.6 g/day
  ALA).
