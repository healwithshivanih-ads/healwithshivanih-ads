sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 80 — Osteoarthritis, pg 1303
  quote: One study involved 252 obese elderly patients with a body mass index greater
    than 28 and X-ray-confirmed osteoarthritis who were randomized into healthful-lifestyle
    (control), diet-only, exercise-only, and diet-plus-exercise groups. The exercise
    program involved hour-long sessions that focused on aerobics and resistance training
    three times a week. The most benefit was demonstrated in the diet-plus-exercise
    group. Insulin resistance not only increases inflammation but also impairs cartilage
    regeneration.
