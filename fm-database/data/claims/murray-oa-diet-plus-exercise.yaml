slug: murray-oa-diet-plus-exercise
statement: Combining moderate weight loss (~5 percent body weight over 18 months)
  with structured aerobic plus resistance training (three hour-long sessions per week)
  produces significantly greater improvement in self-reported physical function, walking
  distance, stair-climb time, and knee pain than diet alone or exercise alone in obese
  elderly patients with X-ray-confirmed knee osteoarthritis. Insulin resistance impairs
  cartilage proteoglycan synthesis and worsens OA — improving insulin sensitivity
  is a mechanistic target.
evidence_tier: strong
linked_to_topics:
