sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 67 — Hypoglycemia, pg 1121-1122
  quote: Soluble fiber has the most beneficial effects on blood sugar control. Slowing
    down the digestion and absorption of carbohydrates, thereby preventing rapid rises
    in blood sugar; increasing cell sensitivity to insulin, and thereby preventing
    the excessive secretion of insulin. 50 g of fiber is a healthful goal. Dr. Lyon
    has found that the most effective method of reducing glycemic volatility is a
    low-glycemic diet with the addition of a novel soluble fiber product called PolyGlycopleX
    (PGX). Typical dosage of PGX is 1,500 to 5,000 mg before meals.
