slug: murray-hypoglycemia-soluble-fiber-pgx
statement: Soluble fibers (hemicelluloses, mucilages, gums, pectin from legumes, oat
  bran, psyllium husks, nuts, apples, pears, vegetables) slow carbohydrate digestion,
  increase insulin sensitivity, and improve hepatic glucose uptake — daily intake
  target ~50 g. The viscous functional fiber PolyGlycopleX (PGX) at 1,500 to 5,000
  mg before meals significantly reduces post-meal glucose elevations in a dose-dependent
  way, independent of food type, and is more effective at blunting glycemic volatility
  than a low-glycemic-index diet alone.
