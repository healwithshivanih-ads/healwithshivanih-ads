slug: acne-zinc-gluconate-inflammatory-score
statement: In a double-blind trial of 66 patients with inflammatory acne, zinc gluconate
  (30 mg elemental zinc daily) for two months reduced the inflammatory score from
  49 to 27 vs 58 to 47 on placebo. Effervescent zinc sulfate showed efficacy similar
  to tetracycline; most patients need ~12 weeks of supplementation.
evidence_tier: strong
