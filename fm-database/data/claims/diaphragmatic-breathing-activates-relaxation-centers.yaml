slug: diaphragmatic-breathing-activates-relaxation-centers
statement: Diaphragmatic (abdominal) breathing decreases stress by activating relaxation
  centers in the brain and improving venous blood flow back to the heart.
evidence_tier: plausible_emerging
rationale: Mechanistically plausible via vagal/parasympathetic activation; widely
  cited in integrative medicine literature but specific RCTs with standardised outcomes
  are limited.
coaching_translation: Breathing deeply from your belly can calm your nervous system
  quickly — it's one of the fastest tools you have for stress relief.
caveats:
- Source is an educational toolkit, not primary literature; no specific RCT cited.
- Mechanistic claim about venous return is physiologically reasonable but not RCT-proven
  in this context.
