slug: diaphragmatic-breathing-activates-relaxation-centers
statement: Abdominal (diaphragmatic) breathing decreases stress by activating relaxation
  centers in the brain.
evidence_tier: strong
rationale: 'Well-established neuroscience: slow, diaphragm-led breathing stimulates
  vagal afferents, shifting autonomic balance to parasympathetic dominance and reducing
  cortisol and sympathetic tone.'
coaching_translation: Breathing deeply from your belly sends a 'calm down' signal
  to your brain, helping your whole nervous system relax.
caveats:
- Source is an educational toolkit, not primary literature; no specific RCT cited.
- Mechanistic claim about venous return is physiologically reasonable but not RCT-proven
  in this context.
- Source is an educational toolkit; primary RCT citations not provided in the document.
