slug: murray-gamma-oryzanol-dual-menopause-lipid
statement: Gamma-oryzanol (ferulic acid esters from rice bran oil) at 300 mg/day produced
  ≥50% reduction in menopausal symptoms in 67–85% of women across multiple trials
  dating back to the 1960s, primarily through enhanced pituitary function and hypothalamic
  endorphin release — and uniquely also reduces total cholesterol and triglycerides,
  making it especially attractive for the peri/menopausal woman with concurrent dyslipidemia.
evidence_tier: plausible_emerging
rationale: Multiple Japanese clinical studies cited (Murase 1970, Yamada 1962, Ishihara
  1984). Older evidence base but consistent direction. Excellent safety profile. The
  DUAL benefit on menopausal symptoms AND lipids is the FM differentiator — addresses
  two common perimenopausal complaints with one supplement. Effect on hot flushes
  via endorphin pathway is shared with exercise + acupuncture mechanisms.
coaching_translation: 'Gamma-oryzanol does two useful things at once for the perimenopausal
  woman: reduces hot flushes (via endorphin release) AND lowers cholesterol/triglycerides.
  300 mg/day standardised. Very safe — no notable side effects across 60 years of
  use. Especially good pick if a client has perimenopausal symptoms AND a worrying
  lipid panel.'
caveats:
- Older evidence base — fewer recent RCTs
- Effects gradual — 4-8 weeks
- Look for products standardised to ≥95% gamma-oryzanol content
- Rice bran oil dietary intake unlikely to reach therapeutic dose; supplement form
  needed
