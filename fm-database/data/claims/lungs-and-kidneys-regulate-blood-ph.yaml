slug: lungs-and-kidneys-regulate-blood-ph
statement: The lungs and kidneys are the two primary organs that continuously regulate
  blood pH, with lungs adjusting CO2 exhalation and kidneys modulating acid excretion
  in urine.
evidence_tier: strong
rationale: Pulmonary and renal pH regulation is established physiology taught in all
  medical and health science curricula and supported by extensive research.
coaching_translation: Your body already manages blood pH beautifully through your
  lungs and kidneys — deep breathing during exercise and staying well-hydrated both
  support these systems.
caveats:
- Source is a lecture transcript; the mechanism described is consistent with established
  physiology.
