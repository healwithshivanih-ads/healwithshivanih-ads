slug: butyrate-enemas-benefit-uc
statement: SCFA enemas (butyrate alone at 80–100 mmol/L or combined with acetate and
  propionate) displayed excellent preliminary results in a well-designed double-blind
  study as adjuncts for ulcerative colitis.
evidence_tier: plausible_emerging
rationale: 'Mechanistically sound: colonocyte SCFA deficiency is central to UC pathogenesis;
  double-blind preliminary data are promising but larger trials are needed.'
coaching_translation: For left-sided ulcerative colitis, short-chain fatty acid (SCFA)
  enemas may help restore colonocyte energy supply — discuss with your clinician.
caveats:
- Requires clinical administration; not within coaching scope to recommend enema protocols
  without clinician oversight
out_of_scope_notes: SCFA enema preparation and dosing is a clinician-prescribed intervention.
