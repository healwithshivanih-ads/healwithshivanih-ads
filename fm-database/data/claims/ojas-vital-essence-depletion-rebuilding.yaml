slug: ojas-vital-essence-depletion-rebuilding
statement: Ojas — the subtle essence of vitality and immunity in Ayurveda — is depleted by chronic stress,
  excessive work without rest, irregular eating, and a lifestyle that consistently neglects the body's
  need for nourishment at midday. Ojas-building foods include dates, soaked almonds, ghee, and warm spiced
  milk, taken in small quantities with full attention. Preserving ojas requires slowing down, reducing
  excess activities, and protecting the midday meal.
evidence_tier: fm_specific_thin
rationale: The ojas concept maps loosely onto adrenal reserve, immune resilience, and neuroendocrine resources.
  The behaviours that deplete ojas (chronic stress, poor sleep, poor nutrition, overwork) are the same
  drivers of HPA-axis dysregulation and immune compromise.
coaching_translation: Think of ojas as your body's reserve battery — vital energy that underpins immunity
  and resilience. It depletes when you skip meals, push through exhaustion, and live in stress without
  recovery. You rebuild it with rest, consistent mealtimes, and nourishing foods like soaked almonds,
  dates, ghee, and warm spiced milk. You do not push through on empty.
out_of_scope_notes: ''
caveats:
- The ojas concept is traditional Ayurvedic; it has no direct biomarker equivalent.
- The recommended foods are appropriate for vata and pitta types; kapha types and those with dairy sensitivity
  need adjustments.
