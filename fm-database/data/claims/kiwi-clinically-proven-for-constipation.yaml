slug: kiwi-clinically-proven-for-constipation
statement: Eating 1–2 kiwi fruits daily is clinically proven to improve stool frequency
  and consistency in constipation.
evidence_tier: strong
rationale: Multiple RCTs (including Udani 2009, Mazur 2012) demonstrate kiwifruit
  actinidin enzyme and soluble fiber improve stool frequency; the document explicitly
  states 'clinically proven for constipation'.
coaching_translation: Adding one kiwi a day is one of the most evidence-backed food
  strategies for constipation — and it is also Low FODMAP at one piece.
caveats:
- Kiwi is a salicylate-containing food; check for salicylate sensitivity.
