slug: carb-and-prebiotic-tolerance-is-individual
statement: 'There is no universal carbohydrate or prebiotic intake: the right amount
  sits on a spectrum shaped by ancestry, latitude, insulin sensitivity and existing
  overgrowth, so copying another population''s high-carb, high-fibre microbiota-diet
  can backfire in a Westerner.'
evidence_tier: plausible_emerging
rationale: Cites population-microbiota differences (equol producers, seaweed-digesting
  bacteria, Hadza).
coaching_translation: The 'perfect' amount of carbs and fibre is personal — what suits
  one culture's gut can harm another's.
