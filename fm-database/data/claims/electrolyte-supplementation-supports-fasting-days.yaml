slug: electrolyte-supplementation-supports-fasting-days
statement: Maintaining electrolyte intake (calcium, magnesium, sodium, potassium, chloride) on fasting days is recommended
  to support hydration and prevent adverse symptoms.
evidence_tier: plausible_emerging
rationale: Consistent with known electrolyte losses during caloric restriction and risk of hyponatraemia, hypokalaemia, and
  muscle cramps. Standard guidance in supervised fasting programmes.
coaching_translation: On fasting days, sipping an electrolyte drink can help prevent headaches, dizziness, and fatigue.
caveats:
- Specific electrolyte doses are outside coaching scope — defer to clinician, especially for clients on BP or cardiac medications.
- Clinician should personalise electrolyte plan.
out_of_scope_notes: Electrolyte dosing and selection for medically complex clients requires clinician input.
