slug: dim-and-chasteberry-naturally-support-progesterone-and-lower-estrogen
statement: DIM (diindolylmethane) and chasteberry (Vitex) are natural supplements that support progesterone levels and lower
  estrogen, suitable for use in cycle syncing protocols.
evidence_tier: plausible_emerging
rationale: DIM's role in shifting estrogen metabolism toward 2-OH estrone and chasteberry's dopaminergic action supporting
  LH/progesterone production have plausible mechanisms and limited but positive clinical trial data. Both are commonly used
  in FM and integrative gynecology.
coaching_translation: DIM (from cruciferous vegetables) and chasteberry are two well-known supplements in functional medicine
  for supporting hormone balance — DIM helps your body process estrogen more safely, while chasteberry helps your body make
  more progesterone.
caveats:
- Evidence for clinical efficacy from RCTs is limited; long-term safety data is generally favorable but not extensive.
- Source is FM lecture.
