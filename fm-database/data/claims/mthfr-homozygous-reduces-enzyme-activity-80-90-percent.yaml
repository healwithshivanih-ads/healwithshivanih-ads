slug: mthfr-homozygous-reduces-enzyme-activity-80-90-percent
statement: Homozygous MTHFR gene variants reduce MTHFR enzyme activity to 10–20% of
  normal, while heterozygous variants reduce activity to approximately 60% of normal.
evidence_tier: plausible_emerging
rationale: The document cites specific activity reductions (60% for heterozygous,
  10–20% for homozygous), consistent with published literature on C677T polymorphism
  activity effects.
coaching_translation: Clients with two copies of the MTHFR variant have significantly
  impaired methylation capacity and may benefit most from methylated B vitamin forms
  and lifestyle support.
caveats:
- Source is expert lecture; specific percentages may vary by variant type (C677T vs
  A1298C) and laboratory methodology.
- Genotype alone does not predict clinical outcomes — clinical context is essential.
