slug: ppis-and-metformin-impair-b12-absorption
statement: Prolonged use of proton pump inhibitors (PPIs), H2 receptor antagonists,
  and metformin can impair vitamin B12 absorption, increasing deficiency risk.
evidence_tier: strong
rationale: Drug-nutrient interactions between PPIs/H2 blockers (reducing gastric acid
  needed for B12 release from food) and metformin (impairing calcium-dependent absorption)
  are well-documented in clinical literature.
coaching_translation: Clients on long-term PPIs, antacids, or metformin should be
  flagged to their clinician for B12 status monitoring.
out_of_scope_notes: Advising on medication changes is outside coaching scope — refer
  to prescribing clinician.
