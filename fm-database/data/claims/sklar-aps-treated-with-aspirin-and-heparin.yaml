slug: sklar-aps-treated-with-aspirin-and-heparin
statement: Once antiphospholipid syndrome is confirmed in a woman with recurrent pregnancy
  loss, the standard obstetric protocol — low-dose aspirin from before conception
  plus prophylactic low-molecular-weight heparin (enoxaparin / Lovenox) from positive
  pregnancy test through the postpartum window — meaningfully reduces loss rates and
  is hematologist-prescribed alongside the broader functional foundation of anti-inflammatory
  nutrition and immune regulation.
