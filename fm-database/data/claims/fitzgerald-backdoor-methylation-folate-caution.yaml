slug: fitzgerald-backdoor-methylation-folate-caution
statement: Rather than pushing high-dose methyl donors, Fitzgerald favours 'backdoor
  methylation' — getting folate/B12 from whole foods and protecting existing methyl
  donors with abundant DNA methylation adaptogens. She cautions against over-supplementing
  folic acid/folate (especially in older adults and anyone with a cancer history),
  and against relying on fortified foods, because too much methylation is as harmful
  as too little.
