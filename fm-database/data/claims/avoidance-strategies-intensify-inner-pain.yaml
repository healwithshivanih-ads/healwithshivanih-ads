slug: avoidance-strategies-intensify-inner-pain
statement: Common avoidance behaviours — including alcohol, nicotine, excessive screen
  use, and busyness — temporarily suppress awareness of deep inner pain but cause
  it to grow stronger over time, increasing the suffering they are meant to relieve.
evidence_tier: plausible_emerging
rationale: The general principle that avoidance of emotional pain reinforces and amplifies
  it is well-supported in psychological literature (e.g., experiential avoidance in
  ACT/CBT frameworks). The specific substances mentioned are credible as numbing/avoidance
  tools. Source remains a seminar transcript.
coaching_translation: When we keep busy, scroll, drink, or distract ourselves to avoid
  a painful feeling, we often end up feeling worse over time. The pain doesn't go
  away — it waits. Gently turning towards it is part of healing.
caveats:
- Source is seminar transcript, not primary literature.
- Substance use as avoidance should be assessed by a clinician if it is habitual or
  dependence-level.
