  location: Podcast — fasting window segment
  quote: I think that everyone should go through a fasting feeding cycle and most
    people aren't. My general rule is that you shouldn't feel hangry and you shouldn't
    be obviously unhealthy. If you're developing peripheral neuropathy when you're
    fasting, you shouldn't be doing it. Generally people who are more overweight can
    usually tolerate fasting more.
rationale: Pushes back on the IF-cult — and gives coach concrete stop-signs for clients
  whose fasting protocol is harming them.
