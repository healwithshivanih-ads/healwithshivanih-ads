slug: personalised-fasting-window
statement: Masterjohn's view on fasting — everyone benefits from some kind of fasting-feeding
  cycle (most modern eaters have NONE), but the optimal window must be radically individualised.
  Three meals a day no snacking, OMAD, 16/8, 5/2, or quarterly 3-day fasts may each
  be exactly right for different people. Two clinical guard-rails — never feel "hangry"
  enough to feel like you are fighting a battle with yourself, and stop immediately
  if you develop peripheral neuropathy or sustained "feeling like crap." Overweight
  clients generally tolerate more fasting; clients with reactive-hypoglycaemia patterns
  generally tolerate less. Ease in via baby steps, not big jumps.
