slug: willingness-is-the-only-needle-mover
statement: In trauma resolution work, willingness to self-confront is the single biggest
  predictor of progress — independent of which therapeutic modality is used. Clients
  who are not willing to look at their pattern cannot be moved by sophisticated technique,
  no matter how skilled the practitioner. Coach implication — meet clients where they
  are, offer the invitation, and accept that some family members and partners will
  not engage despite love and acceptance. This is liberating for the practitioner,
  whose role is to sing the song; those who can hear will hear.
evidence_tier: plausible_emerging
