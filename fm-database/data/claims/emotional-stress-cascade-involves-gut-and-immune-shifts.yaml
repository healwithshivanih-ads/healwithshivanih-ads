slug: emotional-stress-cascade-involves-gut-and-immune-shifts
statement: The functional medicine cascade describes perceived emotional threat as
  leading to HPA activation, mitochondrial strain, inflammation, altered gut barrier,
  microbiome changes, immune dysregulation, hormonal shifts, and chronic disease expression.
evidence_tier: fm_specific_thin
rationale: The full cascade as described is a functional medicine systems model with
  plausible mechanistic components; the integrated cascade framing is FM-specific
  and not directly validated in a single RCT. Source is expert consensus without primary
  citations.
coaching_translation: This cascade framework is a useful coaching model for explaining
  how emotional stress can affect multiple body systems over time.
caveats:
- Source is expert consensus without direct citations.
- This is a systems model, not a single validated clinical pathway.
