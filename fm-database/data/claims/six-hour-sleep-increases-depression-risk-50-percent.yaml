slug: six-hour-sleep-increases-depression-risk-50-percent
statement: Ten consecutive nights of only six hours of sleep increases the risk of developing depression by 50%.
evidence_tier: strong
rationale: Attributed to Dr Matthew Walker's 'Why We Sleep', which cites peer-reviewed sleep and mental health research. The
  sleep-depression bidirectional relationship is well-established in epidemiological literature.
coaching_translation: Consistently sleeping only six hours a night — even if it feels 'enough' — significantly raises your
  risk of depression. Prioritising eight hours is one of the most powerful mental health tools available.
caveats:
- Exact 50% figure from Walker's synthesis; verify primary source for precision
- Causality vs correlation in sleep-depression relationship
