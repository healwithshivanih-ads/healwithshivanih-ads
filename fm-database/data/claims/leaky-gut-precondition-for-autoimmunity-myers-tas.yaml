slug: leaky-gut-precondition-for-autoimmunity-myers-tas
statement: Intestinal permeability ('leaky gut') is presented as a necessary precondition
  for developing autoimmunity, alongside genetic predisposition and an environmental
  trigger.
evidence_tier: plausible_emerging
rationale: 'Myers cites Alessio Fasano''s work: a leaky gut allows antigens to cross
  the epithelial barrier, driving immune activation and molecular mimicry. Framed
  as one of three legs (genes, trigger, permeability).'
coaching_translation: A leaky gut lining lets food and microbes reach the immune system,
  which can set the stage for the body attacking itself.
