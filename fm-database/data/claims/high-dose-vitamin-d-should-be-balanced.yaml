slug: high-dose-vitamin-d-should-be-balanced
statement: Higher-dose vitamin D requires balance with vitamins A, K, and E, and assessment of calcium and phosphorus.
evidence_tier: confirm_with_clinician
rationale: Fat-soluble vitamin synergy and potential for vitamin D toxicity via dysregulated calcium metabolism is clinically
