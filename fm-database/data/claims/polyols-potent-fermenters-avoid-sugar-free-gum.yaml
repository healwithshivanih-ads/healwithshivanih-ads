slug: polyols-potent-fermenters-avoid-sugar-free-gum
statement: Polyols (sorbitol, mannitol, xylitol) are potent fermenters; sugar-free
  chewing gum is a common hidden source and should be avoided on a low-FODMAP protocol.
evidence_tier: strong
rationale: Xylitol and sorbitol in sugar-free gum are well-documented osmotic laxatives
  and fermentation substrates. This is validated in the FODMAP literature.
coaching_translation: Check labels on sugar-free gum, mints, and 'diet' foods — if
  you see sorbitol, mannitol, or xylitol in the ingredients, put it back. These sugar
  alcohols are major bloating triggers.
