slug: fiber-15-30-percent-cv-mortality-reduction
statement: Dietary fiber is associated with a 15–30% reduction in cardiovascular mortality,
  lowers cholesterol, lowers blood sugar, and supports bowel regularity. Target intake
  is approximately 25g/day.
evidence_tier: strong
rationale: Fiber and cardiovascular mortality reduction is supported by multiple prospective
  cohorts and meta-analyses. The 25g target aligns with major dietary guidelines.
coaching_translation: Fiber is one of the simplest and most effective dietary tools
  for heart health. It lowers cholesterol, improves blood sugar, and protects against
  cardiovascular death.
