slug: mindful-chewing-activates-parasympathetic-state
statement: Chewing thoroughly and slowly, particularly from both sides of the mouth,
  can help activate a parasympathetic (rest-and-digest) state.
evidence_tier: plausible_emerging
rationale: Thorough chewing initiates the cephalic phase of digestion and activates
  parasympathetic nerve signaling via the vagus nerve. While the specific claim about
  'chewing from both sides' is practitioner-level guidance rather than RCT-confirmed,
  the broader mechanism is biologically credible.
coaching_translation: Slowing down at meals and chewing your food well isn't just
  good for digestion — it actually sends a signal to your nervous system to shift
  out of stress mode.
caveats:
- Source is practitioner discussion, not primary literature.
- The 'chewing from both sides' specificity lacks direct RCT support; treat as plausible
  coaching guidance.
