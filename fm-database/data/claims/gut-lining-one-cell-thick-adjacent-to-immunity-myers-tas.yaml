slug: gut-lining-one-cell-thick-adjacent-to-immunity-myers-tas
statement: The gut epithelium is only one cell thick with the majority of the immune
  system just beyond it, so barrier integrity is inseparable from immune health.
evidence_tier: plausible_emerging
rationale: A single-cell-thick barrier separates gut contents from a large immune
  compartment; when it leaks, the immune system is directly provoked.
coaching_translation: The gut wall is one cell thin with much of your immune system
  right behind it — keeping that wall intact keeps immunity calm.
