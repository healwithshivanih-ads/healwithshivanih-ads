slug: sklar-mthfr-homocysteine-miscarriage
statement: Homozygous MTHFR C677T or compound heterozygous MTHFR variants impair folate-cycle
  methylation and tend to elevate plasma homocysteine, which increases prothrombotic
  risk and compromises placental blood flow, contributing to recurrent early pregnancy
  loss. Practical management is methylated folate (5-MTHF) rather than synthetic folic
  acid, plus B12, B6 and riboflavin to support the remethylation cycle, with homocysteine
  retested 8-12 weeks after starting.
