slug: prebiotic-fibre-diversity-feeds-probiotic-organisms
statement: Dietary prebiotic fibre feeds gut microorganisms; consuming at least 7
  different fibre varieties per meal maximises the diversity of probiotic organisms
  supported, as different fibres feed different microorganism species.
evidence_tier: plausible_emerging
rationale: The principle that dietary fibre diversity supports microbiome diversity
  is supported by emerging research (e.g. American Gut Project, Sonnenburg lab studies).
  The specific '7 varieties per meal' figure is a practitioner heuristic rather than
  an evidence-based threshold.
coaching_translation: Aim for at least 7 different types of fruit, vegetable, legume,
  nut, or seed fibre at each meal. Variety is more important than quantity — each
  different fibre feeds a different group of beneficial gut bacteria.
caveats:
- The '7 varieties per meal' threshold is a practitioner heuristic, not a peer-reviewed
  guideline.
- Source is a practitioner talk.
