  quote: A study in Italy showed just how effective magnesium supplementation can
    be for children with chronic or episodic tension-type headaches. Supplementation
    with 180 mg magnesium twice per day produced a symptom reduction of 87.5%, with
    100% of the patients experiencing at least a 50% reduction in symptoms.
