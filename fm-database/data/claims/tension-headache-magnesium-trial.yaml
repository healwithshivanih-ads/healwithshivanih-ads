slug: tension-headache-magnesium-trial
statement: In an Italian study of children with chronic or episodic tension-type headache,
  magnesium 180 mg twice daily produced symptom reduction of 87.5%, with 100% achieving
  at least 50% reduction and analgesic use dropping 65.4%. Adult dosing per Murray
  protocol — magnesium 150-250 mg (bound to aspartate, citrate, fumarate, malate,
  or succinate) 2-3 times per day.
evidence_tier: plausible_emerging
