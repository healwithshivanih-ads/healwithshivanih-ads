slug: cdg-inhibits-beta-glucuronidase-supports-estrogen-excretion
statement: Calcium D-glucarate inhibits gut beta-glucuronidase, reducing reabsorption
  of conjugated estrogen metabolites and supporting their excretion.
evidence_tier: plausible_emerging
rationale: Calcium D-glucarate is a natural compound found in fruits and vegetables
  that is metabolised to D-glucaric acid, which inhibits beta-glucuronidase. This
  reduces enterohepatic recirculation of estrogen. Animal studies and limited human
  data support this mechanism; large RCTs in endometriosis are lacking.
coaching_translation: Calcium D-glucarate blocks the gut enzyme that reabsorbs used
  estrogen, helping your body actually eliminate it rather than recycling it back
  into your bloodstream.
caveats:
- Evidence is primarily from animal studies and mechanistic data. Human RCTs in endometriosis
  are limited. Source is FM lecture synthesis.
- Timing of use is phase-2 estrogen detox, after gut stabilisation.
