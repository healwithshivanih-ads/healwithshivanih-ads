  quote: People will take NAD or high doses of CoQ10 and some of them feel worse.
    A lot of people with chronic illness will actually feel worse when they take things
    that really move their mitochondria because the ones that left begin to clean
    out the garbage. When you're sick, you don't have enough energy to get rid of
    the toxins.
rationale: Major coach intake red-flag rule — if client reports "crashing on NAD/CoQ10/red
  light," do NOT escalate dose; pull back and address load first.
