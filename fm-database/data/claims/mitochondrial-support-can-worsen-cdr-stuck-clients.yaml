slug: mitochondrial-support-can-worsen-cdr-stuck-clients
statement: Giving a chronic-illness client in stuck CDR a strong mitochondrial booster
  — high-dose NAD, CoQ10, alpha-lipoic acid — BEFORE addressing the underlying inflammatory
  insult often makes them WORSE. The mechanism — restored ATP production amplifies
  the existing danger signal and mobilises stored toxins ("garbage") that the depleted
  cells cannot process. Gordon's clinical sign — a chronic-illness client who reports
  crashing on NAD, CoQ10, or red-light therapy is not failing the supplement; they
  are signalling that the underlying load (mould, infection, toxin) must be addressed
  first. Coach action — start with safety signals and gentle load-reduction; introduce
  mitochondrial co-factors only after the noise is down, at tiny doses, increased
  very gradually.
