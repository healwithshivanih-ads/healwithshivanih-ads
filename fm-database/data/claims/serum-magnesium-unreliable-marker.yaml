slug: serum-magnesium-unreliable-marker
statement: Serum magnesium is an unreliable marker for total body magnesium status
  because only 1% of body magnesium is in the blood; RBC magnesium testing is a more
  accurate assessment.
evidence_tier: plausible_emerging
rationale: The intracellular distribution of magnesium (50% bone, ~49% intracellular,
  ~1% serum) is well-established. RBC magnesium as a superior marker is discussed
  in functional medicine and some research literature but is not standard clinical
  practice.
caveats:
- RBC magnesium testing is not universally available; clinician should guide testing
  decisions.
out_of_scope_notes: Lab interpretation is outside coaching scope. Coaches should encourage
  clients to discuss testing options with their clinician.
coaching_translation: A normal blood magnesium test doesn't mean your cells have enough.
  Ask your doctor about RBC magnesium testing for a more accurate picture.
