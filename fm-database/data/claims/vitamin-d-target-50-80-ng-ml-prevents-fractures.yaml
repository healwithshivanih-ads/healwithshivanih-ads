slug: vitamin-d-target-50-80-ng-ml-prevents-fractures
statement: Bone density correlates directly with serum 25(OH)D3 and inversely with
  fractures of all types — target 50-80 ng/mL via D3 2000-8000 IU/day (titrated to
  serum). Vitamin D receptor (VDR) polymorphisms substantially raise the required
  dose in some women.
evidence_tier: strong
rationale: Multiple meta-analyses (Bischoff-Ferrari, Holick) show fracture reduction
  at 25(OH)D ≥30 ng/mL, with additional benefit toward 50-80 ng/mL. Pizzorno emphasises
  VDR polymorphism testing for the high-need subgroup.
coaching_translation: Test vitamin D every 3-6 months when treating bone loss. Get
  blood levels into the 50-80 ng/mL range — for most women that means 2000-8000 IU
  of D3 a day. Some women have a vitamin D receptor variant and need much more.
caveats:
- Test 25(OH)D before high-dose supplementation.
- D3 (cholecalciferol) preferred over D2 (ergocalciferol).
- Pair with vitamin K2 (MK-7) to direct calcium into bone (not arteries).
- Calcium supplements without vitamin D/K2 raise CVD risk.
