slug: iron-deficiency-female-infertility
statement: Iron deficiency is the most common nutritional deficiency in women and
  a measurable cause of infertility. The Nurses Health Study II found women taking
  iron supplements had a 60% lower infertility risk. Coach should aim for ferritin
  70 to 80 ng/ml before conception — well above the typical lab "in-range" floor.
evidence_tier: strong
