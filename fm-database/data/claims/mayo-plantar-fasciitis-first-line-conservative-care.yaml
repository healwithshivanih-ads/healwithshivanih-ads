slug: mayo-plantar-fasciitis-first-line-conservative-care
statement: First-line care is calf and plantar fascia stretching twice daily, ice
  massage to the heel after activity, supportive shoes or arch supports, weight loss
  if BMI elevated, and modifying or reducing the aggravating activity (running, prolonged
  standing).
