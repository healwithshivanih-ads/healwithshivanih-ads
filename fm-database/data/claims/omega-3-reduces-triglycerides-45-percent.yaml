slug: omega-3-reduces-triglycerides-45-percent
statement: Omega-3 fatty acids at 4g/day (as evaluated in the Lavazza trial) produced a 45% reduction in triglycerides, with
  an expected transient LDL increase due to improved lipoprotein lipase receptor efficiency.
evidence_tier: strong
rationale: Referenced as an early trial with specific results. The mechanism (lipoprotein lipase receptor normalization) is
  well-established. The LDL rise is a known pharmacological consequence.
coaching_translation: High-dose omega-3 supplements are one of the most effective natural tools for lowering elevated blood
  fats (triglycerides). A slight rise in LDL is expected and not dangerous.
caveats:
- '''Lavazza trial'' name appears to be a transcription variant — likely the LOVAZA trial. Verify specific citation.'
- Source is lecture transcript — verify exact trial citation with primary literature.
