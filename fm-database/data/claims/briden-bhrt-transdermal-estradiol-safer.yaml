slug: briden-bhrt-transdermal-estradiol-safer
statement: Transdermal bioidentical estradiol (patch, gel, spray) is safer than oral
  estrogen because it enters the bloodstream directly and bypasses the liver — avoiding
  the first-pass production of clotting factors that drove the blood-clot and stroke
  signal seen with older oral conjugated equine estrogens (Premarin). Transdermal
  estradiol is the preferred route for menopause hormone therapy when symptoms warrant
  it.
evidence_tier: strong
rationale: Transdermal vs oral estrogen thrombosis risk differential is established
  (ESTHER study, meta-analyses). The WHI safety signal was largely attributable to
  oral CEE plus medroxyprogesterone; modern transdermal bioidentical regimens have
  a more favourable risk profile.
coaching_translation: When a client is discussing HRT options with their doctor, the
  route matters — patch, gel, or spray is generally safer than oral tablets. The progesterone
  partner should also be body-identical (Prometrium, Utrogestan) where possible.
