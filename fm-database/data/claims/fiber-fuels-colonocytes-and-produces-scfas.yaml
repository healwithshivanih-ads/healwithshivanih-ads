slug: fiber-fuels-colonocytes-and-produces-scfas
statement: Dietary fiber is fermented by colonocytes in the large intestine to produce
  short-chain fatty acids (butyrate, propionate, acetate), which support gut lining
  integrity, immune balance, metabolic health, and estrogen metabolism.
evidence_tier: strong
rationale: The fermentation of dietary fiber to SCFAs by colonic microbiota is well-established
  biochemistry with strong peer-reviewed support. The downstream roles of butyrate
  in gut barrier function and immune regulation are consensus-level findings.
coaching_translation: Fiber is the primary fuel for the cells lining your colon, and
  it's how your gut bacteria make the signaling molecules that regulate inflammation,
  blood sugar, and even estrogen detoxification.
caveats:
- Individual fiber tolerance varies widely; increases should be gradual (speaker recommends
  starting low and increasing slowly toward 25–30g/day target).
