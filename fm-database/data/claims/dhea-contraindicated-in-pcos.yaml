slug: dhea-contraindicated-in-pcos
statement: DHEA supplementation is contraindicated in PCOS and in women with hormone-sensitive
  cancers because it raises ovarian androgen levels, which would worsen the testosterone
  excess already driving PCOS pathophysiology. PCOS clients should not take DHEA even
  when struggling with conception.
