slug: dietary-portfolio-comparable-to-statins
statement: A dietary portfolio combining multiple cholesterol-lowering food components
  (soluble fiber, plant sterols, nuts, soy) achieves lipid-lowering effects comparable
  to statins for LDL-C and LDL-C particle size.
evidence_tier: strong
rationale: Jenkins et al. Portfolio Diet studies (JAMA 2003+) demonstrate statin-comparable
  LDL reduction with diet alone.
coaching_translation: A strategic combination of cholesterol-lowering foods can work
  as well as medication for many people — without the side effects.
