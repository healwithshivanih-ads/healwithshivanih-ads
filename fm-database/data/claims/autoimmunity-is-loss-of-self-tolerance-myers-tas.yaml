slug: autoimmunity-is-loss-of-self-tolerance-myers-tas
statement: Autoimmunity occurs when the immune system loses tolerance of self and
  attacks the body's own tissue — the thyroid in Hashimoto's, myelin in MS, muscle
  in polymyositis.
evidence_tier: plausible_emerging
rationale: Loss of self-tolerance, governed partly by thymic T-cell regulation, is
  the unifying event across autoimmune diseases.
coaching_translation: In autoimmunity the immune system mistakes part of your own
  body for an invader and attacks it.
