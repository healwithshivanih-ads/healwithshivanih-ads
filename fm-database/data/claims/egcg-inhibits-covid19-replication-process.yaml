slug: egcg-inhibits-covid19-replication-process
statement: EGCG from green tea (225 mg/day or 4 cups green tea/day) reduces inflammation,
  enhances immune function, and targets a process involved in COVID-19 replication.
evidence_tier: plausible_emerging
rationale: EGCG's anti-inflammatory and immune-modulating effects have clinical support
  (Matsumoto et al. 2011, BMC Complement Altern Med RCT for influenza prevention).
  COVID-19 replication inhibition is based on in silico and early mechanistic data.
  High-dose extracts carry hepatotoxicity risk per USP review.
coaching_translation: The active compound in green tea, called EGCG, may help your
  immune system and could interfere with how certain viruses replicate. Drinking 4
  cups of green tea daily is a safe way to benefit from this.
caveats:
- High-dose concentrated EGCG extracts (not standard green tea) carry hepatotoxicity
  risk.
- COVID-19 replication inhibition based on early in silico data.
- Standard green tea consumption (4 cups/day) is safe for most adults.
