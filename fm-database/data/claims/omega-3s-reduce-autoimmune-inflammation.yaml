slug: omega-3s-reduce-autoimmune-inflammation
statement: Omega-3 fatty acids have anti-inflammatory properties that may help reduce autoimmune activity in Hashimoto's thyroiditis.
evidence_tier: plausible_emerging
rationale: Omega-3 fatty acids (EPA/DHA) downregulate pro-inflammatory cytokines (TNF-α, IL-6, IL-1β) via eicosanoid modulation.
  While general anti-inflammatory effects are well-established, specific RCTs in Hashimoto's are limited.
coaching_translation: Including omega-3 rich foods (fatty fish, flaxseeds, chia seeds, walnuts) or a fish oil supplement can
  help dial down the inflammation driving your immune system to attack the thyroid.
