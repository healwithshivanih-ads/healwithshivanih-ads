  location: Chapter 77 — Migraine Headache, pg 1266-1268
  quote: Clinical studies have demonstrated that the detection and removal of allergenic
    or intolerable foods can eliminate or greatly reduce migraine symptoms in the
    majority of patients. Success rates range from 30 to 93%. Top offenders cow's
    milk, wheat, chocolate, egg, orange, benzoic acid, tomato, tartrazine, peanut,
    MSG.
