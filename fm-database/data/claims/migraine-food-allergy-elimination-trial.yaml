slug: migraine-food-allergy-elimination-trial
statement: 'Food allergy/intolerance is the most important precipitant in migraine.
  Elimination trials produce 30-93% success rates with most studies showing remarkably
  high improvement. Top offenders (in descending order): cow''s milk and dairy, wheat,
  chocolate, egg, orange, benzoic acid, tomato, tartrazine, peanut, MSG. Add histamine-
  releasing triggers — red wine, aged cheese, cured meats — especially in women, whose
  diamine oxidase activity is roughly half that of men.'
evidence_tier: strong
