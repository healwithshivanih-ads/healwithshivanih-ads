slug: niacinamide-3g-may-preserve-beta-cells-new-t1dm
statement: Niacinamide (nicotinamide) 25-50 mg/kg/day up to 3 g/day may prolong non-insulin-requiring
  remission in newly diagnosed T1DM, preserve beta-cell function (improved C-peptide),
  and in rare cases produce complete reversal — if started soon enough after onset.
evidence_tier: plausible_emerging
rationale: Pizzorno cites trial-level evidence (ENDIT and earlier studies). Mechanism
  — niacinamide inhibits PARP activation and cytokine-mediated beta-cell apoptosis.
  Window of opportunity is narrow (weeks to months post-diagnosis). Monitor liver
  enzymes every 3 months.
coaching_translation: For a newly-diagnosed type 1 diabetic, niacinamide at therapeutic
  dose may slow or even reverse the immune attack on the pancreas — but only if started
  early and only under medical supervision.
caveats:
- Window of opportunity is narrow (weeks to months from onset).
- Hepatotoxicity risk — monitor liver enzymes every 3 months.
- Use immediate-release; timed-release may not reach peak concentrations needed.
- Adjunct only — never a substitute for insulin replacement when needed.
