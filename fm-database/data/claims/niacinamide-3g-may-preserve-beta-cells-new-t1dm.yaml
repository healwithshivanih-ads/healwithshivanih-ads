  quote: A dose of 3 g niacinamide daily may prolong non-insulin-requiring remission,
    lower insulin requirements, improve metabolic control, and increase beta-cell
    function as determined by C-peptide secretion. Complete reversal in some patients
    makes its use worth the effort.
