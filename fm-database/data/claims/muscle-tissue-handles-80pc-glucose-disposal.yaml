- id: leaf-energy-blueprint-podcast-2026
  location: Podcast — muscle glucose disposal segment
  quote: Your muscle tissues are responsible for 80% of glucose disposal after eating.
    The bigger and more in use your muscles are — your cells are going to push glucose
    transporters to the cell surface voluntarily. Your body doesn't even need a big
    insulin response. The exact opposite happens when you're weak and frail.
rationale: Concrete justification for prescribing strength training to insulin-resistant
  clients — not for aesthetics, for the metabolic sink.
