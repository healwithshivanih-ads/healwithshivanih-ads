slug: saw-palmetto-inhibits-5-alpha-reductase-hair-loss
statement: Saw palmetto (Serenoa repens, 320 mg of extract standardised to 85-95%
  fatty acids and sterols, daily) inhibits 5-alpha-reductase and DHT receptor binding
  — the same mechanism as the prescription drug finasteride — reducing androgen-driven
  hair loss in female pattern alopecia.
evidence_tier: plausible_emerging
rationale: Pizzorno cites the mechanistic parallel to finasteride. Trials in female
  pattern hair loss are smaller than the BPH evidence base, but mechanism is well-characterised.
  Effect builds over 4-6 months.
coaching_translation: Saw palmetto at 320 mg of the standardised extract daily works
  the same way as the prescription hair-loss drug finasteride — by blocking the enzyme
  that converts testosterone to its hair-attacking form. Slower to work but fewer
  side effects.
caveats:
- 4-6 months minimum to assess response.
- Avoid in pregnancy, lactation, hormone-sensitive cancers.
- Caution with hormone therapy and anti-androgens.
- Combine with iron / zinc / vitamin A / EFAs if deficient.
