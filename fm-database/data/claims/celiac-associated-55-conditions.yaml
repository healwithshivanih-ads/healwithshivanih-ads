slug: celiac-associated-55-conditions
statement: Celiac disease and gluten sensitivity are linked to 55 health conditions
  including all major autoimmune diseases, IBD, migraines, epilepsy, osteoporosis,
  and non-Hodgkin lymphoma, with a 39% increased risk of death compared with controls.
evidence_tier: strong
rationale: Epidemiological data from large cohort studies documented in the textbook;
  the mortality risk is highest in those with gut inflammation related to gluten (72%
  increased risk).
coaching_translation: Undiagnosed or poorly managed celiac disease significantly raises
  the risk of many serious conditions — this is why thorough testing and strict adherence
  matters deeply.
