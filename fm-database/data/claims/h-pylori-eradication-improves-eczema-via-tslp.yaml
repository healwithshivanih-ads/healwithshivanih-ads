slug: h-pylori-eradication-improves-eczema-via-tslp
statement: Helicobacter pylori antibody is positive in 70% of atopic dermatitis patients
  — H. pylori directly stimulates epidermal cells to secrete TSLP (thymic stromal
  lymphopoietin), the cytokine that drives Th2 commitment and allergic inflammation.
  Eradication of H. pylori produces partial improvement in atopic dermatitis.
evidence_tier: plausible_emerging
rationale: Pizzorno cites the 70% H. pylori antibody prevalence and the TSLP-stimulation
  mechanism. Provides a treatable target in many eczema patients not previously screened
  for H. pylori.
coaching_translation: Most adults with eczema have H. pylori antibodies. The bacterium
  directly drives a skin cytokine (TSLP) that fuels the allergic inflammation. H.
  pylori testing and eradication is part of a thorough eczema workup, especially when
  GI symptoms coexist.
caveats:
- Urea breath test or stool antigen for diagnosis.
- Natural eradication — bismuth, mastic gum, DGL, garlic, broccoli sprouts.
- Conventional triple therapy if natural fails.
- Pair with food-allergen elimination and barrier-repair.
