slug: nac-breaks-candida-biofilms
statement: N-Acetyl Cysteine (NAC) disrupts Candida biofilms and boosts glutathione,
  supporting both antifungal activity and liver detoxification.
evidence_tier: plausible_emerging
rationale: NAC's biofilm-disrupting activity against Candida has in vitro support.
  Glutathione-boosting effects are well-established. Clinical applicability in oral
  supplementation for gut Candida is FM-emerging.
coaching_translation: NAC helps break down the protective shell that Candida builds
  around itself, making it easier to clear — and it also supports your liver's detox
  capacity.
caveats:
- 600-1200mg/day range is therapeutic — clinician guidance needed. Source is educational
  synthesis.
