sources:
- id: fett-it-starts-with-the-egg-2019
  location: Chapter 8 — Restoring Ovulation with Myo-Inositol, pg 119
  quote: Women with PCOS who were given D-chiro inositol rather than a placebo had
    fewer eggs and fewer good-quality embryos. PCOS may involve overactive conversion
    of myo-inositol into D-chiro inositol, depleting normal levels of myo-inositol.
rationale: Counter to marketing claims — D-chiro inositol blends are widely sold for
  PCOS fertility.
