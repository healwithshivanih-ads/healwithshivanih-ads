slug: d-chiro-inositol-may-harm-egg-quality-in-pcos
statement: D-chiro inositol, often marketed as a PCOS fertility supplement alongside
  myo-inositol, may actually reduce egg numbers and embryo quality and should generally
  be avoided in PCOS. The current understanding is that PCOS involves overactive conversion
  of myo-inositol to D-chiro inositol, so supplementing further D-chiro worsens the
  imbalance.
evidence_tier: plausible_emerging
linked_to_topics:
- pcos-fertility
