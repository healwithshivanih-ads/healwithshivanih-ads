slug: mindpump-sherr-methylene-blue-usp-grade-sourcing-warning
statement: 'Methylene blue sold on Amazon and many DTC supplement sites is frequently
  contaminated with heavy metals (lead, mercury, cadmium, arsenic) from industrial-grade
  or aquarium-grade manufacturing processes, even when the label claims USP pharmaceutical
  grade. Sherr''s company tested products from multiple suppliers that carried a USP
  certificate of analysis from the manufacturer but failed independent re-testing
  — and liquid drop preparations were the worst offenders, with actual potency drifting
  far below label dose. Practical guidance for clients self-supplementing: avoid liquid
  drops where dose-per-drop is unverified, avoid Amazon listings, look for vendors
  who re-test every batch in-house rather than trusting the upstream certificate,
  and never buy aquarium-cleaner methylene blue regardless of price.'
rationale: Sourcing/quality-control angle is critical for India context where Amazon
  is the default supplement channel; specific failure modes (label USP without real
  USP, liquid drop potency drift, aquarium-grade contamination) are actionable.
