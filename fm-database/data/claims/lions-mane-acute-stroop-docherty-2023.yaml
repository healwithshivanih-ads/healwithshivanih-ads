slug: lions-mane-acute-stroop-docherty-2023
statement: A pilot DB-RCT (n=41 healthy adults aged 18–45) found that a single 1.8
  g dose of Hericium erinaceus accelerated Stroop-task performance at 60 minutes post-dose
  (p=0.005); 28-day supplementation showed a trend toward reduced subjective stress
  (p=0.051).
evidence_tier: fm_specific_thin
rationale: Pilot study, healthy non-elderly cohort, n=41 — small sample. Authors explicitly
  urge cautious interpretation. Useful only as preliminary signal for acute cognitive
  effect outside the MCI/elderly demographic.
coaching_translation: Early evidence suggests lion's mane may have an acute cognitive-speed
  effect in healthy younger adults too — but the sample size is small and this finding
  needs replication before it changes practice.
caveats:
- Pilot — small sample
- Trend (not significant) on chronic stress outcome
- Acute effect on a single attention test only
