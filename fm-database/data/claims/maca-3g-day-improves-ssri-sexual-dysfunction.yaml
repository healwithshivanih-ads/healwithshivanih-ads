slug: maca-3g-day-improves-ssri-sexual-dysfunction
statement: In a double-blind randomized pilot trial of 20 remitted depressed outpatients
  (17 women) with SSRI-induced sexual dysfunction, maca at 3.0 g/day significantly
  improved ASEX and MGH-SFQ scores while 1.5 g/day did not, suggesting a dose-related
  benefit. Maca was well tolerated and no SSRI interaction signal emerged.
evidence_tier: strong
