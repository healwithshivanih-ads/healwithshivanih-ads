sources:
- id: vitaone-ldn-article
  location: Preliminary Research Abounds for cancer and autoimmune disease
  quote: A study published online in the Cochrane Library in February 2014 discusses
    using low-dose naltrexone to induce remission in Crohn's Disease. Although the
    authors conclude there is insufficient evidence to recommend and further research
    is needed, data from one small study suggests that LDN may provide a benefit in
    clinical and endoscopic response in adult patients with active Crohn's disease.
