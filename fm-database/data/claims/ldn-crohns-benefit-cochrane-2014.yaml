slug: ldn-crohns-benefit-cochrane-2014
statement: Data from one small study suggests LDN may provide a benefit in clinical
  and endoscopic response in adult patients with active Crohn's disease, though evidence
  is currently insufficient to recommend its use.
evidence_tier: plausible_emerging
rationale: Directly cited to Cochrane Library, February 2014. Authors themselves concluded
  insufficient evidence; signal of benefit with acceptable safety profile noted.
coaching_translation: Early research hints that LDN may help with Crohn's symptoms
  and gut healing — but the evidence isn't strong enough yet for a definitive recommendation.
caveats:
- Cochrane 2014 explicitly concluded 'insufficient evidence to recommend.' Small study
  sample sizes.
- Further research is needed.
