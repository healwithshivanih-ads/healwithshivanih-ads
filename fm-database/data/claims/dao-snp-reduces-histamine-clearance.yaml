slug: dao-snp-reduces-histamine-clearance
statement: DAO gene variants (SNPs) reduce diamine oxidase enzyme activity in the
  gut, lowering the threshold at which dietary histamine triggers symptoms — but actual
  symptoms require multiple cofactors including gut barrier integrity, microbiome
  balance, and histamine load.
evidence_tier: plausible_emerging
rationale: AOC1 gene SNPs reducing DAO activity are documented in the literature.
  The multi-factorial model (genetic variant + gut integrity + microbiome + histamine
  load) is clinically reasonable and better reflects real patient variability than
  single-gene determinism. Source is a consumer book.
coaching_translation: Having a DAO variant means you have a lower tolerance for histamine,
  but it doesn't mean you'll always have problems. Keeping your gut healthy, your
  diet low in histamine triggers, and your stress managed can dramatically change
  your day-to-day experience.
caveats:
- DAO SNP testing is not standardised; functional DAO activity testing (plasma DAO
  enzyme activity) is more clinically meaningful
- Symptom expression is highly variable and context-dependent
- Source is a consumer book, not primary literature
