slug: hairfall-should-be-personalized-by-root-cause
statement: Hairfall supplementation should be personalized based on nutritional, hormonal,
  stress-related, or autoimmune root cause.
evidence_tier: fm_specific_thin
rationale: Root-cause personalization for hairfall is FM-specific clinical practice
  without strong RCT evidence but is biologically reasonable given heterogeneous causes
  of hair loss.
coaching_translation: 'Before recommending hair supplements, encourage a root-cause
  assessment: get ferritin, B12, zinc, folate, biotin, TSH, and hormonal labs first.'
