slug: genes-guide-which-biomarkers-to-track
statement: 'A genetic picture points to which functional biomarkers are worth a clinician''s
  follow-up: micronutrients/B vitamins, hsCRP (inflammation), homocysteine (methylation),
  HbA1c and fasting insulin (glucose), a hormone-balance panel, and — where a clotting
  decision is in play — PT/INR.'
evidence_tier: plausible_emerging
rationale: Use the genetic areas of impact to suggest what a client might discuss
  testing with their provider; never order labs yourself.
coaching_translation: Use the genetic areas of impact to suggest what a client might
  discuss testing with their provider; never order labs yourself.
out_of_scope_notes: Ordering and interpreting labs is a clinician function.
