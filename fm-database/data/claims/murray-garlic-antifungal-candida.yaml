slug: murray-garlic-antifungal-candida
statement: Garlic (Allium sativum) demonstrates antifungal activity against C. albicans
  more potent than nystatin, gentian violet, and six other antifungal agents in head-to-head
  in vitro studies. Allicin is the active sulfur-containing compound; for therapeutic
  effect, products must deliver ≥4,000 mcg allicin potential (or 10 mg alliin) daily.
  Fresh crushed garlic (allowed to sit 10 minutes before cooking) releases active
  allicin and is dietary equivalent.
evidence_tier: plausible_emerging
rationale: Multiple in vitro studies; clinical RCTs in oral candidiasis. Mechanism
  — allicin disrupts fungal cell membrane lipid bilayer + inhibits ergosterol synthesis
  (same target as azole drugs).
coaching_translation: Garlic was more effective against candida than nystatin and
  7 other antifungals in lab studies. Use standardised allicin-yielding extract (≥4,000
  mcg allicin potential) or 3-5 fresh crushed cloves daily. Crush + wait 10 minutes
  before eating/cooking to maximise allicin release.
caveats:
- Mild antiplatelet effect; pause before surgery
- Strong odour
- Aged garlic extract loses allicin but retains other benefits
