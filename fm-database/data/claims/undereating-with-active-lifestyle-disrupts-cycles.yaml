slug: undereating-with-active-lifestyle-disrupts-cycles
statement: Women who exercise regularly (lifting, running, hiking) but do not deliberately
  scale protein and total caloric intake develop shorter luteal phases, more PMS,
  lower energy, and lighter periods within a few cycles. Cycle tracking detects this
  rapidly. Adding a protein-and-fat-anchored breakfast (rather than oatmeal-only)
  is a first-line correction for unintentional underfueling.
