slug: nhs-otitis-externa-ear-infection-red-flag-systemic-or-vulnerable
statement: Get urgent GP or NHS 111 help for ear infection with fever, swelling around
  the ear, fluid leaking from the ear, new hearing loss, dizziness, vomiting, severe
  sore throat, or in anyone with diabetes, heart/lung/kidney/neurological disease
  or immunosuppression.
