slug: coconut-oil-vaginal-use-caution-alkalinity
statement: Coconut oil used vaginally should be approached with caution as it may
  raise vaginal pH and disrupt the vaginal microbiome.
evidence_tier: fm_specific_thin
rationale: The vaginal environment relies on an acidic pH (3.8–4.5) maintained by
  Lactobacillus-produced lactic acid. Oils that are alkaline or alter pH may reduce
  the protective acidity, potentially promoting dysbiosis. Specific evidence for coconut
  oil's effect on vaginal pH is limited but the mechanism is biologically plausible.
coaching_translation: If a client is using coconut oil vaginally for dryness or irritation,
  flag that it could actually disrupt the vaginal microbiome by altering its natural
  acidity — caution is warranted.
