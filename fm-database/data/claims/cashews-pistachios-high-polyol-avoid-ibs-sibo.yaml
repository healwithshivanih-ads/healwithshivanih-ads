slug: cashews-pistachios-high-polyol-avoid-ibs-sibo
statement: Cashews and pistachios have high polyol content and should be avoided in
  IBS and SIBO; almonds are tolerable at ≤10 nuts per serving.
evidence_tier: plausible_emerging
rationale: 'Consistent with Monash FODMAP data: cashews and pistachios are high in
  GOS and polyols. Almond serving-size guidance reflects FODMAP threshold research.'
coaching_translation: Stick to walnuts, chia, flaxseed, or up to 10 almonds at a time.
  Save cashews and pistachios for after your reintroduction phase.
caveats:
- FODMAP content is serving-size dependent; small quantities may be tolerable for
  some individuals.
