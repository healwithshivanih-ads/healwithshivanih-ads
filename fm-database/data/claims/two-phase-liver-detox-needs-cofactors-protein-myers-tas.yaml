slug: two-phase-liver-detox-needs-cofactors-protein-myers-tas
statement: Liver detoxification is a two-phase process; phase 1 creates reactive intermediates
  that phase 2 must conjugate for excretion, so stalling in phase 1 is worse than
  not detoxing, and the process needs protein and nutrient cofactors.
evidence_tier: plausible_emerging
rationale: Balanced phase 1/phase 2 flow requires B vitamins, amino acids, and antioxidants;
  incomplete conjugation leaves toxic intermediates circulating.
coaching_translation: Detox happens in two steps — the body needs the right nutrients
  and enough protein to finish the job safely.
