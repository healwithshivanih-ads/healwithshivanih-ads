slug: high-mercury-fish-toxic-to-nervous-digestive-immune
statement: Mercury in certain fish (shark, swordfish, king mackerel, tilefish, etc.)
  can be toxic to the nervous, digestive, and immune systems.
evidence_tier: strong
rationale: Well-established toxicology; consistent with EPA and FDA fish consumption
  advisories. Document references EPA guidelines.
coaching_translation: Some fish are best avoided or strictly limited due to high mercury
  content — especially for children, pregnant women, and those with high fish intake.
caveats:
- Pregnant women, children, and elderly are the highest-risk groups — refer to clinician/dietitian
  for personalized guidance.
