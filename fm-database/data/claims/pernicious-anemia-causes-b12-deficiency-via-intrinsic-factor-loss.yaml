slug: pernicious-anemia-causes-b12-deficiency-via-intrinsic-factor-loss
statement: Pernicious anemia is an autoimmune condition in which immune cells attack
  gastric parietal cells, abolishing intrinsic factor and HCl production and thereby
  blocking vitamin B12 absorption.
evidence_tier: strong
rationale: Pernicious anemia as an autoimmune gastritis causing intrinsic factor deficiency
  and B12 malabsorption is well-established medical knowledge, accurately described
  in the document.
coaching_translation: Clients with pernicious anemia cannot absorb B12 through the
  normal GI route — they require medical management (e.g. B12 injections). This is
  outside coaching scope.
out_of_scope_notes: Diagnosis and treatment of pernicious anemia (including B12 injection
  protocols) is clinical.
