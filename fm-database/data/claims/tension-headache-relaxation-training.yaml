slug: tension-headache-relaxation-training
statement: Progressive relaxation training is effective for chronic tension headache.
  In a school-based study of children aged 10-15 with chronic tension headache, nurse-administered
  relaxation training produced at least 50% headache reduction in 69% of children
  at six weeks and 73% at six months, vs 8% and 27% in controls. Chiropractic and
  physical therapy (posture education, home exercise, cervical stretching) also reduce
  frequency and severity.
