slug: deficiency-symptoms-precede-lab-detection
statement: Symptoms of nutritional deficiency often appear years before the deficiency
  becomes detectable on standard blood panels.
evidence_tier: plausible_emerging
rationale: Functional tissue depletion can occur while serum/plasma markers remain
  within reference ranges — particularly for B12 (serum B12 is an insensitive marker;
  methylmalonic acid and homocysteine detect earlier depletion), iron (ferritin in
  inflammation), and magnesium (serum magnesium reflects <1% of body stores).
coaching_translation: Your symptoms may be real even when your blood tests look 'normal.'
  Some nutrients can be low inside your cells long before a standard blood test picks
  it up.
caveats:
- This is a general FM clinical principle; the specific timeline ('years') is not
  consistently evidenced for all nutrients.
- Source is Instagram educational content.
