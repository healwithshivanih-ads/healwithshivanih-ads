slug: acv-supports-gastric-acid-when-taken-with-food
statement: Diluted apple cider vinegar taken with meals (not on an empty stomach)
  may support gastric acid activity and digestion in individuals with mild hypochlorhydria.
evidence_tier: fm_specific_thin
rationale: Biologically plausible given apple cider vinegar's acetic acid content
  contributing to gastric acidification. Widely used in FM practice. No controlled
  trials in hypochlorhydria specifically. Source is expert consensus.
coaching_translation: If Betaine HCL isn't accessible, diluting a small amount of
  apple cider vinegar in water and taking it with meals — not first thing in the morning
  — may help your stomach break down food more effectively.
caveats:
- Must be diluted to avoid oesophageal irritation.
- Not equivalent to Betaine HCL in clinical protocols.
- Evidence is largely anecdotal.
