slug: dietary-magnesium-declined-since-1980s
statement: Dietary magnesium intake has declined significantly since the 1980s, from
  approximately 500 mg/day to less than 180 mg/day or lower in the current generation.
evidence_tier: plausible_emerging
rationale: Soil depletion, food processing, and modern agricultural practices are
  well-documented contributors to micronutrient decline in food. Specific figures
  cited in the lecture are plausible but sourced from expert consensus, not a specific
  RCT.
caveats:
- Source is expert consensus lecture, not primary literature; specific mg figures
  should be verified with published dietary surveys.
coaching_translation: The food we eat today has far less magnesium than it did a few
  decades ago, meaning even a 'healthy' diet may leave you deficient.
