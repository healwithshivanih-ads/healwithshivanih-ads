slug: abdominal-adiposity-raises-cvs-risk
statement: Abdominal circumference ≥102 cm (male) / ≥88 cm (female) and waist/hip
  ratio ≥0.90 (male) / ≥0.85 (female) are modifiable cardiovascular risk factors.
evidence_tier: strong
rationale: These anthropometric thresholds are established criteria for central obesity
  used in the IDF and NCEP ATP III metabolic syndrome definitions, with strong epidemiological
  support for CVD risk.
coaching_translation: Where you carry your weight matters — excess fat around your
  waist is a direct heart risk factor, even more so than overall weight.
