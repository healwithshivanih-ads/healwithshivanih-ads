slug: algae-oil-is-vegan-alternative-to-fish-oil
statement: Omega-3 oil derived from marine microalgae (Schizochytrium species) can
  completely replace fish oil as an EPA/DHA source for vegans.
evidence_tier: plausible_emerging
rationale: Stated in the lecture as a dietary alternative. Microalgae are the primary
  producers of omega-3 fatty acids in the marine food chain and are a biologically
  sound source of DHA and EPA. Supporting evidence exists but is less extensive than
  for fish oil.
coaching_translation: If you don't eat fish, algae-based omega-3 supplements are a
  clean, sustainable, and effective way to get your EPA and DHA.
caveats:
- EPA content in algae supplements varies by brand — check label.
- Evidence base for algae oil is smaller than for fish oil.
