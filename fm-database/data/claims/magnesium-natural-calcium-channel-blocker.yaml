slug: magnesium-natural-calcium-channel-blocker
statement: Magnesium acts as a natural calcium channel blocker, promoting vascular
  relaxation and reducing blood pressure similarly to pharmacological calcium channel
  blockers.
evidence_tier: strong
rationale: The calcium channel blocking mechanism of magnesium is well-established
  in physiology; clinical evidence supports magnesium's blood-pressure-lowering effects
  in several meta-analyses of RCTs.
coaching_translation: Magnesium naturally relaxes blood vessels, which is why ensuring
  adequate levels can support healthy blood pressure.
