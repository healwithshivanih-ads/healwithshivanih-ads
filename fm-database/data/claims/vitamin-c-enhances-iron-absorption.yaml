slug: vitamin-c-enhances-iron-absorption
statement: Co-ingestion of vitamin C with iron supplements or iron-rich meals significantly
  enhances non-haem iron absorption by reducing ferric iron (Fe3+) to the more soluble
  ferrous form (Fe2+).
evidence_tier: strong
rationale: Well-established nutritional biochemistry supported by multiple RCTs and
  systematic reviews. Vitamin C (ascorbic acid) is a recognised enhancer of non-haem
  iron absorption and is recommended in clinical guidelines for iron deficiency.
coaching_translation: Eating vitamin C-rich foods (like citrus, bell peppers, or kiwi)
  alongside iron-rich meals or taking a vitamin C supplement with your iron pill can
  significantly boost how much iron your body absorbs.
caveats:
- Effect size is greatest for non-haem iron; haem iron absorption is less affected.
- May not overcome severe hepcidin-mediated blocks in inflammatory states.
