sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 80 — Osteoarthritis, pg 1315-1316
  quote: Meriva has been used in two studies of patients with osteoarthritis. 50 patients
    were given 1,000 mg Meriva (providing 200 mg curcumin) for three months, after
    which symptom scores decreased by 58 percent, walking distance in the treadmill
    test was prolonged from 76 meters to 332 meters, and the level of an inflammatory
    marker (CRP) in the blood decreased from 168 to 11.3 mg/l. Studies with another
    advanced form of curcumin, Theracurmin, show even better absorption (27 times
    greater than regular curcumin).
