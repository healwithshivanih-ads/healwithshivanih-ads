slug: murray-oa-curcumin-meriva
statement: High-absorption curcumin formulations (Meriva phosphatidylcholine complex
  at 1,000 mg providing 200 mg curcumin daily or Theracurmin) reduce osteoarthritis
  symptom scores by ~58 percent, prolong treadmill walking distance from 76 m to 332
  m, and lower CRP from 168 to 11.3 mg/L over 3 to 8 months. Plain curcumin has poor
  absorption — formulation matters.
evidence_tier: plausible_emerging
