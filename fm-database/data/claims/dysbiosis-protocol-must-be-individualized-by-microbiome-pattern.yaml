slug: dysbiosis-protocol-must-be-individualized-by-microbiome-pattern
statement: Gut dysbiosis protocols must be individualized for each patient based on
  their specific microbiome pattern (deficiency, overgrowth, or imbalanced ratio),
  as a single universal protocol is not appropriate.
evidence_tier: plausible_emerging
rationale: The lecturer describes four distinct microbiome patterns with different
  therapeutic implications — demonstrating that a one-size-fits-all approach risks
  worsening symptoms (e.g., giving probiotics in overgrowth). This reflects FM's core
  individualized approach, supported by emerging microbiome science.
coaching_translation: Every client's gut is different. The right protocol depends
  on their test results and clinical pattern — always defer to the clinician for protocol
  design.
caveats:
- Source is expert lecture, moderate quality.
- Pattern identification requires GI-MAP or equivalent testing — clinician scope.
- Coaches can support protocol adherence and lifestyle components.
