slug: magnesium-supports-atp-and-smooth-muscle-relaxation
statement: Magnesium is a cofactor for more than 300 enzymes and is central to ATP production, energy metabolism, and smooth
  muscle relaxation.
evidence_tier: plausible_emerging
rationale: Magnesium's enzymatic roles in ATP synthesis and muscle relaxation are among the best-established functions of
  a mineral in human physiology.
coaching_translation: Magnesium-rich foods (leafy greens, nuts, seeds, legumes) and appropriate forms of supplementation support
  energy, muscle function, and stress resilience.
