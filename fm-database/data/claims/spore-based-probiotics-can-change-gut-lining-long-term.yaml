slug: spore-based-probiotics-can-change-gut-lining-long-term
statement: Spore-based probiotics, taken for 6–9 months, can promote lasting changes to gut flora and the gut lining, unlike
  standard probiotic strains.
evidence_tier: plausible_emerging
rationale: Spore-based bacteria (e.g., Bacillus species) are more resistant to stomach acid and can survive transit to colonize
  the gut, reactivating in favorable conditions. Long-term use is proposed to produce more durable microbiome changes. Early
  research is supportive but not yet consensus.
coaching_translation: If a client needs long-term gut flora support, spore-based probiotics are the preferred recommendation
  — but results take months, not days.
caveats:
- Source is expert lecture, moderate quality.
- Specific studies not cited. Verify with clinician for individual cases.
- Source document also notes spore-based probiotics are not suitable for home fermentation due to low CFU counts.
