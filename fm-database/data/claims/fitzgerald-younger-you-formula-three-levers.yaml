slug: fitzgerald-younger-you-formula-three-levers
statement: The Younger You formula is methyl donors + DNA methylation adaptogens +
  lifestyle. Methyl donors supply the raw material for methylation; adaptogens direct
  methylation to the right genes; and the lifestyle levers (sleep, exercise, relaxation,
  toxin reduction) independently shift DNA methylation age.
