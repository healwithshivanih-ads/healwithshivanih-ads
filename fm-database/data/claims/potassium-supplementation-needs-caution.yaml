slug: potassium-supplementation-needs-caution
statement: Potassium supplementation requires caution due to hyperkalemia risk.
evidence_tier: confirm_with_clinician
rationale: Hyperkalemia risk from potassium supplementation, particularly in renal impairment or with ACE inhibitors, is well-documented.
out_of_scope_notes: Potassium supplementation beyond dietary food sources requires clinician oversight.
caveats:
- Source is a practitioner cheatsheet without primary citations.
- Risk is highest in kidney disease and with certain medications.
- Never recommend potassium supplementation without clinician guidance, especially in renal disease or with ACE inhibitors/diuretics.
