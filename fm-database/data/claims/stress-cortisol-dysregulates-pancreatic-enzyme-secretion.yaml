slug: stress-cortisol-dysregulates-pancreatic-enzyme-secretion
statement: Chronic stress and associated cortisol elevation can dysregulate pancreatic
  enzyme secretion.
evidence_tier: fm_specific_thin
rationale: The document asserts stress increases cortisol and affects pancreatic enzyme
  production. While cortisol and autonomic nervous system activity are known to modulate
  pancreatic function, the specific clinical claim is thinly supported in peer-reviewed
  literature and mechanistic detail is limited in this source.
coaching_translation: Chronic stress may interfere with your digestive enzyme production
  via cortisol. Stress-management practices can be a useful part of supporting gut
  health.
linked_to_topics:
- pancreatic-insufficiency
caveats:
- The source statement is ambiguous — it is unclear whether the lecture intends that
  stress increases or decreases net functional enzyme output. Interpret with caution.
- Source is an expert consensus lecture with thin peer-reviewed backing for this specific
  claim.
