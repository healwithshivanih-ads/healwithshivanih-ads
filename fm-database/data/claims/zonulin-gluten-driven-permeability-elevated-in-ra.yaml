slug: zonulin-gluten-driven-permeability-elevated-in-ra
statement: RA is one of the autoimmune diseases associated with elevated blood zonulin
  levels; gliadin from wheat triggers zonulin release that opens tight junctions for
  ~1-3 hours depending on haptoglobin genotype.
evidence_tier: plausible_emerging
rationale: Alessio Fasano's zonulin work and Pizzorno's review establish the gliadin
  → zonulin → tight junction opening pathway. RA-specific zonulin elevation studies
  exist but are modest; mechanism is well-characterised.
coaching_translation: Gluten doesn't just affect celiacs. In RA, wheat triggers a
  hormone (zonulin) that loosens the gut lining for 1-3 hours each meal — long enough
  for food and bacterial proteins to leak in and aggravate joint inflammation.
caveats:
- Haptoglobin 2/2 genotype releases more zonulin and keeps gut open ~3 hours; 1/2
  type ~1 hour.
- Strict gluten-free trial (wheat, rye, barley) is the test; serum zonulin can guide.
- Effect is additive with other food sensitivities and microbial drivers.
