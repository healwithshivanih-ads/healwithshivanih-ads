slug: organic-food-reduces-gene-workload
statement: Organically grown produce contains lower pesticide residues than conventionally
  grown produce, reducing the detoxification burden on GST/GPX and related gene pathways.
evidence_tier: plausible_emerging
rationale: Multiple systematic reviews confirm lower organophosphate residues on organic
  produce. The link to specifically reducing genetic/enzymatic detox burden is biologically
  plausible but not directly RCT-confirmed.
coaching_translation: Prioritize organic for the EWG Dirty Dozen list (strawberries,
  apples, spinach, kale, etc.). Conventional 'Clean Fifteen' produce is lower risk.
caveats:
- Direct evidence linking organic consumption to improved GST/GPX function is lacking
- Consumer book framing
