slug: sklar-low-amh-amh-measures-recruitment-not-total
statement: AMH (anti-Mullerian hormone) reflects how many antral follicles your ovaries
  are recruiting in the current cycle and helps clinicians titrate IVF stimulation
  dosing — it is not a measure of total remaining ovarian reserve and does not predict
  the quality of any individual egg.
