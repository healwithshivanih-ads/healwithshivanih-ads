slug: loneliness-activates-inflammatory-pathways
statement: Chronic social disconnection activates pro-inflammatory pathways (IL-6,
  TNF-α, CRP) via HPA axis and sympathetic nervous system overdrive, mirroring the
  inflammatory response to infection or physical injury.
evidence_tier: plausible_emerging
rationale: Supported by psychoneuroimmunology research including fMRI overlap of social
  pain and physical pain in ACC/insula. Document references this but does not cite
  specific authors/studies.
coaching_translation: Loneliness is a physical health risk factor, not just an emotional
  one. Community and connection are part of your anti-inflammatory protocol.
caveats:
- Document cites fMRI evidence conceptually but does not name specific studies — treat
  as plausible_emerging.
- Individual variability is significant.
