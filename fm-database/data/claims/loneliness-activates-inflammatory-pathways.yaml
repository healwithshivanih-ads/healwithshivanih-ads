slug: loneliness-activates-inflammatory-pathways
statement: Chronic social disconnection is described as activating inflammatory pathways
  triggered by infection, injury, or metabolic stress.
evidence_tier: plausible_emerging
rationale: The link between loneliness and inflammatory cytokine activation has credible
  peer-reviewed support (Cacioppo, Cole). Source is expert consensus without primary
  citations.
coaching_translation: Community connection, group activities, volunteering, and social
  prescribing are coaching tools for inflammatory health.
caveats:
- Document cites fMRI evidence conceptually but does not name specific studies — treat
  as plausible_emerging.
- Individual variability is significant.
- Source is expert consensus without direct citations.
