slug: prayer-modulates-cytokines-reduces-inflammation
statement: Studies show that prayer and meditation can modulate cytokines and reduce
  inflammatory markers including IL-6 and CRP.
evidence_tier: fm_specific_thin
rationale: Some studies support meditation reducing IL-6 and CRP (e.g., mindfulness-based
  stress reduction trials), but direct evidence specifically for prayer on cytokine
  modulation is limited and methodologically varied.
coaching_translation: Calm, focused spiritual or reflective practice may have real
  anti-inflammatory effects in your body—not just in your mind.
caveats:
- Evidence base is stronger for meditation than prayer specifically.
- Not a replacement for anti-inflammatory medical treatment.
- Source is educational synthesis with no direct citations.
