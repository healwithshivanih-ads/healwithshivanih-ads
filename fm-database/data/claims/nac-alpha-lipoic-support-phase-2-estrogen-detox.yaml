slug: nac-alpha-lipoic-support-phase-2-estrogen-detox
statement: NAC and alpha-lipoic acid support phase 2 liver detoxification pathways
  (sulfation and glutathione conjugation) relevant to estrogen clearance.
evidence_tier: plausible_emerging
rationale: NAC is a precursor to glutathione and supports the sulfation detoxification
  pathway. Alpha-lipoic acid is a cofactor in mitochondrial enzyme complexes and recycles
  antioxidants including glutathione. Both support phase 2 liver detoxification, which
  includes estrogen conjugation for excretion. Evidence is primarily mechanistic and
  from small trials.
coaching_translation: NAC and alpha-lipoic acid give your liver what it needs to package
  up and eliminate estrogen and other hormones. They are antioxidants that support
  your body's detox pathways.
caveats:
- Source is FM lecture synthesis. Clinical RCT evidence specifically for estrogen
  detoxification with these supplements is limited.
- NAC may cause reactions in sulfur-sensitive individuals (skin rashes, itching) —
  monitor carefully.
- Dosing requires clinician guidance.
