slug: citrate-supplements-prevent-recurrent-kidney-stones
statement: Citrate supplementation (potassium citrate or dietary citrate from blackcurrant
  juice) inhibits aggregation and growth of calcium oxalate and calcium phosphate
  crystals and is first-line prophylaxis for recurrent stone formers.
evidence_tier: strong
rationale: Mechanistically — citrate binds urinary calcium reducing oxalate-binding
  partner and raises urinary pH, both reducing crystal nucleation. Multiple RCTs and
  meta-analyses support citrate's role in stone prevention.
coaching_translation: Citrate is your body's natural kidney-stone preventive. Supplementing
  with potassium citrate, or eating citrate-rich foods like lemon and blackcurrant
  juice, helps stop new stones from forming.
caveats:
- Avoid grapefruit juice — paradoxically increases stone risk 44% in women.
- Potassium citrate caution with potassium-sparing diuretics, ACE inhibitors, renal
  insufficiency.
- Lemonade studies mixed — likely the sugar content offsets benefit.
