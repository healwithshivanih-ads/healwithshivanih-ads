sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 76 — Menorrhagia, pg 1255, 1258
  quote: The endometrium of women who have menorrhagia concentrates arachidonic acid
    to a much greater extent than normal, resulting in increased production of series
    2 prostaglandins, which are thought to be the major factor both in the excessive
    bleeding and in the accompanying menstrual cramps. The diet should be relatively
    low in meat and dairy products, to reduce the intake of arachidonic acid.
