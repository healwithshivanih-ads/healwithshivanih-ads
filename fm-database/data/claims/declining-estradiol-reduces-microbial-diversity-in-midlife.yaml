slug: declining-estradiol-reduces-microbial-diversity-in-midlife
statement: The decline and fluctuation of estradiol during perimenopause and menopause
  reduces gut microbial diversity and increases systemic inflammation, worsening metabolic
  health.
evidence_tier: plausible_emerging
rationale: Observational data supports associations between menopausal estrogen decline
  and reduced microbial diversity; however, causality and magnitude are not established
  by RCT. Expert framing is consistent with published associations. Single-expert
  source.
coaching_translation: As estrogen drops during the menopause transition, the variety
  of beneficial bacteria in your gut tends to shrink — which can fan the flames of
  inflammation and make weight management harder.
caveats:
- Single-expert source.
- Observational associations do not confirm causality.
