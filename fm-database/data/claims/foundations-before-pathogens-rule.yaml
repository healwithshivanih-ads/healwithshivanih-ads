- id: hirsch-energy-blueprint-podcast-2026
  location: Podcast — foundations first segment
  quote: I always like to make people strong first cuz if we're going to go after
    the usual suspects, you have to be strong in order to be able to do it. There's
    die-off with these infections and your adrenals have to be good, your thyroid
    has to be good, all of your nutrients have to be replaced in order to be able
    to go through the process as gracefully as possible. There's a lot of Lyme doctors
    who really focus just on Lyme and you end up picking up the pieces at the end.
rationale: Pacing rule — coach refuses aggressive detox or anti-infection protocols
  in fragile clients until baseline resilience is rebuilt.
