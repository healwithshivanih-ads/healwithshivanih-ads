slug: foundations-before-pathogens-rule
statement: Before going after chronic infections (Lyme, EBV, mould, parasites) or
  heavy metals in a chronic-fatigue client, Hirsch's clinical rule is to FIRST restore
  the foundations — sleep, circadian rhythm, nutrient deficiencies (B12, vitamin D,
  magnesium, B-complex via NutrEval-style testing), adrenal support, thyroid optimisation.
  The rationale — pathogen die-off and detoxification mobilisations both produce predictable
  worsening windows; clients who lack the metabolic reserve to process these crashes
  badly. Coach implication — resist the urge to "treat the Lyme" or "do a heavy-metal
  chelation" in the first 8-12 weeks; spend that time rebuilding resilience so the
  eventual treatment goes smoothly.
evidence_tier: plausible_emerging
