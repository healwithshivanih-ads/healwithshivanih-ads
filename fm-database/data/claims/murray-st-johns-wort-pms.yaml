slug: murray-st-johns-wort-pms
statement: St John's Wort extract (900 mg/day standardised to 0.18% hypericin + 3.38%
  hyperforin) significantly outperformed placebo for PMS-related food cravings, swelling,
  poor coordination, insomnia, confusion, headaches, crying, and fatigue across two
  menstrual cycles in a 36-woman DB crossover trial. An observational study showed
  51% overall PMS symptom reduction with two-thirds of women achieving ≥50% improvement
  in severity scores — best improvement in mood subscale (57%), with crying (92%),
  depression (85%), and confusion (75%) showing the largest individual symptom drops.
evidence_tier: plausible_emerging
rationale: Stevinson 2000 DB-RCT + Hicks 2004 observational study + extensive depression
  literature. Mechanism — multimodal serotonin/dopamine/norepinephrine reuptake modulation.
  Particularly effective when PMS is dominated by the dysphoric / mood / crying axis
  (PMDD-spectrum). MAJOR drug-interaction profile (CYP3A4 + P-gp induction) is the
  limiting factor.
coaching_translation: 'St John''s Wort 900 mg/day in PMS works best for mood-dominant
  PMS — crying, depression, confusion, fatigue, food cravings. Particularly useful
  at the PMDD end of the spectrum. The CRITICAL caveat is drug interactions: contraindicated
  with SSRIs/SNRIs/MAOIs, oral contraceptives (reduces effectiveness), warfarin, immunosuppressants,
  and many cancer/HIV drugs. Always do a pharmacist medication review before starting.'
caveats:
- MAJOR drug-interaction risk via CYP3A4 + P-gp induction
- Reduces effectiveness of oral contraceptives — explicit warning
- Contraindicated with SSRIs/SNRIs/MAOIs/tramadol — serotonin syndrome
- Reduces warfarin INR + cyclosporine levels + many cancer/HIV drugs
- Photosensitivity at higher doses
- Pharmacist review of full medication list essential
