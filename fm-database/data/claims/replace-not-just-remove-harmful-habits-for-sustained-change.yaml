slug: replace-not-just-remove-harmful-habits-for-sustained-change
statement: When making lifestyle changes, replacing each harmful habit with a healthier one — rather than
  removing it with nothing in its place — leads to better adherence, because most harmful habits serve
  an underlying coping function.
evidence_tier: plausible_emerging
rationale: Behavioural science supports substitution over elimination alone; Welch frames this as the
  'crutch → cane' principle, recognising that habits persist because they meet real needs, even imperfectly.
coaching_translation: Don't just take something away — give yourself something better to replace it. Instead
  of cutting evening wine with nothing, replace it with an evening walk or relaxing herbal tea, so the
  coping need is still met.
