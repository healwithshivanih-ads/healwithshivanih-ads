slug: pleasurable-activity-as-clinical-intervention
statement: Wentz lists daily pleasurable activity as a NAMED clinical safety signal
  in the Adrenal Transformation Protocol — not optional, not "treat yourself once
  you feel better." Examples — adult colouring books, low-pressure creativity (NOT
  one's professional skill), social bonding for oxytocin, leisurely walks. The mechanism
  is the parasympathetic + oxytocin signal telling the body that the environment is
  no longer hostile, which downshifts cortisol. Coach prescribes daily pleasure as
  a small repeated dose, not as a one-off vacation.
evidence_tier: plausible_emerging
