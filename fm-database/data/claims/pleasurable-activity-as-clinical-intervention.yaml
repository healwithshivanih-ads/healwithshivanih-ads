sources:
- id: wentz-energy-blueprint-podcast-2026
  location: Podcast — pleasure-as-signal segment
  quote: Pleasurable activities throughout the day — doing things that just you enjoy.
    Find ways to boost your oxytocin levels through being with other people and bonding
    with other people. Creating just for fun. Doing that mindfully throughout the
    day every day, just little doses of that — that's going to send a nice safety
    signal to the body.
rationale: Reframes "self-care" from optional luxury into a daily clinical micro-dose;
  coach can prescribe with the same gravity as a supplement.
