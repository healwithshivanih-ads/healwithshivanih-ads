slug: sluggish-bile-flow-overlooked-root-cause
statement: Sluggish bile flow is one of the most overlooked root causes of estrogen
  dominance, bloating, constipation, skin issues, fatigue, thyroid imbalance, and
  poor detoxification.
evidence_tier: fm_specific_thin
rationale: 'Mechanistically plausible: bile is required for estrogen clearance, fat-soluble
  vitamin absorption, and detox (phase II/III). However, the broad list of downstream
  conditions attributed to bile stasis is a FM-specific synthesis with thin peer-reviewed
  consensus.'
coaching_translation: If your client has chronic constipation, hormonal imbalances,
  and fatigue that don't respond to typical approaches, sluggish bile flow may be
  an overlooked piece.
caveats:
- Source is educational synthesis. The breadth of conditions attributed to sluggish
  bile flow is a FM-specific framing. Clinician evaluation needed for structural biliary
  pathology.
