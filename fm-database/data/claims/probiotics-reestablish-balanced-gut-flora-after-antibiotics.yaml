slug: probiotics-reestablish-balanced-gut-flora-after-antibiotics
statement: Probiotics (in supplement or food form) are often needed to help reestablish
  balanced gut flora after antibiotic use, which kills both beneficial and harmful
  bacteria.
evidence_tier: strong
rationale: This is well-supported by RCTs and systematic reviews. Probiotic use during
  and after antibiotic therapy reduces dysbiosis and antibiotic-associated diarrhea.
coaching_translation: After a course of antibiotics, your beneficial gut bacteria
  take a hit. Eating fermented foods (yogurt, kefir, miso, tempeh) and/or taking a
  probiotic supplement can help restore balance.
