out_of_scope_notes: Coach role = refer to ER. Never administer AC in these scenarios.
sources:
- id: notebooklm-activated-charcoal-2026
  location: Section 6 — Specific Contraindications
  quote: AC is absolutely contraindicated in patients with a depressed level of consciousness
    who are not endotracheally intubated. Must not be used if there is a known intestinal
    obstruction, gastrointestinal perforation, or if the gut is not anatomically intact.
    Should not be used for caustic (lye, acids) or hydrocarbon ingestions due to high
    aspiration risk and lack of binding efficacy.
