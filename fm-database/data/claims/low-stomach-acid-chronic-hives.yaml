sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 65 — Hives, pg 1095
  quote: In one study of 77 patients with chronic hives, 24 (31%) were diagnosed as
    having no gastric acid output, and 41 (53%) were shown to have low gastric acid
    output. Treatment with a hydrochloric acid supplement and a vitamin B complex
    gave impressive clinical results.
