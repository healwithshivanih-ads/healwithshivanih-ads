slug: low-stomach-acid-chronic-hives
statement: Up to 85% of chronic hives patients show altered digestive function. In
  one study of 77 chronic hives patients, 31% had no gastric acid output and 53% had
  low acid output; treatment with hydrochloric acid plus B-complex produced impressive
  clinical results. Address gastric acidity, motility, and gut barrier integrity in
  any chronic urticaria work-up.
evidence_tier: plausible_emerging
