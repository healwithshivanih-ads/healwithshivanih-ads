slug: nhs-nosebleed-anticoagulant-and-anaemia-flag
statement: See a GP for recurrent nosebleeds, nosebleeds in a child under 2, nosebleeds
  while on warfarin or other anticoagulants, or nosebleeds with anaemia symptoms such
  as palpitations, breathlessness or unusual pallor.
