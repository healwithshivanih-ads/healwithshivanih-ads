slug: blood-ph-range-73-to-75
statement: Blood pH is maintained within the narrow range of 7.3 to 7.5; deviation
  to 8 causes coma, and a drop to 7.22 causes coma and death from acidosis.
evidence_tier: strong
rationale: This is well-established physiology. Blood pH regulation within a narrow
  range is a fundamental principle of acid-base physiology supported by decades of
  medical literature.
coaching_translation: The body tightly controls blood pH automatically — you can't
  change blood pH through diet. What diet and lifestyle influence is cellular pH.
out_of_scope_notes: Interpreting blood pH or managing acidosis/alkalosis is clinical
  territory. Coaches should not advise on this.
caveats:
- Source is an expert lecture transcript; specific numerical values are physiologically
  consistent with established medicine.
