slug: fatty-fish-omega-3-for-cardiovascular-protection
statement: Including fatty fish such as sardine, mackerel, salmon, or herring provides
  EPA and DHA omega-3 fatty acids that reduce triglycerides and support cardiovascular
  health.
evidence_tier: strong
rationale: Lemony Steamed Fish specifically names sardine, mackerel, salmon, and herring
  as preferred options. The cardiovascular benefit of EPA/DHA from oily fish is among
  the most robustly evidenced dietary claims in cardiology.
coaching_translation: Oily fish like sardines, mackerel, or salmon are among the best
  foods for your heart — the omega-3s in them directly help lower triglycerides and
  reduce inflammation.
