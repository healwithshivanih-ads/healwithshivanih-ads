slug: plaque-instability-greater-risk-than-lumen-narrowing
statement: Targeting plaque stabilization is clinically more important than simply
  enlarging the arterial lumen, because plaque rupture rather than progressive stenosis
  is the primary trigger for MI and stroke.
evidence_tier: strong
rationale: Well-established clinical concept; plaque rupture accounts for the majority
  of acute coronary events.
coaching_translation: The goal is to stabilize plaques so they don't rupture — not
  just to widen arteries.
