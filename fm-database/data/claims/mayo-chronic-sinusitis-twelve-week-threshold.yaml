slug: mayo-chronic-sinusitis-twelve-week-threshold
statement: Chronic rhinosinusitis is defined as nasal congestion, facial pain or pressure,
  anterior or posterior nasal drainage, and reduced sense of smell lasting 12 weeks
  or longer despite treatment attempts — distinguishing it from acute (under 4 weeks)
  and recurrent acute sinusitis.
evidence_tier: strong
