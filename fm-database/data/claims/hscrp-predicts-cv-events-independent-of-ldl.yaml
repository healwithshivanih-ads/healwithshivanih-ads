slug: hscrp-predicts-cv-events-independent-of-ldl
statement: Among patients with the same LDL level, higher hsCRP is associated with
  greater cardiovascular event risk, establishing inflammation as an independent risk
  driver (PROVE-IT trial).
evidence_tier: strong
rationale: PROVE-IT trial directly referenced. The finding that CRP independently
  predicts events even at LDL <70 was a landmark result that helped establish CVD
  as an inflammatory disease.
coaching_translation: Even when cholesterol is controlled, high inflammation (measured
  by CRP) still raises heart risk. This is why addressing inflammation through diet
  and lifestyle is so important.
caveats:
- PROVE-IT trial referenced by name — peer-reviewed landmark trial supports this claim.
