slug: right-hemisphere-dominance-low-wbc-pattern
statement: Persistently low white blood cell counts in otherwise stable patients may
  be a marker of right-hemisphere dominance rather than primary haematological pathology
  — damage to or reduced activity of certain left-hemisphere regions produces lower
  WBC counts, as does over-activity of the right hemisphere on the immune system.
  Coach implication — clients with chronically low WBC counts that have remained stable
  for years without haematological deterioration may be in this pattern; addressing
  the hemispheric imbalance is the upstream lever, not immune adaptogens or supplements.
