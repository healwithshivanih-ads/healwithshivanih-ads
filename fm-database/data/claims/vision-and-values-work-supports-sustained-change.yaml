slug: vision-and-values-work-supports-sustained-change
statement: Deeply exploring a client's long-term vision of who they want to be — not
  just what they want to achieve — and connecting it to their core values is a powerful
  strategy for overcoming ambivalence and sustaining behavior change.
evidence_tier: strong
rationale: Values clarification and future-self visualization are well-supported components
  of acceptance and commitment therapy (ACT) and motivational interviewing, with RCT
  support for health behavior change.
coaching_translation: 'Ask: ''Who do you want to be at your core?'' and ''Why do you
  want to be that person?'' Help clients visualize their future self in sensory detail
  — how they feel, move, and behave — to build intrinsic motivation.'
caveats:
- Described as a coaching strategy in group discussion; no specific study cited in
  the document.
