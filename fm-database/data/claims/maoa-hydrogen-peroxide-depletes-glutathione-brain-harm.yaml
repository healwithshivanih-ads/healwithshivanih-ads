slug: maoa-hydrogen-peroxide-depletes-glutathione-brain-harm
statement: MAOA-driven catabolism of stress neurotransmitters generates hydrogen peroxide
  as a by-product; under chronic stress, this exceeds glutathione's neutralising capacity,
  causing oxidative damage to the brain, contributing to premature hair greying and
  potentially to neurodegenerative conditions.
evidence_tier: plausible_emerging
rationale: MAOA-generated H2O2 and its neutralisation by GPX/glutathione is biochemically
  established. The link to premature greying and neurodegeneration is plausible but
  Lynch's causal framing is stronger than the current evidence supports.
coaching_translation: Chronic stress generates oxidative stress inside the brain and
  body. Supporting antioxidant status (through diet, sleep, and stress management)
  helps protect the nervous system from this ongoing damage.
caveats:
- Source is a consumer trade book
- Causal chain from MAOA H2O2 to ALS/Parkinson's is speculative at individual level
