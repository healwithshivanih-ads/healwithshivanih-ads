slug: declining-sperm-count-environmental
statement: Average sperm count has dropped from 113 million/ml in 1940 to 60 million/ml
  today, and semen volume has fallen 20%. Drivers include environmental estrogens
  (industrial pollutants like PCBs, dioxin, DDT residues; estrogens in conventionally
  produced dairy and meat; estrogens in drinking water from excreted OCPs), heavy
  metals, organic solvents, pesticides, and dietary shifts (more saturated fat, less
  fiber/produce). Coach prescribes organic dairy and meat, filtered water, plastic-free
  food storage for preconception male clients.
evidence_tier: plausible_emerging
