sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 70 — Male Infertility, pg 1151-1158
  quote: Increased exposure to environmental estrogens and other environmental pollutants
    during fetal development, as well as during the reproductive years, is suggested
    as a major reason for the tremendous rise in disorders of development and function
    of the male sexual system.
