slug: chappus-sherr-methylene-blue-not-a-fix-it-pill
statement: Methylene blue is mitochondrial SUPPORT, not a permanent fix. If clients
  stop methylene blue without addressing the upstream drivers (insulin resistance,
  sympathetic-dominance lifestyle, toxin exposure, medications, sleep, gut, nutrient
  deficiencies) their symptoms generally return. Sherr's clinical framing — use methylene
  blue while the longer optimization work is happening, and aim to reduce or stop
  it as foundational health biomarkers normalise. The goal is periodic-as-needed use
  (travel, illness in family, high-stress weeks, endurance events) rather than daily-forever
  dependence.
