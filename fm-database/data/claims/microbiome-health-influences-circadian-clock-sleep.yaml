slug: microbiome-health-influences-circadian-clock-sleep
statement: The quality and diversity of the gut microbiome directly influences circadian
  rhythms, affecting sleep onset and duration.
evidence_tier: plausible_emerging
rationale: Bidirectional microbiome-circadian rhythm interactions are an emerging
  area of research with plausible mechanisms via serotonin/melatonin precursors and
  clock-gene signalling. Not yet consensus.
coaching_translation: An unhealthy gut microbiome can disrupt your body clock — contributing
  to difficulty falling or staying asleep, even when other sleep habits are dialled
  in.
caveats:
- No specific RCTs cited; emerging field.
- Single-expert source.
