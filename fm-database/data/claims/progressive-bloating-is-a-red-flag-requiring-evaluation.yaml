slug: progressive-bloating-is-a-red-flag-requiring-evaluation
statement: Bloating that is progressive, does not improve, or is present upon waking
  and worsens throughout the day warrants clinical evaluation as it may indicate a
  more serious underlying condition.
evidence_tier: strong
rationale: This is standard clinical triage guidance explicitly stated by the speaker
  in her role as a licensed clinician. Progressive or atypical bloating as a red flag
  for serious pathology (e.g., ovarian cancer, obstruction) is consistent with clinical
  guidelines.
coaching_translation: Occasional bloating after meals is common and usually benign.
  But if bloating is getting progressively worse, doesn't improve, or is present from
  the moment you wake up and gets worse all day, that's a sign to see a doctor — not
  just adjust your diet.
out_of_scope_notes: Assessment and diagnosis of pathological causes of bloating are
  strictly out of coaching scope. Coaches should always refer clients with red-flag
  bloating to a clinician.
