- id: thurlow-microbiome-session-2
  location: Bloating red flags caveat
  quote: Bloating that is getting worse and not getting better always needs to be
    evaluated. Sometimes bloating can be a late sign of more concerning things. Therefore,
    if you have bloating once or twice a week, not a big deal. If you have bloating
    when you wake up in the morning and it gets worse over the day, that needs to
    be evaluated.
