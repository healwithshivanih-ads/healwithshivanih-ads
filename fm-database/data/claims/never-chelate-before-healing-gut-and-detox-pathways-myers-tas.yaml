slug: never-chelate-before-healing-gut-and-detox-pathways-myers-tas
statement: 'Chelation should never be the first step: the gut must be healed and detox
  pathways opened and supported first, or mobilised metals can be reabsorbed in large
  quantities and cause more harm than good.'
