slug: zinc-supplementation-supports-immune-function
statement: Zinc supplementation supports immune function by promoting the production, maturation, and activity of immune cells
  including T cells, B cells, and neutrophils, and by regulating cytokine production.
evidence_tier: strong
rationale: Zinc's role in immune cell development and cytokine regulation is well-established in immunological literature.
  The document describes this as a primary function of zinc.
coaching_translation: Getting enough zinc helps your immune system stay strong — it supports the cells that fight infections
  and helps regulate inflammation.
caveats:
- Source is an expert lecture, not primary literature. Specific immunological claims are consistent with mainstream consensus.
