slug: forgiveness-breaks-chemical-bonds-of-hostility
statement: The act of forgiveness — as a prefrontal cortex decision independent of
  feelings — can break the neurochemical bonds of hostility, anger, and resentment,
  and is a key factor in resolving depression rooted in unresolved trauma or betrayal.
evidence_tier: plausible_emerging
rationale: Forgiveness therapy has emerging research support in trauma and depression
  (Enright model, multiple small RCTs). The neurochemical framing is metaphorical
  but consistent with stress-reduction research showing forgiveness reduces cortisol
  and inflammatory markers.
coaching_translation: Forgiveness isn't about excusing what happened — it's a decision
  you make for your own wellbeing. It's one of the most powerful tools for releasing
  the mental and physical burden of long-held anger or hurt.
out_of_scope_notes: Trauma-informed coaching is appropriate; clinical trauma therapy
  for abuse or complex trauma should be referred to a psychologist or counsellor.
caveats:
- '''Chemical bonds of hostility'' is metaphorical language'
- Source is expert lecture
- Individual variation in readiness for forgiveness must be respected
