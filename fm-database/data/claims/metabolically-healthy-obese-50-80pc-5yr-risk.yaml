slug: metabolically-healthy-obese-50-80pc-5yr-risk
statement: The "metabolically healthy obese" category — clients with obesity but normal
  fasting glucose, insulin, lipids, blood pressure — exists because their fat cells
  genuinely can recruit new adipocytes and keep storing energy without overflow. But
  this state is time-limited. Research shows a 50-80% INCREASED risk of developing
  metabolic dysfunction within 5 years compared to healthy-weight metabolically-healthy
  clients. Coach implication — do not let a "metabolically healthy" lab result block
  weight conversation; the structural picture is still unsustainable. Joint degeneration
  risk from carrying excess load is also a separate, independent harm.
evidence_tier: plausible_emerging
