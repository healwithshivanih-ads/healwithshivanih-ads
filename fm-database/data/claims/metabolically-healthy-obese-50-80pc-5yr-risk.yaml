  location: Podcast — metabolically healthy obese segment
  quote: Research looking at these people shows that even though they're metabolically
    healthy at a point in time, they're at a 50 to 80% greater risk of developing
    metabolic problems within 5 years. Carrying that excess weight is not healthy
    from a physical structure standpoint. Even if you're metabolically healthy you're
    still going to have massive joint degeneration.
rationale: Helps coach push back kindly on "but my labs are fine" objection from heavier
  clients.
