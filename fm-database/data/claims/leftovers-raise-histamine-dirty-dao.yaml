slug: leftovers-raise-histamine-dirty-dao
statement: For individuals with reduced DAO activity, consuming leftover or pre-cooked
  foods significantly increases histamine exposure because bacterial growth on stored
  food generates histamine over time.
evidence_tier: plausible_emerging
rationale: Histamine forms in protein-containing foods as bacteria decarboxylate histidine.
  Refrigeration slows but does not halt this process. DAO-insufficient individuals
  cannot adequately break down the increased dietary histamine load. Well-established
  in food science; DAO pharmacogenomics are biologically plausible.
coaching_translation: Cook and eat food fresh the same day. Avoid leftovers, aged
  meats, canned fish, and fermented foods if you have histamine sensitivity.
caveats:
- DAO activity testing not widely standardized
- Individual tolerance varies considerably
