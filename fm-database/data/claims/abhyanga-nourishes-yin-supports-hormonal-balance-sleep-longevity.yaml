slug: abhyanga-nourishes-yin-supports-hormonal-balance-sleep-longevity
statement: Abhyanga is described as one of the surest Ayurvedic ways to nourish yin (the body's restorative,
  cooling, lubricating principle) and thereby support hormonal balance, with traditional use spanning
  thousands of years for maintaining health, improving sleep, and promoting longevity.
evidence_tier: fm_specific_thin
rationale: 'Consistent with the book''s yin/yang hormone model: yin = restorative, sex-hormone-related
  resources; yang = stress-hormone expenditure. The claim bridges Ayurvedic tradition with the HPA-axis
  framework presented throughout the book.'
coaching_translation: Warm oil massage isn't just relaxing — in Ayurvedic medicine it's considered a core
  method for rebuilding the body's restorative resources (yin). Thousands of years of clinical observation
  link regular abhyanga to better sleep, slower ageing, and more stable hormones.
out_of_scope_notes: ''
caveats:
- Evidence is traditional and observational; controlled trials on hormonal endpoints in humans are limited.
- Contraindications include fever, heavy menstruation, and open skin conditions.
