slug: leaky-gut-two-types-paracellular-transcellular
statement: 'Leaky gut syndrome has two distinct types: paracellular (content passes between cells — simpler presentation)
  and transcellular (cell contents also cross into circulation — more complex, associated with progressive food sensitivities
  and autoimmunity).'
evidence_tier: plausible_emerging
rationale: The mechanistic distinction between paracellular and transcellular permeability is supported in gut biology. Clinical
  classification into treatment tiers is FM-specific but biologically grounded.
coaching_translation: Some leaky gut is simpler to heal; when clients develop new food sensitivities over time, their gut
  may have a more complex form that requires longer, more gradual healing.
caveats:
- Source is expert consensus lecture. The clinical two-type classification is FM-specific; may not be used in conventional
  gastroenterology.
