slug: plant-selenium-varies-by-soil
statement: Selenium content in plant foods varies significantly based on soil selenium
  concentrations where plants are grown.
evidence_tier: strong
rationale: Well-established in nutritional geochemistry; cited by Oregon State University
  Linus Pauling Institute in document.
coaching_translation: You can't always count on plant foods to reliably deliver selenium
  — it depends on where they were grown. Brazil nuts (even 1–2 per day) are a consistent
  and potent source.
caveats:
- Brazil nuts are extremely high in selenium (544 mcg/oz) — overconsumption can lead
  to selenosis.
linked_to_topics:
