slug: cortisol-lowers-digestive-enzymes
statement: During stress, adrenaline surges suppress digestive enzyme secretion while
  simultaneously raising blood sugar levels.
evidence_tier: plausible_emerging
rationale: Mechanistically consistent with known physiology of the sympathoadrenal
  response redirecting blood flow and energy away from digestion. Well-accepted in
  functional medicine; peer-reviewed evidence for direct enzyme suppression via adrenaline
  is moderate. Source is expert consensus toolkit.
coaching_translation: When you're stressed, your body puts digestion on hold to deal
  with the 'emergency.' That's why stress commonly causes digestive upset — your body
  isn't prioritizing digestion right now.
caveats:
- Source is a coaching toolkit; specific enzyme suppression mechanism cited without
  primary study reference
