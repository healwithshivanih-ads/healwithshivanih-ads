slug: chronic-stress-promotes-leaky-gut
statement: Chronic stress increases intestinal permeability (leaky gut), which can
  provoke immune responses and contribute to food sensitivities and autoimmune conditions.
evidence_tier: plausible_emerging
rationale: Stress-induced intestinal permeability has preclinical and some clinical
  support, and the link between leaky gut and immune activation is a recognised mechanism.
  However, direct causation to autoimmune disease in humans requires more RCT data.
coaching_translation: Long-term stress can wear down the gut lining, letting food
  particles into the bloodstream and triggering immune reactions — sometimes showing
  up as new food sensitivities.
caveats:
- Single-expert source; no specific studies cited.
- The term 'leaky gut' is widely used in FM but intestinal permeability measurement
  and clinical significance remain debated in conventional medicine.
