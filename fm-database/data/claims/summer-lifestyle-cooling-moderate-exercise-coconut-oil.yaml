slug: summer-lifestyle-cooling-moderate-exercise-coconut-oil
statement: Summer lifestyle practices include using coconut oil for self-massage, choosing non-competitive
  moderate exercise (swimming, walking, gentle yoga), taking cool baths, avoiding the midday sun, drinking
  room-temperature or cool (not cold) water, and practising moderation in scheduling.
evidence_tier: fm_specific_thin
rationale: Cooling, low-intensity practices counterbalance the hot, sharp, competitive quality of pitta
  aggravation. Avoiding midday sun and overscheduling prevents both physical and mental pitta overheating.
coaching_translation: 'In summer, protect your nervous system and digestion from overheating: slow down
  the pace, swim or walk instead of intense gym sessions, and hydrate with room-temperature water rather
  than ice-cold drinks.'
out_of_scope_notes: ''
caveats:
- Traditional Ayurvedic lifestyle principle; cold water avoidance is traditional rather than evidence-based.
