slug: low-vitamin-d-associated-with-insulin-resistance
statement: Lower vitamin D levels are associated with insulin resistance.
evidence_tier: plausible_emerging
rationale: Supported by Chiu et al. 2004 (AJCN) cited in document; observational association
  is well-replicated though causality and optimal supplementation targets are still
  debated.
coaching_translation: Low vitamin D is commonly linked to blood sugar problems — getting
  your levels checked is a worthwhile first step.
caveats:
- Association, not proven causation. Supplementation benefit is most clear in deficient
  individuals. Monitor blood levels with clinician.
