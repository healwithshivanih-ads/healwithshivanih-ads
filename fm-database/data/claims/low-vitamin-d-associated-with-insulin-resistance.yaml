slug: low-vitamin-d-associated-with-insulin-resistance
statement: Low blood levels of vitamin D are associated with insulin resistance and
  impaired beta-cell function.
evidence_tier: plausible_emerging
rationale: Multiple observational studies (including Chiu et al. 2004, Am J Clin Nutr)
  support this association. VDR receptors on pancreatic beta cells provide mechanistic
  plausibility. Causality not fully established in RCTs.
coaching_translation: Getting enough vitamin D — through sunlight, food, or supplements
  — may help your body respond better to insulin.
caveats:
- Association, not proven causation. Supplementation benefit is most clear in deficient
  individuals. Monitor blood levels with clinician.
- Association, not proven causation from RCTs.
- Supplementation dose should be guided by serum 25-OH-D levels — clinician scope.
