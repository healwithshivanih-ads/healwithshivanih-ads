slug: vagal-activation-practices-improve-digestion-immunity
statement: Vagal activation practices—including humming, gargling, cold exposure,
  and deep diaphragmatic breathing—improve digestion, HRV, and immune regulation by
  restoring parasympathetic tone.
evidence_tier: plausible_emerging
rationale: Vagal nerve stimulation improving gut motility and immune regulation is
  mechanistically established. Non-invasive vagal activation methods (humming, cold
  exposure, slow breathing) have clinical plausibility with emerging trial support,
  though large RCTs are limited.
coaching_translation: Simple daily habits like humming, singing, gargling, splashing
  cold water on your face, or slow breathing can literally tone your vagus nerve—the
  major highway of your body's rest-and-repair system.
caveats:
- Cold exposure should be avoided in cardiovascular disease without medical clearance.
- Source is educational synthesis.
