slug: bicarbonate-buffers-acute-histamine-reaction
statement: Sodium or potassium bicarbonate taken with water can rapidly blunt an acute
  histamine reaction after acidic or high-histamine food.
evidence_tier: fm_specific_thin
rationale: An acute self-care tactic from the book; symptomatic buffering, not a treatment
  for the underlying intolerance.
coaching_translation: A little bicarbonate in water can take the edge off a sudden
  food-histamine flare.
out_of_scope_notes: ''
caveats:
- Source is a consumer trade book (Ben Lynch, Dirty Genes), not primary literature.
