- id: efrati-perlmutter-empowering-neurologist-2024
  location: Podcast — Israeli stroke study
  quote: In this study, for the first time we did a combination between metabolic
    imaging of the brain to the anatomical imaging. By doing that, we understand for
    the first time in a clear-cut fashion — because you can see it — what we are actually
    doing.
rationale: Provides peer-reviewed evidence backing for HBOT in chronic stroke.
