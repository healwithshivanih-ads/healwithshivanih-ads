slug: hbot-stroke-lesion-size-reduction-imaging
statement: A randomised study from the Sagol Center on chronic post-stroke patients
  demonstrated significant reduction in stroke lesion size on imaging in the HBOT
  group versus sham, alongside clinical improvement. The advance over prior trials
  was combining metabolic (SPECT/perfusion) imaging with anatomical (MRI) imaging
  to identify which tissue was hibernating versus dead — making outcome both predictable
  and visualisable for the patient.
evidence_tier: strong
