slug: diet-lifestyle-fertility-nurses-health
statement: 'Nurses Health Study II identified diet and lifestyle patterns that enhance
  fertility: lower trans fats with more monounsaturated fats; lower animal protein
  with more vegetable protein; high-fiber low-glycemic carbohydrates; HIGH-fat dairy
  (which reduced ovulatory infertility >50%, while low-fat dairy raised infertility
  risk 11%); dietary non-heme iron; multivitamin use; daily vigorous activity for
  30 min; BMI 20 to 25; not smoking. A Mediterranean-style pattern outperforms standard
  Western diets for conception.'
evidence_tier: strong
