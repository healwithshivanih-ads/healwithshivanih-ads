  location: Chapter 69 — Female Infertility, pg 1142-1143
  quote: High intake of high-fat dairy products reduced the risk of infertility due
    to lack of ovulation by more than 50%, in contrast to low-fat dairy foods, which
    actually reduced the risk of successful conception by 11%.
