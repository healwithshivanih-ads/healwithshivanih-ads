sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 56 — Hair Loss in Women, pg 998-1002
  quote: For evaluating iron status, a blood test for serum ferritin is recommended.
    If the serum ferritin is less than 30 ng/l, iron intake must be increased via
    diet and supplementation. When serum ferritin levels fall below this level, hair
    growth and regeneration are impaired, as the body seeks to conserve iron. There
    is a very strong association between low body iron stores and diffuse hair loss
    in women. If serum ferritin levels are below 30 ng/l, take iron bound to either
    pyrophosphate, succinate, glycinate, or fumarate, at a dosage of 30 mg twice per
    day between meals.
