slug: murray-hairloss-ferritin-threshold
statement: Serum ferritin below 30 ng/mL is strongly associated with diffuse hair
  loss in women — at this level the body conserves iron and impairs hair growth even
  when haemoglobin is normal. Treatment is 30 mg of elemental iron (bound to bisglycinate,
  fumarate, succinate, or pyrophosphate) twice daily between meals, or three times
  daily with meals if GI upset. Serum ferritin is the recommended screening test,
  not haemoglobin alone.
evidence_tier: strong
