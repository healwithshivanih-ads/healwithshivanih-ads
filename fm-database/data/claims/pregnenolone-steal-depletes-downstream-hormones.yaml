slug: pregnenolone-steal-depletes-downstream-hormones
statement: Under chronic stress, pregnenolone is preferentially shunted toward cortisol
  synthesis, depleting DHEA, progesterone, and other downstream hormones — a pattern
  referred to as 'pregnenolone steal'.
evidence_tier: fm_specific_thin
rationale: Common FM teaching with plausible biochemistry; specific clinical RCT evidence
  for this phenomenon is thin.
coaching_translation: When your body is in chronic stress mode, it 'steals' building
  blocks from your calming and restorative hormones to make more stress hormone.
caveats:
- '''Pregnenolone steal'' is widely used in FM but not fully validated in conventional
  endocrinology RCTs.'
- Source is educational cheatsheet synthesis.
