slug: ginger-curcumin-coriander-onion-stimulate-enzymatic-activity
statement: Ginger, curcumin, coriander, and onion stimulate endogenous digestive enzyme
  production and activity.
evidence_tier: fm_specific_thin
rationale: Some evidence exists for ginger (gingerols) and curcumin as digestive stimulants
  and anti-inflammatory agents. Evidence for coriander and onion specifically stimulating
  pancreatic enzyme output is limited and largely based on traditional or animal research.
coaching_translation: Adding ginger, turmeric (curcumin), coriander, and onion to
  your diet may naturally help stimulate your digestive enzymes. These are easy, practical
  additions to meals.
