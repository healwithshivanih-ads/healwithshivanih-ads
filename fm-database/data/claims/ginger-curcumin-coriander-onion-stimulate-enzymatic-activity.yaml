caveats:
- Source is an expert consensus lecture. Evidence for specific foods stimulating human
  pancreatic enzyme output is mostly animal or in-vitro. Human RCT evidence is limited.
- Effect sizes in human studies are modest and not well-characterised for this specific
  indication.
