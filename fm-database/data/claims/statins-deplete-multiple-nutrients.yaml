slug: statins-deplete-multiple-nutrients
statement: HMG-CoA reductase inhibitors (statins) deplete carnitine, copper, CoQ10,
  essential fatty acids, selenium, vitamin D, vitamin E, and zinc.
evidence_tier: plausible_emerging
rationale: Statins block the mevalonate pathway, directly depleting CoQ10. Depletion
  of other nutrients listed is plausible via various mechanisms but evidence strength
  varies by nutrient.
coaching_translation: Statin users may benefit from monitoring and replenishing several
  key nutrients — encourage clients to discuss with their prescriber.
out_of_scope_notes: Nutrient testing and dosing are clinician scope.
caveats:
- Source is an educational toolkit. Statin-CoQ10 depletion has strong mechanistic
  backing; others are plausible emerging.
- Evidence quality varies across nutrients; strongest for CoQ10.
- Source is an FM educational toolkit without individual citations per nutrient.
