slug: statins-deplete-multiple-nutrients
statement: HMG-CoA reductase inhibitors (statins) deplete carnitine, copper, CoQ10,
  essential fatty acids, selenium, vitamin D, vitamin E, and zinc.
evidence_tier: plausible_emerging
rationale: Statin-induced CoQ10 depletion is mechanistically well-explained (shared
  mevalonate pathway). Depletion of other nutrients is plausible but evidence varies
  in quality.
coaching_translation: Clients on statins should discuss nutrient monitoring (especially
  CoQ10 and vitamin D) with their clinician.
out_of_scope_notes: Specific supplementation to replace statin-depleted nutrients
  requires clinician oversight.
caveats:
- Source is an educational toolkit. Statin-CoQ10 depletion has strong mechanistic
  backing; others are plausible emerging.
