slug: ayurveda-sweeteners-by-dosha
statement: Vata and pitta can use most natural sweeteners (jaggery, maple syrup, rice syrup; pitta limits
  honey and white sugar), whereas kapha should avoid nearly all sweeteners except small amounts of raw,
  unprocessed honey, which is the one sweetener that pacifies kapha.
