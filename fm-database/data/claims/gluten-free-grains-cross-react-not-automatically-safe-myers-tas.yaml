slug: gluten-free-grains-cross-react-not-automatically-safe-myers-tas
statement: Gluten-free grains are not automatically safe in autoimmunity because they
  carry lectins, are frequently cross-contaminated, and can cross-react with gluten
  antibodies.
evidence_tier: fm_specific_thin
rationale: Cross-reactivity plus lectin content means rice, corn, millet, oats and
  pseudo-grains like quinoa can still provoke inflammation in reactive individuals;
  hence broad grain removal in the 30-day phase.
coaching_translation: Swapping to gluten-free grains isn't always enough — they can
  still trigger the same reaction during the elimination phase.
