slug: low-stomach-acid-impairs-calcium-absorption
statement: Hypochlorhydria and long-term use of proton pump inhibitors or antacids
  impairs calcium absorption from the intestine, contributing to low serum calcium.
evidence_tier: plausible_emerging
rationale: Stomach acid is required to ionize and solubilize calcium salts for intestinal
  absorption. Observational data link PPI use to reduced calcium absorption and increased
  fracture risk, though causality is debated. Biologically plausible and clinically
  recognized.
coaching_translation: Long-term use of antacids or acid-blocking medications may reduce
  how well your body absorbs calcium from food. If you've been on these medications,
  it's worth discussing with your doctor.
caveats:
- Source is expert consensus, moderate quality.
- Causal evidence from RCTs is limited; most data are observational.
