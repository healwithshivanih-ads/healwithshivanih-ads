slug: caffeine-causes-magnesium-depletion
statement: Chronic or excessive caffeine intake causes urinary magnesium loss through
  its diuretic action.
evidence_tier: plausible_emerging
rationale: Caffeine's diuretic effect and associated renal magnesium losses are biologically
  plausible and supported by some observational and mechanistic data, though large
  RCTs are limited.
coaching_translation: Heavy coffee or caffeine consumption can drain your magnesium
  stores over time — another reason to moderate caffeine intake.
