slug: elimination-diet-reduces-extracellular-water
statement: Rapid weight loss during a comprehensive elimination diet often reflects
  reduction of inflammatory extracellular water caused by food-triggered inflammation.
evidence_tier: fm_specific_thin
rationale: The mechanism is biologically plausible (resolution of food-driven inflammation
  → reduced ECW), and clinically observed in FM practice, but direct peer-reviewed
  evidence specifically linking elimination diet to BIA-measured ECW reduction is
  limited.
coaching_translation: When clients drop weight fast on an elimination diet, it's often
  not just fat — it's also water that their body was holding onto because of inflammation
  caused by certain foods.
caveats:
- Source is expert consensus lecture. The specific mechanism linking food elimination
  to BIA-measured ECW reduction lacks robust primary literature support.
