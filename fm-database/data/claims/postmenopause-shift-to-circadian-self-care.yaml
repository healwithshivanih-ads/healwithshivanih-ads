slug: postmenopause-shift-to-circadian-self-care
statement: After menopause or hysterectomy, the infradian rhythm is suppressed, so
  self-care shifts from cyclical to circadian-focused — supporting melatonin, oxytocin,
  and nitric oxide via rest, exercise, leafy greens, pleasure, and community.
evidence_tier: fm_specific_thin
rationale: Without a cycle there are no four phases to sync; master circadian-supporting
  molecules become the lever for wellbeing.
coaching_translation: 'Post-menopause, stop phase-based syncing and focus on circadian
  basics: sleep and light, movement, greens, pleasure, and connection.'
