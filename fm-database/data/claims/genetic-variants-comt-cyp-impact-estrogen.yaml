slug: genetic-variants-comt-cyp-impact-estrogen
statement: Genetic variants in COMT, CYP1A1, CYP1B1, and GST may impair estrogen detoxification;
  diet and lifestyle modifications can be supportive for carriers of these variants.
evidence_tier: plausible_emerging
rationale: Functional genomics plausibility is strong; these enzymes are directly
  involved in estrogen Phase I and II metabolism. Clinical utility of testing and
  intervention is emerging, not RCT-established.
coaching_translation: Some people have gene variants that slow estrogen clearance
  — nutrition and lifestyle strategies are especially important for them.
out_of_scope_notes: Genetic testing interpretation and variant-specific supplement
  protocols require clinician oversight.
caveats:
- Source is expert synthesis. Actionable intervention data for specific genotypes
  is still emerging.
