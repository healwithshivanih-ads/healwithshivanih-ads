slug: fiber-psyllium-glucomannan-lowers-ldl-tg
statement: Soluble fiber (psyllium, glucomannan) lowers LDL and triglycerides through
  bile acid sequestration and gut mechanisms.
evidence_tier: strong
rationale: Psyllium's LDL-lowering effect is well-supported by multiple RCTs and is
  FDA-recognized. Glucomannan also has RCT evidence. Document references both.
coaching_translation: Adding soluble fiber like psyllium husk or glucomannan to your
  daily routine is a well-researched way to reduce LDL cholesterol and triglycerides
  naturally.
caveats:
- Source is an expert synthesis cheatsheet; specific doses not provided.
- Psyllium can interfere with medication absorption — take away from medications.
