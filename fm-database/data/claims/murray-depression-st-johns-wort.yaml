slug: murray-depression-st-johns-wort
statement: Standardized Saint-John's-wort (Hypericum perforatum) extract is the best-researched
  botanical antidepressant — more than 30 RCTs with 2,200+ patients show comparable
  efficacy to standard antidepressants for mild to moderate depression with markedly
  fewer side effects. Standard dose is 900 mg per day of a 0.3 percent hypericin extract
  (300 mg three times daily). Major caveat — St John's wort induces CYP3A4 and reduces
  blood levels of many drugs including oral contraceptives, warfarin, ciclosporin,
  digoxin, several HIV and cancer drugs, and SSRIs (serotonin syndrome risk). Coach
  must screen the entire medication list before suggesting it.
