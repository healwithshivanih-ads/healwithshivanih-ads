  quote: Extracts of Saint-John's-wort (Hypericum perforatum) standardized for hypericin
    are the most thoroughly researched natural antidepressants. More than 30 double-blind,
    randomized trials involving more than 2,200 patients with mild to moderately severe
    depression have shown that standardized Saint-John's-wort extracts yield excellent
    results with far fewer side effects than standard antidepressant medications.
