slug: hrt-useful-but-not-a-panacea-test-and-pair-with-lifestyle
statement: HRT (often estradiol-only) is a useful but incomplete tool; the body makes
  three estrogens (estradiol, estrone, estriol), FSH testing can help confirm whether
  HRT is working, and diet/lifestyle support is still required.
evidence_tier: confirm_with_clinician
rationale: The speaker argues for a more nuanced, tested approach to HRT rather than
  treating it as a fix-all.
coaching_translation: If a client is on HRT, support diet and lifestyle and encourage
  testing/follow-up conversations with their prescriber.
out_of_scope_notes: HRT prescribing and lab (FSH/estrogen) interpretation are clinician-led.
caveats:
- Educational only; not a recommendation to start or stop HRT.
