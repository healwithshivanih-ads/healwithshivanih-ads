slug: zinc-carnosine-supports-gastric-lining-repair
statement: Zinc carnosine supplementation supports repair of the gastric and intestinal
  mucosal lining and may assist in restoring endogenous HCl production as part of
  a gut repair protocol.
evidence_tier: plausible_emerging
rationale: Zinc carnosine has emerging RCT evidence for gastric mucosal protection
  and H. pylori adjunct therapy. Its role specifically in restoring HCl production
  is less well established. Source is expert consensus.
coaching_translation: Zinc carnosine is a supplement that helps heal and protect the
  lining of your stomach and gut, which is often damaged or inflamed when stomach
  acid has been low for a long time.
caveats:
- Dose ranges not specified in source document — verify with clinician.
- Source is expert consensus lecture.
