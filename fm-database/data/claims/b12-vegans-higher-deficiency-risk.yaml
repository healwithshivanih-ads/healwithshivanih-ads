slug: b12-vegans-higher-deficiency-risk
statement: Strict vegetarians and vegans are at higher risk for vitamin B12 deficiency
  due to avoidance of animal foods; those with celiac disease, Crohn's, low stomach
  acid, or on PPIs/Metformin are also at elevated risk.
evidence_tier: strong
rationale: Established nutritional science; cited by NIH ODS reference in document.
  B12 is found almost exclusively in animal-derived foods.
coaching_translation: If you follow a plant-based diet or take acid-blocking medications,
  your B12 status should be checked regularly. B12 deficiency can develop slowly and
  affect brain and nerve health.
caveats:
- Lab testing required to confirm deficiency before supplementation is indicated.
out_of_scope_notes: Diagnosing B12 deficiency and selecting therapeutic dosing is
  out of coaching scope.
