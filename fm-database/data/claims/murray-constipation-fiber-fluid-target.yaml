slug: murray-constipation-fiber-fluid-target
statement: The first-line constipation protocol is 25 to 35 g dietary fiber per day
  (ancestral intake was ~100 g; typical Western intake is 10 to 15 g), at least six
  to eight glasses of water, and 20 minutes of exercise three times per week. Higher
  fibre intake increases bowel-movement frequency and stool quantity, shortens transit
  time, and reduces reabsorption of toxins. Bran 1/2 to 1.5 cups per day and 5 to
  10 whole prunes (or 4 to 8 fl oz prune juice) are effective whole-food options.
evidence_tier: strong
