sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 41 — Constipation, pg 713-715
  quote: The recommended daily intake is 25-35 g fiber from dietary sources. However,
    higher amounts may be optimal for health, as the diet humans evolved with contained
    approximately 100 g fiber per day. Most Western diets provide only 10 to 15 g.
    Foods particularly effective in relieving constipation are bran and prunes. Drink
    at least six to eight glasses of water per day. Four to 8 fl oz prune juice or
    5 to 10 prunes will usually be an effective dose. Exercise at least 20 minutes
    three times per week.
