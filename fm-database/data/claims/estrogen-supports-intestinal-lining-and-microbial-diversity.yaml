slug: estrogen-supports-intestinal-lining-and-microbial-diversity
statement: Estrogen supports the small intestinal lining (acting like 'mortar between
  bricks') and is influential for microbial diversity; as estrogen declines, microbial
  diversity and gut barrier integrity decrease.
evidence_tier: plausible_emerging
rationale: Single-expert synthesis source. Biologically plausible mechanisms (estrogen
  receptors in gut epithelium, estrobolome research) but no specific RCT cited. Consistent
  with emerging literature.
coaching_translation: Declining estrogen in perimenopause directly affects the health
  of the gut lining and the variety of beneficial bacteria — this is why digestive
  symptoms often appear or worsen during this transition.
caveats:
- Single-expert source (Thurlow); no specific peer-reviewed study cited.
- Mechanism is biologically plausible and supported by emerging research but not yet
  consensus.
