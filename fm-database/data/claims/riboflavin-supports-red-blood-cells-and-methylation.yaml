slug: riboflavin-supports-red-blood-cells-and-methylation
statement: Riboflavin supports red blood cell production, lowers homocysteine, and enhances methylation.
evidence_tier: plausible_emerging
rationale: Riboflavin's role as a cofactor for MTHFR and homocysteine metabolism is supported by credible biochemical evidence
  and some clinical trials, particularly for MTHFR C677T variants.
coaching_translation: Riboflavin-rich foods (eggs, liver, dairy, nutritional yeast) support both red blood cell health and
  methylation, particularly for clients with MTHFR variants.
caveats:
- Source is a practitioner cheatsheet without specific citation to primary RCTs.
- Source is practitioner cheatsheet.
- MTHFR-specific riboflavin protocols require clinician oversight.
