slug: omega-3-dha-reduces-24hr-ambulatory-bp
statement: In a double-blind trial, only DHA (not EPA) at 4 g/day reduced 24-hour
  and daytime ambulatory blood pressure; one tablespoon of flaxseed oil daily also
  reduces systolic and diastolic BP by up to 9 mm Hg.
evidence_tier: plausible_emerging
rationale: Supported by a double-blind trial cited in the text and consistent with
  broader meta-analyses on omega-3 and BP. DHA specificity is a notable finding not
  yet universally replicated.
coaching_translation: Fish oil (especially DHA-rich formulas) and flaxseed oil can
  noticeably lower blood pressure — around 5–9 mm Hg.
