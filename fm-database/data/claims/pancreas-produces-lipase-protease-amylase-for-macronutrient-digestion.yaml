slug: pancreas-produces-lipase-protease-amylase-for-macronutrient-digestion
statement: The exocrine pancreas produces lipase, proteases, and amylases to digest
  dietary fats, proteins, and carbohydrates respectively in the duodenum.
evidence_tier: strong
rationale: This is well-established gastrointestinal physiology supported by extensive
  peer-reviewed literature. Lipase, proteases, and amylases are the canonical pancreatic
  digestive enzymes with defined substrates.
coaching_translation: 'Your pancreas makes three main digestive enzymes: one for fats
  (lipase), one for proteins (protease), and one for carbohydrates (amylase). When
  the pancreas is under-functioning, all three can be affected.'
