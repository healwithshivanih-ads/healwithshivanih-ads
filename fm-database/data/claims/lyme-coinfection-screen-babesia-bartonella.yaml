slug: lyme-coinfection-screen-babesia-bartonella
statement: In Horowitz's clinical cohort, approximately 80% of chronic Lyme patients
  have Babesia and 90% have Bartonella co-infection. Babesia hallmark is drenching
  night sweats in a patient who is NOT menopausal, hypothyroid, tubercular, or has
  lymphoma — plus air hunger and migratory pain. Bartonella hallmark is rheumatoid-factor-positive
  joint pain, endothelial dysfunction (elevated VEGF — also seen in long COVID), characteristic
  skin striations, and neuropsychiatric symptoms including aphasia. Standard tick-borne
  workup MUST screen for both, not just Borrelia. Reactivated viruses (EBV, HHV-6/7,
  CMV, herpes 1/2) and fungal/mold overgrowth are the next layer.
