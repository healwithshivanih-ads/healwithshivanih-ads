slug: hbot-stroke-penumbra-not-necrosis-target
statement: HBOT cannot restore brain tissue that has fully died and been replaced
  by cerebrospinal fluid (true necrosis). It targets the surrounding penumbra — also
  called hibernating tissue or metabolic-dysfunction tissue — where infrastructure
  remains intact but cellular activity is suppressed. Pre-treatment perfusion MRI,
  DTI, and SPECT imaging can map this hibernating zone with ~80 percent accuracy in
  predicting clinical response. If no penumbra is visible on imaging, treatment is
  not offered. This is why early intervention after stroke (or before full dementia)
  matters.
evidence_tier: strong
