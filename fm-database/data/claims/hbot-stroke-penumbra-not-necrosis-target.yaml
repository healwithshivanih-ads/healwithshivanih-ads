sources:
- id: efrati-perlmutter-empowering-neurologist-2024
  location: Podcast — stroke recovery section
  quote: After each stroke we have a range of damage. Necrosis means the tissue is
    totally dead and the brain tissue is replaced with fluids — we cannot help. However,
    there is usually a tissue that is damaged but not fully dead. We have some infrastructure
    in it — penumbra, hibernating stem, metabolic dysfunction — that is where we can
    help. We can predict with accuracy of more than 80 percent what will be the end
    result.
rationale: Coaches must set realistic expectations for clients exploring HBOT post-stroke.
