slug: zinc-dht-bph-cornerstone
statement: Adequate zinc intake and absorption is paramount in BPH management. Zinc
  inhibits 5-alpha- reductase (the enzyme converting testosterone to DHT), blocks
  androgen receptor binding, and inhibits pituitary prolactin (which would otherwise
  drive prostate testosterone uptake). Zinc absorption is impaired by elevated estrogens
  and high-meat diets — both of which are common in BPH. Coach screens zinc status
  (RBC or plasma) and supplements 15 to 30 mg/day alongside lower red meat intake.
evidence_tier: strong
