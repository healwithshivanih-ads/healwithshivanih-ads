slug: fast-comt-depletes-dopamine-low-motivation
statement: Fast COMT variants over-clear dopamine and norepinephrine, resulting in
  chronically lower catecholamine tone — associated with ADHD-like inattention, low
  motivation, depression tendency, and poor stress response.
evidence_tier: plausible_emerging
rationale: The Met allele vs. Val allele COMT distinction is genuinely bidirectional,
  with fast metabolisers showing lower prefrontal dopamine in some studies. The ADHD
  and depression associations are plausible but not robustly confirmed at population
  level. Individual variation is large. Source is a consumer book.
coaching_translation: If you have fast COMT traits (spacey, low motivation, need coffee
  to function, feel great on high-protein days), your body burns through its 'focus
  chemicals' too quickly. A high-protein diet, good sleep, and engaging activities
  help your brain rebuild dopamine stores.
caveats:
- COMT variant alone does not determine ADHD or depression diagnosis
- Dietary protein is the appropriate first intervention; tyrosine supplementation
  requires clinician input
