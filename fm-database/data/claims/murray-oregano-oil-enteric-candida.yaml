slug: murray-oregano-oil-enteric-candida
statement: Enteric-coated oregano oil (carvacrol + thymol) delivers volatile antifungal
  compounds past gastric acid to the small intestine where candida overgrowth typically
  presents. One of Murray's four primary recommended natural anti-yeast agents alongside
  berberine, garlic, and propolis. Carvacrol disrupts fungal membrane integrity via
  similar mechanism to allicin and propolis flavonoids.
evidence_tier: plausible_emerging
rationale: Multiple in vitro + smaller clinical trials. Enteric coating critical —
  non-enteric oregano oil largely destroyed in stomach. Carvacrol and thymol have
  broad antimicrobial spectrum including azole-resistant candida strains.
coaching_translation: Oregano oil is potent — but the form matters enormously. Use
  ENTERIC-COATED capsules so it delivers past the stomach to where candida lives.
  150-200 mg oil per capsule, 1-2 capsules twice daily with food. Cycle 4 weeks then
  break. Non-enteric soft gels lose most activity to stomach acid.
caveats:
- ENTERIC-COATED form essential
- 4-week cycles with breaks
- Mild antiplatelet effect
- Pregnancy avoid
