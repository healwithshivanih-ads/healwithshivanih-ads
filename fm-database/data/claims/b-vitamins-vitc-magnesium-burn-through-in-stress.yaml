slug: b-vitamins-vitc-magnesium-burn-through-in-stress
statement: Chronic HPA activation depletes B vitamins (especially B5/pantothenic acid,
  B6, and B12), vitamin C, and magnesium — the nutrients adrenal steroidogenesis runs
  on. Wentz's foundational replenishment in the Adrenal Transformation Protocol uses
  a B-complex, vitamin C 500-1000 mg/day, and magnesium glycinate 200-400 mg pre-bed.
  These three are the "minimum effective stack" before any adaptogens or hormonal
  interventions are considered.
