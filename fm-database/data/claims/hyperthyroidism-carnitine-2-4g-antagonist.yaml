sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 66 — Hyperthyroidism, pg 1109-1110
  quote: Carnitine has been shown to be an antagonist of thyroid hormone in peripheral
    tissues, inhibiting the hormone's entry into the cell nucleus. The authors of
    this study recommend considering carnitine for Graves' disease-induced thyrotoxicosis
    during pregnancy, during lactation, or in other conditions in which antithyroid
    drugs may be unwanted.
