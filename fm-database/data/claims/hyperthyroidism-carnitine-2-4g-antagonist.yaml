slug: hyperthyroidism-carnitine-2-4g-antagonist
statement: Carnitine 2-4 g/day acts as a peripheral thyroid hormone antagonist by
  inhibiting T3/T4 entry into the cell nucleus. A 6-month RCT in 50 women on suppressive
  thyroxine showed carnitine reversed thyrotoxic symptoms, improved bone and liver
  markers, and maintained benefits while on therapy. Especially valuable when antithyroid
  drugs are unwanted — pregnancy, lactation, liver disease, blood disorders — because
  carnitine has extremely low toxicity.
evidence_tier: strong
