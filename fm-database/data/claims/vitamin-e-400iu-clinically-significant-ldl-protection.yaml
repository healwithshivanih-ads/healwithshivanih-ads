slug: vitamin-e-400iu-clinically-significant-ldl-protection
statement: Vitamin E doses above 400 IU produce clinically significant protection
  against LDL-C oxidation; higher doses progressively extend oxidation lag time and
  reduce lipid peroxidation propagation rate.
evidence_tier: plausible_emerging
rationale: Dose-response data for LDL oxidation is consistent; large-scale CVD outcome
  trials (HOPE, CHAOS, SPACE, GISSI) showed conflicting results, likely due to use
  of synthetic vs. natural vitamin E and failure to co-administer CoQ10 and selenium.
coaching_translation: Natural vitamin E (d-alpha tocopherol, mixed tocopherols) protects
  LDL from oxidation — but works best alongside CoQ10, selenium, and vitamin C.
caveats:
- Large RCTs (HOPE) showed no CVD mortality benefit at 400 IU; results may reflect
  synthetic form used or missing cofactors
- Source is a textbook — verify with primary literature
