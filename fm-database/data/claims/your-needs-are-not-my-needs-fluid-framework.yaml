  location: Podcast — fluid framework segment
  quote: Two overarching principles. One is that your needs are not necessarily my
    needs and my needs are not necessarily your needs because you and me are different.
    And my needs right now might not be what they were 20 years ago and they might
    not be what they will be in 20 years. You want to have a very fluid mental framework
    — you don't want to stick to it to the point of an ideology.
rationale: Gives coach a kind framing for dismantling dietary identity when client
  is suffering — "your body's needs have changed" is easier than "you've been wrong."
