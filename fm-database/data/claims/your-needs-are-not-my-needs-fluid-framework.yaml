slug: your-needs-are-not-my-needs-fluid-framework
statement: Two overarching nutritional principles Masterjohn applies to every client
  — (1) your needs are not the same as my needs because we are biochemically different;
  (2) your needs now are not the same as your needs 20 years ago or 20 years from
  now. Nutritional strategy must therefore be a FLUID framework — find what works,
  stick to it long enough to test it, but never to the point of ideology. Coach watch
  — when a client clings to a dietary identity (keto, vegan, carnivore, raw) despite
  worsening symptoms, this principle is the most helpful conversation opener.
evidence_tier: plausible_emerging
