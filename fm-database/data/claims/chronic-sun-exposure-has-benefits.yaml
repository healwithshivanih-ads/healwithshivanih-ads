slug: chronic-sun-exposure-has-benefits
statement: Chronic (not intermittent) sun exposure carries cancer-protective and all-cause-mortality
  benefits partly independent of vitamin D — a Swedish cohort found sun-avoiders had
  about twice the mortality with no rise in skin-cancer death.
evidence_tier: plausible_emerging
rationale: Cites European cancer and Swedish cohort mortality data.
coaching_translation: Sensible regular sunlight is protective for overall health —
  sun avoidance carries its own risks.
