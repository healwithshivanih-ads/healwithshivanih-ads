slug: murray-fish-oil-cuts-hot-flashes
statement: Fish oil at 1,200 mg/day EPA + DHA for 8 weeks reduced hot flash frequency
  by 55% in midlife women with moderate-to-severe psychological distress (n=120 DB-RCT),
  with 58.5% responder rate vs 34.4% placebo. The same dose also delivers cardiometabolic
  + triglyceride-lowering benefits.
evidence_tier: plausible_emerging
rationale: Lucas 2009 single DB-RCT cited; corroborated by separate hot-flash + cardiometabolic
  literature. Mechanism — EPA modulates serotonin + endothelial NO. Stacks well with
  other supplements; no drug-supplement interactions typical at this dose.
coaching_translation: Fish oil at 1,200 mg/day combined EPA+DHA cut hot flushes by
  55% in a trial of midlife women with mood distress. It's one of the few interventions
  that also helps cardiovascular risk and triglycerides in the same dose — important
  since perimenopause is when cardiometabolic risk starts climbing.
caveats:
- Quality matters — third-party tested for oxidation + heavy metals
- Mild blood-thinning effect — caution + anticoagulants or before surgery
- Splits the difference between hot flush + cardiometabolic benefit — useful single
  addition
