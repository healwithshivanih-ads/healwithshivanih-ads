slug: bismuth-subcitrate-superior-h-pylori-eradication
statement: Bismuth subcitrate produces the best results against H. pylori among bismuth
  preparations and is a naturally occurring mineral antacid and H. pylori inhibitor
  with a lower risk of inducing bacterial resistance than standard antibiotics.
evidence_tier: plausible_emerging
rationale: Bismuth's anti-H. pylori mechanism (disruption of bacterial cell wall and
  urease inhibition) is well described; comparative superiority of subcitrate over
  subsalicylate is stated in this FM source. Bismuth is used in standard triple therapy
  internationally.
coaching_translation: Bismuth supplements are a natural mineral that can help control
  H. pylori without the antibiotic resistance risk.
caveats:
- Bismuth subcitrate requires compounding pharmacy in some regions; clinician oversight
  recommended.
- Avoid bismuth subsalicylate in children with viral illness due to Reye's syndrome
  risk.
