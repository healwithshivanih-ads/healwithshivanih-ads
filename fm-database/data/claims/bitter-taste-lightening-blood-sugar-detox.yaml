slug: bitter-taste-lightening-blood-sugar-detox
statement: Bitter taste foods — dark leafy greens, fenugreek, turmeric, neem — are the most 'lightening'
  taste in Ayurveda. They reduce excess fat and mucus, support blood sugar regulation, cleanse the blood
  of toxins, and improve digestion. Modern Ayurvedic practice recommends including some bitter taste daily,
  especially in spring and summer.
evidence_tier: plausible_emerging
rationale: Bitter compounds (e.g. fenugreek alkaloids, curcumin, bitter melon) have documented effects
  on blood sugar regulation, bile secretion, and hepatic detoxification pathways.
coaching_translation: Add something bitter to your diet daily — a small serving of kale, a pinch of fenugreek,
  or turmeric in your cooking. Bitter foods are the most medicinal taste for cleaning the liver and blood
  and supporting blood sugar. Most people eat no bitter foods at all in the modern diet.
out_of_scope_notes: ''
caveats:
- Excess bitter taste depletes and dries the body — use in moderate amounts.
- Particularly relevant for clients with blood sugar dysregulation, fatty liver, or sluggish bile.
