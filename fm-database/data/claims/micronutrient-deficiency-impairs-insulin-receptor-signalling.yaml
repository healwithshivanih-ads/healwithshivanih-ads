slug: micronutrient-deficiency-impairs-insulin-receptor-signalling
statement: Low chromium, magnesium, and vitamin D impairs insulin-receptor signalling,
  contributing to insulin resistance.
evidence_tier: plausible_emerging
rationale: 'Mechanistic basis is credible: magnesium is a cofactor for insulin receptor
  tyrosine kinase; chromium potentiates insulin signalling; vitamin D receptors are
  expressed in pancreatic beta-cells. Some RCTs support supplementation benefit in
  deficiency states.'
coaching_translation: Being low in certain nutrients — like magnesium, chromium, and
  vitamin D — can make it harder for your body to respond to insulin properly.
