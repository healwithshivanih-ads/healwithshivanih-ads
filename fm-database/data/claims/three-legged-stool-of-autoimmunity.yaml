  quote: Dr Alessio Fasano talks about the three-legged stool — you have that genetic
    predisposition component, plus the trigger, the stressor. With Hashimoto's that
    trigger for women can be pregnancy, perimenopause, puberty, menopause, hormonal
    shifts. We also see a large tie back to Epstein-Barr virus.
rationale: Names the three-legged stool by Fasano so coach can frame intake conversation
  around finding the trigger, not just naming the antibodies.
