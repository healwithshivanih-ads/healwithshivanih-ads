slug: three-legged-stool-of-autoimmunity
statement: Hashimoto's onset follows Alessio Fasano's three-legged-stool model — genetic
  predisposition (often a family history of any autoimmune disease, not necessarily
  Hashimoto's), increased intestinal permeability ("leaky gut"), and an environmental
  trigger. Common triggers Hornaman sees clinically — pregnancy and postpartum, perimenopause
  and menopause, puberty, sudden major life stress (job loss, divorce, bereavement),
  Epstein-Barr virus reactivation, and accumulated endocrine-disruptor exposure. The
  autoimmune "switch" turns on when all three legs are present; coach uses this to
  identify the trigger and remove or buffer it.
