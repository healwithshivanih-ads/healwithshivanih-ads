slug: statin-increases-cognitive-impairment-risk
statement: Statin therapy may increase the risk of mild cognitive impairment and Alzheimer's
  disease.
evidence_tier: plausible_emerging
rationale: The document asserts this association. Evidence in the literature is mixed
  — some studies show neuroprotection, others show cognitive side effects, particularly
  in women. Cholesterol's essential role in neuronal membrane function provides a
  plausible mechanism.
coaching_translation: Some research suggests statin use may be associated with memory
  or thinking difficulties. If you or a client notice cognitive changes after starting
  a statin, that's worth raising with their doctor.
caveats:
- Evidence is mixed — some literature suggests statins may protect against dementia
  in certain populations.
- Association does not equal causation; confounding by indication is possible.
- Source is a lecture synthesis; verify with primary literature.
