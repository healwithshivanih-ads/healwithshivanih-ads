slug: butyrate-enemas-treat-ulcerative-colitis
statement: Short-chain fatty acid (butyrate) enemas can induce remission in distal
  ulcerative colitis — butyrate is the primary energy substrate for colonocytes, and
  UC features butyrate-utilisation impairment. Prebiotic fibres that ferment to butyrate
  (resistant starch, partially hydrolysed guar gum, inulin) provide oral support.
evidence_tier: plausible_emerging
rationale: Pizzorno cites Scheppach 1992 and other small RCTs showing butyrate enema
  benefit in distal UC. Mechanism — restores colonocyte energy metabolism, supports
  tight junctions, anti-inflammatory through HDAC inhibition.
coaching_translation: The cells lining your colon literally eat butyrate (a short-chain
  fat made by gut bacteria from fibre). In ulcerative colitis the colon loses the
  ability to use butyrate. Topical butyrate enemas or fermentable fibres can restore
  this metabolism.
caveats:
- Butyrate enemas require compounding pharmacy or specialist supply.
- Fermentable fibre alternatives — resistant starch, PHGG, inulin — tolerated variably.
- Reduce trigger foods (wheat, corn, dairy, carrageenan) in parallel.
