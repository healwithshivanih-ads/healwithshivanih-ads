slug: low-shbg-causes-androgen-excess-symptoms
statement: Low SHBG increases free testosterone and estrogen, leading to symptoms
  such as hair loss, acne, and excess fluid retention.
evidence_tier: plausible_emerging
rationale: Biologically plausible and described in FM literature; low SHBG is associated
  with androgen excess conditions such as PCOS, though direction of causality is complex.
coaching_translation: When SHBG is too low, hormones like testosterone and estrogen
  run 'unbound' and high — this can show up as oily skin, breakouts, hair thinning,
  or feeling puffy.
caveats:
- Source is an expert-consensus toolkit
- Individual presentation varies widely; lab testing needed to confirm
