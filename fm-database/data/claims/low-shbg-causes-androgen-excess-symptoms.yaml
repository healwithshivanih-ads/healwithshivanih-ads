  location: Sex Hormone Binding Globulin (SHBG)
  quote: When SHBG levels in the body are low, there is not enough binding power to
    keep sex hormones within the optimal range. This can lead to increased free testosterone
    and estrogen in the body, which can lead to symptoms like hair loss, acne, and
    excess fluid retention.
