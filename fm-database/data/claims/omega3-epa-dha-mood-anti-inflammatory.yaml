slug: omega3-epa-dha-mood-anti-inflammatory
statement: Omega-3 fatty acids (EPA+DHA) at 1–3 g/day exert anti-inflammatory effects,
  modulate serotonin/dopamine receptor expression, and improve symptoms of depression
  and anxiety, particularly at an EPA:DHA ratio of 2:1.
evidence_tier: plausible_emerging
rationale: Multiple meta-analyses support EPA-dominant omega-3 supplementation for
  depression (Mocking et al., 2016). Anti-inflammatory mechanisms are well characterized.
  Plausible_emerging rather than strong as consensus on dosing and specific indications
  is still evolving.
coaching_translation: A quality EPA/DHA supplement (1–3 g/day with more EPA than DHA)
  can support mood alongside a fish-rich diet.
caveats:
- Source is a synthesis document.
- Warfarin + fish oil + aspirin combination carries bleeding risk — clinician oversight
  required.
