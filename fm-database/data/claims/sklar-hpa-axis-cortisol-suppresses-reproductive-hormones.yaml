slug: sklar-hpa-axis-cortisol-suppresses-reproductive-hormones
statement: Chronic activation of the HPA axis — not from one-off life events but from
  the daily grind of trying to conceive, two-week waits, appointments, early-morning
  HIIT workouts and short sleep — elevates cortisol enough to suppress the reproductive
  hormones needed for healthy ovulation, an adequate luteal phase, and early-pregnancy
  support.
