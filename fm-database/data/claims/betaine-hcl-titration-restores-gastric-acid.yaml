  location: Testing for Low Stomach Acidity — Self-Testing and Treatment for Low HCl
  quote: Begin by taking one 350-750 mg capsule of betaine HCl with a protein-containing
    meal. A normal response in a healthy person would be discomfort—basically heartburn.
    If you do not feel a burning sensation, begin taking two capsules with each protein-containing
    meal.
