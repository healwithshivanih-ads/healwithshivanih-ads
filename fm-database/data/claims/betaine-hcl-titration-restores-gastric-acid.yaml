slug: betaine-hcl-titration-restores-gastric-acid
statement: A betaine HCl titration protocol (starting at 350–750 mg per protein meal,
  increasing to up to 5 capsules) can help identify and address HCl deficiency in
  patients with hypochlorhydria.
evidence_tier: fm_specific_thin
rationale: The HCl challenge test is widely used in FM practice. Controlled clinical
  trial evidence is limited. Contraindicated in peptic ulcer disease.
out_of_scope_notes: This protocol is clinician-supervised only. Coaches should not
  recommend specific dosing. Refer clients to their healthcare provider.
caveats:
- Must be supervised by a clinician.
- Contraindicated with peptic ulcer disease.
- Source is a practitioner toolkit, not primary RCT evidence.
