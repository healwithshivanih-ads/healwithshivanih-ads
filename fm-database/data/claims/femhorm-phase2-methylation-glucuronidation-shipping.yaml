slug: femhorm-phase2-methylation-glucuronidation-shipping
statement: After phase I hydroxylation, the liver's phase II 'shipping department'
  neutralises and packages oestrogen metabolites for excretion via methylation, sulfation
  and glucuronidation. Methylation acts like a priority sticker (needing the right
  B12/folate and methyl-donor foods) and glucuronidation like bubble wrap for the
  harsher metabolites. A coach supports phase II by coaching methyl-donor foods, cruciferous
  vegetables, fibre and regular bowel movements — the clinician handles genes and
  targeted supplements.
evidence_tier: plausible_emerging
rationale: Phase II is highly food- and habit-responsive, which makes it prime coaching
  territory. Explaining it as 'packaging and shipping' makes an abstract pathway concrete
  for clients.
coaching_translation: 'Describe phase II as the liver''s shipping department: it wraps
  and labels used-up oestrogen so the body can send it out. Coach the inputs — methyl-donor
  foods (beets, spinach, eggs, quinoa), B-vitamin-rich foods, cruciferous veg and
  fibre — plus daily bowel movements, so the packaging actually leaves the body.'
out_of_scope_notes: Checking methylation genes (MTHFR, COMT), prescribing methylated
  B vitamins or calcium-D-glucarate, and interpreting stool findings is the clinician's
  job.
caveats:
- Even perfect phase II fails if the client is constipated — elimination is the final
  step.
- Coach food and bowel habits; leave gene testing and supplement dosing to the clinician.
