slug: lemon-is-most-alkaline-forming-food
statement: Despite being acidic in taste, lemon is the most alkaline-forming food
  when metabolised, due to its high content of alkaline minerals (sodium, potassium,
  magnesium, calcium, and iron).
evidence_tier: fm_specific_thin
rationale: The concept of 'ash pH' or metabolic alkalinity of lemon is common in functional
  and naturopathic medicine. Lemons do contain alkaline minerals and have a low PRAL
  (Potential Renal Acid Load) score, making them net alkaline-forming. However, ranking
  lemon as 'the most' alkaline-forming food is not clearly established in peer-reviewed
  literature.
coaching_translation: Lemon juice in warm water is a great morning habit — it supports
  your stomach acid (where acidity is needed) and delivers alkaline minerals to the
  rest of your body.
caveats:
- The claim that lemon is definitively 'the most' alkaline-forming food is not confirmed
  by peer-reviewed PRAL studies. This is FM-specific framing.
- Source is a lecture transcript, not primary literature.
