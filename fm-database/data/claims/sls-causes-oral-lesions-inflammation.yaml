slug: sls-causes-oral-lesions-inflammation
statement: Sodium Lauryl Sulfate (SLS/SLES) in toothpaste causes chronic oral lesions
  (canker sores), cracking at the corners of the mouth, irritation of oral tissues,
  and inflammation, and may trigger hypersensitivity to certain metals.
evidence_tier: plausible_emerging
rationale: Several small RCTs and observational studies have found associations between
  SLS-containing toothpastes and recurrent aphthous ulcers (canker sores). Mechanism
  via disruption of protective mucosal layer is biologically plausible.
coaching_translation: If you frequently get canker sores or mouth irritation, check
  your toothpaste for SLS — switching to an SLS-free formula has helped many people
  reduce these symptoms.
