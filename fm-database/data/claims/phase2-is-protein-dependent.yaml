slug: phase2-is-protein-dependent
statement: Phase 2 detoxification is protein-dependent; inadequate dietary protein
  reduces availability of conjugation substrates (glycine, taurine, glutamine) and
  impairs toxin clearance.
evidence_tier: plausible_emerging
rationale: 'Biochemically sound: amino acid conjugation in Phase 2 directly requires
  glycine, taurine, and glutamine. Low protein diets reduce circulating amino acid
  pools. While this logic is solid, specific clinical thresholds for protein intake
  and detox impairment are not well-defined in RCTs.'
coaching_translation: Your liver needs amino acids (from protein) as raw materials
  to attach to and neutralize toxins. If your diet is low in protein, your detox system
  runs low on supplies and toxins can back up.
caveats:
- Expert lecture source (moderate quality). Biochemical mechanism is plausible and
  well-reasoned; RCT evidence on protein intake thresholds for detox capacity is limited.
