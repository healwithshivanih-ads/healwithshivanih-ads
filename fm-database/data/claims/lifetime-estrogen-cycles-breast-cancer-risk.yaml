sources:
- id: welch-balance-your-hormones-2011
  location: 'Chapter 9 — Menstruation: Eliminating Cycles'
  quote: The more cycles a woman has in her life, the greater her overall exposure to monthly surges in
    estradiol. This means that the later a woman gets her period, the earlier her onset of menopause,
    the more pregnancies she has, and the longer she nurses, the less she is exposed to these surges.
