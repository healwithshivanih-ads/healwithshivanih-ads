slug: lifetime-estrogen-cycles-breast-cancer-risk
statement: Increased lifetime exposure to estrogen (from more menstrual cycles) is linked to increased
  breast cancer risk; factors that reduce total cycle number — later menarche, earlier menopause, more
  pregnancies, longer nursing — are associated with lower breast cancer incidence.
evidence_tier: strong
rationale: Well-established epidemiological association cited in mainstream oncology; estradiol's mitogenic
  effects on breast tissue underpin this relationship.
coaching_translation: The number of menstrual cycles a woman has over her lifetime influences her breast
  cancer risk, partly because estrogen rises with each cycle. This is why breastfeeding longer and having
  children earlier in reproductive life is protective.
out_of_scope_notes: ''
caveats:
- Absolute individual risk remains low; this population-level association does not mean individual women
  should try to minimise cycles.
