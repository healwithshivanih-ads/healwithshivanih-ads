slug: celtic-salt-supports-sleep
statement: Taking a small amount of Celtic salt before bed, due to its free magnesium content (a muscle relaxant), may help
  support sleep onset.
evidence_tier: fm_specific_thin
rationale: Magnesium's role in muscle relaxation and sleep is well-supported in the literature. The delivery via Celtic salt
  is a FM-specific approach with limited direct clinical trial evidence.
coaching_translation: A small pinch of Celtic salt before bed is a simple, low-risk strategy that may help with sleep, thanks
  to its magnesium content.
caveats:
- No RCT evidence for Celtic salt specifically improving sleep
- Source is expert lecture
- Not appropriate for clients with cardiovascular or renal conditions without clinician approval
