slug: glycemic-control-reduces-retinopathy-76-percent
statement: Good glycaemic control reduces risk of diabetic retinopathy by up to 76%,
  nephropathy by up to 56%, and neuropathy by up to 60%.
evidence_tier: strong
rationale: Derived from the DCCT and UKPDS trials; consistent with Pizzorno's clinical
  guidelines.
coaching_translation: Keeping blood sugar tightly controlled is the single most powerful
  thing a diabetic can do to protect their eyes, kidneys, and nerves.
