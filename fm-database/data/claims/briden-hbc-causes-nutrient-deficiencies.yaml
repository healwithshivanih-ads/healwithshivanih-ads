slug: briden-hbc-causes-nutrient-deficiencies
statement: Hormonal birth control is associated with deficiency of multiple micronutrients
  important for mood, methylation, and connective tissue — particularly vitamins B6,
  B12, folate, vitamin C, vitamin E, magnesium, selenium, and zinc. HBC also alters
  intestinal and vaginal bacterial communities, raising the risk of yeast infections,
  abnormal pap smears, and digestive symptoms, and may impair bone mineral acquisition
  in adolescents and young adults.
evidence_tier: strong
rationale: Pill-induced micronutrient depletion is one of the most consistently replicated
  findings in HBC pharmacology research; clinical implications for mood (via B6 and
  folate methylation) and bone (via altered estrogen signalling on osteoblasts) are
  well documented. Briden cites specific studies on bone mineral density in pill users.
coaching_translation: The pill depletes several nutrients your body needs — especially
  the B vitamins your brain uses to make serotonin, plus magnesium, zinc, and selenium.
  It also shifts your gut and vaginal bacteria. Asking your clinician about a B-complex
  with active folate and methylated B12 is a sensible step while you are on it or
  have just come off.
caveats:
- Replacing the nutrients does not eliminate the other side effects.
- For adolescents on HBC, peak bone mass accrual may be impaired — long-term significance
  is debated.
