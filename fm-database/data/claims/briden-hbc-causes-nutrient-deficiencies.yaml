  location: Chapter 2 — But Wait There's More, pg 34
  quote: Hormonal birth control can also cause high blood pressure, nutrient deficiency,
    and reduced thyroid function. Hormonal birth control alters both your intestinal
    and vaginal bacteria and that can lead to digestive problems, yeast infections,
    and abnormal PAP smears. Finally, studies have shown that hormonal birth control
    may prevent you from forming healthy bones.
