slug: morning-electrolytes-and-light-as-cortisol-anchor
statement: Wentz's first-thing-on-waking ritual for clients with flat-line cortisol
  — a glass of water with electrolytes (her "adrenal kickstart drink") plus 5-10 minutes
  of direct outdoor sunlight before any screen, coffee, or cortisol-stimulating activity.
  The combination supports volume status, primes the cortisol awakening response,
  and resets circadian rhythm. Bright-light therapy boxes are an acceptable substitute
  for high-latitude or bedroom-shift clients in winter.
