slug: gene-variants-are-insight-not-good-or-bad
statement: Gene variants (SNPs / 'spelling changes') are neither good nor bad — they
  provide insight into who a client is and how they respond to the world, not a verdict
  or a diagnosis. Coaching language should stay with 'this is your picture / how you
  respond', never 'you have a bad mutation'.
evidence_tier: plausible_emerging
rationale: When a client frames a result as a good/bad mutation, reframe it as insight
  into their responsiveness, then coach the lifestyle levers.
coaching_translation: When a client frames a result as a good/bad mutation, reframe
  it as insight into their responsiveness, then coach the lifestyle levers.
out_of_scope_notes: Do not label variants as pathological or imply disease risk —
  that is clinical interpretation.
