slug: thiazide-diuretics-cause-false-hypercalcemia
statement: Thiazide diuretics can cause falsely elevated serum calcium by interfering
  with renal calcium excretion, and should be considered when interpreting hypercalcemia
  in hypertensive patients.
evidence_tier: strong
rationale: Thiazide diuretics are well-known to reduce renal calcium excretion (used
  therapeutically in hypercalciuria). The resulting elevation in serum calcium is
  a recognized drug effect, well-documented in pharmacology.
coaching_translation: If someone is on a water pill (thiazide diuretic) for blood
  pressure, their calcium may look high on labs even without a true problem — this
  is a known medication effect that a doctor needs to interpret.
out_of_scope_notes: Medication interpretation is out of coaching scope. Refer to prescribing
  clinician.
