slug: stress-blocks-release-of-hydrochloric-acid
statement: Psychological stress blocks the release of hydrochloric acid, impairing
  protein digestion and overall gastric function.
evidence_tier: plausible_emerging
rationale: The HPA axis and sympathetic nervous system suppression of digestive secretions
  is well-documented in psychoneuroimmunology. Eating under stress reducing gastric
  acid secretion is physiologically plausible and consistent with the gut-brain axis
  literature.
coaching_translation: Try to eat in a calm, relaxed environment. Avoid eating when
  stressed, rushing, or emotionally upset. Even a few deep breaths before a meal can
  support your digestive system.
caveats:
- Source is a practitioner talk.
- The specific mechanism of HPA stress on HCl secretion is referenced without citation.
