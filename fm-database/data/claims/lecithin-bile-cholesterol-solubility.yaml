slug: lecithin-bile-cholesterol-solubility
statement: Lecithin (phosphatidylcholine) is the primary cholesterol solubiliser in
  bile. Dosing 100 mg three times daily measurably raises biliary lecithin; higher
  doses (up to 10 g) raise it more. Used as supportive therapy for cholesterol-saturated
  bile alongside fiber and weight management — won't dissolve existing stones on its
  own but improves bile composition.
evidence_tier: plausible_emerging
