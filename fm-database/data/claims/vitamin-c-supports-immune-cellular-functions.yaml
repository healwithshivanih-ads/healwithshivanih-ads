slug: vitamin-c-supports-immune-cellular-functions
statement: Vitamin C (1–3 g daily) contributes to immune defense by supporting various
  cellular functions of the immune system and has been used in ICUs to treat COVID-19.
evidence_tier: plausible_emerging
rationale: Vitamin C's role in immune cell function is mechanistically established.
  IV high-dose vitamin C for COVID-19 ICU use is emerging/investigational. Oral doses
  of 1–3 g/day are generally safe and support immune function, though consistent prophylactic
  benefit for viral illness is modest in meta-analyses.
coaching_translation: Vitamin C is a foundational immune nutrient. A daily dose of
  1–3 g may help your immune system function optimally, especially during illness
  or high-stress periods.
out_of_scope_notes: ICU IV vitamin C protocols for COVID-19 are strictly clinician/hospital
  scope.
caveats:
- IV high-dose Vitamin C is clinician/hospital scope only.
- Oral doses > 2g/day may cause GI upset (osmotic diarrhea) in some individuals.
- COVID-19 ICU evidence is from emerging/observational literature.
