slug: aneuploidy-and-follicle-depletion-drive-ama-live-birth-decline
statement: 'The age-related decline in live birth rate is attributable principally
  to two convergent biological problems: high oocyte aneuploidy rate (preventing fertilisation,
  implantation, and continued embryonic development) and follicle depletion (reducing
  the pool of available oocytes per cycle). Both are explained mechanistically by
  mitochondrial dysfunction. This framing focuses preconception protocols on aneuploidy
  reduction (mitochondrial support, antioxidants) and follicle preservation (avoiding
  toxins, maintaining metabolic health) rather than diffuse general-health interventions.'
