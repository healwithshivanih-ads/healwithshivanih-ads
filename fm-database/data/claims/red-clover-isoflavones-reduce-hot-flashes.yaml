slug: red-clover-isoflavones-reduce-hot-flashes
statement: Red clover isoflavone extracts (Trifolium pratense) have demonstrated scientific
  efficacy for menopausal vasomotor symptoms, alongside soy, black cohosh, kava, and
  bioflavonoids.
evidence_tier: plausible_emerging
rationale: Pizzorno groups red clover among supplements with proven scientific efficacy
  for menopausal symptoms. Multiple RCTs of standardised red clover (40-80 mg isoflavones/day)
  show modest hot-flash reduction; meta-analyses are mixed.
coaching_translation: Red clover concentrates the same gentle plant estrogens as soy.
  For women who don't tolerate soy or who eat little soy in their diet, a standardised
  red-clover extract is a reasonable alternative.
caveats:
- Use standardised extract (40-80 mg isoflavones/day).
- Avoid in hormone-sensitive cancers, pregnancy, on anticoagulants/tamoxifen.
- Effect equol-producer-status modulated as with soy.
