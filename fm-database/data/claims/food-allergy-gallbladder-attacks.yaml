slug: food-allergy-gallbladder-attacks
statement: Food allergies are a major trigger for gallbladder attacks via bile duct
  swelling. In Breneman's classic series 100% of patients were symptom-free on a basic
  elimination diet (beef, rye, soy, rice, cherry, peach, apricot, beet, spinach);
  eggs caused attacks in 93% of patients on rechallenge, followed by pork, onion,
  poultry, milk, coffee, citrus, corn, beans, nuts. Coach trials a 2 to 3 week egg-and-top-9-eliminate
  first for any client with recurrent biliary pain.
