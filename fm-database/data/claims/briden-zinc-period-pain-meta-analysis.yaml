slug: briden-zinc-period-pain-meta-analysis
statement: Zinc supplementation can significantly reduce period pain (dysmenorrhoea)
  according to a 2024 meta-analysis. The proposed mechanisms are reduction of prostaglandins,
  normalisation of progesterone receptors, improved uterine circulation, and prevention
  of uterine muscle spasm. Effective dose is around 30 mg per day with food.
evidence_tier: strong
rationale: Briden cites a 2024 meta-analysis showing significant reduction in period
  pain. The prostaglandin-modulation mechanism is consistent with zinc's known role
  as a cofactor in eicosanoid metabolism.
coaching_translation: For period pain, a 2-3 month trial of zinc 30 mg daily after
  dinner is well-supported by recent meta-analytic evidence and is a low-risk first-pass
  intervention.
