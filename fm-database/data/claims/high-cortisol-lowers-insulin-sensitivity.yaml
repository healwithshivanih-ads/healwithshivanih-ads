slug: high-cortisol-lowers-insulin-sensitivity
statement: Chronically elevated cortisol lowers insulin sensitivity, increasing susceptibility
  to type 2 diabetes.
evidence_tier: strong
rationale: 'Well-established mechanism: cortisol is a counter-regulatory hormone to
  insulin, promoting hepatic glucose production and reducing peripheral glucose uptake.
  Supported by extensive endocrinological literature including Cushing''s syndrome
  studies.'
coaching_translation: Long-term stress hormones make it harder for your cells to respond
  to insulin, which can lead to blood sugar problems and eventually type 2 diabetes.
