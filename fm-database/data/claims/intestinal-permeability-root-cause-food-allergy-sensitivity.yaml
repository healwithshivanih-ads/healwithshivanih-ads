slug: intestinal-permeability-root-cause-food-allergy-sensitivity
statement: Increased intestinal permeability (leaky gut) is the primary root cause of both food allergy and food sensitivity,
  as it allows undigested peptides to enter the bloodstream and trigger immune reactions.
evidence_tier: plausible_emerging
rationale: The leaky gut–food sensitivity link is a central FM hypothesis with plausible biological mechanisms (tight junction
  disruption, antigen translocation). Growing preclinical and some clinical evidence supports the connection, but it is not
  yet peer-reviewed consensus for all food allergy types.
coaching_translation: Rather than just avoiding trigger foods, the deeper goal is healing the gut lining. When the gut heals,
  food reactions often improve or resolve over time.
caveats:
- Source is expert lecture, moderate quality.
- Calling leaky gut the 'primary root cause' of all food allergy is an FM-specific framing; conventional allergy medicine
  does not uniformly endorse this.
- This claim should be framed as a working hypothesis for gut-healing plans, not stated as established fact to clients.
