- id: dirty-genes-lynch
  location: 'Chapter 10 — Folic Acid: Your Foe'
  quote: Your NOS3 depends on a compound called NADPH, which folic acid also uses.
    So the more folic acid you consume, the more NADPH you pull away from supporting
    your NOS3. Second, as your level of folic acid increases, your level of BH4 decreases.
