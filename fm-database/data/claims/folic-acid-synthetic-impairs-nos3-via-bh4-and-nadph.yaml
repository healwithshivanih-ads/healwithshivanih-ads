slug: folic-acid-synthetic-impairs-nos3-via-bh4-and-nadph
statement: Synthetic folic acid (as opposed to natural food folate) competes for NADPH—a
  cofactor also required by NOS3—and elevates unmetabolised folic acid levels that
  reduce BH4 availability, thereby impairing nitric oxide production.
evidence_tier: plausible_emerging
rationale: Lynch's specific claim about folic acid competing for NADPH and reducing
  BH4 is mechanistically coherent and has some support in the literature on unmetabolised
  folic acid and MTHFR variants, but the direct NOS3 implication at typical supplemental
  doses is not firmly established by RCTs.
coaching_translation: Recommend clients obtain folate from food sources (leafy greens)
  or methylfolate supplements rather than synthetic folic acid, especially in the
  context of cardiovascular or NOS3 support.
caveats:
- Source is a consumer trade book
- Avoidance of all folic-acid-fortified foods is extreme advice that requires clinician
  discussion in pregnancy
