slug: 80-90-percent-hypothyroid-is-autoimmune
statement: An estimated 80–90% of hypothyroid cases are autoimmune (Hashimoto's),
  yet autoimmunity is frequently overlooked in conventional treatment.
evidence_tier: plausible_emerging
rationale: The document states '80–90% of hypothyroid cases are autoimmune'. This
  figure is cited widely in FM literature; epidemiological studies support Hashimoto's
  as the leading cause of hypothyroidism in iodine-sufficient regions, though the
  exact percentage varies.
coaching_translation: Most people with an underactive thyroid have an immune system
  issue driving it — addressing gut health and inflammation matters as much as the
  thyroid itself.
caveats:
