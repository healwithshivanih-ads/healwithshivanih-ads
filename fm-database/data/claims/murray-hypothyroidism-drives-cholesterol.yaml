slug: murray-hypothyroidism-drives-cholesterol
statement: Hypothyroidism — even subclinical — predisposes to atherosclerosis by elevating
  cholesterol, triglycerides, homocysteine, and C-reactive protein, and can raise
  blood pressure, reduce cardiac function, and slow heart rate. Murray & Pizzorno
  explicitly flag that elevated cholesterol in clinical practice should trigger thyroid
  screening (TSH, free T4, free T3, TPO antibodies) before lipid-lowering therapy
  is escalated.
evidence_tier: strong
rationale: Hypothyroid dyslipidemia is well-established endocrinology. Restoring euthyroid
  status typically normalises lipids without need for additional pharmacotherapy.
  Important diagnostic anchor in functional medicine — TSH should be on every lipid
  panel.
coaching_translation: Before going down the lipid-medication path, rule out underactive
  thyroid. Even slightly low thyroid function raises cholesterol, triglycerides, and
  inflammation markers. A full thyroid panel (TSH, free T4, free T3, TPO antibodies)
  belongs alongside any cholesterol check.
caveats:
- Subclinical hypothyroidism (TSH 4-10, normal T4) is the missed diagnosis to look
  for
- Lipid normalization after thyroid optimization can take 3-6 months
- Statin myalgia is worse in hypothyroid patients — clinically important
