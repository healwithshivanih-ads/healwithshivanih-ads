slug: magnesium-deficiency-copd
statement: 47% of COPD patients are magnesium deficient — driven largely by inhaled
  bronchodilators and steroids that deplete it. Magnesium deficiency in COPD correlates
  with longer hospital stays. IV magnesium is a powerful bronchodilator in acute COPD
  flares (28% vs 42% hospital admission rate in placebo-controlled trial). Coach must
  check magnesium status; oral supplementation 200 to 300 mg three times daily (citrate/malate/glycinate
  forms) is strongly indicated.
evidence_tier: plausible_emerging
