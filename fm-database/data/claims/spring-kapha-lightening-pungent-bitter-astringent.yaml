slug: spring-kapha-lightening-pungent-bitter-astringent
statement: In spring, kapha dosha accumulates from winter stagnation, creating heavy, cool, and damp qualities
  in the body; the seasonal remedy is to favour warm, light, dry, and mobile qualities through pungent,
  bitter, and astringent tastes.
evidence_tier: fm_specific_thin
rationale: Spring corresponds to earth and water elements (kapha) in Ayurveda. Accumulated heaviness from
  winter must be cleared by introducing opposing qualities — warming spices, dry grains, bitter greens
  — to stoke agni and encourage the body's natural cleansing.
coaching_translation: As winter ends, shift toward lighter, spicier, and more bitter foods — ginger, arugula,
  lentils, barley — and away from heavy dairy, sweet fruits, and wheat. This mirrors the body's seasonal
  need to shed sluggishness and reawaken digestion.
out_of_scope_notes: ''
caveats:
- Traditional Ayurvedic seasonal principle; no controlled trial evidence in Western literature.
