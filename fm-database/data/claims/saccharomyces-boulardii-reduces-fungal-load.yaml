slug: saccharomyces-boulardii-reduces-fungal-load
statement: The probiotic yeast Saccharomyces boulardii has been shown to reduce fungal
  overgrowth in the gut and assist in removal of fungal toxins, making it useful in
  SIFO management.
evidence_tier: plausible_emerging
rationale: S. boulardii has RCT evidence for various GI conditions and some evidence
  for Candida reduction. Its use in SIFO is biologically plausible with emerging support.
coaching_translation: Saccharomyces boulardii is a 'good yeast' supplement that helps
  crowd out harmful yeast and clears their toxins from your gut.
caveats:
- Source is expert consensus lecture; specific SIFO RCT evidence limited.
- 5 billion CFU for 6 weeks is the cited dose — verify with clinician.
