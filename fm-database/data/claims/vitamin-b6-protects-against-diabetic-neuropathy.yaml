slug: vitamin-b6-protects-against-diabetic-neuropathy
statement: Vitamin B6 supplementation (up to 150 mg/day) protects against diabetic
  neuropathy by inhibiting protein glycosylation; diabetics tend to be deficient in
  B6.
evidence_tier: plausible_emerging
rationale: Observational data on B6 deficiency in diabetics and small studies on glycosylation
  inhibition; 100 mg/day is noted as safe and effective for gestational diabetes in
  one RCT.
coaching_translation: B6 deficiency is common in diabetics and directly worsens nerve
  damage risk — include it in any neuropathy prevention protocol.
