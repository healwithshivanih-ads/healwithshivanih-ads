slug: unhealthy-microbiome-extracts-more-calories
statement: The less healthy the microbiome, the more energy is extracted from the
  same food — meaning two women eating identical diets may absorb different numbers
  of calories depending on microbiome health.
evidence_tier: plausible_emerging
rationale: Speaker cites 'actual research' supporting differential caloric extraction
  based on microbiome composition. This aligns with emerging science (e.g., Turnbaugh
  et al. on germ-free mice; human twin studies), but single-expert source with no
  specific citation; rated plausible_emerging.
coaching_translation: The same meal can have different metabolic effects depending
  on the health of your gut bacteria — another reason why gut health is foundational,
  not optional.
caveats:
- Source is expert-consensus transcript; no specific study cited.
- Effect size in humans is debated; rated plausible_emerging not strong.
