slug: alcohol-impairs-liver-estrogen-clearance-breast-cancer
statement: 'Alcohol interferes with estrogen metabolism by impairing liver function: a compromised liver
  fails to break down excess estrogen, which is then reabsorbed into the bloodstream, sustaining elevated
  estrogen levels linked to breast cancer risk.'
evidence_tier: plausible_emerging
rationale: Consistent with well-established hepatic estrogen clearance physiology; the liver-gut axis
  for estrogen conjugation and excretion is a core FM teaching point.
coaching_translation: Drinking regularly overloads the liver so it can't clear your 'used' estrogen —
  the estrogen gets recycled back into your blood and keeps circulating. This is one reason alcohol raises
  breast cancer risk even in moderate amounts.
out_of_scope_notes: ''
caveats:
- The magnitude of effect from moderate alcohol on estrogen recycling is debated; major studies show dose-dependent
  cancer risk but the exact mechanism contribution of impaired hepatic clearance vs. other pathways is
  not fully quantified.
