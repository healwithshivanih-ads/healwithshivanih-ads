slug: setbacks-revisit-what-worked
statement: Setbacks are a normal part of healing; the simplest response is to revisit
  whatever previously worked — a stricter diet, better sleep, probiotic or adrenal
  support, or a brief modified-fast or elemental reset — rather than escalating to
  elaborate new programs.
evidence_tier: plausible_emerging
rationale: Step-8 maintenance philosophy.
coaching_translation: When a flare hits, go back to what helped you before instead
  of chasing something new and complicated.
