slug: omega3-22pct-lower-endo-risk-trans-fats-48pct-higher
statement: Women with highest long-chain omega-3 intake have 22% lower endometriosis
  risk; women with highest trans-fat intake have 48% higher risk. Total fat intake
  itself is not associated with endometriosis — composition matters.
evidence_tier: strong
rationale: Pizzorno cites the Nurses' Health Study II analysis of fat composition
  and endometriosis (Missmer et al 2010). Mechanism via shifts in prostaglandin and
  leukotriene synthesis pathways modulating pelvic inflammation.
coaching_translation: It's not how much fat — it's what kind. Omega-3s (wild fish,
  flax, walnuts) protect against endometriosis; trans fats (margarine, fried fast
  food, packaged baked goods) make it worse.
caveats:
- Hold long-chain omega-3 intake at 2-3 g/day combined EPA+DHA.
- Trans-fat sources to eliminate — partially hydrogenated oils, deep-fried foods,
  commercial baked goods.
- Effect persists across BMI and other diet factors.
