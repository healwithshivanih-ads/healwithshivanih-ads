slug: anti-nuclear-antibody-from-tissue-destruction
statement: Anti-nuclear antibodies (ANA) are produced when tissue destruction releases
  nuclear fragments into the bloodstream, prompting the immune system to generate
  antibodies against these self-antigens.
evidence_tier: strong
rationale: ANA production as a consequence of nuclear material release from destroyed
  cells is well-established in immunology and rheumatology. The document explains
  this mechanism clearly and it aligns with mainstream understanding.
coaching_translation: A positive ANA test often reflects ongoing tissue destruction
  and immune activation — it's a signal to refer the client to a clinician for full
  autoimmune workup.
out_of_scope_notes: ANA interpretation is exclusively clinician-scope. Coaches should
  refer if a client mentions ANA results.
