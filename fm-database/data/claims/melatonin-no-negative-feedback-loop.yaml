slug: melatonin-no-negative-feedback-loop
statement: Unlike testosterone, cortisol, thyroid hormone, or estrogen, exogenous
  melatonin supplementation has NOT been shown to suppress endogenous pineal melatonin
  production. Pineal melatonin synthesis is light-driven via the retinohypothalamic
  tract and resets each day with darkness onset; it does not adjust output based on
  circulating melatonin concentration. Clients can take high-dose melatonin chronically
  and stop without endogenous-production suppression — though some report transient
  sleep disturbance on cessation that likely reflects re-equilibration of secondary
  systems rather than melatonin-axis suppression per se. This eliminates one common
  objection to high-dose melatonin protocols.
evidence_tier: plausible_emerging
