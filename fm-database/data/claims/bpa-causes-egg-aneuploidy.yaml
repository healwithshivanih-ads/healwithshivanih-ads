slug: bpa-causes-egg-aneuploidy
statement: Bisphenol A directly interferes with the microtubule spindle apparatus
  during meiosis, causing chromosome misalignment and aneuploidy in eggs at doses
  people are exposed to in daily life. The original 1998 Hunt lab discovery (BPA leached
  from damaged plastic cages) showed a jump from 1-2% to 40% chromosomally abnormal
  eggs in mice; subsequent controlled studies confirmed dose-response causation.
evidence_tier: strong
