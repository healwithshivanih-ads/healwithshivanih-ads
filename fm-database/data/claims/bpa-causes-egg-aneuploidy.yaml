sources:
- id: fett-it-starts-with-the-egg-2019
  location: Chapter 2 — The Dangers of BPA, pg 31-40
  quote: Even a low dose of BPA during the final stages of egg development is enough
    to interfere with meiosis and cause chromosomal abnormalities in eggs. BPA interferes
    with the scaffold-like structures of tubules that organize and separate chromosomes
    during egg development.
rationale: Anchor mechanism claim for BPA avoidance in preconception.
