slug: b-vitamins-improve-cognitive-function-mild-ci
statement: Supplementation with B vitamins has been shown to improve mental performance
  in those with mild cognitive impairment.
evidence_tier: plausible_emerging
rationale: Supported by Ma et al. 2019 (Curr Alzheimer Res) and de Jager et al. 2012
  (Int J Geriatr Psychiatry), both RCTs cited in document references. Evidence strongest
  in those with elevated homocysteine.
coaching_translation: B vitamins — especially B12, folate, and B6 — are important
  for brain health. If memory or focus is a concern, making sure you're getting enough
  of these nutrients is a smart first step.
caveats:
- Evidence is strongest in those with high homocysteine or documented deficiency.
- Dosing should be directed by a clinician.
