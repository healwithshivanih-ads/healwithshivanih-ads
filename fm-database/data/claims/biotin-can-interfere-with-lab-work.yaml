slug: biotin-can-interfere-with-lab-work
statement: Biotin should be stopped 3–4 days before lab work to avoid false test results.
evidence_tier: confirm_with_clinician
rationale: Biotin interference with immunoassay-based lab tests (thyroid, troponin, hormone panels) is clinically documented.
out_of_scope_notes: Advising clients to stop supplements before labs is scope-appropriate coaching but should be confirmed
  with their ordering clinician.
caveats:
- All clients taking biotin supplements should be advised to disclose this to their clinician before lab testing.
- Always confirm lab preparation instructions with ordering clinician.
