slug: statins-do-not-fully-prevent-heart-attacks
statement: Statin therapy for cholesterol lowering does not fully protect against
  myocardial infarction, as many patients on statins still experience cardiac events.
evidence_tier: plausible_emerging
rationale: The document states that many patients on atorvastatin still have heart
  attacks, and that other risk factors must be addressed. This reflects the residual
  cardiovascular risk concept, recognized in cardiology literature, though statins
  do reduce relative risk in high-risk populations.
coaching_translation: Taking a cholesterol-lowering medication is not a complete solution.
  Other factors—like inflammation, blood sugar, and stress—also need to be addressed
  for true heart health.
out_of_scope_notes: Coaches must NOT advise clients to stop statin therapy. Statin
  risk-benefit decisions are clinician scope.
caveats:
- Statins do have demonstrated mortality benefit in high-risk populations; this claim
  should not be used to discourage statin use without clinician guidance.
- Source is expert lecture (moderate quality).
