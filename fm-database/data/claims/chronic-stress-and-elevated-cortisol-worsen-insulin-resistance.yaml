slug: chronic-stress-and-elevated-cortisol-worsen-insulin-resistance
statement: Chronically elevated cortisol from ongoing stress breaks down muscle (catabolism),
  weakens the gut lining (contributing to leaky gut), raises glucose, raises insulin,
  and promotes fat storage — all worsening insulin resistance.
evidence_tier: strong
rationale: The HPA-axis driven effects of cortisol on muscle catabolism, intestinal
  permeability, glucose homeostasis, and insulin dynamics are well-established in
  endocrinology and physiology literature.
coaching_translation: Chronic stress isn't just emotionally draining — it physiologically
  raises your blood sugar, breaks down muscle, and makes your gut leakier. Stress
  management is a legitimate metabolic intervention.
caveats:
- The degree to which stress-management interventions can reverse these effects requires
  individualized assessment.
