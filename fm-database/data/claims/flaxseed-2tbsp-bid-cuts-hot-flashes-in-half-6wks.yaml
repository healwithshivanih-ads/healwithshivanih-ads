slug: flaxseed-2tbsp-bid-cuts-hot-flashes-in-half-6wks
statement: Two tablespoons of ground flaxseed twice daily (4 tbsp/day) reduces hot
  flash frequency by ~50% and intensity by ~57% within 6 weeks in perimenopausal and
  menopausal women.
evidence_tier: plausible_emerging
rationale: Pizzorno cites Mayo Clinic open-label trial of flaxseed in vasomotor symptoms.
  Mechanism via lignans (matairesinol, secoisolariciresinol) converted by colon flora
  to mammalian lignans with both estrogenic and antiestrogenic activity.
coaching_translation: Ground flaxseed — 2 tablespoons twice a day, ground fresh and
  mixed into smoothies or yoghurt — can cut hot flashes in half within 6 weeks for
  many women.
caveats:
- Must be ground (whole seeds pass through undigested); grind fresh weekly and refrigerate.
- 4 tbsp/day = ~30 g; provides fibre, ALA, and lignans.
- Effect depends on colon flora converting lignans; gut health matters.
