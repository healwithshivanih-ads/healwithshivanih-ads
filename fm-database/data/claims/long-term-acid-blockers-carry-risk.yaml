slug: long-term-acid-blockers-carry-risk
statement: A short four-to-eight-week course of acid-blocking medication effectively
  heals ulcers, but long-term acid-blocker use raises the risk of SIBO, fungal overgrowth,
  mineral malabsorption, osteoporosis and fractures.
evidence_tier: strong
rationale: Cites PPI long-term risk literature.
coaching_translation: Acid blockers are fine short-term to heal an ulcer, but long-term
  use has real downsides for the gut and bones.
