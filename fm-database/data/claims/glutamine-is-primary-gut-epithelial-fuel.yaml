slug: glutamine-is-primary-gut-epithelial-fuel
statement: L-glutamine is the primary amino acid fuel for intestinal epithelial cells
  and supports rebuilding of the gut lining.
evidence_tier: plausible_emerging
rationale: Glutamine is a well-established fuel source for rapidly dividing enterocytes
  and is used therapeutically in gut permeability and critical illness. Clinical RCT
  evidence in non-critical populations is less robust but the mechanism is well-supported.
coaching_translation: Glutamine is like fuel for your gut lining's repair crew. It's
  one of the key supplements used in gut healing protocols.
caveats:
- Therapeutic dose for gut permeability repair should be confirmed with a clinician.
- Source is expert lecture; specific RCT evidence for dose-response in non-critical
  populations is limited.
