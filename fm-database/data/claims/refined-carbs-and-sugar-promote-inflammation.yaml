slug: refined-carbs-and-sugar-promote-inflammation
statement: Refined carbohydrates and sugary beverages promote inflammation by causing
  blood sugar spikes and excess fructose intake.
evidence_tier: strong
rationale: Well-established mechanistic and clinical evidence links refined carbohydrate/sugar
  consumption to elevated inflammatory markers, insulin resistance, and glycation-driven
  inflammation.
coaching_translation: White bread, pastries, sugary cereals, sodas, and energy drinks
  spike your blood sugar and feed inflammation. Swapping these for whole grains and
  water can make a meaningful difference.
