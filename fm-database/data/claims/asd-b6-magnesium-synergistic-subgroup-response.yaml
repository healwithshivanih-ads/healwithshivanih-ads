slug: asd-b6-magnesium-synergistic-subgroup-response
statement: Vitamin B6 combined with magnesium produces meaningful behavioural improvement
  in roughly 20% of children with ASD, with about 10% showing dramatic response. Neither
  nutrient was significantly effective when used alone; the combination correlates
  with reduced urinary homovanillic acid (HVA), suggesting normalisation of dopamine/catecholamine
  handling. Murray's treatment-summary dosing is B6 25 mg two-to-three times per day
  with magnesium 250-400 mg per day.
evidence_tier: plausible_emerging
