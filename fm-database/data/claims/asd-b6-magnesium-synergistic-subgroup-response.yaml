  location: Chapter 26 — Autism Spectrum Disorder, pg 555-557
  quote: The combination of B6 and magnesium resulted in significant improvement in
    behavior that was closely associated with decreases in HVA. However, magnesium
    and vitamin B6 were not significantly effective when used alone.
