  location: Session 4 — Gut Inflammation Weight Gain Loop
  quote: We know that the inflammation in and of itself will actually change insulin
    signaling in the gut. So this is an important distinction. We start with alterations
    in the healthy bacteria. We then get an increase in inflammation, which actually
    changes our insulin sensitivity. And that insulin change influences fat storage.
