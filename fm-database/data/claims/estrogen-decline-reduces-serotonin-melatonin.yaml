slug: estrogen-decline-reduces-serotonin-melatonin
statement: Declining estrogen in perimenopause and menopause reduces serotonin synthesis
  and melatonin secretion, contributing to mood disruption and sleep deterioration.
evidence_tier: plausible_emerging
rationale: Estrogen's modulation of serotonergic pathways is biologically well-supported;
  the downstream effect on melatonin (via serotonin as precursor) is plausible. Interventional
  evidence is emerging rather than consensus.
coaching_translation: As estrogen falls during perimenopause, your brain produces
  less serotonin and melatonin — directly impacting mood and sleep quality.
caveats:
- Single-expert source; no specific studies cited.
- Magnitude of effect varies by individual and other factors such as stress and gut
  health.
