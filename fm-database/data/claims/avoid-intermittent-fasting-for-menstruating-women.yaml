slug: avoid-intermittent-fasting-for-menstruating-women
statement: Intermittent fasting and fasted workouts are not advised for menstruating
  women; calorie restriction can dysregulate the cycle, ovulation, and progesterone.
  Fasting benefits appear post-menopausally.
evidence_tier: fm_specific_thin
rationale: A 12-hour overnight ('golden') fast is fine, with slightly longer fasting
  only in the follicular phase; prolonged restriction in reproductive years is proposed
  to harm the cycle.
coaching_translation: Skip prolonged fasting and fasted workouts during the menstruating
  years; an overnight 12-hour gap is plenty.
caveats:
- General guidance, not a medical directive; individualize.
