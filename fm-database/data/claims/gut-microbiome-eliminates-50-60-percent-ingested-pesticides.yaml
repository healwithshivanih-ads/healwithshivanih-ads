slug: gut-microbiome-eliminates-50-60-percent-ingested-pesticides
statement: The gut microbiome may eliminate approximately 50–60% of ingested pesticide
  load before it is absorbed systemically, providing a critical first-line defense
  against xenobiotic toxicity.
evidence_tier: plausible_emerging
rationale: Emerging evidence supports microbial metabolism of pesticides in the gut
  (e.g., organophosphate degradation by gut bacteria). The specific '50–60%' figure
  cited is a general estimate from the lecture without a specific citation. The principle
  is biologically credible and supported by animal and in-vitro studies, but human
  clinical evidence is still emerging.
coaching_translation: A healthy gut microbiome acts as your first toxin filter — potentially
  neutralizing over half of the pesticides you ingest before they even reach your
  bloodstream. This is why gut health is foundational to detoxification.
caveats:
- The 50–60% estimate comes from an expert lecture without a specific cited study.
  Treat as a plausible estimate from FM expert consensus, not a confirmed RCT-derived
  figure.
- Source is expert_consensus, moderate quality — verify specific statistics with primary
  literature.
