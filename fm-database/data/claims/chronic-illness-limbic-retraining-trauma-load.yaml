slug: chronic-illness-limbic-retraining-trauma-load
statement: Approximately one-third of women in Horowitz's chronic-illness cohort have
  a history of emotional, physical, or sexual trauma. Without limbic system retraining
  (DNRS, Gupta Program), EMDR, or trauma-focused CBT, biological treatment of infections
  and toxins plateaus. The immune system behaves as if "I don't deserve to be well."
  Mind-body limbic work is a non-optional layer of the MSIDS protocol for complex
  chronic illness, sitting alongside infection/toxin clearance, microbiome repair,
  mitochondrial support, hormonal balance, and sleep.
