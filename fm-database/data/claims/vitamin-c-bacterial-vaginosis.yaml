sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 98 — Vaginitis, pg 1551-1552
  quote: A randomized, double-blind, placebo-controlled study used one 250-mg tablet
    of vitamin C inserted vaginally once a day for six days. Significantly more patients
    still had BV in the placebo group (35.7%) compared with the vitamin C group (14%).
