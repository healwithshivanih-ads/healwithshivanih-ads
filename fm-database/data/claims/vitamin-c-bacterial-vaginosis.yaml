slug: vitamin-c-bacterial-vaginosis
statement: Vaginal vitamin C 250 mg inserted once daily for six days significantly
  cleared bacterial vaginosis in a randomised double-blind trial — only 14% of the
  vitamin C group still had BV vs 35.7% of placebo, with lactobacilli reappearing
  in 79% vs 53%. Useful adjunct in BV when the coach is supporting a clinician-managed
  treatment.
evidence_tier: plausible_emerging
