slug: probiotics-should-follow-sibo-eradication
statement: Probiotics should generally be introduced after the eradication phase in
  SIBO, not during, to avoid exacerbating fermentation.
evidence_tier: fm_specific_thin
rationale: FM clinical consensus — some evidence that adding probiotics during active
  SIBO may worsen fermentation symptoms. Standard FM protocol sequences probiotics
  post-eradication. Limited direct RCT evidence.
coaching_translation: Timing matters with probiotics — starting them too early when
  bacteria are still overgrown can make bloating worse before it gets better.
caveats:
- FM clinical consensus, limited direct RCT evidence. Individual tolerance varies.
