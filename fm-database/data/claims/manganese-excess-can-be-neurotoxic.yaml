slug: manganese-excess-can-be-neurotoxic
statement: Excess manganese causes Parkinson-like neurotoxicity.
evidence_tier: confirm_with_clinician
rationale: Manganism from occupational or excessive manganese exposure causing Parkinson-like
  symptoms is clinically documented.
out_of_scope_notes: Manganese supplementation in high-exposure occupations (welders,
  miners) requires clinician assessment.
caveats:
- Source is a practitioner cheatsheet without primary citations.
- Primarily a risk from occupational inhalation exposure; oral toxicity from food/supplements
  is less common.
- Assess occupational exposure before recommending manganese supplements.
