slug: stress-antibiotics-antacids-trigger-leaky-gut
statement: Chronic stress, repeated antibiotic use, and prolonged antacid use are
  key triggers and mediators of intestinal permeability (leaky gut) development.
evidence_tier: plausible_emerging
rationale: The roles of stress (via HPA axis and gut motility effects), antibiotics
  (microbiome disruption), and antacids (reduced gastric acid → dysbiosis) in gut
  barrier disruption are each supported by mechanistic plausibility and growing evidence,
  though direct causal RCTs in humans are limited.
coaching_translation: The gut barrier can be worn down over time by chronic stress,
  overuse of antibiotics, or long-term use of acid-reducing medications. These are
  modifiable risk factors coaches can help clients address.
caveats:
- Source is expert consensus. Individual mechanisms are plausible but direct causation
  in leaky gut is not fully established via RCTs.
