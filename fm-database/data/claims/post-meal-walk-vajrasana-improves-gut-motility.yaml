slug: post-meal-walk-vajrasana-improves-gut-motility
statement: A 10-minute post-meal walk combined with Vajrasana (kneeling pose) improves
  diaphragm movement, facilitates gas release, and enhances the migrating motor complex
  (MMC).
evidence_tier: fm_specific_thin
rationale: Walking after meals has some RCT support for improving gastric emptying
  and glycemic control. Vajrasana's specific effects on MMC are based on traditional
  Ayurvedic practice with thin peer-reviewed evidence.
coaching_translation: After eating, go for a 10-minute walk or sit in Vajrasana (kneeling)
  for 5–10 minutes. This activates your gut's housekeeping wave to move gas and reduce
  bloating.
caveats:
- Vajrasana MMC claim is based on Ayurvedic tradition; peer-reviewed evidence is thin
- Source is a coaching toolkit
