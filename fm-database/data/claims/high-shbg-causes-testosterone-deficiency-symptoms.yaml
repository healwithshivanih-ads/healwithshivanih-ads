  location: Sex Hormone Binding Globulin (SHBG)
  quote: High concentrations of SHBG in the body can lead to increased bound testosterone,
    as SHBG more easily binds to testosterone than to estrogen. This can cause symptoms
    associated with testosterone deficiency, including fatigue, decreased libido,
    weight gain, mood changes, decreased muscle mass, and decreased bone mineral density.
