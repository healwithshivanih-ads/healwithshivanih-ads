slug: high-shbg-causes-testosterone-deficiency-symptoms
statement: Elevated SHBG reduces free bioavailable testosterone, causing symptoms
  of testosterone deficiency including fatigue, decreased libido, weight gain, mood
  changes, decreased muscle mass, and reduced bone density.
evidence_tier: strong
rationale: Well-established endocrine mechanism supported by clinical literature;
  SHBG's preferential binding to testosterone over estrogen is a foundational concept
  in sex hormone physiology.
coaching_translation: If your SHBG is high, your testosterone is being 'locked up'
  and can't do its job — this can leave you feeling tired, low in drive, and struggling
  with body composition.
caveats:
- Symptoms overlap with many conditions; lab confirmation required
- Source is an expert-consensus toolkit, not primary RCT literature
