slug: nhs-nosebleed-post-nosebleed-restrictions
statement: For 24 hours after a nosebleed, avoid nose-blowing, picking, hot drinks,
  alcohol, heavy lifting, strenuous exercise, picking scabs or lying flat to reduce
  rebleed risk.
