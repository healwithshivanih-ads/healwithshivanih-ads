  quote: More than 20 double-blind clinical studies have now substantiated valerian's
    ability to improve sleep quality and relieve insomnia. Valerian is as effective
    at bringing on sleep as small doses of barbiturates or benzodiazepines. However,
    although these latter compounds also increase morning sleepiness, valerian usually
    reduces morning sleepiness.
