slug: detox-program-improves-pain-fatigue-cognition-sleep-weight
statement: Participation in a personalized metabolic detoxification program is associated with improvements in pain, fatigue,
  cognitive function, mood, sleep quality, and weight loss.
evidence_tier: plausible_emerging
rationale: The document describes clinical observations from FM detox protocols. Small trials on structured detox programs
  show symptomatic benefit, but large RCTs are lacking. FM-specific clinical consensus.
coaching_translation: Many clients who go through a structured detox program report feeling better across the board — more
  energy, clearer thinking, better sleep, and easier weight management.
caveats:
- Based on clinical observation and FM practitioner consensus, not large RCTs.
- Results are individualized and influenced by baseline health and adherence.
