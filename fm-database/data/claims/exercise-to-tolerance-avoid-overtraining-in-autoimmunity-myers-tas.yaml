slug: exercise-to-tolerance-avoid-overtraining-in-autoimmunity-myers-tas
statement: Movement supports immunity, but over-exercising can set back autoimmune
  and adrenal recovery; intensity should be scaled so the person feels energised afterward
  and the next day, backing off if symptoms worsen.
evidence_tier: plausible_emerging
rationale: Excess training is a physical stressor that raises cortisol and inflammation
  in an already-stressed system; feeling worse after exercise signals too much.
coaching_translation: Move regularly but gently — if you feel wiped out the next day,
  that's a sign to dial it back.
