slug: mitochondrial-dysfunction-central-to-reproductive-aging
statement: 'The Toronto group''s 2011 review synthesised evidence that age-related
  decline in female reproductive outcome is driven primarily by accumulated mitochondrial
  dysfunction in the oocyte: mtDNA mutations accumulate over the decades the oocyte
  sits in meiotic arrest, mitochondrial number and structural integrity decline, and
  ATP synthesis capacity drops below the threshold required for meiosis and early
  embryogenesis. This positions mitochondrial support (CoQ10, antioxidants, blood-sugar
  control) as the mechanistically-anchored core of preconception protocols.'
evidence_tier: strong
