slug: crispatus-loss-increases-premature-labor-risk
statement: Loss of Lactobacillus crispatus from the vaginal microbiome increases the
  risk of premature labor by allowing cervical inflammation and premature cervical
  relaxation.
evidence_tier: plausible_emerging
rationale: 'Dr. Davis describes a mechanistic pathway: crispatus depletion → cervical
  inflammation → cervical relaxation → premature labor. He references research context
  but does not cite specific studies by author/year. Biologically plausible and consistent
  with known vaginal microbiome literature.'
coaching_translation: Keeping beneficial vaginal bacteria like L. crispatus healthy
  during pregnancy may help reduce the risk of delivering too early.
caveats:
- Source is expert consensus interview, not primary literature.
- Pregnancy intervention requires obstetric supervision.
- Premature labor has multiple causes; microbiome is one potential factor.
