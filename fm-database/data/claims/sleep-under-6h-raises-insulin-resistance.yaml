slug: sleep-under-6h-raises-insulin-resistance
statement: Sleep duration <6 hours per night raises insulin resistance by approximately
  20%.
evidence_tier: plausible_emerging
rationale: Short sleep is associated with impaired glucose metabolism in multiple
