  location: Chapter 2 — Depression, pp 29-31 (citing JAMA Psychiatry 2016)
  quote: Researchers from the University of Copenhagen tracked one million women over
    thirteen years and found that girls and women who use hormonal birth control are
    significantly more likely to be diagnosed with depression. The risk was greatest
    for teens using progestin-only methods such as an implant or Mirena IUD. A follow-up
    study from the same group of researchers found that women taking hormonal birth
    control had triple the risk of suicide.
