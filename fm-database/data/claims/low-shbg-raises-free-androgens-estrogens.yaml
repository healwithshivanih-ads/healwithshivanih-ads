slug: low-shbg-raises-free-androgens-estrogens
statement: Low SHBG leads to elevated free testosterone and estrogen, manifesting
  as hair loss, acne, and excess fluid retention.
evidence_tier: plausible_emerging
rationale: Mechanistically sound; low SHBG reduces hormone buffering capacity. Source
  is expert synthesis without primary RCT citation.
coaching_translation: Low SHBG means hormones circulate more freely, which can show
  up as acne, hair thinning, or feeling puffy.
caveats:
- Source is expert consensus/synthesis. Lab confirmation required.
