slug: chronic-stress-hormones-deplete-sex-hormone-nourishment
statement: Chronic overabundance of stress hormones outweighs the nourishing effects of sex hormones and
  contributes to the breakdown of bones, skin, muscles, and brain tissue.
evidence_tier: plausible_emerging
rationale: 'Consistent with established glucocorticoid physiology: sustained high cortisol suppresses
  osteoblast activity, promotes protein catabolism, and is linked to hippocampal atrophy. Welch synthesises
  this as a stress-vs-sex-hormone resource trade-off.'
coaching_translation: When you are under constant pressure for months or years, your body keeps pumping
  stress hormones. These break down the very tissues — bones, muscles, skin, brain — that your sex hormones
  would normally be protecting.
out_of_scope_notes: ''
caveats:
- The direct mechanistic link between cortisol excess and each tissue type varies in strength; bone suppression
  (cortisol → osteoblast inhibition) is well-evidenced; the skin/brain framing is plausible but less precisely
  quantified at the population level.
