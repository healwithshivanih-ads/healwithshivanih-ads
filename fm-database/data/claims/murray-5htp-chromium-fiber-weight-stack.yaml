slug: murray-5htp-chromium-fiber-weight-stack
statement: 'Murray''s nutritional-supplement weight-management stack: (1) PGX (or
  generic soluble fibre) 1.5-5 g before meals — reduces glycemic load + caloric absorption
  + satiety, (2) Chromium 200-400 mcg/day — improves insulin sensitivity + reduces
  body weight while INCREASING lean body mass, (3) 5-HTP 50-100 mg 20 minutes before
  meals (titrating to 300 mg if weight loss <1 lb/week after 2 weeks) — reduces calorie
  intake via serotonin-mediated appetite suppression, (4) MCT oil 1-2 tbsp/day, (5)
  Hydroxycitrate (Garcinia cambogia HCA) 1,500 mg three times daily — inhibits ATP
  citrate lyase, blocking fat synthesis from carbohydrate. The 5-HTP titration includes
  a transient nausea side effect that resolves after 6 weeks of use.'
evidence_tier: plausible_emerging
rationale: Multiple component RCTs of varying quality. Mechanism — multi-target intervention
  addressing insulin sensitivity + appetite + thermogenesis + lipogenesis simultaneously.
  Effect-size modest individually; combination may be additive.
coaching_translation: 'Murray''s supplement weight-management stack — for clients
  ALREADY doing the diet + exercise + lifestyle work: (1) Soluble fibre/PGX 1.5-5
  g before meals, (2) Chromium 200-400 mcg/day, (3) 5-HTP 50-100 mg before meals (titrate
  to 300 mg if weight loss <1 lb/week; transient nausea for ~6 weeks), (4) MCT oil
  1-2 tbsp/day, (5) Hydroxycitrate 1,500 mg 3× daily. SUPPLEMENTS WON''T WORK WITHOUT
  THE FOUNDATION. Use 5-HTP cautiously — SSRI contraindication.'
caveats:
- 5-HTP + SSRI/SNRI/MAOI absolutely contraindicated
- Effect modest without diet + exercise foundation
- Supplements alone are not weight-loss strategy
- Coordinate 5-HTP with prescriber if on psychiatric medication
- Hydroxycitrate hepatotoxicity rare reports — discontinue if jaundice
