slug: sugar-bypasses-prefrontal-cortex-impairs-judgement
statement: Refined sugar causes rapid glucose spikes followed by crashes, temporarily
  bypassing prefrontal cortex function and impairing reason, intellect, and judgment;
  whereas fibre-rich foods provide steady glucose release supporting sustained brain
  function.
evidence_tier: plausible_emerging
rationale: Glycaemic variability affecting cognitive performance and mood is supported
  by research. The framing of sugar 'bypassing' the PFC is a simplified but directionally
  accurate model. Fibre's role in attenuating glucose spikes is well-established.
coaching_translation: Sugar gives your brain a quick rush, then leaves it crashing
  — your thinking, judgement, and mood all suffer in the dip. High-fibre foods give
  your brain a steady, reliable fuel supply instead.
caveats:
- Source is expert lecture
- Mechanism is simplified
