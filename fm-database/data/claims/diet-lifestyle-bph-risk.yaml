slug: diet-lifestyle-bph-risk
statement: BPH risk factors that the coach can modify — high saturated fat and red
  meat (Chinese farmers eating animal-heavy diets had 91% BPH vs 12% in plant-eaters),
  abdominal obesity, physical inactivity, beer intake (raises prolactin which drives
  prostate testosterone uptake), and overall alcohol >25 fl oz/month. Higher caloric
  intake does NOT raise BPH risk when paired with regular exercise. Coach emphasizes
  plant-forward eating, regular movement, beer reduction.
evidence_tier: plausible_emerging
