slug: saw-palmetto-bph-early-stage
statement: Saw palmetto (Serenoa repens) fat-soluble extract — typical dose 320 mg/day
  standardised to 85 to 95% fatty acids and sterols — improves BPH symptoms in roughly
  90% of men with mild to moderate disease within 4 to 6 weeks. Outcomes are comparable
  to finasteride but with far lower erectile dysfunction (1.1% vs 4.9%). The NEJM
  negative trial was done in advanced disease where saw palmetto is already known
  not to work. Coach must catch BPH early — once residual urine exceeds 150 ml botanicals
  lose effect.
evidence_tier: strong
