slug: hypertriglyceridemia-independent-cvd-risk
statement: Hypertriglyceridemia is an independent CVD risk factor; an 88 mg/dL increase
  in plasma TG raises relative CVD risk by 30% in men and 75% in women.
evidence_tier: strong
rationale: Meta-analyses of prospective cohort studies; TG is now included in major
  cardiovascular risk guidelines.
coaching_translation: High triglycerides (blood fats from sugar and refined carbs)
  independently raise heart risk — not just cholesterol.
