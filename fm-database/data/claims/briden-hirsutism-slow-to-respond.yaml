slug: briden-hirsutism-slow-to-respond
statement: 'Hirsutism (facial and body hair from androgen excess) is the slowest PCOS
  symptom to improve. Even with all the right treatment in place — addressing the
  underlying PCOS subtype plus an anti-androgen — visible improvement may take up
  to 12 months. Coaching realistic expectations is part of the work: clients need
  to commit to the protocol for a year, not 8 weeks.'
evidence_tier: plausible_emerging
rationale: Hair follicle cycle physiology (anagen-catagen-telogen) takes months to
  years to reset after androgen normalisation. Clinical observation across PCOS treatment
  literature confirms slow hirsutism resolution.
coaching_translation: When a client is starting anti-androgen work for facial hair,
  set the expectation up front — measurable improvement takes 6-12 months, not weeks.
  Continue cosmetic management (waxing, laser, electrolysis) in parallel.
