slug: murray-alkaline-ph-low-back-pain
statement: 'Achieving optimal acid-base balance through diet (fruits + vegetables
  provide alkalising effect via citrate→bicarbonate metabolism) + alkaline mineral
  supplementation can dramatically reduce chronic musculoskeletal pain. In one trial,
  4 weeks of alkaline multimineral supplementation reduced chronic low-back pain by
  49% in 76 of 82 patients alongside standard medication — driven by an 11% increase
  in intracellular magnesium. Coach implication: chronic acid-load diet (high meat
  + dairy + processed foods, low produce) may underlie much chronic pain that''s mis-attributed
  elsewhere.'
evidence_tier: plausible_emerging
rationale: Vormann 2001 trial cited. Mechanism — chronic dietary acid load drives
  bone + muscle buffering, depleting magnesium + calcium; intracellular acidification
  impairs pain signalling normalisation.
coaching_translation: 'Chronic back pain and other aches can respond to alkalising
  the diet + alkaline minerals (magnesium citrate, potassium citrate). One trial cut
  back pain by half in 4 weeks. The principle: modern diets heavy in meat, dairy,
  processed foods + low in vegetables create chronic acid load that depletes minerals
  from bone + muscle. Eat more vegetables, more fruit, more leafy greens. Citrate
  forms of supplements (mag citrate, K citrate) are alkalising; oxide forms are not.'
caveats:
- Effect modest but real; food-first preferred over chronic alkaline supplementation
- Alkaline diet marketing oversells claims - the underlying principle is sound
- Severe kidney disease — clinician guidance for acid-base management
- Citrate forms of minerals (mag, K, Ca) provide alkalising benefit
