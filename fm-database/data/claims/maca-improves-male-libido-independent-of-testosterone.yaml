sources:
- id: gonzales-2002-maca-sexual-desire-men
  location: Results and Conclusion
  quote: Maca has an independent effect on sexual desire not because of changes in
    mood or serum testosterone.
rationale: Rigorous RCT design but small sample. Mechanism is non-hormonal and non-mood-mediated,
  consistent with adaptogenic action.
