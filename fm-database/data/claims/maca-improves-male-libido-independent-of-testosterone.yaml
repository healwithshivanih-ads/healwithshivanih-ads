slug: maca-improves-male-libido-independent-of-testosterone
statement: In a 12-week randomized placebo-controlled trial of healthy men aged 21
  to 56, gelatinized maca at 1500 or 3000 mg/day improved self-reported sexual desire
  from week 8 onwards, with no change in serum testosterone, estradiol, or Hamilton
  scores for depression and anxiety.
evidence_tier: plausible_emerging
