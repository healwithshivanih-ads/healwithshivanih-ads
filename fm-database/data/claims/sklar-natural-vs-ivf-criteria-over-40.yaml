slug: sklar-natural-vs-ivf-criteria-over-40
statement: Natural conception remains a reasonable first-line strategy for women over
  40 when cycles are still regular, ovulation can be reliably timed, there are identifiable
  root causes (gut, inflammation, autoimmune, toxic load) that have not been addressed,
  the partner's sperm parameters are adequate, the couple has at least 3-6 months
  to optimise and 6-12 months to try. IVF-first makes more sense when FSH is markedly
  elevated, there are structural barriers (blocked tubes, severe male factor, severe
  endometriosis), 12+ months of optimised timed-intercourse trying have failed, recurrent
  pregnancy losses warrant PGT screening, or the woman is over 44 with acute time
  pressure.
