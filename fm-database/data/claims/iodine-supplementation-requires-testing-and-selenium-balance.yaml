slug: iodine-supplementation-requires-testing-and-selenium-balance
statement: Iodine supplementation (150–300 µg/day if deficient) should only be initiated
  after testing and must be balanced with adequate selenium to avoid worsening autoimmunity.
evidence_tier: confirm_with_clinician
rationale: The document states '150–300 µg/day if deficient, balance with selenium'
  and 'Test before supplementing.' Excess iodine without selenium can worsen Hashimoto's
  — a well-documented clinical concern.
coaching_translation: Iodine can be helpful or harmful for your thyroid depending
  on your levels and immune status — this is one where testing first and working with
  your doctor is essential.
out_of_scope_notes: Testing serum iodine and determining supplementation need is clinician
  scope. Coaches should not recommend iodine dosing independently.
caveats:
- Iodine excess in autoimmune thyroid disease can worsen antibody levels.
- Dose from synthesis document — must be clinician-guided.
