slug: manganese-supports-cartilage-and-mitochondrial-antioxidant-defense
statement: Manganese is a cofactor in bone and cartilage formation and is needed for
  mitochondrial Mn-SOD antioxidant defense.
evidence_tier: plausible_emerging
rationale: Manganese's role in Mn-SOD and glycosyltransferases for cartilage proteoglycan
  synthesis is supported by biochemical evidence.
coaching_translation: Manganese-rich foods (nuts, seeds, whole grains, leafy greens)
  support joint and connective tissue health.
caveats:
- Source is a practitioner cheatsheet without primary citations.
- Source is practitioner cheatsheet.
- Excess manganese is neurotoxic; supplementation above food amounts requires clinician
  guidance.
