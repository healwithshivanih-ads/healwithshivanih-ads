slug: sklar-uterine-microbiome-emma-alice
statement: Comprehensive uterine microbiome panels (EMMA for beneficial-bacteria profile,
  ALICE for chronic-endometritis pathogens, ReceptivaDx-style receptivity testing)
  reveal chronic infections, dysbiosis and yeast overgrowth in the reproductive tract
  that create an inflammatory environment hostile to implantation — none of which
  surface on standard hysteroscopy or saline sonogram.
