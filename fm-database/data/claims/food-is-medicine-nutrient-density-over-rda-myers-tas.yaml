slug: food-is-medicine-nutrient-density-over-rda-myers-tas
statement: The Myers Way treats food as medicine and prioritises nutrient density,
  noting that government RDAs are minimums to prevent deficiency disease, not targets
  for optimal health.
evidence_tier: fm_specific_thin
rationale: Nutrient-dense whole foods supply the amino acids, fats, and fibre the
  gut and immune system need beyond bare-minimum requirements.
coaching_translation: Aim for nutrient-rich food, not just 'enough to get by' — the
  official minimums aren't the same as thriving.
