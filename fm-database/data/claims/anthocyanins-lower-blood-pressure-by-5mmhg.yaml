slug: anthocyanins-lower-blood-pressure-by-5mmhg
statement: Consuming approximately 100g of blueberries (or equivalent anthocyanin
  dose) twice daily can lower blood pressure by approximately 5 mmHg after four weeks.
evidence_tier: plausible_emerging
rationale: Cited as coming from studies; anthocyanin-blood pressure evidence is accumulating
  but not yet at consensus-guideline level. Source is expert lecture, not primary
  citation.
coaching_translation: Blueberries are a simple, powerful food for heart health. Two
  servings a day has been shown in studies to meaningfully lower blood pressure in
  just four weeks.
caveats:
- Source is an expert lecture without a specific study citation. Dose equivalence
  between whole blueberries and anthocyanin supplements should be confirmed with a
  clinician.
