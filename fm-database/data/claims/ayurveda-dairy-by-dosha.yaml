slug: ayurveda-dairy-by-dosha
statement: Vata tolerates most dairy; pitta favours unsalted butter, milk and ghee but reduces sour, salty
  and aged cheese, sour cream and yogurt; kapha reduces most dairy (cold milk, ice cream, cheese) and
  uses only small amounts of ghee or skim/diluted milk.
evidence_tier: fm_specific_thin
rationale: From the Ayurvedic Institute / Lad Food Guidelines for Basic Constitutional Types — traditional
  dosha-food matching (like increases like; opposite qualities balance).
