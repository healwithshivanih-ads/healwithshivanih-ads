slug: hpylori-eradication-can-lower-thyroid-antibodies
statement: Eradicating Helicobacter pylori can reverse stomach autoimmunity and lower
  thyroid (TPO) antibodies, with one study showing a far larger antibody drop in treated
  versus untreated Hashimoto's patients who also carried H. pylori.
evidence_tier: plausible_emerging
rationale: Cites an Italian study of H. pylori treatment in Hashimoto's.
coaching_translation: Clearing a stomach H. pylori infection can calm thyroid autoimmunity
  in some people — a real gut–thyroid link.
