slug: ppi-use-reduces-iron-absorption
statement: Proton pump inhibitor (PPI) use reduces gastric acid production over time,
  impairing the conversion of ferric to ferrous iron and decreasing iron absorption.
evidence_tier: strong
rationale: PPIs suppress parietal cell HCl secretion. Since gastric acid is required
  to reduce Fe³⁺ to the absorbable Fe²⁺ form and initiate iron breakdown before duodenal
  absorption, chronic PPI use is a recognised cause of iron malabsorption.
coaching_translation: Long-term antacid/PPI use can quietly deplete iron levels by
  reducing stomach acid — important context when reviewing a client's medication history.
out_of_scope_notes: Advising clients to stop PPIs is out of coaching scope — this
  requires clinician management.
caveats:
- Source is an expert lecture; consistent with established clinical literature.
- Do not recommend discontinuing PPIs without medical supervision.
