  location: Causes of Iron Deficiency / Malabsorption section
  quote: Certain medications like antibiotics, PPI. So PPI are basically called as
    proton pump inhibitors, usually over the counter called as anti acids. So what
    these anti acids do over a period of time is decreasing the natural production
    of acid inside your stomach. Thus again involving and decreasing the malabsorption,
    decreasing absorption of iron inside your stomach.
