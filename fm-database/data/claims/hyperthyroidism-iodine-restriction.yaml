slug: hyperthyroidism-iodine-restriction
statement: In iodine-sufficient regions, iodine doses above 600 mcg — from potassium
  iodide, iodized salt, kelp/seaweed, amiodarone, or imaging contrast — can trigger
  Graves' disease and toxic multinodular goiter in susceptible individuals. For active
  hyperthyroidism, avoid iodized salt, kelp, other seaweeds, seafood, and supplements
  containing more than 300 mcg iodine.
evidence_tier: strong
linked_to_topics:
- hyperthyroidism
sources:
