slug: ppi-abrupt-cessation-causes-rebound-reflux
statement: Stopping PPIs abruptly is not recommended because it commonly causes rebound
  acid hypersecretion and reflux symptoms, which are reversible and short-term.
evidence_tier: strong
rationale: Rebound acid hypersecretion after PPI discontinuation is a well-documented
  pharmacological effect supported by clinical evidence.
coaching_translation: If you stop acid-blocking medication suddenly, symptoms can
  temporarily worsen. A gradual taper — guided by your doctor — is the safer approach.
out_of_scope_notes: PPI tapering schedules must be clinician-directed.
