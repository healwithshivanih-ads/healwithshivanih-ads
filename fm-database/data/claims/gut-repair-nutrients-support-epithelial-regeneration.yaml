slug: gut-repair-nutrients-support-epithelial-regeneration
statement: Adequate protein, omega-3 fatty acids, zinc, vitamin D, and B vitamins are required to support weekly intestinal
  epithelial regeneration and maintain mucosal barrier function.
evidence_tier: plausible_emerging
rationale: Individual nutrients listed each have mechanistic support for gut epithelial health. The combined claim is logical
  given the high turnover rate of the intestinal epithelium. Holistic evidence for this specific nutrient cluster as a protocol
  is from expert consensus rather than single RCTs.
coaching_translation: Your gut lining rebuilds itself every week and needs building blocks to do so. Ensuring you get enough
  protein, healthy fats, zinc, vitamin D, and B vitamins is foundational for gut health.
caveats:
- Specific therapeutic doses of each nutrient should be confirmed with a clinician, especially vitamin D and zinc.
- Source is expert lecture (moderate quality).
