slug: fibrinogen-clotting-risk-marker-insulin-resistance
statement: Elevated fibrinogen (>300) reflects increased clotting risk and is associated
  with inflammation, insulin resistance, and diabetes, increasing risk of heart attacks
  and strokes.
evidence_tier: plausible_emerging
rationale: Fibrinogen is an established acute-phase reactant and thrombotic risk marker.
  Its association with insulin resistance and CVD events is supported by observational
  literature.
coaching_translation: Fibrinogen is a clotting protein that also signals inflammation
  — clients with elevated levels benefit from anti-inflammatory dietary strategies
  and blood sugar support.
out_of_scope_notes: Fibrinogen lab interpretation and treatment decisions are clinician
  scope.
caveats:
- Source does not cite specific studies; consistent with published FM and cardiology
  literature.
