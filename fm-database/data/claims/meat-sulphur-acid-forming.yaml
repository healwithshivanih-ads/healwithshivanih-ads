slug: meat-sulphur-acid-forming
statement: Meat is highly acid-forming because only 58% is burned as fuel; the remaining
  42% leaves a sulphur waste that creates an acidic environment in the body.
evidence_tier: plausible_emerging
rationale: Animal protein has a high PRAL score and produces sulphuric acid as a metabolic
  byproduct. The specific figures (58%/42%) are not clearly sourced in peer-reviewed
  literature and should be treated as illustrative. The general principle that meat
  is acid-forming is well-supported by PRAL research.
coaching_translation: If you eat meat, choose organic and balance it with plenty of
  vegetables to offset the acid load.
caveats:
- The 58%/42% figures are not referenced to a specific study and should be treated
  as illustrative, not precise.
- Source is a lecture transcript, not primary literature.
