slug: cortisol-double-assault-on-bone-density
statement: 'Elevated cortisol suppresses bone density by a double mechanism: directly reducing bone mass
  and depleting estrogen-producing tissues, which removes estrogen''s bone-protective effect.'
evidence_tier: plausible_emerging
rationale: Cortisol-induced bone resorption is well-established (glucocorticoid-induced osteoporosis);
  cortisol also reduces peripheral aromatization in adipose and adrenal tissue, dropping estrogen. Both
  pathways are consistent with conventional endocrinology.
coaching_translation: 'Chronic stress accelerates bone loss in two ways at once: the stress hormone cortisol
  directly breaks down bone, and it also lowers the estrogen that would normally slow that breakdown.'
out_of_scope_notes: ''
caveats:
- Direct cortisol-bone pathway is well-supported; the secondary estrogen-depletion pathway via stress-induced
  tissue depletion is mechanistically plausible but less directly quantified.
