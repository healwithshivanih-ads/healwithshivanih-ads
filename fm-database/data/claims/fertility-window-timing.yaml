slug: fertility-window-timing
statement: The fertility window is the six-day interval ending on the day of ovulation.
  An ovulated egg survives only 24 hours; sperm survive up to 5 to 6 days. Daily intercourse
  during this window outperforms attempts to time it precisely. At-home LH urine kits
  detect the 24-to-48 hour pre- ovulation surge that triggers egg release — useful
  for any couple working on natural conception.
evidence_tier: strong
