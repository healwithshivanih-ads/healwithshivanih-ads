slug: dash-diet-cardiometabolic-plan-cvd
statement: The Cardiometabolic Food Plan or DASH diet with salt restriction is recommended
  for cardiovascular risk reduction and during beta blocker tapering.
evidence_tier: strong
rationale: The DASH diet has extensive RCT evidence for blood pressure reduction.
  Cardiometabolic dietary patterns (whole foods, reduced sodium, anti-inflammatory)
  are supported by multiple CVD outcomes trials.
coaching_translation: A heart-healthy diet doesn't have to be complicated — focus
  on whole foods, reduce salt, minimize processed foods, and increase vegetables and
  lean proteins.
