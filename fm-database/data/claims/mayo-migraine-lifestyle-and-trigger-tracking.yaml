slug: mayo-migraine-lifestyle-and-trigger-tracking
statement: Lifestyle measures with the strongest migraine-prevention evidence are
  consistent sleep and meal timing, regular aerobic exercise, adequate hydration,
  stress-reduction practices (biofeedback, CBT, relaxation training), and a written
  trigger journal to identify personal precipitants.
