slug: moderate-exercise-improves-methylation
statement: Regular moderate aerobic exercise induces new methylation patterns on muscle
  cell genomes, while excessive exercise (overtraining) increases physiological stress
  and disrupts healthy methylation.
evidence_tier: plausible_emerging
rationale: The Karolinska Institute cycling study (referenced by Lynch) demonstrated
  exercise-induced differential methylation at >5,000 muscle genome sites. Overtraining-induced
  HPA axis stress is documented to increase methyl group consumption. This is a reasonable
  extrapolation, though direct evidence on overtraining and methylation is limited.
coaching_translation: 'Moving your body regularly — at a pace that feels good rather
  than exhausting — actively improves how your genes work. More is not always better:
  training to exhaustion can actually disrupt your gene function.'
caveats:
- The Karolinska study cited was in healthy young adults over 3 months on a specific
  protocol — generalisability is uncertain.
- Source is a consumer trade book and does not cite the study with full bibliographic
  detail.
