  location: Chapter 61 — Hepatitis, pg 1036-1037, 1041
  quote: SNMC has demonstrated impressive results in treating chronic hepatitis B
    or C. Approximately 40% of patients will have complete resolution. Over longer
    periods, licorice root (more than 3 g per day for more than six weeks) or glycyrrhizin
    (more than 100 mg per day) may cause sodium and water retention, leading to high
    blood pressure.
