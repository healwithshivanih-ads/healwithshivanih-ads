slug: hepatitis-licorice-glycyrrhizin-protocol
statement: Licorice (Glycyrrhiza glabra) — protects liver, enhances immunity, potentiates
  interferon, is directly antiviral. Japanese product SNMC (200 mg glycyrrhizin +
  cysteine + glycine IV) achieved ~40% complete resolution in chronic hepatitis B
  and C — comparable to alpha-interferon. Oral equivalent — 5% glycyrrhetinic acid
  solid extract 250-500 mg three times daily. Above 100 mg/day glycyrrhizin can cause
  sodium-water retention and hypertension; contraindicated in hypertension, renal
  failure, or digitalis use. Increase potassium-rich foods and follow low-sodium diet
  with chronic use.
evidence_tier: plausible_emerging
