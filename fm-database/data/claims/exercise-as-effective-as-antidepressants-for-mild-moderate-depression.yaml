slug: exercise-as-effective-as-antidepressants-for-mild-moderate-depression
statement: Regular exercise (aerobic plus resistance training) is as effective as
  antidepressants for mild-to-moderate depression, increases endorphins (directly
  correlated with mood), normalises HPA-axis cortisol patterns, and reduces relapse
  compared with medication.
evidence_tier: strong
rationale: Pizzorno cites the SMILE trial and similar comparative effectiveness data.
  Mechanism multifactorial — endorphin release, BDNF upregulation, HPA-axis normalisation,
  sleep improvement, social engagement.
coaching_translation: Exercise is genuinely one of the most reliable antidepressants
  we have. Aerobic plus resistance, 4-5 days a week, builds up over 4-6 weeks and
  protects against relapse better than medication alone.
caveats:
- Build gradually; for severely depressed patients, even a 10-minute walk is a meaningful
  start.
- Pair with morning sunlight where possible for added serotonin/circadian effect.
- Resistance training adds independent benefit to aerobic.
