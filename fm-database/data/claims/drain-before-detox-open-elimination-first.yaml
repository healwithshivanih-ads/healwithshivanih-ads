slug: drain-before-detox-open-elimination-first
statement: Effective detoxification requires opening elimination pathways (gut, liver,
  lymph) before introducing binders or herbs, to prevent toxin recirculation.
evidence_tier: fm_specific_thin
rationale: This is a core functional medicine principle stated explicitly in the document.
  It is biologically plausible (binders without open elimination may cause retox)
  but lacks formal peer-reviewed consensus.
coaching_translation: Before adding detox supplements or herbs, make sure your gut
  is moving, your liver is supported, and your lymph is flowing. Always drain before
  you detox.
caveats:
