slug: healing-gut-lining-resolves-food-reactions
statement: Healing intestinal permeability — by addressing its upstream drivers (stress,
  dysbiosis, low stomach acid, inflammation, nutritional deficiencies) — is the foundational
  treatment for both food allergy and food sensitivity.
evidence_tier: plausible_emerging
rationale: The gut-healing approach to food reactions is central to FM. Plausible
  mechanistically; some clinical evidence supports gut-healing interventions improving
  food tolerance, but large RCTs specifically on this endpoint are lacking.
coaching_translation: Food avoidance alone is not the complete answer. The bigger
  goal is healing the gut so that the client can eventually tolerate foods they currently
  react to. Support stress reduction, microbiome health, digestive enzyme sufficiency,
  and anti-inflammatory nutrition.
caveats:
- Source is expert lecture, moderate quality.
- Gut healing is a process that may take months to years.
- Clients with true IgE allergies (especially severe) may not fully resolve even with
  gut healing — refer to allergist.
