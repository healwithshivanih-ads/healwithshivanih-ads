slug: poor-sleep-negatively-impacts-estrobolome-health
statement: Chronic sleep deprivation impairs estrobolome health and overall gut microbiome
  function.
evidence_tier: plausible_emerging
rationale: Sleep disruption is associated with gut microbiome alterations in published
  research. The specific estrobolome impact is a logical extension stated by the expert
  but not independently cited with a study. Single-expert source.
coaching_translation: Poor sleep doesn't just leave you feeling tired — it also undermines
  the gut bacteria responsible for processing estrogen, creating a compounding effect
  on hormonal symptoms.
caveats:
- Single-expert source.
- Direct estrobolome-specific sleep research not cited in document.
