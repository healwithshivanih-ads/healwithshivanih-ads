slug: nafld-carnitine-600mg-mitochondrial
statement: L-carnitine 600 mg/day improved liver function and mitochondrial markers
  in a 45-patient NAFLD trial. Carnitine drives fatty acid transport into mitochondria;
  low hepatic carnitine increases NAFLD susceptibility. Especially valuable when fatty
  infiltration is linked to alcohol or toxin/pesticide exposure — supplemental carnitine
  reduces free fatty acids and triglycerides while raising HDL in alcohol- induced
  fatty liver.
evidence_tier: strong
