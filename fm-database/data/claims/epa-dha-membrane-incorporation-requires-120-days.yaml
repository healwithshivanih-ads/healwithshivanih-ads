slug: epa-dha-membrane-incorporation-requires-120-days
statement: Full red blood cell (RBC) membrane incorporation of EPA and DHA requires at least 120 days of continuous supplementation.
evidence_tier: plausible_emerging
rationale: Stated clearly in the lecture as the basis for the recommended supplementation duration. Aligns with the known
  RBC lifespan (~120 days) used in omega-3 index testing. Source is an FM lecture of moderate quality.
coaching_translation: Think of omega-3 supplementation like a 4-month commitment — your red blood cells turn over slowly,
  and that's how long it takes to fully benefit.
caveats:
- Specific 120-day figure from FM lecture source; verify with primary literature.
- Dose must be adequate (2–4g/day) for meaningful incorporation.
