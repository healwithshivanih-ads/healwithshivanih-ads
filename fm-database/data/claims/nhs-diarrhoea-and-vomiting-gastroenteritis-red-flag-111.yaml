slug: nhs-diarrhoea-and-vomiting-gastroenteritis-red-flag-111
statement: Call NHS 111 for any worry about a baby under 12 months, a baby who stops
  feeding, signs of dehydration (dark urine, fewer wet nappies), persistent vomiting
  that can't keep fluids down, bloody diarrhoea, or symptoms beyond 7 days (diarrhoea)
  or 2 days (vomiting).
