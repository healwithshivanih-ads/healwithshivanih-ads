slug: cumulative-toxic-body-burden-suppresses-immunity-myers-tas
statement: The average person carries dozens of industrial chemicals and heavy metals,
  many of them immunosuppressive, and this cumulative body burden is proposed as a
  major driver of the autoimmune epidemic.
evidence_tier: plausible_emerging
rationale: Body-burden studies (e.g., EWG/Mount Sinai) detected an average of ~91
  chemicals per person, over half known to suppress immune function; Myers frames
  total load, not any single toxin, as the problem.
coaching_translation: We're all carrying a load of everyday chemicals, and lightening
  that load takes strain off the immune system.
