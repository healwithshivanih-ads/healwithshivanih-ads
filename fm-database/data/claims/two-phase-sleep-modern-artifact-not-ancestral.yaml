  quote: As recently as 2016, scientists conducted studies on indigenous groups, including
    the Hadza of Tanzania and the Toba of Argentina, who don't have access to electrical
    lighting. When scientists put sleep trackers on these people for many days at
    a time, they didn't find any sign of two-phase sleep.
