  quote: Indigestion can be attributed to a great many causes, including not only
    increased secretion of stomach acid but also decreased secretion of stomach acid
    and other digestive factors and enzymes. The natural approach to chronic indigestion
    focuses on aiding digestion rather than on blocking the digestive process with
    antacids.
