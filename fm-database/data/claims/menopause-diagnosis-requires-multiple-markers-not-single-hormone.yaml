slug: menopause-diagnosis-requires-multiple-markers-not-single-hormone
statement: Diagnosis of menopause cannot be made on a single hormone value (e.g.,
  serum estrogen alone); it requires a combination of clinical history, functional
  timeline, ultrasound (ovarian follicle assessment), and multiple hormone markers
  (DHEA, progesterone, estrogen, LH, FSH, cortisol, inflammation markers).
evidence_tier: strong
rationale: This is consensus-level clinical practice in reproductive endocrinology.
  No single biomarker is independently diagnostic for menopause; the STRAW+10 staging
  system and clinical guidelines support multimodal assessment.
coaching_translation: Remind clients that a single low hormone result on a blood test
  does NOT confirm menopause. Proper diagnosis needs the full picture — symptoms,
  history, timeline, and multiple lab values.
out_of_scope_notes: Diagnosis of menopause is clinician scope. Coaches support history-taking
  and symptom tracking.
caveats:
- Source is expert consensus lecture; consistent with mainstream gynecological guidelines.
