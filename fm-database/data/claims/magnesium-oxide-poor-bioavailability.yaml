slug: magnesium-oxide-poor-bioavailability
statement: Magnesium oxide has high elemental magnesium content (~60%) but is insoluble
  and poorly bioavailable, making it an ineffective therapeutic supplement.
evidence_tier: plausible_emerging
rationale: Magnesium oxide's low bioavailability (~4%) compared to other forms (glycinate,
  citrate) is supported by comparative absorption studies.
coaching_translation: The cheapest magnesium supplement — magnesium oxide — is also
  the least effective. Always check the form before buying.
