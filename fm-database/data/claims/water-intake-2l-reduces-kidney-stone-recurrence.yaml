slug: water-intake-2l-reduces-kidney-stone-recurrence
statement: Consuming more than 2 L of water per day to achieve a daily urine output
  above 2.5 L lowers kidney stone recurrence risk by 60%.
evidence_tier: strong
rationale: Robust epidemiological and clinical trial data; diluting urine reduces
  supersaturation of calcium oxalate, uric acid, and phosphate — the primary mechanism
  of stone formation.
coaching_translation: Drinking at least 2 litres of water daily (preferably more in
  hot weather or with exercise) to keep urine pale and dilute is the single most cost-effective
  kidney stone prevention strategy.
caveats:
- Other beverages should not substitute for water; grapefruit juice increases stone
  risk by 44% in women
