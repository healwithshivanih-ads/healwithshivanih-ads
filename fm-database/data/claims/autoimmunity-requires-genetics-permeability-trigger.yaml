- id: coconote-fm-body-composition-bmi
  location: Autoimmunity / Case Discussion Section
  quote: When you see a family history of autoimmunity, they've got the genetics to
    develop autoimmunity. When you see significant antibiotic use and pain medication
    use, they are at risk for increased intestinal permeability, which is that second
    piece of that triad of autoimmunity. And then you've got the trigger.
