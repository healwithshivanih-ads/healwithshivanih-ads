slug: autoimmunity-requires-genetics-permeability-trigger
statement: 'Autoimmunity requires a convergence of three factors: genetic predisposition,
  increased intestinal permeability, and an environmental or infectious trigger.'
evidence_tier: plausible_emerging
rationale: The three-hit model of autoimmunity (Fasano and others) is well-cited in
  functional and integrative medicine and has growing peer-reviewed support, particularly
  regarding intestinal permeability, though not fully consensus-level.
coaching_translation: Autoimmune conditions aren't just about genes. They typically
  require a 'leaky gut' and a trigger — like a food, infection, or major stressor
  — to actually develop. This means there are real lifestyle levers to pull.
caveats:
- The triad model has significant FM literature support but is not universally accepted
  in conventional medicine. Source is expert consensus lecture.
