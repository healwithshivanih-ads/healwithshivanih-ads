slug: folate-mthfr-natural-vs-folic-acid
statement: Individuals with MTHFR variants may respond better to natural food-form
  folate versus synthetic folic acid supplements.
evidence_tier: plausible_emerging
rationale: Plausible based on MTHFR enzyme impairment reducing conversion of folic
  acid to active 5-MTHF. Document cites Linus Pauling Institute and NIH ODS.
coaching_translation: For some people with a common gene variant, synthetic folic
  acid in supplements may not be as usable as the natural folate in leafy greens and
  legumes.
caveats:
- MTHFR status requires genetic testing by a clinician.
