slug: nhs-dental-abscess-airway-emergency
statement: Call 999 or go to A&E if a dental abscess causes difficulty breathing,
  swallowing or speaking, severe mouth swelling, eye swelling or sudden vision problems
  — these flag spreading infection threatening the airway or orbit.
