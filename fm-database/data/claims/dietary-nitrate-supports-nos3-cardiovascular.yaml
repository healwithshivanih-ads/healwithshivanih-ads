  quote: 'I also advised him to increase his intake of arginine, a nutrient needed
    to support the NOS3 enzyme that the NOS3 gene produces. So Jamal began loading
    up his diet with arginine-rich foods: arugula, bacon, beets, bok choy, celery,
    Chinese cabbage, cucumber, fennel, leeks, mustard greens, parsley, and watercress.'
