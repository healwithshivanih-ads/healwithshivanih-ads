slug: dietary-nitrate-supports-nos3-cardiovascular
statement: Increasing dietary nitrate through arginine-rich and nitrate-rich vegetables
  (e.g., leafy greens, beets, arugula, celery) can support nitric oxide production
  via NOS3 and may help manage cardiovascular risk associated with NOS3 variants.
evidence_tier: plausible_emerging
rationale: Dietary nitrate → nitrite → NO pathway is established. RCTs show blood
  pressure lowering from dietary nitrate. NOS3-variant individuals may have heightened
  dependence on this exogenous pathway. Lynch's specific food list is mechanistically
  reasonable but not SNP-specific RCT-proven.
coaching_translation: Eating more nitrate-rich and arginine-rich vegetables — especially
  leafy greens, beetroot, celery, and arugula — helps your body make nitric oxide,
  which keeps blood vessels healthy and flexible.
out_of_scope_notes: Blood pressure management and cardiovascular risk reduction require
  clinician oversight. Do not advise stopping antihypertensive medications.
caveats:
- The specific link between dietary nitrate and NOS3 genotype is mechanistically plausible
  but not proven in SNP-stratified RCTs.
- Source is a consumer trade book.
