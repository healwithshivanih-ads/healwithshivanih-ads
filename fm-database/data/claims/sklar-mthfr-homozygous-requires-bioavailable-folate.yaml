slug: sklar-mthfr-homozygous-requires-bioavailable-folate
statement: Homozygous MTHFR variants (especially C677T/C677T) significantly reduce
  enzyme activity, meaning the synthetic folic acid in most prenatals cannot be efficiently
  converted to active methylfolate (5-MTHF) — the form actually required for DNA synthesis,
  neural-tube formation, and pregnancy maintenance. Substituting bioavailable methylfolate,
  paired with methylcobalamin (B12) and serial homocysteine monitoring, is the targeted
  intervention.
