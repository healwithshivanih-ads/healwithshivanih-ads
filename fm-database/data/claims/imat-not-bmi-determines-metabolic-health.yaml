slug: imat-not-bmi-determines-metabolic-health
statement: Intramuscular adipose tissue (IMAT), the fat infiltrated INTO skeletal
  muscle tissue, is a stronger determinant of metabolic dysfunction, infertility (including
  PCOS), and metabolic syndrome than BMI or even DEXA body-fat percentage. Lyon describes
  the visual contrast as a fillet (lean, contractile, metabolically flexible muscle)
  versus wagyu marbling (fat-infiltrated, contractile-impaired muscle). IMAT is not
  routinely measured today but can be assessed by MRI and emerging ultrasound techniques.
evidence_tier: plausible_emerging
