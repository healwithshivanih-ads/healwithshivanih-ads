sources:
- id: lyon-energy-blueprint-podcast-2026
  location: Podcast — PCOS and IMAT story
  quote: It has nothing to do with body fat percentage. It has everything to do with
    the fat that is infiltrated into the muscle. It's the IMAT the intramuscular adipose
    tissue that determines if someone is going to struggle with fertility or not.
rationale: Helps coach explain to women with PCOS or normal-BMI insulin resistance
  why their labs look bad despite appearing slim ("thin outside fat inside" / TOFI).
