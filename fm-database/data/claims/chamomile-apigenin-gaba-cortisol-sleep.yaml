slug: chamomile-apigenin-gaba-cortisol-sleep
statement: 1g daily chamomile flower tea may reduce cortisol levels and improve sleep
  quality in people with primary insomnia, acting via apigenin's interaction with
  GABA-A receptors.
evidence_tier: plausible_emerging
rationale: Specific dose (1g), condition (primary insomnia), and mechanism (apigenin
  → GABA-A) are cited. Mechanism is well-established; studies not named so cannot
  confirm strong tier.
coaching_translation: A cup of chamomile tea (from 1g flower) each evening may help
  calm your nervous system and support better sleep — especially if stress keeps you
  wired at bedtime.
caveats:
