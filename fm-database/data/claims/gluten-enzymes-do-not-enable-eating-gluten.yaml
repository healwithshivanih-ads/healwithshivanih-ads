slug: gluten-enzymes-do-not-enable-eating-gluten
statement: Gluten-digesting enzymes do not reliably prevent symptoms or intestinal
  damage in celiac disease and offer minor help at best, so celiac patients should
  not rely on them to eat meaningful amounts of gluten.
evidence_tier: plausible_emerging
rationale: Cites gluten-enzyme (AN-PEP/ALV003) trials.
coaching_translation: '''Gluten enzymes'' won''t make gluten safe for someone with
  celiac — don''t use them to cheat.'
