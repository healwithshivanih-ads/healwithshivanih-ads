slug: nhs-conjunctivitis-self-care
statement: For uncomplicated conjunctivitis, bathe eyelids with cooled boiled water
  on a clean cotton wool pad (one per eye), apply a cold flannel for a few minutes,
  and stop wearing contact lenses until the eyes recover.
