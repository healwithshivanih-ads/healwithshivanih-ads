slug: modern-fiber-deficit-drives-h2-deficiency
statement: Endogenous molecular hydrogen production depends on colonic fermentation
  of dietary fiber by H2-producing bacteria (clostridia, ruminococci, bacteroides).
  Paleolithic humans likely consumed 100+ grams of fiber daily; modern average intake
  is approximately 14 g/day, a roughly 7-fold deficit. Compounding this, hydrogen
  breath testing shows 60-80 percent of middle-aged or overweight adults produce NO
  measurable H2 even when challenged with lactulose, because gut dysbiosis has displaced
  the hydrogenogenic species (often in favour of methanogens). The deficit can be
  partially addressed by gradual fiber restoration (must be very gradual — Tarnava
  reports 2-3 months of GI symptoms when ramping from 15 to 70 g/day) and probiotic
  strategies, but exogenous H2 supplementation may be the more accessible intervention
  for dysbiotic clients.
evidence_tier: plausible_emerging
