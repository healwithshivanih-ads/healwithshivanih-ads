slug: most-snps-are-low-penetrance-group-and-score-them
statement: Of the 3-4 million SNPs in the genome, most are clinically silent; the
  coaching-relevant ones are low-penetrance and only become useful when grouped by
  pathway and scored together (polygenic). High-penetrance medical variants (BRCA,
  sickle-cell HBB) are a separate, clinician-only domain.
evidence_tier: plausible_emerging
rationale: Trust the report's grouped/scored pathway signal rather than chasing individual
  genes.
coaching_translation: Trust the report's grouped/scored pathway signal rather than
  chasing individual genes.
out_of_scope_notes: High-penetrance genetics (e.g. BRCA) belongs to genetic counsellors
  and physicians.
