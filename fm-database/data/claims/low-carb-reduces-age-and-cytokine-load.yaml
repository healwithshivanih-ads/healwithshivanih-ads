slug: low-carb-reduces-age-and-cytokine-load
statement: A low-carb diet reduces advanced glycation end-products (AGEs) and pro-inflammatory
  cytokines (IL-6, TNF-α).
evidence_tier: plausible_emerging
rationale: Dietary carbohydrate reduction lowers glycation substrate availability
  and has been associated with reduced inflammatory markers in observational and small
  trial data. Not yet fully RCT-confirmed at consensus level.
coaching_translation: Cutting back on carbs — especially refined ones — can reduce
  the inflammatory signals in your body that contribute to joint pain, autoimmune
  flares, and heart disease risk.
caveats:
- Source is an expert-consensus cheatsheet. Inflammatory cytokine data is from observational
  and small trial studies.
