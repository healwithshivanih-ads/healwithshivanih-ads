slug: sklar-ucsf-ovary-nervous-system-innervation
statement: Recent research from UCSF demonstrates direct autonomic innervation of
  the ovary, providing a neuroanatomical pathway by which the brain's perception of
  safety or threat directly modulates ovarian function — follicle recruitment, ovulation
  timing and reproductive priority. This is the cellular bridge underneath the coaching
  observation that women in chronic stress states often cannot conceive even when
  their hormone panels look adequate.
