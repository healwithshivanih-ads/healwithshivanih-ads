  location: Chapter 81 — Osteoporosis, pg 1349–1350
  quote: Calcium alone provides very little benefit in protecting against osteoporosis;
    vitamin D, vitamin K, and other nutrients are required as well. There is no reason
    to take more than 1,000 mg per day as a supplement. Studies are clear that the
    benefits seen at 2,000 mg per day are not greater than those seen with 1,000 mg.
    Taking large doses of calcium can impair the absorption of magnesium and other
    minerals.
