sources:
- id: fett-it-starts-with-the-egg-2019
  location: Chapter 2 — The Dangers of BPA, pg 36-38
  quote: Women with above-average BPA levels also had fewer five-day old embryos available
    to transfer. The quarter of women with the highest BPA exposure had almost twice
    the odds of implantation failure compared to the quarter of women with the lowest
    BPA levels.
rationale: Quantifies the IVF-cycle cost of BPA exposure — useful for client motivation.
