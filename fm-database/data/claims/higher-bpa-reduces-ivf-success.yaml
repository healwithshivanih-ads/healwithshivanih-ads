slug: higher-bpa-reduces-ivf-success
statement: In observational studies of IVF patients, higher urinary BPA correlates
  with fewer eggs retrieved, lower estrogen response to stimulation, lower fertilisation
  rate, fewer blastocyst-stage embryos, and nearly twice the odds of implantation
  failure. Effect appears more pronounced in women with diminished ovarian reserve.
evidence_tier: plausible_emerging
linked_to_topics:
- egg-quality
- diminished-ovarian-reserve
linked_to_mechanisms:
