slug: wifi-low-frequency-radiation-npy-fourfold
statement: Low-frequency radiofrequency radiation from Wi-Fi devices has been reported
  to increase neuropeptide Y (NPY) — an orexigenic (hunger-promoting) signal — approximately
  fourfold in some experimental studies. Practical implication for sleep and weight
  protocols — turn off household Wi-Fi at night, particularly given that night-time
  device use also drives carbohydrate craving via this NPY pathway.
