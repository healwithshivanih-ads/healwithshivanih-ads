slug: nac-mucolytic-copd
statement: N-acetylcysteine (NAC) 200 mg three times daily is a clinically proven
  mucolytic for COPD, helping clear bronchial mucus by breaking disulphide bonds in
  airway secretions. In more serious cases NAC can be inhaled together with glutathione
  to additionally reduce lung inflammation. Use alongside hydration, expectorants,
  and any bronchodilator regimen.
evidence_tier: strong
