slug: homa-ir-reflects-hepatic-insulin-sensitivity
statement: HOMA-IR (calculated from fasting glucose × fasting insulin ÷ 405) reflects
  hepatic insulin sensitivity and tracks change over time; values >2.6 indicate significant
  insulin resistance with higher cardiometabolic risk.
evidence_tier: strong
rationale: HOMA-IR is a validated clinical tool widely used in research and clinical
  practice.
coaching_translation: HOMA-IR is a simple score calculated from two fasting blood
  tests that tells you how hard your body is working to keep blood sugar normal.
out_of_scope_notes: 'Clinician scope: ordering and interpreting fasting labs.'
linked_to_topics:
