slug: cfs-fibromyalgia-mcs-overlap-syndromes
statement: Chronic Fatigue Syndrome (CFS), Fibromyalgia (FM), and Multiple Chemical
  Sensitivities (MCS) are overlapping conditions — diagnosis depends partly on which
  physician is consulted. 70% of FM and 30% of MCS patients meet CDC CFS criteria;
  80% of both FM and MCS meet the CFS criterion of fatigue with 50% reduction in activity
  for more than 6 months; over 50% of CFS and FM patients have adverse chemical reactions.
evidence_tier: strong
rationale: Pizzorno cites the diagnostic-overlap epidemiology. Shared features — HPA
  dysregulation, mitochondrial dysfunction, central sensitisation, low NK cell activity,
  gut dysbiosis, methylation impairment. Same FM treatment frameworks apply across
  all three.
coaching_translation: CFS, fibromyalgia, and multiple chemical sensitivities are basically
  the same underlying picture with different chief complaints. The FM playbook — adrenal
  support, mitochondrial nutrients, gut healing, gentle movement (tai chi, qi gong),
  stress management — applies across all three.
caveats:
- Don't get stuck on the exact diagnostic label.
- Workup must rule out treatable mimics — thyroid, sleep apnea, anemia, depression,
  celiac.
- Gentle low-intensity exercise; aggressive exercise worsens via post-exertional malaise.
