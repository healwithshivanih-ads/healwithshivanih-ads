slug: fluoride-bpa-block-thyroid-receptors
statement: Environmental toxins including fluoride, BPA, phthalates, and pesticides
  block thyroid receptors and compete with iodine uptake, impairing thyroid function.
evidence_tier: plausible_emerging
rationale: The document lists fluoride, BPA, pesticides, and plastics as thyroid receptor
  blockers. Evidence for BPA and thyroid disruption exists in animal and some human
  studies; fluoride's thyroid effects are an active research area.
coaching_translation: Everyday exposures — fluoride in water, plastic food containers,
  pesticide residues — can interfere with how well your thyroid hormone works at the
  cell level.
caveats:
- Human RCT evidence is limited; primarily animal/observational data.
- Expert-consensus source.
