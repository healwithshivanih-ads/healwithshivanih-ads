slug: food-allergy-iga-deficiency-stress-amplifies
statement: People with food allergies typically have unusually low intestinal secretory
  IgA, which normally barricades against food antigen entry. Stress further suppresses
  IgA secretion, so even short-term IgA deficiency predisposes a person to new food
  allergy development.
evidence_tier: plausible_emerging
