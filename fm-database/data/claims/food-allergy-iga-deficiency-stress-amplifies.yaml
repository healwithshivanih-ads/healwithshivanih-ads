- id: murray-pizzorno-2012-encyclopedia
  location: Food Allergy chapter, p 938
  quote: During stressful times, food allergies tend to develop or become worse. This
    situation probably results from a stress-induced decrease in secretory IgA levels.
    People with food allergies typically have unusually low levels of IgA, making
    them particularly susceptible.
