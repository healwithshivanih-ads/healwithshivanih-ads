slug: split-dosing-improves-magnesium-absorption
statement: Dividing magnesium supplementation into multiple smaller doses throughout
  the day improves absorption compared to a single large dose, as the body cannot
  absorb very high amounts at once.
evidence_tier: plausible_emerging
rationale: Magnesium absorption is dose-dependent and saturable; splitting doses is
  a pharmacokinetic recommendation consistent with known absorption mechanisms, though
  specific clinical studies on split dosing are limited.
coaching_translation: If you're taking higher doses of magnesium, splitting it into
  two or three doses across the day will help your body absorb more of it.
