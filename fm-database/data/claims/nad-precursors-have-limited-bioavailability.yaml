slug: nad-precursors-have-limited-bioavailability
statement: NAD+ precursors (NR, NMN) have generated excitement as anti-aging supplements
  with possible application to oocyte mitochondrial energy, but bioavailability of
  oral, sublingual, and subcutaneous forms is contested — most do not achieve meaningful
  intracellular concentrations. Clinical use in fertility is experimental and lacks
  hard data despite enthusiasm in functional-medicine spaces.
evidence_tier: plausible_emerging
