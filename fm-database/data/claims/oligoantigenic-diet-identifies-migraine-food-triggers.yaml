slug: oligoantigenic-diet-identifies-migraine-food-triggers
statement: An oligoantigenic (elimination) diet identifies food triggers in 70-90%
  of migraine patients; the most common triggers are alcohol, chocolate, cheese, citrus,
  shellfish, and other foods containing vasoactive amines (tyramine, phenylethylamine,
  histamine).
evidence_tier: strong
rationale: Pizzorno cites Egger et al landmark pediatric migraine elimination study
  (78% improvement) and multiple adult trials. Mechanism — vasoactive amines cross
  the BBB and trigger trigeminovascular activation in susceptible individuals.
coaching_translation: For chronic migraine, removing common food triggers (alcohol,
  chocolate, aged cheese, citrus, shellfish) for 4-6 weeks identifies most people's
  triggers. About 70-90% of patients improve substantially.
caveats:
- 4-6 week strict elimination, then systematic 4-day-cycle reintroduction.
- Common triggers may not be your triggers — individualise.
- Combine with stable blood sugar, hydration, sleep hygiene.
