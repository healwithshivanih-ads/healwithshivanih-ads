slug: curcumin-downregulates-th17
statement: Curcumin downregulates NF-κB and Th17 immune pathways, making it a useful
  tool in autoimmune and inflammatory conditions.
evidence_tier: plausible_emerging
rationale: Pre-clinical and early clinical evidence supports curcumin's modulation
  of Th17/Treg balance. Relevant for psoriasis, IBD, and other Th17-driven conditions.
coaching_translation: Turmeric-based curcumin can help rebalance overactive immune
  responses driving autoimmune conditions — best used with clinician guidance for
  therapeutic doses.
caveats:
- Source is educational synthesis. Verify dosing with clinician for therapeutic use.
- Enhanced bioavailability forms required.
