slug: probiotic-dosing-titrate-to-effect
statement: Effective probiotic dosing is a Lactobacillus/Bifidobacterium blend at
  roughly 100–900 billion CFU/day (start near 100 billion and titrate up only until
  symptoms improve) and Saccharomyces boulardii at about 1 g/day (~20 billion CFU)
  — more is not better once you have improvement.
evidence_tier: strong
rationale: Cites probiotic meta-analyses for IBS/IBD dosing.
coaching_translation: Start probiotics low and only go higher until you feel better
  — there's no benefit to megadosing past that.
