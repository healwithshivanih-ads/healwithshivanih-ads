slug: murray-candida-antibiotic-driver
statement: Prolonged antibiotic use is the single most important predisposing factor
  in chronic candidiasis (yeast syndrome) — antibiotics suppress the protective intestinal
  bacteria that normally hold Candida albicans in check, and also dampen immune function.
  Other major contributors are decreased digestive secretions, oral steroids, oral
  contraceptives, diets high in refined sugar and yeast, impaired liver function,
  and nutrient deficiencies. Treatment must address predisposing factors first; antifungals
  alone are insufficient.
evidence_tier: strong
