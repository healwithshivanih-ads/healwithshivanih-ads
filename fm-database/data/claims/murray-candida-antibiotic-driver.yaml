  location: Chapter 30 — Chronic Candidiasis, pg 595-596
  quote: 'Prolonged antibiotic use is believed to be the most important factor in
    the development of chronic candidiasis in most cases. By suppressing normal intestinal
    bacteria that prevent yeast overgrowth and suppression of the immune system, antibiotics
    strongly promote the overgrowth of candida. Predisposing Factors in Candida albicans
    Overgrowth: Decreased digestive secretions, Dietary factors, Impaired immunity,
    Nutrient deficiency, Drugs, Prolonged antibiotic use, Impaired liver function,
    Underlying disease states, Altered bowel flora.'
