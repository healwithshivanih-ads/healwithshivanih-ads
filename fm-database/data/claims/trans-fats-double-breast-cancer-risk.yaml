slug: trans-fats-double-breast-cancer-risk
statement: 'Trans fats are associated with approximately double the risk of breast cancer: two studies
  (1997 and 2008) found that women with the highest blood levels of trans fats had about twice the breast
  cancer risk compared to those with the lowest levels.'
evidence_tier: plausible_emerging
rationale: Replicable epidemiological finding across two independent cohort studies; trans fats are also
  independently linked to systemic inflammation, which contributes to tumour promotion.
coaching_translation: Women with the most trans fats in their bloodstream had roughly twice the breast
  cancer risk in two large studies. Trans fats are in processed baked goods, crackers, stick margarine,
  and microwave popcorn — check labels for 'partially hydrogenated vegetable oil'.
out_of_scope_notes: ''
caveats:
- Epidemiological association; confounders (overall diet quality, obesity) are not fully controlled across
  all studies. Industrial trans fats are being phased out globally, reducing exposure.
