slug: morning-cortisol-elevation-and-dst-mark-hpa-driven-depression
statement: Elevated AM cortisol with decreased DHEA, abnormal nocturnal cortisol release,
  and inadequate suppression on dexamethasone suppression test (DST) are biomarkers
  of HPA-axis-driven depression that signal high-cortisol-state contribution to mood
  symptoms.
evidence_tier: strong
rationale: DST is a long-established (though imperfect) marker of HPA dysregulation
  in MDD. Pizzorno's review emphasises adrenal salivary cortisol/DHEA testing as a
  coach-accessible alternative. Mechanism — high cortisol induces tryptophan oxygenase,
  shunting tryptophan away from serotonin.
coaching_translation: Depression caused by HPA-axis burnout looks distinctive — elevated
  morning cortisol, low DHEA, often shifted to evening with abnormal nocturnal release.
  This pattern responds especially well to stress management, adaptogens, and tryptophan/5-HTP.
caveats:
- Saliva cortisol-DHEA testing (4-point) is the coach-accessible version.
- DST is clinician-administered.
- Address upstream stress drivers in parallel — supplements alone insufficient.
