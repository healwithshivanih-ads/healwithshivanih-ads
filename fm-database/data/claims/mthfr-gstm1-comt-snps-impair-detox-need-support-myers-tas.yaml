slug: mthfr-gstm1-comt-snps-impair-detox-need-support-myers-tas
statement: SNPs in MTHFR, GSTM1, and COMT reduce methylation, glutathione handling,
  and estrogen/toxin clearance, so affected people benefit from methylated B6/B12/folate,
  extra cruciferous vegetables, and detox support such as glutathione, ALA, milk thistle,
  NAC, and magnesium.
evidence_tier: plausible_emerging
rationale: These common variants slow key detox and methylation steps; targeted nutrient
  support compensates for reduced enzyme capacity.
coaching_translation: Common genetic quirks (MTHFR, GSTM1, COMT) can slow detox —
  the right B-vitamin forms and detox-support nutrients help make up for it.
