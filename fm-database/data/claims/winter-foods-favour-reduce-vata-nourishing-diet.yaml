slug: winter-foods-favour-reduce-vata-nourishing-diet
statement: Winter foods to favour include starchy root vegetables and squash, cold-weather greens (kale,
  collards, sea vegetables), warming spices (cinnamon, ginger, cumin, black pepper, chilies), warm spiced
  milks, nuts and seeds, rich oils (ghee, sesame), moist grains cooked with extra water, and sweet heavy
  fruits (bananas, dates, figs, mangoes, oranges); foods to reduce include dry foods, raw foods, drying
  grains (millet, rye, barley), cold dairy, and out-of-season produce.
evidence_tier: fm_specific_thin
rationale: Vata requires unctuous, warming, and nourishing foods in winter. Drying grains like millet
  and rye aggravate winter dryness; moist, well-oiled preparations with warming spices sustain digestive
  strength and prevent the constipation, dry skin, and anxiety of vata imbalance.
coaching_translation: Winter meal planning should centre on root vegetables, oats with ghee, lentil soups
  with warming spices, and cooked fruits. Clients prone to constipation, dry skin, or winter anxiety need
  extra oil and moisture in their diet during these months.
out_of_scope_notes: ''
caveats:
- Dosha-specific recommendations; bitter greens in moderation are still recommended in winter, balanced
  with sweet grains or root vegetables to offset their cooling quality.
