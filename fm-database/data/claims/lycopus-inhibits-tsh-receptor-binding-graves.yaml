slug: lycopus-inhibits-tsh-receptor-binding-graves
statement: Lycopus virginicus (bugleweed) inhibits TSH receptor antibody binding and
  reduces peripheral T4-to-T3 conversion, supporting its traditional use in mild Graves'
  disease.
evidence_tier: fm_specific_thin
rationale: Pizzorno reports a long traditional use and in-vitro evidence of TSH receptor
  binding inhibition. Robust human RCTs are limited; current use is naturopathic rather
  than mainstream endocrinology.
coaching_translation: Bugleweed is a traditional herb that may calm an overactive
  thyroid by blocking the antibody signal — used under clinician supervision in mild
  Graves'. Not for use if you're already hypothyroid or pregnant.
caveats:
- Contraindicated in hypothyroidism, pregnancy, lactation, and during thyroid hormone
  replacement.
- Use under naturopathic / clinician supervision; monitor TSH and TRAb.
- Typically combined with Melissa officinalis and Lithospermum officinale.
