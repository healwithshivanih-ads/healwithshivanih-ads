slug: microbiome-diversity-declines-in-menopause-increasing-dysbiosis-risk
statement: Microbial diversity in the gut decreases during menopause transition, increasing
  susceptibility to dysbiosis, opportunistic infections, altered fermentation, and
  reduced short-chain fatty acid production.
evidence_tier: plausible_emerging
rationale: Single-expert source. The menopause-microbiome-diversity link is a growing
  area of research (estrobolome, menopausal microbiome studies) but consensus-level
  evidence is not yet established.
coaching_translation: Menopause shifts your gut ecology — beneficial bacteria decline
  and 'weeds' can take over. Supporting diversity through varied plant foods and fermented
  foods becomes especially important during this transition.
caveats:
- Single-expert source; emerging but not yet consensus-level evidence.
- Source is expert_consensus/moderate quality.
