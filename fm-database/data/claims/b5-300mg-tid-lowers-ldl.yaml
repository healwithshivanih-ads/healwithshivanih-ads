slug: b5-300mg-tid-lowers-ldl
statement: Pantethine (Vitamin B5) at 300mg three times daily lowers LDL cholesterol
  and can be combined with other lipid-modifying medications.
evidence_tier: plausible_emerging
rationale: Pantethine's LDL-lowering effect has some RCT support (e.g., Rumberger
  et al., 2011), though evidence base is limited.
coaching_translation: Pantethine (a form of B5) at higher therapeutic doses may help
  lower LDL. It's often used alongside other cholesterol-lowering strategies.
caveats:
- Evidence base is small — limited large RCTs.
- Source is expert lecture — specific citations not provided.
- Therapeutic dose far exceeds standard dietary B5 intake.
