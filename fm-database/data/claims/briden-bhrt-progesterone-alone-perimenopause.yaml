slug: briden-bhrt-progesterone-alone-perimenopause
statement: 'In perimenopause, progesterone-alone therapy (without estrogen) has specific
  advantages: it addresses the loss of progesterone (which is what is actually changing
  first in perimenopause), is better for sleep and migraines than estrogen, is breast-safer,
  and is easier to stop because it is not ''addictive'' the way estrogen withdrawal
  can be. Estrogen can be added later when estrogen-deficiency symptoms emerge (hot
  flushes that don''t respond to progesterone).'
evidence_tier: fm_specific_thin
rationale: The 'progesterone first, estrogen later' framing draws on Prof Jerilynn
  Prior's reframing of perimenopause as a progesterone-loss state. Conventional HRT
  prescribing typically defaults to estrogen-plus-progestin; the progesterone-alone
  approach is FM/ND practice with growing evidence.
coaching_translation: Perimenopause is often described as estrogen-deficiency, but
  in the early years it is more accurately progesterone-loss with estrogen surging.
  Progesterone alone is often the first hormone to add — sleep, anxiety, heavy periods,
  breast pain all benefit before estrogen is needed.
