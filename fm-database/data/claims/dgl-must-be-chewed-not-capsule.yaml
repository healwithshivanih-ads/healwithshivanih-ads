slug: dgl-must-be-chewed-not-capsule
statement: DGL must be mixed with saliva to be effective, as salivary compounds stimulate
  gastric and intestinal cell regeneration; DGL in capsule form has not been shown
  to be effective.
evidence_tier: plausible_emerging
rationale: Formulation-specific finding cited in FM textbook; salivary activation
  mechanism is biologically plausible though direct clinical comparison of chewable
  vs. capsule DGL RCTs are limited.
coaching_translation: Always use DGL as a chewable tablet, not a capsule — it needs
  to mix with saliva in your mouth to work properly.
