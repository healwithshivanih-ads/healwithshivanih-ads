slug: ayurveda-pitta-food-approach
statement: For a pitta constitution or pitta aggravation, favour cool, sweet, bitter and astringent foods
  (sweet ripe fruit, leafy greens, cooling grains like basmati rice and barley, milk, ghee, coconut, cilantro)
  and reduce hot, sour, salty, pungent, fermented and oily foods (sour fruit, hot peppers, tomatoes, vinegar,
  alcohol, red meat, hot spices).
evidence_tier: fm_specific_thin
rationale: From the Ayurvedic Institute / Lad Food Guidelines for Basic Constitutional Types — traditional
  dosha-food matching (like increases like; opposite qualities balance).
