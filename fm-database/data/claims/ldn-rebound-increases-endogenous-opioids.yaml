  quote: Interference of opioid peptide–opioid receptor interactions for a short time
    each day (from 4-6 hours) with LDN provided a subsequent window of time (18–20
    hours) for the increased levels of endogenous opioids and opioid receptors to
    elicit a robust functional response.
