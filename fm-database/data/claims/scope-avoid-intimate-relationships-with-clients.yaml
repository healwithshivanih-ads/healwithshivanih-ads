slug: scope-avoid-intimate-relationships-with-clients
statement: The NBHWC code of ethics is clear that intimate relationships with current
  clients must be avoided entirely, because clients disclose in a position of trust
  that would not exist socially. With past clients the situation is greyer and should
  be tested against one's own values, transparency of motive, and mutuality after
  clear closure.
evidence_tier: plausible_emerging
rationale: Dual relationships confuse the client and can violate the trust that makes
  coaching effective; a firm boundary protects both parties and the quality of the
  work.
coaching_translation: With current clients, simply stay out of that territory. Keep
  separate personal and professional social-media accounts, explain your connection
  policy consistently, and use a master mentor to debrief any ethical grey areas.
out_of_scope_notes: ''
caveats:
- With past clients there is no absolute rule; the coach must judge against personal
  ethics, transparency and mutuality once the coaching has clearly ended.
