slug: waist-circumference-thresholds-predict-metabolic-risk
statement: A waist circumference greater than 40 inches in men and 35 inches in women
  (US standards) is associated with increased risk of diabetes, hypertension, and
  cardiovascular disease; stricter cut-offs apply for individuals of Asian descent.
evidence_tier: strong
rationale: International standards for waist circumference cut-offs are supported
  by large epidemiological studies; ethnic-specific thresholds for Asian populations
  are well-documented.
coaching_translation: There are clear waist size benchmarks that signal health risk.
  For clients of Asian descent, the danger zone starts at a smaller waist size than
  general population guidelines suggest.
caveats:
- Insufficient data currently exists for African and Middle Eastern populations to
  establish precise cut-offs.
