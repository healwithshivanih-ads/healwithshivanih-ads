slug: cognoscopy-blood-screen-at-40
statement: Bredesen recommends a "cognoscopy" — a baseline cognitive risk blood panel
  — for every adult aged 40 or over, analogous to the colonoscopy at 50. Core markers
  include pTau-181, the A-beta 42:40 ratio (both indicate ongoing Alzheimer's-related
  activity in the brain), and GFAP (an emerging early astrocyte-activation marker
  that, when normal, is strongly reassuring because it rises so early in the disease
  arc).
evidence_tier: plausible_emerging
linked_to_topics:
- cognitive-decline
