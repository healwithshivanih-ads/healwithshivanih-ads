sources:
- id: bredesen-energy-blueprint-podcast-2026
  location: Podcast — cognoscopy segment
  quote: Just as we know you should get a colonoscopy when you turn 50, get a cognoscopy
    if you're 40 or over. Find out where you stand. Now you can include pTau-181 and
    A-beta 42:40 ratio. Pretty soon we'll be able to include GFAP, which is even an
    earlier marker — not as specific for Alzheimer's, but it's an early marker of
    astrocyte activation.
rationale: Concrete coach handoff — three blood markers a client can ask their physician
  to order from age 40, before symptoms.
