slug: weight-loss-most-important-htn-goal
statement: Achieving ideal body weight is the most important therapeutic goal for
  most patients with any form of hypertension; obesity is the major dietary cause.
evidence_tier: strong
rationale: Obesity–hypertension link is one of the best-established in cardiovascular
  medicine, with weight loss demonstrably reducing or eliminating hypertension across
  multiple trials.
coaching_translation: Reaching a healthy body weight is the single most impactful
  dietary step for high blood pressure.
