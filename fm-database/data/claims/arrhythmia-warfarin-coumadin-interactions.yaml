slug: arrhythmia-warfarin-coumadin-interactions
statement: Patients on warfarin (Coumadin) must keep vitamin K intake (green leafy
  vegetables, green teas) stable rather than increasing — INR is monitored to adjust
  the dose. CoQ10 and St. John's wort may reduce warfarin efficacy; proteolytic enzymes,
  Chinese ginseng, devil's claw, and dong quai may increase its effects. Garlic and
  ginkgo at high doses reduce platelet aggregation (avoid more than one clove garlic
  or 240 mg ginkgo extract per day). Iron, magnesium, and zinc bind warfarin and must
  be spaced at least two hours apart.
