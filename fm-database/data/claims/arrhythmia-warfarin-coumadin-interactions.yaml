  quote: Coenzyme Q10 and Saint-John's-wort may reduce the efficacy of Coumadin, while
    proteolytic enzymes and several herbs, including Chinese ginseng, devil's claw,
    and dong quai, can increase its effects. Iron, magnesium, and zinc may bind with
    Coumadin. Take Coumadin at least two hours before or after any product that contains
    iron, magnesium, or zinc.
