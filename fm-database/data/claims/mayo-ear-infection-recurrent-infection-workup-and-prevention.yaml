slug: mayo-ear-infection-recurrent-infection-workup-and-prevention
statement: Three or more episodes in 6 months or four in 12 months warrants ENT evaluation
  for tympanostomy tubes; prevention measures include breastfeeding for at least 6
  months, avoiding bottle-feeding while lying flat, smoke-free home, hand-washing,
  and ensuring pneumococcal and influenza vaccinations.
