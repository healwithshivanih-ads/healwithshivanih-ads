slug: psoriasis-linked-to-celiac-crohns-and-leaky-gut
statement: Psoriasis is linked to celiac disease and Crohn's disease — bowel mucosa
  of psoriatic patients without overt bowel symptoms shows microscopic lesions and
  increased intestinal permeability. Antigenic and endotoxic compounds escape the
  gut, travel in bloodstream, and trigger activated immune cascades in skin. Treating
  the gut (gluten elimination, leaky-gut repair, dysbiosis) is foundational FM psoriasis
  care.
evidence_tier: strong
rationale: Pizzorno cites the celiac-psoriasis association (anti-gliadin positivity
  higher in psoriatic vs general population; gluten-free diet improves a subset).
  Mainstream dermatology now acknowledges the gut connection; FM treats it as foundational.
coaching_translation: Psoriasis isn't just a skin disease — it's often a gut disease
  showing up on the skin. Test for celiac (anti-tTG antibody), trial strict gluten-free
  for 3-6 months, and address leaky gut, dysbiosis, and SIBO in parallel.
caveats:
- Test for celiac before going gluten-free.
- 3-6 month strict trial; some patients respond, others do not.
- Combine with HCl / enzymes / bile / fibre / probiotics / sarsaparilla / Hydrastis
  stack.
- Address alcohol, stress, animal-fat-heavy diet in parallel.
