slug: treating-inflammation-without-gut-healing-causes-relapse
statement: Treating inflammation without healing the gut leads to relapse, because
  the gut barrier is the primary source of the inflammatory signal.
evidence_tier: fm_specific_thin
rationale: Core FM principle with biological plausibility, but limited direct RCT
  evidence. Mechanistically coherent given the gut-immune-inflammation triangle described.
coaching_translation: Anti-inflammatory supplements alone won't fix the root cause
  if the gut is still leaking — healing the gut lining is the first priority.
caveats:
- This is a functional medicine principle — limited direct RCT evidence for this framing.
  Source is educational synthesis.
