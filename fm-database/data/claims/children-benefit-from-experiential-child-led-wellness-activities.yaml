slug: children-benefit-from-experiential-child-led-wellness-activities
statement: Wellness education for children is most effective when it is experiential,
  hands-on, and child-led rather than didactic.
evidence_tier: strong
rationale: Educational and developmental psychology research (constructivist learning
  theory, Dewey, Vygotsky) strongly supports experiential, child-directed learning
  as superior to passive instruction for engagement and retention in school-age populations.
coaching_translation: With kids, letting them touch, taste, create, and choose is
  far more powerful than lecturing. Following their curiosity and letting them lead
  makes wellness concepts stick.
caveats:
- Source is practitioner discussion drawing on educator expertise; no specific study
  cited. Evidence tier reflects established educational consensus.
