slug: if-reduces-triglycerides
statement: Intermittent fasting is associated with reduced serum triglyceride levels.
evidence_tier: plausible_emerging
rationale: Multiple referenced studies support triglyceride reduction with IF. Mechanistically
  consistent with improved insulin sensitivity and reduced de novo lipogenesis. Trepanowski
  2017 JAMA Intern Med (ADF RCT) is directly cited.
coaching_translation: Intermittent fasting may help bring down blood fat (triglyceride)
  levels, which is good for heart health.
caveats:
- Effect sizes and durability vary by IF subtype and individual.
- Clinician oversight recommended, especially for those with very high triglycerides.
