slug: thiamin-retention-improves-with-meals
statement: Thiamin absorption does not require fat or food, but retention improves
  when taken with meals and spread through the day.
evidence_tier: fm_specific_thin
rationale: Thiamin is water-soluble and absorbed without food; the retention claim
  is plausible but based on FM clinical convention rather than RCT evidence.
coaching_translation: Encourage clients to take thiamin supplements with meals rather
  than on an empty stomach to support better retention.
