slug: cortisol-weight-gain-adipose-inflammation-cycle-myers-tas
statement: Chronic cortisol promotes fat retention and weight gain even without extra
  calories, and body fat is itself an inflammatory endocrine organ, creating a stress-weight-inflammation
  vicious cycle.
evidence_tier: plausible_emerging
rationale: Animal studies show stress-induced weight gain independent of intake; adipose
  tissue secretes inflammatory cytokines that further stress the immune system.
coaching_translation: Stress can add belly fat even without overeating, and that fat
  fuels more inflammation — so stress relief helps weight too.
