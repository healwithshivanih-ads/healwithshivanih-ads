slug: cold-vitamin-c-zinc-lozenge-protocol
statement: Vitamin C 500-1,000 mg every two hours (cut back if loose stool) plus 1,000
  mg mixed bioflavonoids reduces common-cold duration by about a day. Zinc lozenges
  using GLYCINE as sweetener (avoid citric acid, mannitol, sorbitol) at 15-25 mg elemental
  zinc every two waking hours after an initial double dose effectively shorten symptom
  duration. Do not exceed seven days at this dose — prolonged high-dose zinc suppresses
  immune function.
evidence_tier: strong
