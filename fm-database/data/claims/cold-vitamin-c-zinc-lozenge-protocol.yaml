sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 40 — Common Cold, pg 690-697
  quote: Vitamin C can help prevent the common cold and can also help reduce the duration
    by about one full day. Zinc lozenges can be effective in reducing the duration
    of symptoms if they are properly prepared and taken in dosages of 75 mg per day.
    Prolonged supplementation (more than one week) at this dose is not recommended.
