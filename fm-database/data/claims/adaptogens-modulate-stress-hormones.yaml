slug: adaptogens-modulate-stress-hormones
statement: Adaptogenic herbs such as ginseng, rhodiola, ashwagandha and bacopa bidirectionally
  normalise high or low stress and adrenal hormones, with human-trial support for
  improved mood, fatigue, cortisol, memory and immunity and a good safety record.
evidence_tier: plausible_emerging
rationale: Cites human adaptogen trials; long Ayurvedic/TCM use.
coaching_translation: Herbs like ashwagandha and rhodiola can gently steady the stress
  response — a helpful support alongside lifestyle work.
