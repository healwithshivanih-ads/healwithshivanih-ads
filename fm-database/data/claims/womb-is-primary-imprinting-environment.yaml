slug: womb-is-primary-imprinting-environment
statement: The intrauterine period — implantation, pregnancy, birth, and early postnatal
  time — is the most formative phase of life, shaping emotional patterns, relational
  behaviour, and physical health through pre-verbal somatic encoding.
evidence_tier: fm_specific_thin
rationale: There is legitimate developmental psychology and epigenetic research supporting
  the significance of the perinatal period. However, the breadth of the claim as stated
  (all relational patterns, physical health outcomes) goes beyond current peer-reviewed
  consensus. Source is an expert consensus seminar transcript, not primary literature.
coaching_translation: Your earliest experiences — even before you have words or memories
  — can shape how you feel in relationships and in your body today. Exploring these
  early stories can be a meaningful part of your healing journey.
out_of_scope_notes: Coaches should not diagnose or attribute specific physical symptoms
  to womb imprinting without clinician involvement.
caveats:
- Source is a seminar transcript (expert consensus, low quality), not peer-reviewed
  literature.
- The scope of impact claimed is broader than established evidence supports.
- Verify specific physiological claims with clinician.
