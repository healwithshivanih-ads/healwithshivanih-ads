slug: igg-reaction-delayed-2-hours-to-2-days
statement: IgG-mediated food sensitivity symptoms are delayed, occurring 2 hours to
  2 days after food exposure.
evidence_tier: plausible_emerging
rationale: The delayed nature of IgG immune complex reactions is biologically plausible
  and widely cited in FM, but the precise 2-hour to 2-day window is not uniformly
  established in RCTs. Expert consensus from FM practice.
coaching_translation: Help clients understand why they can't easily connect their
  symptoms to a specific food — the reaction may not show up until the next day or
  two days later. A food-symptom diary is essential.
caveats:
- Source is expert lecture; specific timing range is FM clinical observation, not
  meta-analytic data.
- Individual variation in timing is significant.
