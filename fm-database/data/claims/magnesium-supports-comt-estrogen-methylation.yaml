slug: magnesium-supports-comt-estrogen-methylation
statement: Magnesium glycinate supports the COMT enzyme for estrogen metabolite methylation
  and reduces PMS-related irritability, cramps, and anxiety.
evidence_tier: plausible_emerging
rationale: COMT is a magnesium-dependent methyltransferase; deficiency impairs catecholestrogen
  methylation. Magnesium's role in COMT function is mechanistically established. PMS
  reduction by magnesium has some RCT support though studies are heterogeneous.
coaching_translation: Getting enough magnesium (especially glycinate form) supports
  the liver enzymes that process estrogen and may ease period-related mood and cramping.
caveats:
- Source is expert synthesis
- Dose 200–400 mg at night; verify with clinician
