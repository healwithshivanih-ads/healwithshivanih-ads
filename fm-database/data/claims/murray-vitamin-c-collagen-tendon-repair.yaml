slug: murray-vitamin-c-collagen-tendon-repair
statement: Vitamin C deficiency causes defective formation and maintenance of tendon,
  ligament, and bursal tissue because vitamin C is an obligate cofactor for prolyl
  and lysyl hydroxylases — the enzymes that hydroxylate proline + lysine residues
  in collagen, enabling stable triple-helix formation. Therapeutic dose for sports
  injury and tendinopathy 500–1,000 mg one to three times daily, ideally with bioflavonoids
  for synergy.
evidence_tier: strong
rationale: Vitamin C as a collagen cofactor is well-established biochemistry. The
  clinical translation — supplementing during active injury accelerates repair — has
  decades of nutrient evidence behind it. Subclinical scurvy + low vitamin C status
  is more common in modern Western diets than usually recognised. Pairs with bioflavonoids
  (Murray's combined recommendation) for additive collagen-protective effect.
coaching_translation: Vitamin C is structural — it literally builds the collagen triple
  helix that makes up tendons, ligaments, and bursae. During active injury or chronic
  tendinopathy, take 500-1,000 mg one to three times daily with food. Add bioflavonoids
  (or eat the whole citrus including pith) for stronger effect. Bowel-tolerance method
  — increase until loose stools, then back off.
caveats:
- Split doses across the day (vitamin C plasma half-life ~30 minutes)
- Bowel tolerance dose-limits
- Mild oxalate effect — caution + history of calcium oxalate kidney stones
- Liposomal or buffered forms better tolerated at higher doses
