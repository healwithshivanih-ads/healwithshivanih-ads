slug: anovulatory-cycles-from-mid-30s
statement: By approximately age 35, women begin to have anovulatory cycles (or cycles
  where ovulation is less robust) on a regular basis. Because progesterone is produced
  by the corpus luteum after ovulation, an anovulatory cycle means a flat progesterone
  curve in the luteal phase — clinically this shows up as worsened late-luteal PMS,
  sleep disturbance in the week before menstruation, irritability, mood swings, cognitive
  fog, and cravings. Progesterone decline is more gradual ("precipitous decline")
  than estrogen's erratic fluctuation in perimenopause, but both produce symptoms
  before any standard lab will look abnormal. Coach uses this to validate the 35-40
  year old client whose GP says "labs are fine, you're too young for perimenopause."
evidence_tier: plausible_emerging
