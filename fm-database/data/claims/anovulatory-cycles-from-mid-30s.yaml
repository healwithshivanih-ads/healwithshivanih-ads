- id: snyder-energy-blueprint-podcast-2026
  location: Podcast — late reproductive stage segment
  quote: Around 35 years old we start to have anovulatory cycles. A cycle without
    ovulation or even ovulation isn't as robust as it used to be. So on the back end,
    that progesterone, that progestational hormone, she's just not as robust. We start
    to notice more PMS symptoms in the late luteal phase of our cycle. Women will
    begin to notice sleep issues in that part of their cycle. More irritability, more
    mood swings, cognitive changes, more cravings.
rationale: Empowers coach to validate the 35-42 year old client whose hormone labs
  look "normal" but whose lived experience has changed.
