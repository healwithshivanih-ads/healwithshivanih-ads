slug: aflatoxin-in-peanuts-corn-is-carcinogenic
statement: Aflatoxin, a mycotoxin produced by mold and most commonly found in peanuts
  and corn, has been shown to cause cancer.
evidence_tier: strong
rationale: Aflatoxin B1 is classified as a Group 1 carcinogen by IARC, with robust
  evidence for hepatocellular carcinoma risk. WHO fact sheets and extensive peer-reviewed
  literature support this claim.
coaching_translation: Peanuts and corn are the most common foods contaminated with
  aflatoxin, a mold toxin that is a known carcinogen. Choosing fresh, properly stored
  versions of these foods can help minimize your exposure.
