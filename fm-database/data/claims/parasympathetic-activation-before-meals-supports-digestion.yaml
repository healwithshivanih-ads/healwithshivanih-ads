slug: parasympathetic-activation-before-meals-supports-digestion
statement: Activating the parasympathetic nervous system before eating (e.g., 4–5
  deep breaths, mindful pause) primes digestive secretions and improves gut readiness
  for food.
evidence_tier: plausible_emerging
rationale: Single-expert source. Cephalic-phase digestive response and vagal activation
  before meals are physiologically documented; RCT evidence for specific breath-count
  protocols is thin.
coaching_translation: Taking a few slow, deep breaths before meals — or pausing to
  say grace, express gratitude, or just arrive at the table — tells your nervous system
  it's safe to digest.
caveats:
- Single-expert source; specific protocol (4–5 breaths) is practical guidance without
  direct RCT support.
- Source is expert_consensus/moderate quality.
