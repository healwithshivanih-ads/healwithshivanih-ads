slug: stress-reactivates-latent-viruses-drives-flares-myers-tas
statement: Stress-driven glucocorticoids can reactivate latent EBV and herpes viruses,
  and each reactivation re-provokes the immune system, contributing to autoimmune
  flares.
evidence_tier: plausible_emerging
rationale: Lowered immune surveillance during stress lets latent viruses replicate;
  the renewed immune response then damages self-tissue via mimicry or bystander effects.
coaching_translation: Stress can wake up dormant viruses, which is one way a stressful
  stretch can set off a flare.
