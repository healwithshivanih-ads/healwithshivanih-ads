slug: diaphragmatic-breathing-10-12-reps-daily
statement: A practical daily dose of 10-12 deliberate diaphragmatic breaths per day
  (inhale through the nose, exhale through the mouth, with hand on belly button rising
  on the inhale and falling on the exhale, hand on sternum remaining still) is sufficient
  to re-establish the diaphragm-pelvic floor mechanical link in most adults. Performed
  before sex / cough triggers / lifting, it reduces stress-incontinence episodes.
  Combined with sip-hydration (small frequent sips rather than rapid chugging, which
  triggers antidiuretic hormone suppression and excretion) and corrected standing
  posture (60 percent weight on heels, 40 percent on metatarsals), this constitutes
  the no-cost first-line intervention for pelvic floor dysfunction in both sexes.
