sources:
- id: efrati-perlmutter-empowering-neurologist-2024
  location: Podcast — opening framework
  quote: The first element is you need energy. The second element is you must have
    a trigger. The third element is stem cells — the building blocks. The last thing
    is access — blood vessels to access the tissue. These are the four elements, and
    the most available effective tool we have on human beings now is hyperbaric oxygen,
    but the most powerful trigger in our body for regeneration is hypoxia.
rationale: Useful conceptual model for FM coaches explaining repair limitations to
  clients.
