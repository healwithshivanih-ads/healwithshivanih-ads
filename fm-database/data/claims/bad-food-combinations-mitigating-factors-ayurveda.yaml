slug: bad-food-combinations-mitigating-factors-ayurveda
statement: >-
  Ayurveda holds that the impact of an incompatible food combination is not
  absolute — several factors lessen it. A strong digestive fire (agni) can handle
  combinations that would trouble a weaker one. Balancing spices and herbs can
  reconcile foods (cilantro cools spicy food; cardamom offsets coffee; ghee with
  black pepper eases potatoes). Adjusting quantity helps (two parts ghee to one
  part honey is fine, equal parts is not). Long habituation builds tolerance.
  Cooking the foods together lets their qualities "get along." And an occasional
  poor combination does not, by itself, cause harm.
evidence_tier: plausible_emerging
rationale: >-
  This is the flexibility clause of the food-combining framework: it locates the
  risk in chronically eating poorly matched foods with weak digestion rather than
  in any single meal, and it explains why spicing and cooking technique matter as
  much as the ingredient list. The emphasis on individual digestive capacity and
  cumulative pattern is consistent with a functional view of digestion.
coaching_translation: >-
  Don't be rigid about food combining. If your digestion is strong, the odd
  "wrong" combination won't hurt you. Use spices the way the cuisine already
  does — cilantro in spicy dishes, cardamom in coffee, ghee and pepper with
  potatoes — to smooth things over. Cooking ingredients together (as in a mixed
  vegetable soup) helps them agree. Worry about the combinations you eat every
  day, not the occasional treat.
out_of_scope_notes: ''
caveats:
  - >-
    Mitigation is a matter of degree, not a licence — clients with weak
    digestion, reflux or strong symptom reactions should still avoid their known
    trigger combinations.
