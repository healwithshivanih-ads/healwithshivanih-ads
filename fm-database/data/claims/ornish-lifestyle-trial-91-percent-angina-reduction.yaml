slug: ornish-lifestyle-trial-91-percent-angina-reduction
statement: The Ornish Lifestyle Heart Trial demonstrated a 91% reduction in angina
  (chest pain syndrome) and 8% improvement in diameter stenosis at 1 year, and 7.9%
  at 5 years, with intensive lifestyle intervention (vegetarian diet, exercise, smoking
  cessation, support groups).
evidence_tier: strong
rationale: The Ornish Lifestyle Heart Trial is a published landmark study (JAMA 1998).
  Results are directly cited by a clinician who conducted the trial.
coaching_translation: Intensive lifestyle change — eating mostly plants, exercising,
  quitting smoking, and stress management — produced dramatic reductions in chest
  pain and actual reversal of artery narrowing.
caveats:
- This was a high-intensity comprehensive lifestyle program — benefit may not generalize
  to less intensive interventions.
