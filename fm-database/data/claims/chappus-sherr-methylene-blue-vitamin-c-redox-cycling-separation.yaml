slug: chappus-sherr-methylene-blue-vitamin-c-redox-cycling-separation
statement: Methylene blue is a redox cycler — its oxidised form (blue) accepts electrons,
  its reduced form (leucomethylene blue, colourless) donates them. Co-dosing with
  antioxidants like vitamin C immediately reduces methylene blue to its colourless
  form before it reaches the mitochondria — potentially negating its electron-donor
  capacity. Sherr's clinical preference is to keep methylene blue and antioxidants
  separated by 2-3 hours. Bonus practical tip — buffered vitamin C is the best household
  stain-remover for methylene blue spills on surfaces and fabrics.
