slug: bilberry-vitamin-e-stops-cataract-progression
statement: In one human study, bilberry (Vaccinium myrtillus) extract standardized
  to 25% anthocyanidin content (160–240 mg per day) combined with vitamin E stopped
  progression of cataract formation in 48 of 50 patients (97%) with senile cortical
  cataracts. Grape seed and pine bark extracts (procyanidolic oligomers >95%) are
  reasonable alternatives.
evidence_tier: plausible_emerging
