slug: sklar-elevated-reverse-t3-blocks-conversion
statement: Sklar describes a clinical pattern where TSH and T4 look normal but reverse
  T3 is elevated, indicating that the body is producing thyroid hormone but shunting
  it toward the inactive reverse-T3 pathway instead of active T3 — a subclinical conversion
  problem that disrupts ovulation until addressed.
