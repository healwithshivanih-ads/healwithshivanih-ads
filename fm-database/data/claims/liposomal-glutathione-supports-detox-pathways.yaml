slug: liposomal-glutathione-supports-detox-pathways
statement: Liposomal glutathione supplementation can replenish intracellular glutathione
  levels to support phase-2 detoxification, antioxidant defense, and GST/GPX gene
  pathway function.
evidence_tier: plausible_emerging
rationale: Oral glutathione has historically poor bioavailability; liposomal forms
  show improved plasma and intracellular glutathione elevation in small trials. Depleted
  glutathione is common in high-toxin-burden individuals. The Week-2 sequencing (after
  establishing multivitamin cofactors) is clinically logical.
coaching_translation: Introduce liposomal glutathione in Week 2 after establishing
  your multivitamin. Start with just a few drops and increase slowly. Stop when you
  feel consistently well.
caveats:
- Small trial evidence for liposomal form; large RCTs lacking
- Cofactor requirement (multivitamin first) is prudent clinical practice, not RCT-proven
