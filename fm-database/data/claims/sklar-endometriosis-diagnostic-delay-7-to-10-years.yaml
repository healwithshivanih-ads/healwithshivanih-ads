slug: sklar-endometriosis-diagnostic-delay-7-to-10-years
statement: Endometriosis takes on average 7 to 10 years from symptom onset to definitive
  diagnosis because pain is the trigger that drives the workup, laparoscopy is required
  for histological confirmation, and asymptomatic or mild-symptom presentations are
  routinely dismissed — affecting an estimated 1 in 10 women of reproductive age with
  prevalence likely higher than reported.
