slug: scrotal-heat-and-lifestyle-harm-sperm
statement: Scrotal heat exposure (hot baths, saunas, laptops on lap, tight underwear,
  prolonged sitting) impairs spermatogenesis. Tobacco use, excessive alcohol, BPA/phthalate
  exposure, and obesity also reduce sperm quality. These factors are reversible —
  sperm produced 90 days after lifestyle change reflect the new conditions.
