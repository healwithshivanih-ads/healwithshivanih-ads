  location: Chapter 12 — Sperm Quality, pg 168-175
  quote: When lifestyle factors such as toxin exposure or vitamin deficiencies cause
    too much oxidation or compromise the antioxidant defense system, the result is
    oxidative damage, which is thought to be a contributing factor in up to 80 percent
    of all cases of male infertility.
rationale: Coachable lifestyle levers for male preconception protocol.
