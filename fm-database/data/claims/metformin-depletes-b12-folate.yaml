slug: metformin-depletes-b12-folate
statement: Metformin depletes vitamin B12 and folate; B12 status (serum + MMA) should
  be assessed in all patients on metformin and supplemented with methylcobalamin and
  L-methylfolate as needed.
evidence_tier: strong
rationale: The metformin-B12 depletion association is well-established in multiple
  RCTs and cohort studies; recognized in clinical guidelines (ADA). Neuropathy from
  B12 depletion in metformin users is documented.
coaching_translation: Clients on metformin should have their B12 status checked regularly.
out_of_scope_notes: Prescribing and lab monitoring is clinician territory.
caveats:
- Clinician should order MMA and serum B12, not just serum B12 alone for functional
  status.
