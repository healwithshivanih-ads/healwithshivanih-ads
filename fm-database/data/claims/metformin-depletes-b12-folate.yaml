slug: metformin-depletes-b12-folate
statement: Long-term metformin use depletes vitamin B12 and folate, accelerating fatigue and peripheral neuropathy — often
  years before deficiency is detectable on standard blood panels.
evidence_tier: plausible_emerging
rationale: Metformin impairs ileal B12 absorption via a calcium-dependent mechanism; multiple RCTs and observational studies
  confirm lower B12 with long-term use. Folate depletion is less consistently documented. Clinical neuropathy from metformin-B12
  deficiency is well-reported.
coaching_translation: People taking metformin for diabetes may gradually become depleted in vitamin B12, which can cause tiredness
  and nerve symptoms. Ask your doctor to check B12 levels regularly.
out_of_scope_notes: B12 supplementation form and dosing are clinician decisions. Do not advise stopping metformin.
caveats:
- Clinician should order MMA and serum B12, not just serum B12 alone for functional status.
- B12 depletion by metformin has strong observational support; RCT evidence for folate depletion is weaker.
- Subclinical deficiency preceding lab detection is plausible but hard to quantify clinically.
- Source is educational Instagram content.
