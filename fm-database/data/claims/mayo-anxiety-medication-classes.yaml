slug: mayo-anxiety-medication-classes
statement: First-line pharmacotherapy is typically an SSRI or SNRI; benzodiazepines
  are reserved for short-term acute use due to tolerance and dependence risk; buspirone
  is a non-sedating option for generalised anxiety; beta blockers may be used situationally
  for performance anxiety.
