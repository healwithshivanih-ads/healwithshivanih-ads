slug: flavonoids-inhibit-h-pylori-concentration-dependent
statement: Several dietary flavonoids inhibit H. pylori in a concentration-dependent
  manner and augment natural mucosal defence factors; flavone has an effect comparable
  to bismuth subcitrate.
evidence_tier: plausible_emerging
rationale: In vitro and early clinical evidence cited; catechin's inhibition of histidine
  decarboxylase and H. pylori is mechanistically described. Flavone comparison to
  bismuth subcitrate is from preclinical/early clinical data.
coaching_translation: Flavonoid-rich foods and supplements (like catechin or quercetin)
  may directly inhibit H. pylori and calm the inflammation driving your ulcer.
caveats:
- Most data is in vitro or early-phase; clinical translation requires further RCTs.
