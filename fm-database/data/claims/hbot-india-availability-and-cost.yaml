  location: General accessibility context — applied to India market by coach
  quote: The national average is probably around 175 dollars an hour — there is definitely
    places that are closer to like 500. There is a few places around the country that
    are closer to even 80 or 90. The national average is probably pretty close to
    around 175 a session especially if you are buying them in packages.
rationale: India-specific accessibility note for clients asking practical questions
