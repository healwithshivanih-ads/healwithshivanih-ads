slug: hbot-india-availability-and-cost
statement: Medical-grade hyperbaric chambers are available in India at Apollo Hyperbaric
  Centers (Chennai, Hyderabad, Delhi) and a small number of standalone clinics (Oxygenesis
  in Mumbai and Bangalore offer mild HBOT at ~1.3-1.5 ATA). Per-session costs are
  roughly INR 3,000-5,000 — substantially lower than the US average of USD 175 per
  session — but most Indian centres run wound-care or DCS protocols rather than the
  60-session Sagol-style longevity protocol. India-specific coach guidance — confirm
  pressure capability (2.0-2.4 ATA), session length, and air-brake inclusion before
  recommending any centre for neuro or longevity indications.
evidence_tier: plausible_emerging
