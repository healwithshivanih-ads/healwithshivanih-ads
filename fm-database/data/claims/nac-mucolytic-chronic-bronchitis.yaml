slug: nac-mucolytic-chronic-bronchitis
statement: Oral N-acetylcysteine (NAC) reduces risk of exacerbations and improves
  symptoms in patients with chronic bronchitis compared with placebo, by directly
  splitting sulfur linkages of mucoproteins to reduce viscosity and by increasing
  glutathione synthesis in the respiratory tract.
evidence_tier: strong
rationale: Multiple RCTs in chronic bronchitis and COPD support NAC's mucolytic and
  antioxidant benefits; the mechanism is well-characterized biochemically.
coaching_translation: NAC is a powerful supplement for chronic respiratory issues
  — it thins mucus and boosts your lungs' natural antioxidant defenses at the same
  time.
