slug: vitamin-a-zinc-exercise-improve-thyroid-cell-sensitivity
statement: Vitamin A, zinc, and exercise improve cellular sensitivity to thyroid hormones.
evidence_tier: plausible_emerging
rationale: Vitamin A (retinol) is known to support thyroid hormone receptor expression.
  Zinc supports receptor function. Exercise increases T3 uptake. Mechanism is biologically
  plausible though direct RCT evidence for combined cellular sensitivity is limited.
coaching_translation: Getting enough vitamin A and zinc, and staying active, can help
  your cells respond better to thyroid hormones even when hormone levels are normal.
caveats:
- Source is an educational toolkit; no specific study cited.
