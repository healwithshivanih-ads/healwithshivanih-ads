slug: epa-dha-replaces-aa-in-cell-membranes
statement: EPA and DHA supplementation progressively replaces arachidonic acid in
  immune cell membranes, shifting from pro-inflammatory to pro-resolving signaling.
evidence_tier: strong
rationale: Well-established membrane phospholipid remodeling mechanism. Arachidonic
  acid makes up 20–80% of membrane distribution depending on tissue type. EPA/DHA
  displacement begins in days but membrane saturation requires 4 weeks; RBC membrane
  incorporation requires 120 days of continuous supplementation.
coaching_translation: Taking omega-3s consistently for at least 4 months is what it
  takes to really shift your cells into an anti-inflammatory state — short-term use
  won't cut it.
caveats:
- Requires continued supplementation; benefits reverse on discontinuation.
- Immunosuppressed individuals should consult a clinician before lowering AA too aggressively.
