slug: abhyanga-warm-oil-massage-calms-nervous-system-stress-hormones
statement: Daily warm-oil self-massage (abhyanga) calms the nervous system by stimulating the skin's nerve
  endings, reducing hypervigilance of the autonomic nervous system and thereby lowering the stress-hormone
  output that drives hormonal imbalance.
evidence_tier: fm_specific_thin
rationale: Consistent with the known role of cutaneous mechanoreceptor stimulation in activating the parasympathetic
  nervous system; Welch frames this as reducing sympathetic tone → lower cortisol → better sex-hormone
  balance.
coaching_translation: A 15-minute warm oil self-massage each morning before your shower calms your stress
  response directly through the skin. Less nervous-system activation means less cortisol, which means
  your body has more raw material left to make the hormones that regulate your cycle, mood, and energy.
out_of_scope_notes: ''
caveats:
- Evidence base is largely traditional Ayurvedic / clinical observation; controlled trials on hormonal
  endpoints are limited.
- Contraindications exist (skip during illness, fever, heavy menstruation, or open skin).
