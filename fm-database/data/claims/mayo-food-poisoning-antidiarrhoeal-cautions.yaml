slug: mayo-food-poisoning-antidiarrhoeal-cautions
statement: OTC loperamide and bismuth subsalicylate are not recommended in clients
  with bloody diarrhoea or high fever because slowing transit traps pathogen and toxin
  and can worsen invasive infections; use only after these red flags are excluded.
