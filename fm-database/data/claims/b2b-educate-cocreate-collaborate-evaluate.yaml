slug: b2b-educate-cocreate-collaborate-evaluate
statement: 'The coaching role with labs breaks into four in-scope actions: educate
  (translate the biomarker pattern into actionable insights and daily habits), co-create
  (choose changes with the client, not for them), collaborate (loop in and refer to
  licensed providers), and evaluate (track whether the changes are working). Doing
  these keeps the coach helpful and in scope.'
evidence_tier: plausible_emerging
rationale: A simple, memorable scaffold that keeps every lab-related session inside
  the coaching lane.
coaching_translation: Structure lab sessions around the four verbs — educate on the
  pattern, co-create the plan, collaborate with their clinician, evaluate progress
  together.
out_of_scope_notes: Diagnosis, prescribing, ordering tests, and clinical interpretation
  are not part of these four actions.
