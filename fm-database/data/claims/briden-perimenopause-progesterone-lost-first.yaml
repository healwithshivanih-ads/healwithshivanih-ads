slug: briden-perimenopause-progesterone-lost-first
statement: 'Progesterone drops first in perimenopause — well before estrogen begins
  its eventual decline. Progesterone is hard to make: unlike estrogen (made on the
  way to ovulation), progesterone is only made after ovulation, and ovulation becomes
  less reliable from the late 30s onwards (shorter luteal phases, more anovulatory
  cycles). Symptoms of low progesterone include insomnia, heavy periods, and frequent
  migraines.'
evidence_tier: strong
rationale: Progesterone-first loss in perimenopause is established in reproductive
  endocrinology and is Prof Jerilynn Prior's central framing.
coaching_translation: Insomnia, heavy periods, and migraines that show up in the early
  40s — even with regular cycles — are classic signs of dropping progesterone. Adding
  body-identical progesterone in the luteal phase often resolves them.
