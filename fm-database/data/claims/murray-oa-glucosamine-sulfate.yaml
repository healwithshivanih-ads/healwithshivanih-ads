slug: murray-oa-glucosamine-sulfate
statement: Glucosamine sulfate at 1,500 mg per day (single or divided dose) slows
  progression of knee osteoarthritis, halts joint-space narrowing, and reduces total
  joint replacement incidence up to five years after treatment ends — effects not
  seen with the hydrochloride form. Obese patients may need 20 mg/kg/day and athletes
  up to 3,000 mg/day for cartilage protection. Onset of benefit is two to four weeks;
  superior tolerability vs ibuprofen (6 percent vs 35 percent side effects).
evidence_tier: strong
