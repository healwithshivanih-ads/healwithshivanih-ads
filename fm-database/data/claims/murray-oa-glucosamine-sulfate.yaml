sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 80 — Osteoarthritis, pg 1305-1309
  quote: The standard dosage for glucosamine is 1,500 mg per day. Obese individuals
    may need higher dosages, based on their body weight (e.g., 20 mg/kg per day).
    Athletes or individuals who subject their joints to greater wear and tear may
    need to increase the dosage to 3,000 mg. Glucosamine sulfate appears to be more
    effective than glucosamine hydrochloride. The results from the two longest placebo-controlled
    trials show quite convincingly that glucosamine slows down the progression of
    osteoarthritis and in many cases produces regression of the disease.
