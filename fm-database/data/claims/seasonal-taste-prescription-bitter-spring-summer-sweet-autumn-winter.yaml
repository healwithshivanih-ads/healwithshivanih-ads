slug: seasonal-taste-prescription-bitter-spring-summer-sweet-autumn-winter
statement: Bitter taste (leafy greens, cruciferous vegetables, dark berries) is featured prominently in
  spring and summer diets to cool the blood and support the liver's natural cleansing, while sweet, moist,
  and salty tastes are reserved for autumn and winter to build tissue and provide warmth.
evidence_tier: fm_specific_thin
rationale: 'In Ayurveda, the six tastes (rasas) each carry specific energetic actions: bitter reduces
  heat, dries excess moisture, and supports liver-bile function; sweet nourishes and moistens; sour and
  salty retain warmth and fluid. Seasonal prescription aligns tastes with the body''s seasonal requirements.'
coaching_translation: 'A practical seasonal eating rule: load up on bitter greens (arugula, kale, dandelion)
  in spring and summer when digestion is stronger and heat prevails; shift to sweet root vegetables, warming
  spices, and nourishing fats in autumn and winter when the body needs building.'
out_of_scope_notes: ''
caveats:
- Traditional Ayurvedic rasa (taste) theory; the functional roles attributed to tastes are theoretical
  within the Ayurvedic framework, though bitter vegetables do have phytonutrient and liver-supportive
  evidence.
