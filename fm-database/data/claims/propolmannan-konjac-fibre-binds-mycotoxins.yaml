slug: propolmannan-konjac-fibre-binds-mycotoxins
statement: Propol mannan (a konjac glucomannan fibre derivative) has been shown to
  bind multiple strains of mycotoxins in the gut, supporting their faecal excretion.
  Useful for clients in mould or water-damaged-building exposure histories, or with
  detected urinary mycotoxins. Functions alongside other binders (modified citrus
  pectin, charcoal, zeolites, chlorella, bentonite clay) in a broader binder rotation
  rather than as a standalone agent.
evidence_tier: plausible_emerging
