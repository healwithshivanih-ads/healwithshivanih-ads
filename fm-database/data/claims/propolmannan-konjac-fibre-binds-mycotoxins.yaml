  location: Podcast — Konjac fibre and mycotoxin binding
  quote: At high levels of fibre, the propol mannan konjac fibre binds to every strain
    of mycotoxins. So if you live in a climate or have had water damage or have a
    moldy basement or you live in a wet climate, you can actually remove the toxins
    just by getting fibre.
