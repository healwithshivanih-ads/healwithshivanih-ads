slug: bph-beta-sitosterol-improves-flow
statement: 'Beta-sitosterol improves BPH: urinary flow increases by an average 4.5
  mL/s, residual urinary volume decreases by 33.5 mL, and IPSS shows statistically
  significant improvement.'
evidence_tier: strong
rationale: Cited from RCT data summarized in Pizzorno textbook; beta-sitosterol from
  Serenoa repens, Pygeum, and dietary sources provides measurable urodynamic benefit.
coaching_translation: Plant sterols — found in pumpkin seeds, avocados, and saw palmetto
  — are a well-studied, natural way to measurably improve urine flow and reduce leftover
  urine in the bladder.
