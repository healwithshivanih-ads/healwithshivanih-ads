slug: molecular-mimicry-gluten-drives-hashimotos
statement: Molecular mimicry between gluten proteins and thyroid tissue is a plausible
  mechanism driving autoimmune thyroid disease (Hashimoto's).
evidence_tier: plausible_emerging
rationale: The molecular mimicry hypothesis has biochemical support via tissue transglutaminase
  cross-reactivity and gliadin-thyroid epitope similarity. The clinical implication
  — that gluten triggers or perpetuates Hashimoto's — is plausible but has less RCT
  support than the underlying mechanism suggests.
coaching_translation: There's biological overlap between gluten proteins and thyroid
  tissue — which may be why some people's thyroid antibodies drop when they stop eating
  gluten. The research is still working out who this applies to most.
caveats:
- Teach as mechanism only, not as a definitive causal claim.
- RCT-level clinical evidence is weaker than the mechanistic basis.
