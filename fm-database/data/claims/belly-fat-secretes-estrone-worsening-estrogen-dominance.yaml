slug: belly-fat-secretes-estrone-worsening-estrogen-dominance
statement: Adipose tissue, particularly abdominal and breast fat, secretes estrone
  via aromatization of androgens, creating a secondary source of estrogen dominance
  independent of ovarian production.
evidence_tier: strong
rationale: Peripheral aromatization of androgens to estrone in adipose tissue is well-established
  in endocrinology literature and is a recognized mechanism in PCOS, postmenopausal
  estrogen excess, and obesity-related cancer risk.
coaching_translation: Belly fat is not just cosmetic — it actively produces estrogen.
  This is why reducing excess body fat is a core part of addressing estrogen dominance.
