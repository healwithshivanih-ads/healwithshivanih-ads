slug: ginkgo-biloba-240mg-improves-cerebral-perfusion-stroke
statement: 'Ginkgo biloba extract standardized to 24% ginkgo flavonglycosides, dosed
  at 240–320 mg per day, increases cerebral blood flow, improves energy production
  within nerve cells, and lowers blood viscosity — all relevant mechanisms for post-stroke
  recovery. Caution: ginkgo has antiplatelet activity; doses above 240 mg per day
  combined with antiplatelet drugs (aspirin, warfarin, clopidogrel) increase bleeding
  risk, and natural antiplatelet stacking (e.g. nattokinase + ginkgo + high-dose garlic)
  with an antiplatelet drug has been associated with hemorrhagic stroke case reports.'
evidence_tier: plausible_emerging
