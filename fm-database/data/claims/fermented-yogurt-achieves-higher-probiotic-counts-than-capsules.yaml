slug: fermented-yogurt-achieves-higher-probiotic-counts-than-capsules
statement: Home fermentation of probiotic strains (36-hour protocol) achieves 120–300
  billion CFU per serving, significantly exceeding typical capsule doses of 1–10 billion
  CFU.
evidence_tier: plausible_emerging
rationale: Dr. Davis explains the exponential doubling of microbes over 36 hours of
  fermentation, yielding ~120 billion (crispatus) to ~300 billion (reuteri) CFU per
  half-cup serving. This is a logical consequence of microbial reproduction kinetics.
  The specific counts are from Dr. Davis's own formulation and are not from independent
  peer-reviewed studies.
coaching_translation: Making probiotic yogurt at home gives you many times more live
  bacteria per serving than any store-bought capsule—making it far more likely to
  actually work.
caveats:
- Counts are from Dr. Davis's own protocol, not independently validated.
- Source is expert_consensus interview.
- Actual counts will vary by fermentation conditions, temperature, and batch.
