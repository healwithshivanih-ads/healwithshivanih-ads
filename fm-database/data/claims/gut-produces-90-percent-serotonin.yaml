slug: gut-produces-90-percent-serotonin
statement: The gut produces approximately 90% of the body's serotonin, directly linking
  gut health to mental well-being.
evidence_tier: strong
rationale: Approximately 90–95% of serotonin is synthesized in enterochromaffin cells
  of the gut; this is well-established in neurogastroenterology.
coaching_translation: Your gut is literally your second brain — it makes 90% of your
  serotonin, the mood-regulating neurotransmitter. Supporting gut health supports
  mental health.
