slug: gut-produces-90-percent-serotonin
statement: The gut produces around 90% of the body's serotonin, the 'feel-good' neurotransmitter,
  linking gut health directly to mental well-being.
evidence_tier: strong
rationale: Enterochromaffin cells in the gut are the dominant site of serotonin production
  in the body. This is well-established in neurogastroenterology literature.
coaching_translation: Your gut is sometimes called your 'second brain' — it produces
  the vast majority of your body's serotonin, the mood-regulating neurotransmitter.
