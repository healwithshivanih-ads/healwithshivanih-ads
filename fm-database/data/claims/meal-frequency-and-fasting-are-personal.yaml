slug: meal-frequency-and-fasting-are-personal
statement: 'Meal frequency is individual: eat every three to five hours if you feel
  worse skipping meals, but periodic fasting or two-meals-a-day can benefit IBS and
  IBD by resting the gut, and skipping meals does not appreciably slow metabolism.'
evidence_tier: plausible_emerging
rationale: Cites meal-frequency/body-composition meta-analysis and fasting benefits
  in IBS/IBD.
coaching_translation: There's no single right meal schedule — some do best with regular
  meals, others with a rest from eating; both are fine.
