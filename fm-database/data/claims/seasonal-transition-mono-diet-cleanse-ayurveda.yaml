slug: seasonal-transition-mono-diet-cleanse-ayurveda
statement: Ayurveda recommends a light mono-diet or cleansing routine at the transition between seasons
  — especially spring and autumn — to help the body release accumulated qualities from the previous season
  and prepare for the next. Eating simply and reducing foods that fed the prior season's accumulation
  gives the digestive system a reset without aggressive fasting.
evidence_tier: fm_specific_thin
rationale: Seasonal dietary shifts affect the gut microbiome composition, immune activity, and metabolic
  rates. A lighter diet at seasonal transitions reduces the inflammatory burden carried from one season
  into the next.
coaching_translation: At the change of seasons — especially spring and autumn — eat simply for a few days.
  Reduce heavy, oily, or rich foods and focus on warm, easy-to-digest meals like kitchari, vegetable soups,
  and digestive teas. This is not a fast — it is a gentle reset that helps the body adjust to the changing
  environment.
out_of_scope_notes: ''
caveats:
- Seasonal cleansing is best done under guidance for clients with diabetes, eating disorders, or significant
  nutrient depletion.
- A kitchari mono-diet is the classic Ayurvedic seasonal cleanse vehicle.
