slug: anti-inflammatory-diet-reduces-crp
statement: Following an anti-inflammatory diet reduces levels of inflammatory markers
  such as C-reactive protein (CRP).
evidence_tier: strong
rationale: CRP reduction with anti-inflammatory dietary patterns (Mediterranean, whole-food
  plant-based) is well-supported by multiple RCTs and meta-analyses. The document
  explicitly cites CRP reduction as a benefit.
coaching_translation: Eating anti-inflammatory foods — like colorful vegetables, fatty
  fish, olive oil, and whole grains — can help lower the body's internal inflammation
  signals, including a marker called CRP that your doctor can measure.
