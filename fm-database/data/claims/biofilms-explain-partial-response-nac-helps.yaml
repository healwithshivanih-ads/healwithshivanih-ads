slug: biofilms-explain-partial-response-nac-helps
statement: Microbial biofilms can shield bacteria and fungi from antimicrobials and
  explain a partial treatment response; adding the antibiofilm agent N-acetylcysteine
  to an antibiotic raised H. pylori clearance from 20% to 65% in one trial.
evidence_tier: plausible_emerging
rationale: Cites the NAC + antibiotic H. pylori trial.
coaching_translation: If treatment only half-works, a protective biofilm may be shielding
  the bugs — clinicians sometimes add NAC to break it down.
