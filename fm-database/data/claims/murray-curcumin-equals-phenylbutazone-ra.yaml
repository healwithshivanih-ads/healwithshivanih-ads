slug: murray-curcumin-equals-phenylbutazone-ra
statement: In a head-to-head DB-RCT in rheumatoid arthritis, curcumin at 1,200 mg/day
  produced clinical improvements (morning stiffness duration, walking time, joint
  swelling) comparable to phenylbutazone 300 mg/day — but with no reported side effects,
  in contrast to phenylbutazone's significant toxicity. Curcumin has no direct analgesic
  effect; pain reduction follows from reduced inflammation. Advanced delivery forms
  (Meriva 500–1,000 mg twice daily, BCM-95 750–1,500 mg twice daily, Theracurmin 300
  mg one to three times daily) overcome the classical absorption limitation of plain
  curcumin powder.
evidence_tier: strong
rationale: Deodhar 1980 DB-RCT cited + decades of subsequent autoimmune + inflammatory
  disease literature. Mechanism — NF-κB inhibition, COX-2 + 5-LOX modulation, TNF-α
  + IL-6 suppression, STAT3 modulation. Bioavailability is the make-or-break — generic
  curcumin powder fails clinically because <1% is absorbed; standardised delivery
  systems (phytosomes, nanoparticles, piperine combinations) achieve plasma levels
  that the RCT evidence is built on.
coaching_translation: Curcumin matches the anti-inflammatory potency of old-school
  RA drugs (phenylbutazone, cortisone in animal models) without the toxicity — but
  ONLY in bioavailable forms. Generic turmeric powder doesn't reach blood levels that
  matter clinically. Use Meriva, BCM-95, or Theracurmin specifically. Pairs with bromelain
  and fish oil for a comprehensive natural anti-inflammatory stack in any autoimmune
  inflammatory condition.
caveats:
- Plain curcumin powder largely doesn't work clinically — must use bioavailable form
- Mild antiplatelet — caution + anticoagulants + 7 days before surgery
- Iron chelator — caution in iron deficiency
- Active gallbladder disease — avoid (cholagogue effect)
- Pregnancy — avoid therapeutic doses
