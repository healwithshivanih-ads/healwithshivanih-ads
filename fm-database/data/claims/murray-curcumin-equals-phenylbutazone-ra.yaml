  location: Chapter 89 — Rheumatoid Arthritis, pg 1484
  quote: In RA, one double-blind clinical trial compared curcumin (1,200 mg per day)
    with phenylbutazone (300 mg per day). The improvements in the duration of morning
    stiffness, walking time, and joint swelling were comparable in both groups. Furthermore,
    while phenylbutazone is associated with significant adverse effects, curcumin
    has not been shown to produce any side effects.
