slug: sleep-by-10pm-supports-cortisol-rhythm
statement: Getting adequate sleep and going to bed by 10:00 pm supports adrenal restoration
  and cortisol rhythm.
evidence_tier: fm_specific_thin
rationale: Aligning sleep onset with the natural nocturnal cortisol nadir (10pm–12am
  on the diurnal curve shown) is a plausible FM strategy. General sleep adequacy for
  HPA health is well-supported, but the specific 10pm recommendation is FM-specific
  and not well-studied in isolation.
coaching_translation: Your cortisol naturally drops to its lowest at night — aiming
  to be asleep by 10pm works with that natural rhythm and helps your adrenals recover
  overnight.
caveats:
- The specific 10pm target is FM convention, not derived from a controlled trial
- Individual chronotypes vary
