slug: mayo-shingles-postherpetic-neuralgia-management
statement: Postherpetic neuralgia — pain persisting more than 90 days after rash resolution
  — is managed with gabapentin or pregabalin, tricyclic antidepressants (nortriptyline,
  amitriptyline), topical lidocaine patches, and capsaicin cream; opioids are reserved
  for refractory cases.
