slug: infections-trigger-autoimmunity-three-mechanisms-myers-tas
statement: Infections can trigger autoimmunity through molecular mimicry, bystander
  activation, and cryptic-antigen (viral hijacking) exposure.
evidence_tier: plausible_emerging
rationale: All three routes lead the immune system to attack self-tissue while responding
  to a pathogen; viruses that burrow into cells are especially prone to bystander
  and cryptic-antigen effects.
coaching_translation: An infection can confuse the immune system into attacking the
  body's own tissue in a few different ways.
