slug: cortisol-impairs-memory-reverses-when-removed
statement: Even brief elevations of cortisol impair memory recall; when the cortisol exposure is removed,
  memory function can return to normal within a week — suggesting that reducing chronic stress may partially
  reverse cortisol-related cognitive impairment.
evidence_tier: strong
rationale: Welch cites a direct cortisol-injection study showing short-term memory impairment. Cortisol's
  effects on hippocampal function are well-documented in neuroscience. The reversibility after cortisol
  removal is a key clinical teaching point.
coaching_translation: Even a short burst of high cortisol can interfere with memory — but the good news
  is that when the stress response is reduced, memory can recover within days. This shows the brain is
  genuinely responsive to stress management practices.
out_of_scope_notes: ''
caveats:
- The cited study used injected cortisol (pharmacological doses), not naturalistic chronic stress; extrapolation
  to chronic low-grade stress is mechanistically plausible but not identical.
