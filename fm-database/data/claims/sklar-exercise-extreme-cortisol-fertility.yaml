slug: sklar-exercise-extreme-cortisol-fertility
statement: Both extremes — sedentary lifestyle and chronic high-intensity training
  — impair fertility. Sedentary lifestyles drive inflammation, insulin resistance
  and adipose-driven oestrogen excess. Chronic intense exercise raises cortisol, suppresses
  GnRH and can stop ovulation entirely (hypothalamic amenorrhea). The fertility-supportive
  zone for most women over 40 is gentle consistent daily movement plus 3-4 sessions
  per week of moderate exercise.
