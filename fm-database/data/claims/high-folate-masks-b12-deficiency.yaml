slug: high-folate-masks-b12-deficiency
statement: High folate intake can mask vitamin B12 deficiency by correcting megaloblastic
  anemia while allowing irreversible neurological damage to progress.
evidence_tier: strong
rationale: This is a well-established principle in clinical medicine; supported by
  multiple case reports and included in standard medical textbooks and guidelines.
coaching_translation: 'Remind coaches: always consider B12 status alongside folate
  — especially in vegans, elderly, or those on folate supplements.'
out_of_scope_notes: B12 and folate lab interpretation is clinician territory.
caveats:
- Particularly important in vegans, vegetarians, elderly, and those with pernicious
  anemia.
