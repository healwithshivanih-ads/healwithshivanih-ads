slug: acute-vs-chronic-stress-biphasic-immunity-myers-tas
statement: Acute stress briefly boosts immunity then resolves, but unrelenting chronic
  stress suppresses immunity far below baseline while fluctuating or escalating chronic
  stress can over-activate it — the pattern most linked to triggering autoimmunity.
evidence_tier: plausible_emerging
rationale: The stress-immune system evolved for short or steady challenges, not repeated
  on-off cycles; erratic chronic stress dysregulates the coordinated immune switches.
coaching_translation: Short bursts of stress are fine; it's the never-ending, up-and-down
  stress that most unsettles the immune system.
