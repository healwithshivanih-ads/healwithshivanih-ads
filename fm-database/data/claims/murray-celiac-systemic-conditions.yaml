slug: murray-celiac-systemic-conditions
statement: Celiac disease and gluten sensitivity are linked to 55 distinct conditions
  including IBS, IBD, anemia, migraine, epilepsy, osteoporosis, RA, lupus, multiple
  sclerosis, Hashimoto's thyroiditis, type 1 diabetes, schizophrenia, dermatitis herpetiformis,
  and increased risk of non-Hodgkin lymphoma. A 30,000-patient cohort showed 39 percent
  increased mortality for full celiac, 72 percent for gluten-related intestinal inflammation,
  and 35 percent for gluten sensitivity with negative biopsy. Anti-tissue transglutaminase,
  anti-endomysial, and anti-gliadin antibodies are blood tests that have largely replaced
  biopsy as first-line screen.
evidence_tier: strong
