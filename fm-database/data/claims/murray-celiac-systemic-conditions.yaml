sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 34 — Celiac Disease, pg 637-638
  quote: A landmark study that looked at almost 30,000 patients from 1969 to 2008
    found a higher than normal risk of early death associated with sensitivity to
    gluten. Those with full-blown celiac disease had a 39 percent increased risk of
    early death compared with controls; those with inflammation of the intestine but
    not full-blown celiac disease had a 72 percent increased risk; and those with
    gluten sensitivity (elevated gluten antibodies) but negative intestinal biopsy
    had a 35 percent increased risk. A review article listed 55 health conditions
    linked to celiac disease and gluten sensitivity. Thyroid abnormalities, insulin-dependent
    diabetes, psychiatric disturbances have also been linked to gluten intolerance.
