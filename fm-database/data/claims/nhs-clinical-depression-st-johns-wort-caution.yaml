slug: nhs-clinical-depression-st-johns-wort-caution
statement: St John's wort has some evidence for mild depression but is not recommended
  by NHS doctors because active-ingredient content varies between brands and it dangerously
  interacts with the contraceptive pill, anticoagulants, anticonvulsants and other
  antidepressants.
evidence_tier: strong
