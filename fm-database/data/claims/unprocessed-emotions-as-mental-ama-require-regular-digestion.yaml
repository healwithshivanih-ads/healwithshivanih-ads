slug: unprocessed-emotions-as-mental-ama-require-regular-digestion
statement: Unprocessed emotions accumulate as 'mental ama' — an Ayurvedic concept of toxic residue — in
  the same way undigested food creates physical toxicity; regularly processing difficult emotions is therefore
  as essential to health as dietary choices.
evidence_tier: fm_specific_thin
rationale: While the ama concept is Ayurvedic, the modern psychoneuroimmunology literature supports bidirectional
  links between chronic emotional suppression and elevated inflammatory/stress markers; emotional processing
  maps onto established psychological constructs of emotional regulation.
coaching_translation: Avoiding feelings doesn't make them disappear — it stores them in the body. Journaling,
  therapy, honest conversations, or even crying when you need to are not luxuries; they are part of your
  health protocol.
out_of_scope_notes: ''
caveats:
- '''Mental ama'' is an Ayurvedic teaching model; the direct biomarker evidence linking emotional suppression
  specifically to hormonal imbalance is suggestive but not conclusive.'
