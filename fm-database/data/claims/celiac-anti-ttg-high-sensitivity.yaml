slug: celiac-anti-ttg-high-sensitivity
statement: IgA anti-tissue transglutaminase (anti-tTG) antibody has sensitivity of
  99% and specificity >90% for identifying celiac disease, making it the preferred
  first-line screening marker.
evidence_tier: strong
rationale: Multiple clinical studies confirm IgA anti-tTG performance; total serum
  IgA must be checked concurrently to avoid false-negatives in IgA-deficient patients.
coaching_translation: A positive anti-tTG blood test is a strong signal for celiac
  disease — your doctor needs to confirm with further testing, but this is why strict
  gluten-free eating matters.
caveats:
- IgA-deficient celiac patients may have false-negative results; total serum IgA must
  be checked in parallel
