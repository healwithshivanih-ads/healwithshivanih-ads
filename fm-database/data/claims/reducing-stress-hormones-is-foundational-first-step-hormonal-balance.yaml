slug: reducing-stress-hormones-is-foundational-first-step-hormonal-balance
statement: Minimising stress-hormone release is the first crucial element in restoring hormonal balance
  — more foundational than herbs, bioidentical hormones, or other second- and third-tier interventions.
evidence_tier: plausible_emerging
rationale: 'Consistent with Welch''s explicit three-tier treatment hierarchy: Tier 1 = diet/lifestyle/stress
  reduction; Tier 2 = herbs; Tier 3 = bioidentical hormones. The mechanistic basis is the shared steroidogenic
  precursor pathway (cortisol competes with sex-hormone synthesis).'
coaching_translation: Before turning to supplements or hormones to fix a hormonal imbalance, the single
  most important thing you can do is reduce the amount of cortisol your body is making every day. That
  one change creates more raw material for the hormones your body actually wants to make.
out_of_scope_notes: ''
caveats:
- '''Pregnenolone steal'' is a useful teaching model but is considered an oversimplification by some endocrinologists.'
