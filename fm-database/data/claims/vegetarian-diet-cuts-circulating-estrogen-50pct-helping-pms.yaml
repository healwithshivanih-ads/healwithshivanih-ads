slug: vegetarian-diet-cuts-circulating-estrogen-50pct-helping-pms
statement: Vegetarian women excrete 2-3× more estrogen in faeces and have 50% lower
  blood free estrogen levels than omnivores — explaining lower rates of PMS, breast
  cancer, heart disease, and menopausal symptoms in vegetarians. Decreasing saturated
  fat reduces circulating estrogen 36%.
evidence_tier: strong
rationale: Goldin et al 1981 and follow-up studies confirm the vegetarian-low-estrogen
  pattern. Mechanism via enterohepatic estrogen circulation — high fibre favours flora
  with lower beta-glucuronidase activity, reducing reabsorption.
coaching_translation: A mostly-plant diet measurably lowers your circulating estrogen
  levels — 50% lower in vegetarians than meat-eaters. That single shift explains a
  lot of why PMS, breast tenderness, and fibroids respond to going plant-heavy.
caveats:
- Mostly-vegetarian (with fish/poultry occasionally) captures most of the benefit
  without total restriction.
- Total animal protein ≤110-170 mg/day per Pizzorno's recommendation.
- Combine with fibre, cruciferous vegetables, and I3C/DIM for compounded estrogen-clearance
  benefit.
