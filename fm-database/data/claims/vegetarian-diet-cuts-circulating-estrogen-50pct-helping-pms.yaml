    have 50% lower blood levels of free estrogen; and have a lower incidence of breast
    cancer, heart disease, and menopausal symptoms compared with omnivores because
    of their lower fat and higher fiber intake. Decreasing fat intake, especially
    saturated fat, reduces circulating estrogen by 36%.
