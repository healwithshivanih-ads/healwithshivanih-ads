slug: indian-vegetarian-fertility-protein-strategy
statement: 'Indian vegetarian fertility diets require deliberate protein patterning
  to meet preconception needs: pair pulses/dals with grains for complete amino-acid
  profile (rajma + rice, dal + roti), include paneer and curd for casein and lactalbumin,
  include eggs if not strict-veg, supplement B12 mandatorily, ensure adequate iron
  (which supports oocyte maturation), and add high-quality plant fats (cold-pressed
  mustard, sesame, or olive oil) to support steroid hormone synthesis.'
