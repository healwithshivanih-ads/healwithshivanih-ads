slug: male-antioxidants-quadruple-pregnancy-rate
statement: Daily male antioxidant supplementation (vitamin C, vitamin E, zinc, selenium,
  folate, CoQ10) over a 75-day spermatogenesis cycle has been shown across 34+ trials
  to improve sperm count, motility, morphology, and DNA integrity, with roughly 4x
  higher pregnancy rate and 5x higher live birth rate vs no supplementation. Effect
  particularly large when baseline DNA fragmentation is elevated.
evidence_tier: strong
