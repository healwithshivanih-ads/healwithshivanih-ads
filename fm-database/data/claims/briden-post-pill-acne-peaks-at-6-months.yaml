  location: Chapter 2 — Post-Pill Acne, pp 35-36
  quote: Post-pill acne is the result of a double-whammy of rebound sebum as you withdraw
    from a sebum-suppressing drug, and rebound androgens as your ovaries become active
    again. Post-pill acne typically peaks after about six months — just when you might
    be ready to give up. If you are prone to acne, please start natural treatment
    at least one month before you stop the pill.
