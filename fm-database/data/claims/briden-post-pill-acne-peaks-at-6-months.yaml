slug: briden-post-pill-acne-peaks-at-6-months
statement: Post-pill acne typically peaks approximately six months after stopping
  the combined pill (or any sebum-suppressing formulation containing drospirenone,
  norgestimate, ethinylestradiol, or cyproterone). The mechanism is a double rebound
  — skin upregulates sebum production after the suppressing drug is removed, and the
  ovaries temporarily over-produce androgens as the HPO axis reactivates. Initiating
  supportive treatment (zinc, dietary changes, anti-androgen herbs) at least one month
  before stopping the pill substantially reduces severity.
evidence_tier: plausible_emerging
rationale: Clinically well described in naturopathic and dermatological practice.
  The rebound sebum mechanism is consistent with the known pharmacology of cyproterone
  "suppressing sebum to childhood levels" and the predictable recovery to adult-level
  sebum production. Specific 6-month peak is from Briden's clinical observation; broader
  literature confirms a 3-9 month window for post-pill skin disturbance.
coaching_translation: If you stop the pill, expect your skin to break out worse than
  ever around the 4 to 6 month mark — and then improve. We can soften this rebound
  by starting zinc, sorting out dairy and sugar, and supporting your ovaries with
  the right botanicals at least a month before you stop. Six months is when most women
  want to give up; please do not.
caveats:
- Not all post-pill acne is rebound — some women have underlying PCOS or inflammatory
  acne that the pill was simply masking.
- Severity varies enormously between individuals and between pill brands.
- Plan ahead — starting treatment after the breakout has already started is much harder.
