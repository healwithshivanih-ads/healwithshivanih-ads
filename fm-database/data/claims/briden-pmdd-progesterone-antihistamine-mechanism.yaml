slug: briden-pmdd-progesterone-antihistamine-mechanism
statement: Natural body-identical progesterone helps PMS/PMDD partly through an antihistamine
  mechanism — it stabilises mast cells and upregulates DAO (the histamine-clearing
  enzyme). For PMDD specifically, higher-dose oral progesterone capsules at bedtime
  may be needed to overcome paradoxical GABA-receptor sensitivity (the ALLO biphasic
  'Goldilocks' effect).
evidence_tier: fm_specific_thin
rationale: The progesterone-DAO upregulation is documented in animal studies. The
  biphasic ALLO-GABA effect is documented in neurosteroid pharmacology. Clinical use
  of higher-dose progesterone for PMDD has limited RCT evidence and is FM/ND practice.
coaching_translation: Real (body-identical) progesterone may calm PMDD symptoms —
  not despite the histamine mechanism, but partly because of it. A higher-dose oral
  capsule at bedtime is the format with the best brain effect; clinician sets the
  dose.
