  location: Chapter 4 - Stress Hormones
  quote: The more oxytocin a woman has, the more this [tend and befriend] response will kick in. In addition,
    the more she 'tends and befriends' others, the more her oxytocin levels increase. Thus, oxytocin serves
    to counter the effects of stress.
