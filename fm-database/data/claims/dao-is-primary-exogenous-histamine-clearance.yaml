slug: dao-is-primary-exogenous-histamine-clearance
statement: Diamine oxidase (DAO) is the principal enzyme clearing dietary
  (exogenous) histamine, expressed mainly in small-intestine epithelium, placenta,
  kidney, and liver. This is distinct from histamine-N-methyltransferase (HNMT),
  which clears histamine intracellularly within tissues rather than in the gut
  lumen.
evidence_tier: strong
rationale: Establishes why gut-focused interventions (avoiding histamine-releasing
  foods, gut-barrier support) target DAO specifically, while systemic
  antihistamines act on a different clearance route.
coaching_translation: The gut is where most food-driven histamine reactions get
  handled — which is why gut-support strategies (not just antihistamines) matter
  for a histamine-intolerance picture.
