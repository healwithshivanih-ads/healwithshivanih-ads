slug: glutathione-master-detoxifier-acetylated-absorption-myers-tas
statement: Glutathione is the body's master detoxifier, binding free radicals and
  mercury; ordinary oral and liposomal forms are poorly absorbed, so acetylated/well-formulated
  forms plus cruciferous vegetables, garlic, and onion are used to support levels.
evidence_tier: plausible_emerging
rationale: Glutathione is concentrated in the liver and central to conjugation; absorption
  of supplemental forms varies, and food precursors support endogenous production.
coaching_translation: Glutathione is the body's main detox molecule — boost it with
  cruciferous veg, garlic and onions, and a well-absorbed supplement form.
