slug: magnesium-supports-gut-motility-constipation
statement: Magnesium supports smooth muscle function and gut motility, making it effective
  for constipation and improving transit time.
evidence_tier: plausible_emerging
rationale: Magnesium's osmotic and smooth-muscle-relaxing effects on bowel function
  are well-supported. Magnesium citrate/oxide for constipation has clinical evidence.
coaching_translation: Magnesium is a gentle, natural way to support regular bowel
  movements — it helps the gut muscles relax and move things along.
caveats:
- 'Form matters: magnesium citrate/oxide for bowel motility; magnesium glycinate for
  sleep/relaxation. High doses can cause loose stools.'
