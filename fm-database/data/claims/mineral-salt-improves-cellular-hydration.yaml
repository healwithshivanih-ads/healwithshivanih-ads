- id: barbara-oneil-healing-mind
  location: Hydration Section
  quote: When you take a crystal of Celtic salt or Baja salt, any hand harvested salt,
    and put it on your tongue, crunch it, and what happens when you crunch the crystals,
    some mineral gases are released that are locked up in the crystals. Three magnesiums
    are in there, and you drink that salt. That magnesium is a water hungry molecule
    and what that magnesium will do, it will pull the water inside the cell.
