slug: mineral-salt-improves-cellular-hydration
statement: Hand-harvested mineral salts (e.g. Celtic salt) containing free magnesium
  help draw water inside cells, improving intracellular hydration and supporting brain
  function more effectively than refined table salt.
evidence_tier: fm_specific_thin
rationale: Magnesium's role in cellular water regulation is biologically plausible;
  magnesium is an osmotically active mineral. However, the specific claim that crunching
  Celtic salt crystals releases 'mineral gases' that then hydrate cells better than
  other forms is not well-evidenced in peer-reviewed literature.
coaching_translation: Swapping refined table salt for a whole, mineral-rich salt is
  a simple dietary upgrade. The extra trace minerals — especially magnesium — may
  help your cells actually hold onto the water you drink.
caveats:
- Specific mechanism of 'mineral gases released on crunching' is not peer-reviewed
- Source is expert lecture
- Sodium intake should be moderated for clients with hypertension or kidney conditions
