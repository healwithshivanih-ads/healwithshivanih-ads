slug: methylfolate-supports-methylation-cycle
statement: Increasing dietary and supplemental methylfolate intake can partially compensate
  for reduced MTHFR enzyme activity, supporting the methylation cycle and potentially
  improving mood, energy, and cognitive function.
evidence_tier: plausible_emerging
rationale: 'Biologically plausible: providing the enzyme''s product (methylfolate)
  bypasses the rate-limiting MTHFR step. Some clinical trials support methylfolate
  in depression adjunctive therapy. However, the dramatic anecdotal responses described
  in the book are not representative of controlled trial outcomes. Source is a consumer
  trade book.'
coaching_translation: Eating more leafy greens (spinach, romaine, bok choy) and, if
  recommended by your clinician, taking a methylfolate supplement can help fill the
  gap your MTHFR variant creates.
caveats:
- Start low with supplemental methylfolate — some people react strongly even to small
  doses
- Verify supplementation approach with clinician
- Avoid folic acid (synthetic form) as it may block folate receptors
