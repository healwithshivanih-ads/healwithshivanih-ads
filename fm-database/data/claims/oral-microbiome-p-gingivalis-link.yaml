slug: oral-microbiome-p-gingivalis-link
statement: Chronic infections drive cognitive decline through neuroinflammation, with
  three repeatedly implicated organisms — Porphyromonas gingivalis (oral cavity, found
  in Alzheimer brain tissue), herpes simplex virus type 1, and human herpesvirus 6A.
  Bredesen reports that treating clients carrying HSV reactivation with low-dose valacyclovir
  produces "dramatic reductions in risk for decline," giving the coach a concrete
  referral cue when oral health is poor or cold sore history is significant.
