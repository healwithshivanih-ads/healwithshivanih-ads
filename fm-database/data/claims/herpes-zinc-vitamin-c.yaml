sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 62 — Herpes, pg 1043-1044, 1049
  quote: Oral supplementation with zinc (50 mg per day) has been shown to be effective.
    Topical application of a 0.01 to 0.025% zinc sulfate solution has also been shown
    to be effective. Those treated with bioflavonoids and vitamin C three times per
    day saw remission of symptoms in 4.2 days; those on the placebo did not heal until
    after 10 days.
