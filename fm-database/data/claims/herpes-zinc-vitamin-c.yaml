slug: herpes-zinc-vitamin-c
statement: Oral zinc 50 mg/day reduces HSV recurrence frequency, duration, and severity
  (primarily via enhanced cell-mediated immunity). Topical zinc sulfate 0.025% solution
  applied three times daily reduces symptoms and inhibits recurrences. Vitamin C plus
  bioflavonoids (200 mg each, three to five times daily for 3 days at symptom onset)
  shortens healing — in one trial, lesions healed in 4.2 days vs 10 days on placebo.
evidence_tier: plausible_emerging
