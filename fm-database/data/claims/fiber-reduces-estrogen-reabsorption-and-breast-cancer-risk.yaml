slug: fiber-reduces-estrogen-reabsorption-and-breast-cancer-risk
statement: Higher dietary fiber intake binds estrogen metabolites in the gut, reduces
  enterohepatic recirculation, and is associated with decreased risk of breast cancer.
evidence_tier: strong
rationale: Multiple peer-reviewed studies cited in the document (e.g., Sangaramoorthy
  et al., Cancer Med. 2018) support the association between dietary fiber and reduced
  hormone receptor-negative breast cancer risk.
coaching_translation: Eating at least 25 grams of fiber a day helps your body eliminate
  used estrogens and may lower breast cancer risk by preventing them from being reabsorbed.
caveats:
- Association data; causality in humans requires clinical context
- Adequate hydration needed alongside fiber
