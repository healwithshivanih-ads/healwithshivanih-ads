slug: magnesium-lowers-bp-dose-dependent
statement: Magnesium lowers blood pressure in a dose-dependent manner — a drop of
  4.3 mm Hg systolic and 2.3 mm Hg diastolic occurs for each 10 mmol/day increase
  in dose — by activating the Na⁺-K⁺ membrane pump.
evidence_tier: plausible_emerging
rationale: Mechanism is well established; multiple trials support a dose-dependent
  effect, though trial heterogeneity and modest effect sizes place this below 'strong'.
coaching_translation: Magnesium helps relax blood vessels and lower blood pressure
  — the more you get (up to a point), the greater the benefit.
