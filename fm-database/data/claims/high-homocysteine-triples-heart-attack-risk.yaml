slug: high-homocysteine-triples-heart-attack-risk
statement: Men with extremely high homocysteine levels are three times more likely
  to have a heart attack than those with normal levels.
evidence_tier: strong
rationale: Elevated homocysteine as a cardiovascular risk factor is well-supported
  in epidemiological research; it also reflects folic acid/B-vitamin deficiency.
coaching_translation: B-vitamin status (especially folate and B12) influences homocysteine
  levels and heart health.
out_of_scope_notes: Homocysteine lab interpretation is clinician scope.
