sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 67 — Hypoglycemia, pg 1113-1115
  quote: Many times people with glucose levels below 50 mg/dl have no symptoms, while
    people with symptoms of hypoglycemia can have normal or even elevated glucose
    levels. Symptoms appear to correlate better with rapid drops in blood glucose
    than with drops below 50 mg/dl. Dr. Lyon has found that symptoms of hypoglycemia
    occur when blood sugar drops rapidly, even when blood sugar was above the normal
    range. Increased glycemic volatility is at the heart of most weight problems.
