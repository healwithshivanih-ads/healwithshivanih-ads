slug: murray-hypoglycemia-glycemic-volatility
statement: Reactive hypoglycemia symptoms (irritability, shakiness, afternoon fatigue,
  sweet cravings, palpitations, brain fog, mood swings) correlate more reliably with
  rapid drops in blood glucose ("glycemic volatility") than with absolute glucose
  levels below 50 mg/dL — many symptomatic patients have normal or elevated readings.
  Continuous glucose monitoring data show that rapid swings are the proximate driver
  of symptoms and of insulin resistance, and are made worse by high-glycemic-impact
  foods. A 14-item symptom questionnaire (score >=6) is a practical screen.
evidence_tier: plausible_emerging
