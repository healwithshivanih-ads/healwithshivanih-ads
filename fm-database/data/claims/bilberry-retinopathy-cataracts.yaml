slug: bilberry-retinopathy-cataracts
statement: Bilberry extract (25% anthocyanidins, 160–320 mg/day) is the preferred
  flavonoid for diabetic retinopathy and cataracts due to its affinity for ocular
  blood vessels and ability to lower intracellular sorbitol.
evidence_tier: plausible_emerging
rationale: Anthocyanidins inhibit aldose reductase and improve microcirculation in
  multiple small trials; Pizzorno designates bilberry as 'best choice in diabetic
  retinopathy or cataracts'.
coaching_translation: Bilberry is specifically targeted to protecting the eyes in
  diabetes — it works on the same sorbitol pathway that causes retinal damage.
