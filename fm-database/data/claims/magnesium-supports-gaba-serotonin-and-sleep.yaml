slug: magnesium-supports-gaba-serotonin-and-sleep
statement: Magnesium supports GABA and serotonin pathways to improve sleep and reduce
  anxiety.
evidence_tier: plausible_emerging
rationale: Magnesium modulation of GABA receptors and its relationship to sleep and
  anxiety is supported by mechanistic research and some RCTs.
coaching_translation: Magnesium glycinate or threonate before bed may support sleep
  quality and calm for anxious clients — discuss with clinician for therapeutic use.
caveats:
- Source is a practitioner cheatsheet without primary citations.
- RCT evidence for magnesium and sleep is limited and of variable quality.
- Source is practitioner cheatsheet.
- Glycinate and threonate form preferences are FM-specific.
