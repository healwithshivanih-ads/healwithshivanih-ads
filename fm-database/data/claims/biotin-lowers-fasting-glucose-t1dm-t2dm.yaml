slug: biotin-lowers-fasting-glucose-t1dm-t2dm
statement: Biotin 16 mg/day significantly lowers fasting glucose and improves glycaemic
  control in T1DM; similar effects occur at 9 mg/day in T2DM, by increasing glucokinase
  activity in the liver.
evidence_tier: plausible_emerging
rationale: Small clinical trials (Coggeshall 1985; Maebashi 1993) support pharmacological
  biotin doses for glycaemic improvement. Mechanism via glucokinase upregulation is
  well-characterised.
coaching_translation: High-dose biotin acts as an insulin sensitiser by activating
  the liver's first glucose-processing enzyme — useful when glycaemic control is inadequate.
caveats:
- Pharmacological doses used; adjust insulin when adding biotin.
- Combination with chromium picolinate may enhance effect.
