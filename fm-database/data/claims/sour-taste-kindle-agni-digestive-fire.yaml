slug: sour-taste-kindle-agni-digestive-fire
statement: Sour taste (citrus, fermented foods, tamarind, vitamin C-rich foods) stimulates the digestive
  fire by triggering salivation and gastric acid production. A small sour element before or at the start
  of a meal — a condiment, a squeeze of lemon, or a pickle — functions as an aperitif that kindles agni.
evidence_tier: plausible_emerging
rationale: Sour taste triggers cephalic-phase acid secretion and salivation. Acidic condiments also lower
  the overall glycaemic index of a meal.
coaching_translation: A small amount of sour at the start of a meal wakes up your digestion. Try a teaspoon
  of lemon juice in warm water before eating, or add a squeeze of lime or a small portion of pickled vegetable
  to your meal as a condiment.
out_of_scope_notes: ''
caveats:
- Excess sour taste aggravates acid reflux and pitta-type inflammation — use sparingly in those with GERD
  or acidity.
