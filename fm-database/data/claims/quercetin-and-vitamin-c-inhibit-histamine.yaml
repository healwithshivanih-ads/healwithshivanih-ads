slug: quercetin-and-vitamin-c-inhibit-histamine
statement: Quercetin (200 to 400 mg twenty minutes before each meal; or EMIQ 50 to
  100 mg before each meal) inhibits both the manufacture and the release of histamine
  from mast cells and basophils. Vitamin C at 2,000 mg/day or more prevents histamine
  secretion by white blood cells and increases its detoxification — useful in any
  allergy-driven skin reaction.
