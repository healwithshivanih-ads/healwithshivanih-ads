slug: sleep-deprivation-impairs-hippocampal-memory-consolidation
statement: Sleep deprivation impairs hippocampal memory consolidation — the transfer
  of working memory into long-term storage that occurs primarily during sleep. Initial
  symptoms appear as forgetfulness; sustained sleep loss progressively degrades the
  ability to encode new memories, affecting language learning, skill acquisition,
  and academic/work performance.
evidence_tier: strong
rationale: Established by decades of polysomnography + behavioural research. Walker
  and colleagues at UC Berkeley have shown specifically that REM and slow-wave sleep
  are required for declarative and procedural memory consolidation respectively.
coaching_translation: One of sleep's main jobs is to move what you learned during
  the day into long-term memory. Skimp on sleep and at first you feel forgetful. Keep
  skimping and your brain actually loses the ability to store new memories well —
  which hits your learning and work.
caveats:
- Effect is dose-dependent; partial sleep loss produces partial impairment.
- Older adults experience compounded effects due to reduced slow-wave sleep with age.
