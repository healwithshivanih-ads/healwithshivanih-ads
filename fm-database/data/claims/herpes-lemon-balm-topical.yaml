slug: herpes-lemon-balm-topical
statement: Concentrated lemon balm (Melissa officinalis 70:1) cream applied thickly
  (1-2 mm) to lips 2-4 times daily during active recurrence — interrupts infection
  and accelerates healing. In German hospital trials, first-outbreak patients using
  lemon balm cream had no recurrences and healed in ~5 days vs 10 days controls. Recurrent
  cold sore patients on regular use achieved cold-sore-free periods averaging more
  than 3.5 months. Extremely safe for long-term use.
evidence_tier: strong
linked_to_topics:
- herpes-simplex
sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 62 — Herpes, pg 1047-1048
  quote: When lemon balm cream was used in patients with an initial herpes infection,
    there was not a single recurrence. The control group receiving other topical creams
    had a healing period of 10 days, while the group receiving the cream healed completely
    within 5 days. Subjects would either stop having recurrences or experience a tremendous
    reduction in the frequency of recurrences (an average cold-sore-free period of
    more than 3.5 months).
