slug: emotional-stress-cascade-chronic-disease
statement: Chronic emotional states (stress, anger, grief, fear, emotional suppression)
  alter HPA axis function, immune response, neurotransmitters, gut integrity, and
  mitochondrial function, creating the biochemical foundation for chronic disease.
evidence_tier: plausible_emerging
rationale: The neuro-endocrine-immune connection is a recognized framework in psychoneuroimmunology.
  This document synthesizes this without citing specific studies.
coaching_translation: How you feel emotionally has a direct chemical impact on your
  body — addressing emotional patterns is part of physical healing.
caveats:
