  location: pp. 107-108
  quote: In order to fall asleep, our core body temperature must cool down by almost
    1°F. But when we eat, our core body temperature actually goes up... we should
    have our last meal at least 2 to 4 hours before going to bed to ensure that the
    body is able to cool down.
