slug: murray-astragalus-broad-spectrum-immune
statement: 'Astragalus membranaceus (huangqi in TCM) exerts broad-spectrum effects
  on immune function — increasing macrophage and NK cell activity, T-cell proliferation,
  interferon production, and antibody response. Dose: dried root 1-2 g three times
  daily as decoction, OR solid extract (0.5% 4-hydroxy-3-methoxy isoflavone) 100-150
  mg three times daily, OR fluid extract 2-4 ml three times daily. Particularly useful
  for chronic recurrent infections, immune recovery post-illness, and as adjunct during
  chemotherapy (Chinese trials). Generally well-tolerated; can be used long-term for
  tonic immune support unlike some adaptogens.'
evidence_tier: strong
rationale: Multiple Chinese + Western clinical trials. Mechanism — astragalosides
  + polysaccharides activate Toll-like receptors + dendritic cell maturation. Unlike
  echinacea, astragalus suitable for long-term daily use as immune tonic.
coaching_translation: Astragalus is the Traditional Chinese Medicine immune tonic
  — 100-150 mg standardised extract three times daily, OR 1-2 g dried root three times
  daily as tea. Unlike echinacea (which is best short-term during illness), astragalus
  can be used long-term for chronic immune-weak clients with recurrent infections.
  Excellent for adding to soups + bone broth + tea. Often combined with reishi mushroom
  for synergistic effect.
caveats:
- Autoimmune disease — theoretical caution
- Long-term daily use OK (unlike some adaptogens)
- Pairs well with reishi + maitake mushrooms
- Pregnancy data limited
- Avoid during acute fever (TCM principle)
