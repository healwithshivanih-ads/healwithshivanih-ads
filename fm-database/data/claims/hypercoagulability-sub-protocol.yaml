slug: hypercoagulability-sub-protocol
statement: 'A subset of cognitive-decline clients have a genetic hypercoagulable state
  (factor V Leiden, prothrombin variants, MTHFR-driven hyperhomocysteinaemia) which
  contributes to microinfarcts and reduced cerebral perfusion. Bredesen''s precision
  sub-protocol uses nattokinase and/or pycnogenol — sometimes lumbrokinase — to support
  flow. CRITICAL contraindication: clients with a bleeding tendency, on anticoagulants
  such as warfarin or DOACs, or with prior haemorrhagic stroke must NOT take these
  supplements; coach refers back to the prescribing clinician.'
evidence_tier: confirm_with_clinician
