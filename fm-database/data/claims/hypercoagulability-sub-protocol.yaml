  quote: For some people they have a hypercoagulable state. You can pick that up on
    genetics and we treat them with nattokinase and/or pycnogenol, sometimes lumbrokinase.
    If you have a bleeding tendency you don't want to be on those things. You have
    to kind of decide am I more on the hypercoagulable side or am I more on the bleeding
    tendency side.
