  location: Podcast — Tylenol segment
  quote: One of the worst mitochondrial damagers is Tylenol, acetaminophen. We have
    50 million Americans that regularly use acetaminophen or Tylenol on a weekly basis.
    Every time you take a Tylenol, it dramatically reduces your glutathione stores.
    And as a result, it makes your mitochondria more susceptible to damage and that
    leads to decreased function.
rationale: Concrete intake-screen item that many coaches miss — chronic Tylenol use
  is widely under-reported and easy to flag.
