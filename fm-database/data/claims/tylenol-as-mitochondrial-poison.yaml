slug: tylenol-as-mitochondrial-poison
statement: Acetaminophen (Tylenol / paracetamol) is one of the most damaging mitochondrial
  toxins in common use — every dose dramatically depletes hepatic and systemic glutathione
  stores, leaving mitochondria vulnerable to oxidative damage. Approximately 50 million
  Americans take acetaminophen at least weekly, often for "minor" aches or as a sleep
  aid in PM formulations. Coach intake screen — ask every fatigue client about acetaminophen
  frequency; consider N-acetylcysteine (NAC) referral to clinician for clients who
  cannot stop using it. Daily/weekly users with unexplained fatigue should consider
  this as a candidate cause before expensive testing.
