slug: 4-7-8-breathing-promotes-relaxation
statement: The 4-7-8 breathing technique (inhale 4 counts, hold 7, exhale 8) can induce
  deep relaxation when repeated for up to five cycles.
evidence_tier: plausible_emerging
rationale: Extended exhalation relative to inhalation is consistent with parasympathetic
  activation research; 4-7-8 is a widely used clinical protocol though specific RCT
  evidence is limited.
coaching_translation: Try breathing in for 4, holding for 7, and breathing out slowly
  for 8 — it's a simple technique you can use anywhere to feel calmer.
caveats:
- No specific RCT cited in source document.
- Clients with respiratory conditions should check with their clinician before using
  breath-hold techniques.
