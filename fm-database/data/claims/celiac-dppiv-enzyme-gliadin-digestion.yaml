  location: Celiac Disease — Therapeutic Considerations — Pancreatic Enzymes
  quote: A better choice than pancreatic enzymes might be enzyme preparations containing
    dipeptidyl-peptidase IV (DPP-IV) from fungal sources. This enzyme targets both
    gliadin and casein (milk protein) and is resistant to breakdown by other digestive
    enzymes.
