slug: hdl-performs-reverse-cholesterol-transport
statement: HDL performs reverse cholesterol transport, removing excess cholesterol from cells and returning it to the liver
  for conversion to bile salts.
evidence_tier: strong
rationale: Core lipid physiology, established in peer-reviewed biochemistry and cardiology literature. HDL-mediated reverse
  cholesterol transport is a fundamental anti-atherogenic mechanism.
coaching_translation: HDL — the 'good cholesterol' — acts like a clean-up crew, picking up excess cholesterol from your arteries
  and returning it to your liver to be safely eliminated.
