slug: functional-medicine-shifts-from-disease-centered-to-patient-centered
statement: Functional and integrative medicine models seek to identify upstream causes
  — lifestyle, environment, gene interactions, stress, and the microbiome — representing
  a paradigm shift from disease-centered to patient-centered care.
evidence_tier: plausible_emerging
rationale: Speaker describes the philosophical and structural distinction between
  traditional (organ/symptom siloed) and functional/integrative (upstream, systems-based)
  medicine. This framing is foundational to FM practice and well-described in FM literature,
  though 'strong' tier requires specific RCT-level evidence for the model itself.
coaching_translation: When clients ask why functional medicine is different, explain
  that it looks for root causes — diet, stress, environment, gut health, hormones
  — rather than just treating the symptom in front of them.
caveats:
- Source is expert talk/synthesis.
- The paradigm shift is well-articulated in FM literature but the comparative outcomes
  evidence is still accumulating.
