slug: sklar-candida-protocol-pre-conception-spacing
statement: During the intensive 30-day phase of a Candida-clearing protocol — high
  antimicrobial load, active toxin mobilisation — Sklar prefers couples not actively
  try to conceive, then resumes trying alongside the maintenance phase once gut symptoms
  have improved. If conception happens spontaneously during early treatment, intensive
  antimicrobials are stopped immediately while foundational support (probiotics, prenatal,
  anti-inflammatory diet) is continued.
