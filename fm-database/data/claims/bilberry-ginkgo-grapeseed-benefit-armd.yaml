slug: bilberry-ginkgo-grapeseed-benefit-armd
statement: Bilberry (Vaccinium myrtillus) anthocyanosides, Ginkgo biloba flavonoid
  extract, and grapeseed proanthocyanidins improve retinal blood flow and function,
  can halt progressive visual loss in dry ARMD, and may improve visual function.
evidence_tier: plausible_emerging
rationale: These flavonoid-rich extracts are potent antioxidants with demonstrated
  affinity for the retinal pigment epithelium and vascular protective effects; clinical
  evidence for halting dry ARMD progression is preliminary but plausible.
coaching_translation: 'Choose one: bilberry extract (120–240 mg/day, 25% anthocyanidins),
  Ginkgo biloba (120–240 mg/day, 24% heterosides — especially if cerebrovascular insufficiency
  is present), or grapeseed extract (150–300 mg/day, 95% OPC — especially for photophobia
  or poor night vision).'
caveats:
- Ginkgo biloba may interact with anticoagulants — clinician review needed
- Clinical trials for dry ARMD are small and need replication
