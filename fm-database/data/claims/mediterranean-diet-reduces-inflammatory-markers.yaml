slug: mediterranean-diet-reduces-inflammatory-markers
statement: Mediterranean diet reduces markers of systemic inflammation including CRP,
  IL-6, IL-7, IL-18, and decreases insulin resistance.
evidence_tier: strong
rationale: Multiple RCTs and prospective cohort studies support the anti-inflammatory
  effects of Mediterranean diet. Specific cytokines cited (IL-6, IL-18) are well-documented
  in the literature.
coaching_translation: Eating a Mediterranean diet doesn't just lower cholesterol —
  it turns down the inflammation throughout your body that drives heart disease.
