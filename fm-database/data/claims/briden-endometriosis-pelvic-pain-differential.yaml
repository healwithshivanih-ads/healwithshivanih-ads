slug: briden-endometriosis-pelvic-pain-differential
statement: 'When endometriosis lesions don''t explain pelvic pain, look for hidden
  causes: pelvic congestion syndrome (varicose veins inside the pelvis — often missed),
  pelvic floor tension, fibromyalgia, interstitial cystitis, autonomic nervous system
  dysregulation, immune dysfunction, and gut-driven pain. Multidimensional whole-person
  pain care (not lesion-removal alone) is the emerging standard, supported by the
  Faculty of Pain Medicine of the Australian and New Zealand College of Anaesthetists.'
evidence_tier: plausible_emerging
rationale: Pelvic congestion syndrome is documented but underdiagnosed. The multidimensional
  pain care framing aligns with the Faculty of Pain Medicine position paper Briden
  cites — a substantial professional consensus shift.
coaching_translation: Pelvic pain that does not match lesion findings is a real condition
  that deserves the same multidisciplinary work-up as any chronic pain — pelvic physio,
  nervous system regulation, gut work, sometimes vascular imaging. The pain is real
  even when the lesions are not the explanation.
