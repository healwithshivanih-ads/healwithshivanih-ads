slug: vitamin-d-is-often-a-marker-not-a-cause
statement: 'Low vitamin D is more likely a marker of ill health than its cause: supplementing
  sick people generally did not reverse illness in a large umbrella review, so the
  underlying problem — often the gut — should be addressed rather than just the number.'
evidence_tier: strong
rationale: Cites the 2014 BMJ umbrella review of vitamin D supplementation trials.
coaching_translation: A low vitamin D reading is often a sign of underlying illness
  — worth correcting, but don't expect the pill alone to fix things.
