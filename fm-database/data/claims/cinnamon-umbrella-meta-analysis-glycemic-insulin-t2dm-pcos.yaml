slug: cinnamon-umbrella-meta-analysis-glycemic-insulin-t2dm-pcos
statement: A 2023 umbrella meta-analysis of 11 meta-analyses of RCTs found cinnamon supplementation significantly
  reduced fasting plasma glucose (WMD −10.93 mg/dL), insulin (WMD −2.01 IU/mL), HOMA-IR (WMD −0.61), and
  HbA1c (WMD −0.10%) in patients with type 2 diabetes or PCOS.
evidence_tier: strong
rationale: 'Umbrella meta-analysis synthesising 11 prior meta-analyses of RCTs — the highest evidence
  synthesis level available; consistent reductions across all four glycaemic markers. Effective dose in
  trials: Varied: typically 1–6 g/day whole powder or 120–500 mg standardised extract; 4–16 weeks in included
  trials.'
coaching_translation: A meta-analysis of meta-analyses confirms cinnamon can lower fasting blood sugar,
  insulin levels, insulin resistance (HOMA-IR), and HbA1c in people with type 2 diabetes or PCOS. Adding
  cinnamon to food or as a supplement looks like a safe, low-cost way to support glycaemic control.
out_of_scope_notes: ''
caveats:
- HbA1c reduction (−0.10%) is statistically significant but modest in absolute terms
- Heterogeneity between individual RCTs is high — dose, species (Cinnamomum cassia vs. C. zeylanicum),
  and duration vary
- Cassia cinnamon contains coumarin, which may cause liver toxicity at very high doses; Ceylon cinnamon
  (true cinnamon) is preferred for supplementation
- 'Hypoglycaemic drug interaction: cinnamon can potentiate antidiabetic agents — monitor glucose if combining
  with medications'
- Individual responses vary; not a substitute for evidence-based diabetes management
