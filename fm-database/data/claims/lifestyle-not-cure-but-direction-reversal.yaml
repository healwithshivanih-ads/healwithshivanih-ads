slug: lifestyle-not-cure-but-direction-reversal
statement: The lifestyle approach to cognitive decline is not a cure in the antibiotic
  sense — clients who improve and then abandon the protocol typically regress. It
  is a permanent lifestyle, requiring six-to-seven-days-per-week adherence to be sustained.
  The empowering reframe for clients is that Alzheimer's is NOT a binary on/off incurable
  disease as commonly described on health websites — it is a malleable spectrum that
  can move in either direction. Sandison cites a Marama resident who entered with
  MoCA 24 and moved home with MoCA 30 after six months of immersive lifestyle care.
evidence_tier: plausible_emerging
