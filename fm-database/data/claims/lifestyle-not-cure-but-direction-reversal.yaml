  quote: This isn't a cure. This is a lifestyle. If they get off, it doesn't last.
    The symptoms come back. The good news is there's hope. The bad news is it takes
    work. Our first resident moved in with a Mocha of 24. And six months later she
    moved home with a Mocha of 30.
rationale: Sets honest expectations — coach can hold both hope and the daily-work
  reality without overselling.
