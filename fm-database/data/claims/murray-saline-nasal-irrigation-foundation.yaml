slug: murray-saline-nasal-irrigation-foundation
statement: 'Daily saline nasal irrigation (neti pot or squeeze bottle with 16 fl oz
  lukewarm water + 1 tsp salt) is the foundational sinusitis intervention — mechanically
  clears bacteria, allergens, inflammatory mucus, and biofilm; restores ciliary function;
  reduces inflammation. Multiple Cochrane-reviewed trials confirm benefit in acute
  and chronic sinusitis. Increase to 2-4× daily during acute attacks; once daily for
  maintenance in chronic sinusitis. CRITICAL safety: use distilled, boiled-and-cooled,
  or store-bought sterile saline (NOT tap water — Naegleria fowleri amoeba contamination
  has caused fatal CNS infections from tap water nasal irrigation).'
evidence_tier: strong
rationale: Ayurvedic tradition + Cochrane meta-analyses (Chong 2016). Mechanism —
  mechanical clearance + ciliary stimulation + osmotic reduction of mucosal oedema.
  Safety caveat well-established after multiple fatal cases.
coaching_translation: 'Saline nasal irrigation is foundational for any sinusitis.
  Once daily for chronic; 2-4× daily during acute attack. Use neti pot or NeilMed
  Sinus Rinse bottle: 16 fl oz lukewarm DISTILLED or BOILED+COOLED water + 1 tsp salt.
  CRITICAL: NEVER use tap water — there have been fatal brain infections from amoeba
  in tap water nasal irrigation. Distilled, boiled-and-cooled, or store-bought sterile
  only.'
caveats:
- DISTILLED or BOILED+COOLED water only — tap water is a fatal safety hazard
- Lukewarm not hot
- Pure non-iodised salt (sea salt or kosher) without anti-caking agents
- Discontinue if ear pain (eustachian tube reflux)
- Replace neti pot every 3-6 months
