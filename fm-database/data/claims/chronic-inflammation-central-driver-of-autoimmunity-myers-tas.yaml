slug: chronic-inflammation-central-driver-of-autoimmunity-myers-tas
statement: Unlike self-limiting acute inflammation, chronic inflammation from unrelenting
  triggers keeps the immune system on permanent alert and is the central driver that
  can tip it into attacking self-tissue.
evidence_tier: plausible_emerging
rationale: Persistent low-grade inflammation exhausts immune regulation; lowering
  it is the shared aim across all four Myers Way pillars.
coaching_translation: It's ongoing, never-resolving inflammation — not a one-off —
  that pushes the immune system toward attacking the body.
