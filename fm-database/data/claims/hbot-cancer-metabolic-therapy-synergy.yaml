slug: hbot-cancer-metabolic-therapy-synergy
statement: HBOT may have a synergistic role within metabolic cancer therapy frameworks
  (e.g., the work of Dr Thomas Seyfried at Boston College and Dr Dominic D'Agostino),
  because many cancer cell lines are inhibited by high-oxygen environments and HBOT
  can act as a radiation and chemotherapy sensitiser. Coach scope — this is strictly
  oncologist-directed care. Sonners and Mercola flag the application; no FM coach
  should advise HBOT as cancer treatment outside an integrative oncology team.
evidence_tier: confirm_with_clinician
