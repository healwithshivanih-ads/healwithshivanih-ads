  location: Podcast — cancer synergy mention
  quote: Cells that do not respond favorably to excess oxygen would be many types
    of cancers, especially if you are in the process of treating them with metabolic
    therapy — Dr Thomas Seyfried at Boston College advocates, Dominic D'Agostino has
    done a lot of work in that area too — in the use of hyperbaric as a synergistic
    strategy.
rationale: Important scope-limited claim — surfaces possibility without prescribing.
