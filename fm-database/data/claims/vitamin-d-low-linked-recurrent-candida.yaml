slug: vitamin-d-low-linked-recurrent-candida
statement: Low vitamin D is linked to recurrent Candida infections due to its role
  in mucosal and systemic immune function.
evidence_tier: plausible_emerging
rationale: Vitamin D's immunomodulatory role and its association with mucosal immunity
  are supported in the literature. Direct link to Candida recurrence is plausible
  but the synthesis document does not cite specific studies.
coaching_translation: Getting vitamin D levels checked and optimized may help if you're
  prone to recurring yeast or fungal infections.
caveats:
- Dosing (2000-5000 IU) should be based on serum 25(OH)D levels — clinician scope.
  Source is educational synthesis.
