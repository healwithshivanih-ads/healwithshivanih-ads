slug: hbot-fasted-exercise-then-fed-hbot-anabolic-sequence
statement: An optimal sequencing model — fasted strength exercise (16-22 hour fast,
  pre-exercise) drives autophagy and clears damaged cellular components, then refeeding
  with healthy fats and protein delivers building blocks, then HBOT in the fed state
  provides the regenerative signal and substrate to use those building blocks for
  anabolic repair. HBOT itself is fundamentally anabolic (tissue building) and pairs
  synergistically with the catabolic clearing phase of fasted exercise.
