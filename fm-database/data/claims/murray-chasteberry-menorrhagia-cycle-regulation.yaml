slug: murray-chasteberry-menorrhagia-cycle-regulation
statement: 'Chasteberry (Vitex agnus-castus) — 175-225 mg/day standardised to 0.5%
  agnuside OR 2-4 ml liquid extract — is the most evidence-supported botanical for
  normalising menstrual flow. In a 126-woman study, polymenorrhea (frequent cycles)
  lengthened from 20.1 to 26.3 days, and number of heavy bleeding days shortened in
  58 menorrhagia patients. Mechanism: dopaminergic activity at pituitary D2 receptors
  reduces prolactin + normalises FSH/LH balance, indirectly regulating endometrial
  proliferation. Effect requires 3-4 months to fully manifest.'
evidence_tier: strong
rationale: Multiple clinical observation studies + the bridging mechanism to PMS work.
  Mechanism — pituitary dopaminergic effect reduces prolactin which when elevated
  drives anovulation + irregular cycles.
coaching_translation: Chasteberry (vitex) 175-225 mg/day standardised to 0.5% agnuside
  is the single most evidence-backed herb for normalising both timing AND volume of
  menstrual cycles. Effect builds over 3-4 cycles. Combines well with iron + omega-3
  + B-complex. NOT during pregnancy or with oral contraceptives or HRT.
caveats:
- 3-4 month effect window
- Avoid with hormonal contraceptives + HRT (dopaminergic conflict)
- Avoid in pregnancy
- Take in the morning
- Hyperprolactinaemia from antipsychotics — clinician scope
