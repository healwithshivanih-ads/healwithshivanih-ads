slug: zinc-protective-beta-cells-diabetics-excrete-excess
statement: Zinc is protective against beta-cell destruction and has antiviral effects;
  diabetics excrete zinc excessively in urine, and supplementation (30 mg/day) improves
  insulin levels in T1DM and T2DM.
evidence_tier: plausible_emerging
rationale: Multiple studies document urinary zinc loss in diabetes and benefits of
  zinc supplementation on insulin metrics; antiviral role supports T1DM prevention.
coaching_translation: Diabetics are constantly losing zinc in urine — supplementing
  zinc supports immune defence, wound healing, and insulin function.
