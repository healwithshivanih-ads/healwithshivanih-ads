slug: perceived-stress-increases-pu-risk
statement: People who perceive more significant stress in their lives are at increased
  risk of developing peptic ulcers; patient response to stress — not the number of
  stressful events — is the significant factor.
evidence_tier: plausible_emerging
rationale: Psychological stress is associated with PU via HPA-axis mediated effects
  on mucosal blood flow and acid secretion; the perception vs. event-count distinction
  is cited in this FM text.
coaching_translation: It's not how many stressful things happen to you — it's how
  much stress you feel. Building stress resilience can help protect your gut.
