slug: murray-constipation-dairy-elimination-children
statement: 'Approximately 70 percent of childhood constipation cases resolve when
  cow''s milk and dairy are eliminated (substitute almond, soy, or rice milk). Responders
  also see reduction in runny nose, eczema, and asthma symptoms — pointing to underlying
  dairy intolerance as both gut and immune trigger. First step for any constipated
  child: eliminate dairy and increase high-fibre fruits (pears, apples). Avoid mineral
  oil and stimulant laxatives unless absolutely necessary.'
