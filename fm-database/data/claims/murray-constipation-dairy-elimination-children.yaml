sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 41 — Constipation, pg 715-716
  quote: Cow's milk intolerance can also lead to constipation and is a major cause
    of childhood constipation. About 70 percent of cases of childhood constipation
    are cured by eliminating cow's milk from the diet and substituting soy, nut (e.g.,
    almond), or rice milk. Children with constipation who respond to milk elimination
    also experience a decreased frequency of allergy symptoms, including runny nose,
    eczema, and asthma.
