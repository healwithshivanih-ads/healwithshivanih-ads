slug: oral-contraceptive-suppresses-cycle-and-depletes-micronutrients
statement: The oral contraceptive pill suppresses ovulation and endogenous hormone
  production and is associated with micronutrient depletion (e.g., B vitamins, vitamin
  D3), gut microbiome disruption, and effects on weight, muscle, and mood.
evidence_tier: plausible_emerging
rationale: The pill holds the infradian rhythm in suspension; micronutrient depletion
  is well documented, broader effects less so.
coaching_translation: Clients on or coming off the pill may benefit from micronutrient
  and gut support, coordinated with their provider.
out_of_scope_notes: Contraception decisions are clinician-led; coaches never advise
  starting or stopping medication.
