slug: medicinal-mushrooms-immune-antioxidant-antiviral
statement: Medicinal mushrooms support the immune system while having antioxidant
  and antiviral effects.
evidence_tier: plausible_emerging
rationale: Cited RCTs include Dai et al. (J Am Coll Nutr 2015) on shiitake improving
  human immunity. Reishi, Lion's Mane, and Maitake data cited from preclinical and
  early human studies. Dosing must be individualized by genus/species.
coaching_translation: Medicinal mushrooms like shiitake, reishi, and maitake have
  been studied for their immune-boosting and antioxidant properties.
out_of_scope_notes: Dosing must be individualized by species and validated methods
  — clinician consultation required.
