slug: ayurveda-spices-by-dosha
statement: Nearly all spices suit vata and kapha ('all spices are good'), kindling agni; pitta is the
  exception — it favours cooling spices (coriander, cumin, fennel, mint, cardamom, turmeric) and reduces
  hot, pungent spices (cayenne, chilli, mustard seed, dry ginger, garlic).
evidence_tier: fm_specific_thin
rationale: From the Ayurvedic Institute / Lad Food Guidelines for Basic Constitutional Types — traditional
  dosha-food matching (like increases like; opposite qualities balance).
