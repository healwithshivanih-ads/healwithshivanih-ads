slug: murray-flavonoids-halve-sports-injury-recovery
statement: DB-RCTs of supplemental citrus flavonoids cut sports-injury recovery time
  in half by reducing vascular permeability, preventing free-radical damage to collagen,
  inhibiting collagenase enzymes, suppressing inflammatory chemical release, and reinforcing
  collagen cross-linking. Procyanidolic oligomers (PCOs) from pine bark (Pycnogenol)
  or grape seed extract are biologically more active per mg than citrus flavonoids;
  effective tendinopathy dose 150–300 mg/day standardised to ≥95% PCOs.
evidence_tier: plausible_emerging
rationale: Replicated DB trials cited. Five-fold mechanism (vascular + antioxidant
  + anti-collagenase + anti-inflammatory + collagen cross-linking) gives clear biological
  rationale. PCOs preferred over citrus on potency per mg, though either works. Effect
  on injury-related disability dimensions less well-quantified than mechanism story.
coaching_translation: Bioflavonoids halve the time it takes to recover from sports
  injuries. The most potent are PCOs (procyanidolic oligomers) from pine bark or grape
  seed extract at 150-300 mg/day. They protect collagen — the building block of tendons
  and ligaments — through five separate mechanisms. Excellent stack with curcumin
  + bromelain for active tendinopathy.
caveats:
- Look for ≥95% PCO content on label (cheaper extracts have far less)
- Mild antiplatelet — caution + anticoagulants
- Pycnogenol + grape seed extract are interchangeable PCO sources
