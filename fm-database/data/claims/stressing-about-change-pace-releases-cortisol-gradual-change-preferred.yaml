slug: stressing-about-change-pace-releases-cortisol-gradual-change-preferred
statement: Stressing about the pace of lifestyle change itself releases stress hormones that directly
  undermine the intended benefit — slow, gradual behavioural change is not only acceptable but physiologically
  preferable to abrupt, high-pressure transformation attempts.
evidence_tier: plausible_emerging
rationale: Cortisol release in response to perceived demands (including self-imposed health goals) is
  well-established; perfectionism and 'all-or-nothing' approaches to behaviour change are associated with
  higher dropout and poorer outcomes in habit-change research.
coaching_translation: Trying to change everything at once — and stressing over how quickly you do it —
  releases the exact cortisol that's disrupting your hormones in the first place. Pick one change, live
  with it, then add the next. Slow, consistent steps compound; urgency undermines.
