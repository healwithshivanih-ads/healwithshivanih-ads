sources:
- id: sandison-energy-blueprint-podcast-2026
  location: Podcast — exercise tips
  quote: What I recommend for exercise is something called dual task exercise — two
    things at the same time where you're exercising cognitively at the same time as
    physically. Even just going to a challenging dance class. You want to be about
    75% of capacity both physically and cognitively. Not so hard that you give up,
    but not so easy that you're checking out.
rationale: Concrete movement prescription coach can swap in instead of generic "exercise
  daily" — pickleball + dance + walk-with-podcast all qualify.
