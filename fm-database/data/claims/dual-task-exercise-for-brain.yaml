slug: dual-task-exercise-for-brain
statement: 'Sandison''s preferred exercise prescription for brain protection is DUAL-TASK
  exercise — moving the body and challenging the brain simultaneously at roughly 75%
  of capacity on both dimensions. Examples: walking while conversing, learning a new
  sport like pickleball (movement + strategy + hand-eye + social), a challenging dance
  class with instructor cues, or simple physical exercise paired with memorising a
  poem or doing mental maths. The combined cognitive-physical load is hypothesised
  to drive larger synaptic and vascular adaptation than either alone.'
evidence_tier: plausible_emerging
