slug: lyme-migratory-pain-clinical-anchor
statement: Migratory pain — pain that moves from one body region to another (shoulder
  to knee to ankle over days) without explanation — is the single most useful clinical
  anchor for chronic Lyme disease. Present in 95% of Horowitz's chronic Lyme patients.
  Only seven diseases in medicine cause migratory pain — lupus, ulcerative colitis/Crohn's,
  gonococcal arthritis, acute rheumatic fever, Reiter's syndrome, hepatitis, and Lyme
  — making differential diagnosis tractable. Applies to muscle pain, joint pain, and
  migratory neuropathy (tingling, numbness, burning, stabbing, vibration sensation
  that moves).
