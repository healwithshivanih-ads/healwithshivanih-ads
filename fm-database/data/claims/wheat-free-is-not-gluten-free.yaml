slug: wheat-free-is-not-gluten-free
statement: Wheat-free products are not necessarily gluten-free, as barley and rye
  also contain gluten.
evidence_tier: strong
rationale: Celiac Disease Foundation guidance (cited) establishes that gluten includes
  gliadin (wheat), hordein (barley), and secalin (rye); 'wheat-free' labelling does
  not exclude these.
coaching_translation: Always look for the certified 'gluten-free' label, not just
  'wheat-free', when shopping.
linked_to_topics:
- gluten-sensitivity
out_of_scope_notes: ''
