slug: omega-3-improves-embryo-quality
statement: 'Higher levels of long-chain omega-3 fatty acids (EPA, DHA) in the follicular
  fluid are associated with improved embryo quality in IVF. Conversely, high arachidonic
  acid (omega-6) from turkey, dark-meat chicken, and farmed salmon correlates with
  reduced fertilisation rates. Best fertility-pattern protein sources: low-mercury
  wild fish, chicken breast, grass-fed beef, lamb, lean pork; avoid farmed salmon
  (corn/soy-fed), high-mercury fish (shark, swordfish, king mackerel, tilefish).'
evidence_tier: plausible_emerging
