sources:
- id: fett-it-starts-with-the-egg-2019
  location: Chapter 11 — The Egg Quality Diet, pg 158-161
  quote: Women who became pregnant after IVF had a higher overall level of omega-3
    fatty acids in their ovaries and a high proportion of omega-3 to omega-6. Because
    farmed salmon is typically fed corn and soy products, it is incredibly high in
    arachidonic acid.
rationale: Practical protein-source guidance for fertility nutrition.
