slug: alkaline-water-helpful-for-tissues-not-digestion
statement: Alkaline water is beneficial for body tissues but should not be consumed
  with meals, as it can impair stomach acid and digestion.
evidence_tier: fm_specific_thin
rationale: This is a common recommendation in functional medicine and naturopathy.
  There is limited peer-reviewed evidence specifically on alkaline water and meal-time
  stomach acid interference. However, the reasoning is mechanistically plausible.
coaching_translation: Drink alkaline water between meals for tissue support, not with
  meals — you need your stomach acid at its strongest when eating.
caveats:
- Limited peer-reviewed evidence on alkaline water specifically. This is FM-specific
  practice guidance.
- Source is a lecture transcript.
