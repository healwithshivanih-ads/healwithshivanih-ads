slug: high-glycemic-load-increases-chd-risk-women
statement: Consumption of foods with high glycemic load increases risk of CHD in women
  by 68%; women in the highest glycemic-load quartile have a relative risk of 2.2
  for CHD compared with the lowest quartile.
evidence_tier: strong
rationale: Cited from prospective cohort data (Nurses' Health Study era); consistent
  with broader glycemic index literature.
coaching_translation: Choosing lower-glycemic carbohydrates significantly reduces
  heart disease risk, especially for women.
