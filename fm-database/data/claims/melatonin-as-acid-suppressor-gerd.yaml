slug: melatonin-as-acid-suppressor-gerd
statement: Melatonin can be used as an acid-suppressing agent during the PPI tapering
  process as a bridge after H2 blockers.
evidence_tier: plausible_emerging
rationale: Several small RCTs have evaluated melatonin for GERD with promising results.
  Mechanistically, melatonin is produced in the GI tract and may modulate LES tone.
caveats:
- Evidence is from small trials. Standard of care still favors H2 blockers as PPI
  bridges.
- Dosing requires clinician guidance.
