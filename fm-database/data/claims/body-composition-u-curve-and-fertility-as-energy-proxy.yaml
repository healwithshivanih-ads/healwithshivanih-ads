sources:
- id: masterjohn-energy-blueprint-podcast-2026
  location: Podcast — body composition fertility segment
  quote: If you look at body composition versus fertility, you see that underweight
    people are relatively infertile and overweight people are relatively infertile.
    There's a U-shaped curve where distribution of body fat in the healthy range produces
    fertility and everything else produces infertility. I think you would see that
    broadly across other diseases as well — including energy levels.
rationale: Quick coach litmus — fatigue in an underweight client and fatigue in an
  obese client both signal "scarcity-perception" by the brain; the intervention differs
  but the framing is the same.
