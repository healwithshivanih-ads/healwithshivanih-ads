slug: body-composition-u-curve-and-fertility-as-energy-proxy
statement: Body composition deviation in EITHER direction — underweight (signalling
  famine) or above the personal fat threshold (signalling chronic stress of carrying
  extra mass) — drives the brain to throttle mitochondrial output. Fertility shows
  a clean U-shaped curve confirming this — both underweight and overweight populations
  are relatively infertile while healthy-range adiposity supports fertility. The same
  U-curve applies to subjective energy, skin health, libido, and "how do I feel today."
  Coach action — for fatigue complaints, always look at body composition as a precursor
  signal before deeper micronutrient or thyroid work.
evidence_tier: plausible_emerging
