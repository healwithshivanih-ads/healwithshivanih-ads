slug: murray-prunes-constipation-relief
statement: '5-10 prunes or 4-8 fl oz prune juice provides effective constipation relief
  in most sufferers — works through THREE mechanisms: (1) insoluble fibre provides
  bulk + reduces transit time, (2) sorbitol acts as osmotic laxative, (3) phenolic
  compounds (neochlorogenic + chlorogenic acids, 184 mg/100g) feed colonic bacteria
  producing butyric acid that fuels colonocytes. Phenolics also inhibit LDL oxidation
  — protective against heart disease and osteoporosis. The same intervention that
  prevents constipation simultaneously protects bones (12 prunes daily proven to improve
  bone formation markers in postmenopausal women).'
evidence_tier: strong
rationale: Multiple RCTs confirming prunes outperform psyllium for constipation (Attaluri
  2011). Mechanism is well-described. Connection to bone health bridges two coaching
  domains.
coaching_translation: 'Five to ten prunes daily — or 4-8 oz prune juice — relieves
  constipation more reliably than most supplements. Works through fibre + sorbitol
  + polyphenols. Bonus: same dose builds bone density in postmenopausal women. India-friendly
  alternative: dried apricots, figs, or dates work similarly through similar mechanisms
  but are gentler.'
caveats:
- Sugar content meaningful for diabetic clients (monitor)
- Sorbitol effect dose-dependent — start with 3-4 prunes
- High potassium content beneficial; concerning only in advanced kidney disease
- Dried apricots are a culturally aligned Indian alternative
