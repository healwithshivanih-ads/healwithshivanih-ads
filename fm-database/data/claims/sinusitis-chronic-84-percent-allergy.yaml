slug: sinusitis-chronic-84-percent-allergy
statement: Approximately 84% of patients with chronic sinusitis have underlying allergies;
  addressing respiratory and food allergens with supportive therapy (saline nasal
  sprays, immune-enhancing herbs, natural decongestants) is the most rational approach.
evidence_tier: plausible_emerging
rationale: Clinical epidemiological data cited in Pizzorno textbook; the high prevalence
  of allergy in chronic sinusitis supports allergen identification and elimination
  as primary strategy.
coaching_translation: Chronic sinus problems are almost always connected to allergies
  — food or environmental. Finding and removing your triggers is more important than
  antibiotics for long-term relief.
