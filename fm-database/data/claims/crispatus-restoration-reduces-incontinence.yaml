slug: crispatus-restoration-reduces-incontinence
statement: Oral restoration of Lactobacillus crispatus reduces urinary stress and
  urge incontinence by approximately half in exploratory research.
evidence_tier: plausible_emerging
rationale: Dr. Davis references Loyola University Chicago work using anaerobic culture
  that found oral crispatus restoration reduces incontinence by approximately 50%.
  Described as exploratory and not a cure, but significant given poor conventional
  options.
coaching_translation: Restoring L. crispatus through a fermented yogurt or probiotic
  may cut bladder leakage problems roughly in half, according to early research.
caveats:
- Referenced as 'exploratory studies'—not full RCTs.
- Source is expert_consensus interview.
- Conventional medical treatments for incontinence should not be discontinued without
  clinician input.
