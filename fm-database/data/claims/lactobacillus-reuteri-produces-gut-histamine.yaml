slug: lactobacillus-reuteri-produces-gut-histamine
statement: 'Certain strains of Lactobacillus reuteri and Lactobacillus casei produce

  histamine in the gut, potentially worsening symptoms in histamine-sensitive

  patients when consumed as probiotic supplements.

  '
evidence_tier: plausible_emerging
rationale: 'Microbial histamine production is strain-specific, not species-specific
  —

  some L. reuteri strains are characterized histamine producers while others

  are not. For sensitive patients, broad multi-strain probiotic blends are a

  reasonable suspect when symptoms worsen after starting a probiotic.

  Histamine-degrading species (L. plantarum, B. infantis, B. longum) are

  safer starting points.

  '
coaching_translation: 'Not all probiotics are the same — some strains actually make
  histamine in

  your gut and can worsen flushing, headaches, or hives in sensitive people.

  If you suspect histamine issues, avoid multi-strain blends that include

  L. reuteri or L. casei, and instead try strains known to break histamine

  down, like L. plantarum or B. infantis. If symptoms flare with a new

  probiotic, stop and reassess.

  '
caveats:
- Effect is strain-specific; product labels rarely specify strain ID.
- Histamine production by gut bacteria is not the same as histamine release from mast
  cells — different intervention paths.
- This claim is about supplement selection in sensitive populations; general probiotic
  recommendations still hold for most people.
out_of_scope_notes: 'Probiotic selection for diagnosed conditions belongs to clinician
  guidance.

  '
