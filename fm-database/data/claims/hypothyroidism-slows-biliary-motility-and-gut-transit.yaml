slug: hypothyroidism-slows-biliary-motility-and-gut-transit
statement: Hypothyroidism slows biliary motility and intestinal transit, increasing
  constipation and gallstone risk, reflecting the thyroid–gut connection.
evidence_tier: strong
rationale: Hypothyroidism leads to decreased gallbladder contractility, slower intestinal
  transit, increased gallstone risk, and constipation — all well-documented in gastroenterology
  literature. Thyroid hormone is also needed for bile acid synthesis.
coaching_translation: Constipation is a commonly missed thyroid symptom. If gut and
  thyroid are both struggling, they're likely talking to each other.
caveats:
- Constipation has many causes; coaches should encourage full workup rather than attributing
  directly to thyroid without clinical confirmation.
