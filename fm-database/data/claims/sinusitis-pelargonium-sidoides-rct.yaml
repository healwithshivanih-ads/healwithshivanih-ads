slug: sinusitis-pelargonium-sidoides-rct
statement: Ethanolic extract of Pelargonium sidoides (EPs 7630) at 3 mL three times
  daily for up to 22 days induced a significant decrease in Sinusitis Severity Score
  compared with placebo in acute rhinosinusitis of presumably bacterial origin.
evidence_tier: plausible_emerging
rationale: Cited from RCT data; EPs 7630 is an approved drug for acute bronchitis
  in Germany; immune-enhancing, antimicrobial, and expectorant properties are documented.
coaching_translation: Pelargonium sidoides (also sold as 'Umcka') is a well-studied
  herbal extract that can speed recovery from sinus and respiratory infections.
