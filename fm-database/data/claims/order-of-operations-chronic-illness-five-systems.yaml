  quote: The systems are the immune system, the digestive system, the neuroendocrine
    system, the tissue repair system, and then if someone is still kind of lacking
    in energy at the end of it, then we can consider boosting and supplementing and
    tonifying. Studies showing that your dysbiotic gut bacteria love it when you take
    iron supplements. For them that's like an all-you-can-eat buffet.
