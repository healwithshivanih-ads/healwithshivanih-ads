slug: order-of-operations-chronic-illness-five-systems
statement: A reproducible clinical sequence for complex chronic illness — work the
  systems in this order — immune → digestive → neuroendocrine → tissue repair → tonification.
  Starting at the wrong level (for example, supplementing iron, B-vitamins, or adaptogens
  while a permeable gut is still feeding dysbiotic bacteria those nutrients) drives
  symptoms worse. Each stage has clear resolution criteria before moving on. Borrowed
  from a Sichuan-province Chinese-medicine clinician who treated 150 to 200 patients
  a day using this algorithm.
