slug: unilateral-stimulation-targets-weaker-hemisphere
statement: Generalised brain-stimulation interventions (whole-head red light, full-spectrum
  sound, bilateral exercise) preferentially benefit the already-developed hemisphere
  because over-active networks have higher metabolic uptake. To shift hemispheric
  imbalance, stimulation must be unilateral — light into one eye, sound into one ear,
  smell to one nostril, movement on one side — targeting the under-developed side
  while sometimes restraining the over-active side. This mirrors stroke rehab evidence
  (constraint-induced movement therapy, eye-patching for amblyopia) — restrain the
  strong, force use of the weak.
evidence_tier: plausible_emerging
