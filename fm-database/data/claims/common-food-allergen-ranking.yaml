slug: common-food-allergen-ranking
statement: The most reactive food allergens are gluten-containing grains, dairy and
  soy; eggs and nuts are intermediate; while gluten-free grains, potato and sweet
  potato, nightshades and legumes tend to be best tolerated.
evidence_tier: plausible_emerging
rationale: A practical ranking Ruscio uses to structure elimination diets.
coaching_translation: When trimming the diet, start with the biggest culprits — gluten,
  dairy and soy — before cutting well-tolerated foods.
