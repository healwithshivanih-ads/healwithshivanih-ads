slug: fitzgerald-lifestyle-levers-methylation-age
statement: 'Lifestyle levers measurably shift DNA-methylation age: in the trial participants
  slept ~7h/night and did twice-daily 10-minute relaxation, alongside regular exercise;
  chronic short/poor sleep accelerates methylation age (shifts are detectable after
  even one bad night), while exercise and stress reduction support youthful methylation.
  Toxin reduction (clean water/food, fewer environmental chemicals) protects normative
  methylation.'
