slug: maca-clinical-use-hpa-amenorrhea-post-pill-libido
statement: Functional medicine clinical use of maca extends beyond menopause to HPA-driven
  amenorrhea and post-pill libido recovery — both contexts where direct hormonal intervention
  is inappropriate and a non-phytoestrogenic adaptogen that supports endogenous hormone
  production via HPA-axis modulation is preferable. Typical dose 1.5 to 3 g/day of
  gelatinized maca; expect 8 to 12 weeks for full effect.
