slug: social-connection-supports-emotional-wellbeing
statement: Having supportive relationships, social time with positive people, and
  the ability to give and receive affection are key components of emotional and social
  wellbeing.
evidence_tier: strong
rationale: Robust epidemiological and psychological literature (e.g., Holt-Lunstad
  et al.) links social connection and relationship quality to longevity, immune function,
  mental health, and stress resilience via oxytocin and HPA axis modulation.
coaching_translation: Nurturing loving, supportive relationships is one of the strongest
  predictors of long-term health and happiness—it literally affects your biology.
