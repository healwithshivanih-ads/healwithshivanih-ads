slug: selenium-supports-t4-to-t3-conversion
statement: Selenium is essential for the deiodinase enzymes that convert inactive T4 into active T3 thyroid hormone.
evidence_tier: strong
rationale: Selenium-dependent deiodinase enzymes (DIO1, DIO2, DIO3) are well-established in peer-reviewed literature as the
  primary catalysts for peripheral T4-to-T3 conversion. This is a well-established physiological mechanism.
coaching_translation: Adequate selenium intake supports the body's ability to activate thyroid hormone. Food sources include
  Brazil nuts, sunflower seeds, and fish.
caveats:
- Doses above 400 mcg/day carry selenotoxicity risk. Verify total intake (diet + supplements) with clinician.
