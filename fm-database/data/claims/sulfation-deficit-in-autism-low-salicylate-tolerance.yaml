slug: sulfation-deficit-in-autism-low-salicylate-tolerance
statement: Children with autism characteristically show low plasma sulfate and impaired
  sulfation capacity (Phase II liver detoxification dependent on PAPS). Pathogenic
  gut microbes are sulfate-consuming and contribute to this deficit. Because salicylates
  require sulfation for processing, sulfation-deficient children often react adversely
  to high-salicylate foods that are otherwise considered very healthy (berries, grapes,
  tomatoes, many spices) — presenting as irritability, aggression, hyperactivity,
  and disturbed sleep. The Feingold low-salicylate diet works in this population not
  because salicylates are toxic per se but because they bypass an overwhelmed pathway.
  Restoration of microbiome health and sulfate supply may later allow re-introduction.
evidence_tier: plausible_emerging
