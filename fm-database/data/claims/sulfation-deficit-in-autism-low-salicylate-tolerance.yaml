- id: matthews-energy-blueprint-podcast-2026
  location: Podcast — sulfation segment
  quote: Sulfation gets depleted in the presence of pathogenic microbes and we know
    that to be true in the case of autism — they are low in sulfate. They might need
    at least for a period of time to remove that problematic food until they're able
    to boost up those pathways.
rationale: Explains the paradox of "healthy" foods worsening symptoms; coach can frame
  this to parents who resist removing berries/tomatoes.
