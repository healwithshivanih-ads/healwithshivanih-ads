slug: hrt-may-support-immune-function-in-menopause
statement: Hormone replacement therapy (HRT) may support immune function in menopause
  by restoring estrogen's immunomodulatory effects, and may warrant consideration
  as an immune-health intervention beyond bone, brain, and heart indications.
evidence_tier: confirm_with_clinician
rationale: HRT and immune function is a clinically significant topic that requires
  clinician assessment. The speaker advocates for HRT consideration for immune support,
  which is beyond current mainstream guidelines. Requires prescriber involvement.
coaching_translation: Your coach can share that there is emerging thinking about HRT
  supporting immune health — not just bones and heart — but this is a conversation
  to have with a menopause-specialist clinician.
out_of_scope_notes: Recommending, advising, or endorsing HRT is outside coaching scope.
  Refer clients to a menopause-savvy clinician for this conversation.
caveats:
- Prescriber decision only.
- Not yet a standard clinical indication.
- Individual risk-benefit assessment required.
- Single-expert advocacy without citing immunological RCTs for HRT.
