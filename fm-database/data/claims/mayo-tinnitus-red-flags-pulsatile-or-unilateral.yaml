slug: mayo-tinnitus-red-flags-pulsatile-or-unilateral
statement: Tinnitus that is pulsatile (heartbeat-rhythmic), unilateral, accompanied
  by sudden hearing loss, vertigo, or follows head injury warrants prompt ENT evaluation
  to rule out vascular tumour, acoustic neuroma, otosclerosis, or sudden sensorineural
  hearing loss (a 72-hour treatment window).
evidence_tier: strong
