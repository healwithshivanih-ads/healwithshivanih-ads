slug: mayo-gerd-first-line-lifestyle-anchors
statement: Conventional first-line lifestyle measures for GERD are elevating the head
  of the bed 15 to 20 cm, finishing the last meal at least three hours before lying
  down, weight loss if BMI elevated, smoking cessation, and identifying personal trigger
  foods (chocolate, mint, coffee, alcohol, fatty or fried foods, citrus, tomato).
