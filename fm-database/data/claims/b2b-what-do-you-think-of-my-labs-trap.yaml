slug: b2b-what-do-you-think-of-my-labs-trap
statement: When a client hands over labs and asks 'what do you think of my labs?',
  that is the moment a coach can step out of scope. Instead of interpreting, the coach
  explores who ordered the test, why the client got it and what concern prompted it,
  and what the client wants to do about it on the lifestyle side.
evidence_tier: plausible_emerging
rationale: A concrete, repeatable move that prevents the most common scope slip while
  still engaging warmly with the client's data.
coaching_translation: Treat that question as a neon warning sign; answer with the
  who / why / what questions and 'there's a lot you can do with lifestyle', rather
  than reading the result.
out_of_scope_notes: Giving a clinical read of the labs — even a quick one — is the
  clinician's job.
