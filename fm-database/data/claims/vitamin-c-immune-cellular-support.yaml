slug: vitamin-c-immune-cellular-support
statement: Vitamin C supports immune defense via cellular immune functions and has
  been used clinically in severe COVID-19.
evidence_tier: plausible_emerging
rationale: Vitamin C's role in immune cellular function is well-established. Its IV
  use in ICU COVID-19 settings is emerging; oral use at 1–3 g/day is generally safe.
  The ICU application is clinical, not a coaching recommendation.
coaching_translation: Vitamin C supports the immune cells that fight infection. At
  normal supplement doses it's generally safe and may help reduce illness duration.
out_of_scope_notes: IV/high-dose ICU use is strictly a clinical intervention. Oral
  1–3 g/day coaching-level.
