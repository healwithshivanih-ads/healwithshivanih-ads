slug: riboflavin-stabilizes-mthfr-c677t-enzyme
statement: Riboflavin (vitamin B2), via its role as the FAD cofactor for MTHFR, may
  help stabilize the C677T variant enzyme and improve its activity, supporting 5-MTHF
  production and homocysteine handling.
evidence_tier: plausible_emerging
rationale: The document explains that MTHFR requires FAD (riboflavin-derived) as a
  cofactor, and that the C677T variant enzyme loses this cofactor more easily. Riboflavin
  supplementation may compensate for this instability.
coaching_translation: Think of riboflavin as helping 'glue' the MTHFR enzyme together
  — especially for people with the 677TT variant whose enzyme tends to fall apart.
caveats:
- Source is an LLM synthesis; specific RCTs for enzyme stabilization per se are not
  individually cited.
- Effect is most relevant for 677TT individuals; less evidence in CT or CC genotypes.
