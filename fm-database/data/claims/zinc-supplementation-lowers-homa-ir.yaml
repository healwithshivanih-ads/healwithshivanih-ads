slug: zinc-supplementation-lowers-homa-ir
statement: Zinc supplementation has been shown in multiple studies to lower HOMA-IR,
  a validated measure of insulin resistance.
evidence_tier: plausible_emerging
rationale: Wang et al. (2019, Am J Clin Nutr) systematic review and meta-analysis
  of RCTs supports zinc's glycemic benefits. HOMA-IR reduction is a meaningful clinical
  endpoint. Mineral competition risk noted.
coaching_translation: Zinc — found in oysters, beef, legumes, and nuts — plays a role
  in insulin production and storage. Research suggests supplementing when levels are
  low may improve insulin sensitivity.
out_of_scope_notes: Zinc dosage and duration should be supervised by a clinician due
  to risk of copper and other mineral depletion.
caveats:
- High-dose zinc supplementation can deplete copper and other minerals.
- Clinician oversight required for supplementation decisions.
