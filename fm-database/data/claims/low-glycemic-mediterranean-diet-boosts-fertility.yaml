  location: Chapter 11 — The Egg Quality Diet, pg 156-160
  quote: Women who closely followed a Mediterranean diet before their IVF cycle had
    a 40 percent higher chance of becoming pregnant. Women who closely followed this
    fertility diet had a 60 percent lower risk of ovulatory infertility.
rationale: Foundational dietary pattern claim. Anchor for all fertility nutrition
  coaching.
