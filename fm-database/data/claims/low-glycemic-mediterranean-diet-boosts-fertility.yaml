slug: low-glycemic-mediterranean-diet-boosts-fertility
statement: Adherence to a Mediterranean-pattern diet — high in vegetables, vegetable
  oils (olive oil), legumes, fish, nuts, and low-glycemic-load grains — is associated
  with a 40-65% higher pregnancy rate in IVF and a substantially lower risk of ovulatory
  infertility in the Nurses Health Study. Key drivers appear to be folate, B12, B6,
  and omega-3 fatty acids lowering homocysteine and supporting egg quality.
evidence_tier: strong
