slug: snacking-between-meals-disrupts-gastric-emptying
statement: Eating between meals causes the pyloric sphincter to close and restart
  the digestion cycle, significantly prolonging total gastric transit time and impairing
  overall digestive efficiency.
evidence_tier: plausible_emerging
rationale: The pyloric sphincter regulation mechanism described is physiologically
  plausible and supported by gastric motility research. The Loma Linda nursing study
  referenced in the document provides some corroborating observational evidence.
coaching_translation: Avoid snacking between meals. Once you eat, allow your stomach
  5–6 hours to complete digestion before eating again. If you're hungry, it's a sign
  your previous meal may not have contained enough fibre, protein, or fat.
caveats:
- The Loma Linda study is referenced without citation details.
- Individual variation in gastric motility exists.
- Source is a practitioner talk.
