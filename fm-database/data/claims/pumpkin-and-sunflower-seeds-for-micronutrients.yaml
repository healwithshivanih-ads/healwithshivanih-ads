slug: pumpkin-and-sunflower-seeds-for-micronutrients
statement: Adding pumpkin and sunflower seeds to meals provides zinc, magnesium, vitamin
  E, and healthy fats that support cardiometabolic function.
evidence_tier: plausible_emerging
rationale: Power Punch Smoothie uses 1 tsp each of pumpkin and sunflower seeds as
  toppings. Both seeds are recognised sources of cardioprotective micronutrients.
coaching_translation: A small handful of pumpkin and sunflower seeds on your smoothie
  or salad adds zinc, magnesium, and vitamin E — nutrients that support heart and
  metabolic health.
caveats:
- Small quantities (1 tsp) provide modest nutritional contribution. Consistent daily
  inclusion matters more than any single serving.
