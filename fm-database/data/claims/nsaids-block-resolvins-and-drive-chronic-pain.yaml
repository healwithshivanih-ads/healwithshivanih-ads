- id: murray-energy-blueprint-podcast-2026
  location: Podcast — NSAIDs and resolvins segment
  quote: Everything that we thought we knew about pain relief was wrong because what
    they found was that the treatment of acute pain led to an increase in chronic
    pain. If you're using non-steroidal anti-inflammatory drugs like ibuprofen after
    surgery — it reduces the acute inflammatory process and in the process of suppressing
    that inflammation it also suppresses the formation of compounds in our body called
    resolvins.
rationale: Coach surfaces a hidden iatrogenic driver of chronic pain — NSAID use during
  acute injury phase.
