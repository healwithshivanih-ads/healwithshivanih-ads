slug: nsaids-block-resolvins-and-drive-chronic-pain
statement: Murray cites emerging research arguing that NSAID (ibuprofen, naproxen,
  aspirin) use to treat acute pain paradoxically INCREASES the risk of developing
  chronic pain. The mechanism — NSAIDs suppress the acute inflammatory cascade that
  produces RESOLVINS (specialised pro-resolving mediators derived from omega-3 fatty
  acids). Without resolvins, the inflammatory process never properly resolves, and
  the tissue progresses from acute to chronic inflammation. Coach implication — for
  clients with acute injury, encourage non- pharmacological pain management (cold/heat,
  movement, omega-3-rich diet) before reaching for daily NSAIDs; for clients with
  chronic pain on regular NSAIDs, surface the discussion with their clinician.
evidence_tier: plausible_emerging
