  location: Chapter 92 — Sinus Infections, pg 1507–1508
  quote: In one double-blind, placebo-controlled trial, 103 patients with acute sinusitis
    of presumably bacterial origin were given an extract of P. sidoides (EPs 7630,
    sold under the name Umcka) for a maximum of 22 days. The average decrease in symptom
    severity score was 5.5 points in the EPs 7630 group compared with 2.5 points in
    the placebo group.
