slug: poor-sleep-worsens-insulin-resistance-and-metabolic-health
statement: Insufficient sleep (particularly less than six hours per night cumulatively)
  worsens insulin resistance and significantly increases the risk of developing diabetes
  and poor metabolic health.
evidence_tier: strong
rationale: The association between sleep deprivation and impaired glucose metabolism,
  insulin sensitivity, and T2D risk is robustly supported by multiple RCTs and large
  epidemiological studies.
coaching_translation: Sleep is a metabolic intervention, not a luxury. Consistently
  sleeping less than 6 hours a night directly undermines your blood sugar control
  and increases your risk of type 2 diabetes.
caveats:
- Speaker does not cite specific studies; however, this claim is consistent with strong
  existing literature (e.g., Spiegel, Van Cauter et al.).
