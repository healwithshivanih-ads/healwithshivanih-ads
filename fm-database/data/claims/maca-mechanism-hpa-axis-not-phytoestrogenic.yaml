slug: maca-mechanism-hpa-axis-not-phytoestrogenic
statement: Across multiple human trials, maca produces clinically meaningful effects
  on libido, mood, sexual function, and sperm parameters without changing serum estradiol,
  testosterone, LH, FSH, prolactin, or SHBG. Yeast receptor assays confirm no estrogenic
  or androgenic activity. The mechanism appears to be HPA-axis modulation rather than
  direct hormonal action — relevant when choosing it over phytoestrogenic alternatives
  in hormone-sensitive cases.
evidence_tier: strong
