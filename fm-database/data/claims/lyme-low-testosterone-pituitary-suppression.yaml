slug: lyme-low-testosterone-pituitary-suppression
statement: 99% of Horowitz's chronic Lyme patients show low adrenal function, and
  a substantial subset of male patients in their 20s and 30s present with low testosterone
  driven by Lyme-mediated pituitary suppression of luteinising hormone. Many of these
  men arrive already on testosterone replacement (shots, creams, gels) without realising
  the upstream driver was an active infection shutting down the HPG axis. Treating
  the underlying infection often restores endogenous pituitary signalling. Implication
  — before initiating TRT in a young male with low T and fatigue, screen for tick-borne
  disease, mould, and chronic-fatiguing illness rather than assuming primary hypogonadism.
