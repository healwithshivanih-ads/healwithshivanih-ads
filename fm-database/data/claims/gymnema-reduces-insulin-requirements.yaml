slug: gymnema-reduces-insulin-requirements
statement: Gymnema sylvestre extract (200 mg, 24% gymnemic acid, twice daily) reduces
  insulin requirements in T1DM and improves glycaemic control and reduces drug needs
  in T2DM, while also promoting beta-cell regeneration.
evidence_tier: plausible_emerging
rationale: Small open-label trials (Shanmugasundaram 1990; Baskaran 1990) support
  these effects; no large RCTs. Pizzorno recommends monitoring glucose closely.
coaching_translation: Gymnema sylvestre is a key insulin-sensitising herb — especially
  useful when blood glucose targets aren't met with diet and lifestyle alone.
caveats:
- Diabetics on insulin must monitor blood glucose closely as insulin doses may need
  reduction.
- Capsules/tablets do not produce the tongue-applied sweetness-blocking effect.
