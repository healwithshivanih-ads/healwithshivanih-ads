slug: cd-associated-with-western-diet-high-sugar
statement: Crohn's disease patients habitually consume more refined sugar (122 g/day
  vs. 65 g/day in controls), chemically modified fats, and fast food, and less omega-3–rich
  foods and dietary fibre than healthy controls.
evidence_tier: strong
rationale: Epidemiological data showing CD is virtually nonexistent in populations
  consuming traditional diets and correlates strongly with dietary total fat, animal
  fat, omega-6/omega-3 ratio, and animal protein.
coaching_translation: Reducing refined sugars, processed fats, and increasing fibre
  and omega-3 foods is the most powerful dietary lever for Crohn's disease prevention
  and management.
caveats:
- Epidemiological association does not prove causation; individual dietary triggers
  vary
