slug: migraine-riboflavin-400mg-mitochondrial
statement: Riboflavin (vitamin B2) 400 mg/day is superior to placebo for preventing
  migraine attacks. Up to 40% of migraine sufferers have impaired mitochondrial energy
  production in nerve cells; riboflavin is required for key mitochondrial enzymes.
  Effect begins at 1 month, maximal at 3 months. Excellent therapeutic option due
  to safety and low cost vs prescription prophylaxis. Side effects limited to occasional
  diarrhea and increased urinary frequency.
evidence_tier: strong
