slug: vitamin-d-adequate-levels-enhance-insulin-sensitivity
statement: Adequate vitamin D levels (optimal 50–90 ng/mL) enhance insulin sensitivity
  and modulate immune-inflammatory tone.
evidence_tier: plausible_emerging
rationale: VDR expression in beta-cells and muscle cells is established; observational
  data link deficiency to IR. RCT results for supplementation are mixed but lean toward
  benefit in deficient populations.
coaching_translation: Keeping your vitamin D levels in a healthy range may support
  your body's ability to respond to insulin. Many people are deficient without knowing
  it.
out_of_scope_notes: Testing 25-OH vitamin D and determining appropriate dose is clinician
  scope.
linked_to_topics:
- insulin-resistance
- blood-sugar-dysfunction
linked_to_supplements:
- vitamin-d3
caveats:
- Source is FM synthesis. The optimal range of 50–90 ng/mL is FM-specific and higher
  than conventional 'normal'. Verify with clinician.
