slug: sufficiency-deficiency-toxicity-universal-illness-law
statement: Across all species and all body systems, illness has only two ultimate
  causes — (1) deficiency — a required input (essential nutrient, sleep, movement,
  social connection, sunlight, microbial diversity) is absent or insufficient; (2)
  toxicity — something present in the system that should not be (industrial seed oils,
  refined sugar, additives, heavy metals, pesticides, chronic psychological stress,
  social isolation reframed as social toxicity, even pharmaceutical "side effects"
  which are toxicity signatures by definition). The corollary — health is produced
  by SUFFICIENCY of required inputs and PURITY (absence of toxins). Drug-based interventions
  cannot produce health because they add toxicity to the system without correcting
  either deficiency or environmental toxicity. They can suppress symptoms or modify
  lab numbers while the underlying lifestyle-driven illness continues to progress.
  This model is foundational to how a coach should think about every client presentation
  — ask what is missing and what is present that should not be, then build the intervention
  around addition and removal at the lifestyle level.
