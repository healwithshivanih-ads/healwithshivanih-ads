  quote: We've seen for example that aerobic capacity can be modulated improved by
    24% over the course of short time frames with high beet intake. That's like on
    par with blood doping. We might actually like chew the stuff or taste it to have
    it be particularly effective. It's got to mix with saliva perhaps.
rationale: Concrete coach prescription for fatigue clients without contraindications
  — beet juice is cheap, effect size is large.
