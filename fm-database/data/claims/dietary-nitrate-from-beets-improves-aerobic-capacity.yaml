slug: dietary-nitrate-from-beets-improves-aerobic-capacity
statement: Dietary nitrate from beetroot, leafy greens, and arugula raises aerobic
  capacity by approximately 24% in short-time-frame studies of endurance athletes
  — comparable in magnitude to blood doping. The pathway — food nitrate → oral microbiome
  reduces to nitrite via NOS-3 → systemic nitric-oxide pool → improved mitochondrial
  efficiency, vasodilation, oxygen delivery. The oral component matters — chewing
  and saliva contact appear necessary for full effect. CRITICAL caveat — antibacterial
  mouthwashes kill the oral microbes that perform this conversion and have been shown
  to raise systemic blood pressure. Coach prescription — daily beetroot juice or 2
  cups cooked beets for fatigue / endurance / blood-pressure clients; avoid alcohol-based
  mouthwashes.
evidence_tier: plausible_emerging
