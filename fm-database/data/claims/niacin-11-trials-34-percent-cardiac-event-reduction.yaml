slug: niacin-11-trials-34-percent-cardiac-event-reduction
statement: Meta-analysis of 11 niacin trials including over 9,000 patients demonstrated a 34% reduction in cardiovascular
  events and 25% reduction in major events.
evidence_tier: strong
rationale: Clinician references 11 trials over 9,000 people with specific percentage reductions — consistent with published
  niacin meta-analyses in the cardiovascular literature.
coaching_translation: Across many studies, niacin has been shown to significantly reduce heart attacks and cardiovascular
  events, particularly through its HDL-raising and triglyceride-lowering effects.
caveats:
- Specific meta-analysis not identified by author/year/journal in lecture transcript — verify citation.
- AIM-HIGH and HPS2-THRIVE partially contradicted niacin benefit in already-treated patients.
