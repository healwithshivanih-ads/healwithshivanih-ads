slug: antibiotics-reduce-vitamin-k2-production
statement: Prolonged antibiotic use can suppress gut microbiome commensal bacteria, reducing endogenous vitamin K2 production
  and leading to deficiency.
evidence_tier: plausible_emerging
rationale: Vitamin K2 (menaquinone) is produced by gut bacteria including Bacteroides and Bifidobacterium species. Broad-spectrum
  antibiotics disrupt this microbiome. Evidence is mechanistically strong but clinical studies on the magnitude of K2 depletion
  are limited.
coaching_translation: If you've taken a lot of antibiotics, your gut bacteria — which help make vitamin K2 — may be depleted.
  This is one reason why supporting gut health matters.
caveats:
- Magnitude of K2 depletion from antibiotics varies by antibiotic type and duration — specific RCTs are not cited in the document.
