sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 28 — Breast Cancer (Prevention), pg 570-571
  quote: 50 women who had recently been diagnosed with breast cancer were divided
    into two groups. One group received a muffin containing 25 g ground flaxseed each
    day. The others were given ordinary muffins. When their tumors were removed a
    month later, the women who had received the flaxseed muffins had slower-growing
    tumors than the others.
rationale: Grinding matters — whole flaxseed passes undigested. Use a coffee grinder
  daily; refrigerate ground seed. Add to oats, dahi/yogurt, or chutneys. India-friendly
  format.
