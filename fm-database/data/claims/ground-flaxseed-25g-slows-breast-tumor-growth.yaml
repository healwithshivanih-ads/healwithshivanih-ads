slug: ground-flaxseed-25g-slows-breast-tumor-growth
statement: Ground flaxseed provides lignans that bind estrogen receptors and increase
  sex hormone binding globulin, lowering bioavailable estrogen. In a clinical study,
  50 women newly diagnosed with breast cancer received either a 25 g ground flaxseed
  muffin daily or a control muffin; after one month, removed tumors in the flaxseed
  group showed slower-growing cancer cells. Postmenopausal women supplementing 5–10
  g ground flaxseed daily for one year had significantly reduced estrone sulfate and
  estradiol. Recommend 1–2 tbsp ground flaxseed per day.
evidence_tier: plausible_emerging
