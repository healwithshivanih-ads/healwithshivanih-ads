slug: mayo-gout-acute-attack-presentation
statement: A classic gout attack is sudden onset (often overnight) of intense pain,
  swelling, redness, and warmth in a single joint — typically the base of the big
  toe (podagra) — peaking within 12 to 24 hours and resolving over days to weeks;
  involvement spreads to ankle, knee, hand, wrist, or elbow over time.
