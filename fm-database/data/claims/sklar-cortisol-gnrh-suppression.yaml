slug: sklar-cortisol-gnrh-suppression
statement: Chronically elevated cortisol suppresses hypothalamic GnRH (gonadotropin-
  releasing hormone) release, which in turn lowers pituitary FSH and LH output. Less
  FSH and LH means follicles develop in a poorer hormonal environment, the maturing
  oocyte is compromised, and egg quality declines — explaining the clinical pattern
  of poor IVF response and poor embryo quality in women with high chronic stress burden
  despite apparently normal AMH and antral counts.
evidence_tier: strong
