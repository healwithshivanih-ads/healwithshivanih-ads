slug: high-cortisol-accelerates-ageing-independent-of-sex-hormones
statement: Chronic stress hormones at high levels accelerate ageing, contribute to increased blood sugar,
  elevated cholesterol, heart disease, memory loss, and osteoporosis, even when estrogen and progesterone
  are circulating in normal amounts.
evidence_tier: plausible_emerging
rationale: 'Each listed outcome has independent research support linking sustained hypercortisolaemia
  to the relevant pathway: cortisol raises blood glucose via gluconeogenesis; raises LDL; is pro-atherogenic;
  is associated with hippocampal atrophy; suppresses osteoblasts.'
coaching_translation: The damage from chronic stress is not just about low hormones — high cortisol actively
  accelerates how fast you age, even if your periods are still regular and your hormone tests look fine.
out_of_scope_notes: ''
caveats:
- 'Each individual pathway is supported, but the ''even with normal sex hormones'' framing requires qualification:
  the protective effects of estrogen may partially offset cortisol damage at the tissue level.'
