slug: gluten-dairy-alcohol-ultra-processed-foods-top-midlife-triggers
statement: The most common food sensitivity triggers in midlife women are gluten (especially
  US dwarf hybrid wheat treated with glyphosate), cow's milk dairy, alcohol, high-histamine
  foods, and ultra-processed foods containing artificial sweeteners and emulsifiers.
evidence_tier: fm_specific_thin
rationale: The speaker's trigger list is consistent with common functional medicine
  clinical experience. Glyphosate concerns and hybrid wheat claims are contested in
  mainstream science. Artificial sweetener impacts on gut lining have some emerging
  evidence. Overall, this is an FM-consistent clinical framework with variable scientific
  support across items.
coaching_translation: In midlife, the foods most likely to cause new sensitivities
  are gluten, dairy (especially cow's milk), alcohol, leftover or fermented high-histamine
  foods, and ultra-processed foods with artificial sweeteners or emulsifiers.
caveats:
- Glyphosate-as-trigger claim is contested; evidence is animal-model-based and not
  established in human RCTs.
- High-histamine food reactivity may indicate histamine intolerance requiring clinician
  evaluation.
- Single-expert source; individual variation is high.
