slug: emulsifiers-and-additives-harm-gut-barrier
statement: Emulsifiers and additives such as carboxymethylcellulose and polysorbate-80
  degrade the protective gut mucous barrier, promoting bacterial translocation, leaky
  gut and inflammation, and are linked to rising rates of inflammatory bowel disease.
evidence_tier: plausible_emerging
rationale: Cites additive/mucous-barrier studies including CMC-induced SIBO in mice.
coaching_translation: Heavily processed, emulsified foods can thin the gut's protective
  lining — worth minimising, especially with autoimmune issues.
