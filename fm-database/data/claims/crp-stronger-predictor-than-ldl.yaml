slug: crp-stronger-predictor-than-ldl
statement: CRP level is a stronger predictor of cardiovascular events than LDL-C level;
  screening for both biomarkers is more prognostic than either alone.
evidence_tier: strong
rationale: Multiple prospective studies (e.g., Ridker et al.) established hs-CRP as
  superior predictor over LDL-C; well-cited in cardiology literature.
coaching_translation: Your inflammation marker (CRP) tells your doctor more about
  heart risk than cholesterol alone — ask to have both checked.
