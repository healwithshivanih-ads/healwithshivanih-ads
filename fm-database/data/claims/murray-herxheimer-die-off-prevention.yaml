slug: murray-herxheimer-die-off-prevention
statement: 'When antifungal agents rapidly kill candida, the body must process large
  quantities of yeast toxins, cell fragments, and antigens — producing a Herxheimer
  (die-off) reaction with worsening symptoms including headache, fatigue, brain fog,
  GI upset, body aches, and rashes. Prevention strategy: (1) Follow candida control
  diet for ≥2 weeks before any antifungal, (2) Support liver function with lipotropic
  factors (1,000 mg choline + 1,000 mg methionine) and silymarin, (3) Start antifungals
  at low doses and titrate up over 1 month. The Herxheimer is real and uncomfortable
  but typically resolves within 3-7 days.'
evidence_tier: plausible_emerging
rationale: Long clinical observation. Mechanism — endotoxin release + immune complex
  formation overwhelming hepatic clearance + binding pathways. Mainstream medicine
  has been slow to acknowledge but FM clinicians see it routinely.
coaching_translation: 'When you kill off candida fast, you feel WORSE before better
  — headaches, fatigue, brain fog, joint aches. This is the Herxheimer or die-off
  reaction. PREVENT it by: 2 weeks of candida diet BEFORE adding antifungals, supporting
  liver (silymarin + lipotropic factors), starting low + slow titration over a month.
  Also: psyllium 3-5 g at bedtime to bind dead yeast cells so they''re excreted not
  absorbed. Adequate water + electrolytes during die-off phase.'
caveats:
- Severe Herxheimer requires slowing protocol, not stopping
- Differentiate Herxheimer from drug allergy or infection — fever should not exceed
  38.5°C
- Coordinate with clinician if symptoms severe
