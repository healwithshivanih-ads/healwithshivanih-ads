slug: lyme-alzheimers-ptau-217-reversal
statement: Horowitz's 2026 case study in the Journal of Alzheimer's Disease Reports
  describes the first documented reversal of an Alzheimer's biomarker in a live patient
  using infection-targeted therapy. Plasma p-tau 217 — the most sensitive and specific
  Alzheimer's biomarker — dropped 63% in 9 weeks on Dapsone Combination Therapy for
  chronic Lyme, vs ~23% over 6 years with anti-amyloid monoclonal antibodies (lecanemab,
  donanemab) per the Cochrane meta-analysis. The patient also reversed long-standing
  positive rheumatoid factors to normal, consistent with autoimmunity-as-bystander
  resolving once the infectious driver was treated. Suggests 30-40% of Alzheimer's
  cases may have an infectious driver (Borrelia, P. gingivalis, herpes 1/2, HHV-6,
  Chlamydia pneumoniae). Implication — screen for Lyme + tick-borne co-infections
  before initiating anti-amyloid monoclonal therapy.
