slug: magnesium-glycinate-or-threonate-used-for-mental-calm
statement: Magnesium glycinate and threonate are recommended for mental calm, while
  magnesium oxide is discouraged due to poor absorption.
evidence_tier: fm_specific_thin
rationale: Magnesium glycinate and threonate form preferences for mental health are
