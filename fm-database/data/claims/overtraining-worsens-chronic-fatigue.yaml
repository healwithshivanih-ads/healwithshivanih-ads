slug: overtraining-worsens-chronic-fatigue
statement: High-intensity overtraining exacerbates chronic fatigue by depleting energy
  reserves; switching to low-impact exercise (yoga, tai chi) improves energy levels
  in fatigued clients.
evidence_tier: plausible_emerging
rationale: Exercise-induced energy expenditure exceeding recovery capacity (overtraining
  syndrome) worsening fatigue is well-documented in sports medicine. Application to
  chronic disease populations (cancer, fibromyalgia) is supported by clinical observation
  and some RCT data on graded exercise.
coaching_translation: Some of your most motivated clients are actually training too
  hard and making their fatigue worse. Help them see that rest, yoga, and tai chi
  are not giving up — they are medicine.
caveats:
- Source is expert FM lecture.
- Individualisation is essential — some clients need more movement, others less.
