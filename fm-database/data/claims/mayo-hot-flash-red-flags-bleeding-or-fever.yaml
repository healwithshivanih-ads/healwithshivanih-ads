slug: mayo-hot-flash-red-flags-bleeding-or-fever
statement: Vaginal bleeding after 12 months of amenorrhoea, drenching night sweats
  with weight loss or fever, or hot flashes that begin before age 40 warrant medical
  evaluation to rule out endometrial pathology, infection, malignancy, or premature
  ovarian insufficiency.
