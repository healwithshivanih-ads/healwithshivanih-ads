slug: vitamin-d-is-a-pro-hormone-for-multiple-hormones
statement: Vitamin D functions as a pro-hormone and is a precursor for the formation
  of multiple hormones inside the body; deficiency impairs overall hormonal production.
evidence_tier: plausible_emerging
rationale: Vitamin D's role as a steroid hormone precursor and its action via nuclear
  receptors is well-established. Its influence on steroidogenesis beyond calcium metabolism
  is supported but not yet confirmed as clinically impactful across all hormone axes
  at the level of strong consensus.
coaching_translation: Vitamin D is much more than a bone nutrient — it's actually
  a hormone your body needs to make other hormones. Low vitamin D can quietly undermine
  your entire hormonal system.
caveats:
- Source is FM lecture (moderate quality). While vitamin D's pro-hormone role is established,
  broad impact on all reproductive hormones is plausible_emerging.
