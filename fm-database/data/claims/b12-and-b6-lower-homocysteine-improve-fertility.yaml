slug: b12-and-b6-lower-homocysteine-improve-fertility
statement: Vitamins B12 and B6 work alongside folate to keep homocysteine low, which
  improves embryo quality and reduces miscarriage risk. Vegetarians and especially
  vegans are commonly B12-deficient and benefit disproportionately from supplementation.
  Vitamin B6 supplementation has been associated with ~40% higher conception rate
  and ~30% lower early miscarriage rate.
evidence_tier: strong
linked_to_topics:
- preconception-protocol
- egg-quality
sources:
- id: fett-it-starts-with-the-egg-2019
  location: Chapter 5 — Prenatal Multivitamins, pg 83-84; Chapter 11, pg 156-157
  quote: Vitamin B12, like folate, decreases homocysteine. Research has established
    that giving vitamin B6 supplements to women with infertility increases the chance
    of conception by 40 percent and decreases early miscarriage by 30 percent.
rationale: Particularly relevant for Indian vegetarian context where B12 deficiency
  is widespread.
