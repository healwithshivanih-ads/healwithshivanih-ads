slug: tofi-normal-bmi-high-body-fat-metabolic-risk
statement: Individuals with normal BMI can have metabolically dangerous levels of
  body fat ('skinny fat' or TOFI — Thin Outside Fat Inside), which is only detectable
  through body fat percentage measurement.
evidence_tier: strong
rationale: The TOFI phenotype is well-described in peer-reviewed literature; metabolic
  risk in normal-weight individuals with high visceral fat is established.
coaching_translation: You can't always see metabolic dysfunction from the outside.
  Some clients who look healthy or 'thin' may carry significant hidden fat around
  their organs — which is why body composition testing matters.
