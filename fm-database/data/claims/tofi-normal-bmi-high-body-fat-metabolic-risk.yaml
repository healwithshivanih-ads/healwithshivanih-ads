  location: Body Composition Scenarios Section
  quote: This is the skinny fat. Toffee, for example, thin on the outside, fat on
    the inside. And we can get fooled. They might have a completely normal BMI...
    but when you do percentage of body fat, you see that their percentage of body
    fat is too high and their lean muscle mass is too low.
