slug: mayo-jet-lag-timed-light-exposure-primary-lever
statement: Properly timed bright-light exposure is the strongest non-drug intervention
  — morning light after eastbound travel to advance the clock, evening light after
  westbound travel to delay it; avoiding light at the wrong time matters as much as
  catching it at the right time.
