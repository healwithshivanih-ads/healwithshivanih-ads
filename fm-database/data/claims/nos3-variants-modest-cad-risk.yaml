slug: nos3-variants-modest-cad-risk
statement: A HuGE (Human Genome Epidemiology) review of NOS3 (eNOS) gene variants
  found modest per-allele coronary-artery-disease odds ratios — roughly 1.17 for
  Glu298Asp, 1.17 for -786T>C, and 1.12 for intron 4 — meaningfully elevated risk,
  but far from deterministic. Associations with hypertension, preeclampsia, stroke,
  and diabetes specifically remain uncertain.
evidence_tier: plausible_emerging
rationale: Sets realistic expectations for how much weight a NOS3 result should
  carry relative to standard modifiable cardiometabolic risk factors.
coaching_translation: A NOS3 variant is a modest risk contributor, not a diagnosis
  — standard cardiometabolic levers (lipids, blood pressure, glucose, movement,
  inflammation) still do most of the work regardless of genotype.
out_of_scope_notes: Family history and standard risk-factor management remain the
  primary coaching levers; genetic result interpretation stays clinical.
caveats:
- Associations with hypertension, preeclampsia, and stroke specifically are NOT
  well established per this review — do not extrapolate the CAD finding to
  those conditions.
