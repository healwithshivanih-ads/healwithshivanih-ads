slug: high-fiber-diet-reduces-breast-cancer-via-estrogen-excretion
statement: 'High dietary fiber reduces breast cancer risk by promoting excretion of excess estrogen: a
  high-fiber diet limits fecal bacteria that re-activate conjugated estrogens, resulting in more estrogen
  leaving the body via stool rather than being reabsorbed.'
evidence_tier: plausible_emerging
rationale: Supported by the enterohepatic recirculation of estrogen model; a Canadian study of 56,000
  women cited in the book showed 30% less breast cancer in women on a high-fiber diet vs. low-fiber.
coaching_translation: Eating plenty of vegetables, fruits, and whole grains helps your body actually flush
  out excess estrogen through your bowels rather than recycling it — a 30% reduction in breast cancer
  risk was seen in studies of high-fibre eating women.
out_of_scope_notes: ''
caveats:
- Observational data; causality not fully established — fibre intake is a marker for overall dietary quality.
  Mechanism (reduced beta-glucuronidase activity) is biologically plausible but individual effect size
  varies.
