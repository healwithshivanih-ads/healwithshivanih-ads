slug: sleep-exercise-stress-affect-gi-tract
statement: Lifestyle factors — sleep, exercise, and stress — all directly affect the GI tract, and balancing them is essential
  to an optimal digestive system (5R Rebalance step).
evidence_tier: strong
rationale: The relationship between stress (HPA axis, cortisol), sleep deprivation, and gut motility/microbiome is well-established
  in the scientific literature.
coaching_translation: Your gut is sensitive to your lifestyle. Poor sleep, chronic stress, and lack of movement can all worsen
  gut symptoms. This is why the 5R approach includes rebalancing lifestyle as a core step.
