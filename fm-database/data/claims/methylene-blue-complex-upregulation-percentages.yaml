slug: methylene-blue-complex-upregulation-percentages
statement: Methylene blue upregulates mitochondrial respiratory complexes I, II, and
  III by approximately 110 percent, but complex IV (cytochrome c oxidase) by only
  approximately 70 percent — creating a residual bottleneck at the final step. Red
  light at 660 nm directly stimulates cytochrome c, addressing this bottleneck and
  completing the synergistic effect. This is the mechanistic reason combining methylene
  blue with 660 nm red light therapy outperforms either alone, especially for cognitive
  enhancement, neurodegenerative disease support, and post-exertion fatigue recovery.
