slug: higher-omega3-to-omega6-ratio-associated-with-lower-breast-cancer-risk
statement: A higher ratio of omega-3 to omega-6 in serum phospholipids is associated with a significantly lower risk of developing
  breast cancer.
evidence_tier: plausible_emerging
rationale: Cited as a meta-analysis of 27,135 adult females in the lecture. Serum phospholipid ratio reflects dietary intake.
  Source is FM lecture of moderate quality; meta-analysis not specifically named.
coaching_translation: Improving your omega-3 to omega-6 balance isn't just about inflammation — it may also help reduce long-term
  breast cancer risk.
caveats:
- Meta-analysis is observational; causation not established.
- Source is FM lecture; primary meta-analysis not named.
- Breast cancer risk involves many factors beyond fatty acid ratios.
