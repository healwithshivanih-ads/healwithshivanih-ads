slug: zonulin-is-marker-for-intestinal-permeability
statement: Zonulin, a protein secreted by intestinal tight junctions, rises in tissue
  and blood when gut barrier integrity is compromised, and can be measured via stool
  testing to assess the degree of intestinal permeability.
evidence_tier: plausible_emerging
rationale: Zonulin as a permeability marker has scientific support (Fasano et al.)
  though its specificity as a standalone diagnostic marker is debated. GI map stool
  testing can include zonulin.
coaching_translation: Elevated zonulin on a stool test signals that the gut barrier
  may be 'leaking' — this helps guide the repair phase of a gut healing protocol.
out_of_scope_notes: Lab interpretation is clinician scope.
caveats:
- Zonulin specificity as a diagnostic tool is debated in peer-reviewed literature.
- Source does not cite specific studies.
