sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 95 — Stroke (Recovery From), pg 1530
  quote: GPC is even better studied, as it has been administered in six clinical trials
    to almost 3,000 patients suffering from a stroke. The single largest trial was
    conducted at 176 centers in Italy and included 2,044 patients. At the end of the
    six-month trial, the investigators found that GPC significantly helped more than
    95% of patients and was without side effects.
rationale: Choose either citicoline OR GPC, not both — same pathway. GPC has the larger
  evidence base; oral 400 mg three times daily is the practical sustained dose after
  the initial IM phase.
