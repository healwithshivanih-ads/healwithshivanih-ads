slug: glycerophosphocholine-gpc-stroke-recovery
statement: 'Glycerophosphocholine (alpha-GPC), another highly bioavailable choline
  source, has been studied in six clinical trials totaling nearly 3,000 post-stroke
  patients. Standard protocol: 1,000 mg intramuscularly daily during inpatient phase
  (first 28 days), then 400 mg three times per day orally through day 180. In the
  largest trial (2,044 patients across 176 Italian centers), investigators rated GPC
  as "very good" or "good" in 78% of patients, "moderate" in 17%, and "poor/none"
  in just 5%, with no significant side effects.'
evidence_tier: plausible_emerging
