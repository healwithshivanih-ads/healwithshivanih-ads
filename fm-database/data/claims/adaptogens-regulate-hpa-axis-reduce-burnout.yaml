slug: adaptogens-regulate-hpa-axis-reduce-burnout
statement: Adaptogenic herbs (ashwagandha, rhodiola) regulate HPA axis response and
  are clinically useful for fatigue, burnout, and adrenal imbalance.
evidence_tier: plausible_emerging
rationale: Both ashwagandha and rhodiola have multiple RCTs demonstrating cortisol-lowering,
  fatigue-reducing, and stress-resilience effects. HPA axis modulation is well-supported
  mechanistically and clinically for these specific herbs.
coaching_translation: Adaptogenic herbs like ashwagandha and rhodiola help your body
  better manage the stress response—they work with your adrenal system rather than
  overstimulating it. They are among the best-studied botanicals for burnout and fatigue.
caveats:
- Specific dosing and herb selection should be guided by a clinician.
- Contraindications exist (e.g., ashwagandha in thyroid conditions, pregnancy).
- Source is educational synthesis.
