slug: stress-and-lack-of-sleep-create-acid-environment
statement: Stress, anxiety, and lack of sleep all contribute to a more acidic cellular
  environment, potentially counteracting even an excellent diet.
evidence_tier: plausible_emerging
rationale: Psychological stress activates the HPA axis and sympathetic nervous system,
  producing metabolic byproducts and cortisol that can influence acid-base balance.
  Sleep deprivation is associated with elevated inflammatory markers and metabolic
  disruption. While the specific cellular pH impact is not well-quantified, the general
  direction is physiologically plausible.
coaching_translation: Even the best diet can be undermined by chronic stress and poor
  sleep — both push your body toward an acidic state. Stress management and sleep
  are non-negotiable foundations.
caveats:
- The direct effect of stress and sleep deprivation on cellular pH specifically is
  not well-quantified in peer-reviewed literature. This is a plausible extrapolation.
- Source is a lecture transcript.
