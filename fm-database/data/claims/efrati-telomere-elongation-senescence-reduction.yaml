  quote: For the first time in humans — not in mice, not in animal models — we can
    see that we can actually take biology back in time at the cellular level — elongation
    of telomeres and the reduction of the senescent cells. Skin biopsies show proliferation
    of stem cells, more collagen and more elastic tissue.
rationale: One of the strongest pieces of evidence FM coaches will be asked about
  regarding HBOT and longevity.
