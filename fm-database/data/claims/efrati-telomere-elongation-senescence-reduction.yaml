slug: efrati-telomere-elongation-senescence-reduction
statement: In humans completing the Sagol Center HBOT longevity protocol, telomeres
  in isolated immune cells lengthened and circulating senescent cell counts decreased
  significantly — the first demonstration of measurable cellular-aging reversal in
  humans (not mice). Skin biopsies showed stem-cell proliferation, increased collagen
  and elastic tissue. These findings are widely cited but the clinical translation
  to lifespan extension has not been measured.
evidence_tier: strong
