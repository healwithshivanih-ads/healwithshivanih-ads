slug: four-pillars-of-perimenopause-protocol
statement: Snyder's four-pillar foundation for perimenopausal clients, in order —
  (1) self-data collection (track cycle, symptoms, baseline labs including DEXA, full
  hormone panel; wearable HRV/RHR to spot real-time stress); (2) cellular energy support
  (metabolically healthy plate with omega-3s, fibre, micronutrients, antioxidants,
  probiotic-rich foods; blood-sugar stabilisation; strength training 3-4 times per
  week + 12,000 daily steps); (3) circadian rhythm optimisation (sleep consistency,
  light cycles, meal timing); (4) connection and mental health (community, intentional
  friendship; 84% of menopausal women in a Mayo Clinic study don't seek care partly
  because of judgement). HRT comes as an optimiser ONLY when these foundational pillars
  are in place.
evidence_tier: plausible_emerging
