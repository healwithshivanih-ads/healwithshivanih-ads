slug: sklar-estrogen-metabolism-via-dutch-not-serum
statement: A single serum estradiol level captures one moment in time but says nothing
  about how the body is metabolising estrogen across the three hydroxylation pathways
  (2-OH protective, 4-OH and 16-OH inflammatory); the DUTCH panel maps this metabolism
  and surfaces whether excess estrogen is being cleared safely or driving an inflammatory
  uterine environment that compromises implantation.
