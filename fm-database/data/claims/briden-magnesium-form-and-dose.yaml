slug: briden-magnesium-form-and-dose
statement: For perimenopause and women's hormonal health, the preferred magnesium
  forms are magnesium glycinate, bisglycinate, or threonate — all gentle on digestion
  and well-absorbed. Effective dose is 300-400 mg of elemental magnesium daily. Avoid
  magnesium if you have kidney disease, sarcoidosis, or hyperparathyroidism. Magnesium
  can interfere with bisphosphonates and thyroid hormones — separate by 4 hours.
evidence_tier: confirm_with_clinician
rationale: Bioavailability of glycinate, bisglycinate, threonate is established in
  nutritional pharmacology. Renal-failure and absorption-interference cautions are
  standard.
coaching_translation: Stick to glycinate, bisglycinate, or threonate forms — magnesium
  oxide is poorly absorbed and causes loose stools. Take separately from thyroid medication
  and any bisphosphonate.
out_of_scope_notes: ''
caveats:
- Separate from levothyroxine by 4 hours.
- Reduce or avoid with stage 4-5 kidney disease, sarcoidosis, or hyperparathyroidism.
