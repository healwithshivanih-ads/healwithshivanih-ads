slug: inflammation-is-downstream-find-upstream-cause
statement: When a client presents with chronic inflammation (high hs-CRP, inflammatory
  cytokine elevation), Sandison emphasises that inflammation itself is downstream
  and the coach must investigate what is TRIGGERING it — common upstream drivers include
  chronic infection, traumatic brain injury, sleep apnoea, high blood sugar, structural
  airway problems, mycotoxin exposure, or unresolved emotional stress. Simply piling
  on anti-inflammatory supplements (fish oil, turmeric) or pharmaceutical anti-inflammatories
  (NSAIDs, steroids) without addressing the trigger misses the healing opportunity
  and can do harm — steroids in particular suppress immunity, drive bone loss and
  exacerbate adrenal dysfunction.
