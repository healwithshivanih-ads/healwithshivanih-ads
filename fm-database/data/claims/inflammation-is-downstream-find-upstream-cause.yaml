- id: sandison-energy-blueprint-podcast-2026
  location: Podcast — inflammation reframing segment
  quote: Inflammation is a natural process. If that inflammation lasts for a really
    long time we want to understand what happened. Typically inflammation starts because
    something triggers it. And if we miss the opportunity to ask what was the trigger
    we miss the opportunity to get real healing. Why not take anti-inflammatory drugs
    if the cause is inflammation? Steroids suppress immune function, make us more
    at risk for other infections, can create bone loss, can create adrenal issues.
rationale: Reframes "I have high CRP, give me anti-inflammatories" into "let's find
  what's driving the CRP" — central coach narrative.
