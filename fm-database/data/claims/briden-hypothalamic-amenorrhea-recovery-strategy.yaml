slug: briden-hypothalamic-amenorrhea-recovery-strategy
statement: 'Recovery from hypothalamic amenorrhea requires convincing the hypothalamus
  that conditions are safe: eat more (often >2500 kcal/day for active women), eat
  regularly across the day, ensure adequate carbohydrate intake (some women are particularly
  sensitive to low-carb diets), get adequate protein, fats, and micronutrients including
  zinc and iodine, train less, rest more, and reduce psychological stress. Even with
  everything done right, the lag time to period return is typically 3-6 months because
  of inherent delay in follicular maturation.'
evidence_tier: strong
rationale: FHA recovery via energy availability restoration is established. The 2500
  kcal threshold for active women is a commonly cited working figure (true value varies
  by individual energy expenditure).
coaching_translation: Coach the food-first recovery for HA — adequate calories with
  carbohydrate, regular meals, full nourishment, less training, more rest. Set the
  expectation of a 3-6 month lag before periods return. Do not start vitex or any
  cycle-regulating herb in active HA.
