slug: probiotics-deferred-until-gut-lining-stabilises
statement: Introducing probiotics and prebiotics to an acutely inflamed gut with dysbiosis
  can worsen bloating and symptoms; they should be deferred until the gut lining is
  stabilising (typically 2–3 months into the protocol).
evidence_tier: plausible_emerging
rationale: Adding exogenous bacteria to an already dysbiotic, inflamed environment
  can increase fermentation and gas production, worsening bloating. While clinical
  evidence for a strict 3-month deferral threshold is limited, this is consistent
  with functional medicine practice principles and basic gut physiology.
coaching_translation: Probiotics are powerful tools — but timing matters. If your
  gut is inflamed, adding more bacteria (even good ones) can backfire and make bloating
  worse. We wait until your gut is calmer before introducing them.
caveats:
- The 3-month timeframe is a clinical rule of thumb, not a rigorously established
  threshold. Response should guide timing.
- Source is FM lecture synthesis.
