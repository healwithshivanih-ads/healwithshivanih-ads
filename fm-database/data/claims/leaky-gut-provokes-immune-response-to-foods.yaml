slug: leaky-gut-provokes-immune-response-to-foods
statement: When the small intestinal lining is breached, food particles leak into
  the bloodstream and provoke an immune response, resulting in food sensitivity symptoms.
evidence_tier: plausible_emerging
rationale: This describes the proposed mechanism of non-IgE food sensitivity via intestinal
  hyperpermeability. The mechanistic model is well-articulated in functional medicine
  literature and has emerging support, though peer-reviewed RCT consensus remains
  limited.
coaching_translation: A compromised gut lining lets partially digested food into the
  bloodstream, where the immune system treats it as a threat — causing reactions like
  bloating, rashes, fatigue, or joint pain.
caveats:
- Single-expert source; mechanism is plausible but not fully validated in peer-reviewed
  consensus.
- Symptom variability is high — some individuals with leaky gut may have no overt
  symptoms.
