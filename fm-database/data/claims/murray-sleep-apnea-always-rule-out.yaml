out_of_scope_notes: Sleep study referral + CPAP titration + surgical consideration
  are clinician scope. Coach role — screening, referral, weight-loss support, avoid
  sedating supplements until ruled out.
sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 71 — Insomnia, pg 1178–1179
  quote: Early recognition and treatment of sleep apnea are important because the
    disorder is also associated with irregular heartbeat, high blood pressure, heart
    attack, and stroke as well as a loss of memory function and of other intellectual
    capabilities. Alcohol and sleeping pills increase the frequency and duration of
    breathing pauses in people with sleep apnea. Obesity is the major risk factor,
    and weight loss is the most important aspect of long-term management.
