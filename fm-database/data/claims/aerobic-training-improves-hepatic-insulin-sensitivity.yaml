slug: aerobic-training-improves-hepatic-insulin-sensitivity
statement: Seven days of aerobic training improves hepatic insulin sensitivity, partly
  via AMPK stimulation that suppresses hepatic glucose production.
evidence_tier: plausible_emerging
rationale: Hepatic AMPK activation by exercise is a recognized pathway in preclinical
  and early clinical research. The 7-day timeframe suggests rapid hepatic adaptation.
  Not yet strong consensus in clinical guidelines.
coaching_translation: Even one week of aerobic exercise can begin to improve how your
  liver manages blood sugar — the liver is a key player in keeping glucose levels
  steady.
caveats:
- Specific 7-day timeframe cited without primary reference in the source document.
- Source is a coaching toolkit.
