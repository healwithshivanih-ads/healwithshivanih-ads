slug: parkinson-glutathione-mitochondrial-dysfunction-driver
statement: The earliest biochemical change in Parkinson's disease is a decrease in
  glutathione, the brain's primary antioxidant. This makes neurons vulnerable to oxidative
  damage from environmental toxins. Pesticides, heavy metals (copper, iron, lead,
  manganese), and well water exposure all share a common mechanism — they deplete
  glutathione and disrupt mitochondrial function. Total neurotoxin load may matter
  more than any single exposure.
evidence_tier: plausible_emerging
