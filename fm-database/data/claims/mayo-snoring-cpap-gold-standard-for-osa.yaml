slug: mayo-snoring-cpap-gold-standard-for-osa
statement: When sleep study confirms OSA, continuous positive airway pressure (CPAP)
  is the conventional first-line treatment — eliminates apnoeas, reduces cardiovascular
  and metabolic risk, and resolves daytime sleepiness; mask fit and pressure titration
  determine adherence.
