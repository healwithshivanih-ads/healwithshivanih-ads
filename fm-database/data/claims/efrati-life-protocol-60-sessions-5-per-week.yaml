  quote: We need 60 sessions, six zero sessions, daily session, each session two hours
    generating the fluctuation that we discussed in five days a week. So it is not
    magic — with each session to the other we are increasing the stem cells, bringing
    the mediators that are responsible for regeneration.
rationale: Anchors any coach client question about HBOT dosing to the published Sagol
