slug: efrati-life-protocol-60-sessions-5-per-week
statement: The Sagol Center longevity protocol used in Efrati's randomised trials
  consists of 60 daily HBOT sessions delivered 5 days per week (approximately 12 weeks
  total), with each session running ~2 hours at clinical pressures (~2 ATA, 100 percent
  oxygen via mask) and incorporating intermittent air-brake cycles every 20 minutes
  to trigger the hyperoxic-hypoxic paradox. Coach scope — pressures, durations, and
  total session counts must be set by a qualified hyperbaric physician based on the
  individual's indication and pre-treatment imaging.
evidence_tier: confirm_with_clinician
