slug: broccoli-sprouts-support-glutathione
statement: Broccoli and radish sprouts—particularly broccoli sprouts harvested on
  day three—contain sulforaphane and other glucosinolates that induce Nrf2-mediated
  upregulation of GST and GPX enzymes, supporting endogenous glutathione production.
evidence_tier: plausible_emerging
rationale: Sulforaphane from broccoli sprouts inducing Nrf2/ARE pathway and upregulating
  phase II detox enzymes including GSTs is well supported in peer-reviewed literature
  with RCT evidence in some populations.
coaching_translation: Growing or purchasing broccoli sprouts and eating them raw (day
  3 after sprouting for peak sulforaphane) is an evidence-backed food strategy to
  support GST enzyme activity and glutathione levels. Pair with radish sprouts for
  added effect per Lynch.
caveats:
- Sulfur-sensitive clients should introduce brassica sprouts cautiously
