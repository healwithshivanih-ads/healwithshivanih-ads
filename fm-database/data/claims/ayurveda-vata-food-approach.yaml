slug: ayurveda-vata-food-approach
statement: For a vata constitution or vata aggravation, favour warm, moist, well-cooked, grounding, oily
  foods with sweet/sour/salty tastes (cooked fruits, root and cooked vegetables, cooked rice and wheat,
  dairy, ghee, nuts, warming spices) and reduce cold, raw, dry, light, bitter and astringent foods (dried
  fruit, raw vegetables, most beans, crackers, caffeine, iced drinks).
evidence_tier: fm_specific_thin
rationale: From the Ayurvedic Institute / Lad Food Guidelines for Basic Constitutional Types — traditional
  dosha-food matching (like increases like; opposite qualities balance).
coaching_translation: ''
