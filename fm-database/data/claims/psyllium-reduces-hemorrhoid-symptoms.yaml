sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 60 — Hemorrhoids, pg 1025-1028
  quote: Several double-blind clinical trials have demonstrated that supplementing
    the diet with bulk-forming fiber can significantly reduce the symptoms of hemorrhoids
    (bleeding, pain, itching, and prolapse) and improve bowel habits.
