slug: psyllium-reduces-hemorrhoid-symptoms
statement: Psyllium seed husk (5 g at bedtime with 6 to 8 ounces of water) is a gel-forming
  soluble fiber that bulks and softens stools without the irritation of wheat bran,
  reducing hemorrhoidal bleeding, pain, itching, and prolapse in double-blind trials.
evidence_tier: strong
linked_to_topics:
- hemorrhoids
- constipation
linked_to_supplements:
