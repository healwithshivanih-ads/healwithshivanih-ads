slug: omega-3-supports-anti-inflammatory-state
statement: Omega-3 fatty acids provide anti-inflammatory support relevant to both
  autoimmune skin conditions (psoriasis) and hormonal balance.
evidence_tier: strong
rationale: EPA and DHA from omega-3 fatty acids are well-established precursors to
  anti-inflammatory eicosanoids (resolvins, protectins). Meta-analyses support their
  use in inflammatory skin conditions including psoriasis, and observational data
  links omega-3 intake to improved menstrual pain.
coaching_translation: Omega-3 fats are some of the most well-researched nutrients
  for reducing inflammation — relevant whether you're dealing with skin flares, period
  pain, or general immune overactivity.
