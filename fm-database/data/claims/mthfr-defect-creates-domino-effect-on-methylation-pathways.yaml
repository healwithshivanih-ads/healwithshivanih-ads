slug: mthfr-defect-creates-domino-effect-on-methylation-pathways
statement: MTHFR enzyme dysfunction creates a cascading 'domino effect', impairing homocysteine remethylation, SAM production,
  neurotransmitter synthesis (dopamine, serotonin), DNA methylation, and glutathione production.
evidence_tier: plausible_emerging
rationale: The interconnected nature of methylation pathways is biochemically well-described. The document systematically
  explains how MTHFR dysfunction impairs downstream processes including neurotransmitter synthesis, DNA/RNA methylation, and
  glutathione production.
coaching_translation: MTHFR is not just about homocysteine — it affects mood, energy, detoxification, and gene expression.
  Supporting methylation comprehensively (with all relevant B vitamins) addresses multiple systems at once.
caveats:
- Clinical significance of MTHFR variants varies widely; not all carriers have clinically meaningful impairment.
- Source is expert lecture of moderate quality.
