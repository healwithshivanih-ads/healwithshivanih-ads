- id: hadanny-efrati-2020-hyperoxic-hypoxic-paradox
  location: Section 4.5 Stem Cells — combination therapy
  quote: The potential added value of using HBOT in addition to stem cell injections
    was seen in a variety of tissues, including brain, spinal cord and peripheral
    nerves, myocardium, and diabetic wounds. In all those studies, adding HBOT to
    stem cell injections had synergistic beneficial effects.
rationale: Useful when clients ask whether HBOT pairs with regenerative injection
  therapies.
