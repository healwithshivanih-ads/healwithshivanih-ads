slug: hbot-stem-cell-plus-hbot-synergy-multi-tissue
statement: When stem-cell injections are combined with HBOT versus delivered alone,
  synergistic beneficial effects have been demonstrated across multiple tissue types
  in published studies — brain, spinal cord and peripheral nerves, myocardium, and
  diabetic wounds. This validates HBOT's role as the supportive oxygenation and signalling
  scaffold that allows injected stem cells to engraft and differentiate.
evidence_tier: plausible_emerging
