sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 40 — Common Cold, pg 688-690
  quote: Consuming concentrated sources of sugars such as glucose, fructose, sucrose,
    honey, or orange juice greatly reduces the ability of white blood cells to kill
    bacteria. The value of sleep and rest during a cold cannot be overemphasized.
