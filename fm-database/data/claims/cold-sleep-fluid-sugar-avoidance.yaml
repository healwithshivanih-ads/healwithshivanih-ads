slug: cold-sleep-fluid-sugar-avoidance
statement: Foundational cold management is rest (deep sleep releases immune-enhancing
  compounds), liquids (dehydrated mucosa is more hospitable to viruses), and avoiding
  sugar (glucose competes with vitamin C for white-blood-cell uptake; concentrated
  sugars from fruit juice, soft drinks, honey, or orange juice impair phagocytosis).
  With a healthy immune system, a cold should not last more than three or four days.
  Limit simple sugars including fruit sugars to less than 50 g per day during an acute
  cold.
evidence_tier: strong
