slug: zinc-supports-thyroid-conversion
statement: Zinc (20–30 mg/day as Zinc Glycinate) supports T4 → T3 conversion and thyroid
  hormone production.
evidence_tier: plausible_emerging
rationale: Zinc is a cofactor for thyroid hormone synthesis and deiodinase activity.
  The document specifies Zinc Glycinate 20–30 mg/day for conversion support.
coaching_translation: Zinc helps convert your thyroid hormone to the active form your
  body can use. Glycinate form is gentler on the stomach.
out_of_scope_notes: Dosing should be verified with clinician. Long-term high zinc
  can deplete copper.
caveats:
- Dose from synthesis document — verify with clinician.
- Monitor copper status with prolonged supplementation.
