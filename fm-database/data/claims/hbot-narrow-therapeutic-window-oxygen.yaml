sources:
- id: hadanny-efrati-2020-hyperoxic-hypoxic-paradox
  location: Section 1 Introduction
  quote: Effective metabolism is highly dependent on a narrow therapeutic range of
    oxygen. Accordingly, low levels of oxygen, or hypoxia, are one of the most powerful
    inducers of gene expression, metabolic changes, and regenerative processes, including
    angiogenesis and stimulation of stem cell proliferation, migration, and differentiation.
rationale: Conceptual anchor for both HBOT efficacy and its safety boundaries.
