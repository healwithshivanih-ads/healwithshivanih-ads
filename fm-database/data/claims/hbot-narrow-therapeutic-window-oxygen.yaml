slug: hbot-narrow-therapeutic-window-oxygen
statement: Effective cellular metabolism depends on a narrow therapeutic range of
  oxygen. Both hypoxia (deficiency) and hyperoxia (excess) are powerful biological
  signals that can be either regenerative or damaging depending on dose, duration,
  and fluctuation pattern. The clinical art of HBOT is operating inside this window
  — delivering enough hyperoxia to trigger the regenerative paradox without crossing
  into oxygen-toxicity territory.
evidence_tier: strong
