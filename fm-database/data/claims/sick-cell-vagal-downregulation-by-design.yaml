slug: sick-cell-vagal-downregulation-by-design
statement: When cells are stressed, injured, or infected, the vagus nerve actively
  downregulates to reduce the coherence and complexity of the system — allowing cells
  to "go offline" from network signalling and run older repair programs (the Naviaux
  cell danger response). This explains why HRV drops during illness — not because
  the system is failing, but because vagal withdrawal is part of the healing program.
  Reflexive vagal stimulation during this phase can be counter-productive; the appropriate
  sequence is to let the healing cycle complete and HRV will recover spontaneously.
evidence_tier: plausible_emerging
