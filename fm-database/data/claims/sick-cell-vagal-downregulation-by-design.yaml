sources:
- id: koppelman-polyvagal-energy-blueprint-podcast-2026
  location: Podcast — Vagal downregulation in illness
  quote: If someone is sick enough that they don't feel well and they have to lie
    down, the vagus nerve is actually going to turn itself down in order to reduce
    the coherence of the system so that it can go through this process. So if you
    are sick, your heart rate variability is lower — because that's by design.
