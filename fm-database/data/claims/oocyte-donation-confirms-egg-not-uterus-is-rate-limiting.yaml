- id: bentov-2011-mitochondrial-reproductive-aging
  location: Abstract — Purpose
  quote: Women over 40 undergoing in vitro fertilization with oocytes donated by younger
    women have success rates comparable to young patients. Apart from oocyte donation,
    there is no known intervention to improve the pregnancy outcome of older patients.
rationale: Anchor evidence for the egg-quality-centric framing of AMA fertility. Quoted
  directly by Fett.
