slug: oocyte-donation-confirms-egg-not-uterus-is-rate-limiting
statement: Pregnancy rates in women over 40 who use donor eggs from younger women
  are comparable to those of younger patients undergoing IVF. This donor-egg outcome
  data is the cleanest evidence in clinical fertility that oocyte quality — not uterine
  receptivity or systemic maternal age — is the rate-limiting factor in advanced-maternal-age
  conception, and therefore that interventions targeting oocyte quality (mitochondrial
  support, antioxidants, toxin avoidance) are the highest-leverage preconception strategies.
evidence_tier: strong
