slug: shift-focus-back-to-life-supports-healing
statement: Once improving, deliberately shift focus off health and back to life —
  social time, hobbies and fun — because enjoyment supports healing and prevents a
  'black hole' of health obsession that itself increases stress and anxiety.
evidence_tier: plausible_emerging
rationale: Step-8 'importance of fun' section.
coaching_translation: As you get better, get back to living — fun and connection aren't
  a distraction from healing, they're part of it.
