slug: fermented-foods-caution-with-sibo-yeast-myers-tas
statement: Fermented foods act as natural probiotics but can feed unfriendly organisms
  and worsen symptoms when SIBO or yeast overgrowth is present, so they are best added
  after the gut is balanced.
evidence_tier: fm_specific_thin
rationale: Fermented foods supply both bacteria and fermentable substrate; in overgrowth
  states the substrate can aggravate rather than help.
coaching_translation: Fermented foods are great once the gut is balanced, but can
  backfire if there's an overgrowth — timing matters.
