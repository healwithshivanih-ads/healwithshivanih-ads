slug: dietary-nitrates-support-nos3
statement: Foods naturally rich in nitrates—arugula, beets, celery, spinach—provide
  a dietary substrate that can be converted to nitric oxide via the nitrate-nitrite-NO
  pathway, supplementing endogenous NOS3 activity.
evidence_tier: strong
rationale: The entero-salivary nitrate recycling pathway and dietary nitrate supplementation
  effects on blood pressure and exercise performance are well documented in peer-reviewed
  literature, including multiple RCTs.
coaching_translation: Encourage daily intake of nitrate-rich vegetables—especially
  arugula, beets, celery, and spinach—as a food-first strategy to support nitric oxide
  availability, particularly in clients with cardiovascular risk or NOS3 concerns.
