slug: arrhythmia-coq10-hawthorn-protocol
statement: CoQ10 plays a critical role in cardiac cellular energy production; supplementation
  (150-300 mg/day) is indicated in any condition affecting the heart due to its safety
  profile. Hawthorn (Crataegus species) extract standardised to 1.8% vitexin-4'-rhamnoside
  or 10% proanthocyanidin (100-250 mg three times daily) has a long history of use
  in minor arrhythmias and double-blind support in congestive heart failure.
