slug: soaking-dal-reduces-gos
statement: Soaking moong dal for 30 minutes and discarding the soaking water reduces
  GOS (galacto-oligosaccharides) content, making the dal more tolerable during the
  low FODMAP elimination phase.
evidence_tier: plausible_emerging
rationale: Soaking and discarding water leaches water-soluble oligosaccharides from
  legumes. This is consistent with Monash University guidance and general food science
  principles, though exact GOS reduction percentages vary.
coaching_translation: Always soak your moong dal for at least 30 minutes and throw
  away the soaking water before cooking — this removes most of the gas-causing sugars.
