slug: sklar-coq10-egg-quality-over-35
statement: CoQ10 is the most-researched supplement for supporting oocyte mitochondrial
  function and reducing oxidative stress in the follicular environment, particularly
  in women over 35. It is most effective once foundational drivers (blood sugar, gut,
  inflammation, toxin load) have been addressed — otherwise it is fuelling a system
  that is still leaking energy. Practical dosing in fertility coaching commonly runs
  200-600 mg/day of ubiquinol (preferred over ubiquinone in older women) but specific
  dosing is a clinician decision.
evidence_tier: strong
