  location: Chapter 2 — Mirena and Skyla IUDs, pp 26-27
  quote: The hormonal IUD suppresses ovulation in 85 percent of cycles in the first
    year, but then only 15 percent of cycles after that. Because Mirena does not completely
    suppress ovulation, I view it as the least harmful of all hormonal birth control.
    With most hormonal birth control, you bleed but do not cycle. With a Mirena IUD,
    you cycle but do not bleed.
