slug: briden-mirena-iud-permits-ovulation
statement: The Mirena hormonal IUD (levonorgestrel-releasing intrauterine system)
  is unique among hormonal contraceptives in that it suppresses ovulation in only
  approximately 85 percent of cycles during the first year and 15 percent of cycles
  thereafter — most users continue to ovulate and therefore make their own progesterone.
  For this reason, Briden views Mirena as the least hormonally suppressive of the
  modern hormonal contraceptive options, though it still carries the side-effect signature
  of levonorgestrel exposure (depression risk, reduced stress tolerance).
evidence_tier: plausible_emerging
rationale: The ovulation-suppression rates Briden cites come from clinical research
  on the Mirena IUD. The mechanism (local progestin action on cervical mucus and uterine
  lining with limited systemic absorption) is well documented. The depression and
  stress-tolerance concerns reference the same Danish cohort data discussed elsewhere
  in the book.
coaching_translation: Of all the hormonal birth control options, the Mirena IUD is
  the gentlest on your overall hormone system — most women keep ovulating and making
  their own progesterone while it is in place. It still uses a synthetic progestin
  so it can still affect mood and stress tolerance, but if you and your clinician
  have decided hormonal contraception is needed, this is the option that protects
  ovulation best.
caveats:
- Insertion is invasive and can be painful.
- Heavy bleeding, adenomyosis, and endometriosis are accepted clinical indications.
- Should not be the default first choice in women without a clinical indication for
  it.
