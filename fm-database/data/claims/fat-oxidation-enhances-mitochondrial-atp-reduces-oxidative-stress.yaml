slug: fat-oxidation-enhances-mitochondrial-atp-reduces-oxidative-stress
statement: Switching to fat oxidation on a low-carb diet enhances mitochondrial ATP
  yield and lowers oxidative stress.
evidence_tier: plausible_emerging
rationale: Biologically plausible and supported by mechanistic data; fat oxidation
  produces higher ATP per molecule and lower ROS relative to glucose oxidation in
  certain contexts. Full RCT consensus is still emerging.
coaching_translation: When your body burns fat for fuel instead of sugar, your cells
  produce energy more efficiently and with less cellular stress — which may help with
  fatigue and brain fog.
caveats:
- Source is an expert-consensus document, not primary literature.
