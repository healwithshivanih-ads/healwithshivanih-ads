slug: ashwagandha-rct-subclinical-hypothyroid-tsh-t3-t4
statement: A 2017 double-blind RCT (n=50) found 8 weeks of ashwagandha root extract (600 mg/day) in subclinical
  hypothyroid patients significantly normalised serum TSH (p<0.001), T3 (p=0.003), and T4 (p=0.010) compared
  to placebo.
evidence_tier: plausible_emerging
rationale: 'Single small RCT (n=50) with significant effects on thyroid indices; described as a pilot
  study — larger replication studies are needed. Effective dose in trials: 600 mg/day root extract, 8
  weeks.'
coaching_translation: Evidence from a small controlled trial suggests ashwagandha may help bring thyroid
  markers toward a healthier range in people with mildly elevated TSH (subclinical hypothyroidism). This
  is a promising finding that needs larger studies to confirm.
out_of_scope_notes: ''
caveats:
- Pilot study only — n=50, single centre, 8 weeks; requires larger replication
- Enrolled only adults aged 18–50 with TSH 4.5–10 µIU/L; results may not apply outside this range
- 'Interaction risk: ashwagandha may raise thyroid hormone levels — could cause hyperthyroid symptoms
  in people on levothyroxine; thyroid indices should be monitored'
- Industry funding not disclosed in abstract; study conducted at a single hospital in Varanasi
