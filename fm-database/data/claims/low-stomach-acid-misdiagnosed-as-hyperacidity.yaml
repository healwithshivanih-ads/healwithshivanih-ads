slug: low-stomach-acid-misdiagnosed-as-hyperacidity
statement: Hypochlorhydria (low stomach acid) is frequently misdiagnosed as hyperacidity
  because the reflux, heartburn, and epigastric pain it produces are clinically indistinguishable
  from those caused by excess acid.
evidence_tier: plausible_emerging
rationale: The document clearly describes the mechanism by which low acid leads to
  fermentative reflux mimicking hyperacidity symptoms. This is a recognised concept
  in FM practice. Peer-reviewed evidence on population prevalence of this misdiagnosis
  is limited.
coaching_translation: If a client has been diagnosed with 'too much acid' but their
  antacids or PPIs aren't helping — or are making things worse — low stomach acid
  may be the real issue. This is worth exploring with their doctor.
caveats:
- Source is expert consensus lecture, not primary RCT evidence.
- Clinician assessment required before discontinuing PPIs or H2 blockers.
