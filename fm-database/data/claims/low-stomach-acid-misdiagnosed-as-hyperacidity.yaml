  quote: Most of the patients, when you see they have a history of heartburn, having
    a gastric reflux, having a chest tightness, and they have a gastric pain, conventionally,
    we diagnose them as hyperacidity, which is wrong. In these cases, it is usually
    the low stomach acid which causes these symptoms out.
