sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 54 — Glaucoma, pg 975-976
  quote: Supplemental vitamin C has been demonstrated to lower intraocular pressure
    in many clinical studies. Some patients respond to as little as 2 g per day, while
    others will respond only to extremely high doses (35 g per day). The short-term
    benefits of high doses of vitamin C are primarily due to an osmotic effect, while
    long-term use of moderate doses is necessary to promote improved collagen strength
    and integrity of eye tissues.
