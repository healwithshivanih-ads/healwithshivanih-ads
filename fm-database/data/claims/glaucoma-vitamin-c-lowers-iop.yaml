slug: glaucoma-vitamin-c-lowers-iop
statement: Supplemental vitamin C reliably lowers intraocular pressure in glaucoma,
  with short-term high doses acting through an osmotic effect and long-term moderate
  doses supporting collagen integrity of ocular tissues. Coach-actionable range from
  Murray's treatment summary is 500-1,000 mg three times per day (1,500-3,000 mg/day
  total), with intraocular pressure monitoring required to find the individual response
  dose. Abdominal discomfort at high doses usually tapers off after three to four
  days.
evidence_tier: plausible_emerging
