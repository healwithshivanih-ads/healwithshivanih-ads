slug: p5p-controls-hormone-signaling-duration
statement: Pyridoxal-5-phosphate (P5P), the active form of vitamin B6, controls the
  opening and closing of helix-12 in hormone receptors, thereby regulating the duration
  of hormone signaling throughout the body.
evidence_tier: plausible_emerging
rationale: P5P as a cofactor in steroid receptor signaling and helix-12 conformation
  change is a mechanistically plausible model consistent with known B6 biochemistry.
  This specific helix-12 gating mechanism is not mainstream consensus but is within
  the framework of nuclear receptor pharmacology.
coaching_translation: Active vitamin B6 (P5P) acts like a timer on your hormone signals
  — it determines how long those signals stay on. Without enough B6, hormonal messages
  run too long, which can cause symptoms like heavy periods and breast changes.
caveats:
- Source is expert consensus; the specific P5P/helix-12 signaling duration mechanism
  is not well-cited in primary literature.
- B6 over 100mg/day is associated with reversible peripheral neuropathy — always flag
  dose limits.
