slug: endometriosis-trans-fat-risk-omega3-protective
statement: In 12 years of Nurses Health Study II data, women with the highest trans-fat
  intake were 48% more likely to be diagnosed with endometriosis, while those with
  the highest long-chain omega-3 fatty acid intake were 22% less likely. Higher omega-6
  to omega-3 ratios drive greater interleukin-8 secretion from endometrial cells.
evidence_tier: strong
