slug: arachidonic-acid-menorrhagia-omega3
statement: The endometrium of menorrhagic women concentrates arachidonic acid (animal
  fat-derived) abnormally, driving series-2 prostaglandins that cause both excessive
  bleeding AND cramping. Reducing dietary meat/dairy and increasing fish, nuts, seeds
  plus fish oil supplementation (1,000 mg EPA+DHA/day) lowers tissue arachidonic acid
  and prostaglandin load. Pattern shift is coach-actionable for any heavy-bleeder.
