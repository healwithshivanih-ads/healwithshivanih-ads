slug: electrolytes-required-during-low-carb-transition
statement: Electrolyte repletion (sodium, potassium, magnesium) is essential during
  low-carb dietary transitions to prevent keto flu symptoms.
evidence_tier: plausible_emerging
rationale: Carbohydrate restriction reduces insulin, which lowers renal sodium reabsorption,
  leading to urinary losses of sodium, potassium, and magnesium. Electrolyte supplementation
  is standard clinical practice in this context.
coaching_translation: When you cut carbs, your kidneys release more sodium and water
  — taking potassium and magnesium with it. Replenishing these minerals helps prevent
  headaches, cramps, and fatigue during the first 1–2 weeks.
caveats:
- Source is expert consensus. Specific electrolyte dosing should be clinician-guided,
  especially in patients with kidney or cardiac conditions.
