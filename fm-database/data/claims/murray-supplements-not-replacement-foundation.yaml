slug: murray-supplements-not-replacement-foundation
statement: 'Murray''s foundational principle: ''A person cannot make up for poor dietary
  habits, a negative attitude, and a lack of exercise by taking pills, whether the
  pills are drugs or nutritional supplements.'' Nutritional supplements work as SUPPLEMENTARY
  to foundational lifestyle medicine — diet + exercise + mental attitude + sleep +
  stress management. Even the most evidence-backed protocol fails when foundational
  lifestyle factors are ignored. Coach role: ensure clients understand this hierarchy
  before adding supplement protocols.'
evidence_tier: strong
rationale: Universal clinical observation. Mechanism — pharmacological tools cannot
  compensate for chronic dietary inflammation, sedentary muscle loss, sleep-deprivation
  cortisol dysregulation, or chronic stress allostatic load. Same supplement produces
  different results in optimised vs unoptimised lifestyle substrate.
coaching_translation: You cannot supplement your way out of a bad diet, no exercise,
  poor sleep, or chronic stress. Murray's foundational rule — supplements are SUPPLEMENTARY
  to diet, exercise, sleep, stress management. Ensure the foundation is solid BEFORE
  building protocol on top. Otherwise you're adding expensive layers to a crumbling
  foundation.
caveats:
- Foundation = diet + exercise + sleep + stress + mental attitude
- This applies to drug therapy too, not just supplements
- Supplement protocol BEFORE addressing foundation is common FM mistake
- Habit change takes 8-12 weeks minimum
