  quote: We work with Genova's NutrEval test to look at nutrient deficiencies. It
    also has some really good mitochondrial markers, stress markers on the mitochondria,
    which is the energy center of the cell that can get damaged by all of the usual
    suspects.
rationale: Names a specific lab a coach can suggest to a client's GP for the functional
  intake — moves past "everything is normal" pattern.
