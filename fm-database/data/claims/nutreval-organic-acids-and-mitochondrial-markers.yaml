slug: nutreval-organic-acids-and-mitochondrial-markers
statement: Hirsch's preferred broad screen for chronic-fatigue clients is the Genova
  NutrEval, an organic-acids and amino-acids test that quantifies B-vitamin status,
  magnesium, molybdenum, and other micronutrients, and flags mitochondrial-stress
  markers (markers of oxidative damage to mitochondrial function). This panel is particularly
  useful because it surfaces functional deficiencies that don't show up on serum nutrient
  tests. Coach use — for clients with persistent fatigue + cognitive symptoms despite
  "normal labs," a NutrEval gives actionable data on what is REALLY depleted at the
  cellular level.
