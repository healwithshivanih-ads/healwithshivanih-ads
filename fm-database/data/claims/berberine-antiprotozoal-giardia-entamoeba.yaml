slug: berberine-antiprotozoal-giardia-entamoeba
statement: Berberine (from goldenseal, Oregon grape, and Coptis chinensis) has protostatic
  and protocidal activity against Entamoeba histolytica, Giardia lamblia, and Blastocystis
  hominis, and is beneficial in treating giardiasis in children.
evidence_tier: plausible_emerging
rationale: In vitro and some human trial data support berberine's antiprotozoal efficacy;
  the alkaloid disrupts parasite membrane function and inhibits protozoan replication.
coaching_translation: Berberine-containing botanical supplements (goldenseal, Oregon
  grape, or berberine HCl) may support resolution of intestinal protozoan infections
  — work with a clinician for confirmed parasitic infections.
caveats:
- Berberine is contraindicated in pregnancy
- Drug interactions with CYP3A4 substrates; clinician review required
