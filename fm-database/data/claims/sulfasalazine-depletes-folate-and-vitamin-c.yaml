slug: sulfasalazine-depletes-folate-and-vitamin-c
statement: Sulfasalazine inhibits absorption and transport of folate, decreases serum
  folate and iron, and increases urinary excretion of ascorbic acid, significantly
  increasing nutritional needs in IBD patients on this medication.
evidence_tier: strong
rationale: Well-established drug-nutrient interaction; sulfasalazine competitively
  inhibits folate-dependent enzymes and the intestinal folate transport system, a
  pharmacologically confirmed mechanism.
coaching_translation: Patients on sulfasalazine need higher folate and vitamin C intake
  — ensure their supplement plan addresses these depletions.
caveats:
- Folate repletion is critical as deficiency causes mucosal cell turnover abnormalities
  before it affects red blood cells
