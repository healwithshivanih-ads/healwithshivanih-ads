sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 28 — Breast Cancer (Prevention), pg 574-576
  quote: Glucuronidase is a bacterial enzyme that breaks the bond between estrogen
    and glucuronic acid, leading to less excretion of estrogen. Thus it is not surprising
    that excessive glucuronidase activity is associated with an increased cancer risk,
    particularly for estrogen-dependent breast cancer... Calcium D-glucarate is a
    dietary supplement used to inhibit glucuronidase. The recommended daily dosage
    for prevention is 200 to 400 mg.
rationale: Estrobolome-focused intervention — pairs naturally with fibre, probiotic
  foods (dahi, kefir), and brassica vegetables. Use for clients with estrogen-dominance
  pattern, fibrocystic breasts, or family history. No known interactions.
