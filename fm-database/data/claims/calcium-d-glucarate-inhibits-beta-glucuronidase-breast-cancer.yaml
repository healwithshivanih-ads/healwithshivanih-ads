slug: calcium-d-glucarate-inhibits-beta-glucuronidase-breast-cancer
statement: Beta-glucuronidase, a bacterial enzyme in the gut, breaks the bond between
  estrogen and glucuronic acid, causing estrogen to be reabsorbed instead of excreted.
  Excessive activity is associated with increased estrogen-dependent breast cancer
  risk and is raised by high-fat, low-fibre diets. Calcium-D-glucarate inhibits beta-glucuronidase;
  preliminary research at M.D. Anderson and Memorial Sloan-Kettering suggests 200–400
  mg per day for prevention (400–1,200 mg per day for active cancer). Foods high in
  glucaric acid include apples, brussels sprouts, broccoli, cabbage, and lettuce;
  Lactobacillus acidophilus and Bifidobacterium also lower glucuronidase activity.
