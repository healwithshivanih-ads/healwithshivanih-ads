slug: homocysteine-and-mma-are-better-functional-markers-than-serum-b12
statement: Homocysteine and methylmalonic acid (MMA) provide better functional indicators
  of B12 and methylation adequacy than serum B12 alone.
evidence_tier: strong
rationale: The document explicitly recommends these functional markers as more informative
  than serum B12 alone, consistent with established clinical biochemistry for B12
  status assessment.
coaching_translation: Labs like homocysteine and MMA give a much more useful window
  into how well your methylation pathways are working compared to a standard B12 level.
out_of_scope_notes: Ordering labs and interpreting results are clinician scope. Coaches
  can help clients understand why these markers matter and encourage them to discuss
  with their doctor.
caveats:
- Source is an LLM synthesis; this is nonetheless consistent with widely accepted
  clinical guidance.
