slug: leaky-gut-causes-transient-food-reactions
statement: Gut inflammation, infection or stress causes leaky gut, which can produce
  many 'false' food reactions that resolve once the gut heals — the author personally
  had 23 food reactions from a parasite that all disappeared after gut healing.
evidence_tier: fm_specific_thin
rationale: Illustrated by the author's own case; mechanistically plausible.
coaching_translation: A long list of food reactions often shrinks dramatically once
  the gut heals — you may not be stuck avoiding all of them.
