sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 86 — Prostate Cancer (Prevention), pg 1427
  quote: In a study of men with prostate cancer, a low-fat diet (with fat providing
    20% or less of total calories) supplemented with 30 g ground flaxseed (roughly
    2 tbsp) reduced serum testosterone by 15%, slowed the growth rate of cancer cells,
    and increased the death rate of cancer cells after only 34 days.
rationale: 'Key distinction for male clients: ground seed yes, flaxseed oil capsules
  no for prostate. Inverse of the breast cancer recommendation where both forms work.'
