slug: ground-flaxseed-30g-low-fat-reduces-testosterone-prostate-cancer
statement: 'In men with existing prostate cancer, a low-fat diet (≤20% calories from
  fat) supplemented with 30 g ground flaxseed per day (~2 tbsp) for 34 days reduced
  serum testosterone by 15%, slowed cancer cell growth rate, and increased cancer
  cell death rate. Flaxseed lignans bind male hormone receptors and promote testosterone
  elimination. Note: ground flaxseed (lignans) is preferred over flaxseed oil for
  prostate-cancer prevention — ALA itself shows mixed signals in prostate tissue,
  but the lignans of whole ground seed override that concern.'
evidence_tier: plausible_emerging
