slug: long-term-ppi-use-associated-with-serious-adverse-effects
statement: Long-term use of proton pump inhibitors (PPIs) is associated with increased
  risk of intestinal infections, hip fracture, kidney failure, and pneumonia.
evidence_tier: strong
rationale: Associations between long-term PPI use and fracture risk, Clostridium difficile
  infection, kidney disease, and pneumonia are documented in multiple observational
  and pharmacoepidemiological studies.
coaching_translation: PPIs are powerful acid-blocking medications. While useful short-term,
  taking them long-term has been linked to serious health risks — which is why practitioners
  support gradual weaning.
out_of_scope_notes: Any change to PPI dosing or tapering must be supervised by a prescribing
  clinician.
caveats:
- These are association data from observational studies; absolute risk for individual
  patients varies.
- Never advise clients to stop PPIs without clinician supervision.
