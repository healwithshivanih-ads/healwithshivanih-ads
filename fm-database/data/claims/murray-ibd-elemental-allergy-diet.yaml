slug: murray-ibd-elemental-allergy-diet
statement: Pre-illness diet analyses consistently show IBD patients ate more refined
  sugar, hydrogenated fats, fast food, and conventional meat with less raw produce,
  omega-3, and fibre than healthy controls. An elemental diet or a structured food-allergy
  exclusion diet can be highly effective in inducing remission. Higher animal-protein
  intake and an elevated omega-6 to omega-3 ratio are the strongest independent dietary
  risk factors in Japanese IBD cohorts where genetics are homogeneous. Whole-foods
  Mediterranean / anti-inflammatory pattern with omega-3 increase and identification
  of personal trigger foods is the first dietary intervention.
evidence_tier: plausible_emerging
