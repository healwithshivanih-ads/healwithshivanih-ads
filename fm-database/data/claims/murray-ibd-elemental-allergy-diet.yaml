sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 42 — Crohn's Disease and Ulcerative Colitis, pg 724-725
  quote: Several studies that analyzed the pre-illness diet of patients with IBD have
    found that they habitually ate more refined sugar, chemically modified fats and
    fast food, and meat while consuming less raw fruit, vegetables, omega-3 fatty
    acids, and dietary fiber than healthy people. Studies have shown that an elemental
    diet or an allergy exclusion diet can be very successful in the treatment of IBD.
    The greater incidence of CD was strongly correlated with increased dietary intake
    of total fat, animal fat, omega-6 fatty acids, animal protein, milk protein, and
    the ratio of omega-6 to omega-3 fatty acids. Multivariate analysis showed that
    higher intake of animal protein was the strongest independent factor, followed
    by an increased ratio of omega-6 to omega-3 fatty acids.
