- id: dirty-genes-lynch
  location: 'Chapter 11 — PEMT: Cell Membrane and Liver Problems'
  quote: For many women, estrogen stimulates PEMT to serve as a backup, synthesizing
    phosphatidylcholine even when they're not eating enough choline. Before menopause,
    estrogen levels are higher and can often help compensate for a dietary shortage.
    During menopause, though, estrogen levels drop.
