slug: estrogen-upregulates-pemt-reducing-choline-need
statement: Oestrogen upregulates PEMT gene expression, enabling premenopausal women
  to synthesise more phosphatidylcholine endogenously and be less dependent on dietary
  choline; the drop in oestrogen at menopause substantially increases choline requirements.
evidence_tier: plausible_emerging
rationale: Oestrogen-responsive elements in the PEMT gene promoter and sex-specific
  differences in choline requirements have been documented in peer-reviewed nutritional
  genetics research (e.g., Resseguie et al.), supporting this mechanism.
coaching_translation: Postmenopausal women and men are at higher risk of choline deficiency
  than premenopausal women. This should inform dietary planning—increasing choline-rich
  foods (eggs, liver, fish) becomes especially important after menopause.
