slug: ovarian-prp-protocols-not-standardised
statement: 'Ovarian platelet-rich plasma (PRP) injection for DOR is marketed widely
  but protocols are non-standardised: needle gauge, number of punctures, volume, platelet
  concentration, white blood cell filtering, and centrifuge system all vary by clinic,
  with no consensus on what works. Patients should ask the clinic how they selected
  their protocol and what equipment is used, but the practical reality is that quality
  varies enormously across providers.'
