slug: fitzgerald-vegan-vegetarian-methylation-gaps
statement: 'Plant-exclusive eaters are prone to deficits in DNA-methylation-supportive
  nutrients: the sulfur amino acids methionine/cysteine/taurine, vitamin B12, choline,
  DHA, iron and vitamin D. Fitzgerald supplements vegans/vegetarians on the program
  with an essential-amino-acid protein powder, algae-based EPA/DHA, B12 (methyl/adeno/hydroxocobalamin
  ~500 mcg/day, not cyanocobalamin), choline bitartrate 450-550 mg, vitamin D, and
  iron only if labs confirm deficiency (40-80 mg elemental every other day).'
