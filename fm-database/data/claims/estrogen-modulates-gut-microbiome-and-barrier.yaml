slug: estrogen-modulates-gut-microbiome-and-barrier
statement: Estrogen fortifies the small intestinal lining, quiets inflammation, supports
  insulin sensitivity, and modulates the gut microbiome; its decline disrupts all
  of these functions.
evidence_tier: plausible_emerging
rationale: Consistent with published research on the estrobolome and estrogen receptor
  expression in gut epithelium, but synthesized here without specific citations. Single
  expert source at moderate quality.
coaching_translation: Estrogen does far more than regulate your cycle — it actively
  maintains your gut wall, controls inflammation, and shapes which gut bacteria thrive.
  When estrogen drops, all of this can be affected.
caveats:
- Mechanistic claim from single expert; underlying biology is plausible but specific
  magnitudes of effect not quantified here.
