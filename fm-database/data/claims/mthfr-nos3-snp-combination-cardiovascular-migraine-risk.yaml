slug: mthfr-nos3-snp-combination-cardiovascular-migraine-risk
statement: Co-occurrence of SNP variants in both MTHFR and NOS3 genes is associated
  with increased risk of cardiovascular issues and migraines, likely mediated through
  impaired homocysteine clearance reducing nitric oxide bioavailability.
evidence_tier: plausible_emerging
rationale: Both MTHFR (via homocysteine accumulation) and NOS3 (via direct NO production
  impairment) affect endothelial function. Gene-gene interaction studies in this haplotype
  combination have been published in cardiovascular literature. Lynch's framing of
  combined SNP risk is mechanistically coherent, though the specific combination is
  extrapolated from individual gene studies rather than formal haplotype RCTs.
coaching_translation: Clients who score high on both MTHFR and NOS3 checklists should
  prioritise methylation support (B2, methylfolate, B12), cardiovascular lifestyle
  (exercise, no smoking), and stress reduction.
caveats:
- Source is a consumer trade book — haplotype risk claims are directional, not diagnostic.
- Individual SNPs do not determine destiny; lifestyle, diet, and environment are the
  dominant drivers per Lynch's own framework.
