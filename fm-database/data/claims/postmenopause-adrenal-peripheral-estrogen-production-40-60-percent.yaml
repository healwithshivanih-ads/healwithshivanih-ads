slug: postmenopause-adrenal-peripheral-estrogen-production-40-60-percent
statement: Postmenopausal women still produce 40–60% of their premenopausal sex hormone levels via the
  adrenal glands and peripheral tissues (aromatisation), provided chronic stress has not depleted adrenal
  function — meaning estrogen deficiency is not inevitable at menopause.
evidence_tier: strong
rationale: Peripheral aromatisation and adrenal production of DHEA/androstenedione as estrogen precursors
  is well-established physiology; this reframes menopause symptoms as a stress-and-lifestyle problem,
  not a simple hormone-deficiency disease.
coaching_translation: Your body doesn't just stop making hormones at menopause. It shifts production to
  the adrenal glands and body fat — making about half of what your ovaries used to make. Women with less
  chronic stress generally have an easier menopause because their adrenals have the spare capacity to
  step up.
out_of_scope_notes: ''
caveats:
- The quantitative 40–60% figure applies to estrone (not estradiol); individual variation is large. Adrenal
  reserve is highly context-dependent.
