slug: ayurveda-vata-vegetables-cooked
statement: Vata does best with cooked vegetables; raw, frozen, dried and very light/bitter vegetables
  (raw cabbage and cauliflower, broccoli, kale, mushrooms, sprouts) tend to aggravate vata and are better
  cooked with oil and warming spices.
