slug: high-folate-can-mask-b12-deficiency
statement: High folate intake can mask B12 deficiency and worsen neurological damage.
evidence_tier: confirm_with_clinician
rationale: High folate correcting megaloblastic anemia while allowing B12-related neurological damage to progress is a recognized
  clinical concern.
out_of_scope_notes: B12 and folate interplay in anemia and neurological health requires clinician assessment.
caveats:
- Always assess B12 status before or alongside folate supplementation, especially in vegans and elderly.
- Always check B12 status before high-dose folate supplementation.
