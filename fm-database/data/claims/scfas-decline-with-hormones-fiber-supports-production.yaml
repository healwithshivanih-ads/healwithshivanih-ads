slug: scfas-decline-with-hormones-fiber-supports-production
statement: Short-chain fatty acid (SCFA) production declines as estrogen and progesterone
  fall in midlife; adequate dietary fibre is the primary lever to maintain SCFA output,
  which supports inflammation reduction, gut barrier integrity, GLP-1 secretion, and
  bone health.
evidence_tier: plausible_emerging
rationale: SCFA production from fibre fermentation is well-established; the link between
  hormone decline and reduced SCFA production is biologically plausible but the direct
  hormonal regulation of SCFA output is less directly studied. Speaker notes butyrate's
  ability to cross the blood-brain barrier, which is a known mechanism.
coaching_translation: As hormones decline in perimenopause, your gut makes fewer protective
  short-chain fatty acids. Eating more diverse fibre is the most powerful way to keep
  production up.
caveats:
- Direct causal link between sex hormone decline and SCFA reduction is plausible but
  not fully established in RCTs.
- Single-expert source.
