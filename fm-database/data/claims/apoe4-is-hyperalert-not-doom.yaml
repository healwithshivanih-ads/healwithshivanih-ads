slug: apoe4-is-hyperalert-not-doom
statement: APOE4 — the most common genetic risk allele for Alzheimer's — should be
  reframed for clients as a "hyper-alert" innate-immune phenotype rather than a deterministic
  sentence. APOE4 carriers mount a stronger inflammatory response to identical insults
  (saturated-fat exposure, infections, adverse childhood experiences) which is why
  lifestyle leverage matters even more for them, not less. Bredesen emphasises that
  none of his asymptomatic prevention clients have yet developed dementia on protocol.
evidence_tier: plausible_emerging
