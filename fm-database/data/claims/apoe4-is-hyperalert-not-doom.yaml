sources:
- id: bredesen-energy-blueprint-podcast-2026
  location: Podcast — APOE4 framing segment
  quote: If you are APOE4 positive, which is the most common genetic risk for Alzheimer's,
    you are now on hyper-alert. You can look at Alzheimer's as a chronic hyper response
    to these various insults. We have not had a single person yet who went on active
    prevention when they were asymptomatic and yet developed dementia.
rationale: Removes APOE4 fatalism so clients lean into the protocol instead of giving
  up; coach narrative is "you have more reason to act, not less."
