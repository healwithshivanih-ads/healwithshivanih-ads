slug: dha-retro-converts-to-epa
statement: DHA supplementation can retro-convert back to EPA in the body, providing
  dual benefit from a single omega-3 source.
evidence_tier: plausible_emerging
rationale: Stated in the lecture as a known metabolic property of DHA. Retro-conversion
  of DHA to EPA is a documented but quantitatively limited process (~10–12%). Relevant
  for vegan clients using DHA-only algae supplements.
coaching_translation: Even if an algae supplement only lists DHA, your body can convert
  some of it into EPA — so you're still getting both types of omega-3.
caveats:
- Retro-conversion rate is limited (~10–12%); DHA-only supplements may not fully substitute
  for EPA-specific effects.
- Source is FM lecture synthesis.
