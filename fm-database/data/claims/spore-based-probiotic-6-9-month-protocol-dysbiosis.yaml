slug: spore-based-probiotic-6-9-month-protocol-dysbiosis
statement: Spore-based probiotics (Bacillus strains) require 6–9 months of continuous
  use to meaningfully shift the gut microbiome environment in chronic dysbiosis, particularly
  where biofilm formation is present.
evidence_tier: plausible_emerging
rationale: Spore-forming probiotics (e.g., Bacillus coagulans, B. subtilis) survive
  stomach acid and colonize the large intestine. Emerging evidence supports their
  role in microbiome modulation, though 6–9 month timeline is largely based on clinical
  observation rather than controlled trials.
coaching_translation: Spore-based probiotics are a long game — 6–9 months minimum.
  Set your client's expectations accordingly and support consistency.
caveats:
- Source is expert FM lecture (moderate quality). Specific strain selection and evidence
  quality varies.
