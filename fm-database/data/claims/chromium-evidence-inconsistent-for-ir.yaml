slug: chromium-evidence-inconsistent-for-ir
statement: Chromium supplementation shows inconsistent evidence for improving insulin
  resistance and glucose control, with positive effects mainly seen in individuals
  who already have diabetes.
evidence_tier: fm_specific_thin
rationale: Martin et al. (2006, Diabetes Care) supports chromium picolinate in T2D,
  but overall study results are inconsistent. Mechanism not fully understood. Common
  in FM protocols despite weak overall evidence.
coaching_translation: Chromium is found in broccoli, green beans, and whole grains,
  and is sometimes used to support blood sugar balance — but the research is mixed,
  so it's best to discuss with your provider before supplementing.
out_of_scope_notes: Contraindicated in kidney disease — clinician screening required
  before recommending.
caveats:
- Evidence is inconsistent across studies.
- Contraindicated in kidney disease.
- Chromium + biotin combination may be more effective than chromium alone per some
  studies.
