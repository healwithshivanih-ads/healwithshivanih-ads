slug: diaphragmatic-deep-breathing-parasympathetic-hormone-support
statement: Diaphragmatic (full-body) breathing, directing the breath from lower abdomen through chest,
  circulates prana throughout all tissues, supports digestion of emotions, and calms nervous-system reactivity.
evidence_tier: plausible_emerging
rationale: Diaphragmatic breathing activates the parasympathetic nervous system through vagal afferent
  signaling; lower-thoracic expansion engages the diaphragm more fully, which is associated with slower
  respiratory rate and greater heart-rate variability.
coaching_translation: Most of us breathe shallowly into the upper chest. Practising full, belly-first
  breaths for 5 minutes morning and evening — filling from the lower abdomen up — directly calms the stress
  response and supports digestion and hormone regulation.
