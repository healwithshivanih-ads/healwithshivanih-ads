  location: Stress and food sensitivities
  quote: If we're in the sympathetic side of our nervous system our body is literally
    not in the right frame of mind to be able to break down and digest food… We literally
    will get a decline in digestive enzymes. We will get a decline in hydrochloric
    acid. We will get changes in motility in the gut. The gut will not move properly.
    And we actually get microbiome shifts.
