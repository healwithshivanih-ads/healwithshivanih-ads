slug: sympathetic-dominance-impairs-digestion
statement: Eating while in a sympathetically dominant (stressed) state reduces digestive
  enzyme output, hydrochloric acid production, gut motility, and causes microbiome
  shifts — impairing food breakdown and absorption.
evidence_tier: plausible_emerging
rationale: The autonomic nervous system's role in digestive physiology is well established
  (parasympathetic = 'rest and digest'). The specific claim that sympathetic dominance
  at mealtimes causes all enumerated deficits is mechanistically coherent and widely
  cited in FM, though RCT evidence for meal-specific context is limited.
coaching_translation: Your body can't digest food well when it's in 'fight or flight'
  mode. Taking a few deep breaths before meals, sitting down, and eating without distractions
  activates the parasympathetic system and meaningfully improves digestion.
caveats:
- Single-expert source.
- Magnitude of acute sympathetic-state effects on digestion in healthy adults is not
  well-quantified in RCTs.
