sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 54 — Glaucoma, pg 978
  quote: Magnesium was given at a modest dose of 121.5 mg twice a day for one month.
    After four weeks of treatment, the visual fields improved, and measures of blood
    flow showed improvement. These results demonstrate that magnesium supplementation
    improves peripheral circulation and seems to have a beneficial effect on the visual
    field in patients with glaucoma.
