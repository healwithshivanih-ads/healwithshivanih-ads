slug: glaucoma-magnesium-improves-visual-field
statement: Oral magnesium acts as a physiological calcium-channel blocker and improves
  visual field measurements and peripheral circulation in patients with chronic and
  normotensive glaucoma. Two small trials used 121.5 mg twice daily for one month
  and 300 mg magnesium citrate daily for one month with measurable visual field improvement.
  Murray's treatment-summary dose is 200-300 mg three times per day bound to aspartate,
  citrate, fumarate, malate, or succinate.
