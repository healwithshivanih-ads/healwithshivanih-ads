slug: digestive-enzyme-supplementation-supports-macronutrient-breakdown
statement: Supplementing with digestive enzymes supports the breakdown and absorption
  of food macronutrients in patients with reduced pancreatic enzyme output.
evidence_tier: plausible_emerging
rationale: Prescription pancreatic enzyme replacement therapy (PERT) has strong RCT
  evidence in confirmed EPI. OTC broad-spectrum digestive enzymes have plausible mechanistic
  rationale and some supportive data in functional GI contexts, though evidence is
  less robust than PERT.
coaching_translation: Taking digestive enzyme supplements with meals can help compensate
  when the pancreas isn't producing enough. They provide the lipase, protease, and
  amylase your body needs to break down fats, proteins, and carbs.
out_of_scope_notes: Prescription PERT dosing and management of confirmed EPI is clinician
  scope. Coaches can recommend OTC broad-spectrum enzymes as general digestive support.
