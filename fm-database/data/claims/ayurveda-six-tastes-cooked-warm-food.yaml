slug: ayurveda-six-tastes-cooked-warm-food
statement: 'Ayurvedic food guidance is organised by the six tastes and by qualities (warm/cold, moist/dry,
  heavy/light): warm, freshly cooked food is generally easier to digest than cold, raw or leftover food,
  and including the six tastes in a meal supports balanced digestion and satiety.'
evidence_tier: plausible_emerging
rationale: From the Ayurvedic Institute / Lad Food Guidelines for Basic Constitutional Types — traditional
  dosha-food matching (like increases like; opposite qualities balance).
