slug: vitamin-d-modulates-immune-response
statement: Vitamin D supplementation may help modulate the immune response in autoimmune thyroid disease.
evidence_tier: plausible_emerging
rationale: Vitamin D receptors are present on immune cells and vitamin D has established immunomodulatory effects. RCTs specifically
  in Hashimoto's show variable results but suggest benefit in antibody reduction.
coaching_translation: Vitamin D supports immune balance, which is important in autoimmune thyroid conditions.
caveats:
- Dose should be guided by blood levels (clinician supervised).
- Fat-soluble — take with fat-containing meal for optimal absorption.
