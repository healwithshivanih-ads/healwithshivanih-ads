slug: mayo-anxiety-rule-out-medical-causes
statement: Before assuming primary anxiety disorder, conventional workup rules out
  hyperthyroidism, cardiac arrhythmia, anaemia, hypoglycaemia, perimenopause, caffeine
  or stimulant use, alcohol withdrawal, and medication side effects (corticosteroids,
  decongestants, asthma inhalers).
