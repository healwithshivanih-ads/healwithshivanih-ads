slug: fitzgerald-younger-you-pilot-bioage-reversal
statement: An 8-week functional-medicine diet-and-lifestyle program (methyl-donor
  and DNA-methylation-adaptogen rich foods plus 7h sleep, exercise and twice-daily
  relaxation, no drugs or prolonged fasting) lowered Horvath DNA-methylation biological
  age by an average of 3.23 years versus untreated controls in a small pilot trial
  of healthy adult men.
