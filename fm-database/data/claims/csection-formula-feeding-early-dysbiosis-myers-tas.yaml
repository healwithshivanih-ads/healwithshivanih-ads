slug: csection-formula-feeding-early-dysbiosis-myers-tas
statement: Birth by C-section and formula (rather than breast) feeding reduce an infant's
  acquisition of commensal bacteria and immune factors, contributing to early gut
  dysbiosis and later autoimmune risk.
evidence_tier: plausible_emerging
rationale: Vaginal birth and breast milk seed and support the infant microbiome; missing
  these inputs is described as an early upstream driver on the autoimmune spectrum.
coaching_translation: How we were born and fed as babies helps set up our gut bacteria
  — a clue when tracing where gut trouble began.
