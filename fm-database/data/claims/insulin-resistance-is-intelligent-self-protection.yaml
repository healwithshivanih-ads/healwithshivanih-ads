sources:
- id: leaf-energy-blueprint-podcast-2026
  location: Podcast — intelligent protection segment
  quote: There's reasons why your insulin receptors become desensitized to insulin.
    Your cells aren't just little robots that just sit there and work in a very fixed
    manner. They're dynamic — when a cell has a problem it says hey we have a problem
    and this is causing our insulin receptors to not reach the surface because we
    don't want that to happen. Then you inject insulin and you're going to aggravate
    that problem.
rationale: Gives coach a kinder, more accurate way to talk to clients about their
  condition — not "broken" but "protecting itself."
