slug: sklar-couples-shared-protocol-adherence
statement: When both partners commit to the same preconception protocol simultaneously
  — shared elimination of alcohol, shared toxin clean-up, shared sleep targets, shared
  meal preparation — adherence and outcomes improve substantially compared with the
  more common pattern of the woman doing the work alone. The mechanism is partly biological
  (sperm quality matters) and partly relational (shared sacrifice becomes shared purpose;
  the resentment loop is broken).
