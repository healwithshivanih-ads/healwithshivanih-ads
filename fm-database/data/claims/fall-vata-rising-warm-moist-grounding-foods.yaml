slug: fall-vata-rising-warm-moist-grounding-foods
statement: In early autumn, vata dosha begins rising (air and ether elements), producing cool, dry, rough,
  windy, and erratic qualities; the seasonal response is to expel residual summer heat with bitter and
  astringent foods while simultaneously building warmth, moisture, and grounding through sweet and sour
  tastes.
evidence_tier: fm_specific_thin
rationale: Early fall is a transitional period where the body must clear accumulated summer pitta while
  simultaneously preparing for increasing vata. Cranberries, dark greens, and pumpkin clear heat; coconut
  oil, figs, sesame, and oats build tissue nourishment.
coaching_translation: 'Early autumn is the ideal time to bridge summer and winter diets: keep some bitter
  greens and astringent fruits, but begin adding warming spices, oats, root vegetables, and healthy fats
  to nourish the nervous system ahead of the cold months.'
out_of_scope_notes: ''
caveats:
- Traditional Ayurvedic seasonal transition principle; the combination of anti-inflammatory bitter foods
  and nourishing fats has broader dietary support.
