slug: dysbiosis-elevates-beta-glucuronidase-causing-estrogen-dominance
statement: Gut dysbiosis increases bacterial beta-glucuronidase activity, deconjugating
  excreted estrogen metabolites and causing their reabsorption, thereby promoting
  estrogen dominance.
evidence_tier: plausible_emerging
rationale: Beta-glucuronidase-producing gut bacteria have been identified in human
  microbiome research. Elevated enzyme activity has been associated with increased
  free estrogen in circulation. The estrobolome concept is supported by emerging evidence,
  though large RCT confirmation is limited.
coaching_translation: Bad gut bacteria can produce an enzyme that 'recycles' used
  estrogen back into your bloodstream, which can worsen conditions like endometriosis.
  A healthy gut helps your body actually excrete excess estrogen.
caveats:
- This is a plausible emerging mechanism; the direct clinical link to endometriosis
  severity has not been established in large controlled trials.
- Source is FM lecture synthesis.
