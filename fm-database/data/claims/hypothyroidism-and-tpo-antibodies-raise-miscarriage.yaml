slug: hypothyroidism-and-tpo-antibodies-raise-miscarriage
statement: Even subclinical hypothyroidism and the presence of TPO antibodies (without
  overt thyroid dysfunction) double or triple miscarriage rates and are strongly overrepresented
  in unexplained infertility, ovulation disorders, and premature ovarian failure.
  Levothyroxine treatment normalises miscarriage risk in antibody-positive women.
  Every woman with infertility or recurrent loss should have TSH, free T4, and TPO
  antibodies checked.
evidence_tier: strong
