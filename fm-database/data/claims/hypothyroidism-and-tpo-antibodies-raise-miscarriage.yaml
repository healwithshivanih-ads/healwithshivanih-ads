- id: fett-it-starts-with-the-egg-2019
  location: Chapter 4 — Unexpected Obstacles to Fertility, pg 68-71
  quote: In women with thyroid antibodies, the miscarriage rate more than doubled.
    When women with thyroid antibodies received thyroid hormone treatments during
    pregnancy, the miscarriage rate dropped to just 3.5 percent.
rationale: Critical screening claim for preconception workup.
