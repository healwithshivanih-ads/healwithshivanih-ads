slug: heavy-metal-tissue-burden-via-provocation
statement: Heavy metal body burden is NOT visible on a standard unprovoked urine test,
  which only shows what is currently circulating. The clinical gold standard Hirsch
  recommends — pre-provocation morning urine (baseline circulating), then a single
  dose of DMSA, DMPS, or zeolite chelator, then 6-hour collected urine. The post-provocation
  sample reveals the tissue burden being mobilised. Doctor's Data is the lab he names.
  CRITICAL coach scope — provocation testing must be done under a clinician's supervision
  because mobilised metals can redistribute and cause symptoms. Coach role — surface
  mercury (fillings, big-fish diet, occupational) and lead (older housing, occupational)
  exposures at intake and refer for properly-supervised testing.
evidence_tier: confirm_with_clinician
