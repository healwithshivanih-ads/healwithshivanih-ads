sources:
- id: hirsch-energy-blueprint-podcast-2026
  location: Podcast — heavy metal testing segment
  quote: For the heavy metal test I recommend using Doctor's Data. You have to do
    a before and after provocation challenge test. The before is basically you wake
    up in the morning and you urinate — that tells you what's floating around in your
    bloodstream. And then you take a chelation agent which often times is DMSA or
    DMPS or zeolites. And then you collect your urine for the next 6 hours. That's
    going to pull out the heavy metals from the tissues.
rationale: Pure clinician-scope content — coach knows what testing exists so they
  can refer intelligently, not perform it.
