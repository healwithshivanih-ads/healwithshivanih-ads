slug: glycemic-load-better-predicts-meal-blood-sugar-impact
statement: Glycaemic Load (GL), which accounts for both GI and actual carbohydrate
  portion, provides a more accurate measure of how a meal impacts blood sugar than
  GI alone.
evidence_tier: strong
rationale: GL extends GI by incorporating portion size; well-validated in nutritional
  epidemiology as a better predictor of glycaemic response.
coaching_translation: It's not just what you eat but how much. A small portion of
  a high-GI food may have less blood sugar impact than a large portion of a moderate-GI
  food.
