slug: kombucha-high-fodmap-avoid-active-dysbiosis
statement: Kombucha (unpasteurised) is high-FODMAP and should be avoided during active
  dysbiosis or SIBO treatment.
evidence_tier: plausible_emerging
rationale: Kombucha contains residual sugars and live bacterial cultures that may
  exacerbate fermentation in a dysbiotic gut. Classification as high-FODMAP is consistent
  with clinical guidance; however formal FODMAP testing data is limited.
coaching_translation: Kombucha sounds healthy but it can actually feed the wrong bacteria
  when your gut is already out of balance. Hold off during your elimination phase
  and reintroduce later.
caveats:
- Pasteurised or low-sugar commercial kombucha may have a different FODMAP profile;
  always check labels.
