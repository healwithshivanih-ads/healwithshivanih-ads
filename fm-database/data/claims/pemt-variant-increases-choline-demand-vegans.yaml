slug: pemt-variant-increases-choline-demand-vegans
statement: Individuals with PEMT variants have reduced capacity for endogenous phosphatidylcholine
  synthesis and therefore have greater dietary choline requirements, making them especially
  vulnerable to deficiency on vegan or low-animal-product diets.
evidence_tier: plausible_emerging
rationale: PEMT V175M is associated with choline deficiency-induced organ dysfunction
  in studies by Zeisel and colleagues. Vegans obtain no dietary phosphatidylcholine
  from animal sources and must rely on PEMT; this interaction is mechanistically well-supported
  though large clinical trial data are limited.
coaching_translation: If you're vegan or rarely eat eggs, meat, or fish, and notice
  muscle aches, digestive issues, or cognitive dullness, your PEMT gene may need extra
  support through choline-rich plant sources like soybeans or a practitioner-guided
  supplement.
out_of_scope_notes: Choline supplementation dosing should be guided by a clinician,
  especially in pregnancy.
caveats:
- Most evidence is from controlled dietary depletion studies, not free-living vegan
  populations.
- Source is a consumer trade book.
