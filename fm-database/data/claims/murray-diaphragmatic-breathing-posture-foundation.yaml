slug: murray-diaphragmatic-breathing-posture-foundation
statement: 'Beyond supplements, Murray''s physical-care foundation requires: (1) Diaphragmatic
  breathing — promotes better health, higher energy levels, and reduced stress through
  vagal tone enhancement and improved oxygen exchange; (2) Posture — extremely important;
  chronic slouching compresses internal organs, reduces lung capacity, and triggers
  neck/back pain; (3) Bodywork — deep tissue (Rolfing, Hellerwork) or light touch
  (Trager, Alexander, Feldenkrais) techniques for structural alignment; (4) Exercise
  combining aerobic AND strength training. These four physical-care pillars complement
  nutritional pillars in any complete health protocol.'
evidence_tier: strong
rationale: Decades of clinical observation + physiological mechanism. Mechanism —
  diaphragmatic breathing activates vagal tone (parasympathetic dominance), improves
  HRV, and increases respiratory efficiency; postural correction reduces musculoskeletal
  pain + organ compression; bodywork releases fascial restrictions accumulated from
  injury, emotion, and habit.
coaching_translation: 'Supplements aren''t enough — physical care needs four pillars
  too: (1) belly breathing (diaphragmatic) all day, not chest breathing; (2) posture
  awareness — phones + computers create chronic forward-head position; (3) bodywork
  — find a good chiropractor, Rolfer, or massage therapist; (4) BOTH aerobic + strength
  training, not just one. These complement nutrition; you can''t supplement your way
  out of bad breathing or poor posture.'
caveats:
- Box breathing (4-4-4-4) is a practical daily breathing exercise
- Posture work needs ergonomic environment changes (desk, screen height)
- Bodywork practitioner matters more than technique
- Strength training non-negotiable after age 35 (sarcopenia prevention)
