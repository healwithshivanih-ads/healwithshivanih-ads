slug: bile-salts-indicated-for-fat-digestion-impairment
statement: Bile salt supplementation is indicated in patients with impaired fat digestion,
  particularly following gut removal surgeries or with identified fat malabsorption.
evidence_tier: plausible_emerging
rationale: Bile is required for fat emulsification and absorption. Post-surgical patients
  or those with biliary insufficiency may benefit from exogenous bile salt supplementation.
  This is an established clinical intervention in certain conditions.
coaching_translation: Bile salt supplements can help clients who struggle to digest
  fats, especially if they've had gut or gallbladder surgery.
caveats:
- Source is expert lecture, moderate quality.
- Bile salt supplementation should be clinician-supervised, particularly post-surgery.
- Contraindicated in bile duct obstruction.
