slug: vegetarian-and-mediterranean-diets-reduce-ra-inflammation
statement: A Mediterranean or vegetarian diet (rich in whole foods, vegetables, cold-water
  fish, olive oil, berries; low in sugar, meat, refined starches, animal fats) reduces
  inflammation, increases physical function, and improves vitality in RA over 12 weeks.
evidence_tier: strong
rationale: Population data and 12-week RCTs cited by Pizzorno. Mechanism via reduced
  inflammatory food triggers, improved gut flora, lower antibody titres to Proteus
  mirabilis, reduced SIBO, higher antioxidant intake.
coaching_translation: A Mediterranean or vegetarian diet — heavy on plants, olive
  oil, and small wild fish; light on red meat, sugar, and refined carbs — measurably
  reduces RA inflammation in 12 weeks. Drop wheat, rye, and barley on a trial basis
  even on the Mediterranean version.
caveats:
- Even on Mediterranean — trial gluten-free for 4-8 weeks given zonulin/RA link.
- Vegetarian works best after a brief therapeutic fast as reset.
- Eliminate nightshades on a trial basis if joint pain persists.
