slug: motivational-interviewing-amplifies-change-talk
statement: In motivational interviewing, selectively reflecting and affirming a client's
  statements that move toward change — change talk — while minimizing reflection of
  sustain talk, increases the likelihood of behavior change.
evidence_tier: strong
rationale: The differential reinforcement of change talk vs. sustain talk is a well-established
  mechanism in MI with strong RCT support across health behavior domains.
coaching_translation: Listen carefully for any statement where the client moves toward
  change ('I could try...', 'I want to...', 'I know I need to...'). Reflect and affirm
  those moments. Don't equally balance reflections of not-changing.
caveats:
- Stated as a coaching principle in group discussion; no specific study cited in this
  document.
