slug: mayo-restless-legs-alpha-2-delta-ligands-preferred-first-line-rx
statement: Conventional guidelines now favour alpha-2-delta ligands (gabapentin enacarbil,
  pregabalin) over dopamine agonists (pramipexole, ropinirole, rotigotine) as first-line
  prescription therapy because dopamine agonists carry a high risk of augmentation
  (worsening of symptoms over time) and impulse-control disorders.
