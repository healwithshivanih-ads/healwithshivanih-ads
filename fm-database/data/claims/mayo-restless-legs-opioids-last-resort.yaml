slug: mayo-restless-legs-opioids-last-resort
statement: Low-dose opioids (oxycodone, methadone, tramadol) are reserved for severe
  refractory RLS that has failed alpha-2-delta ligands and dopamine agonists; addiction
  risk and respiratory depression make them a last-line option requiring close clinician
  oversight.
