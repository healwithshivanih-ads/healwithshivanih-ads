slug: indian-spices-as-antioxidant-fertility-support
statement: Indian culinary spices and herbs used daily contribute meaningful antioxidant
  and anti-inflammatory load that overlaps with the Mediterranean-pattern mechanism
  — turmeric (curcumin), cumin, coriander, fennel, mustard seed, cinnamon, black pepper.
  Traditional preparation with ghee or cold-pressed oil supports fat-soluble bioavailability.
  This pattern overlaps mechanistically with the antioxidant-driven egg quality benefits
  Fett discusses around vitamin E, vitamin C, NAC, and alpha-lipoic acid.
evidence_tier: fm_specific_thin
