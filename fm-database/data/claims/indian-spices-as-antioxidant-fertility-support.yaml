- id: fett-it-starts-with-the-egg-2019
  location: Chapter 7 — Melatonin and Other Antioxidants, pg 97-100 (antioxidant rationale)
  quote: Antioxidants play a vital role in egg quality by protecting against oxidative
    stress. Although ovarian follicles naturally contain a whole host of antioxidant
    vitamins and enzymes, these defenses are compromised in women with unexplained
    infertility, PCOS, and age-related infertility.
rationale: Bridges Fett's antioxidant framing to Indian culinary practice — useful
  for client motivation and continuity.
