  location: Podcast — symptom fingerprints segment
  quote: If you have pain or discomfort on the bottom of your feet and you have occasional
    headaches, weird stretch marks, some vascular diseases, you probably have Bartonella.
    Babesia — people will have shortness of breath, depression and anxiety so bad
    that it could lead to suicidal thoughts. If somebody's got Lyme disease they're
    going to have migratory arthralgias.
rationale: Concrete intake questions that surface specific co-infection suspicion
  — sends client to right referral instead of generic functional workup.
