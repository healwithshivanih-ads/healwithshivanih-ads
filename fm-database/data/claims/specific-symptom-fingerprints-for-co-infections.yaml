slug: specific-symptom-fingerprints-for-co-infections
statement: Although most chronic-fatigue symptoms are non-specific, Hirsch names a
  handful of "fingerprint" patterns worth screening for at intake — (1) MIGRATORY
  ARTHRALGIA (joints hurt different days) is highly Lyme-suggestive; (2) BARTONELLA
  signs include foot-sole pain, occasional headaches, odd stretch marks, and small-vessel
  disease; (3) BABESIA signs include shortness of breath, depression and anxiety severe
  enough to drive suicidal ideation, plus unexplained sweating; (4) ENLARGED LYMPH
  NODES, mood symptoms, and brain fog cluster is typical for EBV reactivation; a cat
  scratch followed by a localised enlarged lymph node is Bartonella (cat-scratch disease).
  Coach screen — surface these specific patterns at intake to direct referrals.
