sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 26 — Autism Spectrum Disorder, pg 554
  quote: 13 children ages 5 to 17 with ASD accompanied by severe tantrums, aggression,
    or self-injurious behavior were given 1.5 g EPA + DHA a day for six weeks. Children
    taking the EPA + DHA showed improvements in hyperactivity and repetitive or ritualistic
    movement compared with children taking a placebo.
version: 1
