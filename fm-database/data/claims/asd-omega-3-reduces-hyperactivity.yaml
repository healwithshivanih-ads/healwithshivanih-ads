slug: asd-omega-3-reduces-hyperactivity
statement: Omega-3 fatty acid supplementation providing 1.3-1.5 g/day EPA+DHA for
  6-12 weeks has been shown in small double-blind trials to reduce hyperactivity and
  repetitive/ritualistic movement in children aged 3-17 with autism spectrum disorder.
  Coach-actionable target dose for children with ASD is 1,500 to 3,000 mg EPA+DHA
  per day per Murray's treatment summary.
evidence_tier: plausible_emerging
linked_to_topics:
