slug: fitzgerald-younger-you-intensive-eating-structure
statement: 'The Younger You Intensive 8-week eating plan: ~7 cups of vegetables/day
  including 2-3 cups cruciferous plus 2+ servings of other adaptogen foods; beets,
  nuts and seeds; clean animal protein at ~0.66 g/kg (under 60) to 1.0-1.2 g/kg (over
  60); liver ~3x/week (3 oz) and 5-10 eggs/week; legumes omitted unless vegetarian/vegan;
  and a gentle 12-hour overnight fast (e.g. 7pm-7am).'
