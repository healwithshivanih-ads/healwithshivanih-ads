slug: ad-food-allergen-elimination-75-percent
statement: Elimination of wheat, milk products, eggs, peanuts, tomatoes, and artificial
  colors and preservatives results in significant improvement in 75% of atopic dermatitis
  cases.
evidence_tier: plausible_emerging
rationale: Cited from Pizzorno's Textbook; supported by multiple elimination diet
  studies in AD, though heterogeneity in study design limits strong consensus.
coaching_translation: Removing the most common food triggers — especially wheat, dairy,
  eggs, and food additives — helps about three-quarters of people with eczema notice
  real improvement.
