slug: pycnogenol-adhd-antioxidant-benefit
statement: Pycnogenol (pine bark extract) at 1 mg/kg body weight per day improved
  antioxidant status, reduced hyperactivity, and improved attention, visual-motor
  coordination, and concentration in children with ADHD.
evidence_tier: plausible_emerging
rationale: Cited from clinical trial data in Pizzorno textbook; increased oxidative
  damage is described as a central factor in ADHD.
coaching_translation: Pine bark extract (Pycnogenol) is a powerful antioxidant that
  has been shown in studies to improve focus and reduce hyperactivity in children
  with ADHD.
