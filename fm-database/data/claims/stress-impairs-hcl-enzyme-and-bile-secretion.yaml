slug: stress-impairs-hcl-enzyme-and-bile-secretion
statement: When the body is in a sympathetic (stress) state, it cannot adequately
  secrete hydrochloric acid, digestive enzymes, or bile, impairing protein, fat, and
  carbohydrate digestion and nutrient absorption.
evidence_tier: plausible_emerging
rationale: Single-expert source. The physiological basis (HPA-enteric nervous system
  interplay, vagal tone, cephalic-phase digestion) is well-supported mechanistically;
  specific claims are from expert synthesis without cited studies.
coaching_translation: Eating while stressed — whether rushing, driving, or in fight-or-flight
  mode — significantly reduces your body's digestive capacity. Even 4–5 deep breaths
  before a meal can shift your system into 'rest and digest.'
caveats:
- Single-expert source; no specific studies cited.
- Mechanism is well-established physiologically but dose-response evidence is thin.
