slug: chronic-stress-remodels-brain-neuroplasticity-allows-reversal
statement: The brain's physical structure — including regions governing decision-making and habit formation
  — shifts measurably under prolonged chronic stress, but these changes can reverse within a comparable
  time-period of stress relief, demonstrating genuine neuroplasticity.
evidence_tier: plausible_emerging
rationale: Directly supported by Sousa et al. (2009, Science) showing stress-induced prefrontal-cortex
  thinning and corticostriatal remodelling in rats, with reversal after stress removal; human studies
  (Lupien, McEwen) confirm similar patterns.
coaching_translation: 'Chronic stress physically remodels the brain — shrinking the parts responsible
  for clear thinking while enlarging habit-driven reactive circuits. The good news: the brain can reverse
  this damage once the stress load is reduced. This is why lifestyle change, even started late, genuinely
  rewires how you feel and respond.'
out_of_scope_notes: ''
caveats:
- Most direct evidence is animal-based; human neuroimaging studies are correlational.
