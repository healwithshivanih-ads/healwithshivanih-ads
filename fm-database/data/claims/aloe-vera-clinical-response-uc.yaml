slug: aloe-vera-clinical-response-uc
statement: Oral aloe vera gel at 100 mL twice daily for 4 weeks produced a clinical
  response in 30% of UC patients, reduced histologic inflammatory activity, and was
  well tolerated.
evidence_tier: plausible_emerging
rationale: Based on a reported clinical trial; aloe inhibits prostaglandin E2 and
  IL-8 production by colonic epithelial cells in vitro, providing a plausible mechanism.
coaching_translation: Aloe vera gel (100 mL orally twice daily) may be a supportive
  adjunct for UC; be aware of mild laxative effects.
caveats:
- Laxative effect of aloe vera gel noted; acemannan extract at 400–800 mg/day may
  offer a more concentrated alternative
