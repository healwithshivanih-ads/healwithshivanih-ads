  - id: pmc-thakur-2025-seed-cycling-systematic-review
    location: Discussion — Zinc and gonadotropin synthesis
    quote: 'Zinc, abundant in pumpkin seeds, is a crucial cofactor for numerous
      enzymes and transcription factors involved in the synthesis of reproductive
      hormones. It plays a role in the pituitary release of gonadotropins (FSH and
      LH), which are essential for follicular maturation and ovulation.'
