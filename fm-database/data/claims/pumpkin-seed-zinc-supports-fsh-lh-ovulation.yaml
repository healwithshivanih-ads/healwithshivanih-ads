slug: pumpkin-seed-zinc-supports-fsh-lh-ovulation
statement: Pumpkin seeds are a concentrated whole-food source of zinc, which is a
  cofactor for hypothalamic-pituitary-gonadal axis function and gonadotropin (FSH,
  LH) synthesis, and contain beta-sitosterol that may modulate excess androgens
  relevant to PCOS.
evidence_tier: plausible_emerging
rationale: Mechanistic reasoning supported by the 2025 systematic review's
  discussion section, which synthesises mechanistic literature. Direct human-trial
  evidence in PCOS is limited and confounded by other dietary co-factors.
coaching_translation: Pumpkin seeds are a tasty whole-food source of zinc and
  beta-sitosterol. Zinc helps the brain–pituitary–ovary axis make the hormones
  (FSH and LH) that drive ovulation, and beta-sitosterol may help dial down excess
  androgens — both useful in PCOS.
caveats:
  - Mechanistic claim; isolated nutrient studies don't capture whole-seed effects.
  - Most PCOS trials test seed cycling combinations rather than pumpkin alone.
  - Don't replace clinically-indicated zinc supplementation in deficiency states
    with seeds alone.
