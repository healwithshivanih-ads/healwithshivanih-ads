  location: Chapter 74 — Macular Degeneration, pg 1223-1224
  quote: Studies conducted by the Age-Related Eye Disease Study Research Group (AREDS)
    confirm that a combination of these nutrients will be likely to produce better
    results than any single nutrient alone. The specific amounts of antioxidants and
    zinc used in the study were 500 mg vitamin C, 400 IU vitamin E, 15 mg beta-carotene,
    80 mg zinc (as zinc oxide), and 2 mg copper (as cupric oxide).
