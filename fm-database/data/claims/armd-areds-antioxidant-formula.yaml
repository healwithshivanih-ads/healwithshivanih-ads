slug: armd-areds-antioxidant-formula
statement: The Age-Related Eye Disease Study (AREDS) formula — vitamin C 500 mg, vitamin
  E 400 IU, beta-carotene 15 mg (≈25,000 IU vitamin A equivalent), zinc 80 mg (as
  zinc oxide), copper 2 mg — produces better protection against ARMD progression than
  any single nutrient alone. Risk-factor frame — smoking, aging, atherosclerosis,
  hypertension. Smoking one pack per day raises ARMD risk 2-3× and risk does not return
  to baseline until 15 years after cessation. Family history of macular degeneration
  raises lifetime late- stage risk to 50% vs 12% for those without.
evidence_tier: strong
