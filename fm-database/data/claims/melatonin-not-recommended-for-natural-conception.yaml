slug: melatonin-not-recommended-for-natural-conception
statement: Melatonin supplementation is not recommended for women trying to conceive
  naturally because it may interfere with the hormonal signalling that regulates ovulation
  timing. The benefit-vs-risk equation flips only in IVF, where ovulation is artificially
  controlled with stimulation drugs and the antioxidant benefit dominates.
evidence_tier: plausible_emerging
