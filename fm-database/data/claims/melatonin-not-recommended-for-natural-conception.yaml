- id: fett-it-starts-with-the-egg-2019
  location: Chapter 7 — Melatonin and Other Antioxidants, pg 103-104
  quote: It is probably not a good idea to take a melatonin supplement if you are
    trying to conceive naturally because it appears that melatonin may have a direct
    role in regulating the production of hormones that control the ovulation cycle.
rationale: Critical safety nuance — many clients self-prescribe melatonin without
  knowing this caveat.
