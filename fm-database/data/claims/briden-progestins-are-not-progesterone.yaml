- id: briden-period-repair-manual-2018
  location: Chapter 2 — Pill Drugs Are Not Hormones, pp 19-21
  quote: Progestin is a general term for drugs that are similar to progesterone. Progestin
    drugs include levonorgestrel and drospirenone, which have some of the same effects
    as progesterone but also have many opposite effects. The terms progestin and progesterone
    cannot be used interchangeably. Levonorgestrel is actually more similar to testosterone
    than it is to progesterone.
