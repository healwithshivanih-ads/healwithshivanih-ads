slug: briden-progestins-are-not-progesterone
statement: Synthetic progestins (levonorgestrel, drospirenone, etonogestrel, medroxyprogesterone
  acetate, norgestimate, cyproterone, norelgestromin) are not bioidentical to human
  progesterone. Levonorgestrel in particular is structurally closer to testosterone
  than to progesterone and exerts androgenic effects on hair follicles, sebaceous
  glands, and mood. The terms progestin and progesterone are pharmacologically distinct
  and cannot be used interchangeably.
evidence_tier: strong
rationale: This is established medicinal chemistry — the molecular structures and
  receptor affinity profiles of named progestins are well published. The androgen
  index of each progestin is a documented pharmacological parameter used by prescribers
  to predict androgenic side effects. Briden references published studies linking
  high-androgen-index progestins to hair loss, acne, and depression.
coaching_translation: The pill calls its second ingredient a progestin, which sounds
  like progesterone, but they are different molecules with different effects on your
  body. Some progestins act more like testosterone — that is why some pills cause
  hair loss, acne, and mood changes that resolve when you stop them.
caveats:
- Natural micronised progesterone (bioidentical) is a different drug and is used in
  HRT and luteal-phase support — different safety and efficacy profile from synthetic
  progestins.
- Cyproterone and drospirenone are low-androgen-index progestins and have a different
  side-effect signature (rebound androgens after stopping).
