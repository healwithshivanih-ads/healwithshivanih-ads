slug: mayo-food-poisoning-red-flags-dehydration-and-systemic
statement: Emergency evaluation is warranted for inability to keep fluids down for
  24 hours, bloody stool or vomit, fever above 39 degrees C / 102 degrees F, signs
  of severe dehydration (dizziness on standing, no urine output, sunken eyes), neurological
  symptoms (blurred vision, muscle weakness, tingling), or symptoms in pregnant clients,
  infants, elderly, or immunocompromised.
