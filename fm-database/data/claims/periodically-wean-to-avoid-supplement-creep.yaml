slug: periodically-wean-to-avoid-supplement-creep
statement: 'Beware ''supplement creep'': once you have been stable for two to three
  months, periodically discontinue supplements one at a time to check whether each
  still helps, aiming for the minimal effective long-term program.'
evidence_tier: plausible_emerging
rationale: The Step-7 weaning principle.
coaching_translation: Every so often, drop a supplement to see if you still need it
  — the goal is the shortest list that keeps you well.
