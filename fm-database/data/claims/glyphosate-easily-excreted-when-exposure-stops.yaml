slug: glyphosate-easily-excreted-when-exposure-stops
statement: Glyphosate (the active ingredient in Roundup and other widely-used herbicides)
  is relatively rapidly excreted once exposure stops — within days to weeks — so urinary
  glyphosate levels respond fast to dietary shifts toward organic produce. The challenge
  is that glyphosate now contaminates most non-organic legumes, grains, fruits and
  juices, and even some organic legumes due to drift and storage practices. Glyphosate
  is patented as an antibiotic and disrupts the gut microbiome, contributing to dysbiosis
  patterns clinicians otherwise attribute to other causes.
