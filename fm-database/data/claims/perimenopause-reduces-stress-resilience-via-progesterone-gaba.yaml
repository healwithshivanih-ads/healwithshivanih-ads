slug: perimenopause-reduces-stress-resilience-via-progesterone-gaba
statement: The perimenopause transition reduces stress resilience because declining
  progesterone lowers GABA activity, narrowing the body's stress-response bandwidth.
evidence_tier: plausible_emerging
rationale: Progesterone's metabolite allopregnanolone is a positive GABA-A modulator;
  its decline in perimenopause is a plausible mechanism for reduced GABAergic inhibition
  and increased anxiety. Well-accepted in FM; emerging in conventional literature.
coaching_translation: In perimenopause, your natural 'calm-down' system (GABA) loses
  support as progesterone falls — meaning stress hits harder and recovery takes longer.
caveats:
- Mechanism is plausible and increasingly accepted but individual variation is high.
- Single-expert source.
