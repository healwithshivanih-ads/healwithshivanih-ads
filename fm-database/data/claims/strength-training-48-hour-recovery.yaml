slug: strength-training-48-hour-recovery
statement: 'Muscle groups worked during strength training require approximately 48

  hours of recovery before being trained again at similar intensity.

  '
evidence_tier: strong
rationale: 'Resistance exercise creates microtrauma to muscle fibres; recovery,

  repair, and adaptive hypertrophy occur over roughly 24–72 hours. Daily

  strength work on the same muscle group impairs adaptation and raises

  injury risk. Splitting training across muscle groups, or alternating

  hard/easy days, respects this window.

  '
coaching_translation: 'When you train a muscle, give it about 48 hours before you
  train it

  hard again. That doesn''t mean rest entirely — you can train different

  muscle groups on consecutive days, or do lighter activity. The 48-hour

  window is when your muscles actually get stronger.

  '
caveats:
- Light isometric or rehabilitative work may be performed daily under guidance.
- Recovery time may extend in older adults, deconditioned clients, or when sleep is
  poor.
