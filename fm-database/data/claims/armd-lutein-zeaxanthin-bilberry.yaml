  quote: Patients receiving lutein (10 mg) alone or in combination with other vitamins
    and minerals showed improvements in visual function. Bilberry extracts standardized
    to contain 25% anthocyanidins appear to be the most useful. The anthocyanosides
    of bilberry have a very strong affinity for the retinal pigmented epithelium.
