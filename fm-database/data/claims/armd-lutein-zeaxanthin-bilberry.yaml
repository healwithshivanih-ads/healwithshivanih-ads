slug: armd-lutein-zeaxanthin-bilberry
statement: Lutein 10 mg per day improves visual function in early ARMD (LAST trial,
  12 months). The macula's yellow colour comes from lutein and zeaxanthin concentrated
  in the fovea. Dietary sources — spinach, corn, kale, kiwi, paprika, lycopene from
  tomatoes. Fish, nuts, and long-chain omega-3s slow ARMD progression; animal fat,
  fried/grilled foods, baked goods, and beer accelerate it. Bilberry extract standardised
  to 25% anthocyanidins has high affinity for retinal pigmented epithelium and is
  the most useful flavonoid for ARMD; ginkgo (24% flavonglycosides) is preferred when
  cerebral blood-flow concerns coexist.
