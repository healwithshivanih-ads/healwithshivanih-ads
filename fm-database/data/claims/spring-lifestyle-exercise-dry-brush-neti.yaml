slug: spring-lifestyle-exercise-dry-brush-neti
statement: Spring lifestyle practices to support seasonal clearing include daily morning exercise (ideally
  outdoors with light sweat), dry brushing, neti pot nasal irrigation, reducing daytime naps, waking with
  the sun, and drinking tulsi or ginger tea daily.
evidence_tier: fm_specific_thin
rationale: Movement, sweating, and nasal clearing counteract kapha's static and congested tendency in
  spring; early rising aligns with the body's natural circadian rhythm of kapha dominance in the early
  morning hours.
coaching_translation: In spring, prioritise morning movement before breakfast and add simple practices
  like dry brushing or a neti pot to help clear winter congestion — physical and metabolic.
out_of_scope_notes: ''
caveats:
- Lifestyle guidelines are traditional; circadian and exercise components have broader modern support.
