slug: phase2-glutathione-conjugation-requires-glutathione
statement: Glutathione is a primary Phase 2 conjugation molecule used in glutathione-S-transferase
  reactions to neutralize reactive intermediates; supporting glutathione levels is
  essential for Phase 2 function.
evidence_tier: strong
rationale: Glutathione-S-transferase (GST) reactions are among the best-characterized
  Phase 2 pathways, with extensive biochemical and clinical evidence. Glutathione
  depletion impairs detoxification of reactive electrophiles including drug metabolites,
  heavy metals, and oxidized lipids.
coaching_translation: Glutathione is your liver's most important detox molecule. Think
  of it as a sticky neutralizer that grabs onto activated toxins and renders them
  harmless. Keeping glutathione levels healthy is central to effective detoxification.
caveats:
- Expert lecture source (moderate quality). Glutathione's role in Phase 2 detox is
  well-established biochemistry. Supplementation bioavailability and optimal dosing
  require clinician input.
