slug: quinoa-complete-protein-for-plant-based-meals
statement: Quinoa is a complete protein source (containing all essential amino acids)
  suitable for replacing refined carbohydrates in cardiometabolic meal plans, particularly
  for vegetarians.
evidence_tier: strong
rationale: Quinoa appears in Quinoa Upma, Quinoa-Flax Roti, Quinoa-Masoor Dal Khichdi,
  and as a serving base for fish. Quinoa's complete amino acid profile and lower glycaemic
  index compared to white rice are well established in the literature.
coaching_translation: Quinoa is one of the few plant foods that contains all the essential
  amino acids your body needs — it's a great grain swap that also provides protein.
caveats:
- Evidence for quinoa as a complete protein is strong; specific cardiometabolic outcome
  data from RCTs are more limited.
