slug: testosterone-to-estrogen-imbalance-causes-apple-shape
statement: When testosterone is supplemented without adequate estrogen replacement,
  the relative testosterone excess can shift fat distribution toward an apple-shaped
  (abdominal) pattern in women due to androgen receptor density in the midsection.
evidence_tier: plausible_emerging
rationale: Androgen receptor distribution influencing adipose depot patterns is mechanistically
  supported. The clinical observation that testosterone-only HRT without estrogen
  leads to central fat redistribution is reported in FM/integrative practice but lacks
  strong RCT data in perimenopausal women.
coaching_translation: Starting testosterone HRT before estrogen is optimized can sometimes
  cause unexpected belly fat gain. This is a conversation to have with a hormone-literate
  clinician before or during HRT.
out_of_scope_notes: HRT type, sequencing, and dosing are clinician decisions. Coaches
  should recognize unexpected central weight gain after testosterone initiation as
  a referral cue.
caveats:
- Single-expert source (Dr. Jones clinical observation).
- Not supported by large RCTs in perimenopausal women as of transcript date.
