  location: 'Session 4 — Q&A: Hysterectomy and Weight Resistance'
  quote: If you push testosterone too much, not everybody, don't panic if you're on
    testosterone, but if you push testosterone first and your estrogen is really quite
    low, you get an imbalance in the body — and what happens is we, as women, have
    a lot of those receptors in our midsection for testosterone and it skews us towards
    apple shape as opposed to pear shape.
