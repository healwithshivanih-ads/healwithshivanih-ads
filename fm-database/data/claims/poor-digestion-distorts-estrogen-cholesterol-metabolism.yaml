slug: poor-digestion-distorts-estrogen-cholesterol-metabolism
statement: 'Poor digestion impairs transformative processes system-wide: weakened digestive capacity can
  cause the liver to convert estradiol into pro-inflammatory ''bad'' oestrogen metabolites and increase
  production of harmful cholesterol fractions — linking gut health to hormonal and cardiovascular balance.'
evidence_tier: plausible_emerging
rationale: 'Welch describes ama as a systemic consequence of poor digestion that distorts downstream metabolic
  transformations. This maps to FM''s well-documented gut-liver axis: dysbiosis and impaired phase II
  detox do shift oestrogen metabolism toward more proliferative 16-OH metabolites; impaired hepatic function
  affects lipid handling.'
coaching_translation: When digestion is chronically poor, it affects your entire biochemistry — not just
  your gut. Weak digestion can push your body toward making the more inflammatory form of oestrogen and
  the harmful form of cholesterol, which is why gut health sits at the root of hormonal and heart health.
out_of_scope_notes: ''
caveats:
- Welch uses Ayurvedic framing (ama → poor transformational quality). The underlying pathophysiology (gut-liver
  axis, oestrogen metabolism, lipid handling) has meaningful evidence in FM literature but is presented
  here in integrative/Ayurvedic language rather than mechanistic biochemistry.
