slug: comt-methylates-catecholamines-and-catechol-estrogens
statement: COMT methylates both catecholamine neurotransmitters (dopamine,
  norepinephrine, epinephrine) and catechol estrogen metabolites — one enzyme
  sitting at the intersection of mood/stress physiology and oestrogen clearance,
  which is why COMT status shows up in both mental-health and hormone-balance
  coaching conversations.
evidence_tier: strong
rationale: Explains why the same gene appears relevant across seemingly unrelated
  topics (anxiety AND estrogen dominance) — useful for the coach to connect the
  dots rather than treat them as two separate issues.
coaching_translation: If a client's anxiety/mood picture and her hormone-balance
  picture both keep surfacing, COMT is one plausible shared thread worth naming —
  not diagnosing, just noting the connection.
