slug: bpa-plasticizers-disrupt-endocrine-function
statement: Bisphenol-A (BPA) and other plasticizers found in canned foods and plastic
  containers disrupt endocrine gland function and should be limited to reduce toxic
  body burden.
evidence_tier: strong
rationale: BPA's endocrine-disrupting properties are well-documented in peer-reviewed
  literature, with regulatory actions taken in multiple countries. Human epidemiological
  data links BPA exposure to reproductive, metabolic, and developmental effects.
coaching_translation: Choosing glass, stainless steel, or BPA-free containers and
  limiting canned foods reduces your exposure to hormone-disrupting chemicals that
  accumulate in the body.
caveats:
- Mechanistic evidence is strong; human clinical causation at typical exposure levels
  is still debated by regulatory bodies.
