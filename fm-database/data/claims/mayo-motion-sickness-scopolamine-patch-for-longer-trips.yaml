slug: mayo-motion-sickness-scopolamine-patch-for-longer-trips
statement: Transdermal scopolamine patch (Transderm Scop) applied behind the ear 4
  hours before travel and lasting up to 72 hours is the preferred prescription option
  for cruises, long flights, and sea travel; cautions include dry mouth, blurred vision,
  urinary retention, and confusion in older clients.
