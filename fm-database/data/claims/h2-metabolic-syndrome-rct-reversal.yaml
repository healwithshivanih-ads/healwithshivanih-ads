slug: h2-metabolic-syndrome-rct-reversal
statement: In a randomised controlled trial in adults with metabolic syndrome, daily
  molecular hydrogen tablet supplementation produced statistically significant improvement
  in 20 of 21 measured outcomes, including triglycerides, fasting glucose, insulin,
  HbA1c, waist circumference, body weight (over 1 lb per month average loss without
  dietary intervention), and inflammatory markers. Adjacent trials show benefit in
  non-alcoholic fatty liver disease (NAFLD) and pre-diabetic states. Mechanism is
  multi-modal — Nrf2 activation, mitochondrial efficiency, microbiome restoration,
  and an observed self-reinforcing behavioral feedback (subjects spontaneously increased
  activity as energy and mood improved).
evidence_tier: plausible_emerging
