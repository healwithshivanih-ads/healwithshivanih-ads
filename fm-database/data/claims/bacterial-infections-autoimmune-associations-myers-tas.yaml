slug: bacterial-infections-autoimmune-associations-myers-tas
statement: Specific bacteria are associated with specific autoimmune conditions —
  e.g., Klebsiella with ankylosing spondylitis, Yersinia with thyroid autoimmunity,
  Campylobacter with Guillain-Barré, and Streptococcus pyogenes with rheumatic fever.
evidence_tier: plausible_emerging
rationale: Molecular-mimicry and post-infectious immune responses underlie several
  of these classic microbe-disease associations, which can guide targeted testing
  in refractory cases.
coaching_translation: Certain infections are tied to certain autoimmune diseases —
  worth investigating with a doctor if progress stalls.
