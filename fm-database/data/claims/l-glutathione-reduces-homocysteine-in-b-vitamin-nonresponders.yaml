slug: l-glutathione-reduces-homocysteine-in-b-vitamin-nonresponders
statement: L-glutathione supplementation may be beneficial for reducing homocysteine in patients who do not respond adequately
  to B vitamin supplementation.
evidence_tier: fm_specific_thin
rationale: The document recommends L-glutathione for patients where B vitamins are insufficient to normalise homocysteine.
  This is plausible given glutathione's role in the transsulfuration pathway, but direct clinical evidence is thin.
coaching_translation: If a client's homocysteine remains elevated despite optimising B vitamins, their practitioner may consider
  adding glutathione support.
out_of_scope_notes: L-glutathione dosing and suitability assessment is clinical, not coaching scope.
caveats:
- Evidence base is from expert opinion/FM context; limited RCT data for this specific indication.
- Source is expert lecture of moderate quality; treat as FM-specific guidance pending further evidence.
