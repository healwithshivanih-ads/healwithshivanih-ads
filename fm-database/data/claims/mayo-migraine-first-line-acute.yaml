slug: mayo-migraine-first-line-acute
statement: Acute migraine pain typically responds best to medication taken at the
  first sign of an attack, with OTC options like ibuprofen or aspirin for mild attacks
  and prescription triptans (sumatriptan, rizatriptan, eletriptan) for moderate-to-severe
  attacks.
