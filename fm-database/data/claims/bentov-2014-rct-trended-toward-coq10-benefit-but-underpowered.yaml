slug: bentov-2014-rct-trended-toward-coq10-benefit-but-underpowered
statement: The 2014 Bentov et al double-blind placebo-controlled RCT of 600 mg/day
  CoQ10 vs placebo in IVF-ICSI patients aged 35-43 was terminated early after enrolling
  39 patients (24 completing cycles). Aneuploidy rates trended in favour of CoQ10
  (46.5% vs 62.8% in placebo) and clinical pregnancy rates were 33% vs 26.7%, but
  the trial was underpowered to detect a significant difference. This is the only
  RCT-level evidence on CoQ10 and oocyte aneuploidy and explains why CoQ10 is most
  accurately framed as plausible-emerging despite enthusiasm in the integrative-fertility
  community.
evidence_tier: plausible_emerging
