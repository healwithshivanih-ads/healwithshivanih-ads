  quote: The rate of aneuploidy was 46.5 percent in the CoQ10 group compared to 62.8
    percent in the control. Clinical pregnancy rate was 33 percent for the CoQ10 group
    and 26.7 percent for the control group. The final study was underpowered to detect
    a difference in the rate of aneuploidy.
rationale: Honest evidence-tiering — the RCT trended positive but the headline claim
  remains underpowered. Client coaching should reflect this.
