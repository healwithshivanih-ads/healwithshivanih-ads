slug: cooked-warm-food-preferred-raw-cold-dampens-agni
statement: In Ayurveda, warm, well-spiced, cooked food is preferred in all seasons except summer, where
  slightly cooling but still lightly cooked food is advised; raw and cold foods are consistently reduced
  in spring, autumn, and winter because they dampen digestive fire and increase vata or kapha.
evidence_tier: plausible_emerging
rationale: Raw and cold foods require more agni to process and simultaneously reduce it through their
  cool/heavy qualities. Lightly cooking food — especially with digestive spices — pre-processes food energetically,
  reduces the digestive burden, and supports optimal nutrient absorption.
coaching_translation: For clients with slow digestion, bloating, or irregular bowels, switching from raw
  salads to warm, lightly cooked meals with digestive spices (cumin, coriander, fennel, ginger) is often
  the single most impactful dietary change.
out_of_scope_notes: ''
caveats:
- Ayurvedic cooking principle; heat does denature some enzymes and vitamin C, but also increases bioavailability
  of many phytonutrients (e.g., lycopene, beta-carotene). Consistent with autonomic-digestion research
  favouring warm food.
