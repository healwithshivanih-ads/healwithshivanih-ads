slug: chia-flaxseed-first-line-constipation
statement: Two tablespoons each of chia seeds and ground flaxseeds daily is an effective
  first-line dietary intervention for chronic constipation.
evidence_tier: plausible_emerging
rationale: Both chia seeds and ground flaxseed are rich in soluble and insoluble fibre,
  with demonstrated effects on stool consistency and frequency in observational and
  small interventional studies.
coaching_translation: Before reaching for supplements, try adding 1–2 tablespoons
  of chia seeds and ground flaxseed to a smoothie or yoghurt each morning. This alone
  resolves constipation for many people within 1–2 weeks.
caveats:
- Must be accompanied by adequate hydration (8+ glasses of water/day).
- Start with a smaller amount if client has sensitive digestion.
