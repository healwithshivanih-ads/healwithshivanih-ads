slug: sleep-is-the-fastest-route-to-hpa-reset
statement: Sleep deprivation is the fastest single route into HPA-axis dysregulation;
  correspondingly, restoring sleep is the fastest single route out. Wentz's sleep-pillar
  fundamentals — cool dark bedroom, Epsom-salt bath or magnesium supplementation pre-bed,
  no screens or blue light in the hour before sleep, covering ambient LEDs in the
  bedroom, a consistent wind-down routine. These are non-negotiable basics that precede
  any cortisol testing or hormone work.
