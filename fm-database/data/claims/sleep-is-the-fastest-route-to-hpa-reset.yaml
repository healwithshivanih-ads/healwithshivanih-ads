  quote: One of the the fastest ways to get your cortisol low or to get into HPA axis
    dysfunction is through sleep deprivation. One of the best ways to get out of it
    is going to be making sure that you are getting adequate sleep. Sleeping in a
    colder darker room — that's going to help you fall asleep better.
rationale: Coach defaults — sleep before supplements, every time, especially for new
