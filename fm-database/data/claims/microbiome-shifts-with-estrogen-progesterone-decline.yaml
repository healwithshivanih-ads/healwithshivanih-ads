slug: microbiome-shifts-with-estrogen-progesterone-decline
statement: Changes in estrogen and progesterone during perimenopause alter the composition
  of gut bacteria, viruses, and fungi, and reduce short-chain fatty acids (butyrate,
  propionate, acetate) and regulatory T-cell function, increasing inflammation and
  immune dysregulation.
evidence_tier: plausible_emerging
rationale: Estrogen's influence on microbiome composition is a well-documented area
  of emerging research. SCFA reductions and Treg alterations are plausible downstream
  effects. Speaker names specific SCFAs and cell types, adding mechanistic depth.
  Full consensus is not yet established.
coaching_translation: Hormone changes in perimenopause don't just affect hot flashes
  — they reshape the gut microbiome, reduce protective fatty acids like butyrate,
  and weaken immune regulation, all of which increase inflammation and food reactivity.
caveats:
- Single-expert source.
- Speaker uses 'piperonate' — likely intended 'propionate'; verify terminology.
- Treg changes linked specifically to perimenopausal hormone shifts have limited direct
  RCT evidence.
