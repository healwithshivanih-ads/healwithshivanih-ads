slug: murray-restless-legs-iron-ferritin
statement: Low iron stores — assessed by serum ferritin (NOT serum iron, hemoglobin,
  B12, or folate, which often appear normal) — drive both restless legs syndrome (RLS)
  and SSRI-induced akathisia. Ferritin below 18 ng/ml is associated with severe RLS;
  iron supplementation (30 mg twice daily of bisglycinate / succinate / fumarate between
  meals) reduces RLS severity by 4 points on validated scales in subjects with ferritin
  under 18, by 3 points at 18–45, and by 1 point at 45–100 — suggesting an optimal
  RLS-management ferritin target above 75 ng/ml. For SSRI-induced akathisia, ferritin
  under 35 ng/ml should be corrected before considering antidepressant switch.
evidence_tier: strong
rationale: O'Keeffe 1994 cited; subsequent IRLSSG (International Restless Legs Syndrome
  Study Group) guidelines (2018) confirm iron-deficiency as the most-actionable RLS
  subtype. Mechanism — iron is cofactor for tyrosine hydroxylase in nigrostriatal
  dopamine synthesis; iron-deficient dopamine deficiency presents as RLS + akathisia
  + reduced reward response. The ferritin > 75 ng/ml target is well-supported by sleep
  medicine specialty consensus.
coaching_translation: Restless legs at night and akathisia (jitteriness) on SSRIs
  are often iron deficiency in disguise — even when haemoglobin is normal. The KEY
  test is serum ferritin (the iron storage marker), not regular iron labs. Target
  ferritin above 75 ng/ml — below 35 is definitely deficient, 35-75 is suboptimal
  for RLS. Iron bisglycinate 30 mg twice daily between meals is well-tolerated. Pair
  with vitamin C for absorption.
caveats:
- Always check ferritin BEFORE supplementing iron — iron overload (hereditary haemochromatosis)
  is a contraindication
- Bisglycinate form is best tolerated; sulphate causes more GI upset
- Between meals for absorption; vitamin C enhances; tea/coffee/calcium/zinc block
- Constipation is the most common side effect
- Goal — ferritin > 75 ng/ml for RLS; reassess at 3 months
- SSRI-induced akathisia + low ferritin — correct iron BEFORE switching antidepressants
