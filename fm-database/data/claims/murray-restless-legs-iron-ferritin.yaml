out_of_scope_notes: Iron prescribing in pregnancy + paediatrics + suspected haemochromatosis
  is clinician scope. Coach role — recommend ferritin testing + bisglycinate within
  over-the-counter dose range.
sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 71 — Insomnia, pg 1184–1185
  quote: Serum ferritin levels were inversely correlated with the severity of symptoms.
    The severity of restless legs syndrome decreased by an average of 4 points in
    sixteen patients with an initial ferritin level lower than 18 mg/l. Low serum
    ferritin levels have been found in psychiatric patients experiencing a condition
    called akathisia, a drug-induced state of agitation. The drugs that most commonly
    produce akathisia are antidepressant drugs, such as fluoxetine (Paxil, Prozac)
    and sertraline (Zoloft).
