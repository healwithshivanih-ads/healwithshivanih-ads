slug: h-pylori-low-antioxidant-colonisation-feedback
statement: Low gastric acid output and low antioxidant content in the GI mucosa predispose
  to H. pylori colonisation, which in turn raises gastric pH, creating a positive
  feedback loop that increases risk for colonisation by other organisms.
evidence_tier: plausible_emerging
rationale: Mechanistically coherent but drawn from a textbook synthesis; direct RCT
  evidence for the antioxidant-colonisation link is emerging rather than consensus.
coaching_translation: A nutrient-rich antioxidant diet may help maintain the gastric
  environment that resists H. pylori overgrowth.
caveats:
- Source is a textbook synthesis; specific antioxidant RCTs not cited here.
