slug: ad-fish-oil-dha-correlates-improvement
statement: Fish oil supplementation (EPA and DHA) in atopic dermatitis results in
  clinical improvement that correlates with the increase in DHA concentration in serum
  phospholipids.
evidence_tier: plausible_emerging
rationale: Multiple epidemiologic and supplementation studies cited; the biomarker–outcome
  correlation strengthens the mechanistic plausibility of omega-3 incorporation into
  membrane phospholipids.
coaching_translation: Adding fish oil to your routine may improve eczema — the better
  your omega-3 levels in your blood, the more your skin tends to improve.
