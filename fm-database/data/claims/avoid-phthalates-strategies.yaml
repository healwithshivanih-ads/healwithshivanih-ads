slug: avoid-phthalates-strategies
statement: 'Practical phthalate reduction: switch personal care products to fragrance-free
  or naturally scented (essential-oil-based); avoid PVC/vinyl flooring and shower
  curtains; avoid air fresheners and scented candles; check nail polish for 3-free
  or 5-free labels; replace soft plastic food contact items; favour fresh whole foods
  over processed; choose unscented laundry detergent. Phthalate body levels drop within
  days of avoidance.'
