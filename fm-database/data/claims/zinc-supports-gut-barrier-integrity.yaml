slug: zinc-supports-gut-barrier-integrity
statement: Zinc enhances gut barrier integrity in leaky gut and chronic diarrhea contexts.
evidence_tier: fm_specific_thin
rationale: Zinc's role in tight junction protein synthesis and gut mucosal repair
  is plausible; clinical trial evidence is emerging but not yet robust.
coaching_translation: Zinc-rich foods (oysters, red meat, pumpkin seeds) and zinc
  carnosine supplements may support gut lining health.
caveats:
- Source is a practitioner cheatsheet without primary citations.
- The leaky gut concept itself has variable clinical evidence.
- Source is practitioner cheatsheet.
- High-dose zinc risks copper depletion; keep at coaching-appropriate food levels
  unless clinician directs supplementation.
