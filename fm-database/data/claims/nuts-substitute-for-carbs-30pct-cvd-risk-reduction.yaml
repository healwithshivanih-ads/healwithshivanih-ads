slug: nuts-substitute-for-carbs-30pct-cvd-risk-reduction
statement: Substituting nuts for an equivalent caloric amount of carbohydrates reduces
  heart disease risk by 30%; substituting for saturated fats achieves a 45% risk reduction.
evidence_tier: strong
rationale: Supported by prospective cohort studies (Nurses' Health Study, Adventist
  Health Study) and meta-analyses on nut consumption and CVD.
coaching_translation: Swapping carbs or butter/meat for a handful of nuts daily is
  one of the simplest and most powerful diet changes for heart health.
