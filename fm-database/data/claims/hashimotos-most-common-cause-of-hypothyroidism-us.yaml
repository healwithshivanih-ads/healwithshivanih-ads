slug: hashimotos-most-common-cause-of-hypothyroidism-us
statement: Hashimoto's thyroiditis is the most frequent cause of clinical hypothyroidism
  in the United States; antibodies target thyroid peroxidase, thyroglobulin, and TSH
  receptors, and can also bind adrenal, pancreatic, and gastric parietal cells.
evidence_tier: strong
rationale: Pizzorno & Murray identify Hashimoto's as the predominant cause of primary
  hypothyroidism in industrialized countries — consistent with mainstream endocrinology
  epidemiology.
coaching_translation: In the US, most underactive thyroids are autoimmune — the immune
  system gradually destroys thyroid tissue. The same antibody process can also affect
  the adrenals, pancreas, and stomach lining.
caveats:
- 10-15% of patients with Hashimoto's can be antibody-negative on standard testing.
- Iodine deficiency remains the leading cause of hypothyroidism worldwide.
