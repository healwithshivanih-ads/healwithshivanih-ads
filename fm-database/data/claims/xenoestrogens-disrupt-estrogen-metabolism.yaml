slug: xenoestrogens-disrupt-estrogen-metabolism
statement: Xenoestrogens — chemicals in personal care and home products that mimic
  estrogen — can disrupt healthy estrogen metabolism.
evidence_tier: plausible_emerging
rationale: Teitelbaum et al. (Reprod Toxicol. 2015) is cited in the references regarding
  endocrine-disrupting chemicals. The mechanism is plausible and supported by observational
  and experimental data.
coaching_translation: Everyday products like plastics, fragrances, and some cosmetics
  can contain hormone-mimicking chemicals. Switching to cleaner options (check ewg.org)
  reduces this hormonal burden on your body.
caveats:
- Epidemiological associations exist but establishing individual causality is difficult.
  Environmental burden is cumulative.
- Individual exposure levels and susceptibility vary
- Reformulating home products is a meaningful but not sole intervention
