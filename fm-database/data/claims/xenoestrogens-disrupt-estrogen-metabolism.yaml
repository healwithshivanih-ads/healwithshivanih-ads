slug: xenoestrogens-disrupt-estrogen-metabolism
statement: Xenoestrogens — chemicals in personal care and home products that mimic
  estrogen — disrupt healthy estrogen metabolism.
evidence_tier: plausible_emerging
rationale: Document references Teitelbaum et al. (Reprod Toxicol, 2015) on endocrine
  disrupting chemicals in breast cancer. Xenoestrogen disruption of hormone signaling
  is well-documented in research, though human intervention data is limited.
coaching_translation: Swapping conventional personal care and cleaning products for
  cleaner alternatives (check ewg.org) reduces your daily xenoestrogen load.
caveats:
- Epidemiological associations exist but establishing individual causality is difficult.
  Environmental burden is cumulative.
