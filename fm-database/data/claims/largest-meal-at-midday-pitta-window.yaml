slug: largest-meal-at-midday-pitta-window
statement: Ayurveda places the largest, hardest-to-digest meal of the day in the 10
  am to 2 pm window (pitta time), when digestive fire (agni) is strongest and aligned
  with solar peak. Dinner should be finished by 6 to 7 pm so that food is fully digested
  before sleep, supporting deeper sleep quality and the night-time inflammation-clearing
  cycle.
