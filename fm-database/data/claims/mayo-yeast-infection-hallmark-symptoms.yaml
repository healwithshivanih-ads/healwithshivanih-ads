slug: mayo-yeast-infection-hallmark-symptoms
statement: Classic vaginal yeast-infection symptoms are vulvar itching and irritation,
  thick white cottage-cheese-like discharge without strong odour, burning with intercourse
  or urination, and vulvar redness or swelling.
