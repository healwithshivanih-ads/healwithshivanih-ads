slug: iga-ige-igg-antibody-roles-myers-tas
statement: IgA guards mucosal surfaces (a low stool IgA can signal yeast overgrowth
  and immune suppression), IgE drives immediate allergy, and IgG produces delayed
  (up to 72-hour) food sensitivities.
evidence_tier: plausible_emerging
rationale: These immunoglobulin classes explain the difference between fast allergic
  reactions and slow, hard-to-pinpoint sensitivities central to the Myers Way.
coaching_translation: Allergies (IgE) are fast and obvious; food sensitivities (IgG)
  are slow and sneaky, sometimes showing up days later.
