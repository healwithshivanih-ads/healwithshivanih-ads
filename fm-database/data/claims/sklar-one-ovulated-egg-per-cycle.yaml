slug: sklar-one-ovulated-egg-per-cycle
statement: For natural conception a woman only needs one good-quality mature egg per
  cycle — even women with low AMH still typically release one mature egg at ovulation,
  so optimisation work should focus on the health of that single egg rather than on
  the total recruited cohort.
