slug: breathing-pattern-reflects-birth-experience
statement: An individual's breathing pattern — including breath-holding, inability
  to fully exhale, or panic on exhale — reflects the conditions of their birth and
  early separation from the umbilical cord, serving as a somatic record of that experience.
evidence_tier: fm_specific_thin
rationale: Breathwork and somatic approaches do observe that breathing patterns correlate
  with nervous system states and can shift with trauma processing. The specific claim
  that breathing directly mirrors birth conditions is a Hellinger/somatic framework
  claim with limited peer-reviewed support.
coaching_translation: How you breathe can tell you something about how safe your nervous
  system feels. Noticing your breath — especially whether you can fully exhale — is
  a gentle way to tune into your body's story.
caveats:
- Specific causal link to birth conditions is not peer-reviewed.
- Useful as a somatic awareness practice regardless of mechanistic accuracy.
