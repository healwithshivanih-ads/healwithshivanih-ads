slug: sorbitol-accumulation-osmotic-nutrient-leakage
statement: Intracellular sorbitol accumulation in insulin-independent tissues (eye,
  nerve, kidney, blood vessel endothelium) creates osmotic stress that forces leakage
  of protective intracellular nutrients (vitamin C, magnesium, glutathione, inositol,
  niacin, potassium).
evidence_tier: strong
rationale: Well-established polyol pathway biochemistry; nutrient depletion via osmotic
  leakage is mechanistically documented in multiple diabetes pathology textbooks.
coaching_translation: The sorbitol pathway quietly drains protective nutrients from
  your cells — flooding with antioxidants and minerals helps counteract this damage.
