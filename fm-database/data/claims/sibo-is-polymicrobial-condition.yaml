slug: sibo-is-polymicrobial-condition
statement: SIBO is a polymicrobial condition involving multiple bacterial species
  (including E. coli, Streptococcus, Bacteroides, Clostridium) that overgrow in the
  small intestine, producing hydrogen, methane, or hydrogen sulfide gas.
evidence_tier: strong
rationale: Well-established clinical and microbiological definition supported by breath
  testing and PCR stool mapping findings described in the lecture.
coaching_translation: SIBO is not one bacteria — it's a complex overgrowth of multiple
  bacterial types, each producing different gases that cause different symptoms.
caveats:
- Source is expert consensus lecture, not primary literature citation. Core definition
  is broadly accepted.
