slug: cabbage-juice-heals-pu-10-days
statement: One litre of fresh raw cabbage juice per day in divided doses induced total
  ulcer healing in only 10 days; the high L-glutamine content is considered the key
  healing factor.
evidence_tier: plausible_emerging
rationale: Historically referenced clinical finding (Cheney 1949 and follow-up); L-glutamine's
  role in mucosal biosynthesis is mechanistically supported, though large modern RCTs
  are absent.
coaching_translation: Fresh cabbage juice is a traditional ulcer remedy with real
  evidence behind it — the glutamine in it helps repair the stomach lining.
caveats:
- Primary study (Cheney) dates to 1949; modern replication is limited.
linked_to_topics:
