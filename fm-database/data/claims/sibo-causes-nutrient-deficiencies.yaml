slug: sibo-causes-nutrient-deficiencies
statement: SIBO leads to nutrient deficiencies including B12, iron, and fat-soluble
  vitamins due to malabsorption in the small intestine.
evidence_tier: plausible_emerging
rationale: Bacterial overgrowth in the small intestine competes for and consumes B12
  and damages absorptive surfaces. Clinically well-established mechanism, though citation
  not provided.
coaching_translation: If your client has SIBO, they may also have low B12, iron, or
  vitamin D — worth flagging for clinician testing.
caveats:
- Source is an educational cheatsheet — no specific RCT cited. Verify micronutrient
  status with clinician labs.
