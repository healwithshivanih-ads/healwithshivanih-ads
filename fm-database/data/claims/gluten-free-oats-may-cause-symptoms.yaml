slug: gluten-free-oats-may-cause-symptoms
statement: Certified gluten-free oats may still cause adverse symptoms in people with
  celiac disease or gluten intolerance due to structural similarity to gluten and
  cross-contamination risk during processing.
evidence_tier: strong
rationale: Celiac Disease Foundation and Gluten Intolerance Group guidance (cited
  in document references) state that avenin in oats cross-reacts in a subset of celiac
  patients.
coaching_translation: Even oats labelled gluten-free can bother some people with celiac
  or gluten sensitivity — trial with caution and track symptoms.
caveats:
- Only applies to celiac and gluten-sensitive individuals; most people tolerate GF
  oats.
