slug: beta-sitosterol-soy-bph
statement: Beta-sitosterol 20 mg three times daily measurably improved urine flow
  rate and reduced post-void residual urine in a 200-man double-blind trial — with
  zero placebo effect. Whole- food source — 3.5 oz soybeans or tofu provides about
  90 mg beta-sitosterol. Soy intake also associates with lower prostate cancer risk.
  Coach prescribes soy-forward diet OR a beta-sitosterol supplement for BPH support.
evidence_tier: strong
