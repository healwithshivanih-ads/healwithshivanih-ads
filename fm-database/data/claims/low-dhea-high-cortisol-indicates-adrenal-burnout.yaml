slug: low-dhea-high-cortisol-indicates-adrenal-burnout
statement: A low DHEA with high or flattened cortisol ratio is a functional marker
  of adrenal burnout/fatigue, associated with low energy, depression, low libido,
  and immune suppression.
evidence_tier: plausible_emerging
rationale: Cortisol:DHEA ratio is used clinically in FM practice; epidemiological
  studies link low DHEA-S to poor health outcomes, though causality in 'adrenal burnout'
  specifically is not RCT-confirmed.
coaching_translation: Testing your cortisol-to-DHEA ratio gives a snapshot of how
  depleted your stress-response system is.
out_of_scope_notes: Lab ordering, interpretation, and DHEA supplementation are out
  of coaching scope — refer to clinician.
caveats:
- Lab testing and result interpretation require clinician.
- Source is educational synthesis without specific study citations.
