slug: plant-protein-viable-with-b12-zinc-selenium-attention
statement: Plant-based diets CAN meet essential amino acid requirements for muscle
  health if total protein volume is sufficient (often requiring larger food volumes),
  but Lyon flags two caveats — (1) animal-source foods carry a denser food matrix
  of B12, zinc, selenium, iron, and creatine that plant foods lack or deliver poorly,
  and (2) hitting 30-50 g protein per meal on plants typically requires either large
  volumes or strategic combining (paneer + dal + curd, soya chunks, whey/pea isolate
  supplementation). Supplements can close the micronutrient gap but require deliberate
  planning, especially for vegetarian Indian clients post-menopause and elderly clients
  at risk of sarcopenia.
