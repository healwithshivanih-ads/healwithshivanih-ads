slug: cortisol-lowers-insulin-sensitivity
statement: Chronic cortisol elevation lowers insulin sensitivity and increases susceptibility
  to type 2 diabetes.
evidence_tier: strong
rationale: 'Well-established mechanism: glucocorticoids promote gluconeogenesis and
  antagonize insulin signaling. Supported by endocrinology textbook references in
  the source document.'
coaching_translation: High stress = high cortisol = higher blood sugar and more insulin
  resistance over time. Managing stress is part of blood sugar management.
