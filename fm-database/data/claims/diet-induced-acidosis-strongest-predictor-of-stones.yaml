slug: diet-induced-acidosis-strongest-predictor-of-stones
statement: Diet-induced acidosis is the strongest predictor of calcium oxalate and
  uric acid kidney stones; excessive acid-forming foods increase urinary calcium excretion,
  decrease urinary citrate, and raise uric acid excretion.
evidence_tier: plausible_emerging
rationale: Consistent with understanding of renal acid-base physiology; citrate is
  conserved to buffer acid, reducing its stone-inhibiting effect; high sulfur amino
  acid intake drives bone resorption and hypercalciuria.
coaching_translation: Shifting towards an alkaline-forming diet (rich in vegetables
  and fruits, low in animal protein and sodium) reduces kidney stone risk by lowering
  urinary acid load and preserving citrate.
caveats:
- Dietary pH alone does not fully explain stone risk; genetics, hydration, and BMI
  are also important modulators
