slug: methylfolate-supports-mood-mthfr
statement: Supplemental methylfolate (5-MTHF) may improve mood and reduce depression
  symptoms in individuals with MTHFR variants by restoring the active folate needed
  for neurotransmitter synthesis.
evidence_tier: plausible_emerging
rationale: Several RCTs and open-label studies support L-methylfolate as an adjunct
  for depression, particularly in those with MTHFR variants and low folate status.
  Mechanism via SAM-dependent monoamine synthesis is well characterised. Lynch's case
  narrative is illustrative, not clinical proof.
coaching_translation: If you have a dirty MTHFR and struggle with low mood, eating
  more leafy greens (or working with a clinician on methylfolate supplementation)
  may help restore the folate your brain needs to make feel-good neurotransmitters.
out_of_scope_notes: Specific methylfolate dosing, titration, and decision to use as
  adjunct to antidepressants must be managed by a clinician.
caveats:
- Starting dose too high can worsen anxiety in some MTHFR variants (over-methylation
  risk).
- This is a trade-book case report, not an RCT.
- Depression is a serious medical condition requiring clinician oversight.
