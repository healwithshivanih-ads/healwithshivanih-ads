slug: acne-low-glycemic-load-diet-reduces-dht
statement: Acne sufferers consume diets with higher glycemic load than typical Americans;
  a high-carbohydrate diet increases conversion of testosterone to the more potent
  DHT in skin, raising sebum production. A diet roughly 45% protein, 35% carbohydrate,
  and 20% fat produces substantially less DHT formation and enhances estrogen clearance.
