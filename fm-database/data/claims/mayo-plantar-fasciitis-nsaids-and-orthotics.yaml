slug: mayo-plantar-fasciitis-nsaids-and-orthotics
statement: Short courses of OTC NSAIDs (ibuprofen, naproxen) reduce pain and inflammation;
  over-the-counter or custom orthotics distribute pressure more evenly across the
  foot; night splints hold the foot in dorsiflexion to stretch the fascia during sleep.
