slug: male-infertility-half-of-cases
statement: Male factor contributes to nearly 50% of couple infertility cases, but
  is often overlooked because clinic treatment focuses on the female partner. Traditional
  semen analysis (count, motility, morphology) misses DNA fragmentation, which is
  the better predictor of fertilisation, embryo quality, and miscarriage risk. Sperm
  DNA fragmentation index above 30% is associated with substantially higher miscarriage
  rates.
evidence_tier: strong
