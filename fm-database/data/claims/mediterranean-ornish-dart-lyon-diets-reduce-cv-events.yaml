slug: mediterranean-ornish-dart-lyon-diets-reduce-cv-events
statement: The Mediterranean, Ornish, DART (Diet and Reinfarction Trial), and Lyon
  Heart diets all reduce cardiovascular events and mortality in primary and secondary
  prevention — each via different mechanisms (Mediterranean and Lyon emphasise olive
  oil, fish, vegetables; Ornish low-fat plant-based; DART emphasises fatty fish).
evidence_tier: strong
rationale: Lyon Heart, PREDIMED, and DART are landmark RCTs each showing 30-70% reductions
  in CV events. Ornish reversal trials show angiographic regression. Pizzorno groups
  them as the four evidence-supported dietary patterns.
coaching_translation: Four diets have RCT-level evidence for reducing heart attacks
  and strokes — Mediterranean, Ornish, DART, and Lyon. They differ in detail but share
  heavy emphasis on plants, fish, and olive oil while cutting refined carbs and animal
  fats. Pick the one your client can actually follow.
caveats:
- Lyon Heart and PREDIMED used real-world Mediterranean patterns with mixed nuts and
  olive oil.
- Ornish requires highest discipline (very low fat + meditation + exercise).
- DART specifically tested adding fatty fish 2x/week.
