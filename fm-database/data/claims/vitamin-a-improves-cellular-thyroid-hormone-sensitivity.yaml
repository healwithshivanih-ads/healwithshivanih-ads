slug: vitamin-a-improves-cellular-thyroid-hormone-sensitivity
statement: Vitamin A improves cellular sensitivity to thyroid hormones.
evidence_tier: plausible_emerging
rationale: Vitamin A (retinoid) receptors interact with thyroid hormone receptors
  via retinoid X receptor (RXR) heterodimerization, influencing thyroid hormone gene
  transcription. Supported by mechanistic and animal studies.
coaching_translation: Adequate vitamin A helps your cells respond properly to thyroid
  hormone signals.
caveats:
- Vitamin A is fat-soluble and toxic in excess — do not exceed recommended doses without
  clinician guidance.
- Document lists 2000 IU/day as routine supplementation.
