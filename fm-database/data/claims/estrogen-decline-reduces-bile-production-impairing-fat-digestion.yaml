slug: estrogen-decline-reduces-bile-production-impairing-fat-digestion
statement: Estrogen is important for bile production; as estrogen declines in menopause,
  bile flow decreases, impairing fat emulsification and increasing the risk of steatorrhea,
  post-meal bloating, and gallbladder issues.
evidence_tier: plausible_emerging
rationale: Single-expert source. Estrogen's role in bile acid metabolism and cholesterol
  gallstone risk in menopause is supported by some published research, but the direct
  coaching-level claim is from a single expert.
coaching_translation: Declining estrogen can reduce bile flow, making it harder to
  break down fats — you might notice more bloating after fatty meals or greasy stools.
out_of_scope_notes: Steatocrit testing, gallbladder evaluation, and ox bile / bile
  salt supplementation are clinician scope.
caveats:
- Single-expert source.
- Steatorrhea or gallbladder symptoms require medical evaluation before supplement
  interventions.
