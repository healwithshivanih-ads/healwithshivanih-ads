slug: h-pylori-causes-b12-iron-deficiency-anemia-depression
statement: Persistent H. pylori colonisation reduces gastric acid and damages parietal
  cells, impairing intrinsic-factor-dependent B12 absorption and food-bound iron absorption
  — driving B12-deficiency anemia, iron-deficiency anemia, depression and anxiety,
  and neurological symptoms (tingling, cognitive decline) via myelin sheath degradation.
  Eradication halts further depletion but reversal depends on duration of deficiency.
evidence_tier: strong
rationale: Well-established gastroenterology — H. pylori is now in the standard work-up
  for unexplained iron-deficiency anemia and pernicious anemia. B12-depression mechanism
  via serotonin/dopamine synthesis is well-characterised in neuroscience literature
  though notebook source notes this as outside-source extension.
coaching_translation: Unexplained low iron or low B12, especially with mood symptoms,
  should trigger an H. pylori workup. Once eradicated, replete B12 (methylcobalamin)
  and iron (bisglycinate); reversal of nerve symptoms depends on how long the deficiency
  went unrecognised.
caveats:
- Check ferritin, B12 (with MMA for accuracy), folate, homocysteine in any unexplained
  anemia.
- H. pylori breath test or stool antigen for diagnosis.
- B12 absorption never fully recovers if atrophic gastritis is advanced — may need
  lifelong supplementation.
- Iron supplementation should wait until eradication is confirmed (iron feeds H. pylori).
