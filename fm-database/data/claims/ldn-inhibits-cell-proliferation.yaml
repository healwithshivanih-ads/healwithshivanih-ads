slug: ldn-inhibits-cell-proliferation
statement: LDN exerts a profound inhibitory effect on cell proliferation via opioid
  receptor blockade and subsequent elevation in endogenous opioids.
evidence_tier: plausible_emerging
rationale: Cited to Penn State research group; mechanism is described but no specific
  RCT or trial data with author/year provided in source document.
coaching_translation: LDN may help slow down abnormal cell growth — which is one reason
  it is being studied in cancer and autoimmune conditions.
caveats:
- Source is practitioner synthesis. No specific RCT cited. Clinician scope — not for
  coaching recommendations.
out_of_scope_notes: Cancer treatment claims are strictly clinician/oncologist scope.
