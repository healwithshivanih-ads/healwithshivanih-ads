slug: sklar-nk-cells-th1-th2-implantation
statement: Elevated peripheral natural killer (NK) cell percentage and absolute count,
  and activated CD3 / CD25 T-cell populations, are markers of immune over- activation.
  In susceptible women they can attack an implanting embryo, contributing to recurrent
  implantation failure and early pregnancy loss even with morphologically perfect
  euploid embryos. The pattern is treatable — but only if a reproductive-immunology
  panel was ordered.
