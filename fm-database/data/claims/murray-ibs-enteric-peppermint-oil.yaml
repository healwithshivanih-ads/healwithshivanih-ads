slug: murray-ibs-enteric-peppermint-oil
statement: Enteric-coated peppermint oil (ECPO) at 0.2 to 0.4 ml twice daily between
  meals reduces colonic spasm and improves major IBS symptoms — abdominal pain, distension,
  stool frequency, flatulence — with one controlled trial showing ~79-83 percent symptom
  improvement vs ~22-43 percent on placebo. Enteric coating prevents upper-GI release
  that would cause heartburn and esophageal reflux.
evidence_tier: strong
