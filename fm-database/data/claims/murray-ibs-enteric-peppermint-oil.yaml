sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 72 — Irritable Bowel Syndrome, pg 1197-1198
  quote: 'A detailed analysis of five studies supported the efficacy of peppermint
    oil, with most of the studies using ECPO at a dosage of 0.2 ml twice per day between
    meals. The results are quite impressive: abdominal pain 79 percent improvement
    with ECPO vs 43 percent placebo; distension 83 vs 29; flatulence 79 vs 22.'
