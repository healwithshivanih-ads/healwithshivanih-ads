slug: mould-water-damage-prevalence-50pc-buildings
statement: Approximately 50% of US buildings have had water damage at some point —
  and water-damaged buildings frequently harbour mould species producing neurotoxic
  mycotoxins. Mould is a known neurotoxin and a major hidden driver of chronic fatigue,
  brain fog, and "immune system hijack" — when mould toxins occupy the immune system,
  parallel infections like Lyme are not cleared, and treating either mould or Lyme
  alone can sometimes resolve the other. Coach intake — for any client with persistent
  fatigue not responsive to lifestyle interventions, ask about damp basement, history
  of leaks, visible mould, musty smell at home/work. Refer for ERMI / HERTSMI building
  testing and mycotoxin urinary testing.
