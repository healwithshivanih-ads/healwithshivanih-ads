  quote: Mold is a huge problem. About 50% of all buildings in this country have water
    damage. And mold is a known neurotoxin and causes a number of problems. There's
    actually some studies to indicate that if you treat mold, sometimes Lyme goes
    away. And if you treat Lyme, sometimes mold goes away.
rationale: Numerical anchor for coach when discussing mould testing — half of buildings
  is a strikingly common exposure.
