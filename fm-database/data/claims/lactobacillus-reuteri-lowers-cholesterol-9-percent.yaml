slug: lactobacillus-reuteri-lowers-cholesterol-9-percent
statement: Lactobacillus reuteri supplementation has been associated with approximately
  9% reduction in total cholesterol.
evidence_tier: plausible_emerging
rationale: A small number of RCTs (e.g., Jones et al., 2012, European Journal of Clinical
  Nutrition) support modest cholesterol reduction with L. reuteri. Effect size and
  mechanism (bile salt hydrolase activity) are biologically plausible.
coaching_translation: A specific probiotic strain (Lactobacillus reuteri) may modestly
  lower cholesterol — a nice bonus for gut health support in cardiovascular clients.
caveats:
- Effect size is modest (9%) and may not be clinically significant as standalone therapy.
- Evidence limited to a small number of trials.
- Source is expert lecture — 'lactobacillus rudi' in transcript is likely L. reuteri.
