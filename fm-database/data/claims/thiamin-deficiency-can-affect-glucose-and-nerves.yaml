slug: thiamin-deficiency-can-affect-glucose-and-nerves
statement: Thiamin deficiency causes poor glucose control and tingling, numbness, or burning in the hands or feet.
evidence_tier: plausible_emerging
rationale: Thiamin deficiency causing peripheral neuropathy and glucose dysregulation is biologically plausible and supported
  by clinical observation, though large RCTs in general populations are limited.
coaching_translation: If a client reports tingling in hands or feet alongside blood sugar irregularities, thiamin status is
  worth flagging for clinician assessment.
caveats:
- Source is a practitioner cheatsheet without primary citations.
- Peripheral neuropathy has many causes; do not assume thiamin without clinical assessment.
- Source is practitioner cheatsheet; no primary citations given.
- Neurological symptoms require clinician evaluation.
