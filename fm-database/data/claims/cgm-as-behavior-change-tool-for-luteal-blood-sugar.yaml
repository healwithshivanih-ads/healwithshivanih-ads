slug: cgm-as-behavior-change-tool-for-luteal-blood-sugar
statement: A continuous glucose monitor (CGM) can accelerate behavior change by showing
  clients how their blood sugar destabilizes in the luteal phase, motivating cycle-aligned
  eating.
evidence_tier: fm_specific_thin
coaching_translation: For data-driven clients, a CGM can make luteal blood-sugar swings
  visible and motivate eating more and more often in that phase.
rationale: Seeing objective glucose data reframes the conversation from dietary theory
  to a concrete, personal pattern.
