slug: methylcobalamin-preferred-active-b12-form
statement: Methylcobalamin is the active form of vitamin B12 used in key body processes,
  including homocysteine remethylation, and is the preferred supplemental form.
evidence_tier: plausible_emerging
rationale: The document states methylcobalamin is the active form utilised in body
  processes, whereas cyanocobalamin (the most common supplemental form) requires conversion.
  Directly supplying the active form is biologically rational.
coaching_translation: When recommending B12 supplements, look for methylcobalamin
  on the label rather than cyanocobalamin, especially for clients with MTHFR variants
  or absorption concerns.
caveats:
- Source is expert lecture; head-to-head RCT evidence comparing methylcobalamin vs.
  cyanocobalamin outcomes is limited.
- Higher doses are generally safe due to renal excretion.
