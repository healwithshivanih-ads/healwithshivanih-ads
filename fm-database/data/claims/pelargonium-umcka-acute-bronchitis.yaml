slug: pelargonium-umcka-acute-bronchitis
statement: South African geranium (Pelargonium sidoides) extract EPs 7630 (Umcka)
  at 20 mg three times daily for 7 days is optimal dosing for acute bronchitis. In
  RCTs of 1,647 adults plus 742 children, participants returned to work two days earlier
  than placebo, and 80%+ symptom reduction was seen within 2 weeks. Acts via three
  mechanisms — immune enhancement, antiviral/antibacterial inhibition of mucosal adherence,
  and expectorant. Coach-recommendable for any acute bronchitis or cold-with-cough
  client.
evidence_tier: strong
