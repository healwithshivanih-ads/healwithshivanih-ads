slug: sklar-tsh-within-range-can-still-impair-implantation
statement: Sklar emphasises that TSH values within the standard wide reference range
  but on the higher end (commonly above 2.0-2.5 mIU/L) can significantly impair implantation
  and increase miscarriage risk; a fertility-appropriate thyroid workup adds free
  T3, free T4, reverse T3, and TPO/Tg antibodies to surface subclinical patterns that
  a basic TSH-only test will miss.
evidence_tier: strong
