slug: murray-hypoglycemia-refined-sugar-mood-behaviour
statement: 'Reactive hypoglycemia is associated with depression, anxiety, aggressive
  behaviour, and PMS-C symptom cluster (sweets cravings, headache, fatigue, palpitations
  the week before menses). Dietary trials replacing refined sugar and sugary drinks
  with unrefined-carb snacks in penal-institution populations reduced antisocial incidents
  by 45 percent, assaults by 83 percent, and self-harm need by 75 percent. Migraine
  sufferers with confirmed reactive hypoglycemia: 56 percent saw >75 percent reduction
  in symptoms when refined sugar was eliminated.'
evidence_tier: plausible_emerging
