sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 67 — Hypoglycemia, pg 1116-1119
  quote: Dietary therapy (usually simply eliminating refined carbohydrates from the
    diet) is occasionally all that is necessary for patients who suffer from depression
    due to reactive hypoglycemia. In the first study, 174 incarcerated juvenile delinquents
    were placed on a sugar-restricted diet. During the two-year study the number of
    incidents of antisocial behavior was reduced by 45 percent. Assaults dropped by
    83 percent. In one study of 48 migraine sufferers with reactive hypoglycemia,
    27 (56 percent) showed a greater than 75 percent improvement in symptoms when
    refined sugar was eliminated.
