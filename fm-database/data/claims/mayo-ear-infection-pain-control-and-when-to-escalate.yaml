slug: mayo-ear-infection-pain-control-and-when-to-escalate
statement: Acetaminophen or ibuprofen (age-dosed) is first-line for pain; warm compress
  over the affected ear can help; escalate to ENT for facial paralysis, mastoid swelling
  or redness behind the ear (mastoiditis), severe vertigo, or no improvement after
  72 hours of antibiotic.
