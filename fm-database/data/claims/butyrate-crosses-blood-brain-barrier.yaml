slug: butyrate-crosses-blood-brain-barrier
statement: Butyrate, a key SCFA produced from fiber fermentation, can cross the blood-brain
  barrier, suggesting a direct gut-brain connection with potential cognitive and neurological
  relevance.
evidence_tier: plausible_emerging
rationale: Speaker correctly identifies butyrate's blood-brain barrier permeability.
  Emerging area of research; no clinical study cited.
coaching_translation: Butyrate from fiber doesn't just stay in the gut — it can reach
  the brain. This is one reason fiber may support mood and cognitive health, not just
  digestion.
caveats:
- Source is expert course content, not primary literature.
- Most direct evidence is from animal models; human evidence for brain-crossing gut-derived
  butyrate is still emerging.
- Source is expert-consensus transcript.
- BBB permeability of butyrate in humans is confirmed in preclinical models; clinical
  significance is still emerging.
- Source is expert session. Clinical implications for brain health are still emerging;
  avoid overclaiming therapeutic benefit.
