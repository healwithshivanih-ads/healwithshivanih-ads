slug: mayo-gerd-differentiate-chest-pain-from-cardiac
statement: Reflux-type chest pain can mimic cardiac chest pain; new substernal chest
  pain, especially with shortness of breath, sweating, jaw or arm radiation, or in
  clients with cardiovascular risk factors, must be evaluated as a cardiac event until
  proven otherwise.
