slug: uva-ursi-recurrent-uti-prevention
statement: Uva ursi (Arctostaphylos uva ursi) leaves contain 6 to 10% arbutin which
  converts to hydroquinone in alkaline urine and prevents bacterial growth. In a 12-month
  double-blind trial of 57 women, 5/27 placebo patients recurred but ZERO of 30 uva
  ursi patients did. Always pair with urine alkalinisation (potassium or sodium citrate)
  for full effect. WARNING — dosages above 0.5 oz dried leaves can cause hydroquinone
  toxicity; not for long- term self-care.
evidence_tier: plausible_emerging
