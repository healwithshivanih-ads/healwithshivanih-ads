slug: relaxation-response-reduces-cortisol-and-bp
statement: Regular practice of the Relaxation Response produces measurable physiological effects including reduced cortisol,
  noradrenaline, heart rate, blood pressure, respiratory rate, oxygen consumption, and muscle tension.
evidence_tier: plausible_emerging
rationale: The Relaxation Response was developed and studied at Harvard Medical School by Dr. Herbert Benson. Multiple studies
  support its cardiovascular and neuroendocrine effects. The document references scholarly research supporting use in anxiety,
  depression, heart disease, high blood pressure, insomnia, and pain, though no specific studies are cited in the text.
coaching_translation: A simple daily breathing and relaxation practice — just 10–20 minutes — can measurably lower your stress
  hormones, heart rate, and blood pressure. This is one of the most well-studied mind-body tools available.
caveats:
- No specific studies cited by author/year/journal in this document; attributed to Dr. Benson/Harvard.
- No specific studies cited within the document for the full list of physiological effects
- Individual response may vary
