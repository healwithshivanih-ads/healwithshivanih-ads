slug: relaxation-response-reduces-cortisol-and-bp
statement: Practicing the Relaxation Response technique reduces cortisol, noradrenaline,
  heart rate, blood pressure, respiratory rate, and muscle tension.
evidence_tier: strong
rationale: Dr. Herbert Benson's Relaxation Response is one of the most studied mind-body
  interventions (Harvard Medical School). Multiple RCTs support its effects on cardiovascular
  and neuroendocrine markers.
coaching_translation: A simple daily breathing and relaxation practice for 10–20 minutes
  can measurably lower your stress hormones, heart rate, and blood pressure.
caveats:
- No specific studies cited by author/year/journal in this document; attributed to
  Dr. Benson/Harvard.
