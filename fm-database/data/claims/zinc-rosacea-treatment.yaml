slug: zinc-rosacea-treatment
statement: Zinc sulfate 23 mg three times daily (about 69 mg elemental/day) for 3
  months produced significant rosacea symptom reduction in a crossover RCT. Coach-friendly
  dose — 45 to 60 mg zinc/day for 3 months loading dose, then 20 to 30 mg maintenance.
  Take with food to prevent mild GI upset (the only reported side effect). Pair with
  copper 1 to 2 mg/day on extended zinc to prevent copper deficiency.
evidence_tier: plausible_emerging
linked_to_topics:
