sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 90 — Rosacea, pg 1496-1498
  quote: Twenty-five patients with rosacea were assessed with a clinical score, then
    randomly allocated to receive either zinc (23 mg from zinc sulfate) or identical
    placebo capsules three times per day... The authors concluded that zinc is a good
    option in the treatment of rosacea.
