slug: omega-3-and-omega-6-compete-for-same-enzyme
statement: Omega-3 and omega-6 fatty acids compete for the same delta-5 desaturase enzyme; increasing omega-3 while simultaneously
  eliminating omega-6 sources shifts the enzyme toward anti-inflammatory metabolite production.
evidence_tier: strong
rationale: Enzyme competition between omega-3 and omega-6 fatty acids for delta-5 and delta-6 desaturases is well-established
  in nutritional biochemistry. The clinical implication (increase omega-3 AND reduce omega-6 simultaneously) is supported
  by intervention studies.
coaching_translation: It's not enough to just add omega-3 supplements — you also need to cut out refined vegetable oils (sunflower,
  safflower, peanut oil). Both steps together are what shifts your body toward less inflammation.
