slug: elderberry-reduces-upper-respiratory-symptoms
statement: Elderberry (Sambucus nigra) supplementation effectively reduces duration
  and severity of upper respiratory symptoms.
evidence_tier: plausible_emerging
rationale: Hawkins et al. (Complement Ther Med 2019) meta-analysis of RCTs cited;
  demonstrates elderberry effectively treats upper respiratory symptoms. Evidence
  base is growing but still limited in size.
coaching_translation: Elderberry is one of the better-studied herbs for shortening
  colds and respiratory infections.
