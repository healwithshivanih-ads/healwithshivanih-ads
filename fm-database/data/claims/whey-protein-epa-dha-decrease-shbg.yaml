slug: whey-protein-epa-dha-decrease-shbg
statement: Whey protein and EPA/DHA supplementation are associated with decreased
  SHBG levels.
evidence_tier: plausible_emerging
rationale: Listed in the document's SHBG-decreasing column. High protein intake is
  associated with lower SHBG in observational studies; EPA/DHA mechanism on SHBG is
  less clear.
coaching_translation: Whey protein and fish oil may lower SHBG, which could be helpful
  if your SHBG is too high and you need more free testosterone.
caveats:
- Source is expert consensus synthesis. Context of when SHBG reduction is clinically
  desirable requires clinician assessment.
