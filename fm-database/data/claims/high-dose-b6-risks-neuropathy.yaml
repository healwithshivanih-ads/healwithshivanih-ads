slug: high-dose-b6-risks-neuropathy
statement: Vitamin B6 supplementation should stay under 100 mg/day because higher doses may cause neuropathy.
evidence_tier: confirm_with_clinician
rationale: B6 toxicity causing sensory neuropathy at doses above 200mg/day is well-documented; the 100mg/day threshold is
  a conservative safety guideline.
out_of_scope_notes: B6 dosing above routine dietary amounts is outside coaching scope.
caveats:
- Evidence for neuropathy risk at doses between 100–200 mg/day is less clear; risk increases substantially above 200 mg/day.
- Confirm with clinician before recommending B6 doses approaching 100mg/day.
