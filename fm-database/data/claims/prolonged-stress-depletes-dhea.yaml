slug: prolonged-stress-depletes-dhea
statement: Chronic stress eventually depletes DHEA as adrenal demand outstrips capacity,
  signifying adrenal exhaustion.
evidence_tier: plausible_emerging
rationale: Biologically plausible and consistent with clinical observation, but 'adrenal
  exhaustion' as a discrete syndrome is not firmly established in mainstream endocrinology.
  Supported by the physiological principle of substrate competition in adrenal steroidogenesis.
  Source is an expert consensus toolkit.
coaching_translation: When stress goes on for too long, your adrenal glands can't
  keep up. Over time, DHEA — a hormone that helps protect your immune system, bones,
  and muscle — starts to drop. This is a sign your body needs more recovery support.
caveats:
- The term 'adrenal exhaustion' is FM-specific; not a recognized ICD diagnosis. Source
  is an expert consensus toolkit, not primary literature.
- '''Adrenal exhaustion'' or ''adrenal fatigue'' is not a recognized diagnosis in
  conventional endocrinology; requires clinician evaluation to differentiate from
  primary adrenal insufficiency'
- Source is a coaching toolkit, not primary literature
