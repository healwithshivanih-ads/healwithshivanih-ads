slug: prolonged-stress-depletes-dhea
statement: Chronic stress causes DHEA levels to fall as the adrenal glands can no
  longer sustain their output, signifying adrenal exhaustion.
evidence_tier: plausible_emerging
rationale: Biologically plausible mechanism; DHEA depletion under chronic stress is
  documented in functional medicine literature but the concept of 'adrenal exhaustion'
  as a discrete syndrome lacks strong RCT consensus.
coaching_translation: When you're under stress for too long, your adrenal glands get
  depleted — and DHEA, which protects hormones, immunity, and bones, starts to drop.
caveats:
- The term 'adrenal exhaustion' is FM-specific; not a recognized ICD diagnosis. Source
  is an expert consensus toolkit, not primary literature.
