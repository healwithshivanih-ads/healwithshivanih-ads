slug: adhd-pycnogenol-improves-hyperactivity-attention
statement: In a 4-week double-blind trial of 61 children with ADHD, pycnogenol 1 mg/kg
  per day produced significant reduction in hyperactivity and improvement in attention,
  visual-motor coordination, and concentration compared to placebo. L-theanine 200
  mg twice daily also improved sleep quality in ADHD children.
evidence_tier: plausible_emerging
