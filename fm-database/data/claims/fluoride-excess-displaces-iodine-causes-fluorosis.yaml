slug: fluoride-excess-displaces-iodine-causes-fluorosis
statement: Excess fluoride may accumulate in tissues, displace iodine (an essential
  nutrient), and cause fluorosis (mottling of teeth) especially in children who swallow
  toothpaste; fluoride-containing products should be used discriminately.
evidence_tier: plausible_emerging
rationale: Dental fluorosis from excess fluoride ingestion in children is well-established.
  The iodine displacement mechanism is biologically plausible and referenced in FM
  literature, though the clinical threshold for iodine displacement at typical fluoride
  exposures is debated.
coaching_translation: Fluoride is a controversial ingredient in dental products. For
  most adults, small amounts may be fine, but it's worth being mindful — especially
  with children — to avoid swallowing toothpaste.
caveats:
- Fluoride benefits for dental caries prevention are also well-established; this is
  a nuanced topic requiring clinical guidance.
