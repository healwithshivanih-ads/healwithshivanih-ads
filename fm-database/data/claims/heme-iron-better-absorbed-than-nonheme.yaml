slug: heme-iron-better-absorbed-than-nonheme
statement: Heme iron from animal sources is better absorbed by the body than nonheme
  iron from plant sources, but accounts for only ~10% of dietary iron intake.
evidence_tier: strong
rationale: Well-established nutritional physiology; consistent across major nutrition
  bodies (NIH ODS, Linus Pauling Institute).
coaching_translation: If you eat mostly plant-based foods, you may need more iron-rich
  foods or to pair them with vitamin C to help absorption.
