slug: omega-3-resolves-acne-via-crp
statement: Acne driven by elevated CRP/systemic inflammation may resolve with omega-3
  supplementation that normalises inflammatory markers.
evidence_tier: fm_specific_thin
rationale: There is emerging evidence linking omega-3 supplementation to reduced inflammatory
  acne. The mechanism via CRP reduction is plausible. However, robust RCT evidence
  specifically for this pathway is limited.
coaching_translation: If a client's acne doesn't respond to topical or dietary interventions,
  systemic inflammation (measurable by CRP) and omega-3 deficiency may be the root
  cause.
caveats:
- Evidence is largely anecdotal in this document (personal case study).
- Source is expert FM lecture — treat as fm_specific_thin.
- Refer to dermatologist if acne is severe or cystic.
