slug: iron-not-absorbed-with-damaged-gut-lining
statement: Iron supplementation is ineffective when the gut lining is damaged; it
  should be deferred until gut healing is underway.
evidence_tier: plausible_emerging
rationale: Iron absorption occurs primarily in the duodenal enterocytes. A damaged
  intestinal lining from dysbiosis and hypochlorhydria impairs iron uptake. Premature
  supplementation wastes the supplement and can feed dysbiotic bacteria. This is a
  logical application of known iron absorption physiology.
coaching_translation: Starting iron supplements before your gut is healing is like
  pouring water into a leaking bucket. We wait until the gut lining is repairing so
  your body can actually absorb and use the iron.
caveats:
- Source is FM lecture synthesis. The exact timing threshold is clinical judgement,
  not a fixed evidence-based parameter.
- Iron deficiency anaemia diagnosis and dosing require clinician oversight.
