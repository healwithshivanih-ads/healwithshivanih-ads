slug: femhorm-constipation-recirculates-estrogen
statement: Regular bowel movements are the final common pathway for excreting oestrogen
  and other toxins. If a client is constipated, conjugated oestrogen can be cleaved
  apart in the colon and reabsorbed in a more toxic form, undoing good phase I/II
  detoxification. Resolving constipation — through hydration, gradually increasing
  fibre and gentle bowel-supporting foods — is a foundational, in-scope coaching priority
  for hormonal balance.
evidence_tier: plausible_emerging
rationale: 'This is one of the highest-leverage, lowest-risk things a coach can work
  on: bowel regularity directly affects oestrogen recirculation, and it''s squarely
  lifestyle.'
coaching_translation: 'If a client isn''t having daily, complete bowel movements,
  make that a first priority: encourage hydration (aim ~half body weight in ounces
  of water), bring fibre up slowly (flax, chia, prunes, more roughage), and add gentle
  movement. Explain that regular elimination is how the body finishes clearing oestrogen
  — you help resolve constipation, and the clinician handles anything that needs prescribing.'
out_of_scope_notes: Diagnosing the cause of constipation, ordering stool tests, and
  prescribing agents like calcium-D-glucarate for high beta-glucuronidase is the clinician's
  role.
caveats:
- Push fibre too fast and you can worsen bloating and constipation — go gradually.
- Coach hydration, fibre and movement; escalate persistent constipation to the clinician.
