slug: vitamin-d3-superior-to-d2
statement: Vitamin D3 (cholecalciferol) is more effective than vitamin D2 (ergocalciferol)
  at raising serum 25(OH)D levels.
evidence_tier: strong
rationale: Multiple meta-analyses confirm D3 raises 25(OH)D more effectively and durably
  than D2 (Tripkovic et al., 2012, Am J Clin Nutr). This is considered consensus.
coaching_translation: When recommending a vitamin D supplement, always choose D3 over
  D2.
caveats:
- Optimal serum target (30–40 ng/mL) and dosing should be guided by serum 25(OH)D
  testing — clinician territory.
