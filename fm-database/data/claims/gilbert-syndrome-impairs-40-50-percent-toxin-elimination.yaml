slug: gilbert-syndrome-impairs-40-50-percent-toxin-elimination
statement: In patients with Gilbert syndrome (UGT1A1 variant), approximately 40–50%
  of toxin elimination via the glucuronidation pathway is compromised, requiring optimization
  of secondary Phase 2 pathways (sulfation, methylation, glutathione conjugation).
evidence_tier: fm_specific_thin
rationale: Gilbert syndrome affecting UGT1A1 and bilirubin conjugation is well established.
  The specific quantification that 40–50% of total toxin elimination runs through
  this pathway, and the clinical protocol of compensating via secondary pathways,
  is a functional medicine extrapolation with thin peer-reviewed support as stated.
coaching_translation: Some people are born with a natural variation in a liver detox
  enzyme (Gilbert syndrome) that means one of the main toxin-clearing routes works
  at reduced capacity. For these clients, supporting the backup detox pathways becomes
  especially important.
out_of_scope_notes: Diagnosis of Gilbert syndrome and decisions about compensatory
  pathway support require clinician involvement.
caveats:
- The 40–50% figure is cited in the lecture without a specific reference; verify with
  clinician.
- Source is expert lecture consensus, not primary literature.
