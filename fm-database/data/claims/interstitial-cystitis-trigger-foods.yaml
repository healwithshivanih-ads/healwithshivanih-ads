slug: interstitial-cystitis-trigger-foods
statement: 90% of interstitial cystitis patients flare when consuming coffee, tea,
  soda, alcohol, citrus fruits/juices, artificial sweeteners, or hot peppers. Bladder
  wall integrity can be supported with hyaluronic acid (100 to 200 mg/day), gotu kola
  (Centella asiatica) extracts which heal bladder ulcerations, and aloe vera. Food
  allergens are a major reversible driver — a strict elimination trial is appropriate
  first-line work.
