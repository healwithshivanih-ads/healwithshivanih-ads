slug: l-glutamine-supports-gut-epithelial-repair
statement: L-glutamine is the primary protein (amino acid) required for gut epithelial
  tissue repair and should be included in the gut repair phase of dysbiosis protocols.
evidence_tier: plausible_emerging
rationale: Glutamine is a well-established fuel source for enterocytes (intestinal
  epithelial cells) and has supportive evidence for gut barrier integrity in clinical
  and animal studies. Its use in gut repair protocols is biologically well-grounded.
coaching_translation: L-glutamine is a gut-healing amino acid that feeds the cells
  lining your intestines. It's a key part of the repair phase in gut protocols.
caveats:
- Source is expert lecture, moderate quality.
- Specific dosing not provided in the source — verify with clinician.
- Some sources suggest caution in cancer patients due to glutamine as a potential
  cancer cell fuel — refer to clinician.
