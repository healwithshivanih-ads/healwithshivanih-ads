slug: green-tea-reduces-aromatase-activity
statement: Green tea (EGCG) has aromatase-inhibiting properties that can reduce the conversion of androgens to estrogens,
  thereby helping to reduce estrogen dominance.
evidence_tier: plausible_emerging
rationale: EGCG (epigallocatechin gallate) from green tea has demonstrated aromatase-inhibiting activity in in vitro and some
  animal studies. Human RCT data specifically targeting estrogen dominance via green tea is limited but the mechanism is biologically
  plausible.
coaching_translation: Encouraging clients with estrogen dominance to drink green tea (2–3 cups/day) or consider a green tea
  extract is a low-risk, nutritionally supported strategy to gently reduce excess estrogen production.
caveats:
- Human RCT data on green tea/EGCG for estrogen dominance is limited.
- Caffeinated forms should be moderated in anxious or sleep-disrupted clients.
- Source is expert consensus lecture.
