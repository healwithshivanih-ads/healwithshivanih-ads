slug: epigenetics-every-exposure-changes-gene-expression
statement: 'Every exposure, moment to moment, modifies gene expression: food, pharmaceuticals,
  the microbiome, environmental toxins, mood state, meditation and yoga, season/light,
  social connection vs isolation, and exercise. Epigenetics ''determines action''
  whereas genetics gives insight — the yin and yang.'
evidence_tier: plausible_emerging
rationale: 'This is the coach''s lever: diet, movement, stress, sleep, connection
  and mindfulness all switch genes on/off.'
