slug: saccharomyces-boulardii-outcompetes-candida-restores-balance
statement: Saccharomyces boulardii outcompetes Candida and pathogenic bacteria, restores
  gut microbiome balance, and is well-studied for H. pylori support and antibiotic-associated
  dysbiosis.
evidence_tier: plausible_emerging
rationale: S. boulardii has strong RCT evidence for antibiotic-associated diarrhea
  and traveler's diarrhea. Evidence for H. pylori adjunct and Candida competition
  is emerging. Source is synthesis.
coaching_translation: Saccharomyces boulardii is a beneficial yeast (not bacteria)
  that helps crowd out harmful organisms during and after antibiotic treatment.
caveats:
- Use with caution in immunocompromised patients. Source is educational synthesis.
