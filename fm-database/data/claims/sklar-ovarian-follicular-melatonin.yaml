slug: sklar-ovarian-follicular-melatonin
statement: Melatonin is produced inside ovarian follicles where it acts as one of
  the most powerful antioxidants protecting the developing oocyte from reactive oxygen
  species. Adequate melatonin production depends on deep sleep and intact circadian
  rhythm — chronic stress with high evening cortisol suppresses melatonin precisely
  when the follicle needs it most.
