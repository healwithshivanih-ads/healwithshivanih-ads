slug: nigella-sativa-improves-oxidative-stress-aitd
statement: Nigella sativa treatment for 8 weeks significantly improved serum total
  antioxidant capacity, oxidative stress markers, LDL-C, triglycerides, and HDL in
  patients with autoimmune thyroid disease.
evidence_tier: plausible_emerging
rationale: The document cites a human study in AITD patients showing improvements
  in antioxidant capacity, lipid panel, and vascular endothelial adhesion markers.
  Mechanistically attributed to antioxidant, tissue-repair, and immunomodulatory effects.
coaching_translation: Beyond thyroid antibodies, black cumin seed may also improve
  cholesterol, triglycerides, and reduce oxidative damage in Hashimoto's — a nice
  multi-benefit intervention.
