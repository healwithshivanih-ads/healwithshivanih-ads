statement: Methylene blue at antimicrobial doses kills pathogens by triggering localised
  hydrogen peroxide release rather than acting as a broad-spectrum cytocide, which
  is why Sherr describes it as relatively gut-sparing compared with conventional antibiotics
  like amoxicillin or augmentin. Where standard broad-spectrum antibiotics behave
  like a nuclear bomb that wipes out the commensal microbiome alongside the target
  organism, methylene blue's selectivity profile lets it be used for acute gut dysbiosis,
  parasites and bacterial overgrowth without producing the same collateral damage
  to Lactobacillus and Bifidobacterium populations. This is one rationale for preferring
  methylene blue over repeated antibiotic courses in clients with a history of post-antibiotic
  dysbiosis or SIBO relapses.
