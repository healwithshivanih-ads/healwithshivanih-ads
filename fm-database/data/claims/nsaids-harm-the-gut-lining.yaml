slug: nsaids-harm-the-gut-lining
statement: Regular NSAIDs (ibuprofen, aspirin) reduce lactobacilli, impair protective
  mucus and cause leaky gut and mucosal injury, so natural anti-inflammatories are
  preferable where appropriate and chronic pain warrants a provider.
evidence_tier: plausible_emerging
rationale: Cites NSAID gut-injury data.
coaching_translation: Frequent painkillers like ibuprofen can quietly damage the gut
  lining — use sparingly and get persistent pain looked at.
