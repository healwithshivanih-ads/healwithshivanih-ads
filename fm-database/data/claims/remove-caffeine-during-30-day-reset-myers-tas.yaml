slug: remove-caffeine-during-30-day-reset-myers-tas
statement: Caffeine (including coffee, even decaf, for its acidity) is removed during
  the 30-day reset because it props up energy artificially and adds load to the adrenals
  and immune system; a gradual taper reduces withdrawal.
evidence_tier: fm_specific_thin
rationale: Reliance on caffeine masks fatigue and stresses the HPA axis; a reset lets
  natural energy regulation return.
coaching_translation: We pause coffee during the reset and taper it down so the headaches
  are milder — real energy comes back from food and sleep.
