slug: fitzgerald-dna-methylation-adaptogen-foods
statement: DNA methylation adaptogens are flavonoid polyphenols — curcumin (turmeric),
  EGCG (green tea), rosmarinic acid (rosemary), quercetin (apples/onions/berries/capers),
  luteolin, lycopene, sulforaphane (cruciferous), genistein (soy) — plus nutrient
  cofactors vitamins A/C/D3 and alpha-ketoglutarate. They selectively rebalance DNA
  methylation rather than blanketing it.
