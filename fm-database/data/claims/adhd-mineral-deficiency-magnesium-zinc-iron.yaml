slug: adhd-mineral-deficiency-magnesium-zinc-iron
statement: Children with ADHD frequently show low magnesium, zinc, and iron status
  in serum, red blood cells, and hair. Supplementation trials with each mineral have
  improved behavior; iron supplementation in non-anemic ADHD children reduced symptoms
  within 30 days.
