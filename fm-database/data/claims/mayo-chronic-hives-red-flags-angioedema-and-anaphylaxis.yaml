slug: mayo-chronic-hives-red-flags-angioedema-and-anaphylaxis
statement: Hives accompanied by lip, tongue, or throat swelling, difficulty breathing
  or swallowing, wheeze, hoarseness, dizziness or loss of consciousness, vomiting,
  or rapid heartbeat is anaphylaxis — use epinephrine auto-injector if available and
  call emergency services.
