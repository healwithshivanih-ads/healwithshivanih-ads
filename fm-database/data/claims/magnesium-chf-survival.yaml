slug: magnesium-chf-survival
statement: Low magnesium (especially WBC magnesium) is common in CHF and PREDICTS
  SURVIVAL — at 1 year, 71% survival with normal magnesium vs 45% with low; at 2 years,
  61% vs 42%. Magnesium also reduces ventricular arrhythmia frequency in digoxin-treated
  CHF without digoxin toxicity. Coach dose 200 to 300 mg magnesium citrate 1 to 3
  times daily. WARNING — avoid magnesium supplementation in kidney failure (risk of
  hypermagnesemia which raises mortality). Monitor serum magnesium in any client on
  digoxin.
evidence_tier: strong
linked_to_topics:
