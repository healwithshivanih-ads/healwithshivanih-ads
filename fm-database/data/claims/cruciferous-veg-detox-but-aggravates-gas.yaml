slug: cruciferous-veg-detox-but-aggravates-gas
statement: Cruciferous vegetables (cauliflower, broccoli, cabbage) are detox-supportive
  but may aggravate gas in sensitive individuals; they should be reintroduced after
  initial gut-healing phases.
evidence_tier: plausible_emerging
rationale: Crucifers contain GOS, raffinose, and sulphur compounds that increase fermentation.
  Their glucosinolate content supports phase II detoxification. Timing of reintroduction
  post-gut repair is consistent with FODMAP clinical protocols.
coaching_translation: Broccoli and cauliflower are superfoods for liver detox, but
  they can cause serious gas if your gut isn't ready. Hold them off for now and we'll
  bring them back once your symptoms settle.
caveats:
- Broccoli heads are lower FODMAP than stalks; portion size matters.
