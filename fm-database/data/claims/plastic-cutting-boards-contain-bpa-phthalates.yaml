slug: plastic-cutting-boards-contain-bpa-phthalates
statement: Plastic cutting boards often contain BPA and phthalates with hormone-disrupting
  and carcinogenic properties; bamboo or wood alternatives are safer.
evidence_tier: plausible_emerging
rationale: BPA and phthalates are established endocrine disruptors. Food-contact plastic
  leaching is documented, particularly with heat and abrasion. The recommendation
  for bamboo/wood alternatives is precautionary but well-supported in toxicology literature.
coaching_translation: Switching from plastic cutting boards to bamboo or wood is a
  simple kitchen upgrade that reduces daily exposure to hormone-disrupting chemicals.
