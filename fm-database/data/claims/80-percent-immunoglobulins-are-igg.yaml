slug: 80-percent-immunoglobulins-are-igg
statement: Approximately 75–80% of total serum immunoglobulins are IgG, making IgG
  the predominant antibody class.
evidence_tier: strong
rationale: Well-established immunological fact — IgG constitutes the majority of circulating
  immunoglobulins.
coaching_translation: IgG reactions are the most common type of food sensitivity because
  IgG is the most abundant antibody in the body.
