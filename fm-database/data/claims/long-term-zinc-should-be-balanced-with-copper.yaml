slug: long-term-zinc-should-be-balanced-with-copper
statement: Zinc supplementation above 50 mg/day risks copper deficiency and long-term
  use should be balanced with copper.
evidence_tier: confirm_with_clinician
rationale: Zinc and copper compete for absorption; high-dose zinc inducing copper
  deficiency is well-documented.
out_of_scope_notes: High-dose zinc supplementation is outside coaching scope.
caveats:
- Risk increases substantially above 50 mg/day of zinc.
- A rough 10:1 Zn:Cu ratio is suggested but individual needs vary.
- Zinc above 50mg/day requires clinician oversight and consideration of copper co-supplementation.
