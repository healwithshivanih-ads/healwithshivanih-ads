slug: distinguish-die-off-from-allergy-by-time
statement: 'When adding supplements to a sensitive client, introduce them one at a
  time: a die-off reaction resolves within a few days to a week, whereas an allergic
  reaction persists — time is the distinguishing feature.'
evidence_tier: plausible_emerging
rationale: Ruscio's rule for reactive clients.
coaching_translation: A short-lived flare when starting something is often 'die-off'
  and passes in days; a reaction that keeps going is a true intolerance.
