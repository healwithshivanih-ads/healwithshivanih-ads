sources:
- id: bissinger-energy-blueprint-podcast-2026
  location: Podcast — Protein for bone
  quote: Years ago they felt these high-protein diets or too much protein is going
    to cause calcium to be leached from the bone, but it's just the opposite. The
    research now shows we need enough protein and we need more than the RDA. Take
    your body weight divide by 0.5.
