slug: protein-needs-for-bone-exceed-rda
statement: Older protein-causes-bone-loss claims have been superseded — current evidence
  shows that protein intake above the RDA supports bone density and reduces fracture
  risk. A useful target in bone-health populations is approximately 0.5 g of protein
  per pound of body weight (≈1.1 g per kg) — meaningfully above the RDA — distributed
  across meals. Quality matters — organic grass-fed and wild-caught animal sources
  or carefully combined plant sources both work; what matters more is hitting the
  daily total and digesting it (sufficient stomach acid, pancreatic enzymes).
evidence_tier: strong
