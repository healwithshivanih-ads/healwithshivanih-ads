slug: dhea-formulation-quality-varies-widely
statement: Quality of over-the-counter DHEA supplements varies widely — independent
  analyses have found actual dose ranging from 0% to 150% of label. Pharmaceutical-grade
  micronised DHEA (the form used in successful trials) is required for reliable absorption.
  Look for micronized on the label.
