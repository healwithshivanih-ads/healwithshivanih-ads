slug: lps-endotoxemia-drives-non-gi-sibo-symptoms
statement: When SIBO-associated gut dysbiosis leads to endotoxemia (LPS entering systemic circulation via a disrupted barrier),
  non-GI symptoms including depression, fatigue, anxiety, and autism-related presentations can emerge.
evidence_tier: plausible_emerging
rationale: LPS-driven systemic and neuroinflammation is a mechanistically supported pathway. Emerging research links gut-derived
  LPS to neuropsychiatric conditions, though causation remains under study.
coaching_translation: SIBO is not just a gut problem — when bacteria and their toxins leak into the bloodstream, it can affect
  your mood, energy, and brain function.
caveats:
- Source is expert consensus lecture; LPS-neuropsychiatric link is emerging, not consensus.
- Autism is a heterogeneous condition; gut association is plausible but not established as causal.
