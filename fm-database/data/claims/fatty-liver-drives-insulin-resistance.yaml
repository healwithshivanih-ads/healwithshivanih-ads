slug: fatty-liver-drives-insulin-resistance
statement: Liver fat (NAFLD) drives insulin resistance; taurine and choline support
  bile production, methylation, and hepatocyte repair.
evidence_tier: plausible_emerging
rationale: Hepatic fat accumulation is mechanistically linked to hepatic insulin resistance
  via diacylglycerol-PKC pathway. Choline and taurine roles in hepatic fat metabolism
  have biological plausibility and some clinical evidence, though large RCTs are limited.
coaching_translation: A fatty liver quietly blocks insulin signalling — nutrients
  like choline and taurine help the liver process and clear that fat.
caveats:
- Source is expert consensus; specific studies not cited.
