slug: lectins-disarmed-by-proper-preparation
statement: Lectins in legumes, grains, and nightshade vegetables are significantly
  reduced or eliminated by soaking, thorough rinsing, pressure cooking, or fermentation
  (sourdough/dosa/idli methods).
evidence_tier: plausible_emerging
rationale: There is reasonable published evidence that lectin content in legumes is
  reduced by soaking, boiling, and pressure cooking. Fermentation has demonstrated
  effects on anti-nutritional factors including lectins. The claim is supported by
  food science literature, though the extent of elimination varies by food and method.
coaching_translation: 'You don''t need to fear lectins — just prepare your food traditionally:
  soak beans overnight, rinse quinoa thoroughly, use sourdough bread, and de-seed
  tomatoes and peppers.'
caveats:
- The degree of lectin reduction varies by food and preparation method. 'Total elimination'
  by pressure cooking is supported for some legumes but may not apply universally.
- Source is a lecture transcript.
