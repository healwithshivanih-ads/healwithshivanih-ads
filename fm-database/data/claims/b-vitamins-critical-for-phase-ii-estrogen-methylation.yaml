slug: b-vitamins-critical-for-phase-ii-estrogen-methylation
statement: Active B vitamins (B6 P5P, methylated B12, methyl-folate) are critical
  cofactors for Phase II methylation of estrogen metabolites, especially in PCOS or
  MTHFR variants.
evidence_tier: plausible_emerging
rationale: One-carbon methylation requires B6, B12, and folate as cofactors. MTHFR
  variants reduce methylfolate availability, impairing COMT function and estrogen
  methylation. Mechanistically well-established; clinical trials specific to estrogen
  outcomes are sparse.
coaching_translation: Methylated B vitamins are essential for the liver pathway that
  neutralizes estrogen — especially important if you have MTHFR gene variants.
caveats:
- Source is expert synthesis
- Use methylated forms (P5P, methyl-B12, methyl-folate) when MTHFR is suspected
- Verify with clinician
