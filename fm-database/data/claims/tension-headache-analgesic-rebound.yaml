slug: tension-headache-analgesic-rebound
statement: Approximately 70% of patients with chronic headaches suffer from drug-induced
  (analgesic rebound) headache. In a study of 200 patients with analgesic-rebound
  headache, simply discontinuing the medications produced a 52% improvement in the
  total headache index, with specific gains in frequency, severity, sleep, and mood.
evidence_tier: strong
