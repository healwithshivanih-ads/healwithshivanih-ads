  quote: Approximately 70% of patients with chronic headaches suffer from drug-induced
    headaches, a result of the medications they are taking to suppress the symptoms
    of headache. In one study of 200 patients suffering from analgesic rebound headache,
    discontinuation of these medications resulted in a 52% improvement in the total
    headache index.
