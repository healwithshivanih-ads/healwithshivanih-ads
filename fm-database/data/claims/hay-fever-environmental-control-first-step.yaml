  quote: The first step in the natural approach to hay fever is reducing exposure.
    Track the pollen count in your area. At home and in the car, keep the windows
    closed and the air conditioner on. Try nasal irrigation. Equip your home with
    HEPA filters. Eliminate all food allergens and food additives to reduce the allergic
    threshold.
