slug: detox-is-atp-dependent-energy-required
statement: Biotransformation and detoxification are ATP-dependent processes; individuals
  with fatigue, low energy, or mitochondrial dysfunction have impaired detoxification
  capacity.
evidence_tier: plausible_emerging
rationale: Phase 2 conjugation reactions (especially glutathione synthesis, glucuronidation,
  sulfation) are energy-dependent. ATP is required for glutathione synthesis and for
  PAPS production in sulfation. The clinical implication that fatigue = impaired detox
  is a logical extension but is not directly tested in clinical trials with patient-level
  energy status.
coaching_translation: Detoxification requires energy. If your clients are exhausted
  or have poor mitochondrial function, their livers are literally short on power to
  process toxins. Supporting energy metabolism is part of supporting detox.
caveats:
- Expert lecture source (moderate quality). The biochemical energy-dependence of detox
  enzymes is established; the direct clinical correlation between client-reported
  fatigue and detox impairment is extrapolated.
