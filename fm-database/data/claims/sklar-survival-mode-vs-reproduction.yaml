slug: sklar-survival-mode-vs-reproduction
statement: When the body is allocating resources toward chronic immune activation,
  gut inflammation, infections, or sustained stress, it down-prioritises reproduction.
  This is why otherwise normal hormone panels can co-exist with infertility — conception
  requires the body to perceive enough safety to invest in a pregnancy.
