slug: alcohol-takes-pole-position-in-liver-detox
statement: Alcohol is acutely lethal at sufficient dose, so the liver prioritises
  clearing it over all other detoxification work. When alcohol is in circulation,
  conjugation of hormones, environmental toxins, and other compounds is effectively
  paused. Even three drinks on a weekend evening can stall the rest of the body's
  detox programs for hours to days, allowing other accumulated burdens to bypass excretion.
  For clients in active detox protocols, minimising alcohol is among the single highest-yield
  interventions.
evidence_tier: strong
