  location: Podcast — Alcohol and pole position
  quote: Alcohol is a toxin and it's an acute toxin, meaning if you don't deal with
    it and you have enough of it, it'll kill you. So your liver has only so much bandwidth
    and alcohol will take pole position. You're not dealing with your hormone imbalances,
    you're not dealing with the chemicals you just got exposed to.
