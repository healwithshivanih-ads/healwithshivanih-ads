slug: briden-progesterone-vs-progestins-not-same
statement: Body-identical progesterone (Prometrium, Utrogestan, Famenita, Teva) is
  molecularly identical to ovarian progesterone. Progestins (drospirenone, levonorgestrel,
  medroxyprogesterone, norethisterone) are structurally different molecules with different
  physiological effects — some progestins worsen blood pressure, insulin resistance,
  lipids, and may carry breast cancer risk, while real progesterone supports cardiovascular
  and metabolic health and may reduce breast cancer risk.
evidence_tier: strong
rationale: The progesterone vs progestin distinction is established in pharmacology
  and the Women's Health Initiative reanalysis (the breast cancer signal was driven
  by medroxyprogesterone, not bioidentical progesterone). The E3N French cohort showed
  neutral or protective effect of micronised progesterone.
coaching_translation: 'If a client reports having tried ''progesterone'' and feeling
  worse, the first question is: was it actually body-identical progesterone (Prometrium/Utrogestan),
  or a progestin (Provera, Mirena, pill)? They are not interchangeable.'
