slug: omega-3-shifts-vaginal-microbiome-to-crispatus
statement: Omega-3 fatty acid supplementation shifts the vaginal microbiome to favor Lactobacillus crispatus.
evidence_tier: plausible_emerging
rationale: Dr. Davis states that omega-3s play a 'big role in the vaginal microbiome' and shifts it toward crispatus. This
  is mechanistically plausible via anti-inflammatory and epithelial modulation effects, but no specific studies are cited.
coaching_translation: Taking fish oil (both EPA and DHA) can help support the growth of beneficial vaginal bacteria like L.
  crispatus.
caveats:
