slug: hypochlorhydria-rosacea
statement: Rosacea patients commonly have hypochlorhydria or achlorhydria; HCl supplementation
  produces marked clinical improvement in this subset. Pancreatic lipase secretion
  is also diminished in rosacea patients, and pancreatic enzyme supplementation (pancreatin
  8 to 10X USP, 350 to 500 mg before meals) provides additional benefit. Coach trials
  betaine HCl and digestive enzymes alongside H. pylori screen.
evidence_tier: plausible_emerging
