slug: cortisol-raises-hepatic-gluconeogenesis-and-visceral-fat
statement: Cortisol increases hepatic gluconeogenesis and visceral fat deposition,
  directly worsening insulin resistance.
evidence_tier: strong
rationale: Well-characterised in endocrinology; glucocorticoid-induced hyperglycaemia
  and visceral adiposity are established clinical phenomena.
coaching_translation: Chronic stress keeps your cortisol elevated, which makes your
  liver pump out more glucose and encourages fat storage around your waist — both
  of which make insulin resistance worse.
