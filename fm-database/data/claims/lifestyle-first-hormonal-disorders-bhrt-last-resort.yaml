slug: lifestyle-first-hormonal-disorders-bhrt-last-resort
statement: Welch argues that diet, lifestyle, and stress management are the primary and sufficient treatment
  for the vast majority of women's hormonal disorders; bioidentical hormone therapy should be considered
  only after lifestyle interventions have proven insufficient.
evidence_tier: plausible_emerging
rationale: This is the central clinical philosophy of the book — consistent with lifestyle-medicine and
  FM principles. It is a practitioner's treatment hierarchy, not a single-mechanism claim. Evidence for
  lifestyle-first approaches to hormonal conditions is moderate-to-strong.
coaching_translation: For most hormonal issues, changing diet, reducing stress, and improving lifestyle
  habits is usually enough. Hormonal supplements — even bioidentical ones — should be the last resort,
  not the first. This is the approach Welch uses successfully in most of her practice.
out_of_scope_notes: Any discussion of bioidentical hormone replacement therapy as a clinical intervention
  is beyond NBHWC scope. Coach presents the lifestyle-first hierarchy as education; decisions about BHRT
  are for the prescribing clinician.
caveats:
- '''Vast majority'' is a clinical judgment, not a controlled-trial claim. Some severe hormonal disorders
  (early surgical menopause, severe osteoporosis, etc.) may require earlier medical intervention.'
