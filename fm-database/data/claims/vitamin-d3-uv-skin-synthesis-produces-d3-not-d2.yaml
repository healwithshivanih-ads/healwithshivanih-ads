slug: vitamin-d3-uv-skin-synthesis-produces-d3-not-d2
statement: When UV rays from the sun fall on the skin, the form of vitamin D produced
  is vitamin D3 (cholecalciferol), not D2 (ergocalciferol). Vitamin D2 is primarily
  derived from plant sources such as mushrooms and yeast.
evidence_tier: strong
rationale: Well-established photobiological fact. UV-B radiation converts 7-dehydrocholesterol
  in the skin to pre-vitamin D3, which isomerises to vitamin D3. Vitamin D2 comes
  from UV-irradiated ergosterol in fungi/plants.
coaching_translation: The vitamin D your body makes from sunlight is D3 — the same
  form as most supplements. D2 comes from plants like mushrooms.
