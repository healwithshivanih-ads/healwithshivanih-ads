slug: zinc-mucin-production-curative-pu
statement: Zinc increases mucin production in vitro and demonstrates a protective
  effect on peptic ulcers in animals and a curative effect in human beings.
evidence_tier: plausible_emerging
rationale: In vitro and animal data plus human curative effect noted in FM textbook;
  zinc's role in mucosal repair, metalloenzyme function, and cell proliferation is
  mechanistically well supported.
coaching_translation: Zinc supports your stomach's mucus barrier and has been shown
  to help heal ulcers in people.
