slug: social-connection-as-essential-nutrient
statement: Humans are obligate social mammals — the genome assumes meaningful social
  connection, group identity, contribution to tribe, gratitude, and mutual acceptance
  as continuous required inputs. Removal of these (social isolation, chronic exclusion,
  persistent low-status interactions, prolonged loneliness) produces measurable epigenetic
  dysregulation, elevated CRP and IL-6, HPA-axis hyperactivation, accelerated cognitive
  decline, and mortality risk comparable to smoking 15 cigarettes/day per Holt-Lunstad's
  meta-analyses. Conversely, forced social density in solitary species (grizzly bears
  housed together) produces equally severe stress phenotypes. The genome's social-architecture
  requirements are species-specific. For humans, the deficiency-state equivalent of
  social isolation must be addressed as a clinical priority on par with nutrient deficiency,
  not as a "soft factor" outside scope.
