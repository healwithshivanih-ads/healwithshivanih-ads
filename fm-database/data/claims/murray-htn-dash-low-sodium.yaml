slug: murray-htn-dash-low-sodium
statement: The DASH dietary pattern (rich in fruits, vegetables, low-fat dairy; low
  in saturated fat, cholesterol; high in potassium, calcium, magnesium, fibre) lowers
  systolic BP by 11.4 mmHg and diastolic by 5.5 mmHg in hypertensive patients without
  sodium restriction. Coupling DASH with sodium reduction to under 1,500 mg per day
  produces an additional ~11.5 mmHg systolic drop — superior to either intervention
  alone.
evidence_tier: strong
linked_to_topics:
