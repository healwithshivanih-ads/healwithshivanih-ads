sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 63 — High Blood Pressure, pg 1056-1057
  quote: The DASH diet is rich in fruits, vegetables, and low-fat dairy foods and
    low in saturated and total fat. In the first trial, the DASH diet produced a net
    blood pressure reduction of 11.4 and 5.5 mm Hg systolic and diastolic, respectively,
    in patients with high BP. The DASH diet with the lower sodium level led to a mean
    systolic blood pressure that was 7.1 mm Hg lower in participants without hypertension
    and 11.5 mm Hg lower in participants with hypertension. These results indicate
    that a sodium intake below 1,500 mg per day can significantly and quickly lower
    blood pressure.
