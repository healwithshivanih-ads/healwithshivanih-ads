slug: curcumin-inhibits-nfkb
statement: Curcumin inhibits NF-κB signaling and lowers CRP, making it clinically
  useful in arthritis, IBD, and metabolic syndrome.
evidence_tier: plausible_emerging
rationale: Multiple RCTs and mechanistic studies support curcumin's NF-κB inhibition
  and CRP-lowering effects, though bioavailability of standard curcumin is poor without
  co-administration of piperine or phospholipid formulations.
coaching_translation: Curcumin (turmeric) is one of the most evidence-backed anti-inflammatory
  foods/supplements. Pair it with black pepper and fat for best effect.
caveats:
- Bioavailability of standard curcumin is low — enhanced forms (phytosomal, piperine-enhanced)
  required for clinical effect.
- Source is educational synthesis, not primary literature citation.
