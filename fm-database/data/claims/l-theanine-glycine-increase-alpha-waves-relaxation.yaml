slug: l-theanine-glycine-increase-alpha-waves-relaxation
statement: L-theanine and glycine increase alpha brain waves and promote relaxation,
  supporting mental tension and sleep.
evidence_tier: plausible_emerging
rationale: L-theanine's alpha wave-promoting and anxiolytic effects are supported
  by multiple RCTs. Glycine's sleep-promoting effects via NMDA receptor modulation
  and thermoregulation are also RCT-supported. Both are well-characterized.
coaching_translation: L-theanine (found naturally in green tea) and glycine are two
  calming amino acids that gently shift your brain toward a relaxed but alert state—useful
  for both daytime mental tension and nighttime sleep.
caveats:
- Dosing guidance from clinician recommended, especially with medications.
- Source is educational synthesis.
