slug: l-glutamine-aloe-vera-gut-lining-repair
statement: L-glutamine and aloe vera juice support gut lining repair as part of a comprehensive leaky gut and constipation
  protocol.
evidence_tier: fm_specific_thin
rationale: L-glutamine is a primary fuel for enterocytes and has some RCT support for improving gut barrier function in specific
  clinical contexts. Aloe vera has anti-inflammatory and laxative properties supported by small studies. Combined use is common
  in FM practice but not robustly RCT-validated.
coaching_translation: Once dietary changes are in place, L-glutamine and aloe vera juice can be added to support healing the
  gut lining and improving bowel motility.
caveats:
- Source is expert FM lecture — treat as fm_specific_thin.
- Aloe vera latex (anthraquinone-containing) is different from inner-leaf gel and can be stimulant-laxative; clarify form.
- L-glutamine dosing should be confirmed with clinician.
