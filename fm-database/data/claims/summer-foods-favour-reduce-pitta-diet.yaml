slug: summer-foods-favour-reduce-pitta-diet
statement: Summer foods to favour include bitter and astringent vegetables (zucchini, broccoli, leafy
  greens, fennel), light neutral grains (quinoa, white basmati, barley), sweet neutral fruits (grapes,
  melons, stone fruits), cool proteins (mung beans, tofu, lean white meat), and cooling spices (fennel
  seed, coriander, cilantro, cardamom, mint); foods to reduce include spicy foods, coffee, vinegar, alcohol,
  salty foods, raw tomatoes, fried foods, and sour dairy.
evidence_tier: fm_specific_thin
rationale: These dietary choices introduce coolness, moisture, and neutrality to counterbalance the season's
  heat and sharpen pitta tendencies. Bitter greens cool the blood; sweet coconut and ghee soothe the digestive
  tract.
coaching_translation: Build summer meals around cooling greens, coconut, and gentle grains. Swap chilli-heavy
  dishes for coriander- and mint-spiced preparations. Limit coffee and alcohol, which amplify internal
  heat.
out_of_scope_notes: ''
caveats:
- Dosha-specific dietary framework; individual heat sensitivity varies.
