slug: endometriosis-pycnogenol-33pct-symptom-reduction
statement: In a 48-week randomized trial of 58 women with endometriosis, pycnogenol
  (pine bark extract) 30 mg twice daily produced a 33% reduction in endometriosis
  symptoms. Unlike the comparator drug leuprorelin, pycnogenol preserved regular menses
  and normal estrogen levels; five women in the pycnogenol arm became pregnant during
  the trial.
evidence_tier: plausible_emerging
linked_to_topics:
