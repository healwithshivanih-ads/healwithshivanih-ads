sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Endometriosis chapter, p 896-897
  quote: This group experienced a 33% reduction in symptoms of endometriosis. The
    leuprorelin group had a greater response within the treatment period but relapsed
    after 24 weeks. The Pycnogenol group maintained regular menses and normal estrogen
    levels during treatment.
