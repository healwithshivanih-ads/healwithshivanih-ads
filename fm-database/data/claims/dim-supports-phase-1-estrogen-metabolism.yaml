slug: dim-supports-phase-1-estrogen-metabolism
statement: DIM (diindolylmethane), a compound derived from cruciferous vegetables,
  supports phase 1 estrogen metabolism by favouring production of less proliferative
  2-OH estrogen metabolites.
evidence_tier: plausible_emerging
rationale: DIM has been studied for its role in shifting estrogen metabolism toward
  the 2-hydroxy pathway, which is considered less estrogenically active than the 16-OH
  or 4-OH pathways. In vitro and early clinical data support this mechanism; large-scale
  RCT evidence in endometriosis is limited.
coaching_translation: DIM from cruciferous vegetables helps your liver process estrogen
  more safely by steering it down a less harmful pathway. The supplement form is used
  when dietary changes alone are too slow.
caveats:
- Phase 1 estrogen metabolism shift by DIM is plausible emerging evidence; robust
  clinical RCTs in endometriosis are lacking. Source is FM lecture.
- Should be used after hormone testing confirms estrogen dominance.
- Dosing should be supervised by a clinician.
