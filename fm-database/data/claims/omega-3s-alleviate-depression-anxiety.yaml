slug: omega-3s-alleviate-depression-anxiety
statement: Omega-3 supplementation may alleviate symptoms of depression and anxiety
  by supporting both gut and brain health.
evidence_tier: plausible_emerging
rationale: Multiple meta-analyses support omega-3 (particularly EPA) supplementation
  for depression. Evidence for anxiety is more mixed. Effect partially mediated through
  anti-inflammatory and gut-brain mechanisms.
caveats:
- Effect is adjunctive — not a standalone treatment for clinical depression.
- EPA appears more effective than DHA for mood disorders.
