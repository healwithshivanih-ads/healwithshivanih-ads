  location: Chapter 39 — Common Cold, pg 694–697
  quote: Colds developed in 58% of echinacea recipients compared with 82% of placebo
    recipients. Mixed results from clinical studies with echinacea are most likely
    due to insufficient quantity of active compounds. Clinical trials of an extract
    from freshly harvested E. purpurea plants have shown excellent results.
