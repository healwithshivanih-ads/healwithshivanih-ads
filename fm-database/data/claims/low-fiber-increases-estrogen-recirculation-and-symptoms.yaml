slug: low-fiber-increases-estrogen-recirculation-and-symptoms
statement: A low- or no-fiber diet increases the likelihood of estrogen recirculation,
  which can exacerbate menopausal and perimenopausal symptoms including hot flashes,
  skin issues, and weight loss resistance — even in full menopause.
evidence_tier: plausible_emerging
rationale: Speaker states this directly and it is mechanistically consistent with
  estrobolome function. No controlled study cited.
coaching_translation: Clients in perimenopause or menopause who aren't eating enough
  fiber may be inadvertently recycling estrogen, worsening the very symptoms they're
  trying to manage.
caveats:
- Source is expert session. Link between fiber intake and specific symptom severity
  is plausible but individual variability is high.
