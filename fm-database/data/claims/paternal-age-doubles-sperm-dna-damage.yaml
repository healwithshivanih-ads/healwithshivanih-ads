  location: Chapter 12 — Sperm Quality, pg 167-168
  quote: DNA fragmentation in sperm doubles from ages 30-45. Fathers over the age
    of 40 have a 20 percent greater chance of having a baby with a serious birth defect.
    Higher levels of DNA damage in sperm also more than double the risk of miscarriage.
rationale: Counters the common assumption that male age doesn't matter.
