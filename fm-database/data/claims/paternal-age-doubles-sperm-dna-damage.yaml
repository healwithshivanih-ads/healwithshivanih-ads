slug: paternal-age-doubles-sperm-dna-damage
statement: Sperm DNA fragmentation roughly doubles from age 30 to 45. Paternal age
  over 40 confers a 20% higher risk of birth defects in offspring, men over 50 have
  roughly double the risk of having a child with autism vs men under 29, and elevated
  paternal sperm DNA damage more than doubles miscarriage risk. Sperm motility starts
  declining at age 35.
evidence_tier: strong
