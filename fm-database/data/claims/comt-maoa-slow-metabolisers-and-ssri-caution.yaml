slug: comt-maoa-slow-metabolisers-and-ssri-caution
statement: Slow COMT/MAOA metabolisers accumulate dopamine and serotonin rather than
  running low, yet present with the same anxiety/insomnia picture as low-neurotransmitter
  clients. An SSRI added on top of already-high neurotransmitters can worsen anxiety
  and irritability.
evidence_tier: plausible_emerging
rationale: If mood worsens after an SSRI start, note it as a heads-up for the prescriber
  — the biochemistry may be the opposite of what was assumed.
coaching_translation: If mood worsens after an SSRI start, note it as a heads-up for
  the prescriber — the biochemistry may be the opposite of what was assumed.
out_of_scope_notes: Never interpret this as grounds to alter psychiatric medication;
  refer to the prescriber.
