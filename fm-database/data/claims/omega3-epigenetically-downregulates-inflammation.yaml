slug: omega3-epigenetically-downregulates-inflammation
statement: Omega-3 fatty acids (EPA/DHA, and specialised pro-resolving mediators)
  act epigenetically to down-regulate the TNF-alpha, IL-6 and IL-1 inflammatory genes
  — a key reason they help clients who are switching on inflammation through overtraining
  or toxic load.
evidence_tier: plausible_emerging
rationale: Reinforce omega-3-rich foods / a provider-recommended EPA-DHA to counter
  inflammation from high training loads.
coaching_translation: Reinforce omega-3-rich foods / a provider-recommended EPA-DHA
  to counter inflammation from high training loads.
out_of_scope_notes: Dosing is a clinician decision.
