slug: mayo-ear-infection-hallmark-symptoms
statement: Acute middle-ear infection presents with sudden ear pain, decreased hearing,
  ear pressure or popping, fever, fluid drainage from the ear if the eardrum ruptures,
  and in young children pulling at the ear, increased irritability, or feeding refusal.
