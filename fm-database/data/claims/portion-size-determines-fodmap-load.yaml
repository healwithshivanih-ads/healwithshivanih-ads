slug: portion-size-determines-fodmap-load
statement: 'The FODMAP load of a food is dose-dependent: many foods are low-FODMAP
  only up to a specific serving size, and exceeding that threshold causes symptoms.'
evidence_tier: strong
rationale: Monash University FODMAP research demonstrates a clear dose-response relationship
  for most FODMAP-containing foods. The document explicitly states 'Portion size matters
  (many foods are low only up to a certain serve, and IBS tends to have a dose response).'
coaching_translation: It's not just WHAT you eat — it's HOW MUCH. A small serve of
  a yellow-zone food is fine; a large serve of the same food can trigger symptoms.
caveats:
- Individual thresholds vary; systematic reintroduction is needed to personalise.
