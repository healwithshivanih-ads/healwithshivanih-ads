slug: portion-size-determines-fodmap-load
statement: FODMAP content is dose-dependent; many foods are low FODMAP only up to
  a specific serving size, and exceeding that threshold triggers symptoms.
evidence_tier: strong
rationale: Monash University FODMAP app data and RCTs demonstrate that threshold effects
  exist for most FODMAP foods; portion creep is a primary reason for failed symptom
  response.
coaching_translation: It is not just WHAT you eat but HOW MUCH — even 'safe' foods
  can cause symptoms if you have too large a portion.
caveats:
- Individual thresholds vary; systematic reintroduction is needed to personalise.
