slug: sklar-day-21-progesterone-snapshot-misses-luteal-trajectory
statement: A single day-21 serum progesterone draw cannot reveal how long progesterone
  is sustained across the luteal phase, whether it crashes early, or whether the luteal
  phase itself is long enough (12 to 14 days) to support implantation and early pregnancy
  development; full-cycle DUTCH mapping and BBT charting are required to surface these
  patterns.
