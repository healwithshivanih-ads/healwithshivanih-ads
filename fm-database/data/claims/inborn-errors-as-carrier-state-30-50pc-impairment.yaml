slug: inborn-errors-as-carrier-state-30-50pc-impairment
statement: There are over 1,400 documented inborn errors of metabolism, the largest
  single group of which affects mitochondrial enzymes. Individually each is rare,
  but Masterjohn estimates that having carrier-state 30-50% impairment of one or two
  of these enzymes is "probably more common than not" in the general population. These
  sub-clinical impairments may never qualify for a diagnosis but can drive lifelong
  unexplained fatigue, neurological dysfunction, food sensitivities, and idiosyncratic
  responses to standard interventions. The treatment is often a single mega-dose vitamin
  (thiamine, riboflavin, B12) or a specific diet (ketogenic, ultra-low-fat, low-carnitine)
  — but WHICH nutrient and WHICH diet differs entirely between clients carrying different
  impairments. Coach implication — when a client repeatedly says "X supplement that
  helps everyone else makes me worse," take it seriously as a possible carrier-state
  signal.
