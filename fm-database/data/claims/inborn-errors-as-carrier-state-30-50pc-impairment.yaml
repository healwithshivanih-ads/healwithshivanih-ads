  location: Podcast — inborn errors segment
  quote: There are over 1,400 inborn errors of metabolism. Mitochondrial impairments
    are the largest of those groups. It's probably more common than not to have carrier
    status for at least a couple of these. In one person it may be that they need
    to mega-dose thiamine, in another riboflavin, in another keto diet, in another
    as low-fat as possible. I'm working with a client who has gotten seizures every
    time this person tried to supplement with carnitine.
rationale: Gives coach a respectful frame for the client who says "every supplement
  makes me feel worse" — these clients may need targeted testing not blanket protocols.
