slug: hyperinsulinemia-stimulates-theca-cells-increases-androgens
statement: Hyperinsulinemia in PCOS stimulates ovarian theca cells to overproduce
  androgens and lowers SHBG, increasing free testosterone.
evidence_tier: strong
rationale: 'Well-established mechanism: insulin receptors on theca cells upregulate
  CYP17A1 (androgen synthesis enzyme); insulin also suppresses hepatic SHBG production.
  This is consensus-level in reproductive endocrinology literature.'
coaching_translation: When insulin is chronically high, it signals the ovaries to
  make too much testosterone — which is why managing blood sugar is so central to
  PCOS care.
