slug: low-free-t3-reduces-progesterone-by-3-5x
statement: When TSH falls below 2 (indicating hypothyroidism or suboptimal thyroid
  function), progesterone levels can increase by 3–5 times; conversely, low free T3
  is associated with reduced progesterone production.
evidence_tier: fm_specific_thin
rationale: The specific claim that TSH <2 increases progesterone 3–5x is stated by
  the lecturer as clinical FM observation but is not supported by a cited peer-reviewed
  study. Thyroid-progesterone interaction is biologically plausible (T3 supports steroidogenesis)
  but the quantitative claim is not verifiable from this source.
coaching_translation: Your thyroid and hormones are deeply connected. When your thyroid
  isn't working well, your progesterone can be affected too — one reason thyroid testing
  is always part of a hormone workup.
caveats:
- Specific 3–5x quantitative claim is unsourced FM expert opinion; verify with clinician.
- Source is FM lecture (expert_consensus, moderate quality).
