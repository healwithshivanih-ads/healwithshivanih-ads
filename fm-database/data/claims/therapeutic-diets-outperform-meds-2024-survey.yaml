slug: therapeutic-diets-outperform-meds-2024-survey
statement: In a published 800-family survey study (Matthews et al. 2024) comparing
  13 therapeutic diets, neutraceuticals, and psychiatric/seizure medications in children
  with autism, therapeutic diets produced statistically significantly greater overall
  benefit AND statistically significantly fewer adverse effects than the medication
  category. Different diets performed better for different symptom clusters — ketogenic
  was the top diet for seizures; low-salicylate (Feingold) led for hyperactivity (45
  percent responders); GFCF led for language, cognition, and GI symptoms; a "healthy
  diet" (more produce and protein, less refined sugar and additives) ranked first
  for overall physical health.
