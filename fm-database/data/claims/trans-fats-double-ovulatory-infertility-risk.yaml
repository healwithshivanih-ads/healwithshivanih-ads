slug: trans-fats-double-ovulatory-infertility-risk
statement: 'Replacing even a small amount of monounsaturated fat with trans fat is
  associated with more than double the risk of ovulatory infertility in the Nurses
  Health Study. Trans fats are found in commercial baked goods, fried foods, and any
  product listing partially hydrogenated oil. The avoidance rule is simple: cut commercial
  bakery and fast food.'
evidence_tier: strong
