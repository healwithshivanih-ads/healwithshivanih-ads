  location: Chapter 2 — Hair Loss, pp 33-34
  quote: Progestins with a high androgen index include medroxyprogesterone acetate,
    levonorgestrel, norgestrel, and etonogestrel. They cause hair loss by shrinking
    (or miniaturising) hair follicles. Progestins with a low androgen index include
    drospirenone, norgestimate, and cyproterone. They do not cause hair loss when
    you take them, but they can cause hair loss when you stop them because they cause
    a rebound surge in androgens and androgen sensitivity.
