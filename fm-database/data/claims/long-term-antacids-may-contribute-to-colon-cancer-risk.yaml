slug: long-term-antacids-may-contribute-to-colon-cancer-risk
statement: Long-term antacid medication (e.g. proton pump inhibitors such as Nexium)
  may contribute to colon cancer risk by preventing proper protein breakdown, leading
  to partially digested proteins reaching the colon and driving pathogenic bacterial
  overgrowth.
evidence_tier: plausible_emerging
rationale: There is emerging epidemiological research associating long-term PPI use
  with increased colorectal cancer risk, and the mechanistic pathway via protein maldigestion
  and colonic dysbiosis is biologically plausible. This is not established consensus.
out_of_scope_notes: Assessment of cancer risk and PPI tapering are clinician scope.
caveats:
- This is a plausible mechanistic hypothesis, not established consensus.
- Clients should not discontinue PPIs without clinician guidance.
- Source is a practitioner talk, not a systematic review.
