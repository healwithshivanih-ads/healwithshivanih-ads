slug: egcg-nrf2-antioxidant-detox
statement: EGCG from green tea upregulates the Nrf2 antioxidant pathway, enhancing
  endogenous antioxidant enzymes (SOD, catalase, glutathione) to reduce oxidative
  stress during detoxification.
evidence_tier: plausible_emerging
rationale: Document explicitly cites Nrf2 pathway upregulation by EGCG polyphenols.
  Nrf2 activation by EGCG has mechanistic support in the literature; this source does
  not cite a specific RCT.
coaching_translation: Green tea's EGCG helps activate your body's own antioxidant
  defence system, making it a powerful daily detox ally.
caveats:
- Avoid with iron-deficiency anemia
- Source is FM synthesis without primary citation
- High-dose extract may cause liver stress at very high doses
