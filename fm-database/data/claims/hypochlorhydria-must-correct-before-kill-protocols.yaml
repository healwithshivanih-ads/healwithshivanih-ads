slug: hypochlorhydria-must-correct-before-kill-protocols
statement: Low stomach acid (hypochlorhydria) must be corrected before implementing
  antimicrobial kill protocols, as it is foundational to SIBO/SIFO development.
evidence_tier: fm_specific_thin
rationale: 'Mechanistically sound: gastric acid sterilizes the upper GI, and hypochlorhydria
  is a recognized root cause of bacterial overgrowth. Clinical sequencing recommendation
  is FM-specific consensus.'
coaching_translation: Starting herbal antimicrobials before addressing low stomach
  acid is like trying to clear a clogged drain without fixing the underlying flow
  problem.
caveats:
- Sequencing recommendation is FM clinical consensus, not RCT-validated. Betaine HCl
  use must be supervised by clinician.
