slug: high-cortisol-induces-thyroid-hormone-resistance
statement: Chronic high cortisol creates whole-body hormone resistance, including thyroid resistance,
  so that the thyroid gland must work harder to produce the same effect — potentially contributing to
  hypothyroid-like symptoms even when lab values appear normal.
evidence_tier: plausible_emerging
rationale: Glucocorticoid-induced receptor downregulation is established; specific cortisol-driven thyroid
  receptor resistance is plausible but not as well quantified in human studies as the author implies.
coaching_translation: Prolonged stress can make your cells less sensitive to thyroid hormones — even when
  your TSH looks normal on a blood test. This is one reason why women under chronic stress feel sluggish,
  foggy, and cold despite 'normal' thyroid function.
out_of_scope_notes: ''
caveats:
- The direct cortisol-to-thyroid-resistance pathway is mechanistically plausible but the clinical magnitude
  in euthyroid women under 'everyday' stress is not well quantified.
