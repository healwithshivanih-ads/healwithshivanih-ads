slug: ginger-anti-inflammatory-1g-per-day
statement: Ginger extract at approximately 1g/day (or equivalent via 3–4 cups of ginger
  tea) exerts anti-inflammatory effects; food-first delivery via ginger green tea
  is preferred.
evidence_tier: plausible_emerging
rationale: Ginger's anti-inflammatory properties (gingerols, shogaols) are supported
  by in vitro studies and several small RCTs, particularly in osteoarthritis and metabolic
  syndrome. 1g/day is a commonly cited dose in clinical trials.
coaching_translation: 3–4 cups of ginger tea per day is a simple, sustainable way
  to get a therapeutic anti-inflammatory dose of ginger — and it's easy to maintain
  long-term.
