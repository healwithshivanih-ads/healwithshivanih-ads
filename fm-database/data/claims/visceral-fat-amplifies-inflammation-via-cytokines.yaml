  location: Session 4 — Gut Inflammation Weight Gain Loop
  quote: Visceral fat, the fat that is around our vital organs, is the pathogenic
    fat. It is the fat that releases inflammatory cytokines and tumor necrosis factor
    and all these very inflammatory signaling molecules that actually reinforce the
    inflammation, reinforce the insulin sensitivity loss and amplifies more inflammation
    and more accumulation of fat.
