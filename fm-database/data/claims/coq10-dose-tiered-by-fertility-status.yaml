slug: coq10-dose-tiered-by-fertility-status
statement: 'Fett''s tiered dosing: Basic plan 100 mg ubiquinol (or 200 mg ubiquinone)
  for women under 35 without fertility concerns; Intermediate 200 mg ubiquinol (400
  mg ubiquinone) for 35+ or planning IVF; Advanced 300 mg ubiquinol (600 mg ubiquinone)
  for diminished ovarian reserve, previous failed IVF, or AMA egg freezing. Take with
  a fat-containing breakfast for absorption and to avoid late-evening energy boost.'
