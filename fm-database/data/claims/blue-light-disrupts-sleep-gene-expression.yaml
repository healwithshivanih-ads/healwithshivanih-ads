slug: blue-light-disrupts-sleep-gene-expression
statement: Evening blue light exposure from screens suppresses melatonin secretion,
  disrupts circadian rhythms, and contributes to poor sleep quality that further impairs
  gene-level repair processes.
evidence_tier: strong
rationale: Well-established that blue-wavelength light (~480 nm) suppresses pineal
  melatonin via ipRGC retinal cells. This is supported by multiple RCTs. The downstream
  gene-pathway framing is more speculative but plausible.
coaching_translation: Stop all screen use 1 hour before bed. Install blue-light filter
  apps (f.lux, Night Shift). Turn off night-lights and block street light from the
  bedroom.
caveats:
- The direct gene-pathway framing is consumer-level extrapolation; the circadian/melatonin
  mechanism is well-established
