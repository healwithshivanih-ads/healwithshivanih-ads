slug: vegetarian-diet-lower-bp-and-htn-incidence
statement: Vegetarians have lower blood pressure and lower incidence of hypertension
  and other cardiovascular diseases than nonvegetarians, attributable to higher potassium,
  fibre, essential fatty acids, Ca, Mg, and vitamin C and lower saturated fat.
evidence_tier: strong
rationale: Supported by multiple epidemiological and interventional studies; the nutrient
  differences cited are mechanistically plausible and well-documented.
coaching_translation: A mostly plant-based diet delivers the mineral and fibre combination
  most protective against high blood pressure.
