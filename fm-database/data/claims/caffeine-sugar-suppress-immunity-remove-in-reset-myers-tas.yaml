slug: caffeine-sugar-suppress-immunity-remove-in-reset-myers-tas
statement: Caffeine and sugar can suppress immune function and aggravate inflammation,
  so they are removed during the initial 30-day reset.
evidence_tier: fm_specific_thin
rationale: Both are used as short-term energy props but add to the inflammatory/immune
  load; a reset period helps the immune system recover.
coaching_translation: Coffee and sugar prop you up short-term but add to the load
  — pausing them during a reset gives the immune system a break.
