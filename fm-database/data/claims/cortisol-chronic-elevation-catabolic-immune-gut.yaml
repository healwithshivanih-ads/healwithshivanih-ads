slug: cortisol-chronic-elevation-catabolic-immune-gut
statement: Chronically elevated cortisol breaks down muscle (catabolism), lowers immune
  function, contributes to leaky gut, and drives systemic inflammation.
evidence_tier: strong
rationale: Catabolic effects of chronic cortisol excess and immunosuppression are
  well-established endocrinology. Cortisol's role in gut permeability and inflammation
  has strong mechanistic backing.
coaching_translation: While cortisol is helpful short-term (focus, alertness), chronic
  stress keeps it elevated — and that wears down muscle, immunity, and gut integrity
  over time.
caveats:
- Speaker is presenting established physiology; magnitude of effect varies with degree
  of HPA dysregulation.
