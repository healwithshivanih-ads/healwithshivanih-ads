slug: 5htp-100-300mg-improves-deep-sleep-stages-3-4
statement: 5-hydroxytryptophan (5-HTP) at 100-300 mg taken 30-45 minutes before bed
  increases REM sleep by ~25% and deepens non-REM stages 3 and 4 without increasing
  total sleep time — outperforming l-tryptophan for sleep promotion and maintenance.
evidence_tier: plausible_emerging
rationale: Pizzorno cites trial data showing 5-HTP is more bioavailable than tryptophan
  (bypasses transport competition and rate-limiting tryptophan hydroxylase). Multiple
  small RCTs support sleep architecture improvements; long-term safety still being
  defined.
coaching_translation: 5-HTP works better than plain tryptophan for sleep — it skips
  a couple of conversion steps and reaches your brain more directly. Start low (100
  mg), build up over 3 days, take 30-45 minutes before bed.
caveats:
- Start at 100 mg for at least 3 days before increasing.
- Not for use with SSRIs, MAOIs, or other serotonergic drugs — serotonin syndrome
  risk.
- Take with carbohydrate, not protein, to ensure brain uptake.
