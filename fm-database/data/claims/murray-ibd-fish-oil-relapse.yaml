slug: murray-ibd-fish-oil-relapse
statement: Fish oil supplementation at 2.7 to 5.1 g total omega-3 per day prevents
  or delays relapses in both Crohn's disease and ulcerative colitis; in one trial
  the one-year relapse rate dropped by half (absolute risk reduction 31 percent).
  IBD patients show elevated inflammatory eicosanoids; reducing omega-6 sources (corn,
  safflower, sunflower, soy oil, conventional beef, dairy) and increasing EPA/DHA
  from cold-water fish or supplements is a core dietary intervention. Fish oil alone
  is insufficient to maintain remission — other factors must be addressed in parallel.
evidence_tier: strong
