sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 42 — Crohn's Disease and Ulcerative Colitis, pg 727-728
  quote: Detailed analyses of double-blind studies with fish oil supplements (2.7
    to 5.1 g total omega-3 oils per day) have demonstrated an ability to prevent or
    delay relapses in both CD and UC. In one study an omega-3 fatty acid supplement
    reduced the one-year relapse rate by half with an absolute risk reduction of 31
    percent. The formation of these inflammatory compounds can be decreased by reducing
    or eliminating consumption of omega-6-rich foods and increasing consumption of
    the longer-chain omega-3 fatty acids.
