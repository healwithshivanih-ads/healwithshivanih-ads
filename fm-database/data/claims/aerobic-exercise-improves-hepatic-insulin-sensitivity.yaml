slug: aerobic-exercise-improves-hepatic-insulin-sensitivity
statement: Seven days of aerobic training can improve hepatic insulin sensitivity,
  partly via stimulation of hepatic AMPK to suppress hepatic glucose production.
evidence_tier: plausible_emerging
rationale: Mechanistically sound; hepatic AMPK activation during exercise is documented,
  though the 7-day timeline and magnitude of effect may vary by population.
coaching_translation: Just one week of consistent aerobic exercise can begin improving
  how your liver manages blood sugar.
caveats:
- Source is an educational toolkit; specific 7-day claim should be verified against
  primary hepatology/exercise physiology literature.
