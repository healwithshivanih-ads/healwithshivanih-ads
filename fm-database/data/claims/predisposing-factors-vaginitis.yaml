slug: predisposing-factors-vaginitis
statement: Predisposing factors that make recurrent vaginitis predictable — antibiotics,
  oral contraceptives, steroids, diabetes (and elevated blood glucose), pregnancy,
  panty hose (three-fold higher yeast infection rate vs cotton underwear), routine
  douching (kills lactobacilli), and gastrointestinal candida acting as a reservoir.
  Coach education focuses on cotton underwear, no routine douching, refined-sugar
  reduction, and probiotic cover during/after any antibiotic course.
evidence_tier: strong
