slug: flavonoids-strengthen-rectal-veins
statement: Venotonic flavonoids strengthen vein walls and reduce hemorrhoidal symptoms.
  Hydroxyethylrutoside (HER) at 1,000 mg/day for four weeks relieved symptoms in 90%
  of pregnant women versus 12% on placebo. Alternatives — micronized diosmin (500
  to 1,000 mg/day), grape seed extract or pine bark extract (150 to 300 mg/day), and
  citrus bioflavonoids/rutin/hesperidin (3,000 to 6,000 mg/day) — work via the same
  mechanism.
evidence_tier: strong
