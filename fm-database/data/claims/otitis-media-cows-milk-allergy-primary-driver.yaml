  location: Otitis Media chapter, p 885
  quote: The role of allergies as the major cause of chronic otitis media has been
    firmly established in the research literature. Most studies show that 85 to 93%
    of these children have allergies. The allergic reaction causes blockage of the
    eustachian tube by two mechanisms — inflammatory swelling of the mucous membranes
    lining the tube and inflammatory swelling of the nose.
