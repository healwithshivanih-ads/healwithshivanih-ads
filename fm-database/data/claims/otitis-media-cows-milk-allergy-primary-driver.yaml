slug: otitis-media-cows-milk-allergy-primary-driver
statement: 85 to 93% of children with chronic otitis media have allergies — 16% to
  inhalants only, 14% to food only, and 70% to both. Cow's milk is among the most
  commonly implicated foods. Allergic swelling of the eustachian tube and the Toynbee
  phenomenon (swallowing with mouth and nose closed) drive middle-ear fluid accumulation.
  Eliminating wheat, egg, peanut, corn, citrus, chocolate, and dairy during the first
  nine months can prevent food allergy development.
evidence_tier: strong
