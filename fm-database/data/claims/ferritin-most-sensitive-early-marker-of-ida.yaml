slug: ferritin-most-sensitive-early-marker-of-ida
statement: Ferritin is the most sensitive biomarker for detecting iron deficiency
  anemia in its early stages, declining before serum iron becomes abnormal.
evidence_tier: strong
rationale: Ferritin is the body's iron storage protein. As iron stores are mobilised
  to maintain serum iron, ferritin drops first, making it a leading indicator of developing
  IDA. This is well-established in clinical and functional medicine laboratory practice.
coaching_translation: If a client's serum iron looks 'normal' but ferritin is low,
  their iron stores are already being depleted. Ferritin is the early warning signal.
out_of_scope_notes: Interpreting specific ferritin cut-offs and ordering the iron
  panel is a clinician function.
caveats:
- Elevated ferritin may indicate inflammation rather than iron sufficiency — both
  high and low ferritin require clinician evaluation.
- Source is an expert lecture (moderate quality); consistent with established clinical
  guidelines.
