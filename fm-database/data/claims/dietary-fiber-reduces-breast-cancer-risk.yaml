slug: dietary-fiber-reduces-breast-cancer-risk
statement: Higher dietary fiber intake is associated with decreased risk of breast
  cancer, as fiber binds harmful estrogen metabolites in the digestive tract and prevents
  their reabsorption.
evidence_tier: plausible_emerging
rationale: Document cites 'multiple studies' and references include Sangaramoorthy
  et al. (Cancer Med, 2018) on bean fiber and hormone receptor-negative breast cancer.
  Mechanism (binding estrogen metabolites, reducing enterohepatic recirculation) is
  biologically plausible and has epidemiological support.
coaching_translation: Eating at least 25 grams of fiber daily helps your body remove
  used estrogen rather than reabsorbing it — a meaningful step for long-term hormone
  health.
caveats:
- Association from observational studies; RCT evidence for cancer risk reduction is
  limited. Dosing guidance (25g/day) is population-level recommendation.
