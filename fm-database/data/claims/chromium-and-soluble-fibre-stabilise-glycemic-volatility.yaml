slug: chromium-and-soluble-fibre-stabilise-glycemic-volatility
statement: High-complex-carbohydrate, high-soluble-fibre diet eaten in small frequent
  meals — plus viscous-fibre supplements (glucomannan, PGX, psyllium) several times
  daily and chromium repletion — stabilises glycemic volatility and resolves reactive
  hypoglycemia symptoms. Avoid all simple/processed/concentrated carbohydrates and
  alcohol.
evidence_tier: strong
rationale: Pizzorno's standard FM hypoglycemia protocol. Mechanism — soluble fibre
  slows gastric emptying and gut absorption, dampening glucose peaks and counter-regulatory
  rebounds; chromium amplifies insulin signalling at the receptor.
coaching_translation: Stabilise glucose with three levers — small frequent meals,
  viscous soluble fibre before meals (glucomannan, PGX), and chromium supplementation.
  Cut all simple sugars and alcohol. Symptoms (afternoon crashes, food cravings, anxiety)
  resolve in 4-8 weeks.
caveats:
- Viscous fibres need adequate water intake.
- Chromium 200-400 mcg/day; caution in diabetics on glucose-lowering meds (additive
  effect).
- Pair with stress management — cortisol fluctuations drive glycemic volatility.
