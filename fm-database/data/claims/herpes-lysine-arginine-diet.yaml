sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 62 — Herpes, pg 1044-1047
  quote: In one study, lysine was given at a larger dosage (1,000 mg three times per
    day) along with the dietary restriction of nuts, chocolate, and gelatin. At six
    months, lysine was rated as effective or very effective by 74% of those receiving
    it; only 28% of those receiving the placebo gave similar ratings. The foods with
    the worst arginine-to-lysine ratio are chocolate, peanuts, and almonds.
