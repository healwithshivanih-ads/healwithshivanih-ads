slug: herpes-lysine-arginine-diet
statement: HSV replication requires arginine-rich proteins; lysine competes with arginine
  for intestinal transport. In one trial, lysine 1,000 mg three times daily plus avoidance
  of nuts, chocolate, and gelatin produced effective-or-very-effective ratings in
  74% of patients vs 28% on placebo at six months (average outbreaks 3.1 vs 4.2).
  Worst arginine-to-lysine ratio foods to limit — chocolate, peanuts, almonds. Withdrawal
  of lysine is followed by relapse within 1-4 weeks in some patients.
evidence_tier: plausible_emerging
