slug: ldn-positive-outcomes-crps
statement: Low-dose naltrexone showed positive outcomes in two CRPS patients when
  used in combination with other therapies, likely via TLR4 antagonism and microglial
  attenuation.
evidence_tier: plausible_emerging
rationale: Cited to Journal of Neuroimmune Pharmacology. Only two patients — extremely
  limited evidence, but mechanistically coherent with TLR4/glial pathway.
coaching_translation: A small case report found LDN helped two patients with severe
  nerve pain (CRPS) — possibly by calming overactive immune cells in the nervous system.
caveats:
- Only 2 patients reported — case report level evidence. Cannot generalize.
- Used in combination with other therapies — LDN-specific effect unclear.
