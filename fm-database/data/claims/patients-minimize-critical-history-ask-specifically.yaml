slug: patients-minimize-critical-history-ask-specifically
statement: Clients rarely withhold important health history deliberately — they more often fail
  to mention it because they don't realise it matters (years of PPI use, childhood antibiotics,
  mold exposure, chronic bloating 'that's normal for me'), so specific questioning surfaces
  more than open ones.
evidence_tier: fm_specific_thin
rationale: High-value clues are frequently dismissed by clients as irrelevant or normalised
  over time. Targeted, normalising questions about medication history, environmental exposures,
  sleep and digestion recover information that broad prompts and lab panels miss.
coaching_translation: People don't hide their history — they just don't think it's relevant.
  Ask specifically about things like long-term antacids, past antibiotics, damp homes, or bloating
  they've come to see as normal. Closing with 'is there anything I haven't asked about?' often
  surfaces the key detail.
caveats:
- Source is Instagram educational content; practitioner heuristic.
- Stay within scope; normalise sensitive topics rather than interrogate.
