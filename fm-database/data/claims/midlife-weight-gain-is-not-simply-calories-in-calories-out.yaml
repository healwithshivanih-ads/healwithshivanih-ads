slug: midlife-weight-gain-is-not-simply-calories-in-calories-out
statement: Midlife weight gain in women is not simply a matter of caloric excess;
  it involves at least 15–20 interacting factors including hormonal shifts, microbiome
  changes, stress physiology, sleep disruption, impaired mitochondrial fat oxidation,
  and inflammation.
evidence_tier: plausible_emerging
rationale: The multifactorial nature of midlife weight gain is supported across multiple
  streams of research. The specific enumeration and weighting of 15–20 factors reflects
  expert synthesis rather than any single trial, hence plausible_emerging rather than
  strong.
coaching_translation: If you're doing everything 'right' and still gaining weight
  in midlife, that's not a personal failure — it reflects a genuine physiological
  complexity. A deeper investigation (labs, stool testing, stress load, hormone optimization)
  is warranted.
caveats:
- Framing of '15–20 factors' is speaker's synthesis, not a published model.
- Source is expert-consensus transcript.
