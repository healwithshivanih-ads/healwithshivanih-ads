slug: social-rejection-and-pain-share-brain-regions
statement: Functional MRI studies are described as showing that social rejection and
  physical pain share overlapping brain regions including the anterior cingulate cortex
  and insula.
evidence_tier: plausible_emerging
rationale: fMRI evidence for social pain and physical pain overlap (Eisenberger et
  al.) is a recognized research finding. Source is expert consensus referencing this
  without direct citation.
coaching_translation: Social pain is real and physiological; validating clients' experiences
  of rejection or loneliness as a pain experience is clinically appropriate.
