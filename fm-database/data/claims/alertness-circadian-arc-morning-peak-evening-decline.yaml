  location: pp. 158-159
  quote: Your brain is most alert in the morning. As the day goes on, the circadian
    clock instructs your brain to be less alert... Around 9:00 or 10:00 p.m., the
    alertness drive actually reverses... It no longer has to listen to your commands
    and instead goes on autopilot for repair.
