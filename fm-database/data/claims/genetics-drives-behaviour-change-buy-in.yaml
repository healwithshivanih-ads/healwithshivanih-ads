slug: genetics-drives-behaviour-change-buy-in
statement: Genetic testing is a powerful coaching tool because it makes the conversation
  personal — 'this is about ME, not everyone on Google' — which creates buy-in and
  engagement, the precondition for durable behaviour change. Coaches provide the execution
  (behaviour change) that clinicians and reports cannot.
evidence_tier: fm_specific_thin
rationale: Lead with 'this is your unique picture' to generate the buy-in that powers
  behaviour change.
coaching_translation: Lead with 'this is your unique picture' to generate the buy-in
  that powers behaviour change.
out_of_scope_notes: Stay with education and behaviour change; interpretation and prescribing
  remain clinical.
