slug: four-root-causes-of-ida
statement: 'Iron deficiency anemia arises from one or more of four root causes: decreased
  dietary intake, increased physiological demand, malabsorption, or chronic blood
  loss.'
evidence_tier: strong
rationale: This four-category framework (decreased intake, increased demand, malabsorption,
  chronic loss) is a foundational clinical model for IDA aetiology, well-established
  in haematology and nutritional medicine.
coaching_translation: 'When exploring iron deficiency with a client, it helps to ask:
  are they eating enough iron-rich food? Is there a life stage (e.g., pregnancy) increasing
  demand? Are there gut issues affecting absorption? Is there any known blood loss?'
out_of_scope_notes: Diagnosing the specific cause — especially GI bleeding — requires
  clinical workup.
caveats:
- Source is an expert lecture; consistent with standard clinical guidelines.
