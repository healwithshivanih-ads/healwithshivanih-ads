  location: Causes of Iron Deficiency section
  quote: If we summarize the causes, number one is decreased in the diet. Number two
    is increase in the demand. Three is you are taking it but your body is not absorbing
    it. Four is you are absorbing but your body is losing it in a much higher rate
    than it usually would.
