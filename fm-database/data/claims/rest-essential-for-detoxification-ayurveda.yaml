slug: rest-essential-for-detoxification-ayurveda
statement: 'Rest and relaxation are essential components of Ayurvedic detoxification: an overstressed
  or overworked nervous system will continue to crave heavy comfort foods (cheese, meat, bread) to compensate,
  blocking the body''s natural elimination processes.'
evidence_tier: plausible_emerging
rationale: In Ayurvedic physiology, the body will not release ama (toxins/accumulated wastes) unless the
  nervous system feels safe and rested. Sympathetic dominance or chronic stress promotes building/anabolic
  responses and cravings for dense, grounding foods, counteracting any attempt at cleansing or dietary
  lightening.
coaching_translation: 'Tell clients: you can eat perfectly clean during a cleanse, but if you keep over-scheduling
  yourself and skimping on sleep, your body will crave comfort foods and will not let go of what it needs
  to release. Rest is medicine — not optional.'
out_of_scope_notes: ''
caveats:
- The specific Ayurvedic explanation of ama is traditional — the HPA-axis / stress-craving connection
  has modern physiological support.
- Coach clients on sleep hygiene and stress reduction as co-requisites to any dietary cleanse.
