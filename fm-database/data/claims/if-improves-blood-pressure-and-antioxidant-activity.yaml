slug: if-improves-blood-pressure-and-antioxidant-activity
statement: Intermittent fasting improves blood pressure and antioxidant activity.
evidence_tier: plausible_emerging
rationale: Supported by the document's summary table and cited references including
  de Cabo & Mattson (NEJM 2019). Mechanism plausibly linked to reduced oxidative stress
  and improved vascular function.
coaching_translation: Fasting approaches have been associated with lower blood pressure
  and better antioxidant defenses in the body.
caveats:
- Fasting is contraindicated in those with pre-existing low blood pressure
- Clinician monitoring recommended
