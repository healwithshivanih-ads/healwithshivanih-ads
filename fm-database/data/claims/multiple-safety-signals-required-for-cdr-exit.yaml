slug: multiple-safety-signals-required-for-cdr-exit
statement: Exiting stuck CDR requires MULTIPLE safety signals — not one. Naviaux's
  salugenesis framework names the natural inputs cells need to recognise the environment
  as safe — sun exposure, clean water, contact with the earth, clean nutrient-dense
  food, calm sensory environment, time near trees, low chemical exposure, predictable
  sleep-wake rhythm. A single signal is insufficient because evolutionarily, organisms
  that respond to a single cue can be fooled. Coach action — stack many small daily
  safety signals (morning light + barefoot grass + meal outdoors + breath work + walk
  in woods + clean food) rather than pushing one heroic intervention.
evidence_tier: plausible_emerging
