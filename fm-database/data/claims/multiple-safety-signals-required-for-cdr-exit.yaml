- id: gordon-energy-blueprint-podcast-2026
  location: Podcast — salugenesis segment
  quote: The way that these single cell organisms come back is when they get signals
    that the water's clean again. They need multiple signals that the water's clean,
    not just one. If they just got one, nature can fool you. Dr Naviaux calls it salugenesis
    — sun, earth, healthy food, good water, just sending the messages that are through
    nature is safety.
rationale: Frames the lifestyle pillars as an integrated safety-signal stack rather
  than a checklist of competing interventions.
