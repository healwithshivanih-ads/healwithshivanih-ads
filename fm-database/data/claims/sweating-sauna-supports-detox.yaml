slug: sweating-sauna-supports-detox
statement: Regular sweating through exercise, sauna use, or hot baths supports toxin
  excretion via the skin, reducing the burden on hepatic and renal detox pathways.
evidence_tier: plausible_emerging
rationale: Sweat contains trace amounts of heavy metals (arsenic, cadmium, lead, mercury)
  and some persistent organic pollutants. Sauna use is associated with improved cardiovascular
  biomarkers in epidemiological data. However, the quantitative detox contribution
  via sweat compared to liver/kidney is debated.
coaching_translation: Aim to break a sweat daily — exercise, brisk walking in warm
  clothes, Epsom salt baths, or low-temperature sauna. Always shower and use soap
  afterward to rinse toxins off skin.
caveats:
- Quantitative contribution of sweat to total toxin elimination is debated
- Sauna contraindicated in some cardiovascular conditions — refer out
- Always replenish electrolytes
