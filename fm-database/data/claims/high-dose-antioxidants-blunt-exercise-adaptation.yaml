slug: high-dose-antioxidants-blunt-exercise-adaptation
statement: High-dose direct antioxidant supplementation (vitamin C 1000+ mg, vitamin
  E, NAC) taken in close temporal proximity to exercise blunts the hormetic mitochondrial
  signaling stimulus from exercise and impairs adaptations including mitochondrial
  biogenesis, insulin sensitivity gains, and hypertrophy. Multiple RCTs show this
  effect. By contrast, agents that REGULATE endogenous redox homeostasis (molecular
  hydrogen, dietary polyphenols at typical food-level intakes) appear to potentiate
  exercise adaptations rather than blunt them. Clinical implication — clients should
  NOT take large antioxidant supplements within 1-2 hours of training, but small amounts
  at meals away from training are unlikely to be problematic.
evidence_tier: strong
