slug: mayo-gerd-ppi-long-term-cautions
statement: Long-term PPI use is associated with magnesium deficiency, B12 deficiency,
  increased fracture risk, C. difficile and pneumonia risk, and rebound acid hypersecretion
  on abrupt cessation; tapering is preferred to stopping cold-turkey.
