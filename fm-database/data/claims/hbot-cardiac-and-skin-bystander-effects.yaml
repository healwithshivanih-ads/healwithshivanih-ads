slug: hbot-cardiac-and-skin-bystander-effects
statement: In addition to brain effects, the Sagol longevity protocol produces measurable
  improvement in VO2 max, anaerobic threshold, and muscle performance (reflecting
  cardiac angiogenesis), and skin biopsies show stem-cell proliferation with increased
  collagen and elastic tissue (improving skin quality though not necessarily wrinkles).
  These are "bystander" effects of a body-wide regenerative cascade, not the primary
  treatment target.
evidence_tier: plausible_emerging
