  location: Podcast — bystander effects discussion
  quote: The same angiogenesis we have in the brain happens in the heart, reflected
    by improvement in physical performance, VO2 max, anaerobic threshold, and muscle
    performance. Skin biopsies — we can see proliferation of stem cells, more collagen
    and more elastic tissue. The wrinkle will not disappear, but the quality of the
    skin can be improved.
rationale: Anchors realistic expectations for clients asking about HBOT's "side benefits".
