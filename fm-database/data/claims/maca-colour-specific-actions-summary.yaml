slug: maca-colour-specific-actions-summary
statement: Across pre-clinical and limited human trials, the three maca ecotypes show
  divergent biological actions — black maca best supports sperm production and motility,
  red maca selectively reduces prostate size, and yellow maca functions primarily
  as a general adaptogen without organ-specific reproductive effects. Most commercial
  mixed-colour maca will not deliver targeted benefits.
