slug: cervical-dysplasia-folate-regression
statement: Folate supplementation (10 mg/day) improves or normalizes cytologic smears
  in cervical dysplasia patients, with folate-induced regression-to-normal rates of
  20–100% reported across studies, compared with 1.3% for mild and 0% for moderate
  untreated CD.
evidence_tier: plausible_emerging
rationale: OCs induce localized folate depletion at cervical tissue even when serum
  folate is normal; RBC folate is the more relevant marker; multiple small RCTs cited.
coaching_translation: Folate is crucial for healthy cervical cells — especially if
  you've used birth control pills, which block folate uptake in cervical tissue even
  when blood levels look normal.
caveats:
- Always pair high-dose folate with B12 to avoid masking B12 deficiency
- Response rates vary widely across studies
