slug: plant-sterols-2g-reduce-ldl-10pct
statement: Daily intake of 2 g of plant stanols or sterols reduces LDL-C by 10%; combining
  with a low-saturated-fat diet can reduce LDL-C by 20%.
evidence_tier: strong
rationale: Extensively studied; multiple meta-analyses support LDL-lowering effect
  of phytosterols.
coaching_translation: Plant sterols (in fortified foods or supplements) can lower
  'bad' cholesterol by 10–20% when combined with a healthy diet.
caveats:
- Higher doses may reduce carotenoid absorption; increase fruit/vegetable intake to
  compensate
