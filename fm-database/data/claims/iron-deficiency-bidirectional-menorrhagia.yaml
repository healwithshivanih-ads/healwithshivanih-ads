slug: iron-deficiency-bidirectional-menorrhagia
statement: Iron deficiency both CAUSES and RESULTS FROM menorrhagia — bidirectional.
  In a 83-patient series 74 responded to iron alone (organic disease excluded); a
  placebo-controlled trial showed 75% improvement with iron vs 32.5% placebo. Serum
  ferritin is the first marker to drop — coach must order it (Hb/MCV/MCH stay normal
  until late). For confirmed low ferritin, iron 30 mg twice daily between meals (or
  30 mg three times with meals if GI intolerance) in a well-tolerated form like glycinate.
evidence_tier: strong
