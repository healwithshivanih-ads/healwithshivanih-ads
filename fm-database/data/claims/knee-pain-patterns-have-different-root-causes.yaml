slug: knee-pain-patterns-have-different-root-causes
statement: Knee pain is categorized into degenerative, autoimmune, post-injury, gout-related,
  metabolic, and hormonal patterns, each with different nutritional approaches.
evidence_tier: fm_specific_thin
rationale: Root-cause categorization of knee pain for nutritional intervention is
  FM-specific practice; the individual subtypes (osteoarthritis, RA, gout) have their
  own evidence bases.
coaching_translation: Before recommending joint supplements, help the client understand
  what type of joint issue they may have — different causes respond differently to
  nutrition and lifestyle.
caveats:
- Source is a practitioner cheatsheet without primary citations.
- Clinical diagnosis of knee pain type requires medical assessment including imaging.
- Source is practitioner cheatsheet.
- Joint pain diagnosis requires clinician.
