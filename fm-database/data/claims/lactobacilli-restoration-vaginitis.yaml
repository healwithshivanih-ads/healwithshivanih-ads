slug: lactobacilli-restoration-vaginitis
statement: The primary goal in treating and preventing recurrent vaginitis is reestablishing
  vaginal lactobacilli, which maintain pH 3.5 to 4.5, produce hydrogen peroxide, and
  outcompete pathogens for adherence. Both oral probiotic supplementation AND vaginal
  douching with a lactobacillus solution (10 billion CFU dissolved in 10 ml water,
  twice daily) eliminate candidal vaginitis in multiple clinical studies. Women with
  vaginal yeast overgrowth almost always have GI overgrowth too — treat both compartments.
evidence_tier: strong
