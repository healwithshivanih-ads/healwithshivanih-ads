slug: ionized-calcium-is-functional-marker
statement: Ionized calcium is the active, free form of serum calcium and is the preferred
  functional marker, as it represents the 50% of serum calcium available for cellular
  processes.
evidence_tier: strong
rationale: 'Well-established biochemistry: ionized calcium is the metabolically active
  fraction. This is standard clinical teaching.'
coaching_translation: When checking calcium status, ionized calcium is more meaningful
  than total calcium because it shows the portion your body can actually use.
