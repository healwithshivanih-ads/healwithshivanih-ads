slug: plant-sterols-block-cholesterol-absorption
statement: Plant sterols and stanols block intestinal cholesterol absorption, reducing
  LDL-C levels.
evidence_tier: strong
rationale: Plant sterol/stanol LDL lowering is supported by multiple RCTs and recognized
  by major cardiovascular guidelines (ACC/AHA). Document directly states this mechanism.
coaching_translation: Plant sterols — found in fortified foods or supplements — work
  by blocking the absorption of cholesterol in your gut, lowering your LDL without
  medication.
caveats:
- Source is an expert synthesis cheatsheet.
- Dose matters — typical effective dose is 2g/day; clinician should confirm.
