slug: gi-issues-underlie-systemic-chronic-disease
statement: GI dysfunction can underlie chronic health problems that seem unrelated to digestion, including autoimmune diseases
  (rheumatoid arthritis, type 1 diabetes), skin conditions (eczema, acne rosacea), and heart disease.
evidence_tier: plausible_emerging
rationale: Broad association between gut health and systemic disease is well-established conceptually; specific causal links
  vary by condition and are not uniformly proven by RCTs. This is a common FM synthesis claim.
coaching_translation: Your gut health affects far more than digestion — it can influence your immune system, skin, and heart
  health. Improving gut function is foundational to overall wellness.
caveats:
- Source is a practitioner education toolkit, not primary literature. These associations are plausible but not all are proven
  by RCTs.
- Autoimmune disease management requires clinician oversight.
- Source is an expert consensus coaching toolkit, not primary literature. Associations are plausible but causality for individual
  systemic diseases is variable in the evidence base.
- Do not promise resolution of autoimmune disease through gut interventions alone.
