slug: gi-issues-underlie-systemic-chronic-disease
statement: GI dysfunction may underlie chronic health problems that appear unrelated
  to digestion, including autoimmune diseases (rheumatoid arthritis, type 1 diabetes),
  skin conditions (eczema, acne rosacea), and cardiovascular disease.
evidence_tier: plausible_emerging
rationale: The 5R framework document asserts this link. There is plausible mechanistic
  support (leaky gut, dysbiosis-driven immune activation) but robust RCT evidence
  causally linking gut dysfunction to all these conditions is incomplete.
coaching_translation: Your gut health can affect your whole body — skin flares, joint
  pain, and immune issues may all trace back to digestive imbalances.
caveats:
- Source is a practitioner education toolkit, not primary literature. These associations
  are plausible but not all are proven by RCTs.
- Autoimmune disease management requires clinician oversight.
