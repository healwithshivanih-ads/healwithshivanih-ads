slug: dhea-balances-cortisol
statement: DHEA is described as balancing cortisol while supporting resilience, mood,
  immune balance, and mitochondrial function.
evidence_tier: fm_specific_thin
rationale: DHEA's roles in adrenal health and resilience are recognized in FM; supplemental
