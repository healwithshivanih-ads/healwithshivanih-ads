  expert consensus without primary citations.
out_of_scope_notes: DHEA supplementation requires clinician-ordered testing and monitoring.
caveats:
- DHEA supplementation must not be recommended without clinician oversight.
- Avoid in hormone-sensitive cancers, PCOS with androgen excess, pregnancy.
- Source is expert consensus without direct citations.
