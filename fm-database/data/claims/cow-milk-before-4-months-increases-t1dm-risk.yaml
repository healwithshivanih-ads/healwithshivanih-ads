slug: cow-milk-before-4-months-increases-t1dm-risk
statement: Early exposure to cow's milk before 4 months of age increases T1DM risk
  approximately 1.5×; breastfeeding for at least 3 months is protective via gut immune
  maturation and reduced food-antigen cross-reactivity with pancreatic beta cells.
evidence_tier: plausible_emerging
rationale: Pizzorno cites multiple observational studies of breastfeeding duration
  vs T1DM incidence. Mechanism — bovine insulin and bovine serum albumin can cross-react
  with beta cell antigens; gluten can do the same. Pre-leak gut in infancy amplifies
  the risk.
coaching_translation: Exclusive breastfeeding for the first 3-4 months is one of the
  most reproducible T1DM-prevention factors. Early cow's milk exposure roughly doubles
  risk in susceptible kids.
caveats:
- Effect is in genetically susceptible kids; not all early-exposed infants develop
  T1DM.
- Hydrolysed infant formula somewhat reduces but does not eliminate the risk.
- Solid foods before 4 months also implicated.
