slug: low-cortisol-linked-to-fatigue-and-salt-craving
statement: Low cortisol is described as causing fatigue, low blood pressure, salt
  craving, and Addison's-like symptoms.
evidence_tier: confirm_with_clinician
rationale: Low cortisol differentially diagnosis includes Addison's disease, which
  requires medical testing. Coaching scope does not extend to cortisol replacement
  or Addison's diagnosis.
coaching_translation: If a client reports persistent fatigue, dizziness on standing,
  and strong salt cravings, refer to a clinician for adrenal evaluation.
out_of_scope_notes: Cortisol testing, Addison's diagnosis, and cortisol replacement
  are clinician-scope items only.
caveats:
- Requires clinician evaluation before any intervention.
- Source is expert consensus without direct citations.
