slug: methylfolate-preferred-over-folic-acid-for-mthfr
statement: Methylfolate (5-MTHF) is the preferred supplemental form of folate for
  individuals with MTHFR gene variants, as it bypasses the conversion step requiring
  the MTHFR enzyme.
evidence_tier: plausible_emerging
rationale: The document explains that MTHFR converts dietary folate to its active
  5-MTHF form, and that variants reduce this enzyme's activity. Supplementing with
  5-MTHF bypasses this bottleneck.
coaching_translation: If a client has an MTHFR variant or chronically elevated homocysteine
  despite folate intake, suggest switching from folic acid to methylfolate form.
caveats:
- Source is expert lecture (moderate quality); not primary RCT evidence.
- MTHFR testing and specific dosing should be guided by a clinician.
- Methylfolate supplementation in high doses may trigger side effects in some sensitive
  individuals (overmethylation).
