slug: diet-antioxidants-cervical-dysplasia
statement: 67% of cervical cancer patients are deficient in at least one nutrient
  (beta-carotene, vitamin A, folate, B6, vitamin C); 38% show multiple deficiencies.
  Higher intake of fiber, vitamin C, vitamin E, vitamin A, alpha and beta-carotene,
  lutein, and folate reduces cervical cancer risk by 40 to 60%. Dark green and deep
  yellow vegetables plus high serum lycopene specifically lower cervical dysplasia
  risk. Coach prescribes plant-pigment-dense diet for any abnormal Pap client.
evidence_tier: strong
