slug: mayo-hot-flash-first-line-lifestyle
statement: Most women can dampen hot-flash frequency and intensity with cooling-the-environment
  strategies — dressing in layers, lowering room temperature at night, drinking cool
  water at onset, avoiding identified triggers (alcohol, caffeine, spicy food, smoking,
  warm environments).
