slug: wh-initiative-cee-alone-safer-than-cee-mpa-combination
statement: In the Women's Health Initiative, conjugated equine estrogen (CEE) alone
  in women without a uterus was associated with no increase in breast cancer death
  rates, reduced fracture risk, and reduced CHD risk if initiated near menopause —
  while CEE + medroxyprogesterone acetate (MPA) increased CHD events.
evidence_tier: strong
rationale: The WHI substudy on CEE-only vs CEE-MPA is well-replicated; Pizzorno's
  review summarises the key clinically-relevant outcomes. Timing of HRT initiation
  (near vs >10 years past menopause) substantially modifies risk profile.
coaching_translation: For HRT decisions — what kind matters as much as whether. CEE
  alone (in women without a uterus) and HRT started near menopause look much safer
  than the synthetic progestin combinations or starting HRT decades post-menopause.
caveats:
- Bioidentical (estradiol + micronized progesterone) is preferred over CEE+MPA where
  available.
- Decisions are individualised — family history, vascular risk, breast risk, symptom
  burden all factor.
- Coaching scope is education + lifestyle; HRT prescribing is clinician-only.
