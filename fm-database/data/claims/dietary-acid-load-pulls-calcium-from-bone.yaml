slug: dietary-acid-load-pulls-calcium-from-bone
statement: A high-animal-protein, high-salt, low-fruit-and-vegetable diet generates
  daily metabolic acid load that the body buffers by mobilising calcium and phosphate
  salts from bone — explaining why high-protein omnivorous diets correlate with forearm
  fracture risk while plant-protein-heavy alkaline-forming diets do not.
evidence_tier: strong
rationale: Frassetto, Sebastian, and Lemann's work on diet-induced acidosis and bone
  catabolism. Pizzorno frames this as a primary mechanism alongside vitamin D / K2
  status. Effect persists across calcium intake levels.
coaching_translation: It's not just calcium intake that matters for bones — it's net
  acid load. A heavy-animal-protein, high-salt, low-vegetable diet leaches calcium
  out of your bones to neutralise the acid load, even if you're eating enough calcium.
caveats:
- Not anti-protein — moderate animal protein with abundant plants is fine.
- Salt intake under 1800 mg/day per Pizzorno's PMS recommendation also applies here.
- Increase fruits, vegetables, magnesium, potassium to alkalise.
