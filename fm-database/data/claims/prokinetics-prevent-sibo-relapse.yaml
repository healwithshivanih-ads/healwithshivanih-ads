slug: prokinetics-prevent-sibo-relapse
statement: After clearing overgrowth, a prokinetic supports the migrating motor complex
  and helps prevent SIBO relapse — low-dose erythromycin extended SIBO-free time to
  about 140 days and tegaserod to about 220 days versus roughly 60 days with nothing.
evidence_tier: plausible_emerging
rationale: Cites prokinetic relapse-prevention data; pairs with Great-in-8 Step 4.
coaching_translation: After clearing overgrowth, a motility agent keeps the small
  intestine 'flowing' so the overgrowth is less likely to come back.
