slug: magnesium-inadequacy-common-in-us-adults
statement: Nearly half of US adults consume less than the RDA for magnesium, making
  insufficiency very common.
evidence_tier: strong
rationale: NHANES data consistently shows widespread suboptimal magnesium intake in
  the US population. Cited by NIH ODS reference in document.
coaching_translation: Most people don't get enough magnesium from food. Prioritizing
  nuts, seeds, leafy greens, and whole grains can meaningfully close this gap.
caveats:
- Form selection and dosing for supplementation should involve a clinician.
