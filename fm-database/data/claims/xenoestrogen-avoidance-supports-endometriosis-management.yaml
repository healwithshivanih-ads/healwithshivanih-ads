slug: xenoestrogen-avoidance-supports-endometriosis-management
statement: Avoiding xenoestrogens from plastics and fragranced personal care products
  is an important lifestyle strategy in estrogen-dominant conditions such as endometriosis.
evidence_tier: plausible_emerging
rationale: Xenoestrogens (endocrine-disrupting chemicals such as BPA from plastics
  and phthalates from fragrances) can mimic or amplify estrogen signalling. Epidemiological
  evidence links environmental estrogen exposure to endometriosis risk. Practical
  avoidance is widely recommended in FM and integrative medicine.
coaching_translation: Chemicals found in plastics and fragranced products can act
  like estrogen in your body, potentially making endometriosis worse. Choosing fragrance-free,
  chemical-free products and avoiding plastic food containers is a simple but meaningful
  step.
caveats:
- Source is FM lecture. While the biological mechanism is plausible, direct clinical
  evidence that personal care product avoidance reduces endometriosis severity is
  limited.
