slug: maoa-requires-riboflavin-cofactor
statement: The MAOA enzyme requires riboflavin (vitamin B2) as a cofactor; deficiency
  or excess of riboflavin can alter MAOA activity and thus neurotransmitter balance—with
  fast MAOA needing less riboflavin and slow MAOA needing more.
evidence_tier: plausible_emerging
rationale: MAOA is a flavoprotein that uses FAD (derived from riboflavin) as a cofactor—this
  is well established biochemistry. The directional nuance for fast vs slow MAOA variants
  is Lynch's clinical interpretation, not directly from RCTs.
coaching_translation: Encourage riboflavin-rich foods (liver, eggs, wild salmon, almonds,
  mushrooms) for clients with suspected slow MAOA. For fast MAOA, riboflavin is still
  needed but Lynch suggests intake should be moderate, not excess.
caveats:
- Source is a consumer trade book
- Optimal riboflavin doses by MAOA variant are not established by RCT
