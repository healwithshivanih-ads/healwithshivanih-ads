slug: magnesium-citrate-eases-constipation
statement: Magnesium citrate supports bowel regularity and eases constipation through
  an osmotic mechanism.
evidence_tier: strong
rationale: Magnesium citrate draws water into the intestinal lumen, softening stool
  and stimulating peristalsis. This is a well-established mechanism supported by clinical
  evidence and widely used in both conventional and functional medicine practice.
coaching_translation: Magnesium citrate helps keep things moving in your gut by drawing
  water into the bowel. It is a gentle, well-supported option for constipation.
