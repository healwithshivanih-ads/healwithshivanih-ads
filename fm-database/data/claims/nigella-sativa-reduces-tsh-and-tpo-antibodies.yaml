slug: nigella-sativa-reduces-tsh-and-tpo-antibodies
statement: In an 8-week RCT, Nigella sativa (1g twice daily) significantly decreased
  TSH and anti-TPO antibodies and increased T3 levels compared to placebo.
evidence_tier: plausible_emerging
rationale: The document cites an 8-week RCT with placebo control showing significant
  TSH and anti-TPO antibody reduction and T3 increase. This is a single RCT — promising
  but not yet consensus-level evidence.
coaching_translation: Black cumin seed (Nigella sativa) has shown real promise in
  a clinical trial for lowering the immune attack on the thyroid and improving thyroid
  hormone levels.
caveats:
- Single RCT — replication needed before strong evidence designation.
- Supplement dose (2g/day) should be verified with clinician.
