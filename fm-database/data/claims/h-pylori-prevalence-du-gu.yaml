slug: h-pylori-prevalence-du-gu
statement: H. pylori is found in 90–100% of duodenal ulcer patients, 70% of gastric
  ulcer patients, and 50% of people over age 50, yet 80% of H. pylori–infected individuals
  never develop ulcers.
evidence_tier: strong
rationale: Widely cited epidemiological data from a major natural medicine textbook;
  consistent with peer-reviewed H. pylori literature establishing H. pylori as necessary
  but not sufficient for ulcer development.
coaching_translation: Most people with H. pylori don't get ulcers — other factors
  like stress, diet, and smoking also matter.
