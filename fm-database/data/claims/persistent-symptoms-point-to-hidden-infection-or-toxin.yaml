slug: persistent-symptoms-point-to-hidden-infection-or-toxin
statement: When symptoms persist despite the protocol, Lynch points to hidden infections
  (oral cavity, sinuses, gut, blood, urinary tract) and hidden chemical/heavy-metal
  exposure as drivers, best investigated with a functional or integrative practitioner.
evidence_tier: fm_specific_thin
rationale: A reasonable 'dig deeper' framing; the specific sites are clinical-experience
  level and require professional workup.
coaching_translation: If you've done the basics and are still stuck, it's worth having
  a practitioner look for a hidden infection or exposure.
out_of_scope_notes: Infection/toxin workup is diagnostic — refer to a qualified practitioner.
caveats:
- Source is a consumer trade book (Ben Lynch, Dirty Genes), not primary literature.
