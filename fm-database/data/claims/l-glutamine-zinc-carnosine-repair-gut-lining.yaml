slug: l-glutamine-zinc-carnosine-repair-gut-lining
statement: L-glutamine and zinc carnosine support repair of the intestinal lining and are recommended in the Repair phase
  of the 5R gut protocol.
evidence_tier: plausible_emerging
rationale: L-glutamine is the primary fuel for intestinal enterocytes and has been studied for gut barrier integrity. Zinc
  carnosine has evidence from Japanese clinical trials for gastric mucosal protection. Both are widely used in functional
  medicine gut repair protocols.
coaching_translation: L-glutamine and zinc carnosine are two nutrients that specifically help rebuild and protect the gut
  lining. They work best once the most inflammatory foods and triggers have been removed.
caveats:
- Source is FM lecture. Evidence for these supplements in dysbiosis-related hypochlorhydria specifically is largely from small
  trials and clinical practice.
- Dosing should be guided by a clinician.
