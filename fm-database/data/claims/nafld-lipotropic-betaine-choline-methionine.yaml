sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 80 — NAFLD/NASH, pg 1295-1297
  quote: Betaine as a single agent has been shown to be quite helpful in NAFLD when
    given at dosages up to 10 g twice a day. The important thing is to take enough
    to provide a daily dose of 1,000 mg betaine, 1,000 mg choline, and 1,000 mg methionine
    and/or cysteine.
