slug: nafld-lipotropic-betaine-choline-methionine
statement: Lipotropic factors — betaine, choline, methionine, B6, folate, B12 — promote
  bile and fat flow through the liver, raise SAM-e and glutathione, and decongest
  the fatty liver. Betaine alone was effective in NAFLD up to 10 g BID, but a balanced
  formula at 1,000 mg each of betaine + choline + methionine/cysteine per day is the
  more rational approach. SAM-e 200-400 mg/day is an alternative. Ox bile 500 mg with
  meals (or prescription ursodeoxycholic acid 13-15 mg/kg/day, escalating to 28-35
  mg/kg/day in biopsy-proven NASH per a 12-month RCT showing safe ALT improvement).
evidence_tier: strong
