slug: flatline-cortisol-curve-in-thyroid-clients
statement: In Wentz's clinical experience close to 90% of long-standing thyroid clients
  show a "flat-line" cortisol curve on Dutch or saliva testing — morning cortisol
  that should be high is suppressed (struggle to wake, trudge out of bed) while evening
  cortisol creeps up to roughly the same level (wired-but-tired feeling at night).
  Early-stage Hashimoto's clients more often show the textbook elevated-cortisol pattern;
  the flat-line emerges after chronic HPA hyper-activation eventually downregulates
  as a protective adaptation — analogous to "the boy who cried wolf" at the brain
  level.
evidence_tier: plausible_emerging
