  location: Podcast — adrenal pattern segment
  quote: 90% of my people would have low levels of cortisol — what I like to call
    basically a flat-lined adrenal curve. Their evening cortisol and their morning
    cortisol they're almost the same. The longer you're in under that stress eventually
    your body is going to say this is unrealistic. To protect itself, it will downregulate
    the cortisol production.
rationale: Names the most-common pattern Shivani will see on a Dutch test — flat curve,
  NOT classic elevated-cortisol — so client coaching is calibrated correctly.
