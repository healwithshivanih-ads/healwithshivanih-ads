slug: tibc-uibc-increase-in-ida
statement: In iron deficiency anemia, TIBC and UIBC are elevated (reflecting increased
  iron-carrying capacity) while transferrin saturation is decreased.
evidence_tier: strong
rationale: As iron becomes scarce, the body upregulates transferrin production, increasing
  binding capacity (TIBC, UIBC) while the proportion of transferrin actually bound
  to iron (transferrin saturation) falls. This is a well-validated pattern in clinical
  iron panel interpretation.
coaching_translation: When iron is low, the body makes more 'delivery trucks' to grab
  what little iron is available. The TIBC going up while transferrin saturation goes
  down is a classic IDA fingerprint on blood tests.
out_of_scope_notes: Specific reference ranges and clinical interpretation of iron
  panel results require a clinician.
caveats:
- Source is an expert lecture; consistent with established clinical guidelines.
