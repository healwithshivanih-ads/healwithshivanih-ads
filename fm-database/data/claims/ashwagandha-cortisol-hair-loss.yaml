slug: ashwagandha-cortisol-hair-loss
statement: Ashwagandha reduces cortisol and supports adrenal recovery, making it useful
  in telogen effluvium and postpartum hair loss driven by chronic stress.
evidence_tier: plausible_emerging
rationale: Ashwagandha (KSM-66 and Sensoril extracts) has RCT evidence for cortisol
  reduction and stress scores (Chandrasekhar et al., 2012, IJANM). Its application
  in hair loss is FM clinical practice; direct RCTs for hair regrowth are lacking.
coaching_translation: Ashwagandha is a well-researched adaptogen for stress resilience
  and may help with stress-related hair loss.
caveats:
- Autoimmune thyroid disease patients should use with caution and consult clinician.
- Source is a synthesis document.
