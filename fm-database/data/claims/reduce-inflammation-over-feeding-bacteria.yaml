slug: reduce-inflammation-over-feeding-bacteria
statement: 'Eating to reduce inflammation matters more than eating to feed gut bacteria:
  an inflamed gut environment kills beneficial bacteria and favours harmful ones,
  so calming inflammation improves the microbiota on its own.'
evidence_tier: plausible_emerging
rationale: A recurring, cross-cutting thesis; mechanistic plus supportive clinical
  observation (microbiota normalising after anti-inflammatory treatment).
coaching_translation: Calming gut inflammation does more for your bacteria than piling
  on fibre and prebiotics.
