slug: magnesium-deficiency-ibd-serum-not-reliable
statement: Magnesium deficiency is prevalent in IBD; serum levels are frequently normal
  while intracellular levels are commonly decreased, making serum magnesium an unreliable
  marker of true magnesium status.
evidence_tier: strong
rationale: Established principle in functional medicine; serum Mg reflects <1% of
  total body Mg. Oral chelated forms (citrate, aspartate) are preferred over inorganic
  salts due to better absorption and less cathartic effect.
coaching_translation: Magnesium deficiency in IBD may be missed by standard blood
  tests. Supplement with magnesium chelates (citrate or glycinate) rather than oxide
  for better absorption and less laxative effect.
caveats:
- Severe deficiency may require IV magnesium under clinician supervision, especially
  in short-bowel syndrome
