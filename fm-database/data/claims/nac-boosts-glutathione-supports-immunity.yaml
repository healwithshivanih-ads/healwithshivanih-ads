slug: nac-boosts-glutathione-supports-immunity
statement: N-Acetylcysteine (NAC) promotes glutathione production and supports immune
  function, reducing severity of flu-like illness.
evidence_tier: plausible_emerging
rationale: NAC's role as a glutathione precursor is well-established (strong mechanism).
  Its clinical benefit for flu severity and COVID-19 is plausible and supported by
  McCarty & DiNicolantonio (Prog Cardiovasc Dis 2020) but lacks large COVID-specific
  RCTs.
coaching_translation: NAC is an amino acid that helps your body make glutathione,
  one of its most important antioxidants, which also supports your immune defenses.
out_of_scope_notes: Dosing requires clinician supervision. Contraindications exist
  in some conditions.
linked_to_topics:
