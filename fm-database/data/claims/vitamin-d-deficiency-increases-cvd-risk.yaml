slug: vitamin-d-deficiency-increases-cvd-risk
statement: Individuals with 25-OH-D levels below 30 ng/mL are at significantly higher
  risk for CVD, CHD, and heart failure.
evidence_tier: plausible_emerging
rationale: Supported by large observational studies; RCT evidence for hard CVD outcomes
  with vitamin D supplementation is mixed.
coaching_translation: Low vitamin D is a risk factor for heart disease — checking
  and optimising your vitamin D level is an easy, low-risk step.
caveats:
- RCTs of vitamin D supplementation have not consistently shown reduction in hard
  CVD endpoints
