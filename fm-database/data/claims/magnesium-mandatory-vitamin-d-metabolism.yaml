slug: magnesium-mandatory-vitamin-d-metabolism
statement: Magnesium is a mandatory cofactor for proper Vitamin D metabolism and is
  required when supplementing Vitamin D.
evidence_tier: plausible_emerging
rationale: Magnesium is a cofactor in multiple steps of Vitamin D synthesis and activation
  (25-hydroxylation, 1-alpha-hydroxylation). Without adequate magnesium, Vitamin D
  supplementation may be less effective. This is mechanistically supported.
coaching_translation: Always take magnesium when supplementing Vitamin D. Without
  it, your body can't properly activate Vitamin D.
