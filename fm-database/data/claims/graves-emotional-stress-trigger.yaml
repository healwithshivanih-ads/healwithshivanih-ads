slug: graves-emotional-stress-trigger
statement: The most common precipitating event for Graves' disease is "actual or threatened
  separation from an individual upon whom the patient is emotionally dependent" —
  divorce, death, difficult separation. Stress control and HPA-axis support are core
  to normalizing thyroid status and preventing relapse. Adequate rest including a
  post-lunch nap is specifically recommended.
evidence_tier: strong
