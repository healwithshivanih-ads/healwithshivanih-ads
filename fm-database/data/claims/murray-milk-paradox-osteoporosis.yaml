slug: murray-milk-paradox-osteoporosis
statement: 'Dietary milk consumption may INCREASE rather than decrease osteoporosis
  risk — the Nurses'' Health Study (n=77,761 women) found women drinking ≥2 glasses
  of milk daily had a 45% INCREASED risk of hip fracture vs women consuming ≤1 glass
  per week. Countries with the highest dairy intake (Sweden, USA, Denmark) have the
  highest osteoporosis rates; countries with low dairy intake (much of Asia, Africa)
  have lower rates. Proposed mechanisms: (1) added vitamin A in fortified milk interferes
  with bone formation at high levels (vitamin A but NOT beta-carotene), (2) milk''s
  acid-load increases urinary calcium excretion, (3) milk-protein-driven IGF-1 elevation
  may impact bone remodeling adversely.'
evidence_tier: plausible_emerging
rationale: Multiple population studies + the Nurses' Health Study specifically. Mechanism
  — multifactorial; the vitamin A explanation has supporting evidence (Michaelsson
  2003 meta-analysis). The international epidemiology is striking and consistent.
  Important coaching scope — the cultural assumption that milk = strong bones is wrong;
  the data point the other direction. Coach role is informed counter-narrative + redirecting
  clients toward leafy greens, fortified plant milks (without vitamin A added), and
  adequate sun + vitamin D.
coaching_translation: 'The ''drink milk for strong bones'' message is WRONG. The Nurses
  Health Study of 77,000+ women found those drinking 2+ glasses of milk daily had
  a 45% HIGHER hip fracture risk than those drinking less than 1 glass per week. Countries
  with the highest dairy intake have the highest osteoporosis rates. Possible reasons:
  added vitamin A in fortified milk impairs bone formation, milk''s acid load increases
  calcium loss in urine. Better bone-building sources: leafy greens (kale, collard,
  spinach), small fish with bones (sardines), tofu, almonds, fortified plant milks
  (vitamin A-free), and adequate vitamin D + K2.'
caveats:
- Causation vs correlation debated — some residual confounding possible
- Mechanism leading candidates — added vitamin A, acid load, IGF-1
- Whole fermented dairy (yoghurt, kefir, aged cheese) may behave differently than
  fluid milk
- Asian + plant-based diets have lower osteoporosis without dairy
- Lactose intolerance is common in many populations — culturally inappropriate dietary
  advice
- Calcium needs can be met without dairy
