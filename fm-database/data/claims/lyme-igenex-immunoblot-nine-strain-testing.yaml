slug: lyme-igenex-immunoblot-nine-strain-testing
statement: iGenex Laboratories (Palo Alto, California) offers a Lyme immunoblot panel
  testing 9 strains of Borrelia (including the European B. afzelii and B. garinii
  strains that the US CDC panel misses), with a sensitivity and specificity profile
  that catches a substantial fraction of patients who are negative on CDC two-tier
  testing. Recommended in symptomatic patients with negative conventional results,
  particularly when migratory pain or HMQ score above 35 is present. The CDC's own
  position is that Lyme is a CLINICAL diagnosis; their two-tier testing is a tool,
  not a gate. iGenex also offers Bartonella, Babesia, and Mycoplasma panels in the
  same workup.
