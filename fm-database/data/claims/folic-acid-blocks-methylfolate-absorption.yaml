slug: folic-acid-blocks-methylfolate-absorption
statement: Synthetic folic acid (added to fortified grains and supplements) competes
  with natural methylfolate at folate receptors, blocking cellular uptake of the active
  form and potentially worsening methylation in individuals with MTHFR variants.
evidence_tier: plausible_emerging
rationale: Folic acid and 5-MTHF share folate receptors; unmetabolised folic acid
  (UMFA) is documented in populations consuming fortified diets. Competitive inhibition
  hypothesis is mechanistically plausible and supported by early evidence, but the
  clinical magnitude of harm in non-MTHFR individuals is not firmly established.
coaching_translation: Avoid foods with 'folic acid' listed as an ingredient (most
  enriched breads, cereals, pasta) and choose natural folate sources like leafy greens
  instead.
caveats:
- FDA fortification policy remains in place; mainstream consensus does not yet consider
  folic acid harmful for the general population.
- High-dose supplemental folic acid is more concerning than modest food fortification
  for most people.
- Source is a consumer book — clinician guidance recommended before changing supplementation.
