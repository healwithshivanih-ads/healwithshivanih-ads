slug: avocado-flaxseed-oil-smoothie-for-healthy-fats
statement: Combining avocado and flaxseed oil in a smoothie provides monounsaturated and alpha-linolenic acid fats that may
  support HDL cholesterol and reduce cardiovascular risk markers.
evidence_tier: plausible_emerging
rationale: The Power Punch Smoothie uses half an avocado and 1 tbsp flaxseed oil as its fat base, alongside seeds. Both avocado
  (MUFA) and flaxseed oil (ALA) have supporting evidence for favourable lipid effects.
coaching_translation: This smoothie is packed with healthy fats from avocado and flaxseed oil that can support your heart
  health and keep you full longer.
caveats:
- Single-meal contribution is modest; overall dietary pattern matters more than any one ingredient.
