slug: sibo-treat-in-phases
statement: 'SIBO should be treated in four phases: Eradication → Motility Support
  → Gut Repair → Reintroduction, not stopped at antimicrobials alone.'
evidence_tier: fm_specific_thin
rationale: Four-phase approach is FM clinical consensus. Relapse rates are high without
  addressing motility and gut repair. Not validated by a specific RCT in this document.
coaching_translation: Treating SIBO isn't just about killing bacteria — you also need
  to restore gut movement, repair the lining, and gradually reintroduce foods.
caveats:
- FM clinical consensus protocol — not validated by a specific RCT. Antimicrobial
  phase requires clinician oversight.
