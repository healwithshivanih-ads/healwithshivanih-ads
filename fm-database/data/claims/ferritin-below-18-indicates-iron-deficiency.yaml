slug: ferritin-below-18-indicates-iron-deficiency
statement: Serum ferritin is the most useful index of iron status in IBD; a level
  below 18 ng/mL indicates iron deficiency, and supplemental vitamin C is preferred
  over direct iron supplements because iron promotes intestinal infection.
evidence_tier: strong
rationale: Ferritin is an acute-phase reactant but remains the best single marker
  of iron stores in inflammatory conditions; the preference for vitamin C–enhanced
  absorption over high-dose iron is supported by the pro-oxidant/pro-infectious risk
  of luminal iron.
coaching_translation: Support iron status with vitamin C (which enhances absorption)
  rather than high-dose iron supplements, which can feed pathogenic gut bacteria.
caveats:
- In active inflammation, ferritin may be falsely elevated as an acute-phase protein;
  interpret alongside CRP
