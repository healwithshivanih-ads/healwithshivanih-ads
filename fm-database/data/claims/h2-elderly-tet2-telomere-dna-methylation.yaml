slug: h2-elderly-tet2-telomere-dna-methylation
statement: A 6-month double-blind placebo-controlled trial in adults aged 70+ found
  daily H2 tablet use produced — lengthened telomeres, improved DNA methylation age,
  doubled blood TET2 protein (a regulator linked to "young blood" rejuvenation studies
  in mice), improved brain metabolism, reduced pain-related quality-of-life scores,
  improved sleep, and improved senior fitness test performance (sit-to-stand reps
  INCREASED over the trial despite the study running during pandemic gym closures,
  while placebo group declined as expected with age and inactivity).
evidence_tier: plausible_emerging
