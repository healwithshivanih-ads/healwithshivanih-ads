slug: cfs-magnesium-krebs-cycle-chelates
statement: Even mild magnesium deficiency can produce chronic fatigue and CFS-like
  symptoms. Krebs-cycle chelates (aspartate, citrate, fumarate, malate, succinate)
  are better absorbed, used, and tolerated than inorganic salts (chloride, oxide,
  carbonate) and feed directly into mitochondrial energy production. Therapeutic dose
  200-300 mg three times per day. Injectable magnesium is not required to restore
  status.
evidence_tier: strong
