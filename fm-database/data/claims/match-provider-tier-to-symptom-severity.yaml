slug: match-provider-tier-to-symptom-severity
statement: 'Match the provider to the need: mild symptoms can often be helped by a
  health coach or nutritionist, while severe symptoms, high sensitivity or a diagnosed
  disease call for a licensed doctor who specialises in the relevant area.'
