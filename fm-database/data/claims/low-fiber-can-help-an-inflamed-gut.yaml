slug: low-fiber-can-help-an-inflamed-gut
statement: People with IBS, SIBO, IBD or gut inflammation may worsen on high fibre
  or raw foods; starting lower-fibre (around 10 g/day in an IBD flare) with cooked,
  peeled vegetables and titrating up as the gut heals is often better tolerated.
evidence_tier: plausible_emerging
rationale: Cites low-fibre/low-FODMAP tolerance in inflamed guts.
coaching_translation: If raw veg and lots of fibre make your gut worse, easing back
  to cooked, peeled veg for a while can help it settle.
