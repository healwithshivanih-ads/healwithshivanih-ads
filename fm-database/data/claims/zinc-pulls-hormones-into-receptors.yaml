slug: zinc-pulls-hormones-into-receptors
statement: Zinc, through zinc finger protein structures, is required to extract hormones
  from their carrier proteins in the bloodstream and facilitate entry into receptor
  binding pocket domains.
evidence_tier: strong
rationale: Zinc finger domains in nuclear hormone receptors are a well-characterized
  structural feature in molecular biology. The role of zinc in steroid hormone receptor
  DNA-binding domains is established science.
coaching_translation: Zinc acts like a key that helps your hormones get out of the
  'taxi' (carrier protein) they're riding in your blood and into the receptor where
  they can actually do their work.
