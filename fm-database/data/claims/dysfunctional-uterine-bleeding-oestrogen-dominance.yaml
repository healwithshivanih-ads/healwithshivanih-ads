slug: dysfunctional-uterine-bleeding-oestrogen-dominance
statement: Dysfunctional uterine bleeding is frequently caused by oestrogen excess without adequate progesterone
  ('oestrogen dominance') causing a uterine lining that is built up without sufficient hormonal support;
  this is not an isolated anatomical problem but a systemic sex-hormone imbalance.
evidence_tier: strong
rationale: Unopposed oestrogen causing endometrial hyperplasia and abnormal bleeding is well established
  in gynaecology.
coaching_translation: Heavy, irregular bleeding without a clear anatomical cause often traces back to
  too much oestrogen without enough progesterone to balance it. Supporting the body's oestrogen clearance
  and progesterone production through lifestyle is the FM approach.
out_of_scope_notes: Persistent heavy or irregular bleeding requires physician evaluation. Coach does not
  diagnose hormonal imbalance.
caveats:
- Abnormal uterine bleeding always requires medical evaluation to rule out pathology (fibroids, polyps,
  cancer) before attributing to oestrogen dominance.
