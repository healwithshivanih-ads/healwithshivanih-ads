slug: thiamin-carbohydrate-metabolism-signal
statement: Difficulty tolerating high-carbohydrate diets may signal low thiamin, as
  thiamin is the primary cofactor for carbohydrate metabolism.
evidence_tier: plausible_emerging
rationale: Thiamin (B1) is required for pyruvate dehydrogenase and alpha-ketoglutarate
  dehydrogenase in carbohydrate metabolism. The clinical heuristic is FM-teaching
  based; direct RCT evidence for this dietary symptom pattern is limited.
coaching_translation: If your client struggles with heavy carb meals (fatigue, brain
  fog after eating), consider exploring thiamin-rich foods or supplementation.
caveats:
- Source is a synthesis document, not primary literature. Verify with clinician for
  therapeutic dosing.
- 100 mg multiple times daily mentioned as safe — confirm clinically before recommending.
