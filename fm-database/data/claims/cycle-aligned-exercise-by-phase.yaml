slug: cycle-aligned-exercise-by-phase
statement: Schedule higher-intensity cardio/HIIT in the follicular and ovulatory phases
  (lower resting cortisol) and favor zone-2 steady-state cardio in the luteal phase;
  heavy strength training is beneficial throughout the cycle.
evidence_tier: fm_specific_thin
rationale: Higher luteal cortisol and metabolism mean high-intensity cardio in that
  window can promote fat storage and muscle wasting.
coaching_translation: Save hard cardio for the first half of the cycle, keep luteal
  cardio gentle, and lift weights any time.
