slug: coq10-carnitine-support-mitochondrial-repair
statement: CoQ10, alpha-lipoic acid, and carnitine support mitochondrial repair and
  are useful in autoimmune fatigue and post-viral recovery.
evidence_tier: plausible_emerging
rationale: Mitochondrial dysfunction in autoimmune fatigue is increasingly recognized.
  These nutrients are mechanistic cofactors for electron transport chain function
  and antioxidant defense. Clinical evidence for this combination in autoimmune fatigue
  is emerging.
coaching_translation: If your client has deep fatigue alongside autoimmune issues,
  mitochondrial support (CoQ10, carnitine) can be a helpful complement to the anti-inflammatory
  protocol.
caveats:
- Source is educational synthesis.
- Carnitine dosing and alpha-lipoic acid protocols require clinician oversight in
  complex cases.
