slug: low-carb-lowers-postprandial-glucose-and-insulin
statement: Reducing dietary carbohydrates lowers postprandial glucose, which in turn
  lowers insulin and promotes fat mobilisation.
evidence_tier: strong
rationale: Well-established physiological mechanism supported by consensus in metabolic
  research. Postprandial glucose and insulin response to carbohydrate intake is a
  foundational principle of metabolic physiology.
coaching_translation: Eating fewer carbs means your blood sugar rises less after meals,
  your body releases less insulin, and you're more likely to burn stored fat for energy.
caveats:
- Source is an expert-consensus cheatsheet, not primary literature. Tier reflects
  established mechanistic consensus, not document-cited RCTs.
