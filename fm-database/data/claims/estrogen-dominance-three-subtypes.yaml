slug: estrogen-dominance-three-subtypes
statement: 'Estrogen dominance has three distinct subtypes: (1) absolute estrogen
  overproduction, (2) relative dominance from low progesterone with normal estrogen,
  and (3) normal estrogen and progesterone with impaired estrogen excretion.'
evidence_tier: plausible_emerging
rationale: The lecturer clearly distinguishes three mechanistic subtypes based on
  clinical FM reasoning. This framework is used in FM practice but is not formally
  codified in mainstream endocrinology guidelines. Source is an expert lecture (moderate
  quality, FM consensus).
coaching_translation: Estrogen dominance isn't always about too much estrogen — it
  can happen when progesterone is too low, or when the body isn't clearing estrogen
  properly through the gut and liver.
caveats:
- Source is an FM lecture, not primary peer-reviewed literature. Treat as plausible_emerging
  FM framework.
