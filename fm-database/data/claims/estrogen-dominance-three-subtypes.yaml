  quote: Either number one, there is an overproduction of estrogen. Second is either
    the estrogen is absolutely fine, but relatively the progesterone is very low.
    And the third thing would be that the estrogen and progesterone is absolutely
    fine, but the excretion of progesterone, the estrogen is not happening properly
    from the body.
