slug: raw-cruciferous-vegetables-interfere-with-thyroid
statement: Raw cruciferous vegetables (e.g., broccoli, cauliflower, cabbage) can interfere
  with thyroid function; cooking reduces their goitrogenic effects.
evidence_tier: plausible_emerging
rationale: Glucosinolates in raw crucifers are converted to goitrin, which can inhibit
  thyroid peroxidase. Cooking partially deactivates these compounds. Clinical significance
  is debated and likely only relevant at high intake or with iodine deficiency.
coaching_translation: If you have thyroid issues, it's fine to eat cruciferous vegetables
  — just make sure to cook them, as raw forms may mildly interfere with thyroid hormone
  production.
caveats:
- Effect is likely small in those with adequate iodine intake.
- Source is an educational toolkit.
