slug: stress-drives-t4-to-rt3-conversion
statement: Chronic stress increases conversion of T4 to inactive reverse T3 (RT3) rather than active T3, impairing cellular
  thyroid hormone availability.
evidence_tier: plausible_emerging
rationale: Stress-induced cortisol elevation is known to inhibit deiodinase enzymes and shift T4 metabolism toward RT3. This
  mechanism is biologically plausible and supported by animal and observational human data.
coaching_translation: When you're chronically stressed, your body shifts thyroid hormone into an inactive 'parked' form (RT3)
  that blocks the active form (T3). Managing stress is a direct way to support thyroid function.
