slug: total-toxic-load-equals-exposure-minus-elimination
statement: Total toxic load is determined by total environmental and internal toxic
  exposure minus the body's capacity to biotransform and excrete toxins; both inputs
  and elimination capacity must be addressed to reduce disease risk.
evidence_tier: plausible_emerging
rationale: The total toxic load model is a core functional medicine framework that
  is biologically coherent and clinically useful. It is not derived from a specific
  RCT but integrates well-established toxicology principles (bioaccumulation, biotransformation)
  with clinical observations. Widely used in FM but not a formally validated clinical
  construct.
coaching_translation: Your toxic load isn't just about how much toxin you're exposed
  to — it's also about how well your body eliminates it. You can reduce your toxic
  load by both reducing exposure AND improving elimination (detox pathways, gut health,
  nutrition).
caveats:
- Expert lecture source (moderate quality). This is a functional medicine framework
  extrapolated from toxicology principles; not a formally validated clinical metric.
