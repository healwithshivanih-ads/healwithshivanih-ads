slug: iv-nac-reduced-infarct-size-with-nitroglycerin
statement: Intravenous NAC administered with nitroglycerin reduced infarct size in patients experiencing acute MI.
evidence_tier: plausible_emerging
rationale: IV NAC plus nitroglycerin in AMI has been studied in clinical trials (e.g., Arstall et al., 1995). The result is
  clinically interesting but not standard of care.
