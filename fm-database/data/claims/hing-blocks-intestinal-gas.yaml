slug: hing-blocks-intestinal-gas
statement: Asafoetida (hing) blocks intestinal H2S gas formation, reduces colonic
  spasm, and works effectively for post-meal bloating.
evidence_tier: fm_specific_thin
rationale: Traditional Ayurvedic use is well-established. Some in-vitro and animal
  studies support anti-flatulent and antispasmodic effects, but large human RCTs are
  lacking.
coaching_translation: Adding a pinch of hing to your cooking is a traditional and
  practical way to reduce post-meal gas and bloating, especially during the elimination
  phase when onion and garlic are removed.
caveats:
- Limited peer-reviewed human trial data
- Source is a coaching toolkit
