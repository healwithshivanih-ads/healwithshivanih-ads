slug: murray-st-johns-wort-perimenopausal-mood
statement: St John's Wort (Hypericum perforatum) extract — 900 mg/day standardised
  to 0.3% hypericin — significantly improves psychological + psychosomatic menopausal
  symptoms, mood, sleep, and sexual well-being in ~75% of women across multiple trials.
  Combination with black cohosh further improves hot flush severity.
evidence_tier: plausible_emerging
rationale: Grube 1999 + Uebelhack 2006 + Abdali 2010 trials cited. Mechanism — multimodal
  serotonin/dopamine/norepinephrine reuptake modulation. Well-established as antidepressant;
  menopausal use leverages the depression evidence applied to a population with high
  rates of subclinical mood disturbance.
coaching_translation: St John's Wort at 900 mg/day for at least 12 weeks helps mood,
  sleep, and quality of life in perimenopausal women — about 3 in 4 see clear benefit.
  Stacks well with black cohosh for hot flushes + mood combined. The cautions matter
  though — major drug interactions through CYP450/PGP induction.
caveats:
- MAJOR drug interaction risk via CYP3A4 + P-glycoprotein induction
- Reduces effectiveness of oral contraceptives, warfarin, immunosuppressants, some
  HIV/cancer drugs
- Serotonin syndrome risk if combined with SSRIs, SNRIs, MAOIs, triptans, tramadol
- Photosensitivity at higher doses
- Pharmacist review of full medication list essential before starting
