slug: d-mannose-modest-uti-benefit-exogenous
statement: D-mannose has modest evidence for UTI prevention but represents an exogenous
  compound with no human deficiency, making microbiome restoration with Lactobacillus
  crispatus a more foundational approach.
evidence_tier: plausible_emerging
rationale: Dr. Davis acknowledges D-mannose's modest UTI benefit and cranberry polyphenols'
  variable efficacy, but frames it as secondary to crispatus restoration since there
  is no innate D-mannose deficiency. He notes variability in cranberry product polyphenol
  content.
coaching_translation: D-mannose can give some urinary tract support, but it's not
  something your body was designed to need. Restoring L. crispatus addresses the root
  cause more directly.
caveats:
- Source is expert_consensus interview.
- D-mannose has published RCT evidence for UTI prevention that Dr. Davis does not
  discount entirely.
