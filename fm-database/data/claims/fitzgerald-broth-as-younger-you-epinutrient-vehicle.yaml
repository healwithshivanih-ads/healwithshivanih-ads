slug: fitzgerald-broth-as-younger-you-epinutrient-vehicle
statement: 'Better Broths uses broth as a delivery vehicle for Younger You epi-nutrients:
  signature healing ingredients overlap exactly with the methyl-donor and DNA-methylation-adaptogen
  list — beets (betaine), green tea (EGCG), turmeric (curcumin), rosemary (rosmarinic
  acid), cruciferous (sulforaphane), liver, mushrooms, berries and seeds — so a single
  pot of broth with the right boosts carries methylation-supportive nutrients through
  soups, sauces, curries and tonics all week.'
