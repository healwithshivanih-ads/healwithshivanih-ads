sources:
- id: briden-period-repair-manual-2018
  location: Chapter 1 — Getting Ready for the End of Periods, pg 15
  quote: The normal age for menopause is anywhere from 45 to 55. The normal age for
    perimenopause is up to twelve years before that, so as young as 35! Perimenopause
    refers to the hormonal changes (such as increased estrogen and decreased progesterone)
    that occur during the two to twelve years before menopause.
- id: briden-period-repair-manual-2018
  location: Chapter 2 — Hormonal Birth Control Does Not Preserve Fertility, pg 23
  quote: Your doctor may have told you that hormonal birth control can preserve fertility
    and delay menopause. It is not true. Quite simply, the pill cannot delay menopause.
    If anything, it can bring menopause earlier.
