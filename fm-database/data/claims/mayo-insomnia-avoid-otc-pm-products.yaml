slug: mayo-insomnia-avoid-otc-pm-products
statement: Mayo cautions against routine use of OTC sleep aids containing diphenhydramine
  or doxylamine because of next-day grogginess, anticholinergic burden (dry mouth,
  urinary retention, constipation), and links to cognitive decline in older clients.
