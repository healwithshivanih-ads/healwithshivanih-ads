slug: adequate-sleep-essential-for-physical-wellbeing
statement: Sleeping at least 7 hours per night and waking feeling refreshed are markers
  of adequate physical self-care.
evidence_tier: strong
rationale: Consensus from sleep medicine and public health bodies (e.g., National
  Sleep Foundation, CDC) strongly supports 7–9 hours of sleep for adults as essential
  for physical restoration, cognitive function, immune health, and metabolic regulation.
coaching_translation: Getting at least 7 hours of quality sleep is one of the most
  powerful things you can do for your health—it affects everything from your immune
  system to your mood.
