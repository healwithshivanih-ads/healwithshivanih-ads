  location: Detox Food Plan — Features of the Detox Food Plan
  quote: Phytonutrients are important for cell functions relating to reduction of toxins. Phytonutrients also play an active
    role in improving the stress response and reducing inflammation. Plant foods tend to reduce net dietary acid load and
    enhance greater body alkalinization, which is helpful for kidney excretion of toxins.
