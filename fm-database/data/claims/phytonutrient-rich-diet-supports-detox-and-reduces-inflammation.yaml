slug: phytonutrient-rich-diet-supports-detox-and-reduces-inflammation
statement: A diet rich in phytonutrients from plant foods supports Phase I and Phase II detoxification pathways, reduces inflammation,
  improves stress response, and promotes alkalinization beneficial for kidney toxin excretion.
evidence_tier: plausible_emerging
rationale: Phytonutrients including flavonoids, glucosinolates, and polyphenols have demonstrated effects on Phase I/II enzyme
  modulation in vitro and in animal studies. Plant-based dietary alkalinity supporting renal excretion is a plausible mechanism.
coaching_translation: Eating colorful plant foods — vegetables, fruits, herbs — gives your liver, kidneys, and gut the plant
  compounds they need to process toxins and keep inflammation in check.
