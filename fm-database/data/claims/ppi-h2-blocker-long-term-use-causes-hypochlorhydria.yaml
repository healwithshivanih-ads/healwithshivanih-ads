slug: ppi-h2-blocker-long-term-use-causes-hypochlorhydria
statement: Long-term use of proton pump inhibitors (PPIs) or H2 blockers chronically
  suppresses HCl production, inducing or worsening hypochlorhydria.
evidence_tier: strong
rationale: This is well-established pharmacology with robust evidence. PPI-induced
  hypochlorhydria and its consequences (SIBO, mineral malabsorption) are documented
  in peer-reviewed literature.
coaching_translation: Long-term use of acid-suppressing medications like omeprazole
  or ranitidine can itself cause low stomach acid over time — and may paradoxically
  worsen the digestive symptoms they were prescribed for.
caveats:
- Coaches should not advise clients to stop prescription PPIs without clinician guidance.
- PPI deprescribing requires medical supervision due to rebound hypersecretion.
out_of_scope_notes: Medication management is a clinician task only.
