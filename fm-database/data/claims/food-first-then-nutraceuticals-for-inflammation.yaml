slug: food-first-then-nutraceuticals-for-inflammation
statement: The primary approach to anti-inflammatory nutrition should prioritize food-based
  interventions (colorful vegetables, amla, ginger tea, flaxseed oil) before nutraceuticals,
  as food-based strategies are more sustainable long-term.
evidence_tier: plausible_emerging
rationale: Whole food polyphenols and phytonutrients have synergistic bioavailability
  advantages over isolated supplements. Long-term dietary adherence is better when
  interventions are food-based. This is a widely held principle in functional and
  integrative medicine.
coaching_translation: 'Before reaching for supplements, see what you can add through
  food: more colorful vegetables, turmeric in cooking, ginger tea, amla powder, flaxseeds.
  These are habits clients can sustain for years.'
