  location: Chapter 56 — Hair Loss in Women, pg 997-1001
  quote: Five common causes of hair loss in women are female-pattern hair loss, drugs,
    nutritional deficiencies, hypothyroidism, and the presence of antigliadin antibodies.
    Deficiencies of zinc, vitamin A, essential fatty acids, and iron are the most
    important nutrition-related causes of hair loss in women. Antibodies to gliadin
    can lead to cross-reacting antibodies that attack the hair follicles, leading
    to alopecia areata. The prevalence of hypothyroidism in American women is estimated
    to be as high as 20 percent.
