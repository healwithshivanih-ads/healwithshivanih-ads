slug: murray-hairloss-five-causes
statement: 'Five common causes of hair loss in women, in order of frequency, are:
  (1) female-pattern hair loss (linked to testosterone excess, insulin resistance,
  PCOS, low antioxidant status); (2) prescription drug side effects (SSRIs, beta-blockers,
  ACE inhibitors, anticoagulants, NSAIDs, lithium, valproate, cimetidine, ranitidine,
  chemotherapy); (3) nutritional deficiencies (zinc, vitamin A, essential fatty acids,
  iron — often together when stomach acid is low); (4) hypothyroidism (up to 20 percent
  of American women); and (5) antigliadin antibodies / celiac disease cross-reacting
  with hair follicles to produce alopecia areata.'
