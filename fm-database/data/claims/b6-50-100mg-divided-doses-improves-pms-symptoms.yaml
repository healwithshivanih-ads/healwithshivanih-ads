  quote: B6 supplementation positively affects all PMS symptoms (particularly depression)
    in many women. Improvement arises from reducing midluteal estrogen and increasing
    midluteal progesterone. Therapeutic oral dose of B6 — 50 to 100 mg q.d. Divide
    doses greater than 50 mg into 50-mg doses throughout the day.
