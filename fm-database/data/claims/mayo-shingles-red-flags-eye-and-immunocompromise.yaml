slug: mayo-shingles-red-flags-eye-and-immunocompromise
statement: Rash on the forehead, around or in the eye (herpes zoster ophthalmicus),
  rash on the ear with facial weakness (Ramsay Hunt syndrome), or shingles in an immunocompromised
  client (chemotherapy, HIV, biologics, post-transplant) is an emergency requiring
  urgent specialist input.
