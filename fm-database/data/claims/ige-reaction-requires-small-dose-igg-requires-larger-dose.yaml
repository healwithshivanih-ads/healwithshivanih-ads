slug: ige-reaction-requires-small-dose-igg-requires-larger-dose
statement: IgE allergic reactions can be triggered by trace amounts of food (e.g.,
  a single peanut), whereas IgG sensitivity reactions are dose-dependent and typically
  require larger amounts of the reactive food.
evidence_tier: plausible_emerging
rationale: The dose-dependency difference between IgE and IgG reactions is a clinically
  observed and immunologically plausible distinction, though formal dose-threshold
  studies for IgG are limited.
coaching_translation: Clients with IgG sensitivities may tolerate small amounts of
  reactive foods without noticing — which is one reason their symptoms are so confusing.
  Larger portions or frequent exposure over days is what typically triggers a reaction.
caveats:
- Source is expert lecture, moderate quality.
- Dose thresholds for IgG reactions are highly individual.
