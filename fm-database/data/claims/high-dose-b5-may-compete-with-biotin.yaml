slug: high-dose-b5-may-compete-with-biotin
statement: High-dose vitamin B5 may compete with biotin and lipoic acid.
evidence_tier: confirm_with_clinician
rationale: B5 and biotin share transport mechanisms; this is a clinically plausible interaction warranting professional oversight
  at high doses.
out_of_scope_notes: High-dose B5 supplementation and biotin/lipoic acid competition require clinician assessment.
caveats:
- Source is a practitioner cheatsheet without primary citations.
- Relevant primarily at therapeutic (gram-level) doses of B5.
- Confirm with clinician before prescribing high-dose B5.
