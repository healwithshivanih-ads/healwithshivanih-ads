slug: phosphatidylcholine-supports-pemt-conserves-same
statement: Supplemental phosphatidylcholine supports PEMT-deficient individuals by
  directly providing the phospholipid the body cannot efficiently synthesise, while
  simultaneously reducing SAMe consumption by the PEMT pathway.
evidence_tier: plausible_emerging
rationale: PEMT uses SAMe to synthesise phosphatidylcholine; when dietary PC is supplied
  exogenously, the demand on the PEMT-SAMe pathway is reduced. RCT evidence for phosphatidylcholine
  in non-alcoholic fatty liver disease provides some support, though the specific
  genetic context (PEMT SNP) is extrapolated. Depression as a side effect from over-supplementation
  (noted by Lynch) warrants monitoring.
coaching_translation: Phosphatidylcholine is one of the most important PEMT supplements,
  but the Pulse Method is essential — depression on supplementation is a signal to
  stop.
caveats:
- Source is a consumer trade book.
- Depression as a side effect is a real clinical concern — clients must be monitored.
- Use non-GMO, soy-free (sunflower-derived) form to reduce allergen exposure.
- Elevated TMAO levels (cardiovascular risk marker) have been associated with PC supplementation
  in some individuals — check with clinician.
