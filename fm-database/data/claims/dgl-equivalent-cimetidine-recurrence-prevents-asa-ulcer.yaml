slug: dgl-equivalent-cimetidine-recurrence-prevents-asa-ulcer
statement: Deglycyrrhizinated licorice (DGL) shows no significant difference from
  cimetidine in ulcer recurrence rates and prevents ASA-induced gastric ulceration
  and bleeding.
evidence_tier: plausible_emerging
rationale: Comparative data vs. cimetidine cited in FM textbook; DGL's flavonoid content
  inhibits H. pylori and it stimulates mucus production. Chewable formulation required
  for efficacy via salivary activation.
coaching_translation: DGL chewable tablets can be as effective as a standard acid-blocking
  medication for preventing ulcer recurrence — without the side effects.
caveats:
- DGL in capsule form has not been shown effective — must be chewed.
- Studies compared to cimetidine (older H2 blocker); modern PPI comparisons are lacking.
