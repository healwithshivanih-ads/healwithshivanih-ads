slug: sklar-testicular-temperature-sperm-count
statement: 'Sustained 2 degree Celsius elevations in scrotal temperature for as little
  as 15 hours per day have been associated in research with dramatic drops in sperm
  count and morphology. Practical fertility-coaching countermeasures for the male
  partner: no saunas, hot tubs or hot baths while trying to conceive; cotton or natural-fibre
  loose-fit underwear instead of polyester or compression shorts; sitting breaks every
  30-45 minutes; never resting a laptop directly on the lap; sleep without underwear
  if comfortable.'
