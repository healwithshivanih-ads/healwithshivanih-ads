  quote: The higher the intake of vitamin C, the lower the BP. A modest BP-lowering
    effect (drop of 5 mm Hg) occurs in people with mild hypertension. Daily dose of
    500 mg produces the same benefit as higher doses (1000 or 2000 mg q.d.).
