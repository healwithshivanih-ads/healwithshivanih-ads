slug: vitamin-c-500mg-lowers-bp-5mmhg
statement: Vitamin C intake is inversely correlated with blood pressure; 500 mg daily
  produces a modest ~5 mm Hg reduction in people with mild hypertension, equivalent
  to higher doses.
evidence_tier: plausible_emerging
rationale: Multiple trials and a meta-analysis show modest BP reduction with vitamin
  C; mechanism involves antioxidant quenching of vascular oxidative stress and promotion
  of NO synthesis.
coaching_translation: 500 mg of vitamin C daily supports blood vessel health and provides
  a small but meaningful blood pressure reduction.
