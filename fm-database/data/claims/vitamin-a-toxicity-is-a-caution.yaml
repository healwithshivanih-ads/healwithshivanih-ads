slug: vitamin-a-toxicity-is-a-caution
statement: Vitamin A toxicity causes hair loss, nausea, and bone pain.
evidence_tier: confirm_with_clinician
rationale: Vitamin A toxicity from excessive retinol intake causing hypervitaminosis
  A with hair loss, hepatotoxicity, and bone pain is well-documented.
out_of_scope_notes: Vitamin A supplementation above dietary levels requires clinician
  oversight.
caveats:
- Toxicity applies to preformed retinol, not carotenoids.
- Risk increases significantly with doses above 10,000 IU/day long term.
- Retinol supplementation above 3000-5000 IU/day should be managed by clinician.
- Prescripton retinoic acid is clinician-only.
