slug: ayurvedic-seasonal-cleanse-spring-fall-monodiet-rationale
statement: Ayurvedic seasonal cleansing — eating a simple monodiet, reducing accumulation-feeding foods,
  and resting at the change of seasons — helps the body expel excess mucus (spring) or accumulated heat
  (fall) and recalibrate before the next season.
evidence_tier: fm_specific_thin
rationale: Spring and fall are the two major seasonal transition points when excess dosha (kapha in spring,
  pitta in fall) are at peak and most amenable to elimination. Fasting-mimicking monodiets like kitchari
  reduce digestive load, while daily oil massage (abhyanga) loosens impurities from channels. Rest allows
  the body's energy to reach deep tissue layers.
coaching_translation: A 3–7 day kitchari cleanse at the change of seasons (spring and fall) is a foundational
  Ayurvedic practice for preventing seasonal illness, improving digestion, and resetting the system.
out_of_scope_notes: ''
caveats:
- Not suitable during pregnancy, extreme depletion, or very low body fat (stop if light-headed after 3
  days).
- Avoid cleansing in very cold weather — body still needs building qualities.
