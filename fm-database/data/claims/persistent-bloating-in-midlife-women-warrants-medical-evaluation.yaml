slug: persistent-bloating-in-midlife-women-warrants-medical-evaluation
statement: Persistent bloating in middle-aged women that does not improve is a red
  flag requiring medical evaluation, as it can in some cases be a sign of late-stage
  ovarian cancer.
evidence_tier: confirm_with_clinician
rationale: Red-flag clinical guideline, not a coaching intervention. Ovarian cancer
  presenting as persistent bloating is a well-established clinical concern warranting
  immediate referral.
coaching_translation: If a client reports persistent bloating that isn't improving
  with lifestyle changes, this is a referral moment — not a coaching intervention.
out_of_scope_notes: Entirely clinician scope. Coaches should refer immediately and
  not attempt to manage this symptom without medical clearance.
caveats:
- This is a red flag, not a coaching intervention.
