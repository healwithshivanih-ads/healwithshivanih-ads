slug: mayo-anxiety-benzodiazepine-cautions
statement: Benzodiazepines (alprazolam, lorazepam, clonazepam, diazepam) cause physical
  dependence, sedation, cognitive blunting, and falls in older clients; coach should
  flag long-term daily use to the prescribing clinician and never recommend abrupt
  cessation.
