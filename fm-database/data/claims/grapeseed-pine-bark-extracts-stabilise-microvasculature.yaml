slug: grapeseed-pine-bark-extracts-stabilise-microvasculature
statement: Grapeseed or pine bark extract (oligomeric proanthocyanidins ≥ 95%) at
  150-300 mg/day supports microvascular integrity, reduces platelet aggregation, and
  improves endothelial function — used alongside vitamin C as the core antioxidant
  stack for atherosclerosis support.
evidence_tier: plausible_emerging
rationale: Multiple RCTs of Pycnogenol and grapeseed extract show measurable improvements
  in endothelial function (flow-mediated dilation), BP, and capillary fragility. Pizzorno
  groups them with vitamin C for the proanthocyanidin-ascorbate synergy at strengthening
  collagen and GAG matrix.
coaching_translation: Grapeseed or pine bark extract (Pycnogenol) plus vitamin C is
  the antioxidant stack for someone with established cardiovascular risk — they specifically
  strengthen the small blood vessels and quiet endothelial inflammation.
caveats:
- Use standardised extracts (>=95% OPCs).
- Mild bleeding risk; pause before surgery and check with cardiologist if on anticoagulants.
- Effect builds over 8-12 weeks.
