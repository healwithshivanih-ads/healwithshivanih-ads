slug: betaine-hcl-replaces-gastric-acid
statement: Betaine HCL supplementation with meals can temporarily replace deficient
  gastric acid, reducing fermentative reflux symptoms in patients with confirmed hypochlorhydria.
evidence_tier: fm_specific_thin
rationale: Biologically plausible — exogenous HCl can acidify the stomach and support
  pepsinogen activation. FM-endorsed but supported by limited controlled trials. Source
  is expert consensus.
coaching_translation: Taking a Betaine HCL capsule with protein-containing meals provides
  the stomach acid your stomach isn't making enough of, helping you digest food properly
  and reducing bloating, reflux, and fullness after eating.
out_of_scope_notes: Dosing decisions and duration of use are a clinician task.
caveats:
- Not a permanent fix — the goal is to restore natural HCl production.
- Source is expert consensus lecture.
- Verify with clinician before use.
