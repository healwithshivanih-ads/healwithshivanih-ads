slug: leaky-gut-triggers-thyroid-autoimmunity
statement: Leaky gut (increased intestinal permeability) allows undigested proteins
  and toxins into the bloodstream, triggering immune activation that can initiate
  or perpetuate thyroid autoimmunity.
evidence_tier: plausible_emerging
rationale: The link between intestinal permeability and autoimmune thyroid disease
  is biologically plausible and increasingly supported by emerging research, though
  large RCTs establishing causation are lacking. Document states this clearly as a
  mechanism.
coaching_translation: Healing your gut is a foundational step for Hashimoto's — what
  leaks through your gut wall can confuse your immune system into attacking your thyroid.
caveats:
- Source is synthesis; direct RCT evidence in thyroid autoimmunity is limited
