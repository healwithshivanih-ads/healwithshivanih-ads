slug: omega-3-reduces-autoimmune-inflammatory-activity
statement: Omega-3 fatty acids have anti-inflammatory properties that can help reduce
  autoimmune activity in thyroid conditions.
evidence_tier: plausible_emerging
rationale: EPA/DHA reduce pro-inflammatory eicosanoid production and downregulate
  NF-κB. Anti-inflammatory benefit is well-established; specific Hashimoto's antibody
  reduction evidence is limited.
coaching_translation: Eating more omega-3-rich foods (fatty fish, flaxseeds, walnuts)
  or supplementing can help reduce the inflammation that drives the autoimmune attack
  on your thyroid.
caveats:
- No Hashimoto's-specific RCT cited in source document.
- Source is an educational toolkit.
