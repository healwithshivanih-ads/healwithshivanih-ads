slug: multi-gene-panel-better-than-single-snp
statement: A population-based study examining COMT, MAOA, and 5HTTLPR together
  against cognitive outcomes demonstrates the value of a multi-gene ("polygenic")
  design over single-SNP analysis — the genes interact, and reading any one in
  isolation risks over- or under-stating its real contribution.
evidence_tier: strong
rationale: Directly supports the coaching-scope principle already established for
  this catalogue (polygenic-scoring mechanism) — reinforces why single-gene
  framing (e.g. "your dirty MTHFR gene") is methodologically weaker than
  group-and-score approaches.
coaching_translation: Genes work in groups, not solo — a single result rarely
  tells the whole story on its own.
