slug: probiotic-lacto-bifido-reduces-eradication-side-effects
statement: Lactobacillus + Bifidobacterium multistrain probiotics taken alongside
  H. pylori eradication therapy reduce antibiotic-associated side effects (diarrhea,
  nausea, dysgeusia) by ~50% and modestly increase eradication rates by competing
  for gastric mucosa adhesion sites and supporting butyrate-producing flora that restore
  mucosal immunity.
evidence_tier: strong
rationale: Multiple meta-analyses (Wang, Tong, Lau) confirm both effects. Mechanism
  — competition for adhesion sites + immune modulation + microbiome resilience during
  antibiotic exposure. Specific strains with strongest evidence — L. rhamnosus GG,
  L. reuteri DSM 17648, S. boulardii, Bifidobacterium lactis.
coaching_translation: Take a multistrain Lactobacillus + Bifidobacterium probiotic
  during your H. pylori antibiotic course. Cuts side effects in half and modestly
  improves eradication. Continue 4-6 weeks after antibiotics to rebuild flora.
caveats:
- Take probiotics 2 hours away from antibiotic doses.
- L. reuteri DSM 17648 has specific anti-H. pylori adhesion data.
- S. boulardii (yeast) is the antibiotic-resistant strain — survives the antibiotic
  course.
- Continue for 4-6 weeks post-eradication to rebuild microbiome.
