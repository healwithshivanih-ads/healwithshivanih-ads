slug: social-isolation-is-a-significant-stressor
statement: Loneliness and social isolation constitute a significant and often underestimated
  source of chronic stress.
evidence_tier: strong
rationale: Robust epidemiological and physiological research (e.g., Holt-Lunstad et
  al.) links social isolation to elevated cortisol, HPA activation, and adverse health
  outcomes. The document references this in the coaching context of a divorced, isolated
  client.
coaching_translation: Feeling disconnected or lonely isn't just an emotional experience
  — it creates real physiological stress in the body, which can affect everything
  from sleep to immune function.
caveats:
- Document does not cite specific studies; tier assigned based on established scientific
  consensus external to this source.
