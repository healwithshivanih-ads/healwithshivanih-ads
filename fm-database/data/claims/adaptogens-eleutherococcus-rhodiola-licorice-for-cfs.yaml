slug: adaptogens-eleutherococcus-rhodiola-licorice-for-cfs
statement: Adaptogens — Eleutherococcus senticosus (Siberian ginseng), Rhodiola rosea,
  and Glycyrrhiza glabra (licorice) — alongside vitamin C and pantothenic acid support
  HPA-axis recovery and adrenal function in CFS. Licorice specifically extends cortisol
  half-life via 11-beta-hydroxysteroid dehydrogenase inhibition; useful in hypoadrenal/low-cortisol
  presentations.
evidence_tier: plausible_emerging
rationale: Pizzorno positions adaptogens as the core herbal support for the HPA-axis
  component of CFS. Multiple RCTs of Rhodiola (Darbinyan, Olsson) show fatigue and
  cognitive benefit. Licorice's cortisol-extending effect is well-characterised.
coaching_translation: Adaptogens — Siberian ginseng, rhodiola, licorice — work upstream
  on the HPA axis that drives most CFS fatigue. Combine with vitamin C and pantothenic
  acid for adrenal nutrient support.
caveats:
- Licorice raises blood pressure via 11β-HSD2 inhibition; monitor BP, limit to 8-12
  weeks, avoid in hypertension.
- Rhodiola is activating — morning dosing.
- Eleutherococcus contraindicated in untreated hypertension.
- Pair with stress management — adaptogens alone won't fix HPA dysregulation if drivers
  continue.
