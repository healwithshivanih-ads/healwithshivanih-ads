slug: iodine-excess-can-trigger-thyroid-autoimmunity
statement: Excess iodine can trigger thyroid autoimmunity including Hashimoto's and Graves' disease.
evidence_tier: confirm_with_clinician
rationale: Iodine excess triggering autoimmune thyroid disease is supported by observational and epidemiological data.
out_of_scope_notes: Iodine supplementation in thyroid disease is clinician scope.
caveats:
- Source is a practitioner cheatsheet without primary citations.
- Risk appears highest in iodine-replete populations supplementing above RDA.
- Do not recommend iodine supplementation in known autoimmune thyroid patients without clinician guidance.
