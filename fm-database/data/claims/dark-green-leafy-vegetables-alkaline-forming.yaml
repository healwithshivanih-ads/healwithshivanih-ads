slug: dark-green-leafy-vegetables-alkaline-forming
statement: Dark green leafy vegetables are highly alkaline-forming because they are
  rich in alkaline minerals, and their mineral content is not significantly reduced
  by cooking.
evidence_tier: plausible_emerging
rationale: Green leafy vegetables have low PRAL scores (alkaline-forming) and are
  high in calcium, magnesium, and potassium. The statement that minerals are retained
  through cooking (unlike heat-sensitive vitamins) is nutritionally accurate.
coaching_translation: Eat dark leafy greens daily — cooked or raw, they still deliver
  the minerals that support an alkaline cellular environment.
caveats:
- Source is a lecture; PRAL rankings of specific vegetables vs. lemon are not explicitly
  compared in the transcript.
