slug: gutbio-secretory-iga-reflects-pathogens-and-stress
statement: Secretory IgA (sIgA) is the main antibody released onto the gut mucosa,
  binding and neutralising microbes before they cross the barrier. It rises when harmful
  pathogens are present and should renormalise once the pathogen is cleared, but it
  can be suppressed to abnormally low levels by chronic mental or physical stress
  or inadequate nutrition — so both high and low sIgA carry meaning.
evidence_tier: plausible_emerging
rationale: Low sIgA is a tangible, coachable signal that a client's stress load or
  under-nourishment may be weakening their first line of gut immune defence.
coaching_translation: When sIgA is low, focus coaching on restoring rest, stress resilience,
  adequate nutrition and vagal tone; when it is high, support the client alongside
  their clinician's pathogen-directed plan rather than trying to lower it with lifestyle
  alone.
out_of_scope_notes: Identifying or treating a gut pathogen, and interpreting whether
  sIgA is meaningfully high or low, is the clinician's role.
caveats:
- Sometimes a specific pathogen driving high sIgA cannot be identified even when the
  marker is clearly elevated.
