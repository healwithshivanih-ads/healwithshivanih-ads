slug: pelvic-floor-hypertonicity-and-erectile-dysfunction
statement: Per Danielson's 20-year clinical experience, roughly 90 percent of erectile
  dysfunction in men presenting to pelvic-floor physiotherapy is not primarily vascular,
  hormonal, or psychogenic but is mechanical — chronic hypertonicity (excess resting
  tone) of the pelvic-floor musculature compresses the deep penile vasculature and
  impedes the blood-pooling required for erection. PDE-5 inhibitors (sildenafil, tadalafil)
  work downstream by amplifying nitric oxide signalling and partially overcoming this
  mechanical resistance, but they do not address the underlying tone. Conservative
  care — diaphragmatic breathing, targeted pelvic-floor relaxation (NOT Kegels), pelvic
  muscle massage tools — frequently restores function. Coach can flag this pathway
  in male clients with ED who have normal cardiovascular workups and normal testosterone.
