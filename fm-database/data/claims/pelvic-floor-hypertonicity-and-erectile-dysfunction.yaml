  quote: About 90% of erectile dysfunction actually is not a medical issue. It is
    a fitness movement issue. Because when the muscles of the pelvic floor get too
    much tone too tight blood flow to the penis cannot happen.
rationale: Important pathway for male clients reluctant to discuss ED or wedded to
