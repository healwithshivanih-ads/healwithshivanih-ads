  location: Chapter 77 — Migraine Headache, pg 1270-1272
  quote: Pain relief lasted at least 24 hours in 18 of 21 patients (86%) with serum
    ionized magnesium levels below 0.54 mmol/L and in 3 of 19 patients (16%) with
    ionized magnesium levels at or above 0.54 mmol/L. Magnesium bound to citrate,
    malate, or aspartate is better absorbed and better tolerated than inorganic forms.
