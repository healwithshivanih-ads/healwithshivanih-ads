slug: migraine-magnesium-deficiency-low-rbc-mg
statement: Low tissue magnesium is common in migraineurs but is missed by standard
  serum magnesium (which reflects only late-stage deficiency). RBC magnesium and ionized
  magnesium are more sensitive markers. IV magnesium sulfate 1 g produced greater
  than 50% pain reduction within 15 minutes in 86% of acute migraine patients with
  ionized magnesium less than 0.54 mmol/L, vs only 16% in those above that threshold.
  Oral magnesium citrate/malate/aspartate forms are preferred over inorganic salts;
  add B6 50 mg to boost intracellular magnesium uptake. Magnesium deficiency also
  links migraine to mitral valve prolapse (85% of MVP patients are chronically deficient).
evidence_tier: strong
