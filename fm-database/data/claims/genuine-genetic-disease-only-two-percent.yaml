  location: Podcast — genetic disease vs susceptibility segment
  quote: A genetic illness is defined by very strict criteria — if you have the gene
    you have the illness. The only thing you're genetically susceptible to is health.
    The hangover gene doesn't give you a hangover unless you drink alcohol.
rationale: Coach can reframe "I have bad genes" defeatism — most variants are not
  destiny.
