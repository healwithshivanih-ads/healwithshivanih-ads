slug: genuine-genetic-disease-only-two-percent
statement: Across all human disease, only approximately 2 percent meets the strict
  definition of a genetic disease — one where possession of the variant is sufficient
  to produce the disease (e.g. trisomy 21 / Down syndrome, cystic fibrosis with homozygous
  CFTR mutation, Huntington's disease, sickle cell anemia). The remaining 98 percent
  of chronic illness involves gene-environment interaction in which the genome encodes
  susceptibility but environmental and lifestyle inputs determine whether the disease
  expresses. The popular framing "the obesity gene", "the diabetes gene", "the cancer
  gene", or "the addiction gene" is logically incoherent — if a true gene caused obesity,
  populations 200 years ago carrying the same genome would have been obese, which
  they were not. The susceptibility-gene framing obscures the dominant role of modifiable
  lifestyle factors and should not be used to convey inevitability to clients.
evidence_tier: strong
