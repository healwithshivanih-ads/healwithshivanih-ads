slug: resistance-training-improves-glucose-disposal
statement: Resistance training (2–3 sessions per week, 2–3 sets of 8–12 reps per major
  muscle group) improves glucose disposal and insulin sensitivity.
evidence_tier: strong
rationale: Well-established in exercise physiology literature; resistance training
  increases GLUT-4 protein content in skeletal muscle and improves insulin-stimulated
  glucose uptake.
coaching_translation: Building muscle through weight training is one of the most powerful
  ways to improve how your body handles blood sugar — muscle is your biggest glucose
  disposal organ.
