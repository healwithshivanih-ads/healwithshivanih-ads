sources:
- id: christianson-energy-blueprint-podcast-2026
  location: Podcast — nitrate context segment
  quote: In the case of smoked and processed meats, their correlations with stomach
    and esophageal cancer correlates with their nitrate content. But yet we can also
    see nitrates engendering a different response in the context of whole foods, in
    the context of polyphenols. The same things given their context — one is a clear
    thing for a cancer risk and one is a clear thing benefiting aerobic performance.
rationale: Resolves the confusion clients bring in — "but I thought nitrates were
  bad?" The matrix matters.
