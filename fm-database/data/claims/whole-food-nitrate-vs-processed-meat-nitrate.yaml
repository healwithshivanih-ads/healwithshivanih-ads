slug: whole-food-nitrate-vs-processed-meat-nitrate
statement: The food matrix determines whether nitrate intake is beneficial or harmful.
  Whole-food nitrate (beets, leafy greens) accompanied by polyphenols and vitamin
  C is associated with cardiovascular protection and aerobic benefit. Processed-meat
  nitrate (smoked bacon, deli meats, sodium-nitrite-cured products) is associated
  with esophageal and stomach cancer risk because the meat matrix and high heat generate
  carcinogenic N-nitroso compounds in the absence of antioxidant cofactors. Same compound,
  opposite outcome — context is everything. Coach guidance — yes to beetroot, no to
  bacon; this is not a contradiction.
evidence_tier: plausible_emerging
