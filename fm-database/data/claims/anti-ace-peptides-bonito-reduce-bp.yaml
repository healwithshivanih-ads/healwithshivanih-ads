slug: anti-ace-peptides-bonito-reduce-bp
statement: Bonito anti-ACE peptides (1500 mg/day) and sardine dipeptide reduce systolic
  pressure by ≥10 mm Hg and diastolic by 7 mm Hg in borderline and mild hypertensives
  without lowering BP in normotensive individuals.
evidence_tier: plausible_emerging
rationale: Mechanism of ACE inhibition via peptide decoy is plausible; clinical data
  cited are supportive but from a limited evidence base.
coaching_translation: Natural peptides from fish like bonito act like mild ACE inhibitors
  to lower blood pressure, without side effects in people with normal BP.
