slug: foodsens-lab-landscape-igg-vs-complement-vs-ige
statement: Common labs differ meaningfully. Genova offers IgG only, so heavy consumption
  can read positive without a real problem. KBMO's FIT test pairs IgG with C3d complement
  and can add a gut-barrier panel. Quest and LabCorp run IgG panels but also IgE panels
  — the IgE (immediate) component is valuable and is often insurance-covered, helping
  catch a co-existing immediate reaction alongside a delayed one.
evidence_tier: fm_specific_thin
rationale: Knowing what each lab does and does not measure lets a coach make sense
  of whichever report a direct-to-consumer client walks in with.
coaching_translation: If a client brings a report, identify which lab and which markers
  it used, and explain in plain terms what it can and cannot tell them — then route
  interpretation and next steps back to their clinician.
out_of_scope_notes: Choosing, ordering and interpreting a specific lab panel is the
  clinician's responsibility.
caveats:
- Lab menus and marker combinations change over time; confirm the current panel with
  the clinician rather than assuming.
