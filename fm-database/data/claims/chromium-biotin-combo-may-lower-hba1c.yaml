slug: chromium-biotin-combo-may-lower-hba1c
statement: Chromium combined with biotin (vitamin B7) may help lower HbA1c, blood
  sugar, and cholesterol in people with type 2 diabetes.
evidence_tier: fm_specific_thin
rationale: Albarracin et al. 2007 (J Cardiometab Syndr) RCT cited in document; effect
  is specific to the combination and mainly in T2D; evidence base is thin.
coaching_translation: Some research suggests that taking chromium together with biotin
  may help with blood sugar and cholesterol in type 2 diabetes.
caveats:
- Evidence inconsistent for chromium alone. Combination effect from single RCT. Contraindicated
  in kidney disease. Refer to clinician.
out_of_scope_notes: Chromium dosing requires clinician guidance, especially given
  kidney disease contraindication.
