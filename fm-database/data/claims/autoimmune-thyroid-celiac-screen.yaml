slug: autoimmune-thyroid-celiac-screen
statement: Patients with autoimmune thyroid disease — Graves' disease or Hashimoto's
  thyroiditis — are more likely than the general population to have celiac disease
  and/or gluten sensitivity. Celiac/gluten must be ruled out and food allergies identified
  as part of standard workup for any autoimmune thyroid presentation.
evidence_tier: strong
