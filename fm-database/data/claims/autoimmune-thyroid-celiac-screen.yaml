sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 66 — Hyperthyroidism, pg 1108
  quote: Patients with autoimmune thyroid disease, either Graves' disease or Hashimoto's
    thyroiditis (the major cause of low thyroid function), are more likely than the
    general population to suffer from celiac disease and/or gluten sensitivity. Therefore,
    these conditions must be ruled out.
