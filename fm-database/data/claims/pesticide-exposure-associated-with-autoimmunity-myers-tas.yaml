slug: pesticide-exposure-associated-with-autoimmunity-myers-tas
statement: Occupational pesticide exposure has been associated with higher autoimmune
  mortality, elevated antinuclear antibodies, and lupus, and many pesticides are systemic
  so washing produce does not remove them.
evidence_tier: plausible_emerging
rationale: Farmer cohort studies link chronic pesticide exposure to autoimmune outcomes;
  systemic pesticides are integrated into the plant, supporting a preference for organic
  where possible.
coaching_translation: Pesticides are linked to autoimmune risk and can't just be washed
  off — buying organic for the most-sprayed foods helps.
