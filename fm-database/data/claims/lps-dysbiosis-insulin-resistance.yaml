slug: lps-dysbiosis-insulin-resistance
statement: LPS released from gut dysbiosis enters circulation and increases insulin
  resistance by triggering systemic inflammation.
evidence_tier: plausible_emerging
rationale: Endotoxemia-driven insulin resistance is well-described in animal models
  and has mechanistic human data (elevated LPS associated with metabolic syndrome),
  but causal interventional evidence in humans is still emerging.
coaching_translation: An imbalanced gut microbiome can leak bacterial toxins into
  the bloodstream, quietly raising inflammation and making insulin resistance worse.
