slug: hbot-effect-is-half-in-chamber-half-after
statement: A significant fraction (Sonners estimates 50-75 percent) of the clinical
  benefit of HBOT happens AFTER the session ends — as accumulated dissolved oxygen
  comes out of solution it acts as an active signalling molecule, interacting with
  cells in the hours that follow. The in-chamber phase delivers the oxygen surplus;
  the post-session phase delivers the cell signalling cascade (HIF-1-alpha, VEGF,
  stem cell mobilisation). This is why session frequency and accumulation across days
  matters more than a single long session.
evidence_tier: plausible_emerging
