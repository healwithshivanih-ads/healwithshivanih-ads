sources:
- id: sonners-mercola-podcast-2024
  location: Podcast — post-session mechanism discussion
  quote: Roughly about half of the treatment is occurring while you are in the chamber
    and the other half of the therapy is when you get out. That oxygen can no longer
    stay in solution — as it is coming out it is interacting with all of our cells
    triggering a massive cascade of cellular communication. I would probably even
    say maybe 70 to 75 percent of the treatment is actually after getting out.
rationale: Important client-counselling point about why one session is not therapeutic.
