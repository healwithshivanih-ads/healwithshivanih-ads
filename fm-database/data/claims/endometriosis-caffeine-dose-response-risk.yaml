slug: endometriosis-caffeine-dose-response-risk
statement: Caffeine intake shows a dose-response relationship with endometriosis risk
  — women consuming 150 to 225 mg per day (about 1 to 1.5 cups of coffee) had a 20%
  increased risk, while those consuming more than 225 mg per day had a 60% increased
  risk of endometriosis.
evidence_tier: plausible_emerging
