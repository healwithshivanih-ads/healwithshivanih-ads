slug: luteolin-potency-vs-cromolyn
statement: |
  Luteolin demonstrates greater potency than cromolyn sodium in inhibiting
  mast cell degranulation in some experimental models.
evidence_tier: plausible_emerging
rationale: |
  In vitro and animal studies show luteolin matches or exceeds cromolyn in
  stabilizing mast cell membranes and reducing degranulation. Human RCT
  data is limited; the comparison is based on preclinical models and small
  clinical observations.
coaching_translation: |
  Luteolin — a flavonoid found in celery, parsley, and chamomile — has
  shown promise that may even rival a prescription mast cell stabilizer
  called cromolyn. It's not a replacement for medical care, but it gives us
  a natural tool with a strong mechanism story.
caveats:
  - Preclinical and small-study evidence; not head-to-head clinical RCTs.
  - Effect varies with formulation and absorption.
out_of_scope_notes: ''
