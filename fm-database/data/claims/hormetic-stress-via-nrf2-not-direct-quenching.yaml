sources:
- id: murray-energy-blueprint-podcast-2026
  location: Podcast — Nrf2 and hormesis segment
  quote: Nrf2 is the body's antioxidant response. If you look at what stimulates Nrf2
    activation, it's both stressors to the antioxidant system and natural compounds
    that support the antioxidant system. Supplemented antioxidants to people doing
    exercise — what they found is that it actually cancelled out or mostly negated
    many of the metabolic benefits of doing exercise. Those reactive oxygen species
    are not just bad guys.
rationale: Pushes coach away from blanket high-dose antioxidant stacking and toward
  whole-food polyphenols + hormetic stressors.
