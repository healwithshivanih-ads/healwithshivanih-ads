slug: hormetic-stress-via-nrf2-not-direct-quenching
statement: The simple "antioxidants good, oxidants bad" model is wrong because it
  ignores Nrf2, the body's master regulator of endogenous antioxidant defences. Hormetic
  stressors (exercise-induced ROS, fasting, polyphenol exposure, sauna, cold) activate
  Nrf2 which upregulates glutathione synthesis, superoxide dismutase, and catalase
  — building lasting antioxidant capacity. Direct antioxidant supplements (high-dose
  vitamin C, E, N-acetylcysteine) consumed AROUND exercise have repeatedly been shown
  to BLUNT the metabolic adaptations exercise produces. ROS are signalling molecules
  required for mitochondrial biogenesis. Coach implication — do not pile on direct-quenching
  antioxidants around training; emphasise polyphenol-rich whole foods that signal
  via Nrf2; use NAC and similar agents strategically, not prophylactically.
evidence_tier: plausible_emerging
