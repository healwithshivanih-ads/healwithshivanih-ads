slug: gratitude-has-two-components-affirming-and-exploring-goodness
statement: 'Gratitude practice has two core components: affirming the goodness in
  one''s life, and exploring where that goodness comes from.'
evidence_tier: plausible_emerging
rationale: Directly attributed to Robert A. Emmons, Ph.D., a leading researcher in
  gratitude science. This two-component framework underpins most evidence-based gratitude
  interventions and is consistent with published work (e.g., Emmons & McCullough,
  2003).
coaching_translation: True gratitude isn't just making a list of good things—it's
  also reflecting on who or what made those good things possible, which deepens the
  emotional benefit.
caveats:
