slug: mayo-shingles-72-hour-antiviral-window
statement: Conventional treatment is oral antivirals — acyclovir, valacyclovir, or
  famciclovir — started ideally within 72 hours of rash onset to shorten illness duration,
  reduce viral shedding, and lower postherpetic-neuralgia risk; coach should treat
  any new dermatomal rash as time-sensitive.
