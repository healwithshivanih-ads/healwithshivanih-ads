- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 45 — Diabetes, pg 848–849
  quote: Charantin, extracted by alcohol, is a hypoglycemic agent composed of mixed
    steroids that is more potent than the oral hypoglycemic drug tolbutamide. Bitter
    melon also contains an insulin-like polypeptide, polypeptide-P, which lowers blood
    glucose levels when injected like insulin into type 1 diabetics. Taking as little
    as 2 fl oz of the juice has shown good results in clinical trials.
