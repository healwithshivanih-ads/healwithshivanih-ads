slug: mayo-snoring-first-line-lifestyle
statement: Conservative measures with evidence are weight loss if BMI elevated, avoiding
  alcohol within 3 hours of bedtime, sleeping on the side rather than the back (positional
  therapy), treating nasal congestion (saline rinse, decongestant short-term, allergy
  management), and consistent sleep schedule with adequate duration.
