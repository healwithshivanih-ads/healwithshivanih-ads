  location: Coach Observation — Lab Testing Notes
  quote: Because cytokines like IL-6 follow a strict circadian rhythm (with peaks
    typically occurring at 19:00–20:00 and 04:00–05:00), research often utilizes frequent
    blood sampling over a 24-hour period to get a comprehensive view of their secretion
    patterns rather than a single daytime measurement.
