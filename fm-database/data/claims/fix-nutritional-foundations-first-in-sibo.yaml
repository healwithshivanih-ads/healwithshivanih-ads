slug: fix-nutritional-foundations-first-in-sibo
statement: Correcting foundational nutritional deficiencies — especially vitamin D
  and folate — before advancing to complex SIBO interventions may resolve up to 40%
  of patient symptoms by restoring immune competency.
evidence_tier: fm_specific_thin
rationale: Vitamin D and folate deficiency impair immune function. The '40%' claim
  is anecdotal/experiential from the lecturer, not from a cited study. The principle
  of nutritional foundationing is sound FM practice.
coaching_translation: Before jumping to complex protocols, make sure the basics are
  covered — low vitamin D and folate alone can keep the immune system too weak to
  clear gut infections.
caveats:
- The '40% improvement' figure is from clinical observation, not a published trial.
- Source is expert consensus lecture. Vitamin D dosing requires clinician guidance
  and serum testing.
