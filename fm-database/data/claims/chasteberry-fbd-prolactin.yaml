slug: chasteberry-fbd-prolactin
statement: Chasteberry (Vitex agnus-castus) — standardised extract 175 to 225 mg/day
  — outperforms placebo for FBD breast pain across multiple double-blind trials. In
  170-women PMS trial, 52% of chasteberry vs 24% of placebo had measurable breast
  pain reduction. Works via prolactin suppression. First-line botanical for any client
  with prolactin-mediated cyclic mastalgia.
evidence_tier: strong
