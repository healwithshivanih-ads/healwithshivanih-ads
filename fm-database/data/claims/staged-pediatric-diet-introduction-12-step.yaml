slug: staged-pediatric-diet-introduction-12-step
statement: For families navigating restrictive diets with a picky-eating child, Matthews
  recommends a staged approach — Step 1 remove artificial colours/flavours/preservatives
  and home chemical exposures, Step 2 add nourishing whole foods, then progressively
  layer therapeutic restrictions (GFCF, then low-salicylate or low-oxalate or ketogenic)
  only as warranted by symptom response. Critically, the process EVOLVES — once the
  gut and microbiome heal, the diet should be widened back to maximise nutrient diversity
  and adherence. Most other approaches teach the entry diet but not the exit; Matthews
  frames evolving-the-diet as an explicit step of the system. Empirically, when the
  gluten and casein opioid loop is broken, picky eating often resolves on its own
  and children begin accepting protein and vegetables they previously refused.
evidence_tier: plausible_emerging
