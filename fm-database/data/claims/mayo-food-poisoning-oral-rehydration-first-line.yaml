slug: mayo-food-poisoning-oral-rehydration-first-line
statement: Mainstay home care is small frequent sips of clear fluids — oral rehydration
  solution preferred, then diluted juice, broth, or ice chips — and gradual reintroduction
  of bland low-fat low-fibre foods (the BRAT framing) once vomiting stops.
