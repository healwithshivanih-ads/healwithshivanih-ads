  quote: Celiac disease is now thought to affect as many as 1% of all Americans, though
    it remains largely undiagnosed. A landmark study that looked at almost 30,000
    patients from 1969 to 2008 found a higher than normal risk of early death associated
    with sensitivity to gluten. Those with full-blown celiac disease had a 39% increased
    risk of early death.
