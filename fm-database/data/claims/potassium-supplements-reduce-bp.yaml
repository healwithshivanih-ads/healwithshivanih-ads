slug: potassium-supplements-reduce-bp
statement: Potassium supplements at 2.5–5.0 g per day can reduce blood pressure in
  hypertensives; a K/Na ratio above 5:1 is considered necessary to maintain cardiovascular
  health.
evidence_tier: strong
rationale: Supported by multiple RCTs and meta-analyses; potassium's natriuretic and
  vasodilatory mechanisms are well established.
coaching_translation: Getting more potassium — from fruits, vegetables, or supplements
  — is as important as reducing sodium for healthy blood pressure.
caveats:
- Potassium supplements are contraindicated in kidney disease and in patients on digitalis,
  K-sparing diuretics, or ACE inhibitors — always check medications.
- FDA limits OTC potassium supplements to 99 mg/dose; food sources preferred.
