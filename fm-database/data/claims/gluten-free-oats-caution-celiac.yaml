slug: gluten-free-oats-caution-celiac
statement: Gluten-free oats share structural similarity with gluten-containing grains
  and may be cross-contaminated during processing; individuals with celiac disease
  or gluten intolerance should use caution.
evidence_tier: strong
rationale: This is clinically well-established. Avenin in oats can trigger reactions
  in a subset of celiac patients; cross-contamination risk is documented.
coaching_translation: Even certified gluten-free oats can cause problems for some
  people with celiac disease. Introduce them cautiously and track symptoms.
caveats:
- Decision to include oats should involve clinician for celiac patients
