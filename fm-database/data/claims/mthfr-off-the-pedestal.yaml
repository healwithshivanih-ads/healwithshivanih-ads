slug: mthfr-off-the-pedestal
statement: MTHFR is a single low-impact variant in the methylation pathway, not the
  master gene the testing industry once marketed. It should be read in the context
  of the whole methylation group rather than used to explain a client's symptoms or
  drive supplement stacks on its own.
evidence_tier: plausible_emerging
rationale: 'Deflate MTHFR anxiety: it is one low-impact spelling change among many
  methylation genes.'
