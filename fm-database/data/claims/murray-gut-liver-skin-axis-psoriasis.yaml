  location: Chapter 88 — Psoriasis, pg 1452–1455
  quote: Incomplete protein digestion or poor intestinal absorption of protein breakdown
    products can result in elevations of amino acids and polypeptides in the bowel.
    These polyamines have been shown to contribute to the excessive rate of cell proliferation
    in psoriasis. Lowered skin and urinary levels of polyamines are associated with
    clinical improvement in psoriasis.
