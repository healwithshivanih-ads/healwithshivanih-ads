slug: gluten-free-diet-reduces-thyroid-autoantibodies-celiac
statement: In patients with celiac disease and concurrent autoimmune thyroid disease,
  serologic thyroid autoantibody markers can become undetectable within 6 months of
  starting a strict gluten-free diet.
evidence_tier: plausible_emerging
rationale: Pizzorno cites an established overlap between celiac and Hashimoto's (roughly
  2% of celiac patients have overt autoimmune thyroid disease) and reports clinical
  observation of antibody normalization on gluten elimination. Smaller human studies
  support directionality; large RCTs are limited.
coaching_translation: If you have both celiac disease and Hashimoto's, going strictly
  gluten-free for 6 months can sometimes bring your thyroid antibodies down to undetectable
  levels.
caveats:
- Effect is documented in celiac patients; whether non-celiac gluten sensitivity yields
  the same response is less clear.
- Strict adherence is required — even small gluten exposures sustain antibody activity.
- Some patients still need thyroid replacement during/after antibody normalization.
