slug: body-makes-its-own-weight-in-atp-daily
statement: The body produces approximately its own body weight in ATP every day —
  a 70 kg adult turns over roughly 70 kg of ATP per 24 hours. ATP is not a stored
  compound; it is a chemical currency continuously made and consumed via the mitochondrial
  electron transport chain. This high turnover explains why even subtle mitochondrial
  dysfunction produces dramatic systemic fatigue, and why supporting mitochondrial
  substrate (B vitamins, CoQ10, magnesium, iron, oxygen delivery) is rate-limiting
  for whole-body energy. Coach narrative — the scale of ATP demand legitimises a heavy
  focus on mitochondrial nutrition for any fatigue client.
evidence_tier: plausible_emerging
