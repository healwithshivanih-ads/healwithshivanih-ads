  location: Podcast — ATP turnover segment
  quote: It's about your body weight. If someone weighs 100 lb, their body every single
    day is making about 100 pounds of ATP. If they weigh 200 lb, they're making 200
    pounds of energy every day. ATP is the chemical currency for energy in our body
    and it's the mitochondria's job to produce ATP.
rationale: Memorable client-facing soundbite — "your body makes its own weight in
  cellular energy every day; let's give it what it needs."
