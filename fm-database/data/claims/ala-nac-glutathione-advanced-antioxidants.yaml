slug: ala-nac-glutathione-advanced-antioxidants
statement: Alpha-lipoic acid, N-acetylcysteine, and glutathione (preferably as precursors)
  constitute an advanced antioxidant protocol for patients with chronic inflammation
  beyond basic vitamins and minerals.
evidence_tier: plausible_emerging
rationale: ALA is a well-characterized antioxidant with both water- and fat-soluble
  activity that recycles vitamin C and E. NAC is established as a glutathione precursor.
  These are commonly used in FM practice with plausible mechanisms and emerging clinical
  evidence.
coaching_translation: For clients with persistent inflammation who've already optimized
  diet and basic vitamins, adding ALA and NAC can provide deeper antioxidant protection
  at the cellular level.
caveats:
- Source is expert FM lecture (moderate quality).
- Dosing of these supplements warrants clinician review, especially ALA in diabetics
  (affects blood sugar).
