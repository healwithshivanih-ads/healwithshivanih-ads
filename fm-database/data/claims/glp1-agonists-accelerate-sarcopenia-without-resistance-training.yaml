slug: glp1-agonists-accelerate-sarcopenia-without-resistance-training
statement: GLP-1 receptor agonists (semaglutide, tirzepatide) can cause 15-24 percent
  body-weight loss, but up to 50 percent of that loss can be lean muscle mass. Without
  paired resistance training and aggressive protein intake (1.2-1.6 g/kg/day distributed
  across meals), users emerge metabolically worse — smaller, more fragile, with proportionally
  higher body fat and lower muscle reserve — predisposing to sarcopenic obesity, osteoporosis,
  and accelerated frailty at younger ages. Sarcopenia normally accrues at 3-8 percent
  per decade; GLP-1 use compresses decades of muscle loss into a 2-year medication
  course.
evidence_tier: confirm_with_clinician
