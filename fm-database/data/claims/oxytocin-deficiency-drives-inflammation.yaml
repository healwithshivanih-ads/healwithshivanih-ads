slug: oxytocin-deficiency-drives-inflammation
statement: Emotional isolation leads to oxytocin deficiency, which increases inflammation
  and immune dysregulation.
evidence_tier: plausible_emerging
rationale: Oxytocin's anti-inflammatory and immune-modulatory roles are supported
  in animal and some human studies. Social isolation's link to inflammatory markers
  is consistent with emerging psychoneuroimmunology evidence.
coaching_translation: Human connection is literally anti-inflammatory. Regular meaningful
  social interaction, physical touch, and community can support immune balance at
  a biochemical level.
caveats:
- Source is educational synthesis without direct citation.
- Causality in humans is harder to establish than mechanism studies suggest.
