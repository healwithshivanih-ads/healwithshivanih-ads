slug: fasted-morning-cardio-increases-fat-oxidation
statement: Moderate-intensity morning exercise performed after a 10-12 hour overnight
  fast — before breaking the fast with breakfast — taps stored body fat as the primary
  energy source. With circulating insulin low and liver glycogen depleted, working
  muscle preferentially mobilises adipose triglycerides via lipolysis and beta-oxidation,
  increasing the fraction of energy expended from fat. Combined with time-restricted
  eating, this layered approach maximises fat-burning potential. The effect is real
  for moderate aerobic activity (walking, jogging, easy cycling); strenuous strength
  training or high-intensity sports in the fasted state will not maintain peak performance.
evidence_tier: plausible_emerging
rationale: Mechanistically well-established — fasted-state exercise reliably shifts
  substrate utilisation toward fat. However, evidence that fasted cardio produces
  greater long-term fat loss than fed cardio at matched caloric expenditure is mixed;
  the broader benefit comes from layering it with TRE for metabolic flexibility.
coaching_translation: If you've gone 10-12 hours without eating overnight and do your
  morning walk, jog, or bike ride before breakfast, your muscles will burn more body
  fat for fuel. For moderate activity, this works well. For heavy lifting or intense
  sports, you'll perform better after eating first.
caveats:
- Long-term fat loss difference vs fed-state exercise is debated at matched caloric
  expenditure.
- Not appropriate for those with type 1 diabetes, hypoglycaemia history, or eating
  disorder history.
- Strenuous fasted training risks compromised performance and muscle loss.
