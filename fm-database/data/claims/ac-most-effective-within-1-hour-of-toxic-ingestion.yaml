slug: ac-most-effective-within-1-hour-of-toxic-ingestion
statement: Activated charcoal is most effective when given within 1 hour of toxic
  ingestion — volunteer data shows toxin absorption reduction drops from 47.3% at
  30 minutes to 16.5% at 120 minutes. Extended administration up to 4 hours may be
  justified for large ingestions, delayed-release formulations, or toxins with anticholinergic/opioid
  properties that slow gut motility.
evidence_tier: strong
rationale: Consistent with American Academy of Clinical Toxicology / European Association
  of Poisons Centres position statements. Reflects pharmacokinetic reality — AC works
  only on toxin still in the GI tract, and most toxins absorb within 1-2 hours.
coaching_translation: For any toxic ingestion, time is everything. AC works best in
  the first hour and is largely useless after a few hours unless the toxin slows gut
  motility (opioids, anticholinergics, tricyclics). Don't wait — call Poison Control
  immediately.
caveats:
- Hospital administration is the norm; home use only with Poison Control direction.
- Time-from-ingestion estimation often unreliable in the field; AC is still typically
  tried.
- After 4 hours, MDAC or hemodialysis becomes the consideration, not single-dose AC.
