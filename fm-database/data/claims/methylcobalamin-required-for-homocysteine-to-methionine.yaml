slug: methylcobalamin-required-for-homocysteine-to-methionine
statement: Methylcobalamin (active B12) and methylfolate (active B9) are both required
  cofactors for the enzyme methionine synthase to convert homocysteine to methionine.
evidence_tier: strong
rationale: 'Well-established biochemistry: methionine synthase requires methylcobalamin
  as a direct cofactor and 5-MTHF as the methyl donor. Deficiency in either leads
  to homocysteine accumulation.'
coaching_translation: To keep homocysteine levels healthy, both active B12 and active
  folate need to be present together — neither works in isolation for this conversion.
caveats:
- Dosing for therapeutic homocysteine reduction requires clinical supervision.
