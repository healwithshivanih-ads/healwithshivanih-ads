slug: wash-new-clothes-before-wearing-formaldehyde
statement: New clothing is typically treated with anti-moth chemicals (often formaldehyde-based)
  during transport from manufacturing to retail, producing the characteristic "new
  clothing" smell. Washing before first wear — and sometimes multiple washes if the
  smell persists — substantially reduces residual chemical exposure. Dry cleaning
  uses formaldehyde-derived solvents that re-deposit on fabric; most "dry clean only"
  garments can in fact be hand-washed or gentle-cycle washed safely.
evidence_tier: plausible_emerging
