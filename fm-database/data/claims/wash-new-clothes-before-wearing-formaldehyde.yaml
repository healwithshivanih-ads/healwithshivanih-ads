  location: Podcast — Clothing chemicals
  quote: Don't wear clothes from the store that haven't been washed because to prevent
    them from getting moths on the way from the country of manufacture to you, they're
    sprayed with chemicals. Do your best to wash them before you wear them. We don't
    take our clothes to the dry cleaners — they use a form of formaldehyde.
