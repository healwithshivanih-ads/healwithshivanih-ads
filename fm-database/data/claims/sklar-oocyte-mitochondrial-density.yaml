slug: sklar-oocyte-mitochondrial-density
statement: Oocytes carry one of the highest mitochondrial densities of any cell in
  the human body, which is why mitochondrial dysfunction shows up early as reduced
  fertilisation rates, slowed embryo development and increased rates of chromosomal
  abnormality. Mitochondrial DNA does not repair itself in the way nuclear DNA can
  — oxidative damage accumulates.
