slug: mosaic-not-monolith-chronic-illness
statement: 'Gordon emphasises that chronic illness is NOT a uniform whole-body state
  — it is a mosaic. Different cell populations are stuck in different CDR stages in
  different organs simultaneously. Some liver cells in CDR1 inflammatory mode, some
  kidney cells in CDR2 proliferative mode, some brain cells with hardened membranes
  unable to receive thyroid or insulin signals. This explains why a client can have
  "normal labs" overall while suffering: the affected mosaic is too small to shift
  whole-organ markers. If the same CDR happened across all cells simultaneously, the
  client would be septic and hospitalised. Implication for coach — symptom patterns
  may not map cleanly onto a single organ system; expect patchy responses to interventions.'
evidence_tier: plausible_emerging
