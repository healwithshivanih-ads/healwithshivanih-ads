  quote: We're not a monolith. We're a mosaic. We have cells that are stuck in various
    forms in various states of this cell danger response. Chronic illness is when
    these things are happening in small portions of your body. Some brain cells, some
    liver cells, some kidney cells.
rationale: Explains the puzzling presentation of clients with multi-system complaints
  and "normal labs" — helps coach hold the complexity without forcing a single diagnosis.
