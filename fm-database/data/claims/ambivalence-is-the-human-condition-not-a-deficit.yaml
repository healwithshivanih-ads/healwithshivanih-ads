slug: ambivalence-is-the-human-condition-not-a-deficit
statement: Ambivalence is not a character flaw or sign of indifference; it is a normal
  human condition involving conflicting motives that does not always need to be resolved.
evidence_tier: strong
rationale: Quoted directly from Dr. William Miller's book 'On Second Thought,' a foundational
  text by a leading motivational interviewing researcher. The framing of ambivalence
  as normative is well-supported in MI literature.
coaching_translation: Reassure clients that feeling 'of two minds' is completely normal
  — it's not weakness or lack of willpower. Naming and exploring the ambivalence is
  itself a productive coaching move.
caveats:
- Source is a book quote relayed in a group discussion, not a direct primary study
  citation.
