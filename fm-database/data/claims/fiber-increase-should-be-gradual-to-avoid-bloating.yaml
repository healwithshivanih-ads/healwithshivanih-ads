slug: fiber-increase-should-be-gradual-to-avoid-bloating
statement: Fiber intake should be increased gradually in 2–5 g increments to minimize
  GI side effects such as bloating and gas; bloating is most often caused by too much
  fiber too quickly or the wrong type, not an inherent intolerance.
evidence_tier: plausible_emerging
rationale: Speaker gives specific clinical guidance on incremental increases. Consistent
  with standard dietary practice. No RCT cited; single-expert source.
coaching_translation: 'If a client says fiber makes them bloat, reassure them: it''s
  almost always about quantity or type, not a permanent intolerance. Help them start
  small — 2 to 5 grams more per day — and build slowly.'
caveats:
- Specific increment (2–5 g) is speaker's clinical heuristic, not from a cited study.
