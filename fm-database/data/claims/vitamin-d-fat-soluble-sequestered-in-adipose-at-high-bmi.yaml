slug: vitamin-d-fat-soluble-sequestered-in-adipose-at-high-bmi
statement: Because vitamin D is fat-soluble, individuals with a higher BMI (and therefore more adipose tissue) have greater
  sequestration of vitamin D in fat, reducing its bioavailability and requiring higher supplemental doses.
evidence_tier: strong
rationale: The fat-soluble nature of vitamin D and its sequestration in adipose tissue is well-documented; epidemiological
  studies consistently show an inverse relationship between BMI and serum 25-OH vitamin D levels at equivalent intakes.
coaching_translation: Vitamin D can get 'trapped' in body fat. This means people with more body fat may need more vitamin
  D to achieve the same blood levels as someone with less body fat.
