slug: chlorella-binds-prevents-mercury-absorption
statement: Chlorella used as a mouth rinse before and after dental amalgam removal,
  and taken orally for 5 days post-procedure, can help bind mercury in the mouth and
  gut and prevent its absorption.
evidence_tier: fm_specific_thin
rationale: Chlorella's heavy metal binding properties are referenced in the FM literature
  and some small studies, but large clinical trials specifically for amalgam removal
  protocols are lacking.
coaching_translation: Swishing with chlorella solution before and after your dental
  appointment can help capture mercury in your mouth before it enters your system.
  Continuing to take it for several days afterward provides additional protection.
out_of_scope_notes: Do not take within 2 hours of activated charcoal. Clinician should
  supervise dosing.
caveats:
- FM-specific protocol; limited RCT evidence for this specific use case.
- Adult protocol only.
