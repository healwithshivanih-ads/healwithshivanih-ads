  quote: If you are like many of my patients, you may encounter the new symptom of
    PMS when you stop the pill. It is because you are having real cycles for the first
    time in what may have been years. Your own hormones estradiol and progesterone
    are so beneficial that they are worth putting up with a little PMS. PMS responds
    incredibly well to the treatments we will discuss in Chapter 8.
