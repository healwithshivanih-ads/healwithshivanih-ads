slug: briden-post-pill-pms-is-real-cycles-returning
statement: New-onset premenstrual syndrome after stopping hormonal birth control reflects
  the body's re-encounter with natural cyclical hormone fluctuations after a period
  of flat synthetic-hormone dosing. The cyclical experience itself is normal and physiologically
  beneficial — what is being noticed is the amplitude of natural hormone change, not
  pathology — and responds well to the standard PMS treatments (magnesium glycinate,
  B6, dietary moderation of refined sugar and alcohol).
evidence_tier: plausible_emerging
rationale: Clinical observation across naturopathic and integrative practice. Briden's
  framing matches the consistent finding that PMS prevalence rises in the first year
  after stopping CHC and then tends to stabilise as women adapt to their own cycle
  or implement supportive nutrition and stress management.
coaching_translation: If you suddenly have PMS after stopping the pill, do not assume
  you have a new hormone problem — it is often your real cycle coming back online
  after years of being flat. The cycling is good for you (you make protective progesterone).
  Magnesium and B6, less sugar and alcohol, and a few months of patience usually settle
  it.
caveats:
- Severe PMS or PMDD warrants clinical evaluation — could indicate underlying thyroid
  dysfunction, low progesterone phenotype, or a histamine/MCAS sensitivity.
- If PMS is severely disabling, do not just tough it out — refer.
