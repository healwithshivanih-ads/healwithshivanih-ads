slug: type-2-diabetes-reversible-with-lifestyle
statement: Type 2 diabetes can be completely reversed with exercise, diet, and lifestyle
  modification.
evidence_tier: plausible_emerging
rationale: Remission of T2D with intensive lifestyle intervention is supported by
  landmark trials (e.g., DiRECT trial), though 'complete reversal' language is stronger
  than typical clinical consensus. Plausible_emerging is appropriate as remission
  — not always permanent reversal — is the established term.
coaching_translation: With consistent effort in diet, movement, and lifestyle habits,
  it is possible to bring blood sugar back into a healthy range and reduce or eliminate
  the need for medication — but always work with your doctor on this.
caveats:
- '''Reversal'' is contested in clinical literature; ''remission'' is preferred. Effect
  size depends on disease duration and baseline HbA1c. Coaching does not manage T2D
  — refer to clinician.'
- '''Reverse completely'' is aspirational language; clinical term is ''remission''.
  Individual results vary.'
- Source is a coaching toolkit, not primary literature.
out_of_scope_notes: Medication reduction or discontinuation decisions are strictly
  within clinician scope.
