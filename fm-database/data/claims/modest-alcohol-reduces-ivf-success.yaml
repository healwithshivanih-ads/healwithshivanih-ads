slug: modest-alcohol-reduces-ivf-success
statement: More than 4 alcoholic drinks per week is associated with a 16% lower live
  birth rate in IVF (Harvard 2011, n=2000+), and any alcohol consumption in the week
  before IVF doubles miscarriage rate in one earlier study. Effect on natural conception
  is smaller and inconsistent below 5 drinks/week but is detectable in women over
  30.
evidence_tier: plausible_emerging
