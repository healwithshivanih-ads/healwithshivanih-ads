  location: Chapter 11 — The Egg Quality Diet, pg 162
  quote: Compared to women reporting fewer than 4 alcoholic drinks per week, women
    drinking more than this amount had a 16 percent lower chance of a live birth.
rationale: Coachable alcohol-limit benchmark for IVF prep.
