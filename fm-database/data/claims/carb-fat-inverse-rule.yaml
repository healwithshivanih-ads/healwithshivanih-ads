slug: carb-fat-inverse-rule
statement: 'Carbohydrate and fat should be eaten in opposing amounts: as carbs go
  up, trim fat (and slightly protein) by choosing leaner meats and less oil — never
  combine a high-carb and high-fat meal.'
evidence_tier: plausible_emerging
rationale: A practical macro rule Ruscio gives; mechanistic rationale around metabolic
  load.
coaching_translation: Pair higher-carb meals with less fat, and higher-fat meals with
  fewer carbs — don't stack both.
