  quote: Going on a rebounder after eating in order to drop the blood sugar — overall
    these patients were making their systems more stressed and it wasn't really good
    advice in general to exercise vigorously immediately after eating. For a lot of
    people it's their nervous system that's actually making the bigger contributor
    to what their resting glucose is.
