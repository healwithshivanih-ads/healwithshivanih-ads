slug: cgm-post-meal-vigorous-exercise-can-backfire
statement: Continuous-glucose-monitor (CGM) coaching that prescribes vigorous post-meal
  exercise to flatten glucose spikes can backfire in chronically stressed clients.
  The intervention forces an additional acute stress on already-dysregulated nervous
  and metabolic systems and can worsen baseline glycaemic control over weeks. The
  bigger driver of resting glucose in many cases is autonomic dysregulation, not refined-carbohydrate
  intake — addressing the nervous system upstream often does more than chasing the
  postprandial number.
evidence_tier: plausible_emerging
