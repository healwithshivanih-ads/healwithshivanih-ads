slug: boric-acid-chronic-yeast-vaginitis
statement: Boric acid 600 mg in a vaginal suppository twice daily for two weeks outperforms
  conventional antifungal creams in chronic vaginal yeast infection (98% symptom resolution
  vs 52%; 2% vs 100% abnormal microscopy at follow-up). For chronic recurrent cases,
  the regimen extends to twice-daily for four months, with maintenance during menstruation.
  Side effects are rare — mainly labial burning from leakage. Coach refers — clinician-prescribed
  only.
evidence_tier: strong
