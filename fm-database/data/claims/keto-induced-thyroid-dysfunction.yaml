slug: keto-induced-thyroid-dysfunction
statement: Ketogenic-diet-induced hypothyroidism is a real and substantial side effect.
  In epileptic children on therapeutic ketogenic diets the rate of medication-requiring
  hypothyroidism is approximately 27% versus a baseline of roughly 1 in 1,200 in non-keto
  controls. Recent adult Atkins-diet studies show parallel thyroid dysfunction. The
  mechanism — when insulin levels drop too low, the brain can read this as a famine
  signal and centrally inhibit thyroid hormone production / activation, even when
  caloric energy is abundant from other sources. Coach implication — for clients with
  Hashimoto's, low T3, or family history of thyroid disease, avoid sustained strict
  ketogenic diets; cyclical or moderate-carb approaches are safer.
