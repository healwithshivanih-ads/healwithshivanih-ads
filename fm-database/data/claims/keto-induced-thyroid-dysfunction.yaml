  quote: Kids don't really get thyroid disease. Like the rates of that amongst adolescent
    kids is like one out of every 1,200. But on ketogenic diets, the rate of marked
    hypothyroidism that requires medication is about like 27%. There's a recent study
    on adults on Atkins diet showing the same kind of a process — many saw thyroid
    dysfunction.
rationale: Pushes back on blanket keto recommendations for thyroid clients; gives
  the magnitude figure (27% vs 0.08%) to back the position.
