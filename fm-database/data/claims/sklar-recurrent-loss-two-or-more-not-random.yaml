slug: sklar-recurrent-loss-two-or-more-not-random
statement: Sklar's clinical position is that two or more miscarriages should never
  be dismissed as random bad luck — recurrent loss almost always points to an identifiable,
  testable, and treatable root cause (autoimmune, thrombophilic, methylation, microbiome,
  hormonal, or thyroid) that the standard miscarriage workup is too narrow to detect.
