slug: fecal-calprotectin-differentiates-ibs-from-ibd
statement: 'Fecal calprotectin differentiates inflammatory bowel disease (IBD) from irritable bowel syndrome (IBS): levels
  >200 μg/g confirm intestinal inflammation consistent with IBD, while normal levels make IBS more likely.'
evidence_tier: strong
rationale: Fecal calprotectin as a non-invasive marker for distinguishing IBD from IBS is well-validated in peer-reviewed
  literature and endorsed in clinical guidelines. This is a well-established diagnostic use.
coaching_translation: A stool test called calprotectin can help distinguish whether gut symptoms are due to irritable bowel
  syndrome (IBS) or inflammatory bowel disease (IBD). This is a useful test to discuss with your doctor.
out_of_scope_notes: Ordering and interpreting fecal calprotectin is a clinician task. Coaches should recommend clients discuss
  this with their GP or gastroenterologist.
caveats:
- Ordering and interpreting this test is outside coaching scope.
- Cut-offs may vary by laboratory.
