- id: efrati-insidetracker-podcast-2024-cognition
  location: Podcast — when to start
  quote: You know we are speaking about longevity and life quality. Actually decline
    begins after the age of 45 — it is actually the age of 40 when we start to feel
    the decline. People are not willing to take normal for their age as granted anymore
    — I want to function in my maximal capacity for as long as possible.
rationale: Helps clients understand HBOT is not just for the elderly.
