slug: emotional-stress-may-show-as-patterns-before-labs
statement: Emotional stress is described as sometimes appearing first as fatigue,
  dysautonomia, inflammatory trends, and hormonal flattening before obvious lab abnormalities.
evidence_tier: fm_specific_thin
rationale: Subclinical functional dysregulation preceding lab changes is a core FM
  concept with biological plausibility; direct peer-reviewed support at coaching level
  is thin. Source is expert consensus without primary citations.
coaching_translation: Clients may present with real symptoms before labs are 'out
  of range'; symptom patterns are valuable data in functional coaching.
caveats:
- Source is expert consensus without direct citations.
- Red flags must still be referred to clinicians regardless of lab status.
