slug: food-allergy-prime-causative-factor-pu
statement: Food allergy is identified as a prime causative factor in peptic ulcer
  disease; PU lesions are histologically similar to the Arthus reaction, and 98% of
  PU patients had coexisting upper/lower respiratory tract allergic disease.
evidence_tier: fm_specific_thin
rationale: The 98% co-prevalence figure and histological Arthus-reaction analogy are
  cited in this FM textbook but lack robust RCT replication in mainstream gastroenterology
  literature; classified as FM-specific.
coaching_translation: Undetected food sensitivities — especially to milk — may be
  driving your ulcer symptoms. An elimination diet is worth exploring.
caveats:
- 98% co-prevalence statistic is from FM literature; not widely replicated in mainstream
  gastroenterology RCTs.
- Source is a textbook; treat as FM-specific.
