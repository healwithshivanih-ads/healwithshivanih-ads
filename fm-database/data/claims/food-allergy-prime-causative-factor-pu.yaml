  location: Nutritional Factors — Food allergy, p. 782
  quote: 'Food allergy: this is the prime causative factor. PU lesions are histologically
    similar to Arthus reaction (local inflammatory response caused by deposition of
    immune complexes in tissues). Ninety-eight percent of patients with PU had coexisting
    lower and upper respiratory tract allergic disease.'
