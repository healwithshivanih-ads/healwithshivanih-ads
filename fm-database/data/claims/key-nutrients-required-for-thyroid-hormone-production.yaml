slug: key-nutrients-required-for-thyroid-hormone-production
statement: Thyroid hormone production requires adequate intake of iron, iodine, tyrosine,
  zinc, selenium, and vitamins E, B2, B3, B6, C, and D.
evidence_tier: strong
rationale: 'Well-established biochemistry: iodine and tyrosine are substrate for T4/T3
  synthesis; TPO (selenium-dependent) catalyzes the process; iron is needed for TPO
  activity; B vitamins and antioxidant vitamins support the enzymatic pathway.'
coaching_translation: Your thyroid needs a wide range of nutrients to make hormones.
  Deficiencies in any of these — especially iodine, selenium, zinc, or iron — can
  impair thyroid function.
caveats:
- Source is an educational toolkit; no specific study cited per nutrient.
