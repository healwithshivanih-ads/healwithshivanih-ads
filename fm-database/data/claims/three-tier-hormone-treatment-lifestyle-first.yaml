slug: three-tier-hormone-treatment-lifestyle-first
statement: 'Welch recommends a three-tier treatment hierarchy for hormonal imbalance: (1) diet, lifestyle,
  and stress reduction first; (2) herbal and natural remedies when additional support is needed; (3) pharmaceutical,
  surgical, or bioidentical hormones only when first two tiers are insufficient or symptoms are unbearable.'
evidence_tier: plausible_emerging
rationale: This reflects an integrative medicine principle consistent with naturopathic and functional
  medicine frameworks — start with the least invasive, most foundational interventions before escalating
  to pharmaceutical or surgical tools.
coaching_translation: The most powerful and safest starting point for hormonal imbalance is always lifestyle
  — what you eat, how you sleep, how you handle stress. Herbs and natural remedies are the second layer.
  Hormones — even bioidentical ones — come last, not first.
out_of_scope_notes: Prescribing decisions (tiers 2 and 3 involving herbal protocols or pharmaceutical/bioidentical
  hormones) require a qualified practitioner. Coach applies tier 1 — lifestyle, diet, and stress reduction.
caveats:
- This hierarchy is a clinical philosophy, not an evidence-based protocol supported by RCTs comparing
  tier-ordered approaches. Individual clinical circumstances may warrant earlier pharmaceutical intervention.
