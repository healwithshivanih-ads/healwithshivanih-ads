slug: statin-increases-neuropathy-risk
statement: Statin therapy may increase the risk of peripheral neuropathy.
evidence_tier: plausible_emerging
rationale: The document asserts this association. Some observational studies and case
  reports support this, and cholesterol's role in myelin maintenance provides a plausible
  mechanism. However, large-scale evidence is less consistent than for myalgia or
  diabetes.
coaching_translation: Some people on statins report numbness or tingling in their
  hands and feet. While not common, it's worth tracking and reporting to a doctor.
caveats:
- Evidence is primarily from observational studies and case series.
- Association does not equal causation.
- Source is a lecture synthesis; verify with primary literature.
