slug: pgta-still-useful-when-embryo-count-low
statement: Even with very few embryos from low-yield IVF cycles, PGT-A (preimplantation
  genetic screening for aneuploidy) remains useful because it avoids the time, expense,
  and emotional cost of transferring chromosomally abnormal embryos that cannot implant
  or that will miscarry. The test does not improve success rate when embryos are scarce
  but it directs the patient's next decision — whether to retest, switch protocols,
  or move to donor egg.
