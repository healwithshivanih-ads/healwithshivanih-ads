  location: minute 40:00 — Palter on PGT-A with few embryos
  quote: If you have nothing to choose between, it's not going to impact your success
    rate, but it's going to help you understand what you're working with, and it's
    going to prevent months of wasted time transferring embryos that aren't going
    to work.
rationale: Decision-support claim for AMA clients weighing PGT-A cost vs benefit at
  low embryo counts.
