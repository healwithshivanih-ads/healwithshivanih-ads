slug: tg-hdl-ratio-outperforms-fasting-glucose
statement: |
  The triglyceride-to-HDL ratio outperforms fasting glucose as a marker
  of insulin resistance and cardiovascular risk.
evidence_tier: strong
rationale: |
  Multiple cohort studies (Vega et al., McLaughlin et al., Kannel et al.)
  show TG:HDL ratio correlates strongly with insulin resistance, small
  dense LDL, and cardiovascular risk. Cutoffs vary by ethnicity:
  >3.0 in Caucasian/Mexican-American populations, >2.0 in African-American.
  Outperforms fasting glucose specifically for metabolic-syndrome detection.
coaching_translation: |
  "Your triglyceride-to-HDL ratio tells us more about metabolic health
  than fasting glucose alone. A practical target is under 2 for women
  and under 2.8 for men. Ask your clinician for a lipid panel that
  includes both."
out_of_scope_notes: |
  Coach educates on what the ratio means and why it matters; lab ordering
  and interpretation belong to the clinician.
caveats:
  - ethnic variation in cutoffs is significant (Indian / South Asian data thin)
  - fasting state affects triglyceride values
