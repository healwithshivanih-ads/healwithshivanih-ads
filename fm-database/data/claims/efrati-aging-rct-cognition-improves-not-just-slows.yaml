  quote: We can demonstrate improvement — not slowing the decline — in the cognitive
    domain, all objectively measured by computerised testing — memory, information
    processing speed, executive function, attention. By MRI and DTI we can see improvement
    in the amount of fibre, in the integrity of the fibres, and angiogenesis in the
    brain.
