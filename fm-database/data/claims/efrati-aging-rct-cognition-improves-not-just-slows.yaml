slug: efrati-aging-rct-cognition-improves-not-just-slows
statement: In a randomised controlled trial conducted at the Sagol Center on healthy
  adults aged 65 and older without diabetes or stroke, 60 sessions of HBOT (5 days
  per week for ~12 weeks) produced measurable IMPROVEMENT — not just slowing of decline
  — in computerised cognitive testing covering memory, information processing speed,
  executive function, and attention, alongside MRI evidence of increased white-matter
  fibre integrity and angiogenesis in the brain.
evidence_tier: strong
