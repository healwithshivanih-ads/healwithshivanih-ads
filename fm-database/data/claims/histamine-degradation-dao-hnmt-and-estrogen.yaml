slug: histamine-degradation-dao-hnmt-and-estrogen
statement: DAO and HNMT variants impair the breakdown of histamine, driving headaches,
  gut symptoms and allergy-type reactions. Oestrogen and histamine interact bidirectionally
  — rising oestrogen triggers mast-cell histamine release — so histamine load should
  be considered whenever oestrogen symptoms appear.
