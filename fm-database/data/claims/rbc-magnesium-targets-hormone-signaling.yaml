slug: rbc-magnesium-targets-hormone-signaling
statement: Red blood cell (RBC) magnesium — targeted to the high 5s or low 6s mg/dL
  — is the preferred way to assess magnesium status for hormonal health; serum magnesium
  alone is insufficient.
evidence_tier: plausible_emerging
rationale: RBC magnesium as a superior marker to serum magnesium is supported by functional
  medicine literature and some conventional research, though optimal ranges vary by
  lab and are not universally standardized.
coaching_translation: Standard blood tests for magnesium (serum) often miss deficiency.
  Ask your doctor about a 'red blood cell magnesium' test, which gives a more accurate
  picture of what's actually available in your cells.
out_of_scope_notes: Lab target interpretation and result-based supplementation adjustments
  are out of coaching scope — refer to clinician.
caveats:
- Exact target ranges (high 5s/low 6s) are clinician-specific and not universally
  standardized.
- Source is expert consensus, not primary literature.
