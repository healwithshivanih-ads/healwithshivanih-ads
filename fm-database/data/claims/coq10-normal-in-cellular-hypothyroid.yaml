slug: coq10-normal-in-cellular-hypothyroid
statement: When intracellular T3 is downregulated as part of an adaptive cell-defense
  response, CoQ10 measured in serum often appears normal or even elevated — not deficient
  — because mitochondria are not consuming it. Reflexively prescribing high-dose CoQ10
  in this state misses the root cause (the cell is intentionally throttling throughput)
  and rarely resolves fatigue.
evidence_tier: plausible_emerging
