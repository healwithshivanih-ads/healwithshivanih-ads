  location: Podcast — CoQ10 in cellular hypothyroidism
  quote: CoQ10 is often not deficient when somebody has downregulated mitochondria
    because they're not using it. When you have downregulation of T3 in the cell,
    you actually have more CoQ10 because they can't use it efficiently.
