slug: edc-exposure-most-sensitive-in-fetal-and-puberty-windows
statement: 'The most sensitive windows of exposure to endocrine-disrupting

  chemicals are fetal development and puberty — periods of rapid

  hormone-driven growth and tissue differentiation when EDC effects

  on later metabolic, reproductive, and endocrine health are

  disproportionately large.

  '
evidence_tier: strong
rationale: 'Developmental origins of health and disease (DOHaD) research and

  endocrinology literature consistently identify in utero and pubertal

  windows as periods of heightened EDC vulnerability, with effects

  on sex-organ development, fertility, metabolic programming, and

  thyroid function persisting into adulthood.

  '
coaching_translation: 'EDC exposure matters most during the body''s biggest hormone-driven

  building phases — pregnancy and puberty. For clients who are

  pregnant, planning pregnancy, or raising children, the highest-leverage

  swaps are usually around food packaging, personal care, and household

  products in those windows.

  '
caveats:
- Coach does not give pregnancy-specific clinical guidance — defer detailed pregnancy
  nutrition and exposure questions to the OB or pediatrician.
out_of_scope_notes: 'Pregnancy-specific clinical management is outside coaching scope.

  '
