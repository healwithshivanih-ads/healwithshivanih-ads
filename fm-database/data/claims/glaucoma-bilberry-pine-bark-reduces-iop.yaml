sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 54 — Glaucoma, pg 977
  quote: A combination of bilberry anthocyanoside extract (160 mg) and pine bark extract
    (80 mg) was studied in 38 asymptomatic subjects with increased intraocular pressure.
    After two months of supplementation with the flavonoids, mean intraocular pressure
    decreased from a baseline of 25.2 mm Hg to 22.2 mm Hg. After an additional three
    months of treatment, 19 of the 20 patients taking the flavonoids showed decreased
    intraocular pressure.
