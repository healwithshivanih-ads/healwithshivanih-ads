slug: glaucoma-bilberry-pine-bark-reduces-iop
statement: A combination of bilberry anthocyanoside extract (160 mg) and pine bark
  extract (80 mg) lowered mean intraocular pressure from 25.2 to 22.2 mm Hg after
  two months and improved retinal blood flow in 19 of 20 asymptomatic subjects with
  elevated IOP after five months, with no observed side effects. Anthocyanosides and
  proanthocyanosides exert a vitamin-C-sparing effect, stabilise the collagen matrix,
  and prevent enzymatic cleavage of collagen.
evidence_tier: plausible_emerging
