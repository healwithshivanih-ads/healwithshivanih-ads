slug: ad-phthalate-tslp-elevation
statement: Phthalates — present in fragrances, personal care products, and plastics
  — stimulate TSLP secretion from skin and may play a role in the pathogenesis of
  atopic dermatitis.
evidence_tier: plausible_emerging
rationale: TSLP levels rise when stimulated by phthalates; pervasive environmental
  exposure supports a plausible causal link that is not yet fully established by clinical
  trials.
coaching_translation: Reducing your exposure to phthalates (found in fragranced products,
  plastic packaging, and some cosmetics) may help calm the immune response driving
  eczema.
caveats:
- Causal evidence is largely mechanistic and epidemiologic; RCT avoidance data are
  lacking
