slug: vitamin-d-deficiency-300-percent-t1dm-risk
statement: Vitamin D-deficient children have a 300% increased risk of T1DM; children
  supplemented with 2000 IU vitamin D daily (from cod liver oil) have an 80% reduced
  risk.
evidence_tier: plausible_emerging
rationale: Observational cohort data (e.g., EURODIAB, Finnish birth cohort); mechanistic
  basis is vitamin D's immunomodulatory effect on beta-cell autoimmunity. No RCT directly
  for T1DM prevention.
coaching_translation: Ensuring adequate vitamin D from early childhood may significantly
  reduce autoimmune diabetes risk; cod liver oil is the preferred source.
caveats:
- Evidence from observational studies; RCT confirmation for T1DM primary prevention
  is lacking.
- Dosing in children should be physician-supervised.
