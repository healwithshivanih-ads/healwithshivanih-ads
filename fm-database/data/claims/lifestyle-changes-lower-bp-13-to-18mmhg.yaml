slug: lifestyle-changes-lower-bp-13-to-18mmhg
statement: A comprehensive lifestyle intervention combining dietary changes, weight
  loss, and regular exercise can lower systolic blood pressure by 13–18 mmHg.
evidence_tier: strong
rationale: Supported by DASH trial and related studies demonstrating substantial blood
  pressure reduction from combined lifestyle interventions.
coaching_translation: Lifestyle changes are powerful medicine for blood pressure.
