slug: probiotic-triple-therapy-framework
statement: Ruscio's probiotic approach uses all three categories together — a Lactobacillus/Bifidobacterium
  blend, Saccharomyces boulardii, and a soil-based/spore (Bacillus) probiotic — because
  each acts through different mechanisms and they complement one another.
evidence_tier: plausible_emerging
rationale: The book's Step-2 'Support' framework; each category has its own trial
  evidence.
coaching_translation: Rather than one probiotic, use all three types together — a
  lacto/bifido blend, S. boulardii, and a soil-based/spore one.
