slug: who-ashwagandha-safety-thyroid-pregnancy-maoi
statement: 'The WHO monograph on Radix Withaniae (Vol 4) documents official safety guidance: (1) contraindicated
  in pregnancy due to potential uterotonic/abortifacient activity; (2) should be used with caution in
  patients on thyroid hormone therapy as it may elevate T3 and T4 levels; (3) potential interaction with
  MAOI antidepressants; (4) may potentiate sedatives and CNS depressants; (5) hypersensitivity to Solanaceae
  is a contraindication.'
evidence_tier: plausible_emerging
rationale: WHO Vol 4 safety section compiles pharmacological evidence and case data for contraindications
  and interactions. Thyroid-hormone elevation has been documented in animal and some human studies cited
  in the monograph.
coaching_translation: Ashwagandha is contraindicated in pregnancy and requires caution with thyroid medication,
  MAOIs, and sedatives — these are WHO-documented safety boundaries, not theoretical concerns.
out_of_scope_notes: 'Thyroid-elevating effect: patients on levothyroxine or with hyperthyroidism/Graves''
  disease should only use ashwagandha under clinician supervision with regular thyroid function monitoring.'
