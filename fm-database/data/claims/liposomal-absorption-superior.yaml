slug: liposomal-absorption-superior
statement: Liposomal supplement delivery (nutrients encapsulated in microscopic fat
  vesicles) provides superior cellular bioavailability compared to standard capsule
  or tablet forms.
evidence_tier: plausible_emerging
rationale: Liposomal encapsulation protects nutrients from GI degradation and facilitates
  direct cellular uptake via membrane fusion. Some clinical evidence exists for vitamin
  C and glutathione, though head-to-head comparisons across all nutrients are limited.
coaching_translation: When choosing supplement forms, prioritize liquid/liposomal
  > lozenge > powder > capsule > tablet, especially for sensitive individuals or those
  with digestive issues.
caveats:
- Evidence strongest for vitamin C and glutathione; weaker for other nutrients
- Consumer book source
