sources:
- id: pizzorno-textbook-gi
  location: Insomnia — Botanicals with Sedative Properties
  quote: 'Valeriana officinalis root: Most clinical research; improves sleep quality
    and sleep latency (time required to fall asleep); as effective in reducing sleep
    latency as small doses of barbiturates or benzodiazepines. Although these drugs
    also increase morning sleepiness, valerian usually reduces morning sleepiness.'
