slug: cyp450-polymorphisms-explain-differential-drug-response
statement: Genetic polymorphisms in CYP450 enzymes explain why some individuals are
  hypersensitive to drugs or chemicals while others show no effect at equivalent doses.
evidence_tier: strong
rationale: CYP pharmacogenomics is a well-established field. CYP2D6 poor vs. ultra-rapid
  metabolizer status is the basis for codeine/morphine variation; CYP1A2 polymorphisms
  explain caffeine metabolism differences. Multiple RCTs and population genetics studies
  confirm this.
coaching_translation: Your genetic blueprint influences how quickly your liver processes
  medications and chemicals. Some people are fast processors (they barely feel drugs
  or caffeine), while others are slow processors (drugs and chemicals linger much
  longer and hit harder). This explains a lot about individual variation.
caveats:
- 'Codeine→morphine example: CYP2D6 is the primary enzyme; the transcript mentions
  CYP1B1 for caffeine which should be CYP1A2 — possible transcription or lecture error.
  Coaches should not attempt to interpret genetic test results; refer to clinician.'
out_of_scope_notes: Genetic testing interpretation, pharmaceutical dosing adjustments
  based on CYP polymorphisms — clinician scope only.
