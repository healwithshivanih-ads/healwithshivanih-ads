slug: nhs-contact-dermatitis-identify-and-avoid-trigger
statement: Contact dermatitis usually clears completely if the offending irritant
  or allergen is identified and avoided — soaps, detergents, solvents, frequent water
  contact, nickel and some cosmetics are the most common triggers.
