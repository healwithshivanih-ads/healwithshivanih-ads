slug: leaky-gut-drives-systemic-inflammation
statement: Leaky gut (intestinal permeability) drives chronic, low-grade systemic
  inflammation via LPS endotoxemia, NF-κB activation, and mast cell activation.
evidence_tier: plausible_emerging
rationale: 'Mechanistically well-supported: zonulin, LPS/TLR-4, and NF-κB pathways
  are established in peer-reviewed literature. However, the clinical entity ''leaky
  gut'' as a diagnostic category remains debated and the source is a synthesis document.'
coaching_translation: A damaged gut lining can trigger inflammation throughout the
  body — not just digestive symptoms, but joint pain, skin issues, brain fog, and
  mood changes.
out_of_scope_notes: Lab interpretation (zonulin, calprotectin) and clinical diagnosis
  are clinician scope.
caveats:
- '''Leaky gut'' as a standalone diagnosis is not universally accepted in conventional
  medicine. Source is educational synthesis.'
