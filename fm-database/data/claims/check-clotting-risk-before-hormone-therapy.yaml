slug: check-clotting-risk-before-hormone-therapy
statement: Factor V and Factor II (prothrombin) variants raise venous-thrombosis risk,
  and combining that risk with hormone therapy increases the chance of a clot/DVT.
  Genetic clotting status (plus family history of DVT) is worth knowing before a clinician
  decides on HRT.
evidence_tier: plausible_emerging
rationale: If a client on/considering HRT has a personal or family clotting history,
  encourage them to raise clotting-risk testing with their prescriber.
coaching_translation: If a client on/considering HRT has a personal or family clotting
  history, encourage them to raise clotting-risk testing with their prescriber.
out_of_scope_notes: Assessing clotting risk and prescribing HRT are strictly clinician
  decisions.
