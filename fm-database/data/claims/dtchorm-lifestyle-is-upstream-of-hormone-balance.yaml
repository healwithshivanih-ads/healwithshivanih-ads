slug: dtchorm-lifestyle-is-upstream-of-hormone-balance
statement: Hormone labs are one data point, not the whole story; the context around
  them matters as much as the value. Hormones stay unbalanced when the upstream drivers
  are unaddressed — chronic stress, poor diet, and impaired detoxification/elimination
  of the hormones and xenoestrogens a person is exposed to. This upstream lifestyle
  work is precisely the coach's high-value role.
evidence_tier: plausible_emerging
rationale: It reframes the client away from lab-value fixation and toward the daily
  behaviours the coach can actually influence.
coaching_translation: Coach the upstream levers — stress regulation, blood-sugar-steady
  eating, movement, and supporting elimination (fibre, bowel regularity, hydration)
  — so the client's whole hormonal picture improves, rather than chasing a single
  lab number.
out_of_scope_notes: Prescribing hormones or supplements to "correct" a lab value belongs
  to the clinician.
