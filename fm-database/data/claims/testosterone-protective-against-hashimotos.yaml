  quote: Testosterone is very protective against autoimmune. When we give men testosterone,
    their incidence of autoimmune, specifically this study looked at Hashimoto's,
    their Hashimoto's incidence goes down and those men with Hashimoto's their antibodies
    went down too with TRT. Women, I don't even want you below a 50 for total testosterone.
rationale: Lets coach surface a real but under-tested issue at intake — low motivation
