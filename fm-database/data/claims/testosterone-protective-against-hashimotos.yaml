slug: testosterone-protective-against-hashimotos
statement: Testosterone is autoimmune-protective and partially explains why Hashimoto's
  prevalence is much higher in women than men. In one cited study, men given testosterone
  replacement therapy showed reduced incidence of Hashimoto's and existing antibodies
  dropped. Hornaman flags her optimal totals — women total testosterone ≥50 ng/dL
  (NOT <45); men total testosterone ≥600 ng/dL (NOT 280-300 which is conventionally
  called "normal" for older men). Coach role — flag low-testosterone clinical pattern
  (low motivation/"GSD", muscle-building failure, low libido, fat-mass increase) for
  referral to a clinician who tests properly; coach does not prescribe TRT.
evidence_tier: confirm_with_clinician
