slug: postnatal-separation-impairs-relational-patterns
statement: Early postnatal separation from the mother — such as NICU admission, incubator
  care, or delayed skin-to-skin contact — creates an attachment disruption that manifests
  throughout life as difficulty tolerating closeness, approach-avoidance relational
  patterns, and feelings of not being 'enough'.
evidence_tier: plausible_emerging
rationale: Attachment theory and some perinatal psychology research support the importance
  of early mother-infant contact. NICU admission and separation are associated with
  attachment difficulties in some studies. However, the universal, deterministic framing
  in the document overstates the evidence.
coaching_translation: If you were separated from your mum early — perhaps in a NICU
  or incubator — you might notice it's hard to feel fully safe in close relationships.
  This is a real impact, and it can shift with the right support.
caveats:
- Source is seminar transcript, low quality.
- Not all individuals with early separation develop these patterns.
- Deterministic framing should be avoided with clients.
