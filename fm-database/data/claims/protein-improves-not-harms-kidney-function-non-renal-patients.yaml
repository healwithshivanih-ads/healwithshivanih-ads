slug: protein-improves-not-harms-kidney-function-non-renal-patients
statement: In adults without pre-existing kidney disease, higher dietary protein intake
  does not damage the kidneys; multiple randomized trials and meta-analyses show neutral-to-positive
  effects on glomerular filtration rate. Type 2 diabetes leading to dialysis is driven
  by chronic hyperglycemia and carbohydrate overload, not by dietary protein. Clients
  with established CKD remain a separate population requiring individualized clinician
  guidance.
evidence_tier: strong
