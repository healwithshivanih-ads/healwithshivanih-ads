  location: Podcast — kidney myth segment
  quote: Protein improves glomerular filtration rate, it improves kidney function.
    When people go on dialysis from type 2 diabetes I rest assured that it is not
    from protein it is from an overconsumption of carbohydrates.
rationale: Frequent client objection in India where doctors still warn against protein
  for "kidney load"; coach can cite the meta-analytic evidence.
