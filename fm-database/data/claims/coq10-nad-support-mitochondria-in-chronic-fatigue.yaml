slug: coq10-nad-support-mitochondria-in-chronic-fatigue
statement: CoQ10, NAD+ precursors, B-vitamins, and carnitine support mitochondrial
  function and are key interventions for chronic fatigue and burnout.
evidence_tier: plausible_emerging
rationale: CoQ10's role in mitochondrial electron transport chain and its RCT evidence
  in fibromyalgia and CFS is established. NAD+ precursors (NMN, NR) have emerging
  evidence. Carnitine's role in fatty acid transport and fatigue has some RCT support.
  The combined protocol is FM-standard but individual component evidence varies.
coaching_translation: Your mitochondria are your cellular power plants. Nutrients
  like CoQ10, B-vitamins, and carnitine help keep them running efficiently—especially
  important when chronic stress has depleted your energy reserves.
caveats:
- Dosing of these compounds (especially NAD+ precursors) should be clinician-guided.
- Not a replacement for addressing underlying stress drivers.
- Source is educational synthesis.
