slug: saturated-fat-raises-ldl-replacing-with-mufa-pufa-lowers-ldl
statement: Saturated fat raises LDL cholesterol; replacing saturated fat with monounsaturated and polyunsaturated fatty acids
  (especially from fish) lowers cholesterol and LDL — supported by Level A evidence.
evidence_tier: strong
rationale: Level A evidence cited explicitly by clinician. Supported by AHA dietary guidelines and multiple meta-analyses
  of fat replacement trials.
coaching_translation: Swapping saturated fats (butter, red meat, coconut oil) for healthy fats (olive oil, nuts, fish) is
  one of the most evidence-backed ways to lower LDL cholesterol.
caveats:
- Coconut oil specifically flagged as raising LDL in some patients — individual response varies.
- Source is expert lecture citing Level A evidence — consistent with AHA/ACC dietary guidance.
