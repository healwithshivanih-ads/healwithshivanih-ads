slug: bph-serenoa-repens-90-percent-response
statement: Roughly 90% of men with mild to moderate BPH experience improvement in
  symptoms during the first 4–6 weeks of Serenoa repens (saw palmetto) 320 mg liposterolic
  extract per day, with efficacy comparable to finasteride and tamsulosin but a better
  side-effect profile.
evidence_tier: strong
rationale: Multiple RCTs and comparative trials cited; mechanism involves inhibition
  of DHT binding to androgen receptors, 5-alpha-reductase inhibition, and intraprostatic
  estrogen receptor interference.
coaching_translation: Saw palmetto at 320 mg per day is one of the best-studied natural
  options for prostate symptoms — about 9 in 10 men with mild to moderate BPH respond
  well.
caveats:
- Effect is most pronounced in early BPH; little benefit in advanced cases with large
  residual urine volumes
