slug: black-maca-best-for-sperm-production
statement: In adult rats comparing yellow, red, and black maca ecotypes, black maca
  was the only ecotype that increased daily sperm production and epididymal sperm
  motility at both 7-day and 42-day timepoints. Yellow and red maca did not affect
  sperm parameters. Animal data only — pre-clinical signal supporting colour-specific
  recommendations.
evidence_tier: plausible_emerging
