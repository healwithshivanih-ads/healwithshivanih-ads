slug: blood-pressure-houston-three-drivers
statement: Per cardiologist Mark Houston's framework, the three proximate mechanisms
  underlying essential hypertension are vascular inflammation, oxidative stress, and
  immune-vascular disorders. Each then has dozens of distinct root causes — micronutrient
  deficiencies, toxic exposures, chronic infections, gut dysbiosis, sleep apnoea,
  structural cervical issues, and so on. Lowering blood pressure with medication without
  identifying which of these is driving the response addresses only the surface marker
  and leaves the root cause to manifest as another condition.
