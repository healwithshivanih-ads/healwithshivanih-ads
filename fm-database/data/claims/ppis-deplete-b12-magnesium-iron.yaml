slug: ppis-deplete-b12-magnesium-iron
statement: Proton pump inhibitors (PPIs) reduce gastric acid secretion, impairing
  the absorption of vitamin B12, magnesium, and iron — leading to clinically significant
  deficiencies over time.
evidence_tier: plausible_emerging
rationale: Gastric acid is required for liberation of B12 from food proteins and conversion
  of Fe3+ to Fe2+ for absorption. PPI-induced achlorhydria also impairs magnesium
  absorption via TRPM6/7 channels. Meta-analyses support association with hypomagnesaemia
  and B12 deficiency; iron data are less robust.
coaching_translation: Some medications that reduce stomach acid — like omeprazole
  — can reduce your ability to absorb important nutrients like B12, magnesium, and
  iron. A clinician can assess your levels and advise on repletion.
out_of_scope_notes: Repletion dosing and decision to supplement require clinician
  assessment. Do not advise stopping PPIs.
caveats:
- Source is Instagram/educational content, not primary literature. Association evidence
  is stronger than causation for all three nutrients.
- Verify with clinician before supplementing.
- Source type is website; treat as plausible_emerging.
