slug: alcohol-disrupts-estrogen-metabolism-increases-cancer-risk
statement: Higher alcohol consumption competes with hepatic estrogen metabolism, disrupting
  estrogen clearance and increasing breast and overall cancer risk.
evidence_tier: strong
rationale: National Cancer Institute alcohol and cancer risk data is cited. The mechanism
  of hepatic competition between alcohol and estrogen metabolism is well-established.
coaching_translation: Alcohol is broken down in the same liver pathways as estrogen
  — drinking regularly can back up estrogen processing and raise cancer risk. Limiting
  alcohol is one of the most impactful lifestyle changes for hormone balance.
caveats:
- Individual risk varies; document advises 1-2 servings/day for men and max 1 serving
  up to 4 times/week for women. This is population guidance, not personalized medical
  advice.
- Individual risk varies based on genetics, overall lifestyle, and other factors
- Recommendations differ for men (1–2 servings/day) vs. women (max 1 serving, ≤4x/week)
