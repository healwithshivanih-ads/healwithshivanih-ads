slug: murray-pantethine-diabetic-lipid-correction
statement: Pantethine — the stable active form of vitamin B5 — at 900 mg/day reduces
  triglycerides ~32%, total cholesterol ~19%, LDL ~21%, and raises HDL ~23%. Effects
  are particularly notable in diabetic patients. Pantothenic acid (the standard B5
  form) has little to no lipid-lowering effect; only pantethine works.
evidence_tier: plausible_emerging
rationale: Multiple small clinical trials cited (Bertolini 1986, Gaddi 1984, Coronel
  1991, Da Col 1984). Effect sizes meaningful and consistent. Mechanism — pantethine
  is the active form participating in coenzyme A and ACP, accelerating fatty acid
  oxidation. Generally clean safety profile makes it especially attractive in T2DM
  where niacin requires more monitoring.
coaching_translation: Pantethine (the active form of vitamin B5, NOT the more common
  pantothenic acid) at 900 mg/day improves all four lipid fractions and is especially
  useful in diabetic clients where niacin's metabolic effects require monitoring.
  The cheaper plain pantothenic acid does NOT work — you need pantethine.
caveats:
- Standard pantothenic acid (B5) does NOT have this effect; must be pantethine
- 900 mg/day is the typical effective dose; lower doses less consistent
- Often expensive — practical barrier in India
