slug: kidney-stones-magnesium-b6-reduce-recurrence
statement: Magnesium increases the solubility of calcium oxalate and inhibits calcium
  oxalate and calcium phosphate stone formation. A low urinary magnesium-to-calcium
  ratio is an independent risk factor. Adding vitamin B6 (which reduces oxalate production
  and excretion) to magnesium produces a greater effect than magnesium alone in preventing
  recurrent kidney stones.
evidence_tier: strong
linked_to_topics:
