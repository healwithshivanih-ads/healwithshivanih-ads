sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Kidney Stones chapter, p 1206-1207
  quote: Adequate levels of magnesium have been shown to increase the solubility of
    calcium oxalate and inhibit the formation of both calcium phosphate and calcium
    oxalate stones. However, when it is used in conjunction with vitamin B6, an even
    greater effect is noted. Supplemental vitamin B6 is known to reduce the production
    and urinary excretion of oxalates.
