slug: grief-pattern-linked-to-immune-suppression
statement: Grief and unresolved sadness are described as involving vagal inhibition,
  immune suppression, and oxygen dysregulation.
evidence_tier: fm_specific_thin
rationale: Grief-related immune suppression has some research support (e.g., reduced
  NK cell activity in bereavement); the oxygen dysregulation framing is more FM-specific.
  Source is expert consensus without primary citations.
coaching_translation: Supporting immune nutrition, community connection, breathwork,
  and gentle movement may help clients processing grief.
caveats:
- Source is expert consensus without direct citations.
- Grief-related depression or immune dysfunction requires appropriate professional
  support.
