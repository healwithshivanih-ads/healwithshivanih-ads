slug: visible-physical-signs-can-precede-lab-changes
statement: Visible physical signs can appear before laboratory markers change — outer-eyebrow
  thinning may accompany thyroid dysfunction, acanthosis nigricans and skin tags may signal
  insulin resistance, and a scalloped tongue or hair/skin/nail changes may reflect nutrient
  or physiological stress.
evidence_tier: plausible_emerging
rationale: Several physical findings have recognised associations with systemic dysfunction
  (acanthosis nigricans with hyperinsulinaemia; lateral-eyebrow thinning historically linked
  to hypothyroidism; nutrient-related changes in hair, skin and nails). As patterns viewed alongside
  history and symptoms they can prompt earlier attention — but they are non-specific and require
  clinician evaluation and testing to interpret.
coaching_translation: The body sometimes shows signs before lab numbers move — thinning outer
  eyebrows, dark velvety skin folds or skin tags, a scalloped tongue, changes in hair and nails.
  A coach can notice these and encourage the client to raise them with their doctor — not interpret
  or diagnose them.
caveats:
- Source is Instagram educational content.
- Signs are non-specific; a coach notices and flags to the client's doctor, never diagnoses
  or interprets.
