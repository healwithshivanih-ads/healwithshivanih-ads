slug: correct-albumin-before-calcium-supplementation
statement: Low serum calcium associated with low albumin should prompt protein correction
  before calcium supplementation, because each 1 mg/dL drop in albumin corresponds
  to approximately 0.8 mg/dL apparent decrease in serum calcium.
evidence_tier: strong
rationale: Albumin-corrected calcium is a well-accepted clinical practice. The correction
  formula (add 0.8 mg/dL calcium for every 1 g/dL albumin below normal) is standard
  biochemistry.
coaching_translation: If your calcium looks low on labs but your protein (albumin)
  is also low, fixing your nutrition and protein intake should come first — the low
  calcium reading may be a protein issue, not a calcium issue.
