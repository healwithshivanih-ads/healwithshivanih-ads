slug: non-celiac-gluten-sensitivity-is-validated
statement: 'Non-celiac gluten sensitivity is scientifically validated: four of five
  placebo-controlled trials found gluten itself problematic in non-celiacs, and studies
  using FODMAP-free gluten still provoked reactions, isolating gluten as the cause.'
evidence_tier: plausible_emerging
rationale: Cites five RCTs on NCGS; placebo-controlled design rules out a purely psychosomatic
  effect.
coaching_translation: Reacting to gluten without having celiac disease is real and
  measurable — not 'in your head'.
