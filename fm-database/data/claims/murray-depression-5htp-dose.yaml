- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 44 — Depression, pg 782-786
  quote: A 5-HTP dosage of 150 to 300 mg per day is sufficient in most cases. 50 or
    100 mg three times per day for at least three weeks. The most detailed of the
    Japanese studies showed 5-HTP was helpful in 14 out of 17 patients with unipolar
    depression. More than 70 percent of an oral dose of 5-HTP is converted to serotonin.
    5-HTP is as effective as SSRIs and tricyclic antidepressants and is less expensive,
    better tolerated, and associated with fewer and much milder side effects. 99 patients
    with therapy-resistant depression received 5-HTP at dosages averaging 200 mg per
    day. Complete recovery was seen in 43 of the 99 patients.
