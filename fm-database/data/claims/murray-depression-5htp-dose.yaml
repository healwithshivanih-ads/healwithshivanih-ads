slug: murray-depression-5htp-dose
statement: 5-hydroxytryptophan (5-HTP) at 150 to 300 mg per day in divided doses (50
  to 100 mg three times daily, before meals) is as effective as SSRIs and tricyclic
  antidepressants for mild to moderate depression, with faster onset (>50 percent
  respond within 2 weeks) and milder side effects (mainly transient mild nausea, ~10
  percent). Unlike L-tryptophan, ~70 percent of oral 5-HTP crosses the blood-brain
  barrier and converts to serotonin. Some patients who failed multiple antidepressant
  drugs respond to 5-HTP. Doses up to 600 mg per day used in therapy-resistant cases.
  Concurrent SSRI / MAO-inhibitor use requires clinician supervision (serotonin syndrome
  risk).
evidence_tier: confirm_with_clinician
