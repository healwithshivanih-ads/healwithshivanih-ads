- id: fett-it-starts-with-the-egg-2019
  location: Chapter 1 — Understanding Egg Quality, pg 22
  quote: In women over 40, more than half of eggs may be chromosomally abnormal. In
    fact, by some measures, the rate of abnormalities in women over 40 is as high
    as 70-80%. Even in women under 35, up to a quarter of eggs are aneuploid on average.
rationale: Foundational age-aneuploidy claim — needed to frame every advanced-maternal-
  age fertility conversation including egg freezing prep.
