slug: aneuploidy-rises-exponentially-after-mid-30s
statement: The rate of chromosomally abnormal eggs rises exponentially from the mid-
  to late 30s onward; under-35s average about 25% aneuploid eggs, while women over
  40 carry 50-80% aneuploid eggs, which is the dominant driver of declining natural
  conception, IVF success, and rising miscarriage rates with age.
evidence_tier: strong
