slug: estrogen-dominance-raises-tbg-reduces-free-thyroid-hormones
statement: Estrogen dominance raises thyroid-binding globulin (TBG), reducing free
  T3 and T4 availability, which can manifest as functional hypothyroidism despite
  normal TSH.
evidence_tier: plausible_emerging
rationale: The document notes high Total T4/T3 indicates estrogen dominance and that
  'Estrogen dominance, low progesterone, adrenal dysregulation can blunt thyroid response.'
coaching_translation: High oestrogen can 'trap' your thyroid hormones so they can't
  reach your cells — supporting liver detox and estrogen metabolism can help free
  them up.
caveats:
- Expert-consensus source; no primary study cited.
