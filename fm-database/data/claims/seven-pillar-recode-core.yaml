slug: seven-pillar-recode-core
statement: The ReCODE core protocol applied to every client consists of seven pillars
  — diet (insulin-sensitising, anti-inflammatory, polyunsaturated omega-3 emphasis),
  exercise, sleep, stress regulation, brain training, detoxification (mycotoxin and
  heavy-metal aware), and targeted supplements. Bredesen frames the side-effect of
  the core as "better health" — better mitochondrial function, more energy, improved
  sleep, resolution of mild sleep apnoea — making it broadly safe even for asymptomatic
  adults pursuing prevention.
evidence_tier: plausible_emerging
