slug: h-pylori-rosacea-eradication
statement: H. pylori (especially CagA-positive strains) is found in 67% of rosacea
  patients vs 32% of controls and drives flushing via histamine, prostaglandins, and
  leukotrienes. Eradication of H. pylori cleared rosacea symptoms in 51 of 53 patients
  in one series — and 19 of 20 acne rosacea patients tested positive in another Irish
  study. Coach screens H. pylori (stool antigen or breath test) in any persistent
  rosacea client and refers for eradication.
evidence_tier: strong
