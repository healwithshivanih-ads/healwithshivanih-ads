- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 50 — Eczema, pg 923
  quote: Fish oil supplements providing EPA and DHA are showing significant protective
    effects against allergy development as well as therapeutic effects in double-blind
    clinical trials. The difference in response is probably due to several factors.
    One is that fish oils contain primarily long-chain omega-3 fatty acids, which
    are further down the anti-inflammatory pathway. Some people, such as those with
    atopic disease, have poorer-functioning enzymes for the conversion to the anti-inflammatory
    prostaglandins.
