  location: Chapter 64 — High Cholesterol and/or Triglycerides, pg 1087
  quote: Daily supplementation with commercial preparations providing at least 10
    mg alliin or a total allicin potential of 4,000 mcg can lower total serum cholesterol
    by about 10 to 12%, LDL cholesterol by about 15%, and triglycerides by around
    15%, with HDL cholesterol levels usually increasing by about 10%. However, most
    trials not using products that can deliver this dosage of allicin fail to produce
    a lipid-lowering effect.
