slug: murray-garlic-allicin-standardized-dose
statement: Garlic preparations standardised to deliver ≥10 mg alliin or 4,000 mcg
  allicin potential daily reduce total cholesterol 10–12%, LDL 15%, triglycerides
  15%, and raise HDL 10% — but trials using products that fail to deliver this dose
  generally fail to lower lipids. Product standardisation is the single most important
  determinant of garlic's lipid effect.
evidence_tier: plausible_emerging
rationale: Murray flags that the heterogeneity in garlic trial results is explained
  by product variability. Garlic also offers ancillary benefits — blood pressure reduction,
  antiplatelet effect, fibrinolysis, LDL oxidation prevention — which justify its
  use even when lipid effects are modest. The 'plausible_emerging' tier reflects meta-analytic
  heterogeneity in lipid outcomes despite mechanism support.
coaching_translation: Garlic only works for lipids if you get the right product. Look
  for standardisation to ≥4,000 mcg allicin potential or ≥10 mg alliin per dose. Cheap
  garlic powder with no standardisation generally fails. Beyond cholesterol, garlic
  also lowers blood pressure and prevents clot formation.
caveats:
- Most retail garlic supplements are NOT properly standardised — read labels
- Aged garlic extract (Kyolic-style) loses allicin but retains other benefits
- Blood-thinning effect — caution with anticoagulants + 7-10 days before surgery
- Strong odour from raw garlic; enteric-coated tablets preferred
