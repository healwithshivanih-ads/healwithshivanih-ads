  location: Podcast — paradoxical reaction segment
  quote: The paradoxical effect where people get energized with melatonin does happen
    from time to time. If you're sensitive to caffeine you might consider that you're
    not going to be breaking down melatonin as well either. It's the same gene pathway.
rationale: Helps coach explain why a client tried melatonin once and "it made me feel
  worse" — not a reason to dismiss the molecule.
