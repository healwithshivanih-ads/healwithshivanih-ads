slug: melatonin-paradoxical-wakefulness-fast-metabolisers
statement: Approximately 5-10 percent of melatonin users experience a paradoxical
  wakefulness response — energising rather than sedating — at doses above approximately
  1 mg, with disturbed sleep and morning grogginess. The pattern often runs in families
  (suggesting a CYP1A2 / sulfotransferase polymorphism affecting clearance, since
  the same gene pathway processes caffeine — and these clients are often caffeine-sensitive).
  Practical workarounds — dose earlier (with dinner or before) to allow morning clearance;
  switch to micro-dose (0.1-0.3 mg sublingual); use rectal suppository to alter absorption
  kinetics; or skip melatonin entirely and rely on light hygiene, magnesium glycinate,
  and glycine for sleep support.
