slug: herbs-are-bridge-not-substitute-for-lifestyle-change
statement: Using herbs as a substitute for lifestyle and dietary change is not sustainable; herbs are
  most appropriate as a temporary bridge measure while Tier 1 (lifestyle/diet) practices are established
  and take effect.
evidence_tier: plausible_emerging
rationale: Herbs modulate symptoms and physiology without removing the underlying stressor; without Tier
  1 changes, the physiological cause of imbalance persists and herb dependency can become chronic, consistent
  with FM's root-cause orientation.
coaching_translation: Taking adaptogens or herbs for stress support is a good short-term strategy, but
  they work best when you're also building the daily habits that will eventually make them unnecessary.
  They're a bridge, not a destination.
