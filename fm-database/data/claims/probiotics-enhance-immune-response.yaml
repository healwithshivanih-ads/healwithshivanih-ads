slug: probiotics-enhance-immune-response
statement: Probiotics can enhance immune response by crowding out harmful bacteria,
  while prebiotics boost the overall health of beneficial microbes, thus strengthening
  the immune system.
evidence_tier: plausible_emerging
rationale: A large portion of immune tissue (GALT) is gut-associated. Multiple studies
  show probiotic effects on immune markers. Consensus is growing but strain-specific
  effects vary.
coaching_translation: A healthy gut microbiome is one of your best immune defenses
  — good bacteria in the gut directly support immune function.
