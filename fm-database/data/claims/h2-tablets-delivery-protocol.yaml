  quote: Room temperature and chug it down. Chug it as soon as that tablet finishes
    dissolving. You need a sufficient amount of water to give enough space for all
    those bubbles. I recommend 500 milliliters.
rationale: Coach guidance for any client who buys an H2 product — most users get suboptimal
  results from cold water and slow sipping.
