slug: murray-celiac-gluten-free-diet-protocol
statement: 'A strict gluten-free diet (no wheat, rye, barley, triticale; oats only
  if tolerated) is curative for celiac disease. 30 percent of patients respond within
  three days, 50 percent more within a month, 10 percent within a further month, and
  10 percent only after 24 to 36 months. Dairy should be eliminated initially. Buckwheat
  and millet contain prolamins with antigenic activity similar to gliadin and may
  need to be excluded. Replacement grains: amaranth, quinoa, brown/red/black/wild
  rice. Hidden gluten in soy sauce, ice cream, modified food starch, beer, vodka,
  whisky, malt — label-reading is essential. Co-supplement vitamin D3 2,000 to 4,000
  IU, EPA+DHA 1,000 mg, B-complex (folate 800 mcg + B12 500 mcg + B6 3 mg), probiotics
  5 to 10 billion CFU, and check zinc — zinc deficiency blocks recovery.'
evidence_tier: strong
