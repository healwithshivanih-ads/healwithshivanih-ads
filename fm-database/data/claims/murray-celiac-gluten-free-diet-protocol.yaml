sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 34 — Celiac Disease, pg 639-644
  quote: Usually with gluten elimination, clinical improvement will be obvious within
    a few days or weeks (30 percent respond within three days, another 50 percent
    within a month, and 10 percent within another month). However, 10 percent of patients
    respond only after 24 to 36 months of gluten avoidance. If a patient does not
    appear to respond, either the diagnosis is not correct or there may be some obstacle
    to a cure, such as zinc deficiency. Vitamin D3 2,000 to 4,000 IU per day. Fish
    oils 1,000 mg EPA + DHA per day. Probiotic 5 billion to 10 billion CFU per day.
    Buckwheat and millet contain compounds known as prolamins with antigenic activity
    similar to that of gliadin.
