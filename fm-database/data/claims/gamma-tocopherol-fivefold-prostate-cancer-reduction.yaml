  quote: For gamma-tocopherol, men with the highest levels had a fivefold reduction
    in the risk of developing prostate cancer compared with men with the lowest levels.
    Statistically significant protective associations for high levels of selenium
    and alpha-tocopherol were observed only when gamma-tocopherol concentrations were
    high as well... natural mixed tocopherols that include both alpha- and gamma-tocopherol
    should be used, rather than only alpha-tocopherol.
rationale: 'Critical product-selection point: most "vitamin E" supplements are alpha-only
  and can actively displace gamma-tocopherol. Specify mixed tocopherols (d-alpha +
  d-gamma) at 100–200 mg/day.'
