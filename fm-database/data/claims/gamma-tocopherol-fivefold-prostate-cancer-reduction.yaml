slug: gamma-tocopherol-fivefold-prostate-cancer-reduction
statement: Gamma-tocopherol, not alpha-tocopherol, is the form of vitamin E most strongly
  associated with prostate cancer protection. Men with the highest plasma gamma-tocopherol
  levels had a fivefold reduction in prostate cancer risk vs the lowest quintile.
  Protective effects of selenium and alpha-tocopherol were observed only when gamma-tocopherol
  was also high. The SELECT trial likely failed because it used isolated alpha-tocopherol
  at 400 IU (which displaces gamma-tocopherol from tissues); natural mixed tocopherols
  containing both alpha and gamma are required to replicate the observational findings.
  Avoid synthetic dl-alpha-tocopherol entirely.
evidence_tier: plausible_emerging
