statement: 5-HTP 200-600 mg/day prevents migraine attacks at least as effectively
  as standard prophylactic drugs (methysergide, pizotifen, propranolol) with significantly
  fewer side effects. In a 124-patient 6-month head-to-head trial, 5-HTP 600 mg/day
  produced greater than 50% reduction in attack frequency in 71% (vs 75% for methysergide),
  but with zero withdrawals for side effects (vs 12.5% on methysergide). Effect builds
  over time — better results at 60 days than 30 days — via 5-HT1c receptor desensitization
  and 5-HT1d sensitization. Bonus mood lift.
