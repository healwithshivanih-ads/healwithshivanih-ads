slug: fitzgerald-bone-broth-lead-purity-study
statement: In the authors' bone-broth pilot study, 19 toxic metals including lead
  were nonexistent or far below concern thresholds across homemade (organic and conventional)
  and store-bought beef broths and a collagen powder — lead fell well within FDA/EPA/USDA
  limits and below drinking-water standards. Broth minerals (calcium, iron, zinc,
  selenium) further competitively inhibit lead absorption. Clean bones are still preferred
  for non-lead reasons (antibiotics, chemicals).
