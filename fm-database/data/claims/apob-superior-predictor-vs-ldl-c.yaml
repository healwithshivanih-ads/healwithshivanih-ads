slug: apob-superior-predictor-vs-ldl-c
statement: ApoB is a superior predictor of cardiovascular risk compared to LDL-C because
  it measures total atherogenic particle burden (VLDL, IDL, LDL), not just cholesterol
  content.
evidence_tier: strong
rationale: Supported by MESA data and consensus among lipidologists. ApoB encases
  all atherogenic particles, making it a more complete marker than LDL-C, which can
  be normal despite high particle number.
coaching_translation: ApoB tells us how many 'bad' particles are in the blood — a
  more complete picture than just LDL cholesterol. Two people with the same LDL-C
  can have very different heart risk.
caveats:
- Source is expert lecture; specific RCT citations (MESA) referenced but not directly
  quoted in full.
