slug: probiotics-contraindicated-in-bacterial-overgrowth
statement: Probiotics should not be given when both bacterial phyla are already elevated
  (overgrowth state), as this will worsen symptoms rather than help.
evidence_tier: plausible_emerging
rationale: Adding more bacteria in a state of existing overgrowth exacerbates the
  imbalance. The lecturer reports observing symptom flares in patients given probiotics
  inappropriately in overgrowth states — a clinically logical and increasingly recognized
  principle.
coaching_translation: Always confirm with the clinician whether probiotics are appropriate
  before recommending. In some gut patterns, probiotics can make symptoms worse.
caveats:
- Source is expert lecture, moderate quality.
- Pattern-based probiotic prescribing requires lab confirmation (e.g., GI-MAP) — coaching
  recommendation only with clinician oversight.
