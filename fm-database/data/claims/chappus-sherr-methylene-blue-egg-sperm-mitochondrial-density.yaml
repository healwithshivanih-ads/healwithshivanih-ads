slug: chappus-sherr-methylene-blue-egg-sperm-mitochondrial-density
statement: Eggs and sperm have the highest mitochondrial density of any cells in the
  body, followed by brain, heart, liver, musculoskeletal tissue, and kidney. Sherr
  proposes mitochondrial dysfunction as the lowest-common-denominator explanation
  for declining global fertility rates. He is exploring methylene blue as fertility-prep
  support with fertility clinicians but recommends STOPPING methylene blue 48-72 hours
  before conception attempts and avoiding during pregnancy and breastfeeding (contraindicated).
  Practical link to the Bentov-Casper CoQ10 framework already in catalogue — both
  target the same oocyte mitochondrial bottleneck.
