slug: ad-h-pylori-70-percent-positive
statement: H. pylori antibody is positive in 70% of atopic dermatitis patients, and
  treatment of H. pylori infection resulting in reduced C-urea breath test and anti-H.
  pylori antibody titers led to partial improvement in AD.
evidence_tier: plausible_emerging
rationale: H. pylori directly stimulates epidermal cells to secrete TSLP; treatment-response
  data cited in the textbook support a causal role in a subset of AD patients.
coaching_translation: If you have eczema, it's worth asking your doctor to test for
  H. pylori — treating this stomach bug has helped some people's skin improve significantly.
