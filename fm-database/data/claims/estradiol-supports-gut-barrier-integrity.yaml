slug: estradiol-supports-gut-barrier-integrity
statement: Estradiol supports gut barrier integrity; as estradiol declines in perimenopause
  and menopause, intestinal permeability ('leaky gut') increases and systemic inflammation
  rises.
evidence_tier: plausible_emerging
rationale: Estrogen receptor expression on gut epithelial cells and estrogen's role
  in tight junction maintenance is mechanistically plausible and supported by preclinical
  data. Clinical RCT evidence in humans is limited. Single-expert source.
coaching_translation: Estrogen helps hold the gut lining together. When it drops in
  menopause, the gut wall can become more permeable — letting inflammatory signals
  into the bloodstream.
caveats:
- Mostly preclinical mechanistic data; human RCT evidence limited.
- Single-expert source.
