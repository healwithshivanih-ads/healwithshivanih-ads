slug: niacin-outperforms-statins-on-hdl-and-lpa
statement: Niacin raises HDL-C by 33% vs. 7% for lovastatin and reduces Lp(a) by 35%
  while lovastatin has no effect on Lp(a), giving niacin overall cardiovascular superiority
  despite lower LDL-C reduction than statins.
evidence_tier: strong
rationale: Direct head-to-head data from HDL Atherosclerosis Treatment Study (HATS)
  and other trials cited in source.
coaching_translation: For people with low HDL or high Lp(a), niacin may do more for
  the heart than statins.
caveats:
- Recent AIM-HIGH and HPS2-THRIVE trials showed no incremental benefit of adding niacin
  to well-controlled statin therapy
out_of_scope_notes: Dosing and drug selection is clinician scope.
linked_to_topics:
