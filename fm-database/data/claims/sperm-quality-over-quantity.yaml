slug: sperm-quality-over-quantity
statement: Sperm QUALITY matters more than count — 52% of couples with male sperm
  count under 10 million/ml achieve pregnancy, and 40% achieve it with counts as low
  as 5 million/ml. Conversely, normal count with poor morphology or motility produces
  infertility. Hamster-egg penetration test predicts fertility 66% accurately vs only
  30% for conventional semen analysis. Coach educates not to despair on low-count
  results — quality work-up matters.
evidence_tier: strong
