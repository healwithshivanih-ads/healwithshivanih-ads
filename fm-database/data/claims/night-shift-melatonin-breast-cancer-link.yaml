slug: night-shift-melatonin-breast-cancer-link
statement: 'Women working night shifts have up to 60% increased breast cancer risk,
  with risk rising with cumulative shift years. Mechanism: artificial light at night
  suppresses nocturnal pineal melatonin secretion; melatonin has direct anticancer
  effects, particularly against breast cancer, and regulates the circadian hormone
  biorhythm. For night-shift workers, 3 mg melatonin at bedtime (regardless of clock
  time) is recommended.'
evidence_tier: plausible_emerging
