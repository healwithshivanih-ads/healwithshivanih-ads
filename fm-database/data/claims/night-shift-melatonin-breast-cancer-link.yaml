sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 28 — Breast Cancer (Prevention), pg 576-577
  quote: Several studies have shown quite dramatically that women working the so-called
    graveyard shift have an increased risk of developing breast cancer. In one study
    graveyard shift work was associated with a 60% increased breast cancer risk...
    To offset the increased risk of breast cancer that comes with night shift work,
    we recommend taking 3 mg melatonin at bedtime for night shift workers.
rationale: 'Coaching opportunity: night-shift clients need aggressive circadian hygiene
  plus melatonin. Pair with blue-light blockers post-shift, blackout curtains, and
  rigorous sleep window.'
