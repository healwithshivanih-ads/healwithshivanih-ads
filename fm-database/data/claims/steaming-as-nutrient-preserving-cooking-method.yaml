slug: steaming-as-nutrient-preserving-cooking-method
statement: Steaming (used for fish, dhokla, idli, and beans in this plan) preserves
  heat-sensitive micronutrients better than boiling or frying, supporting micronutrient
  density in a cardiometabolic diet.
evidence_tier: strong
rationale: Multiple recipes use steaming as the primary cooking method (Lemony Steamed
  Fish, Dhokla, Lentil Idli, Steamed Moth Beans). The superiority of steaming over
  boiling for water-soluble vitamin retention is well-established nutritional science.
coaching_translation: Steaming food is one of the best ways to keep vitamins and minerals
  intact. This plan leans on steaming for fish, snacks, and legumes for exactly that
  reason.
