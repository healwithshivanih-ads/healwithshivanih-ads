slug: high-shbg-reduces-free-testosterone
statement: High SHBG concentrations preferentially bind testosterone, reducing free
  testosterone and causing testosterone deficiency symptoms including fatigue, low
  libido, weight gain, mood changes, decreased muscle mass, and decreased bone mineral
  density.
evidence_tier: plausible_emerging
rationale: Well-established that SHBG binds testosterone with higher affinity than
  estrogen; document is an expert consensus synthesis without specific RCT citation
  for this assertion.
coaching_translation: If your SHBG is high, there may be less active testosterone
  available for your body, which can leave you feeling tired, less interested in sex,
  and struggling to maintain muscle.
caveats:
- Source is expert consensus/synthesis — no specific RCT cited. Verify free testosterone
  labs with clinician.
