slug: vitamin-k2-activates-osteocalcin-for-bone-mineralisation
statement: Vitamin K2 activates osteocalcin, a protein that accumulates calcium in
  bones and teeth, playing a critical role in bone and dental mineralisation.
evidence_tier: strong
rationale: The carboxylation of osteocalcin by vitamin K2-dependent gamma-glutamyl
  carboxylase is a well-characterised biochemical mechanism supported by multiple
  RCTs in the bone health literature.
coaching_translation: Vitamin K2 acts like a guide for calcium — it activates a protein
  that makes sure calcium goes into your bones and teeth, not elsewhere.
