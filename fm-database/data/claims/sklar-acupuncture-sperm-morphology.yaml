slug: sklar-acupuncture-sperm-morphology
statement: Acupuncture has supporting research for fertility outcomes in both partners.
  In men, courses as short as five weeks have shown improvements in sperm count, morphology
  and motility. In women, regular sessions appear to support cycle regularity, improve
  uterine blood flow, lower cortisol and improve outcomes alongside IVF transfers.
  Best treated as an adjunctive modality, not a standalone fix, in fertility coaching.
