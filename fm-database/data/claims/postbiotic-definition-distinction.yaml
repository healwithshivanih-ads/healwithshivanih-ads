slug: postbiotic-definition-distinction
statement: Hawrelak clarifies the regulatory definition — a PROBIOTIC must be (1)
  ALIVE, (2) administered in an adequate dose, AND (3) supported by published evidence
  that the specific strain at the specific dose confers a health benefit. Supplements
  containing dead bacteria are POSTBIOTICS, not probiotics — they can still be clinically
  helpful (e.g. heat-killed Lactobacillus plantarum has demonstrated immune-modulating
  effects) but the mechanism, evidence, and labelling are distinct. Strains with no
  published research are not probiotics by this definition, even when sold as such.
  Coach implication — check label for strain name + CFU dose + research before recommending.
evidence_tier: plausible_emerging
