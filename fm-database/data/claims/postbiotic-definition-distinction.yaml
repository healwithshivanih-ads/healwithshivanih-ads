sources:
- id: hawrelak-energy-blueprint-podcast-2026
  location: Podcast — definition segment
  quote: The strict definition is live microbes that when administered in adequate
    amounts confer a health benefit. If you have a supplement that contains dead bacteria
    it can still be very helpful but it won't be a probiotic at that point — it should
    be termed a postbiotic. If you have a strain that has no research on it at all,
    they wouldn't call it a probiotic.
rationale: Helps coach decode supplement labels — "X billion CFU multistrain blend"
  with no named strains is a marketing claim, not a probiotic.
