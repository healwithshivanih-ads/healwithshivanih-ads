slug: nafld-iron-restriction-low-iron-diet
statement: Considerable research shows increased iron concentration in the liver in
  NAFLD. Because iron generates pro-oxidants that further damage hepatocytes, avoid
  iron supplements and follow a low-iron diet unless clearly indicated (iron-deficiency
  anemia confirmed). This is the opposite of the standard reflex to supplement iron
  for "fatigue."
evidence_tier: plausible_emerging
