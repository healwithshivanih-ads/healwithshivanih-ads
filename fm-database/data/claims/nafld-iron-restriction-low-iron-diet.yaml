  quote: Considerable research indicates an increase in iron concentration in the
    liver in people with NAFLD. Given its ability to generate pro-oxidants, iron should
    be avoided unless there is a medical reason for iron supplementation. Follow a
    low-iron diet and avoid iron supplements.
