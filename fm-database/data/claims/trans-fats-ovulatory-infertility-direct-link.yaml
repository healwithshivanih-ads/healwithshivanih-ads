slug: trans-fats-ovulatory-infertility-direct-link
statement: The Nurses' Health Study found that trans fats — even at just 4 grams per day (roughly one
  doughnut) — were directly linked to ovulatory infertility, while unsaturated fats improved insulin sensitivity
  and reduced inflammation.
evidence_tier: strong
rationale: Finding from the well-regarded Nurses' Health Study; trans fat's detrimental effects on insulin
  sensitivity and inflammation are well-established.
coaching_translation: Even tiny amounts of trans fats — the kind in margarine, fried foods, and processed
  snacks — can disrupt ovulation. Swapping to olive oil, avocado, and nuts supports the hormonal environment
  for fertility.
out_of_scope_notes: ''
caveats:
- Trans fats have since been largely removed from food supplies in many countries; industrial trans fat
  intake is lower now than at time of study. Naturally occurring ruminant trans fats (e.g. CLA in dairy/meat)
  appear to have different effects.
