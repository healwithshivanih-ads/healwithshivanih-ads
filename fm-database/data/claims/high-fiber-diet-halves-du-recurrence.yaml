slug: high-fiber-diet-halves-du-recurrence
statement: A high-fiber diet in patients with recently healed duodenal ulcers reduced
  recurrence rate by half compared with a low-fiber diet.
evidence_tier: plausible_emerging
rationale: Specific clinical outcome data cited in this FM textbook; fiber slows gastric
  liquid-phase emptying, reducing acid bolus delivery to the duodenum. Plausible mechanism
  with some clinical trial support.
coaching_translation: Eating more fibre-rich whole foods — vegetables, legumes, oats
  — may halve your chances of your ulcer coming back.
