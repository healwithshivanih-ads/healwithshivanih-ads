slug: dhea-buffers-cortisol-adrenal-counter-hormone
statement: 'DHEA is the primary balancing partner of cortisol within the stress hormone axis: it buffers
  cortisol''s catabolic effects, has a weak oestrogenic action, and supports muscle mass, energy, and
  protein repair.'
evidence_tier: plausible_emerging
rationale: DHEA's counter-regulatory role to cortisol (the cortisol/DHEA-S ratio as a physiological stress
  marker) is well-documented; DHEA's androgenic/oestrogenic precursor role is established endocrinology.
coaching_translation: DHEA acts as your stress-hormone counterbalance — the more cortisol you produce
  chronically, the more DHEA gets consumed buffering it. This is why DHEA levels decline with age and
  burnout, and why the cortisol:DHEA ratio is used as a marker of adrenal health.
out_of_scope_notes: ''
caveats:
- The clinical translation of DHEA supplementation from this model is not established; the mechanism is
  sound but individual response to DHEA-S levels varies considerably.
