slug: elevated-homocysteine-associated-with-cardiovascular-and-neurological-risk
statement: Chronically elevated homocysteine is associated with increased risk of
  heart attacks, stroke, dementia, and neural tube defects in pregnancy.
evidence_tier: strong
rationale: The cardiovascular and neurological risks of hyperhomocysteinaemia are
  supported by extensive epidemiological literature, consistent with what the document
  states.
coaching_translation: Homocysteine is a useful functional marker — keeping it in the
  optimal range (5–6 µmol/L) through diet, B vitamin status, and lifestyle supports
  heart and brain health.
out_of_scope_notes: Homocysteine lab ordering, interpretation, and clinical management
  are outside coaching scope.
caveats:
- Lowering homocysteine with B vitamins does not consistently translate to reduced
  cardiovascular events in RCTs — this is an association, not proven causation for
  outcomes.
