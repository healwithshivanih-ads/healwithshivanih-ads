slug: briden-histamine-pms-mid-cycle-pattern
statement: 'Histamine fluctuates with the menstrual cycle, peaking just before ovulation
  and during the luteal phase — when estrogen is highest and dropping. Premenstrual
  symptoms that overlap with high histamine (irritability, anxiety, insomnia, brain
  fog, breast pain, headaches) often respond to antihistamine strategies. Diagnostic
  clue: symptoms also include hives/dermatographia, nasal congestion, joint pain,
  fluid retention, or nausea.'
evidence_tier: plausible_emerging
rationale: Cyclical histamine rise pre-ovulation and luteal is documented in immunology
  literature on estrogen-histamine interactions.
coaching_translation: If PMS comes with allergy-type symptoms (hives, congestion,
  fluid retention), histamine is likely a driver. Tracking symptoms across the cycle
  helps confirm — they will worsen pre-ovulation and pre-period.
