slug: briden-pcos-rule-out-other-androgen-causes
statement: 'Before diagnosing PCOS, rule out other causes of androgen excess: high-androgen
  birth control (drospirenone, cyproterone, levonorgestrel-type progestins), congenital
  adrenal hyperplasia (up to 9% of androgen-excess cases), and high prolactin. Each
  has distinct treatment paths separate from PCOS protocols.'
evidence_tier: strong
rationale: Late-onset CAH and prolactinoma are both well-documented mimics of PCOS
  in conventional endocrinology. Drospirenone and cyproterone withdrawal-androgen
  rebound is described in the Briden post-pill PCOS literature.
coaching_translation: PCOS is a diagnosis of exclusion. Two simple blood tests — 17-hydroxyprogesterone
  (for CAH) and prolactin — can rule out two important mimics before settling on a
  PCOS treatment plan.
