slug: smoking-hpv-cervical-cancer
statement: Smoking raises cervical cancer/dysplasia risk approximately 3-fold overall
  and up to 17-fold in women age 20 to 29. Mechanisms — immune suppression allowing
  HPV-driven cellular changes, vitamin C depletion, free radical damage to cervical
  cells. HPV is implicated in 99.8% of cervical cancers; 60% of young women carry
  it but fewer than 10% progress — host nutritional and immune status determines outcome.
  Coach prioritises smoking cessation and antioxidant status in any dysplasia client.
evidence_tier: strong
