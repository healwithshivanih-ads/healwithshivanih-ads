slug: murray-celiac-dpp-iv-pancreatic-enzymes
statement: Pancreatic enzyme supplementation (5,000 IU lipase / 2,900 IU amylase /
  330 IU protease per capsule, two with each meal) significantly enhances the clinical
  benefit of a gluten-free diet in the first 30 days after celiac diagnosis; benefit
  fades by day 60. A better long-term choice is enzyme preparations containing dipeptidyl
  peptidase IV (DPP-IV) from fungal sources, which targets both gliadin and casein
  and is depleted in the intestinal mucosa of celiac patients. DPP-IV preparations
  are useful as protection against hidden gluten exposure.
