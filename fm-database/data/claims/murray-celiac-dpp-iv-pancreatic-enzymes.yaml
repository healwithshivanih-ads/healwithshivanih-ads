sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 34 — Celiac Disease, pg 641-642
  quote: In this study patients followed a gluten-free diet and received with each
    meal either two capsules of pancreatic enzymes (each capsule containing 5,000
    IU lipase, 2,900 IU amylase, and 330 IU protease) or two placebo capsules. Results
    indicated that pancreatic enzyme supplementation enhanced the clinical benefit
    of a gluten-free diet during the first 30 days but did not provide any greater
    benefit than the placebo after 60 days. A better choice than pancreatic enzymes
    may be enzyme preparations containing dipeptidyl peptidase IV (DPP-IV) from fungal
    sources. This enzyme targets both gliadin and casein. Use of preparations containing
    DPP-IV is often recommended in order to safeguard against any hidden sources of
    gluten.
