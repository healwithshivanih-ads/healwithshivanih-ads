slug: magnesium-deficiency-increases-t2d-risk
statement: Inadequate dietary magnesium intake is associated with higher risk for
  type 2 diabetes, heart disease, metabolic syndrome, and osteoporosis.
evidence_tier: plausible_emerging
rationale: Gröber et al. (2015, Nutrients) and multiple systematic reviews support
  magnesium's role in insulin function and metabolic health. Risk association is well-documented,
  though RCT evidence for supplementation outcomes is mixed.
coaching_translation: Not getting enough magnesium — found in nuts, avocado, leafy
  greens, and legumes — may increase your risk of blood sugar problems and other metabolic
  issues.
caveats:
- Observational data; causality direction debated. Supplementation benefit clearest
  in deficient individuals.
- Different magnesium forms have different absorption and side-effect profiles.
- Supplementation decisions should involve a clinician.
linked_to_topics:
