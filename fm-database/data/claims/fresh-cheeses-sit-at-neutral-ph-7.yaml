slug: fresh-cheeses-sit-at-neutral-ph-7
statement: Fresh cheeses (e.g., Indian paneer) sit at a near-neutral pH of approximately
  7, making them more pH-neutral than most other dairy or acid-forming foods.
evidence_tier: fm_specific_thin
rationale: Stated by Barbara O'Neill as a specific pH value for fresh cheeses used
  in Indian cuisine. The claim is biologically plausible — fresh cheeses do tend to
  be less acidic than aged cheeses — but specific pH values for fresh cheeses vary
  and peer-reviewed consensus on their metabolic acid load is thin.
coaching_translation: Fresh cheeses like paneer are a more pH-neutral protein option
  compared to many other foods, making them a reasonable inclusion in a balanced plate.
caveats:
- Source is expert consensus/lecture, not primary peer-reviewed literature. Specific
  pH=7 figure should not be presented as established science.
- Metabolic acid load of a food differs from the food's measured pH.
