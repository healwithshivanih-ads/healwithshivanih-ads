slug: mayo-tinnitus-no-cure-but-management-works
statement: Mayo acknowledges no conventional medication cures subjective tinnitus,
  but masking strategies, hearing aids when hearing loss coexists, cognitive behavioural
  therapy, and tinnitus retraining therapy meaningfully reduce distress and perceived
  loudness.
