slug: sibo-drives-large-fraction-of-ibs
statement: A large share of IBS (up to ~84% in some series) appears driven by small-intestinal
  bacterial overgrowth, and symptoms often improve on diets and treatments that reduce
  that overgrowth.
evidence_tier: plausible_emerging
rationale: Cites Pimentel's IBS/SIBO work; the exact percentage varies by test used.
coaching_translation: For many people, 'IBS' is really bacterial overgrowth in the
  small intestine — and that can be treated.
