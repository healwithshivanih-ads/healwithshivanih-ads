slug: vitamin-d-supports-reproductive-health-and-bone
statement: Vitamin D, in combination with Vitamin K2, plays an important role in supporting
  reproductive health and bone mineral density in perimenopausal and menopausal women.
evidence_tier: strong
rationale: Vitamin D's role in bone health (calcium absorption, bone mineralization)
  is well-established. Evidence for Vitamin D in reproductive health is growing. Vitamin
  K2 (MK-7) alongside D3 for bone and cardiovascular health has plausible_emerging
  evidence.
coaching_translation: Vitamin D and K2 are a key duo for bone health during menopause.
  Testing Vitamin D levels first is recommended since deficiency is very common, especially
  in India.
caveats:
- Vitamin D dosing is clinician-guided and requires baseline testing.
- K2 combination evidence is plausible_emerging; D3 alone for bone health is strong.
