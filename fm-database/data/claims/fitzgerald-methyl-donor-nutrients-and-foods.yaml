slug: fitzgerald-methyl-donor-nutrients-and-foods
statement: 'Primary dietary methyl donors are folate (B9) and vitamin B12 — which
  build SAMe, the universal methyl donor — supported by betaine and choline, the minerals
  zinc/magnesium/potassium/sulfur, B vitamins riboflavin/niacin/pyridoxine, the amino
  acids methionine/cysteine/taurine, and the omega-3 DHA. Richest whole-food sources:
  liver, clams/fish, beans/chickpeas, beets, spinach, quinoa, egg yolks, lentils.'
