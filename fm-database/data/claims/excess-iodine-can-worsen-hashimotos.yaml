slug: excess-iodine-can-worsen-hashimotos
statement: Excess iodine intake can be harmful in Hashimoto's thyroiditis and should be approached with caution.
evidence_tier: plausible_emerging
rationale: High iodine intake is documented to potentially worsen autoimmune thyroid disease by increasing thyroglobulin antigenicity
  and stimulating immune activity. This is a known clinical concern, though the exact threshold varies by individual.
coaching_translation: While iodine is needed for thyroid health, too much — especially from supplements — can actually make
  Hashimoto's worse. Stick to food sources and avoid high-dose iodine supplements unless directed by your doctor.
out_of_scope_notes: Iodine supplementation dosing above the RDA in autoimmune thyroid disease is a clinician decision.
caveats:
- Routine 150 mcg supplementation is generally considered safe; high-dose iodine requires clinician oversight.
