sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 63 — High Blood Pressure, pg 1058-1060
  quote: Most Americans have a potassium-to-sodium (K:Na) ratio of less than 1:2.
    Epidemiological and experimental research suggests that a dietary K:Na ratio greater
    than 5:1 is necessary to maintain health. In a meta-analysis of 33 randomized,
    controlled trials totaling 2,609 participants, potassium supplementation was associated
    with a reduction in mean systolic and diastolic blood pressure of 4.44 and 2.45
    mm Hg, respectively. The dosage of potassium typically used in the studies ranged
    from 2.5 to 5 g per day. Potassium supplementation is also contraindicated when
    a patient is using any of a number of prescription medications including digitalis,
    potassium-sparing diuretics, and the ACE inhibitor class of antihypertensive drugs.
