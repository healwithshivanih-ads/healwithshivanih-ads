slug: murray-htn-potassium-sodium-ratio
statement: Most Western diets have a potassium-to-sodium ratio below 1:2; a dietary
  K:Na ratio above 5:1 is needed for normal BP, and a fruit-and-vegetable-rich pattern
  easily reaches 50:1 to 100:1. Potassium supplementation at 2.5 to 5 g per day lowers
  systolic and diastolic BP by 4.4 and 2.5 mmHg on average (meta-analysis of 33 trials,
  2,609 participants) and up to 12/16 mmHg in mild hypertensives, with greater effect
  in those with high sodium intake. Contraindicated in kidney disease and with ACE
  inhibitors, potassium-sparing diuretics, or digitalis.
evidence_tier: strong
