slug: pycnogenol-60mg-cuts-endo-symptoms-33pct-48wks
statement: Pycnogenol (French maritime pine bark extract) 30 mg twice daily for 48
  weeks reduces endometriosis symptoms by ~33% in post-surgical patients, with maintained
  regular menses and normal estrogen levels — and unlike GnRH agonists (leuprolide),
  the benefit persists after stopping.
evidence_tier: plausible_emerging
rationale: Pizzorno cites Kohama 2007 — RCT comparing 60 mg/day pycnogenol vs leuprolide
  IM monthly. Pycnogenol slower onset, lower peak benefit, but no relapse vs leuprolide
  which relapsed within 24 weeks of stopping. Mechanism via selective MMP inhibition
  and COX-1/2 inhibition.
coaching_translation: For endometriosis, pycnogenol at 60 mg a day for almost a year
  produced about a third reduction in symptoms — without shutting down your menstrual
  cycle or estrogen the way GnRH drugs do. Slow but sustainable, and some women became
  pregnant on it.
caveats:
- Effect slower than leuprolide; build over 3-6 months.
- Use standardised extract (typically 65-75% procyanidins).
- Mild bleeding risk; pause before surgery.
- Pair with diet + lipotropics + I3C/DIM for additive effect.
