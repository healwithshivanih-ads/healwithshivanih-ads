slug: vitamin-a-is-anti-inflammatory-and-supports-respiratory-tract
statement: Vitamin A (10,000–25,000 IU daily) is anti-inflammatory, enhances immune
  function, and supports the lining of the respiratory tract.
evidence_tier: plausible_emerging
rationale: Vitamin A's role in mucosal immunity and respiratory epithelial integrity
  is well-established (Huang et al. 2018, J Clin Med). However, the dose range cited
  (10,000–25,000 IU/day) approaches teratogenic and hepatotoxic levels per referenced
  studies (Rothman et al. 1995, N Engl J Med). Clinical benefit for COVID-19 is not
  established.
coaching_translation: Vitamin A supports the protective lining of your airways and
  helps your immune system function. Food sources include liver, eggs, dairy, and
  orange/yellow vegetables (as beta-carotene).
out_of_scope_notes: The dose range 10,000–25,000 IU/day is HIGH and potentially teratogenic
  and hepatotoxic — this is CLINICIAN SCOPE ONLY. Coaches should not recommend these
  doses independently. Beta-carotene from food is safe.
caveats:
- Doses above 10,000 IU/day are potentially teratogenic — CONTRAINDICATED in pregnancy.
- High-dose vitamin A supplementation carries hepatotoxicity risk.
- This dose range requires clinician supervision.
- Preformed vitamin A (retinol) toxicity risk is distinct from beta-carotene from
  food.
