slug: pre-2005-statin-trials-have-significant-bias-concerns
statement: Statin trials conducted before 2005 are subject to significant methodological
  concerns including pharmaceutical company oversight of their own trials, premature
  terminations, high patient loss-to-follow-up, and publication bias.
evidence_tier: plausible_emerging
rationale: 'The document identifies these specific methodological limitations of pre-2005
  statin trials: industry-sponsored oversight, premature termination when desired
  outcomes were found, unpublished negative trials, and high loss-to-follow-up rates.'
coaching_translation: Some of the early studies that made statins famous had design
  problems — the drug companies were running their own trials, studies were stopped
  early when results looked good, and some unfavorable results may never have been
  published. Newer, more independent research tells a more nuanced story.
caveats:
- This critique is specific to pre-2005 trials; post-2005 trials have stronger regulatory
  oversight.
- This does not mean statins have no benefit — secondary prevention data remains robust.
- Source is a lecture; independent verification with systematic reviews is recommended.
