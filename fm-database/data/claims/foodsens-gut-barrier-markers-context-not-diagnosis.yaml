slug: foodsens-gut-barrier-markers-context-not-diagnosis
statement: Some panels add gut-barrier markers that place food reactions in context.
  Zonulin regulates tight junctions and, when elevated, suggests gaps letting food
  proteins leak through. Occludin is a more advanced marker of leaky gut with inflammation.
  Lipopolysaccharide (LPS) endotoxin points to gram-negative dysbiosis, and secretory
  IgA one versus two can indicate whether the process is higher (stomach/small intestine)
  or further along in the large intestine.
evidence_tier: plausible_emerging
rationale: These markers help answer the chicken-or-egg question — whether food reactivity
  is driving gut permeability or a leaky gut is driving the food reactions — which
  shapes the repair plan.
coaching_translation: If a client's report shows these markers, explain in plain terms
  what each points to (barrier integrity, dysbiosis, location) and encourage them
  to work the results through with their clinician while you support gut-repair habits.
out_of_scope_notes: Interpreting zonulin, occludin, LPS or secretory IgA and deciding
  on treatment is the clinician's role.
caveats:
- A raised candida marker on these panels reflects normal gut candida leaking through
  a permeable barrier — not systemic yeast requiring an anti-candida diet.
