slug: sweating-supports-gst-gpx-detoxification
statement: Regular sweating through sauna, vigorous exercise, or hot yoga enhances
  elimination of toxins through the skin, reducing the xenobiotic burden on GST/GPX
  and supporting overall detoxification capacity.
evidence_tier: fm_specific_thin
rationale: Sweat does contain trace amounts of some heavy metals and environmental
  toxins; the magnitude of contribution to overall elimination relative to hepatic/renal
  routes is debated in the literature. This is a common FM practice recommendation
  with limited RCT evidence.
coaching_translation: Encourage at least two sweat-inducing sessions per week (sauna,
  vigorous exercise, hot yoga) as a complement to dietary and environmental toxin-reduction
  strategies for clients with chemical sensitivity or suspected GST/GPX impairment.
caveats:
- Source is a consumer trade book
- Sweat detox contribution vs renal/hepatic routes is not well quantified in RCTs
