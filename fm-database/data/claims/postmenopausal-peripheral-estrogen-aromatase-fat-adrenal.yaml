slug: postmenopausal-peripheral-estrogen-aromatase-fat-adrenal
statement: Estrogen is synthesised not only in the ovaries but also in fat tissue, muscle, adrenal glands,
  and other peripheral sites via the aromatase enzyme, meaning postmenopausal women continue producing
  estrogen from non-ovarian sources.
evidence_tier: strong
rationale: 'Well-established endocrinology: peripheral aromatisation converts androgens (especially androstenedione)
  to estrone in adipose tissue; adrenal glands supply estrogen precursors after menopause.'
coaching_translation: Even after your periods stop, your body keeps making estrogen — from fat cells,
  adrenal glands, and other tissues. This is why a woman's estrogen doesn't simply drop to zero at menopause.
