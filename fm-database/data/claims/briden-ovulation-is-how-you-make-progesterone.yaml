slug: briden-ovulation-is-how-you-make-progesterone
statement: Endogenous progesterone is produced by the corpus luteum, the temporary
  gland formed in the ovary after ovulation. No ovulation means no corpus luteum,
  and no corpus luteum means no meaningful luteal-phase progesterone. Therefore any
  intervention that reliably suppresses ovulation (combined hormonal contraception,
  long-term Depo-Provera, severe HPA dysregulation, hypothalamic amenorrhoea, some
  PCOS phenotypes) also suppresses progesterone — with downstream consequences for
  mood, sleep, bone, and uterine-lining protection.
evidence_tier: strong
rationale: Core reproductive endocrinology — undisputed mechanism. Briden uses this
  as the conceptual anchor of the entire book and as the rationale for why "regular
  pill bleeds" do not equal hormonal health.
coaching_translation: Progesterone is made only in the two weeks after you ovulate.
  If you do not ovulate — whether because of the pill, severe stress, or a hormone
  condition — your body cannot make this protective, calming hormone. Restoring ovulation
  is the single most important goal in functional period repair.
caveats:
- Adrenals make a tiny amount of pregnenolone-derived progesterone, but this does
  not replace ovarian luteal-phase progesterone.
- Anovulatory bleeds can still occur in the absence of progesterone — bleeding is
  not proof of ovulation.
