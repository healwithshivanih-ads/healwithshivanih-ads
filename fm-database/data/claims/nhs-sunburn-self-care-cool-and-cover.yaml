slug: nhs-sunburn-self-care-cool-and-cover
statement: Get out of the sun, cool the skin with a cool shower or damp towel, apply
  aftersun or unperfumed moisturiser, hydrate with water (not alcohol), take paracetamol
  or ibuprofen for pain and keep sunburnt skin covered until it heals.
