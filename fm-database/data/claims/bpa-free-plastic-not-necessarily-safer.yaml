  location: Chapter 2 — The Dangers of BPA, pg 42-43
  quote: Scientists tested more than 500 commercially available plastic food containers
    and found that almost all products leached chemicals having estrogen-like activity,
    including those advertised as BPA-free.
rationale: Counter-marketing claim — BPA-free labels create false reassurance.
