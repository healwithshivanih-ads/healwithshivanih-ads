slug: bpa-free-plastic-not-necessarily-safer
statement: BPA-free plastics often leach other estrogenic chemicals (bisphenol S,
  bisphenol F, and unidentified substitutes), some of which are equally or more endocrine-disrupting
  than BPA. The safer default is to move out of plastic entirely for food contact
  — glass, stainless steel, ceramic, wood — rather than switching to BPA-free plastic.
