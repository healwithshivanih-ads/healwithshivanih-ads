slug: fitzgerald-younger-you-intensive-core-supplements
statement: The two supplements actually used in the Younger You pilot were a Lactobacillus
  plantarum 299V probiotic (~40 billion CFU/day, a strain shown to make folate in
  the gut and lower salivary cortisol) and a greens powder enriched with methyl-donor
  and DNA-methylation-adaptogen foods (mushrooms, berries, flax, turmeric, beets),
  with an optional freeze-dried liver supplement for those who won't eat liver.
