slug: murray-bromelain-reduces-bruising-trauma
statement: Bromelain (pineapple-derived proteolytic enzyme complex, 250–750 mg three
  times daily between meals, standardised to 1,800–2,000 MCU) reduced complete bruise
  clearance time to 4 days in 78% of boxers vs 14% of untreated controls — and across
  400+ published trials demonstrates anti-inflammatory, anti-edema, and analgesic
  effects in sports injury, post-trauma, and post-surgical settings.
evidence_tier: strong
rationale: Large body of replicated evidence over 65+ years. Mechanism — direct proteolytic
  action on inflammatory mediators (kinin, fibrin), reduction of vascular permeability,
  modulation of prostaglandin/thromboxane balance. Critical dosing note — bromelain
  MUST be taken on empty stomach for systemic anti-inflammatory effect; with food
  it just digests food.
coaching_translation: Bromelain is the natural anti-inflammatory for acute injuries
  — bruises, sprains, strains, post-workout soreness, post-surgery swelling. The dose
  is 250-750 mg three times daily BETWEEN MEALS on an empty stomach (with food it
  just helps you digest, not heal). Look for 1,800-2,000 MCU activity rating.
caveats:
- MUST be taken on empty stomach (≥30 min before or 2h after meals) for systemic effect
- Mild blood-thinning — pause 7 days before surgery, caution with anticoagulants
- Allergy risk if pineapple/latex allergy
- GI upset possible at higher doses
