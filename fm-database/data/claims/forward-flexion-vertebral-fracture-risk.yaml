sources:
- id: bissinger-energy-blueprint-podcast-2026
  location: Podcast — Flexion contraindication in osteoporosis
  quote: Rounding and forward bending increases the risk of fractures because right
    on the front of the vertebrae, on the front of the spine, is where fractures occur.
    You don't want to do any exercises that cause rounding. You can do Pilates, yoga,
    everything just without doing the rounding. You're bending from the hips and knees,
    not the waist.
