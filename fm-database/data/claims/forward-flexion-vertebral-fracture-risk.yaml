slug: forward-flexion-vertebral-fracture-risk
statement: For clients with diagnosed osteoporosis or osteopenia, spinal flexion (forward
  bending, crunches, sit-ups, deep forward-fold yoga) elevates vertebral fracture
  risk because vertebral compression fractures occur preferentially on the anterior
  aspect of the vertebral body. Modifications — hip-hinge instead of spine-flex when
  picking things up; substitute back-extension exercises (bird-dog, prone scapular
  work) for crunches; in yoga, replace seated forward folds with supported variations
  keeping the spine neutral.
evidence_tier: strong
