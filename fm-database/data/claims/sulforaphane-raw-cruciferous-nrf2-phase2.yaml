slug: sulforaphane-raw-cruciferous-nrf2-phase2
statement: Sulforaphane, formed when raw cruciferous vegetables (broccoli, broccoli
  sprouts) are chewed/crushed so myrosinase acts on glucoraphanin, is a weak pro-oxidant
  that activates the NRF2 transcription factor — switching on ~500 cellular-defence
  genes and up-regulating phase-II detoxification. Cooking destroys myrosinase, so
  the sulforaphane effect needs the vegetable raw (or a myrosinase-active supplement).
evidence_tier: plausible_emerging
rationale: Encourage raw broccoli/broccoli sprouts, or lightly-crushed-then-brief-steamed;
  add mustard powder to cooked cruciferous to restore myrosinase.
coaching_translation: Encourage raw broccoli/broccoli sprouts, or lightly-crushed-then-brief-steamed;
  add mustard powder to cooked cruciferous to restore myrosinase.
