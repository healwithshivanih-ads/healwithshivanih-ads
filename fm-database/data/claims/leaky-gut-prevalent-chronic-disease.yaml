slug: leaky-gut-prevalent-chronic-disease
statement: Leaky gut (intestinal hyperpermeability) is present in the vast majority
  of people with chronic conditions, often without obvious GI symptoms.
evidence_tier: fm_specific_thin
rationale: Claimed prevalence of ~90% is a clinical observation from FM practice,
  not an epidemiological figure. Intestinal permeability is measurable and associated
  with multiple chronic conditions, but the precise prevalence claim is not peer-reviewed.
coaching_translation: Even if your client doesn't complain about digestion, gut permeability
  may be silently driving their pain, fatigue, or immune issues.
caveats:
- The '90% of people have leaky gut' figure is not from peer-reviewed literature.
- Source is expert FM lecture — treat as fm_specific_thin.
- Verify with clinician if intestinal permeability testing is warranted.
