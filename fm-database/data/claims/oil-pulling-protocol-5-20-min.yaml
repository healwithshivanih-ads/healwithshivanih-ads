slug: oil-pulling-protocol-5-20-min
statement: Ayurvedic oil pulling uses 1 to 2 tablespoons of any food-grade organic
  oil (sesame or coconut traditionally) swished gently in the mouth for 5 to 20 minutes
  each morning. The practice is framed as removing fat-soluble toxins through the
  oral mucosa, improving the oral microbiome (which feeds gut and cardiovascular health),
  and signalling the stomach via taste-mediated reflexes to release digestive enzymes
  ahead of the first meal.
