sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 61 — Hepatitis, pg 1037-1038, 1041
  quote: High doses (420 mg per day) of silymarin for periods of 3 to 12 months resulted
    in a reversal of liver cell damage. Dosage is based on silymarin content (standardized
    extracts are preferred), 140 mg to 210 mg silymarin three times per day; dosage
    for silymarin phytosome is 120 mg two to three times per day between meals.
