slug: hepatitis-milk-thistle-silymarin
statement: Milk thistle silymarin is effective in both acute and chronic viral hepatitis
  — acts as antioxidant, boosts hepatic glutathione and SOD, inhibits inflammatory
  mediators, stimulates hepatocyte regeneration. Standardised extract — 140-210 mg
  silymarin three times daily. Silymarin phytosome (phosphatidylcholine- bound) at
  120 mg 2-3 times daily between meals is better absorbed. In a 232-patient trial,
  phytosome normalised liver function faster than unbound silymarin or placebo. Well
  tolerated; may loosen stool at high doses.
evidence_tier: strong
