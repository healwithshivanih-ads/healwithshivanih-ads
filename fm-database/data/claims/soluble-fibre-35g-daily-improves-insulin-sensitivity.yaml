slug: soluble-fibre-35g-daily-improves-insulin-sensitivity
statement: Soluble dietary fibre (at least 35 g/day from food, especially legumes,
  oat bran, vegetables, and psyllium) slows glucose absorption, prevents glycaemic
  spikes, and increases tissue insulin sensitivity.
evidence_tier: strong
rationale: Consistent RCT evidence; high-fibre low-GL diets are classified as 'most
  scientifically proven dietary support for T1DM and T2DM' in this source.
coaching_translation: Fibre is the cornerstone of a diabetes-friendly diet — 35 g
  per day target, mostly from vegetables, legumes, and whole grains.
