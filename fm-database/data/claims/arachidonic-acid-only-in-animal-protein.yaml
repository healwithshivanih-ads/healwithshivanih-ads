slug: arachidonic-acid-only-in-animal-protein
statement: Arachidonic acid (AA), the primary omega-6 fatty acid substrate for pro-inflammatory prostaglandins and leukotrienes,
  is found exclusively in animal protein (meat, poultry) and not in plant foods or fish.
evidence_tier: strong
rationale: Arachidonic acid is found predominantly in animal tissues; fish contain EPA/DHA, not significant AA. Plants do
  not contain AA. This is established nutritional biochemistry.
coaching_translation: Animal meats are the main dietary source of the fat that fuels your body's inflammatory fire. Reducing
  or eliminating them is particularly important during active inflammation.
caveats:
- Some fish (e.g., farmed fish) may contain small amounts of AA depending on feed; wild fish contain primarily EPA/DHA.
