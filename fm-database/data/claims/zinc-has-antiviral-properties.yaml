slug: zinc-has-antiviral-properties
statement: Zinc (30–60 mg daily in divided doses) has strong antiviral properties
  against many viruses and supports immune function.
evidence_tier: strong
rationale: A large body of peer-reviewed research supports zinc's role in immune function
  and antiviral activity, including inhibiting coronavirus RNA polymerase (te Velthuis
  et al. 2010, PLoS Pathog). Multiple referenced RCTs and reviews support this claim.
coaching_translation: Zinc is one of the most well-researched minerals for immune
  health and fighting viruses. It's found in meat, shellfish, and seeds, and is commonly
  supplemented during illness.
out_of_scope_notes: Doses above the UL (40 mg/day for adults) should be supervised
  by a clinician due to risk of copper depletion. Long-term high-dose zinc requires
  clinician monitoring.
caveats:
- Chronic high-dose zinc can deplete copper — supplement copper if using zinc long-term
  above 40 mg/day.
- 'Zinc form matters: acetate, citrate, picolinate, glycinate, or gluconate (lozenge)
  are preferred bioavailable forms.'
