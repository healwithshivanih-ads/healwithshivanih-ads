slug: tavns-psoriasis-case-diurnal-cortisol
statement: A 3-month case study of a plaque psoriasis patient receiving daily taVNS
  showed reduced diurnal salivary cortisol exposure (area under curve dropped from
  58.2 ± 35.2 to 34.9 ± 13.8 ng/mL·h), suggesting potential benefit for glucocorticoid-resistant
  inflammatory skin conditions.
