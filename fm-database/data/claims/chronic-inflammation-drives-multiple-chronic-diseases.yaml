slug: chronic-inflammation-drives-multiple-chronic-diseases
statement: Chronic inflammation is a major underlying driver of insulin resistance,
  autoimmune conditions, depression/brain fog, leaky gut, hormonal imbalances, and
  cardiovascular disease.
evidence_tier: strong
rationale: Well-established across multiple peer-reviewed bodies of literature. Chronic
  low-grade inflammation is a convergent mechanism for most non-communicable chronic
  diseases.
coaching_translation: Most of your clients' chronic symptoms — fatigue, brain fog,
  joint pain, gut issues — likely share inflammation as a root driver. Addressing
  it through diet, sleep, and stress is foundational.
caveats:
- Source is an educational cheatsheet without primary citations; the claim itself
  is well-supported in peer-reviewed literature.
