slug: nac-glutathione-support-t-regs
statement: NAC and glutathione support antioxidant defense and T-regulatory cell function
  in autoimmune conditions.
evidence_tier: plausible_emerging
rationale: NAC as a glutathione precursor with immunomodulatory properties is well-studied.
  Its specific role in T-reg support in autoimmunity is mechanistically sound but
  clinical evidence in autoimmune patients is emerging.
coaching_translation: NAC helps your body produce glutathione — your master antioxidant
  — which is often depleted in chronic inflammation and autoimmunity.
