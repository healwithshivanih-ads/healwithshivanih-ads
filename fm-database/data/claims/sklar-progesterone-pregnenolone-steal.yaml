slug: sklar-progesterone-pregnenolone-steal
statement: Under chronic HPA-axis activation the body diverts steroidogenic precursors
  (pregnenolone, and clinically progesterone) toward cortisol production — the so-called
  pregnenolone or cortisol steal pattern. This shows up as low luteal progesterone,
  shortened luteal phase, pre-menstrual spotting and recurrent implantation failure,
  even when the woman believes she is "managing her stress" well.
