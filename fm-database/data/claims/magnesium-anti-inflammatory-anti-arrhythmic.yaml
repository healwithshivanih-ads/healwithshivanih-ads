slug: magnesium-anti-inflammatory-anti-arrhythmic
statement: Magnesium supplementation lowers blood sugar, exerts anti-inflammatory
  effects, supports bowel regularity, and helps prevent cardiac arrhythmias.
evidence_tier: plausible_emerging
rationale: Magnesium's role in arrhythmia prevention has clinical evidence (IV magnesium
  in torsades de pointes is standard care). Oral supplementation effects on blood
  sugar and inflammation have some RCT support but less conclusive evidence for arrhythmia
  prevention specifically.
coaching_translation: Magnesium is a heart-friendly mineral that many people don't
  get enough of. It helps with blood sugar, inflammation, digestion, and may help
  prevent irregular heartbeats.
caveats:
- Specific RCTs for oral magnesium and arrhythmia prevention in non-deficient patients
  are limited.
- Source is expert clinical practice recommendation, not a systematic review.
- Dose should be guided by magnesium status testing.
