slug: sklar-laparoscopy-gold-standard-endo-diagnosis
statement: Definitive endometriosis diagnosis still requires surgical visualisation
  and biopsy via laparoscopy; ultrasound and MRI miss many cases (especially superficial
  peritoneal disease), and non-invasive proxies like elevated inflammatory markers
  or ReceptivaDx can raise clinical suspicion but cannot replace tissue diagnosis.
  Excision (not ablation) by an endometriosis specialist remains the gold-standard
  surgical management.
