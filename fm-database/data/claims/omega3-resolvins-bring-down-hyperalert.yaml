slug: omega3-resolvins-bring-down-hyperalert
statement: Diet shifts that bring down the chronically over-activated innate immune
  system in cognitive-decline clients include removing pathogen burden (oral microbiome
  work, antiviral course where indicated), reducing pro-inflammatory saturated-fat
  excess, and emphasising polyunsaturated long-chain omega-3 fatty acids that generate
  specialised pro-resolving mediators (resolvins, protectins, maresins). The goal
  is to switch the innate-immune state from "hyper response" back toward physiological
  resolution.
