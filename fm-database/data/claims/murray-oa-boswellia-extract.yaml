slug: murray-oa-boswellia-extract
statement: Boswellia serrata extracts standardized for boswellic acids decrease knee
  pain and swelling, improve knee flexion and walking distance, and lower cartilage
  breakdown markers in knee osteoarthritis. Mechanisms include inhibition of inflammatory
  mediators, preservation of glycosaminoglycan synthesis, and improved blood supply
  to joint tissues. No side effects from boswellic acids have been reported in published
  trials.
evidence_tier: plausible_emerging
