sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 80 — Osteoarthritis, pg 1316-1317
  quote: Boswellia (Boswellia serrata) yields a gum resin known as salai guggul that
    has been used for centuries for arthritic conditions. Among several mechanisms
    of action are inhibition of inflammatory mediators, prevention of decreased GAG
    synthesis, and improved blood supply to joint tissues. Clinical studies using
    herbal formulas with boswellia have yielded good results in osteoarthritis of
    the knee, with patients experiencing decreased knee pain, decreased swelling,
    and increased knee flexion and walking distance. No side effects due to boswellic
    acids have been reported.
