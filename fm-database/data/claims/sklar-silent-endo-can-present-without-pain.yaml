slug: sklar-silent-endo-can-present-without-pain
statement: Sklar reports recurrently encountering women with stage III endometriosis
  confirmed at laparoscopy who had zero or only mild symptoms (slight bloating) —
  the absence of severe pain does not rule out endometriosis, and silent endo is a
  frequent driver of unexplained IVF failure and recurrent pregnancy loss.
