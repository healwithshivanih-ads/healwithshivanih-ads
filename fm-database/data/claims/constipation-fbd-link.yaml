slug: constipation-fbd-link
statement: Women with fewer than 3 bowel movements per week have a 4.5-fold higher
  risk of fibrocystic breast disease than women with at least one daily BM. Mechanism
  is fecal bacterial beta-glucuronidase de-conjugating excreted estrogens, allowing
  their reabsorption. Vegetarian women excrete 2 to 3 times more conjugated estrogens
  than omnivores. Probiotic supplementation measurably lowers fecal beta-glucuronidase
  activity. Coach prescribes daily fiber + bowel regularity for any FBD client.
