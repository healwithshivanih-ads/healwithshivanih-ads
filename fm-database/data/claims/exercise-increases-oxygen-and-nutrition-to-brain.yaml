slug: exercise-increases-oxygen-and-nutrition-to-brain
statement: Exercise increases blood supply to the brain, delivering more oxygen, nutrients,
  and water to brain cells while removing waste products, supporting mood and cognitive
  function.
evidence_tier: strong
rationale: Exercise-induced cerebral blood flow increase and its cognitive/mood benefits
  are strongly supported in peer-reviewed literature including multiple RCTs.
coaching_translation: Moving your body is one of the most evidence-backed ways to
  improve your mood and mental sharpness. Even a daily walk increases blood flow to
  the brain.
caveats:
- Source is expert lecture, but this claim has strong independent research support
