slug: scfa-production-supports-brain-gut-health
statement: A high-fiber diet promotes diverse gut bacteria that produce SCFAs, which
  reduce inflammation, support brain health, and are linked to improved mood and lower
  risk of depression.
evidence_tier: plausible_emerging
rationale: SCFA production from fiber fermentation is well-established. Links between
  SCFAs, gut barrier integrity, and brain health are supported by animal and emerging
  human studies.
coaching_translation: Eating more fruits, vegetables, legumes, and whole grains feeds
  your gut bacteria to produce compounds that protect your brain and support a positive
  mood.
