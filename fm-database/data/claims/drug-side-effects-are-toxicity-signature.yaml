statement: By the sufficiency-deficiency-toxicity model, what conventional medicine
  calls "side effects" of pharmaceuticals are direct expressions of toxicity. A drug
  that suppresses a symptom or shifts a biomarker without addressing the underlying
  lifestyle-driven deficiency or toxicity is by definition adding a new toxic input
  to the system, even when the suppression is clinically useful in the short term
  (e.g. acute infection antibiotic, life-saving surgery anaesthesia). The coach's
  role is not to oppose pharmaceutical care — which is irreplaceable for acute and
  certain chronic conditions — but to recognise that drug therapy is a "fire department"
  intervention (necessary when the house is burning) and cannot be a "maintenance
  contractor" (which is what is needed to keep the house healthy long-term). This
  reframe avoids the common client trap of believing they are doing their health work
  by taking their prescriptions while the underlying lifestyle drivers continue unaddressed.
