slug: murray-niacin-flush-titration-protocol
statement: Crystalline (immediate-release) niacin should be started at 100 mg/day
  and titrated upward over 4–6 weeks to a therapeutic 1.5–3 g/day, taken at night
  since most cholesterol synthesis occurs during sleep. Inositol hexaniacinate or
  intermediate-release niacin start at 500 mg/night and titrate to 1,500 mg after
  2 weeks. Liver function should be monitored every 3 months. Niacin is contraindicated
  in pre-existing liver disease or elevated liver enzymes.
evidence_tier: strong
rationale: Standard clinical protocol. Early sustained-release (now obsolete) caused
  52% hepatotoxicity; modern intermediate-release products are well tolerated in large
  trials. Inositol hexaniacinate has European clinical heritage with better tolerability
  + comparable lipid effect. Timing recommendation (at night) reflects diurnal HMG-CoA
  reductase activity peaking at night.
coaching_translation: 'How to take niacin without misery: start at 100 mg/day, increase
  weekly over 4-6 weeks to 1.5-3 g/day, all at bedtime since the liver makes most
  cholesterol overnight. Take with food, sip cold water at first flush, and ask your
  doctor for liver enzyme checks every 3 months. If flushing is intolerable, switch
  to inositol hexaniacinate or the newer intermediate-release forms.'
caveats:
- Avoid OLD sustained-release niacin (high hepatotoxicity)
- Liver enzymes every 3 months — non-negotiable
- Active liver disease or elevated LFTs = contraindicated
- Active peptic ulcer disease = caution
- Pregnancy + breastfeeding = not for therapeutic lipid doses
- May aggravate gout (raises uric acid)
