slug: start-supplements-at-minimum-effective-dose
statement: For any supplement dose range, start at the minimum and increase only if
  more improvement is needed, because more is not always better.
evidence_tier: fm_specific_thin
rationale: A dosing principle applied throughout the action plan.
coaching_translation: Start every supplement low and only go up if you actually need
