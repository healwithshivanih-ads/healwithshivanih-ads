slug: mayo-gout-dietary-and-alcohol-triggers
statement: The strongest dietary contributors are alcohol (especially beer and spirits),
  high-fructose corn syrup and sweetened beverages, and large amounts of organ meats,
  red meat, and certain seafood (anchovies, sardines, mussels, scallops); coffee and
  dairy appear protective.
