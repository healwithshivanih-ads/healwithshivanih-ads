slug: hydrastis-inhibits-bacterial-decarboxylase-polyamines
statement: Berberine alkaloids in Hydrastis canadensis (goldenseal) and vitamin A
  inhibit the bacterial decarboxylase enzyme that converts dietary amino acids (arginine,
  ornithine) into polyamines (putrescine, spermidine, cadaverine) — toxic metabolites
  elevated in psoriatics that suppress cAMP and drive keratinocyte hyperproliferation.
  Lowered skin and urinary polyamine levels correlate with clinical improvement in
  psoriasis.
evidence_tier: plausible_emerging
rationale: Pizzorno cites the polyamine-psoriasis connection (Proctor / Russell early
  1980s work) and the mechanism via bacterial decarboxylase inhibition by berberine.
  Modern psoriasis treatment doesn't routinely use this framework, but the FM approach
  to psoriasis hinges on it.
coaching_translation: Berberine-containing herbs like goldenseal cut down the gut
  bacteria that make polyamines — toxic compounds that drive psoriasis. Vitamin A
  does the same thing through a different mechanism.
caveats:
- 4-8 week courses, not chronic use.
- Combine with HCl + pancreatic enzymes to fix the upstream incomplete protein digestion
  driving polyamine production.
- Avoid in pregnancy, lactation, infancy.
- Vitamin A as retinol palmitate 25,000-50,000 IU/day for similar effect.
