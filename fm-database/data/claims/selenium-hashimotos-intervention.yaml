slug: selenium-hashimotos-intervention
statement: Selenium (100–200 mcg/day as selenomethionine) should be optimized before
  iodine supplementation in autoimmune thyroid patients (Hashimoto's, Graves') to
  reduce oxidative thyroid stress.
evidence_tier: plausible_emerging
rationale: Selenium supplementation in Hashimoto's reducing TPO antibodies is supported
  by several RCTs (Toulis et al. 2010, Thyroid). The 'selenium first, then iodine'
  principle is FM consensus; the specific sequencing lacks direct RCT evidence.
coaching_translation: Remind clients with thyroid autoimmunity to discuss selenium
  status with their clinician before any iodine supplementation.
out_of_scope_notes: Managing autoimmune thyroid disease is clinician territory.
caveats:
- '>400 mcg/day long-term risks toxicity (hair loss, nail brittleness).'
- Source is a synthesis document.
