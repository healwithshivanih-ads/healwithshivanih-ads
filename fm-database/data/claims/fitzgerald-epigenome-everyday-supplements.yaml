slug: fitzgerald-epigenome-everyday-supplements
statement: Beyond food, Fitzgerald's near-universal epigenome supports are vitamin
  D (2,000-10,000 IU/day, target blood level 50-70 ng/mL, taken with fat), omega-3
  EPA+DHA ~2,000 mg/day (up to 5,000 mg with inflammation, plus SPMs 1,000 mg), standardized
  green tea extract 500-600 mg (≈250-300 mg EGCG), curcumin 500-1,000 mg with black
  pepper/fat, vitamin C 500-1,000 mg, and vitamin A ≤2,500 IU retinol — all ideally
  guided by labs.
