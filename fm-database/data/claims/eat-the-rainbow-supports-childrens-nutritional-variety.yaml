slug: eat-the-rainbow-supports-childrens-nutritional-variety
statement: Teaching children to 'eat the rainbow' — consuming a variety of colourful
  fruits and vegetables — is an engaging and evidence-aligned approach to improving
  dietary variety and phytonutrient intake.
evidence_tier: strong
rationale: Dietary guidelines and paediatric nutrition research consistently support
  diverse, colourful plant-food intake for children. The 'eat the rainbow' framework
  is a well-validated educational tool used in school and public health settings.
coaching_translation: Encouraging kids to eat foods of many different colours is a
  fun, memorable way to make sure they're getting a wide range of nutrients from fruits
  and vegetables.
caveats:
- Source is practitioner discussion; no specific study cited. Evidence tier reflects
  established nutritional consensus, not this document alone.
