slug: ayurveda-animal-foods-by-dosha
statement: If animal foods are eaten, pitta favours cooling white meats and freshwater fish (white chicken,
  turkey, freshwater fish, egg white) and reduces red and heating meats (beef, lamb, seafood, dark chicken),
  while vata favours warming meats in moderation and kapha favours only light meats (white chicken/turkey,
  freshwater fish, eggs, rabbit, venison).
evidence_tier: fm_specific_thin
rationale: From the Ayurvedic Institute / Lad Food Guidelines for Basic Constitutional Types — traditional
  dosha-food matching (like increases like; opposite qualities balance).
