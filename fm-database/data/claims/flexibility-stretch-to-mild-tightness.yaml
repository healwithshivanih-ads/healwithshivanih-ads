slug: flexibility-stretch-to-mild-tightness
statement: 'Beginner flexibility work should stretch to the point of mild muscle

  tightness — not pain — and should be performed on warm muscles.

  '
evidence_tier: strong
rationale: 'Stretching cold muscles or pushing past mild tightness into pain

  increases injury risk and can trigger protective muscle guarding,

  reducing the long-term ROM benefit. The "mild tightness" endpoint

  produces the stretch reflex adaptation needed for tissue lengthening

  without inducing micro-injury.

  '
coaching_translation: 'Stretch until you feel a mild tightness — not pain. And always
  stretch

  warm muscles, not cold ones. A 5-minute walk or light movement first

  is enough to warm up. If a stretch hurts, ease off; you''ve gone too

  far.

  '
caveats:
- Clients with joint hypermobility should use even more conservative endpoints to
  avoid overstretching lax tissues.
- Assisted/advanced stretching to complete ROM should involve a qualified trainer
  or PT.
