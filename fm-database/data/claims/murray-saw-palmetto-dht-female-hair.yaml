slug: murray-saw-palmetto-dht-female-hair
statement: 'Female-pattern hair loss affects ~30% of women before age 50, with insulin
  resistance, PCOS, testosterone excess, and low antioxidant status as modifiable
  drivers. Saw palmetto extract inhibits 5-alpha-reductase (the enzyme converting
  testosterone to potent dihydrotestosterone/DHT) — the same target as finasteride/Propecia.
  Three FM interventions for female-pattern hair loss: (1) improve blood sugar regulation,
  (2) increase antioxidant intake (especially glutathione-sparing vitamin C, NAC,
  alpha-lipoic acid), (3) saw palmetto extract (typical dose 160 mg twice daily of
  85-95% fatty acid + sterol standardised extract).'
evidence_tier: plausible_emerging
rationale: Saw palmetto evidence stronger in male BPH/baldness; female-pattern hair
  loss extrapolated. Mechanism — same enzyme target. Insulin resistance + PCOS connection
  well-documented (hyperinsulinemia drives ovarian androgen production).
coaching_translation: 'Female-pattern hair loss has three big FM levers: (1) blood
  sugar control (insulin resistance + PCOS drive hair loss in women through androgen
  elevation), (2) glutathione-sparing antioxidants (vitamin C, NAC, alpha-lipoic acid,
  flavonoids), (3) saw palmetto extract 160 mg twice daily — same target as Propecia
  but gentler. Effect builds over 6-12 months. Address insulin resistance simultaneously
  for best results.'
caveats:
- Saw palmetto effect modest in women; insulin resistance + PCOS work essential
- Mild antiplatelet — caution + anticoagulants
- Pregnancy avoid (anti-androgenic)
- Combine with low-glycaemic diet + exercise for hormone normalisation
