slug: protein-1-2-to-1-6-g-per-kg-new-us-guideline
statement: The 2026 US Dietary Guidelines for the first time recommend 1.2 to 1.6
  grams of high-quality protein per kilogram of body weight per day, departing from
  the old RDA of 0.8 g/kg (which was set on nitrogen-balance studies aimed at preventing
  deficiency, not at promoting muscle health). For most adults this works out to roughly
  0.7-1.0 g per pound of target body weight.
