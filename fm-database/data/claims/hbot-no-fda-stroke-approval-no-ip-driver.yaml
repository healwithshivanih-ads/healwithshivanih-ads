- id: efrati-perlmutter-empowering-neurologist-2024
  location: Podcast — regulatory discussion
  quote: There is no IP — no intellectual property of oxygen — so actually there is
    no commercial company who wants to push it forward and have the resources to do
    it. There is nobody who can pay a regulatory company to take this and push it
    through the FDA.
rationale: Anchors a common client objection — "if it worked, why is not it covered?"
