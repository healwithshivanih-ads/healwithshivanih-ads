slug: hbot-no-fda-stroke-approval-no-ip-driver
statement: Despite decades of mechanistic and clinical evidence supporting HBOT for
  stroke recovery, FDA approval remains limited to 14 specific indications (radiation
  injury, non-healing wounds, diabetic foot ulcer, gangrene, osteomyelitis, decompression
  sickness, certain wound types, etc.) — not stroke. Efrati attributes this to the
  absence of intellectual property — there is no patent on oxygen, so no commercial
  sponsor will fund the multi-year regulatory submission process. Coaches should recognise
  that lack of FDA stroke approval reflects regulatory economics rather than evidence
  quality.
evidence_tier: plausible_emerging
