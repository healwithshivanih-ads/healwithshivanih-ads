slug: ayurveda-grains-by-dosha
statement: Vata favours grounding cooked grains (rice, wheat, cooked oats) and reduces dry, light grains
  (barley, buckwheat, corn, millet, dry oats); kapha favours light, drying grains (barley, millet, buckwheat,
  corn, rye) and reduces heavy, moist grains (wheat, cooked rice, cooked oats, yeasted bread).
evidence_tier: fm_specific_thin
rationale: From the Ayurvedic Institute / Lad Food Guidelines for Basic Constitutional Types — traditional
  dosha-food matching (like increases like; opposite qualities balance).
