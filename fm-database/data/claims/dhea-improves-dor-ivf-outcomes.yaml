slug: dhea-improves-dor-ivf-outcomes
statement: DHEA 25 mg three times daily for 3+ months before IVF has been shown in
  cohort studies and small randomised trials to increase egg numbers, embryo quality,
  live birth rates (23% vs 4% in one randomised trial), and reduce miscarriage rates
  in women with diminished ovarian reserve, premature ovarian aging, and poor responders.
  Mechanism likely involves increased ovarian androgen substrate supporting early-stage
  follicle recruitment and mitochondrial function.
evidence_tier: plausible_emerging
