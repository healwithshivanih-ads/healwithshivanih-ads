  quote: DHEA is in the process of revolutionizing infertility care for older women
    and for younger women with premature aging ovaries. 28 percent of DHEA-treated
    women became pregnant, compared to just 10 percent of controls.
rationale: Critical for DOR clients prepping for egg freezing or IVF. Tier plausible_emerging
  — controversial because few large RCTs, but consistent positive signal.
