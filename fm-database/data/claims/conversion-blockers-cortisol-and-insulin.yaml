slug: conversion-blockers-cortisol-and-insulin
statement: T4-to-T3 conversion (the "ten Tough Mudders" step Hornaman names) is blocked
  by several specific conditions — elevated cortisol from chronic stress drives T4
  down the reverse-T3 pathway, insulin resistance blunts deiodinase activity, oestrogen
  dominance binds active thyroid hormone, heavy metals (mercury, lead) directly inhibit
  deiodinase enzymes, chronic infection (EBV, Lyme) raises rT3, and DIO1/DIO2 single-nucleotide
  polymorphisms genetically slow conversion. Implication for coach — clients with
  poor conversion (high TSH or normal-feeling-bad despite T4 medication) typically
  need stress, insulin, oestrogen, and heavy-metal work upstream of any T3-containing
  replacement decision.
