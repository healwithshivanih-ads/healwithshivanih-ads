  quote: T4 will convert over to T3. It is really hard for the body to do. There's
    many factors that can interfere with that conversion. Estrogen dominance, insulin
    resistance, heavy metals, underlying infections, a genetic snip on the DIO1 DIO2.
rationale: Names six specific blockers — coach can map intake findings to which one
  is most likely driving a "stuck T4" pattern.
