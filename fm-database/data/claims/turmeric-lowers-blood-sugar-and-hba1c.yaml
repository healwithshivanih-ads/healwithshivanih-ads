slug: turmeric-lowers-blood-sugar-and-hba1c
statement: Turmeric (curcumin) supplementation lowers fasting blood sugar and HbA1c,
  with potential benefit in metabolic syndrome and insulin resistance.
evidence_tier: plausible_emerging
rationale: Several small RCTs support curcumin's blood sugar lowering effects, though
  larger definitive trials are lacking. Mechanism via NF-κB/insulin signaling pathway
  is plausible.
coaching_translation: Turmeric may help keep blood sugar more stable — useful for
  people working on metabolic health alongside diet and exercise changes.
caveats:
- Source is expert lecture — verify with current systematic review of curcumin and
  glycemic control.
- Evidence is emerging, not consensus-level.
