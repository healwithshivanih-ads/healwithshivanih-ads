slug: melatonin-effective-only-when-levels-low
statement: Melatonin supplementation produces a sedative effect only when endogenous
  melatonin levels are low; it is most effective for insomnia in the elderly, in whom
  low melatonin is common, at a dose of 3 mg at bedtime.
evidence_tier: strong
rationale: Well-established from multiple clinical trials; melatonin is not a hypnotic
  in individuals with normal melatonin levels; its efficacy is context-dependent (low-melatonin
  states, jet lag, elderly).
coaching_translation: Melatonin (3 mg at bedtime) is most helpful for older adults
  or shift workers with low melatonin, not as a general sleeping pill for everyone.
caveats:
- Long-term supplementation could disrupt endogenous circadian melatonin production;
  use cyclically rather than indefinitely
