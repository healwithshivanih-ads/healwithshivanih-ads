slug: mayo-migraine-red-flags-sudden-or-new
statement: Sudden severe headache, new headache after age 50, headache with fever
  or stiff neck, headache after head injury, or headache with weakness, vision loss
  or speech changes warrants urgent evaluation to rule out stroke, meningitis, or
  intracranial bleed.
