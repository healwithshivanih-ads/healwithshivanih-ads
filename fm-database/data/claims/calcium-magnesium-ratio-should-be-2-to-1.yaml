slug: calcium-magnesium-ratio-should-be-2-to-1
statement: The ideal dietary calcium-to-magnesium ratio is 2:1; current population ratios of approximately 6:1 contribute
  to excess free ionic calcium and its associated pathologies.
evidence_tier: fm_specific_thin
rationale: The 2:1 calcium:magnesium ratio is commonly cited in functional medicine but is not formally endorsed by major
  nutritional bodies. The concern about excess free calcium is biologically coherent but the specific ratio threshold is FM-specific.
caveats:
- This ratio is a functional medicine heuristic; mainstream guidelines do not specify a calcium:magnesium ratio. Treat as
  a working framework.
coaching_translation: Most people have too much calcium relative to magnesium. Bringing this ratio into better balance — rather
  than supplementing more calcium — is a key functional medicine principle.
