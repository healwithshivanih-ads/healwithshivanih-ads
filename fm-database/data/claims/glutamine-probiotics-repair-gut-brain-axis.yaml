slug: glutamine-probiotics-repair-gut-brain-axis
statement: Glutamine, zinc carnosine, and probiotics (L. rhamnosus GG, B. longum)
  repair gut lining integrity and support the gut-brain axis in IBS and anxiety.
evidence_tier: plausible_emerging
rationale: Glutamine's role in enterocyte integrity is mechanistically well-established.
  Zinc carnosine has RCT evidence for gut mucosal healing. Specific probiotic strains
  (L. rhamnosus GG, B. longum) have the strongest evidence base in IBS and gut-brain
  axis research.
coaching_translation: Healing the gut lining with targeted nutrients and the right
  probiotic strains can reduce anxiety and improve mood—because a leaky gut sends
  inflammatory signals to the brain.
caveats:
- Probiotic strain selection and dosing should be individualized.
- Clinician diagnosis of IBS/IBD recommended before protocol.
- Source is educational synthesis.
