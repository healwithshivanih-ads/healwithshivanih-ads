slug: lithospermum-blocks-tsh-receptor-graves
statement: Lithospermum officinale (gromwell) contains compounds that bind the TSH
  receptor and inhibit antibody-mediated activation, supporting its traditional use
  alongside Lycopus and Melissa in mild Graves' disease.
evidence_tier: fm_specific_thin
rationale: Pizzorno reports the traditional Lycopus-Lithospermum-Melissa botanical
  triad and an in-vitro TSH receptor binding mechanism. Robust human RCTs are limited.
coaching_translation: Gromwell is a traditional herb in the bugleweed-lemon-balm trio
  used for mild overactive thyroid. It seems to physically block the antibody from
  latching onto the thyroid switch.
caveats:
- Contraindicated in hypothyroidism, pregnancy, lactation, and during thyroid hormone
  replacement.
- Use under naturopathic / clinician supervision.
