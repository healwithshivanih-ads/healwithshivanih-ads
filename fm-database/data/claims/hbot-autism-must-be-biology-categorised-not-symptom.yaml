slug: hbot-autism-must-be-biology-categorised-not-symptom
statement: Efrati's position on HBOT for autism — autism as currently defined is a
  behaviour description, not a biology-based diagnosis. The Sagol Center is conducting
  a comprehensive study that categorises autistic children by the underlying biology
  driving the brain damage (genetic mutation, perinatal hypoxic injury, post-encephalitic
  damage), with HBOT response expected to vary by subtype. Subgroups with hypoxic-ischaemic
  birth injury or post-encephalitic damage are likely responders; others (e.g., specific
  genetic syndromes) may not be. Do not generalise.
evidence_tier: plausible_emerging
