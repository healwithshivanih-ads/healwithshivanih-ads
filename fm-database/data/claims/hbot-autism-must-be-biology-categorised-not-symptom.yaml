sources:
- id: efrati-perlmutter-empowering-neurologist-2024
  location: Podcast — autism section
  quote: Speaking about autism in general — that is not the appropriate way. Today
    when we say a child has autism we are describing his behaviour. It is not a physiological
    description. The first step in approaching autism is to categorise them based
    on the pathophysiology and the injury that cause the symptoms.
rationale: Coach scope note — HBOT for autism is investigational and subtype-dependent.
