slug: zinc-supports-gut-lining-repair
statement: Zinc is a key nutrient for repairing the GI tract lining, which is often
  deficient in a compromised gut.
evidence_tier: plausible_emerging
rationale: Zinc plays a role in intestinal barrier function and tissue repair. Some
  evidence supports zinc supplementation in gut permeability. Zinc l-carnosine has
  specific evidence for gastric mucosal protection.
coaching_translation: Zinc helps maintain and repair your gut wall. Low levels — common
  with poor absorption — can slow gut healing.
