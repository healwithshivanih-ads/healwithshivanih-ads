slug: statin-increases-diabetes-risk
statement: Statin therapy is associated with an increased risk of new-onset type 2
  diabetes.
evidence_tier: strong
rationale: This is a well-established, FDA-acknowledged association. The document
  notes it as a known side effect of statin therapy.
coaching_translation: One recognized risk of statin medications is that they may increase
  your chances of developing type 2 diabetes. This is worth discussing with your doctor,
  especially if you already have blood sugar concerns.
caveats:
- Risk appears dose-dependent and is higher with high-intensity statins.
- The cardiovascular benefit may still outweigh this risk in high-risk individuals
  — clinical judgment required.
