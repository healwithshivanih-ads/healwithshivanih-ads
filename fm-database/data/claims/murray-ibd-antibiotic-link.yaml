sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 42 — Crohn's Disease and Ulcerative Colitis, pg 723-724
  quote: Exposure to antibiotics is being linked to IBD. Subjects diagnosed with IBD
    were more likely to have been prescribed antibiotics two to five years before
    their diagnosis. A dose-dependent relationship was shown — the more prescriptions
    for antibiotics, the greater the risk for IBD. Penicillin and tetracycline have
    been available in oral form since 1953. The annual increase in prescriptions of
    antibiotics parallels the rise in the annual incidence of IBD. Gastrointestinal
    infections with various microbes and the yeast Candida albicans can trigger a
    flare-up of disease, and all patients with IBD should be tested for gastrointestinal
    infections.
