slug: murray-ibd-antibiotic-link
statement: Antibiotic exposure two to five years before IBD diagnosis is dose-dependently
  associated with disease development — the more prescriptions, the higher the risk.
  The post-1953 rise in IBD incidence parallels the rise in oral antibiotic use globally.
  NSAIDs (ibuprofen, indomethacin, naproxen) and isotretinoin (Accutane) are also
  implicated. Sublethal antibiotic dosing may drive normally commensal flora to adapt
  and become more virulent. All IBD patients should be screened for active GI infection
  (bacterial, mycobacterial, fungal, viral, Candida) at diagnosis and during flares.
evidence_tier: plausible_emerging
