slug: endotoxemia-drives-systemic-disease
statement: Systemic endotoxemia from SIBO-derived lipopolysaccharide (LPS) is a central
  driver of diverse conditions including depression, anxiety, cognitive decline, cardiovascular
  disease, Parkinson's disease, endometriosis, type 2 diabetes, and fatty liver.
evidence_tier: plausible_emerging
rationale: Dr. Davis presents LPS translocation from fecal microbes in the small intestine
  as a unifying mechanism for systemic inflammation. The individual disease associations
  (e.g., LPS and cardiovascular disease, LPS and neurodegeneration) have emerging
  peer-reviewed support, but the unified claim across all listed conditions from a
  SIBO-specific source is speculative.
coaching_translation: When harmful bacteria overgrow in the small intestine, they
  release toxins that enter the bloodstream and can quietly drive inflammation throughout
  the body—contributing to mood issues, brain problems, heart disease, and more.
caveats:
- Source is expert_consensus interview.
- Individual LPS-disease links vary in evidence strength.
- The scope of conditions claimed is very broad; treat as a working hypothesis.
