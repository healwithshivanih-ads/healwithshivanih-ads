slug: vitamin-d-deficiency-common-in-autoimmune-thyroid-disease
statement: Vitamin D deficiency is common in autoimmune diseases, including Hashimoto's thyroiditis.
evidence_tier: strong
rationale: Multiple observational studies have confirmed higher rates of vitamin D deficiency in individuals with autoimmune
  thyroid disease compared to controls. This is considered an established association.
coaching_translation: Getting your vitamin D levels checked and ensuring adequate vitamin D is an important part of supporting
  immune health in Hashimoto's.
caveats:
- Vitamin D testing (25-OH-D lab) is required to determine individual deficiency and optimal dosing — refer to clinician.
