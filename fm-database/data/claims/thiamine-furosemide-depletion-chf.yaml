sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 40 — CHF, pg 702-703
  quote: Several subsequent studies have shown that daily doses of 80 to 240 mg thiamine
    per day resulted in a 13% to 22% increase of left ventricular ejection fraction.
    In one study, biochemical evidence of severe thiamine deficiency was found in
    98% of patients receiving at least 80 mg per day of furosemide.
