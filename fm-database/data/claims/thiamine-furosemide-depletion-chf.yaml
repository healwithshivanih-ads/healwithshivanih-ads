slug: thiamine-furosemide-depletion-chf
statement: Furosemide (Lasix) depletes thiamine — 98% of patients on >=80 mg/day furosemide
  and 57% on 40 mg/day show biochemical thiamine deficiency. Thiamine 200 to 250 mg/day
  repletion raises left ventricular ejection fraction by 13 to 22% — a survival-relevant
  gain. Coach prescribes thiamine to any CHF client on chronic furosemide; thiamine
  deficiency itself causes wet beriberi heart failure.
evidence_tier: strong
