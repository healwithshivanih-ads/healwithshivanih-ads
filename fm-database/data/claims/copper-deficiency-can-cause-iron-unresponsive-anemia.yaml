slug: copper-deficiency-can-cause-iron-unresponsive-anemia
statement: Copper deficiency causes anemia that does not respond to iron supplementation.
evidence_tier: confirm_with_clinician
rationale: Copper-dependent ceruloplasmin is required for iron mobilization; copper
  deficiency anemia unresponsive to iron is clinically documented.
out_of_scope_notes: Anemia unresponsive to iron requires clinician workup including
  copper status assessment.
caveats:
- Source is a practitioner cheatsheet without primary citations.
- Do not assume anemia is iron-deficiency without clinician assessment.
