slug: sattu-high-protein-fibre-paratha
statement: Sattu (roasted chickpea flour) is a high-protein, high-fibre ingredient
  that supports satiety and blood sugar regulation when used as a roti or paratha
  flour in cardiometabolic meal plans.
evidence_tier: plausible_emerging
rationale: Sattu Paratha uses 1 cup sattu flour as its base. Sattu is a traditional
  Indian ingredient with recognised high protein and fibre content; limited but growing
  evidence supports its role in glycaemic control.
coaching_translation: Sattu parathas are made from roasted gram flour — a filling,
  high-protein, high-fibre alternative to regular wheat roti that helps keep blood
  sugar steady.
caveats:
- Source is an expert-curated recipe book. Sattu-specific RCT evidence in cardiometabolic
  outcomes is limited.
