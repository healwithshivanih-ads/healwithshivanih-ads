slug: egg-freezing-at-42-needs-multiple-cycles
statement: Egg freezing at age 42 typically yields 3-7 mature oocytes per cycle vs
  12-15 at age 32; expected aneuploidy rate of frozen eggs at 42 is 60-80%, meaning
  even successful retrieval and freeze cycles produce a small number of euploid eggs.
  Most clinicians recommend 2-3 retrieval cycles to bank enough euploid eggs for a
  meaningful future pregnancy chance, and a 3-6 month preconception protocol (CoQ10/ubiquinol
  300 mg, DHEA if low AMH and not PCOS, melatonin during stim, Mediterranean diet,
  BPA/phthalate avoidance, prenatal vitamins, vitamin D repletion) before each retrieval
  cycle.
