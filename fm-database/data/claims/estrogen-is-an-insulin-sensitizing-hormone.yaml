slug: estrogen-is-an-insulin-sensitizing-hormone
statement: Estrogen functions as an insulin-sensitizing hormone; its decline during
  the menopause transition contributes to increased insulin resistance and reduced
  metabolic health.
evidence_tier: plausible_emerging
rationale: The insulin-sensitizing properties of estradiol are supported by mechanistic
  and observational evidence; however, the direct claim that this is the primary driver
  of perimenopausal metabolic decline requires nuance. Single-expert source.
coaching_translation: One reason metabolism often shifts in menopause is that estrogen
  — which helped keep blood sugar stable — is no longer present in the same amounts.
caveats:
- Multiple factors contribute to perimenopausal insulin resistance beyond estrogen
  decline.
- Single-expert source.
