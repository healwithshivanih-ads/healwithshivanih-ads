slug: mthfr-snp-reduces-methylfolate-production
statement: MTHFR gene variants (SNPs) reduce the enzyme's ability to convert dietary
  folate into methylfolate, impairing the methylation cycle and potentially affecting
  hundreds of downstream biochemical processes.
evidence_tier: plausible_emerging
rationale: 'Mechanistically well-established: MTHFR C677T and A1298C polymorphisms
  reduce enzyme activity 30–70%. Clinical significance in otherwise healthy individuals
  with adequate diet is actively debated; the claim that ''hundreds of processes''
  are necessarily affected oversimplifies population heterogeneity. Source is a consumer
  trade book.'
coaching_translation: If you have an MTHFR variant, your body may struggle to activate
  folate from food. Loading up on leafy greens (which contain pre-activated methylfolate)
  and avoiding synthetic folic acid gives your system the raw material it needs.
caveats:
- Source is a consumer book, not primary literature
- Penetrance of MTHFR SNPs is highly context-dependent — many carriers are entirely
  asymptomatic
- Magnitude of functional impairment varies by SNP type, diet, and lifestyle
