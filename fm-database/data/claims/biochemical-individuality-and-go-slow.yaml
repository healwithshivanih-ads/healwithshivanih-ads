sources:
- id: gordon-energy-blueprint-podcast-2026
  location: Podcast — biochemical individuality + go slow segment
  quote: Biochemical individuality. You're all different. What cured your uncle may
    help you. We have to work with what you can do. When you change quickly, the body
    reacts. It might not be safe anymore. Many people prefer order. They need things
    in a certain order. Don't try to shift what you do. Go slow. Respect your fear.
    Don't give into it, but respect it.
rationale: Coach pacing rule — chronic-illness clients are NOT in a hurry; weekly
  small wins build the safety signal stack the body needs.
