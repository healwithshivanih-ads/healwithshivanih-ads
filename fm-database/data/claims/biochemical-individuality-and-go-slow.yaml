slug: biochemical-individuality-and-go-slow
statement: Gordon emphasises radical biochemical individuality in chronic illness
  — what cured one client's identical symptom complex may worsen the next. His clinical
  rule for chronic-illness clients is "go slow and stay small" — introduce one change
  at a time at the smallest meaningful dose, observe for 1-2 weeks, then titrate.
  This holds especially for clients with neurological or autonomic dysfunction who
  cannot tolerate change. ADHD brains may thrive on novelty; structured-routine brains
  heal faster with ordered, repetitive days. Coach role — match the pace of change
  to the client's nervous system, NOT to a generic protocol timeline.
evidence_tier: plausible_emerging
