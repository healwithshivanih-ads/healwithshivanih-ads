slug: reduce-home-toxin-load-start-with-bedroom-myers-tas
statement: Reducing the home toxin load matters most where you spend the most time
  and detox — the bedroom — so natural mattresses, organic untreated bedding, low-VOC
  paint, non-vinyl shower curtains, natural-fibre rugs, and cleaner household products
  are prioritised.
evidence_tier: fm_specific_thin
rationale: We spend roughly a third of life asleep while the body repairs, so off-gassing
  chemicals from mattresses, bedding, carpets, and paints are a high-yield target.
coaching_translation: Start toxin cleanup in the bedroom — natural bedding and low-VOC
  materials pay off because you're there so many hours.
