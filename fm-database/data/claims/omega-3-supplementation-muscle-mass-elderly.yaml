slug: omega-3-supplementation-muscle-mass-elderly
statement: Supplementing with omega-3 fatty acids has been shown to have a positive
  effect on muscle mass and walking speed, particularly in people aged 60 years or
  older.
evidence_tier: plausible_emerging
rationale: Supported by Huang et al. 2020 meta-analysis (Nutrients, 12(12):3739) cited
  in document references.
coaching_translation: For older adults, omega-3s aren't just heart health — they may
  also help preserve muscle and physical function. Eating fatty fish 2x/week or discussing
  supplementation with your doctor is worthwhile.
caveats:
- Evidence is strongest in adults 60+; younger population data is more limited.
