slug: sklar-90-day-folliculogenesis-window
statement: An ovarian follicle takes roughly 90 days to mature from antral recruitment
  to ovulation — meaning today's nutrition, sleep, stress, supplements and toxin exposure
  are shaping the egg you will ovulate three months from now. This is the rationale
  for a 90-day egg-quality optimisation window.
