slug: fish-oil-3g-epa-dha-12wks-for-ra
statement: Fish oil at a minimum of 3 g combined EPA+DHA daily for at least 12 weeks
  improves RA morning stiffness, tender and swollen joint counts, fatigue, and reduces
  CRP, IL-1-beta, TNF-alpha, and leukotriene B4 — and reduces long-term NSAID use.
evidence_tier: strong
rationale: Multiple RCTs and meta-analyses support EPA+DHA at therapeutic doses for
  RA. Pizzorno cites the 12-week, 3 g/day threshold below which effects are not apparent.
  Mechanism via COX-2 competitive inhibition.
coaching_translation: Fish oil works for RA — but only at a serious dose (3 grams
  of EPA+DHA combined) and only after 3 months. Less than that and you'll likely conclude
  it doesn't work.
caveats:
- Use third-party certified for purity (mercury, PCB).
- 3 g EPA+DHA combined ≠ 3 g of fish oil; check label carefully.
- Pair with vitamin E (mixed tocopherols) for oxidative stability.
