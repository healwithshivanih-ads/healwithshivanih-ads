  location: minute 22 — egg DNA repair capacity by age
  quote: Our eggs they're amazing and they have the ability to repair some degree
    of sperm DNA damage. As we got older, the older women, their eggs had less of
    the capacity. So that means that your partner has to step up.
rationale: Mechanistically links male and female preconception preparation — particularly
  relevant for AMA couples.
