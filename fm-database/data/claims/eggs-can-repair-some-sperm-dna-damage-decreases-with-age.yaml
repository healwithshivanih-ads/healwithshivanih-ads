slug: eggs-can-repair-some-sperm-dna-damage-decreases-with-age
statement: Young eggs have the capacity to repair some types of sperm DNA damage during
  fertilisation; this repair capacity declines markedly with maternal age. The practical
  implication is that male preconception preparation becomes more important, not less,
  as the female partner ages. Older partners cannot offset male DNA-fragmentation
  deficits the way younger partners can.
evidence_tier: plausible_emerging
