slug: cognitive-reserve-and-stimulation
statement: Higher educational attainment and ongoing cognitive demand are independently
  protective against Alzheimer's diagnosis because they build "cognitive reserve"
  — more synapses give the client a longer way to fall before testing detects impairment.
  Lifelong learning, problem-solving, novel skill acquisition and engaged work into
  later life all contribute. However, stimulation alone does not cure or prevent Alzheimer's;
  it is one pillar among seven, and infections, mycotoxins, hypercoagulability and
  insulin resistance remain independent drivers.
evidence_tier: plausible_emerging
