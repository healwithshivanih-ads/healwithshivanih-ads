  location: Podcast — cognitive reserve segment
  quote: It's very clear that your level of education as it goes up decreases your
    risk for Alzheimer's. The people who are doing more — who have had more education
    — have been stimulating for longer. Let's say that they have more synapses. They
    have a farther way to fall before they get to the point that you can recognise
    they're not hitting on all eight cylinders.
rationale: Supports coach prescription of brain training (novel learning, language,
  instrument, social engagement) as part of the seven-pillar core.
