slug: vitamin-c-primary-antioxidant-anti-inflammatory
statement: Vitamin C is a primary antioxidant and anti-inflammatory nutrient that
  can be dosed therapeutically via capsule or amla powder (5g morning and evening);
  it works as a long-term strategy, not an immediate intervention.
evidence_tier: strong
rationale: Vitamin C's role as an antioxidant (free radical scavenger) and its anti-inflammatory
  effects are well-supported. Amla is one of the highest known whole-food sources
  of vitamin C.
coaching_translation: Vitamin C from amla powder or supplements is one of the best
  foundational anti-inflammatory tools. Think of it as building a protective shield
  for your cells — consistently, over months.
caveats:
- High-dose vitamin C (>5–10g) can cause loose stools (bowel tolerance effect). Start
  low and build up.
- Source is expert FM lecture.
