slug: berberine-insulin-sensitivity-nafld
statement: Berberine improves insulin sensitivity and supports hepatic fat reduction
  in NAFLD and metabolic syndrome.
evidence_tier: plausible_emerging
rationale: Listed as key supplement for NAFLD focused on insulin sensitivity. Berberine
  has emerging RCT evidence for glucose/lipid metabolism but source does not cite
  specific studies.
coaching_translation: Berberine is a plant compound that helps the body use insulin
  more effectively, which is key for reducing liver fat.
out_of_scope_notes: Berberine interacts with multiple medications. Coaches should
  flag for clinician review before recommending.
caveats:
- Drug interactions possible (metformin, blood thinners)
- Clinician review required
- Source is FM synthesis
