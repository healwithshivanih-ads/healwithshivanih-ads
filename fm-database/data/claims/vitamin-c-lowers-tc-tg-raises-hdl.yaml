slug: vitamin-c-lowers-tc-tg-raises-hdl
statement: Higher blood vitamin C levels are associated with lower TC and TGs and
  higher HDL-C; high dietary vitamin C intake reduces risk of death from CVD and corresponds
  to increased longevity of 5–7 years in men and 1–3 years in women.
evidence_tier: plausible_emerging
rationale: Epidemiological associations are consistent; mechanistic data (collagen
  synthesis, antioxidant recycling, Lp(a) reduction) are solid. RCT evidence for hard
  CVD outcomes is mixed.
coaching_translation: Vitamin C supports heart health by protecting arteries, lowering
  cholesterol, and reducing inflammation — it's among the most versatile cardiovascular
  nutrients.
