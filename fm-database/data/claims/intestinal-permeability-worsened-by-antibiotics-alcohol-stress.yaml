slug: intestinal-permeability-worsened-by-antibiotics-alcohol-stress
statement: Antibiotics, alcohol, and chronic stress are primary disruptors of the
  small intestinal lining barrier, contributing to gut permeability and autoimmune
  risk.
evidence_tier: plausible_emerging
rationale: All three factors have documented effects on gut microbiome composition
  and/or tight junction proteins in peer-reviewed literature, though magnitude and
  reversibility vary. Stated without citations in this session.
coaching_translation: The three biggest everyday threats to your gut lining are antibiotics
  (necessary sometimes, but impactful), alcohol, and chronic stress. Minimizing them
  protects your gut wall and your immune system.
caveats:
- Single-expert source; relative contributions of each factor are not quantified.
- Antibiotic necessity should always be assessed by a clinician.
