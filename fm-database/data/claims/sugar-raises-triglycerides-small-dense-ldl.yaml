slug: sugar-raises-triglycerides-small-dense-ldl
statement: Added sugar is pro-inflammatory, raises triglycerides, raises fasting blood
  sugar and HbA1c, and increases small dense LDL — all established cardiovascular
  risk drivers.
evidence_tier: strong
rationale: Sugar's effects on triglycerides, insulin resistance, and LDL particle
  size are well-established in metabolic and cardiovascular research.
coaching_translation: Sugar isn't just a weight issue — it directly raises your 'bad'
  blood fats and fuels inflammation in your arteries. Limiting added sugar to 20g/day
  is a powerful heart-protective step.
caveats:
- Clinician's personal threshold of 20g/day added sugar is more restrictive than some
  guidelines — verify with clinician for individual patients.
