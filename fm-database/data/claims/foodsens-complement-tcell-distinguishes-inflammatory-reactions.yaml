slug: foodsens-complement-tcell-distinguishes-inflammatory-reactions
statement: Because IgG alone cannot tell you whether a food is driving inflammation,
  better panels pair IgG with complement (C3d) or T-cell (CD3/CD4) activation markers.
  Complement activation signals the immune alarm has been tripped and inflammation
  is being generated; T-cell activation indicates definitive cell-mediated inflammation.
  Combining IgG with complement or T-cell data gives a far more accurate read on the
  inflammatory pattern.
evidence_tier: plausible_emerging
rationale: This is why practitioners increasingly choose panels with complement or
  T-cell components — they separate a merely-present antibody from an actively inflammatory
  reaction.
coaching_translation: Help a client understand the difference between a test that
  only shows antibodies and one that also shows an inflammatory signal, so they know
  why their clinician may prefer one lab over another.
out_of_scope_notes: Ordering and clinically interpreting complement or T-cell food
  panels is strictly the clinician's role; the coach educates about what the markers
  mean.
