slug: sklar-bbt-tracking-reveals-late-ovulation
statement: Daily basal body temperature charting can reveal that a woman with a textbook
  28-day cycle is actually ovulating on day 20, leaving only an eight-day luteal phase
  too short for implantation — information that a single day-21 progesterone draw
  will report as normal but that BBT combined with cervical-mucus and symptom tracking
  surfaces immediately.
