slug: murray-vitamin-k2-mk7-osteocalcin
statement: Vitamin K2 (specifically MK-7, found concentrated in natto and produced
  by gut bacteria) activates osteocalcin — the protein that ANCHORS calcium molecules
  into bone matrix. Without adequate K2, calcium fails to deposit in bone properly
  and may instead deposit in soft tissue and arteries. Dose 100 mcg/day MK-7 (half-life
  96 hours vs 8 hours for K1 and MK-4), 180 mcg/day in organ transplant osteoporosis
  trial, or 360 mcg/day in early menopause trials. Vitamin K appears to reduce fracture
  risk INDEPENDENT of effects on bone mineral density — suggesting it works by improving
  bone tensile strength rather than raw density.
evidence_tier: strong
rationale: Multiple trials cited including the 5 mg K1 trial (postmenopausal osteopenia
  — fewer fractures, no BMD change) + natto epidemiology + Nurses Health Study (low
  dietary K1 = increased hip fractures). Mechanism — K is the cofactor for the gamma-carboxylase
  enzyme that converts glutamate residues to gamma-carboxyglutamate (Gla) on osteocalcin,
  enabling calcium binding. MK-7 superiority over K1 + MK-4 reflects bioavailability
  + half-life. Pairs essentially with vitamin D + calcium — the trio is the modern
  FM bone-protective core.
coaching_translation: Vitamin K2 (MK-7 form) is the third leg of the bone-health stool
  — calcium provides the building block, vitamin D opens the door to absorption, and
  K2 directs the calcium INTO bone rather than into arteries and soft tissue. 100
  mcg/day MK-7 is the standard dose. Concentrated in natto (fermented soybeans, traditional
  Japanese food) and small amounts in aged cheeses and egg yolks. Important — K1 from
  leafy greens is NOT the same as K2 for bone health. Pair routinely with vitamin
  D and calcium.
caveats:
- MK-7 form preferred (half-life 96 hours vs 8 hours for K1 or MK-4)
- K2 may reduce fracture risk WITHOUT improving BMD on scans — don't expect DEXA changes
- Warfarin contraindication — K antagonist, will reduce anticoagulant effect
- Newer DOACs (apixaban, dabigatran) are NOT affected by vitamin K
- Pair with calcium + vitamin D for full bone-direction effect
- Pregnancy + breastfeeding safety established
