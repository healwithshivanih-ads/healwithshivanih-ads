sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 81 — Osteoporosis, pg 1346, 1354–1355
  quote: A deficiency of vitamin K leads to impaired bone health due to inadequate
    osteocalcin levels. MK7 has been found in animal studies to be more potent and
    more bioavailable as well as to have a longer half-life than MK4. There is no
    question that vitamin K is performing a vital function in bone health and appears
    to reduce fractures, but it is unlikely to produce a significant improvement in
    BMD on its own.
