slug: fitzgerald-collagen-joint-skin-sleep
statement: Collagen — about 1,400 amino acids in a triple helix, hydrolysed into absorbable
  peptides in broth or powder — is anti-inflammatory and rich in connective-tissue
  nutrients (glucosamine, chondroitin, minerals), reducing pain in arthritis and exercise-related
  exertion and supporting skin and hair; its glycine content also aids sleep and helps
  keep the cortisol awakening response in check.
