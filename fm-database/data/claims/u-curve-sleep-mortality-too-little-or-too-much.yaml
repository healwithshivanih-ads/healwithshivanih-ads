slug: u-curve-sleep-mortality-too-little-or-too-much
statement: Population-level data tracking approximately one million individuals describes
  a U-shaped curve between nightly sleep duration and longevity. Adults sleeping consistently
  too little are more likely to die earlier than those averaging 7 hours; adults sleeping
  10-11 hours are also at elevated risk. Ideal-BMI individuals cluster around 7 hours
  of nightly sleep.
evidence_tier: plausible_emerging
rationale: U-shaped sleep-mortality relationships are well-established in meta-analyses
  of observational cohort studies (Cappuccio 2010, Hublin 2007). However, long-sleep
  mortality may reflect underlying illness (reverse causation) rather than sleep duration
  directly causing mortality.
coaching_translation: Sleeping too little hurts you — but sleeping a lot (10+ hours
  regularly) also tracks with worse health. The sweet spot for most adults is around
  7 hours.
caveats:
- Long sleep duration may be a marker of underlying disease, not a cause of mortality
  (reverse causation).
- Individual variation exists; chronotype and life stage matter.
- BMI association may also reflect lifestyle clustering, not sleep alone.
