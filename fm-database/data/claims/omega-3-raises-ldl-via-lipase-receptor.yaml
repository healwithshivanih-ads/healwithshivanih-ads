slug: omega-3-raises-ldl-via-lipase-receptor
statement: Omega-3 fatty acids lower triglycerides and VLDL, which can raise LDL as
  the lipoprotein lipase receptor becomes less overwhelmed and more efficient — this
  is expected and not inherently harmful.
evidence_tier: strong
rationale: This is the established pharmacological mechanism of omega-3 therapy in
  hypertriglyceridemia, acknowledged by cardiologists and lipid specialists.
coaching_translation: If someone on omega-3s sees their LDL go up slightly, this is
  usually a normal response — not a reason to stop. Their triglycerides coming down
  is the primary goal.
caveats:
- Patient-specific LDL trajectory should be monitored by clinician.
