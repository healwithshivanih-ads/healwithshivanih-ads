slug: alpha-lipoic-acid-supports-weight-and-nerve-pain
statement: Alpha lipoic acid (ALA) supports healthy weight management (thereby supporting
  insulin sensitivity) and reduces symptoms of diabetic nerve pain.
evidence_tier: plausible_emerging
rationale: Kucukgoncu et al. (2017, Obes Rev) meta-analysis supports ALA for weight
  loss. Porasuphatana et al. (2012) RCT supports glycemic and oxidative benefits.
  Multiple studies on neuropathic pain reduction cited in document.
coaching_translation: Alpha lipoic acid — found in spinach, broccoli, and organ meats
  — is a powerful antioxidant that may help with weight management and nerve discomfort
  related to blood sugar issues.
caveats:
- Effect sizes for weight loss are modest.
- Diabetic neuropathy management requires clinician oversight.
