slug: choline-deficiency-linked-to-fatty-liver
statement: Choline deficiency causes fatty liver, poor memory, low concentration, anxiety, poor detox, infertility, and gallbladder
  issues.
evidence_tier: plausible_emerging
rationale: Choline deficiency as a driver of non-alcoholic fatty liver disease is supported by RCT and observational data.
coaching_translation: Clients avoiding eggs and animal products may be at risk of inadequate choline; encourage discussion
  with their clinician if liver or cognitive symptoms are present.
caveats:
- Source is a practitioner cheatsheet without primary citations.
- Fatty liver has multiple causes; choline alone is rarely the sole driver.
- Source is practitioner cheatsheet.
- Liver disease and infertility require clinician assessment.
