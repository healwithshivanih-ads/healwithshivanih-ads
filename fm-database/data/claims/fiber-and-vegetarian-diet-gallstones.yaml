slug: fiber-and-vegetarian-diet-gallstones
statement: Gallstones are a Western-diet disease. High-fiber soluble-fiber-rich diets
  prevent gallstone formation by binding deoxycholic acid in the gut (which otherwise
  reduces cholesterol solubility in bile) and promoting its excretion. Vegetarian
  diets in matched-cohort comparisons show significantly lower gallstone prevalence.
  Animal protein (especially dairy casein) raises gallstone risk; vegetable proteins
  (soy, buckwheat) lower it. Coach prescribes plant-forward pattern, soluble fiber
  emphasis.
evidence_tier: strong
