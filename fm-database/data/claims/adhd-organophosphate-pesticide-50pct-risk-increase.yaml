sources:
- id: murray-pizzorno-2012-encyclopedia
  location: ADHD chapter, p 541
  quote: A recent study has shown a direct correlation between the levels of organophosphates
    in a child's urine and the incidence of ADHD. Children eating conventionally grown
    foods have a level of organophosphates nine times as high as those eating organically
    grown foods. This level results in a 50% increase in ADHD.
