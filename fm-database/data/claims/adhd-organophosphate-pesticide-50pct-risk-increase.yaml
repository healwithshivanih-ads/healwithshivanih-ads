slug: adhd-organophosphate-pesticide-50pct-risk-increase
statement: Children eating conventionally grown foods have urinary organophosphate
  levels nine times higher than children eating organically grown foods, and this
  exposure correlates with a 50% increase in ADHD diagnosis. Organophosphates are
  neurotoxic pesticides.
evidence_tier: plausible_emerging
