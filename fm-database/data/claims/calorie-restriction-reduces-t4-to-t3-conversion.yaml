slug: calorie-restriction-reduces-t4-to-t3-conversion
statement: Severe or prolonged calorie restriction reduces T4-to-T3 conversion and
  increases reverse T3, creating a functional hypothyroid state.
evidence_tier: plausible_emerging
rationale: This is a well-described physiological adaptation to fasting/restriction
  (the 'low T3 syndrome of calorie restriction'). Mechanistically robust; the document
  clearly states this. Treated as plausible_emerging as source is a synthesis.
coaching_translation: Very low-calorie diets can backfire by slowing your thyroid
  conversion — sustainable, nutrient-dense eating supports better thyroid function
  than crash dieting.
caveats:
- Source is synthesis; specific calorie threshold not defined
linked_to_topics:
