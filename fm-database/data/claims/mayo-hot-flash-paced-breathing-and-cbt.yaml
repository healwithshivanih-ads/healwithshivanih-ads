slug: mayo-hot-flash-paced-breathing-and-cbt
statement: Slow paced abdominal breathing (six to eight breaths per minute, ten minutes
  twice daily) and cognitive behavioural therapy specifically targeted at vasomotor
  symptoms have RCT-level evidence for reducing how bothersome hot flashes feel, even
  when frequency is unchanged.
