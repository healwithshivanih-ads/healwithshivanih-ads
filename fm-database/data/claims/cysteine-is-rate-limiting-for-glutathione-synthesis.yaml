slug: cysteine-is-rate-limiting-for-glutathione-synthesis
statement: Cysteine—a sulfur-containing amino acid obtained from protein-rich foods
  or as NAC supplement—is the rate-limiting precursor for glutathione synthesis; inadequate
  cysteine limits the body's ability to produce glutathione regardless of selenium
  and riboflavin status.
evidence_tier: strong
rationale: Cysteine as the rate-limiting substrate for glutathione synthesis via the
  gamma-glutamylcysteine synthetase pathway is well established in the peer-reviewed
  literature.
coaching_translation: Protein-rich foods containing cysteine—red meat, chicken, turkey,
  eggs, broccoli, cabbage, onions—help the body manufacture adequate glutathione.
  Sulfur-sensitive individuals should introduce these foods cautiously.
caveats:
- NAC supplementation should be medically supervised given sulfur-intolerance risk
