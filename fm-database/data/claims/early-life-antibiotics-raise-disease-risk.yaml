slug: early-life-antibiotics-raise-disease-risk
statement: Early-life antibiotic use raises the risk of eczema, asthma, allergies,
  weight gain and inflammatory bowel disease, with greater harm the earlier, more
  frequent and broader-spectrum the use — because the microbiota mostly forms by age
  two to three.
evidence_tier: strong
rationale: Cites antibiotic-exposure meta-analyses.
coaching_translation: Antibiotics early in life shape the gut for years — used only
  when truly needed, especially in the first couple of years.
