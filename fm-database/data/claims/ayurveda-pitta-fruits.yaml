slug: ayurveda-pitta-fruits
statement: Pitta is pacified by sweet fruit (sweet apples, ripe mango, sweet berries, coconut, pears,
  pomegranate) and aggravated by sour fruit (sour apples, grapefruit, green grapes, sour berries, tamarind,
  sour oranges).
