slug: trauma-stress-fibromyalgia-trigger
statement: Adverse childhood experiences, trauma, anxiety, and chronic stress are
  recognised triggers for fibromyalgia and chronic pain flares.
evidence_tier: plausible_emerging
rationale: The association between ACEs, HPA axis dysregulation, and chronic pain/fibromyalgia
  is supported by epidemiological studies and neurobiological research on central
  sensitisation.
coaching_translation: When taking a client history, always explore childhood trauma
  and current stress levels — these are not just 'soft factors' but physiological
  drivers of chronic pain.
out_of_scope_notes: Trauma processing is out of scope for coaching. Refer to a therapist
  or psychologist for ACE-related work.
caveats:
- Source is expert FM lecture.
- Coaching scope is limited to awareness, stress management tools, and referral.
