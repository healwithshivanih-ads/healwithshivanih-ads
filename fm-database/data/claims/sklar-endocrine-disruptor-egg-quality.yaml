slug: sklar-endocrine-disruptor-egg-quality
statement: 'Endocrine-disrupting chemicals — BPA, phthalates, parabens, glyphosate
  and other pesticide residues, synthetic fragrances, flame retardants — mimic oestrogen,
  disrupt steroidogenesis and accumulate in adipose tissue. They damage egg quality
  and accelerate the depletion of ovarian reserve. Practical reductions cluster in
  five buckets: food storage (swap plastic for glass and stainless steel), water filtration,
  personal care products (use EWG Skin Deep), cleaning products and organic-where-possible
  produce (anchored on the "dirty dozen" list).'
