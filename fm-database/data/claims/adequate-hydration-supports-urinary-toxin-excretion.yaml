slug: adequate-hydration-supports-urinary-toxin-excretion
statement: Adequate daily hydration is essential for optimal detoxification, as converted
  water-soluble toxins are eliminated through urine.
evidence_tier: strong
rationale: Urinary excretion is a primary route for water-soluble toxin metabolites
  produced by Phase II conjugation. Hydration's role in supporting renal clearance
  is physiologically established.
coaching_translation: Drinking enough water every day is a simple but powerful way
  to support your body's natural detox — many toxins your liver has processed leave
  your body through your urine.
