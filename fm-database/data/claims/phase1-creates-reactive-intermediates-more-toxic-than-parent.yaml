slug: phase1-creates-reactive-intermediates-more-toxic-than-parent
statement: Phase 1 biotransformation converts parent compounds into reactive intermediates that are more chemically reactive
  — and potentially more toxic — than the original compound.
evidence_tier: strong
rationale: Established in pharmacology and toxicology. CYP450-mediated oxidation of many compounds (e.g., benzo[a]pyrene,
  aflatoxin, acetaminophen) produces reactive electrophilic intermediates that are more mutagenic/toxic than the parent. The
  codeine→morphine example cited is accurate for illustrating bioactivation, though morphine's 'reactivity' is pharmacological
  rather than chemical toxicity per se.
coaching_translation: When your liver starts processing a toxin (Phase 1), it actually creates a temporary by-product that
  is MORE harmful than the original. Phase 2 must immediately neutralize this — which is why a healthy Phase 2 system is critical.
caveats:
- The codeine→morphine example is used as an analogy for bioactivation; morphine's effects are pharmacological, not strictly
  cytotoxic intermediates. The general principle of reactive intermediate formation is well-established.
