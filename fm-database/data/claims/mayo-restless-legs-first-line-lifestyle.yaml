slug: mayo-restless-legs-first-line-lifestyle
statement: Conservative measures with evidence are warm or cool leg baths, leg massage,
  evening walking or stretching, consistent sleep schedule, reducing caffeine alcohol
  and nicotine especially in the evening, and a pneumatic compression device in moderate
  cases.
