slug: blue-light-and-cognitive-load-linked-to-mitochondrial-stress
statement: Blue light, EMF, and cognitive load are described as causing mitochondrial
  stress, brain fog, fatigue, irritability, and mood instability.
evidence_tier: fm_specific_thin
rationale: Blue light's effect on circadian rhythm is well-supported; direct mitochondrial
  stress from blue light and EMF is an emerging and FM-specific framing. Source is
  expert consensus without primary citations.
coaching_translation: Blue-light-blocking strategies after sunset, reduced screen
  time, and circadian-aligned sleep are coaching-appropriate recommendations.
caveats:
