slug: mayo-restless-legs-medication-classes-that-worsen-rls
statement: Common medications that trigger or worsen RLS include sedating antihistamines
  (diphenhydramine), anti-nausea drugs (metoclopramide, prochlorperazine), most antidepressants
  (SSRIs, SNRIs, tricyclics — except bupropion), and antipsychotics; coach should
  flag these for prescriber review before drug therapy is started.
