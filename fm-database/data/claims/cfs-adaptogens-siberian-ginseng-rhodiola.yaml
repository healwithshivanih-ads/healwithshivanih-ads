  quote: Most notable were a significant increase in T-helper cells and an increase
    in NK cell activity, both of which are of value in the treatment of CFS. Rhodiola
    was found to have an antifatigue effect that increased mental performance, particularly
    the ability to concentrate, as well as decreased the cortisol response to stress.
