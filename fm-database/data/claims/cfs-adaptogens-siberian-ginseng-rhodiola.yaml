slug: cfs-adaptogens-siberian-ginseng-rhodiola
statement: Siberian ginseng (Eleutherococcus senticosus) fluid extract produced significant
  increases in T-helper cells and NK cell activity in a 4-week double-blind trial
  — both directly relevant to the NK cell deficit central to CFS. Rhodiola rosea standardized
  extract (200-300 mg/day, 3% rosavins + 0.8-1% salidroside) reduced stress-related
  fatigue, improved concentration, and lowered cortisol response in a 60-patient RCT.
evidence_tier: strong
