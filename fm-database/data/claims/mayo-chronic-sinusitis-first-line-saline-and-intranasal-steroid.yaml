slug: mayo-chronic-sinusitis-first-line-saline-and-intranasal-steroid
statement: Conventional first-line care is daily saline nasal irrigation (squeeze
  bottle or neti pot with distilled or boiled water) plus a daily intranasal corticosteroid
  spray (fluticasone, mometasone, budesonide); both are coach-supportable adherence
  interventions.
