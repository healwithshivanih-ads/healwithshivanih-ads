sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 30 — Chronic Candidiasis, pg 609-610
  quote: Probiotic supplements can be used both to support overall good health and
    during treatment for chronic candidiasis. The dosage of a commercial probiotic
    supplement containing lactobacillus or bifidobacteria cultures is based on the
    number of live organisms. A dosage of 5 billion to 10 billion viable cells per
    day is sufficient for most people. Soluble fiber at bedtime, to ensure that dead
    yeast cells are excreted and not absorbed.
