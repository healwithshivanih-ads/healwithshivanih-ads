slug: murray-candida-probiotics-rebuild
statement: Probiotic supplements containing Lactobacillus and Bifidobacterium species
  at 5 to 10 billion viable CFU per day reseed competing flora during and after antifungal
  treatment for chronic candidiasis. Doses above 10 billion may cause mild GI disturbance;
  doses below 5 billion may not colonize. Soluble fibre at bedtime helps escort die-off
  yeast cells out before they are reabsorbed.
evidence_tier: plausible_emerging
