slug: mayo-food-poisoning-prevention-food-safety-anchors
statement: 'Mayo''''''''s prevention pillars are: wash hands and surfaces often; separate
  raw meats from produce and ready-to-eat foods; cook to safe internal temperature
  (poultry 74 C/165 F, ground beef 71 C/160 F, whole cuts 63 C/145 F); chill perishables
  within two hours of preparation (one hour if room above 32 C/90 F).'
