  quote: The absolute risk of a blood clot from any hormonal contraceptive is small.
    Even NuvaRing, which carries the highest risk, has an absolute risk of only 9.7
    clot-events per 10,000 women per year compared to 2.1 clot-events in non-users
    of hormonal birth control. The clot risk goes way up if you smoke.
