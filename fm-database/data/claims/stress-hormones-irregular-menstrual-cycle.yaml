slug: stress-hormones-irregular-menstrual-cycle
statement: Irregular menstrual cycles are almost always associated with elevated stress hormones, since
  the hormonal timing of a woman's cycle is governed by the same HPA-sex-hormone axis that stress disrupts;
  restoring regular daily rhythms — including regular meal times and sleep — supports hormonal regularity.
evidence_tier: plausible_emerging
rationale: 'Well-established: stress (cortisol) disrupts GnRH pulsatility, altering LH/FSH secretion and
  cycle timing; circadian regularity is a known modulator of reproductive hormones.'
coaching_translation: Stress is almost always part of the picture in irregular cycles, because the same
  hormones that govern your period are also regulated by the stress response. Regular daily rhythms —
  waking, eating, and sleeping at consistent times — help reset the hormonal clock.
