slug: single-toxin-can-outweigh-many-snps
statement: Lynch argues a single industrial toxin such as mercury or aluminium can
  impair hundreds of genes far more than a single SNP or even a dozen SNPs — so lifestyle,
  diet, mindset and environment matter more than any one genetic variant.
evidence_tier: plausible_emerging
rationale: 'This is the book''s core anti-determinism thesis and aligns with the house
  stance: SNPs are low-penetrance and environment-dependent. Framed qualitatively,
  it is a reasonable corrective to single-SNP thinking.'
coaching_translation: Your genes aren't your destiny — day-to-day exposures and habits
  shape how they behave far more than any one variant.
out_of_scope_notes: ''
caveats:
- Source is a consumer trade book (Ben Lynch, Dirty Genes), not primary literature.
