slug: inulin-chicory-worsens-ibs-symptoms
statement: Coconut yogurt or dairy alternatives containing added inulin or chicory
  root can worsen IBS symptoms due to high fructan/FOS content.
evidence_tier: strong
rationale: Inulin and chicory are classified as high-FODMAP fructans by Monash University;
  clinical FODMAP guidance consistently advises avoiding products containing these
  additives.
coaching_translation: When choosing coconut yogurt or plant-based products, always
  check the label — skip anything with 'inulin' or 'chicory root extract' to avoid
  triggering your gut.
