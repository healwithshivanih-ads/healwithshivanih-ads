- id: snyder-energy-blueprint-podcast-2026
  location: Podcast — WHI segment
  quote: Out of a thousand women in the non-hormone arm there were four cases of breast
    cancer in a thousand women. In the hormone arms it was five cases of breast cancer
    in a thousand women. They claimed it was a 25% relative risk and it was everywhere.
    44% of women who were on HRT were basically pulled off hormone replacement therapy.
    It actually wasn't the estrogen only arm, it was the progestin and estrogen arm.
rationale: Equips coach to deflate the most common HRT objection client brings into
  the room — names the four-vs-five numbers explicitly.
