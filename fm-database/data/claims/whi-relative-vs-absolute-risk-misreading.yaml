slug: whi-relative-vs-absolute-risk-misreading
statement: The 2002 Women's Health Initiative scare that pulled an estimated 44% of
  HRT users off treatment overnight reported a 25% RELATIVE risk increase in breast
  cancer — but the absolute numbers were approximately 4 cases per 1,000 in the placebo
  arm versus 5 per 1,000 in the conjugated-equine-estrogen + medroxyprogesterone arm.
  That signal came from the synthetic-progestin arm specifically (NOT the estrogen-only
  arm), used in older women (median age 65, well outside the optimal initiation window),
  via oral route with first-pass hepatic exposure. Modern bioidentical, transdermal-estrogen
  + oral micronised-progesterone protocols started within 10 years of menopause carry
  a meaningfully different risk profile. Coach role — name the framing trick when
  clients arrive frightened by "HRT causes breast cancer" headlines.
