slug: vitamin-d-shifts-vaginal-microbiome-to-crispatus
statement: Achieving optimal vitamin D levels (60–70 ng/mL) shifts the vaginal microbiome
  to favor Lactobacillus crispatus through an indirect mechanism.
evidence_tier: plausible_emerging
rationale: Dr. Davis identifies vitamin D optimization as a foundational step for
  vaginal microbiome health. The shift toward crispatus is described as occurring
  via an indirect mechanism, consistent with vitamin D's known immunomodulatory effects
  on mucosal surfaces.
coaching_translation: Getting your vitamin D levels into the optimal range (60–70
  ng/mL) supports the growth of beneficial vaginal bacteria, including L. crispatus.
out_of_scope_notes: Target serum level (60–70 ng/mL) and dosing to achieve it require
  clinician interpretation of labs.
caveats:
- No specific studies cited.
- Source is expert_consensus interview.
- Vitamin D level testing and dose titration require clinician oversight.
