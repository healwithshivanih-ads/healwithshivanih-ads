slug: hbot-cns-oxygen-toxicity-seizure-incidence
statement: Modern HBOT protocols mitigate oxygen toxicity (the dose-limiting safety
  concern) by capping session length at 60-90 minutes, holding oxygen partial pressure
  at or below 2.4 ATA, and inserting air-brake intervals every 20-30 minutes. In a
  pooled analysis of 62,614 hyperbaric sessions reported in the literature, the incidence
  of seizures was 0.011 percent (approximately 1 in 8,945 sessions). Pulmonary toxicity
  is also rare under these protocols and reversible in patients without pre-existing
  chronic lung disease.
evidence_tier: strong
