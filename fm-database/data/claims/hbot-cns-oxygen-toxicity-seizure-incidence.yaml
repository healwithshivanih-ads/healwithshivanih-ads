- id: hadanny-efrati-2020-hyperoxic-hypoxic-paradox
  location: Section 4.6 Oxygen Toxicity
  quote: The new HBOT protocol used today includes repeated daily sessions limited
    to 60-90 min with oxygen partial pressure not exceeding 2.4 ATA, as well as air
    brakes every 20-30 min. In a recent analysis of 62,614 hyperbaric sessions, the
    overall incidence of seizures during hyperbaric sessions was 0.011 percent (1
    in 8,945 sessions). In patients without chronic lung diseases, currently used
    HBOT protocols do not cause any pulmonary toxicity following 60 repeated exposures.
rationale: Quantitative safety anchor essential for any client risk conversation.
