slug: sklar-ivf-cannot-fix-underlying-root-causes
statement: Sklar argues that IVF does not address the underlying root causes of pregnancy
  loss — even genetically tested euploid embryos can fail in a uterine environment
  compromised by untreated antiphospholipid syndrome, silent endometriosis, MTHFR-driven
  hyperhomocysteinaemia, or chronic endometritis. When repeat transfers of good embryos
  fail, the workup must investigate the environment, not just the embryo.
