slug: elevated-homocysteine-promotes-oxidative-stress-and-endothelial-dysfunction
statement: Elevated homocysteine (>7 µmol/L) from impaired methylation promotes oxidative
  stress and endothelial dysfunction, compounding cardiovascular risk in insulin resistance.
evidence_tier: plausible_emerging
rationale: Association between hyperhomocysteinaemia and cardiovascular risk is well-established;
  causal link to IR is plausible but less direct. B-vitamin supplementation lowers
  homocysteine.
coaching_translation: High homocysteine — often from low B-vitamin intake — can damage
  blood vessels and worsen the cardiovascular risk that comes with blood sugar problems.
