slug: foodsens-reintroduction-avoids-test-false-positives
statement: Reintroduction is what avoids false positives. A test can flag a food a
  person reacts to on paper, yet when that food is removed and added back the person
  is genuinely fine either way. Eating a food constantly can mask the true magnitude
  of a reaction until it is removed for three to six weeks and then challenged.
evidence_tier: plausible_emerging
rationale: This reframes testing as a starting point rather than a verdict — the challenge
  phase is the real arbiter of whether a flagged food is a problem.
coaching_translation: When a client is anxious about a long list of 'positive' foods
  on a report, explain that the report is a hypothesis and the reintroduction challenge
  is how they confirm or clear each food.
out_of_scope_notes: Interpreting whether a specific lab positive is clinically meaningful
  is the clinician's call.
