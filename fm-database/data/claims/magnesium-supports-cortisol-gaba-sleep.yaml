slug: magnesium-supports-cortisol-gaba-sleep
statement: Magnesium (particularly glycinate form) supports cortisol regulation, GABAergic
  calming, and sleep quality, making it a key micronutrient in HPA axis recovery.
evidence_tier: plausible_emerging
rationale: Magnesium's role in NMDA/GABA modulation and HPA axis buffering is well-supported
  mechanistically; RCT evidence for specific forms in adrenal recovery is emerging.
coaching_translation: Magnesium glycinate is one of the most broadly useful nutrients
  for stress recovery — it helps your nervous system calm down and improves sleep
  quality.
caveats:
- Source is synthesis. Dose ranges not specified in document — verify with clinician.
- GI tolerance varies by form; glycinate is generally well tolerated.
