slug: treat-the-patient-not-the-lab
statement: When symptoms have resolved, a persistently abnormal lab need not trigger
  further treatment — treat the patient, not the number, since over-focusing on labs
  can make an improved person feel like a failure and lead to needless re-treatment.
evidence_tier: plausible_emerging
rationale: Ch 32 'Rob' case where a positive SIBO test persisted despite full symptom
  resolution.
coaching_translation: If you feel well, a still-abnormal test doesn't automatically
  need more treatment — how you feel matters most.
