slug: cfs-mitochondrial-cofactors-carnitine-coq10
statement: In CFS, L-carnitine 900-1,500 mg/day produced statistically significant
  clinical improvement in 12 of 18 indicators after 8 weeks (compared with amantadine
  which was poorly tolerated and produced no significant change). CoQ10 100-200 mg/day
  is indicated because low blood CoQ10 levels are found in CFS patients vs controls.
  Both are essential mitochondrial cofactors for energy production.
evidence_tier: strong
