sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 44 — Depression, pg 768-769
  quote: Regular exercise may be the most powerful natural antidepressant available.
    Studies have clearly indicated that exercise has profound antidepressant effects.
    People who participate in regular exercise have higher self-esteem, feel better,
    and are much happier than people who do not exercise. Much of the mood-elevating
    effect of exercise may be attributed to the fact that regular exercise has been
    shown to increase the level of endorphins. In an analysis of 64 studies, exercise
    can be as effective as other antidepressants, including drugs. The best exercises
    are either strength training (weight lifting) or aerobic activities.
