slug: murray-depression-exercise-effect
statement: Regular exercise is among the most powerful natural antidepressants — strength
  training and brisk aerobic exercise produce antidepressant effects on a par with
  antidepressant drugs in analyses of dozens of trials. Mechanisms include raised
  beta-endorphin levels, improved neurotransmitter regulation, and improved self-efficacy
  and sleep. Sedentary lifestyle is itself a risk factor for clinical depression independent
  of other variables.
evidence_tier: strong
