slug: glut4-translocation-requires-insulin-signalling-cascade
statement: Insulin-mediated glucose uptake into muscle, adipose, and liver cells requires
  an intact IRS-1 → PI3K → Akt signalling cascade that translocates GLUT-4 transporters
  to the cell surface.
evidence_tier: strong
rationale: Molecular mechanism of insulin action is extensively characterised in peer-reviewed
  literature.
coaching_translation: Insulin works like a key that triggers a chain reaction inside
  cells, opening 'doors' (GLUT-4) that let glucose in for energy.
