slug: uterine-fibroids-oestrogen-dependent-lifestyle-modifiable
statement: Uterine fibroids are oestrogen-dependent and hormone-sensitive — they commonly enlarge during
  pregnancy (when oestrogen is high) and shrink after menopause; natural progesterone (as distinct from
  synthetic progestins) may help stabilise fibroid growth, whereas synthetic progestins may stimulate
  it.
evidence_tier: plausible_emerging
rationale: Oestrogen-dependence of uterine fibroids is well-established; the distinction between natural
  progesterone and synthetic progestins (which can differ in receptor-binding profiles) is consistent
  with endocrinology literature, though evidence for clinical benefit of natural progesterone on fibroids
  is limited.
coaching_translation: Fibroids thrive on oestrogen and tend to shrink at menopause when oestrogen drops
  — this is why managing oestrogen dominance through diet and lifestyle is part of the FM approach. There
  is also a difference between natural progesterone and synthetic progestins in how they interact with
  fibroids.
out_of_scope_notes: Fibroid management requires physician oversight. Coach role is lifestyle support and
  education only.
caveats:
- Clinical evidence for natural progesterone shrinking fibroids is limited; physician evaluation is essential
  before any hormone approach to fibroids.
