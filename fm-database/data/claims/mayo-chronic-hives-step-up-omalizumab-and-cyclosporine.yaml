slug: mayo-chronic-hives-step-up-omalizumab-and-cyclosporine
statement: If maximum-dose H1 antihistamines fail, conventional step-up options are
  anti-IgE biologic omalizumab (Xolair), the leukotriene antagonist montelukast as
  add-on, short courses of oral corticosteroids for flares only, and cyclosporine
  for refractory cases.
