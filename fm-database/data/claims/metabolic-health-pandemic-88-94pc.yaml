slug: metabolic-health-pandemic-88-94pc
statement: Recent published studies estimate that 88-94% of US adults are in poor
  metabolic health when assessed across the five-component metabolic-syndrome set
  (waist circumference, fasting glucose, HDL, triglycerides, blood pressure). Diagnosed
  diabetes runs at approximately 12% with an estimated additional 15-20% undiagnosed;
  the remaining ~60% are in the spectrum of dysfunction without formal diabetes diagnosis.
  Coach implication — treat metabolic health as a continuous spectrum every client
  is on; "you don't have diabetes" is not the same as "your metabolic health is fine."
evidence_tier: plausible_emerging
