  location: Podcast — prevalence segment
  quote: There was a study that showed 88% of US adults are in poor metabolic health.
    And then a recent one — they found like 94% an even higher number. Diagnosed diabetes
    is at about 12% of the population. There's another 15 to 20% estimated to be undiagnosed.
    So 60% of the population is in between — they aren't healthy but they haven't
    yet had diabetes.
rationale: Sets the baseline rate the coach should expect — most clients walking in
  are NOT metabolically healthy.
