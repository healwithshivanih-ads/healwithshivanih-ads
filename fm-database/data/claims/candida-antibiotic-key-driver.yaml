slug: candida-antibiotic-key-driver
statement: Prolonged antibiotic use is the key predisposing factor in most cases of chronic candidiasis, suppressing normal
  intestinal bacteria, impairing immunity, generating antibiotic-resistant organisms, and potentially contributing to Crohn's
  disease.
evidence_tier: plausible_emerging
rationale: The mechanism is biologically plausible and well-described in naturopathic literature; the link to Crohn's disease
  is emerging but not yet fully established.
coaching_translation: If you've had repeated antibiotic courses, your gut bacteria may be significantly disrupted — rebuilding
  them with probiotics and diet changes is foundational to feeling well again.
caveats:
- Link to Crohn's disease is plausible but not proven
