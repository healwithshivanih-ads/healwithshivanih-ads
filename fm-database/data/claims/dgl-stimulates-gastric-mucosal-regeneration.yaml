slug: dgl-stimulates-gastric-mucosal-regeneration
statement: Deglycyrrhizinated licorice (DGL, 380-760 mg chewed 20 minutes before meals)
  stimulates secretion and quality of gastric mucin, increases gastric mucosal cell
  turnover, and is comparable to cimetidine and ranitidine in healing duodenal and
  gastric ulcers — without raising blood pressure (glycyrrhizin removed).
evidence_tier: strong
rationale: Multiple trials (Kassir, Tewari, Larkworthy) showed DGL equivalence to
  H2-blockers for ulcer healing. Pizzorno cites DGL alongside cabbage juice as the
  key gastric mucosal regeneration interventions. Must be chewed (saliva activates).
coaching_translation: Chewed deglycyrrhizinated licorice (DGL) 380-760 mg, 20 minutes
  before each meal, heals ulcers as well as the prescription acid blockers — by helping
  your stomach make better mucus. Chew it; don't swallow whole.
caveats:
- Use DGL (deglycyrrhizinated) only — regular licorice raises blood pressure.
- Must be chewed in mouth — saliva activates the active compounds.
- 8-12 weeks for full ulcer healing.
- Pair with food-allergen elimination and H. pylori workup.
