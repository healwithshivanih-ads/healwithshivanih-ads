slug: mayo-motion-sickness-positioning-first-line
statement: Conservative measures with the strongest evidence are facing forward in
  the direction of travel, sitting in the most stable position (front passenger seat
  in a car, over the wing in a plane, mid-deck on a ship), looking at the horizon,
  and avoiding reading or screens during motion.
