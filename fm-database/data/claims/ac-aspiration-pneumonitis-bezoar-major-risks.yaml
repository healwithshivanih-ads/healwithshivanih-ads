slug: ac-aspiration-pneumonitis-bezoar-major-risks
statement: Pulmonary aspiration of activated charcoal slurry leading to aspiration
  pneumonitis is the most serious AC complication — has caused bronchiolitis obliterans
  and death, particularly from emesis during rapid administration or misplaced nasogastric
  tube. Bezoar formation (intraluminal obstruction) occurs with multi-dose AC or in
  pre-existing motility disorders. Cathartic co-administration (sorbitol, magnesium
  citrate) can cause severe dehydration, hypernatremia, or hypermagnesemia — especially
  in infants.
evidence_tier: strong
rationale: AACT position statement and pediatric case series. Aspiration is THE reason
  airway protection is mandatory before AC in obtunded patients. Bezoar risk is the
  reason MDAC has a duration limit and patient monitoring.
coaching_translation: Activated charcoal isn't a benign supplement. Its real risks
  are — vomiting it back up and inhaling it (which can cause permanent lung damage
  or death), causing a blockage in the gut, or — if mixed with laxatives like sorbitol
  — causing dangerous dehydration in children. This is why hospital administration
  is the standard.
caveats:
- Slow, monitored administration reduces aspiration risk.
- NG tube placement must be confirmed before AC slurry.
- Cathartic co-administration is now usually avoided.
- Pediatric infants are highest-risk for fluid/electrolyte complications.
