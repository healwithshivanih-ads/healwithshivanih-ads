slug: lactobacillus-bifidobacterium-produce-gut-gaba
statement: Specific gut bacteria — particularly Lactobacillus and Bifidobacterium
  species — synthesise GABA in the gut lumen. This luminal GABA does not enter the
  systemic circulation in usable quantity but signals to the brain indirectly via
  vagal acetylcholine release, contributing to central GABAergic tone. The mechanism
  partially explains why probiotic supplementation and fermented foods (curd, kimchi,
  sauerkraut, fermented dosa batter) can produce calming and anxiolytic effects in
  some clients, and why dysbiosis correlates with anxiety and sleep disturbance.
evidence_tier: plausible_emerging
