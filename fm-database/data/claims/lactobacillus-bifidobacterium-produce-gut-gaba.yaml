  quote: In the gut you have certain bacteria like lactobacillus and bifidobacterium
    specifically that make GABA in the gut and that causes vagal signaling via acetylcholine
    that causes signaling cascades in the brain that help with the conversion of glutamate
    to GABA.
rationale: Coach can frame fermented foods + probiotic strategy as part of GABA-restoration
  in anxious clients.
