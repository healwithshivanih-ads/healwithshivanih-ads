slug: progesterone-induces-transient-insulin-resistance
statement: Progesterone — both endogenous (in the luteal phase) and exogenous (HRT)
  — causes a physiological state of mild insulin resistance by diverting glucose availability,
  and excess progesterone dosing can push susceptible women into clinically significant
  insulin resistance with water retention and fat storage.
evidence_tier: plausible_emerging
rationale: Progesterone's insulin-antagonizing effects are documented in endocrinology
  literature, particularly in luteal phase and pregnancy physiology. The extrapolation
  to oral progesterone HRT dosing and its metabolic effects is clinically observed
  but lacks large RCT confirmation across perimenopausal populations.
coaching_translation: Even 'good' hormones like progesterone can tip the metabolic
  balance if the dose isn't right. Water retention, breast tenderness, and abdominal
  weight gain after starting HRT may signal that progesterone dose needs clinician
  review.
out_of_scope_notes: Progesterone dosing adjustments are strictly clinician territory.
  Coaches should recognize symptoms (puffiness, ring tightness, breast heaviness)
  as a referral cue.
caveats:
- Dose example given by Dr. Jones (300–400 mg oral progesterone causing problems,
  reduced to 100–200 mg with improvement) is a single clinical anecdote.
- Source is expert-consensus transcript, not primary literature.
- Verify with clinician before any dose interpretation.
