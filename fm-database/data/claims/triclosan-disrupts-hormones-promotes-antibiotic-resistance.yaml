slug: triclosan-disrupts-hormones-promotes-antibiotic-resistance
statement: Triclosan in oral care and household products disrupts hormonal balance
  and promotes antibiotic resistance.
evidence_tier: plausible_emerging
rationale: FDA banned triclosan from hand soaps in 2016 citing lack of safety evidence.
  Research supports hormonal disruption via thyroid and androgen pathways, and antibiotic
  resistance promotion, though clinical impact magnitude is debated.
coaching_translation: Check your toothpaste and household products for triclosan —
  it's been linked to hormone disruption and contributing to antibiotic-resistant
  bacteria. Choose triclosan-free alternatives.
caveats:
- Most evidence is animal or in vitro; direct human hormonal disruption at typical
  exposure levels is not conclusively proven.
