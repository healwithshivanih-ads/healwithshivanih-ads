slug: triclosan-disrupts-hormones-promotes-antibiotic-resistance
statement: Triclosan, an antibacterial/antifungal agent found in some oral health
  and household products, disrupts hormonal balance and promotes antibiotic resistance.
evidence_tier: plausible_emerging
rationale: Triclosan's endocrine-disrupting effects have been demonstrated in animal
  studies and some human biomonitoring research; antibiotic resistance concerns are
  well-documented. It has been banned in many consumer products in the US (FDA 2016),
  supporting credibility of the concern.
coaching_translation: Triclosan is an ingredient worth avoiding — check labels on
  toothpaste and antibacterial products, even though it's banned in hand soaps.
caveats:
- Most evidence is animal or in vitro; direct human hormonal disruption at typical
  exposure levels is not conclusively proven.
