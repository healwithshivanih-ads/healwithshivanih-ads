slug: elemental-diet-matches-steroids-for-ibd
statement: Elemental and semielemental diets match corticosteroids for inducing remission
  and preventing relapse in inflammatory bowel disease, and semielemental works as
  well as full elemental while being more filling — reasonable to try before steroids.
evidence_tier: strong
rationale: Cites two Cochrane systematic reviews.
coaching_translation: A medical liquid 'elemental' diet can calm IBD as well as steroids
  — worth discussing with a clinician.
