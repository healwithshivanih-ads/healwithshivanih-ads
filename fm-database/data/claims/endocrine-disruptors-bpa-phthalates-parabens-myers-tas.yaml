slug: endocrine-disruptors-bpa-phthalates-parabens-myers-tas
statement: BPA, phthalates, and parabens are estrogen-mimicking endocrine disruptors
  found in plastics, can linings, and personal-care products, and 'BPA-free' plastics
  can leach similar estrogenic chemicals.
evidence_tier: plausible_emerging
rationale: These xenoestrogens disrupt thyroid, adrenal, and sex-hormone signalling;
  testing has shown most plastics — BPA-free included — release estrogenic activity.
coaching_translation: Many plastics and cosmetics act like fake estrogen — storing
  food in glass and choosing cleaner body products helps.
