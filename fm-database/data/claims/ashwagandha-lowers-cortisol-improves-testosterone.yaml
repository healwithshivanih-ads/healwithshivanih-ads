slug: ashwagandha-lowers-cortisol-improves-testosterone
statement: Ashwagandha lowers cortisol and improves testosterone and sperm parameters
  in men under chronic stress.
evidence_tier: plausible_emerging
rationale: Multiple RCTs (including KSM-66 standardized extract) show cortisol reduction
  and modest testosterone improvements. Effect size is modest but consistent across
  studies. Source is expert synthesis.
coaching_translation: Ashwagandha is an adaptogen that reduces stress hormones and
  supports testosterone — particularly helpful for men dealing with chronic stress
  and fatigue.
caveats:
- Source is expert synthesis
- Dose 300–600 mg/day
- KSM-66 form preferred
