slug: selenium-vitamin-e-antioxidant-support-detox
statement: Selenium and Vitamin E provide antioxidant protection supporting Phase
  I detoxification and reducing oxidative damage from free radical intermediates during
  mercury detoxification.
evidence_tier: plausible_emerging
rationale: Selenium is a cofactor for glutathione peroxidase; Vitamin E is a lipid-soluble
  antioxidant. Both are well-established antioxidant nutrients. Their specific use
  peri-amalgam removal is FM protocol consensus without dedicated RCTs.
coaching_translation: Selenium and Vitamin E help protect your cells from the oxidative
  stress that comes with detoxification.
out_of_scope_notes: Doses (Selenium 200–300 mcg; Vitamin E 200–400 IU) are clinician
  scope; selenium toxicity is possible at high doses.
caveats:
- Selenium has a narrow therapeutic window; upper tolerable intake is 400 mcg/day.
  Verify with clinician.
