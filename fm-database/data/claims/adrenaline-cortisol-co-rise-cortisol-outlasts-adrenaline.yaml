slug: adrenaline-cortisol-co-rise-cortisol-outlasts-adrenaline
statement: Adrenaline and cortisol co-rise with each stress event; cortisol stays elevated far longer
  than adrenaline, and repeated adrenaline surges progressively increase the cortisol released per surge.
evidence_tier: strong
rationale: 'Consistent with HPA-axis / SAM-axis physiology: adrenaline is catecholamine-mediated (fast,
  brief); cortisol is glucocorticoid-mediated (slower, prolonged). Repeated activation sensitises the
  HPA axis.'
coaching_translation: Every stressful event triggers a rush of adrenaline that fades quickly, but also
  raises cortisol that lingers for hours. The more stress events per day, the more cortisol builds up
  — which is why 'busy but manageable' days still leave you feeling wired and depleted by evening.
