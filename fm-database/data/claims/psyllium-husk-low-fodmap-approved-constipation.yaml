slug: psyllium-husk-low-fodmap-approved-constipation
statement: Psyllium husk (isabgol) at 1 tsp in warm water is low FODMAP approved and
  helps relieve constipation by forming a soluble fiber gel that normalizes stool
  movement.
evidence_tier: strong
rationale: Psyllium is classified as low FODMAP at standard doses by Monash University.
  Multiple RCTs support psyllium for IBS-C and constipation management.
coaching_translation: Psyllium husk (isabgol) is a safe, IBS-friendly fiber supplement
  to ease constipation. Start with 1 tsp in a large glass of warm water. PHGG is an
  even gentler option for IBS-C.
caveats:
- Take with adequate water to prevent choking or worsening constipation
- Start low and increase gradually
