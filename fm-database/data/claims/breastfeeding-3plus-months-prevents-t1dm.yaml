slug: breastfeeding-3plus-months-prevents-t1dm
statement: Breastfeeding for at least 3 months establishes proper intestinal immune
  function, reduces food-allergy development, and is independently protective against
  T1DM via gut-immune maturation and reduced cross-reactive antigen exposure.
evidence_tier: plausible_emerging
rationale: Pizzorno cites the protective effect of breastfeeding duration in multiple
  cohorts. Mechanism — secretory IgA development, microbiome priming, delayed exposure
  to potential antigens during the gut-permeability window.
coaching_translation: At least 3 months of exclusive breastfeeding builds the gut
  immune system that prevents food proteins from cross-reacting with the pancreas.
  It's one of the cleanest T1DM-prevention levers we have.
caveats:
- Effect strongest in genetically susceptible infants.
- Combine with delayed introduction of cow's milk and gluten until later in infancy.
- Not all breastfeeding mothers can sustain 6 months — even partial breastfeeding
  has measurable benefit.
