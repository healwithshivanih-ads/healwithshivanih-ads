slug: periodontal-disease-extends-time-to-conceive
statement: Women with periodontal (gum) disease take on average 2 months longer to
  conceive (7 months vs 5) and have substantially higher miscarriage and preterm birth
  risk (4-7x for severe periodontitis). The mechanism is thought to involve systemic
  inflammation from chronic oral bacterial infection. Pre-conception dental cleaning
  and periodontal treatment is a coachable, often-overlooked intervention.
evidence_tier: plausible_emerging
