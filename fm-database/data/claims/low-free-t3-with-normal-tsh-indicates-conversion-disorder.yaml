slug: low-free-t3-with-normal-tsh-indicates-conversion-disorder
statement: Low free T3 with normal TSH and normal T4 indicates T3 conversion disorder
  / cellular hypothyroidism, producing hypothyroid symptoms despite 'normal' labs.
evidence_tier: plausible_emerging
rationale: This is a recognized functional medicine diagnostic pattern. The document
  explicitly links this pattern to stress, inflammation, gut dysfunction, and nutrient
  deficiencies. It is well-supported mechanistically but remains outside mainstream
  diagnostic consensus.
coaching_translation: If you feel hypothyroid but your TSH is 'normal,' ask your doctor
  to check your free T3 — that's the hormone that actually does the work in your cells.
out_of_scope_notes: Lab interpretation is clinician scope. Coaches can flag the pattern
  and refer.
caveats:
- Not a conventional diagnostic category — may not be recognized by all clinicians
- Requires full thyroid panel (fT3, fT4, TSH) for assessment
