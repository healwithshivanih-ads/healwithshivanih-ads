slug: gradual-fiber-increase-is-preferred-over-sudden-jumps
statement: Fiber intake should be increased gradually (e.g., from 10g to 12g/day rather
  than jumping to 30g) to avoid worsening GI symptoms; personalized fiber targets
  are preferred over a universal dose.
evidence_tier: plausible_emerging
rationale: Single-expert recommendation consistent with general GI guidance. Gradual
  fiber increases to prevent gas/bloating are clinically sensible and broadly recommended,
  though cited here from expert opinion only.
coaching_translation: Start by tracking your current fiber intake for a few days,
  then increase by just 2–3g at a time. Everyone's optimal fiber amount is different
  — it's not one-size-fits-all.
caveats:
- Single-expert source; recommendation is practical and consistent with general GI
  guidance but not sourced to a specific trial.
