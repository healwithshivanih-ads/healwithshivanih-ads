sources:
- id: murray-energy-blueprint-podcast-2026
  location: Podcast — dimmer switch segment
  quote: Our energy levels are a little bit like a dimmer switch. Sometimes the light
    bulb has a lot of dust on it and we have to clean off the light bulb. But most
    often it's because our dimmer switch is not turned fully bright. We have to provide
    all essential nutrients. We have to make sure that we have a good array of antioxidants
    from our diet. We have to reduce exposure to damaging factors. And we have to
    take time for rest and recovery.
rationale: Memorable client-facing metaphor that gives a clear four-lever action plan.
