slug: dimmer-switch-model-of-energy-not-broken-bulb
statement: Murray's clinical framing for fatigue — energy levels are like a DIMMER
  SWITCH, not an on/off bulb. Most fatigue clients do NOT have broken mitochondria;
  their dimmer is set low because of accumulated input (nutrient deficiencies + poor
  antioxidant intake + damaging exposures + insufficient rest/recovery). The four
  levers to brighten the dimmer — (1) supply all essential nutrients; (2) flood with
  diverse plant flavonoids and carotenoids; (3) remove damaging exposures (Tylenol,
  cigarettes, vaping, pesticides, heavy metals); (4) build in rest, sleep, and meditation
  for mitochondrial recovery. Coach implication — the framework normalises the multi-pillar
  approach without requiring any specific diagnosis.
