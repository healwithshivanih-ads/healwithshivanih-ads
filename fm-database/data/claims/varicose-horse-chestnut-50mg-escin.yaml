slug: varicose-horse-chestnut-50mg-escin
statement: Horse chestnut (Aesculus hippocastanum) seed extract standardized to 50
  mg escin per day is as effective as graduated compression stockings in reducing
  leg fluid volume — confirmed across more than 16 double-blind clinical trials. Escin
  inhibits collagenase, hyaluronidase, beta-glucuronidase, and elastase (enzymes that
  degrade venous structures), prevents white-blood-cell accumulation in varicose veins,
  and raises vein tone. Topical escin reduces capillary fragility, bruising, and swelling.
evidence_tier: strong
linked_to_topics:
- varicose-veins
sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 102 — Varicose Veins, pg 1561-1562
  quote: After the 12-week trial, fluid volume in the more severely affected leg decreased
    an average of 56.5 mL with compression therapy and 53.6 mL with horse chestnut
    seed extract, whereas it rose by 9.8 mL with the placebo. The therapeutic benefits
    of horse chestnut seed extract have been confirmed in more than 16 double-blind
    clinical trials.
