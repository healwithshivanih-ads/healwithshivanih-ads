slug: estrogen-dominance-thickens-bile
statement: Estrogen dominance thickens bile, increasing the risk of sludge and poor
  bile flow, creating a bidirectional relationship between hormonal imbalance and
  gut dysfunction.
evidence_tier: plausible_emerging
rationale: Estrogen's effect on bile composition and gallstone risk is supported in
  pharmacological literature (oral contraceptive studies). The direct causal loop
  to sluggish bile flow in the FM context is a synthesis-level claim.
coaching_translation: Hormone imbalances and gut issues are often connected — supporting
  bile flow can help the body clear excess estrogen more effectively.
caveats:
- Source is educational synthesis. Estrogen-bile relationship has some literature
  support but the full FM framing is plausible emerging.
