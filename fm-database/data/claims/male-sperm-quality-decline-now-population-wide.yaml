slug: male-sperm-quality-decline-now-population-wide
statement: Average male sperm counts have declined approximately 50-60% over the past
  50 years across multiple meta-analyses, and the decline is steepening. Even healthy-appearing
  men benefit from preconception sperm DNA fragmentation testing, antioxidant supplementation,
  and avoidance of scrotal heat, BPA, phthalates, and ultra-processed foods. The 'just
  eat better' message is inadequate; partners need a structured protocol comparable
  to the woman's.
evidence_tier: strong
