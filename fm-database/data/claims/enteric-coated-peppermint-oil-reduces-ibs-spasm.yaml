slug: enteric-coated-peppermint-oil-reduces-ibs-spasm
statement: Enteric-coated peppermint oil (0.2 mL twice daily between meals) reduces
  colonic spasm, abdominal pain, distension, stool frequency, borborygmi, and flatulence
  in IBS, and is effective against Candida albicans.
evidence_tier: strong
rationale: Multiple RCTs support enteric-coated peppermint oil for IBS; menthol inhibits
  calcium channels in smooth muscle; enteric coating is essential to target lower
  intestine and prevent acid reflux.
coaching_translation: Enteric-coated peppermint oil capsules (0.2–0.4 mL twice daily
  between meals) is one of the best-evidenced natural treatments for IBS spasm and
  pain.
caveats:
- Plain peppermint oil (non-enteric coated) can relax the lower oesophageal sphincter
  causing heartburn — enteric coating is essential
- Transient burning rectal sensation on defecation is a common minor side effect
