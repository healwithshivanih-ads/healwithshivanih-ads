slug: high-fiber-diet-supports-gst-via-microbiome
statement: A high-fibre diet supports the microbiome's own GST enzyme activity, promotes
  production of detoxification enzymes in gut bacteria, and enables fibre to physically
  bind xenobiotics and escort them out in faeces, reducing the burden on hepatic GST.
evidence_tier: plausible_emerging
rationale: Fibre's role in binding bile acids and some toxins, and in supporting microbiome
  composition, has peer-reviewed support. The specific claim about microbiome GST
  enzymes is biologically plausible but less rigorously established.
coaching_translation: 'Encourage daily consumption of high-fibre foods—artichokes,
  avocados, lentils, berries, chia seeds, flaxseed, broccoli, oats. Exception: avoid
  increasing fibre if the client has active SIBO, which should be addressed first.'
caveats:
- Avoid high-fibre recommendation in clients with confirmed or suspected SIBO until
  addressed
