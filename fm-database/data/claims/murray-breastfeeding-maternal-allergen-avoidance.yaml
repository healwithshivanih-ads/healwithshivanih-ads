  location: Chapter 50 — Eczema, pg 921–922
  quote: Breastfeeding offers significant protection against developing eczema as
    well as allergies in general. Mothers of breastfed infants with allergies should
    avoid the common food allergens (especially milk, eggs, and peanuts and, to a
    lesser extent, fish, soy, wheat, citrus, and chocolate) themselves, to prevent
    traces of food antigens from appearing in their breast milk. Maternal avoidance
    of these common allergens is associated with complete resolution in the majority
    of cases.
