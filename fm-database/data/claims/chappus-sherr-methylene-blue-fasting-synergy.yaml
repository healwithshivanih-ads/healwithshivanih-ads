slug: chappus-sherr-methylene-blue-fasting-synergy
statement: Methylene blue does NOT break a fast (no caloric content; mitochondrial-acting,
  not metabolic in the insulin sense). Sherr observes that methylene blue enhances
  fasting tolerance by accelerating cellular cleanup, helping push the client into
  ketosis faster, and reducing the energy-deficit "wasted" feeling that some experience
  mid-fast. Practical sequencing — take the methylene blue at the usual morning time
  during the fasting window.
