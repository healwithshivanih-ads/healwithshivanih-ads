slug: manuka-honey-suppresses-h-pylori-growth
statement: Manuka honey (Leptospermum scoparium) with high methylglyoxal (MGO ≥ 250)
  or UMF (≥ 10) rating suppresses H. pylori growth in gastric epithelial cells via
  methylglyoxal-mediated antibacterial activity, providing an adjunctive natural agent
  alongside or following conventional eradication therapy.
evidence_tier: plausible_emerging
rationale: Multiple in-vitro and small clinical studies demonstrate H. pylori suppression
  by Manuka honey. Mechanism via methylglyoxal (the active marker behind MGO rating)
  is well-characterised. Most clinical evidence is adjunctive rather than monotherapy.
coaching_translation: Manuka honey at MGO 250+ or UMF 10+ on an empty stomach (1 tsp
  20 min before meals) is one of the better-tolerated natural anti-H. pylori options.
  Pair with mastic gum and probiotics; not strong enough as solo therapy.
caveats:
- MGO/UMF rating matters — supermarket honey doesn't have the same effect.
- Cost is significant — therapeutic doses run ~$50-100/month.
- Still a sugar source; caution in diabetes or fructose malabsorption.
- Never give to infants under 12 months.
