slug: safety-and-co-regulation-precede-deeper-healing
statement: 'A felt sense of safety is a prerequisite for healing: clients learn, change and
  respond to protocols better once their nervous system feels safe, and a regulated practitioner
  can co-regulate the client toward that state.'
evidence_tier: plausible_emerging
rationale: Neuroception (the nervous system's appraisal of safety vs threat) shapes a client's
  capacity to absorb education and follow through on change. Co-regulation — using calm presence,
  pacing and tone — is a usable clinical tool to help shift a dysregulated client into a state
  where deeper work becomes possible.
coaching_translation: People can't take in advice or make changes while their body feels unsafe.
  Building safety first — calm presence, unhurried pace, genuine connection — often does more
  than any protocol, because the nervous system has to settle before change sticks.
caveats:
- Source is Instagram educational content.
- Co-regulation supports, but does not replace, clinical care or trauma referral.
