slug: metab-treat-the-person-not-the-paper
statement: Labs are ancillary — they confirm clinical suspicion built from the client's
  story, symptoms and history, rather than being the definitive answer on their own.
  In statistics terms, a test result is only as trustworthy as the pre-test probability;
  testing for something unlikely can generate a confusing false result.
evidence_tier: strong
rationale: Coaches and clients both over-trust single lab numbers. Anchoring interpretation
  in the whole story (and in the clinician's clinical picture) prevents chasing spurious
  out-of-range values and keeps the focus on root-cause lifestyle drivers.
coaching_translation: Keep listening to the client's whole story, not just the numbers.
  When a client fixates on one 'abnormal' value, remind them labs support the picture
  rather than define it, and encourage them to discuss the finding with their provider
  in the context of how they actually feel.
out_of_scope_notes: Deciding which tests are indicated (pre-test probability) and
  how to weight a result clinically belongs to the ordering clinician.
caveats:
- Direct-to-consumer test panels often include low-pre-test-probability markers that
  can mislead clients.
