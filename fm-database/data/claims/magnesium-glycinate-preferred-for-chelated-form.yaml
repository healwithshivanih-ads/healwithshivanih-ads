slug: magnesium-glycinate-preferred-for-chelated-form
statement: Magnesium glycinate is a chelated (amino acid-bound) form with approximately 10% elemental magnesium and high bioavailability;
  higher doses are required to meet therapeutic targets.
evidence_tier: plausible_emerging
rationale: Chelated magnesium forms generally demonstrate higher bioavailability; magnesium glycinate is one of the better-tolerated
  and absorbed forms based on comparative studies and clinical use.
caveats:
- Higher doses by weight are needed due to lower elemental magnesium content per dose.
coaching_translation: Magnesium glycinate is one of the best-absorbed forms available and is gentle on the stomach — ideal
  for sleep, anxiety, and muscle support.
