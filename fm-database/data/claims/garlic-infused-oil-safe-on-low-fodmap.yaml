slug: garlic-infused-oil-safe-on-low-fodmap
statement: Garlic-infused oil provides garlic flavour without fructans because fructans
  are water-soluble (not oil-soluble) and do not transfer into oil during infusion.
evidence_tier: strong
rationale: Monash University research confirms fructans are hydrophilic and do not
  leach into oil; garlic-infused oil is listed as Low FODMAP in the Monash app.
coaching_translation: If you miss garlic flavour, use garlic-infused cooking oil —
  all the taste, none of the bloat.
