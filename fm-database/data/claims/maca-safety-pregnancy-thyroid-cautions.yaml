slug: maca-safety-pregnancy-thyroid-cautions
statement: Maca has no safety data in pregnancy or lactation and should be discontinued
  at conception until evidence emerges. As a cruciferous plant containing glucosinolates,
  raw maca powder may interfere with thyroid hormone synthesis at high doses — clients
  with hypothyroidism or Hashimoto's should choose gelatinized maca (heat-deactivates
  goitrogenic compounds) and discuss with their clinician. No interaction signal emerged
  with SSRIs in the only co-administration trial.
evidence_tier: confirm_with_clinician
