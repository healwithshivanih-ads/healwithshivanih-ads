slug: medicinal-mushrooms-support-immune-and-antiviral-activity
statement: Medicinal mushrooms support the immune system while having antioxidant
  and antiviral effects; dosing should be individualized by genus and species.
evidence_tier: plausible_emerging
rationale: Multiple species (Shiitake/Lentinula edodes, Reishi/Ganoderma lucidum,
  Maitake/Grifola frondosa, Lion's Mane/Hericium erinaceus) have RCT or controlled
  study support for immune modulation. Antiviral effects are largely preclinical.
  Dosing variability by species makes general claims difficult.
coaching_translation: Mushrooms like shiitake, reishi, and maitake contain compounds
  that support your immune system and have antioxidant properties. Different mushrooms
  have different benefits, so the type and dose matters.
out_of_scope_notes: Dosing must be individualized to specific species and validated
  methods — this is clinician/practitioner scope. Coaches can educate on food-form
  mushrooms (e.g., shiitake in diet).
caveats:
- Dosing is species-specific and must be individualized by a practitioner.
- Evidence quality varies by species.
- Some mushroom extracts may interact with immunosuppressive medications.
