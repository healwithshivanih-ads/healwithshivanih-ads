  location: Podcast — lipotoxicity ectopic fat segment
  quote: These fat cells that are now lipid overloaded start secreting their fat back
    into circulation. Having a bunch of fatty acids in your blood can cause damage
    to tissues — lipotoxicity. So your body says we need to get out of the blood.
    So what we're going to do is start putting it in places where it shouldn't go.
    This is what leads to the development of visceral fat.
rationale: Concrete tracking metric — coach uses waist circumference + waist:height
  ratio over BMI for at-risk clients.
