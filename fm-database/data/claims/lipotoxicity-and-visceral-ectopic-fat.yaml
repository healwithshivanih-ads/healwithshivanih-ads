slug: lipotoxicity-and-visceral-ectopic-fat
statement: Once subcutaneous fat cells reach storage capacity and become lipid-overloaded,
  they release fatty acids back into circulation. The body cannot tolerate free fatty
  acids at high concentration (LIPOTOXICITY) so it deposits them in ECTOPIC sites
  that should never store fat — visceral adipose around organs, liver (NAFLD), muscle
  (intramyocellular lipid), pancreas (beta-cell dysfunction), heart. Each of these
  ectopic deposits drives its own pathology — NAFLD progresses to NASH and fibrosis;
  pancreatic ectopic fat impairs insulin secretion; cardiac ectopic fat drives heart
  failure. Coach implication — visceral adiposity (waist circumference > 80 cm women,
  > 94 cm men) is a more important metric than BMI for predicting trouble.
