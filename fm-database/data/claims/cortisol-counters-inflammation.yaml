slug: cortisol-counters-inflammation
statement: Cortisol functions to counter inflammation and allergies as part of its
  normal physiological role.
evidence_tier: strong
rationale: 'Well-established: cortisol is a glucocorticoid with potent anti-inflammatory
  actions, suppressing cytokine production and immune cell activity. Textbook endocrinology.'
coaching_translation: Cortisol isn't all bad — in the right amounts it keeps inflammation
  in check. Problems arise when levels are chronically too high or too low.
