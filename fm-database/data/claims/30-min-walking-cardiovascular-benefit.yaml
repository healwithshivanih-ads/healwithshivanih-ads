slug: 30-min-walking-cardiovascular-benefit
statement: Walking for at least 30 minutes per day at 60–80% of maximum aerobic capacity
  supports cardiovascular health and is recommended during beta blocker tapering.
evidence_tier: strong
rationale: Aerobic exercise at moderate intensity (60–80% max aerobic capacity) for
  ≥30 minutes daily is supported by strong RCT and epidemiological evidence for blood
  pressure reduction and CVD risk reduction.
coaching_translation: A daily 30-minute walk at a brisk pace — where you're breathing
  harder but can still talk — is one of the most powerful prescriptions for heart
  health.
