slug: ginseng-reduces-cortisol-supports-neuroplasticity
statement: Panax ginseng ginsenosides may reduce acute cortisol release and support
  neuroplasticity in the hippocampus, a region vulnerable to chronic cortisol-induced
  damage.
evidence_tier: plausible_emerging
rationale: Mechanism (ginsenosides modulating stress hormone release and hippocampal
  neuroplasticity) is biologically plausible and supported by the cited observation.
  Studies not named.
coaching_translation: Ginseng may help buffer your stress hormone response and protect
  brain resilience — important when stress has been chronic.
caveats:
- Source is expert synthesis without named studies.
- Ginseng can have stimulating effects — morning timing preferred; consult clinician
  for those on anticoagulants or immunosuppressants.
