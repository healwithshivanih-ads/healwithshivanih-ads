slug: sklar-spermatogenesis-90-120-day-window
statement: Spermatogenesis takes approximately 60-75 days, with epididymal transit
  pushing the actionable improvement window to 90-120 days. This is why male-partner
  lifestyle changes — alcohol elimination, toxin reduction, nutrition, sleep, weight,
  thermoregulation — need to start at least three to four months before conception
  attempts for the effect to show up in semen parameters.
