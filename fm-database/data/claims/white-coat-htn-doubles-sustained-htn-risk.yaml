slug: white-coat-htn-doubles-sustained-htn-risk
statement: White coat hypertension is linked to higher mortality and twice the risk
  of developing sustained hypertension compared with normotensives.
evidence_tier: strong
rationale: Well-established clinical finding documented in major reference text; white
  coat hypertension is no longer considered a benign phenomenon.
coaching_translation: If your blood pressure only rises at the doctor's office, it
  still matters — treat it with the same lifestyle strategies as true hypertension.
