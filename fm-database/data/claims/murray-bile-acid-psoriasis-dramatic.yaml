slug: murray-bile-acid-psoriasis-dramatic
statement: 'Oral bile acid supplementation (dehydrocholic acid 250 mg/day in 2–3 divided
  doses) produced complete psoriasis resolution in 78.8% of 551 patients vs only 24.9%
  in 249 conventional therapy controls in an 800-patient comparative study. Effect
  was strongest in acute psoriasis (95.1% asymptomatic). At 2-year follow-up, 57.9%
  of the bile-acid-treated group remained asymptomatic versus only 6% of conventionally-treated
  controls. Mechanism: bile acids detoxify bacterial endotoxins (LPS) in the intestine,
  preventing endotoxin absorption into the bloodstream that drives psoriatic skin
  cell proliferation. Mixed ox bile from health food stores is a practical OTC alternative
  to prescription dehydrocholic acid.'
evidence_tier: plausible_emerging
rationale: Itoh 1994 single large comparative study (n=800). Effect-size dramatic;
  sustained at 2 years. Methodology not modern DB-RCT but the magnitude of clinical
  effect + biologically plausible mechanism + low risk make this one of the highest-leverage
  FM interventions for psoriasis. Replication remains limited, hence the plausible_emerging
  tier despite the dramatic effect-size.
coaching_translation: Oral bile acid supplementation produced 78.8% complete psoriasis
  resolution in an 800-patient study (vs 24.9% with conventional treatment) — and
  57.9% were still clear 2 years later. The bile acids work by neutralising bacterial
  endotoxins from the gut that drive the skin inflammation. Use ox bile 500 mg with
  meals (available OTC) or prescription dehydrocholic acid 250 mg/day. Most striking
  in acute presentations. One of the highest-leverage FM interventions in psoriasis
  — yet rarely used in conventional dermatology.
caveats:
- Contraindicated with biliary obstruction or gallstone-related disease
- Caution with diarrhoea history (mild laxative effect)
- Take with meals
- Standardised supplements (ox bile) preferred over generic 'bile extract'
- Discontinue if persistent GI upset
