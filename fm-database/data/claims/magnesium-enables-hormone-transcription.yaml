slug: magnesium-enables-hormone-transcription
statement: Magnesium is required for transcription of the hormonal signal at the receptor
  binding pocket domain and is chronically depleted by stress, toxicity, and aging.
evidence_tier: strong
rationale: Magnesium's role as a cofactor in DNA transcription and RNA polymerase
  function is well established. Its depletion by physiological stress (cortisol-mediated
  renal excretion) is documented. The specific framing within receptor binding pocket
  domains is a functional medicine extension of these established mechanisms.
coaching_translation: Magnesium helps translate hormone signals into actual changes
  in your cells. Stress, toxins, and aging all drain magnesium — making it one of
  the most important minerals for hormonal health.
