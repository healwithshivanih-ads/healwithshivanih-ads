  quote: In another study, 232 patients with high BP were given either olive leaf
    extract (500 mg twice per day) or the conventional antihypertensive drug captopril
    (12.5 mg twice per day). Hibiscus extract decreased systolic blood pressure by
    17.14 mm Hg and diastolic by 11.97 mm Hg.
