slug: murray-stress-4-level-support-framework
statement: 'Murray''s progressive 4-Level stress support framework: LEVEL 1 — lifestyle
  foundation (positive mental attitude, health-promoting lifestyle, diet, basic supplements).
  LEVEL 2 — Level 1 PLUS PharmaGABA 100-200 mg up to 6× daily for situational stress
  + nervousness. LEVEL 3 — Level 2 PLUS adaptogen (Panax ginseng OR Siberian ginseng
  OR Rhodiola OR Ashwagandha at standard doses). LEVEL 4 — Level 3 PLUS anxiety +
  insomnia protocol; improving sleep quality is essential to restoring adrenal function.
  This stepwise escalation allows matching intervention intensity to client need rather
  than overpathologising mild stress.'
evidence_tier: strong
rationale: Clinical framework integrating evidence-based interventions in escalating
  tiers. Mechanism — different intervention classes target different stress-response
  axes; tiered approach prevents both undertreating + overtreating.
coaching_translation: 'Murray''s stress support framework — match intensity to need:
  LEVEL 1 (most clients): lifestyle + diet + basic supplements. LEVEL 2 (situational
  stress): add PharmaGABA 100-200 mg up to 6× daily. LEVEL 3 (chronic stress): add
  adaptogen (ashwagandha 125-250 mg, rhodiola, ginseng). LEVEL 4 (adrenal fatigue
  + anxiety + insomnia): add the anxiety + insomnia protocols on top, prioritising
  sleep restoration. Don''t jump to Level 4 supplements for Level 1 problems.'
caveats:
- Match level to actual presentation, not severity narrative
- Most clients respond to Level 1-2; Level 3-4 needs gradual building
- Sleep restoration prerequisite for true adrenal recovery
- Don't initiate adaptogens during acute crisis (timing matters)
