slug: fecal-calprotectin-distinguishes-ibd-from-ibs
statement: Faecal calprotectin is a sensitive and specific non-invasive assessment
  tool for inflammatory status in IBD and for distinguishing IBD from non-inflammatory
  GI conditions such as IBS.
evidence_tier: strong
rationale: Validated biomarker with strong clinical evidence base; calprotectin is
  secreted by intestinal neutrophils in direct proportion to mucosal inflammation,
  making it highly sensitive for IBD vs. IBS differentiation.
coaching_translation: A faecal calprotectin test can help clarify whether gut symptoms
  are from inflammation (IBD) or functional causes (IBS) — recommend to clients with
  uncertain diagnosis.
caveats:
- Test requires clinician order and interpretation; false positives can occur with
  NSAIDs, GI infections, and coeliac disease
out_of_scope_notes: Lab ordering and interpretation is outside coaching scope.
