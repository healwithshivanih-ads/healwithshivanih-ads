  location: Chapter 50 — Eczema, pg 921
  quote: There are also immune defects in patients with eczema that lead to increased
    susceptibility to other infections of the skin. A defect in the ability to kill
    bacteria. This defect in immune function, coupled with scratching and the predominance
    of the bacteria Staphylococcus aureus in the skin flora in 90% of eczema patients,
    leads to an increased susceptibility to potentially severe staph infections of
    the skin.
