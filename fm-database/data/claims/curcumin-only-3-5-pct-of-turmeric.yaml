slug: curcumin-only-3-5-pct-of-turmeric
statement: Curcuminoids make up only 3 to 5 percent of the raw turmeric plant — meaning
  culinary turmeric powder delivers a small absolute curcumin dose. Standardised curcumin
  extracts are therefore used when a therapeutic anti-inflammatory dose is the goal,
  while whole-plant turmeric in food provides synergistic phytonutrients that may
  enhance the extract's effect.
