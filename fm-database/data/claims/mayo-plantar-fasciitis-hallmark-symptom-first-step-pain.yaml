slug: mayo-plantar-fasciitis-hallmark-symptom-first-step-pain
statement: The defining symptom of plantar fasciitis is sharp stabbing heel pain that
  is worst with the first few steps in the morning or after sitting, eases with walking,
  and returns with prolonged standing — distinguishing it from heel-fat-pad atrophy
  and tarsal-tunnel syndrome.
