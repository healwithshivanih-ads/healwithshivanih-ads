slug: mitochondrial-dysfunction-accelerates-inflammaging
statement: After age 40, dysfunctional mitochondria outnumber healthy ones, and this
  imbalance — worsened by poor metabolic health (diabetes, fatty liver, PCOS, insulin
  resistance) — accelerates inflammaging.
evidence_tier: plausible_emerging
rationale: Mitochondrial decline with age and its link to inflammation (via reactive
  oxygen species and NLRP3 inflammasome) is well-described in the literature, though
  the 'more dysfunctional than healthy' framing is a simplification. Single expert
  source.
coaching_translation: Your cells' energy generators decline with age, especially in
  midlife, and the worse your metabolic health, the faster this happens — adding fuel
  to the fire of chronic inflammation.
caveats:
- The claim that dysfunctional mitochondria outnumber healthy ones after 40 is a heuristic
  simplification.
- Single-expert source without specific citation.
