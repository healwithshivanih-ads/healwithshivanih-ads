slug: food-allergy-igg-delayed-80pct-reactions
statement: Approximately 80% of food allergy reactions are delayed-type IgG and IgG4
  reactions, occurring more than two hours and sometimes days after exposure. Only
  10 to 15% of food allergies are classic immediate IgE type I reactions. Delayed
  reactions are the harder ones to identify clinically without elimination diet or
  testing.
