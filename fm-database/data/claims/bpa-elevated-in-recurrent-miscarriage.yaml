slug: bpa-elevated-in-recurrent-miscarriage
statement: Women with a history of three or more first-trimester miscarriages have
  on average roughly three times higher BPA levels than fertile controls, and the
  top quartile of BPA exposure carries an 80% greater miscarriage risk than the bottom
  quartile in women already pregnant.
evidence_tier: plausible_emerging
