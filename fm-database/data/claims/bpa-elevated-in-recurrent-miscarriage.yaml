  location: Chapter 2 — The Dangers of BPA, pg 38-39
  quote: The average BPA level in the women with recurrent miscarriage was about three
    times higher than in the control group. Women in the top quartile of BPA had an
    80 percent greater risk of miscarriage than women in the lowest quartile.
rationale: Adds BPA to the recurrent-miscarriage workup checklist.
