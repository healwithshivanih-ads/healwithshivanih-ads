slug: ppis-elevate-adma-block-nitric-oxide
statement: Proton pump inhibitors (PPIs) lead to elevated ADMA (asymmetric dimethylarginine),
  which blocks nitric oxide production, impairing endothelial function and potentially
  increasing cardiovascular risk.
evidence_tier: plausible_emerging
rationale: PPI-ADMA-nitric oxide pathway has emerging evidence. ADMA is an established
  endogenous NOS inhibitor. Association between PPI use and cardiovascular risk has
  epidemiological support.
coaching_translation: Long-term use of heartburn medications (PPIs like omeprazole)
  may affect heart health by blocking a molecule that helps blood vessels relax. Working
  to get off PPIs through dietary and gut health changes is an important cardiovascular
  strategy.
out_of_scope_notes: Discontinuing PPIs should be done under clinician supervision
  — rebound acid secretion is a real clinical concern.
caveats:
- Causal relationship between PPI use and CVD outcomes is observational — confounding
  possible.
- Source is expert lecture — specific mechanism studies not cited.
