slug: mayo-restless-legs-urge-criteria-and-iron-screening
statement: RLS diagnosis is clinical (urge to move legs, worse at rest, relieved by
  movement, worse evening/night), but every new diagnosis triggers a ferritin and
  transferrin saturation check — Mayo treats with iron when ferritin is below 75 ng/mL
  because low iron is a well-established RLS driver.
evidence_tier: strong
