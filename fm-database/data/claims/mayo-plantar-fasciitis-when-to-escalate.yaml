slug: mayo-plantar-fasciitis-when-to-escalate
statement: If first-step heel pain persists beyond several months of dedicated conservative
  care, conventional next-step options are corticosteroid injection, extracorporeal
  shock-wave therapy, ultrasound-guided needle tenotomy, platelet-rich plasma injection,
  and (rarely) plantar-fascia release surgery.
