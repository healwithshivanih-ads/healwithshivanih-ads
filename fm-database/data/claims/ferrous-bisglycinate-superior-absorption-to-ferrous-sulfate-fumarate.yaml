slug: ferrous-bisglycinate-superior-absorption-to-ferrous-sulfate-fumarate
statement: Ferrous bisglycinate has superior bioavailability compared to ferrous sulfate
  and ferrous fumarate for iron supplementation.
evidence_tier: plausible_emerging
rationale: The chelated glycinate form is proposed to bypass standard non-heme iron
  absorption pathways, resulting in better uptake. Some comparative trials exist but
  the evidence base is still emerging relative to the established standard of ferrous
  sulfate.
coaching_translation: The form of iron supplement matters — the glycinate-bound version
  tends to be better absorbed than the standard pharmacy versions.
out_of_scope_notes: Specific dosing recommendations must come from a clinician. Do
  not recommend therapeutic iron doses without clinical oversight.
caveats:
- Source is an expert lecture (moderate quality), not primary RCT evidence.
- Comparative RCT evidence is growing but not yet at consensus level.
- Verify current evidence with a clinician before recommending.
