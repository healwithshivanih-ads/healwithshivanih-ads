slug: ox-bile-betaine-hcl-support-dao-histamine
statement: Sluggish bile flow and low stomach acid worsen DAO/histamine and SIBO;
  small-dose ox bile at dinner and betaine HCL with meals may support digestion and
  reduce the histamine burden.
evidence_tier: fm_specific_thin
rationale: Digestive-support rationale is plausible but individualised; betaine HCL
  is contraindicated with ulcers/reflux medications, so dosing needs clinician oversight.
coaching_translation: Getting bile and stomach acid working properly helps the gut
  handle histamine — but acid support isn't for everyone.
out_of_scope_notes: Betaine HCL dosing is confirm_with_clinician; unsafe with active
  reflux/ulcer or acid-suppressing meds.
caveats:
- Source is a consumer trade book (Ben Lynch, Dirty Genes), not primary literature.
