slug: murray-magnesium-bronchodilator-asthma
statement: Magnesium relaxes bronchial smooth muscle (demonstrated since 1912 by Trendelenburg)
  and at oral doses of 200–400 mg three times daily (citrate/malate/aspartate/glycinate
  forms) reduces asthma severity and frequency. IV magnesium is established standard-of-care
  for acute severe asthma exacerbations in emergency departments; the oral dose targets
  chronic baseline tone. Asthmatics consistently show low intracellular magnesium
  status.
evidence_tier: strong
rationale: Multiple decades of evidence, IV form in standard pulmonology practice.
  Mechanism — magnesium blocks calcium influx into bronchial smooth muscle, reducing
  contraction. Oral chronic dose less studied than IV acute but mechanistically aligned.
coaching_translation: Magnesium is a natural bronchodilator. 200-400 mg three times
  daily (glycinate or citrate) as part of any asthma protocol. Doesn't replace rescue
  inhalers for acute attacks (IV form is for ED use) but reduces baseline airway tightness
  and exacerbation frequency.
caveats:
- Glycinate or citrate; avoid oxide
- Renal impairment caution
- GI tolerance often dose-limiting
