slug: multiple-elimination-routes-matter
statement: 'Effective detoxification requires functional elimination across all

  routes — daily bowel movements, adequate urination, regular sweating,

  and healthy sebum and respiratory function. A bottleneck in any one

  route raises net toxin load even when Phase 1/2 are working well.

  '
evidence_tier: strong
rationale: 'Conjugated metabolites exit via bile-to-stool, urine, sweat, sebum,

  and exhaled breath. The bile-to-stool route in particular is

  vulnerable to enterohepatic recirculation if transit is slow or

  beta-glucuronidase activity is high. Roughly one in three adults

  reports some degree of constipation. Sweat is a documented excretion

  route for certain heavy metals and persistent organic pollutants.

  '
coaching_translation: 'Phase 1 and Phase 2 do the hard chemistry, but if you can''t
  actually

  get the finished product out — daily poop, regular pee, occasional

  sweat — it just gets reabsorbed. A good detox plan checks all the

  exits, not just the liver.

  '
caveats:
- Sauna and intense exercise are not appropriate for everyone — screen for cardiac,
  dysautonomia, or heat-intolerance concerns and defer to clinician guidance.
