slug: nac-precursor-glutathione-reduces-oxidative-stress
statement: NAC (N-acetyl cysteine) at 600mg three times daily acts as a glutathione precursor, increases plasma cysteine levels,
  and reduces oxidative stress with anti-inflammatory properties.
evidence_tier: plausible_emerging
rationale: NAC as glutathione precursor is well-established biochemistry. Clinical cardiovascular benefit at oral doses is
  plausible but less conclusive than IV use.
coaching_translation: NAC is an antioxidant supplement that helps your body produce its own natural protective glutathione,
  which may help reduce artery-damaging oxidative stress.
caveats:
- Oral bioavailability of NAC is variable.
- Source is expert lecture — specific RCTs for oral NAC in CVD not cited.
- IV NAC + nitroglycerin infarct reduction is an acute care application, not a coaching intervention.
