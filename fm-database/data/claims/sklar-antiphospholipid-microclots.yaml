slug: sklar-antiphospholipid-microclots
statement: Antiphospholipid antibodies (anti-cardiolipin, beta-2-glycoprotein, anti-phosphatidylserine)
  cause microthrombi in the placental micro-vasculature — the embryo may implant successfully,
  but blood flow to the developing placenta is progressively compromised, presenting
  as early pregnancy loss or chemical pregnancy. Standard fertility panels rarely
  test this set.
evidence_tier: strong
