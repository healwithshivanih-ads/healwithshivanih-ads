slug: calcium-supplementation-rarely-needed
statement: Calcium supplementation is rarely necessary for low serum calcium; underlying
  causes such as low albumin, low stomach acid, low magnesium, or low vitamin D should
  be identified and corrected first.
evidence_tier: plausible_emerging
rationale: The document's central thesis is that clinicians and coaches over-prescribe
  calcium supplementation. The physiological reasoning is sound — multiple upstream
  deficiencies can create the appearance of calcium deficiency. However, this is expert
  consensus and not derived from comparative effectiveness trials.
coaching_translation: Before reaching for a calcium supplement, it's worth investigating
  why calcium looks low. Often the real fix is addressing magnesium, vitamin D, protein
  intake, or stomach acid.
caveats:
- Source is expert consensus, moderate quality.
- Specific populations (postmenopausal women, elderly) may genuinely benefit from
  calcium supplementation — this claim should not discourage clinician-recommended
  use.
