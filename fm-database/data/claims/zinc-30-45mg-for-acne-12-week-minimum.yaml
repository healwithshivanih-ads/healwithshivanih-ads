slug: zinc-30-45mg-for-acne-12-week-minimum
statement: Zinc 30-45 mg/day (picolinate, acetate, or monomethionine) for at least
  12 weeks improves acne — essential for retinol-binding protein, wound healing, immune
  function, and inhibiting 5-alpha reduction of testosterone. Adolescent boys aged
  13-14 have the lowest serum zinc of any age group.
evidence_tier: strong
rationale: Pizzorno cites multiple comparative trials of zinc gluconate vs tetracycline
  showing comparable efficacy at 12+ weeks. Mechanism — zinc is the limiting cofactor
  for retinol-binding protein; high zinc directly inhibits 5-alpha-reductase; low
  zinc amplifies DHT in skin.
coaching_translation: Zinc is one of the most reliable acne nutrients — 30-45 mg a
  day for 3 months minimum. Use picolinate, acetate, or monomethionine forms (sulfate
  is poorly absorbed). Effect builds slowly.
caveats:
- Take with food to avoid nausea.
- Maintain 10:1 Zn:Cu ratio to prevent copper deficiency.
- 12 weeks minimum before assessing response.
