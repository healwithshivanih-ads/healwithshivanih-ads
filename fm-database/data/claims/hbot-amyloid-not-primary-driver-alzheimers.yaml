sources:
- id: efrati-perlmutter-empowering-neurologist-2024
  location: Podcast — Alzheimer's mechanism discussion
  quote: Today we understand that the amyloid is not the primary cause of the disease
    — it is actually a biomarker. After investing a lot of years in research and development
    of antibodies that can take the amyloid out — we can take it down, but it does
    not make a significant clinical change. The primary cause can be actually ischemia,
    lack of perfusion, hypoxia, and inflammation as part of that.
rationale: Major FM-aligned position on Alzheimer's pathogenesis worth surfacing.
