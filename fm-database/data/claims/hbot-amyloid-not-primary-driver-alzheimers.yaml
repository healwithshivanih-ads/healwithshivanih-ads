slug: hbot-amyloid-not-primary-driver-alzheimers
statement: Efrati's view aligned with current FM thinking — amyloid plaque is a BIOMARKER
  of Alzheimer pathology, not the primary cause. Decades of pharmaceutical investment
  in anti-amyloid antibodies has succeeded at clearing plaque without producing the
  expected clinical change, suggesting the true primary driver lies upstream — often
  small-vessel ischaemia and chronic neuroinflammation that produce amyloid as a downstream
  consequence. In a mouse Alzheimer model, HBOT reduced amyloid plaque by targeting
  upstream inflammation rather than the plaque itself.
evidence_tier: plausible_emerging
