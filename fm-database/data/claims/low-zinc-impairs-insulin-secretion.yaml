slug: low-zinc-impairs-insulin-secretion
statement: Low zinc levels are associated with impaired insulin secretion and decreased
  insulin sensitivity.
evidence_tier: plausible_emerging
rationale: Zinc is structurally required for insulin crystallisation and storage in
  beta cells; low zinc linked to impaired secretion in observational and mechanistic
  studies.
coaching_translation: Zinc is essential for your pancreas to make and release insulin
  properly — a deficiency can make blood sugar harder to control.
