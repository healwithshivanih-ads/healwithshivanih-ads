slug: cruciferous-vegetables-support-estrogen-metabolism
statement: Cruciferous vegetables positively influence estrogen metabolism and reduce
  overall cancer risk via sulforaphane, which upregulates Nrf2 and supports glutathione
  production.
evidence_tier: plausible_emerging
rationale: Document cites 'many studies'; references include Thomson et al. (Nutr
  Rev, 2016) on DIM chemopreventive properties. Nrf2/glutathione mechanism is well-described
  in literature.
coaching_translation: Broccoli, cauliflower, kale, and Brussels sprouts contain sulforaphane,
  which helps your liver process estrogen more safely.
caveats:
- Source is expert consensus synthesis. Most evidence is from in vitro/animal or observational
  studies; RCT cancer risk reduction not yet established.
