slug: amyloid-is-correlated-not-causal
statement: Less than 2% of the population has no amyloid at any age — and at older
  ages there are cognitively-perfect adults with heavy amyloid burden and clinically-demented
  adults with little amyloid. Removing amyloid pharmacologically (monoclonal antibodies
  aducanumab, lecanemab, donanemab) slows progression by approximately 30% but does
  NOT produce cognitive improvement, while carrying a 30%-range risk of brain bleeding
  or swelling on follow-up MRI. Amyloid is therefore best treated as a downstream
  marker of dysregulation, not the cause.
evidence_tier: plausible_emerging
