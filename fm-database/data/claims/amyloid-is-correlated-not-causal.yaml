  location: Podcast — amyloid hypothesis segment
  quote: Less than 2% of the population doesn't have amyloid. There are people with
    perfect cognition who have lots of amyloid and there are people with poor cognition
    with dementia who don't have any amyloid. When you take amyloid away you don't
    get an improvement in cognition. No one gets better. You get a slowing of the
    disease process by about 30%. The risks are brain bleeding and brain swelling
    and this happens in about 30% of patients.
rationale: Coach response to clients asking "should I get on lecanemab?" — names the
  30% slowing vs 30% serious-AE numbers explicitly.
