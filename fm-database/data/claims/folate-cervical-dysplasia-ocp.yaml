slug: folate-cervical-dysplasia-ocp
statement: Folate deficiency is a major cofactor in cervical dysplasia — especially
  for women on oral contraceptives, who develop localized folate metabolism interference
  even with normal serum levels (use erythrocyte folate as the tissue marker). In
  RCTs of OCP-using women with dysplasia, folic acid 10 mg/day produced normalization
  rates of 20 to 100% across studies, vs typical untreated regression of just 1.3%
  for mild and 0% for moderate dysplasia. Low RBC folate independently associates
  with high-risk HPV persistence.
evidence_tier: strong
