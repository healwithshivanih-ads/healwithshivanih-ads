slug: raw-cruciferous-vegetables-may-inhibit-thyroid-function
statement: Raw cruciferous vegetables contain goitrogens that may interfere with thyroid function; cooking reduces this effect.
evidence_tier: plausible_emerging
rationale: Glucosinolates in cruciferous vegetables are converted to goitrins that can competitively inhibit thyroid iodine
  uptake. Cooking significantly degrades these compounds. The clinical significance in individuals with adequate iodine intake
  is debated.
coaching_translation: Broccoli, cauliflower, and cabbage are very healthy, but eating large amounts raw may slightly slow
  thyroid hormone production. Cooking them reduces this concern significantly.
caveats:
- The effect is generally modest and clinically significant mainly in the context of iodine deficiency. Cooked cruciferous
  vegetables are fine for most thyroid patients.
