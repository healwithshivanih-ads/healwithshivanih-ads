slug: chappus-sherr-methylene-blue-94pct-prevalence-reframe
statement: Sherr cites that approximately 94% of US adults show some element of mitochondrial
  dysfunction — manifested as either reduced electron-transport-chain energy output,
  inadequate reactive-oxygen-species clearance, or both. A reframe he prefers — 100%
  of adults experience mitochondrial stress, but only about 6% have the resilience
  to compensate without intervention. Practical implication for coaches — assume most
  clients presenting with brain fog, fatigue, mood changes, pain, or recovery dysfunction
  have a mitochondrial driver until proven otherwise.
