slug: probiotics-support-gut-dysbiosis-chronic-pain
statement: High-quality multi-strain probiotics support correction of gut dysbiosis and may improve chronic pain and fatigue
  outcomes in clients with GI involvement.
evidence_tier: plausible_emerging
rationale: Growing evidence supports probiotics improving gut barrier function, reducing systemic inflammation, and influencing
  pain perception via the gut-brain axis. Quality of product (viability, strain specificity) significantly affects outcomes.
coaching_translation: When a client has a history of antibiotic use, processed food, bloating, or brain fog alongside their
  pain/fatigue, a high-quality probiotic is often a key foundational supplement.
caveats:
- Quality varies enormously — avoid low-cost supermarket products.
- Source is expert FM lecture.
- Strain selection for specific conditions requires clinician input.
