slug: celiac-persistent-symptoms-screen-for-sibo
statement: In celiac disease, small-intestinal bacterial counts and stool butyrate
  rise and only normalise after a year or more gluten-free; SIBO is a common reason
  celiac symptoms persist despite a gluten-free diet, and treating it can make patients
  symptom-free.
evidence_tier: strong
rationale: Cites celiac-microbiota studies and a trial where 10 of 15 gluten-free-but-symptomatic
  celiacs had SIBO and rifaximin resolved them.
coaching_translation: If a celiac client is strict gluten-free but still suffering,
  bacterial overgrowth is a likely missed cause worth investigating.
