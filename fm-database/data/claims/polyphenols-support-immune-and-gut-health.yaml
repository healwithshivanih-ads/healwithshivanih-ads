slug: polyphenols-support-immune-and-gut-health
statement: Polyphenols from brightly pigmented fruits, vegetables, green tea, coffee,
  and herbs provide immune-supportive and gut-health benefits, including via postbiotic
  pathways (e.g., urolithin A).
evidence_tier: plausible_emerging
rationale: Polyphenol research is active and promising; urolithin A's mitochondrial
  and immune effects are in early clinical trials. The broad claim about polyphenols
  is biologically plausible but varies by compound. Single-expert source without citations.
coaching_translation: Color your plate. Deeply pigmented vegetables, berries, green
  tea, and herbs aren't just healthy foods — they send signals that support your gut
  bacteria and help modulate inflammation.
caveats:
- Polyphenol effects are compound-specific and dose-dependent; broad claims should
  be qualified.
- Urolithin A evidence is early-stage.
- Single-expert source.
