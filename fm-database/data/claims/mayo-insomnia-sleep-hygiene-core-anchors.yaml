slug: mayo-insomnia-sleep-hygiene-core-anchors
statement: Sleep hygiene basics with the best evidence are consistent wake time seven
  days a week, bed used only for sleep and sex, no screens or clock-watching in the
  30 minutes before bed, no naps after 3 pm, no caffeine after midday, and getting
  out of bed if not asleep within 20 minutes.
