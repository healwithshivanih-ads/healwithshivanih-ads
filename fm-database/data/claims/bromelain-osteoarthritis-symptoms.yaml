slug: bromelain-osteoarthritis-symptoms
statement: Bromelain has been studied for relief of osteoarthritis symptoms, with
  preliminary single-study evidence only.
evidence_tier: plausible_emerging
rationale: Examine.com lists one 47-participant study on osteoarthritis symptoms;
  an overall evidence grade is not established. Bromelain's anti-inflammatory action
  is the proposed mechanism, but the evidence base is too small to draw a conclusion.
coaching_translation: Bromelain is sometimes used as an anti-inflammatory adjunct
  for joint discomfort. The osteoarthritis evidence is preliminary — frame it as
  "may help a little", and keep the focus on movement, load and weight management.
caveats:
- Single small study; overall evidence grade not established.
- Diagnosed osteoarthritis management belongs with the client's clinician.
