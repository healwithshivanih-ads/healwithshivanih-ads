slug: bromelain-osteoarthritis-symptoms
statement: Bromelain may meaningfully improve osteoarthritis symptoms — pain,
  stiffness and physical function.
evidence_tier: plausible_emerging
rationale: A NotebookLM synthesis of the bromelain review literature reports human
  trials of up to 16 weeks showing significant improvements in total WOMAC scores
  (pain, stiffness, physical function); the evidence is graded moderate / promising.
  The proposed mechanism is bromelain's anti-inflammatory action — NF-kB inhibition
  and reduced prostaglandin E2. Examine.com separately lists a small osteoarthritis
  study without an established grade, so the picture is promising but not yet
  definitive.
coaching_translation: Bromelain is one of the better-supported anti-inflammatory
  adjuncts for joint discomfort — human trials show real improvements in pain and
  function. Still frame movement, load management and weight as the primary levers,
  with bromelain as a supportive add-on.
caveats:
- Evidence graded moderate / promising — encouraging human data but not definitive.
- Diagnosed osteoarthritis management belongs with the client's clinician.
- Typical osteoarthritis dosing is 400 mg twice daily up to 500-2000 mg twice daily.
