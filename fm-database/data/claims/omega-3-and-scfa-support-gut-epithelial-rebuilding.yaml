slug: omega-3-and-scfa-support-gut-epithelial-rebuilding
statement: Omega-3 fatty acids and short-chain fatty acids (SCFAs) are essential for rebuilding the gut epithelium in intestinal
  permeability and dysbiosis.
evidence_tier: plausible_emerging
rationale: SCFAs (particularly butyrate) are well-established fuels for colonocytes. Omega-3s reduce intestinal inflammation
  and support membrane integrity. Their role in gut epithelial repair has growing evidence but full consensus is not yet established.
coaching_translation: Healthy fats — including omega-3s from fish oil and short-chain fats from fermented/fiber-rich foods
  — help rebuild the gut lining.
caveats:
- Source is expert lecture, moderate quality.
- SCFA sources and specific supplementation forms not detailed in the document.
