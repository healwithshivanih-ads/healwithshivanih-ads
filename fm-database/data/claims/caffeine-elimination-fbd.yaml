slug: caffeine-elimination-fbd
statement: Eliminating methylxanthines (coffee, tea, cola, chocolate, caffeinated
  medications) produces improvement in 97.5% of women with FBD who completely abstain
  and 75% of women who reduce intake; those who continue show little change. Methylxanthines
  drive cellular overproduction of fibrous tissue and cyst fluid in breast tissue.
  First-line coaching intervention for any cyclical breast pain.
