slug: ppi-use-major-osteoporosis-risk
statement: Chronic proton-pump-inhibitor (PPI) use — Nexium, Prilosec, Pantoprazole
  and similar — is a major modifiable risk factor for osteoporosis. The mechanism
  — suppression of stomach acid impairs protein digestion and reduces absorption of
  calcium, magnesium, B12, and other bone-building nutrients. Coach implication —
  for any client on long-term PPIs presenting with low bone density, discuss with
  prescribing physician about tapering and addressing the root cause of reflux (often
  dietary triggers, hiatal hernia, H. pylori, low not high stomach acid).
evidence_tier: strong
