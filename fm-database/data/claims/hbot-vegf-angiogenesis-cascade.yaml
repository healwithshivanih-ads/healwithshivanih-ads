sources:
- id: hadanny-efrati-2020-hyperoxic-hypoxic-paradox
  location: Section 4 Hyperoxic Hypoxic Paradox — Figure 3 cascade
  quote: Most of the cellular cascades initiated by hypoxia can be induced by intermittent
    hyperoxia, the so-called hyperoxic-hypoxic paradox. HIF, VEGF, SIRT, mitochondrial
    biogenesis, and stem cell proliferation and migration could all be induced by
    biological fooling of the cells with certain protocols of repeated intermittent
    hyperoxia.
rationale: Reinforces the VEGF-angiogenesis mechanism with peer-reviewed citation.
