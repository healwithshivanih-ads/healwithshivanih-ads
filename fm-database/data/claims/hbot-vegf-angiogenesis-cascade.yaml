slug: hbot-vegf-angiogenesis-cascade
statement: Vascular Endothelial Growth Factor (VEGF) is the principal downstream effector
  of HIF-1-alpha responsible for HBOT-induced angiogenesis. The paradox cascade —
  intermittent hyperoxia, perceived hypoxia, HIF-1-alpha stabilisation, VEGF gene
  transcription, endothelial proliferation, capillary network expansion — is the mechanistic
  basis for HBOT's documented effects on stroke recovery, wound healing, diabetic
  foot ulcer, and Efrati's brain-cardiac-penile angiogenesis findings.
evidence_tier: strong
