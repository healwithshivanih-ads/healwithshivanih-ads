statement: When diarrhoea or vomiting persist or recur without an obvious bug, consider
  IBS, coeliac disease, inflammatory bowel disease, food intolerance/allergy, medication
  side effects, anxiety or, for vomiting, pregnancy, migraine, motion sickness and
  UTI.
