slug: 5ar-inhibitors-reduce-dht-prevent-bph-hair-loss-acne
statement: Foods, herbs, and supplements that inhibit 5-α reductase can reduce DHT conversion from testosterone, potentially
  preventing or reducing symptoms of BPH, androgenic hair loss, and androgen excess in women.
evidence_tier: plausible_emerging
rationale: Mechanistic rationale is strong and supported by pharmaceutical evidence (finasteride). Botanical inhibitors (saw
  palmetto, pygeum, nettle root) have clinical trial support of varying quality, particularly for BPH.
coaching_translation: Certain foods, herbs, and nutrients can slow down the enzyme that converts testosterone into DHT — the
  hormone responsible for prostate growth, hair thinning, and hormonal acne.
caveats:
- Botanical evidence varies by herb — saw palmetto has the most BPH evidence
- Dosing of botanical supplements requires clinician guidance
- Source is expert-consensus FM toolkit
out_of_scope_notes: Specific supplement dosing is out of coaching scope.
