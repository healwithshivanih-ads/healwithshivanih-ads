slug: low-magnesium-elevated-autoantibodies
statement: Low magnesium status is associated with elevated autoantibody activity.
evidence_tier: fm_specific_thin
rationale: Magnesium's role in immune regulation is biologically plausible (cofactor
  in 300+ enzymatic reactions, including immune cell signaling). The specific link
  to autoantibody elevation has thin peer-reviewed support outside FM literature.
coaching_translation: Magnesium deficiency is extremely common and may contribute
  to immune dysregulation. Support through dietary sources (leafy greens, pumpkin
  seeds, dark chocolate) and supplementation.
caveats:
- Thin peer-reviewed support for autoantibody-specific link.
- Source is educational synthesis.
