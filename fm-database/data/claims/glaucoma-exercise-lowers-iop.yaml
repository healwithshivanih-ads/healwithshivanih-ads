  location: Chapter 54 — Glaucoma, pg 979-980
  quote: The drop in intraocular pressure is approximately 23% in normal individuals,
    while people with glaucoma usually experience a greater drop and longer duration
    of postexercise recovery. If one stops exercising, the effect wears off in three
    weeks.
