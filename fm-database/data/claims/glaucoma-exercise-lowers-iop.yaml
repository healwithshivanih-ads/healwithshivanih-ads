slug: glaucoma-exercise-lowers-iop
statement: Regular aerobic exercise produces immediate and sustained reduction in
  intraocular pressure, especially in sedentary glaucoma patients moving to moderate-heavy
  exertion. The drop is roughly 7-13% greater in glaucoma patients than healthy controls
  after walking/jogging or running, and the post-exercise pressure drop persists for
  about 84 minutes. The effect wears off within three weeks of stopping exercise —
  durable benefit requires consistency. Caffeine should be avoided because regular
  coffee (180 mg caffeine) raises IOP measurably at 30-90 minutes in both chronic
  and normotensive glaucoma.
evidence_tier: plausible_emerging
