slug: sleep-deprivation-overeating-via-ghrelin-leptin-disruption
statement: Sleep deprivation directly disrupts the appetite hormones ghrelin (hunger
  signal from the empty stomach) and leptin (satiety signal from adipose tissue),
  both of which follow a circadian pattern. In Ken Wright's controlled sleep-lab studies,
  participants who reduced sleep from 8 hours to 5 hours consistently consumed more
  calories than the additional wakeful hours required, contributing to weight gain.
  Exposure to bright light at night compounds this effect.
evidence_tier: strong
rationale: Established mechanism — multiple sleep-restriction trials (Spiegel 2004,
  Taheri 2004, Wright lab work cited by Panda) consistently show that sleep loss elevates
  ghrelin, suppresses leptin, and increases caloric intake beyond metabolic need.
  Effect size in controlled trials is meaningful.
coaching_translation: When you don't sleep enough, your hunger hormone (ghrelin) goes
  up and your fullness hormone (leptin) drops — so you feel hungrier and satisfied
  less easily. Studies show people who shortened their sleep from 8 to 5 hours ate
  substantially more calories than the extra waking time needed. Sleep loss drives
  overeating directly.
caveats:
- Effect is acute within days of sleep restriction.
- Compensatory effort can override the hormonal pull but requires conscious intent.
