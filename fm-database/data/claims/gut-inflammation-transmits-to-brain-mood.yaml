slug: gut-inflammation-transmits-to-brain-mood
statement: Chronic gut inflammation is transmitted to the brain via the gut-brain
  axis, manifesting as mood disorders, irritability, and brain fog.
evidence_tier: plausible_emerging
rationale: Biologically plausible and supported by emerging research on the gut-brain
  inflammatory axis; inflammatory cytokines (IL-6, TNF) are specifically named as
  modulators of mood. Single-expert source without cited RCTs.
coaching_translation: An inflamed gut sends inflammatory signals to your brain — this
  can show up as irritability, low mood, or difficulty thinking clearly.
caveats:
- No specific studies cited; single-expert synthesis source.
- Mechanism via cytokines (IL-6, TNF) is credible but individual variation is significant.
