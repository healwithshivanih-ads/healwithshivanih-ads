slug: aerobic-exercise-lowers-bp-5-10mmhg
statement: Even mild to moderate aerobic exercise three times weekly of 20 minutes'
  duration produces BP reductions of 5–10 mm Hg for both systolic and diastolic, and
  can normalize borderline or mild hypertension.
evidence_tier: strong
rationale: Consistent with extensive RCT and meta-analytic literature on exercise
  and BP reduction.
coaching_translation: Walking briskly or cycling three times a week for just 20 minutes
  can meaningfully lower blood pressure.
