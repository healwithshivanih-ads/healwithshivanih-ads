slug: igg-food-sensitivity-decreases-with-elimination-diet
statement: IgG food sensitivity can decrease over months with a sustained elimination
  diet, unlike IgE allergy which tends to be lifelong.
evidence_tier: plausible_emerging
rationale: The reversibility of IgG sensitization following antigen avoidance is biologically
  consistent with IgG dynamics and is clinically observed in FM practice. Robust RCT
  data specifically on IgG-guided elimination diets is limited but growing.
coaching_translation: The good news about food sensitivities (vs. true allergies)
  is they can often improve or resolve. Sticking to elimination for months — and healing
  the gut — gives the immune system a chance to reset.
caveats:
- Source is expert lecture, moderate quality.
- Clinical RCT evidence for IgG-guided elimination diets is limited.
- Improvement depends on co-addressing gut healing, not elimination alone.
