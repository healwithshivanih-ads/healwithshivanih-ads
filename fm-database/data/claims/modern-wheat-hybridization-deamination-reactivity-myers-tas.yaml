slug: modern-wheat-hybridization-deamination-reactivity-myers-tas
statement: Modern wheat has been hybridized and deaminated, creating novel gluten
  proteins and enabling gluten's use as a ubiquitous additive, which Myers links to
  greater immune reactivity than historical wheat.
evidence_tier: fm_specific_thin
rationale: Hybridization introduces proteins the body has not adapted to; deamination
  makes gluten water-soluble and pervasive, increasing exposure and reactivity.
coaching_translation: Today's wheat isn't your grandmother's wheat — it's been changed
  and is now in far more products.
