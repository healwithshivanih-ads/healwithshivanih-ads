slug: gla-1400mg-improves-ra-pain-and-function
statement: Gamma-linolenic acid (GLA) from evening primrose, blackcurrant, or borage
  oil at 1.4 g/day produces statistically significant improvements in RA pain and
  global function across multiple RCTs.
evidence_tier: strong
rationale: Two recent reviews pooled 3+ RCTs and found GLA improvements stronger than
  fish oil for RA pain and function. Mechanism via conversion to dihomo-gamma-linolenic
  acid and 1-series anti-inflammatory prostaglandins.
coaching_translation: GLA from evening primrose or borage oil (1.4 grams a day, taken
  with omega-3 to balance) has stronger trial data for RA pain than fish oil alone.
caveats:
- Take alongside omega-3 (fish/flax oil) — GLA alone without omega-3 can shift toward
  pro-inflammatory pathways in some patients.
- Borage oil contains GLA at higher concentration than EPO; either is fine.
- Allow 8-12 weeks for full effect.
