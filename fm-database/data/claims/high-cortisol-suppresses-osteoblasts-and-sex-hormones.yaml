slug: high-cortisol-suppresses-osteoblasts-and-sex-hormones
statement: Elevated cortisol inhibits osteoblast activity (reducing bone formation)
  and suppresses estrogen, progesterone, and testosterone, compounding bone loss and
  hormonal decline in menopausal women with chronic stress or inflammation.
evidence_tier: strong
rationale: Glucocorticoid-induced osteoporosis is well-established in the literature.
  High cortisol's suppressive effect on sex hormones via the HPA-gonadal axis is also
  well-documented.
coaching_translation: Chronic stress and inflammation don't just affect mood — they
  actively suppress the very hormones that protect your bones and heart. Managing
  stress is foundational, not optional.
caveats:
- Source is expert consensus lecture; mechanism is well-supported.
