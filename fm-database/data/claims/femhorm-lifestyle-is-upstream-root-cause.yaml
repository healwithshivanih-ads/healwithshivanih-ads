slug: femhorm-lifestyle-is-upstream-root-cause
statement: 'With female hormones, lifestyle is upstream of the labs: food, movement,
  stress transformation, sleep and connection shape the very patterns a hormone test
  reveals. Body composition matters too — visceral belly fat raises aromatase and
  drives more (and more inflammatory) oestrogen — as do good protein intake (~0.8
  g per pound of body weight), fibre, fermented foods and lower sugar. Even when a
  client is on HRT, lifestyle work still comes first, because it changes the whole
  hormonal picture; this upstream root-cause work is the coach''s central contribution.'
evidence_tier: plausible_emerging
rationale: 'This is the module''s core message: labs are the ''what,'' but lifestyle
  is the ''why'' and the lever. Positioning the coach upstream keeps the work firmly
  in scope and high-impact.'
coaching_translation: 'Anchor your coaching in the fundamentals that move hormones:
  a plant-forward plate with quality protein and daily cruciferous veg, regular movement,
  stress-transforming practices the client enjoys, good sleep, and gut/liver support
  (greens, fibre, fermented foods, hydration). Reassure clients that this foundational
  work matters even alongside HRT — you handle the lifestyle root causes, and their
  clinician handles hormones and prescriptions.'
out_of_scope_notes: Prescribing or adjusting HRT and interpreting the hormone panel
  are the clinician's responsibilities; the coach collaborates and reinforces those
  recommendations.
caveats:
- Labs alone are insufficient — always marry the lab to how the individual actually
  feels and lives.
- Track lifestyle experiments (better / worse / no change) to steer the plan.
