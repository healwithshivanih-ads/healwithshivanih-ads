slug: depression-not-a-serotonin-deficiency-but-a-health-deficiency
statement: Lynch argues that depression is primarily driven by inflammation and chronic
  stress—rather than a simple serotonin deficiency—making lifestyle and environmental
  interventions more effective long-term than serotonin-targeting drugs alone.
evidence_tier: plausible_emerging
rationale: The inflammatory hypothesis of depression is an active and growing area
  of peer-reviewed research with supporting RCT evidence; however, the claim that
  lifestyle approaches alone are superior to pharmacotherapy is not established and
  should not lead coaches to advise discontinuation of medications.
out_of_scope_notes: Coaches must not advise clients to discontinue antidepressants,
  anti-anxiety medications, or MAO inhibitors. Refer to prescribing clinician.
caveats:
- Source is a consumer trade book
- Never advise medication cessation
- The inflammatory model of depression is supported but not consensus
