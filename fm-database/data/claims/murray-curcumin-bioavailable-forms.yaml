slug: murray-curcumin-bioavailable-forms
statement: 'Curcumin matches cortisone and phenylbutazone for anti-inflammatory potency
  in head-to-head animal studies, with no comparable toxicity. Standard curcumin is
  poorly absorbed; advanced delivery forms achieve dramatically higher plasma levels
  — Meriva (curcumin-phosphatidylcholine complex) 5× regular curcumin, BCM-95 standardised
  oleoresin, and Theracurmin (colloidal nanoparticle) up to 27× regular curcumin.
  Effective tendinitis/bursitis dosing: Meriva 500–1,000 mg twice daily, BCM-95 750–1,500
  mg twice daily, or Theracurmin 300 mg one to three times daily.'
evidence_tier: strong
rationale: Multi-decade research base + multiple bioavailability head-to-head pharmacokinetic
  studies. Mechanism — NF-κB inhibition + COX-2 + 5-LOX + STAT3 modulation. Clinical
  equivalence to ibuprofen demonstrated in knee osteoarthritis trials (Kuptniratsaikul
  2014 n=367). Critical FM-translation point — generic curcumin powder fails because
  of poor absorption; the chosen form matters.
coaching_translation: Curcumin works as well as ibuprofen for joint/tendon inflammation
  without the side effects — but only if you use a properly bioavailable form. Plain
  turmeric powder doesn't make it into your bloodstream in meaningful amounts. Look
  for Meriva, BCM-95, or Theracurmin on the label. Effective dose depends on the form;
  cheaper 'standardised 95% curcumin' without a delivery system is largely wasted
  money.
caveats:
- Plain curcumin powder is poorly absorbed; specific delivery forms (Meriva / BCM-95
  / Theracurmin) required for clinical effect
- Mild antiplatelet — caution + anticoagulants + 7 days before surgery
- Iron chelator — caution in iron deficiency
- Avoid in active gallbladder disease (cholagogue effect)
- Pregnancy — avoid therapeutic doses
