slug: sklar-zinc-selenium-l-carnitine-sperm
statement: 'Core nutrient inputs for sperm parameters: zinc supports testosterone
  synthesis and sperm production; L-carnitine concentrates in the epididymis and supports
  forward motility; selenium is required for normal sperm morphology and DNA integrity;
  CoQ10 supplies mitochondrial energy that motility depends on; vitamins C and E quench
  reactive oxygen species that damage sperm DNA. These are the building blocks layered
  on top of diet, thermoregulation and toxin reduction — not a substitute for them.'
