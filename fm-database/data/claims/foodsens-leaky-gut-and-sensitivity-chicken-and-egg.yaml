slug: foodsens-leaky-gut-and-sensitivity-chicken-and-egg
statement: 'Food sensitivity and leaky gut form a chicken-and-egg loop: dysbiosis
  or a permeable gut can create food sensitivities, and reactive foods can in turn
  damage the gut. Because either can come first, the repair approach addresses both
  — remove the offending foods and rebuild the gut barrier, then reintroduce foods
  one at a time to see what remains.'
evidence_tier: plausible_emerging
rationale: Treating only the food list without repairing the gut, or vice versa, tends
  to under-deliver — the loop has to be worked from both ends.
coaching_translation: 'Support the client on both fronts at once: help them run the
  elimination while adopting gut-repair habits (fiber, fermented foods, phytochemicals
  as tolerated), then guide the structured reintroduction.'
out_of_scope_notes: Diagnosing dysbiosis or leaky gut and prescribing gut-repair protocols
  is the clinician's role; the coach supports lifestyle and adherence.
