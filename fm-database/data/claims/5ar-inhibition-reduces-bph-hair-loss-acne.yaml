slug: 5ar-inhibition-reduces-bph-hair-loss-acne
statement: Inhibiting or slowing 5-alpha reductase activity with foods, herbs, and
  supplements reduces excess DHT production, thereby decreasing or preventing prostate
  enlargement, hair loss, and androgenic acne.
evidence_tier: plausible_emerging
rationale: Mechanistically supported; pharmaceutical 5-AR inhibitors (finasteride)
  have strong RCT evidence. Natural inhibitors have plausible but less-proven efficacy.
  Document is expert synthesis.
coaching_translation: Certain foods and supplements can naturally slow the enzyme
  that converts testosterone to DHT — supporting prostate health and reducing hair
  loss and acne.
caveats:
- Natural 5-AR inhibitors have weaker evidence than pharmaceutical inhibitors. Source
  is expert consensus synthesis.
