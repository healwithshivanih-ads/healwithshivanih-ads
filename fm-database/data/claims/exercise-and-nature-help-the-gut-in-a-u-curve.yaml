slug: exercise-and-nature-help-the-gut-in-a-u-curve
statement: Moderate exercise and time in nature improve microbial diversity, mood
  and immunity, but the benefit follows a U-curve — too little or too much (overtraining)
  harms the gut through leaky gut and immune suppression.
evidence_tier: plausible_emerging
rationale: Cites the rugby-player diversity study and forest-bathing research.
coaching_translation: Move regularly and get outdoors, but don't overtrain — both
  too little and too much stress the gut.
