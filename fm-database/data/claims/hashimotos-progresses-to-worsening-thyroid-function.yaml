slug: hashimotos-progresses-to-worsening-thyroid-function
statement: Unlike subclinical hypothyroidism, Hashimoto's disease typically leads
  to progressive worsening of thyroid function over time due to ongoing autoimmune
  destruction.
evidence_tier: strong
rationale: 'Established in endocrinology: ongoing TPO-antibody-mediated thyroid destruction
  results in progressive reduction of thyroid tissue and hormone output.'
coaching_translation: Hashimoto's is not just a thyroid issue — it's an immune system
  issue that tends to worsen over time if the underlying autoimmune triggers aren't
  addressed.
caveats:
- Rate of progression varies widely between individuals.
