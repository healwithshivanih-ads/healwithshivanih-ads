  quote: When the cell goes into the CDR1, one of the first things it does is it hardens
    the membrane. It stops receiving information as well. That's where people start
    noticing their thyroid isn't working or the hormones aren't working as well because
    some of their cells are not responding to the information.
rationale: Lets coach reframe stubborn hormone-resistance pictures without abandoning
  the client to "try a higher dose" loops.
