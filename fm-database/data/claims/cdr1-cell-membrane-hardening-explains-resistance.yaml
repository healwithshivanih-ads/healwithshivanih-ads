slug: cdr1-cell-membrane-hardening-explains-resistance
statement: In CDR1, one of the first changes is hardening of the cell membrane to
  reduce the cell's ability to receive incoming molecular information. This explains
  common clinical patterns in chronic illness — clients whose thyroid hormone "doesn't
  work" despite correct dosing, whose insulin sensitivity drops without weight gain,
  whose sex-hormone replacement underperforms. The hormone is present in the blood
  but the cells in CDR1 cannot receive the signal. Replacing more hormone does not
  fix the receptor problem; resolving the danger signal does. Coach script — "your
  hormone level may be fine but your cells may not be listening" gives a kinder frame
  than "your thyroid medication doesn't work."
evidence_tier: plausible_emerging
