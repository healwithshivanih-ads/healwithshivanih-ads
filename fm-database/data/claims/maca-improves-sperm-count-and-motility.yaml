- id: gonzales-2001-maca-sperm-parameters
  location: Results and Conclusion
  quote: Maca improved sperm production and sperm motility by mechanisms not related
    to LH, FSH, PRL, T and E2.
rationale: Small open-label trial; effect was independent of dose and hormone changes,
  suggesting a non-hormonal mechanism.
