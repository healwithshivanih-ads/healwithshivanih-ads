slug: maca-improves-sperm-count-and-motility
statement: In a four-month open-label trial of nine adult men, maca tablets at 1500
  or 3000 mg/day increased seminal volume, total sperm count per ejaculum, motile
  sperm count, and sperm motility without changing serum LH, FSH, prolactin, testosterone,
  or estradiol.
evidence_tier: plausible_emerging
