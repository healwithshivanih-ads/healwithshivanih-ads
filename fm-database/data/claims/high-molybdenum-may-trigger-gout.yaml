slug: high-molybdenum-may-trigger-gout
statement: Very high molybdenum intake may trigger gout by affecting uric acid metabolism.
evidence_tier: confirm_with_clinician
rationale: Molybdenum's role in xanthine oxidase affecting uric acid production is mechanistically plausible; high-dose gout
  risk is a recognized caution.
out_of_scope_notes: Gout management requires clinician oversight.
caveats:
- Source is a practitioner cheatsheet without primary citations.
- Evidence for this specific effect in humans is limited.
- Avoid high-dose molybdenum supplementation in clients with gout or hyperuricemia without clinician guidance.
