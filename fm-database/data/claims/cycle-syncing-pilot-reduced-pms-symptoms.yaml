slug: cycle-syncing-pilot-reduced-pms-symptoms
statement: In a self-funded 3-month pilot (about 50 participants), 80% reported roughly
  a 75% reduction in the number and severity of PMS symptoms by the end of the first
  month (preliminary, unpublished).
evidence_tier: plausible_emerging
rationale: The speaker's own pilot study using CGM and hormone urinalysis; data described
  as preliminary, with peer-reviewed publication pending.
caveats:
- Preliminary, self-funded, unpublished, and conducted by the method's creator. Treat
  as promising signal, not established efficacy, until peer-reviewed.
