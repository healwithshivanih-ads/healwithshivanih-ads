slug: hydrogen-dominant-sibo-causes-diarrhea
statement: Hydrogen-dominant SIBO, caused by hydrogen-producing bacteria migrating
  from the large to small intestine, is primarily associated with diarrhea.
evidence_tier: plausible_emerging
rationale: Mechanistically plausible and consistent with clinical observations. Hydrogen
  gas accelerates intestinal transit. Specific RCT evidence not cited in source.
coaching_translation: If someone's SIBO test shows high hydrogen, diarrhea is likely
  their main symptom pattern.
caveats:
- Source is expert consensus lecture; specific RCT evidence not provided.
- Symptom patterns can overlap between SIBO types.
