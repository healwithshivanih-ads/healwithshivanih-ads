slug: coq10-increases-insulin-sensitivity-non-diabetics
statement: CoQ10 has been shown to increase insulin sensitivity in individuals who
  do not have diabetes.
evidence_tier: plausible_emerging
rationale: Moradi et al. 2016 (Arch Iran Med) systematic review and meta-analysis
  cited in document supports this finding.
coaching_translation: CoQ10 may help improve your body's response to insulin, even
  before diabetes develops — making it potentially useful for prevention.
caveats:
- Meta-analysis includes heterogeneous studies. Optimal dose and form (ubiquinol vs.
  ubiquinone) not standardised.
