slug: bifidobacterium-plantarum-degrade-histamine
statement: A blend of Bifidobacterium with Lactobacillus plantarum can help break
  down gut histamine, whereas histamine-producing strains (L. casei, L. bulgaricus)
  are best avoided until the gut is restored.
evidence_tier: plausible_emerging
rationale: Strain-specific histamine effects are documented in vitro and in small
  studies; strain selection matters more than 'probiotic' generically.
coaching_translation: If histamine is an issue, the type of probiotic strain matters
  — some lower histamine, some raise it.
out_of_scope_notes: ''
caveats:
- Source is a consumer trade book (Ben Lynch, Dirty Genes), not primary literature.
