slug: adipose-aromatase-postmenopausal-estrogen-excess
statement: Excess body fat in a postmenopausal woman can result in higher circulating estrogen than a
  thinner premenopausal woman has, because adipose tissue is a major site of aromatase-driven estrogen
  conversion.
evidence_tier: strong
rationale: 'Supported by conventional endocrinology: adipose aromatase is the primary source of postmenopausal
  estrogen, and elevated estrone from central adiposity is a recognised breast cancer risk factor.'
coaching_translation: More body fat = more estrogen-making capacity after menopause. This matters because
  too much estrogen without enough progesterone to balance it raises breast and uterine cancer risk.
