slug: bioavailable-vitamin-forms-are-preferred
statement: Active or bioavailable nutrient forms such as P5P, methylfolate, methylcobalamin, vitamin D3, mixed tocopherols,
  MK-7, magnesium glycinate, zinc bisglycinate, iron bisglycinate, and selenomethionine are preferred over synthetic or oxide
  forms.
evidence_tier: fm_specific_thin
rationale: Preference for bioavailable supplement forms is widespread in FM practice and biologically plausible; comparative
  RCT evidence is limited for most form comparisons.
coaching_translation: When discussing supplementation, note that form matters — the document favors methylated, chelated,
  or bioavailable forms over cheap synthetic or oxide alternatives.
caveats:
- Source is a practitioner cheatsheet without comparative citation support for all forms listed.
- Form preference does not replace clinician guidance on dose or indication.
- Source is practitioner cheatsheet without comparative citations for most form claims.
