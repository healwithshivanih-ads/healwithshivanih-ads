slug: mayo-gerd-red-flags-alarm-symptoms
statement: Reflux symptoms accompanied by difficulty swallowing, painful swallowing,
  unintended weight loss, vomiting blood, black or tarry stools, anaemia, or new symptoms
  after age 50 warrants urgent endoscopy to rule out stricture, Barrett oesophagus,
  or oesophageal cancer.
