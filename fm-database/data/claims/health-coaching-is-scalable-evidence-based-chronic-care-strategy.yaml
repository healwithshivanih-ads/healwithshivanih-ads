slug: health-coaching-is-scalable-evidence-based-chronic-care-strategy
statement: Health coaching is increasingly recognized as a scalable, evidence-based
  strategy to address gaps in chronic care.
evidence_tier: plausible_emerging
rationale: The speaker cites a general body of evidence and references RCTs and patient-reported
  outcome data, but no specific studies are named with author/year/journal. The claim
