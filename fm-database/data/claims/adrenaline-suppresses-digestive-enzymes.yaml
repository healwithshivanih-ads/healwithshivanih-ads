slug: adrenaline-suppresses-digestive-enzymes
statement: During stress, adrenaline surges suppress digestive enzyme output and reduce
  blood flow to digestive organs, impairing digestion.
evidence_tier: plausible_emerging
rationale: 'Biologically plausible: sympathetic activation diverts blood from splanchnic
  circulation and reduces parasympathetic-driven digestive secretions. Widely accepted
  in FM but limited direct RCT evidence.'
coaching_translation: When you're stressed, your body shunts resources away from digestion
  — this is why stress causes bloating, gas, and stomach pain.
