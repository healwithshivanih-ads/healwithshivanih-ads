slug: gut-microbiome-composition-determines-food-response
statement: The composition of the gut microbiota can determine how individuals respond
  to different foods, explaining variability in tolerances (e.g., lactose) and responses
  to diets.
evidence_tier: plausible_emerging
rationale: Emerging research (e.g., Zeevi et al., Cell 2015 on personalized glycemic
  responses) supports microbiome-mediated individual dietary variability. Growing
  evidence base but not yet fully translated to clinical practice.
coaching_translation: Why does the same meal affect you differently than a friend?
  Your unique gut bacteria are a big part of the answer.
caveats:
- Personalized microbiome-based nutrition is an emerging field. Commercial microbiome
  tests vary widely in validation.
