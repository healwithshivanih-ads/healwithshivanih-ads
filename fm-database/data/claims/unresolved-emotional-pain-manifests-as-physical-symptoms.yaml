slug: unresolved-emotional-pain-manifests-as-physical-symptoms
statement: Unresolved psychological pain — particularly around early relational trauma
  — can manifest as physical symptoms (e.g., recurrent pelvic inflammation) that may
  resolve when the underlying emotional wound is acknowledged and processed.
evidence_tier: fm_specific_thin
rationale: The psychosomatic connection between emotional states and physical health
  is broadly supported in FM and integrative medicine. However, the specific anecdote
  of vaginal inflammation resolving after a seminar is a single testimonial with no
  controls. Physical symptoms must always be evaluated medically.
coaching_translation: Sometimes physical symptoms in the body — especially in the
  pelvic area — can be connected to emotional experiences. Working on your emotional
  wellbeing may support physical health, but always get physical symptoms properly
  checked out.
out_of_scope_notes: Coaches must not suggest physical symptoms are caused by emotional
  factors or that emotional work replaces medical evaluation.
caveats:
- Single anecdotal testimonial only.
- Source is seminar transcript, low quality.
- Physical symptoms require medical evaluation regardless of emotional work.
- Causation cannot be inferred from temporal correlation.
