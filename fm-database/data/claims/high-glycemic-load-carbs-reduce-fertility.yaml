slug: high-glycemic-load-carbs-reduce-fertility
statement: 'The Nurses Health Study showed women eating predominantly fast-release
  carbohydrates (white bread, white rice, potatoes, breakfast cereals) had 78% higher
  risk of ovulatory infertility than women eating slow-release carbohydrates. Even
  modest elevations in HbA1c — within the normal range — halved 6-month conception
  rates. Mechanism: hyperinsulinaemia drives ovarian androgen production and disrupts
  hormonal signalling.'
evidence_tier: strong
