sources:
- id: fett-it-starts-with-the-egg-2019
  location: Chapter 11 — The Egg Quality Diet, pg 142-145
  quote: Women who ate more of the quickly digested carbohydrates that rapidly raise
    blood sugar were 78 percent more likely to have ovulatory infertility. Women with
    high but still normal A1C levels were only half as likely to get pregnant over
    six months compared to women with lower A1C levels.
rationale: Justifies low-glycemic-load nutrition as a fertility intervention, not
  just a metabolic-health one.
