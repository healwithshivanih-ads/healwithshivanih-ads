slug: oral-contraceptives-increase-zinc-deficiency-risk
statement: Oral contraceptives containing estrogen may act as a zinc agonist and contribute
  to zinc depletion, increasing the risk of zinc deficiency in women taking them.
evidence_tier: plausible_emerging
rationale: Nutrient-drug interactions between oral contraceptives and micronutrient
  status (including zinc) are recognised in functional medicine and nutritional research,
  though mechanistic details in the document are limited.
coaching_translation: Women on the birth control pill may be at higher risk of low
  zinc levels, so it's worth keeping an eye on zinc-rich foods or discussing testing
  with your doctor.
caveats:
- Source is expert lecture (moderate quality). The mechanism described ('estrogen
  as zinc agonist') is an unusual framing; verify with clinician or primary literature.
