slug: beta-blockers-associated-with-depression-fatigue-cognitive-slowing
statement: Beta blocker therapy is associated with increased rates of depression,
  fatigue, constipation, erectile dysfunction, and cognitive slowing.
evidence_tier: plausible_emerging
rationale: Multiple observational studies and clinical reports link beta blocker use
  to these side effects, especially at higher doses. The evidence is largely observational.
coaching_translation: If your client is on a beta blocker and experiencing fatigue,
  depression, or brain fog, these may be medication side effects worth discussing
  with their prescriber.
out_of_scope_notes: Medication management and de-prescribing decisions are clinician
  scope.
caveats:
- Evidence is largely observational; individual drug and dose vary in side effect
  profile.
- Coaches should not advise clients to stop medications.
