slug: microbiome-diversity-declines-in-perimenopause
statement: Microbial diversity decreases as women transition from perimenopause to
  menopause, correlating with reduced metabolic resilience, impaired fuel utilization,
  and decreased insulin sensitivity.
evidence_tier: plausible_emerging
rationale: Speaker describes a well-mechanistically-plausible hormonal-microbiome
  connection supported by emerging research. Estrogen's role in shaping microbiome
  diversity is documented, but consensus-level RCTs in perimenopausal women remain
  limited.
coaching_translation: As estrogen declines in perimenopause, the diversity of your
  gut bacteria also tends to decline — which can make your metabolism less flexible
  and your blood sugar harder to regulate.
caveats:
- Single-expert source; no primary studies cited.
- Directionality (hormones → diversity vs. diversity → hormone metabolism) is still
  under investigation.
