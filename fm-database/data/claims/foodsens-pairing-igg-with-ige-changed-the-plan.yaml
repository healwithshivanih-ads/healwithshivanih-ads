slug: foodsens-pairing-igg-with-ige-changed-the-plan
statement: In one case a person showed very high IgG to cow's milk, wheat and casein
  — a pattern reflecting heavy dairy intake — while a paired IgE panel revealed a
  low-level immediate response as well, correlating with fatigue and brain fog rather
  than anaphylaxis. Seeing both branches of the immune system, immediate and delayed,
  guided removal of dairy and wheat, after which energy and cognition returned within
  a month.
evidence_tier: fm_specific_thin
rationale: It illustrates that layering test types (delayed plus immediate) can surface
  information a single IgG panel would miss and can meaningfully change the plan.
coaching_translation: 'Use such stories to show clients why a clinician might combine
  tests — but keep the takeaway experiential: the confirmation still came from how
  the person felt off the foods.'
out_of_scope_notes: This is a single clinical anecdote; diagnosis and any test combination
  decisions belong to the clinician.
caveats:
- A single case does not generalise; individual patterns vary widely.
