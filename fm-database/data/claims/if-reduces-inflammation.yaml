slug: if-reduces-inflammation
statement: Intermittent fasting reduces systemic inflammation markers.
evidence_tier: plausible_emerging
rationale: Supported by Mattson et al. 2017 and de Cabo & Mattson 2019 NEJM (both
  cited). Mechanistically plausible via reduced caloric load, ketone-mediated inhibition
  of the NLRP3 inflammasome, and improved gut barrier function.
coaching_translation: Following an IF protocol may help cool down chronic, low-grade
  inflammation — one of the root drivers of heart and metabolic disease.
caveats:
- Most studies are short-duration; long-term data lacking.
- Source is a coaching toolkit citing primary literature — tier represents current
  evidence landscape.
