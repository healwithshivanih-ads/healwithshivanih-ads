slug: arrhythmia-magnesium-afib-conversion
statement: In an 18-patient double-blind trial of new-onset atrial fibrillation (less
  than seven days), IV digoxin plus magnesium produced normal-rhythm conversion in
  6 of 10 patients (60%) vs 3 of 8 (37.5%) with digoxin alone; heart rate dropped
  within 15 minutes. Oral magnesium dose for arrhythmia — approximately 6 to 10 mg/kg
  per day in well-absorbed form (citrate); typically 200-300 mg three times daily.
evidence_tier: plausible_emerging
