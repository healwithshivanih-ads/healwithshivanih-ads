slug: acne-gut-skin-axis-probiotics
statement: The gut-brain-skin axis hypothesis (Stokes and Pillsbury, 1940s) links
  emotional stress, altered gut microflora, intestinal permeability, and systemic
  inflammation to acne. As many as 40% of acne patients have hypochlorhydria; one
  study showed 50% of severe-acne patients had elevated blood toxins absorbed from
  the gut. Lactobacillus acidophilus and probiotic support are indicated, especially
  after antibiotic courses.
