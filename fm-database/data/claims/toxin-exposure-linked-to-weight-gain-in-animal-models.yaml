slug: toxin-exposure-linked-to-weight-gain-in-animal-models
statement: Experimental animal studies suggest that toxin exposure increases the likelihood
  of weight gain regardless of diet, pointing to a toxin-metabolic dysfunction connection.
evidence_tier: plausible_emerging
rationale: The document cites animal studies showing toxin injection increases weight
  gain. This is a plausible mechanism (endocrine disruption, adipogenesis) with supporting
  animal data, though human RCT evidence is limited.
coaching_translation: Difficulty losing weight isn't always just about diet and exercise.
  Toxic load may play a role by disrupting metabolism — supporting detox pathways
  can be an important piece of the puzzle.
caveats:
- Animal model data — human applicability not fully established.
- Source is educational toolkit, not primary literature. No specific study cited.
