slug: soleus-pushup-reduces-glucose-spikes
statement: The soleus push-up exercise can help decrease postprandial glucose spikes
  by 30–50%.
evidence_tier: plausible_emerging
rationale: The soleus muscle has high oxidative capacity and sustained contraction
  via soleus push-ups activates local GLUT4-independent glucose uptake. A 2022 study
  (Hamilton et al.) supports this figure, though it is a single study and not yet
  consensus.
coaching_translation: While sitting, slowly raising and lowering your heel (soleus
  push-up) can significantly blunt blood sugar rises after meals — and you can do
  it at a desk.
caveats:
- The 30–50% figure comes from limited research; confirm with emerging literature.
- Source is a coaching toolkit without primary citation for this specific claim.
