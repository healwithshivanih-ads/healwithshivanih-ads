slug: wheat-free-not-same-as-gluten-free
statement: '''Wheat-free'' is not the same as ''gluten-free'': products labelled wheat-free
  may still contain gluten from rye, barley, or oats and can cause reactions in celiac
  or gluten-sensitive individuals.'
evidence_tier: strong
rationale: This is a well-established regulatory and clinical fact. Celiac Disease
  Foundation and Gluten Intolerance Group guidelines explicitly make this distinction.
coaching_translation: When shopping, always look for the certified gluten-free label
  — not just 'wheat-free.' Rye and barley also contain gluten.
