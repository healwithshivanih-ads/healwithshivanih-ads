slug: chappus-sherr-methylene-blue-pharmacokinetic-dosing-schedule
statement: Methylene blue oral bioavailability is unusually close to IV. Sublingual
  onset is around 15-20 minutes; swallowed on empty stomach is 30-45 minutes. Eating
  15-20 minutes after swallowing speeds absorption via peristalsis. Peak effect 1-2
  hours after dosing; half-life 4-6 hours; renal excretion. Practical schedule — morning
  dose around 7-8am plus optional early-afternoon dose around 12-1pm; AVOID late-day
  dosing (sleep disruption in sensitive individuals). Above 30 mg/day take one day
  off per week; above 70 mg/day take two days off per week to prevent methaemoglobinaemia
  risk from accumulation.
