slug: varicose-flavonoids-diosmin-pycnogenol-gotu-kola
statement: Flavonoid-rich extracts reduce capillary fragility, raise venous-wall integrity,
  and improve vein muscular tone. Pycnogenol (pine bark, >95% PCO) reduces venous
  ulcer size, prevents travel-related leg swelling and clots, and eases night claudication
  across multiple double-blind trials. Micronized diosmin (particle size below 2 μm
  via supersonic-jet milling) is the single most effective flavonoid for varicose
  veins, venous ulcers, and haemorrhoids — vastly improved bioavailability. Gotu kola
  (Centella asiatica) 70% triterpenic acid extract enhances connective-tissue structure,
  reduces vein hardening, and improves flow. Buckwheat tea standardized to 270 mg
  rutin/day reduced leg fluid volume significantly over 12 weeks.
evidence_tier: strong
