slug: t2-from-natural-desiccated-thyroid
statement: T2 (diiodothyronine) is the "forgotten thyroid hormone" — clinically useful
  because it raises basal metabolic rate, activates brown adipose tissue (improving
  insulin sensitivity and fat oxidation), and works directly at the mitochondrial
  level to increase ATP production, all without cardiovascular stimulation or shifting
  standard lab values. Natural desiccated thyroid preparations (Armour, NP, Nature-Throid)
  contain approximately 9 mcg T2 per 60 mg tablet; research doses are typically 150-300
  mcg, so the NDT contribution is small but real. Coach scope — this is clinician-led
  prescription work; coach may surface the discussion when a client on T4-only Synthroid
  still has poor energy and weight despite optimal labs.
evidence_tier: confirm_with_clinician
