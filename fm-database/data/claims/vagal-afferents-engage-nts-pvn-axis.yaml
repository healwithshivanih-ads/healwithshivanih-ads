slug: vagal-afferents-engage-nts-pvn-axis
statement: Auricular vagal afferents synapse at the nucleus tractus solitarius, which
  projects inhibitory fibres to the hypothalamic paraventricular nucleus and dampens
  CRH release — the proposed pathway by which vagal-tone practices (slow breathing,
  humming, cold exposure, taVNS) blunt acute stress-induced cortisol surges.
