slug: blood-pressure-medication-may-mask-spine-related-symptoms
statement: Some blood-pressure medications can produce acid-base or kidney-perfusion
  disturbances that manifest as musculoskeletal pain elsewhere — a documented case
  of refractory back pain resolved on discontinuing a BP drug after blood-chemistry
  analysis revealed a kidney-mediated acid-base dysregulation traced to that medication.
  Functional blood-chemistry analysis (per Dr Bryan Walsh) using narrower optimal
  ranges than conventional cut-offs can surface these patterns before they generate
  additional prescribing.
evidence_tier: plausible_emerging
