sources:
- id: pickard-energy-blueprint-podcast-2026
  location: Podcast — Blood-chemistry analysis case
  quote: His blood test actually told me what was causing his back pain because the
    chiropractor wasn't going anywhere. He had a kidney problem causing acid-base
    dysregulation and it was probably being caused by one of his blood pressure pills.
    When he stops that blood pressure medication his back pain goes away.
