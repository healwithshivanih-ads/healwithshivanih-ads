slug: scrotal-temperature-male-fertility
statement: The scrotum maintains testicular temperature at 94 to 96 degF; above 96
  degF sperm production is inhibited or halted. Infertile men have measurably higher
  scrotal temperatures. Coach education — wear boxer-type underwear, avoid tight jeans
  and synthetic fabrics, avoid hot tubs and saunas, allow testicles to hang free after
  exercise, periodically apply ice or cold showers. Varicocele (varicose veins around
  testes) elevates scrotal temperature and requires surgical referral if conservative
  cooling doesn't work.
evidence_tier: strong
