slug: diaphragmatic-nasal-breathing-reduces-stress-nos3
statement: Slow, diaphragmatic nasal breathing activates the parasympathetic nervous
  system, reduces HPA axis activation, improves circulation, and supports NOS3 nitric
  oxide production.
evidence_tier: plausible_emerging
rationale: Slow breathing at 4–6 breaths/min activates baroreceptor-mediated vagal
  tone and is supported by RCTs for reducing anxiety and blood pressure. Nasal breathing
  specifically is linked to nitric oxide release from paranasal sinuses. Consumer
  framing links to gene pathways specifically (NOS3) which is more speculative.
coaching_translation: Practice 5 minutes of slow, nose-only belly breathing daily.
  This calms the nervous system, improves circulation, and may support nitric oxide
  production.
