slug: murray-pancreatic-enzyme-insufficiency
statement: 'Common symptoms of pancreatic enzyme insufficiency: abdominal bloating
  + discomfort, gas, indigestion, passing of undigested food in stool, fatty/floating
  stools (steatorrhoea), unexplained weight loss, and progressive nutrient deficiencies
  (especially fat-soluble vitamins A, D, E, K). Coach-recognition: visible undigested
  food in stool (vegetables, meat fibres, fat droplets) suggests enzyme insufficiency.
  Pancreatic enzyme replacement (pancreatin 10X USP, 350-750 mg with each meal) restores
  digestion. Often coexists with hypochlorhydria — both warrant evaluation together.
  Cholecystectomy patients lose bile-storage capacity making enzyme support particularly
  valuable.'
evidence_tier: strong
rationale: Established gastroenterology. Mechanism — pancreatic lipase + amylase +
  protease deficiency causes specific malabsorption patterns. Common in cystic fibrosis,
  chronic pancreatitis, ageing, post-cholecystectomy. Less severe forms underrecognised.
coaching_translation: If undigested food shows up in your stool, you have gas + bloating
  after meals, fatty floating stools, or unexplained weight loss + nutrient deficiencies
  — pancreatic enzymes are likely insufficient. Pancreatin 10X USP 350-750 mg with
  each meal restores digestion. Particularly relevant after gallbladder removal, with
  ageing, after chronic stress. Pairs with Betaine HCl when low stomach acid also
  present.
caveats:
- Pancreatin (porcine) — vegetarian alternative is bromelain + papain
- Active pancreatitis is clinician scope
- Cystic fibrosis requires high-dose Rx pancreatic enzymes (Creon)
- Take with the meal (not before or after)
