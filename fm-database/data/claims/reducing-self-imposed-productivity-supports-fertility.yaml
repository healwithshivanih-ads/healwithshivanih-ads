slug: reducing-self-imposed-productivity-supports-fertility
statement: Chronic productivity pressure (trying to accomplish too much, busy-as-virtue
  mindset) sustains sympathetic-nervous-system activation and elevates cortisol, which
  suppresses the HPG axis and reduces fertility. Building intentional downtime — slow
  mornings, a book and tea afternoon, declining one commitment per week — is a fertility
  intervention, not a luxury. Coaches should normalise this for high-achieving AMA
  clients.
evidence_tier: fm_specific_thin
