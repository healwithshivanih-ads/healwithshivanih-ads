  location: minute 4:00 — stress and self-imposed productivity
  quote: Stop trying to accomplish too much. Take it down a notch. We all need that
    downtime. It gives our mind a break to not try to accomplish too much.
rationale: Translates stress-and-cortisol research into a coachable behavioural directive
  — particularly relevant for AMA professional women.
