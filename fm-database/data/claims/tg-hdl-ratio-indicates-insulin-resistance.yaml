slug: tg-hdl-ratio-indicates-insulin-resistance
statement: The triglyceride-to-HDL ratio is a reliable surrogate marker for insulin
  resistance; a ratio above ~3.5–4.0 indicates metabolic dysfunction.
evidence_tier: plausible_emerging
rationale: The document cites a TG:HDL ratio of 4.87 as indicative of insulin resistance
  and recommends using this ratio to identify the metabolic pattern. This is consistent
  with published literature on TG:HDL as an IR proxy, though it is not universally
  standardized as a primary diagnostic criterion.
coaching_translation: If your TG:HDL ratio is elevated, it's a signal that your cells
  may not be responding well to insulin—a key driver of heart disease risk. Diet and
  lifestyle changes can directly improve this ratio.
caveats:
- Optimal cut-off varies by population and lab reference ranges; functional medicine
  range used here may differ from conventional cut-offs.
- Source is expert lecture (moderate quality); verify specific cut-offs with clinician.
