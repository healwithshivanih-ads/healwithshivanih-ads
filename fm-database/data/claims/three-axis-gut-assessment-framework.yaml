slug: three-axis-gut-assessment-framework
statement: Hawrelak's three-axis gut assessment for any client presenting with fatigue,
  brain fog, autoimmunity, or metabolic dysfunction — (1) TRANSIT TIME (assessed cheaply
  with whole-corn or quinoa "marker" test; perfect- Bristol-4-daily clients can still
  take 26 days, indicating significant LPS reabsorption); (2) MICROBIOME COMPOSITION
  (proportion of Proteobacteria, butyrate producers, Akkermansia muciniphila, Bifidobacteria);
  (3) GUT INTEGRITY (leaky gut / intestinal hyperpermeability). When 2 of 3 axes are
  off, symptoms become pronounced. Coach intake — get baseline on all three before
  any supplement protocol; corn-test is free.
