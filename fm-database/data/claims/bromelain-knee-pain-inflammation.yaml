slug: bromelain-knee-pain-inflammation
statement: Bromelain may produce a small decrease in inflammation in acute nonspecific
  knee pain.
evidence_tier: plausible_emerging
rationale: Examine.com grades the human evidence C (limited) — a single 77-participant
  study found a small decrease in inflammation. In the same cohort, effects on muscle
  soreness and subjective well-being were not clearly established.
coaching_translation: For a client with a recent flare of knee pain, bromelain may
  modestly dampen the inflammatory component — useful as an adjunct alongside load
  management and movement, not a stand-alone fix.
caveats:
- Single small study; Examine evidence grade C (limited).
- Take between meals for the systemic anti-inflammatory effect.
