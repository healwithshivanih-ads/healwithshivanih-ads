slug: mthfr-variants-increase-cvd-risk-via-homocysteine
statement: MTHFR genetic variants impair the methylation cycle, leading to homocysteine accumulation and increased cardiovascular
  disease risk.
evidence_tier: plausible_emerging
rationale: MTHFR C677T and A1298C polymorphisms are associated with elevated homocysteine in multiple studies, and homocysteine
  elevation is epidemiologically linked to CVD. Direct MTHFR-to-CVD causal links remain an area of ongoing research.
coaching_translation: Some people carry a gene variant (MTHFR) that makes it harder to process B vitamins properly, leading
  to higher homocysteine. A simple genetic test can reveal this, and targeted supplementation can help.
caveats:
- MTHFR testing and interpretation should involve a clinician.
- Source is expert lecture (moderate quality).
