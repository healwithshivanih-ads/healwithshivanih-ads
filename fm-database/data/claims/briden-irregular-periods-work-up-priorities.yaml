slug: briden-irregular-periods-work-up-priorities
statement: 'Before settling on PCOS or hypothalamic amenorrhea, rule out the common
  medical causes of irregular periods: pregnancy, hypothyroidism, high prolactin (incl.
  prolactinoma), medication side effects (some antidepressants), nutrient deficiencies
  (iron, vitamin D), autoimmune disease including celiac, history of concussion (rare
  but documented), and primary ovarian insufficiency (FSH consistently >25 below age
  40). Hormone tests must be timed to cycle day 2-3 if cycles are present; random
  testing risks measuring a pre-ovulatory LH surge that misleads.'
evidence_tier: strong
rationale: Standard reproductive endocrinology work-up. POI cut-off of FSH >25 is
  consistent with international diagnostic criteria.
coaching_translation: An irregular-period work-up needs pregnancy test, thyroid panel,
  prolactin, FSH (timed to day 2-3), celiac screen, and iron studies before any FM
  'PCOS subtype' analysis. Skipping these risks missing easily-treated causes.
