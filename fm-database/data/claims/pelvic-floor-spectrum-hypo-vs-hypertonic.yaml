slug: pelvic-floor-spectrum-hypo-vs-hypertonic
statement: Pelvic floor dysfunction lives on a tone spectrum rather than only the
  "too weak" pole that public messaging emphasises. Hypotonic (under-toned) pelvic
  floor — stress incontinence on cough/sneeze/jump, prolapse, sense of heaviness —
  responds to gentle strengthening and Kegels. Hypertonic (over-toned) pelvic floor
  — pelvic pain, dyspareunia, urge incontinence, pain in the urinary urge, erectile
  dysfunction in men, constipation with straining, chronic low back pain — is WORSENED
  by Kegels and instead requires relaxation, diaphragmatic breathing, fascia release,
  and reverse Kegels (active downward relaxation). Misdiagnosis (treating a hypertonic
  pelvic floor with strengthening) is common and explains many treatment failures.
  Distinguishing the two is the first clinical step before any home programme.
