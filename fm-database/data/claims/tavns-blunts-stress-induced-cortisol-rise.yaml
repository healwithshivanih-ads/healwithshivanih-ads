slug: tavns-blunts-stress-induced-cortisol-rise
statement: In a crossover trial of 12 healthy adults, 30 minutes of transcutaneous
  auricular vagus nerve stimulation cut the salivary cortisol rise during a mental
  arithmetic stress test by roughly half (49.5% above baseline) compared with sham
  stimulation (106.0% above baseline, p < 0.05).
evidence_tier: plausible_emerging
