slug: methylene-blue-complex-iv-bypass
statement: Methylene blue concentrates in mitochondria and acts as an alternative
  electron carrier — it can accept electrons from NADH and donate them downstream,
  bypassing blocked or dysfunctional complexes in the electron transport chain (especially
  complex IV) and supporting ATP production even when oxygen delivery is compromised
  or upstream complexes are sluggish. This is the mechanism invoked for benefit in
  hypoxia (airplane travel, altitude), cyanide poisoning (FDA-approved indication
  for IV methylene blue, alongside methemoglobinemia), and mitochondrial dysfunction
  states such as chronic fatigue syndrome and neurodegenerative disease. Synergy with
  red light at 660-680 nm wavelength (the methylene blue absorption peak) appears
  in Francisco Gonzalez-Lima's University of Texas Austin research, showing benefit
  in animal Alzheimer's models.
