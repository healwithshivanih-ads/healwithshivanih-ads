slug: most-grains-legumes-nuts-acid-forming
statement: Most grains (other than alkaline-forming exceptions), most legumes (other
  than lentils, lima beans, and soy), and most nuts (other than Brazil nuts and almonds)
  have an acid-forming effect on the body.
evidence_tier: fm_specific_thin
rationale: The PRAL (Potential Renal Acid Load) framework supports that many grains
  and some legumes have positive (acid-forming) PRAL values. The specific exceptions
  listed (lentils, lima, soy, Brazil nuts, almonds) are consistent with common alkaline-diet
  food lists but individual values vary and the evidence base is thin.
coaching_translation: When choosing grains, legumes, and nuts, lean toward the more
  alkaline options like lentils, almonds, and soy, and balance the rest with plenty
  of vegetables.
caveats:
- Source is an expert lecture, not primary literature.
- PRAL values vary by preparation and combination with other foods.
- These categorisations are specific to alkaline-diet frameworks and not universally
  accepted in mainstream dietetics.
