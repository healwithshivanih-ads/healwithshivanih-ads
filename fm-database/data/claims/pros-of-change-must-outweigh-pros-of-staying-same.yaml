slug: pros-of-change-must-outweigh-pros-of-staying-same
statement: For a client to move forward, the perceived pros of changing must be greater
  than the perceived pros of staying the same.
evidence_tier: strong
rationale: This is a foundational principle of decisional balance within motivational
  interviewing, well-established in behavior change literature (Prochaska & DiClemente
  transtheoretical model).
coaching_translation: When coaching ambivalent clients, gear conversations to amplify
  the benefits of change — through vision work, values clarification, and reflecting
  change talk — so the scale tips toward action.
caveats:
- Stated as a coaching heuristic in group discussion; not attributed to a specific
  study in this document.
