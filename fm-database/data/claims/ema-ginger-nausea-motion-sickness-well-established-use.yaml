slug: ema-ginger-nausea-motion-sickness-well-established-use
statement: The EMA/HMPC EU herbal monograph on Zingiberis rhizoma grants 'well-established use' for the
  prevention of nausea and vomiting associated with motion sickness in adults (oral powder 1-2 g taken
  30-60 minutes before travel), supported by at least 10 years of recognised medicinal use within the
  EU and adequate clinical evidence.
evidence_tier: strong
rationale: EMA 'well-established use' is the higher EMA classification, requiring documented clinical
  evidence and at least 10 years of use within the EU. The EMA assessment report cites randomised controlled
  trials for motion sickness.
coaching_translation: The European Medicines Agency classifies ginger as a proven (well-established) treatment
  for travel-related nausea — 1-2 g of powdered root taken before travel is the official European dose.
out_of_scope_notes: ''
caveats:
- EMA specifies this well-established use applies to adults only; use in children under 18 is not established.
- Contraindicated in patients with known hypersensitivity to ginger.
