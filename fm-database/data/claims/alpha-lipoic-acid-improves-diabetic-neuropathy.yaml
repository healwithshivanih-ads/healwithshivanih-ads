slug: alpha-lipoic-acid-improves-diabetic-neuropathy
statement: Alpha-lipoic acid (300–600 mg/day) is approved in Germany for diabetic
  neuropathy; it improves blood flow to peripheral nerves, stimulates nerve fibre
  regeneration, and increases insulin sensitivity.
evidence_tier: strong
rationale: ALADIN I/II/III and SYDNEY trials demonstrate significant reduction in
  neuropathic symptoms. Drug-approved status in Germany reflects regulatory-level
  evidence.
coaching_translation: Alpha-lipoic acid is one of the most evidence-based supplements
  for nerve protection in diabetes — a foundation supplement for anyone with neuropathy
  signs.
