slug: stress-reduces-digestive-fire-parasympathetic
statement: Chronic or acute stress suppresses parasympathetic nervous system activity,
  reducing stomach acid (HCl), digestive enzyme secretion, and bile utilisation —
  collectively impairing digestion.
evidence_tier: strong
rationale: The dependence of gastric acid secretion and digestive enzyme release on
  parasympathetic tone is well-established physiology. Stress-induced HPA and sympathetic
  activation suppressing digestive function is consensus.
coaching_translation: Eating while stressed shuts down your digestive system — your
  body cannot produce enough stomach acid or enzymes to properly break down food.
caveats:
- Speaker uses informal term 'digestive fire'; the underlying physiology is well-supported.
