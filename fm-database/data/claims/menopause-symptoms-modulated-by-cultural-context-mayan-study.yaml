slug: menopause-symptoms-modulated-by-cultural-context-mayan-study
statement: Hot flashes and osteoporosis appear in essentially zero of rural Mayan
  women despite hormonal patterns identical to US postmenopausal women — suggesting
  menopausal symptom expression is partly a sociocultural construct, not purely hormonal.
evidence_tier: plausible_emerging
rationale: Pizzorno cites the rural-Maya study showing hormonal patterns identical
  to US women but no symptomatic burden. Mayan women view menopause as elder-status
  gain. Mechanism likely involves diet, physical activity, sociocultural stress modifiers.
coaching_translation: Hot flashes aren't purely about hormones. Rural Mayan women
  have the same low estrogen but no symptoms — they live in a culture that respects
  elder women and gives menopause meaning. The way we frame menopause affects how
  we experience it.
caveats:
- Difficult to disentangle culture from confounders (diet, activity, body composition,
  reproductive history).
- Cultural reframing alone won't substitute for medical evaluation when symptoms are
  debilitating.
- Reminder that biopsychosocial framing matters in coaching menopausal symptoms.
