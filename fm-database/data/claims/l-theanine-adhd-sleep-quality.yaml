slug: l-theanine-adhd-sleep-quality
statement: L-theanine at 400 mg/day improves sleep quality in boys with ADHD, reduces
  anxiety, increases concentration, stabilizes mood without sedation, and improves
  cerebral dopaminergic activity.
evidence_tier: plausible_emerging
rationale: RCT data on L-theanine in boys with ADHD cited; mechanism involves enhancement
  of dopaminergic activity and modulation of GABA/glutamate signaling.
coaching_translation: L-theanine — naturally found in green tea — can help children
  with ADHD sleep better, feel calmer, and focus more without making them drowsy.
