slug: gluten-zonulin-opens-tight-junctions-myers-tas
statement: Gluten stimulates release of zonulin, which loosens intestinal tight junctions
  and can produce leaky gut even in people without celiac disease.
evidence_tier: plausible_emerging
rationale: Alessio Fasano's research showed gliadin triggers zonulin, transiently
  opening tight junctions; with chronic overexposure the junctions stay open, allowing
  antigens through.
coaching_translation: Gluten can loosen the seams of the gut lining for everyone —
  not only people with celiac disease.
