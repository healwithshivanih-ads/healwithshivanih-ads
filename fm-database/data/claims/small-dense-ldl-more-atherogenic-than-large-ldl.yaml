slug: small-dense-ldl-more-atherogenic-than-large-ldl
statement: Small-dense LDL particles are more atherogenic than large, buoyant LDL
  particles because they penetrate endothelial cracks and undergo oxidation and glycation
  more readily.
evidence_tier: plausible_emerging
rationale: 'The document explains the mechanistic basis for LDL particle size risk:
  small particles infiltrate endothelial gaps, oxidize, attract macrophages, and initiate
  plaque. This is consistent with lipidology research on LDL subfractions, though
  not yet standard in all clinical guidelines.'
coaching_translation: Not all LDL is equal. Small, dense LDL particles are the ones
  that slip through damaged artery walls and cause plaques. Reducing inflammation,
  blood sugar, and refined carbs helps shift your LDL to the larger, safer type.
caveats:
- Advanced LDL particle testing (NMR/ion mobility) required to assess this; not universally
  available.
- Source is expert lecture (moderate quality).
