slug: small-dense-ldl-more-atherogenic-than-large-ldl
statement: Small, dense LDL-C particles are more atherogenic than large, buoyant LDL-C
  particles because they are preferentially glycated and more easily oxidized, and
  they contain more ApoB and ApoCIII.
evidence_tier: strong
rationale: Established in cardiovascular research; small dense LDL (Pattern B) is
  widely accepted as more atherogenic.
coaching_translation: Not all 'bad' cholesterol is equally dangerous — smaller, denser
  LDL particles cause more damage, and avoiding excess sugar helps reduce them.
caveats:
- Advanced LDL particle testing (NMR/ion mobility) required to assess this; not universally
  available.
- Source is expert lecture (moderate quality).
