slug: zonulin-biomarker-intestinal-permeability
statement: Elevated serum zonulin correlates with increased intestinal permeability, as zonulin is a peptide secreted by intestinal
  mucosa that regulates tight junction opening.
evidence_tier: plausible_emerging
rationale: Zonulin as a regulator of tight junctions was discovered by Fasano's group and is used in research as a permeability
  marker. Some clinical labs offer testing. However, assay standardization and clinical utility are still under active investigation.
coaching_translation: Zonulin is a protein your gut produces that can 'unlock' the tight junctions between gut cells. When
  levels are high, it's a sign the gut barrier may be more permeable than it should be.
out_of_scope_notes: Zonulin test ordering and interpretation is clinician-scope.
caveats:
- Zonulin assays have variable standardization across labs; clinical utility in routine practice is debated.
- Source is expert consensus; primary literature should be reviewed for current clinical guidance.
