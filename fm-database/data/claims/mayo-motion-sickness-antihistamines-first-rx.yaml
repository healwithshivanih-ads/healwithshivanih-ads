slug: mayo-motion-sickness-antihistamines-first-rx
statement: Conventional first-line drug is a first-generation antihistamine — dimenhydrinate
  (Dramamine), meclizine (Bonine), cyclizine — taken 30 to 60 minutes before travel;
  sedation is the main side effect.
