slug: sklar-dutch-test-cortisol-pattern
statement: A DUTCH test (urinary dried-blood-spot four-point cortisol pattern with
  sex hormones, oestrogen metabolism and melatonin) gives a far more useful picture
  of HPA-axis function in fertility coaching than a single morning serum cortisol
  — because it surfaces flattened curves, evening spikes, and suppressed nighttime
  melatonin patterns that direct the choice of adaptogen, sleep intervention and meal-timing
  strategy.
