sources:
- id: murray-pizzorno-2012-encyclopedia
  location: SLE chapter, p 1534
  quote: The general approach to SLE from a naturopathic perspective is nearly identical
    to the approach to rheumatoid arthritis. The major focus in dietary therapy for
    SLE is to eliminate food allergies, increase the intake of antioxidant-rich food
    and nutrients, follow a vegetarian diet, and alter the intake of dietary fats
    and oils. Fish oils have shown considerable benefit in improving symptoms and
    disease activity scores in SLE.
