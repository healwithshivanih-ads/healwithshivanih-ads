slug: sle-elimination-diet-vegetarian-fish-oil-reduce-inflammation
statement: The naturopathic approach to SLE mirrors rheumatoid arthritis — start with
  an elimination diet (top triggers are wheat, corn, dairy, beef, nightshades, pork,
  citrus, oats, rye, egg, coffee, peanuts, cane sugar, lamb, soy), then a vegetarian
  or Mediterranean diet lowers arachidonic acid available for inflammatory eicosanoid
  production. Fish oils have shown considerable benefit in improving SLE symptom and
  disease-activity scores.
evidence_tier: strong
linked_to_topics:
