slug: sklar-amh-tripling-case-disclaimer
statement: Sklar reports a clinical case of AMH rising from 0.03 to 1.6 ng/mL over
  90 days of foundational protocol work. This is an outlier worth knowing about for
  hope-framing but not a benchmark to set expectations from — AMH can fluctuate cycle
  to cycle, lab-method variation matters, and individual responses to the same protocol
  vary widely. Use cautiously in coaching.
