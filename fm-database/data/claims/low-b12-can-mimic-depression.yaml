slug: low-b12-can-mimic-depression
statement: Low B12 mimics depression through fatigue, apathy, brain fog, low motivation, sadness, and cognitive decline.
evidence_tier: plausible_emerging
rationale: B12 deficiency presenting with neuropsychiatric symptoms including depression-like features is well-described in
  clinical literature.
coaching_translation: Low mood with fatigue, foggy thinking, and declining motivation in vegans, older adults, or those on
  metformin warrants B12 assessment by a clinician.
caveats:
- Source is a practitioner cheatsheet without primary citations.
- B12 deficiency symptoms overlap with many conditions; clinical testing is required.
- Source is practitioner cheatsheet.
- Clinical depression diagnosis requires medical professional.
