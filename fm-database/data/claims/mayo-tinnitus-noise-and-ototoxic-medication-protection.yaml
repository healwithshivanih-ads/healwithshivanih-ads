slug: mayo-tinnitus-noise-and-ototoxic-medication-protection
statement: The most preventable contributors are loud-noise exposure (without ear
  protection) and ototoxic medications — high-dose aspirin, certain antibiotics (aminoglycosides),
  loop diuretics, chemotherapy agents, and quinine — which can worsen or unmask tinnitus.
