slug: lyme-mimics-and-coexists-with-autoimmune-arthritis-myers-tas
statement: Lyme disease can cause persistent arthritis and is frequently confused
  with, or coexists with, autoimmune conditions; conventional Lyme testing has a high
  false-negative rate.
evidence_tier: fm_specific_thin
rationale: Post-infectious Lyme arthritis may arise via bystander activation or mimicry;
  because standard tests miss cases, accurate diagnosis matters before attributing
  symptoms to autoimmunity.
coaching_translation: Lyme can look just like an autoimmune joint condition — accurate
  testing matters so the right thing gets treated.
