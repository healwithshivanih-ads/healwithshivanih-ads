slug: gentle-cooking-preserves-more-nutrients
statement: Gentle cooking methods (steaming, blanching, baking) using minimal heat,
  liquid, and time best preserve nutrient content in foods.
evidence_tier: strong
rationale: Well-established nutritional science principle; water-soluble vitamins
  (B vitamins, vitamin C) are most vulnerable to heat and leaching. Fat-soluble vitamins
  (A, D, E, K) require dietary fat for absorption.
coaching_translation: How you cook matters as much as what you eat. Steam or lightly
  sauté vegetables, and save the cooking liquid in soups/stews to preserve the nutrients
  that leach out.
