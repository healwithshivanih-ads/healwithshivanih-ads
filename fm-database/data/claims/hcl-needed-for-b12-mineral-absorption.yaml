slug: hcl-needed-for-b12-mineral-absorption
statement: Adequate HCl is required to absorb vitamin B12 and several minerals including
  iron, calcium, magnesium, zinc, and copper.
evidence_tier: strong
rationale: 'Well-established that gastric acid is required for the release of B12
  from food proteins and for the solubilization of minerals. Reference: Hunt et al.,
  Gut 2015.'
coaching_translation: Without enough stomach acid, your body can't properly absorb
  key nutrients like B12, iron, and magnesium — even if you're eating them.
