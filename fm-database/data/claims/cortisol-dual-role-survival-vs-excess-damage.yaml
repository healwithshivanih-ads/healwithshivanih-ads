slug: cortisol-dual-role-survival-vs-excess-damage
statement: Cortisol is produced in the adrenal cortex, controls carbohydrate, fat, and protein metabolism,
  and participates in blood sugar balance, immune response, and cognition — but in excess is a risk factor
  for depression, osteoporosis, cardiovascular disease, and high blood pressure.
evidence_tier: strong
rationale: Well-established glucocorticoid physiology; Welch references strong links between cortisol
  elevation and depression (multiple studies) and bone mineral density loss (documented even pre-menopause).
coaching_translation: Cortisol is essential for energy, immunity, and focus — but if it stays elevated
  for too long, it starts damaging bones, heart, mood, and blood sugar. It is a hormone that protects
  in a crisis but destroys in a chronic state.
