slug: melatonin-nac-methylated-b-vitamins-support-estrogen
statement: Melatonin, N-acetylcysteine (NAC), and methylated B vitamins may support
  healthy estrogen metabolism.
evidence_tier: fm_specific_thin
rationale: Document notes 'some evidence' for these supplements in estrogen metabolism
  support; no specific study cited. NAC supports glutathione (which supports Phase
  II detox); methylated B vitamins support COMT methylation. Melatonin has some oncology
  research but evidence for estrogen metabolism specifically is thin.
coaching_translation: Your clinician may recommend NAC, methylated B vitamins, or
  melatonin to support your body's estrogen processing pathways.
out_of_scope_notes: Dosing must be clinician-directed. Do not self-prescribe.
caveats:
- Document explicitly qualifies this as 'some evidence'. Specific doses and forms
  require clinician guidance. Source is expert consensus synthesis.
