slug: magnesium-is-natural-anti-statin
statement: Magnesium supplementation can support cardiovascular health as a natural
  adjunct or alternative to statins, and may help reduce statin-associated side effects
  including muscle pain.
evidence_tier: fm_specific_thin
rationale: The document explicitly describes magnesium as 'anti-statin' and recounts
  a case where a pathologist's statin-induced muscle pain resolved with magnesium.
  The cardiovascular role of magnesium is biologically plausible (electrolyte balance,
  calcium antagonism) but the direct 'anti-statin' framing and muscle pain resolution
  are anecdotal in this document.
coaching_translation: Magnesium is a key heart mineral that many people are deficient
  in. It helps balance calcium in heart cells and may ease some of the muscle soreness
  people get from cholesterol medications.
caveats:
- Source is expert consensus lecture. The 'anti-statin' claim is not supported by
  a cited clinical trial. The muscle pain case is a single anecdote.
- Do not advise clients to replace statin therapy with magnesium without clinician
  involvement, especially in secondary prevention patients.
