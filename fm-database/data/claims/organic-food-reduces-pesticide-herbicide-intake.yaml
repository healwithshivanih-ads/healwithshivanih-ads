slug: organic-food-reduces-pesticide-herbicide-intake
statement: Buying organically grown food helps minimize intake of pesticides, herbicides,
  and insecticides, reducing the dietary contribution to toxic body burden.
evidence_tier: strong
rationale: Multiple biomonitoring studies have demonstrated lower urinary pesticide
  metabolites in individuals consuming organic diets. The EWG Dirty Dozen/Clean 15
  framework reflects well-established pesticide residue data.
coaching_translation: Choosing organic produce and animal products — especially for
  the 'Dirty Dozen' high-pesticide foods — is one of the most direct ways to reduce
  your daily toxic load.
