slug: crispatus-absent-in-prostate-disease
statement: Men with prostate disease (prostatitis, BPH, or prostate cancer) consistently
  lack Lactobacillus crispatus, while men with healthy prostates have it—suggesting
  a potential microbiome link.
evidence_tier: fm_specific_thin
rationale: Dr. Davis observes a consistent association between crispatus absence and
  prostate disease, and notes that ~90% of men with prostate disease have SIBO. He
  acknowledges this is correlational, not proven causal. This is a novel observation
  outside mainstream urology.
coaching_translation: Early findings suggest that men with prostate problems are missing
  the same beneficial bacteria (L. crispatus) that supports women's vaginal health—pointing
  to a potential gut-prostate microbiome connection.
caveats:
- Explicitly described as correlational by Dr. Davis.
- Source is expert_consensus interview.
- No specific studies cited.
- Prostate disease management requires urological supervision.
