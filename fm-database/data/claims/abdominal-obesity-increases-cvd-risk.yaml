slug: abdominal-obesity-increases-cvd-risk
statement: Elevated abdominal circumference (>102 cm in men, >88 cm in women) and
  waist-to-hip ratio (>0.90 in men, >0.85 in women) increase cardiovascular disease
  risk.
evidence_tier: strong
rationale: Central adiposity is an established independent CVD risk factor, predictive
  of metabolic syndrome, insulin resistance, and atherogenesis.
coaching_translation: Waist measurement and waist-to-hip ratio are practical tools
  to assess cardiometabolic risk with clients.
linked_to_topics:
