slug: abdominal-obesity-increases-cvd-risk
statement: Abdominal circumference >102 cm in males and >88 cm in females, and waist-to-hip
  ratio >0.90 in males and >0.85 in females, increase cardiovascular disease risk.
evidence_tier: strong
rationale: Abdominal adiposity as a CVD risk factor is well-established; specific
  cutoffs are widely used in clinical practice.
coaching_translation: Waist circumference and waist-to-hip ratio are practical measurements
  to track progress in a cardiovascular wellness program.
