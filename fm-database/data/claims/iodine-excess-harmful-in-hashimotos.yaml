slug: iodine-excess-harmful-in-hashimotos
statement: While iodine is essential for thyroid hormone production, excess iodine
  can be harmful in Hashimoto's and supplementation should be approached with caution.
evidence_tier: plausible_emerging
rationale: High iodine intake can increase TPO antibody levels and exacerbate autoimmune
  thyroiditis in susceptible individuals. Optimal intake (150 mcg/day) from food sources
  is generally safe.
coaching_translation: Unlike most thyroid nutrients, more iodine is not always better
  — especially in Hashimoto's. Stick to food sources and avoid high-dose iodine supplements
  unless directed by a clinician.
out_of_scope_notes: Iodine supplementation dosing in Hashimoto's is clinician scope.
caveats:
- Source is an educational toolkit.
- This is an important safety caveat for coaches recommending thyroid support supplements.
