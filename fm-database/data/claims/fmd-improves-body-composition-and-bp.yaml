slug: fmd-improves-body-composition-and-bp
statement: The Fasting Mimicking Diet (5-day very low-calorie ketogenic protocol,
  once monthly) has been shown in a limited number of studies to improve body composition
  and lower blood pressure after three consecutive cycles.
evidence_tier: plausible_emerging
rationale: 'Directly cited: Wei M et al. 2017 Sci Transl Med (eaai8700). The document
  acknowledges ''limited number of studies'', placing this at emerging rather than
  consensus evidence.'
coaching_translation: Doing the 5-day Fasting Mimicking Diet once a month for three
  months in a row may help with weight and blood pressure — but it needs clinician
  oversight.
caveats:
- Limited study count — not yet consensus.
- Must be conducted under clinician supervision.
- Not suitable for contraindicated populations (see IF section).
out_of_scope_notes: Prescribing and supervising FMD is beyond coaching scope — refer
  to clinician.
