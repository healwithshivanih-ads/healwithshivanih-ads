slug: progesterone-as-gaba-modulator
statement: Progesterone is a neurosteroid — its metabolite allopregnanolone is a positive
  allosteric modulator of the GABA-A receptor, providing endogenous "braking" against
  anxiety, overwhelm, racing-mind insomnia, and the wired-tired late-perimenopausal
  state. As progesterone falls in late-luteal-phase and through perimenopause, GABA-A
  tone drops and the client experiences a clinically meaningful loss of stress tolerance.
  Snyder also notes progesterone reduces neuroinflammation, fluid retention, and bloating.
  The GABA-A mechanism explains why oral micronised progesterone is dosed at bedtime
  — clients often report dramatic sleep improvement.
