slug: sklar-50-percent-male-factor
statement: Approximately half of fertility challenges have a male-factor component,
  either as the sole cause or as a meaningful contributor alongside female factors.
  Preconception care that optimises only the female partner is therefore inherently
  incomplete — both partners need a parallel 90-day reset for the dual probability
  calculation to actually shift.
