  location: Podcast — mouthwash blood pressure segment
  quote: There's research that they've shown that a lot of the sterilizing compounds
    that are used in dental mouthwashes that are antimicrobial affect systemic blood
    pressure. Because when you kill microbes in the mouth that are nitric oxide producing
    microbes, all of a sudden blood pressure goes up throughout your whole body.
rationale: Practical hygiene change — coach can flag mouthwash use as a hidden blood-pressure
  driver.
