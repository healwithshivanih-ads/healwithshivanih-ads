slug: oral-microbiome-and-systemic-blood-pressure
statement: The oral microbiome's nitrate-reducing species are responsible for converting
  dietary nitrate into nitrite, which enters circulation and is reduced to nitric
  oxide for systemic vasodilation. Studies of antibacterial mouthwashes (chlorhexidine,
  alcohol-based products) show that wiping out these oral microbes raises systemic
  blood pressure within days because the nitric-oxide pool drops. Coach implication
  — clients with hypertension or low NO status should avoid daily antibacterial mouthwash
  and prefer mechanical oral hygiene (brushing, flossing, tongue-scraping) plus dietary
  nitrate.
evidence_tier: plausible_emerging
