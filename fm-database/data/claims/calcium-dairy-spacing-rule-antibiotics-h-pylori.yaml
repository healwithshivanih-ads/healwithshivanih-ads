slug: calcium-dairy-spacing-rule-antibiotics-h-pylori
statement: Calcium and dairy must be spaced at least 2 hours before or 4 hours after
  tetracycline (or fluoroquinolones) during H. pylori eradication — calcium binds
  these antibiotics in the gut and reduces absorption by up to 50%, causing eradication
  failure. The same applies to magnesium-, aluminium-, and iron-containing supplements/antacids.
evidence_tier: strong
rationale: Well-established pharmacokinetic interaction. Failure to space causes a
  meaningful proportion of H. pylori treatment failures in motivated patients.
coaching_translation: If you're on tetracycline for H. pylori, no dairy, calcium supplements,
  iron, magnesium, or antacids within 2 hours before or 4 hours after each dose. Set
  a phone reminder if needed — this single mistake fails eradication in many patients.
caveats:
- Same rule applies to ciprofloxacin, levofloxacin (fluoroquinolones).
- Probiotics also need 2-hour spacing from antibiotic doses.
- PPI doses are timed differently (typically 30 min before meals).
