slug: low-lean-muscle-mass-increases-mortality-risk
statement: Low lean muscle mass is associated with increased risk of death and is
  a clinically important finding in body composition assessment, particularly as patients
  age.
evidence_tier: strong
rationale: Association between low lean muscle mass (sarcopenia) and all-cause mortality
  is well-established in geriatric and general medicine literature.
coaching_translation: Having enough muscle isn't just about looking fit — it's a powerful
  predictor of long-term health and longevity. Building and preserving muscle becomes
  increasingly important as we get older.
