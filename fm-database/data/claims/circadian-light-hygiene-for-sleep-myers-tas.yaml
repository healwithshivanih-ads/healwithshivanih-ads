slug: circadian-light-hygiene-for-sleep-myers-tas
statement: Evening bright and blue light suppresses melatonin and delays sleep, so
  amber bulbs and blue-light filters (e.g., f.lux) after sunset, blackout curtains,
  daytime natural-light exposure, and a consistent bedtime are used to restore the
  sleep-wake rhythm.
evidence_tier: plausible_emerging
rationale: Light is the dominant circadian cue; managing evening light and reinforcing
  daytime light aligns melatonin timing for deeper sleep.
coaching_translation: Dim and warm your light after sunset, get daylight during the
  day, and keep a steady bedtime — that's how you cue good sleep naturally.
