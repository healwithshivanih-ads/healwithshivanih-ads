slug: acrylamide-high-heat-starchy-foods-carcinogen
statement: Acrylamide, formed when starchy foods are cooked at high temperatures (frying, baking at high
  heat, roasting), is a probable human carcinogen that is largely absent from minimally processed whole
  foods.
evidence_tier: plausible_emerging
rationale: The International Agency for Research on Cancer (IARC) classifies acrylamide as a Group 2A
  probable human carcinogen; it forms via the Maillard reaction between asparagine and reducing sugars
  at temperatures above ~120°C, consistent with Welch's discussion of processed/fried foods.
coaching_translation: Chips, crackers, fried foods, and heavily browned starches contain acrylamide —
  a compound that forms during high-heat cooking and is associated with increased cancer risk. Cooking
  at lower temperatures (steaming, slow-cooking, light sautéing) keeps this to a minimum.
out_of_scope_notes: ''
caveats:
- Human evidence for cancer risk from dietary acrylamide is observational and dose-dependent; cooking
  method matters more than avoiding all starchy foods.
