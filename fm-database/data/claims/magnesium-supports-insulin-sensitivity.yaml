slug: magnesium-supports-insulin-sensitivity
statement: Magnesium is important for insulin receptor function and treating insulin
  resistance, and deficiency contributes to impaired glucose metabolism.
evidence_tier: plausible_emerging
rationale: Multiple studies have associated magnesium deficiency with insulin resistance,
  and magnesium is a cofactor for glucose metabolism enzymes. Some RCTs show magnesium
  supplementation improves insulin sensitivity in deficient individuals.
coaching_translation: Magnesium is like the oil for your insulin 'lock' — it helps
  the receptor work properly so insulin can do its job of moving glucose into your
  cells. Low magnesium makes insulin resistance worse.
