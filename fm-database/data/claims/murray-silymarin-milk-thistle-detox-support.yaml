slug: murray-silymarin-milk-thistle-detox-support
statement: 'Silymarin (the flavonoid complex from milk thistle / Silybum marianum)
  is one of the most-researched single botanicals for liver function support — at
  140-210 mg three times daily (or 120 mg phytosome/Siliphos twice daily). Mechanisms:
  (1) increases intracellular glutathione 35%, (2) stabilises hepatocyte membranes
  against toxin damage, (3) stimulates protein synthesis driving hepatic regeneration,
  (4) inhibits leukotriene synthesis reducing inflammation. Particularly relevant
  in alcohol use, NAFLD, chronic medication burden, environmental toxicity, and as
  Phase II detox support.'
evidence_tier: strong
rationale: Decades of clinical + preclinical research. Mechanism well-described. Silymarin-phytosome
  (siliphos) form 7-10× plasma levels vs plain extract. Used clinically for amanita
  mushroom poisoning antidote in Europe.
coaching_translation: Milk thistle (silymarin) is the most-evidenced botanical for
  liver support — 140-210 mg silymarin three times daily, OR the phytosome form (Siliphos)
  120 mg twice daily for better absorption. Boosts glutathione 35%, protects liver
  cells, drives regeneration. Essential when alcohol use, NAFLD, polypharmacy, or
  environmental toxin exposure is in the picture.
caveats:
- Phytosome (siliphos) form much better absorbed
- Mild laxative effect at higher doses
- Daisy/ragweed family allergy — cross-reaction possible
- Pregnancy data limited at supplement doses
- Effect builds over 3-6 months
