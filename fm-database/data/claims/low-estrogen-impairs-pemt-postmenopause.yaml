slug: low-estrogen-impairs-pemt-postmenopause
statement: Low oestrogen — particularly after menopause — impairs PEMT gene expression,
  increasing dietary choline requirements and raising the risk of fatty liver, gallbladder
  dysfunction, and musculoskeletal symptoms.
evidence_tier: plausible_emerging
rationale: Oestrogen directly upregulates PEMT gene transcription; this mechanism
  is established in animal and human cell studies. Postmenopausal women have substantially
  increased choline requirements compared to premenopausal women — a finding supported
  by Institute of Medicine dietary reference intake data. The clinical manifestations
  (fatty liver, gallbladder, pain) follow plausibly from reduced PC synthesis.
coaching_translation: Postmenopausal women or those with low oestrogen should be encouraged
  to eat choline-rich foods (eggs, liver, meat) and may need additional phosphatidylcholine
  support.
caveats:
- Source is a consumer trade book.
- Low oestrogen evaluation and HRT decisions require clinician involvement.
- Vegetarian/vegan postmenopausal women are at highest risk and warrant dietary counselling.
