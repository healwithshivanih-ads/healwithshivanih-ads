slug: supplement-deprescribing-in-chronic-illness
statement: In clients arriving with 20-plus daily supplements, one of the highest-yield
  second interventions is deliberate deprescribing — removing most supplements and
  reintroducing only those with a clear clinical rationale. Over-supplementation can
  itself drive cell-defense physiology by adding biochemical load and triggering tolerance
  issues.
evidence_tier: plausible_emerging
