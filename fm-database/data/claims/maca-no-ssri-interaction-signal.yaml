slug: maca-no-ssri-interaction-signal
statement: In the only RCT examining maca co-administered with SSRIs, maca at 1.5
  to 3.0 g/day was well tolerated across a 12-week dosing window with no signal of
  pharmacokinetic or pharmacodynamic interaction. Sample size is small; ongoing clinician
  oversight remains essential for any client on serotonergic medication.
evidence_tier: plausible_emerging
