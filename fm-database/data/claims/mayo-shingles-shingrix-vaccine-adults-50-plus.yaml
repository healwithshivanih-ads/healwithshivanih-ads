slug: mayo-shingles-shingrix-vaccine-adults-50-plus
statement: The recombinant zoster vaccine Shingrix — two doses, 2 to 6 months apart
  — is conventionally recommended for adults 50 and older and for immunocompromised
  adults 19 and older; it is over 90 percent effective at preventing shingles and
  postherpetic neuralgia.
