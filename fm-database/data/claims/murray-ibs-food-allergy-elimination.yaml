sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 72 — Irritable Bowel Syndrome, pg 1194-1195
  quote: According to double-blind challenge methods, approximately two-thirds of
    patients with IBS have at least one food intolerance, and some have multiple intolerances.
    The most common allergens are dairy products (40 to 44 percent) and grains (40
    to 60 percent). In one of the most recent studies, 20 patients with IBS who had
    had no success with standard medical therapy were evaluated for food allergies
    by means of IgG blood tests and treated with an elimination diet followed by an
    allergy rotation diet and probiotic supplementation. 100 percent of the study
    subjects reported improvement in symptoms.
