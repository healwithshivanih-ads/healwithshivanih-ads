slug: murray-ibs-food-allergy-elimination
statement: Approximately two-thirds of IBS patients have at least one food intolerance
  identifiable by double-blind challenge, with dairy (40 to 44 percent) and grains/wheat
  (40 to 60 percent) the most common allergens. A structured elimination diet followed
  by a rotation diet plus probiotic support has produced symptom improvement in 100
  percent of treated patients in small open trials.
evidence_tier: plausible_emerging
