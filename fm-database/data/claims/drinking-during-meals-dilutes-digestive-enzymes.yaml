slug: drinking-during-meals-dilutes-digestive-enzymes
statement: Consuming large amounts of liquid during meals may dilute gastric acid
  and digestive enzyme concentrations, impairing nutrient absorption.
evidence_tier: fm_specific_thin
rationale: Widely stated in FM practice; theoretical basis in gastric pH dilution.
  Evidence base is indirect and largely observational. The recommendation to limit
  to one glass is conservative and unlikely to cause harm.
coaching_translation: Limit drinking during meals to one glass. Drink most of your
  water between meals for best digestion.
caveats:
- Robust RCT evidence is lacking; mechanism is physiologically plausible but effect
  size in healthy individuals is debated
