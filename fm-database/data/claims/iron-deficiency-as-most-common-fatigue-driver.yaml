slug: iron-deficiency-as-most-common-fatigue-driver
statement: Iron deficiency is the most common nutrient deficiency worldwide and a
  major hidden cause of fatigue. Murray cites the seminal 1950s study that treadmill
  endurance time at 3 mph was directly proportional to iron stores in women; over
  80% of female endurance athletes and swimmers are iron-deficient. Plant-based diets,
  menstruating women, growing children, and older adults (reduced absorption) are
  highest risk groups. Murray's coach-actionable threshold — serum ferritin BELOW
  50 ng/mL warrants intervention regardless of "normal range" on the lab printout
  (most labs flag only <15-20). Heme iron from animal sources (especially calf liver,
  fish liver) absorbs far better than non-heme from plant sources; supplemental non-heme
  iron typically needs 60-120 mg per day for several months to restore stores.
