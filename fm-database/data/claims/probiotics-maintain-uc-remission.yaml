slug: probiotics-maintain-uc-remission
statement: Probiotics are ineffective during active UC flares but remarkably benefit
  the maintenance of remission; Bifidobacterium longum plus inulin-derived FOS improved
  sigmoidoscopic appearance, histology, and biochemical inflammation markers in UC.
evidence_tier: plausible_emerging
rationale: Multiple controlled trials with inconsistent results overall; remission-maintenance
  effect in UC has more supporting evidence than treatment of active disease.
coaching_translation: Probiotic supplementation (Lactobacillus and Bifidobacterium
  species, 5–10 billion CFU daily) is most beneficial for maintaining IBD remission,
  not during active flares.
caveats:
- Results are strain-specific; Bifidobacterium infantis 35624, Lactobacillus GG, and
  VSL#3 have the most published data
- Study results inconsistent across all strains for CD
