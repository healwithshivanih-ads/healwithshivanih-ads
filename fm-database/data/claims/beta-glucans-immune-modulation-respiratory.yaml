slug: beta-glucans-immune-modulation-respiratory
statement: Beta-glucans are anti-inflammatory, enhance immune function, and specifically
  benefit those with viral upper respiratory tract infections.
evidence_tier: plausible_emerging
rationale: Multiple cited RCTs (Auinger et al. Eur J Nutr 2013; Dharsono et al. J
  Am Coll Nutr 2019; Nieman et al. Med Sci Sports Exerc 2008) support beta-glucan's
  immune-enhancing and URI-reducing effects.
coaching_translation: Beta-glucans from yeast and mushrooms have been shown in clinical
  trials to help reduce cold and flu symptoms and support your immune defenses.
