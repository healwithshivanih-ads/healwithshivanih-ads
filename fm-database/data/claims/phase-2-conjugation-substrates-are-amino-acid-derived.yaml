slug: phase-2-conjugation-substrates-are-amino-acid-derived
statement: 'Phase 2 conjugation reactions consume specific amino-acid and

  sulfur-containing substrates as their conjugating groups — glycine,

  taurine, glutamine, N-acetylcysteine, cysteine, and methionine —

  making adequate protein intake and sulfur amino acid status a

  rate-limiting determinant of Phase 2 capacity.

  '
evidence_tier: strong
rationale: 'Each Phase 2 pathway draws on distinct amino-acid-derived substrates:

  glutathione conjugation (cysteine, glycine, glutamate), sulfation

  (sulfate from cysteine and methionine), amino acid conjugation

  (glycine, taurine), methylation (methionine-derived methyl groups).

  Low protein intake or chronically high toxicant load depletes these

  pools and rate-limits Phase 2 capacity, leaving Phase 1 reactive

  intermediates inadequately conjugated.

  '
coaching_translation: 'Phase 2 of detoxification literally consumes amino acids to
  package

  toxins for removal. This is the biochemistry behind the "protein

  plus plants" mantra — without adequate protein at every meal, your

  body runs out of the building blocks it needs to finish the

  detoxification process safely. Sulfur-rich foods (eggs, garlic,

  onions, cruciferous vegetables) are particularly important.

  '
caveats:
- Specific protein needs vary by body weight, activity, and toxicant load — work with
  your coach or dietitian for individualized targets.
