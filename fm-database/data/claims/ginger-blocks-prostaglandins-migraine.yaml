slug: ginger-blocks-prostaglandins-migraine
statement: Ginger blocks prostaglandins involved in migraine, improves gastric emptying,
  and helps nausea and burping associated with gastritis- and reflux-triggered migraines.
evidence_tier: plausible_emerging
rationale: Ginger's anti-prostaglandin activity (via COX inhibition) has RCT support
  in dysmenorrhoea and some migraine studies; gastroprokinetic effects are documented
  in small trials.
coaching_translation: A small ginger shot or ginger tea is a safe, practical way to
  address both nausea and headaches — especially those linked to delayed digestion.
