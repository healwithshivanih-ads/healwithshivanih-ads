slug: ginger-blocks-prostaglandins-migraine
statement: Ginger blocks prostaglandins involved in migraine, improves gastric emptying,
  and helps nausea and burping associated with gastritis or reflux-triggered migraines.
evidence_tier: plausible_emerging
rationale: Ginger's anti-prostaglandin and prokinetic effects have biological plausibility
  and some clinical trial support for nausea; application specifically to migraine
  management is emerging.
coaching_translation: A small ginger shot (½ inch fresh ginger in warm water) is a
  low FODMAP-safe tool to ease migraine nausea and may help reduce headache intensity
  by relaxing the gut-brain connection.
