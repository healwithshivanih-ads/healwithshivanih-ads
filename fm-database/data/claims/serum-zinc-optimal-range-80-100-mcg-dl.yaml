slug: serum-zinc-optimal-range-80-100-mcg-dl
statement: The optimal serum zinc level in both males and females is approximately 80–100 mcg/dL; levels below this range
  indicate zinc deficiency.
evidence_tier: confirm_with_clinician
rationale: Lab reference ranges and optimal values require clinician interpretation and vary by laboratory. This falls outside
  coaching scope.
coaching_translation: Your doctor can check your zinc levels with a blood test. Optimal levels are generally considered to
  be between 80 and 100 mcg/dL.
out_of_scope_notes: Interpreting serum zinc labs and determining deficiency severity is outside the scope of health coaching
  and requires a clinician.
caveats:
- Serum zinc does not always reflect tissue zinc status. Alkaline phosphatase is noted as an additional sensitive marker.
  Lab interpretation requires clinician.
