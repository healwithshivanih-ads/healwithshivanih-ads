  location: Podcast — modern HRT regimen segment
  quote: I've got an estrogen patch on. I'm taking my oral micronized progesterone
    tonight. Transdermal right now tends to be the safer one for estrogen. Oral micronized
    progesterone is still fine. The big win today was that there was a black box warning
    on vaginal estrogen — I believe that all vaginas need estrogen at some point.
rationale: Names the specific contemporary regimen so coach can recognise it on a
  client's medication list and explain why a GP might prefer patch over oral.
