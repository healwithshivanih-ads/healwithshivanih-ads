slug: transdermal-estrogen-oral-progesterone-preferred
statement: Snyder's contemporary HRT preference for most perimenopausal clients —
  transdermal bioidentical estradiol (patch or gel) to avoid first-pass hepatic clotting
  risk, plus oral micronised progesterone at bedtime (taking advantage of its GABA-A
  receptor modulation via allopregnanolone to support sleep and anxiety). Vaginal
  estrogen for genitourinary symptoms of menopause has a particularly favourable risk
  profile — the FDA removed the black-box warning on it. Bioidentical preparations
  are favoured over conjugated equine estrogen and synthetic progestins in current
  practice, even though most older RCT evidence used the synthetic forms.
evidence_tier: confirm_with_clinician
