slug: processed-food-poor-digestion-generates-ama-inflammation
statement: Processed and refined foods that the body cannot digest properly generate 'ama' — a concept
  from Ayurveda for toxic metabolic residue — which Welch argues creates a systemic inflammatory environment
  that contributes to chronic disease.
evidence_tier: fm_specific_thin
rationale: Ama maps roughly to the concept of undigested metabolic by-products (lipopolysaccharides, advanced
  glycation end-products) recognised in conventional medicine; the mechanistic parallel with gut barrier
  dysfunction is functionally plausible even if the Ayurvedic framing is not evidence-based in itself.
coaching_translation: When you eat highly processed or refined foods your digestive system can't break
  them down cleanly. The resulting by-products circulate in your body and settle in the weakest areas
  — contributing to joint pain, inflammation, and hormonal disruption over time.
out_of_scope_notes: ''
caveats:
- Ama is an Ayurvedic concept without a direct Western biomarker equivalent; the inflammatory consequence
  of processed food is plausible but the specific mechanism Welch describes is not validated.
