slug: coherent-breathing-lowers-cortisol-in-pcos
statement: Coherent breathing (5–6 breaths per minute) improves HRV and lowers cortisol,
  making it useful for PCOS and hormonal imbalances.
evidence_tier: plausible_emerging
rationale: Coherent/resonance breathing at ~5 breaths/min maximizing HRV is supported
  by clinical research (Lehrer et al.). The application to PCOS via cortisol reduction
  is mechanistically plausible but extrapolated from general HPA-axis evidence.
coaching_translation: Slowing your breath to about 5–6 breaths per minute brings your
  heart and nervous system into a coherent rhythm that lowers stress hormones. This
  can support hormonal balance in conditions like PCOS.
caveats:
- Direct RCT evidence in PCOS populations is limited.
- Source is educational synthesis.
