slug: breathing-exercises-can-increase-anxiety-in-some-clients
statement: For some individuals, breathing exercises and body-scan practices can increase
  rather than decrease anxiety due to heightened interoceptive awareness.
evidence_tier: plausible_emerging
rationale: Research on interoceptive sensitivity (e.g., in anxiety disorders and trauma)
  supports that increased bodily awareness via breath-focused techniques can exacerbate
  anxiety in a subset of individuals. This is a well-recognized clinical observation
  in mindfulness-based therapy literature.
coaching_translation: Not everyone responds well to breathing exercises — for some
  people, paying close attention to body sensations actually increases anxiety. If
  a client resists or feels worse with breathing work, it's worth exploring other
  entry points.
caveats:
- Source is expert practitioner discussion, not a cited study.
- This is an important clinical consideration but is based on observation rather than
  controlled evidence in this document.
