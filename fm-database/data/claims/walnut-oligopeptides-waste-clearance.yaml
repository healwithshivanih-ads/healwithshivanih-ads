slug: walnut-oligopeptides-waste-clearance
statement: Walnut oligopeptides — small protein fragments unique to walnuts — improve
  the body's clearance of metabolic waste products that build up in fatigue states.
  Tracked markers include lactate dehydrogenase, blood urea nitrogen, and lactic acid.
  Coach prescription — a small daily handful of walnuts (≈30g) for clients with exercise-recovery
  fatigue or generalised tiredness. Pair with the food-matrix principle — walnuts
  as whole food, not isolated walnut oil.
evidence_tier: plausible_emerging
