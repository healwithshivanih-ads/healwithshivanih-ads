slug: lps-gram-negative-dysbiosis-systemic-inflammation
statement: Gram-negative bacterial overgrowth in the gut releases lipopolysaccharide
  (LPS), which translocates into the bloodstream and acts as a potent systemic inflammatory
  trigger via NF-κB, even without overt gut symptoms or elevated WBC count.
evidence_tier: strong
rationale: LPS-induced metabolic endotoxemia is well-established in peer-reviewed
  literature (Cani et al., 2007, Diabetes). LPS can translocate via chylomicron-mediated
  transport and through tight junction gaps. Systemic LPS activates TLR4, leading
  to NF-κB activation and low-grade chronic inflammation.
coaching_translation: Gut bacteria imbalance can silently drive inflammation throughout
  your entire body — in your joints, brain, thyroid — even when you have no obvious
  digestive symptoms.
