slug: mayo-hot-flash-hormone-therapy-conventional-baseline
statement: Systemic oestrogen — alone after hysterectomy, with progestogen otherwise
  — remains the most effective hot-flash treatment per Mayo, but is contraindicated
  in clients with history of breast cancer, oestrogen-sensitive cancer, stroke, blood
  clots, or active liver disease and should be the lowest effective dose for the shortest
  duration.
