slug: high-dose-statin-nnt-33
statement: For an intermediate-risk patient (7.5% 10-year ASCVD risk), a high-dose
  statin provides a 43% relative risk reduction in heart attacks, but the number needed
  to treat is 33.
evidence_tier: strong
rationale: 'The document provides explicit numerical calculation: relative risk reduction
  of 43% corresponds to an NNT of 33, meaning 32 of 33 patients receive no benefit
  while all are exposed to potential side effects.'
coaching_translation: Even on a high-dose statin, out of 33 people with similar risk
  profiles, only 1 will actually avoid a heart attack. The other 32 get no benefit
  but still face all the possible side effects.
caveats:
- Calculated for an intermediate-risk (7.5% 10-year ASCVD) patient specifically.
- Higher-risk patients will have lower NNTs and greater absolute benefit.
