slug: sklar-tsh-fertility-optimal-range
statement: For fertility and pregnancy outcomes the optimal TSH range is roughly 0.5-2.0
  mIU/L — meaningfully tighter than the standard reference range of 0.4-4.0 used by
  most labs. TSH between 2.5 and 4.0 ("normal" by lab flag) is associated with lower
  implantation rates and higher early miscarriage rates, particularly in the presence
  of TPO antibodies. Free T3, free T4, reverse T3 and TPO / thyroglobulin antibodies
  belong on the panel — not TSH alone.
