slug: relaxation-techniques-benefit-multiple-conditions
statement: In scholarly research, practicing relaxation techniques has benefited individuals
  with anxiety, depression, heart disease, high blood pressure, insomnia, chemotherapy-induced
  nausea, pain in children and adolescents, smoking cessation, and temporomandibular
  joint dysfunction.
evidence_tier: plausible_emerging
rationale: Consistent with published literature on mind-body interventions. Evidence
  quality varies by condition — strongest for anxiety, hypertension, and insomnia.
  Document does not cite specific studies for this list.
coaching_translation: Relaxation techniques aren't just for reducing stress — they
  have been studied and shown to help with a wide range of conditions, from insomnia
  and anxiety to high blood pressure and pain.
caveats:
- No specific studies cited by author in this section; general scholarly reference.
- Evidence strength varies considerably by condition
- No specific study citations provided in document for this list
