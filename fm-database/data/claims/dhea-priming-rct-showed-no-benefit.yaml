  location: minute 06:00 — Palter on testosterone priming RCT
  quote: There was a really huge study just published this month where they randomized
    people to testosterone or not as priming, hundreds if not 1000 women, and they
    showed absolutely no benefit whatsoever.
rationale: Important counter-evidence to Fett's pro-DHEA framing — coach should hold
  both perspectives.
