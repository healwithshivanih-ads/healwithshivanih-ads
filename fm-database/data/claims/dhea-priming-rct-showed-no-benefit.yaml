slug: dhea-priming-rct-showed-no-benefit
statement: A large recent randomised controlled trial (hundreds to ~1000 women) showed
  no benefit from testosterone or DHEA priming before IVF. This challenges enthusiastic
  DHEA recommendations, particularly for women with low BMI in whom androgen priming
  may be harmful. Many clinicians who previously used DHEA routinely have walked back
  the recommendation in light of this data.
