slug: glutamine-repairs-gut-epithelium
statement: L-glutamine is the primary amino acid for rebuilding gut epithelial cells
  and is a key nutritional intervention in the Repair phase of leaky gut treatment.
evidence_tier: plausible_emerging
rationale: Glutamine is the primary fuel for rapidly dividing enterocytes and is widely
  used in critical care and functional medicine for gut repair. Multiple studies support
  its role in gut barrier maintenance, though large-scale RCTs in outpatient leaky
  gut are limited.
coaching_translation: Glutamine is an amino acid that acts like fuel for the cells
  that line your gut, helping them repair and maintain a strong barrier.
caveats:
- Source is expert consensus. Dose and duration not specified in the source document
  — verify with clinician.
- Contraindicated or requires caution in clients with certain cancers or severe renal
  impairment.
