slug: sulfur-required-for-phase2-sulfation
statement: Sulfur-containing amino acids are required for Phase 2 sulfation, a key conjugation pathway for detoxifying xenobiotics
  and endogenous compounds including hormones.
evidence_tier: plausible_emerging
rationale: Sulfation is a well-established Phase 2 conjugation pathway using 3'-phosphoadenosine-5'-phosphosulfate (PAPS)
  as sulfate donor, derived from cysteine/methionine metabolism. This is biochemically well-established; FM-specific claims
  about supplementation dosing are less robustly evidenced.
coaching_translation: Sulfur — found in eggs, garlic, onions, and cruciferous vegetables — is the raw material for a specific
  detox pathway (sulfation) that your liver uses to process hormones, drugs, and toxins.
caveats:
- Expert lecture source (moderate quality). Sulfation biochemistry is well-established; optimal dietary sulfur intake for
  detox optimization is less clearly defined.
