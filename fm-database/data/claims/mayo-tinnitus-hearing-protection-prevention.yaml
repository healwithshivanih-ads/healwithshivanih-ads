slug: mayo-tinnitus-hearing-protection-prevention
statement: Wearing ear protection in environments above 85 dB (power tools, concerts,
  motorbikes, lawn mowers, gym classes with loud music) and turning personal audio
  device volume below 60 percent are the strongest preventive measures for tinnitus
  and noise-induced hearing loss.
