sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Hay Fever chapter, p 1005-1006
  quote: A highly bioavailable enzymatically modified form of isoquercitrin (EMIQ)
    has been developed. This form has shown significant effects in improving some
    of the symptoms of hay fever in double-blind clinical studies. Total ocular score
    and ocular itching score were significantly lower for the EMIQ group than for
    the placebo group.
