slug: hay-fever-emiq-quercetin-mast-cell-stabilization
statement: Quercetin stabilizes mast cells and basophils, preventing histamine release.
  The enzymatically modified isoquercitrin (EMIQ) form is far more bioavailable than
  standard quercetin. In double-blind trials, 100 mg EMIQ twice daily for 8 weeks
  during pollen season significantly reduced ocular symptoms of hay fever versus placebo.
evidence_tier: plausible_emerging
