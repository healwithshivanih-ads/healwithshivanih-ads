slug: acupuncture-aids-stroke-self-care-recovery
statement: Clinical research shows acupuncture can help post-stroke patients perform
  self-care better, reduce nursing care needs, reduce rehabilitation therapy requirements,
  and lower overall healthcare costs. Proposed mechanisms include stimulation of nerve
  cell regrowth, improved nerve cell function, reduction of post-stroke inflammatory
  reactions, and prevention of nerve cell death. Given its safety profile and meaningful
  benefits, acupuncture is a reasonable adjunct to conventional rehab.
evidence_tier: plausible_emerging
