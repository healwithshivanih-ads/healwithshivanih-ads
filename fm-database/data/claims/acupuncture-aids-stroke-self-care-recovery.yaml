  quote: Acupuncture can often help stroke patients perform self-care better, can
    mean that patients require less nursing care and less rehabilitation therapy,
    and can possibly cut health care costs. Possible mechanisms of its effects include
    stimulation of nerve cell regrowth, facilitation of improved nerve cell function,
    reduction of poststroke inflammatory reactions, and prevention of nerve cell death.
rationale: In India, easy to find qualified TCM practitioners in tier-1 cities. Pair
  with physiotherapy and speech therapy, not as a substitute.
