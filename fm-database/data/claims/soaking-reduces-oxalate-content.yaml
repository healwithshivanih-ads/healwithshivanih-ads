slug: soaking-reduces-oxalate-content
statement: Soaking followed by cooking can reduce oxalate levels in high-oxalate foods.
evidence_tier: plausible_emerging
rationale: Noonan & Savage 1999 (cited in document) and subsequent studies confirm
  that soaking and boiling leach water-soluble oxalates out of plant foods, reducing
  bioavailable oxalate load.
coaching_translation: If you need to eat oxalate-rich foods like spinach or legumes,
  soak them first and cook in fresh water — this lowers the oxalate load.
