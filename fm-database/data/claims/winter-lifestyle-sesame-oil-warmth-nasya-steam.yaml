slug: winter-lifestyle-sesame-oil-warmth-nasya-steam
statement: Winter lifestyle practices include using rich warm oils (sesame) for daily self-massage and
  weekly scalp oiling, protecting ears and neck from cold, practising nasya (oiling the nose) and using
  a humidifier, taking moderate daily exercise, and sitting in steam rooms or warm baths at least weekly.
evidence_tier: fm_specific_thin
rationale: Cold, dry winter air penetrates the body through sensory openings (nose, ears) and dries the
  skin; warm oiling and steam provide the moisture and warmth that counteract winter's vata-aggravating
  qualities and support the respiratory and nervous systems.
coaching_translation: Encourage clients to add a sesame oil scalp massage weekly in winter, oil their
  nasal passages before sleep, and take warm baths regularly. These simple rituals prevent the dry skin,
  cracking joints, and winter lethargy that signal vata imbalance.
out_of_scope_notes: ''
caveats:
- Traditional Ayurvedic dinacharya practices; oil massage has some evidence for skin barrier support;
  nasal oiling as a mucosal defence practice is traditional.
