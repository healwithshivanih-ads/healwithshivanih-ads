slug: paradox-fluctuation-interpreted-as-hypoxia
statement: Hadanny and Efrati's review formally establishes that at the cellular level,
  fluctuations in free oxygen concentration — not the absolute level — drive HIF-1-alpha
  expression. Cells interpret the change from normoxia to hypoxia OR the change from
  hyperoxia back to normoxia as an oxygen shortage, inducing HIF-1-regulated gene
  synthesis. The proposed mechanism involves reactive oxygen species availability
  and scavenger enzymes (glutathione peroxidase, superoxide dismutase) influencing
  PHD-mediated hydroxylation of HIF-1-alpha.
evidence_tier: strong
