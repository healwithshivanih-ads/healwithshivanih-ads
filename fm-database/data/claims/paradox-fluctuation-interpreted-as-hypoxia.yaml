sources:
- id: hadanny-efrati-2020-hyperoxic-hypoxic-paradox
  location: Section 4.1 Hypoxia-Inducible Factor
  quote: It has been proposed that the relative changes in oxygen availability rather
    than constant hypoxia or hyperoxia have a more dominant effect on HIF expression.
    According to this hypothesis, the cells interpret the change from normoxia to
    hypoxia or the change back to normoxia following a hyperoxic exposure as an oxygen
    shortage and induce HIF-1-regulated gene synthesis.
rationale: Peer-reviewed anchor for the paradox mechanism cited across the catalogue.
