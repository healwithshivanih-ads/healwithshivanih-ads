slug: oral-infection-increases-cvd-risk
statement: Teeth and mouth infections increase cardiovascular disease risk.
evidence_tier: plausible_emerging
rationale: Periodontal disease is associated with elevated systemic inflammatory markers
  (CRP, fibrinogen) and increased CVD risk in observational studies, but causal RCT
  evidence is limited.
coaching_translation: Good oral hygiene and treating dental infections may help protect
  the heart — another reason to keep up with dental care.
caveats:
- Source lists this as a risk factor without citation; evidence is plausible but not
  fully consensus-level.
- Associative, not proven causal in RCTs.
- Source does not cite specific studies.
