slug: caffeine-alcohol-tobacco-are-acid-forming
statement: Caffeine, alcohol, and tobacco all produce an acid-forming effect in the
  body.
evidence_tier: plausible_emerging
rationale: There is reasonable evidence that alcohol and tobacco increase metabolic
  acid load and promote systemic inflammation. Caffeine's net effect on urinary pH
  is acknowledged in some literature. The claim is directionally plausible though
  the clinical magnitude for caffeine is debated.
coaching_translation: Alcohol, caffeine, and tobacco all tip the body toward a more
  acid environment — reducing or eliminating these supports a more balanced internal
  state.
caveats:
- Source is expert consensus/lecture, not primary literature.
- Caffeine's acid-forming effect is less consistently supported than that of alcohol
  and tobacco.
