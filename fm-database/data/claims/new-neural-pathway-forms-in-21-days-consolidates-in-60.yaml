slug: new-neural-pathway-forms-in-21-days-consolidates-in-60
statement: A new neural pathway takes approximately 21 days to form and 60 days to consolidate into habitual behaviour, and
  this applies to overcoming negative thought patterns, insomnia, and depression.
evidence_tier: plausible_emerging
rationale: The 21-day habit formation figure originates from Maxwell Maltz's observations; neuroscience research suggests
  18–254 days depending on complexity (Lally et al., 2010, European Journal of Social Psychology). The underlying neuroplasticity
  principle is well-supported; the specific 21/60 day timeline is an approximation.
coaching_translation: When you start a new healthy habit or thought pattern, give it at least 21 days before judging whether
  it's working — that's roughly how long it takes for new brain wiring to start forming. After 60 days, it starts to feel
  automatic.
caveats:
- 21-day figure is an approximation; research suggests variability
- Source is expert lecture
