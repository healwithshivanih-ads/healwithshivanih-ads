- id: ewers-energy-blueprint-podcast-2026
  location: Podcast — Adversity in child development
  quote: My kids do not have enough adversity in their lives. My job is not to make
    you happy — my job is to give you the tools to be able to manage life when it
    is inevitably unhappy and challenging for you.
