slug: adversity-required-for-resilient-development
statement: Healthy childhood development requires adequate adversity to build skill,
  resilience, and the post-traumatic-growth capacity. Over-protective parenting that
  buffers children from all challenge — well-intentioned helicoptering — tends to
  produce dysfunctional adults lacking the cognitive and emotional tools to manage
  inevitable life challenges. The parental mandate is to give children the tools to
  handle unhappiness and challenge, not to ensure they never encounter either. This
  mirrors hormetic principles in biology — bones, muscles, mitochondria, and immune
  systems all require challenge to mature.
evidence_tier: plausible_emerging
