slug: high-carbohydrate-refined-diet-is-nearly-100pct-acid-forming
statement: A diet dominated by refined carbohydrates (bread, pasta, rice, sugar, cakes,
  pizza, cereal) is almost entirely acid-forming.
evidence_tier: plausible_emerging
rationale: Refined carbohydrate-heavy diets are associated with higher net acid excretion
  and pro-inflammatory dietary patterns in several observational and mechanistic studies.
  The characterization as 'almost 100% acid' is a rhetorical emphasis rather than
  a precise metabolic measurement, but the directional claim is plausible.
coaching_translation: When most of your carbohydrates come from refined sources like
  white bread, pasta, and sugar, the vast majority of your diet is pushing your body
  toward a more acidic state. Swapping in whole foods tips the balance back.
caveats:
- '''Almost 100% acid'' is rhetorical; actual acid load varies by food and individual.'
- Source is expert consensus/lecture, not primary literature.
