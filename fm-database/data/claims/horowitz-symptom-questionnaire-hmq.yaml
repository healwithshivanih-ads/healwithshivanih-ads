slug: horowitz-symptom-questionnaire-hmq
statement: The Horowitz-Borrascano Lyme symptom questionnaire (HMQ), validated in
  a 1,600-patient cohort across three medical practices with SUNY researchers (published
  2017), gives a clinical pre-test probability of Lyme disease. Score above 63 = high
  probability; 35-62 = moderate probability; 25-34 = possible; below 25 = unlikely.
  Symptoms graded mild/moderate/severe across fatigue, migratory joint pain, muscle
  pain, nerve pain, sleep, cognitive, mood, and autonomic categories. Free at canigetbetter.com.
  Used as a triage tool BEFORE ordering blood work in suspected chronic Lyme.
evidence_tier: plausible_emerging
