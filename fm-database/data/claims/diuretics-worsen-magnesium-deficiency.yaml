slug: diuretics-worsen-magnesium-deficiency
statement: Diuretic medications increase urinary magnesium excretion, worsening magnesium deficiency and potentially blunting
  their blood pressure benefits over time.
evidence_tier: strong
rationale: Well-documented pharmacological effect; loop diuretics and thiazides are known to increase renal magnesium wasting.
caveats:
- Medication management is outside coaching scope.
out_of_scope_notes: Discuss medication-driven depletion with prescribing clinician, not in coaching sessions.
coaching_translation: Some blood pressure medications actually lower your magnesium levels, making it even more important
  to address nutrition and supplementation with your doctor.
