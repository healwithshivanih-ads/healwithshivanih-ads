slug: garlic-infused-oil-avoids-fructans
statement: Garlic-infused oil delivers garlic flavour without the fructan content
  because fructans (the FODMAP) are water-soluble and do not transfer into oil.
evidence_tier: strong
rationale: Fructans are water-soluble compounds that do not leach into oil. This is
  a well-established principle endorsed by Monash University FODMAP guidelines.
coaching_translation: You can use garlic-infused oil freely for flavour during the
  low FODMAP phase without triggering symptoms — the problematic fructans stay behind
  in the water phase.
