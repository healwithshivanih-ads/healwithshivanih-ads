slug: cortisol-steal-depletes-sex-hormones-under-stress
statement: During chronic inflammation or sustained stress, pregnenolone is preferentially
  shunted to cortisol production (cortisol steal), leading to elevated serum cortisol
  and simultaneously low DHEA-S, testosterone, progesterone, and estrogen.
evidence_tier: plausible_emerging
rationale: The biochemical pathway is established (pregnenolone → 17-OH-pregnenolone
  → cortisol). Clinical evidence for 'cortisol steal' as a meaningful clinical entity
  in humans is emerging but not consensus-level; mechanism is biologically plausible.
coaching_translation: When a client has high stress/inflammation AND low hormones,
  the cortisol steal pattern may be at play. Addressing inflammation and stress FIRST
  — through diet, sleep, movement, and stress practices — is essential before jumping
  to hormone support.
caveats:
- '''Cortisol steal'' as a discrete clinical diagnosis has limited dedicated RCT evidence;
  it is biologically plausible but categorized as plausible_emerging.'
- Source is expert consensus lecture.
