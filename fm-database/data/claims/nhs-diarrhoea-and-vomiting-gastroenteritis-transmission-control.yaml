slug: nhs-diarrhoea-and-vomiting-gastroenteritis-transmission-control
statement: Stay off school or work until 48 hours after the last episode of diarrhoea
  or vomiting, do not prepare food for others, hot-wash soiled laundry separately
  and skip swimming pools for at least 48 hours after recovery.
