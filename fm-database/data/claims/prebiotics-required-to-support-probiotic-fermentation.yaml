slug: prebiotics-required-to-support-probiotic-fermentation
statement: Prebiotic fiber (such as inulin) must be provided alongside probiotics,
  as gut bacteria require fiber to ferment and survive — but prebiotics should be
  withheld in SIBO.
evidence_tier: plausible_emerging
rationale: Prebiotics (fermentable fibers) are the substrate for beneficial bacteria.
  Without them, probiotic bacteria cannot sustain themselves in the gut. However,
  in SIBO, prebiotic fiber will feed the excess bacteria and worsen the condition,
  so timing and clinical context are critical.
coaching_translation: Always pair probiotic recommendations with fiber-rich foods
  or a prebiotic supplement — but NOT if your client has SIBO. In SIBO, wait until
  the overgrowth is cleared first.
caveats:
- Source is expert lecture, moderate quality.
- SIBO diagnosis requires lab confirmation — coaches should not make this determination
  alone.
- Individual fiber tolerance varies; start low and increase gradually.
