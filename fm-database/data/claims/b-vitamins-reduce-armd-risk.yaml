slug: b-vitamins-reduce-armd-risk
statement: A combination of folic acid (2.5 mg/day), pyridoxine (50 mg/day), and cyanocobalamin
  (1 mg/day) given for 7.3 years reduced the manifestation of ARMD in female patients
  with high cardiovascular risk by 34–41%.
evidence_tier: plausible_emerging
rationale: Based on the Women's Antioxidant and Folic Acid Cardiovascular Study (WAFACS);
  the mechanism likely involves homocysteine reduction and improved microvascular
  function in the retina.
coaching_translation: B-vitamin supplementation (folate, B6, B12) may provide additional
  ARMD protection, particularly in women with cardiovascular risk — included in a
  comprehensive eye health protocol.
caveats:
- Cyanocobalamin doses of 1 mg/day are pharmacological; methylcobalamin may be preferable
  for some individuals
- Clinical trial was in women with high CV risk — may not generalise to all populations
