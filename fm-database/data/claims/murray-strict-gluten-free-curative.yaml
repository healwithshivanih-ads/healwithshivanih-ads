  quote: Usually with gluten elimination, clinical improvement will be obvious within
    a few days or weeks (30% respond within three days, another 50% within a month,
    and 10% within another month). However, 10% of patients respond only after 24
    to 36 months of gluten avoidance. If a patient does not appear to respond, either
    the diagnosis is not correct or there may be some obstacle to a cure, such as
    zinc deficiency.
