slug: permission-to-relax-shifts-nervous-system
statement: Explicitly giving oneself permission to relax — verbalizing it or acknowledging
  the right to rest — can itself initiate a nervous system shift.
evidence_tier: fm_specific_thin
rationale: This is a practitioner-level insight consistent with cognitive-behavioral
  and acceptance-based frameworks (e.g., ACT), where labeling and permitting an experience
  reduces resistance. Direct neurophysiological evidence for this specific framing
  is thin; it is plausible and common in FM/coaching practice.
coaching_translation: Sometimes simply saying out loud — or even just thinking — 'I
  am allowed to rest' can help the body start to shift out of overdrive. Awareness
  itself can be medicine.
caveats:
- Source is practitioner discussion, not a cited peer-reviewed study.
- Treat as coaching tool; not a substitute for clinical treatment of anxiety or trauma.
