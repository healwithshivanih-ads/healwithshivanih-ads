slug: chappus-sherr-methylene-blue-sympathetic-spiral-of-doom
statement: Sherr names two principal upstream drivers of mitochondrial dysfunction
  — insulin resistance (chronic glucose flux generates excessive ATP plus reactive
  oxygen species that deplete antioxidants over time) and the "sympathetic spiral
  of doom" (persistent fight-or-flight tone with chronically elevated cortisol, epinephrine,
  and norepinephrine stressing the mitochondria). Both must be addressed at the lifestyle
  level alongside any methylene blue intervention; otherwise symptoms recur on cessation.
