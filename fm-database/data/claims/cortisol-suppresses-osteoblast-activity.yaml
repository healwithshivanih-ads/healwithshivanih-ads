slug: cortisol-suppresses-osteoblast-activity
statement: Chronically elevated cortisol — whether from prescription corticosteroids
  (inhalers, oral, topical) or endogenously from chronic stress — directly suppresses
  osteoblast (bone-building cell) activity and accelerates osteoclast (bone-resorbing
  cell) activity. Stress management, sleep hygiene, and addressing the source of chronic
  activation are essential adjuncts to any bone protocol. Inhaled corticosteroid users
  are particularly often overlooked in osteoporosis risk assessment.
evidence_tier: strong
