slug: selenium-200mcg-reduces-tpo-antibodies-hashimotos
statement: Selenium supplementation at 200 mcg/day reduces anti-TPO antibody titers
  and normalizes thyroid activity in Hashimoto's thyroiditis, particularly in patients
  with high baseline antibody levels.
evidence_tier: strong
rationale: Selenium's role as a cofactor for glutathione peroxidase in thyroid follicles,
  and clinical trials showing TPO antibody reduction, are both well-supported. Pizzorno
  cites 200 mcg/day as the standard Hashimoto's dose.
coaching_translation: Selenium (200 mcg a day) can quiet the antibody attack on your
  thyroid in Hashimoto's — especially helpful when your anti-TPO numbers are high.
  Two Brazil nuts a day is roughly this amount.
caveats:
- Long-term doses above 400 mcg/day raise toxicity risk (selenosis).
- Effect is most pronounced when baseline antibody titers are elevated.
- Combine with adequate iodine — selenium without iodine can worsen hypothyroidism.
