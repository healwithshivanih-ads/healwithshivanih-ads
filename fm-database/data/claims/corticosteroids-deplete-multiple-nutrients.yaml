slug: corticosteroids-deplete-multiple-nutrients
statement: Corticosteroids used in IBD stimulate protein catabolism, decrease calcium
  and phosphorus absorption, increase urinary excretion of ascorbic acid, calcium,
  potassium, and zinc, and increase requirements for vitamins B6, folate, and vitamin
  D.
evidence_tier: strong
rationale: These are pharmacologically well-characterised drug-nutrient interactions
  documented across multiple sources; clinically significant in long-term IBD steroid
  use.
coaching_translation: Clients on long-term steroid therapy should be supported with
  extra calcium, vitamin D, vitamin C, zinc, potassium, and B-vitamins under clinician
  guidance.
caveats:
- Bone loss from steroids requires concurrent calcium + vitamin D + vitamin K2 support;
  clinician-supervised
