slug: vitamin-e-oil-vaginal-application-helps-itching
statement: Topical vitamin E oil or suppository applied vaginally may help relieve
  vaginal itching and dryness in perimenopausal and menopausal women.
evidence_tier: fm_specific_thin
rationale: Vitamin E has antioxidant and moisturising properties and is sometimes
  used as a topical treatment for vaginal atrophy and dryness. Some small studies
  support its use for vulvovaginal symptoms, but evidence is not robust enough to
  be consensus-level.
coaching_translation: Vitamin E oil applied vaginally is a gentle, accessible option
  your client can try for itching or dryness. Suggest they look for products formulated
  for vaginal use and check with their clinician.
