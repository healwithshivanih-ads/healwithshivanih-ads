slug: chronic-nsaid-dependence-is-discouraged-for-knee-pain
statement: Chronic NSAID dependence should be avoided for knee pain, with focus instead
  on reducing inflammation and improving joint function naturally.
evidence_tier: confirm_with_clinician
rationale: Long-term NSAID use has documented GI, renal, and cardiovascular risks;
  however, changing medication management is outside coaching scope.
out_of_scope_notes: NSAID management is prescribing clinician scope. Coaches should
  not advise stopping or reducing prescribed medications.
caveats:
- Source is a practitioner cheatsheet without primary citations.
- Do not advise clients to stop prescribed NSAIDs without clinician involvement.
- Never advise clients to stop or reduce prescribed NSAIDs without clinician guidance.
