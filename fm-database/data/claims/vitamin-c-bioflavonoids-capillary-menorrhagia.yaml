slug: vitamin-c-bioflavonoids-capillary-menorrhagia
statement: Vitamin C 200 mg three times daily plus bioflavonoids reduced menorrhagia
  in 14 of 16 patients in a 1960 study — through dual mechanisms of capillary fragility
  reduction and enhanced iron absorption from food. Useful adjunct alongside iron
  repletion in nutritional menorrhagia.
