slug: lycopene-cooked-tomato-prostate-cancer-protection
statement: Lycopene from cooked tomato products is the single carotene most clearly
  linked to prostate cancer protection. Men in the highest dietary lycopene quintile
  (≥6.5 mg per day) had 21% reduced overall prostate cancer risk and 86% reduced risk
  of advanced disease (Harvard). Cooked tomato paste/sauce provides up to 5× the bioavailable
  lycopene of raw tomato; absorption is further improved when consumed with oil. Supplementation
  at 15 mg per day slowed tumor growth and reduced PSA in existing disease. Lycopene's
  anticancer effect is amplified when paired with vitamin E (90% reduction in proliferation
  in vitro vs lycopene alone).
