  location: Chapter 86 — Prostate Cancer (Prevention), pg 1431-1432
  quote: The men who had the greatest amounts of lycopene in their diet (6.5 mg per
    day) showed a 21% decreased risk of prostate cancer compared with those eating
    the least. When the researchers looked at only advanced prostate cancer, the high-lycopene
    group had an 86% decreased risk. In a study of patients with existing prostate
    cancer, lycopene supplementation (15 mg per day) was shown to slow tumor growth.
rationale: Cooked is better than raw for lycopene. Coach Indian men to use tomato-based
  sabzis, sambar, rasam — naturally aligned. Pair with olive oil/ghee for absorption.
  Single best food-first intervention in prostate prevention.
