slug: three-factors-required-for-autoimmunity
statement: 'Autoimmune disease requires three co-factors: genetic predisposition,
  environmental antigen exposure, and increased intestinal permeability — all three
  must be present simultaneously.'
evidence_tier: plausible_emerging
rationale: Directly attributed to Dr. Fasano's published model. Well-supported for
  celiac disease (HLA-DQ2/DQ8, gluten, leaky gut); extrapolation to all autoimmune
  conditions is biologically plausible and widely cited in functional medicine but
  not uniformly validated by RCTs.
coaching_translation: Having the genes for an autoimmune condition is not enough on
  its own. Your gut barrier is a crucial third factor — and it's one you can work
  on.
out_of_scope_notes: Genetic testing (HLA-DQ2/DQ8) and autoimmune antibody interpretation
  are clinician-scope.
caveats:
- Source is expert consensus / lecture, not primary literature. The three-factor model
  originates from Fasano's research but this document does not cite a specific study.
- Applicable to celiac disease with strong evidence; extrapolation to all autoimmune
  diseases is plausible but less established.
- Evidence is strongest for celiac disease; application to all autoimmune conditions
  is plausible but not universally peer-reviewed.
- Genetic testing (HLA-DQ2/DQ8) and autoimmune diagnosis are outside coaching scope.
