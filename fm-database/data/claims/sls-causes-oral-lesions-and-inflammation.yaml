slug: sls-causes-oral-lesions-and-inflammation
statement: Sodium lauryl sulfate (SLS/SLES) in toothpaste can cause chronic oral lesions
  (canker sores), cracking at the corners of the mouth, tissue irritation, inflammation,
  and may trigger hypersensitivity to certain metals.
evidence_tier: plausible_emerging
rationale: Some clinical evidence supports SLS as a trigger for recurrent aphthous
  stomatitis; the hypersensitivity claim is FM-specific with thin peer-reviewed support.
coaching_translation: If you get recurring mouth ulcers or irritation, switching to
  an SLS-free toothpaste may help.
caveats:
- Source is an educational toolkit. SLS-canker sore link has some supporting literature
  but is not consensus.
