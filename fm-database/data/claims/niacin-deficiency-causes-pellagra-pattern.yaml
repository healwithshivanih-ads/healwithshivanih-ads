slug: niacin-deficiency-causes-pellagra-pattern
statement: Niacin deficiency leads to pellagra with dermatitis, diarrhea, and dementia.
evidence_tier: plausible_emerging
rationale: The pellagra triad (dermatitis, diarrhea, dementia) from niacin deficiency is a well-established clinical observation
  historically.
coaching_translation: The 'three Ds' of pellagra (skin rash, digestive issues, cognitive changes) are classic signs of severe
  niacin deficiency — flag for clinician if suspected.
caveats:
- Severe pellagra is rare in high-income countries; subclinical niacin insufficiency is more commonly relevant.
- Source is practitioner cheatsheet; clinical niacin deficiency diagnosis requires clinician assessment.
