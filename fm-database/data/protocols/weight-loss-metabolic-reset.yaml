notes_for_coach: |
  Don't skip baseline labs — fasting insulin + HOMA-IR + fasting glucose +
  HbA1c + lipid panel + DEXA or InBody if available. Re-test at week 8 +
  end of 12. The story you tell from the lab data is the most motivating
  thing for clients in this protocol. NEVER prescribe extended fasts (24h+)
  to women — disrupts cycle + cortisol.
