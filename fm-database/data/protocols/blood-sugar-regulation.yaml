notes_for_coach: |
  The food-sequencing (veg-first) habit alone delivers significant glucose
  improvements — emphasise this single behaviour as the highest-leverage
  change. CGMs are extremely motivating — recommend if client can afford
  one for 1 month. Don't stack with weight-loss-metabolic-reset — pick one;
  this one is gentler.
