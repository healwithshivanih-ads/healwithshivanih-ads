  - vitamin-c
expected_outcomes:
  - Reduced lightheadedness on standing within 1-2 weeks (most clients)
  - Longer standing tolerance (queues / showers / kitchens become bearable)
  - Reduced palpitations + brain fog
  - Sleep more restorative (head-of-bed elevation + magnesium)
  - Recumbent exercise base built for eventual upright reintroduction (week 8+)
cautions:
  - 'NEVER prescribe upright cardio in the first 12 weeks. Walking / spin / standing yoga can worsen POTS for months. Recumbent ONLY.'
  - 'Salt loading is non-trivial in clients with BP issues or kidney disease — verify with prescriber first.'
  - 'Compression must be put on BEFORE standing for the day (not after symptoms hit). Train the routine: socks before feet hit the floor.'
  - 'POTS often co-travels with MCAS + EDS. Screen both. The triad needs parallel attention; addressing only POTS misses the cluster.'
