slug: pots-first-30-days
display_name: POTS / Orthostatic Intolerance — First 30 Days
aliases:
  - pots-protocol
  - orthostatic-intolerance-protocol
  - dysautonomia-starter
  - pots-non-pharmacological
category: other
summary: |
  A 30-day non-pharmacological protocol for clients with suspected or
  confirmed POTS / orthostatic intolerance. Coach scope is enormous in
  POTS — most clients improve substantially with salt, fluids,
  compression, recumbent exercise, and posture adjustments BEFORE any
  medication is needed. Medication is cardiologist scope; this protocol
  supports while the client gets specialist workup if not yet done.
indications:
  - postural-orthostatic-tachycardia-syndrome
  - dysautonomia
  - orthostatic intolerance
  - NASA lean test ΔHR ≥ 30 bpm
  - lightheaded / pre-syncope on standing
  - palpitations on standing
  - exercise intolerance with HR climbing on minimal exertion
contraindications:
  - heart failure (refer; salt + fluid loading contraindicated)
  - kidney disease stage 3+ (refer for individualised fluid + salt plan)
  - uncontrolled hypertension (refer; salt loading inappropriate)
  - eating disorder history (salt + fluid framing needs careful handling)
typical_duration_weeks: 4
phases:
  - name: 'Week 1 — Hydration + salt foundation'
    weeks: 1
    summary: |
      The single highest-yield intervention in POTS is plasma volume
      expansion via salt + fluid. Start aggressive; track HR daily;
      most clients feel meaningfully better in 5-10 days.
    key_actions:
      - Salt loading 3-5 g/day on TOP of normal diet (under clinician supervision if BP-sensitive)
      - Fluid 2.5-3 L/day, sipped continuously not gulped
      - Electrolyte blend or salt water with lemon morning + afternoon
      - Daily morning supine HR + standing HR (1 min + 5 min) — diary
      - Avoid prolonged standing / hot showers / large meals (all worsen)
  - name: 'Week 2 — Compression + sleep position'
    weeks: 1
    summary: |
      Add compression garments + head-of-bed elevation to support the
      vascular work salt + fluids start. Both are passive — easy to
      sustain.
    key_actions:
      - Waist-high compression garments 20-30 mmHg (worn from morning through evening)
      - Head of bed elevated 4-6 inches (blocks under feet of bed, not just pillow)
      - Continue Week 1 salt + fluid + diary
      - Add magnesium glycinate 200-400 mg evening (POTS clients often deficient + improves sleep)
      - Cooling techniques (face fan, cool cloth) for any standing > 10 min
  - name: 'Week 3 — Recumbent exercise (start tiny)'
    weeks: 1
    summary: |
      POTS clients deteriorate with upright cardio but can build
      tolerance with recumbent exercise. Start at minutes, not 30-min
      sessions. ROWING / SWIMMING / RECUMBENT BIKE only — no walking,
      no spin class, no standing yoga.
    key_actions:
      - Recumbent bike or rowing — 5 min daily, very low resistance
      - Build by 1 minute every 3 days as tolerated (Levine / Dallas protocol pacing)
      - Pool walking / swimming counts (water is its own compression)
      - NO upright cardio yet — that comes after 8-12 weeks of recumbent base
      - Continue all Week 1-2 interventions
  - name: 'Week 4 — Reassess + plan next phase'
    weeks: 1
    summary: |
      Coach + client review HR diary, standing tolerance, symptom
      diary. If well controlled non-pharmacologically, continue
      maintenance. If symptoms persist, escalate to cardiologist for
      pharmacotherapy (midodrine / ivabradine / fludrocortisone).
    key_actions:
      - Review 30-day HR + symptom diary
      - Re-run NASA 10-min lean test in session; compare to intake baseline
      - If improved + tolerable, continue maintenance protocol
      - If significant symptoms persist, refer for cardiology workup
      - Screen for MCAS + EDS overlap if not done — POTS rarely travels alone
