sources:
  - id: coach-shivani
    location: Coach observation — POTS first-30-days protocol design
    quote: 'Salt + fluids + compression + recumbent exercise improve most POTS clients meaningfully in 30 days. Medication is escalation, not first line — and the coach can hold the whole non-pharmacological piece.'
evidence_tier: strong
notes_for_coach: |
  POTS clients are often gaslit for years before diagnosis — be careful
  with "just push through" language. Frame everything as "your nervous
  system is trying to protect you; we're teaching it that standing is
  safe again." The recumbent exercise base (Levine / Dallas protocol)
  has the strongest evidence — emphasise pacing not push-through.
  Track Δ-HR weekly on the lean test; improvement is usually visible
  by week 3.
