notes_for_coach: |
  Most demanding protocol in the catalogue — only suggest when client has
  diagnosed autoimmune + has expressed willingness to commit. Indian
  vegetarian clients struggle most (no eggs, dal, paneer, most dals + spices)
  — for them consider the modified AIP with rice + dal-free legumes.
  Recommend a Wahls Protocol variant if neurological autoimmune (MS).
