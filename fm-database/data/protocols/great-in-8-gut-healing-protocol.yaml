- Maintenance & Fun
foods_to_emphasise:
- vegetables
- berries
- quality proteins
- healthy fats
foods_to_remove:
- common inflammatory foods per personalised elimination (gluten, dairy, high-FODMAP as needed)
- processed foods and emulsified additives
supplements_typically_used:
- probiotics-lactobacillus-bifidobacterium
- saccharomyces-boulardii
- probiotic-spore-based
- digestive-enzymes
- betaine-hcl
- berberine
- oregano-oil
- artemisia
- nac
- iberogast
- ashwagandha
- vitamin-d3
expected_outcomes:
- reduced bloating/gas and normalised bowels
- improved energy, mood and sleep
- identification of personal food and carb tolerances
- minimal long-term supplement program
cautions:
- escalate only if not improving — do not add every tool at once
- start at the minimum dose; more is not better
- herbal antimicrobials and elemental diet should have clinician oversight
- distinguish transient die-off (resolves in days–1 week) from allergy (persists)
