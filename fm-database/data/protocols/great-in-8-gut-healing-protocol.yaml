notes_for_coach: 'Advancement logic: if satisfied after Step 1–2, skip to Step 5; Steps 3 and 4 are always
  done together; everyone completes Steps 5–8. The whole-program sequencing is clinical-experience-based
  (fm_specific_thin) though many individual components (probiotics, low-FODMAP, elemental diet) have stronger
  evidence. Coaching scope: coaches can educate on the arc, diet/lifestyle steps, and tracking; herbal
  antimicrobials, HCl, elemental diet and any medication changes are clinician-directed.'
