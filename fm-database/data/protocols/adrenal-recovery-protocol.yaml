notes_for_coach: |
  Most under-prescribed protocol — many clients with weight-loss goals
  actually need this FIRST. Look for the trio: tired-but-wired, evening
  second wind, and morning fatigue. Once the HPA is reset, weight loss
  and other goals work much better. Saliva 4-point cortisol or DUTCH is
  the gold standard test — share with referring physician.
