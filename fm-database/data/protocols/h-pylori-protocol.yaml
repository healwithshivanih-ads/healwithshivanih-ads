notes_for_coach: 'H. pylori is one of the few gut conditions where the FM protocol

  runs WITH conventional care, not instead of it. If a clinician has prescribed

  triple therapy, this protocol''s Phase 1 supplements (especially S. boulardii)

  improve eradication rates and cut antibiotic side-effects — frame it that way

  to the client. Mastic gum, broccoli-sprout sulforaphane, and S. boulardii are

  the three best-evidenced agents. The single biggest cause of "it came back" is

  an untreated household member — always raise family screening. Confirm with a

  test before starting, and insist on a retest 4+ weeks after antimicrobials

  finish. If the client is still symptomatic after a negative retest, move them

  onto the 5R gut protocol — the infection is gone but the gut still needs

  rebuilding.

  '
