- betaine-hcl
- digestive-enzymes
expected_outcomes:
- reduced epigastric pain + burning within 3–5 weeks
- reduced bloating, nausea, and reflux as the load drops
- negative retest (urea breath / stool antigen) 4+ weeks after antimicrobials
- improved appetite + energy as gastric function recovers
- restored stomach acid + digestion by the end of Phase 3
cautions:
- H. pylori diagnosis, virulence assessment, and any antibiotic triple therapy
  are clinician scope — the coach supports diet, lifestyle, and adjunct supplements.
- Always confirm the infection with a test before running this protocol — do not
  treat presumptively.
- Retesting is non-negotiable — symptoms can settle while the infection persists.
- Never start betaine HCl during the active / repair phases — acidifying an
  inflamed or ulcerated stomach can cause serious harm.
- Re-infection from untreated household members is the most common cause of
  "treatment failure" — screen the family.
