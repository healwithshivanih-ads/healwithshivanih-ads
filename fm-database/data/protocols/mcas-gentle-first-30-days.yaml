sources:
  - id: coach-shivani
    location: Coach observation — MCAS first-30-days protocol design
    quote: The first 30 days for an MCAS client is about CALMING, not curing. Quarter-doses, slow titration, low-histamine baseline, no detox. The next layers only work once the system is calmer.
evidence_tier: plausible_emerging
notes_for_coach: |
  Common failure mode: coach starts at full doses to "get results fast,"
  client crashes within a week, loses trust. The discipline of quarter-
  dose titration is the protocol. Pace the client even slower than feels
  necessary — these clients are sensitised to every intervention.
  Pair with screening for POTS + EDS overlap; the MCAS-POTS-EDS triad
  needs all three addressed in parallel, not separately.
