expected_outcomes:
  - Reduced frequency of flushing / hives / palpitations within 2-3 weeks
  - Quieter baseline reactivity (fewer "I reacted to a new thing" incidents)
  - Clearer picture of which foods are personally tolerable vs not (post-reintroduction)
  - Better sleep + reduced morning histamine load (helps next-phase protocols be tolerable)
cautions:
  - 'NEVER skip the quarter-dose titration. Quercetin and curcumin can paradoxically trigger MCAS in sensitive clients — start at 250 mg, titrate over 3 weeks if tolerated.'
  - 'AVOID adding multiple supplements in one week. One change at a time. The point is to find what stabilises THIS client.'
  - 'NO aggressive detox / sauna at high heat / vigorous lymph drainage during this phase. Mast cells are unstable; aggressive intervention triggers flares.'
  - 'If client is on cromolyn / ketotifen / famotidine / montelukast, do NOT advise stopping. Coach scope is supportive; medication is prescriber territory.'
