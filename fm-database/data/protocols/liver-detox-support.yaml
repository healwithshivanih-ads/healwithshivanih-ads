notes_for_coach: |
  Most clients don't realise how much the liver mediates skin, hormones,
  and energy. Pair this with the cooking adjustments protocol (cast iron,
  ghee swap) for environmental toxin reduction. Don't recommend more
  aggressive "detoxes" (juice cleanses, master cleanse) — they're
  counterproductive and can mobilise toxins faster than excretion handles.
