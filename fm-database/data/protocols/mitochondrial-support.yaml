notes_for_coach: |
  Hardest protocol to coach because clients want to push and feel "normal".
  The most important thing you can do is set expectations: 8–12 weeks
  minimum, slow progress, no pushing through. Watch for post-exertional
  malaise (PEM) — that's the signal to back off 30% on activity. Pair with
  adrenal recovery if HPA dysfunction is also present.
