- irritable-bowel-syndrome
linked_to_mechanisms:
- sibo-dysbiosis
linked_to_symptoms:
- bloating
- abdominal-pain
sources:
- id: ruscio-healthy-gut-healthy-you-2018
  quote: Hypoallergenic pre-digested liquid diet; matches corticosteroids for IBD remission (Cochrane);
    normalised SIBO breath test in ~80%.
  location: Ch 18 — The Liquid-Elemental and Semielemental Diets
evidence_tier: plausible_emerging
notes_for_coach: Strong (Cochrane-level) evidence for inducing IBD remission; SIBO/IBS use is plausible_emerging.
  Semielemental works as well as full elemental and is more filling (better for underweight clients).
  Exclusive courses beyond a few days are clinician-supervised.
