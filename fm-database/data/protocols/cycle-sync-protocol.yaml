notes_for_coach: |
  Best taught with a paper cycle-tracking sheet for the first 3 months.
  Coaches see most dramatic results in PMS-heavy clients + perimenopausal
  women. For lunar-cycle proxy in post-menopause, use day 1 = new moon.
  Seed cycling is the most-asked-about + most-Googled element — explain
  the rationale clearly (lignans + phytoestrogens) so clients commit.
