  - mecfs-pacing-protocol
  - post-viral-fatigue-protocol
category: mitochondrial_support
summary: |
  A 30-day pacing-first protocol for clients with post-exertional
  malaise (PEM) from ME/CFS, long COVID, or other post-viral fatigue
  syndromes. The cardinal intervention is STOPPING the crash cycle.
  Conventional graded exercise therapy is HARMFUL in these clients;
  this protocol uses energy-envelope pacing, mitochondrial micronutrient
  support, and screens for treatable mimics (sleep apnoea, thyroid,
  anaemia, celiac).
indications:
  - post-exertional-malaise-mecfs
  - long COVID with PEM pattern
  - ME/CFS (any duration)
  - post-viral fatigue syndrome
  - "crashes for hours / days after exertion that used to feel normal"
  - HRV consistently low + non-restorative sleep
contraindications:
  - active acute illness — defer protocol; treat acute first
  - undiagnosed cardiac symptoms — refer cardiology first
  - undiagnosed orthostatic intolerance with severe presyncope — POTS workup first
typical_duration_weeks: 4
phases:
  - name: 'Week 1 — STOP the crash cycle'
    weeks: 1
    summary: |
      Reduce activity to 50% of perceived current baseline. Sounds
      counterintuitive — feels worse for 3-4 days then noticeably
      better. Most clients have been "pushing through" for months and
      the system never gets a chance to recover.
    key_actions:
      - Pace at 50% of perceived capacity all week — even on "good days"
      - Daily HRV (Oura / Whoop / Garmin / Polar) — if HRV is low for the day, REST that day
      - 'Symptom diary — morning energy, afternoon dip, post-activity crash'
      - Sleep priority — same bedtime + wake time + dark room + cool temp
      - NO new exercise; NO push-throughs; NO "I'll just do this one thing"
  - name: 'Week 2 — Mitochondrial foundation'
    weeks: 1
    summary: |
      Add core mitochondrial support stack at moderate doses. Most
      clients notice subtle improvement in 10-14 days; if no change,
      the doses are right but need 4-6 more weeks to compound.
    key_actions:
      - CoQ10 (ubiquinol) 100-200 mg morning with food
      - Magnesium glycinate 200-400 mg evening
      - B-complex 1 daily (methylated forms preferred if MTHFR suspected)
      - D-ribose 5g three times daily (key PEM-specific addition)
      - L-carnitine 1-2 g daily (split doses, before exercise time-blocks)
      - Continue Week 1 pacing
  - name: 'Week 3 — Gentle horizontal exercise (only if pacing solid)'
    weeks: 1
    summary: |
      ONLY if Week 1-2 pacing held + HRV trending up: introduce
      restorative-style movement. Recumbent / horizontal / supported
      ONLY. ABSOLUTELY NO graded exercise therapy. If client crashes,
      drop back to Week 1 pacing and re-attempt in 2 weeks.
    key_actions:
      - Restorative yoga / yin yoga 10-15 min daily
      - Recumbent bike 5 min OR pool walking 10 min, alternating days
      - Build by 1 minute every 5 days IF no PEM the next day
      - Continue mitochondrial stack
      - HRV diary continues; rest day if HRV drops
  - name: 'Week 4 — Reassess + plan next layer'
    weeks: 1
    summary: |
      Coach + client review 30-day energy envelope. Identify treatable
      mimics still in play (sleep apnoea, thyroid, anaemia, celiac).
      Decide next protocol layer — usually 5R if gut suspect, or
      MCAS + POTS protocols if triad overlap.
    key_actions:
      - 30-day HRV trend review
      - Re-check labs if any treatable mimic suspected
      - Screen MCAS + POTS overlap if not done (the triad commonly co-travels)
      - Continue mitochondrial stack as maintenance
      - Plan next protocol layer — depend on what the diary surfaced
