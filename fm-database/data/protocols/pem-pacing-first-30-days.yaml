expected_outcomes:
  - Reduced crash frequency within 2-3 weeks
  - Better HRV trend
  - Some clients describe a "ceiling lift" — pre-pacing they were stuck at 40% of normal capacity; pacing + mito stack often brings ceiling to 60-65% in 30 days
  - Identify treatable mimics (apnoea, anaemia, celiac) often missed in primary care
  - Build a baseline from which slower reintroduction of activity is possible
cautions:
  - 'NEVER advise graded exercise therapy or "push through to deconditioning." Wrong exercise advice can crash a PEM client for weeks. Pacing is the intervention.'
  - 'If client has acute worsening or new neurological symptoms, refer urgently — could be a new clinical event, not just PEM.'
  - 'D-Ribose may slightly lower blood sugar in diabetics on insulin at high doses (>15 g) — monitor.'
  - 'Screen for + treat mimics aggressively in Week 4. Apnoea / anaemia / hypothyroid / celiac can present as PEM-like fatigue but respond to specific treatment.'
