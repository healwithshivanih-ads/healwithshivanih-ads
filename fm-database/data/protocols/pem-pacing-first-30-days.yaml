sources:
  - id: coach-shivani
    location: Coach observation — PEM pacing protocol design
    quote: 'The first 30 days for a PEM client is about STOPPING the crash cycle, not building capacity. The mitochondrial stack supports; pacing IS the intervention. Wrong exercise advice in the first month can cost months of recovery.'
evidence_tier: strong
notes_for_coach: |
  PEM clients have often been gaslit by multiple providers and pushed
  into harmful graded exercise. Trust + pacing-first framing is the
  whole game. The mitochondrial stack supports but pacing is what
  changes the trajectory. Track HRV objectively — clients often
  underestimate their energy ceiling. Screen MCAS + POTS overlap;
  long-COVID typically presents as the triad, not isolated PEM.
