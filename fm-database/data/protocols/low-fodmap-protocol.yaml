notes_for_coach: |
  Best supported by research of all elimination diets (Monash University
  data). Use when clients have a clear pattern of symptoms triggered by
  FODMAP foods, especially when SIBO is suspected. The Monash FODMAP app is
  essential — recommend it during the welcome conversation.
