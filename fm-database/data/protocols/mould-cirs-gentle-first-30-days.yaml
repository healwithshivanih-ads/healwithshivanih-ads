expected_outcomes:
  - Improvement only happens with SOURCE REMOVAL — protocol without source removal is symptom management at best
  - Reduced brain fog + fatigue if source is removed + binders started
  - Identification of MCAS overlap (very common — mould activates mast cells)
  - Decision point at Week 4 on whether specialist Shoemaker-protocol referral is needed
cautions:
  - 'SOURCE REMOVAL IS THE PROTOCOL. Binders + antioxidants without removing the mould source is symptom whack-a-mole. Help client understand the urgency of remediation.'
  - 'Aggressive detox is harmful. NO sauna at high heat, no high-dose vitamin C IV, no aggressive cleanses. These mobilise toxins faster than binders can clear → makes client feel worse.'
  - 'Mast cells often co-activate in mould exposure. If MCAS symptoms emerge during this protocol, layer the MCAS gentle protocol over the top, do NOT push through.'
  - 'CIRS is genetically partly determined (HLA-DR). Some clients clear mycotoxins poorly; specialist workup may include genetic testing.'
