notes_for_coach: |
  Coach scope is supportive only. The Shoemaker protocol (full CIRS
  treatment with cholestyramine, VIP nasal spray, etc.) is
  clinician-led — rare in India, often teleconsult. Coach handles
  source-removal education, gentle binders, antioxidant foundation,
  symptom diary. If client genuinely has CIRS, refer for specialist
  workup at Week 4 if not improving.
