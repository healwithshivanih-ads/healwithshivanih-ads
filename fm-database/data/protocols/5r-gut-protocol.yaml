notes_for_coach: |
  This is the most-used FM protocol in coaching practice. Most clients see
  meaningful change between weeks 6–10. If no improvement by week 8, suspect
  unaddressed infection (H. pylori, parasites, SIBO) or a missed trigger
  food — refer to functional-medicine-trained physician for stool + breath
  testing.
