summary: 'Structured 3-6 month preconception window targeting modifiable inputs to
  oocyte maturation. The biological rationale is that oocytes spend approximately
  90-120 days transitioning from primordial to ovulatory follicle, during which mitochondrial
  replication, energy production, chromosome alignment, and antioxidant defenses can
  be supported or disrupted. Core preconception levers: prenatal multivitamin with
  adequate folate, vitamin B12, vitamin B6 (started 3+ months pre-conception); CoQ10/ubiquinol
  for mitochondrial energy; melatonin (IVF only) and other antioxidants for oxidative
  stress; myo-inositol for PCOS/insulin resistance; DHEA for DOR; vitamin D repletion;
  Mediterranean-pattern diet with low glycemic load; systematic avoidance of BPA,
  phthalates, and trans fats; screening for hypothyroidism (including TPO antibodies)
  and celiac disease.'
