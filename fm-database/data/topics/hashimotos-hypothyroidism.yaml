coaching_scope_notes: Coaches can support Hashimoto's clients through anti-inflammatory
  dietary strategies (gluten-free, AIP, dairy elimination), gut healing protocols
  (5R), stress management, selenium/zinc/vitamin D optimization, and sleep hygiene.
  Antibody testing, medication, and lab interpretation must be referred to a clinician.
clinician_scope_notes: Diagnosis requires elevated Anti-TPO and/or Anti-Tg antibodies
  plus TSH/free T4. Ultrasound may reveal structural changes. Levothyroxine or NDT
  are standard pharmacological options. LDN use in AIT is an emerging area with no
  published RCTs specific to AIT as of document date.
evidence_tier: strong
