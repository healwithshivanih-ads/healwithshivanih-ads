slug: hashimotos-hypothyroidism
display_name: Hashimoto's Hypothyroidism
aliases:
- Hashimoto's disease
- autoimmune thyroiditis
- chronic lymphocytic thyroiditis
- Hashimoto's thyroiditis
- autoimmune hypothyroidism
- AIT
summary: An autoimmune disorder in which the immune system produces antibodies targeting
  thyroid peroxidase (TPO) and thyroglobulin (Tg), leading to chronic thyroid inflammation,
  progressive tissue destruction, and ultimately hypothyroidism. The most common cause
  of hypothyroidism in developed countries.
common_symptoms:
- fatigue
- weight-gain
- cold-intolerance
- constipation
- brain-fog
- depression
- dry-skin
- brittle-hair
- hair-loss
- irregular-menstrual-cycles
- joint-pain
- hoarse-voice
- goiter
- infertility
- anxiety
- muscle-aches
- hoarseness
red_flags:
- Goiter with compressive symptoms (difficulty swallowing/breathing)
- Elevated TPO antibodies with worsening symptoms
- Pregnancy complications
- infertility or recurrent miscarriage
- cardiovascular complications (high cholesterol, hypertension)
- goiter with difficulty swallowing
- pregnancy complications
