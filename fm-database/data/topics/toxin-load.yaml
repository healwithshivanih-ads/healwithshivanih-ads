slug: toxin-load
display_name: Toxin Load
aliases:
- body burden
- chemical body burden
- toxicant burden
summary: 'Toxin load is the cumulative result of lifetime toxicant exposures

  minus the body''s capacity to biotransform and excrete them. Whether

  a given exposure produces symptoms depends on lifetime exposure,

  potency, the chemical cocktail effect of multiple low-dose toxicants

  combining synergistically, and individual susceptibility (genetic

  variants, nutrient status, mitochondrial function, gut and excretory

  health). Even low-dose chronic exposures can have non-linear effects,

  with immune, neurological, gastrointestinal, and endocrine systems

  typically affected first.

  '
