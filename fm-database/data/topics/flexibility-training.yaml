coaching_scope_notes: 'Stretch only warm muscles — never cold. Cue "mild tightness,
  not pain"

  as the stretching endpoint for beginners. Clients with joint laxity

  need conservative ROM targets; clients with stiffness benefit from

  longer holds and assisted techniques.

  '
clinician_scope_notes: 'Assisted stretching to complete ROM should involve a qualified
  trainer

  or physiotherapist, especially for clients with hypermobility, recent

  injury, or post-surgical recovery.

  '
