summary: 'Stretching practice to maintain or restore joint range of motion. Key

  considerations are joint laxity, balance, pain, and ensuring muscles

  are warm before stretching. Beginner: stretch to the point of mild

  muscle tightness, towel/strap assisted, 2–3 days per week, 10–20

  minutes. Intermediate: progress to maximum unassisted ROM, 2–3 days per

  week, 20–30 minutes. Advanced: assisted stretching to complete ROM with

  a qualified trainer or PT, 2–3 days per week, 20–30 minutes.

  '
