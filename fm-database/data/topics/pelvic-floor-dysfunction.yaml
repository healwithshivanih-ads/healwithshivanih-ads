summary: The pelvic floor is a hammock-like sling of muscles, fascia, and ligaments
  forming the floor of the abdominal core cylinder (diaphragm = roof, transverse abdominis
  + obliques + multifidus = walls, pelvic floor = floor). It supports pelvic organs
  (bladder, uterus, rectum in women; bladder, prostate, rectum in men), maintains
  continence, supports sexual function, contributes to core stability, and modulates
  intra-abdominal pressure. Dysfunction exists on a spectrum — hypertonicity (too
  much resting tone, "tight ass" pattern presenting as pelvic pain, dyspareunia, erectile
  dysfunction in 90 percent of cases per Danielson's clinical experience, urge incontinence,
  chronic low back pain) versus hypotonicity (too little tone, presenting as stress
  incontinence on cough/sneeze/jump, prolapse, urge incontinence). Prolapse is graded
  1-4 with grades 1-2 reversible through conservative care; grades 3-4 typically require
  surgical intervention. Affects approximately 1 in 5 US women (over 30 million) but
  is heavily under-discussed across both sexes; men with erectile dysfunction are
  often medicated rather than evaluated for pelvic muscle tone. Conservative-care
  pillars — diaphragmatic breathing (the pelvic floor takes cues from the diaphragm),
  posture (60 percent body weight on heels, 40 percent on metatarsals), sip-hydration
  (rapid water consumption triggers antidiuretic hormone suppression and excretion),
  and direct pelvic-floor neuromuscular retraining with biofeedback or ball-pressure
  tools.
