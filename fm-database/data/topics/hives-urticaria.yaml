summary: Hives are histamine-driven wheal-and-flare skin lesions from mast cell or
  basophil degranulation. Acute hives resolve in under six weeks; chronic hives persist
  beyond. In adults the leading triggers are drugs (penicillin family, aspirin/NSAIDs),
  food allergies, food additives (tartrazine, benzoates, sulfites, BHT/BHA), Candida
  overgrowth, chronic infections, stress, and low/autoimmune thyroid. Up to 85% of
  chronic-hives patients show gut digestive dysfunction (low gastric acid, altered
  motility) that increases allergen absorption. Functional medicine work-up focuses
  on elimination diet, additive avoidance, gut/digestion repair, and treating thyroid
  antibodies when present.
