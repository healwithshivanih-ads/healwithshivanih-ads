coaching_scope_notes: |
  Coach scope is LARGE here but requires care. Frame: "Your body learned
  to be on guard at a time when that was protective. We're going to teach
  it that it's safe now." Focus on nervous system REGULATION, not
  exposure work. Tools: (1) breathwork (resonance breathing 5.5 breaths/
  min, physiological sigh, box breathing); (2) somatic practices (body
  scan, progressive muscle relaxation, gentle yoga); (3) vagal tone work
  (humming, gargling, cold-face immersion); (4) HRV biofeedback (Oura /
  Polar); (5) sleep priority + consistent rhythm; (6) blood-sugar
  stability (cortisol-glucose coupling); (7) gentle adaptogens
  (ashwagandha — CAUTION if MCAS overlap; rhodiola, holy basil);
  (8) magnesium glycinate + B-vitamins. Refer for trauma therapy (EMDR,
  somatic experiencing, IFS) when client is ready — coach scope is
  regulation, not processing.
clinician_scope_notes: |
  Trauma therapy is mental-health professional domain. Active PTSD,
  major depression, suicidality, dissociative symptoms, eating
  disorders → refer to psychiatrist / psychologist. Coach can hold
  protocol space alongside therapy but never instead of it. Avoid
  "doing the work" of trauma processing in coaching sessions.
