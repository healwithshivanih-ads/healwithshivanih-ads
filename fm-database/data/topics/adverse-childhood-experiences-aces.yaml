summary: |
  Adverse experiences before age 18 — abuse, neglect, household
  dysfunction, prolonged loss or instability — durably reshape the
  HPA axis, immune system, and inflammatory tone. The original CDC-Kaiser
  ACE study showed dose-dependent links between ACE score and adult
  outcomes: autoimmune disease, depression, addiction, heart disease,
  diabetes, chronic pain. Functional medicine framing: chronic
  allostatic load → hypercortisolism (initially) → adrenal blunting →
  elevated inflammatory cytokines → leaky gut + mast cell instability +
  insulin resistance. Not deterministic — but a critical lens for any
  client whose symptoms began around a major life event or who reports
  "I've felt this way my whole life."
