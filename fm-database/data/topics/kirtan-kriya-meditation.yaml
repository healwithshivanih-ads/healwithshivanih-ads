summary: A 12-minute Kundalini-yoga chanting meditation in which the practitioner
  repeats the syllables Sa-Ta-Na-Ma while touching thumb to each fingertip in sequence.
  Backed by an unusually large clinical literature for a free contemplative practice
  — multiple peer-reviewed studies report improvements in memory, cerebral blood flow
  on SPECT, telomere length, cortisol regulation, and markers of inflammation when
  practised daily for 8-12 weeks. Sandison positions it as a high-leverage daily stress-management
  practice for clients with cognitive decline or family history of dementia — no equipment,
  no cost, 12 minutes per day. Coach uses it as a low-friction "minimum effective
  dose" prescription for stress-pillar work.
