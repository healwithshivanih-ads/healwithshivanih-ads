summary: Leading cause of blindness in US adults 20–64 years. Retina is damaged by microhemorrhages, scarring, and protein
  glycosylation. Within 20 years of diagnosis, 80% of T1DM and 20% of T2DM have significant retinopathy.
evidence_tier: strong
common_symptoms:
- blurred-vision
- macular-degeneration
