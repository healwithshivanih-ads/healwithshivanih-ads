- diabetic-neuropathy
key_mechanisms:
- glucotoxicity
- sorbitol-accumulation
- protein-glycosylation
- microvascular-damage
coaching_scope_notes: Bilberry extract (160–320 mg/day), grapeseed/pine bark extract. Optimal glycemic control is primary
  prevention. Laser treatment and clinical management by ophthalmologist.
