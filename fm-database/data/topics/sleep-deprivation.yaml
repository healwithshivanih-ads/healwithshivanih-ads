coaching_scope_notes: 'Coach educates on sleep hygiene (consistent bedtime, sleep
  ritual,

  bedroom for sleep and sex only, no electronics in the last hour),

  asks about dream recall as a quality marker, suggests a food-mood-

  energy-sleep journal, and frames sleep as foundational rather than

  optional. Coach does NOT diagnose sleep disorders.

  '
clinician_scope_notes: 'Sleep apnea screening (overnight oximetry, polysomnography),

  pharmacological sleep aids, and treatment of underlying psychiatric

  or neurological causes belong to the clinician.

  '
