summary: Knee pain patterns are categorized into degenerative, autoimmune, post-injury,
  gout-related, metabolic, and hormonal subtypes. Nutritional and anti-inflammatory
  approaches vary by root cause.
common_symptoms:
- joint-redness-and-warmth
- reduced-mobility
- joint-stiffness-and-swelling
red_flags:
- paralysis
- severe neurological symptoms
- unresponsive inflammatory arthritis requiring rheumatological care
- gout requiring urate-lowering therapy
- rheumatoid-arthritis-diagnosis
- gout-diagnosis
- fracture
- severe-trauma
related_topics:
- chronic-inflammation
- insulin-resistance
- gut-dysbiosis
- autoimmunity-leaky-gut-triad
- nutrition-deficiency
- pcos
key_mechanisms:
- oxidative-stress
- gut-barrier-and-nutrient-absorption
- calcium-trafficking-and-bone-mineralization
coaching_scope_notes: Categorize by root cause before recommending supplements. Anti-inflammatory
  dietary pattern, movement, weight management, and food-first approach are coaching-appropriate.
  Autoimmune, gout, and severe structural joint concerns require clinician referral.
clinician_scope_notes: RA factor, anti-CCP, ANA, uric acid, X-ray, and MRI are relevant
  depending on the subtype.
