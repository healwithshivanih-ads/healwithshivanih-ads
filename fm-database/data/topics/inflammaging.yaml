summary: Inflammaging refers to the chronic, low-grade, sterile inflammation that
  accumulates with biological aging. It underlies virtually every chronic disease
  state and is accelerated by poor metabolic health, mitochondrial dysfunction, declining
  sex hormones, and gut barrier disruption.
common_symptoms:
- fatigue
- joint pain
- brain fog
- muscle pain
- skin rashes
- eczema
- psoriasis
- increased food sensitivities
- recurrent infections
red_flags:
- new autoimmune diagnosis in midlife
- persistent fatigue unresponsive to rest
- rapidly worsening food intolerances
- recurrent infections
