coaching_scope_notes: 'Coaches can support lifestyle factors that modulate inflammaging:
  dietary fiber, polyphenols, sleep hygiene, nervous system regulation, and stress
  management. Do not diagnose or interpret labs.'
clinician_scope_notes: HRT, low-dose naltrexone, peptide therapy, and GLP-1 agonists
  discussed in this session require clinician oversight and prescribing.
