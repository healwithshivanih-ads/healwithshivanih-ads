coaching_scope_notes: Coaches can educate on food sources of EPA/DHA and the importance
  of a balanced omega-6:omega-3 ratio.
clinician_scope_notes: Supplemental fish oil dosing (EPA/DHA) should be individualized;
  higher doses may affect bleeding and require monitoring.
