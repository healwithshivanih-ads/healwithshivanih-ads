slug: essential-fatty-acids
display_name: Essential Fatty Acids (Omega-3 & Omega-6)
aliases:
- EFAs
- omega-3
- omega-6
- EPA DHA
- ALA
summary: EFAs cannot be synthesized by the body and must be obtained through diet.
  Omega-3s (ALA, EPA, DHA) are anti-inflammatory; omega-6s (LA, AA) are pro-inflammatory
  at excess ratios. A dietary ratio of 4:1 (omega-6:omega-3) or lower may reduce inflammation
  and chronic disease risk. Emphasis on EPA/DHA from fatty fish.
