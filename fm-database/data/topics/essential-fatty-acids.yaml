summary: Essential fatty acids (omega-3 and omega-6) must be obtained from the diet. EPA and DHA omega-3s from fatty fish
  are most bioactive. Lowering the omega-6:omega-3 ratio (ideally ≤4:1) may reduce inflammation and chronic disease risk.
  Emphasis should be placed on increasing EPA/DHA intake.
