coaching_scope_notes: Coach can educate on food sources of EPA/DHA (fatty fish) and ALA (flaxseed, chia, walnuts). Emphasize
  increasing EPA/DHA-rich foods. Supplementation dosing requires clinician guidance.
clinician_scope_notes: Therapeutic omega-3 dosing for specific conditions is clinician scope.
