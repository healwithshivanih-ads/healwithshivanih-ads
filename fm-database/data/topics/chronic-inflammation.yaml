summary: Persistent, low-grade inflammation linked to heart disease, diabetes, autoimmune
  disorders, neurodegenerative disease, and cancer. Addressed in functional medicine
  via diet, nutraceuticals, and lifestyle modification targeting root causes.
common_symptoms:
- fatigue
- brain-fog
- bloating
- joint-pain
- skin-issues
- resistant-weight-gain
- mood-changes
red_flags:
- autoimmune flares
- active infection
- patients on steroids or biologics
- pregnancy and breastfeeding
- Unintentional weight loss with persistent inflammation — refer for cancer screening
- Severe joint swelling or organ involvement — refer to rheumatologist
