summary: Health promotion for school-age children in group settings focuses on experiential,
  child-led activities covering nutrition (eat the rainbow), healthy habits, sleep,
  emotional awareness, movement, and community connection. This differs from clinical
  coaching; the role is closer to facilitated wellness education.
