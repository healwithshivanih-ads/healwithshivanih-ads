coaching_scope_notes: With younger children, coaching parents is often more appropriate
  than direct child coaching. Group activities should be experiential, child-led,
  and age-appropriate (character strengths work better for ages 8+). Always confirm
  food allergy waivers before food-based activities.
clinician_scope_notes: Developmental, behavioral, or medical concerns in children
  should be referred to appropriate pediatric specialists.
