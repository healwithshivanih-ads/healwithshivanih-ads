coaching_scope_notes: Coaches can discuss food sources, lifestyle factors (sun exposure,
  BMI, age, skin tone) and general supplementation guidance. Specific dose titration,
  especially for chronic disease states, requires clinician oversight.
clinician_scope_notes: Functional range for 25-OH vitamin D is distinct from conventional
  sufficiency (30–100 ng/mL). Clinicians should assess functional optimal range. Dosing
  above 6,000 IU/day and management of chronic-disease dosing require clinician supervision.
