  location: Introduction / Vitamin D Overview
  quote: Vitamin D is a very important fat soluble vitamin. Primarily, it is produced when the sun's UV rays fall on our skin.
- id: vitaone-nutrition-toolkit
  location: 'Food Sources: Vitamin D'
  quote: Research indicates that the current RDAs may be too low for supporting optimal, non-skeletal health. Much higher
    intake may be required to maintain adequate blood levels.
- id: vitaone-health-coaching-toolkit
  location: 'Food Sources: Vitamin D'
  quote: Vitamin D helps the body absorb calcium and regulates both calcium and phosphorous levels in the blood. It plays
    an important role in bone growth and maintenance, influences cell growth and development, and is required for proper immune
    function.
