summary: Vitamin D3 (cholecalciferol) is a fat-soluble vitamin primarily produced
  in the skin via UV exposure and obtained from animal food sources. It undergoes
  hepatic and renal conversion to its active form (calcitriol) and plays critical
  roles in calcium absorption, bone mineralisation, immune modulation, cardiovascular
  health, neurotransmitter production, and musculoskeletal function.
