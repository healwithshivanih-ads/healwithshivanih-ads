key_mechanisms:
- leaky-gut
- chronic-inflammation
coaching_scope_notes: Coaches can support breastfeeding promotion, eliminating common
  allergenic foods (especially cow's milk, wheat, egg, peanuts, corn, citrus), avoiding
  bottle-propping, reducing secondhand smoke exposure, and watchful-waiting framing.
  Discuss xylitol chewing gum and humidification.
clinician_scope_notes: Antibiotic decisions, myringotomy tube placement, audiology
  testing, and evaluation of recurrent infections require clinician/ENT referral.
evidence_tier: strong
sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Otitis Media chapter, p 880-885
  quote: The role of allergies as the major cause of chronic otitis media has been
    firmly established in the research literature. Most studies show that 85 to 93%
    of these children have allergies. In most children with acute otitis media (70
    to 90%) the infection clears up by itself within 7 to 14 days.
