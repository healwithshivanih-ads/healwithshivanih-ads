slug: otitis-media
display_name: Otitis Media (Ear Infection)
aliases:
- ear infection
- middle ear infection
- glue ear
- chronic otitis media with effusion
- serous otitis media
summary: Inflammation and fluid accumulation in the middle ear, acute or chronic.
  Two-thirds of American children experience an episode by age two. The underlying
  mechanism is eustachian tube obstruction, usually downstream of food allergy (cow's
  milk most commonly), upper respiratory infection, secondhand smoke, or bottle-feeding
  while supine. 85 to 93% of children with chronic otitis media show allergy-driven
  patterns. 70 to 90% of acute cases resolve in 7 to 14 days without antibiotics.
common_symptoms:
