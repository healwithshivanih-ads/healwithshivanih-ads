slug: food-sensitivity-igg-iga-mediated
display_name: Food Sensitivity (IgG/IgA-Mediated)
aliases:
- delayed hypersensitivity food reaction
- type 3 hypersensitivity
- IgG food sensitivity
- IgA food sensitivity
summary: Food sensitivity is a delayed immune reaction (2 hours to 2 days post-exposure)
  mediated by IgG and IgA antibodies. The IgG half-life of 23 days means symptoms
  can persist and elimination diets must exceed 4 weeks for meaningful improvement.
  Strongly linked to intestinal permeability as the underlying root cause.
common_symptoms:
- fatigue
- brain-fog
- migraines
- headache
- abdominal-pain
- joint-pain
- joint-stiffness
- edema
- weight-gain-water-retention
- itching
- emotional-dysregulation
red_flags:
- Suspected anaphylaxis — refer immediately
- Persistent severe neurological symptoms — refer to clinician
related_topics:
- food-allergy-ige-mediated
- intestinal-permeability-leaky-gut
- food-intolerance
- autoimmune-conditions-igg-food-triggers
key_mechanisms:
- intestinal-permeability
- igg-antigen-immune-complex-complement-activation
- low-stomach-acid-antigen-load
coaching_scope_notes: Coaches can support elimination diets (minimum 4 weeks), gut
  healing, stress reduction, and microbiome support. IgG food sensitivity testing
  interpretation should involve a clinician.
clinician_scope_notes: Order total IgG first; if low, IgG food testing is not appropriate.
  Consider IgG subclass deficiency (e.g., steroid use, toxin exposure). Lab-to-lab
  variation is significant.
evidence_tier: plausible_emerging
