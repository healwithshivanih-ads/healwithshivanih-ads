slug: type-2-diabetes
display_name: Type 2 Diabetes Mellitus
aliases:
- T2DM
- type 2 diabetes
- non-insulin-dependent diabetes
summary: End-stage progression of insulin resistance characterised by overt hyperglycaemia
  (fasting glucose ≥126 mg/dL, HbA1c ≥6.5%), chronic hyperinsulinaemia coexisting
  with progressive β-cell apoptosis, and multi-system complications.
common_symptoms:
- persistent-fatigue
- peripheral-neuropathy
- frequent-urination
- blurry-vision
- frequent-infections
- erectile-dysfunction
- slow-wound-healing
red_flags:
- fasting glucose ≥ 126 mg/dL
- HbA1c ≥ 6.5%
- unintended weight loss
- severe neuropathy
- retinopathy
- renal impairment
related_topics:
- insulin-resistance
- metabolic-syndrome
- prediabetes
- blood-sugar-dysfunction
key_mechanisms:
- insulin-resistance
- pancreatic-beta-cell-dysfunction
- advanced-glycation-end-products
coaching_scope_notes: Coaches support lifestyle pillars alongside clinical management.
  Do not adjust medications. Refer for regular eye, kidney, foot exams.
clinician_scope_notes: Diagnose per ADA criteria. Initiate pharmacotherapy as appropriate.
  Screen for micro- and macrovascular complications. Consider LADA in atypical presentations
  (GAD antibodies).
evidence_tier: strong
sources:
