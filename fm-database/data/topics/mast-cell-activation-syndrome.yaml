coaching_scope_notes: 'Coach focuses on trigger identification (foods, heat, stress, friction),

  total-load reduction, and natural mast cell stabilizer education (quercetin,

  luteolin, vitamin C). Avoid claiming to treat or diagnose MCAS.

  '
clinician_scope_notes: 'Diagnosis and pharmaceutical management (H1/H2 blockers, cromolyn,

  leukotriene antagonists, ketotifen, omalizumab) belong to the immunologist

  or MCAS-literate clinician. Refer when symptoms affect 2+ organ systems and

  fail to respond to standard low-histamine dietary restriction.

  '
