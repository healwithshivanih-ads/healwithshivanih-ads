- hyper-reactive mast cell syndrome
summary: 'MCAS is a systemic immune condition where a normal number of mast cells are

  hyper-reactive, inappropriately releasing 200+ mediators including histamine,

  tryptase, leukotrienes, prostaglandins, and cytokines. Symptoms span multiple

  organ systems (skin, GI, cardiovascular, neurological, respiratory) and are

  episodic. Diagnosis is technically demanding because most mediators are

  unstable at room temperature — 24-hour urine collections and serum draws

  require an unbroken cold chain or results are falsely negative. Clinical

  criteria (Consensus 2) combine multi-system symptoms, elevated mediator

  evidence, and response to anti-mediator therapy.

  '
