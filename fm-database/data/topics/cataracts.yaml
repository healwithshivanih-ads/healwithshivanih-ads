summary: Cataracts are clouding of the crystalline lens of the eye caused by oxidative
  damage to lens proteins, leading to gradual vision loss. The lens depends on antioxidant
  enzymes (SOD, catalase, glutathione peroxidase) and dietary antioxidants (lutein,
  vitamins C and E, selenium, zinc) to prevent free-radical damage. In cataract formation
  these protective mechanisms fail. Risk rises with age, UV exposure, diabetes, smoking,
  heavy metal accumulation (cadmium), and low antioxidant status. Early lesions can
  be slowed or reversed with nutritional support; established cataracts may still
  require surgical extraction.
key_mechanisms:
