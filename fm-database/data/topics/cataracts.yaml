sources:
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 33 — Cataracts, pg 627-635
  quote: Cataracts are white, opaque blemishes on the normally transparent lens of
    the eye. They occur as a result of damage to the protein structure of the lens...
    In cataract formation, the normal protective mechanisms are unable to prevent
    free radical damage to the cells of the lens.
