summary: The gut-hormone axis describes the bidirectional relationship between the
  gut microbiome and sex hormones. Estrogen modulates the gut lining and microbiome
  composition, while gut bacteria regulate estrogen metabolism through enterohepatic
  circulation. Declining estrogen in perimenopause/menopause disrupts this axis.
common_symptoms:
- vasomotor symptoms (hot flashes, night sweats)
- weight gain around the abdomen
- new food sensitivities
- insulin resistance
- brain fog
- mood changes
- sleep disruption
- worsening gut permeability in menopause
- new food intolerances
- hormonal symptom flares
- increased inflammation with hormone decline
red_flags:
- Persistent or worsening hot flashes despite lifestyle intervention — may indicate
  need for clinical evaluation of HRT
- Unexpected weight gain with HRT initiation — may signal impaired estrogen detoxification
- symptoms suggesting hormone-driven autoimmune flare — refer to clinician
