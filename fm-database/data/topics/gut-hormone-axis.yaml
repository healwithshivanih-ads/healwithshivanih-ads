coaching_scope_notes: Coaches can discuss lifestyle factors that support the gut-hormone
  axis. HRT decisions belong with a clinician.
clinician_scope_notes: The gut-hormone axis includes phase 3 estrogen detoxification
  via gut bacteria (estrobolome). Dysbiosis can cause estrogen recirculation even
  in menopausal women. DUTCH testing and GI-MAP can help identify detoxification bottlenecks.
  HRT can positively shift the microbiome toward a premenopausal composition.
