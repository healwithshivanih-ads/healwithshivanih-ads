summary: All steroid hormones — including pregnenolone, progesterone, DHEA, testosterone,
  estradiol, and cortisol — are derived from cholesterol. Pregnenolone is the key
  intermediate that branches into progesterone, cortisol (via 17-hydroxypregnenolone),
  and DHEA (precursor to testosterone and estrogens). Optimal cholesterol levels are
  prerequisite for adequate hormone production.
