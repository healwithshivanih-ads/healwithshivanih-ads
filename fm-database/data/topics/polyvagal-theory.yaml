- ventral vagal dorsal vagal
summary: A neurophysiological model developed by Stephen Porges that frames the autonomic
  nervous system as a three-layered hierarchy rather than a simple sympathetic-parasympathetic
  binary. The dorsal vagal complex (oldest, evolutionarily) drives shutdown and dissociation
  under life-threat. The sympathetic system mobilises fight-or-flight. The ventral
  vagal complex (newest, myelinated, social engagement) supports rest, digest, connection,
  and recovery. Heart-rate variability is largely a window into ventral vagal tone,
  but during severe stress or sickness, paradoxical HRV increases can come from dorsal-vagal
  shutdown — the "vagal paradox" Porges first observed in NICU infants where rising
  HRV preceded bradycardic crashes. Useful for interpreting trauma responses, dysautonomia,
  POTS, and the apparent HRV-context mismatches seen in overtraining and burnout.
