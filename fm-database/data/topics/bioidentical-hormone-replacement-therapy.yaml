coaching_scope_notes: Coaches can educate clients about the role of nutrition and
  lifestyle in supporting hormone signaling. Prescribing, dosing, and lab interpretation
  are out of scope — refer to a trained hormone clinician.
clinician_scope_notes: BHRT requires individualized dosing guided by symptoms and
  labs (especially FSH). Delivery mode (oral, topical, vaginal, IM) affects absorption
  and metabolic profile. Clinician should also assess nutritional cofactors.
evidence_tier: strong
