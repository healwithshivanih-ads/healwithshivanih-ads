coaching_scope_notes: Coach the food-first recovery — adequate calories (often >2500
  kcal/day for active women), regular meals including carbohydrate, protein at every
  meal, healthy fats, full micronutrient nourishment. Coach rest, sleep, stress regulation.
  The lag time to period return can be 3-6 months even with everything right. Do NOT
  prescribe vitex or any cycle-regulating herb in active HA — first restore energy
  availability.
clinician_scope_notes: Clinician work-up rules out other amenorrhea causes (FSH/LH,
  prolactin, TSH/free T4, hCG, celiac, iron studies, vitamin D, ferritin). DEXA scan
  if amenorrhea >6 months. Refer to eating disorder specialist when relevant.
notes_for_coach: 'Briden: hypothalamic suppression is not a disorder — it is the brain''s
  intelligent adaptation. The treatment is to convince the hypothalamus that all is
  well. In Indian coaching context, watch for undereating in highly active women,
  restrictive ''clean eating'' patterns, and chronic stress; vegetarian protein adequacy
  and iron status frequently need attention.'
