slug: hypothalamic-amenorrhea
display_name: Hypothalamic Amenorrhea and Hypothalamic Suppression
aliases:
- hypothalamic suppression
- HA
- functional hypothalamic amenorrhea
- FHA
- undereating amenorrhea
summary: Hypothalamic amenorrhea (HA) is the brain's adaptive shutdown of regular
  ovulation when it perceives the body is unsafe to support pregnancy. Triggers include
  undereating (overall calories or specifically carbohydrates), overtraining, chronic
  stress, and illness. Milder forms (hypothalamic suppression) show up as shortened
  luteal phases or anovulatory cycles; more severe forms produce long cycles or complete
  absence of periods with low estrogen. Hypothalamic suppression is frequently misdiagnosed
  as PCOS, but the two conditions are physiologically opposite — HA has low or normal
  androgens and low/normal insulin, while PCOS has elevated androgens and (in the
  common subtype) insulin resistance. Treatment is to convince the hypothalamus conditions
  are safe — eat more, train less, rest more, correct nutrient deficiencies (especially
  zinc, iron, iodine), and address chronic stress.
common_symptoms:
- absent periods
- irregular periods
- long gaps between periods
- shortened luteal phase
- anovulatory cycles
- low libido
- cold intolerance
- low resting heart rate
- hair thinning
- stress fractures or low bone density
red_flags:
- Periods absent for >6 months — work-up needed to rule out POI (FSH >25), prolactinoma,
  thyroid disease
- BMI < 18.5 or rapid weight loss — refer for eating disorder assessment
- Concurrent low bone density on DEXA — clinician follow-up for fracture risk
