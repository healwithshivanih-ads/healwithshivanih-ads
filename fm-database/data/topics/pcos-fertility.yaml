coaching_scope_notes: Coaches can support dietary patterns, stress management, sleep
  hygiene, and protein targets (1.2–1.6 g/kg). Supplement protocols, lab interpretation,
  and thyroid management require clinician involvement.
clinician_scope_notes: Screen for thyroid autoimmunity. Assess cortisol:DHEA ratio.
  Pair lab data with food patterns and stress physiology. Endometriosis needs specialist
  imaging.
