summary: Leaf's reframing of type-2 diabetes — the root cause is STRUCTURAL cellular
  dysfunction (small under-used muscle tissue + overfilled lipid-overloaded fat cells),
  NOT a biochemistry problem of high glucose to be treated by lowering glucose. The
  fat-cell-overflow cascade — (1) lifetime calorie excess fills adipocytes to capacity;
  (2) cells withdraw insulin receptors as a SELF-PROTECTIVE mechanism (cells are intelligent,
  not defective); (3) pancreas pumps more insulin to force storage; (4) fat cells
  become lipid-overloaded, trigger local immune attack, release fatty acids back into
  blood; (5) lipotoxic fatty acids deposit in visceral and ectopic sites (liver =
  NAFLD, muscle, pancreas, heart) where they should never be. Muscle tissue handles
  80% of post-meal glucose disposal — small/sedentary muscle = no glucose sink. Coach
  implication — strength training + walking 12,000 steps + sleep + calorie alignment
  is the structural treatment; metformin / berberine / keto manage SYMPTOMS without
  changing structure.
