  quote: The more that you dig, the more that you realize that the cause of diabetes
    is fundamentally cellular dysfunction. Your cells are not structurally robust
    and because structure dictates function their function is no longer advantageous
    to your health. The most common cause of insulin resistance is because their fat
    cells have stored so much energy that the cell says hey I can't put more energy
    inside me so I'm going to shut myself off from insulin signal.
