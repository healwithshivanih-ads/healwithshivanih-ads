- molecular-mimicry
red_flags:
- patchy hair loss (rule out alopecia areata, tinea, traction)
- scarring hair loss (refer to dermatology — rare causes like discoid lupus)
- new hair loss with weight loss, fatigue, GI symptoms (workup celiac, hypothyroid,
  IBD)
coaching_scope_notes: Coaching role — work through the 5 drivers — ferritin (target
  ≥50 mcg/L), zinc, vitamin A, EFAs, gluten-free trial, glucose / insulin regulation,
  saw palmetto for androgen-driven pattern, thyroid screen + treat upstream causes
  (hypothyroidism). Refer focal alopecia and scarring patterns to dermatology.
clinician_scope_notes: Hair-pull test; ferritin, TSH/fT4/fT3 + TPO, IGF-1 + free T,
  anti-tTG antibody (more sensitive than antigliadin). Topical minoxidil; oral spironolactone
  (anti-androgen) for female pattern; finasteride off-label.
notes_for_coach: Pizzorno key insights — hair loss is one of the most reliable signs
  of hypothyroidism; ferritin (not just serum iron) is the test — below 30 mcg/L blocks
  hair regeneration; many women with hair loss have hypochlorhydria (use HCl with
  meals if mineral deficient despite supplementation); saw palmetto 320 mg standardised
  85-95% fatty acids/sterols inhibits 5-alpha-reductase like finasteride.
