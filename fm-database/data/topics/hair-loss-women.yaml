summary: Hair shedding above the normal cycle, classified as diffuse (telogen effluvium,
  female pattern, alopecia areata) or focal (tinea, traction, trichotillomania, scarring).
  Female pattern affects 30% of women before age 50. Five major treatable drivers
  — androgenic excess + insulin resistance (PCOS pattern), drug side effects, nutritional
  deficiency (zinc, vitamin A, EFAs, iron — especially low ferritin under 30 mcg/L),
  hypothyroidism (20% prevalence in American women, hair loss is a cardinal sign),
  and antigliadin antibodies / celiac disease (cross-reactive autoimmune attack on
  hair follicles → alopecia areata).
