summary: A broad clinical area encompassing atherosclerosis, coronary artery disease,
  cerebrovascular disease, peripheral vascular disease, heart failure, and cardiac
  arrhythmias. CVD is the major cause of morbidity and mortality driven by both modifiable
  and non-modifiable risk factors.
common_symptoms:
- chest-pain
- palpitations
- fatigue
- shortness-of-breath
- hypertension
- erectile-dysfunction
red_flags:
- acute chest pain
- uncontrolled hypertension (>140/90)
- history of myocardial infarction
- congestive heart failure diagnosis
- advanced retinopathy
- peripheral artery disease
- Uncontrolled hypertension
- History of myocardial infarction or acute coronary syndrome
- Congestive heart failure diagnosis
- Peripheral artery disease
- Advanced diabetic retinopathy
related_topics:
- hypertension
- insulin-resistance
- metabolic-syndrome
- dyslipidemia
- atherosclerosis
- beta-blocker-deprescribing
key_mechanisms:
- atherosclerosis
- systemic-inflammation
- insulin-resistance
- atheromatous-vascular-disease
- chronic-inflammation
coaching_scope_notes: Coaches can support modifiable risk factor reduction (diet,
  exercise, smoking cessation, stress management, weight management). Lab interpretation
  and medication management are out of coaching scope.
clinician_scope_notes: Clinician oversight required for lab interpretation (HS-CRP,
  HbA1c, Lp(a), homocysteine, ApoB), medication de-prescribing, and any diagnosis
  or treatment of CVD.
evidence_tier: strong
