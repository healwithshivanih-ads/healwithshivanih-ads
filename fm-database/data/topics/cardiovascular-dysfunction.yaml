- id: vitaone-health-coaching-toolkit
  location: CVD Risk Analysis
  quote: The cardiovascular diseases (CVDs) considered been the major cause of morbidity and mortality in India over the last
    several decades, and are rapidly catching up with this epidemic. The underlying pathology is atheromatous vascular disease,
    resulting in coronary artery disease (CAD), cerebrovascular disease, and peripheral vascular disease, and the subsequent
    development of heart failure and cardiac arrhythmias.
