coaching_scope_notes: 'Coach assesses current activity level, safety constraints (joint
  laxity,

  balance, pain, CVD risk), and goals, then matches client to an

  intensity tier per modality. Progressions are individualised — a client

  may be advanced in cardio but beginner in balance. Coach educates on

  form, frequency, and recovery; reinforces consistency over intensity

  for sustainable behaviour change.

  '
clinician_scope_notes: 'Clinician-led clearance is required when CVD risk factors,
  recent

  cardiac events, uncontrolled hypertension, advanced osteoporosis, acute

  injury, or significant fall risk are present. Refer for PT supervision

  when range-of-motion deficits or post-surgical restrictions exist.

  '
