slug: exercise-prescription-fm
display_name: Exercise Prescription (Functional Medicine)
aliases:
- movement prescription
- physical activity prescription
summary: 'A structured approach to prescribing exercise across six modalities —

  strength/weight-bearing, flexibility, balance, cardiovascular, mind-body

  yoga, and activities of daily living — stratified by three intensity

  tiers (beginner/low, intermediate/moderate, advanced/vigorous). Each

  modality has modality-specific safety considerations (e.g. joint laxity

  for flexibility, fall risk for balance, CVD risk assessment for cardio)

  and a dosing prescription covering frequency, duration, and intensity.

  In functional medicine coaching, exercise is one of the foundational

  lifestyle levers alongside nutrition, sleep, stress, and connection.

  '
