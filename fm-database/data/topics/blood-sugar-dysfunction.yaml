summary: A spectrum of conditions ranging from insulin resistance and prediabetes
  to type 2 diabetes, characterized by impaired insulin secretion or tissue responsiveness
  to insulin. Managed through lifestyle, diet, exercise, and targeted micronutrient
  support.
common_symptoms:
- energy-crashes
- sugar-cravings
- brain-fog
- increased-thirst
- abdominal-weight-gain
- mood-swings
- blurry-vision
- frequent-urination
- lethargy
- blood-sugar-dysregulation
- unexplained-weight-gain
- elevated-blood-glucose
red_flags:
- fasting glucose ≥126 mg/dL
- HbA1c ≥6.5%
- unintended weight loss with polyuria
- recurrent hypoglycaemic episodes
- axonal-neuropathy
- visual changes
- diagnosed type 2 diabetes requiring medication
- gestational diabetes
- kidney disease (contraindicates chromium)
- persistent fasting glucose >126 mg/dL
- symptoms of diabetic ketoacidosis
related_topics:
- insulin-resistance
- metabolic-syndrome
- type-2-diabetes
- prediabetes
key_mechanisms:
- insulin-resistance
- pancreatic-beta-cell-dysfunction
- advanced-glycation-end-products
- skeletal-muscle-glucose-uptake
- hepatic-insulin-sensitivity
- hepatic-glucose-production
coaching_scope_notes: Coaches can support lifestyle interventions (exercise, sleep,
  stress, diet) and supplement education. Lab interpretation, medication management,
  and diagnosis are out of scope.
clinician_scope_notes: Clinicians should assess HbA1c, fasting glucose, HOMA-IR, and
  micronutrient levels (Vitamin D, magnesium, zinc) to guide supplementation.
evidence_tier: strong
