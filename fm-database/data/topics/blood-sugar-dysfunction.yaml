summary: A spectrum of conditions ranging from insulin resistance and prediabetes
  to type 2 diabetes, characterized by impaired insulin secretion or tissue responsiveness
  to insulin. Managed through lifestyle, diet, exercise, and targeted micronutrient
  support.
common_symptoms:
- post-meal-fatigue
- sugar-cravings
- brain-fog
- energy-crashes
- increased-thirst
- abdominal-weight-gain
- mood-swings
- blurry-vision
- frequent-urination
- fatigue
- blood-sugar-spikes
- weight-gain
- glucose-spikes
red_flags:
- fasting glucose ≥126 mg/dL
- HbA1c ≥6.5%
- unintended weight loss with polyuria
- recurrent hypoglycaemic episodes
- peripheral neuropathy
- visual changes
- diagnosed type 2 diabetes requiring medication
- gestational diabetes
- kidney disease (contraindicates chromium)
- persistent fasting glucose >126 mg/dL
- symptoms of diabetic ketoacidosis
