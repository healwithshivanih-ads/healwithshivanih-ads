coaching_scope_notes: Coaches can support lifestyle interventions (exercise, sleep,
  stress, diet) and supplement education. Lab interpretation, medication management,
  and diagnosis are out of scope.
clinician_scope_notes: Clinicians should assess HbA1c, fasting glucose, HOMA-IR, and
  micronutrient levels (Vitamin D, magnesium, zinc) to guide supplementation.
evidence_tier: strong
