slug: metabolic-endotoxemia-lps
display_name: Metabolic Endotoxaemia (LPS Translocation from Gut)
aliases:
- endotoxemia
- lipopolysaccharide translocation
summary: Lipopolysaccharide (LPS) is the cell-wall component of gram-negative bacteria
  (Proteobacteria are the most inflammatory subgroup, with cell walls 80% LPS). When
  the gut barrier is compromised AND/OR Proteobacteria proportion is high AND/OR transit
  time is slow, LPS leaks into systemic circulation in a steady drip and spikes after
  certain meals — this is metabolic endotoxaemia. Downstream effects — drops insulin
  sensitivity, damages the blood-brain barrier, shifts neurotransmitter production,
  drives neuroinflammation, and POISONS mitochondrial function. Hawrelak cites Alzheimer's
  brain autopsies showing dramatically higher endotoxin load than age-matched controls.
  Coach implication — slow transit + high-fat / refined-carb meals + leaky gut is
  the high-LPS phenotype; rebalancing all three drops the LPS load.
