  quote: Dr Naviaux's created three stages. In first stage, there's a lot of inflammatory
    noise happening. In the second stage, there's a lot of growth happening — that's
    when you get things like atheromas, calcifications in your blood vessels. CDR2
    is also where cancers are. CDR3 is when the cells have repaired and now they have
    to restore cell-to-cell communication.
