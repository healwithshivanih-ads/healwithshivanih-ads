summary: Robert Naviaux's reframing of mitochondrial chronic illness — mitochondria
  are not primarily ATP factories that "break" in disease; they are immune sensors
  that detect changes in cellular surroundings and trigger a stereotyped defence cascade
  called the Cell Danger Response when they sense pathogenic, toxic, or metabolic
  threats. CDR has THREE sequential stages — CDR1 (inflammatory signalling, ATP released
  to cell surface as a "danger halo" that recruits the innate immune system; cell
  membrane hardens reducing hormonal and signalling input); CDR2 (proliferative repair,
  new cell growth — explains atheromas, fibrosis, some cancer behaviour); CDR3 (restoration
  of cell-to-cell communication and reintegration with neighbours). Chronic illness
  is the state where a MOSAIC of cells in various organs is stuck mid-cycle — not
  all cells, just enough to disrupt whole-body symphony. Salugenesis is the parallel
  concept — the active, multi-signal process the body must navigate to exit CDR and
  return to health.
