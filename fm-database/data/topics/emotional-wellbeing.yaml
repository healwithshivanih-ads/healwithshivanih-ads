- positive-affect-upregulation
- hpa-axis-dysregulation
coaching_scope_notes: Coaches can support emotional wellbeing through gratitude, self-compassion prompts, goal-setting, and
  creative expression. Use the Self-Care Questionnaire Mental/Emotional/Spiritual domain as a baseline.
clinician_scope_notes: Refer if a client presents with persistent hopelessness, anhedonia, or symptoms of clinical depression.
