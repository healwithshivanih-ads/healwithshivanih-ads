summary: The capacity to experience positive emotions, find meaning and purpose, maintain hope, and engage creatively and
  compassionately. Supported through gratitude, self-compassion, social connection, and creative expression.
common_symptoms:
- low-mood
- hopelessness
- social-isolation
- burnout
- lack-of-purpose
red_flags:
- persistent hopelessness
- suicidal ideation
- clinical depression
