  quote: A woman in a wheelchair comes in in the early 90s, 35 years old, paralysed
    from the waist down for 5 years. She's got drenching sweats at 35, not in menopause.
    This sounds like a parasite I just learned about at a conference called Babesia.
    Lo and behold, we find Babesia. I give her a 10-day treatment of Mepron Zithromax,
    and 6 months later the woman is walking out of a wheelchair and skiing.
