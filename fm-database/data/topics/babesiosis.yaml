summary: Intra-erythrocytic protozoan parasite transmitted by the same Ixodes ticks
  as Lyme disease. Causes malaria-like symptoms including drenching night sweats,
  air hunger, fatigue, headache, and migratory pain. Found in roughly 80% of chronic
  Lyme patients in Dr Horowitz's clinical cohort. Hallmark distinguishing feature
  — drenching sweats in a patient who is NOT in menopause, does NOT have hypothyroidism,
  TB, or non-Hodgkin's lymphoma. First clinical signal that led Horowitz to recognise
  parasitic co-infection was a 35-year-old wheelchair-bound patient who walked out
  (and later went skiing) after Mepron (atovaquone) + Zithromax for Babesia. Standard
  antimicrobial regimen — atovaquone + azithromycin (or proguanil combinations) —
  typically pulsed.
