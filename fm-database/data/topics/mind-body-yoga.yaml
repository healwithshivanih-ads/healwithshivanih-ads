summary: 'Yoga practice as a mind-body modality combining movement, breath, and

  attention. Key considerations are joint laxity and balance. Beginner:

  gentle or restorative yoga, 1–2× per week, 10–20 minutes. Intermediate:

  Hatha and Vinyasa styles, 1–2× per week, 30–60 minutes. Advanced:

  Vinyasa or Ashtanga styles, 2–3× per week, 60 minutes per session.

  '
