coaching_scope_notes: 'Yoga doubles as flexibility, balance, and stress-modulation
  work — it

  often overlaps multiple cells of the prescription matrix. Clients with

  joint hypermobility should avoid styles that emphasise deep passive

  stretching; styles like Hatha with controlled engagement suit them

  better.

  '
clinician_scope_notes: 'Refer clients with significant joint hypermobility, recent
  spinal

  injury, or uncontrolled blood pressure to a yoga therapist or PT

  before unsupervised advanced practice.

  '
