slug: iron-deficiency-anemia
display_name: Iron Deficiency Anemia
aliases:
- IDA
- iron-deficiency anaemia
- nutritional anemia
summary: Iron deficiency anemia is the most common nutritional anemia, resulting from
  insufficient iron to support normal red blood cell production. It can arise from
  decreased dietary intake, increased physiological demand, malabsorption, or chronic
  blood loss. Diagnosis relies on primary markers (RBC, hemoglobin, hematocrit), secondary
  markers (MCV, MCH, MCHC — all low in IDA), and an iron panel (serum iron, ferritin,
  transferrin, TIBC, UIBC, transferrin saturation).
common_symptoms:
- fatigue
- pale-skin
- hair-loss
- brittle-nails
- shortness-of-breath
- recurrent-headaches
- mouth-ulcers
- restless-legs
- cold-intolerance
- pica
- brain-fog
- recurrent-infections
- sore-tongue
red_flags:
- hemoglobin below 9 in adults
- suspected occult GI bleeding
- hemoglobin unresponsive to supplementation
- uterine fibroids causing chronic heavy menstruation
related_topics:
- b12-folate-anemia
- hemolytic-anemia
- celiac-disease
- malabsorption-syndrome
key_mechanisms:
- low-stomach-acid-iron-absorption
- heme-vs-nonheme-iron-absorption
- ferritin-storage-depletion
coaching_scope_notes: Coaches can support dietary iron optimisation, discuss heme
  vs. non-heme iron sources, and support supplement adherence. Lab interpretation,
  dosing of therapeutic iron, and ruling out GI bleeding must be referred to a clinician.
clinician_scope_notes: Full iron panel (serum iron, ferritin, TIBC, UIBC, transferrin
  saturation) required to confirm severity. Rule out occult GI bleeding, celiac disease,
  PPI use, and gastric bypass as contributing causes.
evidence_tier: strong
