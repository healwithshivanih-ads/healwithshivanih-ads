summary: Glutathione S-transferase (GST) and glutathione peroxidase (GPX) enzymes
  use glutathione to conjugate and neutralise environmental toxins, xenobiotics, and
  reactive oxygen species. Variants reduce detoxification capacity, increasing sensitivity
  to chemicals, promoting oxidative stress, and contributing to autoimmune and cancer
  risk. Sweating, fibre, and glutathione-supporting nutrients are key interventions.
