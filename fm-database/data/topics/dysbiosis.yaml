slug: dysbiosis
display_name: Gut Dysbiosis / Endotoxemia
aliases:
- microbial imbalance
- microbiome dysbiosis
- gut dysbiosis
- LPS endotoxemia
- microbiome imbalance
summary: Microbial imbalance in the gut that can increase intestinal permeability,
  drive LPS endotoxemia, and worsen insulin resistance via systemic low-grade inflammation.
common_symptoms:
- bloating
- constipation or loose stools
- food sensitivities
- fatigue
- brain fog
- weight gain
- skin issues
red_flags:
- Severe or persistent dysbiosis with opportunistic pathogens — requires clinician
  management
related_topics:
- microbiome
- gut-hormone-axis
