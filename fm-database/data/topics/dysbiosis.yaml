summary: An imbalance in the gut microbial community characterised by decline in beneficial
  bacteria and overgrowth of pathogenic species. In this case, dysbiosis was identified
  as a driver of hypochlorhydria, intestinal barrier compromise, nutrient malabsorption,
  elevated beta-glucuronidase, and chronic immune activation.
common_symptoms:
- bloating
- constipation or loose stools
- food sensitivities
- fatigue
- brain fog
- weight gain
- skin issues
- constipation
- brain-fog
- low-energy
- food-sensitivities
- progressive-bloating
- belching
- flatulence
red_flags:
- Severe or persistent dysbiosis with opportunistic pathogens — requires clinician
  management
- severe nutrient malabsorption
- unintentional weight loss
- suspected SIBO
