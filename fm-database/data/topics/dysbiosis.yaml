coaching_scope_notes: Coaches can guide elimination diets, low-FODMAP approaches,
  5R protocol sequencing, and prebiotic/probiotic introduction timing.
clinician_scope_notes: GI-MAP or similar stool tests can identify specific dysbiotic
  organisms (e.g., Strep, Enterococcus), as well as inflammatory markers and compromised
  digestive function. Antibiotic exposure can cause dysbiosis lasting 18 months to
  8 years per emerging research.
