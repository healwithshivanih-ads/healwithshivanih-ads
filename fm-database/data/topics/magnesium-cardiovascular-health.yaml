summary: Magnesium acts as a natural calcium channel blocker and antispasmodic, supporting
  vascular relaxation, preventing arterial spasm, reducing atherosclerotic calcification,
  and modulating cholesterol (raising HDL, lowering LDL). Deficiency is implicated
  in hypertension, arrhythmia, atherosclerosis, and coronary calcification.
