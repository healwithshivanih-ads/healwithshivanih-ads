coaching_scope_notes: Coaches can support lifestyle and dietary factors that protect
  cardiovascular health. Any cardiac symptoms require immediate medical referral.
clinician_scope_notes: IV magnesium used in acute arrhythmia and artery spasm management.
  Diuretic medications further deplete magnesium; review polypharmacy.
