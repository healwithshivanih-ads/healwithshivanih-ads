summary: Replacement of refined grains (white rice, wheat) with millets (foxtail,
  barnyard, kodo, little, jowar) and quinoa across meals — biryanis, khichdis, rotis,
  upma — to reduce glycaemic load and increase micronutrient density.
key_mechanisms:
- glycemic-load-reduction
- dietary-fiber-modulation
coaching_scope_notes: Millets should be rinsed 2–3 times and soaked 10–15 min before
  cooking to remove phytic acid. Many recipes serve millet as a direct rice substitute.
