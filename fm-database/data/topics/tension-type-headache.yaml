summary: Gradual-onset mild-to-moderate steady headache with vise-like or pressure
  quality, usually originating at the back of the head or forehead and spreading.
  Typically caused by tightening of face, neck, or scalp muscles from stress, poor
  posture, or structural misalignment. Other major causes are drug-rebound headache
  (~70% of chronic headache sufferers), magnesium insufficiency, and food allergies.
  Shares features with migraine — both respond to magnesium, 5-HTP, allergen elimination,
  and reduction of analgesic rebound.
