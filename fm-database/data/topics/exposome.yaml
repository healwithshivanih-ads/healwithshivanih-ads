summary: 'The exposome is the sum of all environmental exposures across the

  lifespan — external (radiation, pollution, diet, drugs, personal care,

  household products) and internal (psychological stress, inflammation,

  oxidative stress, microbiome shifts) — and how they interact with

  the body''s internal chemistry. Sits alongside the genome, proteome,

  and metabolome as a domain of "omics" research. In FM, used to frame

  the cumulative biological impact of lifestyle and environment on a

  client''s health timeline.

  '
