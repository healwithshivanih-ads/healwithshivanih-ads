coaching_scope_notes: |
  Coaches can flag the pattern when both serum B12 and folate sit at or above the
  upper end of their lab ranges without supplementation explaining it. Education
  points: (1) "high on the panel" does not mean "in surplus at the cell"; (2) the
  fix is rarely to take more B12 — it's usually to switch from synthetic folic
  acid and cyanocobalamin to methylated forms (methylfolate / 5-MTHF and
  methylcobalamin); (3) check what's in the multivitamin or prenatal — most cheap
  formulations use folic acid. Recommend a clinician-ordered workup to confirm
  functional status (homocysteine, MMA, active B12/holoTC, MTHFR genotype) before
  any supplementation change.
clinician_scope_notes: |
  Order homocysteine (target <7 µmol/L), MMA (target <0.27 µmol/L), holoTC (active
  B12), and MTHFR C677T + A1298C variants. Rule out non-methylation causes of high
  serum B12: liver disease (LFTs, ultrasound), myeloproliferative disorders (CBC
  with differential, JAK2 if indicated), recent IM/IV B12 administration. If
  methylation block is confirmed, switch to methylfolate + methylcobalamin;
  consider riboflavin (B2) to stabilise the MTHFR enzyme in C677T carriers; assess
  the wider methylation cycle (B6 / SAMe / glycine / choline). Caution with
  methylated forms in clients with anxiety / overmethylation tendency — start low,
  titrate.
