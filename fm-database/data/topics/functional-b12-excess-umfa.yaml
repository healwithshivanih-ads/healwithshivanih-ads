- functional B12 deficiency despite high serum
- paradoxical B12 elevation
- high B12 high folate pattern
- MTHFR methylation block on labs
summary: A counter-intuitive lab pattern where serum B12 is elevated (often >900
  pg/mL) and/or serum folate is at or above the lab's reportable upper limit (often
  ≥24 ng/mL), despite the client having symptoms suggestive of B12 or folate
  deficiency. The picture reflects a methylation bottleneck — most commonly an
  MTHFR variant (C677T, A1298C) — where cells can't convert folic acid → 5-MTHF
  and can't utilise cyanocobalamin → methylcobalamin. Synthetic folic acid and
  cyanocobalamin (the cheap forms used in fortified foods + most cheap supplements)
  accumulate in the bloodstream as unmetabolised folic acid (UMFA) and unused B12,
  paradoxically signalling "high" while the client is functionally deficient at
  the cellular level. Other causes of true serum B12 elevation must be ruled out
  (liver disease, myeloproliferative disorders, recent supplementation) before
  attributing solely to methylation block.
