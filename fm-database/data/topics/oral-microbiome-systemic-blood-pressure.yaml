slug: oral-microbiome-systemic-blood-pressure
display_name: Oral Microbiome and Systemic Blood Pressure
aliases:
- oral nitrate reducing bacteria
- mouthwash blood pressure
summary: Commensal nitrate-reducing bacteria of the oral cavity (predominantly on
  the tongue dorsum) convert dietary nitrate from leafy greens into nitrite, which
  is then converted to nitric oxide systemically — supporting vasodilation and blood-pressure
  regulation. Broad-spectrum antimicrobial mouthwashes wipe out these bacteria and
  have been shown to acutely raise systemic blood pressure. Coach implication — avoid
  antiseptic mouthwashes (chlorhexidine, alcohol-based) as routine practice, particularly
  in hypertensive clients; favour oil pulling or gentle saline rinses.
