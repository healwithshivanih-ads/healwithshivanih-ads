summary: 'Tick-borne spirochetal infection (Borrelia burgdorferi) that persists in
  biofilm and intracellular forms after standard antibiotic courses. Discovered ~2015
  at Johns Hopkins to be a biofilm persister bacterium akin to TB and leprosy, which
  explains failure of the historical 30-day doxycycline model. Acute presentation
  may include erythema migrans (bullseye rash — solid in 50% of cases) or a spreading
  red rash; chronic presentation mimics chronic fatigue syndrome, ME/CFS, fibromyalgia,
  MS, and Alzheimer-type dementia. Migratory pain — pain that moves body region to
  body region without explanation — is present in ~95% of chronic cases and is the
  single most useful clinical anchor. Standard CDC two-tier testing (ELISA → Western
  blot) misses about half of chronic cases because Lyme, Bartonella, mold, and long-COVID
  T-cell exhaustion suppress antibody production. Strongly co-infected with Babesia
  (~80%) and Bartonella (~90%) per clinical cohort data. Treatment paradigm: rifampin
  + dapsone + doxycycline 8-9 week oral combination (Dapsone Combination Therapy,
  DDS-CT) hits all three forms — cell wall, intracellular, and cystic/persister.'
