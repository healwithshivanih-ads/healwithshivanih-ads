summary: Prediabetes (fasting glucose 100–125 mg/dL, postprandial 140–199 mg/dL) is the first step in insulin resistance and
  is reversible with dietary and lifestyle changes. Metabolic syndrome clusters elevated triglycerides, low HDL, hypertension,
  and increased waist-to-hip ratio, conferring high CVD and T2DM risk.
