slug: mthfr-variants
display_name: MTHFR Variants & Methylation
aliases:
- MTHFR mutation
- MTHFR polymorphism
- C677T
- A1298C
- methylation dysfunction
summary: MTHFR genetic variants (notably C677T and A1298C) reduce the enzyme's ability to convert dietary folate into active
  5-MTHF, which can impair methylation, elevate homocysteine, and affect B12 utilisation. Clinical significance depends on
  functional markers and context, not genotype alone.
common_symptoms:
- elevated-homocysteine
- lethargy
- brain-fog
red_flags:
- very-high-serum-b12-unexplained
related_topics:
- homocysteine-and-methylation
- vitamin-b12
- vitamin-b-complex-deficiency
key_mechanisms:
- impaired-folate-to-5-mthf-conversion
- elevated-homocysteine
coaching_scope_notes: Coaches can support lifestyle and supplement basics (active folate forms, methylcobalamin, riboflavin)
  but must defer lab interpretation, dosing decisions, and MTHFR genetic counselling to a clinician.
clinician_scope_notes: Evaluate with homocysteine, MMA, B12, folate, blood pressure, and full clinical context. Genetic testing
  alone is insufficient for clinical decision-making.
evidence_tier: plausible_emerging
sources:
- id: coach-shivani
  location: Coach Observation
  quote: MTHFR variants usually do not block B12 or folate absorption; they can reduce conversion of folate into active 5-MTHF,
    which may impair B12 function and raise homocysteine.
version: 1
status: active
