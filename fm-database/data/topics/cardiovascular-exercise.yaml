coaching_scope_notes: 'The "talk test" is the simplest field intensity gauge — moderate
  = can

  still hold a conversation, vigorous = cannot. The 150-min/week moderate

  target is the standard public-health threshold for cardiovascular

  benefit. Progress duration before intensity for deconditioned clients.

  '
clinician_scope_notes: 'CVD risk assessment is required before progression to vigorous

  intensity, particularly for clients with hypertension, dyslipidemia,

  diabetes, family history of premature cardiac events, or age >40

  starting a new program.

  '
