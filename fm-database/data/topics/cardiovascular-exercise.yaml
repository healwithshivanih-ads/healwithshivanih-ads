summary: 'Sustained activity that elevates heart rate and improves

  cardiorespiratory fitness. Key considerations are balance, pain, and

  CVD risk assessment before progression. Beginner: supported walking on

  a treadmill or riding a stationary bike, 2–3× per week, 10–20 minutes.

  Intermediate: brisk walking or biking under 10 mph, at an intensity

  that still allows conversation, totalling 150 minutes per week.

  Advanced: jogging/running or biking over 10 mph, at an intensity where

  conversation is no longer possible, 60 minutes per day.

  '
