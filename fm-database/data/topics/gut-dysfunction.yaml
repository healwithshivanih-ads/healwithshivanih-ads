key_mechanisms:
- dysbiosis-gut-microbiome-imbalance
- leaky-gut
- low-stomach-acid
coaching_scope_notes: Coaches can support dietary changes (5R framework, elimination diets, fermented foods, prebiotic/probiotic
  foods), lifestyle modifications, and symptom tracking. Supplement dosing and PPI tapering require clinician supervision.
clinician_scope_notes: PPI tapering, betaine HCl dosing, and diagnosis of Barrett's Esophagus, gastroparesis, or parasitic
  infections require clinician oversight.
evidence_tier: strong
