slug: gut-dysfunction
display_name: Gut Dysfunction
aliases:
- GI dysfunction
- digestive dysfunction
- gut health
- gastrointestinal dysfunction
summary: A broad clinical area encompassing impaired digestion, dysbiosis, leaky gut, low stomach acid, candida overgrowth,
  and related conditions. GI dysfunction can underlie chronic health problems seemingly unrelated to digestion, including
  autoimmune disease, skin disorders, and cardiovascular disease.
common_symptoms:
- bloating
- flatulence
- constipation
- diarrhea
- indigestion
- undigested-food-in-stool
- nausea-after-supplements
- upper-digestive-tract-gassiness
red_flags:
- Barrett's Esophagus
- Reflux disease > LA Grade B
- Hiatal hernia > 3 cm
- Gastroparesis
- Gastrin >300 pg/mL
- reflux disease LA Grade B or higher
- gastroparesis
- hiatal hernia > 3 cm
- unresolved rectal itching suggesting parasitic infection
related_topics:
- hypochlorhydria
