- folate-deficiency
key_mechanisms:
- heme-vs-nonheme-iron-absorption
coaching_scope_notes: Coaches can support dietary iron optimization. Supplemental
  iron dosing requires clinician oversight.
clinician_scope_notes: 'RDA varies: males 17 mg/day, females 21 mg/day, pregnancy
  35 mg/day. Lab confirmation recommended before supplementing.'
evidence_tier: strong
