summary: 'Iron is a mineral critical for oxygen transport and energy production. Deficiency
  is the most common nutritional deficiency worldwide and can cause anemia. Absorption
  varies by form: heme iron (animal sources) is better absorbed; nonheme iron (plant/animal)
  is less so but predominates in the diet.'
common_symptoms:
- fatigue
- brain-fog
- shortness-of-breath
red_flags:
- severe anemia — refer to clinician for lab evaluation and therapeutic dosing
