slug: vitamin-b12-nutrition
display_name: 'Vitamin B12: Food Sources, Absorption & Deficiency'
aliases:
- cobalamin
- B12 deficiency
- methylcobalamin
- cyanocobalamin
summary: Vitamin B12 is a water-soluble vitamin required for red blood cell production,
  brain health, DNA synthesis, and homocysteine metabolism. Deficiency is common in
  vegans/vegetarians, elderly, and those with malabsorption conditions or on certain
  medications. Active forms (methylcobalamin) may be preferable for those with MTHFR
  variants.
common_symptoms:
- fatigue
- brain-fog
- anemia
- peripheral-neuropathy
- depression
red_flags:
- pernicious-anemia
- severe-neurological-symptoms
related_topics:
- folate-nutrition
- mitochondrial-health-nutrients
key_mechanisms:
- homocysteine-metabolism
- dna-synthesis
- methylation
coaching_scope_notes: Coach can identify dietary risk factors for deficiency (vegan/vegetarian
  diet, elderly, GI conditions, medications). Education on food sources and the difference
  between B12 forms is appropriate coaching scope.
clinician_scope_notes: Lab testing (serum B12, methylmalonic acid), supplementation
  dosing, and evaluation of medication interactions (PPIs, metformin) are clinician
  scope.
evidence_tier: strong
