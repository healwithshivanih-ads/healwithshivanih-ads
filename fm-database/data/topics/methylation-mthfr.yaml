coaching_scope_notes: Coaches can recommend methylated B-vitamin forms, dietary support
  (beets, leafy greens), anti-inflammatory diet, stress management, and toxin reduction.
  MTHFR genetic testing and lab interpretation is clinician scope.
clinician_scope_notes: Order MTHFR genetic test, homocysteine, methylation panel,
  OAT, CBC+MCV, serum B12 & folate, CRP, ferritin, HS-CRP. Always individualise treatment.
