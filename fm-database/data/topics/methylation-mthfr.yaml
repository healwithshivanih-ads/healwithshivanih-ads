summary: MTHFR enzyme converts folate (B9) to its active form 5-MTHF, essential for
  DNA synthesis, detoxification, neurotransmitter production, hormone regulation,
  and immune modulation. SNPs C677T and A1298C reduce enzyme efficiency by up to 70%,
  impairing methylation and Phase II liver detox, elevating homocysteine, and increasing
  oxidative stress.
