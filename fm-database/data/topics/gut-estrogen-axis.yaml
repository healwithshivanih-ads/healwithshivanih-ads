slug: gut-estrogen-axis
display_name: Gut–Estrogen Axis
aliases:
- gut dysbiosis and estrogen
summary: Gut dysbiosis, particularly SIBO, leads to elevated beta-glucuronidase enzyme
  activity, which deconjugates estrogen metabolites in the bile and intestine, allowing
  them to be reabsorbed into circulation. This impairs estrogen detoxification and
  excretion, contributing to estrogen dominance even in lean individuals.
common_symptoms:
- estrogen-dominance-symptoms
- fibroids
- hair-on-chin
- bloating
red_flags:
- Fibroids in lean patients with gut dysbiosis
- Lean patients with facial hair and joint pain may have estrogen dominance from gut
  issues
related_topics:
- estrogen-dominance
- menopause
- perimenopause
key_mechanisms:
- beta-glucuronidase-reabsorption
- sibo-dysbiosis
coaching_scope_notes: Coaches can recommend probiotic-rich foods, gut-supportive dietary
  changes, and referral for SIBO testing. Estrogen management is clinician scope.
evidence_tier: plausible_emerging
clinician_scope_notes: ''
