summary: Rosacea is a chronic vascular inflammatory facial skin disorder — flushing,
  persistent erythema, papules/pustules on cheeks/nose, sometimes progressing to rhinophyma
  or ocular involvement. Affects 13+ million Americans, women 3x more often but more
  severely in men. Triggered by hot drinks, alcohol, spicy foods, sun, temperature
  extremes, and stress. Functional medicine drivers — hypochlorhydria (responds to
  HCl supplementation), Helicobacter pylori (CagA strain — 67% rosacea vs 32% controls;
  eradication clears symptoms in 51 of 53 patients), food allergies, and B vitamin
  deficiency. Coach focus is gastric acid restoration, H. pylori screening/eradication
  referral, trigger food elimination, zinc 45 to 60 mg/day for 3 months then 20 to
  30 mg maintenance.
