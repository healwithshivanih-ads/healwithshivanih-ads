coaching_scope_notes: Coaches can support dietary choices, elimination of toxin sources, hydration, fiber intake, and lifestyle
  practices. Supplement protocols and fasting interventions require clinician oversight.
clinician_scope_notes: Clinicians may prescribe specific phase I/II nutrient support, medical food powders, fasting protocols,
  and lab testing (CBC, CMP, GFR, Vitamin D). Genetic enzyme variability testing is clinician-directed.
