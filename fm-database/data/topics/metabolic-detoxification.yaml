summary: The body's physiologic process of rendering chemicals, compounds, hormones, and toxicants less harmful, primarily
  through Phase I and Phase II liver enzyme pathways, with excretion via kidneys, intestines, and skin. The organs of detoxification
  include the liver, kidneys, large intestine, lymphatic system, and sweat glands.
