summary: Crystalline deposits in the gallbladder formed from supersaturated bile components.
  Affects 20% of women and 8% of men over 40 in the US — 20 million Americans have
  gallstones; 300,000+ cholecystectomies/year. Risk factor for gallbladder cancer.
  Four types — cholesterol (rare pure), mixed (80% in US, cholesterol + bile salts
  + pigments + Ca salts), pigmented (Asia, hemolysis, alcohol cirrhosis), and mineral.
  Three-stage pathogenesis — bile supersaturation → nucleation → enlargement at 2.6
  mm/year. Symptomatic ~8 years after formation begins. Pizzorno frames it as Western-diet-driven
  and largely preventable.
