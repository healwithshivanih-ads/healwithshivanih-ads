coaching_scope_notes: Coaching role — eliminate food allergens (especially eggs, common
  ulcer-trigger pattern), increase soluble fibre, lipotropic factors (choline, methionine),
  bile-flow botanicals (dandelion, milk thistle, turmeric, artichoke), hydration (8
  oz water/waking hour), reduce saturated fat / sugar / coffee, maintain at least
  10 g fat/day to prevent biliary stasis during weight loss.
clinician_scope_notes: Ultrasound is gold standard. Asymptomatic stones generally
  watch-and-wait. Symptomatic / recurrent / complicated → cholecystectomy. Ursodeoxycholic
  acid for non-surgical candidates.
notes_for_coach: Pizzorno key insights — gallstones are 2-4× more common in women
  due to estrogen-driven cholesterol oversaturation; pregnancy, OCPs, HRT, tamoxifen
  all raise risk; very-low-fat diets paradoxically cause biliary stasis (need 10+
  g fat/day); active weight loss transiently raises stone risk before stabilising.
sources:
- id: pizzorno-gi-trio
  location: Gallstones — General Considerations and Pathogenesis (pp 332-335)
  quote: Gallstones are a Western diet-induced disease affecting 20% of women and
    8% of men older than 40. Frequency is two to four times greater in women than
    in men. Women are predisposed because of either increased cholesterol synthesis
    or suppression of bile acids by estrogens.
