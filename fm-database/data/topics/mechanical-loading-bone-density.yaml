  location: Podcast — Mechanical loading prescription
  quote: Jumping causes more bone to be produced. Strength training at least twice
    a week has been shown to increase bone density at any age. They did a study called
    the Liftmore study where people who had osteoporosis increased bone density. Rounding
    and forward bending increases the risk of fractures because right on the front
    of the vertebrae is where fractures occur.
