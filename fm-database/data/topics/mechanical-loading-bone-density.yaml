slug: mechanical-loading-bone-density
display_name: Mechanical Loading for Bone Density
aliases:
- impact training bone
- resistance training osteoporosis
- weightbearing exercise bone
summary: Bones build and maintain density in response to forces placed on them, per
  Wolff's law. The two evidence-supported categories are impact (jumping rope, jogging,
  dancing, hopping) and resistance training at sufficient load (8 to 10 repetitions
  at a challenging weight, at least twice weekly). Walking maintains balance and prevents
  hip fractures but does not increase bone density. Bed-rest studies show roughly
  1% bone loss per week without loading. The LIFTMOR trial (Liftmore Study) showed
  bone-density gains in postmenopausal osteoporotic women with supervised heavy resistance
  training. Caution for diagnosed osteoporosis — avoid spinal flexion (forward bending,
  sit-ups, crunches, rounded-back yoga poses) because vertebral fractures occur most
  often on the anterior surface; modify hip-hinge patterns.
