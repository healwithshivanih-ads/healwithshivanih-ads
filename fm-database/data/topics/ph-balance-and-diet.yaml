- dietary-acid-load
- inflammatory-diet-pattern
coaching_scope_notes: Coaches can educate clients on shifting food ratios toward more
  alkaline-forming whole foods (vegetables, legumes, certain nuts). Avoid making clinical
  claims about treating disease with pH manipulation.
clinician_scope_notes: Note that blood pH is tightly regulated; the 'dietary pH' framework
  here refers to urinary pH or metabolic acid load, not blood pH. Clinicians should
  contextualize for patients accordingly.
evidence_tier: plausible_emerging
