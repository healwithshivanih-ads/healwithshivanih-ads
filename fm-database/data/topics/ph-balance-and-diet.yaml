summary: The concept that foods can be classified as acid-forming or alkaline-forming,
  and that maintaining a ratio of 70-80% alkaline-forming to 20-30% acid-forming foods
  supports a healthy internal pH environment (~6.5). Modern diets skewed heavily toward
  acid-forming foods (refined carbohydrates, sugar, alcohol) are associated with poor
  health outcomes.
common_symptoms:
- inflammation
- lethargy
- increased-cancer-risk
