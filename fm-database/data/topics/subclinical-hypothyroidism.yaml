slug: subclinical-hypothyroidism
display_name: Subclinical Hypothyroidism
aliases:
- early hypothyroidism
- mild thyroid insufficiency
summary: A milder form of hypothyroidism characterized by elevated TSH with normal
  free T4 levels, indicating the thyroid is under stress but not yet producing overt
  symptoms. May or may not progress to overt hypothyroidism.
common_symptoms:
- fatigue
- weight-gain
- cold-intolerance
red_flags:
- Progression to overt hypothyroidism
- Elevated cardiovascular risk
- progression to overt hypothyroidism
- cardiovascular risk elevation
related_topics:
- hashimotos-hypothyroidism
- hypothyroidism
- thyroid-dysfunction
key_mechanisms:
- thyroid-hormone-conversion
- t4-to-t3-conversion-impairment
coaching_scope_notes: Coaches can support through lifestyle and nutrient optimization.
  TSH monitoring and medical management require clinician oversight.
evidence_tier: strong
clinician_scope_notes: ''
