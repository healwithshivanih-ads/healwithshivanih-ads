summary: Molds produce mycotoxins (e.g., aflatoxin) that can contaminate common foods
  (grains, nuts, dried fruit, aged cheese, processed meats) and cause symptoms ranging
  from mild (itching, fatigue, watery eyes) to severe. Reducing dietary mold exposure
  is a component of detoxification protocols.
common_symptoms:
- fatigue
- itching
- watery-eyes
- breathing-difficulty
red_flags:
- severe respiratory symptoms
- immunocompromised individuals with significant mold exposure
