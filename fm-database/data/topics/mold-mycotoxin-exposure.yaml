summary: Molds and their toxic byproducts (mycotoxins) can contaminate common foods (grains, nuts, dried fruits, cheese, processed
  meats, beer) and indoor environments, causing symptoms ranging from mild (itching, watery eyes, fatigue) to severe. Aflatoxin,
  found in peanuts and corn, is carcinogenic.
common_symptoms:
- lethargy
- itching
- watery-eyes
- breathing-difficulty
- allergic-reactions
red_flags:
- severe respiratory symptoms
- immunocompromised individuals with significant mold exposure
- severe respiratory distress
- suspected aflatoxin poisoning
- immunocompromised individuals with mold exposure
