coaching_scope_notes: Coaches can guide food storage practices, dietary diversity, and avoidance of high-mold-risk foods.
  Clinical mold illness diagnosis and treatment are physician scope.
evidence_tier: plausible_emerging
clinician_scope_notes: Mold-sensitive patients may need individualized guidance on avoidance and potential testing. Refer
  to FM provider for personalized guidance on mold in specific products.
