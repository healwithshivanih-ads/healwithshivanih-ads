slug: liver-detoxification-phases
display_name: 'Liver Detoxification: Phase 1 & Phase 2 Pathways'
aliases:
- biotransformation
- hepatic detox
- liver detox
summary: The liver detoxifies lipophilic xenobiotics through a two-phase process.
  Phase 1 (bioactivation) uses cytochrome P450 enzymes to oxidize, reduce, or hydrolyze
  parent compounds into reactive intermediates. Phase 2 (conjugation) binds those
  intermediates to water-soluble molecules (glutathione, sulfate, glucuronic acid,
  amino acids, methyl groups) enabling biliary or renal excretion. Nutrient sufficiency,
  genetic polymorphisms, and gut microbiome health all modulate detox capacity.
common_symptoms:
