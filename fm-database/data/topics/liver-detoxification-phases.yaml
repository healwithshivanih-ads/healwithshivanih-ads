coaching_scope_notes: Coaches can support Phase 1 and Phase 2 optimization through
  dietary choices (cruciferous vegetables, sulfur-containing foods, adequate protein),
  lifestyle modifications, and targeted nutraceuticals. Lab interpretation and prescribing
  are clinician scope.
clinician_scope_notes: Genetic polymorphism testing (CYP enzymes), lab markers for
  detox pathway dysfunction, pharmaceutical metabolism considerations, and nutraceutical
  dosing require clinician oversight.
