- MTHFR gene variants
summary: The MTHFR gene encodes an enzyme central to folate metabolism and homocysteine regulation. Common variants C677T
  and A1298C can reduce enzyme activity, impairing conversion of folate to its active form (5-MTHF) and affecting the methylation
  cycle. Clinical impact depends on diet, folate, riboflavin, and B12 status.
