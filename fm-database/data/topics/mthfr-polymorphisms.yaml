coaching_scope_notes: Coaches can support dietary folate intake, riboflavin-rich foods, and general B-vitamin adequacy. Interpretation
  of MTHFR genotype results, lab ordering, and supplement dosing decisions for high-dose methylfolate or B12 forms require
  clinician oversight.
clinician_scope_notes: Routine MTHFR genetic testing is controversial and often not recommended for cardiovascular, thrombophilia,
  or pregnancy-loss workups per major guidelines. Functional markers (homocysteine, MMA) are preferred. High serum B12 warrants
  investigation beyond MTHFR attribution.
