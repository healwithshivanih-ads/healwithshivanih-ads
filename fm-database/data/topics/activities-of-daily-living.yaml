slug: activities-of-daily-living
display_name: Activities of Daily Living (ADLs) as Exercise
aliases:
- ADLs
- daily life activity
- non-exercise activity
- NEAT
summary: 'Everyday tasks that count as physical activity and contribute

  meaningfully to total energy expenditure and functional capacity. Key

  considerations are balance, fall risk, and CVD risk. Beginner-level

  ADLs: light housework, cooking, washing dishes, sitting using a

  computer, playing an instrument. Intermediate ADLs: heavy cleaning,

  washing windows, vacuuming, mopping. Advanced ADLs: shovelling,

  carrying heavy loads, digging, mowing the lawn, heavy weeding.

  '
