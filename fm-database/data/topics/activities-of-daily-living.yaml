coaching_scope_notes: 'ADLs are the most underrated exercise category — for deconditioned

  clients, increasing intermediate-level ADLs (mopping, vacuuming) often

  produces meaningful gains without requiring "exercise time". Use this

  framing to lower the barrier for clients who resist structured

  workouts. Match ADL intensity to client''s safe working capacity.

  '
clinician_scope_notes: 'Clients with cardiac risk factors should have CVD risk assessed
  before

  taking on advanced ADLs like shovelling or carrying heavy loads —

  these can trigger acute cardiac events in deconditioned individuals.

  '
evidence_tier: strong
