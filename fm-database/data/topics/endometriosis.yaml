slug: endometriosis
display_name: Endometriosis
aliases:
- endometrial growths outside uterus
- estrogen-dependent endometriosis
summary: A condition in which endometrial-like tissue grows outside the uterus, responding to estrogen. In functional medicine
  framing, it is viewed as an estrogen-dominant and immune-dysregulation-driven condition, with gut dysbiosis promoting elevated
  beta-glucuronidase and estrogen recirculation as contributing mechanisms.
common_symptoms:
- dysmenorrhea
- irregular-periods
- heavy-periods
- primary-infertility
- recurrent-ovarian-cysts
red_flags:
- recurrent cysts requiring surgical oophorectomy
- failure of IVF
- severe pelvic pain
related_topics:
- gut-skin-hormone-axis
- estrogen-dominance
- immune-dysregulation
- gut-dysbiosis
key_mechanisms:
- estrogen-enterohepatic-recirculation
- gut-immune-dysregulation
coaching_scope_notes: Coaches can support seed cycling, anti-inflammatory dietary changes, xenoestrogen avoidance (plastics,
  fragranced products), and estrogen detoxification dietary strategies (cruciferous vegetables, DIM foods). Hormone testing
  and medical management require clinician referral.
clinician_scope_notes: GnRH injections, OCP management, surgical intervention (oophorectomy), IVF, and progesterone/estrogen
  lab interpretation are outside coaching scope.
evidence_tier: plausible_emerging
