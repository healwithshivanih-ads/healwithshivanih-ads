coaching_scope_notes: 'Coach an antihistamine lifestyle approach during the perimenopause
  window: dairy-free trial (A1 casein is mast-cell-stimulating), reduce alcohol especially
  red wine, manage SIBO/gut symptoms, support methylation with B-vitamin-rich foods
  (clinician to dose B6/SAMe/quercetin). Educate on tracking symptom-cycle pattern
  (worst just before period). Coaching scope ends at any prescription/dose decision.'
clinician_scope_notes: Clinician may trial OTC antihistamine (loratadine or diphenhydramine)
  as both diagnostic and treatment. Body-identical progesterone (Prometrium/Utrogestan)
  is the most direct intervention because it both counterbalances estrogen and has
  independent mast-cell-stabilising effects. Dose B6 carefully — high doses risk neuropathy.
notes_for_coach: Briden's framing — perimenopause symptoms that resemble histamine
  symptoms (hives, anxiety, breast pain) should prompt a histamine trial before assuming
  straight estrogen-decline pathology. The histamine-estrogen feedback loop explains
  why some women feel dramatically worse in their early 40s than at actual menopause.
