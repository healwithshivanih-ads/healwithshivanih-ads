slug: histamine-perimenopause
display_name: Histamine and Mast Cell Activation in Perimenopause
aliases:
- estrogen-histamine perimenopause
- perimenopausal histamine intolerance
- mast cell perimenopause
summary: 'During the early years of perimenopause, estrogen tends to swing higher
  than baseline — and high estrogen drives high histamine. Estrogen activates mast
  cells (which release histamine and heparin), upregulates histidine decarboxylase
  (the enzyme that makes histamine), and downregulates the DAO enzyme that clears
  histamine. Histamine in turn stimulates the ovaries to make more estrogen, setting
  up a vicious cycle. At the same time, progesterone — which normally stabilises mast
  cells and upregulates DAO — drops first in perimenopause. The result is a tougher
  perimenopause with overlapping histamine-driven symptoms: night sweats, anxiety,
  insomnia, fluid retention, breast pain, migraines, brain fog, hives, and heavy menstrual
  bleeding.'
common_symptoms:
- night sweats
- anxiety
- insomnia
- fluid retention
- breast tenderness
- migraines
- brain fog
- urticaria or hives
- tinnitus
- heavy menstrual bleeding
red_flags:
- Anaphylaxis or systemic mast cell symptoms — refer to immunology/allergy
- Heavy menstrual bleeding with anemia — clinician work-up for fibroids, adenomyosis,
  coagulopathy
