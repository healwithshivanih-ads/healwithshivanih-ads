slug: medication-induced-nutrient-depletion
display_name: Medication-Induced Nutrient Depletion
aliases:
- drug-nutrient depletion
- iatrogenic nutrient deficiency
summary: Common medications including PPIs, statins, and metformin deplete key nutrients (B12, magnesium, iron, CoQ10, vitamin
  D, folate), causing symptoms that often precede detectable lab abnormalities. Functional repletion with active B-vitamins,
  magnesium glycinate, CoQ10, selenium, zinc, and antioxidants is advocated.
common_symptoms:
- lethargy
- muscle-cramps
- mood-swings
- axonal-neuropathy
- brain-fog
red_flags:
- severe neuropathy
- macrocytic anaemia unresponsive to B12
related_topics:
- iron-deficiency-dysregulation
- metabolic-health-lchf
- adrenal-fatigue
key_mechanisms:
- hepcidin-mediated-iron-block
- coq10-depletion
- b12-absorption-impairment
coaching_scope_notes: Coaches can educate on the concept of drug-nutrient interactions and support dietary repletion. Specific
  supplement dosing must be confirmed with the prescribing clinician.
clinician_scope_notes: Clinicians should assess relevant nutrient levels in patients on long-term PPIs, statins, or metformin
  and consider targeted repletion protocols.
evidence_tier: plausible_emerging
sources:
