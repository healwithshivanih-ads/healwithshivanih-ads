summary: The gastrointestinal tract is a ~10-metre hollow tube responsible for breaking down food into absorbable nutrients.
  Digestion is a sequential chemical and mechanical process beginning in the mouth and ending in the colon. The decisions
  made at the point of intake (what, how much, how fast, how often, and in what environment food is eaten) profoundly affect
  the health of the entire tract.
