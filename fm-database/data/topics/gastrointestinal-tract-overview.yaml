coaching_scope_notes: Coaches can support clients with meal timing, chewing habits, food choices, hydration timing, stress
  reduction, and probiotic/prebiotic foods. Diagnosis and medication management are out of scope.
clinician_scope_notes: Rectal bleeding, uncontrolled diarrhea, suspected IBD or colon cancer risk require clinician referral.
  Steroid and anti-inflammatory tapering must be supervised by a clinician.
