slug: chronic-candidiasis
display_name: Chronic Candidiasis (Yeast Syndrome)
aliases:
- candida overgrowth syndrome
- yeast syndrome
- candida-related complex
summary: Systemic symptom complex resulting from Candida albicans overgrowth in the GI tract and vagina, facilitated by impaired
  immunity, antibiotic use, high-sugar diet, and altered bowel flora. Presents as fatigue, allergies, digestive disturbances,
  depression, and chemical sensitivities. Requires comprehensive approach addressing predisposing factors, not just antifungal
  therapy.
common_symptoms:
- chronic-fatigue
- bloating
- flatulence
- vaginal-yeast-infection
- brain-fog
- carbohydrate-craving
- rectal-itching
- chemical-sensitivity
red_flags:
- Failure to respond to natural therapy — refer for conventional antifungal
- Recurrent infections suggesting immunocompromise
related_topics:
- autoimmunity-leaky-gut-triad
- food-allergy
- sifo
- celiac-disease
key_mechanisms:
- dysbiosis
- leaky-gut
- impaired-immune-function
coaching_scope_notes: Coaches can support anti-Candida diet, probiotic use, and lifestyle changes. CSDA and antifungal prescription
  are clinician scope.
clinician_scope_notes: Use comprehensive stool and digestive analysis (CSDA) to confirm. Monitor with stool cultures and Candida
  antigen levels. Consider Herxheimer reactions when initiating antiyeast therapy.
evidence_tier: plausible_emerging
sources:
- id: pizzorno-textbook-gi-2
  location: Chronic Candidiasis — General Considerations
  quote: 'Candida is normal in the GI tract and vagina. Overgrowth, depleted immunity, damaged GI mucosa allow absorption
    of yeast cells, particles, toxins; result is ''yeast syndrome'' or ''feeling sick all over'': fatigue, allergies, immune
    system malfunction, depression, chemical sensitivities, and digestive disturbances.'
