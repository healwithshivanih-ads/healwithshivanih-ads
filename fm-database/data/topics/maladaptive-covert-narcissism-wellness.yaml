slug: maladaptive-covert-narcissism-wellness
display_name: Maladaptive Covert Narcissism in Wellness Culture
aliases:
- covert narcissism wellness
- chronic self-fixation
summary: A pattern observed in modernised wellness culture where well-intentioned
  self-work becomes a chronic loop of self-fixation — endless "breakthroughs" without
  integration, perpetual focus on healing one's own trauma, indefinitely setting boundaries
  with others, identifying as highly sensitive or as an empath as a structural identity
  rather than an observation. The pattern shuts down post-traumatic growth by keeping
  consciousness contracted around personal story and never expanding to the eagle-view
  of being one of many beings sharing the planet. Coach implication — distinguish
  between necessary self-work (which has clear integration milestones) and chronic
  self-fixation; encourage clients to dedicate practices to the relief of suffering
  of all beings to break the loop.
