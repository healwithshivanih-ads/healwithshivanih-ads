summary: The most common bone disease, defined as T-score ≤ -2.5 SD below young-adult
  mean on DXA. ~1.5 million OP fractures/year in the US (250,000 hip). Post-hip-fracture
  mortality doubles in women, triples in men; 10-20% die within 6 months. Projected
  to affect 77% of Caucasian women, 86% of Hispanic American women, 53% of African
  American women. Genetics accounts for only 30% of risk; lifestyle, vitamin D, vitamin
  K2, magnesium, dietary acid-base balance, smoking, alcohol, and exercise drive the
  rest. Post-menopausal bone loss accelerates to 2%/year for the first 5-10 years
  after menopause.
common_symptoms:
- backache
- height-loss
- fragility-fracture
- kyphosis
red_flags:
- new vertebral or hip fracture
- height loss >1.5 inches
- secondary causes (Cushing's, hyperthyroidism, hyperparathyroidism, celiac, IBD,
  anorexia)
