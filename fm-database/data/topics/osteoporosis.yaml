coaching_scope_notes: Coaching role — vitamin D (target 50-80 ng/mL), K2 (MK-7), Mg,
  dietary acid-base balance (heavy plants, moderate animal protein), weight-bearing
  + resistance exercise, smoking cessation, alcohol moderation. Fall prevention. Refer
  for DXA, FRAX risk calculation, secondary-cause workup.
clinician_scope_notes: DXA every 1-2 years; FRAX for fracture risk; bisphosphonates,
  denosumab, teriparatide for severe cases. Rule out secondary causes — celiac, IBD,
  primary hyperparathyroidism, hyperthyroidism, Cushing's, hypogonadism.
notes_for_coach: Pizzorno key insights — bone density tracks directly with 25(OH)D;
  vitamin K2 activates osteocalcin (pulls calcium into bone) and matrix Gla protein
  (keeps calcium out of arteries); 65+ women absorb 50% less calcium; high animal
  protein is acid-producing and pulls salts from bone; alcohol >7 oz/day raises hip
  fracture risk.
sources:
- id: pizzorno-womens-trio
  location: Osteoporosis — General Considerations and Pathophysiology (pp 721-724)
  quote: Genetics accounts for only 30% of OP risk. Bone density correlates directly
    with serum 25(OH)D3 and inversely with fractures of all types. Osteocalcin pulls
    calcium into bone, and matrix Gla protein prevents calcium deposition in arteries
    — both vitamin K-dependent proteins.
