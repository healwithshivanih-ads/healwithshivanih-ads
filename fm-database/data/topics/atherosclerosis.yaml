summary: A progressive inflammatory disease of arterial walls driven by endothelial
  injury, lipoprotein infiltration, oxidative stress, immune activation, and plaque
  formation; underlying pathogenesis of CVD, CAD, MI, and cerebral infarction.
common_symptoms:
- chest-pain-angina
- dyspnea
- stroke
- myocardial-infarction
- angina
- intermittent-claudication
- dizziness
- gradual-mental-deterioration
- diagonal-earlobe-crease
red_flags:
- plaque rupture leading to MI
- complete arterial occlusion
- embolic stroke
- chest pain / angina at rest
- stroke symptoms (sudden neurological deficit)
- acute MI
- severe peripheral vascular impairment
related_topics:
- cardiometabolic-disease
