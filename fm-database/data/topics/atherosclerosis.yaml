- ldl-oxidation
- plaque-progression
coaching_scope_notes: Coach can address diet (Mediterranean, low-glycemic), exercise,
  smoking cessation support, stress/anger management, and foundational supplements.
  Refer for acute symptoms, medication management, or lab interpretation.
clinician_scope_notes: Requires clinical risk stratification, lab workup (lipid panel,
  CRP, Lp(a), homocysteine, fibrinogen, ferritin), and management of hypertension,
  diabetes, and thyroid status.
evidence_tier: strong
