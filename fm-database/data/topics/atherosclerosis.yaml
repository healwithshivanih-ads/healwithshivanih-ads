slug: atherosclerosis
display_name: Atherosclerosis
aliases:
- arterial plaque
- arterial stenosis
- hardening of the arteries
- atherosclerosis-pathogenesis
- plaque formation
- endothelial injury cascade
summary: A chronic, progressive condition in which fat (primarily small-dense LDL
  particles) infiltrates the endothelium, undergoes oxidation and glycation, triggers
  immune-mediated inflammation, and leads to plaque formation, arterial narrowing,
  and ultimately vessel occlusion.
common_symptoms:
- chest-pain
- dyspnea
- stroke
- myocardial-infarction
red_flags:
- plaque rupture leading to MI
- complete arterial occlusion
- embolic stroke
related_topics:
- cardiometabolic-disease
- endothelial-dysfunction
- insulin-resistance
- lipid-panel-interpretation
key_mechanisms:
- endothelial-injury
- ldl-oxidation-and-glycation
- macrophage-foam-cell-formation
coaching_scope_notes: Coaches can support anti-inflammatory dietary patterns, blood
  sugar regulation, and stress reduction as upstream prevention strategies.
clinician_scope_notes: Plaque progression, imaging (coronary calcium score), and pharmacological
  management are clinician responsibilities.
evidence_tier: strong
sources:
- id: coconote-fm-biomarkers-cvs
  location: Pathophysiology of Cardiovascular Disease
  quote: Another mechanism for blockage of artery is actually a deposition of fat
    in the wall and that leads to a slowly hardening of the vessel and blockage of
    that artery and that is called atherosclerosis.
- id: coconote-fm-stopping-anti-cholesterol-meds
  location: Atherosclerosis mechanism section
  quote: If we want to develop any kind of exoskeletons, first thing is there should
    be endothelial dysfunction. If your endothelium is cracked, then nothing can go
    inside the endothelium. But because of so many factors, you can say oxidative
    stress, hypertension, even any kind of inflammation.
