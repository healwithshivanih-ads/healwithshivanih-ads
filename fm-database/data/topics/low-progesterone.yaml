summary: A deficiency of progesterone — a systemic anti-inflammatory modulator — driven
  by chronic stress (pregnenolone steal), anovulation, estrogen dominance, nutrient
  deficiencies, and circadian disruption.
common_symptoms:
- pms
- anxiety
- insomnia
- heavy-periods
- short-luteal-phase
- breast-tenderness
- water-retention
- infertility
red_flags:
- recurrent pregnancy loss
- severe PMS/PMDD requiring medical evaluation
