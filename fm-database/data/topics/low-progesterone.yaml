- chronic-inflammation
coaching_scope_notes: Coaches can guide nutrient-dense foods, stress reduction, sleep
  hygiene, and adrenal support. Progesterone supplementation is clinician territory.
clinician_scope_notes: Cycle-timed serum progesterone (Day 19–21) is essential. DUTCH/salivary
  testing also useful. Monitor hs-CRP and luteal progesterone trends.
