summary: The body's homeostatic system for maintaining glucose within ~70–110 mg/dL through coordinated action of insulin,
  glucagon, cortisol, and adrenaline. Dysregulation is bidirectional (hypoglycaemia + hyperglycaemia + reactive cycles) and
  precedes insulin resistance. Foundational lifestyle intervention is meal composition (protein + fat + fibre with carbs),
  meal timing, and circadian alignment.
