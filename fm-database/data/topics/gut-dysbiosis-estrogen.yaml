  location: Dysbiosis and Estrogen
  quote: If you have a dysbiosis, there is increased beta glucuronidase activity, which increases deconjugation of estrogen.
    The estrogen that came as conjugated, now it will again separate. It will again deconjugate and go inside the bloodstream
    and increase the level of estrogen.
