key_mechanisms:
- estrogen-enterohepatic-recirculation
coaching_scope_notes: 'Coaches can support gut health to reduce estrogen recirculation: probiotics, fiber, elimination of
  gut pathogens (with clinician guidance), and reduction of inflammatory foods. Beta-glucuronidase testing is via GI-MAP (clinician-ordered).'
evidence_tier: plausible_emerging
