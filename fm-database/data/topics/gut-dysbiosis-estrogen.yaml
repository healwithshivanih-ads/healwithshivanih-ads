slug: gut-dysbiosis-estrogen
display_name: Gut Dysbiosis & Estrogen Recirculation
aliases:
- estrobolome dysfunction
- gut estrogen reabsorption
summary: Dysbiotic gut bacteria produce elevated beta-glucuronidase enzyme, which deconjugates estrogen in the gut lumen,
  allowing reabsorption into the bloodstream rather than fecal excretion. This is a major mechanism of estrogen dominance.
  80-90% of estrogen excretion occurs via the gut. Fixing gut dysbiosis is essential for estrogen management.
common_symptoms:
- bloating
- constipation
- mood-swings
- heavy-periods
red_flags: []
related_topics:
