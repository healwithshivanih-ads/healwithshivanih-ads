summary: Heart-rate variability (HRV) describes the beat-to-beat variation in heart
  rate. The "healthy" component is respiratory sinus arrhythmia (RSA) — heart rate
  rising on inhale and falling on exhale — driven by ventral vagal tone. Higher HRV
  from RSA correlates with greater health, all-cause mortality reduction, anti-inflammatory
  vagal reflex, executive function, and athletic recovery. However, HRV can also rise
  from non-RSA sources (dorsal vagal shutdown, neurogenic bradycardia, autonomic instability),
  which is why HRV climbs paradoxically in some overtrained athletes and in clinical
  crisis states. Orthostatic tolerance testing (heart-rate and blood-pressure response
  to standing) helps disambiguate ventral vagal dominance from dorsal vagal shutdown
  before interpreting an HRV number. Measurement context (seated vs supine vs standing)
  must be held constant across readings.
