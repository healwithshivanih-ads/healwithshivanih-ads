slug: xenobiotic-exposure
display_name: Xenobiotic & Environmental Toxin Exposure
aliases:
- environmental toxin burden
- toxic load
summary: Xenobiotics are chemical compounds foreign to the cell — including pesticides, plasticizers, industrial pollutants,
  dioxins, petrochemicals, heavy metals, endocrine disruptors, and pharmaceuticals. The 'exposome' describes the combined
  cumulative xenobiotic exposure of an individual. Internal toxins from inflammation, lipid oxidation, and gut-derived LPS
  (endotoxins) add to total toxic load.
common_symptoms:
- fatigue
- chemical-sensitivity
- hormonal-disruption
red_flags:
- acute toxic exposure or poisoning
