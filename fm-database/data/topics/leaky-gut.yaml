slug: leaky-gut
display_name: Leaky Gut (Intestinal Permeability)
aliases:
- intestinal permeability
- gut barrier dysfunction
- increased intestinal permeability
- intestinal hyperpermeability
- increased gut permeability
summary: Breakdown of the intestinal epithelial barrier allowing antigens, LPS, and
  toxins to enter systemic circulation, triggering immune activation, systemic inflammation,
  and autoimmunity. Zonulin is a key biomarker. Driven by dysbiosis, food sensitivities,
  stress, alcohol, and NSAIDs.
common_symptoms:
- bloating
- joint pain
- fatigue after eating
- skin rashes
- elevated heart rate after meals
- digestive distress
- brain-fog
- joint-pain
- skin-rashes
- food-sensitivities
- fatigue
- food-reactivity
red_flags:
- bloating that worsens progressively and does not improve
- bloating upon waking that worsens throughout the day
- unexplained weight loss or blood in stool — refer to clinician
- autoimmune disease diagnosis
- multiple food intolerances developing rapidly
- elevated zonulin + autoimmune flare
- active SIBO or parasites
