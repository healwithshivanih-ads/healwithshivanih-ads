coaching_scope_notes: Coach can support gut-healing diet, probiotic foods, stress
  reduction, and sleep. L-glutamine, zinc carnosine, and probiotics as supplements
  require clinician input for dosing.
clinician_scope_notes: Assess zonulin, calprotectin, GI-MAP. Address SIBO, Candida,
  parasites. Support with L-glutamine, zinc carnosine, probiotics, enzymes or HCl
  as needed.
