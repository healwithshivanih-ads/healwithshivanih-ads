summary: A cyclic constellation of physical and emotional symptoms appearing during
  the luteal phase and resolving by the end of menses, affecting 30-40% of menstruating
  women. Peak in 30s-40s. PMDD is the severe DSM-V variant (2.5-5% of women) requiring
  5+ symptoms peaking pre-menses. Pizzorno's etiologic framework — cyclic ovarian
  steroid changes alter brain serotonin (most implicated), GABA, and endorphins; estrogen
  excess plus cholestasis worsens via impaired estrogen clearance; vitamin B6 dysfunction
  amplifies. Hypothyroidism affects a large percentage of PMS patients and often resolves
  symptoms when corrected.
