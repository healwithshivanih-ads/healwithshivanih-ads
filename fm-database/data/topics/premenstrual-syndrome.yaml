coaching_scope_notes: Symptom diary for 2+ cycles confirms luteal-phase pattern. Coaching
  role — diet (lower fat / higher fibre / lower sugar / lower caffeine / lower salt),
  B6 / Mg / Zn / vitamin E repletion, Vitex, vitamin D, exercise. Refer PMDD with
  suicidal ideation immediately; complex hormonal patterns to BHRT clinician.
clinician_scope_notes: PMDD per DSM-V; SSRIs (fluoxetine, sertraline, paroxetine)
  for moderate-severe; OCP / cyclic progestogens for refractory; rule out hypothyroidism,
  depression masquerade.
notes_for_coach: Pizzorno top 7 dietary recs — vegetarian or mostly vegetarian, ↓
  fat, eliminate sugar, eliminate caffeine, ↓ salt, ↑ soy, reduce xenoestrogen exposure.
  B6 50-100 mg/day in divided doses (>50 mg per dose is wasted). Vitex agnus-castus
  is the lead botanical.
