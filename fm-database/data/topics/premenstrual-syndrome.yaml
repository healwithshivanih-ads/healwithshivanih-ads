slug: premenstrual-syndrome
display_name: Premenstrual Syndrome (PMS)
aliases:
- pms
- pmdd
- premenstrual-dysphoric-disorder
- luteal-phase-symptoms
summary: Cyclical physical and mood symptoms in the luteal phase; framed here as a
  signal of poor cycle health that needs root-cause support (blood sugar, estrogen
  clearance, stress) rather than symptom suppression.
common_symptoms:
- low-mood
- irritability
- depression
- headaches
- breast-tenderness
- abdominal-bloating
- food-cravings
- fatigue
- water-retention
- premenstrual-sugar-cravings
- premenstrual-mood-changes
- cyclical-bloating
red_flags:
- suicidal ideation during PMDD episodes
- severe self-harm urges
- progressively worsening symptoms cycle-over-cycle
related_topics:
- estrogen-dominance
- perimenopause-and-menopause
- hypothyroidism
- major-depressive-disorder
- anxiety
key_mechanisms:
- estrogen-enterohepatic-recirculation-uterine
- serotonin-melatonin-sleep-axis
- hpa-axis-dysregulation
- gaba-receptor-modulation
coaching_scope_notes: Coaches can support PMS via cycle-aligned nutrition, blood-sugar
  stability, movement, and stress management.
clinician_scope_notes: PMDD per DSM-V; SSRIs (fluoxetine, sertraline, paroxetine)
  for moderate-severe; OCP / cyclic progestogens for refractory; rule out hypothyroidism,
  depression masquerade.
notes_for_coach: Pizzorno top 7 dietary recs — vegetarian or mostly vegetarian, ↓
  fat, eliminate sugar, eliminate caffeine, ↓ salt, ↑ soy, reduce xenoestrogen exposure.
  B6 50-100 mg/day in divided doses (>50 mg per dose is wasted). Vitex agnus-castus
  is the lead botanical.
sources:
- id: pizzorno-womens-trio
  location: Premenstrual Syndrome — General Considerations (pp 830-832)
  quote: Premenstrual syndrome is cyclic constellation of symptoms appearing during
    the late luteal phase and disappearing by end of full flow of menses. Affects
    30-40% of menstruating women. Etiologic theory — cyclic changes in ovarian steroids
    cause changes in brain neurotransmitters. Serotonin is most implicated.
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 85 — Premenstrual Syndrome
  quote: Comprehensive natural treatment for PMS + PMDD.
- id: ask-expert-cycle-syncing
  location: Key takeaways
  quote: remind the people that you're working with that pms is a flag for poor cycle
    health and it needs a root cause support not symptom management
