summary: A specific lipid triad — elevated triglycerides (≥150 mg/dL), low HDL-C (<40
  men / <50 women), and a high proportion of small dense LDL particles ("Pattern B")
  — that confers far higher cardiovascular risk than total cholesterol or LDL-C alone
  would suggest. Driven primarily by insulin resistance and visceral adiposity. Often
  paired with elevated ApoB, elevated Lp(a), elevated hsCRP, and elevated fasting
  insulin. Standard LDL targets miss this pattern; ApoB and TG/HDL ratio (target <1.5)
  capture it better. FM-standard intervention — address insulin resistance first (carb
  load, exercise, weight), then omega-3 (specifically high-EPA for TG), niacin or
  red yeast rice for HDL/ApoB, plant sterols, soluble fibre, Mediterranean pattern.
