coaching_scope_notes: Coaching role — diet structured for insulin sensitivity (lower
  carb, especially refined / liquid), exercise (resistance + aerobic), omega-3 2-4
  g/day (TG drops), soluble fibre, plant sterols, Mediterranean pattern, weight loss
  if visceral adiposity. Sleep and stress also drive insulin resistance. Standard
  lipid panel insufficient — recommend ApoB, fasting insulin, hsCRP, and TG/HDL ratio
  be added.
clinician_scope_notes: Add ApoB, Lp(a), hsCRP, fasting insulin to workup. Statins
  for ASCVD prevention per guidelines; niacin / red yeast rice / fibrate adjuncts.
  Bempedoic acid + PCSK9 for refractory. Treat insulin resistance with lifestyle ±
  metformin / SGLT2i / GLP-1.
notes_for_coach: TG/HDL ratio is the single best screening number for this pattern
  in clinic — under 1.5 is healthy, 2-3 suspicious, >3 atherogenic. Most clients with
  prediabetes / T2DM / metabolic syndrome have this pattern even when their "cholesterol"
  looks fine. ApoB > 90 is the modern gold-standard atherogenic marker.
