summary: How a health coach supports a client who has ordered direct-to-consumer female-hormone
  labs (blood, saliva, or dried-urine/DUTCH) without a clinician first interpreting
  them. The accuracy of every hormone result depends on collection nuances — cycle
  day, time of day, sample type, and what hormone form the client is taking — so a
  value flagged "abnormal" is often normal for the context, and a "normal" value can
  be misleading. The coach's job is to ask the when/how/what-else questions, take
  the emotional heat off, and route the client back to their clinician for interpretation.
