coaching_scope_notes: 'In scope: educate on WHY collection nuances matter, ask the
  client when in her cycle and at what time of day the sample was taken and what hormone
  forms she is using, reassure her that a flagged value may simply be the wrong test
  done at the wrong time, and route her to a clinician for interpretation. A high
  FSH in a menopausal woman is expected — the coach can calm that panic. Use the cortisol-awakening-response
  pattern (when a client brings one) as an opening to coach sleep and stress.'
clinician_scope_notes: Ordering hormone tests, interpreting values, deciding which
  test fits the clinical question, and prescribing or adjusting hormone therapy all
  belong to the clinician. The coach never tells a client a value is normal or abnormal.
notes_for_coach: 'Cheat-sheet Wendy Warner suggests every coach keep. Blood: good
  for testosterone (order total AND free/available), and for estradiol/progesterone
  if you know the cycle day; cortisol and DHEA (not DHEA-S) must be drawn before 9am.
  Saliva: ONLY cortisol is accurate — reassure clients about weird salivary estrogen/progesterone
  results. Dried-urine "DUTCH" (Dried Urine Test for Comprehensive Hormones): convenient
  home spot collection, accurate for a non-medicated cycling or menopausal woman,
  and uniquely shows estrogen/testosterone breakdown products and methylation of estrogen.
  Some hormone forms cannot be tracked by any test: progesterone cream, hormone pellets,
  and buccal/sublingual drops. Patches and pellets spike high right after application
  then fade, so timing of the draw matters.'
