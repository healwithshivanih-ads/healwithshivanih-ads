slug: mindful-eating
display_name: Mindful Eating
aliases:
- eating awareness
- conscious eating
- slow eating
summary: Deliberate attention to the process of eating — chewing thoroughly, slowing
  down, appreciating meals — can activate parasympathetic tone and improve digestion.
  It serves as an accessible entry point to mindfulness for clients resistant to traditional
  meditation.
related_topics:
- stress-and-the-sympathetic-nervous-system
- stress-nutrition-connection
key_mechanisms:
- parasympathetic-inhibition
- cephalic-phase-digestion
coaching_scope_notes: Mindful eating can be introduced without using the word 'mindful'
  for resistant clients. Linking it to nutrition goals (e.g., better absorption, chewing
  from both sides) makes it accessible for action-oriented clients.
