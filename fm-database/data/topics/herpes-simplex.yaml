summary: Recurrent viral infection of skin and mucous membranes (lips, mouth, genitals,
  eye) — 20-40% of U.S. population has recurrent HSV; ~90% of adults show past HSV-1
  exposure. After primary infection the virus lies dormant in nerve ganglia and can
  reactivate with sun exposure, stress, menses, food allergy, drugs, or sexual activity.
  Cell-mediated immunity is the major determinant of clinical outcome. FM therapeutic
  goals — reduce outbreak frequency, severity, viral shedding, and transmission by
  supporting immunity, raising lysine-arginine ratio, and applying topical antivirals
  (lemon balm, glycyrrhetinic acid).
