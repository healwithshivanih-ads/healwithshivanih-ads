slug: oxidative-stress
display_name: Oxidative Stress
aliases:
- free radical burden
- antioxidant deficiency
- ROS accumulation
summary: Oxidative stress arises when exposure to toxins, heavy metals, or endogenous mitochondrial byproducts exceeds the
  body's antioxidant reserve. It activates NF-kB, driving inflammatory gene expression. Key antioxidants include vitamin C,
  E, A, and the master intracellular antioxidant glutathione. Most patients with chronic disease show depleted glutathione.
  Replenishing antioxidants and glutathione precursors (NAC, glycine) is a core FM strategy.
common_symptoms:
- lethargy
- brain-fog
- chronic-pain
related_topics:
- chronic-inflammation
- glutathione-depletion
key_mechanisms:
- nf-kb-activation
- glutathione-depletion
coaching_scope_notes: Coaches can support dietary antioxidant increase (colorful vegetables, amla, green tea) and supplementation
  with vitamin C, E, A, NAC. IV glutathione is out of coaching scope.
