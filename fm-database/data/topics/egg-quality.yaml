sources:
- id: fett-it-starts-with-the-egg-2019
  location: Chapter 1 — Understanding Egg Quality, pg 20-29
  quote: Aging does not directly cause chromosomal abnormalities; rather, it creates
    conditions that predispose eggs to mature incorrectly shortly before ovulation.
    This means that by changing those conditions before ovulation, you can increase
    the odds of an egg maturing with the correct number of chromosomes.
