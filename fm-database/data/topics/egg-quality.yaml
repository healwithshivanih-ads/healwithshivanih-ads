slug: egg-quality
display_name: Egg Quality (Oocyte Competence)
aliases:
- oocyte quality
- oocyte competence
- egg competence
summary: Egg quality refers to the potential of an oocyte to mature with the correct
  number of chromosomes, fertilise, develop to blastocyst stage, implant, and carry
  a pregnancy to term. The single largest determinant is the chromosomal status of
  the egg at the point of ovulation. In women over 40, 50-80% of eggs are aneuploid;
  even in women under 35, up to 25% of eggs are chromosomally abnormal. Crucially,
  most chromosomal errors occur in the final 3-4 months before ovulation rather than
  accumulating gradually over the woman's lifetime, making egg quality modifiable
  through targeted nutrition, supplements, and toxin avoidance during that preconception
  window. Mitochondrial energy supply is now widely regarded as the central modifiable
  lever of egg quality.
