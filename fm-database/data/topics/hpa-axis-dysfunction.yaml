slug: hpa-axis-dysfunction
display_name: HPA Axis Dysfunction
aliases:
- hypothalamic-pituitary-adrenal axis dysfunction
- adrenal fatigue
- adrenal dysregulation
summary: The hypothalamic-pituitary-adrenal (HPA) axis is the body's central stress
  response system. Dysfunction can manifest as either low or high cortisol states,
  or as adrenal hyperplasia, each with distinct symptom clusters. Chronic stress is
  the primary driver of HPA dysregulation.
common_symptoms:
- fatigue
- chronic-fatigue
- insomnia
- depression
- irritability
- hypoglycemia
- salt-cravings
- weight-gain-abdomen
- low-blood-pressure
- dizziness-on-standing
red_flags:
- low blood pressure with orthostatic drop
- unusually dark skin on scars/elbows/nipples
- stretch marks not from weight loss
- adult onset diabetes
- osteoporosis
related_topics:
- hypercortisolism
- chronic-stress
- adrenal-hormone-function
key_mechanisms:
- hpa-axis-dysregulation
- cortisol-dhea-imbalance
- sympathoadrenal-activation
coaching_scope_notes: 'Coaches can support lifestyle factors: sleep hygiene, stress
  management techniques, dietary adjustments (avoiding refined sugar/caffeine/alcohol),
  and referral for salivary cortisol and blood testing. Do not interpret lab values
  or recommend specific hormone protocols.'
clinician_scope_notes: Requires blood testing and salivary cortisol testing to differentiate
  low vs. high cortisol states and adrenal hyperplasia. Physical examination items
  (marked with * in questionnaire) must be assessed by a clinician.
evidence_tier: strong
sources:
- id: vitaone-health-coaching-toolkit
  location: HPA Axis Questionnaire
  quote: The hypothalamus, pituitary, adrenal (HPA) axis is the body's central stress
    response system. This questionnaire is designed to help assess and differentiate
    possible dysfunction within this system.
