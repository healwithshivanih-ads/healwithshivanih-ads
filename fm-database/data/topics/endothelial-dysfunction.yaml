slug: endothelial-dysfunction
display_name: Endothelial Dysfunction
aliases:
- vascular endothelial dysfunction
- leaky endothelium
- endothelial injury
summary: Damage or dysfunction of the innermost vascular layer (endothelium) is the primary initiating event in atherosclerosis.
  Caused by systemic inflammation, high homocysteine, high blood glucose, toxins (heavy metals, smoking), hypertension, and
  nitric oxide deficiency. Once injured, the endothelium becomes permeable to small LDL particles.
common_symptoms:
- elevated-blood-pressure
- edema
red_flags:
- persistent uncontrolled hypertension
- endothelial failure in acute coronary syndromes
related_topics:
- atherosclerosis
- cardiometabolic-disease
- homocysteine-and-methylation
key_mechanisms:
- nitric-oxide-deficiency
- chronic-inflammation
coaching_scope_notes: 'Coaches can address upstream drivers: anti-inflammatory diet, toxin reduction, blood sugar support,
  and stress management.'
clinician_scope_notes: Hypertension management, nitric oxide testing, and heavy metal assessment require clinician oversight.
evidence_tier: strong
sources:
- id: coconote-fm-biomarkers-cvs
  location: Atherosclerosis Mechanism
  quote: So the primary cause for formation of plaque is actually endothelial injury. So, the innermost layer of blood vessel
    that we call endothelium. And when you have endothelial injury, that leads to formation of acrylocellulosis.
