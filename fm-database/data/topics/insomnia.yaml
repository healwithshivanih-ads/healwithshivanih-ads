coaching_scope_notes: 'Coach maps the insomnia pattern (onset vs maintenance vs early

  awakening), screens for sleep hygiene gaps, and supports the

  upstream drivers. Often the highest-leverage early intervention

  is a detox/gut-cleanup phase combined with evening parasympathetic

  support — many cases improve significantly without any sleep-

  specific supplementation.

  '
clinician_scope_notes: 'Chronic insomnia, suspected sleep apnea, or insomnia accompanied
  by

  mood disorder, suicidal ideation, or treatment-resistant patterns

  belongs in clinician care.

  '
