coaching_scope_notes: Coaches can support sleep hygiene, stimulant removal, progressive
  relaxation, regular aerobic exercise, and dietary tryptophan guidance. Melatonin,
  magnesium, and 5-HTP are within scope at standard doses. Refer sleep apnoea signs
  (snoring, witnessed apnoeas, daytime somnolence) to clinician.
clinician_scope_notes: Rule out sleep apnoea, narcolepsy, nocturnal myoclonus, hypoglycaemia,
  thyroid disease. High-dose folic acid for familial RLS requires prescription. Benzodiazepines
  prescribed by primary care in ~50% of sedative-hypnotic scripts.
