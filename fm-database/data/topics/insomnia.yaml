- non-restorative-sleep
- daytime-fatigue
- middle-of-night-awakening
- early-morning-awakening
red_flags:
- persistent insomnia with low mood / suicidality (refer mental health)
- witnessed apnea, loud snoring, gasping (refer for sleep study)
- excessive daytime sleepiness despite adequate hours in bed
- Sleep apnea symptoms — refer for sleep study
