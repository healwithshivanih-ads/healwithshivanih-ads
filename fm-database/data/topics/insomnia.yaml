summary: An extremely common complaint affecting up to 30% of the population, with
  psychological factors accounting for 50% of cases evaluated in sleep laboratories.
  Sleep-onset insomnia is commonly driven by anxiety and stimulants; sleep-maintenance
  insomnia by depression, hypoglycaemia, nocturnal myoclonus, and sleep apnoea. Key
  natural interventions include serotonin precursor therapy (5-HTP, L-tryptophan),
  melatonin, magnesium, and sedative botanicals.
common_symptoms:
- waking 2-4am unable to return to sleep
- non-restorative sleep / morning fatigue
- racing thoughts at bedtime
- 3am cortisol spike
- difficulty-falling-asleep
