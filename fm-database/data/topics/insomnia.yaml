summary: 'Insomnia presents as difficulty falling asleep (sleep onset), staying

  asleep (sleep maintenance), or early morning awakening. In FM

  framing, the pattern points to the likely root: 2-3 a.m. wide-awake

  awakening suggests cortisol/HPA dysregulation; difficulty falling

  asleep often points to evening sympathetic dominance, blue light

  exposure, or caffeine clearance issues; non-restorative sleep with

  poor dream recall suggests sleep apnea or insufficient deep-sleep

  architecture. Insomnia is a symptom pattern — the underlying drivers

  (toxin load, dysbiosis, HPA dysregulation, blood sugar instability,

  sleep apnea, mental-emotional load) determine the coaching plan.

  '
common_symptoms:
- difficulty falling asleep
- waking 2-4am unable to return to sleep
- non-restorative sleep / morning fatigue
- racing thoughts at bedtime
- 3am cortisol spike
- difficulty-falling-asleep
