slug: insomnia
display_name: Insomnia / Sleep Disruption
aliases:
  - sleep
  - poor-sleep
  - sleep-onset-difficulty
  - night-waking
summary: |
  Difficulty falling asleep, staying asleep, or non-restorative sleep. From an
  FM lens, common drivers are nervous-system dysregulation, evening cortisol
  elevation, low progesterone (perimenopause), magnesium insufficiency, blood
  sugar dips, and circadian misalignment from light/screen exposure.
common_symptoms:
  - difficulty falling asleep
  - waking 2-4am unable to return to sleep
  - non-restorative sleep / morning fatigue
  - racing thoughts at bedtime
  - 3am cortisol spike
red_flags:
  - persistent insomnia with low mood / suicidality (refer mental health)
  - witnessed apnea, loud snoring, gasping (refer for sleep study)
  - excessive daytime sleepiness despite adequate hours in bed
related_topics:
  - perimenopause
  - anxiety
key_mechanisms:
  - hpa-axis-dysregulation
  - low-progesterone
  - blood-sugar-instability
coaching_scope_notes: |
  Sleep hygiene, breathwork, light exposure, dinner timing, glycine/magnesium
  supplementation, journaling. Coach can run sleep-focused 8-week protocol.
clinician_scope_notes: |
  Persistent >3 weeks unresponsive to lifestyle, suspected OSA, or insomnia
  with mood disorder requires clinician.
sources:
