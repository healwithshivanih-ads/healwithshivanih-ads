- chronic-inflammation
coaching_scope_notes: Breathwork, cold exposure, HRV biofeedback, gratitude journaling,
  physical connection are within coaching scope.
clinician_scope_notes: Persistent very low HRV despite lifestyle intervention may
  reflect PTSD, trauma history, or autonomic dysfunction requiring clinical or psychological
  evaluation.
evidence_tier: plausible_emerging
