summary: Reduced parasympathetic (vagus nerve) activity, resulting in poor emotional
  resilience, gut dysregulation, immune dysregulation, and poor HRV. Often a downstream
  effect of chronic stress or digital overstimulation.
common_symptoms:
- low HRV
- reduced stress resilience
- digestive impairment
- mood instability
- poor sleep
- chronic-fatigue
- poor-hrv
- anxiety
- poor-digestion
- emotional-numbness
red_flags:
- chronically low HRV unresponsive to lifestyle changes — may indicate trauma/PTSD
  requiring specialist care
- vagal syncope episodes (passing out with straining)
- Syncope or significant arrhythmia — refer to cardiology
related_topics:
- gut-brain-axis
- anxiety
- insomnia
