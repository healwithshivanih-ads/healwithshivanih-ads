summary: Based on William Beaumont's 19th-century gastric observations, optimal digestion
  takes 3.5–4 hours, followed by ~1 hour of rest, suggesting 5–6 hours between meals.
  Snacking between meals interrupts the pyloric sphincter opening cycle and prolongs
  stomach transit. Overeating, large fluid intake with meals, stress, and alcohol
  further delay gastric emptying.
