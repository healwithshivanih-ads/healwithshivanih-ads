- endothelial-dysfunction
coaching_scope_notes: 'Coaches can support lifestyle interventions targeting modifiable risk factors: diet, stress, sleep,
  and movement. Lab pattern recognition (TG:HDL ratio, hsCRP, homocysteine) can guide personalized coaching. Medication decisions
  and acute presentations must be referred to a clinician.'
clinician_scope_notes: Requires full cardiovascular risk stratification. Statin decisions, anticoagulant management, and acute
  cardiac events are clinician territory.
evidence_tier: strong
