slug: cardiometabolic-disease
display_name: Cardiometabolic Disease
aliases:
- cardiovascular disease
- CVD
- cardiometabolic disorder
summary: An umbrella term encompassing cardiac, vascular, and metabolic dysfunction. In functional medicine, metabolic processes
  (especially insulin resistance) are recognized as key drivers of cardiovascular disease, leading to the broader label 'cardiometabolic
  disease'. Primary pathological mechanisms include atherosclerosis and thromboembolism.
common_symptoms:
- chest-pain
- dyspnea
- dizziness-on-standing
- edema
- palpitations
red_flags:
- acute chest pain
- signs of stroke
- acute myocardial infarction
- cardiac arrest
