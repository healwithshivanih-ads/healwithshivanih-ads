coaching_scope_notes: Coaching role — high-complex-carb / high-soluble-fibre / small-frequent-meals
  diet, eliminate all simple refined carbs and alcohol, chromium and B-complex repletion,
  exercise to improve insulin sensitivity, viscous fibre supplements (glucomannan
  / PGX). CGM use for diagnosis and monitoring. Stress management.
clinician_scope_notes: GTT or G-ITT for confirmation; CGM increasingly preferred.
  Whipple's triad — CNS symptoms + glucose ≤40 mg/dL + relief with glucose. Rule out
  insulinoma in fasting hypoglycemia.
notes_for_coach: Pizzorno reframing — glycemic volatility (rapid drops) drives most
  symptoms, not absolute glucose level. Hypoglycemic index above 0.8 = reactive hypoglycemia.
  Strong overlap with migraine, PMS, depression, criminal/aggressive behaviour. Sugar-restricted
  diet reduced antisocial behaviour in male juvenile inmates.
sources:
- id: pizzorno-energy-cluster
  location: Hypoglycemia — General Considerations (pp 448-450)
  quote: Reactive hypoglycemia is the most common form. Symptoms occur 3 to 5 hours
    after a meal and may herald onset of early T2DM. Hypoglycemia is involved in various
    psychological disorders. Rather than absolute glucose level determining hypoglycemic
    symptoms, feelings of hypoglycemia occur when glucose drops rapidly, even when
    it was above normal.
