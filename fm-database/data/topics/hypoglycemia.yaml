summary: Two main categories — reactive hypoglycemia (symptoms 3-5 hours after meal,
  often heralding early T2DM) and fasting hypoglycemia (rare, severe disease states).
  Pizzorno's reframing — modern CGM data shows most "hypoglycemia" is really elevated
  glycemic volatility (rapid drops, even from above-normal levels, trigger symptoms
  via counter-regulatory hormones). Driven by refined carbohydrate intake, leads to
  Syndrome X (hyperinsulinemia → glucose intolerance → diminished insulin sensitivity
  → hypertension → hypercholesterolemia → obesity → T2DM). Strongly linked to migraine,
  PMS, depression, anxiety, aggressive behaviour.
common_symptoms:
- headaches
- depression
- anxiety
- irritability
- blurred-vision
- excessive-sweating
- mental-confusion
- food-cravings
- shakiness
- palpitations
red_flags:
- recurrent severe hypoglycemia with confusion/coma → rule out pancreatic tumour (insulinoma)
- post-bariatric or post-gastrectomy reactive hypoglycemia
- hypoglycemia in non-diabetic patient on no glucose-lowering medication
