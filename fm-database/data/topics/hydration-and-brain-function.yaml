coaching_scope_notes: Encourage sipping water steadily throughout the day rather than large boluses. Adding mineral-rich (Celtic/Baja)
  salt is a lifestyle suggestion, not a clinical prescription.
clinician_scope_notes: Electrolyte balance including sodium should be monitored in clients with cardiovascular or kidney conditions.
