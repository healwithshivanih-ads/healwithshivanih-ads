coaching_scope_notes: 'Coach focuses on breaking sitting time with small, frequent
  movement

  micro-doses (standing, walking breaks, squats, stretches every 30-60

  minutes). Emphasis on movement-first framing — sedentary''s opposite is

  movement, not formal exercise. Coach helps the client weave movement into

  daily life rhythms rather than prescribing gym attendance.

  '
clinician_scope_notes: 'Clinician assesses cardiometabolic risk markers (fasting insulin,
  A1c,

  lipids, liver enzymes) in chronically sedentary clients and clears for

  exercise progression when indicated.

  '
