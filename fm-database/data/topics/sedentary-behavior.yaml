summary: 'Sedentary behavior — prolonged sitting and physical inactivity — is

  characterized by minimal energy expenditure for extended periods (typically

  desk work, screen time). Described by the American Heart Association as a

  comparable health risk to smoking, and identified by the WHO as the fourth

  leading cause of death worldwide. Independent risk factor for type 2

  diabetes, insulin resistance, hypertension, metabolic syndrome,

  cardiovascular disease, certain cancers, fatty liver, and all-cause

  mortality.

  '
