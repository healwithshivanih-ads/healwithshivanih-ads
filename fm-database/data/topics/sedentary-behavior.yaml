summary: 'Sedentary behavior — prolonged sitting and physical inactivity — is

  characterized by minimal energy expenditure (low MET activity, around 1

  MET, equivalent to seated rest). The clinical definition used in FM

  coaching: not participating in at least 30 minutes of moderate-intensity

  activity, three days per week, for at least three months. Described by

  the American Heart Association as a comparable health risk to smoking,

  and ranked by the WHO as the fourth leading cause of death worldwide

  (behind blood pressure, smoking, and elevated blood sugar). Sedentary

  behavior approximately doubles risk for cardiovascular disease and type

  2 diabetes in adults; in children and adolescents it worsens blood

  pressure and self-esteem. The post-pandemic shift to remote work

  (~28% of US workers fully remote) has worsened daily sitting time to

  6-8 hours at desks. Independent risk factor — present even in clients

  with otherwise healthy nutrition and sleep.

  '
