  location: Units 17-20 (scope of practice, nutrition-counselling boundary, dual relationships)
  quote: The scope of practice for health coaching dictates that I refrain from diagnosing,
    treating, prescribing, or offering therapeutic counselling, including interpretation
    of lab findings or recommendation of supplements; what I do well is provide the
    how-to for your what.
