slug: coaching-scope-of-practice
display_name: Coaching Scope of Practice & Professional Integrity
aliases:
- health coaching scope
- coaching boundaries and ethics
- coach code of ethics
summary: 'The professional boundary that defines what a certified health/wellness
  coach does — support behaviour change, build self-efficacy, translate and implement
  provider plans, and hold accountability — versus what stays with a licensed clinician:
  diagnosing, treating, prescribing, interpreting labs, and psychological/therapeutic
  counselling. Also covers the ethics of dual relationships (friendships/intimacy
  with current or past clients) and holding the boundary gracefully when a referring
  provider or a client pushes the coach out of scope.'
