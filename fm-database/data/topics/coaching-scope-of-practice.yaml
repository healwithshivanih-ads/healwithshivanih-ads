coaching_scope_notes: Coaches educate, ask powerful/strategic questions, build self-efficacy
  and self-awareness, co-create step-by-step accountability plans, translate the "how"
  behind a provider's "what", and help clients prepare specific questions for their
  clinician. Coaches follow the NBHWC code of ethics — including no intimate relationships
  with current clients and transparent boundaries around social-media and business
  connections.
clinician_scope_notes: Diagnosing, treating, prescribing, interpreting individual
  lab findings, recommending supplements, and providing therapeutic/psychological
  counselling remain with the licensed clinician. When a client wants a food plan
  or intervention, the clinician prescribes it and the coach executes and reconciles
  it against what the client can actually sustain.
notes_for_coach: 'When a provider or client asks you to step out of scope, name your
  scope warmly and redirect to what you CAN do (behaviour change, accountability,
  question prep, lifestyle support). Keep a master mentor to debrief professional/ethical
  conflicts. For dual relationships: steer clear of intimacy with current clients
  absolutely; with past clients, test it against your own values and transparency.
  Consider separate personal vs professional social-media accounts.'
sources:
