summary: The brain retains the ability to form new neural pathways throughout life.
  Repeated thoughts, behaviours, and habits strengthen new pathways while old ones
  shrink. New habits take ~21 days to form and ~60 days to consolidate. This underpins
  recovery from depression, insomnia, negative thought patterns, and emotional dysregulation.
