red_flags:
- significant B12 deficiency
- recurrent infections
- H. pylori confirmed
- Peptic ulcer disease (contraindication to HCl supplementation)
- Persistent iron deficiency anemia unresponsive to supplementation
- peptic ulcer disease (contraindication to betaine HCl)
- significant unintentional weight loss
- severe anaemia from iron and B12 malabsorption
- Persistent symptoms unresponsive to PPIs or H2 blockers
- Severe or worsening iron-deficiency anaemia despite supplementation
- Suspected H. pylori infection
