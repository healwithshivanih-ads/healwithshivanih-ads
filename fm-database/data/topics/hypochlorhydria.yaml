- id: coconote-fm-calcium-deficiency
  location: Causes of Low Serum Calcium
  quote: stomach acid is required for absorption of calcium. So if somebody on a proton
    inhibitor or acid blocking drug that we have seen many patients who are long-term
    anti-acids. So in that case or in other case when there is a hypochlorhydria means
    low stomach acid, they have a low serum calcium level.
- id: coconote-fm-gut-skin-hormone-axis
  location: Blood Report Analysis
  quote: Whenever there is not enough HCL that is present, malabsorption, maldigestion
    starts taking place and then if the food is not digested properly, all the process
    ahead gets impacted. Low albumin is an indicator of hypochlorhydria and protein
    malabsorption.
- id: coconote-fm-hypochlorhydria
  location: Clinical Presentation of Low Stomach Acid
  quote: Most of the patients, when you see they have a history of heartburn, having
    a gastric reflux, having a chest tightness, and they have a gastric pain, conventionally,
    we diagnose them as hyperacidity, which is wrong. In these cases, it is usually
    the low stomach acid which causes these symptoms out.
