coaching_scope_notes: Coaches can support lifestyle modifications (stress reduction,
  parasympathetic activation, dietary triggers), educate on the reflux-mimicry of
  low stomach acid, and support the 5R gut protocol. Betaine HCL titration and diagnosis
  should be supervised by a clinician.
clinician_scope_notes: Diagnosis via Betaine HCL challenge titration; rule out H.
  pylori, autoimmune gastritis, and PPI-induced suppression. Monitor mineral status
  (iron, zinc, magnesium, calcium).
evidence_tier: plausible_emerging
sources:
- id: vitaone-gut-cheatsheet
  location: Gut Health Cheatsheet / Gut Dysbiosis vs SIBO vs SIFO vs Hypochlorhydria
  quote: Acid is essential for sterilizing + absorbing nutrients. Correct before killing
    protocols. Feels better with Betaine HCl, low protein tolerance.
- id: vitaone-gut-toolkit
  location: Testing for Low Stomach Acidity
  quote: As we age, stomach cells produce less acid, called Hydrochloric Acid (HCl).
    Certain medications can also lower stomach acid. This change in acidity affects
    the body's ability to digest protein, absorb minerals, and protect the body against
    food poisoning, H. pylori, parasites, and other infections.
