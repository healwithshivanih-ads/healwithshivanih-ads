coaching_scope_notes: 'Coach helps client identify a movement modality they genuinely enjoy and

  can sustain. Match intensity to current capacity — for inflamed,

  depleted, or adrenally-stressed clients, start with low-intensity movement

  and only introduce brief HIIT (1-2 minutes) once metabolic flexibility is

  established. Coach watches for signs of metabolic overtraining and

  encourages dose adjustment rather than abandonment.

  '
clinician_scope_notes: 'Clinician evaluates exercise tolerance, cardiovascular clearance, and any

  contraindications before recommending HIIT for clients with cardiac,

  endocrine, or inflammatory conditions.

  '
