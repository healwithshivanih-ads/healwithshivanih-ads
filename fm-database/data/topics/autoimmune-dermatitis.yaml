summary: Skin conditions in which an autoimmune mechanism is the primary driver —
  distinct from atopic dermatitis (Th2-IgE-mediated) and contact dermatitis (delayed
  hypersensitivity). Includes dermatitis herpetiformis (gluten-driven), pemphigus,
  pemphigoid, lichen planus, lupus skin manifestations, dermatomyositis, and the dermatitis
  pattern that frequently accompanies Hashimoto's thyroiditis and other systemic autoimmune
  disease. FM-relevant levers — gluten elimination (especially in dermatitis herpetiformis),
  gut-skin axis repair (leaky gut + dysbiosis), low-dose naltrexone, vitamin D repletion
  to 50-80 ng/mL, omega-3, stress / HPA-axis modulation, identification and removal
  of environmental triggers.
common_symptoms:
- skin-rash
- chronic-itching
- skin-inflammation
- skin-discoloration
red_flags:
- mucous membrane involvement (Stevens-Johnson, pemphigus)
- bullae or blistering
- systemic symptoms (fever, joint pain) → rheumatology referral
- pediatric severe presentations
