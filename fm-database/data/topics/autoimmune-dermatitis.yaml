coaching_scope_notes: Coaching role — strict gluten-free trial 3-6 months (especially
  if Hashimoto's or celiac antibodies suspected), gut healing (5R), vitamin D to 50-80
  ng/mL, omega-3, identify food allergens through elimination, dental amalgam workup
  if mercury exposure suspected, stress management. Refer to dermatology for biopsy
  + diagnosis confirmation. Refer to rheumatology if systemic signs.
clinician_scope_notes: Direct immunofluorescence biopsy, ANA, anti-Ro/La, anti-tTG
  IgA, total IgA, complement levels. Topical / systemic immunosuppressants per dermatology
  and rheumatology. Low-dose naltrexone increasingly used adjunctively.
notes_for_coach: In Hashimoto's patients with skin involvement, the autoimmune dermatitis
  often improves significantly with the same gut + gluten + vitamin D + selenium +
  omega-3 protocol used for the thyroid antibodies — both are driven by the same molecular
  mimicry + leaky gut axis.
