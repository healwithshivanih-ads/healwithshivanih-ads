summary: PEMT catalyses the endogenous synthesis of phosphatidylcholine in the liver
  using SAMe as a methyl donor. Variants dramatically increase dietary choline requirements,
  particularly during pregnancy, breastfeeding, and after menopause (when oestrogen
  normally upregulates PEMT). Insufficiency manifests as fatty liver, gallbladder
  problems, SIBO, musculoskeletal pain, and poor fat digestion.
