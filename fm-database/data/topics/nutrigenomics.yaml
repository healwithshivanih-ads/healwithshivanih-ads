summary: Nutrigenomics studies how a person's genetic variation shapes their response
  to food, nutrients, and lifestyle exposures. Joffe reframes the field as 'responsiveness'
  — why two people with the same exposure (a meal, a stressor, a trauma) respond differently.
  It works with low-penetrance ('low-impact') variants that are informative when grouped
  and scored together, not deterministic single genes. For coaching it answers 'why
  this client, specifically' and drives buy-in because the conversation is about the
  client's own biology.
