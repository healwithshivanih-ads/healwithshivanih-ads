coaching_scope_notes: 'In scope: use a client''s already-run genetic report (e.g.
  3X4, Genova) to personalise diet, movement and lifestyle education, and to reinforce
  a provider''s recommendations. Frame variants as ''insight into how you respond
  to the world'', never as ''good/bad'' or a diagnosis.'
clinician_scope_notes: Ordering, clinical interpretation, and any medication/supplement
  prescribing based on genetics sits with the clinician. High-penetrance (medical)
  genetics such as BRCA belongs to genetic counsellors/physicians, not coaching.
notes_for_coach: Joffe's one-word translation of nutrigenomics is 'responsiveness'.
  Testing is the 'what'; genetics is the 'why'. Most SNPs (3-4 million in the genome)
  are NOT clinically useful — focus only on the grouped, scored, actionable ones.
