slug: healthy-menstrual-cycle-baseline
display_name: Healthy Menstrual Cycle Baseline (Period as Vital Sign)
aliases:
- period as vital sign
- normal menstrual cycle
- healthy period
- menstrual cycle baseline
- ovulatory cycle
summary: 'The reference framework Lara Briden (and the American College of Obstetricians
  and Gynecologists 2015 statement) uses for what a healthy menstrual cycle looks
  like. The cycle is treated as a "monthly report card" — a vital sign reflecting
  overall metabolic, thyroid, gut, immune, and HPA-axis health. Key features of a
  healthy ovulatory cycle: cycle length 21-35 days (typically ~28), menstrual flow
  3-7 days, ovulation occurring mid-cycle with measurable rise in basal body temperature
  and mid-luteal progesterone, fertile cervical mucus around ovulation, minimal-to-mild
  PMS, no debilitating pain, and a steady predictable rhythm. The defining biochemical
  event is ovulation followed by corpus-luteum progesterone production — a real period
  proceeds from ovulation; a pill bleed does not and is more accurately called a withdrawal
  bleed.'
common_symptoms:
- light cramping at ovulation
- mild premenstrual breast tenderness
- fertile cervical mucus mid-cycle
- temperature rise after ovulation
red_flags:
- cycle length consistently >35 or <21 days
- absent periods for >3 months (refer)
- flooding or soaking through a pad/tampon hourly
- debilitating pain interfering with daily activity
- bleeding between periods (refer)
- bleeding after 12 months of amenorrhoea
