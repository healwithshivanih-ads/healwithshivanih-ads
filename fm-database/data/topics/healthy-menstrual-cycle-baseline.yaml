sources:
- id: briden-period-repair-manual-2018
  location: Chapter 1 — Period Revolution / Your Period Is Trying to Tell You Something,
    pp 3-9
  quote: Your period is not just your period. It is an expression of your underlying
    health. When you are healthy, your menstrual cycle will arrive smoothly, regularly,
    and without symptoms. When you are unhealthy in some way, your cycle will tell
    the story.
- id: briden-period-repair-manual-2018
  location: Chapter 1 — Period Revolution / ACOG vital sign citation, pg 4
  quote: In December 2015, together with the American Academy of Pediatrics, ACOG
    issued a groundbreaking statement called Menstruation in Girls and Adolescents
    — Using the Menstrual Cycle as a Vital Sign.
- id: briden-period-repair-manual-2018
  location: Chapter 1 — Be a Detective, pg 10
  quote: Ovulation matters because it is how you progress through all the menstrual
    cycle phases to your menstrual flow or period. Ovulation is also how you make
    progesterone.
coaching_scope_notes: Coaches can teach clients cycle tracking (apps, BBT, cervical
  mucus, period diary), what a healthy cycle looks like, when to seek clinical evaluation,
  and how to interpret cycle symptoms as feedback on overall health. This is one of
  the most actionable FM coaching topics.
clinician_scope_notes: Hormonal testing (FSH, LH, estradiol, progesterone, AMH), pelvic
  ultrasound, and any pharmacological management of cycle disorders are clinician
  scope.
