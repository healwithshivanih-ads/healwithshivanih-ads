coaching_scope_notes: Coaches can support low-glycemic whole-foods diet, stress management,
  low-intensity exercise, and supplement protocols. Hypothyroidism and hypoadrenalism
  require clinician evaluation.
clinician_scope_notes: Evaluate thyroid, adrenal, Candida, food allergies, EFA status,
  magnesium, NADH, CoQ10. Consider anti-Candida protocol and liver detox program.
