summary: Multifactorial condition defined by recurrent fatigue >6 months with 50%
  activity reduction. Centrally features disturbed immune function (decreased NK cell
  activity, altered T-helper:T-suppressor ratio, low or high interferon), mitochondrial
  energy failure, and overlap with fibromyalgia and multiple chemical sensitivity.
  Effective FM approach addresses liver detoxification, food allergy elimination,
  gut restoration, adrenal/HPA support, and mitochondrial cofactors (carnitine, CoQ10,
  magnesium).
