slug: chronic-fatigue-syndrome
display_name: Chronic Fatigue Syndrome
aliases:
- CFS
- myalgic encephalomyelitis
- ME/CFS
- chronic fatigue and immune dysfunction syndrome
- CFIDS
summary: Complex multisystem condition characterized by debilitating fatigue, post-exertional malaise, sleep disturbance,
  cognitive dysfunction, and immune dysregulation. No single infectious cause established. Multiple contributing factors include
  hypothyroidism, hypoadrenalism, candidiasis, food allergies, EFA deficiency, hypoglycemia, and impaired liver detoxification.
common_symptoms:
- chronic-fatigue
- muscle-pain
- joint-pain
- insomnia
- low-mood
- recurrent-sore-throat
- lymph-node-pain
- brain-fog
red_flags:
- Rule out serious underlying infection
- Rule out depression requiring psychiatric referral
related_topics:
- chronic-candidiasis
- hypothyroidism
- hypoadrenalism
- food-allergy
- autoimmunity-leaky-gut-triad
key_mechanisms:
- mitochondrial-dysfunction
- hpa-axis-dysregulation
- dysbiosis
- impaired-immune-function
coaching_scope_notes: Coaches can support low-glycemic whole-foods diet, stress management, low-intensity exercise, and supplement
  protocols. Hypothyroidism and hypoadrenalism require clinician evaluation.
clinician_scope_notes: Evaluate thyroid, adrenal, Candida, food allergies, EFA status, magnesium, NADH, CoQ10. Consider anti-Candida
  protocol and liver detox program.
evidence_tier: plausible_emerging
sources:
