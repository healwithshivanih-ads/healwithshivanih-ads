slug: low-fodmap-diet
display_name: Low FODMAP Diet
aliases:
- FODMAP elimination
- FODMAP diet
- fermentable carbohydrate restriction
- low fermentable carbohydrate diet
summary: A short-term, evidence-based elimination diet that restricts Fermentable
  Oligosaccharides, Disaccharides, Monosaccharides, and Polyols to reduce IBS-type
  symptoms, followed by systematic reintroduction to identify personal FODMAP thresholds.
common_symptoms:
- bloating
- abdominal-gas
- abdominal-cramping
- osmotic-diarrhea
- acid-reflux
- abdominal-pain
- flatulence
- diarrhea
- constipation
- urgency-to-defecate
- gas-flatulence
- nausea
- heartburn-reflux
red_flags:
- Symptoms persisting despite strict low-FODMAP compliance (consider SIBO testing
  or IBD workup)
- Significant unintentional weight loss
- Blood in stool
- failure to improve after 6 weeks
- unintentional weight loss
- rectal bleeding
- blood in stool
- nocturnal diarrhea — refer to gastroenterologist
related_topics:
- sibo
- ibs
- gut-dysbiosis
- leaky-gut
- elimination-diet
- gut-brain-axis
key_mechanisms:
- gut-fermentation-dysbiosis
- lactase-deficiency-osmotic-load
- fructose-malabsorption
- colonic-fermentation
- osmotic-fluid-shift
- gut-motility-dysregulation
- fodmap-fermentation-gas-production
- osmotic-fluid-shifts-in-gut
- gut-brain-axis-dysregulation
coaching_scope_notes: Coaches can implement the structured elimination and reintroduction
  phases using the Green/Yellow/Red food chart. Portion control and food stacking
  rules are key. Refer if symptoms worsen or do not improve.
clinician_scope_notes: Consider ruling out IBD, celiac disease, and SIBO before initiating
  low FODMAP. Monitor nutritional adequacy.
evidence_tier: strong
sources:
- id: vitaone-elimination-diet-cheatsheet
  location: FODMAP Diet Cheatsheet — Introduction
  quote: FODMAPs = Fermentable Oligo-, Di-, Mono-saccharides And Polyols. They're
    not 'bad foods' - they're poorly absorbed carbs that ferment and feed dysbiotic
    bacteria, driving IBS, SIBO, and bloating.
- id: vitaone-elimination-diet-toolkit
  location: Low Fodmap Detailed Chart (Indian Version)
  quote: This Low FODMAP chart is a practical, portion-based guide for clinicians
    and patients to reduce IBS-type symptoms during the short elimination phase.
- id: vitaone-health-coaching-toolkit
  location: Low Fodmap Detailed Chart — INDIAN VERSION
  quote: Low FODMAP works best when it's implemented as a short, structured elimination
    followed by systematic reintroduction to identify the patient's personal triggers
    and expand variety.
