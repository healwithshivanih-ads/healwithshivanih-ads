summary: A functional medicine dietary framework designed to support liver, gut, and
  kidney detoxification pathways through high-quality protein, phytonutrient-dense
  plant foods, organic/clean foods, adequate fiber (>35g/day), and targeted antioxidants.
  Distinct from a short-term elimination diet in that it emphasizes long-term nutritional
  support.
