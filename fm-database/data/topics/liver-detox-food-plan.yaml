coaching_scope_notes: Coaches can guide food selection, organic purchasing, fiber
  intake, hydration, and avoidance of common allergens and toxin-laden foods. Calorie
  prescription and supplement dosing require clinician involvement.
clinician_scope_notes: Clinician may individualize calorie targets for blood sugar,
  weight loss, or body composition goals. Supplement and medical food powder protocols
  require prescriber oversight.
