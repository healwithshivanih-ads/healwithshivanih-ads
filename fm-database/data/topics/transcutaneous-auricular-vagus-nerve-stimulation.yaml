  location: full text
  quote: taVNS activates inhibitory pathways to the hypothalamic paraventricular nucleus,
    potentially reducing CRH release.
evidence_tier: plausible_emerging
coaching_scope_notes: Coach role — educate that taVNS exists as a non-invasive option
  for stress-induced cortisol elevation and chronic inflammatory conditions, mention
  regulated device categories, refer to physician for protocol. Pair with breathwork,
  cold exposure, humming/gargling, and meditation as zero-cost vagal-tone practices
  that share the underlying mechanism.
clinician_scope_notes: Device selection, electrode placement (cymba conchae vs tragus),
  pulse parameters (typically 20-25 Hz, 200-500 μs pulse width, intensity titrated
  to mild paresthesia below pain threshold), session duration, and contraindication
  screening (active arrhythmia, implanted cardiac devices, pregnancy).
notes_for_coach: Evidence base is small but growing. Cuberos 2025 is n=12 healthy
  adults + one psoriasis case — too small to recommend prescriptively, but enough
  to mention as an emerging adjunct when a client asks about HRV trackers or vagus-nerve
  devices. Free practices first.
