slug: transcutaneous-auricular-vagus-nerve-stimulation
display_name: Transcutaneous Auricular Vagus Nerve Stimulation (taVNS)
aliases:
- taVNS
- auricular vagus stimulation
- ear vagus stimulation
- non-invasive vagus nerve stimulation
summary: 'Non-invasive electrical stimulation of the auricular branch of the vagus
  nerve via a clip-on ear electrode (typically cymba conchae or tragus). Activates
  afferent vagal fibres that project to the nucleus tractus solitarius (NTS) and from
  there to autonomic and limbic regions. Investigational use for stress-induced cortisol
  elevation, chronic inflammatory conditions (psoriasis, RA, IBD), depression, epilepsy,
  migraine, and POTS. Devices range from clinical units to consumer wearables (Nurosym,
  Xen by Neuvana). Coaching scope: education on availability and limitations only;
  device selection and use protocols belong to clinicians.'
