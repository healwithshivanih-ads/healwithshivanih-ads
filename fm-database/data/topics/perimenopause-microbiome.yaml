slug: perimenopause-microbiome
display_name: Perimenopause & Menopausal Microbiome Changes
aliases:
- menopause microbiome
- perimenopause vaginal health
summary: As women age and enter perimenopause and menopause, loss of Lactobacillus
  crispatus becomes prevalent, leading to vaginal dryness, increased susceptibility
  to infections, and incontinence. The vaginal microbiome shifts are bidirectional
  with hormonal changes. Restoring crispatus through oral or fermented probiotic sources
  may rejuvenate vaginal tissue and improve skin collagen.
common_symptoms:
- vaginal-dryness
- incontinence
- vaginal-infections
- skin-aging
- reduced-vaginal-sensation
red_flags:
- recurrent-uti
- prolapse
related_topics:
- vaginal-microbiome
- gut-microbiome
key_mechanisms:
- lactobacillus-crispatus-dominance
- estrogen-vaginal-microbiome-axis
coaching_scope_notes: Coaches can support crispatus restoration through fermented
  yogurt and probiotic supplementation. Hormone therapy decisions must be referred
  to clinicians.
clinician_scope_notes: Vaginal atrophy and estrogen deficiency interact with microbiome.
  Clinician input needed for hormone therapy decisions.
