summary: The cumulative accumulation of environmental toxicants (heavy metals, pesticides,
  plasticizers, industrial chemicals) in the body that, when exceeding the individual's
  clearance capacity, may contribute to a range of chronic symptoms and diseases.
common_symptoms:
- fatigue
- unexplained-weight-gain
- brain-fog
- headache
- mood-changes
- infertility
red_flags:
- progressive neurological symptoms (tremors, cognitive decline)
- suspected heavy metal poisoning
