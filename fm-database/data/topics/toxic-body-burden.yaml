summary: The accumulated total of environmental toxins, heavy metals, pesticides, plasticizers, and endogenous metabolic byproducts
  stored in the body's tissues. Influenced by exposure levels, genetic detox enzyme efficiency, and nutritional status. Scientists
  estimate the average adult carries at least 700 toxins.
common_symptoms:
- fatigue
- unexplained-weight-gain
- brain-fog
- headache
- mood-changes
- infertility
- obesity
- cognitive-difficulties
- mood-disorders
- headaches
red_flags:
- progressive neurological symptoms (tremors, cognitive decline)
- suspected heavy metal poisoning
- neurological symptoms such as tremors
- metabolic syndrome with unexplained etiology
