coaching_scope_notes: Coaches can help clients audit environmental exposures, adopt
  organic/clean food choices, and reduce plastic/chemical exposures in home and kitchen.
clinician_scope_notes: Heavy metal testing, advanced detox protocols, and assessment
  of genetic enzyme variants (SNPs) require clinician oversight.
evidence_tier: plausible_emerging
