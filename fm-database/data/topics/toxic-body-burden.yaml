coaching_scope_notes: Coaches can educate on sources of toxin exposure, support organic food choices, and facilitate completion
  of toxin exposure questionnaires. Lab interpretation and diagnosis are clinician scope.
clinician_scope_notes: Clinicians assess toxic load via MSQ, environmental exposure history, and relevant labs. Detox protocols
  requiring fasting, medical foods, or chelation are clinician-directed.
