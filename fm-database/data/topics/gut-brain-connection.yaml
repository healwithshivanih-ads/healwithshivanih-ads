coaching_scope_notes: Coaches can support dietary changes (gluten-free, dairy-free trials) and gut microbiome restoration
  strategies. Lab interpretation, clinical diagnosis, and medication decisions are out of scope.
clinician_scope_notes: Consider GAPS protocol, testing for gut permeability, and evaluation of opiate peptide effects in psychiatric
  presentations. MMR vaccine discussion is highly controversial; refer to clinician.
