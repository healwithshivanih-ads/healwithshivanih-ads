summary: The functioning of the gut directly affects the functioning of the brain, primarily through the gut microbiome's
  role in nutrient absorption, protection of gut-lining cells, and prevention of opiate-like peptides (glutomorphine, caseomorphine)
  from entering the bloodstream and affecting brain opiate receptors.
evidence_tier: plausible_emerging
