  location: Podcast — reverse T3 segment
  quote: Reverse T3 is the anti-thyroid hormone. I always use the analogy of a bouncer
    at a club, standing outside the cell door, arms crossed, telling T3 it can't get
    in. If your reverse T3 is high on a day-to-day basis, where you're not trying
    to survive — that T4 hormone has chosen the reverse T3 path and basically put
    your body into survival mode.
