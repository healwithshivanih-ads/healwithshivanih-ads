summary: Reverse T3 (rT3) is the inactive isomer of T3 produced when T4 takes the
  "survival" conversion path instead of becoming free T3. It occupies T3 receptors
  without activating them — functionally an anti-thyroid hormone. Elevated rT3 is
  adaptive when fighting major illness or trauma (it conserves energy by shutting
  down peripheral metabolism) but pathological when present in day-to-day life — it
  manifests as classic hypothyroid symptoms despite "normal" TSH and free T4. Common
  drivers of high rT3 — chronic stress (elevated cortisol), insulin resistance, heavy-metal
  toxicity, chronic infection, DIO1/DIO2 SNPs, low-calorie dieting, and prolonged
  intermittent fasting. Coach should request reverse T3 on every full thyroid panel
  — Hornaman's optimal range is below 12 ng/dL.
