slug: intestinal-permeability-leaky-gut
display_name: Intestinal Permeability (Leaky Gut)
aliases:
- leaky gut
- gut barrier dysfunction
- intestinal hyperpermeability
summary: Increased intestinal permeability allows undigested peptides and antigens
  (e.g., gliadin, casein) to cross the gut lining and enter the bloodstream, triggering
  immune reactions. Considered the root cause of both food allergy and food sensitivity
  in this FM framework. Upstream drivers include stress, infection, dysbiosis, inflammation,
  low stomach acid, nutritional deficiency, and environmental toxins.
common_symptoms:
- food-sensitivity-symptoms
- fatigue
- brain-fog
- abdominal-pain
- multiple-food-reactions
red_flags:
- Progressive worsening of multiple food reactions — refer to gastroenterologist
- Suspected celiac disease — refer for biopsy and serology
