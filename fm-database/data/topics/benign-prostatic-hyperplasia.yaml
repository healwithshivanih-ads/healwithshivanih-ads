slug: benign-prostatic-hyperplasia
display_name: Benign Prostatic Hyperplasia
aliases:
- BPH
- enlarged prostate
- prostate enlargement
- lower urinary tract symptoms
summary: Age-related prostate enlargement driven by DHT accumulation via 5-alpha-reductase conversion of testosterone, increased
  estradiol from peripheral aromatization in body fat, and prolactin stimulation. Risk factors include abdominal obesity,
  sedentary lifestyle, and high-fat diet. Natural therapies target multiple hormonal pathways.
common_symptoms:
- incomplete-bladder-emptying
- urinary-urgency
- urinary-frequency
- weak-urinary-stream
- straining-to-urinate
- nocturia
- urinary-intermittency
- urinary-straining
red_flags:
- severe BPH score (20-35)
- urinary retention
- hematuria
- BPH score ≥20 (severe) requires urological referral
- Acute urinary retention is a medical emergency
- Acute urinary retention — catheterization required
- Residual urine >100mL — consider alpha-1 antagonist
- Hematuria, recurrent infections, renal impairment — refer for surgery
- PSA elevation — rule out prostate cancer
