coaching_scope_notes: Coaches can support dietary changes, exercise, saw palmetto and botanical protocols, zinc, and vitamin
  D. PSA interpretation, surgical decisions, and medication are clinician scope.
clinician_scope_notes: Clinician should rule out prostate cancer, prescribe pharmaceutical 5-α reductase inhibitors (e.g.,
  finasteride) if indicated, and coordinate urological care.
evidence_tier: strong
sources:
- id: vitaone-sex-hormones-toolkit
  location: 'Maintaining Healthy Testosterone Levels: 5-a Reductase Inhibitors — Page 06'
  quote: 5-a reductase is a key enzyme in the body which regulates the conversion of testosterone to a hormone called dihydrotestosterone
    (DHT). When testosterone is converted to DHT, testosterone is lowered and can no longer work effectively. This can result
    in conditions such as enlargement of the prostate in men.
- id: vitaone-health-coaching-toolkit
  location: 'Maintaining Healthy Testosterone Levels: 5-a Reductase Inhibitors'
  quote: This can result in conditions such as enlargement of the prostate in men, hair loss in both men and women, and extra
    facial hair and acne in women.
- id: pizzorno-textbook-gi-2
  location: Benign Prostatic Hyperplasia — General Considerations
  quote: BPH is the fourth most common diagnosis in older men; 50% of men over age 50 are affected, and 90% of men will have
    an enlarged prostate by age 80.
