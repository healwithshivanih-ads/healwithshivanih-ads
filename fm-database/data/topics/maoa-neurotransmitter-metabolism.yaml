- id: dirty-genes-lynch
  location: 'Chapter 8 — MAOA: The Basics'
  quote: The MAOA gene produces the MAOA enzyme, which helps you process two key stress
    neurotransmitters—dopamine and norepinephrine—both of which enable you to rev
    your body up for the stress response. MAOA also helps you process serotonin, a
    neurotransmitter that enables you to feel calm and optimistic.
