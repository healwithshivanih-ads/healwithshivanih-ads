summary: The MAOA gene encodes an enzyme that breaks down key neurotransmitters—dopamine,
  norepinephrine, and serotonin. Genetic variants or environmental stressors can make
  MAOA run too fast (depleting neurotransmitters, causing low mood and carb cravings)
  or too slow (accumulating them, causing irritability, anxiety, and difficulty calming
  down). Lynch frames both as 'dirty MAOA' presentations requiring distinct dietary
  and lifestyle support.
