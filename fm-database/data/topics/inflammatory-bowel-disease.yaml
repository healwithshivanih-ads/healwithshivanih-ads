coaching_scope_notes: Coaches may support dietary modification (elimination of allergens,
  carrageenan, refined sugar), prebiotic/probiotic guidance, and supplement education.
  Severe flares, bloody stools, and fever require immediate clinician referral.
clinician_scope_notes: Monitor nutritional deficiencies (Zn, Mg, Fe, B12, folate,
  vitamins A/D/E/K). Corticosteroids and sulfasalazine increase nutrient needs. Fecal
  calprotectin and CDAI are useful monitoring tools.
evidence_tier: strong
