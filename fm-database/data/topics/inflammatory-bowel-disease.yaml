summary: A group of chronic inflammatory disorders of the bowel, principally Crohn's
  disease (CD) and ulcerative colitis (UC). CD involves full-thickness, patchy, transmural
  inflammation that can affect any part of the alimentary tract; UC is a superficial,
  continuous inflammation limited to the colonic mucosa. Both share genetic predisposition,
  environmental triggers, dysbiosis, nutritional deficiencies, and elevated risk of
  colonic carcinoma.
