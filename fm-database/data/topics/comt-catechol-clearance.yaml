summary: 'COMT methylates and clears catecholamines (dopamine, norepinephrine, epinephrine)
  and catechol-estrogens. A slow COMT variant leads to neurotransmitter and estrogen
  accumulation; a fast COMT clears them too quickly. Lynch frames meal protein content
  as a key lever: slow COMT benefits from lower evening protein.'
