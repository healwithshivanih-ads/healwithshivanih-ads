    estrogen-sensitive cancers.
- id: comt-catechol-metabolism-review-2002
  location: Enzyme-substrate breadth
  quote: COMT is crucial to the metabolism of carcinogenic catechols and catecholamines,
    and catalyses the methylation of catechol estrogens to methoxy estrogens.
- id: comt-genotype-neuropsychiatric-review-2021
  location: Val158Met and mood/cognition
  quote: The variant (Met) isoform differs from wild-type COMT by being thermolabile,
    leading to 2-3-fold lower levels of product formation.
