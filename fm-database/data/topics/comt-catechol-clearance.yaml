coaching_scope_notes: 'Slow COMT: reduce protein at dinner, emphasize complex carbs
  and salads. Fast COMT: ensure balanced protein at all meals. Avoid excess stimulants.'
clinician_scope_notes: COMT Val158Met is a well-characterised variant. High-estrogen
  load (HRT, OCP) may disproportionately burden slow-COMT individuals.
