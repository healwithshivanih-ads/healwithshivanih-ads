coaching_scope_notes: Coaches can guide food choices, supplement timing, sleep hygiene,
  and detox practices per the Soak & Scrub framework. Gene-specific SNP interpretation
  and prescription medication tapering are out of scope.
clinician_scope_notes: Single-SNP determinism overstated in consumer framing. Medication
  tapering (e.g., antacids) requires clinician oversight. Genetic testing results
  need validated interpretation.
