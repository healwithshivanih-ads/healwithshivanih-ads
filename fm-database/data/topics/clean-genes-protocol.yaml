summary: A two-week foundational lifestyle reset designed by Ben Lynch to reduce the
  epigenetic and metabolic load on seven key gene pathways (MTHFR, COMT, MAOA, DAO,
  GST/GPX, NOS3, PEMT) through food quality, targeted supplementation, environmental
  toxin reduction, sleep optimization, and stress management.
