slug: lectin-sensitivity
display_name: Lectins & Gut Inflammation
aliases:
- lectin intolerance
- plant lectins
- dietary lectins
summary: Lectins are plant compounds found in unripe fruit, legumes, and certain grains.
  If lectins enter the bloodstream (due to poor gut flora or improper food preparation),
  they can increase inflammation. Traditional preparation methods—soaking, rinsing,
  pressure cooking, fermentation—significantly reduce lectin load. Individuals with
  arthritis or gout may benefit from avoiding nightshade vegetables.
common_symptoms:
- inflammation
- joint-pain
- bloating
red_flags: []
