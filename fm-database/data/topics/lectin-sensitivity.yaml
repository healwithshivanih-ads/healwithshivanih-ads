- food-immune-cross-reactivity
coaching_scope_notes: Coaches can educate clients on lectin-reducing food preparation
  techniques. Emphasise soaking legumes, rinsing quinoa, using sourdough, and de-seeding/de-skinning
  nightshades.
clinician_scope_notes: Lectin sensitivity is not a clinically recognised diagnosis.
  Refer clients with persistent inflammatory conditions for proper workup.
