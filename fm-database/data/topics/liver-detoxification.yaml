summary: The liver's three-phase biotransformation of endogenous and exogenous toxins. Phase 1 (cytochrome P450 enzymes) oxidises
  lipophilic toxins; Phase 2 (conjugation) attaches water-soluble groups (glucuronide, sulfate, glutathione, glycine, methyl);
  Phase 3 (elimination) exports conjugates via bile or kidneys. Each phase requires specific nutrient cofactors and protective
  antioxidants.
