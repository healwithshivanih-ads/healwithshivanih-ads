summary: Female infertility is the inability to conceive after 12 months of regular
  unprotected intercourse. Ovulation disorders (40% — including PCOS, thyroid, hyperprolactinemia,
  premature ovarian failure), tubal factors (30%), endometriosis (15%), and uterine/cervical
  factors are the main drivers. Age (especially after 31), body fat percentage outside
  20-25%, smoking, caffeine, alcohol, environmental toxicants, and iron deficiency
  all measurably reduce fecundity. Functional medicine approach centers on preconception
  nutrition (Mediterranean pattern, whole-fat dairy, plant protein, low GI carbs,
  iron, antioxidants), removing inhibitors (smoking, alcohol, caffeine, toxins), and
  herbs like chasteberry to address prolactin-driven cycle irregularities.
