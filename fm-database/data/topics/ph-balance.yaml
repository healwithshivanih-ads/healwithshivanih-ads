slug: ph-balance
display_name: pH Balance & Acid-Alkaline Health
aliases:
- acid-alkaline balance
- body pH
- cellular pH
summary: The human body maintains blood pH within a very narrow range (7.3–7.5) via
  the lungs and kidneys. Cellular pH (~6.5) can shift based on diet, lifestyle, sleep,
  stress, and other factors. A more acidic cellular environment is associated with
  disease, including cancer and fungal overgrowth. Diet, water intake, sunshine, exercise,
  and stress management all influence cellular pH.
