coaching_scope_notes: Coaches can discuss alkaline-forming vs acid-forming foods,
  lifestyle habits (sleep, stress, hydration, moderate exercise, sunshine), and general
  dietary principles. Do not advise on blood pH interpretation or clinical lab values.
clinician_scope_notes: Blood pH regulation is a medical topic. Acidosis and alkalosis
  require clinical diagnosis and management. Refer out for any client reporting extreme
  fatigue, confusion, or respiratory distress.
