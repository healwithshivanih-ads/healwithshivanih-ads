coaching_scope_notes: Encourage clients to disclose all medications and supplements
  to their prescribing clinician. Do not adjust medication-adjacent supplement protocols
  without clinician approval.
clinician_scope_notes: Metformin depletes B12 and folate; PPIs deplete magnesium,
  calcium, iron, B12, and zinc; statins deplete CoQ10; warfarin interactions with
  vitamin K and fish oil require INR monitoring.
