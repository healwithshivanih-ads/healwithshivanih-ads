slug: normal-renin-essential-hypertension
display_name: Normal-Renin Essential Hypertension
aliases:
- insulin-resistant hypertension
summary: Subtype of essential hypertension typically associated with insulin resistance
  and abdominal obesity. Hyperinsulinemia decreases cytosolic magnesium and increases
  cytosolic calcium in vascular smooth muscle, raising vascular reactivity. Does not
  respond to sodium restriction alone.
related_topics:
- essential-hypertension
- insulin-resistance
- metabolic-syndrome
key_mechanisms:
- insulin-resistance
- vascular-smooth-muscle-dysregulation
