sources:
- id: pizzorno-cardiometabolic-hypertension
  location: General Considerations
  quote: Normal-renin essential hypertensives typically are insulin resistant with
    abdominal obesity. Because insulin modifies ion transport across cell membranes,
    insulin insensitivity decreases cytosolic magnesium (Mg) and increases cytosolic
    calcium (Ca) in vascular smooth muscle, increasing vascular reactivity.
