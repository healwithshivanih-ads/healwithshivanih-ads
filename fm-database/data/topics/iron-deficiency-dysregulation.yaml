slug: iron-deficiency-dysregulation
display_name: Iron Deficiency & Iron Dysregulation
aliases:
- functional iron deficiency
- iron dysregulation
summary: Iron deficiency extends beyond low haemoglobin to a multi-stage dysfunction involving absorption, inflammation, hepcidin
  regulation, and cofactor availability. Ferritin can appear falsely normal during inflammation, and gut integrity is central
  to iron utilisation.
common_symptoms:
- lethargy
- hair-loss
- brain-fog
- restless-legs
- anxiety
red_flags:
- suspected GI bleed
- iron deficiency unresponsive to oral supplementation
- haemoglobin below 80 g/L
related_topics:
- medication-induced-nutrient-depletion
- sibo
- metabolic-health-lchf
key_mechanisms:
- hepcidin-mediated-iron-block
- heme-vs-nonheme-iron-absorption
- inflammation-masking-ferritin
coaching_scope_notes: Coaches can support dietary iron sources, cofactor foods (vitamin C, copper-rich foods), and gut health.
  Lab interpretation and dosing are clinician territory.
clinician_scope_notes: Assess ferritin, transferrin saturation, and CRP together. Consider alternate-day oral iron to bypass
  hepcidin. Investigate H. pylori, celiac disease, or GI bleed as root causes.
evidence_tier: plausible_emerging
