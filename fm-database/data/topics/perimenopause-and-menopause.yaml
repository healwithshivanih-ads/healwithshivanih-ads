slug: perimenopause-and-menopause
display_name: Perimenopause & Menopause
aliases:
- the change
- hormonal transition
- post-menopause
summary: The transitional and post-reproductive phases of a woman's life characterized by declining sex steroid hormones,
  rising FSH, and wide-ranging systemic effects beyond reproductive function including bone loss, cognitive changes, cardiovascular
  risk, and metabolic shifts.
