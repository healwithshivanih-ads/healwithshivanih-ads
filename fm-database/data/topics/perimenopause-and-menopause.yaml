- fsh-elevation-aging-cascade
coaching_scope_notes: Coaches can support clients through education on lifestyle, nutrition, and supplement strategies that
  support hormonal health. Symptom tracking and referral to a qualified hormone clinician is appropriate.
clinician_scope_notes: FSH is a key biomarker; target <25 in women on HRT. Early menopause (<45) dramatically increases cardiovascular
  and all-cause mortality risk if untreated.
evidence_tier: strong
