notes_for_coach: >-
  Common gap in Indian FM practice. Target dose: 1.0-1.2 g/kg for general
  health, 1.4-1.6 g/kg during active gut repair / fat loss / perimenopause.
  Distribute across meals — 25-30 g per meal triggers muscle protein
  synthesis. Pair grains + legumes within the same day (not necessarily
  same meal) for complete amino acid profile. Soaking and sprouting
  improves digestibility and reduces anti-nutrient interference with
  mineral absorption.
