slug: zone-2-cardio-for-mitochondria
display_name: Zone 2 Cardio for Mitochondrial Health
aliases:
- san milan zone 2
- aerobic base training
summary: Iñigo San-Millán's body of work — steady-state cardiovascular exercise sessions
  of 30-60 minutes, at intensity where the client can speak in full sentences but
  a phone listener could detect their breathing, performed at least 2-4 times per
  week — is the most mitochondrial-density-stimulating training modality. San-Millán's
  laboratory testing showed that athletes who ONLY did weight training and high-intensity
  interval training showed signs of insulin resistance and mitochondrial impairment
  despite being lean and visibly fit, sitting closer on a metabolic-health spectrum
  to clients with metabolic syndrome than to endurance athletes. Masterjohn and Whitten
  both name this as the single biggest "unobvious low-hanging fruit" they missed for
  20+ years of weights+HIIT-only training. Coach prescription — add 2-4 zone-2 sessions
  per week alongside strength training.
