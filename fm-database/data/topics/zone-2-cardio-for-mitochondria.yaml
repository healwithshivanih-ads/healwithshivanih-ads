  location: Podcast — Zone 2 segment
  quote: I would look toward the work of Iñigo San-Millán on zone 2 cardio training.
    The best type of exercise to support your mitochondrial health is basically steady
    state cardio at sessions of at least a half hour if not an hour at least a couple
    times if not four times a week. When they test athletes who only do weight training
    and high-intensity interval training, they have some of the signs of insulin resistance
    and not so great metabolic health.
