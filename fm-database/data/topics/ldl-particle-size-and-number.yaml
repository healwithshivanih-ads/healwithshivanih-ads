slug: ldl-particle-size-and-number
display_name: LDL Particle Size and Number in Cardiovascular Risk
aliases:
- LDL-P
- small dense LDL
- LDL subfractions
- pattern A vs pattern B LDL
summary: It is not total LDL cholesterol concentration alone but the number and size
  of LDL particles that most accurately predict atherosclerosis risk. Small, dense
  LDL particles penetrate the endothelium more readily, become oxidized, and trigger
  macrophage-mediated plaque formation. Large, buoyant LDL particles carry lower risk
  even at higher concentrations.
common_symptoms:
- asymptomatic
- dyslipidemia
