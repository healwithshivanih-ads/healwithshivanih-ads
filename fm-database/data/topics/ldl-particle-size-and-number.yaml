- ldl-oxidation
- endothelial-dysfunction
coaching_scope_notes: Coaches can explain particle size concepts to clients in lay
  terms. LDL particle number testing (NMR lipoprofile) is available in the US and
  Europe but not widely in India. TG/HDL ratio and standard lipid profile patterns
  can serve as proxies.
clinician_scope_notes: LDL-P testing (NMR lipoprofile) provides direct particle number
  and size. Pattern D (high number + high small dense LDL) carries the highest atherogenic
  risk.
evidence_tier: plausible_emerging
