  location: Podcast — whole body energy gate segment
  quote: You could simplify it into leptin made by your adipose tissue as a signal
    of long-term energy stores. Insulin from your meal is a signal of short-term energy
    stores. And cortisol and the related hormones and the fight or flight response
    is the signal of the stresses that will demand energy. If your brain decides that
    you're in a state of scarcity, then it doesn't really matter whether you have
    a healthy mitochondria or a genetic defect — your brain has executively decided
    that all the mitochondria are going to slow down.
