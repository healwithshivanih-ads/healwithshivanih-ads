slug: leptin-insulin-cortisol-energy-gate
display_name: Leptin-Insulin-Cortisol Whole-Body Energy Gate
aliases:
- whole body energy regulator
summary: Masterjohn's framing of mitochondrial output as gated at the WHOLE-BODY level
  by three integrated signals before any cellular-nutrition story matters — leptin
  (signal of long-term energy stores from adipose tissue), insulin (signal of short-term
  energy availability from the latest meal), and cortisol (signal of stress demand).
  When body composition is healthy AND macronutrient composition is adequate AND psychosocial
  stress is managed, the brain "permits" the mitochondria to invest energy in long-term
  health, fertility, and feeling good. When ANY of the three signals reads scarcity
  or threat, the brain executively decides that ALL mitochondria slow down — regardless
  of whether the cellular biochemistry is intact, mega-dosed with B vitamins, or genetically
  perfect. Implication for coach — body composition + macros + stress regulation precede
  every micronutrient conversation. U-shaped fertility curve (underweight + overweight
  both infertile) illustrates how the body penalises any "scarcity-or-threat" state.
