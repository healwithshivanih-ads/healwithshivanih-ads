summary: The Mediterranean diet has Level A evidence for reducing cardiovascular mortality (15–30%), fatal and non-fatal MI
  (73% risk reduction in Lyon Diet Heart Study), and inflammatory markers including CRP, IL-6, and insulin resistance. Core
  elements include vegetables, whole grains, fish high in omega-3, nuts, seeds, olive oil, and minimal added sugar.
