summary: Structured breathing practices that modulate the autonomic nervous system, vagal tone, HPA axis, oxygen-CO2 balance,
  inflammation, and mitochondrial function. Different techniques are matched to clinical conditions including IBS, anxiety,
  insomnia, PCOS, hypertension, chronic fatigue, and PTSD.
