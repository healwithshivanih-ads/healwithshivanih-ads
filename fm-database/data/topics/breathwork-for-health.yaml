coaching_scope_notes: Coaches can prescribe diaphragmatic, box, 4-7-8, nasal, coherent, and physiological sigh techniques
  matched to client goals. Avoid strong breath holds in pregnancy; avoid aggressive hyperventilation in panic disorder.
clinician_scope_notes: Use HRV tracking to monitor progress. Avoid forced techniques in severe trauma, cardiac disease, or
  panic disorder. Can be used adjunctively in autoimmune, cardiometabolic, and post-viral recovery.
evidence_tier: plausible_emerging
