summary: 'Detoxification is the body''s process of metabolizing and eliminating

  toxins — both endogenous (hormones, metabolic byproducts) and exogenous

  (toxicants from food, water, air, personal care, household products).

  Active, energy-dependent, nutrient-dependent process occurring in liver,

  gut, kidneys, skin, lungs, and blood-brain barrier via three phases:

  Phase 1 (functionalization, primarily CYP450), Phase 2 (conjugation),

  Phase 3 (elimination via bile, urine, sweat, stool). Balanced Phase 1

  and Phase 2 activity is critical — unbalanced Phase 1 generates

  reactive intermediates that damage DNA and proteins.

  '
