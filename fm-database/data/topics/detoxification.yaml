coaching_scope_notes: 'Coach educates on toxicant exposure sources (food, water, air, personal

  care, household), avoidance strategies, and supportive nutrition

  (protein + plants, rainbow phytochemicals, hydration, fiber) and

  lifestyle (sweat via sauna or movement, sleep, stress reduction).

  Coach does NOT prescribe detox protocols for diagnosed disease,

  recommend chelation, or interpret toxicant lab panels.

  '
clinician_scope_notes: 'Clinical detox protocols, heavy-metal chelation, toxicant lab

  interpretation (urine porphyrins, DMSA-provoked metals, mycotoxin

  panels) and pharmaceutical interaction management belong to clinician.

  '
