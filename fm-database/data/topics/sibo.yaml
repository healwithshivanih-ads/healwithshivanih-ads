coaching_scope_notes: Coaches can support clients with SIBO-focused probiotic yogurt
  protocols (L. reuteri, L. gasseri, B. subtilis), dietary fiber diversity, and elimination
  of food additives. Coaches should not diagnose SIBO or prescribe rifaximin.
clinician_scope_notes: Diagnosis via breath testing or stool DNA sequencing. Antibiotic
  therapy (rifaximin) is a medical decision. Severe or persistent SIBO with neurological
  or cardiac symptoms requires medical referral.
evidence_tier: plausible_emerging
