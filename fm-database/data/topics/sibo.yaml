summary: SIBO occurs when colonic fecal microbes (e.g., E. coli, Klebsiella, Pseudomonas)
  overpopulate the small intestine, leading to endotoxemia via lipopolysaccharide
  release. This systemic endotoxemia is linked to diverse downstream conditions including
  endometriosis, neurodegeneration, cardiovascular disease, and metabolic disorders.
  Estimated to affect over 150 million Americans.
