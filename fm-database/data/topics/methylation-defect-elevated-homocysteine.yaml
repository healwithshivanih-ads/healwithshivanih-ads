summary: Impaired one-carbon methylation cycle resulting in elevated plasma homocysteine,
  a marker of folic acid deficiency and independent CVS risk factor. Associated with
  increased thrombotic risk and endothelial damage. Identified via functional lab
  analysis in this case.
