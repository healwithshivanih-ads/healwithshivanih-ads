slug: kidney-stones
display_name: Kidney Stones (Nephrolithiasis)
aliases:
- nephrolithiasis
- urolithiasis
- renal calculi
- calcium oxalate stones
- uric acid stones
summary: Kidney stones affect 10% of men during their lifetime; incidence parallels
  Western-diet diseases (atherosclerosis, hypertension, diabetes). 75–85% are calcium-based
  (oxalate or phosphate); 10–15% struvite; 5–8% uric acid. Diet-induced acidosis,
  dehydration, high animal protein, low magnesium/citrate, and dysbiosis (absence
  of Oxalobacter formigenes) are key modifiable risk factors.
common_symptoms:
- flank-pain
- radiating-pain-to-groin
- haematuria
- nausea
- vomiting
red_flags:
- acute-ureteric-obstruction
- fever-with-urinary-infection
- anuria
related_topics:
- maldigestion
- dysbiosis
key_mechanisms:
- hypercalciuria
- hyperoxaluria
- low-urinary-citrate
- dysbiosis
coaching_scope_notes: Coaches may guide fluid intake (>2 L/day), dietary modifications
  by stone type, and supplement support (magnesium, vitamin B6, vitamin K). Refer
  acute obstruction or haematuria immediately.
clinician_scope_notes: Differentiate stone type before treatment. Evaluate serum and
  urinary calcium, uric acid, creatinine, electrolytes. Consider Oxalobacter formigenes
  repopulation for recurrent calcium-oxalate stones.
evidence_tier: strong
sources:
