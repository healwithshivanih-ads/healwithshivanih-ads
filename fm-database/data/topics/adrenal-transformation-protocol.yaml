summary: Wentz's 4-week structured lifestyle programme for resetting HPA-axis dysregulation
  in chronically-stressed midlife clients (the typical Hashimoto's, perimenopausal,
  or burnout profile). Built around the concept of "safety signals" — small repeatable
  cues sent to the body across the day that downshift the perceived-threat response.
  Fifteen named safety signals span sleep, light exposure, electrolyte hydration,
  blood-sugar stability, anti- inflammatory food, targeted nutrients (B vitamins,
  vitamin C, magnesium), mitochondrial support, and daily pleasurable activity (adult
  colouring, social bonding, low-pressure creativity). Uses only six supplements total
  across the programme, deliberately avoiding hormonal interventions and complex testing
  in week one. Published outcomes from her 3,000-client pilot — 80% report feeling
  significantly better by week 4 (anxiety scores typically dropping from 8/10 to 2/10).
