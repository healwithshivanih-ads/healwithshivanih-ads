summary: NOS3 encodes endothelial nitric oxide synthase, which produces nitric oxide
  for vascular tone, blood flow, and neurotransmission. Lynch links a 'dirty NOS3'
  to mouth-breathing, snoring, and oxidative stress, and recommends nasal breathing,
  nuts/seeds, and support of upstream methylation pathways.
