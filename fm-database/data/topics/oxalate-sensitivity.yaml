slug: oxalate-sensitivity
display_name: Oxalate Sensitivity / High Oxalate Diet
aliases:
- dietary oxalate intolerance
- hyperoxaluria
- oxalate intolerance
summary: Condition in which dietary oxalates — naturally occurring molecules in many
  plant foods — accumulate due to impaired elimination, leading to kidney stones,
  urinary symptoms, or other systemic effects. Soaking and cooking reduce oxalate
  levels.
common_symptoms:
- kidney-stones
- burning-sensation
- abdominal-pain
- muscle-weakness
- diarrhea
- hyperoxaluria
- burning-eyes-mouth-throat
red_flags:
- recurrent nephrolithiasis
- acute kidney injury — refer to nephrologist
- acute kidney disease
- chronic kidney disease — require clinician monitoring
related_topics:
- elimination-diet
- kidney-stone-prevention
key_mechanisms:
- oxalate-accumulation
- renal-oxalate-excretion
- oxalate-renal-accumulation
coaching_scope_notes: Coaches can guide low-oxalate food choices and preparation methods
  (soaking, cooking). Kidney disease management requires clinician oversight.
evidence_tier: strong
clinician_scope_notes: Monitor urinary oxalate and renal function in high-risk patients.
sources:
- id: vitaone-elimination-diet-toolkit
  location: Oxalate Food Triggers
  quote: Oxalates are naturally occurring molecules found in plants and in the human
    body. Because the body cannot process oxalates, they are usually eliminated through
    the stool and urine.
- id: vitaone-health-coaching-toolkit
  location: Oxalate Food Triggers
  quote: Because the body cannot process oxalates, they are usually eliminated through
    the stool and urine. However, certain health conditions (like a predisposition
    to kidney stones) or a sensitivity may mean that oxalates should be limited or
    avoided.
