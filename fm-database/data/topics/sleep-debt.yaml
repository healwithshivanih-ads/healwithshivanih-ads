slug: sleep-debt
display_name: Sleep Debt
aliases:
- sleep deficit
- accumulated sleep loss
- chronic sleep deprivation
summary: 'The SCN tracks wakeful time from the moment of waking; every hour awake
  generates a need for roughly 20-30 minutes of subsequent sleep. The first 4 hours
  of nightly sleep are devoted to repaying accumulated sleep debt (neutralising tiredness),
  while the remaining 3+ hours nurture brain and body repair. When sleep is shortened,
  debt compounds: a 6.5-hour night creates 30 minutes of debt, and a subsequent 7-hour
  night only counts as 6.5 hours because debt is repaid first. Naps can repay debt
  but disrupt nighttime sleep drive if too long or too late in the day. Going to bed
  earlier without first building sleep drive (waking earlier and getting daytime activity)
  typically fails.'
