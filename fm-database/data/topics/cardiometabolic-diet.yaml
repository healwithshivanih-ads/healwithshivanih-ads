summary: A therapeutic dietary pattern designed to support cardiovascular and metabolic health through high-fibre legumes,
  ancient grains (millets, quinoa, jowar), healthy fats, lean proteins, and anti-inflammatory spices. Emphasises whole, minimally
  processed foods, adequate plant protein, and cooking methods that preserve nutrients (steaming, low-heat cooking).
