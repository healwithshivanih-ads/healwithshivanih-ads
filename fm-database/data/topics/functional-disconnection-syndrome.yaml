slug: functional-disconnection-syndrome
display_name: Functional Disconnection Syndrome (Hemispheric Imbalance)
aliases:
- functional disconnection
- hemispheric imbalance
- melillo functional disconnection
summary: A clinical model developed by Dr Robert Melillo in which adult chronic illness
  patterns trace back to childhood brain development where left and right hemispheres
  matured at different speeds and failed to synchronise into coherent function. There
  is no visible structural lesion — the issue is functional, like two legs walking
  at different speeds. Left-hemisphere-dominant patterns include autism-spectrum,
  ADHD-inattentive, little-professor savant skills, autoimmunity, reduced interoception
  (under-reporting body symptoms — patient may have a heart attack as the first warning),
  and a tendency toward chronic inflammation via upregulated immune activation. Right-hemisphere-dominant
  patterns include dyslexia, major depression, certain anxieties, chronic infections
  that smoulder unresolved, MCAS-style hypersensitivity, low white blood cell counts,
  and lingering viral states. Recovery uses targeted unilateral sensory and motor
  stimulation to develop the under-active side while sometimes inhibiting the over-active
  side.
