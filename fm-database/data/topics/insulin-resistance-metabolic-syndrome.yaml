slug: insulin-resistance-metabolic-syndrome
display_name: Insulin Resistance & Metabolic Syndrome
aliases:
- metabolic syndrome
- insulin dysregulation
- cardiometabolic risk
summary: Insulin resistance is framed as the primary upstream driver of most metabolic diseases including T2D, PCOS, NAFLD,
  and cardiovascular risk. TG:HDL ratio and fasting insulin are preferred early-detection markers over fasting glucose or
  standard lipid panels.
common_symptoms:
- increased-waist-circumference
- sugar-cravings
- lethargy
- energy-crashes
- elevated-triglycerides
red_flags:
- HbA1c above 6.5% without management
- NAFLD with rising AST/ALT
related_topics:
- metabolic-health-lchf
- cardiovascular-lipid-pattern-recognition
- pcos-fertility
- modern-diet-systemic-dysfunction
key_mechanisms:
- insulin-resistance
- hepatic-fat-accumulation
- apob-atherogenic-particle-burden
coaching_scope_notes: Coaches can support dietary carbohydrate reduction, resistance training, sleep, and stress management
  to improve insulin sensitivity. Lab interpretation and medication decisions are clinician territory.
clinician_scope_notes: Use TG:HDL ratio, fasting insulin, and HbA1c for early detection. Treat insulin resistance as primary
  target before lipid pharmacotherapy.
evidence_tier: strong
