summary: Estrogen undergoes phase 1 and phase 2 liver metabolism producing distinct
  metabolites. The 2-hydroxyestrone pathway is protective (blocks cell proliferation);
  the 4-hydroxyestrone and 16α-hydroxyestrone pathways are associated with increased
  inflammation and cancer risk. The Dutch test measures these metabolites. Supporting
  the 2-OH pathway and inhibiting aromatase activity is a key FM strategy.
