coaching_scope_notes: Coaches can support favorable estrogen metabolism via diet (cruciferous
  vegetables, DIM, green tea, blueberries, grape seed extract) and gut health. Dutch
  test interpretation and metabolite-specific interventions require clinician oversight.
clinician_scope_notes: Clinician should assess estrogen metabolite ratios (e.g., DUTCH
  test), interpret genetic variants (COMT, CYP1A1, CYP1B1, GST), and prescribe DIM,
  I3C, NAC, or methylated B vitamins as appropriate.
