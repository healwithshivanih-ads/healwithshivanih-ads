coaching_scope_notes: Coaches can support dietary fiber, cruciferous vegetable intake,
  antioxidant foods, omega-3s, alcohol reduction, exercise, and stress management.
  Supplement recommendations require clinician guidance.
clinician_scope_notes: Genetic variants COMT, CYP1A1, CYP1B1, and GST influence estrogen
  detox. Oral contraceptives and HRT influence estrogen metabolism and may increase
  hormone-related cancer risk.
