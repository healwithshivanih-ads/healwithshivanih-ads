summary: Estrogen metabolism encompasses the production, use, and elimination of estrogens
  (E1, E2, E3) and their metabolites primarily via the liver, digestive tract, and
  urinary system. Disruptions lead to accumulation of carcinogenic metabolites (4-OHE1)
  and estrogen dominance, increasing risk for breast, ovarian, and prostate cancer
  as well as worsening endometriosis, PMS, PCOS, and PMDD.
