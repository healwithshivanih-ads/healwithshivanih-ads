summary: 'The role of emotional regulation, trauma processing, and meaning-making in chronic disease recovery. Chronic conditions
  both result from and reinforce dysregulated nervous-system states; integrating mind-body work (somatic practices, therapy,
  journaling, community) alongside biochemical interventions is often necessary for sustained recovery. Coach-relevant scope:
  motivational interviewing, habit support, referral to trauma-informed practitioners.'
