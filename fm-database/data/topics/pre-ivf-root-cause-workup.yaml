summary: 'Standard IVF panels — AMH, FSH, estradiol, antral follicle count, baseline
  ultrasound, HSG, semen analysis — assess ovarian reserve and structural factors
  but rarely test the systemic conditions that determine whether an embryo can implant
  and a pregnancy can be sustained. A more complete pre-IVF workup adds five functional
  categories: (1) reproductive immunology (NK cell percentage and absolute count,
  activated T cells, CRP, TNF-alpha, antiphospholipid antibodies, thyroid antibodies);
  (2) endometrial receptivity and uterine microbiome (ERA for window-of- implantation
  timing, EMMA / ALICE for chronic endometritis and dysbiosis); (3) advanced thyroid
  (free T3, free T4, reverse T3, TPO and Tg antibodies — TSH alone is insufficient,
  optimal range 0.5-2.0 mIU/L); (4) methylation and thrombophilia (MTHFR C677T and
  A1298C, Factor V Leiden, prothrombin G20210A, Protein C, Protein S, PAI-1, homocysteine);
  (5) comprehensive gut health (stool analysis, organic acids test, food sensitivities).
  The framework is most relevant after two or more failed transfers with good-quality
  embryos, recurrent pregnancy loss or chemical pregnancies, but is also a useful
  menu when coaching a client preparing for a first IVF cycle who wants the highest
  possible odds.'
