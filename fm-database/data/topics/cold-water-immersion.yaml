- CWI
summary: Voluntary exposure to cold water as a health practice, examined across 104
  peer-reviewed studies. CWI appears to confer benefits across metabolic, cardiovascular,
  mental health, and immune domains, though definitive conclusions are limited by
  small study sizes and methodological heterogeneity.
