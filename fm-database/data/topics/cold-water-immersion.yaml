coaching_scope_notes: Coaches can support lifestyle integration of CWI practices and
  discuss evidence-based benefits. Do not recommend CWI to clients with known cardiovascular
  conditions without clinician clearance.
clinician_scope_notes: Cardiac troponin elevation has been observed in elite swimmers
  post-CWI; cardiovascular risk stratification recommended before prescribing. Acute
  hemodynamic stress from cold shock response warrants caution in at-risk populations.
evidence_tier: plausible_emerging
