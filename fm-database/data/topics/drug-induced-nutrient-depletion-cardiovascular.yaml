slug: drug-induced-nutrient-depletion-cardiovascular
display_name: Drug-Induced Nutrient Depletion (Cardiovascular Medications)
aliases:
- medication-induced nutrient deficiency
- statin nutrient depletion
- diuretic nutrient loss
summary: Common cardiovascular medications — including statins, beta blockers, diuretics,
  ACE inhibitors, ARBs, and metformin — can deplete key nutrients such as CoQ10, magnesium,
  potassium, zinc, B vitamins, and essential fatty acids, with implications for energy
  production, cardiac function, and overall health.
common_symptoms:
- fatigue
- muscle-cramps
- cognitive-decline
red_flags: []
related_topics:
- cardiovascular-dysfunction
- hypertension
- beta-blocker-deprescribing
key_mechanisms:
- coq10-depletion-by-beta-blockers
- statin-mediated-nutrient-depletion
coaching_scope_notes: Coaches can educate clients about the potential for medication-related
  nutrient depletion and encourage discussion with their prescribing clinician about
  targeted supplementation.
clinician_scope_notes: Clinician to assess and monitor nutrient status in patients
  on long-term cardiovascular medications and consider targeted repletion.
evidence_tier: plausible_emerging
