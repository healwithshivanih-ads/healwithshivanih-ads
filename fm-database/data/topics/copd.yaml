slug: copd
display_name: Chronic Obstructive Pulmonary Disease
aliases:
- chronic-obstructive-pulmonary-disease
- chronic-bronchitis
- emphysema
summary: COPD covers two overlapping forms — chronic bronchitis (inflamed mucus-producing
  bronchial linings) and emphysema (destroyed alveoli). Smoking is the leading cause;
  secondhand smoke, occupational gases, indoor biomass cooking smoke without ventilation,
  and rare alpha-1 antitrypsin deficiency are other drivers. Generally irreversible.
  Functional medicine focus is on (1) mucus expectoration (lobelia, ivy leaf, salt
  pipe, bottle blowing), (2) mucolysis (NAC, bromelain, guaifenesin), (3) immune support,
  (4) reducing lung inflammation (antioxidants, omega-3). Up to 47% of COPD patients
  are magnesium deficient (driven by inhaled steroids and beta agonists) — oral magnesium
  is strongly indicated and IV magnesium acts as a bronchodilator in acute flares.
