summary: Vitamin D is a fat-soluble vitamin found in few foods (fatty fish, liver,
  egg yolk) and fortified products. It is also synthesized via sun exposure. It regulates
  calcium and phosphorus, supports bone health, cell growth, and immune function.
  Current RDAs may be too low for optimal non-skeletal health.
