coaching_scope_notes: Coach can educate on food sources and the importance of sun
  exposure. Note that SPF >15 blocks vitamin D synthesis. Supplementation above RDA
  requires clinician guidance.
clinician_scope_notes: Lab testing (25-OH vitamin D) and therapeutic supplementation
  dosing are clinician scope.
evidence_tier: strong
sources:
- id: vitaone-health-coaching-toolkit
  location: 'Food Sources: Vitamin D'
  quote: Vitamin D helps the body absorb calcium and regulates both calcium and phosphorous
    levels in the blood. It plays an important role in bone growth and maintenance,
    influences cell growth and development, and is required for proper immune function.
- id: vitaone-nutrition-toolkit
  location: 'Food Sources: Vitamin D'
  quote: Research indicates that the current RDAs may be too low for supporting optimal,
    non-skeletal health. Much higher intake may be required to maintain adequate blood
    levels.
