coaching_scope_notes: Somatic awareness practices (breathwork, body scanning) are
  within coaching scope. Diagnosis of physical symptoms via somatic memory frameworks
  is not.
clinician_scope_notes: The claim that unresolved psychological conflict caused vaginal
  inflammation resolution is anecdotal. Physical symptoms must be evaluated medically.
