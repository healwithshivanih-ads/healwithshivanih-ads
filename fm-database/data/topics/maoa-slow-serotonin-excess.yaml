coaching_scope_notes: Coach can identify tyramine-rich food triggers, discuss sleep
  hygiene strategies, encourage slow COMT lifestyle guidance. Riboflavin dosing and
  lithium orotate use require clinician oversight. Flag SSRI and testosterone medication
