summary: Monoamine oxidase A (MAOA) degrades serotonin, dopamine, and norepinephrine
  after use. A slow variant leads to neurotransmitter accumulation, presenting as
  aggression, slow wind-down, long focus, insomnia, and adverse reactions to SSRIs
  or serotonin precursors. Dietary tyramine (cheese, wine, chocolate) worsens the
  picture.
common_symptoms:
- aggression-difficulty-slowing-down
