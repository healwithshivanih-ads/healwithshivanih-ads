- matrix-gla-protein-activation
- coagulation-factor-activation
coaching_scope_notes: Coaches can discuss food sources (fermented dairy, liver, leafy
  greens for K1), gut microbiome factors affecting K2 production, and synergy with
  vitamin D3. Deficiency symptoms such as easy bruising should be referred to a clinician.
clinician_scope_notes: Vitamin K2 deficiency can present as coagulopathy, osteoporosis,
  and vascular calcification. Antibiotic use, malabsorptive GI conditions, and newborns
  are at-risk populations. RDA is 100 mcg/day but functional requirements may differ.
evidence_tier: strong
