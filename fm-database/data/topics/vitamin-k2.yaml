slug: vitamin-k2
display_name: Vitamin K2
aliases:
- menaquinone
- MK-7
- coagulation vitamin
summary: Vitamin K2 (menaquinone) is a fat-soluble vitamin produced by commensal gut
  bacteria and found in animal-source foods. Its primary functions include activating
  clotting factors, directing calcium into bones and teeth via osteocalcin activation,
  and preventing vascular calcification via Matrix GLA Protein (MGP). It is closely
  synergistic with vitamin D3.
common_symptoms:
- easy-bruising
- prolonged-bleeding
- poor-bone-density
- vascular-calcification
red_flags:
- intracranial-bleeding
- gi-bleeding
- hematuria
