summary: Fasting modulates immunity through autophagy, mTOR suppression, AMPK activation,
  reduced NF-κB, and gut immune reset. Benefits include lower chronic inflammation,
  improved immune efficiency, and support for autoimmune conditions. Contraindicated
  in chronic stress, active infection, eating disorder history, and hypothyroidism.
