- ampk-activation
- nf-kb-activation
coaching_scope_notes: Coaches can introduce 12–14hr overnight fasting for most clients
  and discuss time-restricted eating for metabolic inflammation. Cyclic fasting, prolonged
  fasting, and fasting in autoimmune cases requires clinician oversight.
clinician_scope_notes: Screen stress axis and thyroid before fasting protocols. Ensure
  protein sufficiency, especially in autoimmune cases. Avoid fasting during illness.
  Cyclic fasting (1–2x/week) for stable patients only.
evidence_tier: plausible_emerging
