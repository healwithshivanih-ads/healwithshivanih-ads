summary: A cluster of central adiposity, dyslipidaemia, hypertension, and hyperglycaemia
  representing the initial clinical expression of insulin resistance, significantly
  elevating cardiovascular and T2DM risk.
common_symptoms:
- weight-gain
- fatigue
- cravings
- high-blood-sugar
- central-adiposity
- elevated-triglycerides
- low-hdl
- hypertension
- elevated-fasting-glucose
red_flags:
- severe-obesity
- uncontrolled-hypertension
- TG > 250 mg/dL
- blood pressure ≥ 140/90 mmHg
- fasting glucose ≥ 100 mg/dL with high insulin
related_topics:
- low-carb-diet
- insulin-resistance
- type-2-diabetes
- nafld
- blood-sugar-dysfunction
key_mechanisms:
- insulin-resistance
- metabolic-flexibility
- visceral-adipose-inflammation
coaching_scope_notes: Lifestyle modification (diet, exercise, sleep, stress) is the
  primary coaching lever. Reinforce waist circumference tracking and dietary glycaemic
  load reduction.
evidence_tier: strong
clinician_scope_notes: Diagnose per IDF/AHA criteria. Screen lipid panel, blood pressure,
  fasting glucose and insulin. Manage hypertension and dyslipidaemia pharmacologically
  as needed.
