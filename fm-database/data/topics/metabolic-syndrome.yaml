summary: 'Cluster of ≥3 of: central obesity, atherogenic dyslipidemia, hypertension,
  insulin resistance/glucose intolerance, prothrombotic state, and proinflammatory
  state; strongly linked to elevated CRP and atherosclerosis risk.'
