coaching_scope_notes: Coaches can address diet quality, sugar reduction, exercise,
  sleep, and weight management—all directly modifiable lifestyle drivers of metabolic
  syndrome.
evidence_tier: strong
clinician_scope_notes: Diagnosis requires clinical lab values and waist circumference
  thresholds adjusted by ethnicity. Pharmaceutical management (metformin, statins)
  is clinician scope.
