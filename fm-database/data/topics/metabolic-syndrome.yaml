- id: coconote-fm-body-composition-bmi
  location: Metabolic Dysfunction / Biomarkers Section
  quote: Their waist tape ratio is too high. Then you definitely want to do those
    biomarkers in the carbohydrate section. You definitely want to be looking at their
    fasting insulin and triglycerides and GGT.
- id: coconote-fm-preventing-cvd-cholesterol
  location: Metabolic Function and Risk Factors
  quote: We frequently see elevated triglycerides, elevated fasting blood sugar, hemoglobin
    A1C... high triglycerides in metabolic syndrome. It's part of metabolic syndrome.
- id: pizzorno-cardiometabolic-atherosclerosis
  location: Other Risk Factors
  quote: 'Diagnostic criteria for metabolic syndrome include at least three of the
    following metabolic risk factors in one person: Central obesity (waist-to-hip
    ratio >1 for men; >0.8 for women)—Atherogenic dyslipidemia (TGs >150 mg/dL; low
    HDL-C [<40 mg/dL in men and <50 mg/dL in women])—Hypertension (130/85 mm Hg)—Insulin
    resistance or glucose intolerance (fasting blood sugar >101 mg/dL)—Prothrombotic
    state—Proinflammatory state.'
