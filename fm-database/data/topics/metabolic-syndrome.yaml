summary: Metabolic syndrome is characterized by central obesity, elevated triglycerides,
  low HDL, elevated fasting blood sugar, and hypertension. It drives small dense LDL
  formation, inflammation, and cardiovascular risk. Highly responsive to lifestyle
  intervention.
