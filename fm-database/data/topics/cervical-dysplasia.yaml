  location: Cervical Dysplasia — General Considerations
  quote: Cervical dysplasia (CD) is a precancerous lesion with risk factors similar
    to those of cervical cancer. Etiologic lifestyle factors include early age of
    first intercourse, multiple sexual partners, smoking, oral contraceptive (OC)
    use, pregnancy, and many nutritional factors.
