slug: sleep-hygiene
display_name: Sleep Hygiene & Brain Health
aliases:
- sleep and mental health
- glymphatic system
- sleep and depression
summary: Adequate sleep (8 hours, with emphasis on hours before midnight) is essential
  for prefrontal cortex function, emotional regulation, glymphatic system clearance
  of amyloid plaques, and prevention of depression. Chronic short sleep significantly
  elevates depression risk and accelerates neurodegeneration.
evidence_tier: strong
common_symptoms:
- insomnia
- depression
- brain-fog
- poor-emotional-regulation
- dementia-risk
red_flags:
- chronic insomnia unresponsive to lifestyle changes
- suspected sleep apnea
related_topics:
- depression-lifestyle
- neuroplasticity
- gut-brain-connection
key_mechanisms:
- glymphatic-clearance
- prefrontal-cortex-function
- neuroplasticity
coaching_scope_notes: Coaches can support gradual bedtime shifting, pre-sleep routines,
  breath work, gratitude practices, and elimination of sleep-disrupting habits.
clinician_scope_notes: Sleep apnea requires medical assessment. Mouth taping as discussed
  should be reviewed with a clinician for clients with respiratory conditions.
sources:
