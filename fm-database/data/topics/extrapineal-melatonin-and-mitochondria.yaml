summary: Melatonin is dramatically under-appreciated in standard practice because
  clinical thinking is anchored to its pineal-gland role in setting circadian sleep
  rhythm (where milligram doses suffice). Research over the last decade has established
  that melatonin is synthesised by EVERY mitochondrion in EVERY cell of the body,
  with extra-pineal production exceeding pineal production many-fold — the gut alone
  produces approximately 400x more melatonin than the pineal gland. This intracellular
  melatonin pool is a primary mitochondrial protectant — direct free-radical scavenger
  inside the mitochondrial matrix, indirect upregulator of Nrf2 antioxidant transcription,
  prevention of cytochrome c release in apoptosis, and crucially the widening of the
  hormetic stress window so that cells can absorb more stress before switching to
  inefficient anaerobic glycolysis (the Warburg shift seen in cancer and chronic fatigue).
  Endogenous melatonin synthesis falls roughly linearly with age from the 30s onward
  and is upregulated by red and near-infrared light exposure (Russell Reiter's work).
  Exogenous melatonin shows — no toxicity ceiling found across studied doses up to
  150,000 mg/equivalent; NO negative feedback on endogenous pineal production (unlike
  testosterone or thyroid); modest morning grogginess in fast metabolisers solved
  by earlier dosing. Hyper-sensitivity in roughly 5-10 percent of users with paradoxical
  wakefulness exists and may have a genetic basis. High-dose protocols (50-500+ mg)
  are used clinically for cancer adjuvant care, traumatic brain injury, neurodegenerative
  disease, sepsis, inflammatory bowel disease, and stress states.
