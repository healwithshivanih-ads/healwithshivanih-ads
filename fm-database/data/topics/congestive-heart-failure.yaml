summary: Congestive heart failure (CHF) is the inability of the heart to pump enough
  blood, leading to fluid backup, reduced kidney perfusion, sodium retention, and
  compensatory tachycardia with cardiac remodelling. Most often caused by long-standing
  hypertension, prior MI, valve disease, cardiomyopathy, or chronic lung disease.
  Always characterised by impaired myocardial energy production, which responds to
  nutritional repletion. Functional medicine focus — low-sodium high-potassium diet
  (sodium <1.8 g/day), magnesium (low levels predict mortality), thiamine (often depleted
  by furosemide), L-carnitine and CoQ10 for mitochondrial energy. Natural measures
  most effective in NYHA stages I and II; adjunctive in stages III and IV alongside
  conventional ACE/diuretic/digitalis therapy.
