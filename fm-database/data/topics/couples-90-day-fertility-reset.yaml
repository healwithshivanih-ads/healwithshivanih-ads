summary: Roughly half of fertility challenges have a male-factor contribution, yet
  most preconception care defaults to optimising only the woman. A 90-day couples'
  reset starts both partners on a parallel protocol aligned with the ~90-day folliculogenesis
  window in women and the ~60-75-day spermatogenesis cycle plus epididymal transit
  (~90-120 days total) in men. Shared interventions cover anti-inflammatory whole-food
  nutrition, endocrine-disruptor reduction (BPA, phthalates, parabens, pesticides,
  synthetic fragrances), alcohol elimination, sleep architecture (7-8 hours, dark
  cool room, consistent timing), nervous-system regulation and stress management,
  and moderate consistent movement. Male-specific additions are testicular thermoregulation
  (no saunas or hot tubs, cotton loose underwear, breaks from prolonged sitting, no
  laptop on lap), zinc-rich diet for testosterone and spermatogenesis, L-carnitine
  and selenium for motility and morphology, and avoidance of exogenous testosterone
  (which suppresses FSH and LH and shuts down endogenous sperm production). Beyond
  physiology, the reset reframes fertility as a shared project rather than the woman's
  solo burden — a coaching framing that consistently improves adherence and reduces
  resentment.
