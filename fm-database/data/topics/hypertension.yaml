summary: Persistently elevated blood pressure, identified as both a non-modifiable risk amplifier and a modifiable CVS risk
  factor. In this case, hypertension was managed pharmacologically and improved with lifestyle and dietary intervention targeting
  insulin resistance.
common_symptoms:
- headache
- palpitations
- elevated-blood-pressure
red_flags:
- BP >140/90 on three or more readings in adults under 60
- BP >150/90 in adults over 60
- uncontrolled hypertension with polypharmacy
- Uncontrolled hypertension with BP >140/90 (<60 yrs) or >150/90 (>60 yrs)
- History of MI or acute coronary syndrome
- uncontrolled-hypertension-on-medication
