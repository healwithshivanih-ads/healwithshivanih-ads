summary: 'Stroke is loss of nerve function ≥24 hours due to brain ischemia (clot/embolism)
  or hemorrhage; US leading cause of adult disability and third-leading cause of death.
  Hypertension accounts for 35–50% of stroke risk; atrial fibrillation, diabetes,
  smoking, high cholesterol, and high saturated-fat/low-omega-3 diets are other major
  contributors. Recovery goals from an FM perspective: maximize cerebral blood flow,
  energy production in damaged neurons, and platelet rheology while supporting rehab
  (physical, occupational, speech therapy). Evidence-supported natural interventions:
  ginkgo biloba (240–320 mg/day, 24% flavonglycoside extract — improves cerebral perfusion
  and energy production), citicoline (CDP-choline, 500–2000 mg/day — 29% improvement
  in ADL recovery, 42% improvement in functional capacity at 3 months in pooled US
  trials), glycerophosphocholine (GPC, 1200 mg/day oral after IM loading — 95% benefit
  in 2,044-patient Italian trial), fish oils (omega-3), grape-seed/pine-bark procyanidins,
  acupuncture. Major caution: do not combine multiple antiplatelet natural agents
  (nattokinase, ginkgo, high-dose garlic) with antiplatelet drugs (aspirin, warfarin,
  clopidogrel) — case reports of hemorrhagic stroke. Patients on Coumadin must keep
  vitamin-K and supplement intake stable, not increased.'
