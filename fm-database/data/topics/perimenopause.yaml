summary: The hormonal transition preceding menopause, characterized by fluctuating
  and declining estrogen and progesterone, with wide-ranging effects on gut function,
  microbiome diversity, inflammation, and autoimmune risk.
common_symptoms:
- night sweats / hot flashes
- 3am wakeups
- new-onset anxiety
- brain fog
- joint pain / stiffness
- irregular cycles
- weight gain (especially abdominal)
- bloating
- constipation
- loose stools
- new food sensitivities
- reflux
- new-onset IBS
red_flags:
- heavy bleeding > 7 days or soaking through pads hourly (refer GYN)
- bleeding after 12 months of amenorrhea
- severe mood changes with suicidality
- persistent bloating unresponsive to dietary changes
- new bowel changes not resolving
