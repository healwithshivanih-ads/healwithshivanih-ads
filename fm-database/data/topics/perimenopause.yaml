red_flags:
- heavy bleeding > 7 days or soaking through pads hourly (refer GYN)
- bleeding after 12 months of amenorrhea
- severe mood changes with suicidality
- persistent bloating unresponsive to dietary changes
- new bowel changes not resolving
- unexplained heavy bleeding after menopause
- new breast lumps
- bleeding >15 days
- new onset severe anxiety or depression
- palpitations without cardiac cause
- Irregular cycles in women under 35 should not be assumed to be perimenopause without
  workup
- Persistent amenorrhea in young women — rule out PCOS
