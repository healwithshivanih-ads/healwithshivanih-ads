summary: The transitional phase approximately 3–4 years before and one year after
  menopause, characterized by irregular menstrual cycles, fluctuating hormones, vasomotor
  symptoms, mood changes, and early psychosomatic symptoms. Progesterone typically
  declines first, potentially creating relative estrogen dominance.
common_symptoms:
- night sweats / hot flashes
- 3am wakeups
- new-onset anxiety
- brain fog
- joint pain / stiffness
- irregular cycles
- weight gain (especially abdominal)
- bloating
- constipation
- loose stools
- new food sensitivities
- reflux
- new-onset IBS
- hot-flashes
- anxiety
- insomnia
