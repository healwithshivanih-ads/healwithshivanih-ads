summary: The hormonal transition characterized by declining ovarian progesterone and
  eventual estrogen fluctuation, associated with hot flashes, anxiety, insomnia, and
  metabolic changes.
common_symptoms:
- night sweats / hot flashes
- 3am wakeups
- new-onset anxiety
- brain fog
- joint pain / stiffness
- irregular cycles
- weight gain (especially abdominal)
- bloating
- constipation
- loose stools
- new food sensitivities
- reflux
- new-onset IBS
- hot-flashes
- anxiety
- insomnia
- brain-fog
- irregular-periods
- breast-tenderness
red_flags:
- heavy bleeding > 7 days or soaking through pads hourly (refer GYN)
- bleeding after 12 months of amenorrhea
- severe mood changes with suicidality
- persistent bloating unresponsive to dietary changes
- new bowel changes not resolving
- unexplained heavy bleeding after menopause
- new breast lumps
