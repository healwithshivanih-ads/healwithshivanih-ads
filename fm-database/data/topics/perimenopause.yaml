summary: The transitional phase approximately 3–4 years before and one year after menopause, characterized by irregular menstrual
  cycles, fluctuating hormones, vasomotor symptoms, mood changes, and early psychosomatic symptoms. Progesterone typically
  declines first, potentially creating relative estrogen dominance.
