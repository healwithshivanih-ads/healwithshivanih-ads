summary: A unifying paradigm of chronic disease grounded in evolutionary biology and
  epigenetics. The human genome is essentially unchanged from that of humans 20,000
  years ago — any two humans separated by that span could still produce viable offspring.
  What HAS changed dramatically in the last century is the environment in which that
  genome is asked to express itself. Chronic illness, Chestnut argues, is fundamentally
  the epigenetic expression of a mismatch between modern lifestyle inputs and the
  inputs the human genome requires (its "species type"). Every cell in the body is
  genetically identical (all are copies of the original zygote); their divergent structures
  and functions arise from epigenetic regulation that determines which genes are expressed
  in which cell at which time. The epigenome is influenced by every input — what we
  eat (essential nutrients vs evolutionary novel toxins like industrial seed oils,
  refined sugar, additives), how we move (movement is itself an essential nutrient;
  sedentariness rapidly downregulates insulin sensitivity, bone density, mood regulation
  even in Olympic athletes), how we think and connect socially (humans are obligate
  social mammals; chronic social disconnection produces measurable epigenetic dysregulation).
  The sufficiency-deficiency-toxicity model — illness in any living system has only
  two ultimate causes — toxicity (something present that should not be) and deficiency
  (something absent that should be present). Drug-based medicine targets neither,
  which is why drug therapies fail to produce health (they are themselves toxic by
  definition; "side effects" = toxicity signature). True health restoration requires
  identifying and correcting the deficiencies and removing the toxicities at the lifestyle
  level.
