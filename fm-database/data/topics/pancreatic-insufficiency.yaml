slug: pancreatic-insufficiency
display_name: Pancreatic Insufficiency
aliases:
- exocrine pancreatic insufficiency
- EPI
- pancreatic enzyme deficiency
summary: A condition in which the pancreas fails to produce or secrete adequate digestive enzymes (lipase, proteases, amylases),
  leading to impaired digestion and absorption of fats, proteins, and carbohydrates. Presents with non-specific GI symptoms
  and systemic consequences including malnutrition, weight loss, and fatigue.
common_symptoms:
- steatorrhea
- diarrhea
- abdominal-bloating
- abdominal-pain
- weight-loss
- lethargy
- muscle-wasting
- edema
red_flags:
- Unintentional severe weight loss
- muscle-wasting
- Edema suggesting protein malnutrition
- Chronic pancreatitis or cystic fibrosis diagnosis — requires clinician management
related_topics:
- hepatic-insufficiency
- chronic-pancreatitis
- malabsorption
- crohns-disease
key_mechanisms:
- damaged-microvilli
- exocrine-pancreatic-enzyme-deficiency
- malabsorption
- oxidative-stress-pancreatic-damage
coaching_scope_notes: Coaches can support dietary behaviour (smaller meals, thorough chewing, avoiding inflammatory foods,
  alcohol), food-based enzymatic stimulants, and digestive enzyme supplementation. Diagnosis and lab interpretation (e.g.,
  fecal elastase test) are clinician scope.
clinician_scope_notes: Diagnosis confirmed via fecal elastase-1 test. Associated conditions such as chronic pancreatitis,
  cystic fibrosis, GI bypass surgery, and pancreatic duct obstruction require medical management. Pancreatic enzyme replacement
  therapy (PERT) dosing is clinician-directed.
evidence_tier: strong
sources:
- id: coconote-fm-pancreatic-insufficiency
  location: Exocrine Pancreatic Function Overview
  quote: The pancreas also has an exocrine function where it produces certain digestive enzymes. So certain digestive enzymes
    that pancreas produce for the digestion of certain foods are, number one, lipase, specifically helps in the breakdown
    of fats. Proteases helps in the breakdown of proteins and amylases helps in the breakdown of carbohydrates.
