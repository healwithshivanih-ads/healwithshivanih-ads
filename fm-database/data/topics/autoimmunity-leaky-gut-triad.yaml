summary: 'Dr. Fasano''s model states that three factors are necessary for autoimmune
  disease: (1) genetic predisposition, (2) environmental trigger/antigen exposure,
  and (3) increased intestinal permeability. All three must co-occur; leaky gut is
  the essential permissive factor.'
