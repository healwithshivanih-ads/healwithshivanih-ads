coaching_scope_notes: Coaches can educate clients on the role of gut barrier integrity
  in autoimmune risk and support lifestyle modifications that reduce leaky gut triggers
  (stress, antibiotics, antacids, dietary antigens).
clinician_scope_notes: HLA-DQ2/DQ8 genetic testing and autoimmune antibody panels
  (ANA, anti-nuclear antibody) are clinician-ordered. Coaches should refer out if
  autoimmune disease is suspected.
