coaching_scope_notes: 'Coach supports lifestyle interventions across all four pillars

  (movement, nutrition, sleep, stress) while clinical risk markers are

  monitored by the provider. For movement specifically, coach matches

  modality to the client''s dominant risk pattern when known — e.g.

  prioritising resistance training for clients with insulin resistance,

  HIIT for clients short on time with metabolic risk, yoga for clients

  with blood pressure and cholesterol concerns plus a stress component.

  '
clinician_scope_notes: 'Clinician orders and interprets cardiometabolic labs, manages

  pharmacologic risk reduction, and clears clients for vigorous-intensity

  exercise where indicated.

  '
