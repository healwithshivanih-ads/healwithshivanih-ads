summary: Total toxic load is determined by total environmental and internal toxic
  exposure minus the body's ability to biotransform and excrete those toxins. Factors
  that increase load include dysbiosis, nutritional deficiency, oxidative stress,
  high sugar/low protein diet, chronic inflammation, and impaired mitochondrial function.
  Individual susceptibility modulates whether a given load produces disease.
