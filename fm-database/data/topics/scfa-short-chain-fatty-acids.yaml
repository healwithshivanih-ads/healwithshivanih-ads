summary: Metabolites produced by colonic fermentation of dietary fiber that play central
  roles in gut lining integrity, inflammation control, insulin sensitivity, endogenous
  GLP-1 stimulation, and — via butyrate — cross the blood-brain barrier to influence
  brain health.
common_symptoms:
- increased intestinal permeability
- reduced insulin sensitivity
- systemic inflammation
- poor satiety signaling
