coaching_scope_notes: Coaches can assess nutritional gaps and support diet and supplement
  strategies to ensure hormone receptor cofactors are present. Testing (RBC magnesium,
  B6, vitamin A) is appropriate to recommend via clinician.
clinician_scope_notes: Nutritional cofactor status (zinc, vitamin A, magnesium, iodine,
  P5P) should be assessed alongside hormone panels. Receptor functionality is not
  captured by standard hormone blood tests.
