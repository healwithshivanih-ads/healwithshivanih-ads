key_mechanisms:
- hcl-and-pepsin-protein-digestion
- cardiac-sphincter-weakness
coaching_scope_notes: Coaches can address meal timing (light evening meals, avoiding
  lying down post-meal), fluid timing, and stress. PPI medication review is clinician
  scope.
evidence_tier: plausible_emerging
