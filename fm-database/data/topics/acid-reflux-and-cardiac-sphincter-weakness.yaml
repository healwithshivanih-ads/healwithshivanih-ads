  location: Stomach & Acid Section
  quote: There are some people who are suffering from something called reflux heartburn
    where the acid is coming up into the esophagus... it's because it's weak, well
    why is it weak because the person's eating breakfast like a pauper and lunch like
    a pauper and tea is the king and the queen together and when they lie down to
    sleep at night gravity hits that cardiac sphincter, weakening it.
