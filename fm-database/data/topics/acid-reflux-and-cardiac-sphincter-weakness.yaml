slug: acid-reflux-and-cardiac-sphincter-weakness
display_name: Acid Reflux & Cardiac Sphincter Weakness
aliases:
- reflux
- gastro-oesophageal reflux
summary: Acid reflux is framed not as a problem of excess stomach acid but as a weakened
  cardiac sphincter (lower oesophageal sphincter), caused primarily by eating large
  evening meals, lying down after eating, and drinking large amounts of fluid with
  meals. Long-term antacid use (e.g. Nexium/PPIs) is said to risk contributing to
  colon cancer by preventing proper protein digestion.
