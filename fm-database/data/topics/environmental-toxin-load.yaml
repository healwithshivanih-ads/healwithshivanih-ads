summary: The cumulative body burden of synthetic and naturally-occurring toxicants
  (heavy metals, persistent organic pollutants, endocrine disruptors, mycotoxins,
  solvents, pesticides) that can drive autoimmunity, neuroinflammation, hormonal disruption,
  and oxidative stress. Assessed via urine challenge tests, hair mineral analysis,
  and organic acids. Addressed via reduction-of-exposure plus supported phase I/II
  biotransformation.
