- thyroid-toxicant-sensitivity
coaching_scope_notes: Reduce known exposures (plastics, pesticides, conventional cookware,
  fragrance). Support hydration, fibre, brassicas, sulfur foods.
clinician_scope_notes: Chelation, IV glutathione, urine toxin panels are clinician-only.
notes_for_coach: Pizzorno frames toxin load as upstream driver across MS, Hashimoto's,
  oxalate stones, depression - recurring theme worth flagging early.
