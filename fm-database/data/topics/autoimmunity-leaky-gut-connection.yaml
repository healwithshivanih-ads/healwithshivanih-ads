slug: autoimmunity-leaky-gut-connection
display_name: Leaky Gut as Root Driver of Autoimmunity
aliases:
- gut-autoimmune axis
- intestinal permeability and autoimmune disease
summary: 'Dr. Fasano''s model posits three co-factors for autoimmunity: genetic predisposition, environmental antigen exposure,
  and increased intestinal permeability. Leaky gut allows foreign antigens to enter the bloodstream where molecular mimicry
  triggers cross-reactive antibodies that attack host tissues.'
