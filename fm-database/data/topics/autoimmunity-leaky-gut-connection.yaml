coaching_scope_notes: Coaches can educate clients on the three-factor autoimmune model
  and support gut healing lifestyle changes. Autoimmune diagnosis and treatment must
  be managed by a clinician.
clinician_scope_notes: 'Three-factor model: genetic predisposition (e.g., HLA-DQ2/DQ8)
  + antigen exposure + leaky gut = autoimmunity. Fasano''s work on zonulin is peer-reviewed
  and well-established for celiac; extrapolation to other autoimmune conditions is
  plausible but less uniformly validated.'
evidence_tier: plausible_emerging
