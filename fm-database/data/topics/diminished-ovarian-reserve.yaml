slug: diminished-ovarian-reserve
display_name: Diminished Ovarian Reserve and Advanced Maternal Age Fertility
aliases:
- DOR
- diminished ovarian reserve
- premature ovarian aging
- low ovarian reserve
- poor responder
summary: Diminished ovarian reserve (DOR) describes a low number of remaining follicles
  available for recruitment, marked by low AMH, high FSH, and few antral follicles
  on ultrasound. It is universally assumed in women over 40 and can occur much younger
  as premature ovarian aging. DOR is associated with high rates of aneuploidy, low
  IVF egg yield, high cycle cancellation rates, low implantation rates, and elevated
  miscarriage risk. Targeted preconception protocols including CoQ10 (ubiquinol),
  DHEA, melatonin, and Mediterranean-pattern nutrition have been shown to improve
  egg numbers, embryo quality, and live birth rates in DOR patients preparing for
  IVF, egg freezing, or natural conception.
