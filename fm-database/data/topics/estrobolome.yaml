slug: estrobolome
display_name: Estrobolome & Gut Estrogen Clearance
aliases:
- estrogen microbiome
- estrogen-modulating bacteria
- gut estrogen axis
- gut estrogen processing
- beta-glucuronidase activity
- estrogen recycling
summary: The estrobolome is the collection of gut bacteria that metabolize estrogen. High beta-glucuronidase activity deconjugates
  excreted estrogens, allowing reabsorption and driving estrogen dominance.
common_symptoms:
- breast-tenderness
- unexplained-weight-gain
- bloating
- hot flashes and night sweats
- skin changes (rashes, hives, eczema)
- poor-concentration
- estrogen dominance symptoms despite low serum estrogen
- pms
- hot-flashes
- mood alterations
- joint-pain
- intestinal-dysbiosis-symptoms
- skin changes (hives, eczema, psoriasis)
- eczema-psoriasis-skin
- estrogen-dominance-symptoms
- constipation
- acne
- heavy-periods
red_flags:
- Persistent estrogen dominance symptoms in menopausal women — warrants testing (DUTCH, GI-MAP) and clinician review
- Unexpected weight gain after starting HRT — may reflect impaired estrobolome function
- sudden worsening of bloating present all day
- new diagnosis of autoimmune condition in perimenopause
- sudden change in bowel habits
- symptoms of significant estrogen excess or deficiency — refer to clinician
