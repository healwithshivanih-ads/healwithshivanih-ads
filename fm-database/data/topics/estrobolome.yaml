coaching_scope_notes: Coaches can guide probiotic-rich foods, fiber intake, and reduction
  of processed foods to support healthy estrobolome function.
clinician_scope_notes: Assess estrogen recirculation in context of perimenopause/menopause
  symptoms. HRT and targeted estrobolome interventions require clinical oversight.
