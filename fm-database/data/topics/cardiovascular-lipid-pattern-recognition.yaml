key_mechanisms:
- apob-atherogenic-particle-burden
- insulin-resistance
- inflammatory-cascade
coaching_scope_notes: Coaches can educate clients on the limitations of standard lipid panels and encourage requesting ApoB,
  TG:HDL, hs-CRP, and Lp(a) tests. Interpretation and prescribing decisions are clinician territory.
clinician_scope_notes: Assess ApoB, TG:HDL ratio, hs-CRP, and Lp(a). Treat insulin resistance before targeting lipids pharmacologically.
  Personalise statin decisions — not all elevated LDL requires medication.
