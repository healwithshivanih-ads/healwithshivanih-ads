summary: Standard lipid panels (total cholesterol + LDL) miss a large portion of cardiovascular risk. ApoB reflects atherogenic
  particle number, TG:HDL ratio is an early insulin-resistance proxy, hs-CRP reveals vascular inflammation, and Lp(a) captures
  genetic risk — all requiring assessment together.
common_symptoms: []
red_flags:
- Lp(a) elevation without awareness
- high ApoB with normal LDL in untreated patient
