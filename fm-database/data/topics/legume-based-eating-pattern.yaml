summary: Frequent inclusion of lentils, chickpeas, black chana, moong dal, masoor
  dal, and moth beans as primary protein and fibre sources. Soaking and sprouting
  before cooking is emphasised to improve digestibility and nutrient bioavailability.
key_mechanisms:
- glycemic-load-reduction
- dietary-fiber-modulation
coaching_scope_notes: Encourage soaking legumes overnight. Sprouted legumes (moth
  beans, black chana) are particularly encouraged as a snack or breakfast option.
