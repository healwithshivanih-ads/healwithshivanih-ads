coaching_scope_notes: Coaches can educate clients on reducing EDC exposure through
  food, water, and personal care choices. Pre-pregnancy detox support is particularly
  important. Heavy metal testing and advanced detox protocols require clinical oversight.
clinician_scope_notes: Five-point salivary cortisol testing is recommended alongside
  EDC screening. Cortisol has the highest affinity for all binding pocket domains
  and can also occupy receptors competitively.
