summary: Liver inflammation caused by hepatitis A, B, C, D, E, or G viruses (also
  herpes simplex, CMV, EBV) or drugs and toxins. Hepatitis A is fecal-oral; B is blood
  and sexual contact; C is parenteral with highest mortality (1-12%). Chronic forms
  develop in 10% of B and 10-40% of C cases (70-80% if transfusion-acquired C), with
  risks of cirrhosis and hepatocellular carcinoma. FM therapeutic goals — protect
  liver, support immune clearance, inhibit viral replication, stimulate hepatocyte
  regeneration. Key remedies — licorice (glycyrrhizin), milk thistle (silymarin),
  vitamin C, selenium, alpha-lipoic acid, vitamin D.
