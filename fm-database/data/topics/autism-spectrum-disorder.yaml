summary: Neurodevelopmental condition characterised by difficulties with social interaction,
  verbal/non-verbal communication, and repetitive or restricted behaviours, usually
  apparent before age 3. Murray frames ASD as polygenic with substantial dietary and
  environmental modifiers — gluten/casein sensitivity, food allergies, intestinal
  permeability, neurotransmitter imbalance (low BH4, altered serotonin), omega-3 insufficiency,
  and disturbed melatonin rhythms are surface-level handles for nutritional intervention.
