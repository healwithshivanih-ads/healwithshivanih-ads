summary: 'A cluster of inflammatory conditions of the GI tract — including Crohn''s
  disease, ulcerative colitis, IBS, and gastritis — are presented as having a common
  root in gut flora disruption and dietary irritants. Five foods are identified as
  exacerbating inflammation: dairy, wheat/gluten, peanuts, oats (lectin content),
  and refined sugar.'
common_symptoms:
- diarrhea
- abdominal-cramping
- rectal-bleeding
- bloating
- constipation
- food-sensitivities
red_flags:
- rectal-bleeding
- chronic-uncontrolled-diarrhea
- unresponsive-to-dietary-change
related_topics:
- gut-microbiome-and-gut-flora
- autoimmunity-leaky-gut-triad
- gastrointestinal-tract-overview
key_mechanisms:
- gut-barrier-and-nutrient-absorption
- lectin-driven-gut-inflammation
- gut-microbiome-modulation
coaching_scope_notes: Coaches can support elimination of the five identified irritating
  foods and introduction of gut-soothing strategies (slippery elm, fermented foods,
  hydration). Steroid tapering and medication changes must be clinician-led.
clinician_scope_notes: Rectal bleeding, significant weight loss, or failure to respond
  to dietary change requires urgent gastroenterology referral.
evidence_tier: plausible_emerging
sources:
- id: barbara-oneil-gi-tract
  location: Inflammatory Bowel Conditions Section
  quote: One they call an autoimmune disease is Crohn's disease. A similar one is
    colitis, ulcerative colitis, irritable bowel syndrome, gastritis. All of these
    terms, inflammation of the gastrointestinal tract, usually in slightly different
    areas, but the same thing will heal it all.
