slug: digestive-enzyme-insufficiency
display_name: Digestive Enzyme Insufficiency
aliases:
- pancreatic enzyme deficiency
- exocrine pancreatic insufficiency
summary: Insufficient production of digestive enzymes — from the pancreas (proteases, lipases, amylases) or salivary glands
  — impairs breakdown of proteins, starches, and fats in the gastrointestinal tract, leading to malabsorption and GI symptoms.
common_symptoms:
- bloating
- flatulence
- undigested-food-in-stool
- post-prandial-pain
related_topics:
- hypochlorhydria
- sibo
key_mechanisms:
- hcl-and-pepsin-protein-digestion
- bile-acid-insufficiency
coaching_scope_notes: Coaches can support dietary enzyme-rich foods and discuss timing of digestive enzyme supplements. Diagnosis
  of pancreatic insufficiency is a clinician task.
evidence_tier: plausible_emerging
