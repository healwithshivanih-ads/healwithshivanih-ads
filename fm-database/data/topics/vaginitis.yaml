summary: Vaginitis is an infection or dysbiosis of the vaginal tract. 90% of vulvovaginitis
  is caused by Candida albicans (cottage-cheese discharge with vulvar itching), Gardnerella
  vaginalis (bacterial vaginosis — fishy odour, gray discharge) or Trichomonas vaginalis
  (frothy green- yellow discharge, sexually transmitted). Predisposing factors include
  antibiotic use, oral contraceptives, steroids, diabetes, pregnancy, panty hose (three-fold
  increase vs cotton), gastrointestinal candida reservoir, and douching that disrupts
  vaginal lactobacilli. Chronic vaginitis is a leading reservoir for recurrent UTIs.
  Functional medicine approach centres on restoring lactobacilli dominance with oral
  plus topical probiotics, addressing GI candida, removing simple sugars/yeast foods,
  and selective topical antiseptics (boric acid, tea tree, povidone-iodine) for active
  infection.
