summary: Chronic activation of the hypothalamic-pituitary-adrenal axis leads to sustained
  cortisol elevation or exhaustion, suppressing immunity, depleting sex hormones (progesterone,
  DHEA), impairing hippocampal function, and disrupting circadian rhythm. Central
  mechanism in stress-driven chronic disease.
