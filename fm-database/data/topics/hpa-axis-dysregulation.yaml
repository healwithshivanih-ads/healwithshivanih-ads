- poor-sleep
- low-libido
- anxiety
- brain-fog
- insomnia
- hypoglycemia
- low-blood-pressure
- weight-gain-abdomen
- craving-sweets
- craving-salt
- lethargic-depression
- agitated-depression
red_flags:
- Signs of Addison's disease (severe low BP, salt craving, pigmentation)
- Cushing's syndrome (central obesity, purple striae)
- Scars, elbows, nipples, or skin near nails that are unusually dark — possible Addison's
  disease
- Low blood pressure with drop on standing — orthostatic hypotension
- Excessive dark male-pattern hair growth in women — possible adrenal hyperplasia
