summary: The hypothalamus-pituitary-adrenal axis is the body's central stress response
  system. Dysfunction can manifest as low cortisol states (fatigue, hypoglycemia,
  low blood pressure), high cortisol states (weight gain, insomnia, insulin resistance),
  or adrenal hyperplasia. Chronic activation leads to DHEA depletion, immune suppression,
  and metabolic dysregulation.
common_symptoms:
