summary: Dilated tortuous veins from valvular incompetence + venous wall weakness.
  Affects nearly 50% of middle-aged adults; women 4x more than men. Primary FM drivers
  are low-fibre diet (straining raises abdominal pressure), prolonged standing, obesity,
  pregnancy, and weak vascular wall integrity. Conservative therapy — fibre, compression,
  leg-elevation, exercise, weight reduction — paired with flavonoid-rich diet and
  venotonic herbs (horse chestnut, gotu kola, butcher's broom) prevents progression
  and avoids surgery in early stages.
