summary: Progesterone is produced in six areas of the brain and is present in multiple
  non-reproductive tissues including the lungs. Research shows progesterone's role
  in lung protection, immune modulation (evidenced during COVID-19), sleep quality,
  and traumatic brain injury recovery.
