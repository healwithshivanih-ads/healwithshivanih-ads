  quote: we make progesterone in six different places in our brain. That's one of
    the reasons we sleep better when we're young... men who ended up taking progesterone
    along with standard of care got out of the hospital statistically in a shorter
    period of time, had less ground blast appearance on the lungs, less damage to
    the lungs. None of them got long COVID.
