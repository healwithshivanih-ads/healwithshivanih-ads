coaching_scope_notes: Coaches can educate clients that progesterone has wide-ranging
  systemic benefits beyond reproduction. Therapeutic dosing and forms must be managed
  by a clinician.
clinician_scope_notes: The Cedars-Sinai COVID progesterone trial used 100mg IM BID.
  Brain progesterone production declines with age, correlating with sleep quality
  changes. TBI research includes thousands of patients.
