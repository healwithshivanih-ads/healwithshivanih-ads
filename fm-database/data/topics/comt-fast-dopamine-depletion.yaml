slug: comt-fast-dopamine-depletion
display_name: Fast COMT — Dopamine & Norepinephrine Depletion
aliases:
- dirty COMT fast
- fast COMT variant
- dopamine burn-off
summary: A fast COMT variant clears catecholamines too rapidly, leaving insufficient
  dopamine and norepinephrine. This presents as poor focus, low drive, depression,
  sensation-seeking behaviour, addictive tendencies, and difficulty waking in the
  morning. Exercise, protein intake, and certain supplements can help raise and sustain
  catecholamine levels.
common_symptoms:
- difficulty-paying-attention
- depression
- risk-taking-sensation-seeking
- fidgeting
- morning-grogginess
- addictive-tendencies
- low-libido
- craving-high-fat-high-sugar-foods
red_flags:
- ADHD diagnosis in childhood
- Substance use disorder
related_topics:
- maoa-fast-serotonin-depletion
- comt-slow-catechol-clearance
key_mechanisms:
- catechol-methylation
- dopamine-norepinephrine-regulation
coaching_scope_notes: Coach can encourage morning exercise, adequate protein at each
  meal, brain-stimulating social activities. NADH/CoQ10, tyrosine, and 5-HTP dosing
  require clinician oversight especially with psychiatric medications.
evidence_tier: plausible_emerging
