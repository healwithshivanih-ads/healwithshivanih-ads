coaching_scope_notes: 'Refer suspected RA to rheumatology immediately — early aggressive
  DMARD therapy changes outcomes. Coaching role: anti-inflammatory diet (Mediterranean/vegetarian,
  gluten-free trial), gut healing (5R), stress management, omega-3 + GLA support,
  zinc/selenium repletion, smoking cessation.'
clinician_scope_notes: Diagnosis via 2010 ACR/EULAR criteria (synovitis in ≥1 joint
  + score ≥6 on four-tier rubric). Labs — RF, anti-CCP, ESR, CRP. Anti-CCP specificity
  exceeds 95%. Rule out vitamin D deficiency, hemochromatosis, hypothyroidism, Lyme,
  hepatitis B/C.
notes_for_coach: 'Pizzorno emphasises the multi-factorial picture — antibodies precede
  symptoms by 10+ years, smoking + HLA-DRB1 is the most reproducible risk driver,
  and gut-dysbiosis-zonulin-leaky-gut-citrullination is the modifiable axis. Most
  common food triggers in elimination trials: corn (56%), wheat (54%), pork (39%),
  citrus (39%), dairy/oats (37%).'
