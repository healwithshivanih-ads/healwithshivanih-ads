summary: A chronic inflammatory autoimmune polyarthritis affecting synovial joints
  (especially hands, wrists, feet, ankles, knees) symmetrically and bilaterally. 0.3-1.0%
  prevalence; women outnumber men 3:1; typical onset 40-50 years. Multifactorial —
  autoimmune antibodies (RF, anti-CCP) form 10+ years before clinical onset; HLA-DR1/DR4
  shared epitope in 80% of white RA patients; smoking raises risk 8-16x in shared-epitope
  carriers. Dysbiosis (SIBO present in ~51%), leaky gut (elevated zonulin), and adverse
  food reactions drive systemic inflammation that lands in synovium.
