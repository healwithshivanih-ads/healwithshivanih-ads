summary: Persistent upper GI symptoms — early satiety, postprandial fullness, epigastric
  pain, burning — without identifiable structural or biochemical cause on standard
  workup. Rome IV subtypes — Postprandial Distress Syndrome (early satiety + fullness)
  and Epigastric Pain Syndrome. FM-relevant drivers — hypochlorhydria (common in elderly
  + chronic PPI use), low pancreatic enzyme output, H. pylori (treat if positive),
  SIBO, food sensitivities, vagal tone dysfunction, chronic stress / HPA dysregulation,
  and gut-brain axis disturbance. FM-standard intervention — bitter herbs and digestive
  enzymes before meals, betaine HCl titration (under supervision, ruled-out PUD),
  HPA-axis support, vagal tone work (gargle, humming, breathwork), food allergen elimination,
  peppermint oil for spasm, mastic gum + DGL if H. pylori positive.
common_symptoms:
- early-satiety
- postprandial-fullness
- epigastric-pain
- bloating
- belching
- nausea
red_flags:
- weight loss / anemia / persistent vomiting / hematemesis / dysphagia / age >55 with
  new onset → endoscopy
- alarm symptoms (Rome IV) — bleeding, anemia, anorexia, progressive dysphagia, mass
