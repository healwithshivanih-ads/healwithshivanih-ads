coaching_scope_notes: Coaching role — bitters before meals (Iberogast, gentian, dandelion),
  digestive enzyme trial, betaine HCl titration with caution (rule out active ulcer
  first), food allergen elimination, peppermint oil for spasm, vagal tone practices,
  stress management, eating-environment work (slow + chew + no screens). Refer for
  endoscopy if alarm symptoms or age >55 new onset. Test for H. pylori with breath
  / stool antigen.
clinician_scope_notes: Rome IV criteria for diagnosis after ruling out organic disease.
  PPI trial / prokinetic / tricyclic / SSRI / SNRI per gastroenterology. Cognitive
  Behavioral Therapy increasingly used for refractory functional dyspepsia.
notes_for_coach: Most "GERD" diagnoses in older adults on chronic PPI are actually
  hypochlorhydria — counterintuitive but the FM-standard reframe. Betaine HCl titration
  is the diagnostic + therapeutic trial. Iberogast is the herbal multi-effect blend
  most consistently effective.
