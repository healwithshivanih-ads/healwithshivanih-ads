- dysbiosis-driven-inflammation
coaching_scope_notes: Coaches can address dietary quality, fiber, sleep, and stress
  — all of which impact visceral fat indirectly. Do not make diagnostic or body composition
  assessment claims.
clinician_scope_notes: Visceral adiposity is associated with elevated TNF-alpha and
  other cytokines; assess via waist circumference, imaging, or metabolic markers.
evidence_tier: strong
