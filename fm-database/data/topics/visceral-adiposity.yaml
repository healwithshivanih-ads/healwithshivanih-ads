summary: Excess fat stored around the abdominal organs, associated with significantly
  elevated risk of cardiovascular disease, type 2 diabetes, metabolic syndrome, stroke,
  cancer, and systemic inflammation. Assessed via waist circumference and waist-to-hip
  ratio.
