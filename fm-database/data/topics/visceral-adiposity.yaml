coaching_scope_notes: Coaches can educate clients on waist-to-hip ratio self-measurement
  and its significance, and support lifestyle changes to reduce visceral fat.
clinician_scope_notes: Use stricter cut-offs for patients of Asian descent. Integrate
  with biomarkers (fasting insulin, triglycerides, CRP, HOMA-IR) for full metabolic
  risk picture.
