summary: Nasal breathing generates roughly six times more nitric oxide (NO) than mouth
  breathing, via NO produced in the paranasal sinuses and delivered to the lungs and
  downstream vasculature. Humming with the mouth closed and then inhaling through
  the nose can raise sinus NO output approximately 15-fold by resonating the sinus
  cavities. Practical implications — taping the mouth shut at night for chronic mouth-breathers,
  prescribing nasal-only breathing during walking and most aerobic exercise (with
  pace adjusted downward to maintain it), and treating the practice as a foundational
  blood-pressure intervention rather than a yoga-class addendum.
