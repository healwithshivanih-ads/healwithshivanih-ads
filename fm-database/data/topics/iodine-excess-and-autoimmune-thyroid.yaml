  quote: About 20 to 30% of the US population at present is exposed to amounts that
    we know are excessive for some people. Anyone can get overtly harmed by levels
    of greater than about 1,100 micrograms per day. But some people, if they're above
    200 micrograms, they're prone to have thyroid disease come on. In the US we fortified
    with iodine starting in 1924 — before then the rate of autoimmune thyroid disease
    was a few per 100,000.
