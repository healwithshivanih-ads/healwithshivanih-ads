summary: Christianson's position — iodine is NOT a thyroid panacea; it has a narrow
  therapeutic window with both a deficiency floor and a toxicity ceiling. Approximately
  20-30% of the US population is exposed to excess iodine (>200 mcg/day for the susceptible
  subset, with overt harm above 1,100 mcg/day per WHO data). After voluntary US iodine
  fortification in 1924 the rate of autoimmune thyroid disease rose from a few per
  100,000 to substantially higher within a decade. Coastal-ancestry populations have
  deiodinase variants that clear excess iodine well; inland-ancestry populations preserve
  iodine but cannot dump it — these clients are most at risk of autoimmunity from
  supplementation. Coach implication — for any client with Hashimoto's, elevated TPO,
  or family-history of autoimmune thyroid disease, AVOID iodine-containing thyroid
  support supplements and high-iodine seaweed; prefer trout and other low-iodine seafood
  for thyroid-friendly omega-3 + selenium.
