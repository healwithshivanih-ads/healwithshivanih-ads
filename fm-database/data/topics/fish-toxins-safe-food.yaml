summary: Fatty fish are rich in omega-3s, vitamin D, and minerals, but some species
  accumulate heavy metals (mercury) and environmental toxins (PCBs, dioxins). Safe
  choices low in mercury and high in omega-3s include salmon, sardines, herring, and
  mackerel. High-mercury fish (shark, swordfish, king mackerel, tilefish) should be
  avoided, especially by vulnerable groups.
