slug: persistent-organic-pollutants-fat-storage
display_name: Persistent Organic Pollutants and Fat-Cell Storage
aliases:
- pops
- forever chemicals fat storage
- pfas storage
summary: Persistent organic pollutants (POPs) — including PFAS (per- and polyfluoroalkyl
  substances, the "forever chemicals" found in non-stick coatings, water-repellent
  fabrics, and some bottled-water brands), flame retardants, phthalates, certain pesticides,
  and dioxins — are sequestered in adipose tissue (and to a lesser extent bone, brain,
  and organs) when the liver's conjugation capacity is overwhelmed. Bloodstream concentration
  of POPs measured during deliberate weight loss correlates with propensity to regain
  weight — the body appears to pull fat back on partly to re-sequester released toxins.
  Practical implication — slow, supported weight loss combined with active detoxification
  pathways (binders, fibre, sweating, hydration) yields more durable results than
  rapid restriction.
