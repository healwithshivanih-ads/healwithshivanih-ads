  location: Podcast — POPs and weight regain
  quote: Toxins, if you over exceed your body's ability to get rid of them, they get
    stored. Where do they get stored? Your bones, your organs, your fat, your brain.
    So when you lose fat, the contents of those fat cells get dumped back into the
    bloodstream — these chemicals were essentially pulling the fat back on as some
    sort of protective mechanism.
