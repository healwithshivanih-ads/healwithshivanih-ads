slug: neat
display_name: NEAT (Non-Exercise Activity Thermogenesis)
aliases:
- non-exercise activity thermogenesis
- incidental activity
- daily movement
summary: 'NEAT — non-exercise activity thermogenesis — is the energy expended

  through daily, non-structured movement: taking stairs, parking further

  away, walking to talk to a colleague rather than emailing, household

  tasks, fidgeting, standing breaks. NEAT is distinguished from formal

  exercise and is the foundation of the physical activity pyramid.

  Modern "chair-enticing" environments (remote work, smart devices,

  delivery services) have systematically reduced NEAT over the last

  century, contributing to rising obesity and metabolic disease.

  Increasing NEAT — particularly five minutes of movement every waking

  hour — is the recommended first intervention for sedentary clients,

  before any structured exercise prescription.

  '
