coaching_scope_notes: 'Coach starts here with sedentary clients rather than jumping
  to formal

  exercise. Specific micro-interventions: hourly five-minute movement

  breaks, office-friendly stretches and squats, walking meetings,

  parking farther away, stairs instead of elevator. The aim is to

  rebuild baseline movement frequency before layering on structured

  cardio or resistance training. NEAT also serves as the maintenance

  floor for clients who complete a workout but otherwise sit all day —

  one structured workout does not compensate for prolonged sitting.

  '
clinician_scope_notes: 'Clinician notes NEAT level when assessing cardiometabolic
  risk and may

  recommend desk modifications or activity tracking devices.

  '
