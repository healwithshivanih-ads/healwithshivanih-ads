summary: The gut microbiome plays a significant role in reducing xenobiotic load before
  absorption. Up to 50–60% of ingested pesticides may be eliminated by gut bacteria,
  with the bacteria acting as a first line of defense. Intestinal dysbiosis impairs
  this protection and increases systemic toxic load. LPS (lipopolysaccharide) from
  gram-negative bacteria is also an internal toxin source.
