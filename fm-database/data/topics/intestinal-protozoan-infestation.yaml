summary: Intestinal protozoa (Giardia, Entamoeba, Blastocystis, Cyclospora, Cryptosporidium) can produce not only GI symptoms
  but profound systemic illness — chronic fatigue, arthritis, urticaria, and immune dysregulation — often without prominent
  digestive complaints. The GI tract hosts two thirds of total lymphocytes; parasitic infestation alters the immune milieu
  and may trigger autoimmunity.
