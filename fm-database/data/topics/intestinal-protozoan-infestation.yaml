coaching_scope_notes: Coaches can support prebiotic/probiotic protocols and gut-environment optimisation. Anti-protozoal botanical
  protocols (Artemisia, berberine) should be supervised by a clinician.
clinician_scope_notes: Stool examination may be negative even during active giardiasis. Consider empiric treatment in high-risk
  populations. Assess for nutritional deficiencies (iron, folate, B12, vitamin A) that result from chronic infestation.
evidence_tier: plausible_emerging
sources:
- id: pizzorno-textbook-gi
  location: Intestinal Protozoan Infestation — General Considerations
  quote: Association between intestinal protozoa and chronic fatigue without prominent digestive complaints is common; 80%
    of patients with diagnosis of CFIDS infected with protozoan Blastocystis hominis showed improved fatigue after treatment
    that cleared protozoa from stool specimens.
