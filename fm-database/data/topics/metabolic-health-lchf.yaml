slug: metabolic-health-lchf
display_name: Metabolic Health & Low-Carb High-Fat (LCHF) Nutrition
aliases:
- ketogenic diet
- keto
- low-carb diet
- metabolic reprogramming
summary: LCHF is framed as a metabolic intervention that restores insulin signalling,
  reduces hepatic fat, improves PCOS outcomes, and stabilises energy by reducing glucose
  variability. Carbohydrate threshold is considered individual, and electrolyte optimisation
  is essential during adaptation.
common_symptoms:
- sugar-cravings
- energy-crashes
- belly-fat
- keto-flu
red_flags:
- severe dyslipidaemia on LCHF without monitoring
- thyroid deterioration in women on prolonged strict keto
related_topics:
- pcos-fertility
- cardiovascular-lipid-pattern-recognition
- insulin-resistance-metabolic-syndrome
key_mechanisms:
- insulin-resistance
- metabolic-flexibility
- hepatic-fat-reduction
coaching_scope_notes: Coaches can guide food choices, electrolyte intake, and lifestyle
  factors. Lab monitoring (HbA1c, fasting insulin, ApoB, thyroid) and carb thresholds
  for therapeutic cases require clinician oversight.
clinician_scope_notes: Monitor ApoB, TG:HDL, HbA1c, fasting insulin, and thyroid markers.
  Carb cycling may be needed for women to protect thyroid and hormonal axes. Recommend
  resistance training alongside dietary change.
evidence_tier: plausible_emerging
