slug: low-carb-diet
display_name: Low-Carb Diet
aliases:
- low carbohydrate diet
- smart-carb diet
- carbohydrate restriction
- ketogenic diet
summary: A dietary strategy that strategically reduces carbohydrate intake to reset
  metabolism, improve insulin signalling, reduce inflammation, and restore metabolic
  flexibility. Ranges from moderate low-carb (25–30% carbs) to ketogenic (5–10% carbs)
  with clinical applications in diabetes, PCOS, NAFLD, autoimmune conditions, obesity,
  and cognitive decline.
common_symptoms:
- insulin-resistance
- fatigue
- brain-fog
- weight-gain
- cravings
red_flags:
- aggressive-carb-restriction-in-hypothyroid-or-adrenal-fatigue
- high-insulin-dose-without-supervision
related_topics:
