- metabolic-syndrome
- pcos
- nafld
- type-2-diabetes
- cognitive-decline
key_mechanisms:
- insulin-regulation
- metabolic-flexibility
- mitochondrial-efficiency
coaching_scope_notes: Coaches can guide food group choices, meal timing, electrolyte
  support, and phased transitions. Macronutrient targets and lab monitoring (HbA1c,
  HOMA-IR, lipids, thyroid) are clinician scope.
clinician_scope_notes: Monitor fasting insulin, HOMA-IR, postprandial glucose, lipid
  profile, thyroid panel every 8–12 weeks. Avoid aggressive carb restriction in hypothyroid,
  adrenal fatigue, or pregnancy. Supervise patients on high insulin doses.
