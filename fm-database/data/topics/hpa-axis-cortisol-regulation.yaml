coaching_scope_notes: Coaches can support HPA regulation through adaptogen protocols, sleep hygiene, and dietary strategies.
  Lab interpretation (cortisol panels, cytokine levels) is clinician scope.
clinician_scope_notes: Assess with salivary Adrenal Stress Profile (cortisol/DHEA) and/or plasma cytokine panels (IL-6, TNF-α,
  IL-1β via ELISA). Consider 24-hour sampling given circadian rhythm of cytokines.
evidence_tier: plausible_emerging
