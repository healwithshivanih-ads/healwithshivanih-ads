coaching_scope_notes: Coaches can support dietary changes (Mediterranean diet, sugar reduction, omega-3 rich foods), exercise,
  and weight management to improve lipid profiles.
clinician_scope_notes: LDL-P, ApoB, Lp(a), and particle sizing require lab orders and clinical interpretation. Statin and
  niacin prescribing is clinician scope.
