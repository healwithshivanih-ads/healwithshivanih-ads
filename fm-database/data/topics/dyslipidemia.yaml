coaching_scope_notes: Coach supports dietary portfolio (soluble fiber, Mediterranean
  diet, plant sterols, omega-3s), lifestyle, and foundational supplement use. Lab
  interpretation and medication decisions are clinician scope.
clinician_scope_notes: Rule out secondary causes (hypothyroidism, diabetes). Monitor
  TC, LDL-C, HDL-C, TGs, Lp(a), and liver enzymes when using niacin.
