summary: Abnormal blood lipid levels including elevated TC, LDL-C, VLDL, TGs, or Lp(a),
  and/or low HDL-C; a major modifiable risk factor for atherosclerosis. Includes familial
  forms (FH, FCH, FHTG) and secondary causes.
