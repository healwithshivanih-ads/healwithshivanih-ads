summary: Dyslipidemia encompasses elevated LDL (especially small dense LDL particles), low HDL, elevated triglycerides, and
  elevated ApoB. Advanced lipid particle testing (LDL-P, ApoB) outperforms calculated LDL-C for cardiovascular risk stratification.
