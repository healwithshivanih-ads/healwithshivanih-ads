- somatic-body-memory
- maternal-mental-health
key_mechanisms:
- nervous-system-imprinting
- prenatal-cortisol-adrenaline-exposure
coaching_scope_notes: Coaches may explore birth narrative awareness and somatic breath
  practices. Medical interpretation of birth records or neonatal history is out of
  scope.
clinician_scope_notes: C-section and premature birth associations with later behavioural/psychological
  outcomes have some emerging research support but claims here (e.g. C-section causing
  students to quit studies) are unsubstantiated. Refer for perinatal trauma therapy.
