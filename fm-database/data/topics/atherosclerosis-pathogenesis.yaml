slug: atherosclerosis-pathogenesis
display_name: Atherosclerosis Pathogenesis
aliases:
- plaque formation
- arterial plaque
- endothelial injury cascade
summary: Atherosclerosis begins with endothelial dysfunction (caused by oxidative
  stress, hypertension, or inflammation), allowing small dense LDL particles to penetrate
  the arterial wall. These particles become oxidized, triggering macrophage infiltration,
  foam cell formation, calcium deposition, and progressive plaque buildup that can
  lead to myocardial infarction or stroke.
