coaching_scope_notes: Understanding this mechanism helps coaches explain why lifestyle
  interventions (antioxidants, anti-inflammatory diet, omega-3 balance) target the
  root cause rather than just cholesterol numbers.
clinician_scope_notes: 'Advanced testing: carotid intima-media thickness (cIMT) via
  Doppler can detect early subclinical atherosclerosis. Coronary calcium score reflects
  extracellular calcium in plaques.'
evidence_tier: strong
