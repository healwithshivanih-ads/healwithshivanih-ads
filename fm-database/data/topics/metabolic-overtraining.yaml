coaching_scope_notes: 'Coach screens for overtraining in clients reporting fatigue
  after exercise,

  inability to repeat the same workout the next day, irritability,

  declining performance, or menstrual changes. The intervention is to dial

  back intensity, increase recovery, and rebuild metabolic flexibility

  through gentler movement before reintroducing intensity in small doses

  (1-2 minutes HIIT progressively built up).

  '
clinician_scope_notes: 'Clinician evaluates for HPA-axis dysregulation, low ferritin,
  thyroid

  status, and other depletion patterns in suspected overtraining cases.

  Manages amenorrhea, recurrent injury, and clinical depression in this

  context.

  '
