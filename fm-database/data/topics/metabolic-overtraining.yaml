summary: 'Metabolic overtraining occurs when exercise intensity or volume exceeds

  the body''s capacity to recover, producing excess oxidative stress and

  inflammation rather than adaptive benefit. The therapeutic window of

  exercise is individual — what is restorative for one person can be

  depleting for another. Common in clients doing high-intensity training

  while simultaneously inflamed, adrenally fatigued, or depleted.

  '
common_symptoms:
- post-exercise-exhaustion
- exercise-induced-amenorrhea
- loss-of-libido
- frequent-injuries
- low-mood
red_flags: []
