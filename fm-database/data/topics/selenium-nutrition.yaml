summary: Selenium is an essential trace element found in plant foods, seafood, meats, and enriched grains. Plant selenium
  content is variable based on soil concentration. It supports antioxidant defense, thyroid function, and immune health.
common_symptoms:
- lethargy
- autoimmune-flares-low-immunity
red_flags: []
related_topics:
