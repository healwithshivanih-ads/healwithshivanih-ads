summary: Sarcopenia is the progressive loss of skeletal muscle mass and strength,
  typically 3-8 percent per decade after age 30 and accelerating after age 60. Functionally
  it manifests as slower gait, frailty, falls, and difficulty with normal activities
  (lifting bags, standing from a chair). Lyon reframes the obesity epidemic as fundamentally
  an undermuscling epidemic — skeletal muscle is the organ of longevity, the largest
  endocrine organ, the primary site of glucose disposal, and the dominant driver of
  resting fatty-acid oxidation. Sarcopenia and obesity are two sides of the same coin
  (sarcopenic obesity); fat infiltrating muscle tissue (intramuscular adipose tissue
  or IMAT) is the metabolically relevant marker, not BMI or DEXA body-fat percentage.
  Sarcopenia raises all-cause mortality, fracture risk, infertility (PCOS via IMAT),
  erectile dysfunction, and dementia risk. It is preventable and reversible at any
  age through resistance training and adequate protein (1.2-1.6 g/kg/day high-quality
  protein, 30-50 g per meal). GLP-1 agonists accelerate sarcopenia (50 percent of
  weight loss can be muscle) unless paired with resistance training and high protein
  intake.
