coaching_scope_notes: 'Match starting tier to current ability — most sedentary clients begin

  at chair-based isometric work. Emphasise form before load. Respect

  48-hour recovery between sessions hitting the same muscle group.

  Progress by increasing reps, sets, or load gradually.

  '
clinician_scope_notes: 'Refer to PT or qualified trainer for clients with recent musculoskeletal

  injury, post-surgical restrictions, or advanced osteoporosis where

  fracture risk is elevated.

  '
