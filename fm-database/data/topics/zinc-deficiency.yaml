slug: zinc-deficiency
display_name: Zinc Deficiency
aliases:
- zinc insufficiency
- hypozincemia
summary: Zinc is an essential trace mineral involved in hundreds of enzymatic activities
  including immune cell development, wound healing, hormone regulation, and carbohydrate
  metabolism. Deficiency is common in vegans, people with hypothyroidism, chronic
  alcohol users, and those on oral contraceptives, and presents with a wide spectrum
  of symptoms from hair loss to impaired immune function.
common_symptoms:
- impaired-immune-function
- hair-loss
- slow-wound-healing
- loss-of-taste-and-smell
- lethargy
- loss-of-appetite
- acne
- infertility
- macular-degeneration
red_flags:
- non-responsive iron-deficiency anemia despite supplementation
- severe infertility
- significant macular degeneration
related_topics:
- iron-deficiency-anemia
- immune-dysfunction
- male-reproductive-health
key_mechanisms:
- zinc-dependent-enzymatic-activity
- zinc-hcl-production-link
- zinc-immune-cell-maturation
coaching_scope_notes: Coaches can support dietary zinc optimization (oysters, beef,
  pumpkin seeds, legumes) and identify risk factors. Supplement dosing and lab interpretation
  (serum zinc, alkaline phosphatase) require clinician oversight.
clinician_scope_notes: Serum zinc (optimal 80–100 mcg/dL) and alkaline phosphatase
  are key diagnostic markers. Assess for secondary deficiencies (e.g., iron malabsorption
  due to low HCl). Higher RDA may be needed in severe deficiency.
evidence_tier: strong
