summary: Fibrocystic breast disease is cyclical bilateral breast nodularity with cysts,
  pain, and tenderness — affecting 20 to 40% of premenopausal women and considered
  a (modest) breast cancer risk factor. Driven by elevated estrogen-to-progesterone
  ratio, elevated prolactin, caffeine/methylxanthines (improvement in 75 to 97% with
  elimination), constipation (women with fewer than 3 BMs/week have 4.5x higher FBD
  risk via increased estrogen reabsorption), subclinical hypothyroidism, and iodine
  deficiency. Functional medicine approach centres on caffeine elimination, plant-forward
  low-fat (<20% kcal) high-fiber diet, lipotropic estrogen clearance (B vitamins,
  choline, methionine, I3C/DIM), evening primrose oil, vitamin E, and chasteberry
  for the prolactin lever.
