summary: Ongoing exposure to pesticides, herbicides, heavy metals, plasticizers (BPA, phthalates), industrial chemicals, mold/mycotoxins,
  and oral/personal care product chemicals that cumulatively increase the body burden. Sources include food, water, air, dental
  materials, cookware, and personal care products.
