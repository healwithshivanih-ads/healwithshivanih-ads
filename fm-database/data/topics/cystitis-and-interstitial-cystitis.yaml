summary: Acute cystitis is bacterial bladder infection (usually E. coli); interstitial
  cystitis (IC) or painful bladder syndrome (PBS) is chronic non-infectious bladder
  wall inflammation. UTIs affect 10 to 20% of women yearly; 55% of recurrent UTIs
  eventually involve the kidneys. Repeated antibiotic use disturbs vaginal lactobacilli
  and breeds resistant E. coli, fueling recurrence. Functional medicine focuses on
  increasing urine flow (64 fl oz/day), urine alkalinisation (citrate salts), preventing
  bacterial adherence (cranberry proanthocyanidins, uva ursi, goldenseal), and restoring
  the lactobacillus shield around the urethra. For IC/PBS the focus shifts to bladder
  wall integrity (hyaluronic acid, gotu kola, aloe vera) and removing dietary triggers
  (coffee, citrus, artificial sweeteners, hot peppers, alcohol).
