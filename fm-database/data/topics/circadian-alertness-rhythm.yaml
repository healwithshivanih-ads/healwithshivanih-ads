slug: circadian-alertness-rhythm
display_name: Circadian Alertness Rhythm
aliases:
- daily alertness arc
- diurnal alertness pattern
- cognitive circadian rhythm
summary: 'Brain alertness follows a circadian arc: peak in the morning hours after
  waking, gradually declining through the afternoon and early evening, with a reversal
  around 9-10pm when alertness drive collapses and sleep drive dominates. During sleep,
  the brain transitions from active "command and control" mode to a default mode for
  repair, strengthening of neuronal connections, and consolidation of working memory
  into hippocampal long-term memory. Honoring this arc — doing demanding cognitive
  work in the morning, routine tasks afternoon, and protecting evening wind-down —
  aligns work with physiology.'
