slug: psoriasis-gut-immune
display_name: Psoriasis (Gut & Immune-Driven)
aliases:
- psoriatic skin condition
- autoimmune skin disease
summary: Psoriasis viewed through a functional medicine lens as an autoimmune skin
  condition driven by immune dysregulation and gut dysfunction. Key features include
  chronic immune activation, nutritional deficiencies (zinc, vitamin D), and gut barrier
  compromise. High-dose vitamin D3 and gut-healing protocols are highlighted interventions.
common_symptoms:
- psoriasis-skin-patches
- cracked-knuckles
- cracked-feet
- skin-redness-on-elbows
red_flags:
- extensive body-surface-area involvement
- psoriatic arthritis signs
- worsening despite elimination diet at 2–3 weeks (expected; re-evaluate at 3 months)
related_topics:
- gut-skin-hormone-axis
- immune-dysregulation
- gut-dysbiosis
- gut-barrier-dysfunction
key_mechanisms:
- gut-immune-dysregulation
- leaky-gut
coaching_scope_notes: Coaches can support elimination diets, supplementation guidance
  (zinc, omega-3, vitamin D3 under clinician oversight), and lifestyle changes. High-dose
  vitamin D3 for autoimmune conditions requires clinician involvement.
clinician_scope_notes: Prescription of high-dose vitamin D3 for psoriasis, topical
  steroid applications, and immunosuppressant therapies are clinician-managed.
evidence_tier: plausible_emerging
