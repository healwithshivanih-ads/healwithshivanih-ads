summary: Affects 40% of severe nephropathy cases; most common reason for haemodialysis and kidney transplant. Monitor via
  microalbuminuria, creatinine, GFR. ACE inhibitors/ARBs are standard of care.
evidence_tier: strong
common_symptoms:
- microalbuminuria
- elevated-creatinine
- hypertension-fluid-retention
red_flags:
- end-stage-renal-disease
- severe-proteinuria
related_topics:
- type-1-diabetes-mellitus
- type-2-diabetes-mellitus
key_mechanisms:
- glucotoxicity
- oxidative-damage
- hypertension-mediated-damage
coaching_scope_notes: Low-protein diet for progressed nephropathy; soluble fibre; vitamins C and E shown to reduce microalbuminuria.
  Blood pressure normalisation critical. Refer to nephrologist.
