coaching_scope_notes: Coaches can screen for sleep apnea symptoms and encourage evaluation.
  Weight loss and sleep hygiene support are within coaching scope.
clinician_scope_notes: Formal sleep study and CPAP/BIPAP prescription are clinician
  scope.
