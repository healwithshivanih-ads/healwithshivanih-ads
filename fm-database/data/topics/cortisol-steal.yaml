slug: cortisol-steal
display_name: Cortisol Steal (Pregnenolone Steal)
aliases:
- pregnenolone steal
- cortisol shunt
summary: Under conditions of chronic inflammation, infection, or sustained stress, pregnenolone is preferentially shunted
  toward cortisol synthesis (via 17-hydroxypregnenolone), reducing substrate availability for DHEA, testosterone, estrogen,
  and progesterone. This manifests as elevated cortisol with simultaneously low sex hormones.
common_symptoms:
- low-progesterone-symptoms
- mood-swings
- lethargy
- low-libido
red_flags:
- Cortisol >10 with low DHEA-S, testosterone, estrogen, progesterone — suggests active cortisol steal — refer for full workup
related_topics:
- steroidogenesis
- menopause
- perimenopause
- estrogen-dominance
key_mechanisms:
- cholesterol-to-pregnenolone
coaching_scope_notes: Coaches can support stress reduction, anti-inflammatory lifestyle, meditation, walking, and yoga to
  reduce cortisol burden. Do not supplement hormones without addressing inflammation first.
evidence_tier: plausible_emerging
clinician_scope_notes: ''
sources:
