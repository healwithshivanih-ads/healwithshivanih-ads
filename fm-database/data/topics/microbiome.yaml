coaching_scope_notes: Coaches can encourage dietary diversity (30 plant varieties/week),
  gradual fiber increase, and fermented food inclusion.
clinician_scope_notes: Stool testing (e.g., GI-MAP) can identify dysbiosis, beta-glucuronidase
  levels, inflammatory markers (calprotectin), and digestive enzyme insufficiency.
  Antibiotic use, proton pump inhibitors, and oral contraceptives can significantly
  disrupt the microbiome and warrant monitoring.
evidence_tier: strong
