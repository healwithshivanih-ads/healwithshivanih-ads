slug: microbiome
display_name: Gut Microbiome
aliases:
- gut microbiome
- gut flora
- gut bacteria
- microbiota
- intestinal microbiota
summary: The complex community of microorganisms residing in the gastrointestinal
  tract, central to digestion, immune regulation, hormone metabolism, and SCFA production.
  Fiber is a primary substrate for maintaining microbial diversity and function.
common_symptoms:
- bloating
- constipation or loose stools
- new food sensitivities
- weight loss resistance
- brain fog
- fatigue after eating
- abdominal distension
- gas
- loose stools
- reduced SCFA production
- increased opportunistic infections
- digestive upset
- food intolerances
- fatigue
- immune dysregulation
- dysbiosis
- impaired immunity
- hormonal imbalance
red_flags:
- Persistent bloating present on waking that worsens throughout the day — warrants
  evaluation to rule out ovarian cancer or other pathology
- New-onset blood in stool or significant change in bowel habits — refer for GI evaluation
- Bloating accompanied by unexplained weight loss
- persistent bloody stool
- unintentional weight loss
- severe abdominal pain — refer to GI specialist
