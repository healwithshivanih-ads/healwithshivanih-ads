summary: 'The 5R framework (Remove, Replace, Reinoculate, Repair, Rebalance) is a foundational functional medicine approach
  to restoring gut health. Each R targets a different layer of the gut dysfunction: Remove triggers (food sensitivities, pathogens),
  Replace digestive support (HCl, enzymes, bile), Reinoculate beneficial bacteria (probiotics, prebiotics, fermented foods),
  Repair the gut lining (L-glutamine, zinc, omega-3, polyphenols), Rebalance lifestyle factors (stress, sleep, exercise).'
