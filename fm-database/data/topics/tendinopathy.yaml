summary: Chronic non-inflammatory degeneration of tendon collagen matrix (now understood
  as tendinosis, not tendinitis) — characterised by pain on loading, stiffness, and
  impaired performance. FM-relevant drivers — collagen synthesis deficits (low vitamin
  C, low silica, low manganese, low protein intake), insulin resistance (impairs tissue
  repair), chronic systemic inflammation, hypothyroidism (impaired connective tissue
  turnover), fluoroquinolone antibiotic exposure (Cipro, Levaquin — known tendon-rupture
  risk especially with concurrent corticosteroids), perimenopausal estrogen decline
  (estrogen modulates tendon collagen). Eccentric loading is the evidence-based rehab
  approach; nutritional support amplifies recovery.
common_symptoms:
- joint-pain
- stiffness-after-rest
- pain-on-loading
- muscle-aches-joint-pain
red_flags:
- sudden tendon rupture (Achilles, biceps, quadriceps) — surgical emergency
- recent fluoroquinolone exposure plus tendon pain — discontinue + refer
- bilateral symmetric tendinopathy → autoimmune workup
