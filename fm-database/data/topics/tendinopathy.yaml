coaching_scope_notes: Coaching role — collagen peptides (10-20 g daily, paired with
  vitamin C 50-100 mg for hydroxylation), eccentric loading protocols (Alfredson for
  Achilles, slow heavy resistance for patellar), adequate protein (1.2-1.6 g/kg),
  address insulin resistance + thyroid + estrogen, omega-3 anti-inflammatory, magnesium
  for muscle quality. Eliminate fluoroquinolones with prescriber where possible. Refer
  for physiotherapy assessment if persistent.
clinician_scope_notes: Imaging only if surgical decision needed. Eccentric loading
  is first-line. Corticosteroid injection cautioned — short-term pain relief but worsens
  long-term outcomes. PRP and ECSWT emerging options. Surgical repair only after 6-12
  months conservative failure.
notes_for_coach: For perimenopausal women — estrogen decline + insulin resistance
  together explain a lot of "out of nowhere" tendon issues (frozen shoulder, knee
  tendon, plantar fasciitis). Collagen peptides + vitamin C + eccentric loading is
  the FM core stack. Track HbA1c and TSH if tendon symptoms persist.
