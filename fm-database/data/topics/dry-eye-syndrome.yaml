coaching_scope_notes: Coaching role — omega-3 EPA/DHA repletion (2-3 g/day, RCT evidence
  for dry eye), screen hygiene (20-20-20 rule), humidifier, hydration, blink exercises,
  vitamin A from food sources (orange/yellow vegetables + animal sources), warm compress
  for meibomian gland dysfunction. Identify and reduce anticholinergic medications
  with prescriber where possible. Refer for autoimmune workup (anti-Ro/anti-La) if
  sicca symptoms + joint pain.
clinician_scope_notes: Schirmer test, tear breakup time, ocular surface stain. Artificial
  tears, cyclosporine ophthalmic, lifitegrast. Punctal plugs. Rule out Sjögren's —
  anti-Ro/SSA, anti-La/SSB, ANA, RF, salivary gland biopsy if needed.
notes_for_coach: Diabetic dry eyes are mechanistically tied to glycemic control —
  improving HbA1c often improves ocular symptoms over months. For perimenopausal women,
  dry eye often co-occurs with vaginal dryness — both estrogen-decline downstream.
  Omega-3 RCT evidence is strongest at 2-3 g EPA+DHA combined.
