summary: Chronic ocular surface disease characterised by reduced tear production,
  increased tear evaporation, or both, leading to irritation, burning, blurred vision,
  and visual fluctuation. Common drivers in FM practice — diabetic microvascular damage
  (lacrimal gland), autoimmune (Sjögren's, RA, Hashimoto's), perimenopausal estrogen
  decline (androgens normally support meibomian gland function), screen-induced reduced
  blink rate, omega-3 deficiency, vitamin A deficiency, anticholinergic medications.
  Diabetic dry eye affects up to 50% of T2DM patients and is associated with diabetic
  retinopathy risk.
common_symptoms:
- burning-eyes
- gritty-sensation
- blurred-vision
- light-sensitivity
- excessive-tearing-paradox
red_flags:
- corneal abrasion or ulcer
- severe pain or vision change
- signs of Sjögren's (dry mouth + joint pain + fatigue) → rheumatology referral
- sudden onset
