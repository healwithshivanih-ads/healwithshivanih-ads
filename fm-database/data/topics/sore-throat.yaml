summary: Over 90% of sore throats are viral and self-limiting. The 10-25% caused by
  group A beta-hemolytic streptococci (GABHS) require rule-out via rapid strep antigen
  test before any antibiotic prescription, since antibiotic use does not significantly
  reduce the incidence of post-streptococcal complications (rheumatic fever, glomerulonephritis)
  and recovery rates are similar with vs without antibiotics in uncomplicated strep.
  Functional medicine focus is immune support, mucosal defence, and rebuilding the
  gut microbiome whenever antibiotics are used.
