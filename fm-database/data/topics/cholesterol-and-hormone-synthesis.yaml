slug: cholesterol-and-hormone-synthesis
display_name: Cholesterol as a Precursor for Hormones and Vitamins
aliases:
- cholesterol biosynthesis
- cholesterol-vitamin D precursor
summary: Cholesterol is the biochemical precursor for steroid hormones and fat-soluble
  vitamins including vitamin D. Blocking cholesterol synthesis via statins may have
  downstream effects on hormonal and neurological health.
common_symptoms:
- hormonal-imbalance
- fatigue
- cognitive-impairment
