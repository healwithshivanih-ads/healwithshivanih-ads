- statin-therapy-primary-prevention
key_mechanisms:
- cholesterol-precursor-depletion
- mevalonate-pathway-inhibition
coaching_scope_notes: Coaches can educate clients that cholesterol serves important
  physiological roles beyond cardiovascular risk. Discussion of hormonal or neurological
  consequences of low cholesterol should involve a clinician.
evidence_tier: strong
