slug: insulin-resistance
display_name: Insulin Resistance
aliases:
- impaired insulin sensitivity
- blood sugar dysregulation
- glucose metabolism impairment
- IR
- metabolic insulin dysfunction
- cellular insulin insensitivity
summary: A state in which target cells (muscle, liver, adipose) fail to respond adequately
  to insulin signalling, requiring compensatory hyperinsulinaemia to maintain euglycaemia.
  Progresses through recognisable clinical stages from early IR to T2DM if unaddressed.
common_symptoms:
- post-meal energy crashes
- carbohydrate sensitivity
- weight gain around abdomen
- sugar cravings
- bloating
- water retention
- belly-fat
- skin-tags
- fatigue-after-meals
- sugar-cravings
- elevated-fasting-insulin
- post-meal-fatigue
- brain-fog
- abdominal-weight-gain
- energy-crashes
- acanthosis-nigricans
- mood-swings
red_flags:
- fasting glucose trends toward pre-diabetes
- worsening metabolic markers despite lifestyle changes
- HbA1c progressing toward 6.5%+
- fasting glucose consistently >100 mg/dL
- symptomatic hypoglycaemia
- HOMA-IR > 2.9
- fasting insulin > 25 µIU/mL
- fasting glucose ≥ 126 mg/dL
