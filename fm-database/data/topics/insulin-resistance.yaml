coaching_scope_notes: Support low-GI dietary patterns, resistance training, sleep
  optimisation, and stress reduction. Supplement education on magnesium, chromium,
  vitamin D within scope.
clinician_scope_notes: Assess HOMA-IR, fasting insulin, C-peptide, GTIR/Kraft curve.
  Evaluate for LADA, secondary causes (statin use, thyroid). Manage metabolic syndrome
  components.
