coaching_scope_notes: 'PACING IS THE INTERVENTION. The single most important shift:
  stop

  exercising into the crash. Track HRV (Oura / Whoop / Garmin); on a

  low-HRV day, REST. Use the "energy envelope" concept — operate at

  50-70% of perceived capacity, with 24h recovery built in. Forbidden:

  graded exercise therapy / push-through / CBT framed as

  deconditioning-cure. Permitted: gentle horizontal exercise (recumbent

  bike at low resistance, swimming at slow pace, restorative yoga). Add

  mitochondrial support — CoQ10 (ubiquinol) 100-200 mg, B-complex,

  D-ribose 5-15 g/day, L-carnitine 1-2 g, NAD+ precursors, magnesium.

  Screen for + treat MCAS + POTS aggressively (improves PEM in many).

  Low-histamine trial if reactive. Pace cognitive exertion as carefully

  as physical. Trauma-informed framing — clients have been gaslit for

  years and may distrust care providers.

  '
clinician_scope_notes: 'Diagnosis is clinical (IOM 2015 criteria for ME/CFS; long
  COVID

  criteria per NICE / CDC). Rule out treatable mimics: hypothyroidism,

  Addison''s, sleep apnoea, anaemia, celiac, depression with anhedonia.

  Pharmacological options (LDN, IVIG, antivirals, mast cell stabilisers,

  POTS medications) are clinician domain. Refer for cardiology workup

  if cardiac symptoms; sleep medicine if apnoea screen positive;

  immunology if recurrent infections. Coach refers + supports; does

  NOT diagnose.

  '
