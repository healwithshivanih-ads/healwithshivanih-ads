summary: 'Post-exertional malaise (PEM) is a worsening of all symptoms 12-48 hours

  after any physical, cognitive, or emotional exertion that was previously

  tolerable — and persists for days to weeks. PEM is the cardinal feature

  distinguishing ME/CFS and long COVID from ordinary fatigue or

  deconditioning. Functional medicine framing: mitochondrial dysfunction,

  oxidative stress, neuroinflammation, autonomic instability (POTS

  overlap), mast cell activation (MCAS overlap), reactivated chronic

  infections (EBV, HHV-6, Lyme), and microclots. Critically, conventional

  graded exercise therapy WORSENS PEM — coach must use pacing, not

  push-through.

  '
