slug: systemic-mastocytosis
display_name: Systemic Mastocytosis
aliases:
- SM
- clonal mast cell disease
summary: 'Systemic Mastocytosis is a rare neoplastic disorder characterized by clonal

  proliferation and accumulation of abnormal mast cells in organs (bone marrow,

  liver, spleen, skin). The KIT D816V mutation is present in the majority of

  adult cases. Unlike MCAS, SM involves a pathological increase in the actual

  number of mast cells. Serum tryptase is persistently elevated (often

  >20 ng/mL) and carries risk of progression to mast cell leukemia in

  aggressive variants.

  '
common_symptoms:
- flushing
- urticaria
- tachycardia
- visceral-hypersensitivity
red_flags:
- bone lesions
- serum tryptase persistently above 20 ng/mL
- unintentional-weight-loss
- organ infiltration
- organ infiltration on imaging
related_topics:
- mast-cell-activation-syndrome
key_mechanisms:
- mast-cell-degranulation
coaching_scope_notes: 'This is a hematologic/oncologic diagnosis — strictly out of coaching scope

  for diagnosis or treatment. Coach supports lifestyle (trigger avoidance,

  low-histamine eating) only as adjunct to clinician-led care.

  '
clinician_scope_notes: 'Urgent hematology referral for bone marrow biopsy is required when tryptase

  is persistently elevated or KIT mutation is suspected. Treatment may

  include tyrosine kinase inhibitors. Coach surfaces patterns but defers all

  diagnostic and treatment decisions.

  '
evidence_tier: strong
