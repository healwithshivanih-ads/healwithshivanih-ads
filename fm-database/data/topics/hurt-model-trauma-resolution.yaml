summary: The HURT (Healing Unresolved Trauma) model frames adult chronic disease,
  especially autoimmunity, as influenced by trauma loops encoded in childhood. The
  initial loop contains five steps — an event, a felt emotion, autonomic upregulation
  (in childhood usually freeze rather than fight or flight), a meaning-making by a
  prefrontal-cortex-immature brain, and an adaptive behaviour pattern that gets frozen
  in. Years later, when the same emotional button is pressed, a person reaches a bifurcation
  — willingness to self-confront leads toward post-traumatic growth (integration of
  a new skill); unwillingness keeps the maladaptive cycle running and over decades
  feeds inflammatory and autoimmune cascades. The model integrates Ayurvedic teaching
  that autoimmunity is "undigested anger" — emotions, like food, must be digested
  or they accumulate as physiological residue.
