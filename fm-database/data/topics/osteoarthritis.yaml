summary: Osteoarthritis is the most common form of arthritis, driven by progressive
  loss of joint cartilage and breakdown of the collagen matrix. It affects roughly
  80 percent of people over 50, predominantly weight-bearing joints (knees, hips,
  spine) and the hands. Severity of X-ray findings correlates poorly with pain — about
  40 percent of those with the worst imaging are pain-free. Key drivers include cumulative
  mechanical stress, obesity, insulin resistance (which impairs cartilage regeneration),
  and post-injury / hypermobility joint instability. NSAIDs offer short-term symptom
  relief but accelerate cartilage destruction in experimental studies. Coach-actionable
  levers are weight loss, Mediterranean-pattern diet, structured aerobic + resistance
  exercise, and glucosamine sulfate, with SAM-e, niacinamide (clinician-supervised),
  curcumin (Meriva form), boswellia, and Pycnogenol as supportive nutraceutical layers.
