coaching_scope_notes: The 5R framework is a core FM coaching tool. Coaches can guide
  Remove (elimination diet), Reinoculate (fermented/prebiotic foods), and Rebalance
  (lifestyle) steps. Replace (HCl, enzymes) and Repair (therapeutic supplement dosing)
  should be clinician-directed.
