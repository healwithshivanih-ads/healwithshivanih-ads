summary: 'A functional medicine framework addressing gut dysfunction in five sequential
  steps: Remove (allergic foods, pathogens, yeast), Replace (digestive enzymes, HCl,
  bile acids), Reinoculate (probiotics and prebiotics), Repair (gut lining with zinc,
  vitamins A/C/E, fish oil, glutamine), and Rebalance (sleep, exercise, stress management).'
