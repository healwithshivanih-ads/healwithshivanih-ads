  location: The 5R Framework for Gut Restoration
  quote: 'In Functional Medicine we use a program that goes by the simple acronym
    of the ''5Rs'': remove, replace, reinoculate, repair, and rebalance. When applied
    to various chronic health issues, the 5R program can lead to dramatic improvement
    in symptoms, and sometimes even complete resolution.'
