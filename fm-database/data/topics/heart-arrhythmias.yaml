summary: Disturbance in heartbeat rhythm — ranges from benign premature ventricular
  contractions and mild atrial fibrillation to life-threatening ventricular tachycardia
  and fibrillation. Atrial fibrillation, while rarely immediately life-threatening,
  can lead to congestive heart failure and raises stroke risk over time. Therapeutic
  goals — improve cardiac energy metabolism, improve blood supply, ensure normal nerve
  function. Magnesium and potassium depletion within heart muscle is a recurring driver
  across many arrhythmia subtypes. Coumadin (warfarin) drug interactions with herbs
  and nutrients require careful monitoring.
