coaching_scope_notes: 'Coach reinforces consistent daily anchors: same bedtime and
  wake

  time (including weekends), morning light exposure within 30

  minutes of waking, no electronics in the last hour before bed,

  meals at consistent times. For shift workers, focus harm-reduction

  on light hygiene and meal timing during awake hours.

  '
clinician_scope_notes: 'Diagnosed circadian rhythm sleep-wake disorders (delayed/advanced

