summary: 'Circadian rhythm is the body''s ~24-hour clock encoded in dedicated

  "clock genes" expressed in the suprachiasmatic nucleus and

  peripheral tissues. It coordinates cortisol release, melatonin

  production, body temperature, hormone cycling, digestion, and gene

  expression. Disruption — from shift work, jet lag, irregular

  eat/sleep timing, late-night light exposure, or chronic stress —

  is independently associated with reduced longevity, metabolic

  disease, mood disorders, and cancer risk. Consistency of routine

  (same bedtime, wake time, mealtimes) appears as protective as

  total sleep hours.

  '
