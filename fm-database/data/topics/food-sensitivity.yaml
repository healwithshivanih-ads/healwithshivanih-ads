summary: A delayed, non-IgE, dose-dependent immune or digestive reaction to foods
  that can drive chronic inflammation, gut dysfunction, brain fog, joint pain, and
  mood issues. Distinguished from IgE-mediated food allergy by delayed onset (hours–days)
  and multi-system involvement.
common_symptoms:
- bloating
- brain-fog
- joint-pain
- skin-flares
- fatigue
- headaches
red_flags:
- anaphylaxis-like reactions (refer as food allergy)
- rapid-onset severe symptoms
related_topics:
- chronic-inflammation
- leaky-gut
- autoimmune-disease
key_mechanisms:
- leaky-gut
- gut-dysbiosis
- nf-kb-activation
coaching_scope_notes: Coaches can guide elimination and reintroduction diets (gold
  standard). IgG/IgA panel ordering and interpretation require clinician.
clinician_scope_notes: Distinguish from IgE allergy. Use elimination diet + reintroduction
  as gold standard. IgG/IgA panels as adjunct. Stool tests to assess gut inflammation
  and microbiome.
evidence_tier: plausible_emerging
