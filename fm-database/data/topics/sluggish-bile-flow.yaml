summary: Reduced or impaired bile production, flow, or gallbladder contraction leading
  to poor fat digestion, detox impairment, dysbiosis, and hormone imbalance. A hidden
  root cause behind estrogen dominance, bloating, constipation, skin issues, fatigue,
  and thyroid imbalance. Root causes include low-fat diets, estrogen dominance, SIBO/dysbiosis,
  poor liver detox, hypothyroidism, and high inflammation.
common_symptoms:
- bloating
- nausea
- pale-stools
- constipation
- right-sided-pain
- steatorrhea
- itchy-skin
- fatigue
red_flags:
- jaundice — urgent referral
- sharp pain under right rib — evaluate for gallstones
- persistent pale stools — check bile obstruction
