coaching_scope_notes: Coaches can support dietary strategies (bitter greens, healthy
  fats, lemon water, beetroot, artichoke), lifestyle changes, and stress reduction.
  Supplement protocols (TUDCA, ox bile) and lab monitoring require clinician guidance.
clinician_scope_notes: 'Monitor ALT/AST, GGT, bilirubin, vitamin D, thyroid panel,
  stool beta-glucuronidase. Red flags: jaundice (urgent referral), sharp RUQ pain,
  persistent pale stools. 8–12 weeks to restore bile flow.'
