sources:
- id: dirty-genes-lynch
  location: Supplements — Week 1
  quote: Just be sure that you're getting one with no folic acid, which—as you know
    by now—can dirty your genes instead of clean them. Instead, choose a multivitamin
    with methylfolate and folinic acid, which are the best forms of supplemental folate
    available.
- id: vitaone-liver-detox-cheatsheet
  location: Methylation & MTHFR Cheatsheet
  quote: MTHFR (methylenetetrahydrofolate reductase) is a key enzyme in the methylation
    cycle that converts folate (B9) into its active form, 5-MTHF.
- id: coconote-fm-vitamin-b9-b12-mthfr
  location: MTHFR section
  quote: MTHFR is actually a very common genetic variant that causes this key enzyme
    in the body to function at a lower than normal rate.
- id: coach-shivani
  location: Coach Observation
  quote: MTHFR variants usually do not block B12 or folate absorption; they can reduce
    conversion of folate into active 5-MTHF, which may impair B12 function and raise
    homocysteine.
