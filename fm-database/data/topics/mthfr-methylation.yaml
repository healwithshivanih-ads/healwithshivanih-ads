summary: MTHFR encodes methylenetetrahydrofolate reductase, which converts dietary
  folate to active methylfolate for the methylation cycle. Lynch frames a 'dirty MTHFR'
  as impairing DNA methylation, neurotransmitter synthesis, and detoxification, worsened
  by synthetic folic acid intake.
