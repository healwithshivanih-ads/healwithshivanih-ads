coaching_scope_notes: Support with methylfolate-containing multivitamin, leafy greens,
  legumes. Avoid synthetic folic acid in processed foods.
clinician_scope_notes: MTHFR C677T/A1298C SNPs have modest individual effect sizes;
  population-level risk associations are weaker than consumer presentations suggest.
  Methylfolate dosing requires clinician guidance.
