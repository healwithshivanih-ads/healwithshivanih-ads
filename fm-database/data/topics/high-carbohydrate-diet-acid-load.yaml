coaching_scope_notes: Encourage clients to balance refined carbohydrate intake with
  abundant alkaline-forming vegetables, legumes, and whole foods rather than eliminating
  carbohydrates entirely.
clinician_scope_notes: The claim that high-carbohydrate diets are 'almost 100% acid'
  is a simplification; individual metabolic context matters. Cancer risk language
  requires clinical framing.
