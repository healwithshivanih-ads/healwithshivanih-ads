summary: Maternal psychological states — including anxiety, depression, unresolved
  grief, and psychiatric illness — during pregnancy are proposed to influence fetal
  development and the infant's predisposition to emotional and psychological patterns,
  including intergenerational transmission of conditions such as schizophrenia.
