coaching_scope_notes: Coaches should not engage with psychiatric diagnosis or transmission
  of schizophrenia. Emotional health support and referral pathways are appropriate.
clinician_scope_notes: Prenatal maternal stress has documented effects on fetal HPA
  programming. Claims about schizophrenia transmission via in-utero 'subconscious
  sharing' are not supported by peer-reviewed evidence and should not be communicated
  to clients.
evidence_tier: fm_specific_thin
