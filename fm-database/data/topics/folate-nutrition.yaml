slug: folate-nutrition
display_name: 'Folate: Food Sources, MTHFR & Homocysteine'
aliases:
- folic acid
- vitamin B9
- folate deficiency
- MTHFR
summary: Folate is a water-soluble B vitamin essential for DNA synthesis, cell division,
  red blood cell production, and homocysteine metabolism. High homocysteine from folate
  insufficiency is linked to heart disease, dementia, and depression. Individuals
  with MTHFR variants may respond better to natural folate over folic acid.
common_symptoms:
- anemia
- depression
- fatigue
- cognitive-decline
