- mitochondrial-health-nutrients
key_mechanisms:
- homocysteine-metabolism
- dna-synthesis
- methylation
coaching_scope_notes: Coach can educate on folate-rich food sources (leafy greens,
  legumes, liver). MTHFR considerations and supplement forms should be referred to
  FM practitioner.
clinician_scope_notes: MTHFR testing, homocysteine lab work, and supplement dosing
  are clinician scope.
evidence_tier: strong
sources:
