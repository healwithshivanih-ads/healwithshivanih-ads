summary: The gut-brain axis involves bidirectional signaling between the gut microbiome and the brain via the vagus nerve,
  neuroendocrine peptides, and neurotransmitters. Dysregulation contributes to SIBO pathogenesis and is associated with depression,
  anxiety, autism, cognitive decline, and immune dysregulation.
common_symptoms:
- low-mood
- anxiety
- brain-fog
- lethargy
- insomnia
- poor-stress-response
red_flags:
- autism spectrum associations
- Parkinson's disease
- Alzheimer's disease
- multiple sclerosis
