- dysbiosis-gut-microbiome-imbalance
coaching_scope_notes: 'Coaches play a primary role here: stress management, meditation, breathwork, sleep hygiene, and motivational
  coaching directly support vagal tone and gut-brain axis balance.'
clinician_scope_notes: Consider HPA axis hormones, neurotransmitter precursors, and advanced gut mapping in chronic cases.
  Refer for psychological support when depression/anxiety is severe.
