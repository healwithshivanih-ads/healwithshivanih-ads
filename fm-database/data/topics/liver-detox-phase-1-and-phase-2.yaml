slug: liver-detox-phase-1-and-phase-2
display_name: 'Liver Detoxification: Phase 1 & Phase 2'
aliases:
- hepatic biotransformation
- detox pathways
- xenobiotic metabolism
summary: The liver processes endogenous and exogenous toxins through a two-phase system.
  Phase 1 (oxidation, via CYP enzymes) activates toxins into reactive intermediates;
  Phase 2 (conjugation — glucuronidation, sulfation, methylation, glutathione conjugation)
  renders them water-soluble for excretion. Imbalance between phases increases toxic
  intermediate burden.
common_symptoms:
- fatigue
- chemical-sensitivity
- elevated-ggt
- elevated-unconjugated-bilirubin
- elevated-homocysteine
red_flags:
- jaundice
- very-high-bilirubin
related_topics:
- chronic-toxicity-assessment
- gilbert-syndrome
- methylation-defects
key_mechanisms:
- phase-1-phase-2-detox-imbalance
- glucuronidation-impairment
- methylation-defect
coaching_scope_notes: Coaches can educate clients on supporting phase 2 pathways through
  diet (sulfur-rich foods, cruciferous vegetables), stress reduction, and avoidance
  of known toxin sources. Specific supplement dosing and lab interpretation require
  clinician oversight.
clinician_scope_notes: When GGT is elevated (>70 optimal threshold per FM interpretation),
  prioritize phase 2 support. Fractionated bilirubin distinguishes glucuronidation
  impairment. Homocysteine flags methylation insufficiency.
evidence_tier: plausible_emerging
