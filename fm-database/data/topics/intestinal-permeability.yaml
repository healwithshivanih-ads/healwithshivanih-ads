coaching_scope_notes: Coaches can support gut barrier repair through nutrition, lifestyle,
  and supplement protocols (5R framework). Lab interpretation (calprotectin, zonulin,
  Cyrex Array 2) and diagnosis of IBD/autoimmunity must remain with clinician.
clinician_scope_notes: Diagnosis confirmed via lactulose-mannitol test, serum zonulin,
  anti-zonulin/anti-LPS antibodies (Cyrex Array 2), fecal calprotectin, and secretory
  IgA. Fecal calprotectin >200 warrants further GI investigation to rule out IBD.
evidence_tier: strong
