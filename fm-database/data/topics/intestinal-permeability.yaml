- leaky small intestine
- intestinal hyperpermeability
- auto-intoxication
summary: Intestinal permeability refers to the breakdown of the gut mucosal barrier
  — including tight junctions, mucus layer, chemical defenses, and immune barrier
  — allowing translocation of food particles, lipopolysaccharides (LPS), and pathogens
  from the intestinal lumen into the bloodstream, triggering systemic inflammation
  and driving chronic disease.
