coaching_scope_notes: 'Coach can guide: reducing catechol-rich foods (coffee, green
  tea, chocolate), timed protein intake, stress management, cruciferous vegetable
  intake, magnesium forms. Supplement dosing (SAMe, methylfolate, DIM/I3C) requires
  clinician oversight. Flag estrogen-containing contraceptive or HRT interactions.'
