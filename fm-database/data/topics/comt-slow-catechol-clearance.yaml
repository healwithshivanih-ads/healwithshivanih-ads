slug: comt-slow-catechol-clearance
display_name: Slow COMT — Catechol & Estrogen Clearance
aliases:
- dirty COMT slow
- catechol-O-methyltransferase slow variant
- slow estrogen clearance
summary: COMT methylates and clears catecholamines (dopamine, epinephrine, norepinephrine)
  and catechol estrogens. A slow variant leads to prolonged neurotransmitter and estrogen
  activity, manifesting as irritability, PMS, insomnia, and risk of estrogen-sensitive
  conditions. High-protein or catechol-rich diets amplify the problem.
common_symptoms:
- slow-to-calm-after-irritation
- pms
- insomnia-night-owl
- uterine-fibroids
- caffeine-sensitivity-irritability
- risk-aversion
- long-focus-capacity
red_flags:
- Estrogen-sensitive cancer history
- Severe treatment-resistant PMS/PMDD
