coaching_scope_notes: Coach can guide elimination diets, stress reduction, sleep optimization,
  and anti-inflammatory lifestyle. All supplement dosing and lab interpretation require
  clinician involvement.
clinician_scope_notes: Test ANA, RF, TPO, TG, CCP, hs-CRP, ferritin, Vit D (aim 50–90
  ng/mL), homocysteine, MTHFR status. GI-MAP, zonulin, advanced antibody testing (Cyrex)
  as indicated.
