summary: Folate, B12, choline, riboflavin, niacin, glycine, creatine, and TMG are
  framed as key methylation supports. Disrupted methylation is linked to mood changes,
  elevated homocysteine, impaired histamine clearance, fatigue, and neurological symptoms.
