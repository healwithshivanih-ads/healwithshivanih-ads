slug: low-stomach-acid
display_name: Low Stomach Acid (Hypochlorhydria)
aliases:
- achlorhydria
summary: Insufficient gastric acid production impairing digestion and absorption of key nutrients (iron, B12, minerals), leading
  to chronic fatigue, joint pain, constipation, and acid reflux paradoxically worsened by antacid use.
common_symptoms:
- acid-reflux-heartburn
- bloating
- constipation
- chronic-fatigue
- iron-deficiency
- b12-deficiency
red_flags:
- gi-bleeding
- unexplained anaemia not responding to supplementation
related_topics:
- chronic-pain-and-fatigue
- gut-dysbiosis
- autoimmunity-leaky-gut-triad
key_mechanisms:
- nutrient-malabsorption
coaching_scope_notes: Baking soda assessment can be used as an informal screening tool. Apple cider vinegar, lemon water,
  and bitter greens can support stomach acid. Refer to clinician for formal evaluation and any supplemental HCl protocol.
clinician_scope_notes: Consider Heidelberg test or clinical evaluation. Rule out H. pylori. PPI/antacid overuse is a common
  iatrogen cause.
evidence_tier: fm_specific_thin
sources:
- id: coconote-fm-chronic-pain-fatigue
  location: Digestion Section
  quote: Low Stomach Acid is a big one. A lot of people are getting low on it because of the Low Stomach Acid. They are having
    an acid refueling and that's neutralizing the effect of the Stomach Acid.
