summary: The hyperoxic-hypoxic paradox (HHP) is the cellular signalling phenomenon
  that gives modern HBOT protocols their regenerative effect. Cells do not sense the
  absolute oxygen level — they sense the FLUCTUATION. When a person breathes 100 percent
  oxygen at 2 ATA, arterial oxygen rises from ~100 mmHg to ~1,500 mmHg; on removing
  the mask the level falls back toward normal within minutes. That FAST DECLINE from
  very high back to baseline is interpreted by cells as relative hypoxia and triggers
  the same hypoxia-inducible factor (HIF-1-alpha) cascade as true hypoxia — angiogenesis
  (via VEGF), stem cell proliferation and migration, mitochondrial biogenesis (via
  SIRT1) — but WITHOUT the energy deficit or tissue damage that real hypoxia would
  cause. In effect the body gets the regenerative signal of altitude/breath-holding
  alongside the energy surplus needed to actually rebuild tissue. The paradox is the
  mechanistic rationale for the modern HBOT protocol of repeated daily sessions with
  air-brake cycles (20-minute mask-off intervals) rather than continuous high-pressure
  exposure.
