summary: Amy Myers' framing that autoimmunity is a continuum rather than an on/off
  diagnosis. Long before a labelled autoimmune disease appears, rising inflammation
  and immune dysregulation move a person 'up the spectrum'; addressing root causes
  (gut, diet, toxins, infections, stress) can move them back down. Genetics is described
  as roughly 25% of the picture and environment/lifestyle ~75%.
