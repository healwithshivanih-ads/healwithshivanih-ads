coaching_scope_notes: Coaches can support B-vitamin sufficiency through diet and supplementation
  guidance. MTHFR genetic context and active-form B-vitamin supplementation are appropriate
  coaching topics. Lab interpretation and prescribing are clinician scope.
clinician_scope_notes: MTHFR testing, homocysteine lab interpretation, and therapeutic
  dosing of active B vitamins require clinician oversight.
