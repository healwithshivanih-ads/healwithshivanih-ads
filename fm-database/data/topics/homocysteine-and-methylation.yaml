slug: homocysteine-and-methylation
display_name: Homocysteine & Methylation
aliases:
- methylation defect
- MTHFR pathway
- hyperhomocysteinemia
summary: Elevated homocysteine is an independent cardiovascular risk factor that promotes
  LDL oxidation, endothelial damage, and thrombosis. It reflects impaired methylation,
  often driven by deficiencies of B6, B9 (methylfolate), and B12 (methylcobalamin),
  or MTHFR genetic variants.
common_symptoms:
- inflammation
- depression
- anxiety
- autoimmunity
red_flags:
- very high homocysteine (>15 µmol/L) with active CVD risk factors
related_topics:
- cardiometabolic-disease
- coagulation-imbalance
- endothelial-dysfunction
key_mechanisms:
- methylation-impairment
- ldl-oxidation-and-glycation
- endothelial-injury
coaching_scope_notes: Coaches can support B-vitamin sufficiency through diet and supplementation
  guidance. MTHFR genetic context and active-form B-vitamin supplementation are appropriate
  coaching topics. Lab interpretation and prescribing are clinician scope.
clinician_scope_notes: MTHFR testing, homocysteine lab interpretation, and therapeutic
  dosing of active B vitamins require clinician oversight.
evidence_tier: plausible_emerging
