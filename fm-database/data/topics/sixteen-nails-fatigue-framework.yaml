summary: Hirsch's central framework for chronic fatigue — clients arrive with "16
  nails in their foot," not one. Removing the gluten nail alone produces minimal benefit
  when 15 other nails (mould, mercury, EBV, Lyme, poor sleep, low B12, low thyroid,
  etc.) remain. As each successive nail comes out, the IMPACT of removing the next
  becomes more visible because the immune system regains capacity. Hirsch's four "usual
  suspects" categories that should be screened in any persistent-fatigue client —
  (1) heavy metals; (2) environmental chemicals; (3) mould / mycotoxins; (4) chronic
  infections (EBV, Lyme + Bartonella + Babesia, mycoplasma, Yersinia). All four typically
  cumulate. Coach implication — refuse the single-cause narrative; build a multi-layer
  treatment plan and sequence with foundations FIRST.
