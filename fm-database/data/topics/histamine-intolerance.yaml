slug: histamine-intolerance
display_name: Histamine Intolerance
aliases:
- histamine sensitivity
- biogenic amine intolerance
- dietary histamine sensitivity
- biogenic amine sensitivity
summary: A condition in which an individual's histamine load exceeds their capacity to break it down, leading to allergy-like
  symptoms. Foods may contribute histamine directly, act as histamine releasers, or inhibit DAO/HNMT enzymes responsible for
  histamine degradation.
common_symptoms:
- skin-rash
- eczema-psoriasis-skin
- headache
- bloating
- diarrhea
- nasal-congestion
- menstrual-pain
- skin-itching-flushing-hives
- flatulence
- abdominal-pain
- headache-dizziness
- runny-nose-sneezing
- palpitations
red_flags:
- anaphylaxis-like reactions (true allergy must be excluded)
- anaphylaxis symptoms — refer immediately
- suspected mastocytosis
related_topics:
- elimination-diet
- ibs
- mast-cell-activation
- low-fodmap-diet
key_mechanisms:
- diamine-oxidase-deficiency
- mast-cell-degranulation
- histamine-enzyme-inhibition
- mast-cell-activation
coaching_scope_notes: Coaches can guide avoidance of high-histamine foods, freshness strategies, and symptom tracking. Diagnosis
  of mastocytosis or DAO deficiency requires clinician.
evidence_tier: plausible_emerging
clinician_scope_notes: ''
sources:
- id: vitaone-elimination-diet-toolkit
  location: Histamine Food Triggers
  quote: Histamine plays many roles within the body. One of its most familiar roles is triggering allergic type reactions
    (e.g., runny nose, itching, hives).
- id: vitaone-health-coaching-toolkit
  location: Histamine Food Triggers
  quote: A food may contribute to an individual's histamine load by containing histamine, releasing histamine, or inhibiting
    enzymes that break down histamine in the body.
