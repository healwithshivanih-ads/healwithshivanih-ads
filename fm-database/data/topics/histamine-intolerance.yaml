summary: DAO (diamine oxidase) is the primary enzyme for degrading ingested histamine
  from food. When DAO activity is reduced ('dirty DAO'), histamine accumulates and
  triggers a range of symptoms. Key dietary triggers include fermented foods, leftovers,
  aged meats, and certain vegetables.
