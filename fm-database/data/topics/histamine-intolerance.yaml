slug: histamine-intolerance
display_name: Histamine Intolerance
aliases:
  - HIT
  - histamine bucket overflow
  - DAO deficiency syndrome
summary: |
  A functional metabolic state where systemic histamine load exceeds
  degradation capacity, primarily due to DAO (extracellular, gut-lumen) or
  HNMT (intracellular) deficiency. Not a primary mast cell disorder but a
  breakdown failure, often secondary to gut dysbiosis, SIBO, or nutrient
  deficiencies (B6, vitamin C, copper). Conceptualized as a "histamine
  bucket" — symptoms appear when intake plus endogenous production exceeds
  clearance capacity.
common_symptoms:
  - migraine
  - flushing
  - urticaria
  - visceral-hypersensitivity
red_flags:
  - anaphylaxis-like reactions after high-histamine meals
  - severe chronic migraine unresponsive to standard care
related_topics:
  - mast-cell-activation-syndrome
  - gut-dysbiosis
key_mechanisms:
  - histamine-metabolism
  - gut-microbiome-histamine-balance
coaching_scope_notes: |
  Coach educates on the histamine bucket concept, supports low-histamine
  trial diets, identifies endogenous load drivers (dysbiosis, SIBO), and
  ensures cofactor sufficiency (B6, vitamin C, copper).
clinician_scope_notes: |
  Refer if symptoms persist despite low-histamine diet — may mask MCAS,
  mold illness, or severe gut pathology. DAO genetics and SIBO testing
  belong to functional clinician.
evidence_tier: strong
sources:
  - id: webmd
    location: 'Histamine Intolerance Overview'
    quote: 'Histamine intolerance occurs when the body cannot break down histamine fast enough.'
  - id: iemt
    location: 'Histamine Metabolism and Enzymes'
    quote: 'Two main enzymes break down histamine: Diamine oxidase (DAO) and Histamine-N-methyltransferase (HNMT).'
