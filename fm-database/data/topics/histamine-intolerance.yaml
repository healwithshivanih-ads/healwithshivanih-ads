coaching_scope_notes: 'Coach educates on the histamine bucket model, low-histamine
  eating, fresh-

  versus-aged protein storage, and cofactor-rich foods (vitamin C, B6, copper).

  Coach can support trial elimination/reintroduction but does not prescribe

  DAO supplements or antihistamines.

  '
clinician_scope_notes: 'Refer if symptoms persist despite low-histamine diet — this
  may mask MCAS,

  mold illness, or severe gut pathology. DAO supplementation and prescription

  antihistamines are clinician decisions.

  '
