summary: 'Histamine Intolerance (HIT) is a functional metabolic state where systemic

  histamine load exceeds degradation capacity. Primary drivers are deficient

  Diamine Oxidase (DAO, extracellular/gut) or Histamine-N-methyltransferase

  (HNMT, intracellular) activity. Often secondary to gut dysbiosis, SIBO, or

  cofactor deficiency (vitamin B6, vitamin C, copper). Presents as flushing,

  migraine, urticaria, GI cramping, and tachycardia after high-histamine

  meals. The "histamine bucket" model is useful client-facing language —

  symptoms appear when intake plus endogenous production exceeds clearance.

  '
common_symptoms:
