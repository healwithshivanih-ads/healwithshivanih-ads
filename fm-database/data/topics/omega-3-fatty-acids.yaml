summary: Omega-3 fatty acids (ALA, EPA, DHA) are essential polyunsaturated fats with
  well-established anti-inflammatory, cardiovascular, neurological, and immune-modulating
  properties. Modern diets are severely deficient in omega-3s relative to omega-6s,
  driving chronic inflammation and chronic disease.
common_symptoms:
- inflammation
- lethargy
- brain-fog
- joint-pain
- low-mood
