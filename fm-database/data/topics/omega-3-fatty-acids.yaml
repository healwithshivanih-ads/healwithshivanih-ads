coaching_scope_notes: Coaches can educate on dietary sources of omega-3s (fatty fish,
  flaxseeds, chia seeds, algae), the importance of reducing omega-6 intake, and the
  general rationale for supplementation. Specific dosing for clinical conditions and
  monitoring of blood thinners must be deferred to a clinician.
clinician_scope_notes: Monitor PTT/INR in patients on anticoagulants. Consider omega-3
  index testing (<4% = high risk, 4-8% = intermediate, >8% = low risk). Assess lipid
  peroxides in selected patients. Supplementation in immunosuppressed individuals
  requires caution.
evidence_tier: strong
