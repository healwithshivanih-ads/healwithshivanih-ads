slug: fungal-overgrowth
display_name: Intestinal Fungal Overgrowth
aliases:
- small intestinal fungal overgrowth
summary: Fungal overgrowth in the intestine often co-occurs with antibiotic use, immunosuppression,
  diabetes, or chronic viral infection. It suppresses IgA antibody levels and the
  local immune response. Unlike bacteria, fungal overgrowth does not typically produce
  acute GI symptoms but contributes to chronic systemic inflammation, sweet cravings,
  and immune dysregulation. Saccharomyces boulardii and antifungal herbs (neem, oregano,
  coconut oil) are used as interventions.
common_symptoms:
- sugar-cravings
- skin-rash
- white-tongue-coating
- nail-fungal-infection
- lethargy
related_topics:
- gut-dysbiosis
- chronic-inflammation
key_mechanisms:
- gut-immune-dysregulation
- iga-suppression
coaching_scope_notes: Coaches can recommend antifungal dietary protocols (sugar elimination,
  coconut oil, MCT oil) and antifungal probiotics (Saccharomyces boulardii). Prescription
  antifungals are out of scope.
clinician_scope_notes: Consider IgA levels, stool testing. Prescription antifungals
  (e.g., fluconazole) require clinician oversight.
evidence_tier: plausible_emerging
