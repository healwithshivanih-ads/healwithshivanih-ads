summary: Adverse reactions to edible Solanaceae plants (tomato, potato, eggplant,
  peppers, chillies) in sensitive individuals, potentially mediated by alkaloids such
  as solanine and capsaicin, causing GI, skin, neurological, and cardiovascular symptoms.
