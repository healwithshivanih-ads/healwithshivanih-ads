summary: Adverse reactions to edible plants in the Solanaceae family (tomato, potato, eggplant, peppers, chillies) believed
  to be related to glycoalkaloids and other bioactive compounds. Affects a small subset of individuals; can cause GI, skin,
  neurological, and cardiovascular symptoms.
common_symptoms:
- abdominal-pain
- diarrhea
- skin-itchiness
- joint-pain
- lethargy
- skin-rash
- nausea
- difficulty-breathing
- dizziness-on-standing
- drowsiness-confusion
red_flags:
- cardiac arrhythmia
- difficulty breathing
- neurological symptoms — refer immediately
- paralysis
- heart failure
- coma — rare severe toxicity, refer immediately
related_topics:
- elimination-diet
- autoimmune-protocol
key_mechanisms:
- glycoalkaloid-toxicity
- immune-food-reactivity
- food-trigger-immune-activation
coaching_scope_notes: Coaches can guide nightshade removal during elimination and support reintroduction tracking. Severe
  reactions require medical evaluation.
