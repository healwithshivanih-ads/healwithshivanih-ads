summary: An autoimmune CNS disease characterised by multifocal destruction of myelin
  sheaths and axons within the brain, spinal cord, and optic nerves. Most common disabling
  neurologic disease of young/middle-aged adults in North America and Europe. Relapsing-remitting
  in 85% of cases at onset; 50% transition to secondary progressive 5-15 years later.
  Strongly modulated by early-life vitamin D, latitude, diet, and gut-immune-brain
  axis factors.
