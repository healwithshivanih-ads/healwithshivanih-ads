coaching_scope_notes: Coaches refer suspected MS to a neurologist immediately. Coaching
  role is supportive — diet (Swank/low-saturated-fat), vitamin D status, omega-3,
  stress management, mind-body practices.
clinician_scope_notes: Diagnosis requires neurologist via MRI + CSF (oligoclonal bands,
  IgG index) + evoked potentials. Differential includes B12 deficiency, Lyme, vascular
  malformations, spinal cord compression.
notes_for_coach: Pizzorno emphasises early-life vitamin D (maternal third-trimester
  levels predict child MS risk), Swank low-saturated-fat diet (<15g/day), and stress
  management (new lesions appear 8 weeks after major life stressors).
