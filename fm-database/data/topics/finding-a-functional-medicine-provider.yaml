coaching_scope_notes: A coach can help clients set expectations, match a provider
  tier to symptom severity, and recognise red flags (bundled $5,000 packages, $3,500
  of testing before starting, a clinician who does not listen). Encourage keeping
  conventional screening (e.g. cancer screening) with the conventional doctor.
clinician_scope_notes: Ruscio notes FM practice is currently unregulated and credentials
  do not guarantee quality; recommends conservative, personalised testing only when
  it changes treatment.
