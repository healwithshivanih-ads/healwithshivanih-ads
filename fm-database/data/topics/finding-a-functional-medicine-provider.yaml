slug: finding-a-functional-medicine-provider
display_name: Finding a Good Functional-Medicine Provider
aliases:
- choosing an fm doctor
- fm provider red flags
summary: Guidance on choosing a functional-medicine provider along a spectrum from
  health coach to nutritionist to licensed doctor (ND/DC/MD/DO). Mild symptoms can
  often be helped by a coach or nutritionist; severe symptoms, high sensitivity, or
  a diagnosed disease call for a licensed provider who specialises in the area. Functional
  medicine complements rather than replaces conventional care, and clients should
  watch for red flags such as costly bundled testing-plus-treatment packages and excessive
  up-front testing.
