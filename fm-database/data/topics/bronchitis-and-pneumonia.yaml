summary: Acute bronchitis is inflammation of the bronchial mucous membranes — viruses
  cause 90% of cases, so antibiotics offer no benefit (despite 70% of doctors still
  prescribing them). Pneumonia is lung parenchymal infection — viral (30%), mycoplasmal/walking
  pneumonia (15 to 50% of adult cases), pneumococcal (most common bacterial). Cigarette
  smoking is the strongest independent risk factor for severe pneumonia. Functional
  medicine focuses on three goals — promoting mucus expectoration (lobelia, ivy leaf,
  South African geranium, thyme), thinning mucus (NAC 200 mg TID, bromelain, guaifenesin),
  and immune enhancement (vitamin C). Pelargonium sidoides EPs 7630 (Umcka) at 20
  mg three times daily is evidence-supported for acute bronchitis recovery.
