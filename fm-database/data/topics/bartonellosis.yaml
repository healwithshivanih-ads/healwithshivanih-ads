summary: Intracellular biofilm-forming bacterial co-infection frequently transmitted
  alongside Lyme disease via Ixodes ticks (also via cat scratches, fleas, sand flies).
  At least 18 pathogenic species exist beyond the well-known B. henselae (cat-scratch
  fever). Found in roughly 90% of chronic Lyme patients in Dr Horowitz's clinical
  cohort. Strongly associated with rheumatological symptoms (elevated rheumatoid factors,
  joint pain), endothelial dysfunction with elevated VEGF (also seen in long COVID),
  aphasia/speech disturbance, neuropsychiatric symptoms, and characteristic striae-like
  skin striations. Often invisible to conventional rheumatology workups because most
  physicians screen only for B. henselae and miss the broader species spectrum.
