- adrenal-fatigue
- insomnia
- migraine
key_mechanisms:
- gaba-receptor-modulation
- serotonin-synthesis
- adrenal-catecholamine-dysregulation
coaching_scope_notes: Coaches can discuss magnesium's role in sleep and stress resilience. Depression and panic disorders
  require clinical co-management.
clinician_scope_notes: Consider magnesium status before prescribing sleep aids or anxiolytics. IV magnesium or B6/vitamin
  C combination considered for acute migraine.
evidence_tier: plausible_emerging
