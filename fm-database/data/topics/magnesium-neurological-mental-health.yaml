summary: Magnesium activates calming neurotransmitter pathways including GABA receptors, supports serotonin synthesis, and
  moderates adrenal catecholamine release. Deficiency is associated with anxiety, panic attacks, depression, migraine, insomnia,
  and risk of Alzheimer's disease.
common_symptoms:
- anxiety
- panic-attacks
- low-mood
- insomnia
- headache
- tension-headache
- brain-fog
- irritability
red_flags:
- seizures
- acute-psychosis
