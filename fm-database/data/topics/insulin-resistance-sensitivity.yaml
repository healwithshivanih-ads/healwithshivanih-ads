- brown-adipose-tissue-activation
key_mechanisms:
- cold-induced-thermogenesis
coaching_scope_notes: CWI may be discussed as a complementary lifestyle strategy for metabolic health, alongside diet and
  exercise. Not a replacement for medical management of diabetes.
clinician_scope_notes: Findings are from small studies with methodological variation; not yet sufficient for clinical prescription.
  Monitor fasting insulin and glucose if integrating CWI into metabolic protocols.
evidence_tier: plausible_emerging
