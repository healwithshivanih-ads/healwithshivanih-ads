coaching_scope_notes: Coaches can support dietary elimination (gluten, dairy, refined
  sugar), lifestyle changes, sleep hygiene, stress management, and low-impact movement.
  Lab interpretation and supplement dosing should be confirmed with a clinician.
clinician_scope_notes: Order inflammatory markers (hsCRP, homocysteine), full thyroid
  panel with antibodies, vitamin D, iron, B12, omega-3 index. Rule out autoimmune
  conditions, anemia, and thyroid disease before attributing to lifestyle alone.
