summary: A functional medicine framework for understanding chronic pain and fatigue
  as expressions of upstream root causes — including gene expression/epigenetics,
  digestive dysfunction, and systemic inflammation — rather than isolated diagnoses.
  Coaching approach focuses on nutrient-dense diet, gut restoration, blood sugar balance,
  sleep, movement, and stress management.
