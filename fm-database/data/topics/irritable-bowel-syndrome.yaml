coaching_scope_notes: Coaches can guide low-FODMAP diet, fibre adjustment, elimination diets, probiotic support, and stress-reduction
  techniques. Refer for persistent rectal bleeding or weight loss.
clinician_scope_notes: Rule out IBD, coeliac disease, SIBO, intestinal candidiasis. Comprehensive stool analysis, TSH, fT3,
  antiendomysial antibody testing indicated.
evidence_tier: strong
