summary: 'The most common GI disorder in general practice, accounting for 30–50% of gastroenterology referrals. A functional
  disorder of the large intestine characterised by abdominal pain, altered bowel habit, bloating, and dyspeptic symptoms with
  no structural defect. Aetiology is multifactorial: food sensitivities, dysbiosis, SIBO, FODMAPs, and psychological factors
  all contribute via the brain-gut axis.'
