slug: magnesium-deficiency
display_name: Magnesium Deficiency
aliases:
- magnesium insufficiency
- low magnesium
- hypomagnesemia
- magnesium-insufficiency
- magnesium deficiency
summary: Magnesium is the second most abundant intracellular mineral. Widespread deficiency
  results from declining food-source concentrations, soil depletion, processed-food
  consumption, stress, diuretic medications, gut malabsorption, and increased physiological
  demand. Deficiency drives dysfunction across cardiovascular, neurological, musculoskeletal,
  hormonal, and metabolic systems.
common_symptoms:
- muscle-cramps
- restless-leg-syndrome
- anxiety
- insomnia
- fatigue
- tension-headache
- palpitations
- constipation
- jaw-tension
- numbness-tingling
red_flags:
- seizures
- severe cardiac arrhythmia
- eclampsia
- sudden infant death syndrome
related_topics:
- insulin-resistance
- hypertension
- cardiovascular-health
- anxiety-and-panic-attacks
- osteoporosis
- migraine
- chronic-fatigue-syndrome
key_mechanisms:
- calcium-magnesium-imbalance
- gaba-receptor-modulation
- atp-mitochondrial-production
coaching_scope_notes: Coaches can discuss dietary sources, lifestyle factors driving
  depletion (stress, caffeine, processed food), and general supplementation principles.
  Dose selection and therapeutic protocols should be referred to a clinician.
clinician_scope_notes: Serum magnesium tests are unreliable (only 1% of body magnesium
  in blood); RBC magnesium or EXA test preferred. IV magnesium indicated for arrhythmia,
  eclampsia, acute migraine.
evidence_tier: strong
