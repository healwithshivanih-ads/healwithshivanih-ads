summary: A functional gastrointestinal disorder characterized by recurrent abdominal
  pain, bloating, and altered bowel habits (constipation, diarrhea, or mixed). Strongly
  linked to gut-brain axis dysregulation, FODMAP sensitivity, and intestinal motility
  changes.
common_symptoms:
- cramping-pain
- bloating
- constipation
- diarrhea
- flatulence
- abdominal-cramping
- abdominal-gas
- osmotic-diarrhea
- abdominal-pain
- urgency-to-defecate
- feeling-of-incomplete-evacuation
- nausea
- acid-reflux-heartburn
red_flags:
- gi-bleeding
- unintended weight loss
- nocturnal symptoms — rule out IBD
- unintentional-weight-loss
- Nocturnal diarrhoea
- Family history of IBD or colorectal cancer
- nocturnal symptoms
- family history of colon cancer — refer to gastroenterologist
