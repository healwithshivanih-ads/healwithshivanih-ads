- lactase-deficiency-osmotic-load
- osmotic-fluid-shifts-in-gut
coaching_scope_notes: Coaches can implement low FODMAP protocol, stress-reduction
  practices (vagus nerve support, breathwork), and meal timing guidance. Diagnosis
  and red flag evaluation require clinician.
clinician_scope_notes: Rule out IBD, celiac, SIBO, and colorectal cancer before diagnosing
  IBS.
evidence_tier: strong
