coaching_scope_notes: 'Coach uses the FITT framework to co-create individualised movement

  plans, layering modalities (cardio + strength + flexibility/mobility)

  rather than relying on a single type. Mix it up — clients who only

  run or only lift miss complementary benefits. The sing test is the

  field-friendly intensity check for clients without wearables. Coach

  always asks whether the client felt better after the workout; if not,

  intensity or volume was too high.

  '
clinician_scope_notes: 'Clinician completes risk stratification (ACSM forms or equivalent)

  and provides medical clearance for vigorous-intensity training in

  medium-to-high-risk clients before coach proceeds.

  '
