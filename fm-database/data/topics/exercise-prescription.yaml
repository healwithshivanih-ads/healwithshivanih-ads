summary: 'An exercise prescription specifies four parameters — Frequency (how

  often), Intensity (how hard), Time (how long per session), and Type

  (which modality) — known together as the FITT model. Intensity is

  assessed practically using the "sing test": if the client can sing

  while moving, the intensity is low; if they can comfortably talk but

  not sing, moderate; if they can only manage a few words, vigorous.

  Same activity (e.g. walking) can be low, moderate, or vigorous

  depending on the individual''s baseline fitness. General guideline:

  150 minutes per week of moderate-intensity activity, plus muscle

  strengthening twice weekly. Risk stratification (e.g. American College

  of Sports Medicine forms) determines whether medical clearance is

  needed before vigorous-intensity prescriptions.

  '
