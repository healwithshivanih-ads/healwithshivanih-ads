summary: Benign uterine growths strongly associated with estrogen dominance and relative
  progesterone deficiency. Linked to insulin resistance, gut dysbiosis, low vitamin
  D, and chronic inflammation. Vitamin D optimization, reducing insulin resistance,
  and lowering estrogen dominance are key management pillars.
common_symptoms:
- heavy-periods
- pelvic-pain
- bloating
- spotting
red_flags:
- fibroid >7-9mm may require myomectomy
- bleeding not controlled by conservative measures
related_topics:
- estrogen-dominance
- luteal-phase-defect
key_mechanisms:
- estrogen-driven-cell-proliferation
- progesterone-deficiency
coaching_scope_notes: Coaches can support fibroid management via vitamin D optimization,
  anti-inflammatory diet, insulin resistance protocols, and gut health. Refer clients
  with large fibroids or uncontrolled bleeding to a gynecologist.
