summary: Chronic stress depletes anti-stress hormones including DHEA, progesterone,
  oxytocin, melatonin, serotonin, and growth hormone. Restoring these hormones — alongside
  adrenal nutrients (magnesium, B5, vitamin C, zinc, omega-3) and circadian rhythm
  support — is the FM approach to stress resilience.
common_symptoms:
- fatigue
- anxiety
- insomnia
- mood-swings
- inflammation
red_flags:
- suspected Addison's disease
- severely low cortisol on lab testing
