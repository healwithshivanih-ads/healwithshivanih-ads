coaching_scope_notes: Coaches can support circadian rhythm hygiene, movement, protein
  and healthy fat intake, and stress-reduction practices. Adaptogen selection, DHEA
  supplementation, and lab interpretation require clinician involvement.
clinician_scope_notes: Assess cortisol:DHEA ratio. Consider salivary or urinary cortisol
  curves. Do not prescribe DHEA without lab confirmation.
