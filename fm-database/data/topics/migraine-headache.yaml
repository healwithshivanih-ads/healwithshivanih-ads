coaching_scope_notes: Coaches refer red-flag features immediately. Coaching role —
  food trigger elimination (oligoantigenic), magnesium / riboflavin / CoQ10 / 5-HTP
  repletion, stress and sleep hygiene, blood-sugar stability. For chronic daily headache
  and migraine with aura plus stroke risk, neurology referral.
clinician_scope_notes: Diagnosis is clinical. Differential — secondary headache (vascular,
  neoplastic, infectious), cluster, tension. Triptans for acute; topiramate, propranolol,
  amitriptyline for prophylaxis. Avoid triptans plus ergotamines plus SSRIs together
  (serotonin syndrome risk).
notes_for_coach: Pizzorno key insights — migraine is a low-serotonin state with platelet
  activation; oligoantigenic diet identifies food triggers (alcohol, chocolate, cheese,
  citrus, shellfish, vasoactive amines); riboflavin 400 mg / CoQ10 / magnesium / feverfew
  / butterbur / 5-HTP are the natural prophylactic stack.
sources:
- id: pizzorno-migraine-ibd-candida
  location: Migraine Headache — General Considerations (pp 658-664)
  quote: Lifetime prevalence of migraine headache is 18%. Migraine is no longer considered
    a primary vascular event; vasomotor changes are considered epiphenomena. Migraineurs
    experience heightened CNS activity, mediated by the trigeminovascular system.
