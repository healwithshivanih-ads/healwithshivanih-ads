summary: A recurrent, paroxysmal headache disorder affecting 18% lifetime prevalence
  (women 25-30%, men 15-20%), characterised by unilateral pounding pain often preceded
  by visual or sensory auras, anorexia, nausea, and GI upset. Pizzorno frames migraine
  as a multi-stage process — initiation from accumulated stressors (food triggers,
  neurotransmitter imbalance), prodromal trigeminovascular activation, and a headache
  phase involving low-serotonin states, platelet activation, neurogenic inflammation,
  and cortical spreading depression. Treatable through food trigger elimination, magnesium,
  riboflavin, CoQ10, 5-HTP, feverfew, and butterbur.
common_symptoms:
- headaches
- nausea
- aura
- photophobia
- vomiting
- visual-disturbance
red_flags:
- sudden severe "thunderclap" headache
- new neurologic deficit
- migraine with aura plus oral contraceptives plus smoking (stroke risk)
- worsening pattern after age 50
