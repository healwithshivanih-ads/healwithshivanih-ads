summary: A multi-domain framework encompassing physical, mental/emotional/spiritual, professional, and social wellbeing practices.
  Regular self-care is associated with greater creativity, happiness, and life success.
common_symptoms:
- lethargy
- burnout
- low-mood
- social-isolation
- sleep-disruption
- stress
red_flags:
- persistent low mood or hopelessness unresponsive to self-care
- persistent inability to experience joy (anhedonia)
- complete social withdrawal
- inability to perform daily functions
- persistent burnout unresponsive to lifestyle change
- clinical depression
