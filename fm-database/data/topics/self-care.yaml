coaching_scope_notes: Use the Self-Care Questionnaire to help clients identify under-tended domains. Coaches can set goals
  and track self-care behaviors across physical, emotional, professional, and social domains.
clinician_scope_notes: Refer if questionnaire reveals clinical-level distress, depression, or burnout symptoms.
