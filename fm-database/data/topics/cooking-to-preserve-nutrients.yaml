coaching_scope_notes: Coaches can teach clients practical cooking strategies to maximize nutrient retention, including steaming
  vegetables, using cooking liquid in soups/stews, pairing fat-soluble vitamins with healthy fats, and avoiding plastic containers
  in microwave.
