coaching_scope_notes: Coaches may educate on IF types and general safety guidelines.
  Protocol selection, medical screening, and electrolyte supplementation require clinician
  guidance.
clinician_scope_notes: 'Contraindicated in: frail, pregnant/breastfeeding, eating
  disorders, underweight BMI, insulin-dependent diabetes, heart arrhythmias, low BP,
  HPA axis disorders. Type 2 diabetes and metabolic syndrome patients need supervised
  protocol.'
evidence_tier: plausible_emerging
sources:
