  location: Intermittent Fasting — Who Benefits from Fasting?
  quote: Shorter-duration human & animal studies show that fasting may be beneficial for insulin resistance, blood sugar,
    blood pressure, inflammation, short-term weight loss, and brain health. Longer-term studies on the effectiveness of fasting
    on sustained weight loss and other health outcomes is still needed.
