coaching_scope_notes: Coaches may educate clients on IF concepts, general benefits,
  and general recommendations (hydration, light activity). Specific fasting type,
  schedule, and supervision—especially for diabetic or medically complex clients—must
  involve a clinician.
clinician_scope_notes: 'Clinicians must screen for contraindications: pregnancy, eating
  disorders, underweight BMI, insulin-dependent diabetes, heart arrhythmias, low BP,
  HPA axis disorders. Supervise T2DM and metabolic syndrome patients closely.'
evidence_tier: plausible_emerging
sources:
- id: vitaone-cardiometabolic-toolkit
  location: Intermittent Fasting — Who Benefits from Fasting?
  quote: Shorter-duration human & animal studies show that fasting may be beneficial
    for insulin resistance, blood sugar, blood pressure, inflammation, short-term
    weight loss, and brain health. Longer-term studies on the effectiveness of fasting
    on sustained weight loss and other health outcomes is still needed.
