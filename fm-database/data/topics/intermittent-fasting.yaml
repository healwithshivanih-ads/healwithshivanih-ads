summary: Cyclical eating patterns that alternate calorie restriction with normal eating
  windows, including Time Restricted Feeding, Alternate Day Fasting, Modified Fasting,
  and the Fasting Mimicking Diet, each with distinct protocols and evidence profiles
  for cardiometabolic benefit.
