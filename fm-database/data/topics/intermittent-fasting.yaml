coaching_scope_notes: Coaches may educate clients on IF concepts, general benefits, and general recommendations (hydration,
  light activity). Specific fasting type, schedule, and supervision—especially for diabetic or medically complex clients—must
  involve a clinician.
clinician_scope_notes: 'Clinicians must screen for contraindications: pregnancy, eating disorders, underweight BMI, insulin-dependent
  diabetes, heart arrhythmias, low BP, HPA axis disorders. Supervise T2DM and metabolic syndrome patients closely.'
evidence_tier: plausible_emerging
sources:
