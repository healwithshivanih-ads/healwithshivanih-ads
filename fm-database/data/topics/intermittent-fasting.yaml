summary: Structured cycles alternating calorie restriction with normal eating. Variants
  include Time Restricted Feeding (12–16 hr fasting window), Alternate Day Fasting
  (≤600 kcal fasting days), Modified Fasting (10–20% calorie reduction), and Fasting
  Mimicking Diet (5-day ketogenic, monthly). Shown in shorter-duration studies to
  benefit insulin resistance, blood sugar, blood pressure, inflammation, and brain
  health.
common_symptoms:
- elevated-triglycerides
- elevated-blood-sugar
- high-blood-pressure
- chronic-inflammation
red_flags:
- dizziness or lightheadedness on standing while fasting
- hypoglycemia
- heart arrhythmia
related_topics:
