slug: vitamin-k2-calcium-direction
display_name: Vitamin K2 — Directing Calcium to Bone, Away from Soft Tissue
aliases:
- menaquinone mk4 mk7
- k2 calcium directing
summary: Vitamin K2 (menaquinones MK-4 and MK-7) activates two key proteins — osteocalcin,
  which directs calcium into bone matrix, and matrix Gla protein (MGP), which removes
  calcium from arteries and soft tissue. Without sufficient K2, supplemental calcium
  is more likely to deposit in arteries, kidneys, and joints rather than bone — a
  partial explanation for studies linking calcium supplementation alone (without K2
  and the broader nutrient orchestra) to increased cardiovascular events. MK-4 has
  a short half-life requiring ~15 mg three times daily and has the strongest fracture-reduction
  evidence; MK-7 has a longer half-life suitable for once-daily dosing and has shown
  bone-density benefit. K2 differs from K1 (the leafy-green form involved in blood
  clotting); most people get adequate K1 but very few get adequate K2 without nattō
  or supplementation.
