- acute-poisoning
summary: A medical emergency involving ingestion of a substance in toxic amounts —
  accidental (especially pediatric) or intentional (overdose, suicide attempt). Management
  depends on the toxin class, time since ingestion, patient stability, and whether
  the airway can be protected. Activated charcoal (AC) is the most common gastrointestinal
  decontamination tool, most effective within 1 hour of ingestion. AC does NOT bind
  metals (iron, lithium, lead, mercury), alcohols (ethanol, methanol, ethylene glycol),
  corrosives (lye, strong acids), hydrocarbons (gasoline, kerosene), or electrolytes
  — these require different management (chelation, specific antidotes, supportive
  care). Multi-dose AC (MDAC) provides 'gastrointestinal dialysis' for carbamazepine,
  dapsone, phenobarbital, quinine, and theophylline overdoses. Home use of AC is appropriate
  ONLY when directed by Poison Control Center (US 1-800-222-1222).
common_symptoms:
- altered-mental-status
- nausea
- vomiting
- seizures
- coma
- respiratory-depression
- hypotension
- tachycardia
red_flags:
- altered mental status / unconsciousness
- seizures
- respiratory depression
- known ingestion of >2x toxic dose
- ingestion of caustic / corrosive substance
- ingestion of hydrocarbon (gasoline / kerosene)
- ingestion in pediatric patient (any non-food substance)
- suicidal intent
