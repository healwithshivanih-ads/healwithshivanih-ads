coaching_scope_notes: STRICTLY OUT OF SCOPE for coaching. Refer immediately to ER
  (911 / 102 India) or Poison Control Center (US 1-800-222-1222 / India equivalent).
  Coach role limited to (1) general client education that activated charcoal is hospital-administered
  for true poisoning, (2) discouraging unsupervised home use of AC for "detox" or
  hangover, (3) flagging the specific contraindications where AC would cause harm
  (caustics, hydrocarbons, unprotected airway). Never coach acute poisoning management.
clinician_scope_notes: AC 1 g/kg PO or NG, within 1 hour of ingestion ideal, up to
  4 hours with motility-slowing toxins. MDAC 50-100 g loading then 12.5 g/h for life-threatening
  carbamazepine, dapsone, phenobarbital, quinine, theophylline. Airway protection
  (intubation) before AC in altered mental status. Pediatric — 0.5-1 g/kg, not under
  7 months without specific medical direction. Avoid AC + cathartics in infants (severe
  hypernatremia/hypermagnesemia risk).
notes_for_coach: NotebookLM source emphasises AC is hospital territory. Two coaching-relevant
  points only — (1) AC does NOT bind alcohols, so it is useless for hangover; (2)
  regular AC use for "detox cleanses" can deplete nutrients and interfere with medications
  including OCPs and antidepressants — strongly discourage.
