coaching_scope_notes: Coaches can support food swaps, meal planning, and symptom tracking.
  Diagnosis of celiac disease, allergy, or IBD requires clinician referral.
clinician_scope_notes: Celiac serology, allergy testing, and formal food challenge
  protocols are outside coaching scope.
evidence_tier: strong
red_flags:
- severe weight loss during elimination
- signs of nutritional deficiency
- worsening symptoms beyond expected die-off
