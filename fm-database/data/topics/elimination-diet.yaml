summary: A structured short-term dietary protocol that removes common food triggers
  (gluten, dairy, soy, nightshades, oxalates, salicylates, histamines, high-FODMAP
  foods) to identify individual food sensitivities and reduce GI and systemic symptoms,
  followed by systematic reintroduction.
common_symptoms:
- unidentified food reactions
- persistent bloating
- fatigue
- brain fog
