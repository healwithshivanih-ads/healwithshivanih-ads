summary: Chronic inflammatory airway disease characterised by reversible bronchoconstriction,
  mucus hypersecretion, and airway hyperresponsiveness. Murray's functional medicine
  framing treats asthma as primarily an allergy + inflammation-driven condition rather
  than just a smooth-muscle problem. Cases and severity are increasing globally. The
  natural medicine first step is reducing the allergic threshold by eliminating airborne
  and food allergens, followed by anti-inflammatory nutrient therapy.
coaching_scope_notes: Coach role — support food + airborne allergen identification
  + elimination, nutrient repletion (vitamin D, magnesium, fish oil, vitamin C, quercetin),
  and lifestyle modifications. Rescue inhalers + ICS/LABA medications remain conventional
  first-line for acute control; coach does NOT discourage them.
clinician_scope_notes: Pulmonary function testing, acute exacerbation management,
  oral corticosteroid courses, biologic therapy (anti-IgE, anti-IL5) for severe phenotypes.
