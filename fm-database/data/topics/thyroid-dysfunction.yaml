slug: thyroid-dysfunction
display_name: Thyroid Dysfunction
aliases:
- thyroid disease
- thyroid imbalance
- thyroid disorder
summary: A broad clinical area encompassing disruptions in thyroid hormone production,
  conversion, and cellular sensitivity. Includes hypothyroidism, subclinical hypothyroidism,
  and autoimmune thyroid disease. The thyroid gland regulates metabolism, energy production,
  and many bodily functions via T4/T3 hormones.
common_symptoms:
- lethargy
- unexplained-weight-gain
- cold-intolerance
- constipation
- brain-fog
- dry-skin
- hair-loss
- low-mood
- irregular-periods
red_flags:
- goiter (enlarged thyroid gland)
- infertility or recurrent miscarriage
- history of radiation to head/neck
- cardiovascular complications from untreated hypothyroidism
related_topics:
- autoimmune-thyroiditis
- hypothyroidism
- thyroid
key_mechanisms:
- myo-inositol-tsh-signaling
- thyroid-conversion-impairment
- impaired-t4-to-t3-conversion
- reverse-t3-dominance
- thyroid-autoimmunity
- halogen-iodine-displacement
coaching_scope_notes: Coaches can support thyroid health through nutrient optimization,
  dietary changes, stress management, and lifestyle coaching. Lab interpretation,
  medication management, and supplement dosing require clinician oversight.
clinician_scope_notes: Diagnosis requires TSH, free T4, thyroid antibody panel (Anti-TPO,
  Anti-Tg), and possibly thyroid ultrasound. Hormone replacement therapy (levothyroxine
  or NDT) is a clinician decision.
evidence_tier: strong
sources:
