  location: How to Make an Infrared Sauna Lamp — Protocol
  quote: Make sure you replace minerals that are lost from sweating. Definitely work with a knowledgeable practitioner on
    this, as minerals are a tricky thing, and I do advise Starting with Magnesium because you will loose lot of magnesium
    through sweat.
