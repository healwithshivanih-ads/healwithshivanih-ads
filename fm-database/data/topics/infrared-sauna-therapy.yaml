slug: infrared-sauna-therapy
display_name: Infrared Sauna Therapy for Detoxification
aliases:
- near infrared sauna
- IR sauna
- infrared lamp therapy
summary: Use of near-infrared light/heat to support detoxification via sweating, with reported benefits for digestive and
  elimination organs. Protocol includes starting with 10-20 minutes/day, adequate hydration, and mineral (especially magnesium)
  replacement post-session.
common_symptoms:
- lethargy
- muscle-tension
- toxic-load-symptoms
red_flags:
- pregnancy — avoid near infrared lamps
- children under 5 — avoid due to dehydration risk
- dehydration or electrolyte imbalance
related_topics:
- metabolic-detoxification
- toxic-body-burden
key_mechanisms:
- sweat-mediated-toxin-excretion
coaching_scope_notes: Coaches can guide sauna protocol basics (session length, hydration, rest). Mineral replacement specifics
  and contraindications should involve a knowledgeable practitioner.
clinician_scope_notes: High-dose niacin pre-sauna is contraindicated. Pregnancy and young children are contraindicated. Electrolyte/mineral
  management requires clinical oversight.
evidence_tier: fm_specific_thin
sources:
