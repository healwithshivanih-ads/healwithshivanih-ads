summary: Functional medicine approach to dyslipidemia focuses on correcting underlying
  insulin resistance, optimizing omega-3 to omega-6 ratio, reducing inflammation,
  and using targeted nutrients (magnesium, vitamin D, omega-3) rather than defaulting
  to statin therapy, particularly for primary prevention patients without significantly
  elevated absolute cardiovascular risk.
