summary: A condition in which the thyroid gland produces insufficient thyroid hormones,
  slowing metabolism and affecting energy, mood, weight, and many other bodily functions.
  Can be primary, subclinical, or autoimmune (Hashimoto's) in origin.
common_symptoms:
- lethargy
- unexplained-weight-gain
- cold-intolerance
- brain-fog
- low-mood
- constipation
- hair-loss
- dry-skin
- irregular-periods
- joint-pain
- hoarse-voice
- goiter
red_flags:
- Bradycardia or very slow heart rate
- Severe cognitive decline
- Myxedema coma signs
- Stunted growth in children
- Cardiovascular complications (high cholesterol, hypertension)
- Infertility or recurrent miscarriage
- Myxedema coma (severe untreated hypothyroidism)
