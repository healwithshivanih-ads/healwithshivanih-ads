coaching_scope_notes: Coaches can support lifestyle, diet, and nutrient optimization.
  Lab interpretation and medication decisions (e.g., levothyroxine, NDT) are clinician
  scope.
clinician_scope_notes: Diagnosis via TSH, free T4, thyroid antibodies. Medication
  management (levothyroxine, NDT) is prescriber scope. Monitor thyroid panels when
  adding supplements that affect conversion.
evidence_tier: strong
