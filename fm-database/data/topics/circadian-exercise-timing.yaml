summary: Exercise functions as a non-photic zeitgeber that entrains the circadian
  clock alongside light. Two daily exercise touchpoints — early morning and late afternoon
  — reinforce the circadian rhythm more effectively than a single bout, mirroring
  the bimodal activity pattern of ancestral hunter-gatherers and many wild animals
  (active around dawn and dusk). For individuals without uninterrupted time, splitting
  daily exercise into 2-3 bouts of 10-15 minutes delivers equivalent metabolic and
  cardiovascular benefits to a single 30-45 minute block, while adding the circadian-
  reinforcement advantage of distributed timing. Morning exercise on an overnight-fasted
  state additionally taps stored body fat for energy (suitable for moderate cardio,
  less ideal for strenuous strength work).
