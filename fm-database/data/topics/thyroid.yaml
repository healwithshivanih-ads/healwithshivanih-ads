coaching_scope_notes: Encourage thyroid panel review by clinician. Avoid recommending
  iodine or selenium supplementation without clinician guidance in autoimmune thyroid
  contexts.
clinician_scope_notes: Iodine excess can trigger Hashimoto's or Graves'. Selenium
  and antioxidant optimization should precede iodine supplementation in autoimmune
  thyroid patients.
