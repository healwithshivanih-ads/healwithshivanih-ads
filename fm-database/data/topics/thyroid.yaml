- t4-to-t3-conversion-block
- leaky-gut
coaching_scope_notes: Coaches can support lifestyle, nutrition, gut health, stress
  reduction, and sleep hygiene. Lab interpretation, medication decisions, and specific
  dosing are out of scope — refer to clinician.
clinician_scope_notes: 'Full panel recommended: TSH, FT3, FT4, rT3, Anti-TPO, Anti-Tg.
  Monitor every 8–12 weeks. Assess cortisol, gut health, and liver enzymes as co-factors.'
evidence_tier: plausible_emerging
