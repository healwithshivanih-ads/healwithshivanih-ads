slug: thyroid
display_name: Thyroid Dysfunction
aliases:
- thyroid dysfunction
- Hashimoto's thyroiditis
- autoimmune thyroid disease
summary: Thyroid dysfunction encompasses hypo-, hyper-, and autoimmune thyroid conditions.
  Functional Medicine emphasises root-cause identification across production, conversion,
  and utilisation pathways rather than relying solely on TSH.
common_symptoms:
- fatigue
- hair loss
- constipation
- weight gain
- brain fog
- anxiety
- cold intolerance
- slow gut motility
- weight-gain
- hair-thinning
- brain-fog
- cold-intolerance
- mood-changes
- menstrual-irregularities
- palpitations
red_flags:
- goiter or thyroid nodules
- rapid unexplained weight change
- extreme heat or cold intolerance
- palpitations
- post-partum thyroid symptoms
- suspected autoimmune disease without formal workup
- Palpitations and tremors suggesting hyperthyroid crisis
- Positive TPO/Tg antibodies with rapidly worsening symptoms — refer to endocrinologist
