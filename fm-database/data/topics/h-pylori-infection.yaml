slug: h-pylori-infection
display_name: H. Pylori Infection
aliases:
- Helicobacter pylori
- H pylori
- H. pylori
- Helicobacter infection
- helicobacter-pylori-infection
summary: Spiral-shaped bacteria colonizing the stomach lining, weakening the protective
  mucous layer and increasing stomach acid damage and inflammation. Can persist silently
  for years. Linked to gastritis, peptic ulcers, GERD, dysbiosis, leaky gut, and increased
  risk of gastric cancer.
common_symptoms:
- bloating
- flatulence
- indigestion
- nausea
- abdominal-pain-empty-stomach
- loss-of-appetite
- lethargy
- epigastric-pain
- epigastric-burning
- nocturnal-epigastric-pain
- heartburn
red_flags:
- hematemesis
- gi-bleeding
- unintentional-weight-loss
- dysphagia — urgent referral for endoscopy; increased gastric cancer risk
- GI hemorrhage
- perforation
- gastric outlet obstruction — refer for emergency workup immediately
related_topics:
- hypochlorhydria
- gerd
- gut-dysbiosis
- autoimmunity-leaky-gut-triad
- peptic-ulcer-disease
