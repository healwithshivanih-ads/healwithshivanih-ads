slug: salicylate-sensitivity
display_name: Salicylate Sensitivity
aliases:
- salicylate sensitivity
- aspirin-sensitive enteropathy
- salicylate intolerance
- salicylic acid sensitivity
summary: A condition in which dietary salicylates — naturally occurring plant compounds
  — cause adverse reactions in susceptible individuals, particularly affecting the
  skin, gut, and respiratory system.
common_symptoms:
- hives
- bloating
- diarrhea
- nasal-polyps
- asthma
- sinusitis
- gas-flatulence
- stuffy-runny-nose
red_flags:
- aspirin-exacerbated respiratory disease
- nasal polyps with asthma — ENT/allergy referral
- severe asthma triggered by salicylates — refer to allergist
related_topics:
- elimination-diet
- histamine-intolerance
key_mechanisms:
- arachidonic-acid-pathway-dysregulation
- immune-food-reactivity
- prostaglandin-pathway-modulation
coaching_scope_notes: Coaches can guide low-salicylate food selection and symptom
  tracking. Asthma and nasal polyps require clinician involvement.
evidence_tier: plausible_emerging
clinician_scope_notes: ''
sources:
