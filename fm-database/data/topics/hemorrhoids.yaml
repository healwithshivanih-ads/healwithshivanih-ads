summary: Hemorrhoids are engorged, prolapsed venous cushions of the anal canal driven
  by chronic straining, low-fiber diet, prolonged sitting/standing, and pelvic congestion.
  The rectal veins lack valves, so any pressure increase (constipation, pregnancy,
  portal congestion from liver disease) promotes formation. Functional medicine approach
  centers on a high-fiber plant-rich diet, soluble fiber supplements (psyllium), venotonic
  flavonoids, and topical/hydrotherapy for symptom relief.
