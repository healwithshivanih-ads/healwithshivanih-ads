- headache
- muscle-tension
- low-libido
- irregular-periods
- shortness-of-breath
- anxiety
- headaches
- menstrual-irregularities
red_flags:
- Persistent high blood pressure
- Signs of heart disease
- Severe depression requiring immediate care
- persistent high blood pressure
- heart disease risk
- new onset diabetes
- dementia risk
