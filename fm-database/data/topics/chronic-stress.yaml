slug: chronic-stress
display_name: Chronic Stress & Its Systemic Effects
aliases:
- prolonged stress
- allostatic load
- chronic psychological stress
summary: Chronic stress describes prolonged periods of mental stress with lasting
  effects on the entire body — including the brain, heart, digestive system, adrenal
  glands, musculoskeletal system, and reproductive system. People with higher chronic
  stress are more likely to develop heart disease, depression, diabetes, dementia,
  and cancer.
common_symptoms:
