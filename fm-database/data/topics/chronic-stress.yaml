coaching_scope_notes: 'Coaches can deliver stress reduction strategies: sleep 7–9
  hours, daily walks, deep breathing, gratitude journaling, MBSR, yoga/tai chi/qi
  gong, social support, time in nature, digital detox, and reframing self-talk.'
clinician_scope_notes: Refer for counseling or mental health assessment when chronic
  stress is severe. Consider referral for adrenal and cardiovascular risk evaluation.
