- PCBs in fish
summary: Fish is a nutrient-dense protein source rich in omega-3s, vitamin D, and
  minerals. However, some species bioaccumulate mercury, dioxins, and PCBs. Choosing
  low-mercury, omega-3-rich species and following EPA/AHA consumption guidelines optimizes
  benefit while minimizing toxin exposure.
common_symptoms: []
red_flags:
- high mercury exposure — neurological, digestive, immune toxicity; particularly harmful
  in pregnancy, children, elderly
