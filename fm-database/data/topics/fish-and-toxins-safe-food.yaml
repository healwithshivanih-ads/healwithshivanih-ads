- vitamin-d-deficiency
key_mechanisms:
- heavy-metal-toxicity
coaching_scope_notes: Coaches can help clients choose safe fish species and follow
  AHA/EPA frequency recommendations.
clinician_scope_notes: Children, pregnant/nursing individuals, and the elderly should
  be counseled specifically on EPA fish consumption guidelines.
evidence_tier: strong
