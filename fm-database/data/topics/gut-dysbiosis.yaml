coaching_scope_notes: Coaches can guide elimination diets, low-FODMAP approaches, 5R protocol sequencing, prebiotic/probiotic
  introduction timing, probiotic-rich and fermented foods, prebiotic fibre, stress reduction, and circadian-aligned eating.
clinician_scope_notes: GI-MAP or similar stool tests can identify specific dysbiotic organisms (e.g., Strep, Enterococcus)
  as well as inflammatory markers and compromised digestive function. SIBO breath testing, IBD diagnosis, and medication-related
  gut effects require clinician oversight.
