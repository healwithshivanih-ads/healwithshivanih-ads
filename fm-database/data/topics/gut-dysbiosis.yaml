slug: gut-dysbiosis
display_name: Gut Dysbiosis
aliases:
- microbiome imbalance
- intestinal dysbiosis
- dysbiotic bacteria
summary: An imbalance in the gut microbiome where pathogenic or dysbiotic bacteria
  outcompete beneficial strains, driving fermentation of unabsorbed carbohydrates
  and systemic inflammation. FODMAP restriction reduces fermentation load; reintroduction
  of prebiotic fibres rebuilds diversity.
common_symptoms:
- bloating
- irregular-stools
- fatigue
- food-cravings
- skin-rashes
- abdominal-gas
- new-food-sensitivities
red_flags:
- autoimmune flares
- severe unrelenting diarrhea
- Persistent diarrhea with blood or mucus
