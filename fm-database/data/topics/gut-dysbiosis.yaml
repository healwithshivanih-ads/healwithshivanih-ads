summary: An imbalance in the gut microbial community characterised by decline in beneficial bacteria and overgrowth of pathogenic
  species. Drives hypochlorhydria, intestinal barrier compromise, nutrient malabsorption, elevated beta-glucuronidase, and
  chronic immune activation. LPS endotoxemia from dysbiosis raises systemic inflammation and insulin resistance. Common drivers
  include poor diet, antibiotics, PPIs, chronic stress, low fibre, alcohol, and acute infection — and in perimenopause/menopause
  the estrobolome shifts toward more inflammatory species. Antibiotic exposure can cause dysbiosis lasting 18 months to 8
  years per emerging research.
