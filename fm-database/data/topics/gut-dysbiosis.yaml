- reduced-scfas
- leaky-gut
- gut-fermentation-dysbiosis
coaching_scope_notes: Guide clients on prebiotic reintroduction once symptoms stabilize.
  Stool testing interpretation is clinician-scope.
clinician_scope_notes: 'Order gut microbiome test. Therapeutic focus: restore microbial
  balance — always secondary to diet/lifestyle changes.'
evidence_tier: plausible_emerging
