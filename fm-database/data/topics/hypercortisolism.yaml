- dhea-depletion
- cortisol-dhea-imbalance
- insulin-resistance
coaching_scope_notes: Coaches can support blood sugar regulation through diet (small
  frequent protein meals, avoiding refined sugar/caffeine/alcohol), sleep improvement
  (bed by 10pm), and stress management.
clinician_scope_notes: Clinician should rule out Cushing's syndrome in cases with
  classic physical signs (buffalo hump, moon face, stretch marks, rapid weight gain).
  Refer for cortisol testing.
evidence_tier: strong
