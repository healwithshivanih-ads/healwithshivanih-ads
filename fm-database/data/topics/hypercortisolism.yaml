slug: hypercortisolism
display_name: Hypercortisolism (Elevated Cortisol State)
aliases:
- elevated cortisol
- high cortisol state
- Cushing's-like pattern
- high cortisol
- cortisol excess
- chronic cortisol elevation
summary: Prolonged stress causes chronically elevated cortisol and adrenaline levels,
  resulting in diminished immune function, disrupted blood sugar regulation, poor
  sleep, increased blood lipids, water retention, lowered insulin sensitivity, and
  eventual depletion of DHEA.
common_symptoms:
- weight-gain-abdomen
- insomnia
- craving-sweets
- agitated-depression
- stretch-marks
- osteoporosis
- water-retention
red_flags:
- Stretch marks not from weight loss
- Central obesity with buffalo hump and moon face — possible Cushing's syndrome requiring
  referral
- adult onset diabetes
- osteoporosis
- stretch marks not from weight loss
- weight gain at back of neck and face
related_topics:
- hpa-axis-dysregulation
- chronic-stress
- insulin-resistance
- hpa-axis-dysfunction
- adrenal-hormone-function
key_mechanisms:
- cortisol-excess
