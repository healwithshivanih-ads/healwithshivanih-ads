slug: leaky-gut-syndrome
display_name: Leaky Gut Syndrome (Intestinal Permeability)
aliases:
- intestinal hyperpermeability
- gut barrier dysfunction
- intestinal permeability
summary: 'Leaky gut involves disruption of intestinal tight junctions, allowing bacteria,
  toxins, and cellular contents to enter systemic circulation. Two types are described:
  paracellular (content passes between cells, simpler) and transcellular (cell contents
  also cross, more complex). Detected via zonulin, beta-glucuronidase, and fecal calprotectin
  markers.'
common_symptoms:
- multiple-food-sensitivities
- bloating
- abdominal-pain
- brain-fog
- fatigue
- depression
- autoimmune-flares
red_flags:
- progressive new food sensitivities
- co-occurring autoimmune disease
- LPS-driven systemic inflammation
related_topics:
- sibo
- sifo
- gut-brain-axis-dysfunction
key_mechanisms:
- tight-junction-disruption
- lps-endotoxemia
- zonulin-dysregulation
coaching_scope_notes: Coaches can support removal of triggers (gluten, inflammatory
  foods), low-FODMAP diet, gut-healing nutrients (L-glutamine, zinc, vitamin A), and
  stress reduction. Lab interpretation is clinician scope.
clinician_scope_notes: Zonulin and beta-glucuronidase on GI map are key diagnostic
  markers. Distinguish paracellular from transcellular types as transcellular requires
  more conservative reintroduction protocols.
evidence_tier: plausible_emerging
sources:
