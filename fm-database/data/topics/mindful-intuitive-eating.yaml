summary: Mindful eating involves paying attention to eating without judgment. Intuitive
  eating is a broader framework emphasizing internal hunger/satiety cues, eating for
  physical rather than emotional reasons, and unconditional permission to eat. Both
  practices support a healthier relationship with food and body.
common_symptoms:
- disordered-eating
- emotional-eating
- overeating
- loss-of-hunger-fullness-cues
red_flags:
- active eating disorders (anorexia, bulimia, ARFID) — refer to registered dietitian
  and/or mental health professional
- active-eating-disorder-requiring-clinical-treatment
related_topics: []
key_mechanisms:
- hunger-satiety-signaling
coaching_scope_notes: 'Mindful and intuitive eating are core coaching domains. Coaches
  can guide clients through practical tips: cooking for yourself, removing electronics
  at meals, eating slowly, tuning into hunger/fullness signals. Those with active
  eating disorders should be referred to a specialist.'
clinician_scope_notes: Active eating disorders (anorexia, bulimia, ARFID) require
  clinical and psychological care.
evidence_tier: plausible_emerging
sources:
