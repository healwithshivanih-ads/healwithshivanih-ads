slug: mindful-intuitive-eating
display_name: Mindful & Intuitive Eating
aliases:
- mindful eating
- intuitive eating
- hunger-satiety awareness
summary: Mindful eating involves paying non-judgmental attention to eating cues. Intuitive
  eating is a broader framework emphasizing internal hunger/satiety signals, unconditional
  permission to eat, and rejecting diet culture. Both practices support a healthier
  relationship with food, especially for those with eating disorder history.
common_symptoms:
- disordered-eating
- emotional-eating
- overeating
red_flags:
- active eating disorders (anorexia, bulimia, ARFID) — refer to registered dietitian
  and/or mental health professional
related_topics: []
key_mechanisms:
- hunger-satiety-signaling
coaching_scope_notes: Coaches can teach and reinforce mindful and intuitive eating
  practices. Active clinical eating disorders are out of coaching scope.
clinician_scope_notes: Mindfulness-based interventions have RCT support for problematic
  eating behaviors (Yu et al., 2020, J Altern Complement Med).
evidence_tier: plausible_emerging
sources:
- id: vitaone-nutrition-toolkit
  location: Mindful and Intuitive Eating
  quote: Intuitive eating is a broader concept that includes mindful eating. It emphasizes
    the connection and strengthens the relationship between mind, body, and food.
