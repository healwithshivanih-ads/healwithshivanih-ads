  location: Mindful and Intuitive Eating
  quote: Intuitive eating is a broader concept that includes mindful eating. It emphasizes
    the connection and strengthens the relationship between mind, body, and food.
- id: vitaone-health-coaching-toolkit
  location: Mindful and Intuitive Eating
  quote: Mindful and intuitive eating can help improve your relationship with food
    and your body. Mindful and intuitive eating practices are helpful for everyone,
    but they are especially important for those who have suffered from eating disorders,
    or who feel like food controls their life.
