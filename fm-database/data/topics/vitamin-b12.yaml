coaching_scope_notes: Coaches can educate on dietary sources, risk groups (vegans, elderly, pregnant), and the importance
  of methylcobalamin form in supplements.
clinician_scope_notes: Clinicians should assess for pernicious anemia, intrinsic factor antibodies, and drug interactions
  (PPIs, metformin). Injection vs. oral dosing decisions are clinical.
evidence_tier: strong
