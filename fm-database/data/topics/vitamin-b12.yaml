summary: Vitamin B12 is a water-soluble vitamin required for red blood cell synthesis, DNA synthesis, neurological function,
  and homocysteine-to-methionine conversion. Absorption is complex, requiring intrinsic factor and an intact terminal ileum.
  Stored in the liver for 3–4 years. Deficiency leads to megaloblastic anemia and neurological disorders.
