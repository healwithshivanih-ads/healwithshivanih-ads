slug: immune-dysregulation
display_name: Chronic Immune Dysregulation
aliases:
- chronic immune activation
- immune system dysregulation
- immune overactivation
summary: A state of persistent, non-resolving immune activation characterised by chronically low WBCs and neutrophils (immune
  exhaustion), elevated globulin, and elevated ESR/CRP. In this framework, poor gut health and early-life infections are identified
  as upstream triggers, with immune dysregulation driving gut dysfunction, hormonal imbalance, and autoimmune skin conditions.
common_symptoms:
- lethargy
- recurrent-allergies
- psoriasis-skin-patches
- progressive-bloating
red_flags:
- very low WBC + low neutrophils (immune exhaustion pattern)
- high ESR + high globulin + low albumin constellation
related_topics:
- gut-skin-hormone-axis
- gut-dysbiosis
- psoriasis-gut-immune
- endometriosis
key_mechanisms:
- gut-immune-dysregulation
coaching_scope_notes: Coaches address immune dysregulation primarily through gut-healing protocols, anti-inflammatory diet,
  sleep optimisation, and stress management. Lab interpretation and immune-modulating drug therapy require clinician involvement.
