  quote: Systemic lupus erythematosus (SLE) is a systemic autoimmune disease that
    can affect any part of the body. The general approach to SLE from a naturopathic
    perspective is nearly identical to the approach to rheumatoid arthritis. Vegetarian
    diets are often beneficial in the treatment of inflammatory conditions such as
    SLE.
