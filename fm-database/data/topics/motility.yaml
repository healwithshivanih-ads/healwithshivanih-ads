slug: motility
display_name: GI Motility Changes in Perimenopause
aliases:
- gut transit time
- smooth muscle contractility
- bowel motility
summary: GI motility — the rate at which food moves through the digestive tract —
  is regulated in part by estrogen and progesterone. Declining levels of both hormones
  in perimenopause alter smooth muscle contractility and transit time, producing either
  constipation or loose stools depending on the individual.
common_symptoms:
- constipation
- loose stools
- alternating bowel habits
- bloating
- IBS-like symptoms
related_topics:
- constipation
- dysbiosis
- gut-hormone-axis
- perimenopause
key_mechanisms:
- smooth-muscle-contractility-decline
- progesterone-decline
- estrogen-decline
coaching_scope_notes: Coaches can support motility through fiber guidance, hydration,
  stress regulation, and meal-pacing strategies.
clinician_scope_notes: Significant motility disorders or IBS diagnoses should be managed
  with a gastroenterologist or functional medicine clinician.
evidence_tier: plausible_emerging
