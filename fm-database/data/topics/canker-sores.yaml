summary: Recurrent shallow painful oral ulcers affecting roughly 20% of the U.S. population.
  Root drivers include food allergies (especially milk and gluten), gluten sensitivity
  (often subclinical celiac), nutrient deficiency (thiamine, B12, folate, iron, riboflavin,
  pyridoxine, zinc), stress, NSAID use, and local trauma. Lesions usually heal in
  7-21 days but recur. Correction of underlying allergens and nutrient status produces
  complete remission in most cases.
