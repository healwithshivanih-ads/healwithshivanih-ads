coaching_scope_notes: Coaches can recommend probiotic-rich fermented foods (yoghurt, sauerkraut, kimchi, miso, idli, dosa),
  prebiotic fibre variety (7+ types per meal), and minimising antibiotic exposure where possible. Supplement protocols should
  be co-managed with a clinician.
