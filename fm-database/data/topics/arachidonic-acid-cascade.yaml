coaching_scope_notes: Coaches can explain to clients why reducing omega-6 intake and
  increasing omega-3 intake helps modulate inflammatory signaling. Use of botanical
  anti-inflammatories (turmeric, ginger, boswellia) can be discussed within lifestyle
  scope.
clinician_scope_notes: Arachidonic acid drives aromatase activity, potentially contributing
  to estrogen dominance. Consider dietary AA reduction in hormone-sensitive conditions.
