slug: arachidonic-acid-cascade
display_name: Arachidonic Acid Cascade & Inflammation
aliases:
- AA cascade
- eicosanoid pathway
- COX-LOX pathway
summary: Arachidonic acid (AA), the major omega-6 PUFA, is released from cell membranes
  by phospholipase A2 in response to injury or immune stimuli and drives inflammation
  via the COX (prostaglandins, thromboxanes) and LOX (leukotrienes) pathways, contributing
  to asthma, atherosclerosis, arthritis, and other chronic diseases.
