summary: 'A spectrum from generalised joint hypermobility (common, often benign)

  through hypermobility spectrum disorder (HSD) to hypermobile Ehlers-Danlos

  syndrome (hEDS, the most common subtype). All share connective tissue

  laxity affecting joints, skin, vessels, and viscera. Functional medicine

  framing: collagen instability drives joint pain + subluxations, GI

  dysmotility, vascular dysregulation (POTS), and mast cell instability

  (MCAS) — the "EDS-POTS-MCAS triad." Strongly heritable; family history

  of "loose joints," scoliosis, mitral valve prolapse, or unexplained

  chronic pain is highly suggestive. Disproportionately affects women;

  symptoms often worsen at puberty, post-partum, and perimenopause due

  to hormonal effects on connective tissue.

  '
