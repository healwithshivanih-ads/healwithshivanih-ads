coaching_scope_notes: 'Coach focus: (1) joint protection — avoid hyperextension during yoga /

  stretching; emphasise STABILITY work, not flexibility. (2) Strength

  training with closed-chain exercises (clinical Pilates, isometrics,

  resistance bands). (3) Proprioceptive work (balance boards, mindful

  movement). (4) Collagen support — bone broth, collagen peptides

  10-20 g/day, vitamin C 500-1000 mg, glycine, copper-zinc balance.

  (5) Nervous system regulation — mast cells are unstable in EDS;

  histamine + stress drive flares. (6) GI motility support if dysmotility

  present (low-FODMAP trial, ginger, magnesium). (7) Screen for POTS +

  MCAS in every EDS suspect — the triad is common. Beighton score in

  intake; refer for genetic workup if vascular EDS suspected.

  '
clinician_scope_notes: 'Diagnosis is clinical (2017 international criteria) — geneticist or

  rheumatologist. Vascular EDS (vEDS) requires aortic monitoring +

  genetic confirmation (COL3A1). Pain management, joint stabilisation

  surgery, and pharmacological POTS / MCAS treatment are clinician

  domain. Coach refers for genetic counselling when family history is

  significant (aortic dissection, sudden death, vascular rupture).

  '
