summary: Research on specific botanical and nutraceutical agents indicates they may have a role in the pre-exposure and early
  phase of COVID-19 and other viral illnesses by improving immune response, decreasing viral replication, and reducing symptom
  severity. Recommendations require clinician supervision.
common_symptoms:
- upper-respiratory-symptoms
- lethargy
- fever
red_flags:
- Severe respiratory distress, hypoxia, or rapid clinical deterioration — emergency referral
- High fever persisting beyond 3 days — refer to clinician
related_topics:
- chronic-inflammation
- anti-inflammatory-diet
key_mechanisms:
- nlrp3-inflammasome-activation
- oxidative-stress
- innate-immune-modulation
coaching_scope_notes: Coaches can share general educational information about immune-supportive nutrients. Specific dosing
  protocols for COVID-19 or acute viral illness must be directed by a qualified clinician.
clinician_scope_notes: All dosing recommendations in the COVID-19 nutraceutical section should be supervised by a qualified
  healthcare professional. Vitamin A toxicity risk, licorice contraindications, and herb-drug interactions require clinical
  assessment.
evidence_tier: plausible_emerging
