sources:
- id: briden-period-repair-manual-2018
  location: Chapter 2 — Breaking Up with Hormonal Birth Control, pp 35-37
  quote: You will probably feel better when you stop hormonal birth control. Better
    mood, more energy, and regular cycles. That is the most common experience. You
    may, however, develop problems such as post-pill acne, PMS, or amenorrhea.
- id: briden-period-repair-manual-2018
  location: Chapter 2 — Post-Pill Acne, pg 36
  quote: Post-pill acne is the result of a double-whammy of rebound sebum as you withdraw
    from a sebum-suppressing drug, and rebound androgens as your ovaries become active
    again. Post-pill acne typically peaks after about six months.
coaching_scope_notes: Coaches can support clients through the post-pill transition
  with nutrition (zinc, magnesium, B6), stress management, cycle tracking, and education.
  They should set expectations about timeframe (skin can take 6 months to settle;
  cycles can take 3-12 months to regularise). They should NOT diagnose post-pill PCOS
  — transient ovulatory disturbance is common in the first 3-6 months and does not
  equal a PCOS diagnosis.
clinician_scope_notes: Amenorrhoea persisting beyond 6-12 months post-pill warrants
  endocrine evaluation (FSH, LH, prolactin, TSH, testosterone, DHEA-S, AMH). Vitex
  agnus-castus dosing and herbal protocols for post-pill recovery are within the scope
  of a trained herbalist or naturopath, not unsupervised coaching.
