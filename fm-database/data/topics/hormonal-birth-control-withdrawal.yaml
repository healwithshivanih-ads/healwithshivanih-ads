summary: The constellation of physiological adjustments and symptoms women experience
  after stopping hormonal birth control (combined pill, mini-pill, hormonal IUD, implant,
  patch, ring, injection). Because hormonal contraceptives suppress ovulation and
  replace endogenous estradiol/progesterone with synthetic pseudo-hormones, the ovaries
  must re-activate the HPO (hypothalamic-pituitary-ovarian) axis when the drug is
  stopped. Common post-pill presentations include rebound acne (peaking ~6 months
  as sebum-suppressed skin up-regulates oil production AND ovaries temporarily over-produce
  androgens), new-onset PMS (the body re-encountering natural cyclical hormone fluctuations
  after years of flat synthetic dosing), post-pill amenorrhoea/stalled menstruation
  (especially in women who started the pill as teenagers before HPO maturation), and
  post-pill PCOS (transient androgen excess on ultrasound or labs in the months after
  stopping). Briden frames this as the first item on a woman's "monthly report card"
  — what shows up when the suppressive drug is removed tells the clinician what was
  going on underneath.
common_symptoms:
- post-pill acne
- post-pill amenorrhea
- new-onset PMS
- breast tenderness
- mood swings
- low libido
- hair loss
- irregular cycles
- anovulatory cycles
- spotting between periods
red_flags:
- amenorrhoea persisting beyond 12 months post-pill (refer for endocrine workup)
- severe depression or suicidality during withdrawal
- new-onset severe migraine
- visual disturbance
