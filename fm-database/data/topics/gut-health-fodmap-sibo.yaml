coaching_scope_notes: Coaches can support low-FODMAP food selection for the short
  therapeutic phase and guide reintroduction journaling. SIBO testing, prokinetic
  prescribing, and antibiotic decisions are clinician territory.
clinician_scope_notes: Assess for SIBO, H. pylori, celiac, HCl deficiency, bile insufficiency.
  Use prokinetics and vagus nerve support alongside dietary phase. Reintroduction
  phase is diagnostic.
