summary: FODMAPs are clinical diagnostic tools revealing fermentation capacity, motility,
  mucosal integrity, vagal tone, and SIBO patterns. Low-FODMAP is a short-term therapeutic
  phase (2–6 weeks); long-term use collapses microbiome diversity. Root causes include
  SIBO, dysbiosis, low stomach acid, and bile insufficiency.
common_symptoms:
- bloating
- constipation
- gas
- new-food-sensitivities
- diarrhoea
red_flags:
- GI bleed
- unintentional weight loss with GI symptoms
- suspected celiac disease
