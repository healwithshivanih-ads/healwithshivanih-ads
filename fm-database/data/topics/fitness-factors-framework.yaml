slug: fitness-factors-framework
display_name: Fitness Factors Framework (Cell Defense Stressor Audit)
aliases:
- fitness factors
- balcavage fitness scoring
summary: A seven-domain clinical scoring system used to identify whether a patient's
  physiology is biased toward manufacturing mode or cell-defense mode. Each domain
  is rated 0 to 10 by the patient — emotional fitness (rumination, worry, presence),
  physical fitness (capacity to walk, lift, recover), metabolic fitness (blood-chemistry
  markers), dietary fitness (whole food vs ultra-processed), sleep fitness (duration,
  depth, consistency), respiratory fitness (nasal breathing, breath capacity), and
  habitual fitness (daily behaviours, environment, toxic load). The lowest-scoring
  domain becomes the starting point. Concrete incrementalism is encouraged — if a
  patient cannot walk five minutes, start with four; if they cannot lift, start with
  chair stands; build a foundation before adding supplements.
