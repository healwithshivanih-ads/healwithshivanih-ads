slug: autoimmune-conditions-igg-food-triggers
display_name: Autoimmune Conditions & IgG Food Triggers
aliases:
- autoimmune food sensitivity
- IgG autoimmune food reaction
summary: In autoimmune conditions, IgG reactions (not IgE) are the predominant immune response to food. Common triggers include
  casein (cow's milk), wheat, dairy, egg white, and rice. Elimination diets targeting these antigens are a core FM intervention
  in autoimmune patients.
common_symptoms:
- fatigue
- joint-pain
- brain-fog
- inflammation
related_topics:
- food-sensitivity-igg-iga-mediated
- autoimmunity-leaky-gut-triad
key_mechanisms:
- igg-antigen-immune-complex-complement-activation
- intestinal-permeability
coaching_scope_notes: Coaches can support elimination of common autoimmune food triggers under clinician guidance. IgG testing
  for autoimmune conditions should be ordered and interpreted by a clinician.
clinician_scope_notes: IgG + complement testing panels are available for autoimmune food trigger identification. Celiac disease
  (type 4 hypersensitivity / cell-mediated) requires separate diagnostic workup.
