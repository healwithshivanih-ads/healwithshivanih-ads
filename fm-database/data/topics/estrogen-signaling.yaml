summary: Estrogen is the evolutionarily oldest hormone with at least six known receptors
  (ER-alpha, ER-beta, and others). It signals both genomically (via nuclear receptors
  affecting gene expression) and non-genomically (via cell membrane interactions).
  The majority of estrogen receptors control and balance growth; only one promotes
  growth, and only 50% of the time.
