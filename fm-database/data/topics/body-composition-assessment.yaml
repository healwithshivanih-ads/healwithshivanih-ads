slug: body-composition-assessment
display_name: Body Composition Assessment
aliases:
- body fat analysis
- anthropometric assessment
summary: Comprehensive evaluation of a patient's physical makeup including BMI, waist-to-hip
  ratio, percentage of body fat, lean muscle mass, and fluid distribution. Uses tools
  such as BIA, DEXA, and anthropometric measurements to classify obesity patterns
  and metabolic risk.
common_symptoms:
- increased-waist-circumference
- low-lean-muscle-mass
- excess-body-fat
- fluid-retention
red_flags:
- low-lean-muscle-mass-with-high-body-fat
- waist-circumference-above-40-inches-men
- waist-circumference-above-35-inches-women
related_topics:
- metabolic-syndrome
- visceral-adiposity
- bioelectrical-impedance-analysis
- bmi-interpretation
key_mechanisms:
- insulin-resistance
- visceral-adiposity
- inflammation
coaching_scope_notes: Coaches can use BMI, waist-to-hip ratio, and BIA data to support
  goal-setting and track progress. Lab interpretation and clinical diagnosis are out
  of scope.
clinician_scope_notes: Clinicians should integrate BIA, waist circumference, waist-to-hip
  ratio, and biomarkers (fasting insulin, triglycerides, CRP, HOMA-IR) to determine
  metabolic health status and treatment intensity.
evidence_tier: strong
sources:
