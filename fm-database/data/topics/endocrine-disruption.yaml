summary: 'Endocrine-disrupting chemicals (EDCs) are exogenous substances —

  notably bisphenol A (BPA), phthalates, parabens, certain pesticides

  and air pollutants — that mimic, block, or alter endogenous hormone

  signaling. Linked to metabolic dysfunction (obesogen effect, beta-cell

  changes, type 2 diabetes risk), reproductive issues (fertility, lower

  sperm concentration and motility, menstrual irregularities, PCOS,

  perimenopause symptoms), thyroid dysfunction (the "sentinel organ"),

  and cardiovascular and inflammatory disease. Fetal development and

  puberty are the most sensitive windows of exposure.

  '
