  location: Podcast — gluten molecular mimicry segment
  quote: Gluten is a molecular structure that is very similar to the thyroid gland.
    We call it molecular mimicry. Your soldiers — your TPO and TG antibodies — when
    you eat gluten go 'there's an invader that looks like the thyroid gland that we
    like to destroy. Let's go kill the invader.' They can't really tell the difference
    between your thyroid gland and the gluten molecule.
