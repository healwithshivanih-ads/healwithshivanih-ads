slug: molecular-mimicry-gluten-thyroid
display_name: Gluten-Thyroid Molecular Mimicry
aliases:
- gliadin thyroid cross reactivity
summary: The hypothesis that the molecular structure of gluten gliadin closely resembles
  that of thyroid peroxidase (TPO) and thyroglobulin (TGab), so that TPO/TGab antibodies
  generated in response to gluten exposure cross-react and attack thyroid tissue.
  Hornaman positions this as a central driver of the Hashimoto's epidemic — denatured
  wheat, rising gluten content, and constant exposure produce sustained B-cell activation
  against gluten that overlaps with self-tissue. Coach implication — for any client
  with elevated TPO/TGab antibodies, a 90-day strict gluten-free trial is a high-leverage
  first move regardless of negative coeliac screening.
