slug: sex-hormone-binding-globulin
display_name: Sex Hormone Binding Globulin (SHBG)
aliases:
- SHBG
- SHBG dysregulation
- hormone transport protein
summary: SHBG is a protein that binds testosterone and estrogen in the blood, regulating
  the amount of free (bioavailable) hormone. High SHBG reduces free testosterone causing
  deficiency symptoms; low SHBG raises free androgens and estrogens causing excess
  symptoms. Multiple health conditions, medications, and nutritional factors modulate
  SHBG levels.
common_symptoms:
- fatigue
- decreased-libido
- weight-gain
- mood-changes
- decreased-muscle-mass
- hair-loss
- acne
- fluid-retention
- decreased-bone-mineral-density
red_flags:
- significant bone density loss
- signs of liver disease (cirrhosis, hepatitis)
- Symptoms consistent with testosterone deficiency should be evaluated by a clinician
- New or worsening bone loss requires clinical assessment
related_topics:
- estrogen-metabolism
- testosterone-health
- metabolic-syndrome
- testosterone-dht-conversion
- benign-prostatic-hyperplasia
key_mechanisms:
- shbg-hormone-binding
- free-testosterone-regulation
coaching_scope_notes: Coaches can educate on diet, lifestyle, and conditions that
  influence SHBG. Supplement and hormone prescribing is out of coaching scope.
clinician_scope_notes: Clinician should interpret SHBG lab values and recommend specific
  hormone or supplement interventions.
evidence_tier: strong
sources:
