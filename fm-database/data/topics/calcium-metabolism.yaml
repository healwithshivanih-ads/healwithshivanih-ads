coaching_scope_notes: Coaches should understand the distinction between total and ionized calcium, and why low serum calcium
  does not automatically mean dietary deficiency.
clinician_scope_notes: Ionized calcium is the preferred functional marker. Albumin-corrected calcium interpretation is essential.
  PTH, vitamin D, magnesium, and phosphorus should all be evaluated alongside serum calcium.
