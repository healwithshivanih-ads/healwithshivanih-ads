summary: Serum calcium is tightly regulated by parathyroid hormone and vitamin D. 99% of body calcium is stored in bone and
  teeth. Only 50% of serum calcium is ionized (active), with 40% bound to albumin and 10% bound to other substances. Ionized
  calcium is the functional form relevant to cellular processes.
