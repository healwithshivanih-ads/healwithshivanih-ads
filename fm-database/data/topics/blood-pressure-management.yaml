summary: Assessment and management of elevated blood pressure incorporating both pharmacological
  and lifestyle-based interventions. Dietary strategies including potassium, phytonutrients,
  L-arginine, anthocyanins, sodium reduction, and weight loss can produce clinically
  significant reductions in systolic blood pressure.
