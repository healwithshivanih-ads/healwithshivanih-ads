- renin-angiotensin-system
coaching_scope_notes: Coaches can support DASH diet adherence, potassium-rich food
  intake, sodium reduction, weight management, and regular aerobic exercise. Medication
  decisions are out of scope.
clinician_scope_notes: Use risk-stratified approach integrating organ damage markers
  and risk factors. Lifestyle is always co-initiated with medication at any stage.
  See cardiometabolic module for full protocol.
evidence_tier: strong
