coaching_scope_notes: Coaches may discuss dietary strategies (reducing sugar, refined carbs) and general herbal antifungal
  support. Pharmaceutical antifungal prescribing is outside coaching scope.
clinician_scope_notes: Clinician may prescribe itraconazole or fluconazole. Itraconazole preferred over fluconazole for broader
  coverage. Combination of pharmaceutical and herbal antifungal is preferred for chronic cases.
