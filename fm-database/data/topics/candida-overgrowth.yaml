summary: Fungal overgrowth, particularly Candida, is identified as a dysbiotic pattern in the gut microbiome. It is addressed
  through broad-spectrum herbal antifungals (caprylic acid, garlic oil, oil of oregano) and, in severe cases, pharmaceutical
  antifungals such as itraconazole, typically combined with herbal support due to the chronic nature of fungal infection.
