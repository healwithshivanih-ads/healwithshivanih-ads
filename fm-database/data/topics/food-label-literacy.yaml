coaching_scope_notes: Teaching food label literacy is a core coaching skill. Coaches
  can walk clients through serving sizes, added sugar limits (24g women, 35g men),
  fiber goals (25g women, 38g men), and how to identify trans fats and allergens in
  ingredient lists.
