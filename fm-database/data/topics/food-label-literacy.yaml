summary: Food labels contain serving size, calorie, macronutrient, micronutrient,
  and ingredient information. Understanding percent daily values, hidden sugars (multiple
  sugar names), trans fat labeling loopholes, and allergen listings helps consumers
  make informed choices and avoid hidden ingredients.
