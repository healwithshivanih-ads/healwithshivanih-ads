coaching_scope_notes: 'Coach screens for risk signs (loud snoring, witnessed apneic

  episodes from a partner, unrefreshing sleep, morning headaches,

  hypertension at altitude) and refers to a clinician for overnight

  oximetry or polysomnography. Coach does NOT diagnose or treat.

  '
clinician_scope_notes: 'Diagnosis (home oximetry, polysomnography), CPAP/BiPAP titration,

  oral appliance fitting, and surgical management belong to a sleep

  physician.

  '
