summary: 'Sleep apnea is recurrent partial or complete cessation of breathing

  during sleep, leading to fragmented sleep and intermittent hypoxia.

  Obstructive sleep apnea (OSA) results from upper airway collapse

  (tongue falling back, narrow airway, inability to visualize the

  uvula in open-mouth view is a screening sign). Central sleep apnea

  arises from impaired CNS respiratory drive (stroke, concussion,

  traumatic brain injury). Sleep apnea is a larger cardiovascular

  risk than most cardiac biomarkers, and nocturnal hypoxia in

  cognitively-declining adults can drive brain hypoxic stress

  overnight. Frequently undiagnosed across body habitus types —

  the "Pickwickian" stereotype misses many thin presenters.

  '
