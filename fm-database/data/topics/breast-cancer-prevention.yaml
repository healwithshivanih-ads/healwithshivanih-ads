- mammary cancer prevention
summary: 'Breast cancer risk is dominantly modifiable through diet, lifestyle, and
  environmental exposures even in the presence of genetic susceptibility (BRCA1/2).
  US rates are ~5× those in Japan; second/third-generation Japanese women in the US
  converge on US rates, demonstrating that diet/lifestyle drive most of the difference.
  Key risk levers include obesity (≥30% increased risk), saturated/grilled meat intake
  (charred meats up to 4.6× risk), alcohol (dose-dependent), night-shift work (suppresses
  melatonin), and low intake of omega-3s, fibre, brassica vegetables, soy isoflavones,
  flax lignans, and antioxidants. Protective levers: Mediterranean diet, soy (pre/during
  adolescence is most protective), flaxseed (lignans + ALA), cruciferous vegetables
  (I3C/DIM shift estrogen metabolism toward 2-hydroxyestrone), exercise (up to 60%
  risk reduction), breastfeeding, green tea, vitamin D, and calcium-D-glucarate (inhibits
  intestinal beta-glucuronidase, reducing estrogen reabsorption).'
