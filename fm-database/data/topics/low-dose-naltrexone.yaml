coaching_scope_notes: Coaches can educate clients on what LDN is and how it works
  mechanistically. All prescribing, dosing, and monitoring decisions are strictly
  clinician scope. Clients should be directed to a functional medicine physician for
  a prescription.
clinician_scope_notes: Start 0.5–1.5 mg/day; titrate to 3–4.5 mg/day over 2–4 weeks.
  Monitor thyroid hormone levels if used in AIT as dose requirements may change. Caution
  with concurrent opioid medications — LDN will displace opioids and precipitate withdrawal.
