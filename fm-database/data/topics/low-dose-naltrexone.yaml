slug: low-dose-naltrexone
display_name: Low Dose Naltrexone (LDN)
aliases:
- LDN
- low-dose naltrexone therapy
summary: LDN (1.5–4.5 mg/day) is an off-label use of the opioid antagonist naltrexone.
  At low doses it transiently blocks opioid receptors, provoking a compensatory rebound
  elevation in endogenous opioids (endorphins, enkephalins) and upregulating opioid
  receptors. This results in immune modulation, anti-inflammatory effects via TLR4
  antagonism and microglial inhibition, and inhibition of aberrant cell proliferation.
  Over 500 PubMed studies address its use in autoimmunity, fibromyalgia, Crohn's disease,
  MS, and cancer.
