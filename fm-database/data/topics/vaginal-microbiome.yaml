coaching_scope_notes: Coaches can educate clients on restoring Lactobacillus crispatus and reuteri through fermented yogurt
  and targeted probiotics, recommend vitamin D and omega-3 optimization, and support dietary diversity. Do not interpret lab
  results or manage pregnancy complications.
clinician_scope_notes: Premature labor risk, recurrent miscarriage, and SIBO treatment with rifaximin require clinician oversight.
  Vaginal microbiome testing interpretation (e.g., Ombre, Tiny Health) should involve clinical guidance.
