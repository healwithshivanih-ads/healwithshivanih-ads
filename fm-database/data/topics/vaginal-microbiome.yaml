slug: vaginal-microbiome
display_name: Vaginal Microbiome
aliases:
- vaginal flora
- vaginal microbiota
summary: The vaginal microbiome is a community of microorganisms, predominantly Lactobacillus species, that protect vaginal
  health, regulate pH, prevent infection, and influence reproductive outcomes. Lactobacillus crispatus is identified as the
  defining keystone microbe. Disruption—commonly from antibiotic use—is linked to miscarriage, premature labor, UTIs, incontinence,
  and vaginal infections.
