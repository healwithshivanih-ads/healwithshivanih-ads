- vaginal-dryness
- urinary-tract-infections
- incontinence
- vaginal-discharge
- vaginal-itching
- bacterial-vaginosis
red_flags:
- recurrent-miscarriage
- premature-labor
- necrotizing-enterocolitis-in-preterm-infant
