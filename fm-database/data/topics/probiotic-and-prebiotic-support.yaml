summary: After antibiotic use or gut flora disruption, a daily probiotic supplement (Lactobacillus acidophilus, Bifidobacterium)
  for at least two months is recommended alongside a diverse prebiotic fibre intake (7+ varieties per meal). Fermented foods
  — yoghurt, sauerkraut, kimchi, miso, idli, dosa — are highlighted as practical daily sources.
