  location: Podcast — flavonoids segment
  quote: There are over 8,000 flavonoids identified chemically. They are nature's
    biological response modifiers. In areas of inflammation or damage or low mitochondrial
    function, cells start secreting a compound called glucuronidase. That enzyme breaks
    the bond and frees up that flavonoid that then gets transferred into the cell
    — to the nucleus and the mitochondria. They showed quercetin was able to repair
    that mitochondria.
