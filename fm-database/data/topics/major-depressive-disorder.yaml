coaching_scope_notes: Coaches refer suicidal ideation, psychosis, severe MDD to psychiatry
  immediately. Coaching role — CBT skills, exercise (most consistently effective lifestyle
  intervention), nutrient repletion (B12, folate, D, omega-3), thyroid screen, blood
  sugar stabilisation, gut healing, light therapy for SAD.
clinician_scope_notes: Antidepressants reserved for severe MDD; CBT equally effective
  for moderate. Workup — TSH/fT3/fT4, B12, folate, vitamin D, AM cortisol, ferritin,
  homocysteine.
notes_for_coach: 'Pizzorno key insights: 25% of patients on antidepressants do not
  have a diagnosable psychiatric problem; CBT is as effective as medication for moderate
  depression with lower relapse; learned helplessness (Seligman) is the most useful
  model; explanatory style (optimism vs pessimism) is the determining factor in mood
  response to uncontrollable events.'
sources:
- id: pizzorno-affective-disorders
  location: Affective Disorders — Depression / General Considerations (pp 11-12)
  quote: Although the use of antidepressants may be important in treating severe depressive
    illness and threatened suicide, antidepressants have not been shown to work any
    better than placebo in cases of mild to moderate depression... 25% of patients
    taking antidepressants do not even have a diagnosable psychiatric problem.
