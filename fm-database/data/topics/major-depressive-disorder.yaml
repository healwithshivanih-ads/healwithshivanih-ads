slug: major-depressive-disorder
display_name: Major Depressive Disorder (Unipolar Depression)
aliases:
- mdd
- unipolar-depression
- major-depression
- clinical-depression
summary: A mood disorder characterised by persistent low mood plus at least four to
  five of — appetite/weight change, insomnia or hypersomnia, psychomotor change, anhedonia,
  fatigue, worthlessness/guilt, impaired concentration, recurrent thoughts of death
  — present for at least one month. Pizzorno emphasises that antidepressants do not
  work better than placebo for mild-to-moderate cases (the most common reason for
  prescription) and that learned helplessness, HPA-axis dysregulation, thyroid dysfunction,
  nutrient deficiencies, gut-brain inflammation, and food allergies are modifiable
  underlying drivers.
