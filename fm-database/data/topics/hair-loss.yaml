coaching_scope_notes: Encourage root-cause lab panel (ferritin, B12, zinc, biotin,
  folate, TSH, fT3, fT4, anti-TPO) referral before supplementing. Food-first protein
  and micronutrient approach is coaching-appropriate.
clinician_scope_notes: Hairfall lab panel (ferritin, B12, zinc, biotin, folate, TSH,
