coaching_scope_notes: Coaches may educate clients on absolute vs. relative risk, help
  them prepare questions for their doctor, and support lifestyle changes. Medication
  decisions (start/stop/dose) must involve a clinician.
clinician_scope_notes: Statins are appropriate for secondary prevention and familial
  hypercholesterolemia (LDL >190). Side effects like myopathy, hepatotoxicity, and
  new-onset diabetes should be monitored. Co-prescription with magnesium and vitamin
  D may mitigate some side effects.
