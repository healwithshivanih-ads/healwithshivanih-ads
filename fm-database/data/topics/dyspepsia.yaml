slug: dyspepsia
display_name: Dyspepsia & Upper GI Discomfort in Midlife
aliases:
- indigestion
- upper GI discomfort
- reflux
- nausea
summary: Dyspepsia — encompassing reflux, nausea, bloating after meals, and general
  upper GI discomfort — is common in perimenopause and menopause, linked to declining
  HCL production, digestive enzyme output, bile flow, and microbiome-level fermentation
  changes.
common_symptoms:
- reflux
- nausea
- post-meal bloating
- gas
- discomfort after fatty meals
- greasy stools
red_flags:
- steatorrhea (fat in stool) warrants stool testing or clinician evaluation
- gallbladder symptoms should be evaluated medically
related_topics:
- perimenopause
- microbiome
- gut-hormone-axis
- constipation
key_mechanisms:
- hcl-decline
- digestive-enzyme-insufficiency
- bile-flow-reduction
coaching_scope_notes: Coaches can discuss meal environment, chewing, stress-reduction
  before meals, and general digestive support supplements. HCL supplementation and
  bile-acid supplements require clinician involvement.
clinician_scope_notes: HCL testing, steatocrit on stool testing, gallbladder evaluation,
  and bile-acid supplement dosing are clinician scope.
evidence_tier: plausible_emerging
sources:
