  location: Session 6 — Main Transcript, Dyspepsia Section
  quote: The term dyspepsia in traditional allopathic medicine to really talk about
    you just don't feel great. Like you might have a little bit of reflux, you might
    have a little bit of nausea, and this can be a direct reflection of what's changing
    at the microbiome level.
