coaching_scope_notes: Coaches may educate clients on how to use the publicly available ACC/AHA calculator and help them understand
  absolute vs. relative risk reduction. Coaches should not interpret lab values clinically or recommend starting, stopping,
  or dose-changing medications.
clinician_scope_notes: Secondary prevention patients (prior MI, stent, stroke) and those with familial hypercholesterolemia
  (LDL >190) are outside coaching scope and require clinician-led statin decisions.
