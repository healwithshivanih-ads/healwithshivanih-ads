coaching_scope_notes: Coach supports low-GL whole-food diet, exercise, weight normalisation,
  supplement protocol (foundation + level 1/2). Medication titration is physician-only.
clinician_scope_notes: Monitor HbA1c, fasting glucose, C-peptide, lipids, microalbuminuria,
  GGTP, homocysteine, ferritin. Oral drugs or insulin if targets not met at Level
  2.
