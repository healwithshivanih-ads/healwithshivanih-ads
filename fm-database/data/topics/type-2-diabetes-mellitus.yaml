summary: Progressive disorder of insulin resistance and eventual beta-cell dysfunction,
  driven by obesity, diet, sedentary lifestyle, persistent organic pollutants, and
  oxidative stress. Ninety percent of all diabetics have T2DM.
evidence_tier: strong
