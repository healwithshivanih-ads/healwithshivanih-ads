summary: Ayurveda treats the gut digestive fire (agni) as the centre of all health.
  When agni is strong, food is properly broken down, nutrients are assimilated into
  resilience (ojas), and waste is excreted cleanly. When agni is weak, undigested
  residue (amma) accumulates and is framed as the root of chronic inflammation and
  disease. Practices to honour agni include igniting it on waking (warm water, ginger
  tea), keeping it protected by NOT snacking between meals, NOT drinking ice water
  with meals (extinguishes the fire), eating the largest meal at midday when agni
  is strongest, and tuning into the meal via a deep breath or short prayer before
  eating to engage rest-and-digest (parasympathetic) tone. Multiple agnis are described
  (brain, body, tissue-level) but the gut digestive fire is the master.
