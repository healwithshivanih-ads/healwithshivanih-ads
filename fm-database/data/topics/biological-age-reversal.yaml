summary: 'Biological (bio) age estimates accumulated tissue/cellular damage and is
  measured by DNA-methylation ''epigenetic clocks'' (e.g. Horvath, PhenoAge, DunedinPACE).
  Unlike chronological age it can move in reverse. Fitzgerald''s 8-week diet-and-lifestyle
  program — methyl donors + DNA methylation adaptogens + sleep/exercise/relaxation/toxin
  reduction — lowered bio age ~3.2 years in a pilot trial without drugs or prolonged
  fasting. Coaching frame: a measurable longevity target driven by food and lifestyle
  rather than a diagnosis.'
