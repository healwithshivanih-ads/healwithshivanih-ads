coaching_scope_notes: Coach the food-first program (cruciferous + leafy greens, beets,
  seeds, eggs/liver or vegan equivalents, green tea, turmeric, rosemary) plus the
  four lifestyle levers (7h sleep, regular exercise, 2x10min relaxation, toxin reduction).
  Educate on epigenetic clocks as a motivation tool. Do NOT interpret clock test results
  clinically.
clinician_scope_notes: Bio-age clock testing (TruDiagnostic, etc.) and any folate/B12
  dosing in clients with cancer history, MTHFR variants, or on methotrexate belongs
  with the clinician — over-methylation and folic-acid over-supplementation carry
  real risk.
