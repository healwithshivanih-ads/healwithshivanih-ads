slug: autoimmune
display_name: Autoimmune Conditions
aliases:
- autoimmunity
- autoimmune-disease
- Hashimoto's
- rheumatoid arthritis
- celiac disease
summary: Autoimmune conditions involve the immune system mistakenly attacking the
  body's own tissues. Women are disproportionately affected, and risk rises sharply
  in perimenopause and menopause due to declining estrogen, gut barrier disruption,
  and immune dysregulation.
common_symptoms:
- joint pain
- fatigue
- brain fog
- thyroid dysfunction
- digestive disturbance
- skin manifestations
red_flags:
- new joint swelling with morning stiffness > 60 min (refer rheumatology)
- unexplained fevers, weight loss, night sweats
- suspected new autoimmune flare without diagnosis
- rapid symptom escalation
- multi-system involvement
- new diagnosis — requires rheumatology or specialist referral
related_topics:
- thyroid
- perimenopause
- inflammaging
