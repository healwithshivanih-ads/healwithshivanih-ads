summary: Chronic stress triggers immune dysregulation via cortisol rhythm disruption,
  Th1/Th2/Th17 imbalance, and gut barrier breakdown, precipitating or worsening autoimmune
  conditions.
common_symptoms:
- joint-pain
- lethargy
- poor-concentration
- thyroid dysfunction
- digestive disturbance
- skin-rash
- brain-fog
- autoimmune-flares
- food-sensitivities
red_flags:
- new joint swelling with morning stiffness > 60 min (refer rheumatology)
- unexplained fevers, weight loss, night sweats
- suspected new autoimmune flare without diagnosis
- rapid symptom escalation
- multi-system involvement
- new diagnosis — requires rheumatology or specialist referral
- Rapidly progressive symptoms — refer to rheumatologist/immunologist
