- estrogen-immune-modulation
- gut-barrier-permeability
- th1-th2-imbalance
coaching_scope_notes: Coaches can address lifestyle contributors (stress, diet, sleep)
  that modulate autoimmune risk. Do not advise on diagnosis or treatment of specific
  autoimmune conditions.
clinician_scope_notes: Hashimoto's, PCOS, rheumatoid arthritis, celiac disease cited
  as examples requiring medical management.
