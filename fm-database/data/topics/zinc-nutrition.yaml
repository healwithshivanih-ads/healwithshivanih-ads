  location: 'Food Sources: Zinc'
  quote: Zinc plays an important role in several body systems – over 100 enzymes in
    the body require zinc to function. Zinc is necessary for normal growth and development,
    immune and neurological function, proper sense of taste and smell, and maintaining
    the structure of cell membranes, as well as protecting them from oxidative damage.
