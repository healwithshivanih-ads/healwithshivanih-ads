slug: oral-toxin-exposure
display_name: Oral Toxin Exposure from Dental & Personal Care Products
aliases:
- dental product toxins
- oral care chemicals
summary: Common oral health products (toothpaste, mouthwash, dental floss) contain
  ingredients—including triclosan, SLS, fluoride, propylene glycol, titanium dioxide,
  and alcohol—that may disrupt the oral microbiome, absorb through oral mucosa into
  the bloodstream, and contribute to systemic toxic burden.
