summary: A framework in which low intracellular T3 and downstream hypothyroid symptoms
  reflect an adaptive, protective response of cells flipping from manufacturing mode
  into cell-defense mode (per the Naviaux Cell Danger Response paradigm). Triggers
  include hypoxia, emotional stress, trauma, infections, toxins, and chronic micronutrient
  deficiencies. The cell deliberately reduces mitochondrial number and metabolic throughput
  to lower free-radical production while preserving antioxidant reserves for the defense
  response. Clinical implication — pushing more T4, T3, or T2 replacement against
  a cell that is intentionally downregulated tends to drive oxidative stress higher
  rather than resolve symptoms. The correct intervention is identifying and removing
  the stressors that are signalling defense mode.
