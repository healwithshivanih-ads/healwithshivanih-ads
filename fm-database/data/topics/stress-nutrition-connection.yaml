coaching_scope_notes: Use the stress-nutrition link as a motivational bridge for clients focused on nutrition who are resistant
  to stress work. Educate on how stress affects absorption without diagnosing.
clinician_scope_notes: GI symptoms under chronic stress may warrant evaluation for dysbiosis, leaky gut, or IBS.
