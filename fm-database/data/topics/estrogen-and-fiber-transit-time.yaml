summary: Adequate dietary fiber and regular bowel movements (ideally twice daily)
  are essential for estrogen to be properly metabolized and excreted, preventing reabsorption
  and recirculation. Studies link constipation with higher rates of abnormal breast
  cells and increased breast cancer incidence.
