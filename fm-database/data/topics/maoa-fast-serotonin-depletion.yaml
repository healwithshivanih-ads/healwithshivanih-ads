summary: A fast MAOA variant degrades serotonin, dopamine, and norepinephrine too
  quickly. This underpins depression, anxiety, obsessive tendencies, poor focus since
  childhood, disrupted sleep maintenance, carbohydrate cravings, and mood sensitivity
  to seasonal light changes. Inflammation and infections worsen the phenotype by diverting
  tryptophan away from serotonin synthesis via the IDO1 pathway.
