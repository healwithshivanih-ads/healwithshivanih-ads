slug: comt-val158met
display_name: COMT (Val158Met) Polymorphism
aliases:
- COMT gene variant
- COMT slow/fast metaboliser
- rs4680
summary: The Val158Met polymorphism (rs4680) determines how quickly COMT clears
  catecholamines (dopamine, norepinephrine, epinephrine) and catechol estrogens.
  The Met/Met ("slow") variant is thermolabile and clears these roughly 3-4x
  slower than Val/Val ("fast"), causing a build-up of neurotransmitters and
  catechol estrogens rather than a deficiency. Because anxiety, low mood, and
  insomnia can present from either an excess OR a deficiency of these same
  neurotransmitters, the same symptom picture can have opposite underlying
  biochemistry — this is why COMT status is clinically relevant to SSRI response
  and not just a personality-trait curiosity.
common_symptoms:
- anxiety
- insomnia
- pms
red_flags: []
related_topics:
