coaching_scope_notes: Coach can flag COMT-related patterns (e.g. worsened anxiety
  after starting an SSRI) as a heads-up for the client's prescriber — never
  interpret genetic results diagnostically or suggest medication changes.
clinician_scope_notes: Slow-COMT clients (Met/Met) on an SSRI or high-dose methyl
  donor may need closer monitoring for increased anxiety/irritability, since they
  already run higher baseline catecholamine/serotonin levels.
notes_for_coach: Effect size is real but modest (per-variant, not deterministic)
  — read alongside MAOA rather than in isolation; both feed into the shared
  catechol-clearance mechanism.
sources:
