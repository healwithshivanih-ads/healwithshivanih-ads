  location: LDN and Autoimmune Thyroiditis (AIT)
  quote: 'Likely MOI Thyroiditis: Reduce overall inflammation, Reduce levels of anti-thyroid antibodies, Improve thyroid transport
    into cells, Increase T4 to T3 conversion, Reduce T4 to reverse T3 conversion.'
- id: vitaone-thyroid-toolkit
  location: Understanding Hashimoto's Hypothyroidism
  quote: In Hashimoto's disease, the immune system produces antibodies that attack the thyroid gland, specifically targeting
    thyroid peroxidase (TPO) and thyroglobulin (Tg), which are essential for thyroid hormone production.
- id: vitaone-health-coaching-toolkit
  location: Understanding Hashimoto's Hypothyroidism — What is Hashimoto's Hypothyroidism?
  quote: Hashimoto's hypothyroidism, also known simply as Hashimoto's disease, is an autoimmune disorder in which the immune
    system mistakenly attacks the thyroid gland, leading to chronic inflammation & gradual destruction of thyroid tissue.
- id: vitaone-thyroid-ebook
  location: 'Chapter 6: Causes of Thyroid Disorders'
  quote: Hashimoto's is an autoimmune condition where the immune system produces antibodies like Anti-TPO (thyroid peroxidase)
    and Anti-Tg (thyroglobulin).
