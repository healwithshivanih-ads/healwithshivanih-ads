summary: Autoimmune attack on thyroid tissue driven by anti-thyroid antibodies and chronic inflammation, leading to progressive
  hypothyroidism. LDN is proposed to reduce inflammation, lower anti-thyroid antibody levels, and improve T4→T3 conversion.
common_symptoms:
- lethargy
- brain-fog
- unexplained-weight-gain
- cold-intolerance
red_flags:
- rapidly-rising-tsh
- thyroid-nodules
- severe-hypothyroid-symptoms
related_topics:
- low-dose-naltrexone
key_mechanisms:
- endorphin-immune-modulation
- ldn-endorphin-rebound
coaching_scope_notes: Coaches may support lifestyle and dietary factors. LDN prescribing and thyroid hormone monitoring are
  clinician scope.
clinician_scope_notes: LDN may reduce anti-thyroid antibodies and inflammation. Monitor thyroid hormone levels closely as
  thyroid dose requirements may change with LDN.
evidence_tier: plausible_emerging
sources:
