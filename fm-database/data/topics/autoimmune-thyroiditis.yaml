summary: Autoimmune attack on thyroid tissue, leading to progressive hypothyroidism.
  The destruction is primarily T-cell (cell-mediated); anti-thyroid antibodies (TPO,
  TgAb) are markers of the process rather than the destructive engine. Because of
  this, a SERONEGATIVE (antibody-negative) form exists — normal TPO and TgAb do NOT
  rule out autoimmune thyroiditis (an estimated 10–20% of cases). Thyroid ultrasound
  (hypoechoic, heterogeneous, hypervascular gland) confirms autoimmune thyroiditis
  when antibodies are negative. Antibodies also fluctuate and can decline over time
  or with selenium/dietary change, so a single negative result is only a snapshot.
  LDN is proposed to reduce inflammation, lower anti-thyroid antibody levels, and
  improve T4→T3 conversion.
