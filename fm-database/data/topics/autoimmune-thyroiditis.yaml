coaching_scope_notes: Coaches may support lifestyle and dietary factors. LDN prescribing
  and thyroid hormone monitoring are clinician scope.
clinician_scope_notes: LDN may reduce anti-thyroid antibodies and inflammation. Monitor
  thyroid hormone levels closely as thyroid dose requirements may change with LDN.
notes_for_coach: 'Seronegative recognition (common, easily missed): when a client
  has hypothyroid labs (high-ish TSH, low/low-normal fT4) and hypothyroid symptoms
  but NORMAL TPO and TgAb, do not assume "not autoimmune." Hashimoto''s is T-cell
  mediated, so an antibody-negative (seronegative) form is real and accounts for an
  estimated 10–20% of cases. Antibody titres also fluctuate and can fall over time
  or with selenium/diet — a single negative is a snapshot, not a ruling-out. Watch
  for trigger/unmasking history: postpartum or miscarriage, viral infection (COVID,
  EBV), and metabolic inflammation (e.g. gestational diabetes). 🟡/🔴 To settle the
  question, the client''s clinician can order a thyroid ultrasound (hypoechoic, heterogeneous,
  hypervascular gland confirms it even when antibodies are negative), recheck TPO/TgAb,
  and screen for coeliac disease. The FM levers overlap regardless of antibody status:
  selenium, vitamin D, iron and zinc as immune-tolerance + conversion cofactors, gut-barrier
  support, anti-inflammatory diet, and HPA/stress work.'
