slug: omega-3-omega-6-balance
display_name: Omega-3 / Omega-6 Balance
aliases:
- fatty acid ratio
- AA:EPA ratio
- polyunsaturated fat balance
summary: The ratio of omega-3 to omega-6 fatty acids in cell membranes determines downstream inflammatory potential. High
  omega-6 (especially arachidonic acid from animal protein) provides substrate for pro-inflammatory prostaglandins and cytokines
  via COX and LOX enzymes. High omega-3 competes for the same enzymes, displacing omega-6 and reducing downstream inflammation.
  Therapeutic goal is to shift the membrane composition toward omega-3 dominance over 3–6 months.
