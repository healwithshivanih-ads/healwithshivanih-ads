summary: A hormonal condition characterised by insulin resistance, androgen excess,
  and ovulatory dysfunction. Low-carb diets improve ovulation, insulin sensitivity,
  and androgen balance. Adjunct support includes magnesium, inositol, and Vitamin
  D3.
common_symptoms:
- irregular or absent cycles
- hormonal acne (jawline, chin)
- hirsutism (face, chest, abdomen)
- scalp hair thinning
- difficulty losing weight
- sugar / carb cravings
- infertility / anovulation
- irregular-periods
- acne
- hair-thinning
- weight-gain
- fatigue
- mood-swings
- infertility
- hair-loss
- belly-fat
- sugar-cravings
- elevated-fasting-insulin
red_flags:
- severely irregular bleeding requiring GYN evaluation
- suspected endometrial hyperplasia (long anovulatory periods)
- signs of true virilization (refer endocrinology)
- infertility requiring ART
- severe hyperandrogenism
- metabolic syndrome
- Severe virilization — refer to endocrinology
