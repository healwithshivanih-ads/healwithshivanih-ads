- id: coconote-fm-estrogen-dominance
  location: Disorders Associated with Estrogen Dominance
  quote: What is PCOS? The main cause is insulin resistance. Insulin resistance can
    cause estrogen dominance. It also decreases your capability of binding to the
    sex hormone binding nodule, which actually results in greater amounts of free
    circulating estrogen.
