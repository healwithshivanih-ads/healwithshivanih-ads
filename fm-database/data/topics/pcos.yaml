summary: PCOS and androgen-driven hair loss are linked to insulin resistance, high
  androgens, inositol, omega-3, magnesium, and dietary changes emphasizing low refined
  carbohydrates.
common_symptoms:
- irregular or absent cycles
- hormonal acne (jawline, chin)
- hirsutism (face, chest, abdomen)
- scalp hair thinning
- difficulty losing weight
- sugar / carb cravings
- infertility / anovulation
