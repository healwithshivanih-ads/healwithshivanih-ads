coaching_scope_notes: Support with dietary pattern, stress, and movement. Inositol
  and hormonal supplementation should be personalized with clinician and relevant
  labs (LH:FSH, testosterone, DHEA-S, fasting insulin).
clinician_scope_notes: LH:FSH, testosterone, DHEA-S, and fasting insulin interpretation;
  Vitex and adaptogen use in PCOS; and fertility-related protocols are clinical scope
  items.
