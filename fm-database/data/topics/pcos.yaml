coaching_scope_notes: Support with low-carb food choices; inositol and Vitamin D3
  recommendations require clinician oversight on dosing.
clinician_scope_notes: Run fasting glucose AND GTIR — normal fasting insulin does
  not rule out IR. Always evaluate thyroid. Avoid Vitex with high LH.
