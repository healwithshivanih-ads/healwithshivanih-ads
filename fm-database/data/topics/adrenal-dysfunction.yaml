- hpa-axis-dysregulation
- inflammation
- thyroid
- pcos
- insomnia
- anxiety
key_mechanisms:
- hpa-axis-dysregulation
- pregnenolone-steal
- chronic-inflammation
coaching_scope_notes: Focus on sleep, light hygiene, breathwork, adaptogens, and micronutrient
  support. Cortisol:DHEA lab testing requires clinician.
clinician_scope_notes: Rule out Addison's and Cushing's. Use DUTCH or 4-point salivary
  cortisol. Assess DHEA-S, hs-CRP, fasting glucose.
