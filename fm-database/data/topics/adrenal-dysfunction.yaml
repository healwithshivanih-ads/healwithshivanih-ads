summary: A functional medicine framework describing how chronic emotional, digital,
  or metabolic stressors exhaust adrenal output, alter cortisol:DHEA ratio, and predispose
  to a wide range of chronic diseases.
common_symptoms:
- fatigue
- burnout
- wired-but-tired
- low-libido
- poor-sleep
- salt-craving
- anxiety
- poor-stress-tolerance
red_flags:
- Severe postural hypotension suggesting true adrenal insufficiency (Addison's)
- Rapid weight gain with purple striae suggesting Cushing's
