slug: atopic-dermatitis
display_name: Atopic Dermatitis (Eczema)
aliases:
- eczema
- AD
- atopic eczema
summary: Chronic inflammatory skin condition driven by filaggrin gene mutations impairing
  epidermal barrier, Th2 immune dysregulation via TSLP, food allergen sensitization,
  gut permeability, Candida overgrowth, and environmental triggers including phthalates.
  The 'outside-to-inside, back to outside' paradigm emphasizes barrier repair alongside
  systemic gut and immune normalization.
common_symptoms:
- skin-itching
- dry-skin
- skin-rash
- lichenification
- excoriation
- insomnia
red_flags:
- Atopic march to asthma
- Secondary Staphylococcus aureus superinfection
- Hypothyroidism as underlying driver
related_topics:
- food-allergy
- autoimmunity-leaky-gut-triad
- chronic-candidiasis
- asthma
key_mechanisms:
- filaggrin-skin-barrier-dysfunction
- filaggrin-epidermal-barrier-dysfunction
- tslp-driven-th2-polarization
- leaky-gut
- dysbiosis
coaching_scope_notes: Coaches can support elimination diet, rotation diet, fish oil
  supplementation, probiotic use, avoidance of phthalates, and emollient use. H. pylori
  testing and thyroid evaluation are clinician scope.
clinician_scope_notes: Screen for H. pylori (positive in 70% of AD patients). Evaluate
  thyroid. Consider skin-prick testing, ELISA IgE/IgG4 food testing. Wet wraps and
  topical glycyrrhetinic acid preparations are evidence-supported adjuncts.
evidence_tier: strong
