- id: vitaone-sex-hormones-cheatsheet
  location: Functional Wisdom — Estrogen Dominance Supplement Cheatsheet
  quote: Estrogen dominance isn't 'too much estrogen'. It's poor metabolism, poor clearance, poor gut reconversion, and low
