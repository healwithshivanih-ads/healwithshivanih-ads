- id: vitaone-liver-detox-cheatsheet
  location: Methylation & MTHFR Cheatsheet
  quote: With MTHFR mutations, impaired methylation can lead to toxin build-up, estrogen dominance, and histamine intolerance.
- id: vitaone-health-coaching-toolkit
  location: Estrogen Metabolism
  quote: When there is too much estrogen in the body, a condition called 'Estrogen Dominance' may be present. Estrogen Dominance
    can exacerbate endometriosis, premenstrual syndrome (PMS), polycystic ovarian syndrome (PCOS), premenstrual dysphoric
    disorder (PMDD), and, as stated, put women and men at higher risk for certain cancers.
- id: coconote-fm-estrogen-dominance
  location: What is Estrogen Dominance?
  quote: Estrogen dominance is increased estrogen levels relative to progesterone levels inside the body. Either there is
    an overproduction of estrogen, or the estrogen is absolutely fine but relatively the progesterone is very low, or the
    estrogen and progesterone is absolutely fine but the excretion of estrogen is not happening properly from the body.
- id: coconote-fm-gut-skin-hormone-axis
  location: Estrogen Detoxification Discussion
  quote: Beta glucuronidase actually unesterifies the estrogen and it leads to a lot of estrogen circulation in the blood,
    it basically stops its excretion from the body.
- id: coconote-fm-sex-hormones
  location: Hormone Metabolism and Detoxification
  quote: Improper, a classical case of small intestinal bacterial overgrowth, dysbiosis. will have constant reabsorption of
    estrogen in their body causing an estrogen dominance because the detoxification is poor.
