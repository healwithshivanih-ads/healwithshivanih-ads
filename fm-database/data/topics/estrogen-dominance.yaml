coaching_scope_notes: Coaches can support dietary changes (reduce sugar, alcohol, increase fiber, probiotics), gut health,
  and aromatase-reducing strategies like green tea. Clinical evaluation required for diagnosis.
clinician_scope_notes: BHRT (bioidentical hormone replacement therapy) is prescription-only and requires individualized lab-guided
  dosing. Clinicians should assess estrogen metabolites (2-OH vs 4-OH vs 16α-OH estrone via Dutch test), beta-glucuronidase
  on GI-MAP, thyroid function (free T3), fasting insulin, DHEA-S, cortisol, and SHBG.
evidence_tier: plausible_emerging
