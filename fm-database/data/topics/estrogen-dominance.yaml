summary: A state where estrogen is relatively elevated compared to progesterone, which can arise from low progesterone (not
  necessarily high estrogen), increased aromatase activity, or impaired estrogen detoxification/excretion (e.g., via beta-glucuronidase
  activity in gut dysbiosis). Associated with fibroids, mood changes, heavy periods, and increased cancer risk with prolonged
  synthetic estrogen use.
