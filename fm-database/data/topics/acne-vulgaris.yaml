summary: The most common skin disorder, characterised by comedones (open and closed),
  papules, pustules, nodules, and cystic lesions on face, back, chest, and shoulders.
  Genetic with autosomal-dominant pattern — both parents affected gives 75% offspring
  risk. Driven by androgenic stimulation of pilosebaceous glands, hyperkeratinisation,
  sebum overproduction, and Propionibacterium acnes overgrowth. Pizzorno's framework
  — "skin diabetes" (impaired cutaneous glucose tolerance), gut-brain-skin axis (40%
  have hypochlorhydria), and 5-alpha-reductase amplification of DHT in skin tissue.
common_symptoms:
- skin-rash
