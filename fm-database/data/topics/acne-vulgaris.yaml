  location: Acne Vulgaris — General Considerations (pp 1-3)
  quote: Acne vulgaris onset from increased size of pilosebaceous glands and sebum
    secretion by androgenic stimulation. Severity and progression arise from interactions
    of hormones, keratinization, sebum, and bacteria. Acne may be called "skin diabetes"
    — impaired cutaneous glucose tolerance.
