coaching_scope_notes: Coaching role — dietary elimination (refined sugars, milk/dairy,
  trans fats, iodine), zinc / vitamin A / E / chromium / B6 repletion, gut-skin axis
  support (probiotics, HCl if hypochlorhydric), topical tea tree oil / azelaic acid
  / niacinamide. Refer severe nodulocystic and any patient on isotretinoin to dermatology.
clinician_scope_notes: Topical retinoids, benzoyl peroxide, antibiotics first-line
  conventional. Isotretinoin only for severe/recalcitrant nodular acne — registry-mandated,
  depression and teratogenicity risks. Hormonal acne — workup for PCOS, idiopathic
  adrenal androgen excess, 21-hydroxylase deficiency.
notes_for_coach: Pizzorno key insights — high-protein/lower-carb (45/35/20) decreases
  5-alpha-reductase activity; milk contains androgens + IGF-1 driving acne; 40% of
  acne patients have hypochlorhydria (gut-brain-skin theory); zinc takes 12 weeks;
  vitamin A 150,000 IU effective at 3 months but contraception mandatory.
sources:
