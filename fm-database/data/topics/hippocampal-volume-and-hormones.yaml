summary: The hippocampus shrinks approximately 1% per year in aging adults, correlating with cognitive decline. Estrogen in
  women and testosterone in men have been shown to re-volumize the hippocampus. Magnesium supplementation at adequate levels
  may also support hippocampal volume through hormone signaling support.
