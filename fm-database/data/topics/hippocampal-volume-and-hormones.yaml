coaching_scope_notes: Coaches can share the importance of hormonal health and key nutrients (especially magnesium) for long-term
  brain health. Referral to hormone clinician appropriate when cognitive symptoms emerge.
clinician_scope_notes: McGill and Yale MED-X studies provide key evidence. FSH reduction alongside estrogen or testosterone
  optimization appears more important than absolute hormone levels for hippocampal volume.
