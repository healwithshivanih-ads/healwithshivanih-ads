coaching_scope_notes: Coach can educate on the role of mitochondrial nutrients and
  guide food-first strategies. Supplement protocols should be coordinated with an
  FM provider.
clinician_scope_notes: Supplement dosing for mitochondrial support (especially CoQ10,
  ALA, NAC) and assessment of mitochondrial dysfunction are clinician scope.
