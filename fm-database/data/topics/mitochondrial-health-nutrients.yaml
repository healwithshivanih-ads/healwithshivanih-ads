slug: mitochondrial-health-nutrients
display_name: Nutrients for Mitochondrial Health
aliases:
- mitochondrial support
- cellular energy nutrients
- mitochondrial dysfunction
summary: Mitochondria convert food and oxygen into ATP. Key nutrients (carnitine,
  magnesium, B vitamins, omega-3s, alpha-lipoic acid, vitamin C, NAC/glutathione,
  CoQ10) support mitochondrial function and reduce oxidative stress (free radical
  damage). Poor mitochondrial function is linked to heart disease, diabetes, memory
  decline, and neurological conditions.
common_symptoms:
- fatigue
- brain-fog
- cognitive-decline
- depression
- neuropathy
