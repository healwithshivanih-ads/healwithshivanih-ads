summary: Ayurveda classifies each person's constitution as a mix of three "elemental
  designs" (doshas) built from five elements (air, ether, fire, water, earth). Vata
  (air + ether) tendencies include dry skin, cold extremities, irregular digestion,
  anxiety, insomnia, and creative-but-scattered energy — coached toward routine, warm
  cooked foods, and grounding rituals. Pitta (fire + water) tends to medium build,
  reddish skin, early greying, driven personality, and heat-related issues (acne,
  heartburn, frustration, burnout) — coached toward cooling foods, hydration, and
  not over-stoking the fire. Kapha (earth + water) tends to bigger build, steady pace,
  deep loyalty, with risks of sluggish metabolism, congestion, and low mood — coached
  toward morning movement, cooked light meals, and reduced dairy. Most people are
  predominantly one with a secondary, and "tridoshic" balance across all three is
  the goal. A standardised dosha questionnaire has been used in clinical research
  correlating pitta dominance with higher cardiovascular-disease risk.
