slug: retained-primitive-reflexes
display_name: Retained Primitive Reflexes (Brain-Stem Immaturity)
aliases:
- primitive reflexes
- retained reflexes
- frontal release signs
summary: Primitive reflexes (rooting, Moro, asymmetric tonic neck, palmar grasp, spinal
  Galant, symmetric tonic neck, tonic labyrinthine, and others) drive infant survival
  and early motor development. The movement of each reflex stimulates the maturation
  of higher brain regions, which in turn inhibit the reflex by approximately six to
  twelve months of age. When higher brain development falters or is incomplete, these
  reflexes remain active into childhood and adulthood — a finding called "retained
  primitive reflexes" or, when reappearing after brain injury, "frontal release signs."
  Retained reflexes in an adult are never a normal finding and indicate brain-stem
  immaturity or higher-cortex underdevelopment. They generate ongoing low-grade interference
  signals that disrupt autonomic regulation, attention, and posture, and predict resistance
  to other neurological-recovery interventions.
