slug: five-category-toxin-reduction-framework
display_name: Five-Category Framework for Reducing Toxic Load
aliases:
- five categories of detox
- trubow five categories
summary: A practical taxonomy for organising client toxin-reduction work into agency-level
  buckets. (1) Thoughts — chronic worry, rumination, and "what-if" questioning shut
  down detox via sustained sympathetic activation, so replacing them with empowering
  questions ("what do I need to do?") is foundational. (2) What goes in you — food,
  water, alcohol, juices; favour organic, whole, in-season; minimise alcohol because
  it takes pole position in liver detox queue, blocking processing of other compounds.
  (3) What goes on you — skincare, makeup, hair products, perfumes (200+ chemicals
  for an average woman daily). Use Environmental Working Group ratings. (4) What's
  around you — air quality (HEPA filtration), water quality (filtration), furniture
  (avoid flame-retarded mattresses), clothing (wash new clothes before wearing, avoid
  dry cleaning). (5) Support excretion — sweat, sleep, hydration, fibre (propolmannan
  konjac fibre binds all mycotoxin strains), binders (modified citrus pectin, charcoal,
  zeolites), sauna, hyperbaric oxygen.
