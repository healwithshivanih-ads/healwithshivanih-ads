key_mechanisms: []
coaching_scope_notes: 'Always practice in a safe environment — near a wall, chair,
  or stable

  surface for catching. Daily short practice beats infrequent long

  sessions. Single-leg stance for 20 seconds is a useful intermediate

  benchmark.

  '
clinician_scope_notes: 'Clients with recent falls, vestibular dysfunction, neurological

  deficits, or syncope require clinical evaluation before unassisted

  balance work.

  '
