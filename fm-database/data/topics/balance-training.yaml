slug: balance-training
display_name: Balance Training
aliases:
- balance exercise
- proprioceptive training
- fall prevention exercise
summary: 'Practice that improves postural control and reduces fall risk. Key

  considerations are neuro status, fall risk, and safe surroundings.

  Beginner: assisted balance work (chair, wall, or person), practiced

  daily, 5–10 minutes. Intermediate: progress towards standing

  unsupported on one leg for 20 seconds, practiced daily, 10–20 minutes.

  Advanced: balance combined with movement, with added balance-

  challenging equipment such as a Bosu ball, practiced daily, 20–30

  minutes.

  '
common_symptoms:
- dizziness
- unsteadiness
red_flags:
- recent-falls
- syncope
