coaching_scope_notes: |
  Coach scope is enormous in POTS — most clients improve substantially
  with non-pharmacological interventions. Education on (1) salt loading
  (3-10 g/day under clinician supervision unless contraindicated),
  (2) fluid intake 2.5-3 L/day with electrolytes, (3) compression
  garments (waist-high, 20-30 mmHg), (4) recumbent / semi-recumbent
  exercise progression (rowing, swimming, recumbent bike — NEVER start
  with upright exercise), (5) sleep with head of bed elevated 4-6 inches,
  (6) avoid prolonged standing / hot environments / heavy meals /
  alcohol, (7) cooling techniques. Pair with MCAS protocol if histamine
  signals positive. NASA 10-minute lean test in-session gives objective
  baseline. Track symptom severity + standing tolerance weekly.
clinician_scope_notes: |
  Diagnosis is clinical (tilt-table test or active stand test).
  Pharmacotherapy by cardiologist / autonomic specialist: beta-blockers
  (low-dose propranolol / ivabradine), midodrine, fludrocortisone,
  pyridostigmine. Co-existing hypovolemia, anaemia, hyperthyroidism,
  pheochromocytoma must be excluded. Coach should refer for
  cardiovascular workup if any red flag is present or symptoms severe.
  POTS overlap with MCAS and EDS requires multi-specialist coordination
  (cardiology + immunology + rheumatology).
evidence_tier: strong
