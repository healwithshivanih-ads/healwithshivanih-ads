slug: postural-orthostatic-tachycardia-syndrome
display_name: Postural Orthostatic Tachycardia Syndrome (POTS)
aliases:
  - POTS
  - postural tachycardia
  - dysautonomia (POTS-type)
  - orthostatic intolerance
  - autonomic dysfunction
  - autonomic dysregulation
  - standing intolerance
  - tachycardia on standing
summary: |
  POTS is a form of dysautonomia where standing causes an excessive heart-rate
  rise (≥30 bpm in adults; ≥40 in adolescents) within 10 minutes, without a
  drop in blood pressure typical of classic orthostatic hypotension.
  Symptoms include lightheadedness, brain fog, palpitations, fatigue,
  exercise intolerance, GI dysmotility, and (in many) a strong overlap with
  MCAS and joint hypermobility / Ehlers-Danlos (the so-called "triad").
  Functional medicine framing: low plasma volume, autonomic reactivity,
  mast-cell-mediated vasoactivity, and connective-tissue laxity allowing
  blood pooling. Often triggered or unmasked by viral illness (COVID,
  EBV, mono), pregnancy, surgery, or trauma. Disproportionately affects
  women aged 15-50.
