summary: Restorative sleep depends on adequate sleep onset, duration, REM architecture,
  and suppression of nocturnal cortisol. Dysregulated HPA activity, neurotransmitter
  imbalance (GABA/glutamate), and microbiome disruption are key drivers of poor sleep
  quality.
