summary: Chronic sympathetic nervous system activation (sympathetic dominance) suppresses parasympathetic tone, elevates cortisol,
  and contributes to cardiomyopathy, arrhythmia (AFib/VFib), orthostatic hypotension, and broader cardiovascular dysfunction.
