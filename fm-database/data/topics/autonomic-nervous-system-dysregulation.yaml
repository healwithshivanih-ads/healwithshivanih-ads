- insulin-resistance
key_mechanisms:
- hpa-axis-dysregulation
- sympathetic-dominance
coaching_scope_notes: Coaches can address stress resilience, sleep hygiene, HRV monitoring, and nervous system regulation
  practices (breathwork, mindfulness).
clinician_scope_notes: Arrhythmia workup, orthostatic hypotension diagnosis, and cortisol testing require clinician management.
