slug: sleep-memory-consolidation
display_name: Sleep-Dependent Memory Consolidation
aliases:
- hippocampal memory consolidation
- sleep and learning
- memory consolidation during sleep
summary: One of the major functions of sleep is the transfer and consolidation of
  information from short-term working memory into long-term hippocampal memory. During
  sleep — particularly REM stages later in the night — the brain replays and reorganises
  the day's learning, strengthening synaptic connections that anchor new skills and
  information. Sleep deprivation impairs this process. Initial signs are forgetfulness;
  with persistent sleep loss, the ability to encode new memories itself degrades —
  affecting language learning, skill acquisition, academic performance, and work productivity.
  Sleep before learning improves encoding; sleep after learning improves retention.
common_symptoms:
- forgetfulness
- difficulty learning new skills
- brain-fog
- poor recall
- impaired focus
key_mechanisms:
- adenosine-sleep-pressure
- hippocampal-neuroplasticity
