notes_for_coach: Calcium supplementation is rarely the correct first intervention
  for low serum calcium. Coaches should encourage clients to work with their clinician
  to rule out albumin deficiency, magnesium deficiency, low vitamin D, and hypochlorhydria
  before assuming dietary calcium supplementation is needed.
notes_for_client: Low calcium on a blood test does not automatically mean you need
  a calcium supplement. Your doctor should check your protein levels, magnesium, and
  vitamin D first, as these are often the real cause.
