notes_for_coach: Vitamin A (retinol form, not beta-carotene) is present in every hormone
  receptor binding domain and switches the receptor from repressor to expressive mode.
  Document mentions ~3,000 IU/day for physiologic receptor function. High-dose vitamin
  A (above ~10,000 IU/day long-term) has toxicity risks — verify with clinician, especially
  in pregnancy. The document notes past fears around vitamin A toxicity from polar
  bear liver consumption as historically overweighted.
notes_for_client: Vitamin A helps your hormone receptors switch 'on' so your hormones
  can actually send their messages. The body needs some every day. Best sources include
  liver, egg yolks, and dairy. A supplement can help fill gaps — discuss dose with
  your practitioner.
