linked_to_claims:
- biotin-lowers-fasting-glucose-t1dm-t2dm
notes_for_coach: 'Pharmacological doses (9–16 mg/day) — much higher than standard
  supplements. Upregulates glucokinase (hepatic glucose utilisation enzyme). Adjust
  insulin when adding. Also used for neuropathy. Combination with Cr picolinate: 2
  mg biotin + 600 mcg Cr.'
notes_for_client: At high doses, biotin activates a key liver enzyme that helps process
  blood sugar — different from standard biotin supplements which use much lower doses.
