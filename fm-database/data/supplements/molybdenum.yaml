notes_for_coach: Molybdenum is a cofactor for the sulfite oxidase enzyme that converts
  sulfites to sulfates. Lynch recommends it for sulfite sensitivity (wine/food-triggered
  headaches) and notes it helps with cruciferous vegetable gas in slow COMT. Long-term
  high doses can raise uric acid and cause gout — use intermittently. If side effects
  occur, add PQQ to counteract. Choose molybdenum not bound to ammonia.
