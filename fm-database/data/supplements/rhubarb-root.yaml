notes_for_coach: 'Latin: Rheum spp.; Polygonaceae. Sanskrit: Amla-vetasa. Traditional indications: constipation
  (especially with fevers, ulcers or infections), diarrhea and dysentery (Pitta-type), jaundice, liver
  problems, skin inflammations. Precautions: pregnancy, chronic diarrhea, chills; use with caution on
  hemorrhoids. Ayurvedic energetics from The Yoga of Herbs (Frawley & Lad).'
