notes_for_coach: Lynch recommends PQQ specifically to prevent NOS3-derived nitric
  oxide from converting to superoxide (uncoupling). Also counteracts side effects
  of excess molybdenum. Post-workout use for those with exercise-induced soreness
  or fibromyalgia. Part of NOS3 and GST/GPX spot-cleaning protocols.
notes_for_client: PQQ helps keep your nitric oxide working in the beneficial direction
  and may reduce muscle soreness after exercise. Particularly useful for fibromyalgia
  and chronic fatigue.
