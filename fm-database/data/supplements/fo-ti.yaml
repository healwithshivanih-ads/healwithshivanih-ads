notes_for_coach: 'Latin: Polygonum multiflorum; Polygonaceae. Traditional indications: anemia, neurasthenia,
  impotence, lower back pain, premature greying or falling of the hair, enlarged lymph glands, excessive
  menstruation, leucorrhea, arteriosclerosis, diabetes. Precautions: weak digestion, severe congestion
  or edema; K and Ama aggravated in excess. Ayurvedic energetics from The Yoga of Herbs (Frawley & Lad).'
