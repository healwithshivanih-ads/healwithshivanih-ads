notes_for_coach: Citrate form absorbed without stomach acid (preferred over carbonate
  for older adults or PPI users). Always pair with vitamin D3 and K2. Hydroxyapatite
  is a natural alternative that also provides phosphorus and other bone minerals.
notes_for_client: Calcium citrate can be taken with or without food, unlike calcium
  carbonate. Always pair with vitamin D and K2.
