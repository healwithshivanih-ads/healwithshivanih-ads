evidence_tier: plausible_emerging
notes_for_coach: 'Dose: 4 g t.i.d. (total 12 g/day) or 0.5 g/10 kg body weight in
  divided doses. Most effective in younger subjects. Less effective in elderly due
  to impaired NO-dependent renal mechanisms. Therapeutic protocol prescribes spread
  through the day.'
notes_for_client: L-arginine helps blood vessels relax by boosting nitric oxide —
  the body's natural vasodilator. Take in divided doses throughout the day.
