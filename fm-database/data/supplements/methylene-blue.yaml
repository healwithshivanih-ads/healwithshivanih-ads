notes_for_coach: >-
  PRESCRIPTION-ONLY / clinician-gated — VitaOne lists it under Pharmacy, not
  supplements. Pharmaceutical-grade mitochondrial electron donor and nootropic;
  at microdoses (~10 mg) it supports ATP production in compromised mitochondria
  and offers neuroprotection. OUT OF COACHING SCOPE to recommend or dose —
  educate only, and refer to the prescribing clinician. Hard cautions: do NOT
  combine with SSRIs/SNRIs/MAOIs or other serotonergic drugs (serotonin-syndrome
  risk); contraindicated in G6PD deficiency, pregnancy, lactation, and children;
  causes temporary blue discolouration of urine/stool. Evidence for cognitive /
  fatigue / mitochondrial use is emerging, not established.
notes_for_client: >-
  Methylene blue is a prescription medicine, not a supplement — it should only be
  used under a doctor's supervision. If a clinician has prescribed it, follow their
  dosing exactly.
