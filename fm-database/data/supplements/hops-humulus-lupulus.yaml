notes_for_coach: "Hops corymbs (the female flower cones) contain 2-methyl-3-buten-2-ol
  (a sedative metabolite of humulone) and 8-prenylnaringenin (the most potent known
  phytoestrogen). The sedative/anxiolytic effect is GABAergic. RCT evidence: 500mg/day
  powder significantly reduced anxiety and depression in menopausal women at all
  timepoints (P<0.001) over 12 weeks. CONTRAINDICATED in hormone-sensitive cancers
  (ER-positive breast cancer, endometrial cancer) due to 8-prenylnaringenin.
  Commonly found in sleep formulas combined with valerian and passionflower — the
  combination is synergistic. AVOID daytime dosing (sedation); do not combine with
  alcohol, benzodiazepines, or other CNS depressants."
notes_for_client: Hops is the flower used in brewing beer, but taken as a supplement
  it helps calm anxiety and support restful sleep — especially useful during
  perimenopause. Take in the evening with dinner or at bedtime.
