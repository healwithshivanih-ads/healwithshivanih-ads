notes_for_coach: 'Calming herb in the mint family with mild anxiolytic and sleep-

  supportive effects. Source (Menolascino transcript) lists lemon

  balm among evidence-supported natural sleep aids but does NOT give

  dosing. Confirm dose from peer-reviewed source before client use.

  Available as standardized extract, tincture, or as a culinary

  herb in tea. Often combined with passionflower, lavender, or

  valerian.

  '
