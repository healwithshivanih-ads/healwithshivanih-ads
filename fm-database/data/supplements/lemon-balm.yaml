notes_for_coach: "Calming herb in the mint family with mild anxiolytic and sleep-supportive\
  \ effects. DUAL ROLE: (1) Antithyroid — Romm (Table 6-3) cites in-vitro evidence\
  \ that Melissa blocks TSH receptors and Graves' autoantibody binding to thyroid\
  \ tissue; combined with bugleweed + motherwort in classic hyperthyroid tincture (25mL\
  \ each + 25mL nettles = 100mL; 5mL TID). (2) Gut/sleep/anxiety — standard calming\
  \ adaptogen for PPI tapering, insomnia, nervous system support. CAUTION: contraindicated\
  \ in hypothyroidism (mild thyroid-suppressive effect). Dose for antithyroid use:\
  \ as part of tincture formula (see Romm formula above); for sleep/anxiety use confirm\
  \ dose from clinician. Romm calls it the 'gladdening herb' — addresses emotional\
  \ dysregulation in hyperthyroid clients."
