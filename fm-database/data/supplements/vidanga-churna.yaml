notes_for_coach: Classical Ayurvedic krimihara (antimicrobial) herb, traditionally
  used for intestinal parasites and now researched for H. pylori. Case-study protocol
  — 2 g powder twice daily with honey after meals, 60 days. Paired with Kamadudha
  Rasa (250 mg BID). In a published case report, this combo achieved 100% H. pylori
  eradication confirmed by negative Rapid Urease Test. Source — JETIR Ayurvedic case
  report. Quality varies — source from reputable Ayurvedic pharmacy (Baidyanath, Dabur,
  Kerala Ayurveda) or BAMS-prescribing clinician.
notes_for_client: A traditional Ayurvedic herb (also known as Vidanga) used as a powder
  for intestinal infections, including H. pylori. Take 2 grams (about 1/2 teaspoon)
  twice a day mixed with honey, after meals.
