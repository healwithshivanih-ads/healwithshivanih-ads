  location: Kidney Stones — Gut Flora (pp 594)
  quote: Oxalate homeostasis depends in part on the colon anaerobic bacterium Oxalobacter
    formigenes. Its absence (from prolonged antibiotic use) predisposes idiopathic
    Ca oxalate KSs from increased hyperoxaluria and Ca-oxalate stone formation.
