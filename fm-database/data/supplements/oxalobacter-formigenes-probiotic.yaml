notes_for_coach: Specific anaerobic gut bacterium that uses oxalate as its sole energy
  source — colonization protects against Ca-oxalate stones by degrading dietary oxalate
  before intestinal absorption. Depleted by repeated antibiotic exposure. Commercial
  preparations exist but viability and colonisation success vary; combine with low-oxalate
  diet and prebiotic fibre. Most useful in patients with confirmed hyperoxaluria +
  antibiotic history.
notes_for_client: A specific friendly bacterium that eats oxalate in your gut so less
  gets into your urine. Helpful if you make calcium-oxalate kidney stones and have
  had a lot of antibiotics.
