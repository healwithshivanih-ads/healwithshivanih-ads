notes_for_coach: 'Source (IFM Fig 3.5) names tocopherols as an antioxidant protective

  nutrient buffering Phase 1 reactive intermediates but does NOT give

  dosing. Fat-soluble — take with a meal containing fat. Mixed

  tocopherols (alpha + beta + gamma + delta) are preferred over

  alpha-tocopherol alone, which can suppress the others at high

  doses. Synthetic dl-alpha-tocopherol is less bioactive than natural

  d-alpha-tocopherol.

  '
notes_for_client: Vitamin E is an antioxidant that helps protect pancreatic cells
  from damage. Like vitamin A, it requires adequate fat digestion to be absorbed properly.
