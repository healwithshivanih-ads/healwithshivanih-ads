notes_for_coach: Prefer mixed tocopherols. Monitor blood pressure — some T2DM patients
  show 6–7 mmHg systolic increase with 500 mg alpha-tocopherol. Hp 2-2 genotype patients
  benefit most for CVD outcomes. Ensures magnesium entry into cells when co-administered.
notes_for_client: Vitamin E protects cell membranes, nerve cells, and blood vessels
  from diabetes-related damage. Take with a fat-containing meal.
