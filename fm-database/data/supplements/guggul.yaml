notes_for_coach: 'Latin: Commiphora mukul; Burseraceae. Sanskrit: Guggulu. Traditional indications: arthritis,
  rheumatism, gout, lumbago, nervous disorders, neurasthenia, debility, diabetes, obesity, bronchitis,
  whooping cough, dyspepsia, hemorrhoids, pyorrhea, skin diseases, sores and ulcers, cystitis, endometritis,
  leucorrhea, tumors. Precautions: acute kidney infections, acute stage of rashes; only mildly aggravates
  Pitta after long-term usage. Ayurvedic energetics from The Yoga of Herbs (Frawley & Lad).'
