notes_for_coach: Phytoestrogen-rich herb commonly used for hot flashes. Pizzorno notes
  proven scientific efficacy for menopausal symptoms; effect varies by patient (equol-producer
  status matters). Typical extract standardised to ~40 mg isoflavones (genistein,
  daidzein, biochanin A, formononetin). Avoid in hormone-sensitive cancers, pregnancy,
  lactation, anticoagulants.
notes_for_client: A traditional herb that mimics gentle estrogen activity to ease
  hot flashes and night sweats. Best discussed with your clinician if you have a history
  of hormone-sensitive cancers.
