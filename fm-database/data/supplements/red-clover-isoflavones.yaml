- id: who-monographs-selected-medicinal-plants
  location: Vol 4 (2009) — Flos Trifolii, Contraindications / Warnings / Drug interactions (pp. 348–352)
  quote: 'Contraindicated in hypersensitivity/allergy, pregnancy, breastfeeding, children
    under 12 years, and hormone-associated diseases. Patients with estrogen-dependent
    cancers or a family history should consult a provider before use. Conflicting data
    on interaction with tamoxifen and other antiestrogenic drugs.'
