notes_for_coach: |
  VitaOne Vitamin D3 — two verified SKUs on file (both extracted 2026-07-04,
  both co-formulated with K2):

  1. Liquid Vitamin D3 + K2 (SKU ODOO-117) — vitamin D3 (cholecalciferol
     from lichen, vegan-safe) 450 IU + vitamin K2 (MK-7) 9 IU per drop.
     Label: adults 3-4 drops daily (~1350-1800 IU); children 1 drop daily.
  2. Vitamin D3 + K2-7, 5000 IU tablet (SKU ODOO-12) — vitamin D3 5000 IU +
     vitamin K2 (VitaMK7) 100 mcg per tablet. Label: 1-2 tablets daily.

  Neither SKU is a standalone D3-only capsule — no capsule-only product
  verified as of this writing, so "capsule" was dropped from the forms list.
  The K2 co-formulation is a bonus (supports arterial calcium routing), not
  a substitute for any separate calcium/vascular items already in a plan —
  it complements rather than conflicts with the rest of a supplement stack.

  Standard FM target serum 60–80 ng/mL. Vegan clients are already covered
  by both SKUs (lichen-derived D3, not lanolin).

  Product pages: https://vitaone.in/products/liquid-vitamin-d3-k2-117?ref=vita13720sh
  and https://vitaone.in/products/vitamin-d3-k2-7-12?ref=vita13720sh
