notes_for_coach: >-
  Traditional Chinese herb for menstrual and perimenopausal complaints.
  Strong antiplatelet / anticoagulant effect — never combine with warfarin
  or other blood thinners (additive bleeding risk). Uterine stimulant —
  contraindicated in pregnancy. Mild estrogenic effects — avoid in
  estrogen-sensitive conditions (breast cancer, fibroids exacerbated by
  estrogen). Often used in TCM formulas rather than as a single herb.
  Discontinue 2 weeks before any surgery.
