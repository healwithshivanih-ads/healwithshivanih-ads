notes_for_coach: 'Latin: Chrysanthemum indicum; Compositae. Sanskrit: Sevanti (service — gives energy
  of devotion, surrender and service to the Divine). Traditional indications: headache, sore throat, eye
  infections, nose bleeds, boils, dysmenorrhea, liver diseases. Precautions: few, high Vata. Ayurvedic
  energetics from The Yoga of Herbs (Frawley & Lad).'
