notes_for_coach: 'For CTS: 50–200 mg daily in divided doses (25–50 mg b.i.d. to q.i.d.).
  Combine with riboflavin 5–10 mg daily. If no response in 6 weeks, switch to P5P
  (pyridoxal-5-phosphate) 10 mg b.i.d. to q.i.d. High doses (>200 mg/day long-term)
  can cause peripheral neuropathy — use cautiously.'
