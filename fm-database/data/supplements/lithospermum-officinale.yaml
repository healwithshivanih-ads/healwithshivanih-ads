notes_for_coach: Antithyroid herb traditionally paired with Lycopus and Melissa officinalis
  in Graves'. Pizzorno notes its compounds bind to TSH receptors and inhibit antibody
  activation. Contraindicated in hypothyroidism and pregnancy. Confirm dose with clinician.
notes_for_client: A traditional herb used under clinician supervision for mild overactive
  thyroid. Not for use if your thyroid is underactive or during pregnancy.
