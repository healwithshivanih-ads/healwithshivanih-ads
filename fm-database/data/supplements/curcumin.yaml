notes_for_coach: Bioavailability is poor with standard curcumin. Phytosome or black
  pepper (piperine) enhanced forms are preferred. Taken twice daily with food. Pharmacokinetic
  herb-drug interactions noted — flag for clinician review.
notes_for_client: Curcumin (from turmeric) is best absorbed when taken with food and
  in a bioavailable form. Always check with your practitioner before starting.
