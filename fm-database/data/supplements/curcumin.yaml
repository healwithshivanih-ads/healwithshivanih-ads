notes_for_coach: Lynch mentions curcumin as supportive for MTHFR and healthy methylation.
  Bioavailability is very low without a lipid carrier or piperine. Anti-inflammatory
  and Nrf2-activating mechanisms are plausible.
notes_for_client: The active compound in turmeric, curcumin may help support healthy
  methylation and reduce inflammation. Take with a fat-containing meal to improve
  absorption.
