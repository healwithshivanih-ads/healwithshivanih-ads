notes_for_coach: TOPICAL USE ONLY — internal use is toxic. Standardised to 30-40%
  terpinen-4-ol. Effective against 27 of 32 P. acnes strains. Pizzorno recommends
  5-15% solutions for best results. Apply BID to affected areas. Occasional contact
  dermatitis — patch test first. Comparable efficacy to 5% benzoyl peroxide with less
  skin irritation. Do not use near eyes, mouth, or mucous membranes.
notes_for_client: A natural antiseptic oil from an Australian tree. Apply diluted
  (5-15% in carrier oil or as a commercial gel) twice daily to acne. NEVER swallow
  it. Patch test first to check for skin sensitivity.
