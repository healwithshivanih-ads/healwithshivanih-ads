notes_for_coach: Alkalinizing salt that raises urinary citrate (the natural Ca-oxalate
  inhibitor) and urinary pH. First-line prophylaxis for recurrent Ca-oxalate and uric
  acid stones. Typical dose 30-60 mEq/day in divided doses with meals. GI upset common
  — use slow-release form. Caution with potassium-sparing diuretics, ACE inhibitors,
  K-elevating drugs, renal insufficiency.
notes_for_client: An alkalinizing supplement that raises citrate in your urine — citrate
  stops kidney stones from forming. Always taken with meals to avoid stomach upset.
