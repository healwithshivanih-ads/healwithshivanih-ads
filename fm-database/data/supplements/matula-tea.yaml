notes_for_coach: 'Proprietary South African herbal tea blend marketed as a natural
  anti-H. pylori remedy. Coach (Shivani) recommends as part of the FM H. pylori protocol
  — typical course is one 30-day pack, 1 cup BID on empty stomach (morning + bedtime),
  brewed as directed on packaging. Often paired with mastic gum, sulforaphane, manuka
  honey, lactoferrin, and Lactobacillus + Bifidobacterium probiotics for layered effect.
  Evidence base is largely manufacturer-published case data plus practitioner clinical
  observation — not RCT-level. Position as adjunctive option, not replacement for
  clinician-prescribed eradication when indicated. Coach-curated affiliate link in
  ~/fm-plans/supplement_links.yaml under key matula_tea — slug: matula-tea binding
  added so letter renderer surfaces it automatically.'
notes_for_client: A herbal tea blend specifically formulated to help eradicate H.
  pylori. One 30-day pack provides a full course — brew 1 cup twice daily on an empty
  stomach. Best paired with the other gut-healing supplements your protocol recommends.
