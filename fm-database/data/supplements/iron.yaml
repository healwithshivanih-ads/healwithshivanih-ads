notes_for_coach: Iron is listed as a key nutrient for thyroid hormone production.
  Routine supplementation at 15–20 mg is noted specifically for menstruating women.
  Iron status should ideally be confirmed by ferritin/CBC before supplementation.
  Can interfere with levothyroxine absorption — space 4 hours from thyroid medication.
notes_for_client: Iron supports thyroid hormone production and is especially important
  for women with monthly periods. Avoid taking iron at the same time as thyroid medication.
