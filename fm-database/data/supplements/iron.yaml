notes_for_coach: Recommended for menstruating women (15–20 mg/day). Iron is required
  for TPO activity. Iron supplementation should be guided by serum ferritin/iron panel
  — clinician scope. Can interfere with levothyroxine absorption — take 4 hours apart.
notes_for_client: Iron is needed for thyroid hormone production and is especially
  important if you have heavy periods. Don't supplement without getting your iron
  levels tested first.
