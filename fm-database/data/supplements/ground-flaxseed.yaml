notes_for_coach: '1–2 tablespoons of ground flaxseed per day provides approximately
  5g of ALA. Ground (not whole) is required for bioavailability. Flaxseeds also contain
  lignans with anti-mitotic, anti-angiogenic, antioxidant, and phytoestrogenic effects.
  Note: ALA conversion to EPA is only 5–10% and to DHA is 2–5%; not a substitute for
  preformed EPA/DHA in clinical applications.'
notes_for_client: Ground flaxseed sprinkled on oatmeal, yogurt, or smoothies is an
  easy way to boost plant-based omega-3s. Make sure to use ground flax — whole seeds
  pass through without releasing their nutrients.
