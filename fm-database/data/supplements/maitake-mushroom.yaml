notes_for_coach: 'Maitake contains β-(1,6)-glucans with β-(1,3) side chains — the
  D-fraction (proteoglucan) is the most-studied immunomodulatory component. Adjunctive
  use studied in oncology (NK-cell activation). Also has modest insulin-sensitising
  effects (Konno 2001 case series, T2DM). Doses 500–3000 mg/day standardised extract;
  D-fraction trials use 35–100 mg/day. Generally well-tolerated; rare GI upset. Caution:
  may potentiate oral hypoglycaemics.'
notes_for_client: Maitake is an immune-supportive mushroom used in Japanese traditional
  medicine. It contains the same family of fibres (β-glucans) found in oats and yeast
  that train your immune cells to respond better.
