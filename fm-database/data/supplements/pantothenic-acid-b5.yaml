notes_for_coach: Pantethine is the active form for CoA production. High doses may
  compete with biotin and lipoic acid — space apart. Target ~10 mg/day from food;
  therapeutic doses up to 1000 mg+ (acne) are clinician territory.
notes_for_client: Known as the anti-fatigue vitamin. Best taken with meals. If using
  high-dose biotin, take B5 at a separate time.
