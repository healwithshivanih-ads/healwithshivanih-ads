notes_for_coach: 'Dosing must be individualized by species: Shiitake (Lentinula edodes),
  Reishi (Ganoderma lucidum), Maitake (Grifola frondosa), Lion''s Mane (Hericium erinaceus),
  Turkey Tail (Trametes versicolor). Each has a distinct evidence base and dosing
  range. Refer to species-specific research. Dual-extracted (hot water + alcohol)
  products maximize bioactive compounds.'
notes_for_client: Different medicinal mushrooms have different health benefits. Shiitake,
