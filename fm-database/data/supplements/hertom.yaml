notes_for_coach: 'Branded herbal-infusion (tea sachet) product from HerPulse, affiliate
  tie-up 2026-07. Age range per vendor: 12–50. Best fit: clients whose primary complaint
  is period pain/cramps, acne flaring before/after periods, mood disturbance before/during
  periods, or breast tenderness/bloating — i.e. classic PMS/dysmenorrhoea, not the
  broader hormone-imbalance picture (that''s HerSantulan).

  Ingredients: Cordyceps Militaris, Reishi, Spearmint, Licorice, Ashoka, Hibiscus.
  Vendor mechanism claim: active ingredient adenosine acts as a muscle relaxant/vasodilator,
  said to ease back/thigh pain and cramps within a few hours and improve blood flow
  (lowering cramps, anxiety and acne on period days). This is a proprietary blend
  — exact mg breakdown is not disclosed (vendor cites FSSAI RDA-limit compliance only).
  Treat as fm_specific_thin: a single uncontrolled 60-day self-report study (150 women)
  plus general ingredient-level literature (adenosine, licorice, hibiscus) — not a
  trial of the finished product.

  Dosing (vendor): 1 sachet/day, up to 3 sachets/day depending on symptom severity.
  Vendor''s own study protocol used it for 7 days per cycle (2 days before + 5 days
  during periods); daily year-round use is not the studied pattern — frame it to
  clients as a cycle-timed period-support tea, not a daily supplement.

  SAFETY (from vendor safety sheet): contraindicated in pregnancy and lactation.
  Do NOT combine with any hormonal birth control / OCP — many PMS/dysmenorrhoea
  clients are on an OCP for period regulation, so screen for this before suggesting.
  Clients on blood pressure medication should consult their prescribing doctor first.
  Not for anyone with a known mushroom allergy (Cordyceps, Reishi) or allergy to
  any other listed ingredient. Vendor product claim language: "not intended to treat,
  cure, or prevent any disease" — position as a comfort/lifestyle support tea, not
  a treatment for underlying PMS pathology.

  Affiliate purchase link (coach account): https://www.herpulse.in/product/hertom-for-periods/aff/106/'
notes_for_client: A warm herbal tea (Cordyceps, Reishi, licorice, hibiscus and more)
  many women sip in the days around their period to help ease cramps, back/thigh
  pain, bloating and mood dips. Not a medicine — a comfort ritual alongside your
  usual period-care habits.
evidence_tier: fm_specific_thin
contraindications:
  conditions:
  - pregnancy — vendor safety review states contraindicated
  - lactation/breastfeeding — vendor safety review states contraindicated
  - known allergy to mushrooms (Cordyceps militaris, Reishi) or any other listed
    ingredient (spearmint, licorice, ashoka, hibiscus)
  medications:
  - hormonal birth control / oral contraceptive pills — vendor safety guidance says
    do not combine (OCP, combined-oral-contraceptive, progestin-only-pill, mini-pill,
    e.g. Novelon, Yasmin, Krimson, Mala-D, Femilon, Microgynon, Diane-35, Depo-Provera)
  - blood pressure / antihypertensive medication — vendor safety guidance says consult
    prescribing doctor before use (beta-blockers e.g. metoprolol, atenolol, propranolol,
    bisoprolol, Concor; ACE inhibitors/ARBs e.g. enalapril, ramipril, losartan, telmisartan,
    Cardace, Telma; thiazide diuretics e.g. hydrochlorothiazide, indapamide)
  life_stages: []
