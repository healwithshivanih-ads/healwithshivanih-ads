notes_for_coach: Adequate omega-3 intake (and the omega-3:omega-6:omega-9 ratio) supports
  fluid, healthy cell membranes required for non-genomic hormone signaling. Trans
  fats and ultra-processed foods create rigid membranes that impair this rapid hormone
  signaling pathway. Testing the omega-3 index or ratio can be useful.
notes_for_client: Your hormones also talk to every cell through its outer membrane
  — but only if the membrane is flexible and healthy. Omega-3 fats (from fish oil,
  fatty fish) help keep those membranes fluid, so your hormones can communicate rapidly
  throughout your whole body.
