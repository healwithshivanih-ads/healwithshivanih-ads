  L. crispatus as the primary intervention. D-mannose may be used as complementary
  support but is not preferred over microbiome restoration.
notes_for_client: D-mannose (from cranberries) has some evidence for supporting urinary
  tract health, but it is not something your body was designed to need. Restoring
  good bacteria like L. crispatus is a more foundational approach. D-mannose may offer
  additional short-term support.
