notes_for_coach: Beta-glucans from yeast (Saccharomyces cerevisiae, 1,3/1,6-glucan)
  and oat (1,3/1,4-glucan) have distinct structures and slightly different immune
  effects. Both are well-tolerated and have good safety profiles. Most RCT evidence
  uses yeast-derived forms at 250–500 mg/day.
notes_for_client: Beta-glucans are natural immune-training fibers found in oats, mushrooms,
  and yeast. They help your immune system stay alert and ready to respond to infections,
  especially in your respiratory tract.
