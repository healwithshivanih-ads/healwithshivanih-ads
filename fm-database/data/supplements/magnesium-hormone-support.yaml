notes_for_coach: Magnesium is required for transcription of the hormonal signal at
  the receptor. Target RBC (red blood cell) magnesium in the high 5s to low 6s mg/dL
  — standard serum magnesium is a poor proxy. Magnesium is chronically depleted by
  stress, toxicity, and aging. Also linked to hippocampal volume maintenance.
notes_for_client: Magnesium is used up by stress and hard to keep in normal range
  as we age. It's needed for your hormones to actually send their messages in your
  cells. A magnesium supplement — ideally glycinate or malate form — is well tolerated
  and supports both hormonal and brain health.
