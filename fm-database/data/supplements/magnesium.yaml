notes_for_coach: 'Preferred forms: aspartate, malate, citrate, succinate, fumarate.
  Avoid oxide, sulfate, or chloride (laxative effect). Recommended 6–10 mg/kg/day
  for hypertensives. Use in divided doses. Caution in kidney disease or high-grade
  AV block.'
notes_for_client: Magnesium helps relax blood vessels. Take in split doses with meals.
  Loose stools may occur — if so, switch to a gentler form (citrate or glycinate)
  and reduce dose.
