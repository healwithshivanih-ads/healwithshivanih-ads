  location: Vol 4 (2009) — Folium Cynarae, Contraindications / Warnings / Adverse reactions (pp. 103–107)
  quote: 'Contraindicated in hypersensitivity/allergy to artichoke and other Compositae/Asteraceae,
    and in obstruction of the bile ducts. Possible interaction with coumarin-type anticoagulants;
    patients with gallstones should seek provider advice. GI complaints (mild diarrhoea,
    cramps, nausea, heartburn) reported. Not recommended in pregnancy (lack of data).'
