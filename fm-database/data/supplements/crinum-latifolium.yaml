notes_for_coach: 'Traditional Vietnamese botanical (Crinum latifolium) standardised
  extract. Pizzorno cites a clinical study where 79.5% of women had decreased fibroid
  size or arrested growth on Crila. Also studied for BPH. Side effects mild (nausea,
  headache, vaginal dryness, hot flashes) and self-limiting. Often used 3-6 months
  minimum. Source: Vietnam clinical research network.'
notes_for_client: A Vietnamese herb with research showing it can shrink or stop the
  growth of uterine fibroids in about 80% of women. Side effects are mild and usually
  fade.
