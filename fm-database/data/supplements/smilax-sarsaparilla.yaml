notes_for_coach: Steroidal-saponin-rich herb whose mechanism in psoriasis is binding
  intestinal endotoxins for excretion — reduces circulating LPS that drives skin hyperproliferation.
  Pizzorno cites a clinical trial — 62% improvement and 18% complete clearance in
  chronic plaque psoriasis (80% benefit). Aqueous extracts preferred. Typical dose
  1-4 g dried root or equivalent extract daily. Pair with diet, HCl/enzymes, bile
  flow support, probiotics for compounded effect.
notes_for_client: A traditional herb that binds bowel toxins so they leave through
  stool instead of reaching the skin. About 80% of psoriasis patients improve substantially
  when this is added to a gut-healing protocol.
