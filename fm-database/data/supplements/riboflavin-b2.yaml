notes_for_coach: Riboflavin-5-phosphate (R5P) is the active form preferred in FM.
  Key cofactor for MTHFR (folate activation), MAOA (monoamine oxidation), and glutathione
  recycling (GPX). Lynch recommends 20 mg daily for MTHFR support; 400 mg for slow
  MAOA and migraines. Hypothyroidism impairs B2 activation — check thyroid if supplementation
  seems ineffective.
notes_for_client: A B vitamin that helps your body convert folate into its usable
  form, supports mood regulation, and helps recycle your antioxidant defences. Urine
  will turn bright yellow — this is harmless.
