notes_for_coach: Particularly relevant for C677T homozygotes (677TT genotype). Riboflavin
  is the FAD cofactor for the MTHFR enzyme; supplementation may help stabilise enzyme
  activity and has evidence for blood pressure reduction in 677TT individuals. Exact
  dose should be confirmed with a clinician — 'low-dose' in the literature typically
  refers to 1.6–2 mg/day riboflavin, though clinical protocols vary. Best absorbed
  with food.
notes_for_client: Riboflavin (vitamin B2) is an important supporting nutrient for
  the MTHFR enzyme — especially if you have two copies of the C677T variant. It may
  also help support healthy blood pressure.
