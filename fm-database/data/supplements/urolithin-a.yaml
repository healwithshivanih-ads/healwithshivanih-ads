notes_for_coach: 'Catalogue stub — coach-requested 2026-05-20; enrich with
  peer-reviewed citations via the catalogue queue before front-lining. Urolithin A
  is a postbiotic — a gut-microbiome metabolite of ellagitannins (pomegranate,
  walnuts, berries). Not everyone produces it endogenously, which is the rationale
  for a direct supplement. Mechanism: it stimulates mitophagy (clearance of damaged
  mitochondria), which supports mitochondrial function, biogenesis and skeletal
  muscle quality. Emerging human RCT evidence for muscle strength and endurance in
  middle-aged and older adults; evidence for broader functional-medicine outcomes
  is still building, hence evidence_tier plausible_emerging. Studied doses are
  typically 500 mg or 1000 mg once daily. Reference branded form is Mitopure
  (Amazentis). Consider for clients with a fatigue / low-energy / muscle-decline
  picture AFTER the bigger levers are addressed — it is a refinement, not a
  first-line lever. No protein/purine load, so no uric-acid or kidney concern.
  Affiliate link to be added via the catalogue queue.'
