notes_for_coach: 'Most effective form: fluid extract of FRESH AERIAL portion of E.
  purpurea

  (1:1) 2-4 ml three times daily, OR juice stabilised in 22% ethanol. Dried

  root preparations are less effective. Best taken at FIRST sign of symptoms;

  continue 7-10 days. Mixed clinical trial results largely due to insufficient

  quantity of active compounds (alkamides) in many commercial products.

  '
notes_for_client: 'Echinacea works best when started at the first sign of a cold or
  sore throat —

  not after symptoms have set in. Use a quality liquid extract from FRESH plant

  material (not dried). Take 3 times daily for 7-10 days. The slight tingling

  on the tongue is a good sign the product is potent.

  '
