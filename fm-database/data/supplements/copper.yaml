notes_for_coach: Copper is the primary cofactor for DAO enzyme activity. Lynch notes
  most people get enough from food but long-term zinc supplementation can deplete
  copper. Start with low dose (1 mg) and only if copper is not already present in
  a multivitamin. Excess copper is inflammatory — check copper levels via lab before
  supplementing. Do not supplement if copper toxicity is suspected (e.g., Wilson's
  disease).
notes_for_client: Your histamine-clearing enzyme needs copper to work. Most people
  get enough from food — only consider supplementing if you've been taking zinc for
  a long time.
