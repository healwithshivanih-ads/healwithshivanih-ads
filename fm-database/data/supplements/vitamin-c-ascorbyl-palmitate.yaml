notes_for_coach: 'Ascorbyl palmitate is a fat-soluble, hypoallergenic form of vitamin
  C —

  preferred over corn-derived ascorbic acid in MCAS/HIT populations

  sensitive to corn excipients. Vitamin C is a DAO cofactor and supports

  histamine degradation; it also directly inhibits mast cell histamine

  release. Buffered (sodium/magnesium ascorbate) forms are an alternative if

  ascorbyl palmitate is unavailable. Doses above 2 g/day may cause loose

  stools in sensitive individuals.

  '
