notes_for_coach: 'Latin: Rubia cordifolia; Rubiaceae. Sanskrit: Manjishta. Traditional indications: amenorrhea,
  dysmenorrhea, menorrhagia, menopause, bleeding disorders, kidney or bladder stones, gall stones, jaundice,
  hepatitis, diarrhea, dysentery, broken bones, traumatic injuries, cancer, heart disease, skin problems,
  dropsy, rickets, paralysis, herpes. Precautions: severe chills, high Vata. Ayurvedic energetics from
  The Yoga of Herbs (Frawley & Lad).'
