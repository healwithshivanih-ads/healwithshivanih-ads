notes_for_coach: Fungal-source DPP-IV targets both gliadin and casein; resistant to
  breakdown by other digestive enzymes. Recommended to safeguard against hidden gluten.
  Not a replacement for gluten-free diet — use as adjunct protection, especially when
  eating out.
notes_for_client: DPP-IV enzyme taken with each meal provides a layer of protection
  against accidental gluten exposure. It's not a free pass to eat gluten.
