notes_for_coach: An alternative to methylcobalamin; preferred for clients who are
  sensitive to methyl donors, as hydroxocobalamin is a non-methyl B12 form that the
  body can convert as needed. Avoids the methyl-donor loading effect of methylcobalamin.
notes_for_client: Hydroxocobalamin is a form of B12 that's gentle on the system —
  it's a good option if you find you're sensitive to methyl donors or react to methylcobalamin.
