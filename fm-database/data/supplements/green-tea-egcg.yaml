notes_for_coach: Green tea (specifically EGCG) has aromatase-inhibiting activity and
  may help reduce estrogen dominance. Can be recommended as a dietary/beverage strategy.
  Caffeinated varieties should be moderated in anxious or perimenopausal women.
notes_for_client: Drinking green tea or taking a green tea extract may help your body
  keep estrogen levels balanced by naturally slowing excess estrogen production.
