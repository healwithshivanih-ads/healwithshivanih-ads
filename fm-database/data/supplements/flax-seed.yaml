slug: flax-seed
display_name: Flax Seeds (ground)
category: other
forms_available:
  - whole_food
  - powder
typical_dose_range:
  whole_food:
    min: 1
    max: 2
    unit: tablespoons
  powder:
    min: 1
    max: 2
    unit: tablespoons
timing_options:
  - with_breakfast
  - mid_morning
  - mid_afternoon
take_with_food: optional
contraindications:
  conditions:
    - severe_dysphagia
    - bowel_obstruction
  medications: []
  life_stages:
    - pregnancy_first_trimester
interactions:
  with_supplements: []
  with_foods: []
  with_medications:
    - medication: oral_hormone_therapy
      type: space_by_hours
      reason: |
        Lignans in flax may modestly bind/clear estrogen via the
        estrobolome; space oral HRT by ≥2 hours.
    - medication: warfarin_or_anticoagulants
      type: avoid_together
      reason: |
        Omega-3 ALA + lignan content may increase bleeding risk with
        anticoagulants. Defer to clinician.
linked_to_topics:
  - microbiome
  - dysbiosis
  - perimenopause
  - estrobolome
linked_to_mechanisms:
  - lignan-estrogen-modulation
  - soluble-fiber-fermentation
  - scfa-production
linked_to_claims:
  - flax-and-chia-combo-gentle-constipation-support
notes_for_coach: |
  GROUND flax (not whole seeds — they pass through) for lignan and
  omega-3 ALA bioavailability. Strong source of phytoestrogens (lignans)
  that modulate the estrobolome — relevant for perimenopause / estrogen
  balance work. Refrigerate ground flax (oxidizes quickly). Pair with
  adequate water.
notes_for_client: |
  Use 1-2 tablespoons of GROUND flax daily — sprinkle on yogurt,
  oatmeal, or smoothies. Keep it in the fridge once ground.
sources:
