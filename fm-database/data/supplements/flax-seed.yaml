notes_for_coach: 1–2 tbsp/day ground flax. Lignans act as weak phytoestrogens competing at estrogen receptors and increasing
  SHBG. Avoid in high-histamine patients without tolerance testing.
notes_for_client: Ground flaxseed provides fiber and plant compounds that gently regulate estrogen activity — especially helpful
  during perimenopause.
