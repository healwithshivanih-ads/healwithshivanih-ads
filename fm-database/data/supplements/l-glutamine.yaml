notes_for_coach: Primary fuel for small intestinal enterocytes where DAO enzyme resides.
  Lynch recommends starting at 1 g and titrating up. Can increase irritability in
  some — if this occurs, pause and take magnesium, B6, and niacin for a few days before
  resuming. More effective when combined with aloe vera, zinc carnosine, and marshmallow
  root. Use after pathogen load is reduced.
notes_for_client: An amino acid that feeds and repairs the cells lining your small
  intestine, helping your histamine-clearing enzyme work better. Start with a small
  amount — some people feel more irritable initially.
