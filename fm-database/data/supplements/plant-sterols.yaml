notes_for_coach: Effective dose is ~2g/day with meals. Well-supported by RCTs and
  recognized in ACC/AHA guidelines. Most effective when taken with the highest-cholesterol
  meals. May slightly reduce fat-soluble vitamin absorption.
notes_for_client: Plant sterols work like cholesterol blockers in your gut — they
  help prevent cholesterol from being absorbed, which lowers your LDL levels. Take
  them with meals.
evidence_tier: strong
