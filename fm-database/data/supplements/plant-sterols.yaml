notes_for_coach: 3g/day associated with 12% reduction in total cholesterol. Hard to
  achieve therapeutic dose from food alone without supplementation, though Mediterranean
  diet foods contain meaningful amounts.
notes_for_client: Plant sterols are natural compounds found in plant foods that help
  block cholesterol absorption. At 3 grams per day, they can reduce total cholesterol
  by about 12%. They are found in nuts, seeds, and vegetable oils.
