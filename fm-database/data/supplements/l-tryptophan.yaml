notes_for_coach: >-
  L-tryptophan is an upstream serotonin precursor (one step before 5-HTP).
  Same serotonin-syndrome risk as 5-HTP when combined with SSRIs / SNRIs /
  MAOIs / tramadol / triptans / dextromethorphan / linezolid / lithium.
  Historical EMS (eosinophilia-myalgia syndrome) outbreak in 1989 was linked
  to a contaminated supplier — pharmaceutical-grade product is considered
  safe now, but anyone with personal or family history of EMS should avoid.
  Typically dosed 500-2000 mg at bedtime for sleep/mood support; up to 3 g
  in clinical contexts. Clinician oversight strongly recommended.
