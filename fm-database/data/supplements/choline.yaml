notes_for_coach: 'Choline enables the ''Betaine Shortcut'' for homocysteine remethylation
  when methylfolate/methylcobalamin are insufficient. Particularly important for vegans
  and vegetarians who are at high risk of deficiency. Food sources: eggs, red meat,
  poultry, fish, liver, organ meats. Cannot fully replace primary methylation cycle
  long-term.'
notes_for_client: Choline provides a backup route for your methylation cycle when
  folate and B12 are running low. It's most abundant in eggs, meat, and organ meats.
  Vegans and vegetarians particularly benefit from supplementing.
