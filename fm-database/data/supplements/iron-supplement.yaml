notes_for_coach: Iron supplementation must be guided by lab results (serum iron, ferritin,
  TIBC). Low stomach acid impairs iron absorption. Constipating forms (ferrous sulfate)
  should be avoided; consider bisglycinate forms. Confirm with clinician before recommending.
notes_for_client: Iron is critical for energy and oxygen delivery. If you have low
  stomach acid, you may not absorb iron even from a healthy diet. Testing is important
  before supplementing.
