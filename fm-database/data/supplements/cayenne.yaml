notes_for_coach: Whole cayenne / red pepper (Capsicum spp.). A pungent, heating circulatory and digestive
  stimulant — strong dispeller of cold, kindles agni, and enhances the action of other herbs. Best for
  vata/kapha; aggravates pitta. The topical pain-relief product is catalogued separately as 'capsaicin-topical'.
  Ayurvedic energetics from The Yoga of Herbs (Frawley & Lad).
