notes_for_coach: Dr. Davis emphasizes that BOTH EPA and DHA are needed for vaginal
  microbiome and reproductive benefits—EPA-only pharmaceutical preparations are insufficient.
  Therapeutic dose is 3,000–4,000+ mg combined EPA+DHA daily. This is a food-component
  restoration, not a pharmacological intervention. Benefits include cardiovascular
  protection, cognitive preservation (DHA), and vaginal microbiome modulation.
notes_for_client: Fish oil (EPA + DHA combined) at higher doses (around 3–4 grams
  per day) has been shown to support vaginal health, reduce the risk of premature
  labor, protect the heart, and preserve brain function. Both EPA and DHA are needed—don't
  use EPA-only products for these benefits. Take with food.
