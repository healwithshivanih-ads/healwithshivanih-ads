notes_for_coach: 'Latin: Artemesia vulgaris; Compositae. Sanskrit: Nagadamani. Traditional indications:
  dysmenorrhea, menorrhagia, infertility, preventive for miscarriage, sciatica, convulsions, hysteria,
  epilepsy, depression, mental exhaustion, insomnia, gout, rheumatism, fungal infections. Precautions:
  high Pitta, uterine infection or inflammation. Ayurvedic energetics from The Yoga of Herbs (Frawley
  & Lad).'
