notes_for_coach: |
  Liv Bio's Dialor Plus — modern functional medicine blood-sugar support
  formulation distributed via VitaOne and FM Nutrition. Capsule/tablet form,
  NOT a traditional Ayurvedic churan / powder — do NOT describe it as a
  churan in client-facing materials.

  VERIFIED ingredient panel per tablet (extracted from the VitaOne product
  page 2026-07-04): berberine HCl 500 mg; fenugreek extract 150 mg; Gymnema
  sylvestre extract 150 mg; cinnamon extract 150 mg; alpha-lipoic acid
  100 mg; chromium picolinate 200 mcg. Suggested-use frequency is not
  printed on the label — dose within the range below at coach discretion.

  Useful for insulin-resistance and pre-diabetic pictures alongside dietary
  intervention. CONFIRM WITH CLINICIAN if client is on hypoglycaemic
  medication — berberine, chromium, cinnamon, and ALA all have independent
  glucose-lowering action, so the combination has additive risk.

  Product pages: https://vitaone.in/products/liv-bio-s-dialor-plus-124?ref=vita13720sh
  (SKU ODOO-124) and https://fmnutrition.in/product/liv-bio-dialor-plus/
