notes_for_coach: "The PSK (polysaccharide-K) extract from Trametes versicolor is
  a licensed adjuvant cancer treatment in Japan (Krestin). Meta-analysis of 13 trials
  (n=2,587): 9% absolute improvement in 5-year overall survival. No known herb-drug
  interactions — one of the safest botanical adjuvants in oncology. The Japanese
  pharmaceutical PSK is not available as a retail supplement; the closest equivalents
  are Host Defense Turkey Tail (Paul Stamets / Fungi Perfecti, hot-water + alcohol
  dual extract, third-party tested) or standardised beta-glucan-content extracts.
  Also has prebiotic effects on gut microbiome (increases Bifidobacterium and
  Lactobacillus). Do not confuse with mycelium-only products — fruiting body preferred
  for polysaccharide content. Indian availability: iHerb import (Host Defense or
  NOW Foods)."
notes_for_client: Turkey tail is a well-researched medicinal mushroom used as a
  supportive therapy alongside cancer treatment. It works with your immune system
  and has shown meaningful benefits in clinical studies. Take with meals.
