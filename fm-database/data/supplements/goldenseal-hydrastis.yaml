notes_for_coach: Berberine-containing herb (also yields hydrastine). Pizzorno uses
  Hydrastis in psoriasis specifically to inhibit bacterial decarboxylase enzymes that
  convert dietary amino acids into polyamines (putrescine, spermidine, cadaverine),
  reducing skin polyamine load. Also broad antimicrobial against H. pylori, SIBO pathogens,
  Candida. Typical extract dose 250-500 mg standardised to 5-10% berberine, BID-TID
  with meals. Caution — bitter; mucous-membrane irritant at high doses; not for chronic
  long-term use.
notes_for_client: A traditional berberine herb that quiets gut bacteria responsible
  for producing skin-irritating toxins. Used in 4-8 week courses, not long term. Bitter;
  capsules preferred over tincture.
