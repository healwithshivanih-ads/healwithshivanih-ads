notes_for_coach: 1 tablespoon daily reduces systolic and diastolic BP by up to 9 mm
  Hg. Cost-effective alternative to fish oil; requires concurrent reduction in saturated
  and omega-6 fats. Each 1% increase in body alpha-linolenic acid reduces mean BP
  ~5 mm Hg.
notes_for_client: Flaxseed oil (1 tablespoon a day) is a budget-friendly way to get
  blood-pressure-lowering omega-3s. Add to smoothies or drizzle over salads — don't
  heat it.
