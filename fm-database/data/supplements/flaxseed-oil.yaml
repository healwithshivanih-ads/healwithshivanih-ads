notes_for_coach: Prescribe flaxseed oil (10g/day) alongside fish oil or algae EPA/DHA
  for a combined omega-3 strategy. ALA from flaxseed is not efficiently converted
  to EPA/DHA in all patients due to genetic variation in delta-5 desaturase. Do not
  rely on flaxseed oil alone for anti-inflammatory purposes in patients needing therapeutic
  EPA/DHA levels.
notes_for_client: Flaxseed oil is an affordable, plant-based omega-3 source. Two tablespoons
  a day alongside your omega-3 capsule rapidly increases your omega-3 intake. Keep
  refrigerated and use fresh.
