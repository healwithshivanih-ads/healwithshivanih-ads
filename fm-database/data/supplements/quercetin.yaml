notes_for_coach: 'Quercetin is a bioflavonoid with three coach-relevant roles.
  (1) Mast cell stabiliser — inhibits degranulation and the histidine-to-histamine
  conversion; this is its strongest evidence base. (2) Anti-inflammatory — inhibits
  NF-kB signalling and lowers inflammatory cytokines; relevant where hsCRP is
  elevated. (3) Cardiometabolic — mild antihypertensive and endothelial support,
  and it inhibits xanthine oxidase so it modestly lowers serum uric acid (useful
  when uric acid runs high). Bioavailability is poor in standard form — liposomal
  or phytosome preparations (e.g. quercetin-bromelain combos) are markedly better
  absorbed. Typical clinical dose 500-1000 mg two to three times daily with food;
  onset is gradual (2-4 weeks for full effect). CAUTION — quercetin has mild
  antiplatelet activity; review before use in any client with a bleeding tendency,
  recent epistaxis, or on blood thinners.'
