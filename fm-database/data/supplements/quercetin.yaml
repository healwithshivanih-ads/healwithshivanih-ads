take_with_food: required
notes_for_coach: 'Quercetin is a bioflavonoid mast cell stabilizer that inhibits degranulation

  and the conversion of histidine to histamine. Bioavailability is poor in

  standard form — liposomal or phytosome (e.g., quercetin-bromelain combos)

  preparations are markedly better absorbed. Typical clinical dose is

  500-1000 mg two to three times daily, taken with food. Onset is gradual

  (2-4 weeks for full effect).

  '
