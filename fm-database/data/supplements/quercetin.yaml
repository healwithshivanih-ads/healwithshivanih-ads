notes_for_coach: |
  Natural flavonoid that stabilizes mast cells by inhibiting degranulation
  and the conversion of histidine to histamine. Typical clinical use is
  500–1000 mg up to twice daily; pair with bromelain for absorption.
  Liposomal forms exist but are not formally a separate "form_available"
  category — note in protocol.
