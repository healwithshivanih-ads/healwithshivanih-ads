notes_for_coach: 'Isothiocyanate from cruciferous vegetables — especially broccoli

  sprouts (highest concentration), broccoli, cauliflower, cabbage, kale.

  Activates Nrf2 pathway, inducing Phase 2 enzymes. Source (Minich

  transcript) names sulforaphane as a Phase 2 inducer but does NOT

  give dosing. Confirm dose from peer-reviewed source before

  supplemental use. Food-first option: 1 tablespoon broccoli sprouts

  daily is a commonly cited culinary dose. Heat-sensitive — raw or

  lightly steamed cruciferous preserve more activity.

  '
