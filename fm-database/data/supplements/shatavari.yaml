notes_for_coach: 'Latin: Asparagus racemosus; Liliaceae. Sanskrit: Shatavari. Traditional indications:
  debility of the female organs, sexual debility, infertility, impotence, menopause, diarrhea, dysentery,
  stomach ulcers, hyperacidity, dehydration, lung abscess, hematemesis, cough, convalescence, cancer,
  herpes, leucorrhea, chronic fevers. Precautions: high Ama, excessive mucus. Ayurvedic energetics from
  The Yoga of Herbs (Frawley & Lad).'
