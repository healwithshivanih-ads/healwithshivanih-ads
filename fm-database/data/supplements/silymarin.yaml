notes_for_coach: 'Source (IFM Fig 3.5) names silymarin as an antioxidant protective

  plant derivative buffering Phase 1 intermediates but does NOT give

  dosing. Silymarin is the standardized flavonoid complex (silybin,

  silydianin, silychristin) from Silybum marianum (milk thistle seed).

  Hepatoprotective via glutathione preservation, membrane stabilization,

  and antioxidant activity. Standardized extracts (typically 70-80%

  silymarin) are preferred; bioavailability is improved with

  phosphatidylcholine-complexed forms (silybin-phytosome).

  '
