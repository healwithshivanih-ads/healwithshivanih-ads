notes_for_coach: 'Universal antioxidant (both water- and fat-soluble); regenerates

  glutathione, vitamin C, and vitamin E; mitochondrial cofactor.

  Source (Minich transcript) names lipoic acid as an endogenous

  antioxidant relevant to detoxification but does NOT give dosing.

  Confirm dose from peer-reviewed source before client use. R-lipoic

  acid is the biologically active isomer; racemic mixtures are common.

  '
