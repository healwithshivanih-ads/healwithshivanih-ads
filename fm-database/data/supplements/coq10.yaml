notes_for_coach: CoQ10 is a key mitochondrial antioxidant and ATP co-factor. Ubiquinol
  form may have better bioavailability, especially in older adults. Fat-soluble —
  always take with food. Dose should be verified with clinician.
notes_for_client: CoQ10 is like fuel for your cell's energy factories (mitochondria).
  It can help reduce fatigue and mental sluggishness. Take it with a meal containing
  some fat for best absorption.
