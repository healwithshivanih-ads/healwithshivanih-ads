notes_for_coach: Fat-soluble — take with a meal. Ubiquinol form preferred for absorption,
  especially in those over 40. Body production declines with age and statin use. Moradi
  et al. 2016 meta-analysis supports modest glycemic benefit in T2D. Defer dosing
  to clinician.
notes_for_client: CoQ10 is a natural antioxidant your body makes for energy production.
  Levels drop with age and with statin medications. It may help improve insulin sensitivity
  and modestly lower blood sugar.
