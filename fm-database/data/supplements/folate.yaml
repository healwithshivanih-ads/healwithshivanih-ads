slug: folate
display_name: Folate (Methylfolate)
category: vitamin
forms_available:
- capsule
- tablet
evidence_tier: plausible_emerging
notes_for_coach: Methylfolate is the active form; preferred over folic acid especially in MTHFR polymorphism. Critical for
  methylation, neurotransmitter synthesis, and myelin integrity. Clinician should assess MTHFR status and B12 levels.
notes_for_client: Folate (especially as methylfolate) helps your brain produce mood-regulating chemicals and supports nervous
  system health. Most people do well with the active methylfolate form.
