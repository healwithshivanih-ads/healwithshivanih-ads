slug: folate
display_name: Folate (Vitamin B9 / Methylfolate)
category: vitamin
forms_available:
- capsule
- tablet
evidence_tier: strong
notes_for_coach: Methylfolate (5-MTHF) is the active form, preferred for those with
  MTHFR variants. Folic acid is synthetic and requires enzymatic conversion. Critical
  in pregnancy for neural tube defect prevention.
notes_for_client: Folate is essential for cell growth, brain health, and a healthy
  pregnancy. Leafy greens and legumes are the best food sources. If you have the MTHFR
  gene variant, methylfolate supplements may work better for you.
timing_options:
- with_breakfast
- morning
take_with_food: optional
