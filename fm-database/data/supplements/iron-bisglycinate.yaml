  quote: Iron-based glycinate, not initially again. Since you are working on calming
    the gut down, iron would not work immediately because the lining itself has gotten
    impacted.
- id: coconote-fm-iron-deficiency-anemia
  location: Supplements / Management section
  quote: There is something that we use particularly is ferrous bisglycinate. The
    advantage of ferrous bisglycinate over the rest is it has a better viability,
    number one. So the absorption is much better inside the body than the ferrous
    fumarate and sulphate.
