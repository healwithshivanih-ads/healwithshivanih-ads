notes_for_coach: Bisglycinate form is gentlest on the gut vs ferrous sulfate. Enhance
  absorption with vitamin C. Avoid taking with tea, coffee, calcium, or phytates.
  Always check ferritin + iron studies + CRP before supplementing — iron overload
  is harmful.
notes_for_client: Iron bisglycinate is much easier on your stomach than standard iron
  supplements. Take it away from tea, coffee, and dairy for best absorption.
