notes_for_coach: Bisglycinate form preferred for tolerability and absorption. Critically,
  iron supplementation should be deferred until gut lining is healing and symptoms
  are improving — absorption will be poor and potentially counterproductive if initiated
  during active gut inflammation. Confirm iron deficiency anaemia with clinician before
  prescribing.
notes_for_client: Iron is best absorbed once your gut is healing. Your practitioner
  will time this carefully so your body can actually take it in.
