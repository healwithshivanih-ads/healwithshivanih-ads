notes_for_coach: Used as a mouth rinse (swish and spit) immediately before and after
  dental amalgam appointment, then swallow 1000mg evening of appointment, twice daily
  for 5 days. Do NOT take within 2 hours of activated charcoal. Adult protocol only.
notes_for_client: Chlorella is a green algae that can bind mercury in your mouth and
  gut, helping prevent it from being absorbed into your body during and after your
  dental appointment.
