notes_for_coach: Average dose 225 mg/day; protocol uses 100 mg b.i.d.–t.i.d. Effect
  takes 4–12 weeks. CoQ10 corrects a metabolic abnormality rather than acting as a
  direct antihypertensive. Fat-soluble — take with meals containing fat. Any drug
  tapering must be supervised by prescribing clinician.
