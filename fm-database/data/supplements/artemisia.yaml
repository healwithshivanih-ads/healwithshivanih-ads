notes_for_coach: Herbal antimicrobial with both anti-inflammatory and antiprotozoal
  action (used against Blastocystis, Giardia, Toxoplasma, Cryptosporidium). Ruscio
  adds it as a second-line agent when an initial herbal antimicrobial protocol under-responds,
  and cites systematic-review evidence for an anti-inflammatory effect in IBD comparable
  to mesalamine. Avoid overuse (antimicrobial resistance); antimicrobial dosing/duration
  is clinician-directed. Dose stub — fill from the treating clinician's product.
