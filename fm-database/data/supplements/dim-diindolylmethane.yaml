notes_for_coach: DIM is a metabolite of indole-3-carbinol from cruciferous vegetables
  that supports phase 1 estrogen metabolism toward less proliferative 2-OH estrogen
  metabolites. Should be added only after gut stabilisation and ideally after hormone
  testing confirms estrogen dominance.
notes_for_client: DIM is a natural compound from cruciferous vegetables that helps
  your body process and clear excess estrogen. Best taken with food.
