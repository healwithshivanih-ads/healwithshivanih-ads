notes_for_coach: Active anti-H. pylori compound is allicin (released when raw garlic
  is crushed/chopped). Standardised supplement — 5,000-10,000 mcg allicin potential
  daily, divided. Whole-food path — 2-3 raw cloves daily (chop, rest 10 min for allicin
  formation, take with food). Caution — bleeding risk before surgery; GI irritation
  in some clients; avoid in severe gastritis flare. Strong odor often a turnoff for
  clients; aged garlic extract is odorless alternative but loses some allicin activity.
notes_for_client: Garlic contains allicin, which fights H. pylori bacteria. Either
  crush 2-3 raw garlic cloves and let rest 10 minutes before eating with food, or
  take a standardised garlic supplement at 5,000-10,000 mcg allicin daily.
