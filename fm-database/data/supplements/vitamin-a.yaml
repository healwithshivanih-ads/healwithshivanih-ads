notes_for_coach: Fat-soluble vitamin; take with fat-containing meals; advise clients
  not to exceed upper limits, especially if pregnant.
notes_for_client: Vitamin A helps your body actually respond to thyroid hormone and
  Vitamin D at the cellular level. You can get it from liver, egg yolks, full-fat
  dairy, and from brightly coloured orange and yellow vegetables. Don't supplement
  high doses without clinician guidance — too much retinol can be harmful.
