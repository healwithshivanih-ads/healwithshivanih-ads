notes_for_coach: 'The universal methyl donor produced by the methylation cycle. Available
  OTC in the US; prescription only in several European countries. Highly context-dependent:
  beneficial for slow COMT under stress load; can cause depression, fatigue, or mood
  destabilization if catecholamines are already adequate or if COMT is fast. Do NOT
  recommend without full picture of client''s COMT status and stress context. Defer
  to clinician.'
notes_for_client: SAMe is produced naturally by your own methylation cycle. It CAN
  be taken as a supplement but has powerful and sometimes unpredictable effects depending
  on your COMT gene type and stress levels. Please work with your clinician before
  trying it.
evidence_tier: strong
contraindications:
  conditions:
  - bipolar disorder (can trigger mania)
  - active manic episode
  medications:
  - MAOIs (serotonin syndrome risk)
  - SSRIs (clinician-supervised only)
  - L-DOPA (Parkinson's medication interaction)
  life_stages:
  - pregnancy (limited data; consult clinician)
