notes_for_coach: 'Latin: Sesamum indicum; Pedaliaceae. Sanskrit: Tila. Traditional indications: chronic
  cough, weak lungs, chronic constipation, hemorrhoids, dysentery, amenorrhea, dysmenorrhea, receding
  gums, tooth decay, hair loss, weak bones, osteoporosis, emaciation, convalescence. Precautions: obesity,
  high Pitta. Ayurvedic energetics from The Yoga of Herbs (Frawley & Lad).'
