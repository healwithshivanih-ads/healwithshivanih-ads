notes_for_coach: The preferred ratio cited is 5,000 IU D3 with 200 mcg K2. This combination
  is ideal for most supplementation protocols as it provides both calcium absorption
  support (D3) and calcium direction to bone (K2). Always recommend with fat-containing
  food. Clinician guidance needed for dose adjustment based on blood levels.
notes_for_client: A combined D3+K2 supplement gives you both vitamins in one — helping
  your body absorb calcium AND put it in the right place (your bones, not your arteries).
