notes_for_coach: 'Latin: Bambusa arundinaceae; Graminaceae. Sanskrit: Vamsha-rochana. Traditional indications:
  colds, cough, fever, asthma, bleeding disorders, emaciation, debility, dehydration, palpitation, vomiting,
  consumption. Precautions: may increase congestion if not balanced with pungent herbs like ginger and
  pippali. Ayurvedic energetics from The Yoga of Herbs (Frawley & Lad).'
