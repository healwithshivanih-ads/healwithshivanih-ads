notes_for_coach: An 8-week RCT using 1g BID (2g/day) showed significant decreases in TSH and anti-TPO antibodies and increase
  in T3 vs. placebo. A separate human study showed improvement in oxidative stress markers, LDL-C, triglycerides, and HDL
  in AITD patients. Source document references an RCT, supporting plausible_emerging tier. Coaches can discuss food-form use;
  supplemental dosing should be verified with clinician.
notes_for_client: Black cumin seed has been studied in small trials for Hashimoto's and showed promising results for lowering
  thyroid antibodies and improving oxidative stress. It can be used as a spice in cooking or taken in capsule form.
evidence_tier: plausible_emerging
