notes_for_coach: DHEA is a precursor hormone — it can convert downstream to both testosterone
  and estrogen. Do NOT recommend in perimenopausal women with existing estrogen dominance
  or elevated estrogen, as it will worsen the condition. Requires clinician guidance
  and lab monitoring. Normal DHEA-S reference range cited as 150-390 µg/dL in the
  document.
notes_for_client: DHEA is a building-block hormone your body uses to make other hormones.
  However, it's not appropriate for everyone — especially if your estrogen is already
  high. Always check with your doctor before taking DHEA.
