notes_for_coach: B6 (pyridoxine) is depleted by loop diuretics. B12 is depleted by
  metformin. Both B6 and B12 are critical cofactors in homocysteine metabolism. Included
  in the beta blocker tapering support protocol. B12 monitoring is especially important
  in long-term metformin users.
notes_for_client: Vitamins B6 and B12 help keep homocysteine levels healthy, which
  is important for your heart. Metformin and some water pills can deplete these vitamins.
  Best taken with breakfast.
