notes_for_coach: 'Latin: Coriandrum sativum; Umbelliferae. Sanskrit: Dhanyaka. Traditional indications:
  burning urethra, cystitis, urinary tract infection, urticaria, rash, burns, sore throat, vomiting, indigestion,
  allergies, hay fever. Precautions: few, except high Vata with nerve tissue deficiency. Ayurvedic energetics
  from The Yoga of Herbs (Frawley & Lad).'
