notes_for_coach: Despite being acidic in taste, lemon is high in alkaline minerals
  (sodium, potassium, magnesium, calcium, iron) and has an alkalising effect once
  metabolised. Use lemon juice in place of vinegar where appropriate. Best consumed
  away from tooth enamel contact.
notes_for_client: Lemon juice is acid where it needs to be (in the stomach) and alkaline
  where it counts (in your tissues). Try squeezing fresh lemon in warm water each
  morning.
