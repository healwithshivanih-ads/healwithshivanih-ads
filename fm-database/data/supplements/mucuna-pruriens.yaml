notes_for_coach: 'Mucuna seed (Kapikacchu) is a naturally L-DOPA-rich (levodopa) bean —
  the dopaminergic action underlies its use for Parkinson''s, motivation/mood, libido,
  and lowering prolactin. Standardise to L-DOPA content and start low. Ayurvedic energetics
  + traditional indications (general/sexual/nervous debility, infertility, asthma, paralysis,
  Parkinson''s) from The Yoga of Herbs (Frawley & Lad); precaution: menstrual bleeding /
  menorrhagia. Because of the L-DOPA content, treat drug interactions as real — see
  contraindications; a clinician must manage co-use with Parkinson''s medication.'
notes_for_client: Mucuna (kaunch) is a traditional tonic bean used to support steady energy,
  mood and vitality.
contraindications:
  conditions:
  - heavy menstrual bleeding / menorrhagia (Yoga of Herbs precaution)
  - active psychosis or on dopamine-blocking antipsychotics (dopaminergic)
  - melanoma (levodopa caution)
  medications:
  - levodopa / carbidopa — additive dopaminergic effect; dose must be managed by a clinician
  - MAO inhibitors — risk of hypertensive / serotonergic reaction
  - dopamine antagonists / antipsychotics (e.g. metoclopramide, haloperidol) — opposing action
  - antihypertensive drugs — may add to blood-pressure lowering
  life_stages:
  - pregnancy
  - lactation
