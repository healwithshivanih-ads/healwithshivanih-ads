notes_for_coach: 'Dose: 240 mg b.i.d. before meals. Bismuth subcitrate (not subsalicylate)
  produces best results vs. H. pylori. Available via compounding pharmacies. May darken
  tongue/stool — harmless. Do NOT use bismuth subsalicylate in children with viral
  illness (Reye''s syndrome risk). Lower resistance risk than antibiotics.'
notes_for_client: Bismuth is a natural mineral that can help fight H. pylori bacteria
  in your stomach. It may temporarily turn your stool or tongue dark — this is harmless.
