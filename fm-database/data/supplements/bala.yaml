notes_for_coach: 'Latin: Sida cordifolia; Malvaceae. Sanskrit: Bala (what gives strength — owing to its
  strong tonic properties). Traditional indications: heart disease, facial paralysis, sciatica, insanity,
  neuralgia, rheumatism, asthma, emaciation, exhaustion, sexual debility, cystitis, dysentery, leucorrhea,
  chronic fevers, convalescence. Precautions: few; congestive disorders of high Ama or Kapha. Ayurvedic
  energetics from The Yoga of Herbs (Frawley & Lad).'
