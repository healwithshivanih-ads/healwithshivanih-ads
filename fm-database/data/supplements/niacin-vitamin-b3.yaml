notes_for_coach: Max 2g/day recommended by this clinician. Contraindicated in active
  gout, active peptic ulcer disease, and liver disease. Give with baby aspirin if
  patient is already taking it to reduce flushing. Avoid with alcohol. Start low and
  go slow. Monitor blood sugar in diabetic patients.
notes_for_client: Niacin (a B vitamin) can raise your HDL ('good cholesterol') and
  lower triglycerides. Always take with food and do not exceed doses your doctor recommends.
  Flushing (warmth/redness) is a common side effect that often reduces over time.
