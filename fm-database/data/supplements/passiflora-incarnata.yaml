notes_for_coach: Mild anxiolytic-sedative herb. Pizzorno lists Passiflora among botanicals
  with sedative properties for insomnia. Typical dose 200-400 mg standardised extract
  or 1-2 g dried herb as tea before bed. Often combined with valerian, hops, or lemon
  balm. Generally well-tolerated; mild GI upset, drowsiness. Caution with sedatives,
  alcohol, MAOIs.
notes_for_client: A traditional calming herb used as a tea or capsule before bed to
  ease anxiety-driven insomnia.
