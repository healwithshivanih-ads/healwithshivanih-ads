notes_for_coach: 'Calming herb with mild anxiolytic and sleep-onset support effects;

  GABA-pathway mechanism. Source (Menolascino transcript) lists

  passionflower among evidence-supported natural sleep aids but does

  NOT give dosing. Confirm dose from peer-reviewed source before

  client use. Standardized extracts and tincture forms are most

  commonly studied. Often used in combination formulas with lemon

  balm, lavender, and magnesium for evening parasympathetic support.

  '
