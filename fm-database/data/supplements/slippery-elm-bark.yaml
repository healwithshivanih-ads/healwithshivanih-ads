notes_for_coach: Document describes up to hourly use for acute IBD flare (diarrhoea
  10x/day), reducing to 4x/day as symptoms settle. This is a practitioner-supervised
  case; coach should recommend starting lower and referring if symptoms do not improve.
  Dose range and frequency should be confirmed with a clinician for IBD presentations.
notes_for_client: Slippery elm is the powdered bark of the slippery elm tree. It coats
  and soothes an inflamed gut lining. It can be mixed into water or a smoothie. Start
  with once or twice daily and increase only under guidance if symptoms are severe.
