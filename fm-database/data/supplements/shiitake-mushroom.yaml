notes_for_coach: 'Shiitake contains lentinan — a β-(1,3)-glucan with β-(1,6) branches,
  well-studied adjunct in Japanese oncology (intravenous formulation approved for
  gastric cancer). Dietary shiitake (whole food, 5–10 g/day dried) is a sensible food-first
  option before extract. Eritadenine, a separate compound, has modest cholesterol-lowering
  effects. Caution: shiitake dermatitis (flagellate erythema) from raw or undercooked
  mushrooms — always cook thoroughly.'
notes_for_client: Shiitake is a traditional Asian medicinal mushroom rich in immune-training
  β-glucans. Eat it cooked — raw shiitake can cause a temporary skin rash in some
  people.
