evidence_tier: plausible_emerging
notes_for_coach: Carnitine is depleted by statins and is essential for fatty acid
  transport into mitochondria for energy production, including in cardiac muscle.
  Listed in both the statin nutrient depletion table and beta blocker tapering protocol.
notes_for_client: L-carnitine helps your body use fat for energy and supports heart
  muscle function. Statin medications may reduce carnitine levels. Take with a meal.
