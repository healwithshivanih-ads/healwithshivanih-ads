notes_for_coach: 'Berberine is an isoquinoline alkaloid from Berberis aristata, B. vulgaris,

  and goldenseal. Best-studied for blood glucose and gut antimicrobial

  effects; emerging evidence supports mast cell stabilization and

  anti-inflammatory cytokine modulation. Standardized to 97% berberine HCl.

  Typical antimicrobial/glycemic dose is 500 mg three times daily with

  meals. Short courses (8-12 weeks) preferred — long-term high-dose use may

  affect gut microbiome balance and B-vitamin absorption.

  '
