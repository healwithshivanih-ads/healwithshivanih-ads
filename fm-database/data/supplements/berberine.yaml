notes_for_coach: 500 mg twice daily with meals. AMPK activator — do not use alongside
  metformin or other hypoglycaemic agents without clinician oversight. May cause GI
  discomfort initially.
notes_for_client: Berberine is a plant extract that helps your cells use glucose more
  efficiently. Because it can lower blood sugar, it's important to use it with your
  doctor's knowledge if you take any diabetes medication.
