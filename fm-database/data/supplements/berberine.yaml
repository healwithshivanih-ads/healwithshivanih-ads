notes_for_coach: Dr. Davis cautions strongly against long-term berberine use. It is
  an antimicrobial/antifungal agent—not merely a metabolic supplement. Long-term use
  disrupts the microbiome by killing beneficial species including L. crispatus and
  L. reuteri. Use should be short-term (2 weeks max) for targeted fungal overgrowth
  reduction only. Separate timing from probiotic intake. Coaches should NOT recommend
  berberine as a blood sugar or blood pressure supplement.
notes_for_client: Berberine is often marketed for blood sugar and blood pressure,
  but it is actually an antibiotic/antifungal. Taking it long-term can harm the beneficial
  bacteria you are trying to build. If used at all, it should only be for short periods
  under guidance from your health team—and kept away from your probiotic yogurt.
