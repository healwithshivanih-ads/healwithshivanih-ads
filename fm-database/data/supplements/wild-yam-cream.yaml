notes_for_coach: Applied topically morning and night. Contains diosgenin, a plant
  chemical claimed to stimulate the body's progesterone-producing biochemical pathway.
  Evidence for skin conversion to bioactive progesterone in humans is thin — verify
  with clinician before recommending.
notes_for_client: A plant-based cream applied to the skin, traditionally used to support
  the body's natural hormone balance. Always check with your healthcare provider before
  starting.
