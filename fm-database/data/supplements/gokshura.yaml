notes_for_coach: 'Latin: Tribulus terrestris; Zygophyllaceae. Sanskrit: Gokshura, Shvadamstra. Traditional
  indications: difficult or painful urination, edema, kidney or bladder stones, chronic cystitis, nephritis,
  hematuria, gout, rheumatism, lumbago, sciatica, impotence, infertility, seminal debility, venereal diseases,
  cough, dyspnea, hemorrhoids, diabetes. Precautions: dehydration. Ayurvedic energetics from The Yoga
  of Herbs (Frawley & Lad). WHO Vol 4 safety: possible phototoxicity — advise limiting
  excess sun / high-SPF sunscreen while taking; avoid in pregnancy, lactation and children
  under 12; no drug interactions documented.'
