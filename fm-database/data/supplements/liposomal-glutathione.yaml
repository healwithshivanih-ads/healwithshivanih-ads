notes_for_coach: Liposomal delivery bypasses gut degradation of oral glutathione.
  Lynch recommends intermittent use (a few times per week initially, not daily) to
  avoid over-suppression of endogenous glutathione synthesis. Requires adequate selenium
  and riboflavin to regenerate spent glutathione. Also protects NOS3-derived nitric
  oxide from converting to superoxide.
notes_for_client: Glutathione is your body's master antioxidant. The liposomal form
  delivers it directly into your cells. Take a few times a week to start — daily long-term
  is not usually necessary.
