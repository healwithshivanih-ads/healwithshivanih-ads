notes_for_coach: Fat-soluble — take with a meal containing fat. RDA is 600 IU; optimal
  levels often require higher doses guided by 25-OH-D lab values. Clinician involvement
  essential for dosing above RDA.
notes_for_client: Vitamin D is hard to get from food alone, and most people who avoid
  the sun need to supplement. Your doctor can check your blood levels and recommend
  the right dose for you.
