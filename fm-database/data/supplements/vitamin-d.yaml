notes_for_coach: Vitamin D is fat-soluble and should be taken with a meal. Statin
  use is associated with lower vitamin D levels. Testing 25(OH)D before supplementing
  and dosing are clinician decisions.
notes_for_client: Vitamin D supports your immune system, bones, and mood. It can be
  depleted by some medications, including statins.
