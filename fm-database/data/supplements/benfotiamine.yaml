notes_for_coach: 600 mg benfotiamine + 300 mg ALA shown to outperform benfotiamine
  alone for reducing hyperglycaemic damage in T1DM. Raises blood thiamine 120–240%
  vs regular thiamine. Monotherapy for neuropathy results are modest.
notes_for_client: Benfotiamine is a fat-soluble form of vitamin B1 that penetrates
  cells more effectively than regular thiamine, helping to reduce sugar-related nerve
  and kidney damage.
