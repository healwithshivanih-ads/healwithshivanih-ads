notes_for_coach: Used as an accessible alternative to Betaine HCL for mild hypochlorhydria support. Must be diluted in water
  and taken with food — NOT on an empty stomach. Evidence is anecdotal/observational; it is not a substitute for Betaine HCL
  in clinical protocols.
notes_for_client: If using apple cider vinegar to support digestion, always dilute it in a glass of water and take it with
  your meal — not first thing in the morning on an empty stomach.
