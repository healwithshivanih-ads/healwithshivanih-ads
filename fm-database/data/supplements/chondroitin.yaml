notes_for_coach: >-
  Chondroitin sulfate 800-1200 mg/day, typically paired with glucosamine
  sulfate for joint protocols. Modest evidence for reducing OA pain and
  slowing cartilage breakdown. Source matters — bovine (most common) and
  shark cartilage origins; quality varies widely between products. Mild
  anticoagulant effect — coordinate with prescriber if on warfarin or
  antiplatelets. Theoretical concern in active prostate cancer (limited
  data). Generally well-tolerated; effect develops over 8-12 weeks.
