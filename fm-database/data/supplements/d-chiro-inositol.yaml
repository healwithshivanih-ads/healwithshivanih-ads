notes_for_coach: Almost always paired with myo-inositol at a 40:1 ratio (myo:DCI)
  for PCOS. Standalone high-dose DCI can impair oocyte quality — coach should ensure
  the ratio is respected and refer to clinician for fertility-specific dosing. Also
  relevant in insulin resistance protocols.
notes_for_client: D-chiro-inositol works best when paired with myo-inositol at the
  right ratio (40:1 myo to DCI). Most combination products are formulated this way.
