notes_for_coach: Lynch recommends 5 mg lithium orotate (OTC low-dose form, not pharmaceutical
  lithium carbonate) for slow MAOA to calm excess serotonin activity. Slow MAOA patients
  often report benefit; fast MAOA patients report worsening. Inositol and lithium
  act oppositely — if one fails, try the other. Distinguish clearly from prescription
  lithium carbonate (much higher doses, requires serum monitoring).
notes_for_client: A mineral-based supplement at very low doses that can help balance
  serotonin activity. This is a food supplement dose, not the same as prescription
  lithium medication.
