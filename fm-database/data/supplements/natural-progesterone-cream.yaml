notes_for_coach: 'USP bioidentical progesterone (typically 400 mg/oz cream, ~20 mg
  per 1/4 tsp). Cyclic dosing — 1/4 to 1/2 tsp bid days 15-26 for typical estrogen-dominance
  / luteal-phase insufficiency; or days 8-28 for endometriosis with daily continuation;
  week off during menses. Apply to inner arms, chest, inner thighs, palms (thin-skin
  sites for absorption). Coach role: education + cycle tracking; prescription/dosing
  decisions with a clinician trained in BHRT.'
notes_for_client: A natural progesterone cream applied to the skin in the second half
  of your cycle. Helps balance estrogen-dominance symptoms like heavy periods, fibroid
  growth, and PMS.
