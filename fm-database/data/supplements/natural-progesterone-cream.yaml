  location: Uterine Fibroids — Natural Progesterone (pp 942-943)
  quote: Natural progesterone replacement causes fibroid growth to cease (generally
    decrease in size) until menopause, after which fibroids atrophy. Apply 1/4 tsp
    q.d. or b.i.d. for 1 week after menses, and 1/4 to 1/2 tsp b.i.d. for the next
    2 weeks.
