notes_for_coach: Methylfolate (5-MTHF) is the active, bioavailable form of B9. Folic
  acid (synthetic) is NOT the same. Clients with MTHFR variants may not convert folic
  acid adequately. Used alongside B12 and B6 to support homocysteine clearance.
notes_for_client: This is the active form of folate your body can use directly—different
