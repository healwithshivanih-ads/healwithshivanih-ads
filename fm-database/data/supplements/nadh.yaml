notes_for_coach: The reduced active form of NAD+, essential coenzyme for mitochondrial
  ATP production. Pizzorno includes NADH in the CFS supplement stack alongside Mg,
  vitamin E, CoQ10, L-carnitine. Stabilised oral preparation (e.g. ENADA) at 5-10
  mg in the morning on empty stomach. Some patients report meaningful energy improvement;
  effect varies widely. Generally well tolerated.
notes_for_client: A direct cellular-energy nutrient that helps mitochondria make ATP.
  Best taken first thing in the morning on an empty stomach. Some people with CFS
  notice meaningful improvement.
