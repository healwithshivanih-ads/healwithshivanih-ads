notes_for_coach: 'Latin: Jasminum grandiflorum; Oleaceae. Sanskrit: Jati. Traditional indications: emotional
  disturbances, headaches, fever, sunstroke, conjunctivitis, dermatitis, burning urethra, bleeding disorders,
  bacterial or viral infections, cancer of lymph nodes, cancer of bones, Hodgkin''s disease. Precautions:
  severe chills, high Vata. Ayurvedic energetics from The Yoga of Herbs (Frawley & Lad).'
