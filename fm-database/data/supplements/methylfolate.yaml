notes_for_coach: Source book recommends starting very low and increasing slowly. Some
  individuals experience significant mood or anxiety side effects (overmethylation)
  at higher doses. Start with a 'Soak and Scrub' dietary approach before supplementing.
  Dose selection is clinician territory.
notes_for_client: This is the activated form of folate your body can actually use,
  especially if you have an MTHFR variant. Start low — even a very small dose can
  have a big effect. Leafy greens first, supplements second.
