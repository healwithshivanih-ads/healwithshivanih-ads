notes_for_coach: B6 is a cofactor for the transsulfuration pathway converting homocysteine
  to cysteine and ultimately glutathione. Also supports neurotransmitter synthesis.
  Doses above 200mg/day long-term may cause peripheral neuropathy — refer to clinician
  for high-dose protocols.
notes_for_client: Vitamin B6 helps your body process homocysteine through an alternative
  pathway and supports production of your natural antioxidant glutathione.
