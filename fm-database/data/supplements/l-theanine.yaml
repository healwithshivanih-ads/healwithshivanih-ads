notes_for_coach: 'Amino acid found naturally in green tea; promotes GABA-pathway

  calming without sedation. Source (Menolascino transcript) does NOT

  give dosing and mentions L-theanine indirectly through GABA-pathway

  discussion. Confirm dose from a peer-reviewed source before client

  use. Commonly used in the evening parasympathetic-support phase of

  an insomnia protocol. Often paired with magnesium glycinate.

  Generally well-tolerated.

  '
notes_for_client: L-theanine is an amino acid found in green tea that promotes a calm,
  focused state of mind without making you drowsy. It's gentle and can be used during
  the day or before bed.
