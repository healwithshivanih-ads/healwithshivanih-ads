slug: vitamin-b12
display_name: Vitamin B12 (Cobalamin)
category: vitamin
forms_available:
- capsule
- tablet
- liquid
- lozenge
evidence_tier: strong
notes_for_coach: Methylcobalamin form preferred for those with MTHFR variants or high
  homocysteine. Cyanocobalamin is more stable/cost-effective for general use. Sublingual/lozenge
  may improve absorption in those with low stomach acid or intrinsic factor deficiency.
notes_for_client: B12 is mainly found in animal foods. If you're plant-based, older,
  or on certain medications, your levels may be low. A sublingual (under-the-tongue)
  form can help with absorption.
timing_options:
- with_breakfast
- morning
take_with_food: optional
