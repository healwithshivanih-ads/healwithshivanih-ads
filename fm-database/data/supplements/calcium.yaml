notes_for_coach: 'STUB — dose deliberately blank. FM stance is FOOD-FIRST for calcium:

  dairy, sardines/small fish with bones, leafy greens (collards, kale),

  sesame seeds, ragi, almonds. Supplementation routinely is *not* the FM

  default — excess supplemental calcium has been associated with

  cardiovascular concerns in some studies and competes with magnesium

  (most modern populations are magnesium-deficient, not calcium-deficient).

  Supplementation, when needed, is a clinician decision based on bone

  density, dietary intake, and CKD/CV risk profile.


  Vitaone perspective ("Bone Health Beyond Calcium" post): bone health

  needs vitamin D, K2, magnesium, weight-bearing exercise, protein,

  and gut absorption — not just calcium dosing.

  '
notes_for_client: 'Most people get enough calcium from food (dairy, ragi, sesame,
  leafy

  greens, small fish with bones). Bone health depends on vitamin D, K2,

  magnesium, protein, and weight-bearing movement together — not calcium

  alone. Talk to your clinician before starting a calcium supplement.

  '
