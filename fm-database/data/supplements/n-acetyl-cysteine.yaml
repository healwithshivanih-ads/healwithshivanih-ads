notes_for_coach: NAC supplies cysteine, the rate-limiting amino acid for glutathione
  synthesis. However, Lynch explicitly cautions that NAC is a sulfur-containing supplement—in
  clients with microbiome-driven hydrogen sulfide excess or sulfur intolerance, NAC
  can worsen symptoms. Should be used cautiously and monitored. Not appropriate if
  client shows sulfur intolerance signs (rotten-egg body odour, loose stool from cruciferous
  veg). Clinician guidance recommended before initiating.
notes_for_client: NAC is a supplement form of cysteine—the building block your body
  uses to make glutathione. It can be helpful for some people, but it contains sulfur,
  which not everyone tolerates well. Start with food sources of cysteine (eggs, chicken,
  broccoli, onions) and only consider supplementing with guidance from a clinician.
