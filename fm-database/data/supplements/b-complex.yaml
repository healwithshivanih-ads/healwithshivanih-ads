notes_for_coach: 'Source (IFM Fig 3.5) names riboflavin (B2), niacin (B3), pyridoxine

  (B6), folate, and vitamin B12 as Phase 1 cofactors but does NOT

  give dosing. Confirm dose ranges from peer-reviewed source or

  clinical guideline before client use. Methylated forms (methylfolate,

  methylcobalamin, P5P) are often preferred in FM contexts,

  especially for clients with MTHFR or other one-carbon-cycle variants.

  Activated B6 (P5P) was used in the previous client case at 25mg/day.

  Best taken earlier in the day — B vitamins can be mildly stimulating.

  Always check for biotin if testing thyroid or hormone immunoassays,

  as biotin interferes with these labs.

  '
