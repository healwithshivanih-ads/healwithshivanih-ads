notes_for_coach: Whole internal wild yam root (Dioscorea spp.). A sweet, cooling, nutritive rejuvenative
  and antispasmodic traditionally used as a tonic and to support hormonal secretions; related to Vidari-kanda.
  The topical diosgenin product is catalogued separately as 'wild-yam-cream'. Ayurvedic energetics from
  The Yoga of Herbs (Frawley & Lad).
