notes_for_coach: |
  DAO is the enzyme that breaks down dietary histamine in the gut. Taken
  10-15 minutes BEFORE a high-histamine meal, it can blunt histamine-load
  symptoms in clients with confirmed or suspected DAO deficiency.
  Doesn't address root causes (gut healing, copper/B6 cofactor status,
  food sensitivities) — use as a tactical bridge while addressing those.
  Brand: Umbrellux DAO (US) or DAOsin (EU). Limited availability in India;
  often imported. Cost: ₹3000-5000 per bottle. Coach scope:
  educate + recommend; do not advise abandoning low-histamine diet
  reliance on DAO alone.
notes_for_client: |
  This enzyme helps your body break down histamine from food. Take one
  capsule 10-15 minutes before a meal that's likely to be high in
  histamine (aged cheese, leftover meat, fermented foods, wine, etc.).
  Works best when paired with a low-histamine eating pattern overall,
  not as a substitute.
