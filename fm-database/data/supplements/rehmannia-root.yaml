notes_for_coach: 'Latin: Rehmannia glutinosa; Scrophulariaceae. Traditional indications: weak kidneys,
  low back pain, sexual debility, irregular menstruation, cirrhosis, anemia, hair loss, diabetes, senility.
  Precautions: weak digestion, severe congestion or edema; may cause diarrhea without digestion-increasing
  herbs like cinnamon or ginseng. Ayurvedic energetics from The Yoga of Herbs (Frawley & Lad).'
