notes_for_coach: Always combine D3 with K2 (MK-7 form, 100–200mcg) to prevent vascular
  calcification. Take with the largest fat-containing meal. Standard coaching doses
  1000–5000 IU; HIGH doses (30,000+ IU) in psoriasis/autoimmunity are clinician-only
  (Coimbra Protocol).
notes_for_client: Vitamin D3 and K2 work together — D3 for immune function, K2 to
  direct calcium to bones and away from arteries. Take with your largest meal of the
  day.
