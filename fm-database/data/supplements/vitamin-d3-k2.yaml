notes_for_coach: Even when vitamin D levels appear 'normal' on standard ranges, higher-dose
  D3 has been researched for autoimmune/psoriatic conditions. K2 is co-administered
  to direct calcium appropriately. High-dose D3 (above 4000 IU) should be supervised
  by a clinician with monitoring of serum 25(OH)D.
notes_for_client: Vitamin D3 supports your immune system and skin health. K2 works
  with D3 to direct calcium where it belongs. Take with a fat-containing meal.
