notes_for_coach: Start at 400 mcg and titrate slowly (Pulse Method). Anxiety, irritability,
  runny nose, joint pain, or insomnia at any dose = too much — stop and take 50 mg
  niacin to clear. Folic acid in the diet or supplements will compete with and block
  receptors; ensure client avoids synthetic folic acid. Must have adequate B12 or
  methylfolate becomes 'trapped'. L-methylfolate (6S form) is the active isomer —
  verify product label specifies this.
notes_for_client: This is the activated form of folate your body can actually use.
  Start with a small amount and increase slowly — more is not better, and too much
  can feel worse than too little. Stop if you feel anxious, wired, or irritable.
