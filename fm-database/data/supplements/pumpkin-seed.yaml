notes_for_coach: "Rich in zinc (cofactor for FSH/LH synthesis), magnesium, beta-sitosterol\n\
  (anti-androgenic), and omega-6/omega-3 essential fatty acids. Used in\nthe follicular\
  \ phase of seed cycling (days 1\u201314) alongside flaxseed.\nBest ground fresh\
  \ \u2014 store in fridge to prevent rancidity of unsaturated fats.\n"
notes_for_client: "1 tablespoon of ground pumpkin seeds daily during days 1\u2013\
  14 of your cycle\n(counting day 1 as the first day of bleeding). Can be sprinkled\
  \ on\nbreakfast, salads, or curd.\n"
