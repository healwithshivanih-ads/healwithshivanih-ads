notes_for_coach: "2 cups daily (steep 2 tsp organic dried spearmint leaf in 1 cup
  boiling water, 10 minutes) has anti-androgenic properties in PCOS and hirsutism.
  Grant 2010 RCT + second clinical trial show significant reduction in free testosterone
  and LH, improved FSH and hirsutism scores. Evidence is preliminary (small trials)
  but benefit:risk ratio is excellent — safe, inexpensive, accessible. NOT peppermint
  (Mentha piperita) — confirm client is using spearmint (Mentha spicata) specifically.
  India: loose-leaf spearmint available from health food stores, organic brands (Organic
  India has spearmint tea bags). Minimum 3 months for hirsutism improvement."
notes_for_client: Spearmint tea — 2 cups a day — helps calm the testosterone-related
  symptoms of PCOS including excess hair and skin changes. It's gentle, safe, and
  can be taken alongside any other supplements in your plan.
