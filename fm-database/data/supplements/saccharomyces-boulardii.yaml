notes_for_coach: Beneficial yeast resistant to antibiotic killing — useful during
  and after antibiotic treatment. Lynch recommends taking 1 hour after antimicrobials,
  using for 3–6 months then stopping. Restart only if antibiotics are required again
  or gut reinfection suspected. Use after pathogen-elimination phase, before restoring
  Lactobacillus probiotics.
notes_for_client: A friendly yeast that helps crowd out harmful gut bacteria. Unlike
  regular probiotics, it is not killed by antibiotics, making it useful to take during
  antibiotic courses.
