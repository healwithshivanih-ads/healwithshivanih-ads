  conjugating substrate and endogenous antioxidant but does NOT give

  dosing. Do not recommend doses from this entry alone — confirm dose

  range from a peer-reviewed source or clinical guideline before client

  use. Common forms include liposomal liquid, S-acetyl glutathione,

  and sublingual; oral reduced GSH absorption is debated. Often

  preferred as N-acetylcysteine (NAC) precursor for systemic GSH

  support — see NAC entry.

