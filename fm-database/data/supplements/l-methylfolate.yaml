notes_for_coach: Discuss with clients that this is the active, pre-converted form
  of folate that bypasses the MTHFR conversion step. Emphasize starting low — some
  individuals experience anxiety, irritability, or insomnia at higher doses. Dose
  selection and escalation should be clinician-guided.
notes_for_client: L-methylfolate is a form of folate your body can use directly, without
  needing the MTHFR enzyme to convert it. Some people start with a lower dose and
  increase slowly because higher amounts can cause side effects like anxiety or sleep
  issues in sensitive individuals.
