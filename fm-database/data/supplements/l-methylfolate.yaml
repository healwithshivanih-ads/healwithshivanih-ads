notes_for_coach: Start low (e.g. 400 mcg) and titrate slowly. Some clients are sensitive to methyl donors and may experience
  anxiety, irritability, or insomnia with higher doses. Always pair folate decisions with B12 status assessment. Prefer active
  forms (5-MTHF / L-methylfolate) over folic acid for MTHFR clients. Dosing decisions should be confirmed with a clinician.
notes_for_client: This is the active, ready-to-use form of folate — your body doesn't need to convert it, which makes it more
  suitable if you have an MTHFR variant. Start with a low dose and increase only under practitioner guidance.
