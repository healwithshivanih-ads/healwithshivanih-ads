notes_for_coach: 'Protein top-up for the dairy-free client who also reacts to
  legume / plant proteins — the most allergen-free of the three (no dairy, soy,
  gluten or common plant allergens), gut-friendly and heat-stable so it mixes
  into cooked Indian food. NARROW NICHE: do NOT recommend for histamine
  intolerance / MCAS (fermented + yeast = plausible histamine trigger) or for
  clients on a 5R / SIBO / anti-candida protocol (yeast is the wrong signal when
  treating dysbiosis — most anti-candida diets cut yeast). Use the plant blend
  for those clients instead. Do NOT raise the protein target for clients with
  kidney disease or high uric acid / gout — keep moderate and refer to
  physician. Source / affiliate link added via the catalogue queue once sign-up
  clears.'
