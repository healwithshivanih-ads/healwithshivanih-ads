notes_for_coach: The methylated form of B12; vegans and vegetarians are most at risk
  of deficiency. Pairs with methylfolate in the methylation cycle. Recommended as
  food sources first (red meat, salmon, eggs); supplementation especially important
  for plant-based diets.
notes_for_client: Methyl-B12 is the form your body can put straight to work in the
  methylation cycle. It works hand-in-hand with methylfolate. Vegans and vegetarians
  especially need this one.
