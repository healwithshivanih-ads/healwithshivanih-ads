notes_for_coach: Methylcobalamin is the active, methylated form of B12 often preferred
  in MTHFR-related protocols. However, if serum B12 is already very high, adding more
  B12 should be reviewed with a clinician first to rule out underlying medical causes
  of high B12.
notes_for_client: Methylcobalamin is a ready-to-use form of vitamin B12. Some people
  with MTHFR variants or functional B12 concerns use this form because it doesn't
  require as much conversion as other forms. If your B12 labs are already high, talk
  to your doctor before adding more.
