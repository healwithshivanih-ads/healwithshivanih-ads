notes_for_coach: Active form of B12; preferred over cyanocobalamin for MTHFR clients
  and those with absorption issues. Sublingual/lozenge forms can improve absorption
  by bypassing GI tract. Higher doses are generally well-tolerated as excess is excreted.
notes_for_client: This is the active, ready-to-use form of vitamin B12. Important
  for nerve health, energy, and keeping homocysteine levels in check.
