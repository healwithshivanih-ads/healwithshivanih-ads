notes_for_coach: Preferred over cyanocobalamin in MTHFR clients as it is the active methyl form and does not require conversion.
  Pair with methylfolate decisions. If serum B12 is very high, refer to clinician before supplementing further.
notes_for_client: Methylcobalamin is the active form of B12 that your body can use directly. It's often a better choice than
  standard B12 (cyanocobalamin) if you have an MTHFR variant.
