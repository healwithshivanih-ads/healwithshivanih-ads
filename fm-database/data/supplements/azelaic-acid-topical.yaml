  quote: Twenty percent azelaic acid cream is as effective as 5% benzoyl peroxide,
    4% hydroquinone cream, 0.05% tretinoin, 2% erythromycin, and 0.5 to 1 g/day oral
    tetracycline at ameliorating comedonal, papulopustular, and nodulocystic acne.
    Few side effects; no overt systemic toxicity; better clinical choice.
