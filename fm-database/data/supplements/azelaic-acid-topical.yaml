notes_for_coach: Natural 9-carbon dicarboxylic acid with antibacterial action against
  P. acnes plus mild keratolytic and anti-inflammatory effects. 20% cream BID for
  4 weeks minimum; full course 6 months. Pizzorno cites comparable efficacy to 5%
  benzoyl peroxide, 4% hydroquinone, 0.05% tretinoin, 2% erythromycin, 0.5-1 g/day
  oral tetracycline. Less effective than oral isotretinoin for conglobate acne. Better
  tolerated than tretinoin or BPO — fewer allergic reactions, no residual hypopigmentation.
notes_for_client: A natural acid (from wheat, rye, barley) that fights acne bacteria
  as effectively as the common prescription treatments — with fewer side effects.
  Apply twice daily; full results in 4-6 months.
