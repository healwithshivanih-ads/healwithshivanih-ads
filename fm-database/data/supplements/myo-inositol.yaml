notes_for_coach: Acts as a second messenger in TSH receptor signaling. Found naturally
  in fruits, vegetables, legumes, cereals, and nuts. Often combined with selenium
  in thyroid protocols. No specific dose cited in document — typically 2–4 g/day in
  studies. Emerging evidence, not yet consensus.
notes_for_client: Myo-inositol is a natural compound found in many foods that helps
  your thyroid cells respond to the hormone signals telling them to produce thyroid
  hormones.
evidence_tier: plausible_emerging
