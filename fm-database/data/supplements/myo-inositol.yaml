notes_for_coach: Myo-inositol is involved in TSH, FSH, and insulin signal transduction. Found naturally in fruits, vegetables,
  cereals, legumes, and nuts. The document does not specify a dose — dose range above reflects commonly used research doses
  and should be verified with clinician. Thin evidence base for thyroid specifically.
notes_for_client: Myo-inositol is a naturally occurring nutrient found in fruits, vegetables, and legumes that helps your
  thyroid cells respond to TSH signals. It supports hormone regulation more broadly including blood sugar and reproductive
  hormones.
evidence_tier: fm_specific_thin
