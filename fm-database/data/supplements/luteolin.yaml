notes_for_coach: 'Luteolin is a flavonoid found in celery, parsley, chamomile, and
  artichoke.

  Acts as a mast cell stabilizer with notable neuroprotective and

  anti-neuroinflammatory action — research suggests superior potency to

  pharmaceutical cromolyn sodium in inhibiting degranulation. Often combined

  with quercetin in liposomal formulations for MCAS-related brain fog and

  neurological symptoms. Limited safety data in pregnancy.

  '
