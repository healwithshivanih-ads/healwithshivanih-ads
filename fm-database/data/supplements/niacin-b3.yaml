notes_for_coach: Prefer nicotinamide, NR, or NMN in multivitamins over nicotinic acid
  to avoid flushing. For NAD+ boosting, NMN and NR are more bioavailable. Therapeutic
  doses require methylation support (methyl donors). Higher doses (cholesterol lowering)
  are clinician territory.
notes_for_client: Niacin supplements come in different forms. The 'no-flush' forms
  (nicotinamide, NR) are gentler. Always take with food.
