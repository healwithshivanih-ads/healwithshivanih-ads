notes_for_coach: B3/Niacin included in this CVS risk protocol. Niacin raises HDL and
  lowers triglycerides at pharmacological doses. Flushing is a common side effect
  with immediate-release forms; non-flush or slow-release forms available. High-dose
  niacin therapy requires clinician oversight (hepatotoxicity risk at high doses;
  AIM-HIGH and HPS2-THRIVE trials showed no additional CVD benefit added to statins).
notes_for_client: Niacin (Vitamin B3) can help raise your 'good cholesterol' (HDL)
  and lower blood fats (triglycerides). You may experience a warm flushing sensation
  with some forms — this is harmless. Take with food.
