notes_for_coach: |
  Ferrous ascorbate is iron molecularly chelated to ascorbic acid (vitamin C)
  within the molecule itself — distinct from bisglycinate (iron + 2× glycine)
  and from inorganic salts (sulfate / fumarate). The vit-C-chelation has two
  consequences: (1) absorption is enhanced without needing a separate vit C
  cofactor, and (2) GI + headache tolerance is markedly better than
  bisglycinate in headache-sensitive clients.

  WHEN TO REACH FOR THIS FORM (over bisglycinate or inorganic salts):
  - Headache or migraine triggered by iron bisglycinate (sometimes histamine-
    or chelate-mediated; ferrous ascorbate sidesteps the trigger).
  - Sensitive GI / nausea on inorganic salts (sulfate, fumarate).
  - Pediatric / perimenopausal clients who prefer syrup over capsules.
  - Strict vegetarian + supplement-averse — syrup feels less "medical".

  INDIAN AVAILABILITY (the practical reason to keep this as a separate
  catalogue entry rather than just aliasing into bisglycinate):
  - Tonoferon Liquid (Glenmark) — primary recommendation. OTC at most Indian
    pharmacies, ₹130-180 per 150 ml bottle. ~33 mg elemental per 15 ml; halve
    to 7.5 ml (~16 mg) for headache-sensitive starts.
  - Tonoferon Drops (Glenmark) — for very-low-dose pediatric use, also adult-
    sensitive starts.
  - Ferium XT (Emcure) — tablet form ferrous ascorbate + folic acid; daily dose.
  - Orofer XT (Emcure) — tablet form, ferrous ascorbate.

  Defer iron supplementation if gut lining is actively inflamed (same caveat
  as all iron forms — absorption is impaired during active gut inflammation).
  Confirm iron deficiency with ferritin before prescribing; target ferritin
  > 50 (restless-legs threshold), ideal 70-100 (FM optimal).
notes_for_client: |
  Iron in a syrup form, chelated to vitamin C — gentler on the gut and on
  headaches than the capsule form. Best taken between meals, away from
  tea / coffee / calcium by at least 90 minutes. Vitamin C is already in
  the syrup, but a small glass of amla water or lemon water alongside
  doubles the absorption again.
