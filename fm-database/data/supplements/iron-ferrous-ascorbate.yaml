pregnancy_safety_note: |
  Ferrous ascorbate is well-tolerated in pregnancy — Tonoferon is widely
  prescribed in Indian antenatal care. Standard 30-60 mg elemental/day if
  ferritin < 50. Better GI + headache tolerance than ferrous sulfate.
