notes_for_coach: "Ferrous ascorbate is iron molecularly chelated to ascorbic acid\
  \ (vitamin C)\nwithin the molecule itself — distinct from bisglycinate (iron + 2×\
  \ glycine)\nand from inorganic salts (sulfate / fumarate). The vit-C-chelation has\
  \ two\nconsequences: (1) absorption is enhanced without needing a separate vit C\n\
  cofactor, and (2) GI + headache tolerance is markedly better than\nbisglycinate\
  \ in headache-sensitive clients.\n\nWHEN TO REACH FOR THIS FORM (over bisglycinate\
  \ or inorganic salts):\n- Headache or migraine triggered by iron bisglycinate (sometimes\
  \ histamine-\n  or chelate-mediated; ferrous ascorbate sidesteps the trigger).\n\
  - Sensitive GI / nausea on inorganic salts (sulfate, fumarate).\n- Pediatric / perimenopausal\
  \ clients who prefer syrup over capsules.\n- Strict vegetarian + supplement-averse\
  \ — syrup feels less \"medical\".\n\nINDIAN AVAILABILITY (the practical reason to\
  \ keep this as a separate\ncatalogue entry rather than just aliasing into bisglycinate):\n\
  - Tonoferon Liquid (Glenmark) — primary recommendation. OTC at most Indian\n  pharmacies,\
  \ ₹130-180 per 150 ml bottle. ~33 mg elemental per 15 ml; halve\n  to 7.5 ml (~16\
  \ mg) for headache-sensitive starts.\n- Tonoferon Drops (Glenmark) — for very-low-dose\
  \ pediatric use, also adult-\n  sensitive starts.\n- Ferium XT (Emcure) — tablet\
  \ form ferrous ascorbate + folic acid; daily dose.\n- Orofer XT (Emcure) — tablet\
  \ form, ferrous ascorbate.\n\nDefer iron supplementation if gut lining is actively\
  \ inflamed (same caveat\nas all iron forms — absorption is impaired during active\
  \ gut inflammation).\nConfirm iron deficiency with ferritin before prescribing;\
  \ target ferritin\n> 50 (restless-legs threshold), ideal 70-100 (FM optimal).\n"
notes_for_client: 'Iron in a syrup form, chelated to vitamin C — gentler on the gut
  and on

  headaches than the capsule form. Best taken between meals, away from

  tea / coffee / calcium by at least 90 minutes. Vitamin C is already in

  the syrup, but a small glass of amla water or lemon water alongside

  doubles the absorption again.

  '
