notes_for_coach: 'Exogenous DAO is typically porcine kidney-derived. Must be taken
  15-20

  minutes before high-histamine meals on an empty stomach — works in the gut

  lumen to degrade dietary histamine before absorption. Will not address

  endogenous histamine release from mast cells or microbial production.

  Dosing is in HDU/IU; common products provide 4,200-10,000 HDU per capsule.

  Vegetarian alternative is legume-derived DAO (lower potency). Not vegan.

  '
