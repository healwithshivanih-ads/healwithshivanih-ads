notes_for_coach: 'Bromelain is a complex of proteolytic enzymes (cysteine proteinases)
  plus non-enzymatic compounds extracted from the stem and fruit of pineapple
  (Ananas comosus). The inedible STEM is far richer than the fruit flesh — eating
  pineapple does not deliver therapeutic doses. A meaningful fraction is absorbed
  intact, so it acts systemically, not just in the gut.

  MECHANISMS. (1) Anti-inflammatory — inhibits NF-kB and MAPK signalling, suppresses
  TNF-alpha and IL-6, lowers bradykinin at inflammatory sites and reduces prostaglandin
  E2. (2) Digestive — hydrolyses dietary protein into peptides and amino acids,
  similar to pepsin and trypsin. (3) Antithrombotic / fibrinolytic — inhibits platelet
  aggregation and helps break down fibrin clots; this is the basis of the bleeding-risk
  cautions. (4) Enzymatic debridement — a non-proteolytic component, escharase,
  dissolves necrotic burn tissue. (5) Anticancer / metabolic — promotes apoptosis
  and lipolysis in laboratory models.

  USES, STRONGEST TO WEAKEST. (a) Serious burns, topical prescription — STRONG;
  FDA-approved as the Rx drug NexoBrid for debriding dead tissue, a clinician
  procedure, not the oral supplement. (b) Post-surgical inflammation (dental / ENT /
  orthopaedic) — MODERATE; reduces post-op pain, swelling and trismus, approved by
  Germany''s Commission E for ENT surgery and trauma. (c) Osteoarthritis — MODERATE /
  promising; human trials up to 16 weeks show meaningful WOMAC improvements in pain,
  stiffness and function. (d) Sinusitis / rhinosinusitis — MODERATE; supportive
  therapy that reduces nasal congestion and inflammation. (e) Protein digestion —
  MODERATE; mechanistically sound, large human trials limited. (f) Weight loss /
  metabolic health — EMERGING; small human data suggest reduced BMI and improved
  insulin resistance (HOMA-IR) in obese / diabetic patients. (g) Cancer,
  neuroprotection — PRELIMINARY, in-vitro / animal only.

  DOSING. Potency is set by enzyme ACTIVITY (GDU or MCU), not milligrams — compare
  the GDU figure across products. Digestion: ~500 mg/day in divided doses, WITH
  meals. Inflammation / injury: ~500 mg up to four times daily, on an EMPTY stomach
  so the enzyme is absorbed rather than spent digesting food. Sinusitis / trauma
  (German Commission E): 80-320 mg/day total, split 2-3x, for 8-10 days.
  Osteoarthritis: 400 mg twice daily up to 500-2000 mg twice daily.

  SAFETY. FDA GRAS; tolerated up to ~12 g/day without significant toxicity. Common
  side effects are GI — nausea, vomiting, diarrhoea; heavier-than-usual menstrual
  bleeding can occur. CONTRAINDICATED in pineapple allergy, which cross-reacts with
  latex, grass pollen, celery, carrots and wheat; in known bleeding disorders; and
  it should be stopped two weeks BEFORE and AFTER any surgery. Not recommended for
  children (insufficient safety data).

  INTERACTIONS. Anticoagulants / antiplatelets (warfarin, aspirin, clopidogrel,
  NSAIDs) — additive bleeding risk. Antibiotics (amoxicillin, tetracycline) —
  bromelain raises their absorption and serum levels. Sedatives (alcohol,
  benzodiazepines, anti-seizure drugs) — may be potentiated; also caution with
  sedating herbs such as valerian and kava.

  PREGNANCY / LACTATION. Bromelain tablets are NOT recommended in pregnancy — high-dose
  oral proteases carry a theoretical abnormal-bleeding risk; ordinary dietary
  pineapple is fine because the flesh has negligible bromelain. In lactation the data
  are insufficient — avoid as a precaution.

  FM RELEVANCE. Standard partner to quercetin (it improves quercetin absorption) and
  a routine ingredient in histamine / mast-cell blends such as FMN Opti-Histamine. A
  reasonable anti-inflammatory adjunct; the metabolic / HOMA-IR signal is interesting
  but still emerging — not a primary metabolic intervention.'
notes_for_client: 'A protein-digesting enzyme from pineapple. For digestion, take it
  with meals; for its anti-inflammatory effect, take it between meals on an empty
  stomach. Skip it entirely if you are allergic to pineapple, and tell your coach if
  you are on any blood thinner or have surgery coming up.'
contraindications:
  conditions:
  - pineapple allergy
  - latex-fruit syndrome
  - papain or papaya allergy
  - bleeding disorders
  - surgery scheduled within two weeks
  medications:
  - anticoagulants
  - antiplatelet drugs
  - NSAIDs
  - sedatives
  life_stages:
  - pregnancy
  - lactation
  - childhood
interactions:
  with_supplements: []
  with_foods: []
  with_medications:
  - medication: anticoagulants and antiplatelet drugs
    type: avoid_together
    reason: Bromelain has fibrinolytic and antiplatelet activity — additive bleeding
      risk.
  - medication: NSAIDs
    type: avoid_together
    reason: Additive bleeding and GI-irritation risk; bromelain inhibits platelet
      aggregation.
  - medication: amoxicillin and tetracycline antibiotics
    type: avoid_together
    reason: Bromelain raises serum antibiotic levels — coordinate with the prescriber
      rather than combining unsupervised.
  - medication: sedatives (alcohol, benzodiazepines, anti-seizure drugs)
    type: avoid_together
    reason: Bromelain may potentiate the strength of sedative medications.
pregnancy_safety: caution
lactation_safety: caution
pregnancy_safety_note: Bromelain supplements/tablets are not recommended in pregnancy
  (theoretical abnormal-bleeding risk from high-dose oral proteases); dietary pineapple
  is fine. Lactation data are insufficient — avoid as a precaution.
