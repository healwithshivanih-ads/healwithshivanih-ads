notes_for_coach: 'Bromelain is a proteolytic (protein-digesting) enzyme complex
  extracted from pineapple stem. A meaningful fraction is absorbed intact into the
  bloodstream, so it acts systemically, not just in the gut.

  TWO DISTINCT USES WITH OPPOSITE TIMING. (1) Protein digestion — taken WITH meals,
  200-2000 mg, it supplements pancreatic/gastric proteases; useful where maldigestion
  or digestive-enzyme insufficiency is suspected. (2) Systemic anti-inflammatory /
  decongestant — taken BETWEEN meals on an empty stomach, 200-800 mg, so the enzyme
  is absorbed rather than consumed digesting food. Get the timing right for the goal.

  EVIDENCE IS THIN. Examine.com grades the human research mostly C (limited): a small
  improvement in nasal congestion in allergic rhinitis (n=116), a small decrease in
  inflammation in acute knee pain (n=77), plus single small studies in osteoarthritis
  and muscle soreness. The anti-inflammatory and mild decongestant effects are the
  best-supported; treat broader claims as preliminary.

  FM RELEVANCE. Bromelain is a standard component of quercetin-bromelain combinations
  — it improves quercetin bioavailability — and appears in histamine / mast-cell
  blends (it is one of 23 ingredients in FMN Opti-Histamine). Reasonable anti-inflammatory
  adjunct; not a primary intervention on its own.

  POTENCY. Activity is standardised by GDU (gelatin dissolving units) or MCU (milk
  clotting units), not by milligrams alone — two products at the same mg can differ
  in strength. Check the GDU figure when comparing products.

  CAUTIONS. Bromelain has fibrinolytic and antiplatelet activity — additive bleeding
  risk with anticoagulants, antiplatelet drugs and NSAIDs; advise stopping ~2 weeks
  before any surgery. It raises serum levels of amoxicillin and tetracycline antibiotics
  — coordinate with the prescriber rather than combining unsupervised. May intensify
  sedatives. CONTRAINDICATED in pineapple allergy, which cross-reacts with latex,
  grass pollen, and papain/papaya. Most common side effects are diarrhoea and gastric
  upset; allergic skin reactions occur in sensitised individuals.'
notes_for_client: 'A protein-digesting enzyme from pineapple. For digestion, take it
  with meals; for its anti-inflammatory effect, take it between meals on an empty
  stomach. Skip it entirely if you are allergic to pineapple, and tell your coach if
  you are on any blood thinner or have surgery coming up.'
contraindications:
  conditions:
  - pineapple allergy
  - latex-fruit syndrome
  - papain or papaya allergy
  medications:
  - anticoagulants
  - antiplatelet drugs
  - NSAIDs
  life_stages:
  - pregnancy
  - lactation
interactions:
  with_supplements: []
  with_foods: []
  with_medications:
  - medication: anticoagulants and antiplatelet drugs
    type: avoid_together
    reason: Bromelain has fibrinolytic and antiplatelet activity — additive bleeding
      risk.
  - medication: NSAIDs
    type: avoid_together
    reason: Additive bleeding and GI-irritation risk; bromelain inhibits platelet
      aggregation.
  - medication: amoxicillin and tetracycline antibiotics
    type: avoid_together
    reason: Bromelain raises serum antibiotic levels — coordinate with the prescriber
      rather than combining unsupervised.
