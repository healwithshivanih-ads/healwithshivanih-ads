notes_for_coach: Effective dose range is 2–4g/day of combined EPA+DHA for inflammatory
  conditions; >7g/day is not recommended. EPA:DHA ratio of approximately 1.5:1 is
  suggested. Clients on blood thinners must consult clinician before supplementing.
  Recommend sourcing from companies that verify oxidation status. Supplement for a
  minimum of 4 weeks (ideally 120 days) for full membrane incorporation benefits.
notes_for_client: Fish oil works best when taken with a meal containing fat to aid
  absorption. Look for products that are tested for mercury and oxidation. Consistency
  is key — it takes at least 4 weeks to see benefits, and up to 4 months for full
  effects in your red blood cells.
