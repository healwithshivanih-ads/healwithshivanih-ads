notes_for_coach: 'Latin: Gentiana spp.; Gentianaceae. Sanskrit: Kirata, Katuki, Trayamana. Traditional
  indications: fever, debility after fevers, jaundice, hepatitis, enlargement of liver and spleen, genital
  herpes, acne, rash, obesity, ulcers, venereal sores, diabetes, cancer. Precautions: general debility,
  nervousness, muscle spasms, high Vata; not where there is no fever/inflammation. Ayurvedic energetics
  from The Yoga of Herbs (Frawley & Lad).'
