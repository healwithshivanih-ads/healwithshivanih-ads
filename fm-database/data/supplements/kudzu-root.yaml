notes_for_coach: Phytoestrogen-rich root (puerarin, daidzein, genistein) traditionally
  used in Chinese medicine. Pizzorno cites kudzu among supplements supporting hot
  flash relief. Standardised extracts deliver 40-100 mg isoflavones per dose. Avoid
  in hormone-sensitive cancers and with anticoagulants.
notes_for_client: A traditional Chinese herb that may help with hot flashes via mild
  plant-estrogen activity.
