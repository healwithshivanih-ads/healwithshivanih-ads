notes_for_coach: Distinguished from refined table salt (2 minerals) by containing
  up to 92 trace minerals. The free magnesium released on crunching is proposed to
  draw water inside cells. A small crystal at bedtime is suggested for sleep. Not
  appropriate for clients with hypertension, kidney disease, or cardiovascular conditions
  without clinician approval.
notes_for_client: A whole, unrefined sea salt that contains trace minerals your body
  uses. A small pinch before bed may support sleep and hydration at the cellular level.
  Not a substitute for medical care.
