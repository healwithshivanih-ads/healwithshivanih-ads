notes_for_coach: Use non-GMO, soy-free (preferably sunflower-derived) form. Can cause
  depression in excess — essential to use Pulse Method and stop when feeling well.
  Conserves SAMe (important for slow COMT). Store liquid form in cool dry area (not
  refrigerator). Monitor for depressive mood changes as a stopping signal.
notes_for_client: Provides the building blocks for healthy cell membranes, liver function,
  and gut lining. Because it can occasionally cause low mood if taken too long, stop
  when you feel good and resume only if symptoms return.
