notes_for_coach: 'Latin: Terminalia chebula; Combretaceae. Sanskrit: Haritaki, Abhaya. Traditional indications:
  cough, asthma, hoarse voice, hiccough, vomiting, hemorrhoids, diarrhea, malabsorption, abdominal distention,
  parasitic infections, tumors, jaundice, spleen diseases, heart disease, skin diseases, itching, edema,
  nervous disorders. Precautions: pregnancy, dehydration, severe exhaustion or emaciation, in excess high
  Pitta. Ayurvedic energetics from The Yoga of Herbs (Frawley & Lad).'
