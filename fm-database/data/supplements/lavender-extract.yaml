notes_for_coach: 'Silexan is the patented oral lavender oil preparation with RCT evidence

  comparable to lorazepam and paroxetine for generalised anxiety disorder.

  Murray dose: 150 mg twice daily of 4:1 extract; Silexan trials use 80 mg/day.

  Effect develops over 2-4 weeks. Generally well-tolerated; mild lavender

  reflux sometimes occurs (enteric-coated forms help). Not the same as

  aromatherapy lavender oil.

  '
notes_for_client: 'Lavender oil capsules (Silexan or equivalent) work as well as some

  prescription anxiety medications without the sedation. 80-150 mg/day.

  Take with food to reduce mild burping. Effect builds over 2-4 weeks.

  '
