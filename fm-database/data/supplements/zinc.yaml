notes_for_coach: 'Multiple forms listed: acetate, citrate, picolinate, glycinate (oral
  systemic); gluconate (lozenge for local throat effect). Divide doses throughout
  day. High doses >30 mg/day should be clinician-supervised — copper depletion risk.'
notes_for_client: Zinc is an essential mineral for immune function. Take with food
  to avoid nausea. Don't exceed recommended dose without your practitioner's guidance.
