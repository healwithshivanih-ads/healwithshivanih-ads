notes_for_coach: Zinc supports thyroid hormone conversion (T4 → T3) and immune regulation.
  Also relevant in autoimmune protocols as zinc carnosine for gut lining repair. Take
  with food to reduce nausea. Space away from magnesium-glycinate supplements when
  possible to minimize mineral competition. Long-term high-dose zinc can deplete copper
  — consider a zinc:copper ratio supplement or periodic copper monitoring.
notes_for_client: Take zinc with food to avoid stomach upset. Zinc helps your thyroid
  convert hormones into their active form and supports healthy immune function.
