notes_for_coach: B6 is a cofactor for serotonin and GABA synthesis. Commonly used
  alongside folate and magnesium for mood, PMS, and anxiety. High-dose B6 (>100mg/day)
  can cause peripheral neuropathy — clinician verification required.
notes_for_client: Vitamin B6 helps your body make serotonin and GABA — your natural
  mood-balancing and calming chemicals. Best taken with food.
