slug: vitamin-b6
display_name: Vitamin B6 (Pyridoxine)
category: vitamin
forms_available:
- capsule
- tablet
evidence_tier: strong
notes_for_coach: Clinical trial used 5 mg/kg body weight — this is a prescription-level
  dose and must be clinician-supervised. Also lowers homocysteine synergistically
  with folate. Long-term high-dose B6 risk of peripheral neuropathy.
notes_for_client: B6 may help lower blood pressure by calming the nervous system and
  reducing stress hormones. Discuss dosing with your healthcare provider.
