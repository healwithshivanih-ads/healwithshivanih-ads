notes_for_coach: Endogenous creatine synthesis is a major consumer of SAMe. Supplemental
  creatine 'spares' SAMe for phosphatidylcholine synthesis and COMT support. Lynch
  notes exceptional benefit in autistic or speech-delayed children. Mix with filtered
  water; can be combined with electrolytes. Well tolerated even by supplement-sensitive
  individuals.
