notes_for_coach: Recommend broad-spectrum formulas containing lipase, protease, and
  amylase taken with main meals. Prescription pancreatic enzyme replacement (e.g.,
  Creon) is out of coaching scope — refer to clinician for confirmed EPI. Source is
  expert consensus lecture; verify specific dosing with prescribing clinician.
notes_for_client: Digestive enzyme capsules taken with meals help your body break
  down fats, proteins, and carbohydrates when your pancreas isn't producing enough
  on its own. Take them at the start of each meal for best effect.
