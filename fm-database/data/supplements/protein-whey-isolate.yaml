notes_for_coach: 'Protein top-up for the dairy-tolerant lacto-vegetarian client —
  the default protein powder when dairy is NOT being eliminated. Whey ISOLATE
  (not concentrate) — low-lactose, highest leucine, most palatable, so client
  pushback is lowest. Use isolate-grade for low-FODMAP clients (concentrate is
  not low FODMAP — lactose). Mild caution in histamine-sensitive clients (dairy
  can be a histamine liberator for some) — prefer the plant blend there. Do NOT
  raise the protein target for clients with kidney disease or high uric acid /
  gout — keep moderate and refer to physician. Source = catalogue queue once
  the affiliate sign-up clears; until then the affiliate-link chain falls back
  to Amazon / no link.'
