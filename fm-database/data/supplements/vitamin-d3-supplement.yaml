notes_for_coach: Vitamin D3 is fat-soluble — always advise client to take with a fat-containing
  meal. BMI >30 clients require approximately double the standard dose. Clients with
  chronic inflammatory conditions may also need higher doses. Always pair with K2
  to direct calcium appropriately. Specific dose titration requires clinician guidance.
notes_for_client: Take your Vitamin D3 with a meal containing some healthy fat (e.g.,
  eggs, avocado, olive oil) for best absorption. It works best when paired with Vitamin
  K2, which helps make sure the calcium absorbed goes into your bones rather than
  your arteries.
