notes_for_coach: 'Latin: Punica granatum; Lythraceae. Sanskrit: Dadima. Traditional indications: worms
  (round, pin, tapeworm), sore throat, ulcers, colitis, diarrhea, dysentery, prolapse of rectum or vagina,
  leucorrhea, conjunctivitis, anemia, chronic bronchitis, tuberculosis. Precautions: constipation. Ayurvedic
  energetics from The Yoga of Herbs (Frawley & Lad).'
contraindications:
  conditions:
  - hypersensitivity or allergy to the plant material (WHO Monographs Vol 4)
  - 'rind / root-bark preparations (Pericarpium & Cortex Granati): the anthelmintic
    root-bark contains alkaloids toxic in overdose — use only at appropriate dose.
    NOTE: WHO safety data pertain to the rind/bark, not the edible fruit or juice
    (WHO Monographs Vol 4)'
