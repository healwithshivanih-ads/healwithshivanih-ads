notes_for_coach: 'Fibre slows gastric emptying of liquid phase, reducing rapid acid
  delivery to the duodenum. Specific supplemental forms cited: pectin, guar gum, psyllium.
  Whole-food plant diet is preferred over isolated supplements.'
notes_for_client: Adding more fibre to your diet — or taking psyllium supplements
  — may halve your chance of your duodenal ulcer coming back by slowing down how fast
  your stomach empties.
