notes_for_coach: 'Baicalin is the major flavonoid of Chinese skullcap (Scutellaria

  baicalensis), typically standardized to 85-90% in extract form. Suppresses

  histamine release, inhibits mast cell degranulation, and modulates HPA axis

  activity. Often used in TCM-influenced functional protocols for combined

  mast cell and stress-axis dysregulation. Limited safety data in pregnancy;

  caution with sedatives and CYP-metabolized medications.

  '
