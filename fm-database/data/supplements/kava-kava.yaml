notes_for_coach: Polynesian botanical with significant anxiolytic effect. Pizzorno
  lists kava for anxiety component of depression. Standardised extract 60-120 mg kavalactones
  twice daily. RARE but serious hepatotoxicity — banned in some countries. Use only
  short-term, only with liver-enzyme monitoring, never with alcohol or hepatotoxic
  drugs. Aqueous (traditional) preparations are safer than ethanol/acetone extracts.
notes_for_client: A traditional anti-anxiety herb that needs careful clinical supervision
  because of rare but serious liver risk. Not for use without baseline liver function
  tests and not with alcohol.
