notes_for_coach: 'RDA dose (150 mcg) is the recommended routine supplementation in
  hypothyroid patients per this document. CRITICAL: excess iodine can worsen Hashimoto''s
  and increase TPO antibodies. High-dose iodine supplementation is clinician scope.
  Encourage food sources (seaweed, eggs, dairy) over high-dose supplements.'
