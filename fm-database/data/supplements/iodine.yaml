take_with_food: optional
notes_for_coach: Iodine is necessary for thyroid hormone synthesis. However, excess
  iodine can be harmful in Hashimoto's patients and may worsen antibody activity.
  Supplementation should be cautious and ideally clinician-supervised in autoimmune
  thyroid disease. Routine supplementation at 150 mcg is considered safe for most.
