notes_for_coach: Glycinate form is better tolerated GI-wise than citrate for some
  clients. Cited dose 200–300 mg in this document — verify with clinician for individual
  use. Do not recommend specific doses to clients without clinician input.
notes_for_client: Magnesium supports muscle relaxation and may help with headaches.
  Ask your doctor or nutritionist about the right dose for you.
