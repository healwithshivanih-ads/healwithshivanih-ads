notes_for_coach: 'Must be chewed (not swallowed as capsule) to activate salivary compounds.
  Dose: 2–4 × 380 mg tablets = 760–1520 mg between meals or 20 min before meals. Continue
  8–16 weeks after full response. DGL lacks aldosterone-like side effects of whole
  licorice. Flavonoids in DGL inhibit H. pylori.'
notes_for_client: DGL is licorice with the part that raises blood pressure removed.
  It must be chewed — not swallowed whole — to work properly. Take it 20 minutes before
  meals.
