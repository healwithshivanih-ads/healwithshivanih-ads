notes_for_coach: 'Postbiotics are inanimate (heat-killed) microbial preparations.
  Key strains: Limosilactobacillus fermentum PS150 (↓ nighttime cortisol, ↑ melatonin),
  Bifidobacterium breve BB091109 (↓ cortisol, ↓ IL-6), Lactobacillus gasseri heat-killed
  (↓ sleep latency, ↑ duration). Food source: natto (heat-inactivated Bacillus subtilis
  subsp. natto, strain QOL) — remains active even after heating. Standardised concentration
  is critical for efficacy. Source: Coach Shivani clinical observations.'
notes_for_client: Postbiotics are beneficial compounds from specific heat-treated
  bacteria that can help balance your stress hormones and support deeper sleep — even
  found in natto, a traditional Japanese food.
