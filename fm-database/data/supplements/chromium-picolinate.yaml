notes_for_coach: Cr picolinate + biotin (600 mcg Cr + 2 mg biotin) combination shown
  to drop fasting glucose 10 mg/dL and HbA1c 0.54%. Effects are meaningful only in
  chromium-deficient individuals. At least 200 mcg/day for diabetics; 200–400 mcg/day
  optimal.
notes_for_client: Chromium helps insulin work more effectively — it's especially useful
  if you eat refined carbohydrates or have a sedentary lifestyle, both of which deplete
  chromium.
