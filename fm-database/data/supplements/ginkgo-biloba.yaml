notes_for_coach: Use extract standardized to 24% ginkgoflavonglycosides and 6% terpenoids.
  Anti-platelet effect — caution with anticoagulants. For secondary stroke prevention
  and cerebrovascular insufficiency.
notes_for_client: Standardized Ginkgo biloba supports brain circulation and may aid
  recovery after stroke. Always use a standardized extract.
