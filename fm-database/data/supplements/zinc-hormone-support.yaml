notes_for_coach: Zinc is required for hormone extraction from carrier proteins and
  entry into receptor binding pocket domains. Deficiency may undermine hormone therapy
  effectiveness. Encourage food sources (oysters, pumpkin seeds, meat) and assess
  through clinician if deficiency suspected.
notes_for_client: Zinc helps your hormones actually get into the right spots in your
  cells to do their job. It's found in oysters, red meat, pumpkin seeds, and many
  supplements.
