notes_for_coach: |
  D-Ribose is a pentose sugar that feeds the ATP-recycling pathway
  directly. Best evidence in mitochondrial-dysfunction conditions —
  ME/CFS, fibromyalgia, long COVID, post-statin myopathy, congestive
  heart failure. Typical dose: 5g three times daily for ME/CFS / PEM
  populations; the Teitelbaum trial showed ~45% energy improvement in
  fibromyalgia at this dose. Pair with CoQ10 + L-carnitine + magnesium
  for full mitochondrial support stack. Tastes mildly sweet — clients
  often dissolve in water or smoothies.
  Theoretical caveat: may slightly lower blood glucose at high doses
  (> 15 g/day). Not clinically meaningful at standard 5-15 g/day; coach
  monitors diabetics on insulin if combining at higher end of range.
notes_for_client: |
  This is a natural sugar your body uses to make energy at the cell
  level. Mixes easily in water or a smoothie. Many clients with deep
  fatigue or post-COVID exhaustion find it noticeably helpful within
  2-3 weeks. Doesn't affect blood sugar significantly (different
  pathway from glucose).
