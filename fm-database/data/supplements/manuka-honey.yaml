notes_for_coach: Look for MGO (methylglyoxal) rating ≥ 250 or UMF rating ≥ 10 for
  therapeutic anti-H. pylori effect. Typical protocol — 1 tsp on empty stomach 20-30
  min before meals, BID-TID for 8 weeks. Pair with mastic gum / sulforaphane / probiotics
  for compounded effect. Pause if blood sugar is poorly controlled (still raises insulin).
  Not for infants under 12 months (botulism spore risk).
notes_for_client: A specific honey from New Zealand with research-backed antibacterial
  activity against H. pylori and other gut pathogens. Take 1 teaspoon 20 minutes before
  meals on an empty stomach. Look for MGO 250+ or UMF 10+ rating.
