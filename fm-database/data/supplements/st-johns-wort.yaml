notes_for_coach: First-line botanical for mild-to-moderate depression in Pizzorno's
  framework. Standardised extract (0.3% hypericin or 3-5% hyperforin), 300 mg three
  times daily. Numerous SSRI-comparable RCTs. Major drug interactions via CYP3A4 induction
  — affects oral contraceptives, warfarin, cyclosporine, immunosuppressants, antiretrovirals,
  chemotherapy. NEVER combine with SSRIs or MAOIs.
notes_for_client: A traditional herb with strong research for mild and moderate depression.
  Has many medication interactions — never combine with antidepressants, the pill,
  blood thinners, or HIV/cancer/transplant medications. Always check with your prescriber.
