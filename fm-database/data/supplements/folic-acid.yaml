notes_for_coach: Must be co-administered with B12 and B6 for homocysteine lowering.
  Consider active (methylfolate) form in MTHFR polymorphism patients. 400–800 mcg/day
  standard; higher doses (1–5 mg) may be needed for significant hyperhomocysteinemia
  under clinician guidance.
notes_for_client: Folate (especially active methylfolate) helps lower homocysteine
  — a blood marker that damages artery walls. Works best when taken with vitamins
  B12 and B6.
evidence_tier: strong
