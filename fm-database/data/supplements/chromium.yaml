notes_for_coach: Evidence inconsistent. Contraindicated in kidney disease. Chromium
  picolinate studied most (Martin et al. 2006, Diabetes Care). Chromium + biotin combination
  studied for lipids and HbA1c (Albarracin et al. 2007). Always refer dosing to a
  clinician.
notes_for_client: Chromium is a trace mineral that may help support blood sugar control,
  especially when combined with biotin. Not suitable if you have kidney problems —
  check with your doctor first.
