notes_for_coach: 'Evidence is inconsistent. Chromium picolinate is the most studied
  form. Contraindicated in kidney disease — screen before recommending. Chromium +
  biotin combination may enhance effects. Food sources: broccoli, turkey breast, green
  beans, grapes, apples.'
notes_for_client: Chromium is a trace mineral that may play a role in blood sugar
  management. Talk to your provider before supplementing, especially if you have any
  kidney concerns.
