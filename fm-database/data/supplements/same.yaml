notes_for_coach: SAMe is a methyl donor used in alcoholic liver disease and methylation
  support. Best taken on an empty stomach. Avoid in bipolar disorder (mania risk).
  Do NOT combine with SSRIs, SNRIs, MAOIs, or other serotonergic agents — additive
  serotonin syndrome risk (less well-known but real). Clinician oversight required
  for dosing.
