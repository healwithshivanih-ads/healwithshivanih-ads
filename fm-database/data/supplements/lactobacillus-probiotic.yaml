notes_for_coach: Lactobacillus probiotics have a transient effect and do not permanently
  colonize the gut lining. Live cultures can be used as fermentation starters to amplify
  bacteria in food (dairy or non-dairy). Do not recommend in SIBO or bacterial overgrowth
  states. Best prescribed alongside prebiotic fiber.
notes_for_client: Lactobacillus probiotics are beneficial but temporary — they support
  your gut while you're taking them but don't permanently change your gut lining.
  You can boost their effect by using a live culture capsule to ferment milk or vegetables
  at home.
