notes_for_coach: 'Protein top-up for the dairy-free client who tolerates legumes
  — the default when dairy is being eliminated (gut healing, Hashimoto''s,
  autoimmune protocols). Reference product = VitaOne Rebuild Plant Protein &
  Lipid: mung + pea isolate (complete amino profile), built-in digestive
  enzymes, sunflower phospholipids, dairy / gluten / soy free, zero added sugar,
  low net carb — positioned for insulin resistance. Pea protein isolate is
  Monash low-FODMAP; mung isolate is less documented but generally tolerated.
  Lower-histamine than the yeast option, so this is also the preferred dairy-free
  pick for histamine-sensitive clients. Do NOT raise the protein target for
  clients with kidney disease or high uric acid / gout — keep moderate and refer
  to physician. VitaOne affiliate link added via the catalogue queue once
  sign-up clears (referral code vita13720sh).'
