- id: who-monographs-selected-medicinal-plants
  location: Vol 4 (2009) — Fructus Macrocarponii, Drug interactions / Warnings / Precautions (pp. 162–163)
  quote: 'Numerous cases of a possible interaction between cranberry juice and warfarin,
    leading to changes in the INR or to bleeding (MHRA). Patients with kidney stones
    or impaired kidney function should consult their health-care provider. People with
    diabetes should use sugar-free preparations. Cranberry for treating urinary-tract
    disease in paediatric populations is ineffective and not recommended.'
