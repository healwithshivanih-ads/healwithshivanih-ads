notes_for_coach: Active fraction is proanthocyanidins (PACs) — anti-adhesion effect
  prevents H. pylori binding to gastric mucosa and E. coli binding to urinary epithelium.
  Look for standardised extract delivering ≥ 36 mg PACs/day. Unsweetened juice (~1
  cup) provides similar effect but with sugar load. Caution with warfarin (mild CYP
  interaction). Some clients get GI upset on high dose.
notes_for_client: Cranberry prevents H. pylori (and UTI bacteria) from sticking to
  your stomach and bladder lining. Use a standardised extract with at least 36 mg
  proanthocyanidins daily, or 1 cup of unsweetened cranberry juice.
