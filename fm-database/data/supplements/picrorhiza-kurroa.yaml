notes_for_coach: 'Kutki (Picrorhiza kurroa) — the classic Ayurvedic bitter hepatic tonic,
  used like Golden Seal in India. Hepatoprotective + choleretic (kutkin / picroside I & II),
  immune-modulating, antipyretic; supports liver/spleen and stimulates digestive fire and
  bile flow. Energetics + traditional uses (fever, cough, hepatitis, asthma, parasites,
  toxic-blood conditions, obesity, diabetes) from The Yoga of Herbs (Frawley & Lad).
  Precautions: high-Vata / dryness-depletion states, severe debility, and hypoglycaemia
  (bitter + can lower blood sugar). WHO Vol 4 (Rhizoma Picrorhizae) documents the traditional
  hepatoprotective use but lists no specific contraindications or interactions.'
notes_for_client: Kutki is a traditional bitter herb used to support the liver and digestion.
contraindications:
  conditions:
  - high-vata / dryness or depletion states (Yoga of Herbs precaution)
  - severe debility or wasting (Yoga of Herbs precaution)
  - hypoglycaemia — bitter and may lower blood sugar (Yoga of Herbs precaution)
  medications:
  - antidiabetic drugs — possible additive blood-sugar lowering; monitor
  life_stages:
