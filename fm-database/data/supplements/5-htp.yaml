notes_for_coach: 'Serotonin precursor — most appropriate for fast MAOA (serotonin
  depleted too quickly) and as adjunct in fast COMT. CONTRAINDICATED with SSRIs (serotonin
  syndrome risk). AVOID in slow MAOA (worsens excess serotonin). Sleep-maintenance
  issues: Lynch suggests sustained-release form for overnight delivery. Lynch specifically
  flags this worsens slow MAOA and makes slow COMT more irritable.'
