pregnancy_safety_note: Insufficient safety data in pregnancy and lactation; affects
  fetal serotonin signalling.
notes_for_coach: Direct serotonin precursor. Do NOT combine with SSRIs/SNRIs or MAOIs
  (serotonin syndrome risk — potentially fatal). Also avoid with tramadol, triptans,
  dextromethorphan, linezolid (all serotonergic). Should not be used long-term without
  B6 cofactor. Caution in bipolar disorder (mania risk) and Parkinson's disease (interaction
  with carbidopa). Clinician review recommended.
