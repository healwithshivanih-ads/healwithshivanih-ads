notes_for_coach: Probiotics and prebiotics were intentionally deferred for 3 months
  (until gut inflammation settled) to avoid aggravating fermentation and bloating.
  VSL#3 (high-potency multi-strain) and spore-forming probiotics were used in the
  re-inoculation phase. Introducing probiotics to an inflamed gut can worsen bloating
  and dysbiosis symptoms.
notes_for_client: Probiotics are added once your gut has calmed down — usually after
  2–3 months. Adding them too early when your gut is inflamed can make bloating worse.
