notes_for_coach: 'Riboflavin has a strong safety profile as a B-vitamin. It is specifically
  relevant for individuals with the 677TT MTHFR genotype, where it may stabilize the
  enzyme and support active folate production. Blood pressure effects are clinically
  significant — always defer to clinician for BP management. Note: urine turns bright
  yellow at higher doses, which is harmless.'
notes_for_client: Riboflavin (vitamin B2) helps your MTHFR enzyme work better, especially
  if you have the 677TT variant. It may also help support healthy blood pressure in
  people with this genotype. It is a B-vitamin with a good safety record. High doses
  may turn your urine bright yellow — this is normal and harmless.
