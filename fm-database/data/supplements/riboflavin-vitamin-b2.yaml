sources:
- id: Notebook LM
  location: Riboflavin and MTHFR
  quote: Riboflavin, or vitamin B2, is important because the MTHFR enzyme depends
    on flavin adenine dinucleotide (FAD), a riboflavin-derived cofactor. The MTHFR
    C677T variant produces a less stable enzyme that may lose this cofactor more easily.
