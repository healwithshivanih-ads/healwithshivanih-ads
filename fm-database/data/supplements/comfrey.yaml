notes_for_coach: 'Latin: Symphytum officinale; Boraginaceae. Traditional indications: cough, lung infections,
  coughing blood, lung hemorrhage, gastrointestinal ulcers, blood in urine, diarrhea, dysentery, sprains,
  fractures, wounds, sores, boils. Precautions: edema, malabsorption, obesity, high Ama. Ayurvedic energetics
  from The Yoga of Herbs (Frawley & Lad).'
