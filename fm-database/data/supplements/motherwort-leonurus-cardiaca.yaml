notes_for_coach: "Sedative, anxiolytic, anti-arrhythmic, antispasmodic herb. German\
  \ Commission E approved for cardiac disorders and associated anxiety, including symptomatic\
  \ relief in hyperthyroidism (tachycardia, palpitations). Romm's classic hyperthyroid\
  \ formula: 25mL motherwort + 25mL bugleweed + 25mL lemon balm + 25mL nettles =\
  \ 100mL tincture; 5mL three times daily. Also appears in the Graves' formula alongside\
  \ skullcap and valerian (10mL each) + eleuthero (10mL). Avoid in pregnancy and heavy\
  \ menstrual bleeding."
notes_for_client: Motherwort is a traditional herb used to calm a racing heart and\
  \ anxiety in overactive thyroid conditions. Not suitable in pregnancy.
evidence_tier: fm_specific_thin
