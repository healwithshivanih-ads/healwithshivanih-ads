notes_for_coach: Bergamot polyphenolic fraction (BPF) is a citrus-derived extract
  that lowers LDL cholesterol and triglycerides while raising HDL via HMG-CoA reductase
  inhibition and improved insulin signaling. Used as a natural alternative or adjunct
  in mild-moderate dyslipidaemia. Standard clinical dose is 500-1500 mg/day in divided
  doses with meals. Effect develops over 4-12 weeks. Use Bergavit or Bergamonte standardised
  extract (38% polyphenols).
