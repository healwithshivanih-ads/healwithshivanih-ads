notes_for_coach: Bisglycinate has superior absorption vs sulfate/oxide. Always balance
  with copper at ~10:1 ratio. Do not exceed 50 mg/day without clinician supervision.
  Take with food to reduce nausea.
notes_for_client: Zinc bisglycinate is easy on the stomach. Always take with food.
  If taking zinc long-term, make sure you're getting some copper too.
