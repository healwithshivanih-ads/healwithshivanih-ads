notes_for_coach: Used both diagnostically (titration challenge) and therapeutically
  for hypochlorhydria. Start with one capsule per meal and increase incrementally,
  stopping at the dose that produces warmth/tingling — indicating adequate acid. Not
  for long-term use without clinician oversight. Contraindicated with active ulcers
  or NSAIDs.
