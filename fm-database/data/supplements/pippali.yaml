notes_for_coach: 'Latin: Piper longum; Piperaceae. Sanskrit: Pippali. Traditional indications: colds,
  coughs, asthma, bronchitis, laryngitis, arthritis, rheumatism, gout, dyspepsia, abdominal distention,
  flatulence, abdominal tumors, lumbago, sciatica, epilepsy, paralysis, worms. Precautions: high Pitta
  (inflammatory conditions). Ayurvedic energetics from The Yoga of Herbs (Frawley & Lad).'
