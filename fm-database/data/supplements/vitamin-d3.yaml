notes_for_coach: 'Dose: 1000–4000 IU for atherosclerosis; 2000–5000 IU for BPH. Fat-soluble
  vitamin — take with fatty meal. Monitor 25-OH vitamin D levels especially at higher
  doses.'
notes_for_client: Vitamin D, which we normally get from sunlight, helps support vaginal
  health by favoring the growth of beneficial bacteria like L. crispatus. Most people
  in northern climates don't get enough sun to make sufficient vitamin D and benefit
  from supplementation. Ask your doctor to check your levels.
