notes_for_coach: Fat-soluble — always take with a meal containing fat. Blood levels
  should be monitored and dosing adjusted by a clinician. D3 is the preferred supplemental
  form.
notes_for_client: Vitamin D acts like a hormone and supports your pancreas's insulin-producing
  cells. Get tested before supplementing so your provider can dial in the right dose
  for you.
