notes_for_coach: Dr. Davis targets serum 25(OH)D of 60–70 ng/mL. Vitamin D is identified
  as a food/sun-exposure restoration (not exogenous), making it appropriate as a supplement
  since sun exposure is limited in northern climates. Coaches can recommend testing
  and supplementation to support vaginal microbiome health, but dosing to achieve
  specific serum levels should involve clinician oversight.
notes_for_client: Vitamin D, which we normally get from sunlight, helps support vaginal
  health by favoring the growth of beneficial bacteria like L. crispatus. Most people
  in northern climates don't get enough sun to make sufficient vitamin D and benefit
  from supplementation. Ask your doctor to check your levels.
