notes_for_coach: 'Lynch''s test: take 250 mg SAMe at bedtime — if it helps sleep,
  the Methylation Cycle is working; if insomnia worsens, it''s blocked (heavy metals,
  low B12, low glutathione, etc.). If worsening occurs, stop and take 50–150 mg niacin
  to clear SAMe. For fast COMT, daily SAMe may deplete dopamine — use intermittently
  via Pulse Method. Contraindicated with bipolar disorder or MAOIs.'
notes_for_client: 'SAMe helps drive your methylation system and supports mood and
  liver health — but only when your body is ready for it. Use it as a test: if sleep
  improves, keep using it; if you feel worse, stop and don''t force it.'
