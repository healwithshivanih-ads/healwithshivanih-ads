notes_for_coach: "Single, well-characterised probiotic strain (Lactobacillus rhamnosus\
  \ GG,\nATCC 53103). One of the most-studied probiotics in human trials. Has\npili\
  \ that allow attachment to intestinal mucosa; soluble factors (e.g.\np40 protein)\
  \ support gut barrier and reduce TNF-\u03B1. Contraindicated in\nsevere immunocompromise,\
  \ central venous catheters, or acute pancreatitis\nper Bajaj 2014 IND protocol exclusions.\
  \ Self-limited diarrhoea is the\nmost common AE.\n"
