notes_for_coach: 'Branded herbal-infusion (tea sachet) product from HerPulse, affiliate
  tie-up 2026-07. Age range per vendor: 18–45. Best fit: the broader hormone-imbalance
  picture — PCOD/PCOS, irregular or heavy periods, acne breakouts, unwanted hair
  growth, disturbed sleep, mood swings, hormonal weight gain, hair fall/thinning,
  infertility. This is the daily "everyday hormone balance" product, distinct from
  HerTOM (cycle-timed PMS/period-pain relief) and HerThyrom (autoimmune thyroid).

  Ingredients: Cordyceps Militaris, Reishi, Shatavari, Lodhra, Chamomile, Turmeric,
  Fenugreek, Spearmint. Vendor mechanism claims: (1) improves insulin resistance
  — a core PCOD/PCOS driver; (2) reduces stress via serotonin + inhibits 5-alpha-reductase
  (less conversion of testosterone to DHT — the vendor''s rationale for acne/hair-loss/unwanted-hair
  benefit); (3) claims increased IVF success rate via oocyte quality + steroidogenic
  enzyme upregulation; (4) claims it promotes progesterone. Proprietary blend —
  exact mg breakdown not disclosed. Treat as fm_specific_thin: a single uncontrolled
  60-day self-report study (150 women) plus ingredient-level literature (spearmint/DHT,
  shatavari, fenugreek/insulin) — not a trial of the finished product; the fertility/IVF
  and progesterone claims in particular are stronger marketing language than the
  cited literature supports and should be framed to clients as "may support" rather
  than promised outcomes.

  Dosing (vendor): 1 sachet/day.

  SAFETY (from vendor safety sheet): contraindicated in pregnancy and lactation
  — notable because the vendor also markets this for fertility/IVF support, so be
  explicit with clients: stop once pregnancy is confirmed. Do NOT combine with any
  hormonal birth control / OCP — many PCOS clients are on an OCP for cycle regulation,
  so screen for this before suggesting. Clients on blood pressure medication should
  consult their prescribing doctor first. Not for anyone with a known mushroom allergy
  (Cordyceps, Reishi) or allergy to any other listed ingredient. Vendor product claim
  language: "not intended to treat, cure, or prevent any disease."

  Affiliate purchase link (coach account): https://www.herpulse.in/product/hersantulan-for-hormonal-imbalance/aff/106/'
notes_for_client: A daily herbal tea (Cordyceps, Reishi, shatavari, fenugreek and
  more) many women with PCOS/PCOD, irregular cycles, acne, unwanted hair growth
  or hair thinning use as an everyday hormone-support ritual. Not a medicine — pairs
  alongside your food and lifestyle plan, not instead of it.
evidence_tier: fm_specific_thin
contraindications:
  conditions:
  - pregnancy — vendor safety review states contraindicated (discontinue once pregnancy
    is confirmed, even if it was used to support conception)
  - lactation/breastfeeding — vendor safety review states contraindicated
  - known allergy to mushrooms (Cordyceps militaris, Reishi) or any other listed
    ingredient (shatavari, lodhra, chamomile, turmeric, fenugreek, spearmint)
  medications:
  - hormonal birth control / oral contraceptive pills — vendor safety guidance says
    do not combine (OCP, combined-oral-contraceptive, progestin-only-pill, mini-pill,
    e.g. Novelon, Yasmin, Krimson, Mala-D, Femilon, Microgynon, Diane-35, Depo-Provera)
  - blood pressure / antihypertensive medication — vendor safety guidance says consult
    prescribing doctor before use (beta-blockers e.g. metoprolol, atenolol, propranolol,
    bisoprolol, Concor; ACE inhibitors/ARBs e.g. enalapril, ramipril, losartan, telmisartan,
    Cardace, Telma; thiazide diuretics e.g. hydrochlorothiazide, indapamide)
  life_stages: []
