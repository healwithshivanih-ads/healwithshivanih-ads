notes_for_coach: 'Latin: Cinnamomum camphora; Lauraceae. Sanskrit: Karpura. Traditional indications: bronchitis,
  asthma, whooping cough, pulmonary congestion, hysteria, epilepsy, delirium, insomnia, dysmenorrhea,
  gout, rheumatism, nasal congestion, sinus headaches, eye problems, tooth decay. Precautions: in excess
  acts as narcotic poison, aggravating Pitta and Vata; use only in prescribed low dosages; use only raw
  camphor not synthetic. Ayurvedic energetics from The Yoga of Herbs (Frawley & Lad).'
