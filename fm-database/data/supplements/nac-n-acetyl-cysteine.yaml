notes_for_coach: 600mg three times daily is the cited protocol. Acts as glutathione
  precursor. Also used in homocysteine regimens. Clinician uses NutriVal whole blood
  glutathione to guide dosing. IV NAC given with nitroglycerin reduced infarct size
  in hospitalized MI patients — relevant clinical context.
notes_for_client: NAC is an antioxidant that helps your body make glutathione, one
  of its most important natural defenses against cell damage. It may support heart
  health and blood sugar regulation.
