notes_for_coach: Take with a meal for absorption and to reduce fishy aftertaste. Quality
  varies greatly — advise clients to choose brands tested for heavy metals. High doses
  may affect bleeding; refer to clinician.
notes_for_client: Omega-3s from fatty fish (EPA and DHA) support your heart, brain,
  joints, and muscle health. If you don't eat fish 2x/week, a fish oil supplement
  can help fill the gap.
