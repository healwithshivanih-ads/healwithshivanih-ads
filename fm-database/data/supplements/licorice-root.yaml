contraindications:
  conditions:
  - hypertension / high blood pressure (glycyrrhizin raises BP — WHO Monographs Vol 1)
  - hypokalaemia / low potassium (WHO Monographs Vol 1)
  - chronic renal insufficiency (WHO Monographs Vol 1)
  - cholestatic liver disorders or cirrhosis (WHO Monographs Vol 1)
  medications:
  - thiazide or loop diuretics — added potassium loss (WHO Monographs Vol 1)
  - digoxin / cardiac glycosides — hypokalaemia raises toxicity risk (WHO Monographs Vol 1)
  - antihypertensive drugs — glycyrrhizin can reduce their effect (WHO Monographs Vol 1)
  - corticosteroids — do not combine (WHO Monographs Vol 1)
  - spironolactone or amiloride (WHO Monographs Vol 1)
  life_stages:
  - pregnancy
