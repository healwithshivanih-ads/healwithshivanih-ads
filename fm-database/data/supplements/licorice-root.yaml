notes_for_coach: 'This entry is WHOLE / glycyrrhizinated licorice root (Glycyrrhiza
  glabra) — the form used for immune, antiviral and adrenal/HPA support. It carries
  real blood-pressure and potassium risks (see contraindications): AVOID in
  hypertension, hypokalaemia, renal or cholestatic/liver disease, and pregnancy, and
  do not combine with diuretics, digoxin, antihypertensives, corticosteroids or
  spironolactone. For gut mucosal healing use the separate DGL (deglycyrrhizinated)
  entries instead — those have the glycyrrhizin removed and are BP-safe. Confirm form
  and duration with clinician.'
notes_for_client: Licorice root helps soothe and repair the gut lining while also
  having mild antibacterial effects.
