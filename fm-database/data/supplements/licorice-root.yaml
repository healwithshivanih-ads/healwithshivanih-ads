  quote: 'Contraindicated in hypertension, cholestatic disorders or cirrhosis,
    hypokalaemia, chronic renal insufficiency, and pregnancy. Prolonged high doses
    cause pseudoaldosteronism (potassium loss, sodium/water retention, raised BP). Do
    not use with thiazide/loop diuretics, cardiac glycosides, spironolactone/amiloride
    or corticosteroids; may reduce antihypertensive drug effect.'
