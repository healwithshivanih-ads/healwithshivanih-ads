notes_for_coach: Mineral that substitutes for calcium in bone hydroxyapatite, slightly
  stimulating osteoblast activity and inhibiting osteoclast activity. Typical dose
  680 mg elemental strontium at bedtime, taken at least 2 hours away from calcium
  and food to avoid absorption competition. Strontium ranelate (prescription form
  in Europe) has clinical trial evidence for vertebral and hip fracture reduction;
  citrate form is the nutritional equivalent. DXA scans become artifactually higher
  in strontium users — true BMD increase is much smaller than scan suggests. Use under
  clinician supervision; not first-line.
notes_for_client: A mineral that helps build new bone and slow bone breakdown. Taken
  at bedtime, separated from calcium and food. Used under clinician supervision after
  vitamin D, K2, magnesium, and calcium are optimised.
