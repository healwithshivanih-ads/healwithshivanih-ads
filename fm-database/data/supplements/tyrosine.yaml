notes_for_coach: Lynch recommends for fast COMT as a precursor to dopamine, norepinephrine,
  and epinephrine. NEVER within 6 hours of bedtime (stimulating). AVOID in slow COMT
  — worsens excess catecholamine burden. Also a MAOA burden — avoid in slow MAOA.
  Only appropriate when catecholamine levels are genuinely low (fast COMT). Discuss
  with clinician if prescribed as any medication could interact.
notes_for_client: An amino acid that helps your body make energising brain chemicals.
  Take only in the morning or early afternoon — never close to bedtime.
