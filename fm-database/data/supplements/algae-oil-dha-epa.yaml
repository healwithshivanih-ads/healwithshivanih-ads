notes_for_coach: Ideal for vegan or vegetarian clients. Derived from Schizochytrium
  species of marine microalgae — the same primary source that fish bioaccumulate.
  Some brands contain low EPA as well as DHA. DHA can retro-convert to EPA in the
  body. Verify EPA content on the supplement label.
notes_for_client: If you avoid fish, algae-based omega-3 oil is a clean, sustainable,
  and effective alternative to fish oil. It provides DHA (and sometimes EPA) directly
  without the mercury concern.
