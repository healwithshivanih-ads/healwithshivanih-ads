notes_for_coach: 'Therapeutic doses (1500–3000 mg/day) require clinician supervision.
  Inositol hexaniacinate is better tolerated with fewer flushing side effects. Monitor
  liver enzymes and glucose quarterly. Take at night (cholesterol synthesis peaks
  during sleep). Avoid in liver disease. Alternatives for liver contraindication:
  policosanol, garlic, pantethine.'
notes_for_client: Niacin is a B vitamin that powerfully lowers triglycerides, raises
  HDL, and reduces Lp(a). It often causes a harmless skin flush 20–30 minutes after
  taking — start low and increase slowly.
