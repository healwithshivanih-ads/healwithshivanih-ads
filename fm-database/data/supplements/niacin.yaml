notes_for_coach: Therapeutic niacin for HDL/Lp(a) effects requires clinician supervision
  and liver enzyme monitoring. Flushing is common; sustained-release forms reduce
  flushing but may increase hepatotoxicity risk. Outside coaching scope at therapeutic
  doses.
notes_for_client: Niacin is a B vitamin that can raise good cholesterol (HDL) and
  lower a genetic risk factor called Lp(a). It must be used under medical supervision
  because it can affect the liver.
