notes_for_coach: Antithyroid botanical traditionally used in mild Graves'. Pizzorno
  describes Lycopus as inhibiting peripheral T4-to-T3 conversion and reducing TSH
  receptor antibody binding. Typically combined with Melissa officinalis (lemon balm)
  and Lithospermum. Confirm dose with clinician. Contraindicated in hypothyroidism
  and during pregnancy/lactation.
notes_for_client: A traditional herb used under clinician supervision for mild overactive
  thyroid. Not for use if your thyroid is underactive or during pregnancy.
