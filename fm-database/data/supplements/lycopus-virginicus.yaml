notes_for_coach: "Antithyroid botanical traditionally used in mild Graves'/hyperthyroidism.\
  \ Active constituents (Romm): rosmarinic acid, ellagic acid, chlorogenic acid, luteolin-7-beta-glucoside\
  \ — inhibit TSH receptor binding. Also inhibits peripheral T4→T3 conversion and\
  \ iodide pump. German Commission E approved for mild hyperthyroid with neuroanatomic\
  \ dysfunction. CRITICAL SAFETY: sudden discontinuation may increase disease symptoms\
  \ — taper slowly. No large human RCTs, but strong in vivo + in vitro evidence. Romm\
  \ classic formula: 25mL bugleweed + 25mL lemon balm + 25mL motherwort + 25mL nettles\
  \ = 100mL; 5mL TID. Graves' formula: 20mL bugleweed + 20mL gromwell + 20mL lemon\
  \ balm + 10mL motherwort + 10mL skullcap + 10mL valerian + 10mL eleuthero = 100mL;\
  \ 5mL TID + Astragalus 500mg caps twice daily."
notes_for_client: A traditional herb used under clinician supervision for mild overactive
  thyroid. Not for use if your thyroid is underactive or during pregnancy.
