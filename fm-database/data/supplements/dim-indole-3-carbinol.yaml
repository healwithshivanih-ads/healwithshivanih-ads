notes_for_coach: Lynch recommends these as a pair for supporting oestrogen metabolism
  in slow COMT — both promote conversion of potent 16-OH estrogens to the weaker 2-OH
  pathway. Often packaged together. Useful when catechol estrogen accumulation is
  driving symptoms (PMS, fibroids, insomnia). Clinician oversight warranted for anyone
  with a hormone-sensitive cancer history.
notes_for_client: These compounds from cruciferous vegetables help your body process
  and clear oestrogen more efficiently, which can relieve PMS symptoms and reduce
  hormonal burden.
