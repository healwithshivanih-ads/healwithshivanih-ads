slug: american-ginseng-extract
display_name: American Ginseng Root (Panax quinquefolius)
category: herb
forms_available:
- capsule
- powder
typical_dose_range:
  capsule:
    min: 3000
    max: 9000
    unit: mg
timing_options:
- with_breakfast
- with_lunch
- with_dinner
take_with_food: required
linked_to_topics:
- type-2-diabetes-mellitus
- type-2-diabetes
- insulin-resistance
linked_to_claims:
- american-ginseng-most-evidence-based-herb-t2dm
- murray-american-ginseng-postprandial-glucose
notes_for_coach: 3 g whole powdered root before each meal. Most evidence-based herbal
  therapy for T2DM. Monitor for interaction with warfarin and stimulant effects. Standardised
  whole root powder preferred over extracts for studied outcomes.
notes_for_client: American ginseng root taken before meals is the best-studied herbal
  option for reducing blood sugar spikes after eating.
evidence_tier: plausible_emerging
linked_to_mechanisms: []
contraindications:
  conditions:
  - known allergy or hypersensitivity to Panax quinquefolius (WHO Monographs Vol 4)
  medications:
  - antidiabetic drugs — American ginseng may lower blood sugar; additive hypoglycaemia
    possible (WHO Monographs Vol 4)
  - drugs metabolised by CYP1A1/CYP1A2/CYP1B1 — in-vitro inhibition, potential interaction
    (WHO Monographs Vol 4)
  - warfarin — monitor INR (coach note; see notes_for_coach)
  life_stages: []
sources:
- id: pizzorno-cardiometabolic-diabetes
  location: Nutritional and Herbal Supplements / Panax quinquefolius
  quote: American ginseng is the most evidence-based herbal therapy for T2DM. Whole
    powdered American ginseng root at 3 g before each meal reduces postprandial glucose
    in T2DM.
- id: murray-pizzorno-2012-encyclopedia
  location: Chapter 45 — Diabetes
  quote: Comprehensive natural treatment summary for diabetes types 1 and 2.
- id: who-monographs-selected-medicinal-plants
  location: Vol 4 (2009) — Radix Panacis Quinquefolii, Contraindications / Drug interactions (pp. 239–243)
  quote: 'Contraindicated in known allergy or hypersensitivity to the plant. An extract
    inhibited CYP1A1, CYP1A2 and CYP1B1 in vitro — potential for interactions with drugs
    metabolised by these enzymes. May lower blood sugar; interactions with antidiabetic
    drugs are possible.'
