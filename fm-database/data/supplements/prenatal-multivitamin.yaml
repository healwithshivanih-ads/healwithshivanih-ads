notes_for_coach: Quality prenatal multivitamins should be METHYLFOLATE-BASED (L-methylfolate
  / 5-MTHF), NOT synthetic folic acid — 40%+ of women have MTHFR variants that impair
  folic acid metabolism. Look for methylcobalamin (B12), P5P (B6), retinol form vitamin
  A (not just beta-carotene), choline (often missing), iodine, and adequate iron.
  Begin 3 MONTHS BEFORE conception attempt to optimise nutrient stores for first-trimester
  neural tube development. Recommended brands include Designs for Health, Pure Encapsulations
  PreNatal Nutrients, Seeking Health Optimal Prenatal, Thorne Basic Prenatal.
