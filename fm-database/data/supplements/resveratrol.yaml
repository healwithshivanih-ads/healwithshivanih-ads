notes_for_coach: Resveratrol has poor bioavailability; trans-resveratrol or liposomal forms are preferred. Evidence for antiviral
  effects is largely preclinical. May interact with anticoagulants (warfarin), antiplatelet drugs, and some chemotherapy agents.
  Caution in pregnancy (Roberts et al. 2014 FASEB J adverse outcomes in primates).
