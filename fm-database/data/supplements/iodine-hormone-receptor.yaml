notes_for_coach: Iodine maintains the architectural integrity of hormone receptor
  binding pocket domains throughout the body — not just in the thyroid. Deficiency
  affects all hormone receptors. High-dose iodine supplementation (Lugol's etc.) should
  be clinician-supervised.
notes_for_client: Iodine keeps your hormone receptor 'pockets' properly shaped so
  hormones can fit in and do their job. We know iodine is needed for the thyroid,
  but it's needed throughout your whole body for the same reason.
