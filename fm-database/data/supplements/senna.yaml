notes_for_coach: 'Latin: Cassia acutifolia; Leguminosae. Sanskrit: Rajavriksha. Traditional indications:
  constipation, inflammatory skin conditions, hypertension, obesity. Precautions: hemorrhoids, inflammatory
  conditions of the g.i. tract, diarrhea, pregnancy; irritant to intestinal membrane; repeated use may
  weaken colon tone. Ayurvedic energetics from The Yoga of Herbs (Frawley & Lad).'
