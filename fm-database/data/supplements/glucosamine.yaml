notes_for_coach: Glucosamine sulfate 1500 mg/day is the most-studied form for osteoarthritis
  (especially knee OA), with meta-analyses showing modest pain reduction and slowed
  structural progression. Sulfate form has stronger evidence than HCl. Most preparations
  derived from shellfish (shrimp/crab) — vegetarian options (fermented corn) available.
  Mild warfarin interaction reported (INR elevation) — coordinate with prescriber.
  Avoid in poorly-controlled diabetes (mild insulin resistance possible). Often paired
  with chondroitin sulfate for joint protocols.
