notes_for_coach: 'P5P is the active, bioavailable form of B6 and controls signaling
  duration at helix-12 of the receptor. Depleted by sugar, frequent flying (jet fuel
  exposure), and the modern diet. IMPORTANT: doses over 100mg/day are linked to reversible
  neurological symptoms — do not exceed without clinician guidance. Coaches should
  not recommend doses above 100mg/day.'
notes_for_client: Active vitamin B6 (P5P) acts like a volume dial on your hormone
  signals — too little means signals run too long, which can contribute to heavy periods
  or breast changes. Sugar and frequent air travel can deplete it. Discuss dose with
  your practitioner.
