notes_for_coach: 'Latin: Myristica fragrans; Myristicaceae. Sanskrit: Jatiphala. Traditional indications:
  poor absorption, abdominal pain and distension, diarrhea, dysentery, intestinal gas, insomnia, nervous
  disorders, impotence. Precautions: pregnancy, high Pitta; tamasic — in excess can increase dullness
  of mind. Ayurvedic energetics from The Yoga of Herbs (Frawley & Lad).'
