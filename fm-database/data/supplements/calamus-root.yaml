notes_for_coach: 'Latin: Acorus calamus; Araceae. Sanskrit: Vacha. Traditional indications: colds, cough,
  asthma, sinus headaches, sinusitis, arthritis, epilepsy, shock, coma, loss of memory, deafness, hysteria,
  neuralgia. Precautions: bleeding disorders including epistaxis, bleeding hemorrhoids; FDA restrictions
  on internal use in the USA. Ayurvedic energetics from The Yoga of Herbs (Frawley & Lad).'
