notes_for_coach: Standardised extract 85-95% fatty acids and sterols, 320 mg/day.
  Inhibits 5-alpha-reductase (same mechanism as finasteride) and DHT-receptor binding.
  Used in BPH and female-pattern hair loss (androgenic alopecia) as well as PCOS-related
  androgenic excess. Generally well tolerated; rare GI upset. Avoid in pregnancy and
  on anti-androgens / hormone therapies without clinician oversight.
notes_for_client: A traditional herb used for prostate health that also helps with
  female hair loss caused by androgen excess. Used at 320 mg of the standardised extract
  daily.
