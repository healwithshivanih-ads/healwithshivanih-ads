notes_for_coach: 'Source (IFM Fig 3.5) names selenium as an antioxidant cofactor

  protective during Phase 1 biotransformation but does NOT give dosing

  in this figure. From prior thyroid work in this catalogue, 100-200

  mcg/day is the routinely cited range with 400 mcg/day as the safe

  upper limit. Selenomethionine is the preferred form. Brazil nuts

  (1-2 daily) are a food-first option; one Brazil nut ≈ 70-90 mcg.

  Selenium is a cofactor for both glutathione peroxidase (antioxidant

  defense) and deiodinase enzymes (T4 → T3 conversion).

  '
notes_for_client: Selenium is a trace mineral that supports your immune system, thyroid,
  and antioxidant defences.
