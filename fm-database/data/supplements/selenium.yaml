notes_for_coach: Essential cofactor for GPX enzymes — without it, glutathione cannot
  neutralise hydrogen peroxide. Toxicity threshold is relatively low (~400 mcg/day);
  blood selenium should be monitored especially if using IV nutrient therapy. Lynch
  notes 'too much selenium is toxic' — check serum levels before supplementing.
notes_for_client: A trace mineral your body needs to use glutathione effectively.
  A little goes a long way — don't exceed recommended amounts.
