notes_for_coach: |
  Whole-food source of soluble + insoluble fiber, omega-3 ALA, calcium,
  magnesium. Best soaked or ground for absorption — whole seeds may pass
  through. Start at 1 tsp/day and ramp slowly to avoid bloating.
  Always pair with adequate water (≥250 ml per tablespoon).
notes_for_client: |
  Soak 1-2 tablespoons of chia seeds in water, milk, or yogurt for at
  least 15 minutes before eating. Start small and drink plenty of water.
  Helps with constipation and feeds the good bacteria in your gut.
