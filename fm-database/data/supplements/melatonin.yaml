notes_for_coach: Doses above 5 mg are above typical consumer use and may cause morning
  grogginess. The 5–20 mg range in this toolkit is therapeutic for COVID-19 adjuvant
  context and requires clinician guidance. For general sleep/anti-inflammatory support,
  0.5–3 mg is typical. Interactions with SSRIs and anticoagulants. Avoid in autoimmune
  conditions without clinician input.
notes_for_client: Melatonin helps signal your body when it's time to sleep and also
  has anti-inflammatory properties. Start with the lowest effective dose and take
  it 30–60 minutes before bed in a dark room.
