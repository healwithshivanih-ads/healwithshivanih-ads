notes_for_coach: 'Pineal hormone synthesized from serotonin, released in response to

  darkness. Source (Menolascino transcript) cites 3 mg as the dose

  used in clinical trials and notes wide variability in clinical

  response — roughly one-third benefit substantially, one-third no

  benefit, one-third paradoxically wired. Source also notes most

  high-quality studies originate in Germany / Europe where supplement

  consistency is better regulated; product quality matters. Current

  literature increasingly favors lower physiologic doses (0.3-0.5 mg)

  for circadian-replacement purposes, with higher doses reserved for

  jet lag and specific clinical contexts — confirm dose with a

  peer-reviewed source for individual client use. Clinically proven

  to reduce jet lag.

  '
notes_for_client: Melatonin helps signal your body when it's time to sleep and also has anti-inflammatory properties. Start
  with the lowest effective dose and take it 30–60 minutes before bed in a dark room.
