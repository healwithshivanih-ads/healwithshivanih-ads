notes_for_coach: Most applicable for duodenal ulcers with acid hypersecretion. Antioxidant
  and cytoprotective roles in gastric mucosa described. Research mostly in animal/hypersecretion
  models; human clinical evidence limited.
notes_for_client: Melatonin does more than help with sleep — it also helps protect
  the lining of your stomach from acid damage, especially at night.
