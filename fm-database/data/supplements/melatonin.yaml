notes_for_coach: Document lists 5–20 mg; the upper end (>5 mg) requires clinician
  oversight. Most sleep evidence supports lower doses (0.5–5 mg). Anti-inflammatory
  mechanism via inflammasome modulation is emerging. Interactions with SSRIs and anticoagulants.
notes_for_client: Melatonin is most commonly used to support sleep quality. It also
  has anti-inflammatory properties. Start with the lowest effective dose.
evidence_tier: plausible_emerging
