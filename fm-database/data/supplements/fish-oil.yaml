notes_for_coach: Used in the 5R Repair step for gut lining and in gut-brain axis support
  for anti-inflammatory effects. Food sources include salmon, mackerel, sardines (fatty
  fish), plus flaxseeds and walnuts (plant ALA). EPA/DHA dosing should be clinician-directed.
notes_for_client: Omega-3 fatty acids from fish oil or fatty fish help reduce inflammation
  in both the gut and brain. Eating salmon, sardines, or mackerel a few times a week
  is a great start.
