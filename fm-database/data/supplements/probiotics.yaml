notes_for_coach: Probiotic-rich foods and supplements help diversify gut microbiome,
  potentially reducing beta-glucuronidase activity and improving estrogen excretion.
  Diversity of strains matters more than single-strain supplementation.
notes_for_client: Good gut bacteria help your body properly eliminate used estrogen.
  Taking probiotics — or eating probiotic-rich foods like yogurt, kefir, or fermented
  vegetables — may help keep estrogen levels balanced.
