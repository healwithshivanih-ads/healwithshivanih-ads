notes_for_coach: 'For cervical dysplasia: 10 mg daily for 3 months, then 2.5 mg daily.
  Always combine with B12 (methylcobalamin 1 mg daily) to avoid masking B12 deficiency.
  RBC folate is more clinically relevant than serum folate in OC users.'
notes_for_client: If you take birth control pills, your cervical cells may be folate-depleted
  even if your blood tests look normal — targeted supplementation may help.
