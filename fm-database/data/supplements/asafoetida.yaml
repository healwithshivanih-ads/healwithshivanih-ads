notes_for_coach: 'Latin: Ferula asafoetida; Umbelliferae. Sanskrit: Hingu. Traditional indications: indigestion,
  flatulence, abdominal distention, intestinal colic pain, constipation, arthritis, rheumatism, whooping
  cough, convulsions, epilepsy, hysteria, palpitation, asthma, paralysis, worms. Precautions: high fever,
  hyperacidity, rash, urticaria, pregnancy. Ayurvedic energetics from The Yoga of Herbs (Frawley & Lad).'
