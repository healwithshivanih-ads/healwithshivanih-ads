notes_for_coach: DHEA-S should be tested before supplementation. If DHEA-S is low,
  supplementing directly addresses the precursor deficiency. Dosing and form are clinician-prescribed
  only.
notes_for_client: DHEA is a natural precursor your body uses to make hormones like
  testosterone and estrogen. Low DHEA-S on a blood test may explain why other hormones
  are also low.
