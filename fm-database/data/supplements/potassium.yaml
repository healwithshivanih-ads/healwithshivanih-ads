notes_for_coach: OTC supplements limited to 99 mg/dose by FDA. Salt substitutes (NoSalt,
  Nu-Salt) provide ~530 mg/1⁄6 tsp. Therapeutic doses (2.5–5 g/day) require food-based
  approach or clinician supervision. Contraindicated with digitalis, K-sparing diuretics,
  ACE inhibitors, and in kidney disease.
notes_for_client: Potassium works hand-in-hand with sodium — the more you get from
  fruits and vegetables, the better your blood pressure tends to be. High-dose pills
  can cause stomach upset; food is always best.
