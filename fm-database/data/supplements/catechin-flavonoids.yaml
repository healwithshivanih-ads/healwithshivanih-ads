notes_for_coach: High-dose catechin (1 g × 5/day = 5 g/day total) cited for histamine
  reduction in gastric tissue. Clinician supervision at these doses. Multiple flavonoids
  inhibit H. pylori concentration-dependently. Flavone is most potent studied. Sofalcone
  (synthetic sophoradin derivative) also cited for post-eradication ulcer healing.
notes_for_client: Catechin is a type of flavonoid found in green tea and red wine.
  At therapeutic doses it helps lower histamine in the stomach and directly inhibits
  H. pylori.
evidence_tier: plausible_emerging
linked_to_mechanisms: []
sources:
- id: pizzorno-textbook-hpylori
  location: Nutritional Factors — Flavonoids, p. 783
  quote: A dose of 1000 mg catechin five times per day reduces histamine in gastric
    tissue of normal patients and those with GUs and DUs and acute gastritis. Several
    flavonoids inhibit H. pylori in a concentration-dependent manner.
