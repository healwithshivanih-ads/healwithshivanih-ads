notes_for_coach: 'Clinical study dose: 70 g/day fresh broccoli sprouts (420 µmol SF
  precursor) for 8 weeks. Decreased urea breath test, H. pylori stool antigen, and
  serum pepsinogens I & II. Sprout potency varies; standardised extract capsules may
  be used as alternative.'
notes_for_client: Broccoli sprouts contain a compound called sulforaphane that has
  been shown in clinical studies to reduce H. pylori activity in the stomach. Aim
  for a large handful daily.
