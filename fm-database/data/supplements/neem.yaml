notes_for_coach: 'Latin: Azadirachta indica; Meliaceae. Sanskrit: Nimba. Traditional indications: skin
  diseases, urticaria, eczema, ringworm, parasites, fever, malaria, cough, thirst, nausea, vomiting, diabetes,
  tumors, obesity, arthritis, rheumatism, jaundice. Precautions: diseases of cold and tissue deficiency
  generally; use with discretion in severe fatigue or emaciation. Ayurvedic energetics from The Yoga of
  Herbs (Frawley & Lad).'
