notes_for_coach: NMN (nicotinamide mononucleotide) and NR (nicotinamide riboside)
  are NAD+ precursors used to support mitochondrial energy production and sirtuin
  signaling. NAD+ depletion is documented in aging, post-viral syndromes including
  Long COVID, and chronic fatigue. Standard clinical dose is 250-500 mg/day for general
  support, up to 1000 mg/day in post-viral recovery contexts. NR has more human trial
  data; NMN may raise NAD+ levels more efficiently in muscle. Best taken in the morning
  on empty stomach. Avoid in active cancer (sirtuin activation has complex effects
  on tumour biology).
