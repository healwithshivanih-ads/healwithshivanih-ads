notes_for_coach: Classical Ayurvedic compound used for amlapitta (hyperacidity / gastritis).
  Contains processed pearl, conch shell, mukta-pishti (pearl calx), and cooling herbs.
  Mineral content provides mild acid-buffering + mucosal-protective effects. Case-study
  dose — 250 mg tablet twice daily after food, 60 days, paired with Vidanga Churna.
  Source from BAMS-supervised pharmacy. Heavy metals are a real concern with Bhasma-containing
  rasashastra preparations — insist on lab-tested batches (Kerala Ayurveda, AVP, Vaidyaratnam
  are reputable). Not for long-term continuous use without practitioner oversight.
notes_for_client: A traditional Ayurvedic compound formulated to cool excess stomach
  acid and protect the stomach lining. 250 mg tablet twice daily after meals. Always
  source from a reputable Ayurvedic pharmacy and use under supervision of a BAMS practitioner.
