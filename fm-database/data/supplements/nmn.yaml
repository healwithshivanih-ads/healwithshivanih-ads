notes_for_coach: >-
  NAD+ precursor marketed for cellular energy, metabolic and longevity support.
  Evidence in humans is emerging, not established — treat claims cautiously.
  VitaOne product (Uthever®) is a 500 mg capsule taken once daily. No major
  drug interactions documented, but longevity/anti-ageing framing should stay
  educational within coaching scope.
notes_for_client: >-
  NMN is a building block your body uses to make NAD+, a molecule involved in
  cellular energy. Research is still early, so think of it as an optional extra,
  not a foundation.
