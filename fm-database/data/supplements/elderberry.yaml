notes_for_coach: Elderberry has the best evidence base of the botanicals in this toolkit
  for upper respiratory symptoms (Hawkins 2019 meta-analysis). Safe for most adults
  and children. Caution in severe COVID-19 due to theoretical cytokine-stimulating
  effects. Standardized extracts preferred.
notes_for_client: Elderberry is a safe and well-researched natural remedy for cold
  and flu symptoms. It works best when taken at the start of illness. Available as
  syrup, capsules, or gummies.
