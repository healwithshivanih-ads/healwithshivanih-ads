- id: pizzorno-cardiometabolic-hypertension
  location: Botanical Medicines / Allium sativum
  quote: Dried garlic powder standardized to contain 1.3% alliin at dose of 600 to
    900 mg q.d. can lower systolic BP by 11 mm Hg and diastolic BP by 5.0 mm Hg over
    a 1- to 3-month period.
notes_for_coach: 'Standardise to 1.3% alliin (7.8–11.7 mg alliin/dose). Therapeutic
  approach: fresh garlic equivalent of 4000 mg/day. Garlic BP reductions 8–11 mm Hg
  systolic, 5–8 mm Hg diastolic. Also lowers cholesterol.'
