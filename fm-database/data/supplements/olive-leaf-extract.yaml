notes_for_coach: 'Must be standardised to oleuropein 17–23% (EFLA943 / Benolea). Protocol:
  500 mg b.i.d. (1000 mg/day). Avoid extracts standardised only for hydroxytyrosol
  — no antihypertensive effect. Oleuropein and oleacein act as natural calcium channel
  blockers.'
notes_for_client: Olive leaf extract works like a gentle calcium channel blocker.
  Make sure the label lists oleuropein content — that's the active compound.
