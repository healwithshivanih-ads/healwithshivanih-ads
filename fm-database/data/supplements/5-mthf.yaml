notes_for_coach: 5-MTHF is the active, methylated form of folate (B9), bypassing the
  MTHFR enzyme. Essential for MTHFR-positive individuals. Standard folic acid supplementation
  may be ineffective or counterproductive. Dosing requires clinician guidance.
notes_for_client: 5-MTHF is the ready-to-use form of folate that your body can use
  directly, especially important if you have an MTHFR variation.
