notes_for_coach: "Active compounds — crocin, crocetin, safranal, picrocrocin. Mechanism:\
  \ serotonin\n+ dopamine + glutamate modulation; mild MAO-A inhibition. Comparable\
  \ efficacy to\nfluoxetine 20 mg in mild-to-moderate depression (Akhondzadeh 2005)\
  \ and to\nimipramine (Akhondzadeh 2004).\n\nTwo practical forms:\n- Stigma extract\
  \ (the red threads, expensive) — research-grade, traditional\n- Petal extract (the\
  \ purple flower petals, much cheaper) — Murray's recommendation\n  when budget is\
  \ a factor; comparable efficacy in newer trials (Hosseinzadeh 2010)\n\nTrial dose\
  \ for PMS, depression, anxiety: 15 mg twice daily (30 mg total). Effect\ndevelops\
  \ over 4-8 weeks. Generally well-tolerated. India produces high-quality\nKashmir\
  \ saffron at competitive prices.\n"
notes_for_client: 'Saffron (kesar) — the world''s most expensive spice but the most
  concentrated form

  is 15 mg twice daily as an extract. Used in Persian + Indian traditional medicine

  for low mood + women''s hormonal symptoms. Modern trials show it works as well as

  Prozac for mild-to-moderate depression. Effect builds over 4-8 weeks.

  '
