notes_for_coach: Vitamin K2 is fat-soluble and requires bile salts for absorption
  — always recommend with food. Particularly important when supplementing vitamin
  D3. Antibiotic use, malabsorptive GI conditions, and newborns are high-risk groups
  for deficiency. Refer any bleeding symptoms to a clinician immediately.
notes_for_client: Vitamin K2 works best alongside Vitamin D3. Take it with a meal.
  It helps ensure calcium is deposited in your bones — not your blood vessels. If
  you are on any blood-thinning medications, speak with your doctor before supplementing.
