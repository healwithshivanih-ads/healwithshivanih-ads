notes_for_coach: 'Latin: Myrica spp.; Myricaceae. Sanskrit: Katphah. Traditional indications: colds, flus,
  laryngitis, sinus and nasal congestion, sore throat, asthma, bronchitis, adenoids, fever, bleeding gums,
  chronic sores, epilepsy. Precautions: high Pitta, hyperacidity, hypertension. Ayurvedic energetics from
  The Yoga of Herbs (Frawley & Lad).'
