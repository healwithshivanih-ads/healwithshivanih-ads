notes_for_coach: 'Coach Shivani''s original tip: ''Soak methi seeds in water overnight
  and drink the sieved water the next morning. Good for insulin resistance and diabetes.''
  Preparation: soak ~1–2 tsp of whole methi seeds in a glass of water overnight; strain
  in the morning and have the water on an empty stomach. The seeds themselves can
  be eaten or discarded.'
notes_for_client: Fenugreek (methi) seeds soaked overnight produce a mucilaginous
  water rich in soluble fibre, which may help slow glucose absorption and support
  healthy insulin levels. Drink the strained water first thing in the morning before
  eating.
