# Acumen Diagnostics — lab provider config (pathology integration)
# Scaffold. list_inr = confirmed Acumen DOS list price; target_inr = proposed client price
# (pending Acumen rate negotiation). negotiated_inr = null until rates lock.
# Component test slugs map to fm-database/data/lab_tests/<slug>.yaml (FM-optimal ranges live there).
# See docs/ACUMEN_PATHOLOGY_INTEGRATION.md.

provider:
  slug: acumen-diagnostics
  display_name: Acumen Diagnostics
  phone_e164: "+919808050050"
  website: https://www.acumendiagnostics.in
  home_collection: true
  notes_for_coach: >-
    B2B reference lab. Covers all blood/serum work + esoteric send-outs (LC-MS/MS hormones,
    salivary cortisol, fatty-acid profile, HLA, cytogenetics). Does NOT offer DUTCH, GI-MAP /
    stool, or Organic Acids — keep those with the existing specialty lab.
  updated_at: '2026-06-16'
  updated_by: shivani

# ===========================================================================
# FINAL DEAL — Acumen (Abhinav Walia, 2026-06-25). Base for everyone + 3 gender/age
# add-ons. our_cost = what Acumen bills us; mrp = client-facing price; margin = mrp - cost.
# Add-on individual tests at 50% of Acumen catalogue (see addon_tests).
# ===========================================================================
profiles_final:
  # `includes` = client-friendly "what we'll check" groups (drives the in-app
  # personalised view so a recommendation reads as a tailored check, not a SKU).
  # Base carries the full list; the gender/age profiles add `includes_extra` on top.
  - id: 1
    name: "Base Panel"
    audience: everyone
    our_cost_inr: 8500
    mrp_inr: 12500
    margin_inr: 4000
    # à-la-carte total if each test were booked individually at Acumen's catalogue
    # (DOS list) price. Drives the strike-through "regular price" on the client app.
    # Base ≈ ₹20,000 (was 18,400 + serum magnesium 610 + serum folate 1400,
    # − HoloTC→total B12 400; PP glucose not included; final 2026-06-26 build).
    catalogue_inr: 20000
    includes:
      - "Full thyroid — TSH, free T3 & T4, anti-TPO & anti-Tg antibodies"
      - "Iron studies + ferritin"
      - "Vitamin D, vitamin B12 & folate"
      - "Magnesium"
      - "Blood sugar — fasting & post-meal glucose and insulin, HbA1c, HOMA-IR"
      - "Heart — full lipids, ApoB, ApoA1, Lp(a)"
      - "Inflammation — hs-CRP, ESR"
      - "Homocysteine & methylation"
      - "Liver & kidney function, full blood count"
      - "Morning cortisol"
    # add-on slugs already inside this panel — hidden from the add-on picker (and
    # dropped server-side) when this profile is chosen, so a test is never
    # recommended + charged twice. Gender/age profiles inherit this Base set.
    covered_addon_slugs: [apob, apoa1, lp-a, am-cortisol]
  - id: 2
    name: "Women's Reproductive"
    audience: "women <45"
    our_cost_inr: 16500
    mrp_inr: 23500
    margin_inr: 7000
    # à-la-carte = Base 18,400 + hormone block at catalogue (AMH 2400, free testo 2150,
    # SHBG 2800, FSH 580, LH 580, E2 700, progesterone 740, prolactin 650, 17-OHP 1800,
    # CA-125 1550, CA 15.3 1575) + total-testo & DHEA-S @ ₹500 each (no catalogue price).
    catalogue_inr: 36525
    # Final Acumen deal: hormone block costs us ₹8,000 on top of Base (8500) = 16500.
    includes_extra:
      - "Reproductive hormones — FSH, LH, AMH, estradiol, progesterone, prolactin"
      - "Androgens — total & free testosterone, SHBG, DHEA-S, 17-OHP"
      - "Women's screening — CA-125, CA 15.3"
    covered_addon_slugs: [fsh, lh, amh, estradiol-e2, progesterone, prolactin, total-testosterone, free-testosterone, shbg, dhea-s, ca-125, ca-15-3]
  - id: 3
    name: "Perimenopause"
    audience: "women 40+"
    our_cost_inr: 13000
    mrp_inr: 20000
    margin_inr: 7000
    # à-la-carte = Base 18,400 + FSH 580, LH 580, E2 700, progesterone 740, SHBG 2800,
    # 17-OHP 1800, CA-125 1550, CA 15.3 1575 + total-testo & DHEA-S @ ₹500 each.
    catalogue_inr: 31325
    # Final Acumen deal: hormone block costs us ₹4,500 on top of Base (8500) = 13000.
    includes_extra:
      - "Perimenopause hormones — FSH, LH, estradiol, progesterone"
      - "Androgens — total testosterone, SHBG, DHEA-S, 17-OHP"
      - "Women's screening — CA-125, CA 15.3"
    covered_addon_slugs: [fsh, lh, estradiol-e2, progesterone, dhea-s, total-testosterone, shbg, ca-125, ca-15-3]
  - id: 4
    name: "Male"
    audience: men
    our_cost_inr: 14000
    mrp_inr: 21000
    margin_inr: 7000
    # à-la-carte = Base 18,400 + free testo 2150, SHBG 2800, E2 700, prolactin 650,
    # LH 580, FSH 580, PSA total 1000, PSA free 1090 + total-testo, DHEA-S & CEA @ ₹500.
    catalogue_inr: 31050
    # Final Acumen deal: hormone block costs us ₹5,500 on top of Base (8500) = 14000.
    includes_extra:
      - "Male hormones — total & free testosterone, SHBG, DHEA-S"
      - "Pituitary + estrogen — LH, FSH, prolactin, estradiol"
      - "Men's screening — PSA (total & free), CEA"
    covered_addon_slugs: [total-testosterone, free-testosterone, shbg, dhea-s, lh, fsh, prolactin, estradiol-e2, psa-total, psa-free, cea]
# Base (Profile 1) contents (FINAL, 2026-06-26): CBC, ESR, LFT, KFT, fasting glucose,
#   fasting insulin, PP glucose, PP insulin, HbA1c, HOMA-IR, TSH, free T3, free T4,
#   anti-TPO, anti-Tg, lipid, ApoB, ApoA1, Lp(a), hs-CRP, homocysteine, iron studies, ferritin,
#   vitamin D, vitamin B12 (TOTAL — HoloTC unavailable at Acumen; order MMA à-la-carte if borderline),
#   serum magnesium, serum folate, morning cortisol.
#   vs Ultrahuman Base (₹8,159): covers everything except calcium + testosterone, PLUS thyroid antibodies
#   (Ultrahuman OMITS anti-TPO/Tg), ApoB, ApoA1, Lp(a), PP glucose/insulin. Like-for-like (Ultrahuman +
#   those add-ons at market ~₹4,200) ≈ ₹12,360 ≈ our ₹12,500 MRP — so the base is fairly priced, not premium.
# NOT at Acumen (iThrive/specialty): zonulin, 4-point salivary cortisol curve, DUTCH, GI-MAP, OAT.

