name: Lead Poller (all events)

on:
  # DISABLED 2026-05-06 — replaced by real-time Meta webhook at
  # https://ochre-followup.fly.dev/api/webhooks/meta + cron tick safety net.
  # Keeping file for reference only.
  workflow_dispatch:

jobs:
  poll:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Restore leads DB from previous run ───────────────────────────────
      - name: Restore leads.db
        uses: actions/cache@v4
        with:
          path: leads.db
          key: leads-db-${{ github.run_id }}
          restore-keys: leads-db-

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      # ── Write base credentials from GitHub Secrets ────────────────────────
      - name: Write .env
        run: |
          cat > .env << 'ENVEOF'
          META_APP_ID=${{ secrets.META_APP_ID }}
          META_APP_SECRET=${{ secrets.META_APP_SECRET }}
          META_ACCESS_TOKEN=${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID=${{ secrets.META_AD_ACCOUNT_ID }}
          ENVEOF

      - name: Write responder.env
        run: |
          cat > responder.env << 'ENVEOF'
          META_ACCESS_TOKEN=${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID=${{ secrets.META_AD_ACCOUNT_ID }}
          META_PAGE_ID=${{ secrets.META_PAGE_ID }}
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASS=${{ secrets.SMTP_PASS }}
          FROM_EMAIL=${{ secrets.FROM_EMAIL }}
          FROM_NAME=${{ secrets.FROM_NAME }}
          WA_PROVIDER=${{ secrets.WA_PROVIDER }}
          AISENSY_API_KEY=${{ secrets.AISENSY_API_KEY }}
          WIX_API_KEY=${{ secrets.WIX_API_KEY }}
          WIX_SITE_ID=${{ secrets.WIX_SITE_ID }}
          META_WA_PHONE_ID=${{ secrets.META_WA_PHONE_ID }}
          META_WA_TEMPLATE=${{ secrets.META_WA_TEMPLATE }}
          GOOGLE_SERVICE_ACCOUNT_JSON=google_service_account.json
          GOOGLE_REFRESH_TOKEN=${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GMAIL_CLIENT_ID=${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET=${{ secrets.GMAIL_CLIENT_SECRET }}
          ENVEOF

      # ── Write Google service account key from GitHub Secret ───────────────
      - name: Write google_service_account.json
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > google_service_account.json

      # ── Poll each active event ────────────────────────────────────────────
      # event.env files are committed to the repo (no secrets, event vars only)
      # Each event folder has events/{slug}/event.env generated by setup_event.py
      - name: Poll all active events
        run: |
          if [ ! -d "events" ] || [ -z "$(ls -A events/)" ]; then
            echo "No events found — nothing to poll"
            exit 0
          fi

          for event_dir in events/*/; do
            slug=$(basename "$event_dir")
            env_file="events/$slug/event.env"

            if [ ! -f "$env_file" ]; then
              echo "⏭  $slug: no event.env — skipping (run setup_event.py $slug first)"
              continue
            fi

            echo ""
            echo "══════════════════════════════════════"
            echo "  Polling event: $slug"
            echo "══════════════════════════════════════"

            python lead_responder.py --once --event "$slug"
            python google_form_responder.py --once --event "$slug"
            python wix_event_responder.py --once --event "$slug"
          done
